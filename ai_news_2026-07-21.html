<script>
const md = "## 🤖 今週のAI最新動向\n\n### 1. Moonshot AIが「史上最大のオープンウェイトモデル」Kimi K3を公開——2.8兆パラメータ・1Mコンテキスト\n\n**何が起きたか**: 中国Moonshot AIが7月16日、2.8兆パラメータのMoEモデル「Kimi K3」を発表した。オープンウェイトモデルとしては史上最大で、モデル重みは7月27日に公開予定。1Mトークンコンテキスト、ネイティブな視覚理解、常時オンの「thinking mode」を備える。\n\n**なぜ重要か**: 自社評価ではClaude Fable 5とGPT-5.6 Solには総合で及ばないと認めつつ、コーディング・エージェント系ベンチではClaude Opus 4.8とGPT-5.5を上回ったと主張する（自社評価スイートでの比較である点に注意）。第三者運営のFrontend Code Arenaではスコア1679で18位から一気に1位に浮上し、Claude Fable 5を抜いた。米国の計算資源規制下でこの規模のオープンウェイトが出てくること自体が、クローズドモデルの価格・性能優位を侵食する構造変化だ。ローカル勢には「配れる最前線」がまた一段引き上がったことになる——ただし2.8Tを自宅で回すのは量子化してもかなりの覚悟が要る。\n\n出典: [CNBC](https://www.cnbc.com/2026/07/17/moonshot-ai-kimi-k3-model-openai-anthropic-china.html) (2026-07-17公開) / [Tom\u0027s Hardware](https://www.tomshardware.com/tech-industry/artificial-intelligence/moonshot-releases-2-8-trillion-parameter-kimi-k3) (2026-07公開)\n\u003e source: https://www.cnbc.com/2026/07/17/moonshot-ai-kimi-k3-model-openai-anthropic-china.html\n\n### 2. NVIDIAが4BパラメータのワールドモデルCosmos 3 Edgeを発表——物理AIをオンデバイスへ\n\n**何が起きたか**: NVIDIAが7月15日、Cosmos 3ファミリーのオンデバイス層となる「Cosmos 3 Edge」を発表した。4BパラメータでNemotron系をベースにしたワールドモデルで、エッジデバイス上で視覚推論とロボット制御ポリシー生成を直接実行する。あわせて日本のロボティクス・製造企業22社がNVIDIA Cosmos Coalitionに参加することも発表された。\n\n**なぜ重要か**: 5月31日に出たCosmos 3のNano（16B）・Super（64B）に続く最小ティアで、クラウド往復なしにロボットの知覚・行動決定を完結させる設計。物理AIの推論をエッジに寄せる流れは、レイテンシ要件だけでなく、工場ネットワークをインターネットから切り離したままAIを導入したい製造業のセキュリティ要件とも噛み合う。4Bという規模はJetson級のハードで現実的に動く水準で、「ワールドモデル=データセンターの重物」という前提を崩しにきている。\n\n出典: [CNBC](https://www.cnbc.com/2026/07/16/nvidia-reveals-new-ai-model-and-expands-japans-physical-ai-ecosystem.html) (2026-07-16公開)\n\u003e source: https://www.cnbc.com/2026/07/16/nvidia-reveals-new-ai-model-and-expands-japans-physical-ai-ecosystem.html\n\n### 3. Apple Intelligenceが中国当局の認可を取得——中身はAlibabaのQwen\n\n**何が起きたか**: 中国の国家インターネット情報弁公室（CAC）が7月15日、Apple IntelligenceをスマートフォンV向けオンデバイス生成AIサービス7件のひとつとして登録・認可した。中国版の基盤モデルはAlibabaのQwenで、iOS/iPadOS/macOS/visionOSに統合される。Appleが対応の遅れを公表してから約22カ月越しの決着となる（提供開始日は未発表）。\n\n**なぜ重要か**: 「同じUI・同じブランドの下で、国・地域によって中身のモデルが丸ごと入れ替わる」体制が、世界最大級のスマホ市場で公式に始まる。認可リストにはHuawei・Xiaomi・Samsung・OPPO・vivo・Nubiaが並び、オンデバイスAIが端末認可制度の枠組みに正式に組み込まれた形だ。モデルの差し替え可能性を前提としたOS設計と、規制主導のAIサプライチェーン分岐という二つの意味で、技術と地政学の交点にある話。\n\n出典: [TechCrunch](https://techcrunch.com/2026/07/15/apple-intelligence-approved-for-launch-in-china-with-alibabas-qwen-ai/) (2026-07-15公開)\n\u003e source: https://techcrunch.com/2026/07/15/apple-intelligence-approved-for-launch-in-china-with-alibabas-qwen-ai/\n\n### 4. TSMCがアリゾナに追加10兆円規模——対米投資は総額2,650億ドルへ\n\n**何が起きたか**: TSMCが7月16日のQ2決算説明会で、アリゾナへの追加1,000億ドル投資を発表した。2nm以降の先端プロセスのファブ4棟を新設し、対米投資は総額2,650億ドル（ファブ10棟・先端パッケージング2施設・R\u0026Dセンター）に達する。Q2純利益は過去最高のNT$7,066億（約220億ドル、前年比+77.4%）、2026年の設備投資計画は600〜640億ドルに引き上げられた。\n\n**なぜ重要か**: AIチップ需要が「多年にわたり強い」というファウンドリ側の需要見通しの物証で、前工程だけでなく後工程（advanced packaging）まで米国内で完結させる計画になっている点が新しい。GPU供給の律速はもはやウェハよりCoWoS系パッケージング能力であり、そこを地理的に分散する動きは、AIインフラの供給網リスク計算を書き換える。\n\n出典: [City of Phoenix](https://www.phoenix.gov/newsroom/ced-news/tsmc-announces-additional--100-billion-investment-in-arizona.html) (2026-07-16公開)\n\u003e source: https://www.phoenix.gov/newsroom/ced-news/tsmc-announces-additional--100-billion-investment-in-arizona.html\n\n## 📄 今週の注目論文\n\n### 1. 言語化可能な表現は言語モデル内で「グローバルワークスペース」を形成する / Verbalizable Representations Form a Global Workspace in Language Models\n\n- 筆頭著者: Wes Gurnee（Anthropic）\n- 掲載: Transformer Circuits Thread（Anthropic公式研究誌・arXiv外の一次ソース）・2026-07-06公開\n- **Problem**: LLM内部の膨大な特徴のうち、「モデル自身が言葉にできる表現」がどう組織化され、推論にどう使われているかが分かっていなかった。\n- **Method**: 「Jacobian lens（J-lens）」——各語彙トークンについて、後段でその語の出力尤度を上げる中間活性方向を線形化（ヤコビアン）で同定する手法。Claude Sonnet 4.5を中心にHaiku 4.5・Opus 4.5/4.6で検証。\n- **Finding**: 同時活性は約25概念以下、概念ベクトル分散の中央値6〜7%という小さな部分空間（層38〜92）が、内容の報告・黙考・多段推論を担う「作業空間」として機能していた。介入実験では語彙置換が88%成功、2ホップ推論の中間概念すり替えは54〜70%成功。\n- **読みどころ**: 神経科学のグローバルワークスペース理論（Baars）との構造的対応を主張する点が刺激的だが、実務的な本命は「モデルの隠れた推論を外から読める監査チャネル」としての応用。嘘や隠れた意図の検出に直結し得る。実装はGitHub（anthropics/jacobian-lens）でApache-2.0公開済みで、手元で追試できる。\n\n出典: [Anthropic / Transformer Circuits](https://transformer-circuits.pub/2026/workspace/index.html) (2026-07-06公開)\n\u003e source: https://transformer-circuits.pub/2026/workspace/index.html\n\n### 2. エージェント・データ・インジェクション攻撃はAIエージェントへの現実的脅威である / Agent Data Injection Attacks are Realistic Threats to AI Agents\n\n- 筆頭著者: Woohyuk Choi（ソウル大学校のセキュリティグループ compsec-snu ほか、Indiana University等との共著）・arXiv:2607.05120・2026-07-06投稿（v1）\n- **Problem**: 従来のプロンプトインジェクション研究は「命令文の注入」を想定してきたが、信頼済みデータに偽装した悪性データ（セキュリティ関連メタデータ等）の注入——ADI——は防御の想定外だった。\n- **Method**: Claude in Chrome、Claude Code、Gemini CLI、OpenAI Codex、GitHub CLI/MCP統合など商用エージェントの実機に対して、信頼データ経路への注入攻撃を系統的に検証。\n- **Finding**: Webエージェントへの任意クリック誘導、コーディングエージェントでのリモートコード実行（RCE）・サプライチェーン攻撃が成立。根本原因は、現行エージェントが「信頼できるデータと信頼できないデータの分離」という基本原則を実装していないことにあると指摘する。\n- **読みどころ**: 攻撃対象が研究用ベンチではなく、いま現場で使われている実製品である点が重い。エージェントに渡すデータの経路をtrusted/untrustedで棚卸しするという、古典的なセキュリティ工学の宿題がLLM時代にそのまま回帰している。エージェントを業務導入している組織は脅威モデルの見直し材料としてすぐ読む価値がある。\n\n出典: [arXiv](https://arxiv.org/abs/2607.05120) (2026-07-06公開)\n\u003e source: https://arxiv.org/abs/2607.05120\n\n### 3. SEED: エージェント強化学習のための自己進化型オンポリシー蒸留 / SEED: Self-Evolving On-Policy Distillation for Agentic Reinforcement Learning\n\n- 筆頭著者: Jinyang Wu（所属はarXivページに未記載・未確認）・arXiv:2607.14777・2026-07-16投稿（v1）\n- **Problem**: 長ホライズンのエージェントタスクでは、エピソード単位の成果報酬とトークン単位の方策学習の間に「監督ギャップ」があり、成果ベースRLの学習信号が疎になりすぎる。\n- **Method**: 完了した軌跡から自然言語の「スキル」を生成して方策モデルに還流し、スキル注入による出力確率の変化を密なトークンレベルの学習信号へ変換する自己進化フレームワーク。\n- **Finding**: テキスト系・ビジョン系のエージェントタスクで性能とサンプル効率が一貫して向上し、未見シナリオへの頑健な汎化を示した（公開直後にHugging Face Papersの週間上位入り）。\n- **読みどころ**: 「エージェントが自分の成功体験を言語化してスキル集を作り、それを蒸留信号に変える」という設計は、人間の手続き記憶の獲得過程と気持ちいいくらい相似形。報酬設計に苦しむエージェントRLの実務では、疎報酬を密信号に変換する汎用レシピとして試す価値がある。\n\n出典: [arXiv](https://arxiv.org/abs/2607.14777) (2026-07-16公開)\n\u003e source: https://arxiv.org/abs/2607.14777\n\n## 💡 今週のひとことインサイト\n\n### 1. 境界防御は1970年代、内部監査だけが未来——エージェントセキュリティの奇妙な非対称\n\n今週いちばん刺さったのは、ADI論文とJ-lens論文を並べて読んだときの非対称性だ。前者は、Claude CodeやChrome版Claudeのようなエージェントが「信頼できるデータと信頼できないデータを分離する」というUnixが半世紀前に確立した原則を実装していないせいで、メタデータ偽装だけでRCEまで到達し得ることを示した。後者は、モデル内部に読み出し可能な「作業空間」を見つけ、外から思考を監査できる可能性を開いた。つまり今のLLMエージェントは、境界防御が最小権限以前の水準なのに、内部観測の手段だけが先に整いつつある。setuidとauditdの歴史が教えるとおり、観測できることと防げることは別物だ。エージェントに権限を渡す前に、まずデータ経路の分離——結局、古典的なセキュリティ工学の出番だと思う。\n\n\u003e source: https://arxiv.org/abs/2607.05120 / https://transformer-circuits.pub/2026/workspace/index.html";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
