<script>
const md = "# ⚽ サッカー移籍情報・ワールドカップ2026 速報\n**2026年6月28日（日）**\n\n---\n\n## 🌍 ワールドカップ2026 ─ 本日よりラウンド・オブ・32開幕\n\n### グループステージ終了\n\n48チーム・12グループ制での史上初のグループステージが6月27日に全日程終了。本日6月28日よりノックアウトステージ（ラウンド・オブ・32）が開幕した。\n\n#### 6月27日（土）グループステージ最終節 主な結果\n| 試合 | スコア |\n|---|---|\n| イングランド vs パナマ | **2–0** |\n| クロアチア vs ガーナ | **2–1** |\n\nメキシコはグループを9ポイント（得失点差+6）で首位通過。\n\n#### 本日（6月28日）の試合\n| 対戦 | 会場 | キックオフ（現地） |\n|---|---|---|\n| **南アフリカ vs カナダ** | SoFiスタジアム（イングルウッド） | 15:00 ET |\n\n#### ラウンド・オブ・32 今後のスケジュール\n| 日付（現地） | 対戦 | 会場 |\n|---|---|---|\n| 6月29日 | 🇧🇷 ブラジル vs **🇯🇵 日本** | NRGスタジアム（ヒューストン） |\n| 6月29日 | 🇩🇪 ドイツ vs 🇵🇾 パラグアイ | ギレットスタジアム（フォックスボロ） |\n| 6月29日 | 🇳🇱 オランダ vs 🇲🇦 モロッコ | エスタディオ・モンテレー（メキシコ） |\n| 6月30日 | 🇨🇮 コートジボワール vs 🇳🇴 ノルウェー | AT\u0026Tスタジアム（アーリントン） |\n| 6月30日 | 🇫🇷 フランス vs 🇸🇪 スウェーデン | メットライフスタジアム（NJ） |\n| 6月30日 | 🇲🇽 メキシコ vs 🇪🇨 エクアドル | エスタディオ・アステカ（メキシコシティ） |\n\n**日本代表**はグループステージを突破。6月29日（現地時間）、ヒューストンでブラジルとのラウンド・オブ・32に臨む。\n\n---\n\n## ✅ 完了した移籍（直近7日間）\n\n### 1. マンチェスター・シティ ← エリオット・アンダーソン（ノッティンガム・フォレスト）\n- **移籍金：£116m（約215億円）** ─ シティ史上最高額・英国人選手史上最高額\n- **契約：5年（＋1年オプション）**　**発表：2026年6月26日**\n- フォレストでのブレイクアウトシーズンを経て、イングランド代表MFがエティハドへ。インスタレーションなしの完全固定額と報じられている。\n- ソース：The Athletic（David Ornstein＋Daniel Taylor）、Sky Sports ── ✅ S/A級複数確認\n\n---\n\n### 2. リバプール ← ビクトル・ムニョス（オサスナ）\n- **移籍金：€40m（リリース条項行使）**\n- ニューカッスルが交渉を進めていたところへリバプールが条項を直接行使して横取り。スペイン代表候補のウィンガー。\n- ソース：Fabrizio Romano（X/公式記事）── ✅ S級確認\n\n---\n\n### 3. リバプール ← ジェレミー・ジャケ（ステード・ランス）\n- **移籍金：€60m ＋ 出来高€10m（最大€70m）**\n- チェルシーとの争奪戦を制した。フランス代表CB候補。\n- ソース：Fabrizio Romano、Sky Sports ── ✅ S/A級複数確認\n\n---\n\n### 4. トッテナム ← ヤン・パウル・ファン・ヘッケ（ブライトン）\n- **移籍金：£52m（約96億円）**\n- デ・ゼルビ監督の下でプレーを望んでいたオランダ代表DFが加入。ロベルト・デ・ゼルビとの再合流が決め手。\n- ソース：Sky Sports ── ✅ A級確認\n\n---\n\n### 5. レアル・マドリード ← イブラヒマ・コナテ（リバプール）\n- **移籍金：フリートランスファー（契約満了）**\n- リバプールでの5年間を経てフランス代表CBがベルナベウへ。マドリードが既に公式確認済み。\n- ソース：Fabrizio Romano、クラブ公式 ── ✅ S/S級確認\n\n---\n\n### 6. アーセナル ← ピエロ・インカピエ（バイヤー・レバークーゼン）\n- **移籍金：€52m（£45m）**、5年契約（2031年まで）\n- レンタルからの完全移籍を正式確定。左SB／CB兼任可のエクアドル代表。アルテタ体制の左サイドを担う。\n- ソース：Fabrizio Romano ── ✅ S級確認\n\n---\n\n### 7. トッテナム ← アンディ・ロバートソン（リバプール）\n- **移籍金：フリートランスファー（契約満了）**\n- 8年間リバプールの左SBを務めたスコットランド代表キャプテンがスパーズへ。\n- ソース：複数報道で確認 ── ✅ A級確認\n\n---\n\n### 8. インテル・マイアミ ← カゼミーロ（マンチェスター・U）\n- **移籍金：フリートランスファー（契約満了）**\n- マンUを退団したブラジル代表MFがMLSへ。メッシらと同チームに。\n- ソース：Fabrizio Romano ── ✅ S級確認\n\n\u003e ⚠️ **注記（R1・日付ガード）：** 上記2〜8は2026年夏ウィンドウ（6月15日開幕）以降の案件として複数S/A級ソースが確認しているが、個別の公式発表日を6月21日以降と明示できるものは1（Elliot Anderson、6月26日）のみ。他は「ウィンドウ開幕後確認済み」として掲載。今後の検証で7日外と判明した案件は次回更新時に除外する。\n\n---\n\n## 🔥 Here We Go!（合意ほぼ確実）\n\n※ 本日時点でFabrizio Romanoが独立した\"Here We Go\"を宣言し、かつ完了した移籍セクション未掲載の案件は確認できませんでした（ラウンド・オブ・32開幕日につき、本日中に追加発表の可能性あり）。\n\n---\n\n## 💬 交渉中・注目の噂\n\n### 1. レアル・マドリード → ミシェル・オリーズ（バイエルン・ミュンヘン）\n- 信頼度：**★★☆☆☆**\n- ペレス会長が夏の最優先ターゲットとしてオリーズを指名。最初のオファーは約€180m（拒否想定）、最終的に世界移籍金記録を破る額まで提示する計画と報道。\n- バイエルンは「いかなる価格でも売らない」と明言。**レアルも「直接・間接問わず接触なし」と公式声明**を発表済み。\n- 反証：公式声明は否定。ただし交渉前の牽制との見方もある。\n- ソース：ESPN、FOX Sports、SI Sports ── B/A級。公式否定あり\n\n### 2. バルセロナ → フリアン・アルバレス（アトレティコ・マドリード）\n- 信頼度：**★★★☆☆**\n- バルサがクラブ移籍金記録更新となる€171mのオファーを準備中と報道。アルバレスは残留希望を明示しておらず、アトレティコへの去就は不透明。\n- ソース：Sports Illustrated ── B/A級（1件）\n\n### 3. バルセロナ → マーカス・ラッシュフォード（マンチェスター・U）\n- 信頼度：**★★☆☆☆**\n- バルサはウィンドウ終盤まで待機し、マンUへの売却圧力が高まった段階で値引きオファーを仕掛ける戦略と報道。即時成立の可能性は低い。\n- ソース：Football365 ── B級（1件のみ）\n\n---\n\n## 📌 本日のまとめ\n- **最大ニュース**：マンチェスター・シティがエリオット・アンダーソンを**£116m**で獲得。英国人選手史上最高額。\n- **WC2026**：グループステージ終了、ノックアウトステージ開幕。**日本は6月29日にブラジルと対戦**。\n- **移籍市場**：プレミアリーグ中心に動きが活発。レアルのオリーズ争奪戦は現段階では公式否定が優勢。\n\n---\n\nSources:\n- [Every Premier League transfer confirmed in the summer of 2026 - Football365](https://www.football365.com/news/every-premier-league-transfer-confirmed-in-the-summer-of-2026)\n- [Premier League 2026 summer transfers: All confirmed ins, outs for every club - ESPN](https://www.espn.com/soccer/story/_/id/48955344/premier-league-2026-summer-transfers-all-confirmed-ins-outs-every-club)\n- [Transfer news: Summer transfer window 2026 - Sky Sports](https://www.skysports.com/football/news/11095/13546618/transfer-news-summer-transfer-window-2026-premier-league-deals-ins-and-outs)\n- [Elliot Anderson transfer: Man City agree deal to sign Nottingham Forest midfielder - Sky Sports](https://www.skysports.com/football/news/11661/13550595/elliot-anderson-transfer-news-man-city-agree-deal-to-sign-nottingham-forest-midfielder)\n- [Man City Agree to Fourth-Most Expensive Transfer in History - SI](https://www.si.com/soccer/man-city-agree-to-fourth-most-expensive-transfer-in-history-for-england-international)\n- [Why Elliot Anderson is only the 31st most expensive PL transfer - SportBible](https://www.sportbible.com/football/transfer-news/elliot-anderson-man-city-transfer-news-record-fee-938295-20260626)\n- [Fabrizio Romano (@FabrizioRomano) on X](https://x.com/fabrizioromano)\n- [World Cup 2026 bracket and knockout fixtures - Sky Sports](https://www.skysports.com/football/news/11095/13556636/world-cup-2026-bracket-and-knockout-fixtures-whos-facing-who-in-the-last-32-and-route-to-final)\n- [2026 FIFA World Cup knockout stage - Wikipedia](https://en.wikipedia.org/wiki/2026_FIFA_World_Cup_knockout_stage)\n- [2026 World Cup Round of 32: Confirmed schedule - NBC Sports](https://www.nbcsports.com/soccer/news/2026-world-cup-round-of-32-confirmed-schedule-predictions-for-knockout-round)\n- [FIFA World Cup 2026 results June 27 - Olympics.com](https://www.olympics.com/en/news/fifa-world-cup-2026-every-match-result-on-saturday-27-june-live-scores)\n- [Real Madrid: No contact with Bayern and Michael Olise - ESPN](https://www.espn.com/soccer/story/_/id/49126940/real-madrid-no-contact-made-bayern-munich-michael-olise)\n- [Transfer rumors: Real Madrid\u0027s Record Olise Bid - SI](https://www.si.com/soccer/transfer-rumors-real-madrid-record-olise-bid-barcelona-new-rashford-plan)\n- [Real Madrid 2026–27 Transfers: New Signings, Targets, Outgoings - SI](https://www.si.com/soccer/real-madrid-2026-27-transfers-new-signings-targets-outgoings)\n- [2026 FIFA World Cup match schedule - ESPN](https://www.espn.com/soccer/story/_/id/48939282/2026-fifa-world-cup-fixtures-results-match-schedule-group-stage-knockout-rounds-bracket)";
document.getElementById('content').innerHTML = marked.parse(md);
document.querySelectorAll('#content table').forEach(t=>{const w=document.createElement('div');w.className='tbl-wrap';t.parentNode.insertBefore(w,t);w.appendChild(t);});
</script>
