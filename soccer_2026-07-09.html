const md = "# ⚽ サッカー移籍情報 \u0026 ワールドカップ2026 速報\n**2026年7月9日（木）**\n\n---\n\n## ✅ 完了した移籍（7/2〜7/9）\n\n\u003e **[R1確認]** 公式発表または信頼ソース2件以上で確認済み（TODAYより7日以内基準）。ジェレミー・ジャケ（7/1発表）は7日基準超過のため本日から掲載終了。\n\n### 1. アレクサンダー・ニューベル（Alexander Nübel）（GK, 29歳）バイエルン → ベシクタシュ【NEW／7/8発表】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €6.5M＋アドオン最大€5M（報道ベース） |\n| 契約 | 3年（〜2029年） |\n| 発表日 | 2026年7月8日 |\n\n- バイエルン公式が退団を発表。2020年にシャルケから加入も定位置は掴めず、シュツットガルトへのローンが長かった。ノイアーの後継レースから正式に離脱\n- **ソース**：バイエルン公式、Bundesliga.com（S+A級複数）\n\u003e source: [FC Bayern公式](https://fcbayern.com/en/news/2026/07/alexander-nubel-joins-besiktas) / [Bundesliga.com](https://www.bundesliga.com/en/bundesliga/news/alexander-nubel-bayern-munich-transfers-besiktas-germany-38129) (2026-07-08)\n\n### 2. ハリー・ウィルソン（Harry Wilson）（MF, 29歳）フラム → リーズ【NEW／7/8発表】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | フリー（契約満了） |\n| 契約 | 4年 |\n| 発表日 | 2026年7月8日 |\n\n- リーズの今夏1号補強。昨季はフラムで11G8Aを記録しクラブ年間最優秀選手。複数クラブのオファーからリーズを選択、フラム公式も送別コメントを発表\n- **ソース**：リーズ公式、フラム公式、Sky Sports（S+A級複数）\n\u003e source: [Leeds United公式](https://www.leedsunited.com/en/news/harry-wilson-becomes-our-first-summer-signing) / [Sky Sports](https://www.skysports.com/football/news/11095/13557327/leeds-transfer-news-harry-wilson-agreement-reached-as-midfielder-set-to-sign-on-free-transfer-when-fulham-contract-expires) (2026-07-08)\n\n### 3. サンドロ・トナリ（Sandro Tonali）（MF, 26歳）ニューカッスル → トッテナム【継続掲載・7/7発表】\n- £100M（£92.5M＋アドオン£7.5M、トッテナム史上最高額）／6年契約／背番号16。デ・ゼルビ監督の下でのプレーを熱望\n\u003e source: [Tottenham公式](https://www.tottenhamhotspur.com/news/1076467/welcome-sandro-tonali-makes-the-move-to-n17) / [Sky Sports](https://www.skysports.com/football/news/11095/13559730/sandro-tonali-tottenham-sign-italy-midfielder-in-club-record-lb100m-deal-from-newcastle) (2026-07-07)\n\n### 4. ティリク・ジョージ（Tyrique George）（FW, 20歳）チェルシー → エヴァートン【継続掲載・7/6発表】\n- £18M＋アドオン（総額約£24M）／4年契約。1月からのレンタルを買い取りで完全移籍化\n\u003e source: [Chelsea公式](https://www.chelseafc.com/en/news/article/tyrique-george-departs-chelsea-for-everton) / [beIN SPORTS](https://www.beinsports.com/en-asia/football/premier-league/articles/everton-announce-permanent-signing-of-chelsea-forward-george-2026-07-06) (2026-07-06)\n\n### 5. バズマナ・トゥーレ（Bazoumana Touré）（FW, 20歳）ホッフェンハイム → ニューカッスル【継続掲載・7/5発表】\n- €50M（約£43M）／5年契約。コートジボワール代表ウインガー、トナリ売却資金の再投資第1弾\n\u003e source: [Newcastle公式](https://www.newcastleunited.com/en/news/newcastle-united-sign-bazoumana-toure) / [ESPN](https://www.espn.com/soccer/story/_/id/49279207/newcastle-sign-winger-bazoumana-toure-hoffenheim) (2026-07-05)\n\n### 6. デンゼル・ダンフリース（Denzel Dumfries）（DF, 30歳）インテル → レアル・マドリード【継続掲載・7/5発表】\n- €20M（解除金の早期発動）／4年契約\n\u003e source: [Real Madrid公式発表・ESPN確認済み] (2026-07-05)\n\n### 7. エリオット・アンダーソン（Elliot Anderson）（MF, 23歳）ノッティンガム・フォレスト → マンチェスター・シティ【継続掲載・7/4発表】\n- £116M（イングランド人選手史上最高額）。イングランド代表として8強進出中（7/12 ノルウェー戦）、登録手続きは大会後\n\u003e source: [Sky Sports](https://www.skysports.com/football/news/11661/13550595/elliot-anderson-transfer-news-man-city-agree-deal-to-sign-nottingham-forest-midfielder) (2026-07-04)\n\n### 8. マルコ・パレストラ（Marco Palestra）（DF, 21歳）アタランタ → チェルシー【継続掲載・7/3発表】\n- 最大£47M／契約7年。シャビ・アロンソ新体制の初完了案件\n\u003e source: [Chelsea公式・Sky Sports確認済み] (2026-07-03)\n\n### 9. マテウス・フェルナンデス（Matheus Fernandes）（MF, 21歳）ウェストハム → トッテナム【継続掲載・7/3発表】\n- £85M（当時クラブ史上最高額。トナリ加入で更新済み）\n\u003e source: [Tottenham公式・Sky Sports確認済み] (2026-07-03)\n\n### 10. ダラ・ジキエミ（Dara Jikiemi）（DF, 16歳）セルティック → リヴァプール（育成）【継続掲載・7/6書類完了】\n- スコットランドU16主将のCB。5年契約（当面はスカラシップ）。※A級2件目の裏取りは引き続き薄い（Romano報が軸）\n\u003e source: [Fabrizio Romano（\"here we go\"確定発言）] (2026-07-06)\n\n---\n\n## ⚡ Here We Go!\n\n### ジェシー・ダリー（Jesse Derry）（FW, チェルシー）→ スポルティングCP【ローン・NEW】\n- Romanoが「Jesse Derry to Sporting, here we go!」と確定発言。2027年6月までのローン、給与全額負担・買い取りOPなし。チェルシーとは長期契約を更新した上での武者修行\n- **ソース**：Fabrizio Romano（X）、FootballTransfers／Football365が引用確認\n\u003e source: [FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/07/chelsea-secure-wonderkid-transfer-long-term-contract-agreed-jesse-derry-fabrizio-romano) / [Football365](https://www.football365.com/news/chelsea-transfer-romano-here-we-go-derry-sporting-cp-vlahovic) (2026-07-08)\n\n---\n\n## 🔵 交渉中・関心あり\n\n### 1. エデルソン（Éderson）（MF, 26歳）アタランタ → マンチェスター・ユナイテッド【◎ほぼ確実／クラブ間合意・メディカル進行中】\n- 基本£35M＋アドオン£4M、4年＋1年OPでクラブ間合意済み。ブラジル代表のW杯敗退を受け、メディカル後半パートを今週実施見込み。カリック新監督体制の1号補強となる予定。「破談」報道はクラブが公式否定\n\u003e source: [Sky Sports](https://www.skysports.com/football/news/11095/13548678/man-utd-agree-ederson-deal-atalanta-midfielder-set-for-old-trafford-in-lb38m-transfer) / [ESPN](https://www.espn.com/soccer/story/_/id/48953983/man-united-agree-deal-atalanta-ederson-sources) (2026-07-08時点)\n\n### 2. モーガン・ロジャーズ（Morgan Rogers）（MF, 23歳）アストン・ヴィラ → アーセナル【○有力／個人条件ほぼ合意・クラブ間交渉】\n- アーセナルは個人条件で合意間近と報道。ただしクラブ間は乖離が大きい：アーセナルの用意は€85M、ヴィラの要求は英国史上最高となる£130M（€150M）\n\u003e source: [Sky Sports](https://www.skysports.com/football/transfer-paper-talk/12709/13561135/arsenal-transfers-aston-villa-to-demand-british-record-fee-to-allow-morgan-rogers-sale-paper-talk) / [Sky Sports](https://www.skysports.com/football/news/11095/13555268/arsenal-transfer-news-club-stepping-up-interest-in-morgan-rogers-with-several-players-facing-uncertain-futures-at-emirates) (2026-07-08)\n\n### 3. ドゥシャン・ヴラホヴィッチ（Dušan Vlahović）（FW, 26歳）ユヴェントス → チェルシー【△噂レベル／接触】\n- Romanoによればチェルシーが仲介者経由でユーヴェと再交渉。ルカクとのスワップ案も再浮上。今夏契約満了が近く、ニューカッスル・バルセロナ・バイエルンも接触との報道\n- ※一次ソース（Romano本人投稿）の直接確認は取れておらず転載ベースのため△\n\u003e source: [Fabrizio Romano報（転載確認）] (2026-07上旬)\n\n---\n\n## 🇯🇵 日本人選手の動向\n\n### 1. 佐野海舟（Kaishu Sano）（MF, マインツ）— リヴァプール獲得レース最有力と報道【○有力】\n- W杯ブラジル戦の先制ゴール（カゼミーロを剥がしての持ち上がり→冷静なフィニッシュ）で市場評価が急騰。リヴァプールは代理人へ契約条件の一部を提示済みと英報道、アーセナル・マンU・ニューカッスル・ドルトムントも関心\n- 独Bildによればマインツの要求額は€60M超（約100億円）、契約は2028年夏まで\n\u003e source: [Football Tribe（Bild・Sports Witness引用）](https://football-tribe.com/japan/2026/07/07/356628/) / [Qoly](https://qoly.jp/q1/17849967) (2026-07-07)\n\n### 2. 久保建英（Takefusa Kubo）（MF, レアル・ソシエダ）— リヴァプール移籍が急浮上【△噂レベル】\n- 英報道でリヴァプールが契約条件を問い合わせたと伝えられ、ソシエダ会長も「何が起きてもおかしくない」と含みを持たせるコメント。W杯で左膝を負傷したが回復は順調でプレシーズンへの影響はない見通し\n\u003e source: [Goal.com](https://www.goal.com/en-us/lists/takefusa-kubo-liverpool-transfer-talk-real-sociedad-president/bltd652865cf3969022) / [東スポWEB](https://www.tokyo-sports.co.jp/articles/-/394603) (2026-07-04)\n\n---\n\n## 🏆 ワールドカップ2026\n\n1. **準々決勝が今夜（日本時間明朝）開幕**。ベスト8はフランス・モロッコ・スペイン・ベルギー・ノルウェー・イングランド・アルゼンチン・スイス。詳細日程は下のスケジュール欄\n\u003e source: [Al Jazeera](https://www.aljazeera.com/sports/2026/7/6/which-teams-are-in-the-world-cup-quarterfinals-and-whats-the-schedule) (2026-07-06)\n2. **ノルウェーが史上初のベスト8**。R16でブラジルを2-1で撃破（ハーランド2発）\n\u003e source: [スポーツナビ／olympics.com確認済み] (2026-07-05)\n3. **メッシ（Lionel Messi）が得点ランク単独トップ（8点）**。エジプト戦で1G1Aの大逆転劇を演出\n\u003e source: [FIFA公式](https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026/articles/adidas-golden-boot-race-top-scorer) / [ESPN](https://www.espn.com/soccer/story/_/id/49303740/world-cup-2026-today-blog-08-06-2026-live-updates-news-fixtures-schedule-results-argentina-narrowly-advance-world-cup-quarter-finals-thriller-egypt-3-2-switzerland-beat-colombia-penalties) (2026-07-08)\n4. **日本代表は6/29のR32ブラジル戦（1-2）で敗退済み**（詳細は日本代表詳報欄）\n\u003e source: [ESPN](https://www.espn.com/soccer/story/_/id/49216717/brazil-avoid-world-cup-shock-late-win-vs-japan-reach-round-16) (2026-06-29)\n\n---\n\n## ⚽ 今週の試合・活躍情報\n\n1. **メッシ（アルゼンチン）**：エジプト戦、2点ビハインドの79分からロメロの同点弾をアシスト→自ら同点…ではなく追撃弾→90+2分エンソ・フェルナンデスの決勝ヘッドにつながる怒涛の逆転劇の中心。3-2で8強へ\n2. **ハーランド（Erling Haaland）（ノルウェー）**：ブラジル戦2ゴール。79分シェルデルップのクロスに頭で先制、90分に2点目。母国を史上初の8強に導いた\n3. **エンソ・フェルナンデス（Enzo Fernández）（アルゼンチン）**：90+2分、ラウタロの正確なクロスをファーで叩き込む決勝ヘッド\n4. **ケイン（Harry Kane）（イングランド）**：メキシコ戦3-2、60分のPKで大会6点目。10人になった終盤は5バックで逃げ切り\n5. **アンダーソン（Elliot Anderson）（シティ新加入）**：イングランド代表の中盤で8強進出に貢献中。移籍発表直後の大舞台が続く\n\u003e source: [ESPN 7/8ライブブログ](https://www.espn.com/soccer/story/_/id/49303740/world-cup-2026-today-blog-08-06-2026-live-updates-news-fixtures-schedule-results-argentina-narrowly-advance-world-cup-quarter-finals-thriller-egypt-3-2-switzerland-beat-colombia-penalties) / [スポーツナビ](https://soccer.yahoo.co.jp/wcup/category/2026/schedule) (2026-07-08)\n\n---\n\n## 📰 The Athletic ピックアップ\n\n※本日該当する情報はありません（直近3日以内の記事を検索で特定できず。ペイウォール外からの確認が取れた記事のみ掲載する方針のため、確認でき次第の掲載とする）\n\n---\n\n## 🌍 昨日の試合結果\n\n**※昨日JST帯（7/8 17:00〜7/9 02:00）の試合はなし**（現地7/8（水）は休養日）\n\n参考【再掲】直近の完了試合＝R16最終戦（日本時間7/8午前終了）：\n\n| 試合 | スコア | 備考 |\n|------|--------|------|\n| アルゼンチン vs エジプト | **3-2** | 2点差を79分から逆転。ロメロ（メッシA）、メッシ、エンソ・フェルナンデス（90+2分） |\n| スイス vs コロンビア | **0-0（PKでスイス勝利）** | 延長でも無得点、PK戦を制してスイスが8強へ |\n\n\u003e source: [ESPN](https://www.espn.com/soccer/story/_/id/49303740/world-cup-2026-today-blog-08-06-2026-live-updates-news-fixtures-schedule-results-argentina-narrowly-advance-world-cup-quarter-finals-thriller-egypt-3-2-switzerland-beat-colombia-penalties) (2026-07-08)\n\n---\n\n## 📅 今日・明日の試合スケジュール\n\n**今日 7/9（木）JST：試合なし**（準々決勝は日本時間明朝から）\n\n**明日 7/10（金）JST：**\n\n| キックオフ（JST） | カード | 会場 |\n|------|--------|------|\n| 7/10 (金) 5:00 JST（9日 16:00 ET） | 準々決勝① フランス vs モロッコ | ジレット・スタジアム（ボストン） |\n\n**以降の準々決勝（参考）：**\n\n| キックオフ（JST） | カード | 会場 |\n|------|--------|------|\n| 7/11 (土) 4:00 JST（10日 15:00 ET） | 準々決勝② スペイン vs ベルギー | SoFiスタジアム（ロサンゼルス） |\n| 7/12 (日) 6:00 JST（11日 17:00 ET） | 準々決勝③ ノルウェー vs イングランド | ハードロック・スタジアム（マイアミ） |\n| 7/12 (日) 10:00 JST（11日 21:00 ET） | 準々決勝④ アルゼンチン vs スイス | アローヘッド・スタジアム（カンザスシティ） |\n\n- 注目①：フランス×モロッコは2022年準決勝の再戦。エムバペ（7点）×アシュラフの同僚対決\n- 注目②：ノルウェー×イングランドはハーランド（7点）×ケイン（6点）の得点王争い直接対決\n\u003e source: [Al Jazeera](https://www.aljazeera.com/sports/2026/7/6/which-teams-are-in-the-world-cup-quarterfinals-and-whats-the-schedule) / [olympics.com](https://www.olympics.com/en/news/fifa-world-cup-2026-bracket-quarter-finals-full-schedule-live-updates) (2026-07-06)\n\n---\n\n## 📊 グループ順位表\n\n※グループステージは全日程終了（順位確定済み・変動なし）。大会は決勝トーナメント（準々決勝）に移行済みのため、本欄の更新はありません。\n\n**現在の勝ち残り（ベスト8）**：フランス／モロッコ／スペイン／ベルギー／ノルウェー／イングランド／アルゼンチン／スイス\n\u003e source: [Al Jazeera](https://www.aljazeera.com/sports/2026/7/6/which-teams-are-in-the-world-cup-quarterfinals-and-whats-the-schedule) (2026-07-06)\n\n---\n\n## 📋 日本代表詳報\n\n**※日本は敗退済み**（6/29・R32 ブラジル戦 1-2）\n\n- 前半に佐野海舟のインターセプトからの独走ゴールで先制。カゼミーロのヘッドで追いつかれ、90+6分にマルティネッリに決勝点を許す痛恨の幕切れ。ノックアウト初戦の壁は5大会連続で越えられず\n- **大会後の動き**：佐野・久保の市場評価が急騰し争奪戦に発展（詳細は「日本人選手の動向」欄）。JFAからの新体制・総括発表は本日時点で確認できず\n\u003e source: [ESPN](https://www.espn.com/soccer/story/_/id/49216717/brazil-avoid-world-cup-shock-late-win-vs-japan-reach-round-16) / [FIFA公式](https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026/articles/brazil-japan-review-highlights) (2026-06-29)\n\n---\n\n## 🌟 大会ハイライト\n\n**得点ランキング（7/9時点）：**\n\n| 順位 | 選手 | 得点 |\n|------|------|------|\n| 1 | メッシ（Lionel Messi）🇦🇷 | 8 |\n| 2 | エムバペ（Kylian Mbappé）🇫🇷 | 7 |\n| 2 | ハーランド（Erling Haaland）🇳🇴 | 7 |\n| 4 | ケイン（Harry Kane）🏴󠁧󠁢󠁥󠁮󠁧󠁿 | 6 |\n| 5 | オヤルサバル（Mikel Oyarzabal）🇪🇸 | 4 |\n| 5 | デンベレ（Ousmane Dembélé）🇫🇷 | 4 |\n\n- アシストはエムバペが2で先行（メッシ・ハーランドは0）。得点同数時のタイブレークに影響する構図\n- 注目トピック：①ノルウェーが史上初のベスト8（ハーランドがブラジル撃破の立役者）②アルゼンチンは連覇へ残り3勝、メッシは崖っぷちからの逆転劇で健在ぶりを証明 ③準々決勝は4試合すべて米国開催\n\u003e source: [FIFA公式](https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026/articles/adidas-golden-boot-race-top-scorer) / [Goal.com](https://www.goal.com/en/lists/world-cup-2026-golden-boot-standings-fifa-award/blt29fdba0896b8fd09) (2026-07-08)";
