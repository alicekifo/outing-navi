<script>
const md = "# マンチェスター・ユナイテッド情報週報\n**発行日：2026年6月26日（木）**\n\n---\n\n## 1. クラブ動向\n\n### 監督・体制\nマイケル・カリック前暫定監督が**2028年までの正式契約**でヘッドコーチに就任済み。1月のルーベン・アモリム解任後、カリックはチームを立て直し、**チャンピオンズリーグ出場権の獲得**という成果を残して正式登用された。\n\n---\n\n## 2. 移籍情報（夏のウィンドウ：6月15日開幕）\n\n\u003e ※ R1準拠：14日以内（6月12日以降）の報道のみ掲載。昨夏のセスコ・ムベウモ・クーニャ・ラメンスの加入は既報につき省略。\n\n### ✅ 確定\n| 選手 | 移籍元 | 方向 | 概算費用 |\n|------|--------|------|----------|\n| エデルソン | アタランタ | IN | €45m（固定€40.5m+ボーナス€4.5m） |\n\n### 🔄 交渉中・ターゲット\n| 選手 | 現所属 | 状況 |\n|------|--------|------|\n| マテウス・フェルナンデス | ウェストハム | トッテナムと争奪戦。ユナイテッドは£60m超を提示する可能性 |\n| アレックス・スコット（22歳） | ボーンマス | アーセナルとも競合。ボーンマスは売却に消極的 |\n| カール・ダーロウ or サム・ジョンソン | リーズ / ウォルブス | 第2GK候補として調査中 |\n\n### ❌ 退団見込み\n- **カゼミーロ**：契約満了で退団予定\n- **マヌエル・ウガルテ**：カリック体制下での未来は不透明と報道\n- **ブルーノ・フェルナンデス**：残留の方向（*Sky Sports、6月報道*）\n\n### 補強プランの全体像\nカリックはCL復帰を見据え**最大5名獲得**を視野に入れており、ストライカー・左ウィング・CB・左SBの各ポジションが優先課題とされている。\n\n---\n\n## 3. ワールドカップ2026 ― レッズの選手たち\n\n\u003e ※ 試合結果は TODAY（6月26日）から7日以内（6月19日以降）のものを中心に掲載。\n\n### 🏴󠁧󠁢󠁥󠁮󠁧󠁿 イングランド\n| 日付 | 対戦 | 結果 | 主なMU選手 |\n|------|------|------|------------|\n| 6/17 | vs クロアチア | 勝利（ベリンガム弾） | コビー・マイノー：出場なし |\n| 6/23 | vs ガーナ | 0-0 | マイノー：ベンチ（デクラン・ライス負傷離脱の懸念） |\n| **6/27** | vs パナマ | **予定** | マイノー：**初スタメン有力**（ライスの状態次第） |\n\n### 🇵🇹 ポルトガル\n| 日付 | 対戦 | 結果 | 主なMU選手 |\n|------|------|------|------------|\n| 6/17 | vs コンゴDR | 引き分け | ブルーノ・フェルナンデス：フル出場（ゴール・アシストなし） |\n| 6/23 | vs ウズベキスタン | 勝利 | フェルナンデス：**初アシスト記録** |\n| **次戦** | vs コロンビア | **グループ最終戦（予定）** | キャプテンとして出場見込み |\n\n*フェルナンデスは今季PLで**自己最多21アシスト**を記録してW杯入り*\n\n### 🇦🇷 アルゴンチン\n- **リサンドロ・マルティネス**：靭帯損傷からの復活でメンバー入り。ロメロとのCBコンビで守備の要を担う。グループ内の試合は順調に消化中（vs アルジェリア 6/16、vs オーストリア 6/22）。**6/27 vs ヨルダン（グループ最終戦）**\n\n### 🇺🇾 ウルグアイ\n- **マヌエル・ウガルテ**：**本日（6/26）スペイン戦に出場中**\n\n### 🇲🇦 モロッコ\n- **ヌサイル・マズラウイ**：グループ戦進行中（6/13のブラジル戦に出場）\n\n### 🇧🇷 ブラジル\n- **カゼミーロ**、**マテウス・クーニャ**：グループ戦出場済み\n\n---\n\n## 4. プレシーズン日程\n\n| 日付 | 対戦相手 | 会場 | KO（BST） |\n|------|----------|------|-----------|\n| 7/18（土） | レクサム | ヘルシンキ（フィンランド） | 16:00 |\n| 7/24（金） | ローゼンボルグ | トロンハイム（ノルウェー） | 17:00 |\n| 8/1（土） | アトレティコ・マドリード | ストックホルム（Snapdragon Cup） | 14:00 |\n| 8/8（土） | パリ・サンジェルマン | ヨーテボリ（Snapdragon Cup） | 16:00 |\n| 8/12（水） | リーズ・ユナイテッド | ダブリン（Snapdragon Cup） | 19:30 |\n\n**プレミアリーグ2026-27開幕：8月22日（土）予定**\n\n---\n\n## 5. 今週のポイントまとめ\n\n1. **エデルソン（€45m）が夏の初補強**として確定。\n2. **マテウス・フェルナンデス争奪戦**が今夏の目玉になりつつある。\n3. **コビー・マイノーがイングランドで初スタメン有力**（6/27 vs パナマ）。ライスの負傷が背景。\n4. **ブルーノはW杯で貢献中・残留方向**。カゼミーロは契約満了で退団へ。\n5. プレシーズンはフル欧州ツアー。CL復帰を見据えた強度の高い相手（アトレティコ、PSG）との強化試合あり。\n\n---\n\nSources:\n- [Man Utd transfer news – Sky Sports](https://www.skysports.com/football/live-blog/11667/13025492/man-utd-transfer-news-rumours-and-gossip-live-updates-and-latest-on-deals-signings-loans-and-contracts)\n- [Summer transfer window officially opens – manutd.com](https://www.manutd.com/en/news/summer-transfer-window-for-2026-official-opens)\n- [Mateus Fernandes \u0026 Alex Scott transfer battle – Sky Sports](https://www.skysports.com/football/news/11095/13557379/transfer-news-man-utd-and-tottenham-battling-for-west-hams-mateus-fernandes-and-arsenal-target-alex-scott)\n- [Bruno Fernandes set to stay – Sky Sports](https://www.skysports.com/football/news/11095/13557502/man-utd-transfer-news-bruno-fernandes-set-to-stay-with-goalkeeper-targets-revealed-paper-talk)\n- [Michael Carrick confirmed as head coach – manutd.com](https://www.manutd.com/en/news/michael-carrick-continues-as-man-united-head-coach-2026)\n- [Carrick transfer verdict – SI.com](https://www.si.com/soccer/michael-carrick-strong-transfer-verdict-earning-permanent-man-utd-job)\n- [Ederson signing \u0026 transfer targets – InfoSport](https://infosport.co/manchester-united-transfers-summer-2026-carrick/)\n- [United at the World Cup – manutd.com](https://www.manutd.com/en/news/united-at-the-2026-world-cup-when-are-the-group-games)\n- [Kobbie Mainoo in line for first WC start – Yahoo Sports](https://ca.sports.yahoo.com/news/kobbie-mainoo-line-first-england-224000729.html)\n- [Bruno Fernandes first assist at World Cup](https://cryptobriefing.com/bruno-fernandes-first-assist-2026-world-cup/)\n- [Lisandro Martinez named in Argentina squad](https://cryptobriefing.com/lisandro-martinez-argentina-world-cup-2026/)\n- [Pre-season fixture list – manutd.com](https://www.manutd.com/en/news/game-by-game-united-pre-season-fixture-list-2026)\n- [Pre-season details – 101greatgoals.com](https://www.101greatgoals.com/football/premier-league/manchester-united-pre-season-tour-2026-fixtures-leeds-psg-atletico-madrid-wrexham/)";
