const md = "# ⚽ サッカー移籍情報 \u0026 ワールドカップ2026 速報\n**2026年6月23日（火）**\n\n---\n\n## ✅ 完了した移籍（6/17〜6/23）\n\n\u003e **[R1確認]** 移籍窓口6/15開幕。公式発表または信頼ソース2件以上確認済みのもののみ掲載（本日より7日以内基準で6/15付記事は除外）。\n\n### 1. [[ヴァレンティン・バルコ]]（MF/LB, 21歳）ストラスブール → [[チェルシー]]【6/22・継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | BlueCo グループ内移籍（詳細非公開） |\n| 契約 | 4年（〜2030年） |\n| 発表日 | 2026年6月22日（Chelsea公式・Romano確認） |\n\n- **ソース**：Fabrizio Romano（S級）、beIN Sports（A+B級）\n\n### 2. [[エデルソン]]（CM, 26歳）アタランタ → [[マンチェスター・ユナイテッド]]【6/21・NEW格上げ】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £3,500万＋アドオン最大£400万（最大£3,900万） |\n| 契約 | 4年＋オプション1年（〜2031年） |\n| 発表日 | 2026年6月21日（Sky Sports・ESPN・Romano確認） |\n\n- Romano「100%確認済み」。エデルソン本人も「署名のみが残る段階」とコメント。ブラジル代表W杯参加中のため大会後に正式発表、7月1日に国際登録処理予定\n- カリック新体制下ユナイテッド今夏第1号\n- **ソース**：Fabrizio Romano（S級）、Sky Sports、ESPN（A+S級複数）\n\n### 3. [[ジャン=ポール・ファン・ヘッケ]]（CB, 26歳）[[ブライトン]] → [[トッテナム・ホットスパー]]【6/18・継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £5,200万 |\n| 発表日 | 2026年6月18日 |\n\n- **ソース**：Tottenham公式、Goal.com、ESPN（S+A級複数）\n\n### 4. [[ヴィクトル・ムニョス]]（W, 22歳）オサスナ → [[リバプール]]【6/18・継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £3,450万（リリース条項発動） |\n| 契約 | 6年 |\n\n- **ソース**：Liverpool公式、Sky Sports、ESPN（S+A級複数）\n\n### 5. [[イブラヒマ・コナテ]]（CB, 27歳）[[リバプール]]（フリー）→ [[レアル・マドリード]]【6/18・継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | フリートランスファー（6/30契約満了） |\n| 契約 | 4年（〜2030年） |\n\n- **ソース**：Real Madrid公式、Sky Sports（S+A級複数）\n\n### 6. [[ベルナルド・シウバ]]（MF, 32歳）[[マンチェスター・シティ]]（フリー）→ [[レアル・マドリード]]【6/17・継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | フリートランスファー（6/30契約満了） |\n| 契約 | 2年＋オプション1年 |\n\n- **ソース**：Real Madrid公式、Sky Sports、ESPN（S+A級複数）\n\n---\n\n## 🔴 Here We Go!（合意ほぼ確実）\n\n### 1. [[ピエロ・インカピエ]]（CB/LB, 23歳）[[バイヤー・レバークーゼン]] → [[アーセナル]]【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €5,200万 |\n| 契約 | 5年 |\n| ステータス | 個人・クラブ間合意済、正式発表待ち |\n\n- Romano「契約署名済み、FFP都合でシーズン終了後に正式発表予定」。エクアドル代表としてW杯参加中\n- **ソース**：Fabrizio Romano、FootballTransfers（S+A級複数）\n\n### 2. デンゼル・ダンフリース（RB, 30歳）インテル → [[レアル・マドリード]]【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €2,000万（リリース条項発動） |\n| 契約 | 〜2030年 |\n| ステータス | メディカル完了・オランダ代表W杯参加中 |\n\n- Romano「HERE WE GO！」確認済、W杯終了後に公式発表予定\n- **ソース**：Fabrizio Romano、Goal.com（S+A級複数）\n\n### 3. ジェレミー・モンガ（W, 16歳）[[レスター・シティ]] → [[アーセナル]]【継続掲載】\n- **移籍金**：約€1,500万　｜　**ステータス**：個人合意済、クラブ間交渉最終段階\n- **ソース**：Fabrizio Romano、Goal.com UK（S+A級複数）\n\n---\n\n## 🟡 交渉中・動向注目\n\n### 1. ブラッドリー・バルコラ（W, 23歳）PSG → [[アーセナル]]最優先 [信頼度: ★★]【継続掲載】\n- アーセナルが€8,000万の入札を計画中。PSGは€9,000万超を要求。バルコラ本人はPSGへ退団申請済みで移籍意向明確。アルテタが内部で「最優先ターゲット」と言明し、BertaがエージェントのSissoko氏と継続接触中\n- W杯後に本格交渉見込み\n- **ソース**：ESPN（A級）、football365（A級）、FootballTransfers（A級）\n\n### 2. [[ドゥシャン・ヴラホヴィッチ]]（CF, 26歳）ユヴェントス（6/30フリー）→ バルセロナ検討中 [信頼度: ★★]【継続掲載】\n- ユヴェントスとの延長交渉は継続も合意未達。バルセロナは「主要ターゲットではない」との報道が浮上し不透明感あり。6/30に確定的にフリーエージェントとなり、その後の帰趨が注目\n- **ソース**：ESPN、Barca Blaugranes（A+B級複数）\n\n### 3. [[ロベルト・レヴァンドフスキ]]（CF, 37歳）バルセロナ（6/30フリー）→ シカゴ・ファイア(MLS) [信頼度: ★★]【継続掲載】\n- シカゴが年俸$1,500〜2,000万を提示継続。W杯終了後に最終決断見込み\n- **ソース**：beIN Sports、NBC Chicago（A+B級）\n\n### 4. モーガン・ロジャース（MF, 23歳）アストン・ヴィラ → [[アーセナル]] [信頼度: ★★★]【継続掲載・更新】\n- Romano「アーセナルがロジャース獲得に向けて前進中。アルテタが内部で『理想の補強』と言明。選手側も移籍を希望」と直近で確認。ヴィラは£8,000万〜£1億のバリュエーション。2031年まで長期契約ありヴィラ側は焦らず交渉へ\n- **ソース**：Fabrizio Romano（S級）、football365（A級）\n\n### 5. [[エリオット・アンダーソン]]（MF, 22歳）ノッティンガム・フォレスト → [[マンチェスター・シティ]] [信頼度: ★★]【継続掲載】\n- シティが提示した£1億600万オファーをフォレストが拒否。3回目のオファー準備中。成立すれば英国人選手移籍金記録更新\n- **ソース**：Sky Sports、ESPN（A級複数）\n\n### 6. アンドリュー・ロバートソン（LB, 32歳）[[リバプール]] → [[トッテナム・ホットスパー]] [信頼度: ★★★]【継続掲載】\n- 6/30[[リバプール]]契約満了、フリーでスパーズ移行合意。スコットランド代表としてW杯参加中\n- **ソース**：Sky Sports（A級）\n\n### 7. [[マルコス・セネシ]]（CB, 29歳）ボーンマス → [[トッテナム・ホットスパー]] [信頼度: ★★★]【継続掲載】\n- 6/30ボーンマス契約満了、フリーでスパーズ移行合意\n- **ソース**：Sky Sports（A級）\n\n### 8. ルーカス・ベルグヴァル（MF, 21歳）[[トッテナム・ホットスパー]]（退団申請）→ 複数クラブ関心 [信頼度: ★★★]【NEW】\n- 6/21、Romano・Ornstein（The Athletic）経由で退団申請を確認。De Zerbi体制下での出場機会不満が理由。バイヤーン・ミュンヘン、アストン・ヴィラ、ボルシア・ドルトムント、チェルシー等7クラブが関心を示す。トッテナムの評価額は£5,700万超\n- **ソース**：Fabrizio Romano（S級）、The Athletic / David Ornstein（A級）、football365（A級）\n\n---\n\n## 🌍 ワールドカップ2026 速報\n\n\u003e *
