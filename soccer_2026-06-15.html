const md = "# ⚽ サッカー移籍情報 \u0026 ワールドカップ2026 速報\n**2026年6月15日（月）**\n\n---\n\n## ✅ 完了した移籍（6/8〜6/15）\n\n\u003e **[R1確認]** 窓口は本日6/15に開幕。窓口開幕前の約定済み案件は今後正式完了予定のものが多い。7日以内に発表・完了が確認できたのは以下のみ。\n\n### 1. イウェン・ジャウエン（GK, 20歳） ランス(2部) → ニューカッスル・ユナイテッド\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £2,460万（€2,850万）＋ボーナス最大£300万 |\n| 契約 | 4年 |\n| 発表日 | 2026年6月10日 |\n\n- 身長2m、昨季リーグ・ドゥ（仏2部）でリーグ最多タイの15クリーンシート\n- フランスU-21代表歴あり。足元の技術が高くビルドアップ型GK\n- **ソース**：Washington Post (AP電), Yahoo Sports, Fox Sports, L\u0027Équipe（複数A級以上）\n\n\u003e **※本日（6/15）以降に正式発表が続く見込み。アンソニー・ゴードン（バルセロナ、5/30）、アンディ・ロバートソン（トッテナム、6/5）は7日超のため掲載対象外。**\n\n---\n\n## 🔴 Here We Go!（合意ほぼ確実・6/1〜6/15）\n\n### 1. マルク・ククレジャ（LB, 26歳） チェルシー → レアル・マドリード\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | 約€5,500〜6,000万 |\n| 契約 | 未発表（WC後に正式署名予定） |\n| ステータス | クラブ間合意＋個人合意済 |\n\n- Fabrizio Romanoが「合意確定」と報告。複数A級ソースが追確認\n- ククレジャはスペイン代表としてW杯参加中のため、大会終了後に公式発表予定\n- **新監督モウリーニョの左SB強化プランに合致**\n- **ソース**：Fabrizio Romano（X）、Sky Sports、ESPN、Managing Madrid（S+A級3件以上）\n\n### 2. ベルナルド・シウバ（MF, 32歳） マンチェスター・シティ（フリー）→ レアル・マドリード\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | フリートランスファー |\n| 契約 | 2年＋1年オプション |\n| ステータス | 個人合意・クラブ合意済 |\n\n- 6月30日でシティとの9年間の契約が満了（6タイトル等を獲得）\n- ポルトガル代表としてW杯参加中のため、大会終了後に公式発表予定\n- モウリーニョが最優先ターゲットとして交渉を主導\n- **ソース**：Fabrizio Romano（確認済）、Goal.com、OneFootball（S+A級複数）\n\n---\n\n## 🟡 交渉中・動向注目（6/1〜6/15）\n\n### 1. ドゥシャン・ヴラホヴィッチ（CF, 26歳） ユヴェントス → フリーエージェント [信頼度: ★★★（退団は公式確認）、行き先は★☆]\n- **退団確定**：クラブ側（CEO・コモッリ）が6月3日に公式に認めた。要求€800万/年 vs 提示€600万/年で決裂\n- **候補先報道**：バルセロナ（本人第1希望と複数媒体）、チェルシー、バイエルン、アトレティコ・マドリード\n- 行き先はまだ確定しておらず、報道は流動的。複数クラブがエージェントに接触中\n- **ソース**：beIN Sports（退団確認）、Goal.com（行き先候補）\n\n---\n\n## 🌍 ワールドカップ2026 本大会速報\n\n\u003e **大会概要**：開催国：米国・カナダ・メキシコ｜48カ国・12グループ｜期間：6月11日〜7月19日｜グループ上位2位＋各グループ3位上位8チームが決勝T進出\n\n---\n\n### 📅 6月15日（月）の試合\n\n| グループ | 対戦カード | スコア | 状況 |\n|----------|-----------|--------|------|\n| グループF | **スウェーデン 5-1 チュニジア** | 終了 | |\n| グループH | スペイン vs カーボベルデ | — | 進行中/予定 |\n| グループG | ベルギー vs エジプト | — | 予定 |\n\n---\n\n### 📅 6月14日（日）の全結果\n\n| グループ | 対戦カード | スコア | 注目点 |\n|----------|-----------|--------|--------|\n| グループE | **ドイツ 7-1 キュラソー** | 終了 | フェリックス・ンメチャが6分先制（大会最速ゴール記録） |\n| グループF | **オランダ 2-2 日本** | 終了 | 鎌田大地が88分に劇的同点弾 |\n| グループE | **コートジボワール 1-0 エクアドル** | 終了 | アマド・ディアロが90分に決勝点 |\n| グループC | **スコットランド 1-0 ハイチ** | 終了 | |\n| グループD | **オーストラリア 2-0 トルコ** | 終了 | |\n\n---\n\n### 🔑 グループ別ここまでのポイント\n\n**グループE**（ドイツ、コートジボワール、キュラソー、エクアドル）\n- ドイツとコートジボワールが初戦白星。2強対決（6/20）が事実上の首位決定戦\n\n**グループF**（オランダ、日本、スウェーデン、チュニジア）\n- スウェーデンが5得点で首位発進。日本・オランダはドローで勝点1ずつ。チュニジアは苦境\n\n**グループD**（オーストラリア、トルコ、他）\n- オーストラリアが初戦完勝でグループD首位\n\n---\n\n### 💡 今日の注目試合\n- **スペイン vs カーボベルデ**（グループH）：ククレジャ・ペドリらWC後の移籍先確定選手が多数出場予定\n- **ベルギー vs エジプト**（グループG）：デ・ブライネ（35歳）最後のW杯か\n\n---\n\nSources:\n- [Fabrizio Romano - Jeremy Jacquet to Liverpool](https://x.com/FabrizioRomano/status/2018086135046492531)\n- [Marc Cucurella to Real Madrid - Sky Sports](https://www.skysports.com/football/news/11095/13554070/marc-cucurella-transfer-news-real-madrid-reach-agreement-to-sign-chelsea-full-back)\n- [Bernardo Silva agrees Real Madrid transfer - Goal.com](https://www.goal.com/en/lists/bernardo-silva-real-madrid-transfer-jose-mourinho-first-signing/blt78e4920697cd3b28)\n- [Newcastle signs Ewen Jaouen - Washington Post](https://www.washingtonpost.com/sports/soccer/2026/06/10/newcastle-goalkeeper-jaouen-reims/596292ea-64c4-11f1-bdd4-805ebb99a693_story.html)\n- [Vlahovic leaving Juventus on free transfer - beIN Sports](https://www.beinsports.com/en-us/soccer/serie-a/articles/vlahovic-to-leave-juventus-on-a-free-transfer-confirms-chiellini-2026-06-03)\n- [World Cup 2026 results June 15 - SBS News](https://www.sbs.com.au/news/article/fifa-world-cup-2026-results-june-15/ocls1mcso)\n- [World Cup 2026 June 14 results - Olympics.com](https://www.olympics.com/en/news/fifa-world-cup-2026-every-match-result-sunday-14-june-live-scores)\n- [World Cup 2026 group stage standings - NBC Sports](https://www.nbcsports.com/soccer/news/2026-world-cup-group-stage-table-full-standings-for-all-12-groups)";
document.getElementById('content').innerHTML = marked.parse(md);
document.querySelectorAll('#content table').forEach(t=>{const w=document.createElement('div');w.className='tbl-wrap';t.parentNode.insertBefore(w,t);w.appendChild(t);});
</script>
