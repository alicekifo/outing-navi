<script>
const md = "# ライフスタイル週報（2026-07-19）\n\n## 🍷 ワイン\n\n### 今週のワインニュース：コート・ドール県を記録的な雹嵐が直撃\n2026年7月17日、Wine Reportがブルゴーニュのコート・ドール県およびアルデシュ県が記録的な雹嵐に見舞われたと報道。ヴェレゾン（色づき）を目前にした時期の雹害で、2026ヴィンテージの収量への影響が懸念される。前日16日には、ロワールの世界遺産シャトー・ド・シャンボールがブドウ畑に防雹ネットを設置したという記事（[archive/5680](https://winereport.jp/archive/5680/)・2026-07-16公開）も出ており、フランス各産地で雹対策が今年の共通課題になりつつある。なお同誌は7月18日、ムルソーの名手ミシェル・ブズロー氏の訃報（[archive/5683](https://winereport.jp/archive/5683/)・2026-07-18公開）も伝えている。\n\u003e source: https://winereport.jp/archive/5681/ （Wine Report・2026-07-17公開）\n\n### おすすめワイン：ソアリェイロ アルヴァリーニョ 2024\n- **銘柄**：ソアリェイロ（Soalheiro）「アルヴァリーニョ」2024\n- **産地**：ポルトガル / ミーニョ地方 / DOCヴィーニョ・ヴェルデ\n- **品種**：アルヴァリーニョ100% / Alc.12.5%\n- **醸造特徴**：畑の大部分で有機農法。ヴィーニョ・ヴェルデのアルヴァリーニョ専門家的存在で、近代化された設備によるクリーンな造り\n- **味わい**：柑橘のアロマに凝縮感のあるトロピカルな風味、豊かなミネラル感。エレガントかつ濃密なバランスで、冷やして魚介と合わせる夏の白のど真ん中\n- **実売価格**：税込3,190円（THE CELLAR / カーヴ・ド・リラックス、7/19時点で在庫あり）\n- **購入リンク**：https://www.cavederelax.com/products/5602640000645 （はせがわ酒店オンラインでも取扱あり）\n- **インポーター**：木下インターナショナル（画像はリンク切れリスクのため省略）\n\u003e source: https://www.cavederelax.com/products/5602640000645\n\n### イベント・フェア（関東）：CAMOS TOKYO ワイン会\n- **7/23（木）19:30〜21:30** 笹塚 キャンティ・クアトロ：シャブリ グラン・クリュ「ブランショ」2018ほかプレミアム白ワイン会\n- **7/25（土）19:00〜21:00** 四谷三丁目 トラットリア・エンゾーン：フランス vs カリフォルニア飲み比べ（20〜30代向け）\n- **8/1（土）19:00〜21:00** 赤坂 VICINO：10周年記念プレミアムワイン＆日本酒スペシャル\n\nいずれも募集中。参加費は各イベントページで要確認。\n\u003e source: https://camos.tokyo/ （2026-07-19時点の募集情報）\n\n## 🍶 日本酒\n\n### 季節酒情報：2026年「THE 夏酒」全国約60銘柄が展開中\n和酒専門商社オオタ・アンド・カンパニーの2026年度「THE 夏酒」企画に、北海道・東北の三千櫻・春霞・栄光冨士・刈穂、関東の来福・水芭蕉・寒菊・甲子、七賢・笹一など全国約60銘柄が参加。発売日は銘柄ごとに異なるが、7月中旬は夏酒の流通ピークで、無濾過生や低アルコール設計の銘柄が専門酒販店の冷蔵庫に出揃っている時期。\n\u003e source: https://sake-ota.com/news/2026_natsuzake/ （オオタ・アンド・カンパニー・2026年度企画ページ）\n\n### 話題の銘柄：寒菊 OCEAN99 青海 -Summer Sea- 純米吟醸 無濾過生原酒\n- **蔵元**：寒菊銘醸（千葉県山武市）\n- **スペック**：純米吟醸 / 酒米 出羽燦々100% / 精米歩合55% / Alc.14%（原酒のまま低アルコール設計）/ 無濾過生\n- **味わい**：パイナップルやラムネを思わせる香りにガス感の残るジューシーな甘み、軽快な酸で切れる。九十九里の夏の海をイメージしたシリーズで、キンキンに冷やしてワイングラスで映えるタイプ\n- **実売価格**：720ml 税込1,650円（矢島酒店）。要クール便\n- **購入可能な酒販店**：矢島酒店（千葉・船橋）、伊勢五本店（東京）、大和屋酒舗（広島）ほか特約店（画像はリンク切れリスクのため省略）\n\u003e source: https://www.yajima-jizake.co.jp/products/detail.php?product_id=12081\n\n### イベント・フェア（関東）：第31回 和酒フェス in 中目黒\n- **開催日**：2026年7月25日（土）・26日（日）\n- **時間**：第1部 12:00〜14:10 / 第2部 15:00〜17:10（2部制）\n- **会場**：中目黒\n- **チケット**：前売制（枚数限定）。当日券は数量限定販売予定。価格・出展蔵の詳細は公式チケットページで要確認\n\n全国の蔵元が一堂に会する飲み比べフェス。上記「THE 夏酒」系の銘柄を一気に試すチャンス。\n\u003e source: https://sakefes.com/schedule2026_nakameguro/\n\n## 📱 ガジェット・テック\n\n### RootBoard — Raspberry Pi Zeroを70キー搭載ポケットLinux端末にするオープンハードウェア\n- **メーカー/発表**：Dian Lieu氏によるKickstarterプロジェクト（エルミタージュ秋葉原が2026-07-15に紹介）\n- **価格**：1台$115（約19,000円）、2台セット$210。$99のSuper Early Birdは完売。出荷は2026年11月開始予定\n- **スペック要点**：3.5インチカラー液晶＋70キーQWERTYメンブレンキーボード＋内蔵バッテリー・スピーカー・電源管理回路の組立キット。Pi Zero / Zero W / Zero 2 W対応（Pi本体とmicroSDは別途用意）\n- **何が嬉しいか**：素のRaspberry Pi OSがそのまま動くポケットLinuxターミナル。出先からのSSHサーバー管理・障害一次対応の持ち歩き端末として、スマホのSSHクライアントより圧倒的にまともなキーボード体験が得られる。オープンハードウェアなので回路・筐体の改造前提で遊べるのも◎。クラファンなので出荷リスクは通常通り織り込みで\n- **リンク**：https://www.kickstarter.com/projects/dian-lieu/rootboard\n\u003e source: https://www.gdm.or.jp/crew/2026/0715/643821 （エルミタージュ秋葉原・2026-07-15公開）\n\n### GIGABYTE X870 AORUS INFINITY — 創立40周年記念のAM5 E-ATXマザーボード\n- **メーカー**：GIGABYTE（国内代理店ニューエックス）\n- **発売日/価格**：2026年7月17日国内発売。想定売価 税込約148,000円\n- **スペック要点**：AMD X870チップセット / Socket AM5 / E-ATX。18+2+2フェーズ電源＋大型VRMヒートシンク、M.2 Thermal Guard Ext.、5GBASE-T有線LAN＋Wi-Fi 7、DDR5はあえて2スロット構成（EXPO/XMPのOCマージン特化）\n- **何が嬉しいか**：メモリ2スロットの割り切りは配線長を詰めてDDR5の高クロックを通すための設計で、Zen 5でメモリOCを詰めたい自作勢向け。5GbE標準搭載はNAS・ホームラボと直結する用途で効く。AM5はLinuxカーネル対応が枯れているので、ハイエンドLinuxワークステーションの土台としても安心して選べる。記念モデルゆえの割高感は承知の上で\n- **リンク**：https://www.gigabyte.com/jp/press/news/-509\n\u003e source: https://www.4gamer.net/games/259/G025981/20260713011/ （4Gamer・2026-07-13公開）\n\n---\n※ガジェット3件目は今週（7/12〜7/19）の発売・発表でLinux/セキュリティ目線に足るものが確認できず、水増し禁止ルールに従い2件のみ。";
