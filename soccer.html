<script>
const md = "十分な情報が集まりました。レポートをまとめます。\n\n---\n\n# ⚽ サッカー移籍情報速報\n**2026年6月9日（月）版** | 夏ウィンドウ直前期\n\n---\n\n## 1. 完了した移籍（直近7日間：6月2日〜9日）\n\n### 🔵🔴 アンディ・ロバートソン → トッテナム・ホットスパー\n| 項目 | 内容 |\n|------|------|\n| 移籍元 | リバプール FC（プレミアリーグ） |\n| 移籍先 | トッテナム・ホットスパー（プレミアリーグ） |\n| 移籍金 | 無償（契約満了フリー） |\n| 契約年数 | 2年 |\n| 発表日 | 2026年6月5日 |\n\n32歳のスコットランド代表 LB。ミロシュ・ケルケスの台頭でリバプールのレギュラーを失い、ロベルト・デ・ゼルビ監督率いるトッテナムが即戦力として獲得。リバプールでは9年間で378試合出場、2度のPL優勝・CL制覇。\n\n**ソース**: トッテナム公式発表（S級）、ESPN（A級）\n\n---\n\n### ⚫⚪ デュシャン・ヴラホヴィッチ → ユベントス退団確定（次クラブ未定）\n| 項目 | 内容 |\n|------|------|\n| 移籍元 | ユベントス（セリエA） |\n| 移籍金 | なし（6月30日契約満了） |\n| 発表日 | 2026年6月3日 |\n\n元GM ジョルジョ・キエッリーニが「契約延長交渉は決裂した」と公式確認。次クラブはチェルシー、ニューカッスル、バルセロナ、バイエルンが関心。決定次第、別セクションに移行。\n\n**ソース**: beIN Sports（A級）、Football Today（B級）\n\n---\n\n\u003e ※ 上記以外に直近7日間で確実な日付が確認できる完了済み移籍（対象5大リーグ）は現時点で2件のみ。ウィンドウ正式開幕（PL：6月15日〜）前のため件数は少ない。\n\n---\n\n## 2. Here We Go！（合意ほぼ確実）\n\n### 🔴🔵 イスマイル・サイバリ：PSV → バイエルン・ミュンヘン\n| 項目 | 内容 |\n|------|------|\n| 移籍元 | PSV アイントホーフェン（エールディビジ） |\n| 移籍先 | バイエルン・ミュンヘン（ブンデスリーガ） |\n| 移籍金 | 最大 **€60m** |\n| 個人合意 | ✅ 完了（契約 〜2031年6月） |\n| クラブ間交渉 | 最終段階（6月7日時点） |\n\nモロッコ代表のマルチ・アタッカー（24歳）。25/26シーズンにエールディビジで15G8Aを記録し、フィンセント・コンパニーが最優先ターゲットに指名。個人合意は済んでおり、クラブ間の最終詰めが続いている。メディカルはクラブW杯（アメリカ開催）に合わせて実施予定。\n\n**ソース**: FCBinside（6月7日）、Bavarian Football Works（A級）、Goal.com（A級）\n\n---\n\n\u003e ※ファブリツィオ・ロマーノによる「Here We Go」の公式発表は本稿作成時点で確認できず、複数A級ソースによる合意寸前報道として掲載。\n\n---\n\n## 3. 交渉中・注目の噂\n\n### 🔴⚫ サンドロ・トナーリ：ニューカッスル → マンチェスター・ユナイテッド\n- 個人合意に達したとの報道あり（GiveMeSport、FootballTransfers）\n- クラブ間移籍金 **€115m前後**を巡りニューカッスルと交渉中\n- 「個人合意済みで決断はほぼ固まった」（GiveMeSport）\n- **信頼度**: ★★★☆☆（クラブ間合意未達、高額のため難航懸念）\n- **ソース**: GiveMeSport（B級）、FootballTransfers（B級）\n\n---\n\n### ⬛🔴 デュシャン・ヴラホヴィッチ（フリー）：争奪戦\n- チェルシー、ニューカッスル、バルセロナ、バイエルンが接触\n- ナポリ（アッレグリ監督との旧縁）も候補\n- 希望年俸が高額なため交渉は複雑\n- **信頼度**: ★★☆☆☆（次クラブは複数候補、決着未）\n- **ソース**: Football Today（B級）、Newcastle報道（B級）\n\n---\n\n### 🟣⚪ ヴィチーニャ：PSG → レアル・マドリード\n- フロレンティーノ・ペレス会長がポルトガル代表MFを有力候補に設定との報道\n- PSGはスター選手の引き留めを図るとみられ、交渉には時間がかかる見込み\n- **信頼度**: ★★☆☆☆（ソース1件、単独報道）\n- **ソース**: 転載報道（B級相当）\n\n---\n\n### 🔴⚫ オーレリアン・チュアメニ：レアル・マドリード → マンチェスター・ユナイテッド\n- ユナイテッドが最優先ターゲットとして名指しするも、レアル・マドリード側が「放出しない」と公式否定\n- 「状況は閉じていないと見る関係者もいる」との情報も一部あり\n- **信頼度**: ★☆☆☆☆（クラブ否定あり、希望的観測の側面強い）\n- **ソース**: The Peoples Person（B級）\n\n---\n\n## 4. 監督・スタッフ動向\n\n### 🔵 シャビ・アロンソ → チェルシー FC 監督就任\n- チェルシー公式が正式発表。7月1日付で就任、4年契約\n- レアル・マドリードでの指揮の後、スタンフォード・ブリッジへ\n- 欧州制覇経験のある名伯楽がトッテナムの新体制への挑戦者として登場\n\n**ソース**: Chelsea FC 公式（S級）、Sky Sports（A級）\n\n---\n\n## 5. 直前確認：7月1日加入確定選手\n\n| 選手 | 移籍元 | 移籍先 | 移籍金 | 備考 |\n|------|--------|--------|--------|------|\n| ジェレミー・ジャケ（CB、20歳） | スタッド・レンヌ | リバプール FC | €60m+€10m | 2月合意・リバプール公式確認済み |\n| アンディ・ロバートソン | リバプール | トッテナム | フリー | 上掲の通り6月5日発表 |\n\n---\n\n## 6. トランスファーウィンドウ 開幕日程（参考）\n\n| リーグ | ウィンドウ開幕 | 閉幕 |\n|--------|--------------|------|\n| プレミアリーグ | **2026年6月15日** | 9月1日 23:00 BST |\n| セリエA | 2026年6月29日 | 8月末 |\n| ラ・リーガ | 2026年7月1日 | 8月末 |\n| ブンデスリーガ | 2026年7月1日 | 8月31日 |\n| リーグアン | 2026年7月1日 | 8月31日 |\n\n\u003e 現在はプレミアリーグのウィンドウ開幕前のため、大陸側5大リーグは事前合意の発表に限られている。6月15日以降は一気に動き出す見込み。\n\n---\n\n**Sources:**\n- [Tottenham confirm Robertson signing - Tottenham Hotspur official](https://www.tottenhamhotspur.com/news/1071931/robertson-signing-secured)\n- [Andy Robertson joins Tottenham on free transfer - ESPN](https://www.espn.com/soccer/story/_/id/48908484/andy-robertson-tottenham-free-transfer-liverpool)\n- [Vlahovic to leave Juventus on a free transfer - beIN Sports](https://www.beinsports.com/en-us/soccer/serie-a/articles/vlahovic-to-leave-juventus-on-a-free-transfer-confirms-chiellini-2026-06-03)\n- [Negotiations well advanced! Saibari move to Bayern imminent - FCBinside](https://fcbinside.com/2026/06/07/negotiations-well-advanced-saibari-move-to-bayern-imminent/)\n- [Bayern Munich in talks over €60m deal for Saibari - Goal.com](https://www.goal.com/en/lists/bayern-munich-transfer-news-ismael-saibari-psv-eindhoven-deal/blt5c325394ca65f222)\n- [Sandro Tonali \u0027On His Way\u0027 to Man Utd - GiveMeSport](https://www.givemesport.com/man-utd-sandro-tonali-transfer-update-newcastle/)\n- [Xabi Alonso to Chelsea confirmed - Sky Sports](https://www.skysports.com/football/news/11095/13544932/xabi-alonso-to-chelsea-former-real-madrid-and-bayer-leverkusen-coach-agrees-four-year-contract-to-be-manager-at-stamford-bridge)\n- [Liverpool agree deal to sign Jeremy Jacquet - Liverpool FC official](https://www.liverpoolfc.com/news/liverpool-agree-deal-sign-jeremy-jacquet)\n- [Fabrizio Romano - Jacquet to Liverpool Here We Go](https://x.com/FabrizioRomano/status/2018086135046492531)\n- [Summer transfer window dates - FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/05/summer-transfer-window-2026-date-times-open-close-premier-league-la-liga-serie-a-bundesliga-ligue-1-saudi-arabia)";
document.getElementById('content').innerHTML = marked.parse(md);
