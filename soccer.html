const md = "収集した情報を整理してレポートを作成します。\n\n---\n\n## ⚽ サッカー移籍情報 — 2026年6月8日（月）\n\n\u003e **確認基準：** 完了移籍は過去7日間（6/1〜6/8）の公式発表のみ、交渉情報は過去14日間（5/25〜6/8）の信頼ソース準拠。\n\n---\n\n### 🟢 完了した移籍（6/1〜6/8）\n\n| # | 選手 | 移籍元 → 移籍先 | 移籍金 | 契約年数 | 発表日 |\n|---|---|---|---|---|---|\n| 1 | アンソニー・ゴードン | ニューカッスル → バルセロナ | €80m（add-on込み） | 5年 | 6月1〜3日頃 |\n| 2 | アンディ・ロバートソン | リバプール → トッテナム | 無償（ボスマン） | 2年 | 6月5日 |\n| 3 | マルコス・セネシ | ボーンマス → トッテナム | 無償（ボスマン） | 4年 | 6月7日 |\n\n**補足：**\n\n- **ゴードン（🏴󠁧󠁢󠁥󠁮󠁧󠁿 ENG / WG）**：ESPN・Sky Sports が複数確認。初期€70m ＋ add-ons で最大€80m。バルセロナは5年契約で英国代表ウィンガーを獲得。\n- **ロバートソン（🏴󠁧󠁢󠁳󠁣󠁴󠁿 SCO / LB）**：リバプールでミロス・ケルケスに先発を譲ったのが背景。デ・ゼルビ監督は「実績ある勝者」と評価。Sky Sports 公式発表。\n- **セネシ（🇦🇷 ARG / CB）**：ファブリツィオ・ロマーノが「100%確定、書類すべて署名済み」と確認。トッテナムにとってデ・ゼルビ体制2人目の夏補強（ロバートソンに続く）。\n\n---\n\n### 🔵 Here We Go!（合意ほぼ確実）\n\n**1. イブラヒマ・コナテ（リバプール → レアル・マドリード）**\n\n| 項目 | 内容 |\n|---|---|\n| 移籍金 | 無償（契約満了） |\n| 契約年数 | 4年 |\n| Romano 発信 | 6月2日「Here We Go、大統領選後に正式発表予定」 |\n| 信頼度 | ⭐ S+A 複数ソース（Romano / Sky Sports / ESPN / CaughtOffside） |\n\n**背景：** コナテはサウジアラビアから複数オファーを受けていたが保留し、マドリードを優先。フロレンティーノ・ペレス会長は6月7日の再選投票前に「当選すればコナテが第一補強」と公言しており、正式契約は大統領再選直後に行われる見込み。\n\n---\n\n### 🟡 交渉中・注目案件\n\n**1. フリアン・アルバレス（アトレティコ・マドリード → バルセロナ） 🔴🔵**\n\n- **信頼度：** A級 ／ 信頼ソース：FootballTransfers（6/6）、CaughtOffside（6/3）\n- 選手個人との合意は済み、本人はバルサ移籍を強く希望\n- **金額のギャップ：** バルサ提示 €100〜135m ／ アトレティコ要求 €120〜150m\n- アルセナル・PSG も関心を示しているため、競合の可能性あり\n\n**2. アイユーブ・ブアディ（リール → アーセナル） 🔴**\n\n- **信頼度：** A級 ／ 信頼ソース：CaughtOffside（6/3）、The Hard Tackle（6/4）\n- 18歳のリール中盤。アーセナルが€60m の正式オファーを提出するも、リールは却下\n- リール側の要求：€70〜80m（クラブ記録売却を目指す）\n- リバプール・チェルシー・マンU も注目中で交渉は長期化の見通し\n\n**3. デンゼル・ドゥムフリース（インテル → レアル・マドリード） 🟡**\n\n- **信頼度：** B級 ／ フロレンティーノ・ペレスが大統領選キャンペーン中に「解約金€25mで獲得合意済み」と公言（6月7日以前）\n- Romano の Here We Go 未発信のため「交渉中」に分類\n- インテルとの合意が成立していれば正式発表は近い見込み\n\n---\n\n### 📰 今週の重要ニュース（移籍以外）\n\n**アンドニ・イラオラ → リバプール新監督就任確定（6月4日）**\nアルネ・スロット監督の後任として、元ボーンマス指揮官と2年契約を締結（Liverpool FC 公式・Sky Sports 確認）。ボーンマスでクラブ初の欧州出場を実現した実績が評価された。\n\n---\n\n### 📅 移籍ウィンドウ開幕スケジュール（参考）\n\n| リーグ | 開幕日 | 締切日 |\n|---|---|---|\n| プレミアリーグ | **6月15日** | 9月1日 23:00 BST |\n| セリエA | 6月29日 | 9月1日 |\n| ラ・リーガ | 7月1日 | 9月1日 23:59 |\n| ブンデスリーガ | 7月1日 | 8月31日 |\n| リーグアン | 7月1日 | 8月31日 |\n\n\u003e ※ ブンデスリーガ・リーグアンはウィンドウ未開幕のため現時点で完了移籍なし。セリエAも同様。\n\n---\n\nSources:\n- [Liverpool FC – Liverpool agree deal to sign Jeremy Jacquet](https://www.liverpoolfc.com/news/liverpool-agree-deal-sign-jeremy-jacquet)\n- [Fabrizio Romano – Konate Here We Go (X)](https://x.com/FabrizioRomano/status/2018086135046492531)\n- [Sky Sports – Andy Robertson joins Tottenham](https://www.skysports.com/football/news/11095/13547815/andy-robertson-tottenham-announce-signing-of-liverpool-legend-after-anfield-exit-confirmed)\n- [Sky Sports – Anthony Gordon Barcelona](https://www.skysports.com/football/news/11095/13548577/anthony-gordon-transfer-news-barcelona-reach-agreement-with-newcastle-for-england-international-winger)\n- [ESPN – Barcelona sign Anthony Gordon](https://www.espn.com/soccer/story/_/id/48904926/barcelona-anthony-gordon-newcastle-united-transfer)\n- [ESPN – Konate closing on Real Madrid](https://www.espn.com/soccer/story/_/id/48949796/ibrahima-konate-closing-move-real-madrid)\n- [Sky Sports – Konate transfer news](https://www.skysports.com/transfer/news/12691/13550223/ibrahima-konate-transfer-news-defender-edges-closer-to-joining-real-madrid-as-talks-continue-with-laliga-giants)\n- [To The Lane And Back – Senesi 100% confirmed](https://tothelaneandback.com/2026/06/07/marcos-senesi-officially-confirmed-tottenham/)\n- [Sky Sports – Andoni Iraola Liverpool appointment](https://www.skysports.com/football/news/11669/13550174/andoni-iraola-liverpool-appoint-former-bournemouth-boss-as-arne-slots-successor-on-two-year-deal)\n- [FootballTransfers – Julian Alvarez Barcelona agreement](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/06/julian-alvarez-barcelona-transfer-agreement-already-made-with-atletico-madrid)\n- [CaughtOffside – Bouaddi Arsenal €60m bid](https://www.caughtoffside.com/2026/06/03/liverpool-chelsea-man-united-arsenal-ayyoub-bouaddi-transfer/)\n- [ESPN – Real Madrid transfer window preview](https://www.espn.com/soccer/story/_/id/48833505/when-does-summer-transfer-window-close-premier-league-serie-laliga-bundesliga-ligue-1)\n- [Managing Madrid – Konate Real Madrid agreement](https://www.managingmadrid.com/108412/real-madrid-konate-rumors-2026-news)\n- [GiveMeSport – Senesi Tottenham done deal](https://www.givemesport.com/breaking-tottenham-to-sign-marcos-senesi-done-deal/)";
