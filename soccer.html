const md = "十分な情報が集まりました。レポートをまとめます。\n\n---\n\n# ⚽ サッカー移籍情報まとめ｜2026年6月3日\n\n\u003e **夏ウィンドウ開幕日（参考）**\n\u003e プレミアリーグ: 6/15 ／ セリエA: 6/29 ／ ラ・リーガ・ブンデス: 7/1 ／ 全リーグ締切: 9/1\n\n---\n\n## 1. 完了した移籍（直近7日間）\n\n### アンソニー・ゴードン（25歳）\n**ニューカッスル → バルセロナ**\n- 移籍金: €70m（アドオン込み最大 €80m）\n- 契約: 5年\n- 発表: 2026年6月上旬\n- バルセロナはバイエルン・ミュンヘンとリバプールを競り落として獲得。ハンジ・フリック監督が要請していた左ウィングの補強。ニューカッスルでは今季リーグ最多17ゴールを記録。\n- ソース: Sky Sports (A級), ESPN (A級)\n\n---\n\n### ジェレミー・ジャケ（20歳）\n**ランス（スタッド・レンヌ） → リバプール**\n- 移籍金: £55m ＋ £5m（アドオン）\n- 契約: 5年（2031年まで、+1年オプション）\n- 発表: 2026年6月\n- チェルシーとの争奪戦を制して獲得。ヨーロッパ最高の若手CBの一人と評される20歳。7月1日にアンフィールド合流予定。\n- ソース: Liverpool FC公式 (S級), Fabrizio Romano (S級), Sky Sports (A級), ESPN (A級)\n\n---\n\n## 2. Here We Go!（合意ほぼ確実）\n\n### アンディ・ロバートソン（32歳）\n**リバプール → トッテナム（フリートランスファー）**\n- ファブリツィオ・ロマーノが口頭合意を確認「all terms in place」\n- 条件はすべて合意済みだが、正式署名前の状態\n- ユヴェントスからのオファーを断りトッテナムを選択\n- ソース: Fabrizio Romano (S級), ESPN (A級), Sky Sports (A級)\n\n---\n\n## 3. 交渉中・移籍噂\n\n| 選手（現所属） | 移籍先候補 | 移籍金目安 | 信頼度 | 主なソース |\n|---|---|---|---|---|\n| ジョアン・ネヴェス (PSG) | レアル・マドリード | ~€120-140m | 🟡 B | ESPN, French Football Weekly (5/29) |\n| フリアン・アルバレス (アトレティコ) | バルセロナ / PSG | €130m以上（売る気なし） | 🟡 B | ESPN |\n| モーガン・ロジャーズ (アストン・ビラ) | アーセナル | £80m超 | 🟡 B | ESPN |\n| エデルソン (アタランタ) | マンチェスター・ユナイテッド | ~£35m | 🟡 B | ESPN |\n| デクラン・ライス (アーセナル) | レアル・マドリード | 不明 | 🔴 C | ESPN (内部意見段階) |\n\n**補足メモ:**\n- **レアル・マドリード**: ムリーニョ監督就任が確実視される中、ネヴェス獲得を最優先とする報道。ただしPSGは2030年契約の同選手を手放す意向なしと主張。\n- **バルセロナ**: ゴードン獲得後もビジネスロジックで追加補強を模索中。ベルナルド・シウヴァ（マンC）もフリー移籍候補として浮上。\n- **ゴンサロ・ラモス（PSG）**: PSGが放出を検討中。ACミランが最有力獲得先と報道（ソース信頼度: B）。\n\n---\n\n## 注記・除外事項\n\n- **ピエロ・インカピエ（レバークーゼン→アーセナル）**: 永久移籍合意は2026年3月（7日ルール外のため今回不掲載）。\n- **ハーレー・エムズデン-ジェームズ（マンU）**: 2025年7月の案件のため除外。\n- ブンデスリーガ・リーグアン固有の確認済み移籍は本日7日以内の信頼ソース2件が確認できず、該当なし。\n\n---\n\nSources:\n- [Anthony Gordon - Barcelona sign from Newcastle (ESPN)](https://www.espn.com/soccer/story/_/id/48904926/barcelona-anthony-gordon-newcastle-united-transfer)\n- [Anthony Gordon transfer news (Sky Sports)](https://www.skysports.com/football/news/11095/13548577/anthony-gordon-transfer-news-barcelona-reach-agreement-with-newcastle-for-england-international-winger)\n- [Liverpool agree deal to sign Jeremy Jacquet (Liverpool FC Official)](https://www.liverpoolfc.com/news/liverpool-agree-deal-sign-jeremy-jacquet)\n- [Jeremy Jacquet transfer news (Sky Sports)](https://www.skysports.com/football/news/11669/13502234/jeremy-jacquet-transfer-news-liverpool-sign-rennes-defender-in-lb60m-deal-with-20-year-old-moving-to-anfield-this-summer)\n- [Liverpool confirm signing of Jeremy Jacquet (ESPN)](https://www.espn.com/soccer/story/_/id/47804710/liverpool-sign-defender-jeremy-jacquet-rennes-transfers)\n- [Fabrizio Romano - Andy Robertson to Tottenham verbal agreement (X/Twitter)](https://x.com/FabrizioRomano/status/2042911157246128581)\n- [Tottenham advancing in Andy Robertson deal (ESPN)](https://www.espn.com/soccer/story/_/id/48900541/tottenham-advancing-andy-robertson-deal)\n- [Andy Robertson to Tottenham (Sky Sports)](https://www.skysports.com/football/news/11675/13547838/tottenham-transfers-news-spurs-edging-close-to-signing-marcos-senesi-and-hopeful-of-move-for-andy-robertson)\n- [Real Madrid to sign PSG\u0027s Neves? (ESPN)](https://www.espn.com/soccer/story/_/id/48907583/transfer-rumors-news-barcelona-beat-arsenal-hincapie)\n- [Mercato PSG: Real Madrid rushes towards João Neves (French Football Weekly)](https://frenchfootballweekly.com/2026/05/29/mercato-psg-real-madrid-rushes-towards-joao-neves/)\n- [Transfer rumors: Man Utd chase Osimhen; Real Madrid\u0027s $140M bid (Sports Illustrated)](https://www.si.com/soccer/transfer-rumors-man-utd-chase-osimhen-real-madrid-midfielder-bid)\n- [Transfer rumors: PSG made offer for Barça target Julián Álvarez (ESPN)](https://www.espn.com/soccer/story/_/id/48936654/transfer-rumors-news-real-madrid-show-interest-arsenal-declan-rice)\n- [Summer transfer window 2026 dates (Sky Sports)](https://www.skysports.com/football/news/11095/13546220/summer-transfer-window-2026-dates-when-is-deadline-day-for-premier-league-and-efl-clubs-to-sign-players)";
