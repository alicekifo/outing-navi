const md = "収集した情報をまとめてレポートを作成します。\n\n---\n\n# サッカー移籍情報レポート｜2026年6月6日\n\n\u003e 夏ウィンドウ開幕日：PL・EFL = **6月15日**、ラ・リーガ/ブンデス/リーグアン = **7月1日**\n\u003e ウィンドウ未開幕のため、以下は「合意・発表済み」移籍を含む\n\n---\n\n## 1. 完了した移籍（5月30日〜6月6日）\n\n### 1. アンソニー・ゴードン（英/FW）\n**ニューカッスル United → FCバルセロナ**\n- 移籍金：**£69m（約€80m）**\n- 契約：**2031年まで（5年）**\n- 発表：6月上旬\n- ソース：[ESPN](https://www.espn.com/soccer/story/_/id/48904926/barcelona-anthony-gordon-newcastle-united-transfer) (A級) ／ [Sky Sports](https://www.skysports.com/football/news/11095/13548577/anthony-gordon-transfer-news-barcelona-reach-agreement-with-newcastle-for-england-international-winger) (A級) ✅ 2件一致\n\n**背景：** 25歳のイングランド代表ウイングが今季リーグ17得点の活躍を引っ提げてカンプノウへ。バルセロナはアタッカー層を大幅補強。\n\n---\n\n### 2. クエンダ（ポルトガル/MF-WB）\n**スポルティングCP → チェルシー**\n- 移籍金：非公開（2025年3月に事前合意済み）\n- 契約：**7年**\n- ソース：[OneFootball](https://onefootball.com/en/news/every-completed-chelsea-transfer-in-summer-2026-signings-sales-loans-42955373) (B級) ／ [TeamTalk](https://www.teamtalk.com/chelsea/every-completed-chelsea-transfer-summer-2026-signings-sales-loans) (B級)\n\n**補足：** ザビ・アロンソ新体制下でのチェルシー正式就任。ウイング・WBどちらでも対応可能な多機能型。\n\n---\n\n### 3. エメヒャ（オランダ/FW）\n**ストラスブール → チェルシー**\n- 移籍金：BlueCo内部取引（2025年9月に事前合意）\n- ソース：[OneFootball](https://onefootball.com/en/news/every-completed-chelsea-transfer-in-summer-2026-signings-sales-loans-42955373) (B級)\n\n**補足：** ストラスブールの前キャプテン。BlueCo傘下クラブ間の移籍。\n\n---\n\n## 2. Here We Go！（合意ほぼ確実）\n\n### 1. エデルソン（ブラジル/MF）\n**アタランタ → マンチェスター・ユナイテッド**\n- 移籍金：**£38m（€40.5m + €4.5m add-ons）**\n- 契約：**4年＋1年オプション**\n- Romano確認：6月2〜4日\n- ソース：[Sky Sports](https://www.skysports.com/football/news/11667/13548678/man-utd-agree-ederson-deal-atlanta-midfielder-set-for-old-trafford-in-38m-transfer) (A級) ／ [ESPN](https://www.espn.com/soccer/story/_/id/48898380/ederson-close-joining-man-united-35m-move-atalanta-sources) (A級) ✅ 2件一致\n\n**背景：** カゼミーロ退団後の中盤補強として、マイケル・カリック新監督体制での今夏第1号補強候補。\n\n---\n\n### 2. イブラヒマ・コナテ（フランス/CB）\n**リバプール（退団）→ レアル・マドリード**\n- 移籍金：**フリートランスファー**\n- 契約：**4年**\n- Romano確認：6月2日（口頭合意）\n- ソース：[Caught Off Side](https://www.caughtoffside.com/2026/06/02/ibrahima-konate-verbal-agreement-real-madrid-fabrizio-romano/comment-page-1/) (B級) ／ [Sky Sports](https://www.skysports.com/transfer/news/12691/13550223/ibrahima-konate-transfer-news-defender-edges-closer-to-joining-real-madrid-as-talks-continue-with-laliga-giants) (A級) ✅ 2件一致\n\n**注意点：** フロレンティーノ会長再選が前提条件。サウジからのオファーを保留して交渉中。\n\n---\n\n### 3. アンドニ・イラオラ（スペイン/監督）\n**新監督就任交渉 → リバプール**\n- Romano報告：「交渉が非常に順調に進んでいる」（6月2日）\n- ソース：[Caught Off Side](https://www.caughtoffside.com/2026/06/02/here-we-go-getting-closer-romano-liverpool-deal/) (B級) ／ [Empire of the Kop](https://www.empireofthekop.com/2026/06/02/its-guaranteed-its-decided-fabrizio-romano-confirms-transfer-decision-with-big-impact-for-liverpool/) (B級)\n- 信頼度：★★★☆☆（監督案件、Here We Go未到達）\n\n---\n\n## 3. 交渉中・噂レベル（直近14日以内）\n\n| 選手 | 現所属 | 動向 | 信頼度 | ソース |\n|------|--------|------|--------|--------|\n| **モハメド・サラー** | リバプール（6/30契約満了） | フリー退団確定、移籍先未定。バルセロナ報道は本人否定 | ★★★★☆ | [TransferFeed](https://www.transferfeed.com/transfers/mohamed-salah-liverpool-fc-barcelona/8785277) |\n| **ベルナルド・シルバ** | マンチェスター・シティ（契約満了） | フリー退団確定、交渉先交渉中 | ★★★☆☆ | ESPN |\n| **ジョン・ストーンズ** | マンチェスター・シティ（契約満了） | フリー退団確定 | ★★★☆☆ | ESPN |\n| **アンドリュー・ロバートソン** | リバプール（契約満了） | フリー退団確定 | ★★★☆☆ | ESPN |\n\n---\n\n## 注記・免責\n\n- 夏ウィンドウは**PL: 6月15日**、ラ・リーガ等: 7月1日開幕のため、現時点での「完了」はウィンドウ開幕後に正式登録される案件を含む\n- コナテ→レアルは口頭合意段階、フロレンティーノ会長再選条件付き\n- サラー・シルバ等のフリー退団選手の移籍先は未確定\n\n---\n\nSources:\n- [Barcelona sign Anthony Gordon from Newcastle in €70m transfer - ESPN](https://www.espn.com/soccer/story/_/id/48904926/barcelona-anthony-gordon-newcastle-united-transfer)\n- [Anthony Gordon transfer confirmed - Sky Sports](https://www.skysports.com/football/news/11095/13548577/anthony-gordon-transfer-news-barcelona-reach-agreement-with-newcastle-for-england-international-winger)\n- [Man Utd agree Ederson deal - Sky Sports](https://www.skysports.com/football/news/11667/13548678/man-utd-agree-ederson-deal-atlanta-midfielder-set-for-old-trafford-in-38m-transfer)\n- [Éderson close to joining Man United - ESPN](https://www.espn.com/soccer/story/_/id/48898380/ederson-close-joining-man-united-35m-move-atalanta-sources)\n- [Ibrahima Konate verbal agreement with Real Madrid - Caught Off Side](https://www.caughtoffside.com/2026/06/02/ibrahima-konate-verbal-agreement-real-madrid-fabrizio-romano/comment-page-1/)\n- [Ibrahima Konate transfer news - Sky Sports](https://www.skysports.com/transfer/news/12691/13550223/ibrahima-konate-transfer-news-defender-edges-closer-to-joining-real-madrid-as-talks-continue-with-laliga-giants)\n- [Ibrahima Konate agrees free transfer to Real Madrid - This Is Anfield](https://www.thisisanfield.com/2026/06/ibrahima-konate-agrees-real-madrid-free-transfer-2026/)\n- [Every completed Chelsea transfer in summer 2026 - OneFootball](https://onefootball.com/en/news/every-completed-chelsea-transfer-in-summer-2026-signings-sales-loans-42955373)\n- [Andoni Iraola Liverpool deal getting closer - Caught Off Side](https://www.caughtoffside.com/2026/06/02/here-we-go-getting-closer-romano-liverpool-deal/)\n- [Summer transfer window 2026 dates - FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/05/summer-transfer-window-2026-date-times-open-close-premier-league-la-liga-serie-a-bundesliga-ligue-1-saudi-arabia)\n- [Fabrizio Romano on X - Jeremy Jacquet to Liverpool](https://x.com/FabrizioRomano/status/2018086135046492531)";
document.getElementById('content').innerHTML = marked.parse(md);
