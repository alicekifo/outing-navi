<script>
const md = "情報が揃ったので整形してレポートを出力する。\n\n---\n\n# ⚽ 移籍ニュース速報\n**生成日: 2026年6月1日**\n\n---\n\n## 【完了した移籍】直近7日間（5/25〜6/1）\n\n### 🏆 アンソニー・ゴードン：ニューカッスル・ユナイテッド → FCバルセロナ\n| 項目 | 内容 |\n|------|------|\n| 発表日 | 2026年5月29日 |\n| 移籍金 | €70m（アドオン込み最大€80m超） |\n| 契約 | 5年（2031年まで） |\n| 年齢/ポジション | 25歳 / WG（左右両対応） |\n\nハンジ・フリック監督のリクエストによる補強。ラミン・ヤマル、ラフィーニャとの前線トリオ形成が目的。バイエルン・ミュンヘンとリバプールも関心を示していたが、バルセロナが迅速に動いて競合を退けた。W杯後にバルセロナ合流予定。\n\n**ソース:** [ESPN](https://www.espn.com/soccer/story/_/id/48904926/barcelona-anthony-gordon-newcastle-united-transfer)(A) / [Sky Sports](https://www.skysports.com/transfer/news/12691/13548532/anthony-gordon-transfer-news-forward-in-barcelona-for-medical-after-laliga-side-reach-agreement-with-newcastle-for-england-international)(A)\n\n---\n\n\u003e ⚠️ 本日確認できた完了移籍は上記1件のみ。プレミアリーグの移籍ウィンドウは6月15日開幕のため、正式登録前の公式発表は現段階ではまだ少ない。\n\n---\n\n## 【Here We Go!】合意ほぼ確実（直近14日間）\n\n### ✅ バレンティン・バルコ：RCストラスブール → チェルシー\n| 項目 | 内容 |\n|------|------|\n| 報道日 | 2026年5月23日（ロマーノ確認） |\n| 移籍金 | 非公開（BlueCo傘下クラブ間取引） |\n| 契約 | 6年（2032年まで） |\n| 年齢/ポジション | 21歳 / MF・LB（アルゼンチン代表） |\n\nシャビ・アロンソ政権初のチェルシー補強として確認。テクニカルな左足と攻守両面の貢献が評価され、今季ストラスブールで飛躍的成長を見せた。6月以降に正式契約締結予定。\n\n**ソース:** [Fabrizio Romano (X)](https://x.com/FabrizioRomano)(S) / [football365](https://www.football365.com/news/chelsea-romano-here-we-go-first-signing-alonso-barco)(B) / [FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/05/chelsea-transfer-news-blues-agree-deal-to-sign-valentin-barco-fabrizio-romano)(B)\n\n---\n\n### ✅ キーラン・トリッピアー：フリー → ウォルバーハンプトン・ワンダラーズ\n| 項目 | 内容 |\n|------|------|\n| 報道日 | 2026年5月29〜30日 |\n| 移籍金 | 無料（フリートランスファー） |\n| 契約 | 2年＋1年オプション |\n| 年齢/ポジション | 35歳 / RB（元イングランド代表） |\n\nチャンピオンシップに降格したウォルブズが獲得。ニューカッスル退団後に多くの欧州クラブも関心を示したが、チームの指揮を取るリーダーとしての役割を評価され合意。来週帰国後にメディカル受診予定で、正式発表はその後となる見込み。\n\n**ソース:** [Sky Sports](https://www.skysports.com/football/news/11095/13549042/kieran-trippier-wolves-agree-deal-to-sign-former-newcastle-defender)(A) / [DAZN](https://www.dazn.com/en-GB/news/football/football-transfer-kieran-trippier-newcastle-united-wolves/wbwpyajmh2eo1muccu7qn1qpw)(A) / [Goal.com](https://www.goal.com/en-us/lists/kieran-trippier-wolves-transfer-championship-move-newcastle-united-exit/blt7da4d89d282d5d11)(A)\n\n---\n\n## 【交渉中・噂】直近14日間（信頼度マーク付き）\n\n### 🔵 イブラヒマ・コナテ（リバプール退団確定）→ PSG有力 ★★★☆☆\n- **報道日:** 2026年5月29日\n- **詳細:** 契約満了（6月30日）によるフリー移籍確定。パリ出身のため、故郷PSGへの帰還が最有力。レアル・マドリードも交渉再開の動きがあるとされる。正式移籍先はまだ未発表。\n- **ソース:** [ESPN](https://www.espn.com/soccer/story/_/id/48908272/ibrahima-konate-set-leave-liverpool-free-sources)(A) / [Sky Sports](https://www.skysports.com/football/news/11669/13548995/ibrahima-konates-liverpool-exit-summer-transfer-window-becomes-more-complicated-for-arne-slot)(A)\n- **反証確認:** 他クラブへの正式合意報道は現時点なし ✅\n\n---\n\n### 🔵 ベルナルド・シウバ（マンチェスター・シティ退団確定）→ バルセロナと交渉中 ★★★★☆\n- **報道日:** 2026年5月29〜30日\n- **詳細:** 9年在籍後、契約満了（6月30日）でシティ退団。フリートランスファー。バルセロナが最有力で、フリック監督も承認済み。2028年＋1年オプションの契約が提示見込み。サウジ・MLS・アトレティコマドリードも選択肢として残る。\n- **ソース:** [ESPN](https://www.espn.com/soccer/story/_/id/48907979/bernardo-silva-real-option-barcelona-amid-atletico-benfica-interest-source)(A) / [Barcelona Blaugranes](https://www.barcablaugranes.com/fc-barcelona-transfer-rumors-news/121916/bernardo-silva-or-marcus-rashford-barcelona-facing-transfer-dilemma)(B)\n- **反証確認:** レアル・マドリードは「現時点で候補外」と報道 ✅\n\n---\n\n### 🟡 ラファエル・レオン（ACミラン）→ マンチェスター・ユナイテッド希望、交渉前段階 ★★☆☆☆\n- **報道日:** 2026年5月31日\n- **詳細:** 自ら退団希望を表明。「マンUは憧れのクラブ（ロナウドへのリスペクト）」と明言。ミランは£50〜60mでの売却を検討中。アーセナル・チェルシー・トッテナムも関心を持ち、ガラタサライからは€10m/年の契約オファーも届いている。\n- **ソース:** [Sport Bible](https://www.sportbible.com/football/transfer-news/rafael-leao-ac-milan-premier-league-dream-club-908133-20260531)(B) / [Football365](https://www.football365.com/news/man-utd-line-up-43m-rafael-leao-signing-reaches-decision-leaving-ac-milan)(B)\n- **注意:** B級ソースのみ・複数クラブが競合中。信頼度低め。\n\n---\n\n### 🟡 モハメド・サラー（リバプール退団確定）→ 行先未定、W杯後に決断 ★★☆☆☆\n- **報道日:** 2026年5月27日頃\n- **詳細:** 契約満了（6月30日）でリバプール退団確定。本人は「W杯後にすべて明らかになる」と発言。最有力はサウジアラビア（アル・ナスル、アル・ヒラル等）。トルコ（フェネルバフチェ）・MLS（サンディエゴFC）も選択肢。\n- **ソース:** [The National](https://www.thenationalnews.com/sport/football/2026/05/27/saudi-arabia-fenerbahce-mls-where-will-mohamed-salah-go-next/)(B) / [beIN Sports](https://www.beinsports.com/en-us/soccer/premier-league/articles/mohamed-salah-to-announce-new-club-in-days-after-liverpool-exit-2026-04-28)(B)\n\n---\n\n## 【参考】夏の移籍ウィンドウ開幕日\n| リーグ | 開幕 | 締切 |\n|--------|------|------|\n| プレミアリーグ | 6月15日 | 9月1日 |\n| ブンデスリーガ | 7月1日 | 8月31日 |\n| セリエA / ラ・リーガ | 6月29〜7月1日 | 9月1日 |\n| リーグ・アン | 6月15日 | 9月1日 |\n\n\u003e W杯開催期間（6/11〜7/19）中はほとんどの選手が交渉より試合に集中するため、大型移籍の発表は7月後半以降に集中する見込み。\n\n---\n\n**Sources:**\n- [ESPN – Gordon to Barcelona](https://www.espn.com/soccer/story/_/id/48904926/barcelona-anthony-gordon-newcastle-united-transfer)\n- [Sky Sports – Gordon transfer](https://www.skysports.com/transfer/news/12691/13548532/anthony-gordon-transfer-news-forward-in-barcelona-for-medical-after-laliga-side-reach-agreement-with-newcastle-for-england-international)\n- [BVM Sports – Inside the Gordon move](https://bvmsports.com/2026/05/29/anthony-gordons-barcelona-transfer-inside-the-rapid-e80m-move/)\n- [Football365 – Barco / Chelsea Here We Go](https://www.football365.com/news/chelsea-romano-here-we-go-first-signing-alonso-barco)\n- [Sky Sports – Trippier to Wolves](https://www.skysports.com/football/news/11095/13549042/kieran-trippier-wolves-agree-deal-to-sign-former-newcastle-defender)\n- [ESPN – Konaté leaves Liverpool](https://www.espn.com/soccer/story/_/id/48908272/ibrahima-konate-set-leave-liverpool-free-sources)\n- [ESPN – Bernardo Silva / Barcelona](https://www.espn.com/soccer/story/_/id/48907979/bernardo-silva-real-option-barcelona-amid-atletico-benfica-interest-source)\n- [Sport Bible – Leão Premier League dream](https://www.sportbible.com/football/transfer-news/rafael-leao-ac-milan-premier-league-dream-club-908133-20260531)\n- [The National – Salah next move](https://www.thenationalnews.com/sport/football/2026/05/27/saudi-arabia-fenerbahce-mls-where-will-mohamed-salah-go-next/)\n- [Sky Sports – Summer window dates](https://www.skysports.com/football/news/11095/13546220/summer-transfer-window-2026-dates-when-is-deadline-day-for-premier-league-and-efl-clubs-to-sign-players)";
document.getElementById('content').innerHTML = marked.parse(md);
document.querySelectorAll('#content table').forEach(t=>{const w=document.createElement('div');w.className='tbl-wrap';t.parentNode.insertBefore(w,t);w.appendChild(t);});
</script>
