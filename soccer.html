<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soccer Transfer News - 2026/5/29</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c10;--surface:#161620;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.15);--accent:#e8b84b;--blue:#6aadff;--green:#52d68a;--text:#eeeef5;--text2:#8888a8;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;padding:20px 16px 80px;}
.page{max-width:680px;margin:0 auto;}
.hd{display:flex;align-items:center;gap:10px;margin-bottom:26px;flex-wrap:wrap;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.logo em{color:var(--accent);font-style:normal;}
.hd-date{font-size:12px;color:var(--text2);margin-right:auto;}
.wc-badge{background:linear-gradient(135deg,#ff6b00,var(--accent));color:#000;font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;}
.back-link{font-size:11px;color:var(--text2);text-decoration:none;}
.back-link:hover{color:var(--accent);}
#content h2{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--text2);margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border2);}
#content h3{font-size:14px;font-weight:700;color:var(--text);margin:14px 0 6px;}
#content p{font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:8px;}
#content ul,#content ol{font-size:13px;color:var(--text2);line-height:1.8;padding-left:20px;margin-bottom:10px;}
#content li{margin-bottom:4px;}
#content strong{color:var(--text);font-weight:700;}
#content a{color:var(--blue);text-decoration:none;}
#content a:hover{text-decoration:underline;}
#content table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0 16px;}
#content th{color:var(--text2);font-weight:600;padding:6px 8px;border-bottom:1px solid var(--border2);text-align:left;}
#content td{padding:8px 8px;border-bottom:1px solid var(--border);}
#content hr{border:none;border-top:1px solid var(--border);margin:16px 0;}
</style>
</head>
<body>
<div class="page">
<div class="hd">
  <div class="logo">⚽ <em>移籍</em>情報</div>
  <div class="hd-date">2026/5/29</div>
  
  <a class="back-link" href="./outing-app.html">← アプリ</a>
</div>
<div id="content"></div>
</div>
<script>
const md = $mdEscaped;
document.getElementById('content').innerHTML = marked.parse(md);
</script>
</body>
</html>
