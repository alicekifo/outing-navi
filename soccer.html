<script>
const md = "十分な情報が集まりました。レポートを作成します。\n\n---\n\n# サッカー移籍情報 | 2026年6月4日（金）\n\n\u003e WC_MODE: OFF（ワールドカップ開幕まであと7日）\n\n---\n\n## ✅ 完了した移籍（直近7日間）\n\n### 1. アンソニー・ゴードン ｜ ニューカッスル → バルセロナ\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | 約€70m（£69.3m、アドオン込み） |\n| 契約 | 5年 |\n| 発表日 | 2026年5月27〜28日頃 |\n\n25歳のイングランド代表WG。2025-26シーズンは全大会通算17ゴール。ハンジ・フリック監督の要請による攻撃陣刷新策の一環。バイエルン・ミュンヘン、リバプールとの争奪戦を制した。バルセロナにとって2026夏の第1号補強。\n\n**ソース：** ESPN(A) / Sky Sports(A) / beIN Sports(A) — 3件一致\n\n---\n\n## 🟢 Here We Go!（合意ほぼ確実）\n\n### 1. イブラヒマ・コナテ ｜ リバプール → レアル・マドリー\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | フリートランスファー |\n| 契約 | 4年（〜2030） |\n| 報道日 | 2026年6月2日 |\n\nFabrizio Romanoが口頭合意を確認。サウジ勢からの高額オファーを蹴ってマドリー行きを選択。元チームメイトのトレント・アレクサンダー＝アーノルドに続くアンフィールドからベルナベウへの移籍。フロレンティーノ・ペレス会長の再選を条件に最終手続きへ進む見込み。\n\n**ソース：** Fabrizio Romano(S) / Sky Sports(A) / Fox Sports(A) — S級含む3件一致\n\n---\n\n### 2. エデルソン ｜ アタランタ → マンチェスター・ユナイテッド\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £34m ＋ アドオン最大£3.8m |\n| 契約 | 4年＋オプション1年 |\n| 報道日 | 2026年6月2〜3日 |\n\n26歳のブラジル代表MF。マイケル・キャリック新体制下での第1号補強。個人条件合意済み・クラブ間合意済みでメディカル待ちの段階。カゼミーロ、ウガルテ退団見込みの中盤再建の第一歩。\n\n**ソース：** Sky Sports(A) / Fabrizio Romano(S via TeamTalk) / CaughtOffside(B) — S級含む複数一致\n\n---\n\n### 3. アンドニ・イラオラ ｜ リバプール新監督就任合意\n| 項目 | 内容 |\n|------|------|\n| 契約 | 2年（キャリア慣例の短期契約） |\n| 報道日 | 2026年6月2〜3日 |\n\nアーネ・スロット監督の突然の解任（6月1日頃）を受け、リチャード・ヒューズSDが交渉を主導。ブルネマスで同SDとともに昨季プレミア6位・欧州初出場を達成した実績を評価。今週中に正式発表予定とされる。\n\n**ソース：** Sky Sports(A) / ESPN(A) / This Is Anfield(B) — A級2件以上一致\n\n---\n\n### 4. ベルナルド・シルバ ｜ マンチェスター・シティ → バルセロナ\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | フリートランスファー（契約満了） |\n| 契約 | 2年＋オプション1年 |\n| 推定年俸 | 約€800万/年 |\n| 報道日 | 2026年5月29〜30日 |\n\nアトレティコ・マドリー、ベンフィカ、サウジからのオファーを断り、「夢だった」バルセロナを選択。バルセロナにとってゴードンに続く夏の第2号補強。31歳ながらプレミア最高クラスのパフォーマンスを維持していた。\n\n**ソース：** Barca Universal(B) / ESPN(A) / Tribuna(B) — 複数一致（A級1件含む）\n**注：** バルセロナによる公式発表は未確認。登録問題（FFP）次第で遅延の可能性あり。\n\n---\n\n## 🔄 交渉中・噂（信頼度付き）\n\n### モハメド・サラー ｜ リバプール退団 → 次クラブ未定\n- 本人コメント：「ワールドカップ後にすべてが明確になる」\n- 関心クラブ：アル・イティハード（最有力）、ASローマ、ACミラン、フェネルバフチェ\n- **信頼度：★★★☆☆**（退団確定だが行先未決）\n- ソース：Goal.com(A) / FourFourTwo(A) / beIN Sports(A)\n\n---\n\n### ロベルト・レヴァンドフスキ ｜ バルセロナ退団 → 次クラブ交渉中\n- バルセロナとの更新交渉決裂（2年要求 vs クラブ1年提示で合意ならず）\n- 関心クラブ：アル・ヒラル（年俸€4,500万）、ユベントス（1年€600万）\n- **信頼度：★★★☆☆**（退団確定、行先は未確定）\n- ソース：football-espana.net(B) / beIN Sports(A)\n\n---\n\n### アウレリアン・チュアメニ ｜ レアル・マドリー → マンU関心\n- Romanoが「夢のターゲット」と言及。マドリーでバルベルデとのトレーニング場でのトラブルも報じられ、放出説浮上。\n- **現状：** ペレス会長が「売却しない」と明言。交渉入りの可能性は低い段階。\n- **信頼度：★★☆☆☆**（関心はあるが障壁大）\n- ソース：Fabrizio Romano(S) / TeamTalk(B) / Yahoo Sports(B)\n\n---\n\n## 📋 背景情報（主要選手の契約満了）\n\n| 選手 | 退団クラブ | 備考 |\n|------|----------|------|\n| モハメド・サラー | リバプール | 行先検討中 |\n| イブラヒマ・コナテ | リバプール | マドリー合意へ |\n| アンディ・ロバートソン | リバプール | 動向未報告 |\n| ベルナルド・シルバ | マンチェスター・シティ | バルセロナ合意へ |\n| ロベルト・レヴァンドフスキ | バルセロナ | 行先交渉中 |\n\n---\n\n\u003e **次の注目日程：**\n\u003e - 2026年6月15日：プレミアリーグ 夏の移籍ウィンドウ開幕\n\u003e - 2026年6月11日：FIFA ワールドカップ2026 開幕（WC_MODE切替タイミング）\n\n---\n\n**ソース一覧（主要リンク）:**\n- [Fabrizio Romano – Konate verbal agreement with Real Madrid (CaughtOffside, 2026/6/2)](https://www.caughtoffside.com/2026/06/02/ibrahima-konate-verbal-agreement-real-madrid-fabrizio-romano/)\n- [Man Utd agree Ederson deal – Sky Sports](https://www.skysports.com/football/news/11095/13548678/man-utd-agree-ederson-deal-atalanta-midfielder-set-for-old-trafford-in-lb38m-transfer)\n- [Liverpool reach agreement with Andoni Iraola – ESPN](https://www.espn.com/soccer/story/_/id/48951109/liverpool-agreement-andoni-iraola-new-head-coach)\n- [Barcelona sign Anthony Gordon – ESPN](https://www.espn.com/soccer/story/_/id/48904926/barcelona-anthony-gordon-newcastle-united-transfer)\n- [Bernardo Silva – Barcelona agreement report (Barca Universal)](https://barcauniversal.com/barcelona-reach-agreement-over-two-year-contract-with-bernardo-silva-report/)\n- [Fabrizio Romano transfer news hub – FootballTransfers (6月)](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/06/fabrizio-romano-transfer-news-big-liverpool-updates-osimhens-future-man-utd-love-tchouameni)\n- [Konate closing in on Real Madrid (The Hard Tackle, 2026/6/3)](https://thehardtackle.com/transfer-news/2026/06/03/ibrahima-konate-closing-in-on-joining-real-madrid/)\n- [Summer transfer window 2026 dates – Sky Sports](https://www.skysports.com/football/news/11095/13546220/summer-transfer-window-2026-dates-when-is-deadline-day-for-premier-league-and-efl-clubs-to-sign-players)";
document.getElementById('content').innerHTML = marked.parse(md);
document.querySelectorAll('#content table').forEach(t=>{const w=document.createElement('div');w.className='tbl-wrap';t.parentNode.insertBefore(w,t);w.appendChild(t);});
</script>
