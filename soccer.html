const md = "情報が揃いました。マークダウン形式でまとめます。\n\n---\n\n# サッカー移籍情報レポート\n**更新日：2026-05-29**\n\n\u003e **注記：** 主要リーグの夏の移籍市場は未開幕（プレミアリーグ：6/15開幕、他リーグ：7/1開幕）。現在の動きは事前合意・フリー移籍が中心。\n\n---\n\n## 完了・確認済み移籍（直近7日間）\n\n### 1. ヴァレンティン・バルコ → チェルシー\n- **FROM：** RCストラスブール（フランス）\n- **TO：** チェルシー（プレミアリーグ）\n- **移籍金：** 非公開\n- **契約：** 4〜6年（報道により差異あり）\n- **背景：** ザビ・アロンソ就任後チェルシーの**第一号補強**。20歳のアルゼンチン人MFで、ストラスブールでの成長が評価される。Romano が \"Here We Go\" を発表（5/24）。\n\n### 2. アンドリュー・ロバートソン → トッテナム *(合意済・正式発表待ち)*\n- **FROM：** リバプール（契約満了・フリー）\n- **TO：** トッテナム（プレミアリーグ）\n- **移籍金：** フリートランスファー\n- **契約：** 短期契約見込み（32歳）\n- **背景：** リバプール在籍9年で2度のPL優勝・CL制覇に貢献し退団。冬に一度破談した経緯があり、ユベントスの競合を制してスパーズが獲得。Romano が \"Here We Go\" 発表（5/28）。\n\n### 3. マルコス・セネシ → トッテナム *(口頭合意済)*\n- **FROM：** AFCボーンマス（契約満了・フリー）\n- **TO：** トッテナム（プレミアリーグ）\n- **移籍金：** フリートランスファー\n- **契約：** 詳細未公表\n- **背景：** アルゼンチン代表CB。ボーンマスとの契約終了に伴いスパーズへ。ロバートソンとともにフリーでの二枚看板補強。\n\n### 4. レオン・ゴレツカ → バイエルン退団確定\n- **FROM：** バイエルン・ミュンヘン（契約満了）\n- **移籍先：** 未定\n- **移籍金：** フリー（31歳）\n- **背景：** バイエルンが新契約を結ばないことを公式発表。欧州複数クラブが関心を示す。\n\n### 5. ベルナルド・シルバ → マンチェスター・シティ退団確定\n- **FROM：** マンチェスター・シティ（契約満了）\n- **移籍先：** 未定\n- **移籍金：** フリー\n- **背景：** シティ復帰なし確定。複数のトップクラブが争奪戦に参入予定で今夏最大の目玉の一つ。\n\n---\n\n## Here We Go！（ほぼ確実な情報）\n\n| # | 選手 | FROM | TO | 状況 |\n|---|------|------|----|------|\n| 1 | ヴァレンティン・バルコ | ストラスブール | **チェルシー** | ✅ Here We Go（5/24） |\n| 2 | アンドリュー・ロバートソン | リバプール（FA） | **トッテナム** | ✅ Here We Go（5/28） |\n| 3 | サムエル・マルティネス | アトレティコ・ナシオナル（COL） | **リバプール** | ✅ Here We Go（5/24） |\n| 4 | マルコス・セネシ | ボーンマス（FA） | **トッテナム** | ✅ 口頭合意 |\n\n---\n\n## 注目ストーリー詳細\n\n### サムエル・マルティネス（17歳）→ リバプール\nコロンビアの17歳MF。南米U-17選手権でコロンビアを優勝に導き6試合で3アシストを記録。バルセロナ・ドルトムントを競り落として約**100万ドル（約74万ポンド）**でリバプールが獲得。加入は18歳になる**2027年予定**、契約は**5年**。「次のカカ」と称される逸材。\n\n---\n\n## 注目フリーエージェント（今夏期限切れ）\n\n| 選手 | 現所属 | ポジション | 備考 |\n|------|--------|-----------|------|\n| ベルナルド・シルバ | マンシティ | MF | 最大の目玉 |\n| イブラヒマ・コナテ | リバプール | CB | 複数クラブが関心 |\n| ダヨ・ウパメカノ | バイエルン | CB | 交渉中断 |\n| マイク・マニャン | バイエルン | GK | 移籍先探し中 |\n| キーラン・トリッピア | ニューカッスル | RB | ウルブズと交渉中 |\n| レオン・ゴレツカ | バイエルン | MF | フリー確定 |\n\n---\n\n## 移籍ウィンドウ開幕日（参考）\n\n| リーグ | 開幕日 | 閉幕日 |\n|--------|--------|--------|\n| プレミアリーグ | 2026/6/15 | 2026/8/31 |\n| セリエA | 2026/6/29 | 2026/9/1 |\n| ブンデスリーガ | 2026/7/1 | 2026/8/31 |\n| ラ・リーガ | 2026/7/1 | 2026/9/1 |\n| リーグアン | 2026/7/1 | 2026/8/31 |\n\n---\n\nSources:\n- [Romano gives \u0027here we go\u0027 to Liverpool transfer bombshell (Robertson→Spurs)](https://www.empireofthekop.com/2026/05/28/romano-gives-here-we-go-to-robertson-spurs/)\n- [Chelsea agree Valentin Barco transfer - Romano](https://readchelsea.com/2026/05/24/here-we-go-fabrizio-romano-confirms-chelsea-signing/)\n- [Samuel Martinez: Liverpool closing on $1m deal](https://www.thisisanfield.com/2026/05/samuel-martinez-liverpool-transfer-agreement-atletico-nacional-2026/)\n- [Andy Robertson agrees Tottenham move - Goal.com](https://www.goal.com/en-us/lists/andy-robertson-agrees-tottenham-move-snubbing-juventus-interest/bltf04e6e42f59de312)\n- [Tottenham advancing in Robertson deal - ESPN](https://www.espn.com/soccer/story/_/id/48900541/tottenham-advancing-andy-robertson-deal)\n- [Free agents available this summer 2026 - Football365](https://www.football365.com/news/best-footballers-available-free-transfers-contract-summer-2026)\n- [When does the 2026 summer transfer window open - FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/05/summer-transfer-window-2026-date-times-open-close-premier-league-la-liga-serie-a-bundesliga-ligue-1-saudi-arabia)";
