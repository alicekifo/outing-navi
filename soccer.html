const md = "情報が揃いました。まとめます。\n\n---\n\n# ⚽ 移籍情報デイリー｜2026年5月30日\n\n---\n\n## 1. 完了した移籍（直近7日間）\n\n### 🔴 アンソニー・ゴードン　ニューカッスル → バルセロナ\n- **移籍金**：基本額 €8,000万（最大ボーナス込み €9,000万）、複数年分割払い\n- **契約年数**：5年\n- **背景**：バイエルン・ミュンヘンとの争奪戦を制したバルサが合意。ゴードンはメディカルチェックも完了済みで、発表は時間の問題。イングランド代表左ウイングの主力が一気にラ・リーガへ。\n- **その他**：ニューカッスルへの売却時にエヴァートンが保有していた売却益15%の再販条項が発動し、エバートンにも相応の収益が発生する\n- **クラブの狙い**：フリックまたは新体制でのウイング強化。財政規制がある中で分割払いでFFP対策を両立\n\n---\n\n### 🔵 ハビ・アロンソ監督就任　チェルシー\n- **就任日**：2026年7月1日（公式スタート）\n- **契約年数**：4年\n- **背景**：バイエルン・ミュンヘン行きを断りチェルシーを選択。レアル・マドリーも接触したとされるがブルーズが射止めた。レバークーゼン時代の哲学（ボール支配・ハイライン・プレッシング）をスタンフォード・ブリッジに持ち込む\n- **既存補強**：ジョバニー・クエンダ、エマニュエル・エメグハ、ダスタン・サトパエフ、デナーの4人はウィンドウ前に合意済み\n\n---\n\n### 🔵 バレンティン・バルコ　ストラスブール → チェルシー（Here We Go!確認済み）\n- **発表日**：5月24日、ファブリツィオ・ロマーノが「Here We Go!」\n- **移籍金**：詳細未公表\n- **背景**：ハビ・アロンソ体制1号補強。アルゼンチン出身の左サイドバック。バルセロナからレンタルされていたストラスブールでの活躍が評価された\n\n---\n\n## 2. Here We Go!（ほぼ確実な情報）\n\n### 🔴 アンディ・ロバートソン　リバプール（契約満了）→ トッテナム\n- **種別**：フリートランスファー\n- **ステータス**：5月28日、ロマーノが「Here We Go!」。口頭での合意に到達\n- **背景**：リバプールで9年超・370試合以上を戦ったスコットランド代表主将が退団。PL優勝・CL優勝・FAカップ・リーグカップと主要タイトルを総なめした生ける伝説が終章を迎えた\n- **条件**：スパーズの残留が条件だったが、最終節でエバートン戦1-0勝利で残留確定しトリガー発動\n- **他クラブの動き**：ユベントスがギリギリで割り込もうとしたが、スパーズが制した\n\n---\n\n### 🟡 サミュエル・マルティネス　アトレティコ・ナシオナル → リバプール\n- **種別**：国際移籍（将来型）\n- **ステータス**：ロマーノが合意確認済み\n- **詳細**：コロンビア出身17歳の逸材。18歳になる2027年に正式加入予定。南米からの有望株確保でリバプールの長期的な中盤強化\n\n---\n\n## 3. 注目の噂・移籍サガ\n\n### 🔵 アダム・ウォートン（クリスタル・パレス）\n- コンフェランスリーグ制覇の立役者となったボランチ。**レアル・マドリー、アーセナル、リバプール、マンチェスター・シティ、マンチェスター・ユナイテッドの5クラブ**が調査中とされる。今夏最大のポリシーを巡る争奪戦になる可能性\n- パレスは売却を強いられる立場ではなく、高値での売却を想定\n\n---\n\n### 🔴 エデルソン（アタランタ）→ マンチェスター・ユナイテッド\n- ブラジル人ミッドフィールダー（GKのエデルソンとは別人）がユナイテッドと個人条件で合意したと報道。複数クラブを退けてマンUを優先的に選んでいる。移籍金交渉が最終フェーズへ\n\n---\n\n### 🔵 エンツォ・フェルナンデス（チェルシー）— 売却候補\n- チェルシーは £1億2000万（€1.4億相当）の入札があれば売却を容認するとの情報。アロンソ新体制でのシステム刷新に伴い、ポジション被りが懸念される\n\n---\n\n### 🔴 グラニト・ジャカ（バイヤー・レバークーゼン）→ チェルシー？\n- アロンソがレバークーゼン無敗優勝の際の「生きた戦術書」であるジャカの招聘を希望。ただし38歳でのPL適応は課題\n\n---\n\n### ⚪ ロドリ（マンチェスター・シティ）→ レアル・マドリー？\n- バロンドーラーのレアル移籍が「現実的」との報道。マンUのルーベン・ディアスも代理人に移籍先の探索を指示\n\n---\n\n### 🔴 ホウリアン・アルバレス（アトレティコ・マドリー）— 売却候補\n- アトレティコが大規模リニューアルを計画。巨額オファーが届けばアルバレスの売却もあり得ると。バルナルド・シルバやクリスティアン・ロメーロの獲得資金に充当する構想\n\n---\n\n## 4. フリーエージェント注目株（2026年夏）\n\n| 選手 | 現所属 | ポジション | 注目度 |\n|---|---|---|---|\n| アンディ・ロバートソン | リバプール（契約終了） | LB | ★★★★☆（トッテナムで合意済）|\n| ドゥシャン・ヴラホヴィッチ | ユベントス | CF | ★★★★★（英プレミア複数が関心）|\n| ジュリアン・ブラント | ドルトムント | MF/OH | ★★★★☆（ドイツ随一のメカニクス）|\n| ダニ・カルバハル | レアル・マドリー | RB | ★★★☆☆（負傷からの回復次第）|\n| ジョン・ストーンズ | マンチェスター・シティ | CB | ★★★☆☆（離脱の可能性高まる）|\n\n---\n\n## 5. ウィンドウ開幕スケジュール（2026夏）\n\n| リーグ | 開幕 | 締切 |\n|---|---|---|\n| プレミアリーグ | 6月15日 | 9月1日 23:00 BST |\n| ラ・リーガ | 7月1日 | 9月1日 |\n| セリエA | 6月29日 | 9月1日 |\n| ブンデスリーガ | 7月1日前後 | 9月1日前後 |\n\n\u003e ※ウィンドウ開幕前でも事前合意・発表は可能なため、現在も多数の動きが進行中\n\n---\n\n**Sources:**\n- [Barcelona agree €70M transfer for Newcastle\u0027s Anthony Gordon - ESPN](https://www.espn.com/soccer/story/_/id/48891558/barcelona-submit-offer-newcastle-anthony-gordon)\n- [Anthony Gordon transfer - Sky Sports](https://www.skysports.com/football/news/11095/13548532/anthony-gordon-transfer-news-barcelona-reach-agreement-with-newcastle-for-england-international-winger)\n- [\u0027Here we go\u0027 - Fabrizio Romano confirms Chelsea signing (Barco)](https://readchelsea.com/2026/05/24/here-we-go-fabrizio-romano-confirms-chelsea-signing/)\n- [Andy Robertson closing in on Tottenham move](https://www.caughtoffside.com/2026/05/25/andy-robertson-tottenham-transfer-liverpool-exit/)\n- [Romano gives \u0027here we go\u0027 to Robertson-Spurs](https://www.empireofthekop.com/2026/05/28/romano-gives-here-we-go-to-robertson-spurs/)\n- [Summer transfer window 2026 dates - FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/05/summer-transfer-window-2026-date-times-open-close-premier-league-la-liga-serie-a-bundesliga-ligue-1-saudi-arabia)\n- [Chelsea Xabi Alonso summer plans - Football365](https://www.football365.com/news/chelsea-alonso-first-three-signings-osimhen-statement-transfer)\n- [Best free transfers summer 2026 - Football365](https://www.football365.com/news/best-footballers-available-free-transfers-contract-summer-2026)\n- [Five transfer sagas to watch - Sports Illustrated](https://www.si.com/soccer/five-transfer-sagas-watch-this-summer-2026)";
document.getElementById('content').innerHTML = marked.parse(md);
