<script>
const md = "情報が揃いました。まとめて出力します。\n\n---\n\n# ⚽ サッカー移籍情報 最新レポート｜2026年5月31日\n\n---\n\n## 1. 完了・合意済み移籍（直近7日〜直近確定情報）\n\n\u003e ※ 主要リーグのサマーウィンドウは6月中旬〜7月1日開幕のため、現時点は「合意・メディカル完了」段階の案件が中心。公式移籍日は6〜7月。\n\n---\n\n### 🔴 ジェレミー・ジャクー（Rennes → Liverpool）\n**移籍金：£5,500万 ＋ 最大£500万アドオン（総額£6,000万）**\n\n- 20歳のフランス人CB。リバプールは今冬Deadline Dayに合意・メディカル完了済みで、**7月1日に正式加入**。\n- チェルシーも同額のオファーを提示していたが、最終的にアンフィールドを選択。\n- 契約期間は5年＋クラブ側の1年オプション（〜2031/32）。\n- ファン・ダイク以来のクラブ2番目に高額なDF獲得。Arne Slotのロングターム構想の中心に据えられる見込み。\n- スカイスポーツは「ワールドクラスポテンシャルを持つCBを安値で確保できた」と評価。\n\n---\n\n### 🔴 ジェレミー・フリンポン（Bayer Leverkusen → Liverpool）\n**移籍金：€3,500万（£2,950万）＊リリース条項発動・3回分割払い**\n\n- 24歳のオランダ代表RB/WG。トレント・アレクサンダー＝アーノルドのマドリー移籍に伴う後継者として獲得。\n- リーベルクーゼン在籍4.5シーズンで190試合・30ゴール・44アシストという圧倒的な数字を残す。\n- 今季ブンデスリーガでも5ゴール6アシストと結果を出し、スロット監督が「最優先ターゲット」と直々に指名。\n- **リリース条項を発動**した素早い動きにより、争奪戦を回避。契約は6年。\n\n---\n\n### 🔵 バレンティン・バルコ（RC Strasbourg → Chelsea）\n**移籍金：約£3,000万（TransferMarkt評価額）**\n\n- 21歳のアルゼンチン人LB/MF。チェルシー傘下のストラスブールから同グループ内移籍により獲得。\n- ハビ・アロンソ就任後のチェルシーにとって**実質的な1番目の公式補強**として現地メディアで報道。\n- ブライトン時代にシーズン当初はレンタルでストラスブールへ渡り、2025年夏に完全移籍→今回さらにチェルシー本体へ昇格する形。\n- 今季リーグアンで9アシスト・3ゴール。技術力・ドリブル・ビジョンに定評があり、アロンソのポゼッション志向に合致。\n- 契約は4〜6年（報道によりばらつきあり）。\n\n---\n\n### 🔵 モイセス・カイセド（Chelsea 契約延長）\n- チェルシーが早期の契約延長に成功。**2033年6月まで延長**（改訂版）。\n- 給与アップとともに2年延長が実現。今夏のレアル・マドリーやバルセロナからの関心を事前に遮断する形に。\n\n---\n\n## 2. Here We Go!（Fabrizio Romano 確認済み・ほぼ確実）\n\n---\n\n### 🟡 アンディ・ロバートソン（Liverpool → Tottenham Hotspur）⚡FREE\n- 32歳のスコットランド代表LB。2026年6月末にリバプールとの**9年間の契約が満了**し、フリーエージェントに。\n- ユベントスも関心を示したが、ロバートソン本人がプレミアリーグ残留を希望し、スパーズを選択。\n- ロベルト・デゼルビ監督（スパーズ新指揮官）にとって**初の補強**となる見込み。\n- ファビオ・ロマーノが「スパーズが交渉をリード」と確認。**移籍金なし（フリー）**。\n- スパーズは今季辛くも降格を回避（デゼルビが就任後に立て直し）。即戦力ベテランが求められていた。\n\n---\n\n### 🟡 コール・パーマー（Chelsea → Manchester United）❓噂段階に近い\n- チェルシーのイングランド代表MFの去就が不透明。今夏最大のドラマになる可能性。\n- ロマーノはまだ\"Here We Go\"を出していないが、マンUが£120m規模のオファーを検討中と複数メディアが報道。\n- アロンソ監督はパーマーを引き留めたい考えだが、パーマー側がビッグクラブでの挑戦を望んでいると伝わる。\n\n---\n\n### 🟡 エンツォ・フェルナンデス（Chelsea → Real Madrid）💰£120m\n- 25歳のアルゼンチン代表MF。自ら「マドリーでプレーしたい」と発言し、フロレンティーノ会長が本格交渉を開始。\n- チェルシーは移籍金として£120m以上を要求。マドリー側は難色を示しているが、交渉継続中。\n- ロマーノはこの件で「進展あり」と示唆。Here We Goにはまだ至っていないが、今夏最大の目玉案件の一つ。\n\n---\n\n## 3. 主要移籍噂・ターゲット情報\n\n| 選手 | 現クラブ | 移籍先候補 | 推定金額 | ステータス |\n|---|---|---|---|---|\n| フロリアン・ヴィルツ | Bayer Leverkusen | Real Madrid / Man City / Barcelona | €120m〜 | 世界中が争奪戦 |\n| ビクトル・ヨクシェレシュ | Sporting CP | Arsenal / Barcelona | €80m | 両クラブが関心 |\n| フリアン・アルバレス | Atlético Madrid | Barcelona / Arsenal | ~€100m | アーセナルが交渉中とも |\n| ヨシュコ・グバルディオル | Manchester City | Barcelona | 未定 | バルサが熱望、シティは抵抗 |\n| エリオット・アンダーソン | Nottingham Forest | Manchester City | $87.5m | シティが争奪戦をリード |\n| ロドリ | Manchester City | Real Madrid | 未定 | 本人がマドリー関心を示唆 |\n| モルガン・ロジャーズ | Aston Villa | Arsenal | 未定 | アルテタが直接交渉リード |\n| コール・パーマー | Chelsea | Manchester United | £120m | 噂段階、動向注目 |\n| ヤン・ディオマンデ | — | PSG | 未定 | PSGがリスト最上位に |\n\n---\n\n## 4. 移籍ウィンドウ開幕スケジュール\n\n| リーグ | 開幕日 | 閉幕（予定） |\n|---|---|---|\n| プレミアリーグ | **2026年6月15日（月）** | 8月末 |\n| セリエA | 2026年6月29日（月） | 9月1日 |\n| ラ・リーガ | 2026年7月1日（水） | 9月2日 |\n| ブンデスリーガ | 2026年7月1日（水） | 8月末 |\n| リーグアン | 2026年7月1日（水） | 9月2日 |\n\n---\n\n## 5. 今夏の注目ポイント\n\n1. **リバプールの大改革**：TAA、サラー、ロバートソンが去り、フリンポン・ジャクーという若手世代へのシフト。スロット体制の本格スタート。\n2. **チェルシー＝ハビ・アロンソ新体制**：バルコ獲得を皮切りに今後さらに数枚の補強が見込まれる。ただしエンツォ・フェルナンデス流出リスクも。\n3. **ヴィルツ争奪戦**：欧州トップ3クラブが€120m以上を巡って争う今夏最大のサーガになる可能性大。\n4. **アーセナルの反撃**：プレミア優勝（今季）の勢いを維持すべく、ヨクシェレシュやロジャーズの獲得でタイトル争いに備える。\n5. **バルセロナの資金問題**：グバルディオル・ヴィルツ・アルバレスを狙いながらも財政規制との戦い継続。\n\n---\n\nSources:\n- [Jeremy Jacquet Liverpool Transfer - Sky Sports](https://www.skysports.com/football/news/11669/13502234/jeremy-jacquet-transfer-news-liverpool-sign-rennes-defender-in-lb60m-deal-with-20-year-old-moving-to-anfield-this-summer)\n- [Jeremie Frimpong Confirmed - Liverpool FC Official](https://www.liverpoolfc.com/news/liverpool-agree-signing-jeremie-frimpong-bayer-leverkusen)\n- [Fabrizio Romano - Jeremy Jacquet Here We Go (X/Twitter)](https://x.com/FabrizioRomano/status/2018086135046492531)\n- [Andy Robertson to Tottenham - ESPN](https://www.espn.com/soccer/story/_/id/48900541/tottenham-advancing-andy-robertson-deal)\n- [Andy Robertson Snubs Juventus for Spurs - Goal.com](https://www.goal.com/en-us/lists/andy-robertson-agrees-tottenham-move-snubbing-juventus-interest/bltf04e6e42f59de312)\n- [Valentín Barco Chelsea Here We Go - Chelsea News](https://chelsea.news/2026/05/chelsea-strasbourg-valentin-barco-deal-agreed/)\n- [Xabi Alonso First Chelsea Signing - beIN Sports](https://www.beinsports.com/en-us/soccer/premier-league/articles/xabi-alonso-seals-his-first-chelsea-signing-2026-05-23)\n- [Summer 2026 Transfer Predictions - OneFootball](https://onefootball.com/en/news/summer-transfer-window-2026-predictions-the-deals-that-could-shake-football-42725541)\n- [Ten Biggest Expected Transfers Summer 2026 - Football Today](https://footballtoday.com/2026/05/29/the-ten-biggest-football-transfers-expected-this-summer/)\n- [Transfer Window 2026 Opening Dates - FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/05/summer-transfer-window-2026-date-times-open-close-premier-league-la-liga-serie-a-bundesliga-ligue-1-saudi-arabia)\n- [Robertson to Spurs - Romano Here We Go - EmpireOfTheKop](https://www.empireofthekop.com/2026/05/28/romano-gives-here-we-go-to-robertson-spurs/)\n- [Frimpong Liverpool - ESPN](https://www.espn.com/soccer/story/_/id/45176222/liverpool-sign-jeremie-frimpong-trent-alexander-arnold-exit)";
document.getElementById('content').innerHTML = marked.parse(md);
