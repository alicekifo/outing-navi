const md = "情報がそろいました。まとめます。\n\n---\n\n# サッカー移籍情報レポート｜2026-05-29\n\n\u003e 注：主要リーグの夏ウィンドウは未開幕（PL: 6/15〜、セリエA: 6/29〜、ブンデス/リーガ/L1: 7/1〜）。そのため直近の動きはフリー移籍交渉・系列クラブ間取引・事前合意が中心。\n\n---\n\n## 1. 完了した移籍（直近7日間）\n\n### 1. アンディ・ロバートソン → トッテナム（フリー移籍）\n- **元クラブ：** リバプール → **移籍先：** トッテナム・ホットスパー\n- **移籍金：** フリー（契約満了）\n- **契約年数：** 未公表\n- **背景：** 32歳の左SBがリバプールで9年間の伝説的キャリアに幕を閉じた。1月時点でもスパーズへの移籍話があったが、リバプールが後継者を確保できず頓挫。今夏は契約満了で晴れて合意。ユベントスも割り込もうとしたが、ロバートソンはスパーズを選択。\n- **クラブの狙い：** 新監督ロベルト・デ・ゼルビが求める攻撃参加型左SBとして、ファーストチョイスになる見通し。フリーであることからサラリー予算に余裕が生まれる。\n- **情報源：** Fabrizio Romano（\"Here We Go\"）、ESPN\n\n---\n\n### 2. サミュエル・マルティネス（アトレティコ・ナシオナル → リバプール）\n- **移籍金：** 約$100万（約£74万）＋将来の売却時クロスセル条項\n- **契約：** 5年\n- **年齢：** 17歳（コロンビア国籍）\n- **背景：** U17南米選手権でコロンビアを優勝に導き「コロンビアのカカ」と称される攻撃的MF。複数の欧州ビッグクラブが競合する中でリバプールが争奪戦を制した。FIFA規定により18歳未満の国際移籍は不可のため**実際の合流は2027年夏**。それまではリバプールU21とユースCLでの育成計画。Sky Sportのプレッテンベルクも「ドーン・ディール」と断言。\n- **クラブの狙い：** サラー退団後の後継者育成の一環。売却条項を設定することでビジネスリスクを最小化しながら将来性への投資。\n- **情報源：** Fabrizio Romano、Florian Plettenberg (Sky Sports)、Liverpool FC公式\n\n---\n\n### 3. ヴァレンティン・バルコ（ストラスブール → チェルシー）\n- **移籍金：** 非公開（バルコはブライトンから£787万でストラスブールへの移籍実績あり）\n- **契約：** 6年\n- **年齢：** 21歳（アルゼンチン代表）\n- **背景：** ブルーCO傘下のストラスブールからの\"身内異動\"的な移籍。今季はリーグ1で38試合11ゴール関与と急成長。チェルシーは7/1から正式就任するシャビ・アロンソ体制に向けた先行補強として動いており、バルコがその第1号。\n- **クラブの狙い：** 左WB/左SBとして機能する多機能型アルゼンチン人を確保。姉妹クラブから取ることでビジネス的にも合理的。\n- **情報源：** Fabrizio Romano（\"Here We Go\"）、FootballTransfers\n\n---\n\n## 2. Here We Go！（ほぼ確実な情報）\n\n| # | 選手 | 現所属 → 移籍先 | 状況 | 情報源 |\n|---|------|----------------|------|--------|\n| 1 | **アンディ・ロバートソン** | Liverpool → Tottenham | Here We Go ✅ 口頭合意済み | Romano |\n| 2 | **ヴァレンティン・バルコ** | Strasbourg → Chelsea | Here We Go ✅ フルアグリーメント | Romano |\n| 3 | **サミュエル・マルティネス** | Atl. Nacional → Liverpool | Here We Go ✅ 正式合意 | Romano/Plettenberg |\n| 4 | **ニコ・パス** | Como → Real Madrid | 復帰条項（€1500万以下）行使へ | ESPN |\n| 5 | **デュシャン・ヴラホビッチ** | Juventus（契約満了） | バイエルン含む複数クラブが本交渉へ。6月に正式フリーエージェント化 | ESPN/Sky |\n\n---\n\n## 3. 注目の移籍噂・各クラブの動向\n\n### マンチェスター・ユナイテッド\n最大5名の補強を計画。主な優先ポジションは**中盤3名、左SB1名、控えストライカー1名**。\n- **中盤：** エリオット・アンダーソン（ノッティンガム・フォレスト）、サンドロ・トナーリ（ニューカッスル）、アダム・ワートン（クリスタル・パレス）、カルロス・バレバ（ブライトン）、アウレリアン・チュアメニ（R・マドリー）\n- **FW：** アンソニー・ゴードン（ニューカッスル、本人は大型クラブ移籍を熱望）\n- **左SB：** マイルズ・ルイス=スケリー（アーセナル）が推薦リストに\n\n### アーセナル\n- **フリアン・アルバレス**（アトレティコ・マドリー）獲得に名乗り。バルセロナとの争奪戦に。\n- **アイユーブ・ブアッディ**（リール）も関心。リバプール・マンUも競合。\n- ゴードンの獲得にもアプローチ検討中。\n\n### バイエルン・ミュンヘン\n- **デュシャン・ヴラホビッチ**（ユベントス、契約満了）に照準。父親がバイエルン首脳と面会済みと報道。ハリー・ケインが残留すれば現実的でないが、ケインに移籍話が出れば最有力ターゲットへ。\n- PSG、マンU、スパーズ、アストン・ヴィラも競合。\n\n### レアル・マドリー\n- 現状は**補強無し**の方針（幹部は現有戦力で十分と判断）。\n- **ニコ・パス**（コモ）の復帰条項（€1500万以下）行使は既定路線。\n- チュアメニ、カマビンガ、セバジョスの売却で財源確保後に追加補強の可能性。\n\n### チェルシー（シャビ・アロンソ体制へ）\n- バルコに続き追加補強を計画中。アロンソ体制は7/1に正式スタート。\n- ヤン・ディオマンデ（スポルティングCP）も候補として浮上と英メディア。\n\n---\n\n## 4. 日本人選手関連\n- **山本理仁** → フライブルク移籍が5/27更新で報告。\n- **秋山裕紀** → ダルムシュタット98への完全移籍が5/28確定。\n- 欧州各クラブ（トッテナム、フランクフルト、B・MG、ホッフェンハイム、ザンクト・パウリ等）への日本人選手の完全移籍が今夏複数完了。\n\n---\n\n**Sources:**\n- [Tottenham advancing in deal to sign Andy Robertson - ESPN](https://www.espn.com/soccer/story/_/id/48900541/tottenham-advancing-andy-robertson-deal)\n- [\"Here We Go\" Robertson to Spurs - Empire of the Kop](https://www.empireofthekop.com/2026/05/28/romano-gives-here-we-go-to-robertson-spurs/)\n- [Samuel Martinez Liverpool closing on $1m deal](https://www.thisisanfield.com/2026/05/samuel-martinez-liverpool-transfer-agreement-atletico-nacional-2026/)\n- [Liverpool official - Samuel Martinez agreement](https://www.liverpoolfc.com/news/liverpool-reach-agreement-first-summer-transfer)\n- [Barco to Chelsea: Romano Here We Go - FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/05/chelsea-transfer-news-blues-agree-deal-to-sign-valentin-barco-fabrizio-romano)\n- [Bayern eye Vlahovic - ESPN](https://www.espn.com/soccer/story/_/id/48897775/transfer-rumors-news-barcelona-want-alvarez-world-cup-gordon-deal)\n- [Man United 15 transfer targets - SportBible](https://www.sportbible.com/football/football-news/man-utd/man-utd-transfer-plans-new-signings-players-leaving-219187-20260429)\n- [Transfer window open/close dates - FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/05/summer-transfer-window-2026-date-times-open-close-premier-league-la-liga-serie-a-bundesliga-ligue-1-saudi-arabia)\n- [海外日本人選手動向 - soccer-iseki.com](https://soccer-iseki.com/soccer/oversea.html)";
document.getElementById('content').innerHTML = marked.parse(md);
