<script>
const md = "# サッカー移籍情報＆ワールドカップ2026 — 2026年7月19日号\n\n\u003e ⚠️ **補填注記**: 2026-07-11〜07-16の6号は保存障害（生成後にパイプライン後段が報告文で上書き）により記事本文が欠損している。07-17号以降も同障害が毎号発動しているが、いずれもバックアップ（`codex\\work\\news_backup\\`）から復元済みで正常に参照できる（本号も9回目の発動を検知→復元・更新済み）。欠損期間の主要確定事項は検証し直した範囲で再掲を継続する。\n\n---\n\n## 今日のハイライト\n\n1. **3位決定戦はイングランド 6-4 フランス——W杯史に残る10ゴールの乱打戦**（7/18・マイアミ）。サカがハットトリック、ベリンガムが90+8分に締めの6点目。**エムバペは2発で今大会10得点＝得点王レース単独首位に浮上**（1大会2桁得点は1970年のゲルト・ミュラー以来）\n2. **決勝は明日7/20（月）4:00 JST スペイン × アルゼンチン**。メッシ（8G4A）が得点王逆転には2得点必要——アシスト首位は維持しており、10Gで並べばA差で再逆転できる構図\n3. **ロジャーズ争奪戦は前号の大どんでん返しのまま——チェルシーがHere We Go**。ヴィラとクラブ間合意£117M（Ornstein独占＋Romano確認）、メディカルは明日7/20予定\n4. **アーセナルはスパーズの18歳CBアプソンをHere We Goで強奪**（Romano・7/18契約書サイン）。完了はアセコ→フランクフルト€12M超（7/18公式）\n\n---\n\n## 1. 完了した移籍（発表日が7/12〜7/19のもの）\n\n| # | 選手 | 移籍元 → 移籍先 | 移籍金 | 契約 | 発表日 |\n|---|------|----------------|--------|------|--------|\n| 1 | [[アセコ]]【NEW】 | バイエルン → フランクフルト | €12M（報道により〜€13M） | 2031年まで | 7/18 |\n| 2 | [[マンザンビ]] | フライブルク → アストン・ヴィラ | £59.5M（€70M・アドオン込） | 5年 | 7/17 |\n| 3 | [[ムハレモビッチ]] | サッスオーロ → リーズ | €40M（£34.1M） | 5年（2031年まで） | 7/17 |\n| 4 | [[エステーブ]] | バーンリー → RBライプツィヒ | €25M+ボーナス | 2031年まで | 7/17 |\n| 5 | [[オーバメヤン]] | マルセイユ → デポルティボ | €1.5M | 2028年まで | 7/17 |\n| 6 | [[トロサール]] | アーセナル → ベシクタシュ | €18M（£17M） | 3年+1年OP | 7/15 |\n| 7 | [[ムニエ]] | リール → サンダーランド | フリー | — | 7/15 |\n| 8 | [[グリーンウッド]] | マルセイユ → フェネルバフチェ | €39M | 4年 | 7/14 |\n| 9 | [[ティーレマンス]] | アストン・ヴィラ → マンチェスター・ユナイテッド | £35M（解除条項） | 5年 | 7/14 |\n| 10 | [[ダーロウ]] | リーズ → マンチェスター・ユナイテッド | フリー | — | 7/14 |\n\n**各件の補足:**\n\n- **アセコ → フランクフルト**: 両クラブが7/18に公式発表（Sky Sport DE独占先行→SPOX・t-online等が確認）。移籍金は€12M（t-onlineは約€13M）。20歳のドイツU21代表MFで、昨季はハノーファーへの期限付きでレギュラー定着。バイエルンはアカデミー産の放出でキャッシュを積み上げ、フランクフルトはブラウン（→バイエルン・7月上旬）売却益の再投資を継続\n- マンザンビ（ヴィラのクラブレコード£59.5M・ニューカッスルの£49M合意をハイジャック）・ムハレモビッチ・エステーブ・オーバメヤン・トロサール・ムニエ・グリーンウッド・ティーレマンス・ダーロウは前号からの再掲（いずれもクラブ公式ないしS/A級で確認済み）\n- 前号掲載の[[コッポラ]]→パリFC（€20M・7/14発表）も完了済み（枠の都合で表からは外した）\n- ※日付ガードによる除外: **アンソニー→ブレントフォード（£15M+アドオン）は7/7発表**、**アケ→フェネルバフチェは7/4-5発表**、**ダンフリース→レアル・マドリー（2030年まで）は7/5公式発表**でいずれも7日基準の期間外。検索上「今週の完了」として流通しているラモス→ミラン（6/30）・サイバリ→バイエルン（7月上旬）・ジャケ→リバプール（7/1）・ドゥブラフカ→トッテナム（6/24）等も同様に掲載しない\n\n---\n\n## 2. Here We Go!（合意ほぼ確実）\n\n1. **[[ロジャーズ]] → チェルシー**（7/18発生・本号も継続）\n   - **Romano本人ポスト（7/18 17:53・Telegram公式で直接確認）「MORGAN ROGERS TO CHELSEA, HERE WE GO!」＋Ornstein（The Athletic）独占の二重確認**\n   - ヴィラとのクラブ間（口頭）合意£117M。**アーセナルが来週出す予定だった正式オファーを先回りするハイジャック**。**メディカルは明日7/20（月）予定**・契約は2032年6月まで\n   - 決め手はチェルシーのシャビ・アロンソ監督の直接説得と報道（football365）。前号まで「アーセナルが最有力・選手もアーセナル希望」だった構図が1日で反転した\n2. **[[アプソン]] → アーセナル**（7/18発生・本号も継続）\n   - Romano本人ポスト（7/18 06:53・Telegram公式で直接確認）「Elijah Upson to Arsenal, here we go! Agreement signed today」。Goal・football365も追随\n   - トッテナムの18歳CB。新契約提示を断ってのライバル移籍（フリー扱いと報道・11年在籍に終止符）。父は元アーセナルDFのマシュー・アプソン。チェルシー・バイエルンも興味を示していた\n3. **[[シュラーガー]] → ノッティンガム・フォレスト**（前号から継続・5日目）\n   - Romano＋Ornsteinの二重確認済み。フリー・契約2028年6月まで+1年OP・メディカル完了\n   - ジャンクサイトは「7/15公式発表済み」を流し続けるが、**フォレスト公式サイトに掲載なし・S/A級での発表確認も今日取れず本欄に留め置く**（ESPNは「set to sign」を維持）\n4. **[[バルデペニャス]] → フィオレンティーナ**（前号から継続）\n   - Romano本人ポスト（7/14）: 口頭合意・€8M・2031年6月まで・レアル・マドリーが50%セルオン＋マッチライト保持\n   - マドリーは即時放出か、**モウリーニョ新監督がプレシーズンで見極めてから送り出すか**をクラブ内で検討中との報道（B級複数）——発表時期が数週間ずれる可能性\n\n---\n\n## 3. 交渉中（信頼度: ◎=ほぼ確実 ○=有力 △=一部報道 ✖=破談）\n\n1. **[[バルコラ]] → リバプール ○**\n   - **Sky Sports（A級）が「リバプールの獲得候補にバルコラ」を確認**（前号でB級一致から格上げ）。PSGが売却容認に傾く環境（FFP対応の放出フェーズ・昨季21先発止まり）も複数報道で一致\n   - **後継確保が前進**: PSGとモナコのウインガー獲得交渉が「最終段階・個人条件合意済み」（Romano・7/19ポスト）——前号でRomanoが「ポジティブ」と確認したアクリウシュ戦線の続報とみられ、バルコラ放出の前提条件がさらに整った\n   - 本人は3位決定戦でもゴール（54分）と存在感。個人条件は障害にならない見込みでアンフィールド行きに前向き。※金額（£85M準備 vs 査定£127M）は引き続きB級ソース由来で幅に注意\n2. **[[ギマランイス]] → アーセナル ○**\n   - アーセナルは「選手が加入を望んでいる」との感触を得て攻勢を強める構え（football365・Goal）。ただし**ニューカッスルは売却拒否の姿勢**で、£80M準備 vs 要求£100Mの溝は未解消\n   - ロジャーズ敗戦（→チェルシー）で中盤・攻撃の補強資金が浮く構図になり、ギマランイス戦線への影響は今後の焦点\n3. **アーセナルの左WG補強 △**\n   - Romanoの従来報道で優先1だったロジャーズが消え、優先2のバルコラはリバプールと競合中。アーセナルの次の一手は現時点でS/A級報道なし——観測のみ\n\n---\n\n## 4. ワールドカップ2026\n\n### 3位決定戦 結果: フランス 4-6 イングランド（7/18・マイアミ ハードロック・スタジアム）\n\n- **10ゴールの乱打戦をイングランドが制して3位**（Sky Sports・FIFA公式・ESPNで確定）。FIFA公式も「W杯史に残る一戦」と総括\n- **得点経過**: イングランド＝ライス3分・コンサ18分・**サカ37分/45+1分/87分PK（ハットトリック）**・ベリンガム90+8分。フランス＝**エムバペ48分/66分**・バルコラ54分・デンベレ90+6分\n- 前半0-3から後半フランスが2点差まで詰める展開を、サカのPKとベリンガムのダメ押しで振り切った\n\n### 得点王レース（3位決定戦終了時点・**首位交代**）\n\n| 選手 | G | A | 備考 |\n|------|---|---|------|\n| エムバペ（フランス） | **10** | 3※ | **単独首位に浮上**・全日程終了。1大会2桁得点は1970年G・ミュラー以来 |\n| メッシ（アルゼンチン） | 8 | 4 | 決勝あり。**2得点で10Gに並べばA差で再逆転**（FIFA規定: G→A→出場時間）・3得点で単独 |\n| ベリンガム（イングランド） | 7 | — | 3決で1G・全日程終了 |\n| ハーランド（ノルウェー） | 7 | — | 敗退済み・確定 |\n| ケイン（イングランド） | 6 | — | 3決は無得点・確定 |\n\n- ※エムバペのA数は3決分の公式集計を未確認（準決勝終了時点で3）。ただしFOXトラッカーは3決後も「アシスト首位はメッシ」を明記しており、メッシが10Gに並べた場合の逆転構図は変わらない\n- FOXのブックメーカーオッズはエムバペ-2500 vs メッシ+1200と大差——現実味は「メッシ2発」の一点勝負\n\n### 決勝: スペイン × アルゼンチン（**明日 7/20（月）4:00 JST**・NY/NJ MetLifeスタジアム）\n\n- **デ・ラ・フエンテ監督が7/18、ヤマルとポロの決勝100%フィットを明言**——「2人ともまったく問題ない。通常練習をこなした」（Romano・Goal・ESPN）。7/16別メニュー→7/17全体合流→7/18監督の完全フィット宣言と、3日かけて不安が消えた\n- **スペイン**は2010年南アフリカ以来2つ目の星を、**アルゼンチン**は2022年カタールからの連覇を狙う。**39歳メッシ × 19歳ヤマル**、国際大会でのキャリア初直接対決\n\n### 補填再掲（欠損号期間の確定結果・前号から変更なし）\n\n- **準決勝①**: スペイン 2-0 フランス（7/14・ダラス）\n- **準決勝②**: アルゼンチン 2-1 イングランド（7/15・アトランタ）——ラウタロ・マルティネス90+2分決勝点、メッシ2アシスト\n\n---\n\n## 5. 日本人選手の動向\n\n- **中村草太（サンフレッチェ広島 → ル・アーヴル）**: 7/17クラブ公式発表の期限付き移籍（2027年6月30日まで・前号既報）。ル・アーヴルでは瀬古歩夢・水多海斗に続く3人目の日本人\n- **佐野海舟（マインツ）**: リバプールが€60M（約111億円）を準備し個人条件は合意済みとの報道が継続——日本メディア（東スポ・RONSPO等）も追随し始めたが、**核はいずれも英B級ソースの転載でS/A級直接確認は今日も取れず**。マインツのディレクター「オファーは検討されるだろう」（前号既報）以降の公式進展なし。信頼度○〜△を維持\n- **久保建英（レアル・ソシエダ）**: 新規報道なし。リバプール接触説は英ファンメディア由来の△のままで、**残留・再起路線が濃厚**を維持\n\n---\n\n## 主要ソース\n\n- [Sky Sports: France 4-6 England — Saka hat-trick helps Three Lions finish third in 10-goal thriller（7/18）](https://www.skysports.com/football/news/11095/13564308/world-cup-2026-france-4-6-england-bukayo-sakas-hat-trick-helps-three-lions-finish-third-in-10-goal-thriller)\n- [FIFA公式: England beat France in ten-goal thriller — Bronze final report](https://www.fifa.com/en/tournaments/mens/worldcup/canadamexic
