<script>
const md = "---\n\n# ⚽ サッカー移籍情報まとめ｜2026年5月30日\n\n\u003e サマーウィンドウ開幕前夜。PL：6月15日〜、ラ・リーガ：7月1日〜、セリエA：6月29日〜、ブンデス・リーグアン：7月1日〜開幕。\n\n---\n\n## 1. 完了した移籍（直近7日間）\n\n### 🔴➡️🔵 アンソニー・ゴードン（Newcastle → **Barcelona**）\n- **移籍金**：£69.3m（約€80m、アドオン込み）\n- **契約年数**：5年\n- **背景**：バイエルン・ミュンヘンとの争奪戦を制してバルセロナが獲得。5月28日（木）にバルセロナの病院でメディカルを完了し、英国から専用機で渡航する様子がSky Sportsのカメラにも捉えられた。給料は現在の£150k/週から**£300k/週**へ倍増。\n- **クラブの狙い**：ポストのドリブル突破力と創造性を重視するフリック体制に合致。バイエルンの横やりを振り切っての電撃決定。発表はワールドカップ前の英国トレーニングキャンプ入り前が見込まれる。\n\n---\n\n### 🔴➡️⚪ アンディ・ロバートソン（Liverpool → **Tottenham Hotspur**）（フリー移籍）\n- **移籍金**：なし（契約満了）\n- **背景**：リバプールで9シーズン、多くのタイトルを手にしたスコットランド代表キャプテンが退団。ユベントスも最後まで熱心に口説いたが、ロバートソンはプレミアリーグ残留を選択。スパーズはロベルト・デ・ゼルビ監督の下で残留を果たしたばかりで、左SBの補強を急いでいた。\n- **クラブの狙い**：経験豊富なCL出場経験者を無償で獲得できるコスト効率の高い補強。デ・ゼルビの攻撃的サッカーに左WBとして適合する。\n\n---\n\n### 🔵➡️🔵 バレンティン・バルコ（Strasbourg → **Chelsea**）（グループ内移籍）\n- **移籍金**：BlueCo（チェルシー・ストラスブール共同オーナー）グループ内移籍のため実質無償\n- **契約年数**：6年\n- **背景**：ファブリツィオ・ロマーノが5月24日に「Here We Go!」を発表。アルゼンチン代表スタッフもW杯スカッドへの招集を検討中の21歳。元々はレフトバックだったが、ストラスブールでロージャー・ローゼンの下ミッドフィールダーに転向し才能を開花させた。\n- **クラブの狙い**：ハビ・アロンソ新体制での**最初の補強**。南米系若手タレントを活かすチェルシーのリクルート方針継続。\n\n---\n\n### 🇨🇴➡️🔴 サミュエル・マルティネス（Atletico Nacional → **Liverpool**）（将来入団）\n- **移籍金**：約$100万（約£74万）\n- **契約年数**：5年（2027年夏から有効）\n- **背景**：17歳のコロンビア人MF。4月の南米U-17選手権で圧巻のパフォーマンスを見せ「コロンビアのカカ」と称される。FIFA規定により18歳未満の国際移籍は禁止されているため、正式合流は**2027年**になる見込み。Sky SportsのプレッテンベルクとFabrizio Romanoが揃って「Done Deal」と報道。\n- **クラブの狙い**：サラー退団後を見据えた攻撃的MFのパイプライン確保。低コストで未来の原石を確保するFSGらしい投資。\n\n---\n\n## 2. Here We Go!（ほぼ確実な情報）\n\n| # | 選手 | 移籍元 → 先 | 状況 | 情報源 |\n|---|------|-------------|------|--------|\n| 1 | **アンソニー・ゴードン** | Newcastle → Barcelona | メディカル完了、発表待ち | Romano / Sky Sports |\n| 2 | **アンディ・ロバートソン** | Liverpool → Tottenham | 口頭合意・フリー | Romano confirmed |\n| 3 | **バレンティン・バルコ** | Strasbourg → Chelsea | 「Here We Go!」発令済み | Romano 5/24 |\n| 4 | **サミュエル・マルティネス** | Atletico Nacional → Liverpool | 合意済み・メディカル調整中 | Romano / Plettenberg |\n| 5 | **エンゾ・マレスカ** | Chelsea（監督）→ **Manchester City**（監督） | 3年契約署名済み | Romano confirmed |\n\n---\n\n## 3. 移籍市場の重要トピック・噂\n\n### 📍 モハメド・サラー（Liverpool離脱→次のクラブ未定）\nリバプール公式が「シーズン末での退団」を発表。残り1年の契約をアルネ・スロット監督との関係悪化を理由に破棄。「W杯が終わったら全て明らかになる」とサラー自身がコメント。現在の有力候補：\n- 🇸🇦 **サウジ・プロリーグ**（高額年俸オファー複数）\n- 🇮🇹 **ユベントス**（スパッレッティとASローマ時代に仕事、フィット感あり）\n- 🇺🇸 **MLS**（インテル・マイアミ、メッシ＆スアレスとの夢のトリオ案。エジプト系オーナーのサンディエゴFCも名乗り）\n\n---\n\n### 📍 ルベン・ディアス（Manchester City → 移籍希望）\nペップ・グアルディオラの突然の退任を受け、ディアス本人がエージェントに売却先の模索を指示。エージェントのジョルジュ・メンデスがレアル・マドリードにオファーを提示したと報道。評価額は約**€60m**。2029年まで契約が残るためシティは強気の交渉姿勢。\n- **関心クラブ**：🇪🇸 レアル・マドリード（最有力）、🇩🇪 バイエルン・ミュンヘン、🇫🇷 PSG\n\n---\n\n### 📍 サンドロ・トナーリ（Newcastle → Manchester United 移籍交渉中）\nマン・ユナイテッドが今夏最優先ターゲットの一人として積極交渉中。ニューカッスルは当初£100mを要求していたが、現在は£70〜80mのオファーで合意の可能性が浮上。ファブリツィオ・ロマーノは「マン・ユナイテッドがポール・ポジション」と報道。INEOSはMF補強に最大**€170m**規模の投資を計画中。\n\n---\n\n### 📍 コール・パーマー（Chelsea → Manchester United）→ **事実上消滅**\nパーマー本人がThe Guardianで「ただの話。見てるだけで笑える」とコメント。チェルシーも「2033年まで契約中のこのクラブの顔を売ることはない」と完全拒否。マン・ユナイテッドも「財政的に非現実的」として正式アプローチを断念。\n\n---\n\n### 📍 ヴィクトル・オシムヘン（Galatasaray）\nPSGが€75mのオファーを打診したと伝えられたが、PSGが3月に「スポーツ的にも財政的にもフィットしない」として正式に断念。ガラタサライ側は最低€150mを要求しており、マン・ユナイテッドも関心を持つが現実的なビッグムーブは夏開幕後に再評価見込み。\n\n---\n\n## 4. サマーウィンドウ開幕日程\n\n| リーグ | 開幕 | 締め切り |\n|--------|------|----------|\n| プレミアリーグ | 2026年6月15日 | 9月1日 23:00 BST |\n| セリエA | 6月29日 | 9月1日 |\n| ラ・リーガ | 7月1日 | 9月1日 |\n| ブンデスリーガ | 7月1日 | 8月31日 |\n| リーグアン | 7月1日 | 8月31日 |\n\n---\n\nSources:\n- [Anthony Gordon Barcelona medical - Sky Sports](https://www.skysports.com/football/news/11095/13548532/anthony-gordon-transfer-news-barcelona-reach-agreement-with-newcastle-for-england-international-winger)\n- [Anthony Gordon boards flight to Barcelona - Sky Sports](https://www.skysports.com/football/video/30998/13548706/exclusive-anthony-gordon-boards-flight-to-barcelona-to-complete-medical)\n- [Barcelona agree £69m for Gordon - RTE](https://www.rte.ie/sport/soccer/2026/0527/1575605-anthony-gordon-newcastle-to-barcelona/)\n- [Andy Robertson agrees Tottenham move - Goal.com](https://www.goal.com/en-us/lists/andy-robertson-agrees-tottenham-move-snubbing-juventus-interest/bltf04e6e42f59de312)\n- [Tottenham advancing Robertson deal - ESPN](https://www.espn.com/soccer/story/_/id/48900541/tottenham-advancing-andy-robertson-deal)\n- [Romano \"Here We Go\" Robertson to Spurs - Empire of the Kop](https://www.empireofthekop.com/2026/05/28/romano-gives-here-we-go-to-robertson-spurs/)\n- [Chelsea agree Valentin Barco deal - FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/05/chelsea-transfer-news-blues-agree-deal-to-sign-valentin-barco-fabrizio-romano)\n- [Samuel Martinez to Liverpool done deal - Caught Offside](https://www.caughtoffside.com/2026/05/25/samuel-martinez-liverpool-transfer-done-deal/)\n- [Mohamed Salah leaving Liverpool - Sky Sports](https://www.skysports.com/football/news/11669/13523995/mohamed-salah-liverpool-forward-to-leave-premier-league-club-at-the-end-of-the-season)\n- [Salah next club - This is Anfield](https://www.thisisanfield.com/2026/05/mo-salah-next-club-transfer-update-everything-clear-2026/)\n- [Ruben Dias wants Man City exit - Caught Offside](https://www.caughtoffside.com/2026/05/28/ruben-dias-man-city-real-madrid/)\n- [Ruben Dias Real Madrid - Goal.com](https://www.goal.com/en-us/lists/ruben-dias-man-city-transfer-demand-pep-guardiola-real-madrid/blt42163d9b497e7c9a)\n- [Sandro Tonali Man United - The Peoples Person](https://thepeoplesperson.com/2026/05/23/sandro-tonali-man-united-take-major-step-to-sign-newcastle-star-310525/)\n- [Cole Palmer Chelsea not for sale - Football365](https://www.football365.com/news/chelsea-manchester-united-cole-palmer)\n- [Victor Osimhen PSG €150m - SoccerNet](https://soccernet.ng/2026/05/osimhen-psg-galatasaray-ramos-nigeria.html)\n- [Summer transfer window dates - FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/05/summer-transfer-window-2026-date-times-open-close-premier-league-la-liga-serie-a-bundesliga-ligue-1-saudi-arabia)";
document.getElementById('content').innerHTML = marked.parse(md);
