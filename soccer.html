.model-tabs{display:flex;gap:4px;}

<script>
const md = "十分な情報が集まりました。レポートを作成します。\n\n---\n\n# ⚽ サッカー移籍情報レポート｜2026年6月7日（土）\n\n---\n\n## ✅ 完了した移籍（5月31日〜6月7日）\n\n| 選手 | 移籍元 | 移籍先 | 移籍金 | 契約 | 発表日 |\n|---|---|---|---|---|---|\n| イブラヒマ・コナテ | リバプール（ENG） | レアル・マドリード（ESP） | フリー | 4年 | 2026/6/2〜5頃 |\n| マリク・ティルマン | バイエルン・ミュンヘン（GER） | バイヤー・レバークーゼン（GER） | €35〜40m | 長期 | 2026/6初旬 |\n\n**コナテ**：5月31日にリバプールからの退団が公式確認された直後、マドリードとの4年契約合意が複数S/A級ソースで報告。フリートランスファー成立。クラブ会長選（6月7日投開票）後の正式発表が見込まれる。\n\u003e ソース：Fabrizio Romano（S）、Sky Sports（A）、Yahoo Sports（A）、ManagingMadrid（B）\n\n**ティルマン**：Romanoが「Here We Go」を発信後、レバークーゼン公式Instagramがクラブ加入を発表。クラブ移籍金記録となる。バイエルンに買戻し条項付き。\n\u003e ソース：Fabrizio Romano（S）、Bayer Leverkusen公式（S）、Fox Sports（A）\n\n---\n\n## 🚨 Here We Go!（合意ほぼ確実）\n\n| 選手 | 現所属 | 移籍先 | 移籍金 | Romano発信日 |\n|---|---|---|---|---|\n| ジェレミー・ジャケ | スタッド・ランス（FRA） | リバプール（ENG） | €60m＋アドオン€10m | 2026年6月 |\n| ジャウエン | スタッド・ドゥ・ランス（FRA） | ニューカッスル（ENG） | £24m | 2026年6月5日 |\n\n**ジャケ**：Romano「Deal agreed for June 2026. One of the most talented CBs in the world.」と発信。個人条件・移籍金ともに合意済み。ウィンドウ開幕（6月15日）後に正式発表予定。コナテ退団後のCB補強最優先ターゲット。\n\u003e ソース：Fabrizio Romano（S）\n\n**ジャウエン**：6月5日にRomanoが「Deal done and here we go」を発信。チェルシーも獲得を競っていたが、ニューカッスルが競争を制した。\n\u003e ソース：Fabrizio Romano（S）、readchelsea.com経由（B）\n\n---\n\n## 🔄 交渉中（直近14日以内の報道）\n\n| 選手 | 現所属 | 移籍先候補 | 信頼度 |\n|---|---|---|---|\n| モハメド・サラー | リバプール（契約満了） | ユベントス（本命）、サウジアラビア | ★★★☆☆ |\n| ベルナルド・シルバ | マンチェスター・シティ（契約満了） | バルセロナ（本人希望）、ユベントス | ★★★★☆ |\n| ロベルト・レバンドフスキ | バルセロナ（契約満了） | ACミラン（最有力）、ポルト | ★★★☆☆ |\n| ロドリ | マンチェスター・シティ | レアル・マドリード | ★★☆☆☆ |\n\n**サラー**：リバプールとの関係悪化により退団確定。ユベントスが本格交渉中（goal.com・A級）。サウジアラビアも依然として選択肢。行き先は未確定。\n\n**ベルナルド・シルバ**：9年間在籍したシティを契約満了で退団。バルセロナ行きを強く希望し給与削減も容認する姿勢。ユベントス・アトレティコ・PSGも関心を示す。\n\u003e ソース：goal.com（A）、tribuna.com（B）\n\n**レバンドフスキ**：5年間在籍したバルセロナを契約満了で退団。ACミランとのフリー移籍が最有力との複数報道あり。ポルトもダークホース。\n\u003e ソース：goal.com（A）、tribuna.com（B）\n\n**ロドリ**：マンシティとマドリードの直接交渉が行われている（OneFootball・A級）。ただし、Marca記者がフロレンティーノ・ペレスは獲得に積極的でないと報告。信頼度は現時点で低め。\n\n---\n\n## 📅 2026年夏ウィンドウ日程（参考）\n\n| リーグ | 開幕 | 締切 |\n|---|---|---|\n| プレミアリーグ | 6月15日 | 9月1日 23:00 BST |\n| セリエA | 6月29日 | 9月1日 |\n| ラ・リーガ | 7月1日 | 9月1日 |\n| ブンデスリーガ | 7月1日 | 8月31日 19:00 BST |\n\n\u003e ⚠️ バレンティン・バルコのチェルシー移籍（Romano確認・6年契約）は5月23日報告のため、7日間ルール（R1）により「完了した移籍」セクションの対象外。正式発表はウィンドウ開幕後見込み。\n\n---\n\nSources:\n- [Fabrizio Romano: Jeremy Jacquet to Liverpool, here we go!](https://x.com/FabrizioRomano/status/2018086135046492531)\n- [Deal done and here we go – Romano confirms bad news for Chelsea (readchelsea.com, 2026/06/05)](https://readchelsea.com/2026/06/05/deal-done-here-we-go-fabrizio-romano-confirms-chelsea/)\n- [Ibrahima Konate agrees free transfer to Real Madrid – This Is Anfield](https://www.thisisanfield.com/2026/06/ibrahima-konate-agrees-real-madrid-free-transfer-2026/)\n- [Real Madrid reach agreement to sign Ibrahima Konaté – Yahoo Sports](https://sports.yahoo.com/articles/real-madrid-reach-agreement-sign-141000936.html)\n- [Ibrahima Konate transfer news – Sky Sports](https://www.skysports.com/transfer/news/12691/13550223/ibrahima-konate-transfer-news-defender-edges-closer-to-joining-real-madrid-as-talks-continue-with-laliga-giants)\n- [Bayer Leverkusen Signs Malik Tillman for Club-Record Fee – Fox Sports](https://www.foxsports.com/stories/soccer/bayer-leverkusen-signs-u-s-midfielder-malik-tillman-club-record-fee)\n- [Fabrizio Romano: Malik Tillman to Bayer Leverkusen, here we go!](https://x.com/FabrizioRomano/status/1939587960963272782?lang=en)\n- [Mohamed Salah, Lewandowski, Bernardo Silva \u0026 10 club legends confirmed to leave – Tribuna.com](https://tribuna.com/en/blogs/mohamed-salah-robert-lewandowski-bernardo-silva-more-10-club/)\n- [Rodri transfer: direct communication between Man City and Real Madrid – OneFootball](https://onefootball.com/en/news/where-direct-communication-between-man-city-and-real-madrid-has-left-rodri-transfer-42973281)\n- [Transfer window 2026 – Sky Sports](https://www.skysports.com/football/news/11095/13546618/transfer-news-summer-transfer-window-2026-premier-league-deals-ins-and-outs)";
document.getElementById('content').innerHTML = marked.parse(md);
document.querySelectorAll('#content table').forEach(t=>{const w=document.createElement('div');w.className='tbl-wrap';t.parentNode.insertBefore(w,t);w.appendChild(t);});
</script>
