const md = "---\n\n# ⚽ サッカー移籍情報 — 2026年6月5日\n\n---\n\n## ✅ 完了した移籍（直近7日間: 5/29〜6/5）最大10件\n\n### 1. ラスムス・ホイルンド（デンマーク / FW / 23歳）\n**Manchester United → SSC Napoli（セリエA）**\n\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €5,000万（ローン料€600万 + 買取€4,400万） |\n| 発表日 | 2026年6月3日 |\n| ソース | beIN SPORTS / ESPN / CaughtOffside（A級×3） |\n\n2025/26シーズンのローン中に44試合16ゴール8アシストと活躍。ナポリのセリエA2位フィニッシュ（CL出場権獲得）が買取義務の発動条件。\n\n---\n\n### 2. アンソニー・ゴードン（イングランド / MF-FW / 25歳）\n**Newcastle United → FC Barcelona（ラ・リーガ）**\n\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €7,000万（アドオン込み最大€8,000万） |\n| 契約年数 | 5年 |\n| 発表日 | 2026年5月29日 |\n| ソース | Sky Sports / ESPN / beIN SPORTS（A級×3） |\n\nバイエルンとリバプールも関心を示したが、バルサが最終的に競り落とした。ハンジ・フリック体制での最初の大型補強。\n\n---\n\n### 3. ジェレミー・ジャケ（フランス / CB / 22歳）\n**Stade Rennais → Liverpool FC（プレミアリーグ）**\n\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €6,000万（アドオン最大€7,000万） |\n| 発表日 | 2026年6月上旬（Liverpool FC公式発表） |\n| 合流予定 | 2026年7月1日 |\n| ソース | Liverpool FC公式発表 / Fabrizio Romano（S級×2） |\n\nフランスU-21代表。コナテ退団に伴うCB補強の核として獲得。Romano が \"Here We Go\" を宣言後、クラブが正式合意を発表。\n\n---\n\n**※該当する追加件数はありません（6/5時点で7日以内に公式発表されたトップ5リーグの完了移籍は上記3件のみ確認）**\n\n---\n\n## 🚨 Here We Go!（成立ほぼ確実 / 直近14日以内）最大8件\n\n### 1. イブラヒマ・コナテ（フランス / CB / 27歳）\n**Liverpool FC → Real Madrid（ラ・リーガ）**\n\n- 種別：フリートランスファー（契約満了）\n- Romano確認日：**2026年6月2日**\n- 内容：4年契約で口頭合意済み。フロレンティーノ・ペレス会長の再選投票（日程近々）通過後に正式発表の見込み\n- ソース：Fabrizio Romano（S級） / FOX Sports / Goal.com（A級×2）\n\n---\n\n### 2. アンドリュー・ロバートソン（スコットランド / LB / 32歳）\n**Liverpool FC → Tottenham Hotspur（プレミアリーグ）**\n\n- 種別：フリートランスファー（契約満了）\n- 内容：口頭合意済み。1月に一度交渉したが不成立、今夏フリーで着地\n- ソース：Fabrizio Romano（S級） / Liverpool.com（B級）\n\n---\n\n**※上記2件以外に7日以内の信頼できるHere We Go報告は確認されていません**\n\n---\n\n## 🔄 交渉中・注目の動向（信頼度付き）\n\n### 1. モハメド・サラー（エジプト / RW / 34歳）【信頼度：★★★】\n- **状況**：Liverpool FC契約満了でフリーエージェント。次クラブ未決定\n- **本人コメント**：「まだ状況を見極めている。ワールドカップ後に全てが明らかになるだろう」\n- **候補先**：サウジPro League（複数クラブ）、ACミラン、ASローマ、MLS（San Diego FC）\n- ソース：Al Jazeera / ThisIsAnfield / Yahoo Sports（A〜B級）\n\n---\n\n## 📋 補足情報\n\n**夏の移籍ウィンドウ開幕日（参考）**\n\n| リーグ | 開幕 | 締切 |\n|--------|------|------|\n| プレミアリーグ | 2026年6月15日 | 9月1日 23:00 BST |\n| セリエA | 2026年6月29日 | 9月1日 |\n| ラ・リーガ | 2026年7月1日 | 9月1日 |\n| ブンデスリーガ | 2026年7月1日 | 8月31日 |\n| リーグアン | — | 9月1日 |\n\n\u003e ⚠️ **注記**：本日2026年6月5日時点でプレミア・ブンデス・ラ・リーガ等の公式ウィンドウは未開幕のため、現在公表されている完了移籍は各クラブが先行合意・事前発表した案件に限られます。\n\n---\n\n**Sources:**\n- [Liverpool agree deal to sign Jeremy Jacquet - Liverpool FC official](https://www.liverpoolfc.com/news/liverpool-agree-deal-sign-jeremy-jacquet)\n- [Fabrizio Romano \"Here we go\" – Jeremy Jacquet to Liverpool](https://x.com/FabrizioRomano/status/2018086135046492531)\n- [Ibrahima Konate nearing Real Madrid move – FOX Sports](https://www.foxsports.com/stories/soccer/ibrahima-konate-closes-in-on-real-madrid-move-just-days-after-confirmation-of-liverpool-exit)\n- [Ibrahima Konate agrees Real Madrid free transfer – ThisIsAnfield](https://www.thisisanfield.com/2026/06/ibrahima-konate-agrees-real-madrid-free-transfer-2026/)\n- [Rasmus Hojlund to Napoli permanent – beIN SPORTS](https://www.beinsports.com/en-us/soccer/serie-a/articles/rasmus-hojlund-signs-with-napoli-on-a-permanent-transfer-from-manchester-united-for-58-million-after-a-successful-loan-2026-06-03)\n- [Official: Napoli confirm permanent Hojlund move – football-italia.net](https://football-italia.net/official-napoli-permanent-hojlund-move-man-utd/)\n- [Rasmus Hojlund seals permanent move to Napoli – ESPN](https://www.espn.com/soccer/story/_/id/48955010/rasmus-hojlund-seals-permanent-move-napoli-manchester-united)\n- [Anthony Gordon officially joins FC Barcelona – beIN SPORTS](https://www.beinsports.com/en-us/soccer/la-liga/articles/anthony-gordon-officially-joins-fc-barcelona-2026-05-29)\n- [Barcelona sign Anthony Gordon – ESPN](https://www.espn.com/soccer/story/_/id/48904926/barcelona-anthony-gordon-newcastle-united-transfer)\n- [Anthony Gordon transfer – Sky Sports](https://www.skysports.com/football/news/11095/13548577/anthony-gordon-transfer-news-barcelona-reach-agreement-with-newcastle-for-england-international-winger)\n- [Andy Robertson next club – Tottenham – Liverpool.com](https://www.liverpool.com/liverpool-fc-news/transfer-news/andy-robertson-tottenham-transfer-agreement-34022126)\n- [Mohamed Salah next club options – Al Jazeera](https://www.aljazeera.com/sports/2026/3/25/why-is-mohamed-salah-leaving-liverpool-and-which-club-will-he-join-next)\n- [Summer transfer window 2026 dates – ESPN](https://www.espn.com/soccer/story/_/id/48833505/when-does-summer-transfer-window-close-premier-league-serie-laliga-bundesliga-ligue-1)";
