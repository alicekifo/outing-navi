<script>
const md = "情報が揃ったので、レポートを作成します。\n\n---\n\n# ⚽ サッカー移籍情報デイリーレポート\n**2026年6月2日（月）｜通常期**\n\n---\n\n## 1. 完了した移籍（直近7日間：5/26〜6/2）\n\n### ① アンソニー・ゴードン　ニューカッスル → FCバルセロナ\n| 項目 | 内容 |\n|---|---|\n| 移籍金 | €70m（オプション含め最大£69m≒€80m） |\n| 契約年数 | 5年 |\n| 発表日 | 2026年5月27〜29日 |\n| 出典 | ESPN（A級）、Sky Sports（A級）、ニューカッスル公式（S級） |\n\nハンジ・フリック監督のバルセロナが主力補強として獲得。ラミン・ヤマル、ラフィーニャとの共存が見込まれる。イングランド代表の25歳WFで、バイエルン・ミュンヘンとリバプールも争奪に加わっていたが、バルサが制した。\n\n---\n\n## 2. Here We Go!（合意ほぼ確実）\n\n### ① アンディ・ロバートソン　リバプール → トッテナム・ホットスパー\n| 項目 | 内容 |\n|---|---|\n| 移籍金 | FREE（契約満了） |\n| Romano報告日 | 2026年5月28日 |\n| 出典 | Fabrizio Romano（S級）、ESPN（A級） |\n\nRomano：「全条件が合意済みの口頭合意。ただし**スパーズのPL残留**が正式手続き進行の前提条件**」**。32歳の左SBがリバプール9年の在籍を終え北ロンドンへ。ユベントスも争奪に加わったが本人がスパーズを選択。公式発表は今後2週間以内の見込み。\n\n---\n\n## 3. 交渉中・噂\n\n### ① エンソ・フェルナンデス（チェルシー）の移籍交渉\n- **状況**：本人がチェルシー退団を希望。Real Madrid（本人優先）とMan City（マレスカ監督が熱望）が争奪\n- **チェルシーの要求額**：€120m（取得額と同額）\n- **障壁**：レアルもシティも£120m提示に及び腰\n- **報道日**：2026年5月26〜28日 ｜ 出典：beIN SPORTS（A級）、football365（B級）、CaughtOffside（B級）\n- 信頼度：★★☆（退団意志は複数確認、行先は未定）\n\n### ② マルク・ククレジャ（チェルシー）のラ・リーガ復帰交渉\n- **状況**：退団意向を固める。アトレティコ・マドリー、バルセロナ、レアル・マドリーの3クラブが関心\n- **報道日**：2026年6月初旬 ｜ 出典：footballtransfers.com（B級）\n- 信頼度：★★☆（興味を示すクラブ多数だが移籍先未定）\n\n### ③ マーカス・ラッシュフォード（チェルシーFC /現在バルセロナにローン中）\n- **状況**：バルセロナが6月15日までに£26mのオプション行使権を保有。永久移籍か追加ローンかを検討中\n- **報道日**：2026年5月29日 ｜ 出典：Sky Sports（A級）\n- 信頼度：★★☆（期限明確、ただし方針未決定）\n\n---\n\n## 4. 注目フリートランスファー候補（契約満了）\n\n| 選手 | 現在地 | 状況 |\n|---|---|---|\n| モハメド・サラー | リバプール | 6月末で契約満了、新天地探し中 |\n| ベルナルド・シウバ | マンチェスター・シティ | 6月末で契約満了、退団確定 |\n| デイビッド・アラバ | レアル・マドリー | 6月末で契約満了、退団確定 |\n| マーカス・ラッシュフォード | マン・ユナイテッド（バルサにローン中）| バルサのオプション行使期限：6月15日 |\n\n---\n\n## 5. 注目動向\n\n- **レアル・マドリー**：クラブ会長選挙（6月7日）直後に今夏初のサイン発表を予定（football-espana.net, 5月30日）。ホセ・モウリーニョが新監督に就任予定（The Athletic確認）。\n- **リバプール**：次期監督にアンドニ・イラオラとの交渉が「前進」（Sky Sports、5月末）。\n- **マンチェスター・ユナイテッド**：マイケル・カリックを正式監督に承認、中盤補強に約€170mを投入予定（Ederson、Tchouameniら複数名ターゲット）。\n\n---\n\n\u003e **移籍ウィンドウ開幕日（参考）**\n\u003e プレミアリーグ：6月15日｜セリエA：6月29日｜ラ・リーガ・ブンデス：7月1日\n\n---\n\n## ⚠️ 免責・注意事項\n\n- 夏ウィンドウは**まだ未開幕**（6/2時点）のため、確定移籍件数は限られます。\n- Jeremy Jacquet（RennesからLiverpoolへの移籍）はFebruary 2026に合意済みですが、ニュース公開が**7日以上前**のためR1規則により掲載外としています。\n- Serie Aの小規模移籍複数件については日付の独立検証ができなかったため掲載を見送りました。\n\n---\n\nSources:\n- [Barcelona sign Anthony Gordon from Newcastle in €70m transfer - ESPN](https://www.espn.com/soccer/story/_/id/48904926/barcelona-anthony-gordon-newcastle-united-transfer)\n- [Anthony Gordon transfer news - Sky Sports](https://www.skysports.com/transfer/news/12691/13548532/anthony-gordon-transfer-news-forward-in-barcelona-for-medical-after-laliga-side-reach-agreement-with-newcastle-for-england-international)\n- [Anthony Gordon signs for Barcelona - Newcastle United Official](https://www.newcastleunited.com/en/news/anthony-gordon-signs-for-barcelona)\n- [Fabrizio Romano on Andy Robertson - X](https://x.com/FabrizioRomano/status/2042911157246128581)\n- [Romano gives \u0027here we go\u0027 to Robertson-Spurs - Empire of the Kop](https://www.empireofthekop.com/2026/05/28/romano-gives-here-we-go-to-robertson-spurs/)\n- [Tottenham advancing in deal to sign Andy Robertson - ESPN](https://www.espn.com/soccer/story/_/id/48900541/tottenham-advancing-andy-robertson-deal)\n- [Enzo Fernandez wants to leave Chelsea - beIN SPORTS](https://www.beinsports.com/en-us/soccer/premier-league/articles/enzo-fern%C3%A1ndez-wants-to-leave-chelsea-and-real-madrid-already-knows-his-price-2026-05-28)\n- [Chelsea transfer news - Cucurella - FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/06/chelsea-transfer-news-marc-cucurella-atletico-madrid-barcelona-real-madrid-xabi-alonso-talks-summer-2026)\n- [Marcus Rashford Barcelona option - Sky Sports](https://www.skysports.com/football/news/33694/13548681/manchester-united-transfer-news-marcus-rashford-could-still-re-join-barcelona-despite-anthony-gordon-deal-but-julian-alvarez-a-factor)\n- [Real Madrid plan first signing after elections - football-espana.net](https://www.football-espana.net/2026/05/30/real-madrid-plan-to-announce-first-signing-immediately-after-elections)\n- [Summer 2026 transfer window dates - Sky Sports](https://www.skysports.com/football/news/11095/13546220/summer-transfer-window-2026-dates-when-is-deadline-day-for-premier-league-and-efl-clubs-to-sign-players)";

</script>
