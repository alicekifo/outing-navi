const md = "---\n\n# サッカー移籍情報レポート　2026/5/30\n\n---\n\n## 1. 完了した移籍（直近7日間）\n\n\u003e ⚠️ 夏のウィンドウ未開幕（PL: 6/15〜）のため、現時点での「完了」は口頭/個人合意ベースが多い。\n\n### Andy Robertson　リバプール → トッテナム　🆓 フリー\n- **契約年数:** 公式発表待ち（6月30日付でLFC契約終了）\n- **週給:** £160,000\n- **背景:** Robertson はプレミアリーグ残留を条件に Spurs との口頭合意に至った。Juventus が割り込みを試みたが「プレミアで続けたい」として拒否。De Zerbi 体制下でベテランLBとして再スタート。\n- **クラブの狙い:** ポゼッション重視のDe Zerbiが要求するインテンシティの高いLBを実績・経験込みで格安確保。\n- **情報源:** Fabrizio Romano \"Here We Go\" / Yahoo Sports / TeamTalk\n\n---\n\n### Valentin Barco　ストラスブール → チェルシー\n- **移籍金:** 非公表（Chelsea は公式発表前のプレウィンドウ発表）\n- **契約年数:** 未公表\n- **背景:** アルゼンチン代表候補の左SB。Chelsea が今夏5人目の補強として合意。Enzo Maresca 体制で左サイドの競争激化。\n- **情報源:** Fabrizio Romano / Read Chelsea / Football365\n\n---\n\n### Samuel Martínez　→ リバプール（2027年合流）\n- **出身:** コロンビア、アトレティコ・ナシオナル所属\n- **年齢:** 17歳（18歳誕生日を迎える2027年に正式加入）\n- **移籍金:** 公表なし\n- **背景:** \"新世代カカー\" と称されるFW/AM。FSGが将来投資として先行確保。\n- **情報源:** TeamTalk / Empire of the Kop\n\n---\n\n## 2. Here We Go!（ほぼ確実な情報）\n\n| # | 選手 | From → To | 形態 | 状況 |\n|---|------|-----------|------|------|\n| 1 | **Andy Robertson** | Liverpool → Tottenham | フリー | ✅ Romano確認済 |\n| 2 | **Valentin Barco** | Strasbourg → Chelsea | 移籍金あり | ✅ Romano確認済 |\n| 3 | **Bernardo Silva** | Man City → Barcelona | フリー | 🟡 合意寸前・契約条件合意 |\n| 4 | **Ibrahima Konate** | Liverpool → Real Madrid | フリー | 🟡 リバプール側は延長交渉断念 |\n| 5 | **Elliot Anderson** | Nottingham Forest → Man City | £80–100M級 | 🟡 個人合意、クラブ間交渉中 |\n| 6 | **Julian Brandt** | Borussia Dortmund → TBD | フリー | 🟡 BVBが契約延長せず発表済 |\n\n---\n\n## 3. 注目の交渉・噂\n\n### Elliot Anderson（ノッティンガム・フォレスト → マンチェスター・シティ）\n- **現状:** 個人合意（2031年まで）は成立済。残るはクラブ間の移籍金交渉。\n- **フォレスト要求額:** £90M〜£125M（報道によりばらつきあり）。Declan Rice の英国人最高移籍金記録（£105M）を超える可能性。\n- **シティの動き:** ワールドカップ出発前（6月初旬）に決着させたい意向。\n- **背景:** 今季フォレストの中盤を支配し、イングランド代表WC招集も決定。Man Utd・Arsenal も関心を示したが、シティが本命。\n\n---\n\n### Bernardo Silva（マンチェスター・シティ → バルセロナ）\n- **現状:** 2年+オプション1年の個人合意が報道。ユベントスは最終節のCL圏外確定で脱落。\n- **給与:** 現在の年俸€16Mから€8M（ただしサインオンボーナスで補填）\n- **背景:** 9年間のシティキャリアに終止符。バルサのスペイン語圏環境・アルテタ戦術との親和性を選択。\n- **情報源:** French Football Weekly / ESPN / TransferFeed\n\n---\n\n### Julian Álvarez（アトレティコ・マドリード → バルセロナ？）\n- **現状:** Barca が€100M級の第一オファーを準備中とされる。\n- **背景:** 昨夏アトレティコへ移籍したばかりだが、Barca が本格的な関心を持つ稀なケース。移籍すればラ・リーガ内のクラブ間移籍。\n\n---\n\n### Enzo Fernández（チェルシー → ？）\n- **現状:** 本人がChelseaの将来に疑念を公言。Real Madrid・Man City が接触中と報道。\n- **買収額:** 2023年に£107Mで加入したが期待以下のパフォーマンスが続く。\n\n---\n\n### Ibrahima Konate（リバプール → レアル・マドリード）\n- **現状:** 延長交渉が決裂、フリーでのRM移籍がほぼ確実視。\n- **代替候補:** Liverpool は Bremer（ユベントス）をリストアップ。\n\n---\n\n## 4. 注目のフリーエージェント（2026年6月30日契約満了）\n\n| 選手 | 現所属 | ポジション | 有力候補 |\n|------|--------|-----------|---------|\n| **Bernardo Silva** | Man City | MF | Barcelona（合意寸前） |\n| **Andy Robertson** | Liverpool | LB | Tottenham（合意済） |\n| **Ibrahima Konate** | Liverpool | CB | Real Madrid（濃厚） |\n| **Julian Brandt** | Dortmund | MF | 交渉中 |\n| **Leon Goretzka** | Bayern Munich | MF | 複数クラブ |\n| **Marc Guehi** | Crystal Palace | CB | 複数クラブ |\n| **Dusan Vlahovic** | Juventus | FW | 複数クラブ |\n| **Paulo Dybala** | Roma | AM | 欧州復帰候補 |\n\n---\n\n## 5. 移籍ウィンドウ日程（2026夏）\n\n| リーグ | 開幕 | 閉幕 |\n|--------|------|------|\n| プレミアリーグ | **6月15日** | **9月1日 23:00 BST** |\n| セリエA | 6月29日 | TBD |\n| ラ・リーガ | 7月1日 | TBD |\n| ブンデスリーガ | TBD | TBD |\n\n\u003e ⚠️ ウィンドウ開幕前でも個人合意・事前公表はPL規定で認められている。\n\n---\n\nSources:\n- [Tottenham agree deal to sign Andrew Robertson on a free transfer - Yahoo Sports](https://sports.yahoo.com/articles/tottenham-agree-deal-sign-andrew-195000450.html)\n- [\u0027Here we go\u0027 - Fabrizio Romano confirms Chelsea signing (Barco) | Read Chelsea](https://readchelsea.com/2026/05/24/here-we-go-fabrizio-romano-confirms-chelsea-signing/)\n- [\"It\u0027s happening\" – Romano gives \u0027here we go\u0027 to Robertson-Spurs | Empire of the Kop](https://www.empireofthekop.com/2026/05/28/romano-gives-here-we-go-to-robertson-spurs/)\n- [FC Barcelona is close to completing the transfer of Bernardo Silva | French Football Weekly](https://frenchfootballweekly.com/2026/05/29/fc-barcelona-is-close-to-completing-the-transfer-of-bernardo-silva/)\n- [Elliot Anderson closing in on £80M Manchester City transfer | OneFootball](https://onefootball.com/en/news/elliot-anderson-closing-in-on-80m-manchester-city-transfer-after-nottingham-forest-talks-42928276)\n- [Man City: Elliot Anderson reaches \u0027agreement in principle\u0027 | FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/05/man-city-elliot-anderson-reaches-agreement-in-principle-to-sign)\n- [Premier League summer transfer window 2026 dates | FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/05/summer-transfer-window-2026-date-times-open-close-premier-league-la-liga-serie-a-bundesliga-ligue-1-saudi-arabia)\n- [Five Transfer Sagas to Watch Out for This Summer | Sports Illustrated](https://www.si.com/soccer/five-transfer-sagas-watch-this-summer-2026)\n- [Best footballers out of contract 2026 | Football365](https://www.football365.com/news/best-footballers-available-free-transfers-contract-summer-2026)\n- [Elliot Anderson to Man City \u0027done deal\u0027 | Goal.com](https://www.goal.com/en/lists/elliot-anderson-man-city-done-deal-nottingham-forest-demand-90m/bltde164b8df34578ad)";
document.getElementById('content').innerHTML = marked.parse(md);
