const md = "# サッカー移籍情報 \u0026 ワールドカップ2026 デイリーまとめ\n**2026年6月30日（火）**\n\n---\n\n## 🌍 ワールドカップ2026 特集\n\n### ラウンド・オブ・32 進行中\n\nグループステージ全48試合が終了し、決勝トーナメント1回戦（ラウンド・オブ・32）が進行中。本大会はアメリカ・カナダ・メキシコの3ヵ国共催で、史上初の48チーム参加フォーマット。\n\n### 確定済みの結果（〜6月29日）\n\n| 日付 | 対戦 | 結果 | メモ |\n|------|------|------|------|\n| 〜6/28 | カナダ vs 南アフリカ | **1-0** カナダ | イウスタキウ 90+2\u0027 劇的弾 |\n| 〜6/28 | ブラジル vs 日本 | **2-1** ブラジル | カゼミーロ・マルティネッリが逆転弾 |\n| 6/29 | オランダ vs モロッコ | **1-1 (PK 2-3)** モロッコ | 大金星 — オランダ敗退 |\n\n\u003e ソース：FIFA公式マッチセンター（[オランダvモロッコ](https://www.fifa.com/en/match-centre/match/17/285023/289287/400021522)、[ブラジルv日本](https://www.fifa.com/en/match-centre/match/17/285023/289287/400021516)）、ESPN\n\n### 本日（6月30日）のスケジュール\n\n試合結果は確定次第速報。各試合はノックアウトラウンドのため延長・PK戦あり。\n\n| 時刻（現地/UTC） | 対戦 | 会場 |\n|-----------------|------|------|\n| 午前1:00 ET / 06:00 UTC | コートジボワール vs ノルウェー | AT\u0026Tスタジアム（テキサス州アーリントン） |\n| 午後5:00 ET / 22:00 UTC | **フランス vs スウェーデン** | メットライフスタジアム（NJ） |\n| 午後9:00 ET / 翌02:00 UTC | メキシコ vs エクアドル | エスタディオ・アステカ（メキシコシティ） |\n\n\u003e ソース：[CBS Sports](https://www.cbssports.com/soccer/news/2026-fifa-world-cup-bracket-round-of-32-results-round-of-16-matchups-final/)、[ESPN](https://www.espn.com/soccer/story/_/id/48939282/2026-fifa-world-cup-fixtures-results-match-schedule-group-stage-knockout-rounds-bracket)\n\n---\n\n## ✅ 完了した移籍（直近7日間）\n\n### 1. アンソニー・ゴードン　ニューカッスル → バルセロナ\n- **移籍金：** 初期€70M（成功報酬込み最大€80M超）\n- **契約年数：** 5年\n- **発表：** 2026年6月（夏ウィンドウ）\n- **ソース：** [ESPN](https://www.espn.com/soccer/story/_/id/48904926/barcelona-anthony-gordon-newcastle-united-transfer)（A級）・[Sky Sports](https://www.skysports.com/football/news/11095/13548577/anthony-gordon-transfer-news-barcelona-reach-agreement-with-newcastle-for-england-international-winger)（A級）\n- ニューカッスルには「出場率60%達成時に€1M/シーズン」のボーナス条項と将来の売却益の一部を受け取る売却条項が設定されている。\n\n### 2. ゴンサロ・ラモス　PSG → ACミラン\n- **移籍金：** 約€70M（ボーナス含む最大€74M）\n- **契約年数：** 未公表\n- **発表日：** 2026年6月26日\n- **ソース：** Fabrizio Romano「Here We Go」確認（S級）、[GetFrenchFootballNews](https://www.getfootballnewsfrance.com/2026/ac-milan-agree-club-record-transfer-fee-with-psg-to-sign-goncalo-ramos/)（A級）、[MilanReports](https://milanreports.com/2026/06/26/ac-milan-70m-deal-goncalo-ramos/)\n- ミラン史上最高額となるクラブレコード移籍。新指揮官ルベン・アモリムが同じポルトガル代表FWの獲得を主導したとされる。\n\n---\n\n## 🚨 Here We Go!（合意ほぼ確実）\n\n### ゴンサロ・ラモス　→　上記「完了」に掲載（重複排除ルール適用）\n\n※本日現在、Fabrizio Romanoが新規に「Here We Go」を発表した案件は上記のみ確認。次項の交渉中案件も引き続き監視中。\n\n---\n\n## 🔄 交渉中（直近14日以内の報道）\n\n### 1. イ・ガンイン（李康仁）　PSG → アトレティコ・マドリー　【信頼度：高 ★★★】\n- PSGが求める€35Mとアトレティコの提示額（〜€25M）の間に乖離があるが、ボーナス条項で折り合う可能性（ESPN・フランス紙報道）\n- **選手個人の口頭合意は成立済み**。サウジアラビアからの高額オファーより、かつてプレーしたラ・リーガ復帰を優先\n- ロマーノは「**advancing**」と表現、「Here We Go」に近い段階\n- PSG側はAASモナコのマギャンス・アクリウシュを補強候補として検討中（代替措置）\n- **ソース：** [ESPN](https://www.espn.com/soccer/story/_/id/49031836/atletico-madrid-open-talks-psg-lee-kang-deal-sources)（A級）、[OneFootball](https://onefootball.com/en/news/advancing-fabrizio-romano-on-the-verge-of-here-we-go-for-latest-psg-transfer-43068527)\n\n### 2. マテウス・フェルナンデス　ウェストハム → トッテナム / マンチェスター・ユナイテッド　【信頼度：中 ★★】\n- スパーズとマンUの両クラブが獲得レースに参戦とESPNが伝える\n- ウェストハム所属のポルトガル代表MFへの争奪戦が激化\n- **ソース：** [ESPN](https://www.espn.com/soccer/story/_/id/49169199/tottenham-join-man-united-mateus-fernandes-west-ham-transfer-race)（A級）\n\n---\n\n## 📌 その他注目動向\n\n**エンゾ・マレスカ、マンチェスター・シティ新監督就任へ：** チェルシーからの補償問題が残るが、グアルディオラ後継者として交渉が進行中（ESPN報道）。\n\n---\n\n## ソース一覧\n\n- [ESPN — Barcelona sign Anthony Gordon from Newcastle in €70m transfer](https://www.espn.com/soccer/story/_/id/48904926/barcelona-anthony-gordon-newcastle-united-transfer)\n- [Sky Sports — Anthony Gordon transfer news: Barcelona complete £69m signing](https://www.skysports.com/football/news/11095/13548577/anthony-gordon-transfer-news-barcelona-reach-agreement-with-newcastle-for-england-international-winger)\n- [Fabrizio Romano / MilanReports — AC Milan agree €70M deal for Gonçalo Ramos](https://milanreports.com/2026/06/26/ac-milan-70m-deal-goncalo-ramos/)\n- [GetFrenchFootballNews — AC Milan agree club record transfer fee with PSG to sign Gonçalo Ramos](https://www.getfootballnewsfrance.com/2026/ac-milan-agree-club-record-transfer-fee-with-psg-to-sign-goncalo-ramos/)\n- [SempreMilan — Romano: \u0027Here we go\u0027 – Milan to sign Ramos](https://sempremilan.com/milan-sign-ramos-psg-excess-50m)\n- [ESPN — Atletico Madrid open talks with PSG for Lee Kang-In deal](https://www.espn.com/soccer/story/_/id/49031836/atletico-madrid-open-talks-psg-lee-kang-deal-sources)\n- [OneFootball — Fabrizio Romano: \"Advancing\" on PSG transfer (Lee Kang-in)](https://onefootball.com/en/news/advancing-fabrizio-romano-on-the-verge-of-here-we-go-for-latest-psg-transfer-43068527)\n- [ESPN — Tottenham join Man United in Mateus Fernandes transfer race](https://www.espn.com/soccer/story/_/id/49169199/tottenham-join-man-united-mateus-fernandes-west-ham-transfer-race)\n- [FIFA.com — Netherlands v Morocco 1-1, Round of 32](https://www.fifa.com/en/match-centre/match/17/285023/289287/400021522)\n- [FIFA.com — Brazil v Japan 2-1, Round of 32](https://www.fifa.com/en/match-centre/match/17/285023/289287/400021516)\n- [CBS Sports — 2026 FIFA World Cup bracket, Round of 32 results](https://www.cbssports.com/soccer/news/2026-fifa-world-cup-bracket-round-of-32-results-round-of-16-matchups-final/)\n- [ESPN — 2026 FIFA World Cup fixtures \u0026 results schedule](https://www.espn.com/soccer/story/_/id/48939282/2026-fifa-world-cup-fixtures-results-match-schedule-group-stage-knockout-rounds-bracket)";
document.getElementById('content').innerHTML = marked.parse(md);

</script>
