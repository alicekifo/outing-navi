<script>
const md = "## 🤖 今週のAI最新動向\n\n### 1. OpenAI、GPT-5.6ファミリー（Sol / Terra / Luna）を一般提供開始\n**何が起きたか**: OpenAIが7月9日、GPT-5.6シリーズ3モデルをGA（一般提供）にした。フラッグシップのSol、バランス型のTerra、高速安価なLunaの3階層で、同時にワークスペース横断でドキュメント作成を行う「ChatGPT Work」も発表した。\n\n**なぜ重要か**: 「世代番号×能力ティア」という命名体系への移行で、各ティアが独立したペースで更新される構造になった。エージェント運用を前提にした設計で、OpenAI発表ではエージェント評価「Agents\u0027 Last Exam」でSolが53.6を記録（Claude Fable 5比+13.1）、BrowseComp 92.2%、OSWorld 2.0 62.6%。一方でSWE-bench ProはSol 64.6%とClaude Fable 5（80%）に劣ることも自ら公表しており、コーディング一本足ではない使い分けを促す構図だ。\n\n**スペック**: コンテキスト100万トークン / 最大出力12.8万トークン / 知識カットオフ2026年2月16日。価格（100万トークンあたり）: Sol $5入力/$30出力、Terra $2.50/$15、Luna $1/$6。\n\n出典: [OpenAI](https://openai.com/index/gpt-5-6/) (2026-07-09公開)\n\u003e source: https://openai.com/index/gpt-5-6/\n\n### 2. Meta、「Muse Spark 1.1」と初の有料API「Meta Model API」を公開\n**何が起きたか**: Meta Superintelligence Labsが7月9日、エージェントタスク向けマルチモーダル推論モデルMuse Spark 1.1をリリースし、同時にMeta初の有料モデルAPI「Meta Model API」のパブリックプレビューを開始した。\n\n**なぜ重要か**: オープンウェイト路線だったMetaが有料APIビジネスに参入する転換点。100万トークンのコンテキストを自律管理（過去の行動の記憶・重要ステップを残すコンパクション）する設計で、MCPサーバーやカスタムスキルへのゼロショット汎化を謳う。GPT-5.5、Claude Opus 4.8、Gemini 3.1 Proと競合するフロンティア級の位置付けで、ザッカーバーグが3年ぶりにXへ投稿して告知するほどの力の入れようだ。\n\n**スペック**: 価格は入力$1.25 / 出力$4.25（100万トークンあたり）、開始時$20の無料クレジット付き。\n\n出典: [Meta AI](https://ai.meta.com/blog/introducing-muse-spark-meta-model-api/) (2026-07-09公開)\n\u003e source: https://ai.meta.com/blog/introducing-muse-spark-meta-model-api/\n\n### 3. Apple、OpenAIを営業秘密侵害で提訴——ハードウェア設計の持ち出しを主張\n**何が起きたか**: Appleが7月10日、カリフォルニア北部地区連邦地裁にOpenAIを提訴した。OpenAIのコンシューマーハードウェア開発にAppleの営業秘密が使われたとし、「技術スタッフからチーフハードウェアオフィサーまであらゆるレベルで」窃取が行われたと主張している。\n\n**なぜ重要か**: 2024年のApple Intelligence提携から一転、AIハードウェア覇権を巡る全面対決に入った。訴状では、元Apple副社長でOpenAIハードウェア責任者のTang Tanが採用面接でApple候補者に「実部品の持参」を指示したとの主張や、元Appleエンジニアが返却しなかった業務用ラップトップのバグ経由で退職後もAppleのクラウドストレージから機密ファイル数十件をダウンロードしたとの主張が含まれる。退職者のアカウント失効漏れ・デバイス回収漏れという古典的な内部統制の穴が兆ドル企業間の訴訟に発展した形で、オフボーディング管理の教科書事例になりそうだ。OpenAIは「他社の営業秘密に興味はない」と全面否認している。\n\n出典: [Bloomberg](https://www.bloomberg.com/news/articles/2026-07-10/apple-sues-openai-for-trade-secret-theft-in-blockbuster-case) (2026-07-10公開)\n\u003e source: https://www.bloomberg.com/news/articles/2026-07-10/apple-sues-openai-for-trade-secret-theft-in-blockbuster-case\n\n## 📄 今週の注目論文\n\n### 1. エージェントデータ注入攻撃はAIエージェントへの現実的脅威である / Agent Data Injection Attacks are Realistic Threats to AI Agents\n**著者**: Woohyuk Choi（ソウル大学校）ほか、UIUC・Largosoftとの共著 / arXiv:2607.05120 / 2026-07-06公開\n\n- **Problem**: 間接プロンプトインジェクション対策は「悪意ある指示文」の検出に偏っており、指示文を含まない攻撃面が見過ごされている\n- **Method**: 「信頼済みデータ」に偽装した悪意データ（リソース識別子・データ出所などのメタデータ、ツール呼び出し形式などのエージェントコンテキスト）を注入するADI（Agent Data Injection）を新カテゴリとして定式化し、実運用エージェントで検証\n- **Finding**: Claude in Chrome / Antigravity / Nanobrowser で任意クリック誘発、Claude Code / Codex / Gemini CLI でメンテナ発言の偽造によるRCEや偽コミット履歴経由の悪性PRマージ（サプライチェーン攻撃）を実証。区切り文字注入の成功率はJSON形式で31.3〜43.3%、Web DOM形式で33.3〜100.0%。防御下でも従来の指示注入が0.0〜0.7%に潰されるのに対しADIは最大50.0%を達成\n\n**読みどころ**: 根本原因は「現行エージェントが信頼データと非信頼データを分離していない」こと。プロンプトフィルタでは防げない構造的欠陥を突いており、Claude Code / Codex / Gemini CLI を実務で回すセキュリティ技術者なら、ツール応答やメタデータをそのまま信頼させない設計（出所検証・データ隔離）が急務だと理解できる。\n\n出典: [arXiv](https://arxiv.org/abs/2607.05120) (2026-07-06公開)\n\u003e source: https://arxiv.org/abs/2607.05120\n\n### 2. 言語化可能な表現は言語モデル内でグローバルワークスペースを形成する / Verbalizable Representations Form a Global Workspace in Language Models\n**著者**: Wes Gurnee（Anthropic、計16名） / transformer-circuits.pub / 2026-07-06公開\n\n- **Problem**: モデルが「自ら報告・制御できる概念」と「自動処理で扱う膨大な内部活動」を、内部表現として区別・測定できるか\n- **Method**: 中間層の活性をモデル出力空間へ平均化ヤコビアンで写像し、語彙トークンのランク付きリストを得る新技術「J-lens（ヤコビアンレンズ）」を開発。得られる特権的部分空間「J-space」が、神経科学のグローバルワークスペース理論の5性質（言語報告・指示による変調・内部推論・柔軟な汎化・選択性）を満たすか検証\n- **Finding**: J-spaceは活性分散の10%未満、同時にアクティブな概念は約20〜25個。ワークスペース操作は主に第38〜92層で発生。Claude Sonnet 4.5（主）、Haiku 4.5、Opus 4.5/4.6で確認\n\n**読みどころ**: 「モデルが言おうとしている概念を、言う前に読む」ツールが公開された点が実務的に大きい。プロンプトインジェクションやアライメント逸脱を出力前段で検知する内部プローブへの応用が見える。ただし著者自身が「意識の証明ではない」と明言しており、\"AIは生きている\"系のクリックベイトと切り離して読むべき研究だ。\n\n出典: [Transformer Circuits](https://transformer-circuits.pub/2026/workspace/) (2026-07-06公開)\n\u003e source: https://transformer-circuits.pub/2026/workspace/\n\n### 3. PERFOPT-Bench: ソフトウェア性能最適化でコーディングエージェントを評価する / PERFOPT-Bench: Evaluating Coding Agents on Software Performance Optimization\n**著者**: Yingyun Cui（OPPO Research Institute）ほか、アリゾナ大学・香港城市大学・香港理工大学との共著 / arXiv:2607.07744 / 2026-07-08公開\n\n- **Problem**: 既存のコーディングエージェントベンチは機能的正しさに偏り、本番で必須の「測定可能な性能改善」を評価できていない\n- **Method**: 「正しいが意図的に非効率なコードベース」を与え目標指標の改善を求める12タスク（8ドメイン・約66.8万行のCコード）を構築。隠しテストでの正しさ・検証済みスピードアップ・軌跡監査の3点で採点し、7つのエージェントスタック（LLM×フレームワークの組み合わせ）を評価\n- **Finding**: ショートカット除去後の実測スピードアップは1.016倍〜23.472倍、スタック別の幾何平均は3.1〜9.9倍。全タスクで支配的なスタックは存在せず、「最適化能力はLLM単体の性質ではなくワークロード依存」。同一LLMでもフレームワーク選択がタスクごとの性能プロファイルを大きく変える\n\n**読みどころ**: 「モデルを最強のやつにすれば速くなる」という直感を否定し、フレームワーク（エージェントハーネス）の設計が同じLLMの成果を左右すると数値で示した。生スピードアップにはベンチ固有の抜け道を突いた見かけの利得が混ざるという指摘は、AIにパフォーマンスチューニングを任せる際の検証設計にそのまま効く警告だ。\n\n出典: [arXiv](https://arxiv.org/abs/2607.07744) (2026-07-08公開)\n\u003e source: https://arxiv.org/abs/2607.07744\n\n## 💡 今週のひとことインサイト\n\n今週いちばん刺さったのは、Apple対OpenAIの営業秘密訴訟が結局「オフボーディング事故」の物語だったこと。訴状の核は、退職者が返し忘れた業務用ラップトップのバグ経由でクラウドに居座り、機密を数十件抜いたという主張——兆ドル企業同士の派手なAIハードウェア戦争の火種が、アカウント失効漏れとデバイス回収漏れという、Linux/セキュリティ屋なら耳タコの内部統制の穴だったわけだ。同じ週、Choiらのエージェントデータ注入論文は「AIエージェントは信頼データと非信頼データを分離していない」と突いていた。人間の組織もAIエージェントも、壊れる場所は同じ。「境界の内側は信頼できる」という前提そのものがもう成り立たない——ゼロトラストは今やインフラ設計だけじゃなく、退職手続きにもエージェント設計にも等しく要る、って話だと思う。フロンティアモデルの派手なベンチ競争の裏で、地味な境界管理こそが勝敗を分けてるのが面白いよね。\n\n---\n\n補足で1点、別件として断っておくと: MCPコネクタ（Gmail / Googleカレンダー / Googleドライブ）が未認証で使えない状態だった。今回のニュース生成はWeb検索だけで完結してるから影響なし。もし将来これらを使う運用を組むなら、claude.aiのコネクタ設定から認可が要る。";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
