<script>
const md = "# 🤖📄 今週のAI動向＆論文ダイジェスト\n*2026年5月30日号*\n\n---\n\n## 🤖 今週のAI最新動向\n\n### 1. Google I/O 2026 — 「Gemini Spark」発表、Gemini がついに\"代行する\"側へ\n5月19日のGoogle I/Oで、Googleは24時間稼働するパーソナルAIエージェント **Gemini Spark** を発表した。Gemini 3.5を基盤とし、Gmail / Docs / Slides に加え、Canva・OpenTable・Instacart と直接連携してタスクを\"代行実行\"する。\nこれは「聞いて答える」アシスタントから「指示なしに動く同居人」への転換を意味する。毎月クレジットカード請求から隠れた手数料を抽出したり、長いメールスレッドを要約してToDoに落とし込む――こうした\"継続的に動き続けるAI\"が一般ユーザーの手に渡るのは、今回が事実上初。今夏にはデスクトップ版にも展開され、ファイル操作も可能になる予定だ。\n[ソース](https://techcrunch.com/2026/05/19/google-introduces-gemini-spark-a-24-7-agentic-assistant-with-gmail-integration/)\n\n### 2. Anthropic、Claude Opus 4.7 をリリース — 「xhigh」という新しい思考ダイヤル\nAnthropic は Opus 4.7 を公開。最大の特徴は **high と max の間に新設された \"xhigh\" effort レベル**で、推論深度と応答レイテンシのトレードオフをユーザーが細かく調整できるようになった。\nベンチマーク上では GPT-5.4・Gemini 3.1 Pro を上回るが、自社の未公開モデル Mythos には依然届かないことを Anthropic 自身が認めている点が興味深い。「もっと速い」「もっと賢い」だけでなく、「どれだけ考えさせるか」をユーザー側が握れるように設計を変えた点は、推論コストが現実問題として効いてきた時代の象徴である。\n[ソース](https://www.anthropic.com/news/claude-opus-4-7)\n\n### 3. EU AI Act が大幅に「ゆるんだ」 — Omnibus VII 合意\n5月7日、EU理事会と欧州議会は AI Act の修正案で政治合意に達した。**高リスクAIシステムへの義務は2026年8月→2027年12月へ16ヶ月延期**、透明性規則は予定通り2026年8月から適用。一方で、非合意の性的画像生成・CSAM生成という2項目が新たに禁止カテゴリへ追加された。\n規制を「強化しつつ、産業界の悲鳴に合わせて先送り」という妥協劇は、世界の規制が単純な強弱軸ではなく、論点ごとに微分されていく段階に入ったことを示している。日本企業にとっても、Aug 2026 の透明性適用は射程内。\n[ソース](https://www.consilium.europa.eu/en/press/press-releases/2026/05/07/artificial-intelligence-council-and-parliament-agree-to-simplify-and-streamline-rules/)\n\n### 4. ペン大、「光と物質のハイブリッド粒子」でAI演算の高速化＆省電力化\nペンシルベニア大学の研究チームが、光と物質を混ぜたハイブリッド準粒子（ポラリトン系）を制御することで、AI演算を桁違いに高速化し、消費電力も大幅に下げられる可能性を示した。\nGPUのスケール戦争が物理的限界に近づくなか、光コンピューティングは2020年代後半の本命候補のひとつ。\"Mooreの法則の死後\"を物理層で乗り越える研究が、いよいよ実用領域へ近づいている兆候として注目に値する。\n[ソース](https://www.sciencedaily.com/news/computers_math/artificial_intelligence/)\n\n### 5. OpenAI × Microsoft の独占契約が再編、Amazonが100億ドル投資交渉へ\nOpenAIは Microsoft との排他的提携を解消する方向で再編し、他クラウドへの製品提供が可能になった。並行してAmazonがOpenAIに **100億ドル規模の出資交渉** に入ったと報じられている。\nクラウド・モデル・資本の三層が「専属」から「複数縁組」へ移る兆し。Anthropic=Amazon、OpenAI=Microsoftという固定構図が崩れることで、競争の重心が「どこに繋がるか」より「どれだけ早く動けるか」に移る可能性がある。\n[ソース](https://blog.mean.ceo/ai-advancements-news-may-2026/)\n\n---\n\n## 📄 今週の注目論文\n\n### 1. *Rethinking RL for LLM Reasoning: It\u0027s Sparse Policy Selection, Not Capability Learning*\n**「LLMの推論におけるRLを再考する：能力学習ではなく、スパースな方策選択である」**\narXiv:2605.06241（2026年5月7日投稿）\n\n- **3行サマリー**：RLHF / RLVR で強化されたLLMの推論能力は、本当に「新しい戦略を学習した」のか？ 著者らはトークン単位の挙動を解析し、**RLが変えているのはわずか1〜3%のトークン位置のみ**、しかもそれは「モデルが分岐に迷う高エントロピー点」に集中していることを発見。彼らが提案する `REASONMAXXER` は、RLを使わずに同等の改善を達成できる。\n- **ポイント**：「RLが推論能力を伸ばす」という業界の通説に正面から異議を唱える論文。RLは新しいことを教えているのではなく、ベースモデルが既に持っていた解の中から正解候補を選び直しているだけ――この主張が正しければ、推論強化の計算コスト構造は劇的に変わる。次世代モデル設計に直接効く。\n- [arXivリンク](https://arxiv.org/abs/2605.06241)\n\n### 2. *Sleep-Like Memory Consolidation in LLMs*\n**「LLMにおける睡眠様の記憶固定化」**\narXiv:2605.26099（2026年5月25日投稿）\n\n- **3行サマリー**：人間の睡眠中に起きる「海馬リプレイ → 長期記憶への転写」を、ハイブリッドSSM-Attentionモデルに移植。**推論時に\"睡眠フェーズ\"を挿入し、文脈を緩やかに重みへ転写する**ことで、長期文脈推論の精度と効率が両立する。\n- **ポイント**：神経科学が「アーキテクチャのインスピレーション源」として再評価されている流れの代表例。Transformer の文脈長競争（200万トークン超）が物量勝負になるなか、**「常に文脈に置く」のではなく「定期的に重みへ畳み込む」設計** は、人間が眠る理由そのものに重なる。実務的には、エージェント長時間運用の鍵になりうる。\n- [arXivリンク](https://www.emergentmind.com/papers/2605.26099)\n\n### 3. *Behavioral Economics of AI: LLM Biases and Corrections*\n**「AIの行動経済学：LLMのバイアスとその補正」**\nPietro Bini, Lin William Cong, Xing Huang, Lawrence J. Jin（NBER Working Paper 34745, 2026年2月）\n\n- **3行サマリー**：行動経済学の古典的バイアス課題（プロスペクト理論、確実性効果、フレーミング、アンカリング等）をLLMに大量に解かせた結果、**「好み（preference）系課題ではモデルが大きくなるほど人間に似てくる」一方で、「信念（belief）系課題ではむしろ合理的になる**」という二極化が観察された。さらに「合理的に答えて」と一言プロンプトを足すだけでバイアスは大幅に減る。\n- **ポイント**：LLMを\"擬似被験者\"として社会科学に使う試みが急増しているが、この論文はその前提を揺さぶる。**LLMは「平均的な人間」を再現しているのではなく、課題タイプによって人間と機械を行き来している**。市場予測や政策シミュレーションでLLMを使う実務家にとって、どのタスクで人間プロキシとして信頼してよいかの実用ガイドにもなる。\n- [SSRNリンク](https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5213130)\n\n### 4. *Do Large Language Models Think Like the Brain? Sentence-Level Evidences from Layer-Wise Embeddings and fMRI*\n**「LLMは脳のように考えるのか？ 層別埋め込みとfMRIから得られる文レベルの証拠」**\narXiv:2505.22563（2025年）\n\n- **3行サマリー**：23種類のLLMと、**『星の王子さま』を聴いている人間のfMRI信号** を Representational Similarity Analysis で比較。モデルが大きく性能が高いほど、表現の階層が脳の言語処理階層に \"形として似てくる\"――特に高次の意味抽象レイヤーで対応関係が強い。\n- **ポイント**：「LLMは確率分布を吐く統計機械にすぎない」という長年の批判に対する、実証的なカウンターパンチのひとつ。ただし\"似ている=同じ\"ではない。性能向上が表現を脳的にする圧力を生んでいるという発見は、**スケーリング則がなぜ機能するかの「神経的解釈」** を示唆する興味深い橋渡し研究。\n- [arXivリンク](https://arxiv.org/pdf/2505.22563)\n\n---\n\n## 💡 今週のひとことインサイト\n\n今週もっとも痺れたのは、論文1の「**RLは新しい戦略を教えていない、ただ選び直しているだけ**」という主張だ。これはAIの議論を超えて、人間の学習にも刺さる仮説に見える。私たちが「成長した」と感じるとき、その正体はしばしば、頭の中に既にあった解の中から正しいものを選べるようになっただけ――迷い（高エントロピー点）が減っただけ、なのかもしれない。だとすれば訓練の本質は知識の追加ではなく、**自分の中の選択肢に対する確信の再配分**である。学びは増やすことではなく、整えること。AIの研究が、人間の自己理解に静かに反射光を投げかけてくる、そんな一週間だった。\n\n---\n\nSources:\n- [Google introduces Gemini Spark — TechCrunch](https://techcrunch.com/2026/05/19/google-introduces-gemini-spark-a-24-7-agentic-assistant-with-gmail-integration/)\n- [Introducing Claude Opus 4.7 — Anthropic](https://www.anthropic.com/news/claude-opus-4-7)\n- [EU Council \u0026 Parliament AI Act agreement](https://www.consilium.europa.eu/en/press/press-releases/2026/05/07/artificial-intelligence-council-and-parliament-agree-to-simplify-and-streamline-rules/)\n- [AI advancements news May 2026](https://blog.mean.ceo/ai-advancements-news-may-2026/)\n- [ScienceDaily — AI news](https://www.sciencedaily.com/news/computers_math/artificial_intelligence/)\n- [Rethinking RL for LLM Reasoning — arXiv:2605.06241](https://arxiv.org/abs/2605.06241)\n- [Sleep-Like Memory Consolidation in LLMs](https://www.emergentmind.com/papers/2605.26099)\n- [Behavioral Economics of AI — SSRN](https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5213130)\n- [Do LLMs Think Like the Brain? — arXiv:2505.22563](https://arxiv.org/pdf/2505.22563)";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
