<script>
const md = "データ集まった。記事書くね。\n\n# 🧠 今週のAI読み物（2026/5/30 週次レポート）\n\n## 🤖 今週のAI最新動向\n\n### 1. Anthropic、Claude Opus 4.8 をリリース — コーディング性能で勝負\n\n5月28日、Anthropic が新フラッグシップ「Claude Opus 4.8」を公開した。前バージョン 4.7 と比べてコーディングタスクでの精度が大幅に向上したとされる。\n\n**なぜ重要か**：今やフロンティアモデル競争の焦点は「汎用ベンチマーク」から「コード実行・エージェントタスク」に移行している。SWE-bench Verified ではなく Pro での評価が標準になりつつあり、Opus 4.8 はその新しい土俵での勝負を仕掛けた形。さらに同社は「Mythos」と呼ばれる次世代モデルの広範リリースも数週間内に予告しており、サイバーセキュリティ能力の解放と安全策強化を同時に行う計画。\n\n[ソース](https://www.bloomberg.com/news/articles/2026-05-28/anthropic-unveils-new-flagship-ai-model-that-s-better-at-coding)\n\n### 2. Anthropic、$30B 調達ラウンドで評価額 $900B 超え — 初めて OpenAI を抜く\n\n今週、Anthropic が 300 億ドル規模のラウンドをクローズ寸前で、評価額は 9000 億ドル超。3月時点で 8520 億ドルだった OpenAI を、史上初めて追い抜く可能性が出てきた。Q2 売上見込みは 109 億ドル、四半期営業利益も初めて黒字化見通し。\n\n**なぜ重要か**：「Claude が技術的に評価されてる」だけじゃなく「商業的にも勝ってる」という地殻変動の兆し。両社とも今秋 IPO を視野に入れており、AI 業界の勢力図はここから 6 ヶ月で大きく動く。\n\n[ソース](https://www.bloomberg.com/news/articles/2026-05-28/can-openai-and-anthropic-ipos-live-up-to-expectations)\n\n### 3. OpenAI、Frontier Governance Framework を発表（5月29日）\n\nOpenAI が独自の「Frontier Governance Framework」を公開。フロンティアモデルのリスク評価・展開判断のための内部ガバナンス基準を文書化したもの。\n\n**なぜ重要か**：Anthropic の RSP（Responsible Scaling Policy）に対する OpenAI 側の答えとも言える。IPO を控えて「投資家・規制当局向けにガバナンス体制を可視化する」フェーズに突入したことを示す動き。今後、AI 企業の評価軸に「ガバナンス文書の質」が加わる可能性がある。\n\n[ソース](https://openai.com/news/)\n\n### 4. Google I/O 2026 — Gemini 3.5 Flash と汎用エージェント「Spark」\n\n5月19日の I/O で、Google は高速・低価格の Gemini 3.5 Flash と、新型の汎用 AI エージェント Gemini Spark を発表。Spark は接続済みアプリ間で情報を横断推論できるエージェントで、Google AI Ultra サブスクライバーから順次展開。\n\n**なぜ重要か**：「LLM 単体」から「エージェント+データアクセス権」への戦略シフトが鮮明に。Google は Gmail / Drive / Calendar というデータ資産を武器に、OpenAI・Anthropic とは違う土俵で勝負を始めた。\n\n[ソース](https://www.cnbc.com/2026/05/19/google-ai-ultra-gemini-spark-omni.html)\n\n### 5. OpenAI、$4B のコンサル子会社「DeployCo」を設立\n\nエンタープライズ向けに AI 導入支援を行う子会社を立ち上げた。\n\n**なぜ重要か**：これは静かにヤバい動き。Accenture や Deloitte がやってきた「AI 導入コンサル」の領域に、モデル提供者本人が乗り込む構図。API 売上の天井を破るための布石で、SI 業界には激震レベルの再編が起きる可能性がある。\n\n[ソース](https://www.buildfastwithai.com/blogs/ai-news-today-may-25-2026)\n\n---\n\n## 📄 今週の注目論文\n\n### 1. A Neuropsychologically Grounded Evaluation of LLM Cognitive Abilities\n**（神経心理学的根拠に基づく LLM 認知能力評価）**\n\n- **著者・所属**：arXiv 2603.02540（2026年3月）\n- **3行サマリー**：人間の神経心理検査（レーヴン漸進的マトリックス、空間ワーキングメモリ、ウィスコンシンカード分類）を LLM 用にアダプトし、「NeuroCognition」ベンチマークとして整備。テキストでは高性能でも、画像入力や複雑度が上がると性能が急落することを発見。\n- **ポイント**：「LLM の知性とは何か」を測る基準が、ベンチマーク特化型から認知科学ベースの汎用テストに移行しつつある。実務的にも、エージェントを「未知の複雑タスク」に放つときの限界点が、こうした検査で予測できる可能性がある。\n\n[ソース](https://arxiv.org/abs/2603.02540)\n\n### 2. The Other Mind: How Language Models Exhibit Human Temporal Cognition\n**（もうひとつの心：言語モデルが示す人間的な時間認知）**\n\n- **著者・所属**：arXiv 2507.15851（プレプリント）\n- **3行サマリー**：LLM が「時間」をどう内部表現しているかを、人間の時間心理学のフレームワークで分析。記憶・期待・因果・意識の基盤となる時間認知が、LLM にも創発的に現れていることを実験で示した。\n- **ポイント**：「LLM は次トークン予測しかしてない」という還元論への反証材料。人間の意識や時間感覚の起源を、LLM をモデル動物として研究できるかもしれないという話に発展する。哲学的にも実務的（長期記憶設計）にも刺激的。\n\n[ソース](https://arxiv.org/pdf/2507.15851)\n\n### 3. Behavioral Economics of AI: LLM Biases and Corrections\n**（AIの行動経済学：LLMのバイアスとその是正）**\n\n- **著者**：Pietro Bini、Lin William Cong、Xing Huang、Lawrence J. Jin（arXiv 2602.09362 / NBER WP34745、2026年）\n- **3行サマリー**：人間の認知バイアスを検出するための古典実験（プロスペクト理論、アンカリング等）を LLM に大規模適用。選好系タスクでは「モデルが大きくなるほど人間っぽく」なる一方、信念系タスクでは「大きいモデルほど合理的」になるという非対称な結果を発見。プロンプトで「合理的判断をせよ」と指示するだけでバイアスが減ることも示した。\n- **ポイント**：LLM を「人間の代理」として実験経済学に使う動きが加速中だが、この論文は「どのタスクなら代理として有効か」の指針を与える。プロダクト設計でも、ユーザー行動シミュレーションに LLM を使う際の罠を理解できる。\n\n[ソース](https://arxiv.org/abs/2602.09362)\n\n### 4. Implications of AI Involvement for Trust in Expert Advisory Workflows Under Epistemic Dependence\n**（認識論的依存下における専門助言ワークフローへのAI関与が信頼に与える影響）**\n\n- **著者**：Dennis Kim ほか（arXiv 2602.11522、2026年2月）\n- **3行サマリー**：N=77 のユーザー実験で、履修計画タスクを「AI なし／AI が助言／AI と人間の協働モード」など複数条件で比較。**信頼は AI の性能だけでなく「協働の手続き設計」によって決まる**という結果。\n- **ポイント**：「AI の精度を上げれば信頼される」という素朴な前提は崩れる。HCI 設計者にとっては、AI を「どう見せるか」「どこに介入させるか」の手続きが、モデル選定と同じくらい重要だという話。エンタープライズ AI 導入の失敗パターンの説明にもなる。\n\n[ソース](https://arxiv.org/abs/2602.11522)\n\n---\n\n## 💡 今週のひとことインサイト\n\n今週の論文を並べて気づいたこと。LLM のサイズを大きくすると、選好の場面では「人間っぽい不合理」が強まり、信念の場面では「合理性」が強まる、という非対称が観察されている（論文3）。これ、めちゃくちゃ示唆的だと思う。\n\n人間の不合理さは「ノイズ」じゃなくて、社会的・進化的に意味のある最適化の結果だから、訓練データの中にもパターンとして埋め込まれてる。一方、信念形成における合理性は「知能」のスケーリングで素直に伸びる。\n\nつまり LLM のスケーリング則は単一の「賢さ」を伸ばしてるんじゃなくて、人間の認知の「機能ごとに違う方向」に伸ばしてる。今後 AI を業務に組み込むなら、「どの認知機能を借りるか」を意識した設計が必要になる。コードレビューと、ユーザー共感シミュレーションでは、使うべきモデルサイズすら違うかもしれない。\n\n---\n\n**Sources（全体）:**\n- [Anthropic Opus 4.8 リリース](https://www.bloomberg.com/news/articles/2026-05-28/anthropic-unveils-new-flagship-ai-model-that-s-better-at-coding)\n- [Anthropic/OpenAI IPO 動向](https://www.bloomberg.com/news/articles/2026-05-28/can-openai-and-anthropic-ipos-live-up-to-expectations)\n- [OpenAI News](https://openai.com/news/)\n- [Google I/O 2026](https://www.cnbc.com/2026/05/19/google-ai-ultra-gemini-spark-omni.html)\n- [BuildFastWithAI 2026/5/25](https://www.buildfastwithai.com/blogs/ai-news-today-may-25-2026)\n- [NeuroCognition Paper](https://arxiv.org/abs/2603.02540)\n- [The Other Mind](https://arxiv.org/pdf/2507.15851)\n- [Behavioral Economics of AI](https://arxiv.org/abs/2602.09362)\n- [Trust in Expert Advisory Workflows](https://arxiv.org/abs/2602.11522)\n\n---\n\n記事できた。Obsidianに保存する？ work/ 配下に置くなら `週次AI動向_2026-05-30.md` あたりで作るけど、どうする？";
document.getElementById('content').innerHTML = marked.parse(md);
