<script>
const md = "# マンチェスター・ユナイテッド情報週報（2026-07-16）\n\n\u003e **今週のTLDR**: オフシーズンにつき公式戦なし。ティーレマンス（Youri Tielemans）が7/14に公式発表され背番号18に決定——今夏のMF補強2人目が完了し、3人目はコネ（Manu Koné）／アレックス・スコット（Alex Scott）／バレバ（Carlos Baleba）の線。女子ではマラール（Melvine Malard）をチェルシーへクラブ記録額で売却合意。プレシーズン初戦レクサム戦はJST 7/19 0:00。W杯準決勝イングランド×アルゼンチン（マイヌー／ラッシュフォード所属）は本日朝8:00キックオフ。\n\n---\n\n## ⚽ 直近の試合結果\n\n※該当なし（2025-26シーズンは5月に終了。プレシーズン初戦は7/18、下記「今後の試合予定」参照）\n\n**補足（FIFAワールドカップ2026）**:\n- 準決勝第1試合（7/14）: スペインがフランスを破り決勝進出\n- 準決勝第2試合: イングランド×アルゼンチン（アトランタ）は現地7/15 19:00＝**JST本日7/16 8:00キックオフ**。ユナイテッドからマイヌー（Kobbie Mainoo）、ラッシュフォード（Marcus Rashford）がイングランド代表に在籍。結果は明日の版で反映\n- 決勝は7/19 MetLifeスタジアム\n\n\u003e source: [Yahoo Sports - Spain into final](https://sports.yahoo.com/soccer/live/france-vs-spain-world-cup-2026-scores-results-schedule-live-updates-150000075.html) (2026-07-14) / [FIFA - England v Argentina](https://www.fifa.com/en/match-centre/match/17/285023/289290/400021540?gender=2\u0026date=2026-07-15)\n\n---\n\n## 🔄 移籍・選手動向\n\n### 確定（IN）\n\n| 選手 | 前所属 | 条件 | 日付 | 信頼度 |\n|---|---|---|---|---|\n| ティーレマンス（Youri Tielemans）MF | アストン・ヴィラ | 解除条項£35m（€41m）行使・5年契約・**背番号18**・登録手続き待ち | **7/14公式発表** | ◎ 公式＋Romano \"Here We Go\"（7/13） |\n| サントス（Andrey Santos）MF | チェルシー | £48m＋ボーナス£2m（10%セルオン付き） | 7/13完了（既報） | ◎ Romano \"Here We Go\"（7/8） |\n| ダーロウ（Karl Darlow）GK | リーズ | フリー・2028年まで（＋1年OP） | 7/14公式発表（既報） | ◎ 公式 |\n\n- ティーレマンス公式発表でウィルコックス（Jason Wilcox）フットボールディレクターは「過去7年でPL屈指のMF」と評し、冷静さ・創造性・リーダーシップの3点を挙げた\n- 出典: [manutd.com - Tielemans announce](https://www.manutd.com/en/news/manchester-united-announce-signing-of-youri-tielemans) (2026-07-14) / [ESPN](https://www.espn.com/soccer/story/_/id/49356683/manchester-united-sign-midfielder-youri-tielemans-aston-villa) (2026-07-14)\n\n\u003e source: [manutd.com](https://www.manutd.com/en/news/manchester-united-announce-signing-of-youri-tielemans)\n\n### 確定（OUT）\n\n- **マラール（Melvine Malard）FW（女子）** → チェルシーへ移籍合意 ○: 初期£850k＋アドオンで総額£1m弱。**ユナイテッド女子のクラブ記録売却額**。契約残り1年で慰留も本人が新天地を希望、リヨン時代の恩師ボンパストール（Sonia Bompastor）と再会（Ben Jacobs／Goal／The Peoples Person複数一致・7/14〜15）\n- 男子の既報分（今夏ウィンドウ内・変化なし）: オナナ（André Onana）→トラブゾンスポル1年ローン（7/3公式）、ホイルン（Rasmus Højlund）→ナポリ買い取り義務履行（6/29）、サンチョ（Jadon Sancho）／カゼミロ（Casemiro）／マラシア（Tyrell Malacia）契約満了退団（6/30）\n- 出典: [Goal](https://www.goal.com/en-us/lists/man-utd-record-sale-melvine-malard-france-international-red-devils-wsl-chelsea/blte806af7a4c517524) (2026-07-15) / [The Peoples Person](https://thepeoplesperson.com/2026/07/15/melvine-malard-chelsea-agree-record-fee-for-man-united-women-star-312735/) (2026-07-15)\n\n\u003e source: [Goal - Malard club-record sale](https://www.goal.com/en-us/lists/man-utd-record-sale-melvine-malard-france-international-red-devils-wsl-chelsea/blte806af7a4c517524)\n\n### 交渉中・破談\n\n- **3人目のMF獲得が既定方針** ○（Ornstein・Romano両者一致）: マイヌー／サントス／ティーレマンスを補完する「運動量で潰せる」タイプを想定。候補は——\n  - **アレックス・スコット（Alex Scott／ボーンマス）** △: INEOS首脳陣が高評価との報道。£80m規模だがボーンマスは今夏売却拒否の構え（Ornstein発・[TEAMtalk経由](https://www.teamtalk.com/manchester-united/man-utd-transfer-news-david-ornstein-youri-tielemans-lewis-hall-alex-scott) 7/14）\n  - **コネ（Manu Koné／ローマ）** ○: Romanoが7/14に更新——内部協議の候補に入っており、選手サイド（代理人）への接触を開始。£51m規模の報道（[The Peoples Person](https://thepeoplesperson.com/2026/07/14/manu-kone-fabrizio-romano-drops-update-on-uniteds-pursuit-of-french-midfielder-312724/) 7/14）\n  - **バレバ（Carlos Baleba／ブライトン）** △: スコット獲得が不調の場合の再燃候補（Ornstein発）\n- **エデルソン（Éderson／アタランタMF）破談のまま** ○: 7/12にメディカル問題で現条件見送りと報道されて以降、新規進展の報道なし。夏後半の減額再交渉の可能性は残る（[Sky Sports](https://www.skysports.com/football/news/11095/13562399/man-utd-transfer-news-ederson-deal-with-atalanta-not-proceeding-at-current-price-due-to-issues-with-medical) 7/12）\n- **ルイス・ホール（Lewis Hall／ニューカッスルLB）** △: £60m規模で関心との報道継続（TEAMtalk 7/14）\n\n### ケガ・離脱\n\n- **ウガルテ（Manuel Ugarte）**: ACL（前十字靭帯）損傷で長期離脱中・復帰時期未定 ○（前週から変化なし）。中盤大量補強の直接的な背景\n\n\u003e source: [TEAMtalk - Ornstein next deal](https://www.teamtalk.com/manchester-united/man-utd-transfer-news-david-ornstein-youri-tielemans-lewis-hall-alex-scott)\n\n---\n\n## 🧠 戦術・チーム状況\n\n### カリック（Michael Carrick）体制の現在地\n\n- **前提の更新（R4）**: アモリム（Rúben Amorim）は2026年1月に解任済み。カリックが暫定就任からチームを立て直してCL出場権を確保し、5/22に2028年までの正式契約（指示書記載の3-4-2-1運用状況は現体制では対象外）\n- **プレシーズン始動**: 7/9にカーリントンで全体トレーニング開始。W杯招集13名が不在のため、アカデミーから9名（オビ（Chido Obi）、ゴア（Daniel Gore）、ウィートリー（Ethan Wheatley）、T・フレッチャー（Tyler Fletcher）ら）が今週ファーストチームの練習に合流。フレドリクソン（Tyler Fredricson）、レイシー（Shea Lacey）、アマス（Harry Amass）らは既に帯同済み\n- **中盤再建の設計思想**: Ornsteinはウィルコックス主導の補強を「clear vision」と評価——サントス＋ティーレマンスで供給とゲームコントロールを確保し、3人目は走力・カバー範囲重視のプロファイルと解説\n- 直近5試合のxG等: ※該当なし（オフシーズンのため）\n\n\u003e source: [manutd.com - Back in pre-season training](https://www.manutd.com/en/news/united-back-in-pre-season-training) (2026-07) / [centredevils - アカデミー9名合流](https://centredevils.co.uk/news/nine-manchester-united-academy-players-join-first-team-training-ahead-of-wrexham-fixture/) (2026-07-15頃)\n\n---\n\n## 📅 今後の試合予定（プレシーズン）\n\n| 日付（JST） | 対戦相手 | 会場 | 大会 |\n|---|---|---|---|\n| 7/19（日）0:00 | レクサム | ヘルシンキ・オリンピックスタジアム（中立） | 親善試合 |\n| 7/25（土）1:00 | ローゼンボリ | トロンハイム（アウェー） | 親善試合 |\n| 8/1（土）22:00 | アトレティコ・マドリード | ストックホルム（中立） | 親善試合 |\n\n- 以降はPSG（8/8）、リーズ（8/12）、ミラン（8/15）、リーグ開幕は8/22\n- **見どころ（レクサム戦）**: W杯決勝が翌日のため招集13名は不在。アカデミー勢＋新加入組中心の編成が濃厚で、サントスは初戦出場が有力視されるとの報道。ダーロウのデビューにも注目。ティーレマンスはW杯参加中（ベルギー主将）のため合流は後日\n- 想定スタメンの具体報道: ※現時点で確認できず\n\n\u003e source: [manutd.com - プレシーズン日程](https://www.manutd.com/en/news/game-by-game-united-pre-season-fixture-list-2026) / [Sports Mole](https://www.sportsmole.co.uk/football/man-utd/feature/man-united-pre-season-fixtures-schedule-how-to-watch-and-kickoff-times_600946.html)\n\n---\n\n## 🏟️ クラブ情報\n\n### 新スタジアム（7/9発表・続報なし）\n\n- 収容10万人の新スタジアムを現オールド・トラフォードの約350m北西に建設。移転目標2035年・建設費£2bn超見込み。今週の新規続報は確認できず\n\n### W杯とユナイテッド勢\n\n- 準決勝: スペインがフランスを下し決勝進出（7/14）。イングランド×アルゼンチンは本日JST 8:00——勝てばマイヌー、ラッシュフォードが7/19の決勝でスペインと対戦\n- ティーレマンスはベルギー主将としてのW杯参戦を終え、移籍成立済み\n\n### フロント・女子\n\n- ウィルコックス主導の「MF3人計画」が2人完了。INEOS／ラトクリフ（Sir Jim Ratcliffe）本人の直近14日以内の新規動向はスタジアム関連以外に確認できず\n- 女子はマラール売却（クラブ記録）で移籍市場の売り手側でも動きあり（詳細は移籍セクション）\n\n\u003e source: [manutd.com](https://www.manutd.com/en/news/united-secures-land-for-new-old-trafford-stadium) (2026-07-09) / [FIFA](https://www.fifa.com/en/match-centre/match/17/285023/289290/400021540?gender=2\u0026date=2026-07-15)\n\n---\n\n## 📰 The Athletic ピックアップ\n\n※theathletic.com はクローラー拒否のため原文リンクを直接確認できず。直近のOrnstein（The Athletic）発の報道を転載媒体経由で紹介（全文は購読アカウントで検索を）:\n\n1. **「あと1人のMF獲得は当初からの計画」**（Ornstein・The Athletic FC Podcast）— マイヌー／サントス／ティーレマンスのプロファイルを踏まえ「走力とカバー範囲で補完するタイプ」を狙うと解説。[Yahoo Sports経由](https://sports.yahoo.com/articles/david-ornstein-explains-united-plan-182000391.html) (2026-07-14)\n2. **INEOS首脳はスコットに惚れ込み、ダメならバレバ再燃**（Ornstein）— ボーンマスは今夏売却拒否の構えで、£80m規模の攻防になるとの見立て。[TEAMtalk経由](https://www.teamtalk.com/manchester-united/man-utd-transfer-news-david-ornstein-youri-tielemans-lewis-hall-alex-scott) (2026-07-14)\n3. **ティーレマンス移籍の力学**（Ornstein）— 解除条項固定額のためヴィラは阻止不能だったという交渉構造の解説（公式発表で決着）。[Football365経由](https://www.football365.com/news/aston-villa-powerless-to-stop-tielemans-joining-man-utd-for-35m-as-ornstein-reveals-advanced-talks) (2026-07-13)\n\n\u003e source: [Yahoo Sports](https://sports.yahoo.com/articles/david-ornstein-explains-united-plan-182000391.html)\n\n---\n\n*セルフチェック済み: R1日付ガード（試合=7日以内該当なし・交渉中報道は全て7/12〜7/15＝14日以内・確定移籍は今夏ウィンドウ分のみ、6月完了分は「既報」明示）／R2-R3ソース基準（\"Here We Go\"はRomano明示発言のみ・単独A級ソースは△、複数一致は○）／R4反証チェック（アモリム→カリック体制を明示・エデルソンは破談状態を維持・W杯準決勝は本稿時点で未消化と確認）／R5水増しなし／R6日本語名（英語名）併記*";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
