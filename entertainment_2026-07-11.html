<script>
const md = "# エンタメ週報（2026-07-11）\n\n## 🎬 今週の映画\n\n### ユースフル・ゴースト（原題: A Useful Ghost）\n- **公開日**: 2026年7月10日（金）／新宿武蔵野館・ヒューマントラストシネマ有楽町ほか全国\n- **上映時間**: 130分（ホラー／コメディ／恋愛／SF）\n- **あらすじ**: 亡き妻の魂が掃除機に宿って戻ってくるという奇想から始まる、人間と幽霊の愛と抵抗の物語。タイ社会の記憶と検閲をシュールな笑いで包んだ異色作。\n- **見どころ**: 第78回カンヌ国際映画祭・批評家週間グランプリ受賞作。ラッチャプーム・ブンブンチャチョーク監督は受賞時「タイにいるすべての幽霊に捧げたい」とスピーチ。「掃除機とのロマンス」という設定で反権力を語る構成が国際的に高評価。\n- **評価**: [Rotten Tomatoes 87%](https://www.rottentomatoes.com/m/a_useful_ghost)（IMDb 6.7）\n\n\u003e source: [映画ナタリー（公開告知記事）](https://natalie.mu/eiga/news/667828)\n\n### ザ・レイジ\n- **公開日**: 2026年7月10日（金）／PG12\n- **上映時間**: 111分（2024年製作）\n- **あらすじ**: 家族を奪われた男が巨大な陰謀に単身立ち向かうリベンジアクション。睨まれたら全員地獄行き——怒りを燃料に敵地へ乗り込む。\n- **見どころ**: 『マッハ!!!!!!!!』のムエタイレジェンド、トニー・ジャー主演。CGに頼らない肉弾戦とスピード感あるハードアクションが売り。\n- **評価**: 未評価（集約サイトのスコア未確認）\n\n\u003e source: [映画.com ニュース 2026-04-01「ザ・レイジ 7月10日公開決定」](https://eiga.com/news/20260401/10/)\n\n### キングダム 魂の決戦 【7/17公開予定・確定発表済み】\n- **公開日**: 2026年7月17日（金）※来週金曜。公開日は公式発表済みの確定情報\n- **配給**: 東宝／ソニー・ピクチャーズ　**上映時間**: 134分\n- **あらすじ**: 実写『キングダム』シリーズ第5弾。原作屈指の人気エピソード「合従軍編」に突入し、秦の存亡を懸けた「秦 vs 六国」シリーズ最大規模の攻防戦が描かれる。\n- **見どころ**: 監督・佐藤信介×主演・山﨑賢人の布陣は継続、吉沢亮・小栗旬・斎藤工ら集結。主題歌は米津玄師「夜鷹」。シリーズ累計動員1,734万人・興収245億円の国内最大級フランチャイズの新章。\n- **評価**: 未評価（公開前）\n- 公式サイト: https://kingdom-the-movie.jp/\n\n\u003e source: [ソニー・ピクチャーズ公式プレス 2026-03-12](https://www.sonypictures.jp/corp/press/2026-03-12)\n\n---\n\n## 🎮 ゲーム情報\n\n### FC26：「World Tour Season 9」＆新イベント「Phenoms」開幕\n- **7月8日**: Ultimate Team新シーズン「World Tour Season 9: Spain, Portugal, \u0026 Morocco \u002730」開始。2030年W杯開催国3か国をテーマにしたシーズナルコンテンツ。\n- **7月10日**: Festival of Football連動の新プロモ「Phenoms」開幕。特別選手カードが登場（直前の「Glory Hunters」6/26、「Greats of the Game」6/19に続く夏の連続プロモ）。\n- 通常のTOTWは今シーズン最終号の配出が既に告知されており、現在はW杯連動の「The World\u0027s Game」アップデート（国際トーナメント・53か国収録・無料の93 ペレ配布）を軸にしたライブイベント期に移行中。\n- キャリアモード・Clubs関連の今週の新規発表は※該当なし\n\n\u003e source: [EA SPORTS FC 26 公式ニュース（2026-07-08 / 07-10掲載）](https://www.ea.com/en/games/ea-sports-fc/fc-26/news)\n\n### Minecraft：Java版 26.3 Snapshot 3 配信——ついに「座れる」クッション実装\n- **7月7日**: Java版「26.3 Snapshot 3」＋統合版「Preview 26.40.30」配信。\n- 新アイテム**クッション（Cushion）**を追加。ブロック上に設置して右クリックで座れる、プレイヤー待望の「座る」動作が公式実装。野宿に便利な使い捨て**藁のベッド（Straw Bed）**も登場。\n- これらは2026年秋予定の第3弾ゲームドロップ（新バイオーム「Dappled Forest／まだらな森」、ポプラの木、羊毛の階段など）に向けた先行スナップショット。\n- 注目MOD/データパックの今週の大きな話題は※該当なし\n\n\u003e source: [AUTOMATON 2026-07-08「新スナップショットでクッション登場」](https://automaton-media.com/articles/newsjp/20260708-453796/)\n\n### シャドウバース ワールズビヨンド：第8弾環境が本格化、プレミアシリーズ開幕\n- 第8弾「クロニクル・オブ・デスティニー」（6月29日リリース・1周年記念弾）環境が進行中。攻略サイトのTier表では**ランプドラゴン／スペルウィッチ／魔手ウィッチ／進化ビショップ**がTier1（GameWith集計）。\n- 公式チーム戦「プレミアシリーズ」開幕戦（第1節 day1）が開催され、出場チームのデッキリストと試合結果が公開された。\n- 運営情報: 7月末メンテナンスまでの期間限定で水着キャラのエクスチェンジチケット2枚＋フルアートカード3枚を追加中。6/29から再抽選回数のクラス別調整（ウィッチ2→5回、ビショップ2→3回）も適用済み。\n\n\u003e source: [GameWith プレミアシリーズ開幕戦(day1)デッキリスト・結果](https://gamewith.jp/shadowverse-wb/567644)／[電撃オンライン 第8弾情報](https://dengekionline.com/article/202606/78975)\n\n### 新作リリース①：ゲッP-X\n- **7月10日発売** ／ PC・PS4・PS5・Switch・Xbox Series ／ 通常版4,400円 ／ Bliss Brain\n- 70年代熱血ロボアニメ風のストーリーパートと、3形態切替シューティングを融合した復刻系STG。\n- **評価**: 未評価（発売直後でレビュー未集計）\n\n\u003e source: [ファミ通.com 発売スケジュール（2026年7月）](https://www.famitsu.com/schedule)\n\n### 新作リリース②：ヒプノシスマイク -Alternative Rap Battle- 2nd period\n- **7月10日発売** ／ Switch ／ 通常版8,580円・特装版10,780円 ／ アイディアファクトリー・オルタギア\n- 人気音楽原作キャラクタープロジェクトのリズム＆ノベルゲーム第2弾。\n- **評価**: 未評価（発売直後でレビュー未集計）\n\n\u003e source: [ファミ通.com 発売スケジュール（2026年7月）](https://www.famitsu.com/schedule)\n\n### 新作リリース③：プロ野球スピリッツ2026 【7/16発売予定】\n- **7月16日（木）発売予定** ／ PS5・PC ／ 8,778円（デジタルデラックス10,978円） ／ KONAMI\n- シリーズ最新作。家庭用「プロスピ」としては**17年ぶりに「2026 WORLD BASEBALL CLASSIC」モードを収録**。早期購入特典は侍ジャパン2026「大谷翔平」使用権。前作購入者はDL版予約で30%OFF。\n- **評価**: 未評価（発売前）\n\n\u003e source: [KONAMI 公式リリース 2026-04-16](https://www.konami.com/games/corporate/ja/news/topics/20260416/)\n\n### 注目セール：PS Store「7月のお買い得セール」（〜7/15）\n- **PlayStation Store ／ 最大67%OFF ／ 7月15日まで**\n- 「買い」の理由: 『メタファー：リファンタジオ』60%OFF（4,000円以下）、『FINAL FANTASY VII REBIRTH Digital Deluxe』60%OFF（3,256円）など、高評価RPG大作が半額超えの割引。\n- 補足: **Steamサマーセール2026は日本時間7月10日2時で終了済み**（6/26〜7/10開催）。次のPS Store大型「サマーセール」は例年7月中旬開始（正式日程未発表＝予定情報）。\n\n\u003e source: [GAME Watch「7月のお買い得セール」開始記事](https://game.watch.impress.co.jp/docs/news/2121385.html)\n\n---\n\n## 🎌 アニメ・ストリーミング\n\n### 攻殻機動隊 THE GHOST IN THE SHELL 第1話——「原作準拠」が大反響\n- **7月7日（火）放送開始**（カンテレ・フジテレビ系\"火アニバル!!\"枠）\n- 士郎正宗の原作漫画を**史上初めて忠実にアニメ化**する新作。第1話放送直後から「原作準拠で神すぎんか？」「原作の少佐はかわいいんよ！」と長年のファンが反応、旧バトー役の大塚明夫が「大成功だね！生きてて良かった…最高でした」と称賛したことも話題に。\n- 一方で原作特有の情報密度と会話の速さに「新規には難しい」の声もあり、賛否含めて今週のアニメ最大の話題作。\n- キャスト: 草薙素子=坂本真綾、バトー=安元洋貴、トグサ=中村悠一\n- 公式サイト: https://www.theghostintheshell-anime.jp/\n\n\u003e source: [アニメ！アニメ！ 2026-07-08（大塚明夫コメント記事）](https://animeanime.jp/article/2026/07/08/100836.html)\n\n### 無職転生III ～異世界行ったら本気だす～ 第1話・第2話連続放送\n- **7月4日（土）放送開始**。第1話「燃えよ狂犬」・第2話「吠えよ狂犬」を連続放送する「エリス修行編」でスタート。dアニメストアでも7月4日から配信中。\n- 第1期ラストでルーデウスのもとを去ったエリスが、剣神ガル・ファリオンの下でひたすら剣を振る修行の日々が初めて描かれ、原作ファンの注目を集めた。第2期の結婚後を受けた原作13巻以降の映像化。\n- **評価**: 集約スコア未確認のため未評価\n\n\u003e source: [GAME Watch 2026-07月「無職転生III 7月4日放送開始」](https://game.watch.impress.co.jp/docs/news/2121301.html)\n\n### 配信ランキング\n- ※該当なし（dアニメストア週間ランキング・Netflix週間TOP10とも、今回参照可能な公式ソースから当週の順位データを取得できず。信頼できる数値が確認できないため掲載見送り）\n\n\u003e source: [dアニメストア ランキングページ（データ取得不可）](https://animestore.docomo.ne.jp/animestore/CR/CR00000014?ranking_type=views\u0026period=weekly)\n\n### 今週の新着注目：2026夏アニメが一斉スタート\n- dアニメストアの2026夏アニメ見放題は**新作63作品以上**でサービス中最多クラス。今週〜来週にかけて「骸骨騎士様、只今異世界へお出掛け中Ⅱ」（7月13日配信開始）など続編組が順次追加。\n- アニメハック／映画.comは7月8日から「第1話を見て継続視聴を決めた作品は？」アンケートを実施中で、夏クールの初速話題の指標になる。\n\n\u003e source: [dアニメストア 2026夏アニメ配信ラインナップ（公式）](https://animestore.docomo.ne.jp/animestore/CF/summer)／[アニメハック 2026-07-08](https://anime.eiga.com/news/126884/)";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
