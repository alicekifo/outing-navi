<script>
const md = "## 📰 今週のニュース（2026年6月13日〜20日）\n\n---\n\n### 1. 【公式】真夏の全国ツアー2026 グループ史上最大規模で開幕\n\n乃木坂46の「真夏の全国ツアー2026」が6月13日（土）・14日（日）、福井県・サンドーム福井で開幕した。全国8都市18公演に及ぶグループ史上最大規模のツアーで、ファイナルは東京・明治神宮野球場（8月20日〜23日）を予定。\n\n新センター・一ノ瀬美空（5期生）が「乃木坂46と過ごす夏を選んでくれて、ありがとう！」と感謝を述べ、新キャプテン・菅原咲月（4期生）は「18公演を回るツアー。たくさん記憶に残るライブになったら」と意気込みを語った。\n\n\u003e 情報源：[音楽ナタリー](https://natalie.mu/music/news/676163)（ライブレポート）／[ORICON NEWS](https://www.oricon.co.jp/news/2461175/full/) ／ [公式サイト](https://www.nogizaka46.com/s/n46/page/summer_tour2026)\n\n---\n\n### 2. 【公式】遠藤さくら＆井上和、「ナツイチ2026」メインキャラクターに就任\n\n集英社文庫の夏の文庫フェア「ナツイチ2026」（第36回）が6月19日（金）より全国約3,500店の書店でスタート。遠藤さくら（3期生）と井上和（5期生）がメインキャラクターに就任した。コンセプトムービー「きみの意外な1ページ。」のほか、二人の特別対談動画も公開されている。フェアは9月30日まで開催。\n\n\u003e 情報源：[公式サイト](https://www.nogizaka46.com/s/n46/news/detail/102022?ima=0800\u0026pri1=202606)（2026年6月19日）／[集英社プレスリリース（PR TIMES）](https://prtimes.jp/main/html/rd/p/000000892.000011454.html)\n\n---\n\n### 3. 【公式】増田三莉音（6期生）、真夏の全国ツアー2026 を休演\n\n体調不良で活動休止中の増田三莉音（6期生）について、「真夏の全国ツアー2026」全公演の休演が公式サイトにて発表された。6月21日・28日のオンライン ミート＆グリートも欠席となる。\n\n\u003e 情報源：[公式サイト – 活動休止のお知らせ](https://www.nogizaka46.com/s/n46/news/detail/101904) ／ [スポニチアネックス（Yahoo!ニュース経由）](https://news.yahoo.co.jp/articles/13a2f37a91079cab321b943bc265e22038f17c6a)\n\n---\n\n## 🎵 音楽・リリース情報\n\n### 42ndシングル「是非に及ばず」 7月22日（水）発売決定【公式】\n\n| 項目 | 内容 |\n|------|------|\n| タイトル | 是非に及ばず |\n| 発売日 | 2026年7月22日（水） |\n| センター | 一ノ瀬美空（5期生） |\n| フォーメーション発表 | 2026年6月7日放送「乃木坂工事中」（テレビ東京系）にて |\n\n**選抜メンバー18名（期生順）：**\n- 3期生：遠藤さくら、田村真佑、岩本蓮加、冨里奈央（後列・復帰）\n- 4期生：賀喜遥香、筒井あやめ、林瑠奈、菅原咲月、弓木奈於\n- 5期生：一ノ瀬美空（センター）、五百城茉央、川﨑桜、井上和、池田瑛紗、中西アルノ\n- 6期生：瀬戸口心月（復帰）、矢田萌華（復帰）、大越ひなの（**初選抜**）、森平麗心（**初選抜**）\n\n**注目ポイント：**\n- 6期生の大越ひなの・森平麗心が初選抜入り\n- 岩本蓮加（3期生）が5作ぶりに選抜復帰\n- 小川彩（4期生）・冨里奈央（3期生）は選抜落ち（ナタリー報道）\n\n\u003e ※ チャート動向・MV再生数は今週時点では該当なし（発売前）\n\n\u003e 情報源：[公式サイト](https://www.nogizaka46.com/s/n46/news/detail/101977) ／ [モデルプレス](https://mdpr.jp/music/detail/4794771) ／ [ORICON NEWS](https://www.oricon.co.jp/news/2459651/full/)\n\n---\n\n## 👤 メンバー個別活動\n\n### 1. 遠藤さくら（3期生）・井上和（5期生）／「ナツイチ2026」メインキャラクター就任\n\n集英社「ナツイチ2026」のメインキャラクターとして揃って起用。浴衣姿のビジュアルと本に関する特別対談動画が公開された。遠藤・井上はともに集英社「non-no」の専属モデルでもある。\n\n- 日時：2026年6月19日（金）スタート〜9月30日（水）\n- 情報源：[ナタリー](https://natalie.mu/music/news/676863) ／ [公式サイト](https://www.nogizaka46.com/s/n46/news/detail/102022?ima=0800\u0026pri1=202606)（2026年6月19日）\n\n---\n\n### 2. 一ノ瀬美空（5期生）／ 42ndシングル 初の表題曲センターに抜擢・ツアー開幕でスピーチ\n\n「是非に及ばず」にて5期生として初の単独センターを担当。真夏の全国ツアー開幕公演（6月13日・14日 サンドーム福井）でもフロントとしてステージに立った。「すごく重みがあります」とコメント。\n\n- 情報源：[モデルプレス](https://mdpr.jp/music/detail/4794771) ／ [Yahoo!ニュース（ENCOUNT）](https://news.yahoo.co.jp/articles/a609a17ab6521a9aab7c9ba7b225fa9604803996)\n\n---\n\n### 3. 増田三莉音（6期生）／ 体調不良で活動休止継続・ツアー全休演\n\n4月28日の休止発表から継続中。真夏の全国ツアー2026の全公演、6月21日・28日のオンライン ミート＆グリートを欠席することが公式発表された。\n\n- 情報源：[ORICON NEWS](https://www.oricon.co.jp/news/2451854/full/) ／ [ナタリー](https://natalie.mu/music/news/670168)\n\n---\n\n## 🎤 ライブ・イベント\n\n### 真夏の全国ツアー2026【公式】\n\n全国8都市18公演。TODAY（6/20）以降の主要予定：\n\n| 日程 | 会場 | 備考 |\n|------|------|------|\n| ~~6月13日（土）・14日（日）~~ | ~~サンドーム福井~~ | 開催済（ツアー開幕） |\n| **6月24日（水）・25日（木）** | 横浜アリーナ（神奈川） | 夏の横浜アリーナ公演は初 |\n| 8月20日（木）〜23日（日） | 明治神宮野球場（東京） | ツアーファイナル（4日間） |\n\n\u003e ※ 北海道・広島・大阪・宮城・福岡の詳細日程は公式サイトを要確認\n\n\u003e チケット・申込：[公式ツアーページ](https://www.nogizaka46.com/s/n46/page/summer_tour2026)\n\n---\n\n### 41stシングル発売記念 オンライン ミート＆グリート【公式】\n\nforTUNE music 限定。各回10:00〜20:00（5セッション制）\n\n- **6月21日（日）**\n- **6月28日（日）**\n\n\u003e ※ 増田三莉音（6期生）は欠席\n\n\u003e 情報源：[公式サイト](https://www.nogizaka46.com/s/n46/news/detail/101746)\n\n---\n\n## 📋 グループ動向\n\n### 1. 42ndシングル「是非に及ばず」選抜・センター確定【公式】\n\n2026年6月7日（日）放送の「乃木坂工事中」（テレビ東京系）にてフォーメーション発表。一ノ瀬美空（5期生）が5期生初の単独センター。6期生から大越ひなの・森平麗心が選抜初選出。\n\n---\n\n### 2. 菅原咲月（4期生）が新キャプテンとして初の全国ツアーに臨む\n\n菅原咲月（4期生）が新キャプテンとして臨む初の全国ツアー。開幕公演で「たくさん記憶に残るライブになったら」とコメント。\n\n\u003e 情報源：[ORICON NEWS](https://www.oricon.co.jp/news/2461175/full/)\n\n---\n\n### 3. 増田三莉音（6期生）の活動休止が長期化\n\n当初の予定を超えて活動休止が継続中（4月28日発表以来、約4か月規模に延長）。ツアー全休演が公式発表された。\n\n\u003e 情報源：[ナタリー](https://natalie.mu/music/news/670168) ／ [公式サイト](https://www.nogizaka46.com/s/n46/news/detail/101904)\n\n---\n\n\u003e ### 出力前セルフチェック結果\n\u003e - [x] 全項目 R1（日付）クリア ── ツアー開幕6/13・ナツイチ6/19はいずれも7日以内。42ndシングル選抜発表（6/7放送）は7日前の境界外のため「音楽情報・グループ動向」として収録し「今週のニュース」とは区別した\n\u003e - [x] 卒業・加入情報は公式発表のみ ── 今週該当なし\n\u003e - [x] メンバー名は漢字フルネーム + 期数\n\u003e - [x] 噂と確定を区別 ── 公式は【公式】明記、報道は媒体名明記\n\u003e - [x] チャート数値・MV再生数 ── 7月22日発売前につき「今週該当なし」と明記";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
