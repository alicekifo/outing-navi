const md = "# マンチェスター・ユナイテッド情報週報\n**2026年6月22日（月）号**\n\n---\n\n## 1. 今週のヘッドライン\n\n- **エデルソン（アタランタ）加入ほぼ確定** — £35m＋アドオンで合意\n- **カゼミーロがインテル・マイアミ移籍で合意**（6/21報道・フリートランスファー）\n- **W杯2026開催中** — マンU所属選手13名が北米大会に参戦\n\n---\n\n## 2. 試合情報\n\n### 直近の試合結果（6/15〜6/22）\n競技試合なし（プレミアリーグはオフシーズン中）\n\n### 今後の試合予定（プレシーズン）\n\n| 日付 | 対戦相手 | 開催地 |\n|------|----------|--------|\n| 7/18 | ウレクサム | ヘルシンキ（フィンランド） |\n| 7/24 | ローゼンボリ | ノルウェー |\n| 8/1 | アトレティコ・マドリード | ストックホルム（スウェーデン） |\n| 8/12 | リーズ | ダブリン（アイルランド） |\n| 8/15 | ACミラン | ヴロツワフ（ポーランド） |\n\n**2026-27プレミアリーグ開幕: 8月22日（予定）**\n\n---\n\n## 3. 移籍情報（直近14日以内: 6/8〜6/22）\n\n### ✅ 合意・確定済み\n\n**[IN] エデルソン（アタランタ → マンチェスター・ユナイテッド）**\n- 移籍金: 初期額 £35m ＋ アドオン最大 £4m（総額 £38〜39m 相当）\n- 26歳、ブラジル人ボランチ / 右利き\n- 契約: 2030年まで（オプション+1年）\n- カリック体制初補強。全書類の処理完了済みと報道\n- ソース: [ESPN](https://www.espn.com/soccer/story/_/id/48953983/man-united-agree-deal-atalanta-ederson-sources)・[Sky Sports](https://www.skysports.com/football/news/11095/13548678/man-utd-agree-ederson-deal-atalanta-midfielder-set-for-old-trafford-in-lb38m-transfer)（A級）、Fabrizio Romano（S級）\n\n**[OUT] カゼミーロ（マンチェスター・ユナイテッド → インテル・マイアミ）**（6/21確認）\n- フリートランスファー（6/30に契約満了）\n- W杯終了後（7月以降）にMLS合流見込み\n- メッシとの共演を決め手に、LAギャラクシー・サウジ勢との争奪を制す\n- ソース: [Fabrizio Romano確認済み](https://www.sofascore.com/news/casemiro-to-inter-miami-a-free-transfer-that-shakes-up-mls)（S級）・[ESPN](https://www.espn.com/soccer/story/_/id/48827857/inter-miami-casemiro-transfer-man-united-la-galaxy)（A級）\n\n### 🔍 調査・交渉中\n\n| 選手名 | 現所属 | ポジション | 信頼度 |\n|--------|--------|----------|--------|\n| エリオット・アンダーソン | ノッティンガム・フォレスト | MF | A級（Sky Sports）|\n| マテウス・フェルナンデス | ウェストハム | MF | A級（Sky Sports）|\n| マティアス・フェルナンデス-パルド | リール | WG/FW（21歳） | B級 |\n\n- アレックス・スコット（ボーンマス）: ボーンマス側が「今夏売却なし」と明言、契約延長交渉中\n\n### 📋 完了済み（参考）\n- **ラスムス・ホイルンド → ナポリ（永久移籍確定）**: 6/3発表。ローン中16ゴールが評価され買取オプション行使。総額€50m（ローン費€6m＋移籍金€44m）をマンU側が回収\n\n---\n\n## 4. チーム情報\n\n### 監督体制\n**マイケル・カリック監督（44歳）** が2028年まで契約（オプション+1年）で続投。2025-26シーズン後半に暫定から昇格し16試合11勝を記録、クラブを3位・チャンピオンズリーグ復帰に導いた。プレミアリーグ最優秀監督賞候補にも挙がった。\n\n### 負傷者情報\n**マティス・デ・リフト（CB、オランダ）**: 背中の手術を受けて2025年11月以降欠場中。公式発表では「2026-27シーズン序盤の復帰を目標」。オランダ代表としてW杯不参加も確定。\n\n---\n\n## 5. ワールドカップ2026（6/11〜7/19 北米開催）\n\nマンU所属選手13名が参戦中。主な選手と代表：\n\n| 選手名 | 代表 |\n|--------|------|\n| ブルーノ・フェルナンデス | ポルトガル |\n| コビー・マイノー | イングランド |\n| マーカス・ラッシュフォード | イングランド |\n| ジオゴ・ダロト | ポルトガル |\n| マヌエル・ウガルテ | ウルグアイ |\n| マテウス・クーニャ | ブラジル |\n| カゼミーロ | ブラジル |\n| リサンドロ・マルティネス | アルゼンチン |\n| アマド | コートジボワール |\n| ヌサイル・マズラウイ | モロッコ |\n| アルタイ・バインドゥル | トルコ |\n| センヌ・ラメンス | ベルギー |\n| タイラー・フレッチャー | スコットランド（遅れて招集） |\n\nW杯終了（7/19）後、プレシーズン初戦（7/18 ウレクサム戦）には主力の大半が不在となる見込み。\n\n**主な不参加選手**: ハリー・マグワイア・ルーク・ショー（イングランド選外）、アンドレ・オナナ（カメルーン）、ラニー・ヨロ（フランス）、マティス・デ・リフト（負傷）\n\n---\n\n## 6. まとめ・今後の注目点\n\n| 項目 | 内容 |\n|------|------|\n| 補強の軸 | ボランチ（エデルソン確定＋アンダーソン調査）＋フォワード1名が夏の主目標 |\n| カゼミーロ後継 | エデルソン加入で世代交代が本格化 |\n| 移籍資金 | ホイルンド売却€50m＋カゼミーロ人件費削減で補強余地あり |\n| W杯帰還時期 | 早期敗退組は7月中旬から、ベスト8以上は7月末〜8月合流 |\n| デ・リフト復帰 | 2026-27開幕後の早期復帰を目指して回復中 |\n\n---\n\n*情報は2026年6月22日時点。移籍報道の信頼度はマンU公式・Fabrizio Romano（S級）、ESPN・Sky Sports（A級）に基づき格付けしています。*\n\n---\n\n**Sources:**\n- [De Ligt shares positive recovery update | manutd.com](https://www.manutd.com/en/news/de-ligt-shares-positive-recovery-update-june-2026)\n- [Man United agree deal with Atalanta for Éderson | ESPN](https://www.espn.com/soccer/story/_/id/48953983/man-united-agree-deal-atalanta-ederson-sources)\n- [Man Utd agree Ederson deal | Sky Sports](https://www.skysports.com/football/news/11095/13548678/man-utd-agree-ederson-deal-atalanta-midfielder-set-for-old-trafford-in-lb38m-transfer)\n- [Casemiro set to join Inter Miami | footballtoday.com](https://footballtoday.com/2026/06/21/casemiro-set-to-join-inter-miami-after-leaving-manchester-united/)\n- [Casemiro joins Inter Miami on a free transfer | SofaScore](https://www.sofascore.com/news/casemiro-to-inter-miami-a-free-transfer-that-shakes-up-mls)\n- [Rasmus Hojlund signs with Napoli permanent | ESPN](https://www.espn.com/soccer/story/_/id/48955010/rasmus-hojlund-seals-permanent-move-napoli-manchester-united)\n- [Man United appoint Michael Carrick as permanent head coach | ESPN](https://www.espn.com/soccer/story/_/id/48789147/man-united-michael-carrick-appointed-permanent-head-coach)\n- [United at the World Cup 2026 | manutd.com](https://www.manutd.com/en/news/united-at-the-2026-world-cup-when-are-the-group-games)\n- [Manchester United preseason 2026 schedule | ESPN](https://www.espn.com/soccer/story/_/id/49008893/manchester-united-preseason-schedule-wrexham-psg-atletico-leeds)\n- [Man Utd transfer news - exploring midfielder and forward | Sky Sports](https://www.skysports.com/football/news/11095/13552631/man-utd-transfer-news-red-devils-continuing-to-explore-opportunities-to-add-midfielder-and-forward-to-their-ranks)";
