<script>
const md = "## 🤖 今週のAI最新動向\n\n### 1. Thinking Machines初の自社モデル「Inkling」— 975B MoEをオープンウェイトで公開\n\n元OpenAI CTOのMira Muratiが率いるThinking Machines Labが、7月15日に創業以来初の自社開発モデル「Inkling」をオープンウェイトで公開した。総パラメータ975B・アクティブ約41BのMoE構成で、テキスト・画像・音声・動画の45兆トークンで学習し、4モダリティをネイティブに横断推論する。\n\n重要なのは、同社がこれを「完成品」ではなく「カスタマイズの出発点」と位置づけている点。自社のファインチューニング基盤Tinkerとセットで提供し、フロンティア最強を狙うのではなく「組織が自分用に調整する土台」として最適化する戦略を明示した。巨大ラボがオープンウェイト×カスタマイズ基盤の商売を本格化させた事例として、ローカルLLM界隈への波及が大きい。\n\n出典: [Thinking Machines Lab](https://thinkingmachines.ai/news/introducing-inkling/) (2026-07-15公開)\n\u003e source: https://thinkingmachines.ai/news/introducing-inkling/\n\n### 2. Moonshot AI「Kimi K3」— 2.8Tパラメータ、史上最大のオープンウェイトモデル\n\n中国Moonshot AIが7月16日、総パラメータ2.8兆の「Kimi K3」を発表した。896エキスパート中16がトークンごとにアクティブになるMoE構成で、コンテキスト長は100万トークン。フルのオープンウェイトは7月27日までに公開予定。API価格は入力$0.30/M（キャッシュヒット時）・$3/M（ミス時）、出力$15/M。\n\n米国の計算資源規制下でこの規模のオープンウェイトが出てきた意味は大きい。第三者のブラインド評価（Arena）ではフロントエンドコーディングで米フロンティアモデル勢を上回る選好を得たと報じられており、「オープンウェイト＝1世代遅れ」という前提が今週さらに崩れた。自前GPUで動かせる規模ではないが、重みが公開されること自体が蒸留・研究・監査の土台になる。\n\n出典: [Bloomberg](https://www.bloomberg.com/news/articles/2026-07-17/china-s-powerful-new-moonshot-ai-model-closes-gap-with-us-rivals) (2026-07-17公開)\n\u003e source: https://www.bloomberg.com/news/articles/2026-07-17/china-s-powerful-new-moonshot-ai-model-closes-gap-with-us-rivals\n\n### 3. PrismML「Bonsai 27B」— 27BクラスをiPhoneに載せる1-bit量子化、Apache 2.0で全公開\n\nCaltech発スタートアップPrismMLが7月14日、Qwen3.6-27BベースのマルチモーダルモデルBonsai 27Bを公開した。三値量子化版が5.9GB（実効1.71bit/weight）、1-bit版が3.9GB（実効1.125bit/weight）で、後者はスマホで動く初の27Bクラスを謳う。MLX（Apple Silicon）とCUDA向けにハイブリッドアテンション用の低ビット専用カーネルを自作しており、Apache 2.0で当日から全部オープンソース。\n\n自称値ながら、フル精度比で数学・コーディング・推論・視覚の90〜95%を維持と主張している。1.x bit帯の量子化は品質崩壊が定説だったので、カーネルとアーキテクチャの共設計でどこまで本当に耐えているか、llama.cpp系の量子化と比較検証する価値がある。マルチステップ推論・ツール呼び出し・computer-useまでローカルで回る水準なら、エアギャップ環境でのエージェント運用の選択肢が変わる。\n\n出典: [PrismML](https://prismml.com/news/bonsai-27b) (2026-07-14公開)\n\u003e source: https://prismml.com/news/bonsai-27b\n\n## 📄 今週の注目論文\n\n### 1. エージェント・データ注入攻撃はAIエージェントへの現実的脅威である / Agent Data Injection Attacks are Realistic Threats to AI Agents\n\n- 著者: Woohyuk Choi ら / arXiv:2607.05120 / 2026-07-06公開\n- **Problem**: 従来のエージェント攻撃研究は「命令の注入」に集中しており、信頼済みデータを装った悪性データ（セキュリティ関連メタデータやエージェントのコンテキストデータの偽装）という攻撃面が未検証だった\n- **Method**: この攻撃クラスをADI（Agent Data Injection）と定義し、実在のWebエージェント・コーディングエージェント複数系統に対して攻撃を実証\n- **Finding**: Webエージェント（Claude in Chrome、Antigravity、Nanobrowser）で任意クリック攻撃、コーディングエージェント（Claude Code、Codex、Gemini CLI）でリモートコード実行とサプライチェーン攻撃が成立。既存のプロンプトインジェクション防御を素通りする\n\n**読みどころ**: 「命令」でなく「データ」を偽装する攻撃はinstruction filteringの守備範囲外で、日常使いのコーディングエージェントでRCEまで通っている点が生々しい。根本原因を「信頼できるデータと信頼できないデータの分離をエージェントが実装していないこと」と特定しており、OSのセキュリティ設計を知る人ほど既視感で頭を抱える内容。\n\n出典: [arXiv](https://arxiv.org/abs/2607.05120) (2026-07-06公開)\n\u003e source: https://arxiv.org/abs/2607.05120\n\n### 2. LLMエージェント向けアウトオブバンド型プロンプトインジェクション防御の適応的評価 / Adaptive Evaluation of Out-of-Band Defenses Against Prompt Injection in LLM Agents\n\n- 著者: Praneeth Narisetty ら / arXiv:2606.26479 / 2026-06-25公開\n- **Problem**: CaMeL・FIDES・Progent等の決定論的ポリシー型防御は静的ベンチマークでしか検証されておらず、適応的攻撃への耐性が不明だった\n- **Method**: 各防御をBiba整合性モデル・参照モニタ・最小権限という古典セキュリティ理論で分類し、明示した脅威モデルの下でAgentDojo＋Qwen2.5-7Bに対するブラックボックス適応攻撃を実施\n- **Finding**: Progentは平均攻撃成功率を25.8%→4.2%と約6分の1に低減し、手作りの適応攻撃でも成功率2.6%に留まった。ただしホワイトボックスのGCG系攻撃は未検証と明記\n\n**読みどころ**: LLM防御を「プロンプトの工夫」でなく参照モニタや整合性モデルの語彙で整理し直した論文で、1970年代のOSセキュリティ理論がそのまま最前線に戻ってきた格好。数値の限界（モデル1種・3試行）を著者自身が正直に書いているのも評価軸として使える。\n\n出典: [arXiv](https://arxiv.org/abs/2606.26479) (2026-06-25公開)\n\u003e source: https://arxiv.org/abs/2606.26479\n\n### 3. Long-Horizon-Terminal-Bench: 密な報酬で測る長時間ターミナルタスクの限界 / Long-Horizon-Terminal-Bench: Testing the Limits of Agents on Long-Horizon Terminal Tasks with Dense Reward-Based Grading\n\n- 著者: Zongxia Li ら / arXiv:2607.08964 / 2026-07-09公開\n- **Problem**: 既存のターミナル系ベンチは数分で終わる課題を最終結果のみで採点しており、途中経過と部分解を捨てている（報酬がスパース）\n- **Method**: 実験再現・ソフトウェア工学・科学計算・対話ゲーム等9カテゴリ46タスクを、サブタスク分解による部分点つき密報酬で採点するベンチマークを構築\n- **Finding**: 1タスク平均約990万トークン・231エピソード・85.3分を消費。最強モデルでも部分報酬しきい値0.95でpass@1が15.2%、完全達成では10.9%。テスト対象モデルの平均は4.3%と1.7%\n\n**読みどころ**: 「数時間シェルの中で作業し続ける」というエージェントの実運用形に一番近いベンチで、フロンティアモデルですら9割落ちるという現在地の測定として貴重。部分点の設計は自前のエージェント評価基盤を作る際の設計図としてそのまま流用できる。\n\n出典: [arXiv](https://arxiv.org/abs/2607.08964) (2026-07-09公開)\n\u003e source: https://arxiv.org/abs/2607.08964\n\n### 4. 性能最適化ベンチマークはコーディングエージェントを正しく測れているか / Are Performance-Optimization Benchmarks Reliably Measuring Coding Agents?\n\n- 著者: Zhi Chen ら / arXiv:2607.01211 / 2026-07-01公開（2026-07-16改訂）\n- **Problem**: GSO・SWE-Perf・SWE-fficiency等の「コード高速化」ベンチのスコアが、エージェント能力でなく実行環境ノイズや採点方式に左右されている疑い\n- **Method**: 公式リファレンスパッチを4種類のGoogle Cloudマシンで再実行し、740タスクの再現性を横断検証\n- **Finding**: 全マシンで有効な性能が維持されたのはGSOで39/102、SWE-Perfで11/140タスクのみ。8件の公開サブミッション間の順位は28ペア比較中9件で機種により逆転。SWE-fficiencyはワースト10タスクがスコアの58.5〜82.8%を占める偏りも\n\n**読みどころ**: ベンチマークのリーダーボード差が「マシンガチャ」で説明できてしまうという、性能計測をやったことがある人なら全員頷く話。SWE-Perfの有効タスク率8%は衝撃で、ベンチ数値を引用する側（このニュースも含む）への警鐘として今週一番実務的。\n\n出典: [arXiv](https://arxiv.org/abs/2607.01211) (2026-07-01公開)\n\u003e source: https://arxiv.org/abs/2607.01211\n\n## 💡 今週のひとことインサイト\n\n### 1. エージェントセキュリティは1970年代を再履修している\n\n今週の2本のセキュリティ論文を並べると綺麗な構図が見える。ADI論文が示した根本原因は「信頼できるデータと信頼できないデータを分離していない」こと、防御評価論文が持ち出した道具はBiba整合性モデルと参照モニタ——どちらも1970年代のOSセキュリティ理論だ。つまりLLMエージェントは、権限分離もMACもない時代のUNIXと同じ地点に立っている。プロンプトという単一チャネルに命令もデータも混ぜて流す設計は、スタックに戻り番地とデータを同居させた設計と本質的に同じ穴で、実際Claude CodeやCodexでRCEが通った。一方でリリース面では今週、Inkling・Kimi K3・Bonsai 27Bとオープンウェイトの当たり週。重みが手元にあれば防御の検証も攻撃面の監査も自分でできる。SELinuxがそうだったように、エージェントの「特権分離」も結局オープンな実装から標準化されていく気がする（笑）——歴史は繰り返すというより、履修漏れを回収しに来ている。\n\n\u003e source: https://arxiv.org/abs/2607.05120 / https://arxiv.org/abs/2606.26479";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
