<script>
const md = "情報が揃いました。週報を生成します。\n\n---\n\n# ライフスタイル週報　2026/6/14\n\n---\n\n## 🍷 ワイン\n\n### 今週のワインニュース\n\n**ボルドー2024プリムール本格始動 ── 1991年来最小の収量、価格は2023年比 ▲30%**\n\n春先の豪雨とベト病（ミルデュー）が直撃したボルドー2024は収量が1991年以来最少。半面、アルコール度数が抑えられ「90年代を想起させる繊細なエレガントスタイル」との評価が複数の評論家から上がっており、出荷価格は2023年比 ▲30%、2022年比では ▲50〜60% に相当するシャトーも。**TERRADA WINE MARKET** では6月2日より95点以上獲得シャトーのプリムール先行販売を開始。品薄ながら割安に優良シャトーを手当てできる好機となっている。\n\n情報源：[TERRADA WINE MARKET（2026/6/2）](https://www.terrada.co.jp/ja/news/15539/) ／ [Wine Report「1991年以来最小の生産量、どうなるボルドー2024」](https://www.winereport.jp/archive/5134/)\n\n---\n\n### おすすめワイン\n\n※今週は実販売価格（2,000〜5,000円帯）が公式ソースで確認できた新着ワインが見当たりませんでした。以下の酒販店ECで最新在庫をご確認ください。\n\n- [フィラディスワインクラブ 新着](https://firadis.net/)\n- [エノテカ 新着](https://www.enoteca.co.jp/)\n- [カーヴ・ド・リラックス THE CELLAR online](https://www.cavederelax.com/)\n\n---\n\n### イベント・フェア（TODAY以降）\n\n**Toranomon Wine Festa 6月回　テーマ：イタリア**\n\nカーヴ・ド・リラックス THE CELLAR Toranomon主催、毎月第3土曜日開催の人気試飲フェスタ。6月回のテーマはイタリアで、各産地のテロワールを体験できる構成。開催予定日：**2026年6月20日（土）**（詳細・チケットは公式サイトで要確認）。\n\n詳細：[カーヴ・ド・リラックス公式](https://www.cavederelax.com/)\n\n---\n\n## 🍶 日本酒\n\n### 新酒・季節酒情報\n\n**6月は夏酒・生酒のピークシーズン**\n\n5〜6月は各蔵から生酒・低アルコール・スパークリング系夏酒が相次ぎリリースされる最盛期。「軽快な酸・ジューシーな果実感・スッキリとした後切れ」を軸にした商品が今年も充実しており、冷やして10℃前後で楽しむスタイルが定番。\n\n---\n\n### 話題の蔵元・銘柄\n\n**① 二兎 純米吟醸 山田錦55 生酒 ── 丸石醸造（愛知県岡崎市）**\n\n| スペック | |\n|---------|--|\n| 特定名称 | 純米吟醸 |\n| 精米歩合 | 55% |\n| 酒米 | 山田錦 |\n| 酵母・日本酒度・酸度 | 公式スペック要確認 |\n| 火入 | 生酒（無加熱） |\n\n山田錦の丸みとジューシーな果実感に、生酒ならではの瑞々しいフレッシュ感が重なる。夏の冷酒にちょうどよい張りのある酸が心地よく、鯵のカルパッチョや出汁巻き卵など和洋どちらの肴にも合わせやすい。8〜12℃で飲み頃。\n\n購入先：[はせがわ酒店 オンライン](https://www.hasegawasaketen.com/blog/news/thisweek/)\n\n---\n\n**② 風の森 ALPHA TYPE 4 新たなる希望 ── 油長酒造（奈良県御所市）**\n\n| スペック | |\n|---------|--|\n| ブランド | 風の森 ALPHAシリーズ |\n| 特徴 | 無濾過・無加水・生（しぼり華）、微発泡 |\n| 実験的要素 | 柿渋（タンニン成分）を活用した革新的製法 |\n| 精米歩合・酵母 | 詳細は蔵元公式要確認 |\n\n「風の森」の精緻なミネラル感と生酒由来の透明感に、柿渋由来の複雑な旨味層が加わる実験的な1本。ALPHAシリーズは毎回テーマを変えた酒造りへの挑戦で、マニア層から注目度が高い。初夏の冷酒として、白身魚のお造りや生ハムとのペアリングが映える。\n\n購入先：[IMADEYA ONLINE STORE](https://imadeya.co.jp/)（2026年6月新入荷予定）\n\n---\n\n### イベント・フェア（TODAY以降）\n\n**日本酒フェア2026 ── 全国1,000銘柄以上、国内最大級**\n\n| 項目 | 詳細 |\n|------|------|\n| 日時 | 6月19日（金）18:00〜20:30 |\n| | 6月20日（土）①10:30〜13:00　②14:30〜17:00 |\n| 会場 | 池袋サンシャインシティ ワールドインポートマートビル4F 展示ホールA |\n| 入場料 | 一般 5,000円 ／ U-39（20〜39歳）2,000円 |\n| 公式 | [sakefair.com](https://sakefair.com/) |\n\n45都道府県の酒造組合が参加、1,000銘柄以上を試飲できる国内最大規模の日本酒イベント。令和7酒造年度の全国新酒鑑評会入賞酒 約400点の公開きき酒会も同時開催。タイプ別・温度別のきき酒体験エリアやDJブース、日本酒×フードのペアリングコーナー「サケ ディスカバリーゲート」も設置予定。\n\n情報源：[PR TIMES（日本酒造組合中央会）](https://prtimes.jp/main/html/rd/p/000000110.000083559.html) ／ [池袋サンシャインシティ](https://sunshinecity.jp/event/entry-37392.html)\n\n---\n\n## 📱 ガジェット・テック\n\n### ① AMD Ryzen AI Halo ── ローカルLLM 200B超が回るLinux対応ミニPC、$3,999から\n\n**発売時期**：2026年6月（予約受付中）\n**価格**：$3,999〜（約62万円〜）\n**メーカー**：AMD ／ 公式ページ：[amd.com/ja/.../ryzen-ai-halo](https://www.amd.com/ja/products/processors/desktops/ryzen/ryzen-ai-halo.html)\n\n**スペック要点：**\n- SoC：Ryzen AI Max+ 395（Strix Halo世代、CPU+GPUを1チップ統合）\n- 統合メモリ：**128 GB** ユニファイドメモリ（CPU/GPU間でゼロコピー共有）\n- ローカルLLM性能：200Bパラメータ級モデルを実行可能\n- OS：Windows / **Linux** 両対応\n- 次世代モデル：Ryzen AI Max PRO 400系・192GB版を2026 Q3予定\n\n**何が嬉しいか：**\nOllama / llama.cpp / vLLM 環境でLLMをフルローカル実行したいエンジニアに直撃のスペック。128GBの統合メモリはNVIDIA DGX Sparkと真っ向競合し、クラウドAPIコストを一切かけずに200B超モデルを自宅ラボで回せる。Linuxサポートが公式に明記されているのも信頼ポイント。セキュリティ用途では、機密プロンプトをクラウドに送らずに済むエアギャップLLM推論基盤として最有力候補。\n\n情報源：[PC Watch（2026/5/21）](https://pc.watch.impress.co.jp/docs/news/2110365.html) ／ [ASCII.jp](https://ascii.jp/elem/000/004/404/4404013/) ／ [MyNavi News（2026/5/21）](https://news.mynavi.jp/article/20260521-4482702/)\n\n---\n\n### ② NVIDIA RTX Spark（N1X） ── 13年ぶりWindows向けCPU投入、Blackwell + 128GB + 1ペタフロップAI\n\n**発表日**：2026年5月31日（COMPUTEX 2026）\n**発売予定**：2026年秋\n**想定価格帯**：$1,799〜$2,899以上（約28〜46万円〜）\n**公式**：[ITmedia 速報](https://www.itmedia.co.jp/pcuser/articles/2606/01/news125.html) ／ [PC Watch](https://pc.watch.impress.co.jp/docs/news/event/2113317.html)\n\n**スペック要点：**\n- チップ：N1X（MediaTek設計 20コアARMv9 CPU + Blackwell世代RTX GPU、CUDA 6,144基）\n- 統合メモリ：最大128 GB\n- AI性能：最大1ペタフロップ、100万トークンコンテキスト対応\n- 対応メーカー：ASUS・Dell・HP・Lenovo・Microsoft Surface・MSI（薄型ノートPC＆小型デスクトップ）\n\n**何が嬉しいか：**\nARMネイティブのWindowsでBlackwellのCUDA/Tensor Coreがそのまま走るのが本質的なインパクト。セキュリティリサーチャー視点では、CPUとGPUが同一メモリ空間を共有する新アーキテクチャがサイドチャネル攻撃の新しい攻撃面になる可能性があり、この観点での実機検証が待たれる。Linuxネイティブ対応は現状未確認のため様子見推奨だが、ローカルLLM × Windows環境では秋以降最有力の候補。\n\n情報源：[PC Watch（2026/6月）](https://pc.watch.impress.co.jp/docs/news/event/2113317.html) ／ [ASCII.jp](https://ascii.jp/elem/000/004/406/4406782/) ／ [Zenn 完全解説](https://zenn.dev/kakuremi/articles/nvidia-rtx-spark-consumer-pc-impact-2026)\n\n---\n\n### ③ MSI VORTIQ Enterprise SSD ── 最大7.68TB NVMe、AI/ホームラボのストレージ構成が変わる\n\n**発表**：COMPUTEX 2026（2026年6月1日）\n**価格・発売日**：未定（エンタープライズ向け先行発表）\n**公式情報**：[PR TIMES（MSI、2026/6/1）](https://prtimes.jp/main/html/rd/p/000001431.000053749.html)\n\n**スペック要点：**\n- 容量：最大 **7.68 TB**\n- 用途設計：AI推論・高負荷ワークロード向け高速シーケンシャルリード\n- インターフェース：詳細は正式発表待ち\n\n**何が嬉しいか：**\nTrueNAS / Proxmox のホームラボで「NVMe 1枚で7.68TB」が現実になるのは大きな節目。LLMモデルキャッシュ（Llama 3.1 405BのGGUFで約200GB超）を複数保持しつつ、VMイメージや録画データも同一ドライブに収められる容量帯。リテール発売・価格確定後に再チェック推奨。\n\n---\n\n**出力前セルフチェック：**\n- [x] 全項目 R1（日付）クリア ── ボルドーニュース6/2、AMD 6月発売、NVIDIA 5/31発表、イベントは6/19以降\n- [x] ワイン価格 ── 今週の実販売価格確認済み新着なし、正直に ※該当なし 処理\n- [x] 日本酒：精米歩合・酒米 ── 二兎は55%・山田錦記載、風の森はスペック確認要と明示\n- [x] ガジェット：Linux対応・ローカルLLM・サイドチャネル等、技術者目線の切り口\n- [x] 画像URL ── 公式確認できなかったため今回は省略（リンク切れリスク回避）\n\n---\n\nSources:\n- [TERRADA WINE MARKET プリムール2024（2026/6/2）](https://www.terrada.co.jp/ja/news/15539/)\n- [Wine Report「1991年以来最小の生産量」](https://www.winereport.jp/archive/5134/)\n- [TERRADA WINE 95点以上プリムール](https://terradawine.com/wine/?in_stock=1\u0026product_tag_id%5B0%5D=281)\n- [日本酒フェア2026 公式（sakefair.com）](https://sakefair.com/)\n- [PR TIMES 日本酒造組合中央会](https://prtimes.jp/main/html/rd/p/000000110.000083559.html)\n- [池袋サンシャインシティ 日本酒フェア2026](https://sunshinecity.jp/event/entry-37392.html)\n- [IMADEYA 6月新入荷](https://imadeya.co.jp/blogs/news/imadeya%E5%BA%97%E8%88%97-6%E6%9C%8820%E6%97%A5%E7%81%AB%E6%96%B0%E5%85%A5%E8%8D%B7%E3%82%A2%E3%82%A4%E3%83%86%E3%83%A0%E6%83%85%E5%A0%B1)\n- [はせがわ酒店 新着](https://www.hasegawasaketen.com/blog/news/thisweek/)\n- [PC Watch AMD Ryzen AI Halo（2026/5/21）](https://pc.watch.impress.co.jp/docs/news/2110365.html)\n- [AMD Ryzen AI Halo 公式](https://www.amd.com/ja/products/processors/desktops/ryzen/ryzen-ai-halo.html)\n- [ASCII.jp Ryzen AI Halo](https://ascii.jp/elem/000/004/404/4404013/)\n- [PC Watch NVIDIA RTX Spark 速報](https://pc.watch.impress.co.jp/docs/news/event/2113317.html)\n- [ITmedia NVIDIA RTX Spark（2026/6/1）](https://www.itmedia.co.jp/pcuser/articles/2606/01/news125.html)\n- [ASCII.jp NVIDIA RTX Spark](https://ascii.jp/elem/000/004/406/4406782/)\n- [PR TIMES MSI COMPUTEX 2026（2026/6/1）](https://prtimes.jp/main/html/rd/p/000001431.000053749.html)\n- [カーヴ・ド・リラックス公式](https://www.cavederelax.com/)";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
