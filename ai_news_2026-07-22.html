<script>
const md = "## 🤖 今週のAI最新動向\n\n### 1. [[Google]]がGemini 3.6 Flash・3.5 Flash-Lite・3.5 Flash Cyberを一挙投入——脆弱性修復特化モデルは「政府限定」配布\n\n**何が起きたか**: Googleが7月21日、非フロンティア帯の新モデル3本を発表した。主力のGemini 3.6 Flashは$1.50/1M入力・$7.50/1M出力で、出力トークン消費を3.5 Flash比17%削減（Artificial Analysis Index基準）。DeepSWE 49%（3.5 Flashは37%）、MLE Bench 63.9%（同49.7%）、OSWorld-Verified 83.0%（同78.4%）。3.5 Flash-Liteは$0.30/1M入力・$2.50/1M出力・350トークン/秒で、Terminal-Bench 2.1が31%→54%へ跳ねた。あわせてGemini 4の事前学習開始も明かされた。\n\n**なぜ重要か**: 3本目のGemini 3.5 Flash Cyberが異色で、ソフトウェア脆弱性の特定・検証・修復に特化したモデルを、セキュリティエージェントCodeMender経由で**政府と信頼済みパートナー限定の許可制パイロット**として出す。脆弱性発見能力を汎用APIに載せず配布先を絞る——デュアルユース能力のアクセス管理を製品ラインの設計に組み込んだ形だ。Flash帯の価格・トークン効率競争はエージェント運用コストの直接の削減要因で、Terminal-Bench 2.1で54%出すモデルが$0.30/1M入力という水準は、ローカルLLMとの使い分けの損益分岐を動かしてくる。\n\n出典: [Google公式ブログ](https://blog.google/innovation-and-ai/models-and-research/gemini-models/gemini-3-6-flash-3-5-flash-lite-3-5-flash-cyber/) (2026-07-21公開)\n\u003e source: https://blog.google/innovation-and-ai/models-and-research/gemini-models/gemini-3-6-flash-3-5-flash-lite-3-5-flash-cyber/\n\n### 2. EUがDMAで[[Google]]に決定2本——AndroidをライバルAIアシスタントに開放せよ\n\n**何が起きたか**: 欧州委員会が7月16日、デジタル市場法（DMA）に基づく仕様決定2本を採択した。1本目はAndroid上のAI相互運用性で、Googleが[[Gemini]]に確保してきた音声起動・クロスアプリ操作などシステムレベル機能11グループを、競合AIアシスタントへ2027年7月までに開放させる。2本目はGoogle検索データの第三者検索エンジンへの共有で、2027年1月開始。不履行なら制裁金は全世界売上の最大10%（Alphabetなら300億ドル超）に達しうる。\n\n**なぜ重要か**: 「OSに深く統合されたAIアシスタント」が独占の入口として正式に規制対象になった初の具体例で、スマホのAI標準搭載競争のルールがEU圏では法で書き換わる。技術的には、サードパーティのアシスタントがOSのシステムレベルフックに入ってくることを意味し、権限分離やデータフローの設計がそのまま攻撃面の議論になる。検索データ共有はAI開発者も受け手に含まれており、学習データアクセスの再配分という点でも前例になる。\n\n出典: [欧州委員会](https://digital-strategy.ec.europa.eu/en/news/commission-provides-guidance-google-ai-interoperability-android-and-sharing-google-search-data) (2026-07-16公開)\n\u003e source: https://digital-strategy.ec.europa.eu/en/news/commission-provides-guidance-google-ai-interoperability-android-and-sharing-google-search-data\n\n### 3. [[Moonshot AI]]が[[Kimi K3]]の新規契約を一時停止——需要が計算資源を食い尽くした\n\n**何が起きたか**: Moonshot AIが7月20日、先週公開したばかりの2.8兆パラメータモデルKimi K3の新規サブスクリプション受付を一時停止した。公式声明によれば「直近48時間で需要が現行キャパシティの限界に迫った」ため。既存契約者への提供は継続し、増強に合わせて段階的に受付を再開するという。モデル重みの7月27日公開予定は維持されており、香港上場へ向けた資金調達準備も並行して報じられている。\n\n**なぜ重要か**: コーディング系リーダーボード首位で需要が爆発した直後にサービングが音を上げた格好で、米国の計算資源規制下にある中国ラボの「モデルは作れるが配れない」構造をそのまま可視化した。2.8兆パラメータのMoEをAPIで捌くコストは重く、重み公開後は推論負荷が世界中のクラウドとローカル環境へ分散していくことになる。オープンウェイト戦略が、自社サービング能力の限界に対するヘッジとしても機能するという皮肉な構図だ。\n\n出典: [Reuters（Yahoo Finance配信）](https://finance.yahoo.com/technology/ai/articles/chinas-moonshot-pauses-kimi-subscriptions-080317250.html) (2026-07-20公開) / [SCMP](https://www.scmp.com/tech/article/3361172/kimi-k3-developer-suspends-new-subscriptions-amid-compute-constraints) (2026-07-20公開)\n\u003e source: https://finance.yahoo.com/technology/ai/articles/chinas-moonshot-pauses-kimi-subscriptions-080317250.html\n\n### 4. 上海WAIC 2026——習近平が初の基調講演、29カ国で「世界AI協力機構」発足\n\n**何が起きたか**: 世界人工知能大会（WAIC）が7月17日に上海で開幕し、習近平国家主席が同大会では初となる基調講演を行った（会期は7月20日まで）。講演では「AIは一国の独演であってはならない」と述べ、29カ国を創設メンバーとする「世界AI協力機構（WAICO）」の発足を発表。国連のグテーレス事務総長も出席した。今後5年で途上国に5,000人分のAI研修機会を提供し、AI気象警報システム「MAZU」を30カ国で利用可能にする等の具体策も示された。\n\n**なぜ重要か**: 米国主導のAI規範形成（ホワイトハウスの自主的フレームワーク路線）に対する、多国間機構という形の明確な対抗軸で、AIガバナンスの二極化が制度として固まり始めた。創設29カ国にはロシア・パキスタン・カザフスタン等が並び、AI標準・安全評価・計算資源アクセスの枠組みが陣営ごとに分岐していくと、モデルの認証やデータ越境の要件も地域ごとに割れていく。規制対応が「どの陣営の市場で商売するか」の選択問題になる流れだ。\n\n出典: [中国外交部](https://www.mfa.gov.cn/eng/xw/zyjh/202607/t20260717_11984910.html) (2026-07-17公開) / [Al Jazeera](https://www.aljazeera.com/news/2026/7/17/chinas-xi-jinping-launches-new-ai-alliance-what-is-it) (2026-07-17公開)\n\u003e source: https://www.mfa.gov.cn/eng/xw/zyjh/202607/t20260717_11984910.html\n\n## 📄 今週の注目論文\n\n### 1. 長時間ターミナルタスクでエージェントの限界を試す / Long-Horizon-Terminal-Bench: Testing the Limits of Agents on Long-Horizon Terminal Tasks with Dense Reward-Based Grading\n\n**著者**: Zongxia Li（Tencent HY LLM Frontier／メリーランド大学カレッジパーク校）ほか。arXiv:2607.08964、2026-07-09初版（07-13改訂）\n\n- **Problem**: 既存のターミナル系ベンチは短時間タスク中心で上位モデルが飽和気味。数時間規模の長期タスクでエージェントがどこまで持つかは測れていなかった\n- **Method**: 9カテゴリ46本の長時間タスクを構築し、合否二値でなく密な部分報酬で採点。フロンティア15モデルを評価（1タスク平均9.9Mトークン・約231エピソード・実行85.3分）\n- **Finding**: 最強モデルでも部分報酬0.95閾値のpass@1は15.2%、完全達成は10.9%。全モデル平均は4.3%と1.7%で、長期タスクはまだ壊滅的に難しい\n\n**読みどころ**: xAIが「Grok 4.5がLong-Horizon Terminal-Benchで1位」と宣伝に使い始めたベンチの原典で、宣伝文句の分母を自分で確認できる。1位でも絶対値は2割未満——「エージェントに丸投げできる時代」と「数分のタスクしか完走できない現実」のギャップを数値で押さえておく価値がある。\n\narXiv: https://arxiv.org/abs/2607.08964\n\u003e source: https://arxiv.org/abs/2607.08964\n\n### 2. LLMエージェントのプロンプトインジェクションに対する帯域外防御の適応的評価 / Adaptive Evaluation of Out-of-Band Defenses Against Prompt Injection in LLM Agents\n\n**著者**: Praneeth Narisetty（LaunchSafe Research）ほか。arXiv:2606.26479、2026-06-25公開\n\n- **Problem**: モデル本体の外側で防御する機構（CaMeL・FIDES・Progent・RTBAS・FORGE等）が乱立しているが、防御を知らない静的攻撃でしか評価されておらず、実力が不明\n- **Method**: 各防御を参照モニタ・完全性保護といった古典セキュリティ概念で分類し、AgentDojoベンチマーク＋Qwen2.5-7BでProgentに対する適応的攻撃（防御の仕組みを知った上での攻撃）を評価\n- **Finding**: Progentは攻撃成功率を約26%→4%に低減し、適応攻撃でも2.6%に抑えた。ただし最適化ベースの強力な攻撃は未検証で、証拠は限定的と著者ら自身が明記\n\n**読みどころ**: 「防御を知らない攻撃者相手の評価は無意味」という暗号・セキュリティ界の常識を、エージェント防御の評価にようやく持ち込んだ論文。前号までの「エージェントセキュリティはOSの歴史を逆走している」という議論の続きとして、防御側の語彙が参照モニタ等の古典概念に収束していく様子が確認できる。\n\narXiv: https://arxiv.org/abs/2606.26479\n\u003e source: https://arxiv.org/abs/2606.26479\n\n### 3. NeuroCogMapが明らかにするLLMの認知的組織化 / NeuroCogMap Reveals Cognitive Organization of Large Language Models\n\n**著者**: Zhongxiang Sun（香港大学）ほか、中国科学院・中国人民大学・NTU・Imperial College Londonの共同。arXiv:2607.00397、2026-07-01公開（本文79ページ）\n\n- **Problem**: LLM内部の解釈可能性研究は個別の回路・特徴の分析にとどまり、内部表現が全体としてどう組織化されているかの「地図」がなかった\n- **Method**: 認知神経科学の機能マッピング手法をLLM内部特徴に適用し、特徴群を機能パーセル（脳の機能野に相当する単位）へ組織化して認知能力と対応付けた\n- **Finding**: 幻覚・バイアス・迎合・拒否失敗といった主要な失敗モードが、それぞれ別個の表現系・行動制御系の破綻に対応。組織構造はモデル間で部分的に保存され、言語理解中のヒト大脳皮質応答の予測も改善した\n\n**読みどころ**: 前号のグローバルワークスペース論文と同じ潮流で、解釈可能性が「回路の逆アセンブル」から「脳地図的な機能局在」へスケールアップしている。幻覚と迎合が別の機能系の故障だという知見は、失敗モードごとに別の介入（モニタリング・パッチ）を設計できる可能性を示していて、アライメントを診断医学に近づける話だ。\n\narXiv: https://arxiv.org/abs/2607.00397\n\u003e source: https://arxiv.org/abs/2607.00397\n\n## 💡 今週のひとことインサイト\n\n### 1. 防御は許可制、攻撃面は総配布——非対称の一週間\n\nGoogleが脆弱性の発見・検証・修復に特化したGemini 3.5 Flash Cyberを「政府と信頼済みパートナー限定」の許可制で出した同じ週に、2.8兆パラメータのKimi K3は7月27日の重み公開へ淡々と進んでいる。攻撃に転用しうる汎用能力の拡散は事実上止められないのに、防御特化ツールの方だけアクセス管理される——この非対称が今週はっきり形になった。もっともLong-Horizon-Terminal-Benchの数字を見る限り、最前線のエージェントですら長時間タスクの完走率は1〜2割。カーネルの脆弱性を自律で掘って回る攻撃エージェントはまだ現実味が薄く、当面の脅威は「人間の攻撃者がLLMで加速する」領域に集中する。だとすれば勝負を分けるのは、防御側が許可制の壁の内側でパッチ自動化をどれだけ速く回せるかだ。猶予期間は、ベンチの数字が示すより短いかもしれない。\n\n\u003e source: https://blog.google/innovation-and-ai/models-and-research/gemini-models/gemini-3-6-flash-3-5-flash-lite-3-5-flash-cyber/";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
