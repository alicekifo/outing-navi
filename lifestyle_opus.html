const md = "情報集まった。Markdownでまとめる。\n\n# 🌿 ライフスタイル週報 (2026/5/30)\n\n今週は新緑とともに、初夏の季節酒・話題のガジェット祭りがアツい。サクッとチェックしてって。\n\n---\n\n## 🍷 ワイン\n\n### 🌟 注目ニュース：Riesling Wave 第2回 が丸の内で開催決定\n\nリースリングの魅力を再発見する試飲イベントが、2026年5月に東京・丸の内で開催決定。温暖化の影響もあり「冷涼品種」への注目度が高まっているなか、ドイツ・アルザス・オーストラリアなど多産地のリースリングを一度に比較できる貴重な機会。シャブリも温暖化で熟成しやすくなっているらしいから、白ワインの「攻略最適解」が変わりつつあるタイミング。\n\n- 詳細: [2026年の東京都のワインイベント・ワイン会情報 - ワインリンク](https://wine-link.net/event/?pref_cd=13)\n\n### 💰 コスパ枠：フレシネ コルドン・ネグロ（スペイン産CAVA・約1,200円）\n\n「世界最強コスパ」と評される定番スパークリング。1,200円前後で本格的な瓶内二次発酵を体験できる。デイリー使いに迷ったらこれで間違いない。週末のホムパや、ちょっといいおつまみと合わせるだけで雰囲気上がる。\n\n- 参考: [マイベスト 2026年5月版 ワインおすすめランキング](https://my-best.com/14504)\n- 通販: [エノテカ おすすめワイン6選](https://www.enoteca.co.jp/archives/detail/best-wine)\n\n### 🎪 関西最大級：ワインコンプレックス OSAKA 2026\n\n- **日時**: 2026年5月12日（火）\n- **会場**: ホテルモントレ大阪\n- 関西最大級のプロ向け試飲会だけど、一般向け枠もあるからチェック必須。\n\n- 詳細: [東京ワインコンプレックス 試飲会年間スケジュール](https://event.tokyowinecomplex.com/pro/)\n- 関西イベント一覧: [ワインリンク 関西イベント](https://wine-link.net/event/?area_cd=5)\n\n---\n\n## 🍶 日本酒\n\n### 🆕 季節酒：澤乃井「純米涼し酒」入荷\n\n東京・青梅の老舗蔵 澤乃井の夏限定「純米涼し酒」が5月から流通開始。冷やしてキリッと、初夏の食卓にぴったり。蔵元の小澤酒造は東京都内屈指の歴史ある酒蔵で、毎年この時期の風物詩。\n\n- 蔵元: [小澤酒造（澤乃井）](https://www.sawanoi-sake.com/)\n- 取扱: [酒のあらかわ 2026年5月新着情報](https://www.sake-arakawa.com/2026-5new/5new.htm)\n\n### 🏆 SAKE COMPETITION 2026 審査会開催\n\n5月15日に審査会が実施され、世界中の **367蔵から1,000点以上** の日本酒が出品される世界最大規模の日本酒コンペティション。受賞銘柄は6月以降に発表予定、これから飲むべき銘柄が見えてくる重要イベント。\n\n- 詳細: [Craft Sake World 2026年版イベントガイド](https://craftsakeworld.jp/2026%E5%B9%B4%E7%89%88%EF%BC%9A%E6%9C%80%E6%96%B0%E5%85%A8%E5%9B%BD%E3%81%AE%E6%97%A5%E6%9C%AC%E9%85%92%E3%82%A4%E3%83%99%E3%83%B3%E3%83%88%E5%AE%8C%E5%85%A8%E3%82%AC%E3%82%A4%E3%83%89/)\n\n### 🎉 今週末イベント：池袋「全国日本酒1,000銘柄」（5/19-20開催済）と関東蔵開き多数\n\n- **東京・池袋サンシャインシティ**：5月19-20日に1,000銘柄が集結（直近開催済み、レビュー記事をチェック）\n- **5月30日（土）= 今日！**：御代櫻酒蔵開放、真澄蔵開き、天山酒造初夏の蔵開き、嶺乃誉、第6回大雪渓酒蔵まつり、春鹿宴日など全国一斉蔵開き\n- **5/23 神奈川プレミアム酒蔵ツアー**：金井酒造店・黄金井酒造を巡る企画\n\n- 詳細: [たのしいお酒.jp 全国日本酒イベントカレンダー](https://tanoshiiosake.jp/9020)\n- 東京限定: [東京酒カレンダー](https://tokyo-sake-calendar.com/)\n\n---\n\n## 📱 ガジェット・テック\n\n### 🔋 Anker Nano Power Bank (MagGo, Plus) — 5月27日発売\n\n10,000mAhモデル。MagSafe対応＋USB-C出力のハイブリッド型で、iPhone勢にとっては待望のアップデート。プラスチック筐体ながら軽量化されており、出張・旅行用のメインバッテリーとして優秀。\n\n- 発売情報: [価格.com 新製品NEWS](https://news.kakaku.com/prdnews/)\n- ブランドサイト: [Anker Japan](https://www.ankerjapan.com/)\n\n### 🖱 ロジクール フラッグシップマウス 6年ぶりフルモデルチェンジ\n\n人気マウスシリーズが6年ぶりに大幅刷新。注目機能は2つ：\n- **触覚フィードバック**：親指部分のパネルが振動して操作を返してくれる\n- **Actions Ring**：8つのショートカットをリング状に表示、ワンクリックで任意アクション\n\nクリエイター・エンジニア勢に刺さるアップデート。MX Master系の後継として要チェック。\n\n- 紹介: [ASCII 推しガジェット大賞 2026](https://ascii.jp/serialarticles/3001270/)\n- 製品情報: [ロジクール公式](https://www.logicool.co.jp/)\n\n### 📲 Vivo S60 — 5月29日海外発表\n\n- **厚さ**: 7.92mm\n- **バッテリー**: 7,200mAh（クラス最大級）\n- **位置づけ**: ミドルレンジながらフラッグシップ級スペック\n\n国内未投入だけど、薄型大容量バッテリー競争の象徴的モデル。今後の日本市場にも影響しそう。\n\n- 詳細: [デイリーガジェット](https://daily-gadget.net/)\n\n### 💰 おまけ：Amazon スマイルSale（5/27〜開催中）\n\nゴールデンウィーク後の追加セール期間中。HUAWEI Band 11、Apple Watch SE 3、ガーミン vivoactive 5あたりが価格.comスマートウォッチランキングの上位。Apple Watch SE 3がついに首位奪還してて、ガーミン勢を抑えてる構図がアツい。\n\n- [Amazon スマートウォッチタイムセール](https://www.amazon.co.jp/%E3%82%B9%E3%83%9E%E3%83%BC%E3%83%88%E3%82%A6%E3%82%A9%E3%83%83%E3%83%81-%E6%9C%AC%E6%97%A5%E3%81%AE%E3%82%BF%E3%82%A4%E3%83%A0%E3%82%BB%E3%83%BC%E3%83%AB-%E3%82%A6%E3%82%A7%E3%82%A2%E3%83%A9%E3%83%96%E3%83%AB%E3%83%87%E3%83%90%E3%82%A4%E3%82%B9/s?rh=n%3A2725002051%2Cp_n_deal_type%3A10343614051)\n- [価格.com スマートウォッチ売れ筋ランキング](https://kakaku.com/keitai/wearable-device/ranking_7745/)\n- [ガジェマニアックス GW目玉ガジェット10選](https://note.com/gadgetmaniacs/n/n42cb4c1f00a1)\n\n---\n\n## 📝 メモ\n\n画像URLは検索結果から確実なCDNリンクが取れなかったので、今回は本文埋め込みは省略。各リンク先で実物画像チェックして。\n\n---\n\nこれ、Obsidian vaultに保存する？ `personal/週報/2026-05-30_ライフスタイル週報.md` あたりが妥当だと思うけど、保存先指定があれば教えて。";
