<script>
const md = "# マンチェスター・ユナイテッド情報週報（2026-07-17）\n\n\u003e **今週のTLDR**: W杯準決勝でイングランドがアルゼンチンに1-2で逆転負け（7/15）——マイヌー、ラッシュフォードの決勝進出はならず、3位決定戦フランス戦がJST 7/19（日）6:00。移籍はエデルソン（Éderson）撤退が正式確定し、3人目のMF候補はコネ（Manu Koné）が最有力もRomanoいわく「正式オファーはまだ」の初期段階。プレシーズン初戦レクサム戦はJST 7/19（日）0:00、サントス（Andrey Santos）とダーロウ（Karl Darlow）のデビューが有力。\n\n---\n\n## ⚽ 直近の試合結果\n\n※該当なし（2025-26シーズンは5月に終了。プレシーズン初戦は現地7/18、下記「今後の試合予定」参照）\n\n**補足（FIFAワールドカップ2026・準決勝）**:\n- **イングランド 1-2 アルゼンチン**（現地7/15・アトランタ）: ゴードン（Anthony Gordon）が55分に先制するも、85分エンソ・フェルナンデス、90+2分ラウタロ・マルティネスで逆転負け（2点ともメッシがアシスト）。ユナイテッド所属のマイヌー（Kobbie Mainoo）、ラッシュフォード（Marcus Rashford）を擁するイングランドは2大会連続の準決勝敗退\n- イングランドは**3位決定戦（フランス戦）へ**: 現地7/18 17:00 マイアミ＝**JST 7/19（日）6:00**\n- 決勝はスペイン×アルゼンチン: 現地7/19 15:00 MetLifeスタジアム＝**JST 7/20（月）4:00**\n\n\u003e source: [ESPN - England 1-2 Argentina](https://www.espn.com/soccer/match/_/gameId/760515/argentina-england) (2026-07-15) / [FIFA - 公式マッチセンター](https://www.fifa.com/en/match-centre/match/17/285023/289290/400021540?gender=2\u0026date=2026-07-15) / [World Soccer Talk - 3位決定戦詳細](https://worldsoccertalk.com/world-cup/france-vs-england-date-kick-off-time-and-venue-for-the-2026-fifa-world-cup-third-place-match/)\n\n---\n\n## 🔄 移籍・選手動向\n\n### 確定（IN）\n\n| 選手 | 前所属 | 条件 | 日付 | 信頼度 |\n|---|---|---|---|---|\n| ティーレマンス（Youri Tielemans）MF | アストン・ヴィラ | 解除条項£35m・5年契約・背番号18 | 7/14公式発表（既報） | ◎ 公式 |\n| サントス（Andrey Santos）MF | チェルシー | £48m＋ボーナス£2m・5年契約（＋1年OP） | 7/13完了（既報） | ◎ 公式 |\n| ダーロウ（Karl Darlow）GK | リーズ | フリー・2028年まで（＋1年OP） | 7/14公式発表（既報） | ◎ 公式 |\n\n- 今週の新規確定はなし。IN3件はいずれも既報どおりで変化なし\n\n### 確定（OUT）\n\n- **マラール（Melvine Malard）FW（女子）** → チェルシー移籍は**メディカル待ちの段階** ○: 初期£850k＋アドオン。ユナイテッド女子のクラブ記録売却額で、契約残り1年の女子選手としては史上最高額。リヨン時代の恩師ボンパストール（Sonia Bompastor）と再会予定。完了発表は未確認（Goal・The Peoples Person複数一致・7/15）\n- 男子の既報分（今夏ウィンドウ内・変化なし）: オナナ（André Onana）→トラブゾンスポル1年ローン（7/3公式）、ホイルン（Rasmus Højlund）→ナポリ買い取り義務履行（6/29）、サンチョ（Jadon Sancho）／カゼミロ（Casemiro）／マラシア（Tyrell Malacia）契約満了退団（6/30）\n\n\u003e source: [Goal - Malard club-record sale](https://www.goal.com/en-us/lists/man-utd-record-sale-melvine-malard-france-international-red-devils-wsl-chelsea/blte806af7a4c517524) (2026-07-15)\n\n### 交渉中・破談\n\n- **コネ（Manu Koné／ローマ）が3人目のMF候補の最有力** ○（Romano・7/16更新）: 代理人サイドと電話接触済みだが、**ローマへの正式オファーはまだ提出していない**。€80m〜€90mという価格報道は「誇張」で、高額だがそのレベルではないとRomanoが明言。ユナイテッドは獲得すべき守備的MFのプロファイルを慎重に見極めている段階（※一部アグリゲーターの「週末メディカル」説はRomano発言と矛盾するため不採用）\n- **エデルソン（Éderson／アタランタMF）撤退が正式確定** ○: メディカル2次検査まで実施した後、現条件での獲得を見送る最終判断。コネ路線への転換の直接的背景（Romano・Goal・7/14〜16複数一致）\n- **スコット（Alex Scott／ボーンマス）／バレバ（Carlos Baleba／ブライトン）** △: 前週Ornstein報道から新規進展なし。ボーンマスは売却拒否の構えを継続\n- **ラッシュフォード（Marcus Rashford）の去就** △: バルセロナはローン後の買い取りオプション（£26m）を行使せず。フェネルバフチェが獲得に動きマンチェスターで交渉との報道（グリーンウッドとの再会構想）。クラブは売却希望だが妥当なオファーがなく、W杯後はカリックのチームに合流予定とも（football365／footballtransfers・7月中旬・単独系ソースにつき要継続観察）\n\n### ケガ・離脱\n\n- **ウガルテ（Manuel Ugarte）**: ACL（前十字靭帯）損傷で長期離脱中・復帰時期未定 ○（前週から変化なし）。中盤大量補強の直接的な背景\n\n\u003e source: [Football Italia - Romano: no offer for Roma yet](https://football-italia.net/man-united-talks-kone-no-offer-for-roma/) (2026-07-16) / [Goal - Kone £45m+ / Ederson collapse](https://www.goal.com/en/lists/man-utd-transfer-news-manu-kone-roma-ederson-atalanta-collapse/blt398e63513ac42d94) / [Football365 - Rashford Fenerbahce](https://www.football365.com/news/manchester-united-marcus-rashford-fenerbahce)\n\n---\n\n## 🧠 戦術・チーム状況\n\n### カリック（Michael Carrick）体制の現在地\n\n- **前提（R4）**: アモリム（Rúben Amorim）は2026年1月に解任済み。カリックが暫定就任からCL出場権を確保し、5/22に2028年までの正式契約\n- **レクサム戦が初のアセスメント機会**: W杯招集13名が不在のため、アカデミーから9名——オビ（Chido Obi）、スウェイツ（Jim Thwaites）、E・ウィリアムズ（Ethan Williams）、デヴァニー（Jacob Devaney）、ゴア（Daniel Gore）、ウィートリー（Ethan Wheatley）、カマソン（Jaydan Kamason）、T・フレッチャー（Tyler Fletcher）、アーマー（Daniel Armer）——がファーストチーム練習に合流。フレドリクソン（Tyler Fredricson）、J・フレッチャー（Jack Fletcher）、レイシー（Shea Lacey）、ヴィテク（Radek Vitek）、アマス（Harry Amass）は既に帯同済み\n- **注目株**: レイシーは昨季終盤の活躍から今季レギュラー定着が期待される筆頭。アマスはノリッジへのローンから復帰し負傷も完治。カリックは「競争がマージンを消す前に」シニア評価・新戦力統合・アカデミー選別を6試合のプレシーズンで済ませる方針\n- 直近5試合のxG等: ※該当なし（オフシーズンのため）\n\n\u003e source: [centredevils - アカデミー9名合流](https://centredevils.co.uk/news/nine-manchester-united-academy-players-join-first-team-training-ahead-of-wrexham-fixture/) (2026-07-15頃) / [Sports Mole - Wrexham戦プレビュー](https://www.sportsmole.co.uk/football/man-utd/preview/man-utd-vs-wrexham-prediction-team-news-lineups_601319.html)\n\n---\n\n## 📅 今後の試合予定（プレシーズン）\n\n| 日付（JST） | 対戦相手 | 会場 | 大会 |\n|---|---|---|---|\n| 7/19（日）0:00 | レクサム | ヘルシンキ・オリンピックスタジアム（中立） | 親善試合 |\n| 7/25（土）1:00 | ローゼンボリ | トロンハイム（アウェー） | 親善試合 |\n| 8/1（土）22:00 | アトレティコ・マドリード | ストックホルム（中立） | 親善試合 |\n\n- 以降はPSG（8/8）、リーズ（8/12）、ミラン（8/15）、リーグ開幕はハル・シティ戦8/22\n- **見どころ（レクサム戦）**: サントスとダーロウのデビューが有力視。ヘルシンキでの試合は1965年のヨーロピアン・カップHJK戦（ビジー体制で3-2勝利）以来61年ぶり。レクサムには元ユナイテッドアカデミーのジェームズ（Matty James）、ラスボーン（Ollie Rathbone）が在籍し、2023年7月のサンディエゴでの前回対戦はレクサムが3-1で勝利している\n- 想定スタメンの具体報道: ※現時点で確認できず\n\n\u003e source: [manutd.com - United v Wrexham: Tickets, TV info](https://www.manutd.com/en/news/united-v-wrexham-tickets-tv-info-and-more-18-july) / [Sports Mole - プレビュー](https://www.sportsmole.co.uk/football/man-utd/preview/man-utd-vs-wrexham-prediction-team-news-lineups_601319.html)\n\n---\n\n## 🏟️ クラブ情報\n\n### W杯とユナイテッド勢\n\n- イングランド準決勝敗退により、マイヌー、ラッシュフォードの大会は3位決定戦（JST 7/19 6:00）で終了予定。レクサム戦（JST 7/19 0:00）とほぼ同時間帯のため両選手のプレシーズン合流は後日\n- ティーレマンスのベルギー、サントスのブラジルは既に大会を終えており、合流タイミングはティーレマンスが後発、サントスは初戦から出場有力\n\n### 新スタジアム（7/9発表・続報なし）\n\n- 収容10万人の新スタジアムを現オールド・トラフォードの約350m北西に建設。移転目標2035年・建設費£2bn超見込み。今週の新規続報は確認できず\n\n### フロント・女子\n\n- ウィルコックス（Jason Wilcox）主導の「MF3人計画」は2人完了・3人目（コネ最有力）を精査中。INEOS／ラトクリフ（Sir Jim Ratcliffe）本人の直近14日以内の新規動向はスタジアム関連以外に確認できず\n- 女子はマラールのチェルシー移籍がメディカル段階（詳細は移籍セクション）\n\n\u003e source: [manutd.com](https://www.manutd.com/en/news/united-secures-land-for-new-old-trafford-stadium) (2026-07-09) / [FIFA](https://www.fifa.com/en/match-centre/match/17/285023/289290/400021540?gender=2\u0026date=2026-07-15)\n\n---\n\n## 📰 The Athletic ピックアップ\n\n※theathletic.com はクローラー拒否のため原文リンクを直接確認できず。直近3日でThe Athletic発の新規特集・戦術分析は転載媒体経由でも確認できなかった（前週のOrnstein「3人目のMF計画」解説は7/16号で既報）。今週は代替としてRomano発の一次情報を1本のみ:\n\n1. **「コネへの正式オファーはまだない」**（Fabrizio Romano・7/16）— 代理人と電話接触済みだが対ローマの正式提示はなし。€80m〜€90mの価格報道は誇張と明言し、クラブは守備的MFの人選そのものを精査中と解説。[Football Italia経由](https://football-italia.net/man-united-talks-kone-no-offer-for-roma/) (2026-07-16)\n\n\u003e source: [Football Italia](https://football-italia.net/man-united-talks-kone-no-offer-for-roma/)\n\n---\n\n*セルフチェック済み: R1日付ガード（試合=7日以内該当なし・W杯準決勝7/15は7日以内・交渉中報道は7/14〜7/16＝14日以内・確定移籍の6月完了分は「既報」明示）／R2ソース基準（Romano一次発言を正としアグリゲーター単独の「週末メディカル」説は矛盾につき不採用・football365/footballtransfers単独は△明示）／R3三角測量（W杯結果=ESPN＋FIFA公式一致・マラール=Goal＋The Peoples Person一致）／R4反証チェック（アモリム→カリック体制明示・エデルソンは撤退確定に更新・バルサのラッシュフォードOP不行使を確認）／R5水増しなし（The Athletic新規なしを明記）／R6日本語名（英語名）併記*";
