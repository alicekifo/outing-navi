<script>
const md = "## 📰 今週のニュース\n\n### 1. 【公式】真夏の全国ツアー2026 神奈川公演（横浜アリーナ）開催 ─ 6月24日・25日\n史上最大規模の全国8都市・全18公演ツアーの第2節。横浜アリーナにて2夜開催。今ツアーは5期生センター・一ノ瀬美空（5期生）が「座長」、菅原咲月（4期生）が初キャプテンとして牽引する注目シリーズ。公演の一般発売は5月30日（土）12:00にスタートしていた。\n\n\u003e source: https://www.nogizaka46.com/s/n46/news/detail/102023 （公式・神奈川公演グッズ案内ページ / 2026年6月）\n\n---\n\n### 2. 【公式】42ndSGアンダー曲「フォルテシモ」先行配信開始 ─ 6月25日 0時\n42ndシングル「是非に及ばず」収録のアンダー楽曲「フォルテシモ」が6月25日（木）0時よりストリーミング＆ダウンロード配信開始。センターは5期生・小川彩。\n\n\u003e source: https://www.nogizaka46.com/s/n46/news/detail/102043 および オリコン報道（2026年6月25日）\n\n---\n\n### 3. 【公式】42ndシングル「是非に及ばず」ジャケットアートワーク5種公開\nコンセプトは「眩光（げんこう）を探して」。巨大な花＝太陽の象徴を配し、その下に選抜メンバーが集う構図。クリエイティブは鈴木司氏が担当。通常盤ほか全5形態のビジュアルが公開。\n\n\u003e source: https://www.nogizaka46.com/s/n46/news/detail/102029 （公式、2026年6月）  \n\u003e 参考: https://natalie.mu/music/news/677222\n\n---\n\n### 4. 【公式】42ndSGアンダーライブ開催決定 ─ 9月29日・30日 東京体育館\n「乃木坂46 42ndSGアンダーライブ」の開催が正式発表。チケット先行申込は8月9日（日）開始予定。\n\n\u003e source: https://www.nogizaka46.com/s/n46/news/detail/102043\n\n---\n\n### 5. 音楽ナタリー掲載：史上最大規模ツアー開幕ライブレポート\n福井公演（6月13日）のライブレポートがナタリーに掲載。一ノ瀬美空（5期生）が「乃木坂46と過ごす夏を選んでくれて、ありがとう！」と感謝を伝えるコメントが話題に。\n\n\u003e source: https://natalie.mu/music/news/676163 （音楽ナタリー）\n\n---\n\n## 🎵 音楽・リリース情報\n\n### 42ndシングル「是非に及ばず」\n| 項目 | 詳細 |\n|---|---|\n| 発売日 | 2026年7月22日（水） |\n| 表題センター | 一ノ瀬美空（5期生）※初の表題曲センター |\n| アンダー曲 | 「フォルテシモ」 センター：小川彩（5期生） |\n| 先行配信（表題） | 2026年6月13日〜 |\n| 先行配信（アンダー） | 2026年6月25日 0時〜 |\n\n**選抜18名フォーメーション**（6月7日・乃木坂工事中にて発表）\n- 前列（3名）：賀喜遥香（4期生）、**一ノ瀬美空（5期生・センター）**、瀬戸口心月（5期生）\n- 中列（6名）：五百城茉央（4期生）、川﨑桜（4期生）、井上和（5期生）、池田瑛紗（5期生）、遠藤さくら（4期生）、矢田萌華（3期生）\n- 後列（9名）：森平麗心（6期生・**初選抜**）、筒井あやめ（4期生）、田村真佑（3期生）、林瑠奈（4期生）、菅原咲月（4期生）、中西アルノ（5期生）、岩本蓮加（3期生・5作ぶり復帰）、弓木奈於（4期生）、大越ひなの（6期生・**初選抜**）\n\n**主な注目点：**\n- 6期生から4名が選抜入り（大越ひなの・森平麗心が初選抜）\n- 小川彩（5期生）・冨里奈央（4期生）は今作選抜落ち\n\n\u003e source: https://www.nogizaka46.com/s/n46/page/42nd_single  \n\u003e source: https://www.oricon.co.jp/news/2459651/full/（オリコン）  \n\u003e source: https://natalie.mu/music/news/675193（音楽ナタリー）\n\n---\n\n## 👤 メンバー個別活動\n\n### 1. 一ノ瀬美空（5期生）— ツアー座長・42ndセンター初披露\n真夏の全国ツアー2026の「座長」を務め、福井公演（6/13）で表題曲「是非に及ばず」を初披露。横浜アリーナ公演（6/24・25）にも出演。\n\n\u003e source: 音楽ナタリー https://natalie.mu/music/news/676163\n\n---\n\n### 2. 小川彩（5期生）— アンダー曲「フォルテシモ」センター\n42ndSGアンダー曲「フォルテシモ」のセンターに抜擢。先行配信は6月25日0時スタート。9月のアンダーライブでセンターとしてパフォーマンス予定。\n\n\u003e source: モデルプレス https://mdpr.jp/music/detail/4803891\n\n---\n\n### 3. 大越ひなの（6期生）・森平麗心（6期生）— 初選抜\n42ndシングルで2名が初めて表題曲選抜に選ばれた。森平は「足を引っ張ってばかりじゃいられない」とコメント（オリコン報道）。\n\n\u003e source: https://www.oricon.co.jp/news/2459651/full/（オリコン）\n\n---\n\n### 4. 菅原咲月（4期生）— 初キャプテンとして全国ツアー牽引中\n5月21日の4代目キャプテン就任後、初の全国ツアーに臨む。神奈川公演（6/24・25）も先頭に立って出演。\n\n\u003e source: https://www.nogizaka46.com/s/n46/news/detail/101960（公式・就任ニュース）\n\n---\n\n### 5. 岩本蓮加（3期生）— 42ndシングルで5作ぶり選抜復帰\n選抜落ちが続いていた岩本蓮加が5作ぶりに選抜に戻り、ファンから大きな反響。\n\n\u003e source: https://natalie.mu/music/news/675193（音楽ナタリー）\n\n---\n\n### 6. 吉田綾乃クリスティー（3期生）— 卒業発表後、ツアー出演継続中\n5月28日に卒業を公式発表。8月9日の福岡公演が最終参加予定で、ツアー各公演に引き続き出演中。\n\n\u003e source: https://www.nogizaka46.com/s/n46/news/detail/101971（公式・卒業のお知らせ）  \n\u003e source: 音楽ナタリー https://natalie.mu/music/news/673814\n\n---\n\n## 🎤 ライブ・イベント\n\n### 真夏の全国ツアー2026（史上最大規模・全国8都市）\n\n| 状態 | 開催地 | 会場 | 日程 |\n|---|---|---|---|\n| ✅ 開催済 | 福井 | サンドーム福井 | 6月13日（土）・14日（日）|\n| ✅ 開催済 | 神奈川 | 横浜アリーナ | 6月24日（水）・25日（木）|\n| 今後 | **北海道** | 真駒内セキスイハイムアイスアリーナ | **7月4日（土）・5日（日）** |\n| 今後 | **広島** | 広島グリーンアリーナ | **7月11日（土）・12日（日）** |\n| 今後 | **大阪** | 大阪城ホール | **7月15日（水）・16日（木）** |\n| 今後 | **宮城** | セキスイハイムスーパーアリーナ | **7月25日（土）・26日（日）** |\n| 今後 | **福岡** | マリンメッセ福岡A館 | **8月8日（土）・9日（日）**（吉田綾乃クリスティー卒業セレモニー） |\n| 今後 | **東京** | 明治神宮野球場 | **8月22日（土）・23日（日）** |\n\nチケット（北海道・広島・大阪・宮城公演）一般発売：6月28日（土）12:00〜予定\n\n\u003e source: https://www.nogizaka46.com/s/n46/page/summer_tour2026  \n\u003e source: https://www.nogizaka46.com/s/n46/news/detail/101747\n\n---\n\n### 乃木坂46 42ndSGアンダーライブ\n\n| 項目 | 詳細 |\n|---|---|\n| 日程 | 2026年9月29日（火）・30日（水） |\n| 会場 | 東京体育館（東京都）|\n| チケット先行 | 8月9日（日）開始予定 |\n| 申込方法 | 乃木坂46 Mobile（FC先行含む）|\n\n\u003e source: https://www.nogizaka46.com/s/n46/news/detail/102043\n\n---\n\n## 📋 グループ動向\n\n### 【公式】菅原咲月（4期生）4代目キャプテン就任\n5月21日、梅澤美波（元乃木坂46・3代目キャプテン、同日卒業）からバトンを引き継ぎ就任。「真夏の全国ツアー2026」が就任後初ツアー。グループ最年少クラスのキャプテン就任として注目を集めている。\n\n\u003e source: https://www.nogizaka46.com/s/n46/news/detail/101960\n\n---\n\n### 【公式】吉田綾乃クリスティー（3期生）卒業発表\n5月28日に公式発表。2016年加入・約10年のグループ歴を経て8月9日の福岡公演で卒業セレモニー実施予定。卒業後、3期生の在籍メンバーは残り2名となる。最後の表題曲参加は41stシングル「最後に階段を駆け上がったのはいつだ？」。\n\n\u003e source: https://www.nogizaka46.com/s/n46/news/detail/101971\n\n---\n\n### 6期生の台頭（42ndシングル）\n大越ひなの・森平麗心の2名が42ndシングルで初選抜入り。今作では計4名の6期生が選抜入りし、世代交代の流れが加速している。\n\n\u003e source: https://www.oricon.co.jp/news/2459651/full/（オリコン）\n\n---\n\n*セルフチェック：全項目 R1（6/20〜6/27）の範囲またはTODAY以降のライブ予定として収録。卒業・加入情報は公式発表のみ採用。メンバー名は漢字フルネーム＋期数表記。噂と確定を区別（「公式」「オリコン報道」等明記）。*";
