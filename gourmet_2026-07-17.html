<style>
:root{--bg:#f5f5f7;--surface:#ffffff;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.16);--accent:#fb923c;--blue:#4a90d9;--green:#28a745;--text:#1d1d1f;--text2:rgba(60,60,67,0.75);--r:12px;}

<script>
const md = "# グルメ週報（2026-07-17）\n\n## 🔥 今週バズりグルメ（最大8件）\n\n### 1. 餃子といえば芭莉龍 茅場町（東京・茅場町 / 東京メトロ茅場町駅・GEMS茅場町内）\n- ジャンル：ネオ餃子居酒屋（宇都宮の行列店の東京進出3号店・運営は株式会社チームバリスタ）\n- **バズった理由**：7/6オープン直後から、名物「まるでステーキのような餃子」（挽き肉でなく1cm角のサイコロ状豚肉を厚さ1mmの薄皮で包む・肉の大きさは通常の約3倍）がメディアで話題。7/14に[ロケットニュース24が実食記事](https://rocketnews24.com/2026/07/14/2781347/)を公開、[美味ごはん](https://bimi.jorudan.co.jp/topics/193809.html)等の複数グルメ媒体も今週相次いで掲載\n- 元言及URL：上記ロケットニュース24（7/14）※SNS個別投稿の拡散数値（いいね・再生数）は今週時点で裏取りできる形では未確認\n- **予約方法・予約難易度**：[食べログで予約受付あり](https://tabelog.com/tokyo/A1302/A130203/13322828/)（当日可レベル、混雑時間帯は予約推奨）\n- おすすめメニュー：焼餃子、ランチ数量限定カオマンガイ\n- 店舗公式リンク：[チームバリスタ公式・芭莉龍](https://team-barisuta.com/shop/bariron/)／[PR TIMES](https://prtimes.jp/main/html/rd/p/000000004.000092356.html)\n\n※今週は上記1件のみ。SNS発で「元投稿URL＋拡散規模の数値」まで確認できたバズ案件は該当なし（R2基準で採用可能なソースが見つからなかったため水増しせず）。\n\n## 🆕 新規オープン注目店（最大6件）\n\n### 1. Doré by Charles-Henry（ドレ バイ シャルルアンリ）（東京・代官山 / 東急東横線代官山駅前）\n- オープン日：2026年7月6日（月）\n- **コンセプト**：フレンチクロワッサン専門ベーカリー。代官山の人気タルト店「Charles-Henry」に隣接する新ブランド2号店。店名はフランス語で「黄金色」\n- シェフ・店主の経歴：フランス人オーナーシェフ、シャルルアンリ・ルブーグ（タルト専門店「Charles-Henry」主宰）\n- 注目メニュー：全17種展開。パン・オ・ショコラ、ストロベリーバニラクロワッサン、クロワッサンレモンパイ、クロックマダム等（惣菜系も有）。約400個のクロワッサンを使った装飾壁が名物\n- 予約方法：予約不要（テイクアウト・イートイン可）\n- 公式リンク：[Charles-Henry公式](https://charles-henry.jp/)／[PR TIMES](https://prtimes.jp/main/html/rd/p/000000006.000168247.html)／[ファッションプレス](https://www.fashion-press.net/news/148222)\n\n### 2. クオーツ心斎橋 5F「RESTAURANT」フロア（大阪・心斎橋 / Osaka Metro心斎橋駅）\n- オープン日：2026年7月16日（木）※昨日開業\n- **コンセプト**：地上28階・地下2階の複合施設「クオーツ心斎橋」（コンセプト「BEYOND LUXURY」）のレストランフロア。全国初・関西初出店を含むハイグレード9店舗が集結\n- 主な店舗：シンガポール・パラダイスグループの小籠包新業態「パラダイス・ダイナスティ」、カニ料理「かに重」（全国初）、しゃぶしゃぶ・すき焼き「甲梅」（関西初）、「炭焼うな富士」、「マーサーブランチ」ほか\n- 予約方法：店舗ごとに異なる（各店公式・グルメサイト経由）\n- 公式リンク：[クオーツ心斎橋公式](https://www.quartz-shinsaibashi.jp/)／[PR TIMES](https://prtimes.jp/main/html/rd/p/000000013.000176346.html)／[Yahoo!ニュース（週刊大阪日日新聞）](https://news.yahoo.co.jp/articles/bf057ab7dd8af3a55d82f0058c7b9902cbbacacc)\n\n## ⭐ ミシュラン・メディア話題（最大4件）\n\n※今週該当なし。直近の動きは6月の[ミシュランガイド先行公開Newセレクション](https://guide.michelin.com/jp/ja/article/dining-out/new-additions-michelin-japan-2026)（新一つ星「ほしの」含む12軒・[PR TIMES](https://prtimes.jp/main/html/rd/p/000000087.000117133.html)）で、直近7日以内の新規発表・受賞は確認できず。\n\n## ⏰ 期間限定・コラボ（最大5件）\n\n### 1. フォーシーズンズホテル東京大手町「ピーチ・メルバかき氷」（東京・大手町）\n- **提供期間**：2026年7月1日〜9月6日\n- 内容：ミシュラン一つ星レストランのペストリーシェフが手がけるピーチ・メルバ仕立てのかき氷 ¥4,200\n- 予約可否：ホテルレストラン枠のため事前予約推奨\n- リンク：[Numero TOKYO（ホテルかき氷特集）](https://numero.jp/20260630-kakigori/)\n\n### 2. ホテルニューオータニ（東京・赤坂見附）「パイナップルかき氷」\n- **提供期間**：提供中〜2026年8月31日\n- 内容：完熟パイナップル半玉分を使用、日光天然氷＋パイナップルソース・ココナッツソース\n- 予約可否：店舗により当日可\n- リンク：[いこーよニュース（進化系かき氷特集）](https://report.iko-yo.net/articles/32130)／[ホテル公式](https://www.newotani.co.jp/tokyo/)\n\n### 3. 横浜ベイホテル東急 カフェ トスカ「スィートジャーニー 桃」（横浜・みなとみらい）\n- **提供期間**：2026年7月2日〜8月27日 ※木曜限定デザートブッフェ\n- 内容：桃のショートケーキ・フレジェ・目の前で仕上げる桃のミニパフェ＋ローストビーフや窯焼きピッツァ等の食事メニュー\n- 予約可否：要予約（公式サイト）\n- リンク：[横浜ベイホテル東急公式](https://ybht.co.jp/restaurant/plan/sweetjourney-peach.php)\n\n### 4. スイーツパラダイス×Fate/Grand Order コラボカフェ（新宿・梅田・横浜ほか）\n- **提供期間**：新宿東口店・梅田店 7月1日〜7月30日／横浜ビブレ店 7月14日〜7月30日（京都河原町OPA店は7/15で終了済み）\n- 内容：水着衣装の限定イラストを使ったコラボメニュー・ノベルティ\n- 予約可否：スイーツパラダイス公式アプリのみで予約（利用日5週間前〜前日20時・先着順）\n- リンク：[スイーツパラダイス公式コラボページ](https://www.sweets-paradise.jp/collaboration/fate-go)\n\n## 📈 トレンドフード（最大3件）\n\n### 1. パフェ氷（パフェ×かき氷）\n- なぜ今旬か：かき氷がシェフ・パティシエ手がけるスイーツへ進化する流れの2026年夏の到達点。ソース・ムース・白玉を層にしてパフェのように仕立てる新感覚氷で、[Yahoo!ニュース（ぴあ）](https://news.yahoo.co.jp/articles/efbd2fabd52f78777d3e16fe36181410a8cb317c)等メディア露出が集中\n- 代表店：京都ブライトンホテル（「サジーとマンゴー」「苺と抹茶」）、フォーシーズンズホテル東京大手町、ビッグボーイ（6/18〜のパフェ仕立てかき氷でチェーンにも波及）\n\n### 2. 明太フランス（進化系）\n- なぜ今旬か：[食べログマガジンの2026年トレンドグルメ予想](https://magazine.tabelog.com/articles/482545)で「かつてない熱狂」と名指し。火付け役の福岡「アマムダコタン」東京進出後、注文後に明太バターを注入・再加熱するライブ型スタイルが都内で拡大中\n- 代表店：アマムダコタン表参道店（連日行列）、AMAM DACOTAN cafe\u0026bake（表参道）\n\n### 3. 進化型フードホール（ガチフードコート）\n- なぜ今旬か：予約困難店・実力派を1カ所で少しずつ楽しめる業態が外食の主流に。[食べログマガジン](https://magazine.tabelog.com/articles/482545)が2026年トレンドに挙げ、今週7/16のクオーツ心斎橋レストランフロア開業もこの流れ\n- 代表店：タイムアウトマーケット大阪（グラングリーン大阪・関西17店舗＋2バー集結）、虎ノ門横丁、クオーツ心斎橋\n\n\n\n---\n\n生成メモ（本文外・運用向け）: バズ枠はR2基準（元投稿URL＋拡散数値）を満たすSNS案件が今週見つからず1件のみ。画像URLはR4基準で裏取りできたものがなかったため全件省略した。アマムダコタン公式・京都ブライトン・タイムアウトマーケットのURLはドメイン推定を含むので、GOURMET_DB取込側でリンク生死チェック推奨。";
document.getElementById('content').innerHTML = marked.parse(md);
document.querySelectorAll('#content h3').forEach(h3 => {
  const raw = h3.textContent.trim();
  const clean = raw.replace(/^\d+\.\s*/,'').split(/[（(―—\s]/)[0].trim();
  if (!clean || clean.length < 2) return;
  fetch('https://ja.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(clean))
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(d => {
      if (!d.thumbnail) return;
      const img = document.createElement('img');
      img.src = d.thumbnail.source;
      img.alt = clean;
      h3.insertAdjacentElement('afterend', img);
    })
    .catch(() => {});
});
</script>
