n\n## 7. 今週のサマリー\n\n- シーズン3位（71pt）でCL出場権確保。カリック体制の正当性を証明。\n- ブルーノがPLアシスト記録を塗り替え、個人賞をダブル受賞。\n- 監督の正式就任（5/22）で来季に向けた体制が固まった。\n- 移籍市場は本格化前。信頼できるS/A級情報の出現を待つ段階。\n\n---\n\n**Sources:**\n- [Man United official – Carrick continues as head coach](https://www.manutd.com/en/news/michael-carrick-continues-as-man-united-head-coach-2026)\n- [Brighton 0-3 Man United – ESPN](https://www.espn.com/soccer/report/_/gameId/740966)\n- [Bruno Fernandes breaks PL assist record – manutd.com](https://www.manutd.com/en/news/bruno-fernandes-breaks-all-time-premier-league-assist-record-at-brighton)\n- [PL Final Standings 2025-26 – NBC Sports](https://www.nbcsports.com/premier-league-table-2025-26-season-standings)\n- [Carrick appointed permanent manager – Al Jazeera](https://www.aljazeera.com/sports/2026/5/22/man-utd-appoint-michael-carrick-as-permanent-manager)\n- [PL 2026-27 fixture release date – manutd.com](https://www.manutd.com/en/news/premier-league-confirms-202627-fixture-release-date)\n- [Man United preseason 2026 – SI.com](https://www.si.com/soccer/manchester-united-preseason-2026-tour-dates-fixtures-tickets-how-to-watch)\n\n---\n\n週報まとめ：**2025-26シーズンはリーグ3位・CL出場権確保で終了。カリック正式就任、ブルーノのPL記録更新が今週の2大ニュース。移籍市場は情報精度待ちの段階。**";
