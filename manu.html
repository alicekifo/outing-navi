6) | S級 |\n| エデルソン合意 | [ESPN](https://www.espn.com/soccer/story/_/id/48953983/man-united-agree-deal-atalanta-ederson-sources) / [Sky Sports](https://www.skysports.com/football/news/11095/13548678/man-utd-agree-ederson-deal-atlanta-midfielder-set-for-old-trafford-in-lb38m-transfer) | S級 |\n| ラッシュフォード交渉 | [Sky Sports](https://www.skysports.com/football/news/33694/13548681/) / [TeamTalk](https://www.teamtalk.com/manchester-united/marcus-rashford-man-utd-barcelona-2026-summer-transfer) | B級 |\n| ブルーノ契約停止 | [CaughtOffside](https://www.caughtoffside.com/2026/06/04/man-united-bruno-fernandes-decision-talks/) / [The Hard Tackle](https://thehardtackle.com/transfer-news/2026/06/04/manchester-united-halt-contract-talks-with-bruno-fernandes-confident-of-his-stay/) | B級 |\n| プレシーズン日程 | [manutd.com](https://www.manutd.com/en/news/man-utd-announce-four-more-pre-season-2026-fixtures) | S級 |\n| PL最終順位 | [NBC Sports](https://www.nbcsports.com/soccer/news/premier-league-2025-26-table-teams-standings-for-the-new-season) | A級 |\n\n---\n\n**次週の注目ポイント**：ラッシュフォード買取オプション期限（6月15日）、エデルソンのメディカル実施タイミング、ブルーノ契約の続報。";
