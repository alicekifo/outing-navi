B級 |\n| ヴァルデマル・アントン | （独国籍DF） | CB | €40m | C級 |\n| ジャン＝フィリップ・マテタ | エバートン | FW | — | C級 |\n| イリマン・ンディアエ | エバートン | WG | — | C級 |\n\n### ❓ 去就未定\n\n- **マルクス・ラッシュフォード**：バルセロナへのローンが満了。バルサはフリアン・アルバレス＋アンソニー・ゴードンを優先し永久移籍交渉を断念。ユナイテッドは「£26m買取オプションより安い額での売却も検討」との報道あり（Football365）。行先は白紙。\n\n---\n\n## 4. 監督・チーム体制\n\n| 項目 | 内容 |\n|------|------|\n| 監督 | **マイケル・カリック**（44歳） |\n| 就任形態 | 永久契約・2028年まで（5月22日公式発表） |\n| 暫定就任後の成績 | 16試合 11勝2分3敗（リーグ戦） |\n| 主な実績 | ノッティンガム・フォレスト戦の勝利でCL出場権を確定 |\n| コーチングスタッフ | カリック体制スタッフ全員が2028年まで継続 |\n\nルーベン・アモリムが1月に解任された後、前中盤の要として長年在籍したクラブレジェンドが陣頭指揮を執り、わずか半シーズンで3位フィニッシュを達成。INEOS（オーナー）はプレミアリーグ残留決定後すぐに正式任命を発表した。\n\n---\n\n## 5. 負傷・コンディション情報\n\n\u003e シーズン閉幕直後のため詳細な負傷リストは更新待ち。5月下旬時点での報告のみ。\n\n- **ベン・セスコ**：5月末時点で軽傷。プレシーズンまでに完全回復見込み\n- **マタイス・デ・リフト**：5月末時点で回復段階。同上\n\n---\n\n## 6. 今週のポイント整理\n\n```\n✅ 起こったこと\n   - エデルソン (アタランタ) 獲得合意 (Here We Go 確定)\n   - ホイルンド→ナポリ £44m 確定\n   - カゼミーロ・マラシア 退団確定\n   - ヒートン 契約1年延長\n   - プレシーズン日程 (7/18〜) 公表\n\n🔍 注目すべき動き\n   - ウガルテ売却先はどこか (UCL出場権クラブが有力視)\n   - ラッシュフォード問題：バルサ以外の行き先が焦点\n   - もう1名のMF補強 (アンダーソン or バレバが最有力)\n   - オナナの去就 (正 GK として残留か再ローンか)\n\n📅 来週のカレンダー\n   - 6/19  2026-27プレミアリーグ日程発表\n   - 7/18  プレシーズン初戦 vs レクサム (ヘルシンキ)\n```\n\n---\n\n## 7. 信頼度凡例\n\n| ランク | 基準 |\n|--------|------|\n| **S級** | 公式発表・ロマーノ\"Here We Go\"・信頼度の高いオーナメント記者 |\n| **A級** | 主要メディア複数一致報道 |\n| **B級** | 単独媒体だが信頼できる記者の報道 |\n| **C級** | 噂・リーク段階・未確認 |\n\n---\n\n**Sources:**\n- [Manchester United Official – Carrick Continues](https://www.manutd.com/en/news/michael-carrick-continues-as-man-united-head-coach-2026)\n- [Tribuna.com – Ederson \"Here We Go\" (Romano)](https://tribuna.com/en/news/2026-06-02-here-we-go-ederson-to-join-manchester-united-fabrizio-romano/)\n- [CaughtOffside – Ederson 100% Confirmed](https://www.caughtoffside.com/2026/06/06/man-united-ederson-transfer-documents-romano/)\n- [TeamTalk – Every Completed Man Utd Transfer Summer 2026](https://www.teamtalk.com/manchester-united/every-completed-man-utd-transfer-summer-2026-signings-exits-loans)\n- [TeamTalk – Romano INEOS Plan / Ugarte](https://www.teamtalk.com/manchester-united/man-utd-fabrizio-romano-2026-summer-transfer-update-ederson-silva)\n- [Football365 – Rashford / Barcelona](https://www.football365.com/news/man-utd-now-open-marcus-rashford-u-turn-one-reason-barcelona-solution)\n- [NBC Sports – PL 2025-26 Final Table](https://www.nbcsports.com/premier-league-table-2025-26-season-standings)\n- [SI.com – Man Utd Preseason 2026 Tour](https://www.si.com/soccer/manchester-united-preseason-2026-tour-dates-fixtures-tickets-how-to-watch)\n- [Al Jazeera – Carrick Permanent Appointment](https://www.aljazeera.com/sports/2026/5/22/man-utd-appoint-michael-carrick-as-permanent-manager)\n- [Wikipedia – 2025-26 Manchester United Season](https://en.wikipedia.org/wiki/2025%E2%80%9326_Manchester_United_F.C._season)";
