<script>
const md = "情報が揃いましたので、週報を生成します。\n\n---\n\n# マンチェスター・ユナイテッド 情報週報\n**2026年6月3日（火）付**\n\n---\n\n## 1. 直近の試合結果（5月27日〜6月3日）\n\n**該当期間内に公式戦なし。**\n\nプレミアリーグ2025-26シーズンは5月24日（日）の最終節で閉幕。7日ウィンドウ（5/27〜）には試合が含まれないため、今号では結果欄なし。\n\n\u003e 参考：最終節（5/24）はブライトン戦アウェー **3-0勝利**\n\n---\n\n## 2. 今後の試合予定\n\n現時点で**公式戦は未定**。2026-27 PL フィクスチャーリストは **6月19日（金）発表予定**、開幕は **8月22日（土）** の見込み。\n\n### プレシーズン（確定分）\n\n| 日程 | 対戦相手 | 会場 | 備考 |\n|------|---------|------|------|\n| 7月18日（土）18:00 現地 | ウレクサム | ヘルシンキ五輪スタジアム（フィンランド） | 欧州ツアー初戦 |\n| 7月24日（金）18:00 現地 | ローゼンボリ | レールケンダール（トロンハイム、ノルウェー） | |\n\nその他スウェーデン・ダブリンでの試合も発表済み。詳細は [manutd.com](https://www.manutd.com/en/news/man-utd-announce-four-more-pre-season-2026-fixtures) 参照。\n\n---\n\n## 3. 移籍情報（5月20日〜6月3日）\n\n### 【S級情報】エデルソン（アタランタ → マンUへ）\n\n- **ステータス**: 個人合意済み・他クラブ交渉停止\n- **パッケージ**: 約4,500万ユーロ、5年契約\n- **ソース**: Fabrizio Romano（5月31日）\n\n\u003e *「常識外のことが起きない限り、エデルソンはユナイテッドの選手になる」* — Romano\n\n選手側は他クラブからの接触に対し「ユナイテッドがある限り他には行かない」と回答済み。カセミロの後継となる守備的MFとして構想されている。\n\n**留意点**: Football365は「クラブが手続きを止め得る2つの理由」を報道（ソース信頼度A級）。正式発表はユナイテッド側の最終決断待ちで、確定ではない。\n\n---\n\n### 【B〜C級噂情報】（14日ウィンドウ内のS級ソース未確認）\n\n| 選手 | 現所属 | 概要 | 信頼度 |\n|------|--------|------|--------|\n| ハリー・ケイン | バイエルン・ミュンヘン | ユナイテッドの関心継続報道。ただしバイエルンが新契約交渉中で夏移籍は非現実的との見方が強い | C |\n| フランコ・マスタントゥオノ | レアル・マドリード | ユナイテッド含む噂あるも、ローン先はトッテナムが最有力との報道 | C |\n| クリスティアン・ロメロ | トッテナム | アトレティコ・マドリーを優先との報道あり | C |\n\n---\n\n## 4. クラブ情報・シーズン総括\n\n### 2025-26 プレミアリーグ 最終成績\n\n| 項目 | 結果 |\n|------|------|\n| 最終順位 | **3位** |\n| 成績 | 20勝 11分 7敗 |\n| 勝点 | **71pt** |\n| 得失点差 | +19 |\n| チャンピオンズリーグ出場権 | **獲得**（2026-27） |\n\n前シーズン比 **12位上昇**。CL出場権奪回はINEOS体制の重要目標の一つだった。\n\n### 今季個人賞\n\n**ブルーノ・フェルナンデス**（主将）\n- PL アシスト記録更新：**21アシスト**（歴代最多）\n- **FWA 年間最優秀選手賞**\n- **PL 年間最優秀選手賞**\n\n### 監督動向まとめ\n\n| 時期 | 出来事 |\n|------|--------|\n| 2026年1月 | ルーベン・アモリム解任（クラブ幹部との方針対立、着任14ヶ月未満） |\n| 2026年1月〜春 | ダレン・フレッチャー（元選手）暫定ヘッドコーチ |\n| 2026年春 | **マイケル・カリック**ヘッドコーチ就任・2028年まで契約 |\n\n---\n\n## 5. 今後の注目ポイント\n\n1. **6月19日** — 2026-27 PL フィクスチャーリスト発表\n2. **エデルソン移籍** — ユナイテッドの最終意思決定を待つ段階。Romano情報では「ほぼ確実」\n3. **夏の補強方針** — CB・攻撃的オプションの強化が引き続きカリック体制の課題\n\n---\n\n**信頼度凡例**: S級 = 公式・Romano等 / A級 = Sky Sports・ESPN等大手メディア / B〜C級 = タブロイド・未確認\n\n**主な情報源**:\n- [Fabrizio Romano (X) — エデルソン個人合意](https://x.com/FabrizioRomano/status/2059595270741016767)\n- [The Peoples Person — Romano最新アップデート 5/31](https://thepeoplesperson.com/2026/05/31/ederson-to-manchester-united-fabrizio-romano-drops-latest-update-310846/)\n- [manutd.com — プレシーズン日程発表](https://www.manutd.com/en/news/man-utd-announce-four-more-pre-season-2026-fixtures)\n- [Wikipedia — 2025-26シーズン](https://en.wikipedia.org/wiki/2025%E2%80%9326_Manchester_United_F.C._season)\n- [premierleague.com — 公式スタンディングス](https://www.premierleague.com/en/clubs/1/manchester-united/overview)\n- [Football365 — エデルソン懸念報道](https://www.football365.com/news/fabrizio-romano-two-reasons-man-utd-could-abandon-agreed-ederson-transfer)";
document.getElementById('content').innerHTML = marked.parse(md);
