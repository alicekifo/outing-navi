const md = "情報が揃いました。週報をまとめます。\n\n---\n\n# マンチェスター・ユナイテッド情報週報\n**発行日：2026年6月2日（月）**\n\n---\n\n## 1. クラブ最新動向\n\n### 監督・体制\n**マイケル・カリック、正式就任確定（2028年まで）**\n1月のルベン・アモリム解任後に暫定で指揮を執ったカリックが、5月22日に2年契約（2028年まで）で正式就任。就任後16試合で**11勝**を記録し、信任を勝ち取った。スタッフにはスティーブ・ホランド（元イングランドGKコーチ）、ジョナサン・ウッドゲートが名を連ねる。\n\n\u003e **ソース（S級）：** [manutd.com 公式発表](https://www.manutd.com/en/news/official-statement-manchester-united-appoint-michael-carrick-as-head-coach)、[Washington Post](https://www.washingtonpost.com/sports/soccer/2026/05/22/manchester-united-carrick-premier-league-soccer/71315288-55c6-11f1-9c40-7a0a12d9e745_story.html)\n\n---\n\n## 2. 直近の試合結果（5/26〜6/2）\n\n\u003e **注意：** 2025-26プレミアリーグは5月中旬〜下旬に閉幕。TODAY（6/2）から7日以内＝5/26以降の公式戦は現時点で確認できていない。シーズンは終了済み。\n\n### 2025-26シーズン最終成績（参考）\n| | W | D | L | GF | GA | 順位 |\n|---|---|---|---|---|---|---|\n| PL | 15 | 10 | 6 | 56 | 43 | **5位以内（CL出場権獲得）** |\n\nリバプール戦の3-2勝利でCL出場権を確定。アーセナル戦でも劇的な逆転勝利（2-3）が話題となった。\n\n---\n\n## 3. 今後の試合予定\n\n| 日程 | 大会 | 対戦相手 | 備考 |\n|---|---|---|---|\n| 6/11〜7/19 | **FIFA W杯 2026** | 各国代表として参加 | 詳細は下記 |\n| 7月上旬（予定） | プレシーズン | Wrexham（フィンランド） | 日程調整中 |\n| 7月中旬（予定） | プレシーズン | Rosenborg（ノルウェー） | 日程調整中 |\n| **8/22（予定）** | PL 2026-27 開幕 | 未定 | フィクスチャー発表は6/19 |\n\n\u003e ソース：[manutd.com プレシーズン日程](https://www.manutd.com/en/news/man-utd-announce-four-more-pre-season-2026-fixtures)、[SI.com](https://www.si.com/soccer/manchester-united-preseason-2026-tour-dates-fixtures-tickets-how-to-watch)\n\n---\n\n## 4. FIFA ワールドカップ 2026（6/11〜7/19）\n\n**ユナイテッド所属選手 参加国一覧（12名・9カ国）**\n\n| 選手 | 代表国 | 備考 |\n|---|---|---|\n| ブルーノ・フェルナンデス | ポルトガル | 今季PL最多21アシスト記録 |\n| ディオゴ・ダロ | ポルトガル | |\n| コビー・マイヌー | イングランド | |\n| マーカス・ラッシュフォード | イングランド | バルセロナへローン中 |\n| ベンヤン・シェシュコ | スロベニア | 負傷明け（後述） |\n| 他7名 | 各国 | 詳細はmanutd.com参照 |\n\n\u003e ソース（S級）：[manutd.com 公式W杯ガイド](https://www.manutd.com/en/news/detail/complete-guide-to-man-utd-at-the-2026-fifa-world-cup)\n\n---\n\n## 5. 移籍情報（TODAY −14日以内：5/19〜6/2）\n\n### 確度A：ほぼ合意済み\n\n**エデルソン（アタランタ → マンチェスター・ユナイテッド）**\n- ブラジル人MF（26歳）、移籍金**€45m**、**5年契約**で合意済み\n- ファブリツィオ・ロマーノ：「選手はUnited以外の全クラブに『待ってくれ』と伝えている」と報告（5/31）\n- **遅延理由：** アタランタ側の監督・SDが交代中（新監督：マウリツィオ・サッリ）、新体制発足後に正式交渉スタート予定\n- **注意点：** INEOS側が「2つの理由」で破談を検討中との報道あり（ロマーノ、5/26）→ 動向注視が必要\n\n\u003e ソース（S級/Romano）：[The Peoples Person](https://thepeoplesperson.com/2026/05/31/ederson-to-manchester-united-fabrizio-romano-drops-latest-update-310846/)、[TeamTalk](https://www.teamtalk.com/manchester-united/ederson-wants-to-join-man-utd-from-atalanta-fabrizio-romano-update)、[ESPN](https://www.espn.com/soccer/story/_/id/48860017/transfer-rumors-news-ederson-prioritising-move-man-united)\n\n---\n\n### 確度B：交渉・協議中\n\n**ラファエル・レオン（ACミラン → マンチェスター・ユナイテッド）**\n- ポルトガル代表FW（26歳）、移籍金**£43m**\n- ユナイテッドが最有力候補と報じられ、「承認済み」との報道\n- W杯期間中のため正式交渉は7月以降か\n\n\u003e ソース：[Football365](https://www.football365.com/news/man-utd-approval-rafael-leao-transfer-milan)\n\n**サンドロ・トナーリ（ニューカッスル?→ マンチェスター・ユナイテッド）**\n- イタリア代表MF、交渉が近い段階との報道\n- 詳細は引き続き確認中\n\n\u003e ソース：[SI.com](https://www.si.com/soccer/transfer-rumors-man-utd--tonali-palmer-rival-premier-league)\n\n---\n\n## 6. 負傷・コンディション情報\n\n| 選手 | 状況 | 見通し |\n|---|---|---|\n| **マヌエル・ウガルテ** | 腰の問題でサンダーランド戦欠場 | W杯代表選考に影響の可能性 |\n| **ベンヤン・シェシュコ** | すねの怪我（リバプール戦で悪化）、シーズン終盤を欠場 | 「まだ100%ではない」（カリック談） |\n| **マティス・デ・リフト** | 腰の故障、11月末以降欠場継続 | 回復に時間 |\n\n---\n\n## 7. 今週のポイント\n\n1. **カリック体制の本格始動** — 正式就任後、夏の補強方針と戦術の定着が最大課題\n2. **エデルソン案件の結末** — アタランタ新体制が固まり次第、正式発表か破談かが決する（6月中旬が焦点）\n3. **W杯でのユナイテッド勢** — ブルーノ、マイヌーら主力の活躍と怪我の有無が夏の計画に直結\n4. **PL新シーズン日程** — 6/19に2026-27フィクスチャー発表。初戦の組み合わせに注目\n\n---\n\n**Sources:**\n- [Manchester United 公式 - 試合結果](https://www.manutd.com/en/matches/mens-team/results)\n- [Manchester United 公式 - プレシーズン日程](https://www.manutd.com/en/news/man-utd-announce-four-more-pre-season-2026-fixtures)\n- [Manchester United 公式 - W杯ガイド](https://www.manutd.com/en/news/detail/complete-guide-to-man-utd-at-the-2026-fifa-world-cup)\n- [Manchester United 公式 - カリック就任](https://www.manutd.com/en/news/official-statement-manchester-united-appoint-michael-carrick-as-head-coach)\n- [Fabrizio Romano / The Peoples Person - エデルソン移籍最新情報](https://thepeoplesperson.com/2026/05/31/ederson-to-manchester-united-fabrizio-romano-drops-latest-update-310846/)\n- [ESPN - エデルソン優先権](https://www.espn.com/soccer/story/_/id/48860017/transfer-rumors-news-ederson-prioritising-move-man-united)\n- [Football365 - レオン交渉](https://www.football365.com/news/man-utd-approval-rafael-leao-transfer-milan)\n- [Sky Sports - アモリム解任](https://www.skysports.com/football/news/11095/13490609/ruben-amorim-sacked-manchester-united-dismiss-head-coach-after-14-months-in-charge)\n- [SI.com - プレシーズン](https://www.si.com/soccer/manchester-united-preseason-2026-tour-dates-fixtures-tickets-how-to-watch)";
