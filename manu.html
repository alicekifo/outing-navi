<script>
const md = "情報が揃いました。週報を生成します。\n\n---\n\n# マンチェスター・ユナイテッド情報週報\n**発行日：2026年6月8日（日）**\n\n---\n\n## 1. 直近の試合結果（6/1〜6/8）\n\n**該当試合なし**\n\nプレミアリーグ 2025-26シーズンは5月に閉幕。この期間は公式戦なし。\n\n---\n\n## 2. 2025-26シーズン最終成績\n\n| 順位 | 勝点 | 勝 | 分 | 負 | 得失差 |\n|------|------|----|----|----|----|\n| **3位** | **71** | 20 | 11 | 7 | +19 |\n\n**来季チャンピオンズリーグ出場権を獲得。**\n\n---\n\n## 3. クラブ情報\n\n### ✅ マイケル・カリック監督 — 正式就任（S級ソース確認済）\n\n- 1月にルベン・アモリムの後任として暫定就任 → 5月22日に正式契約（2028年まで＋オプション1年）\n- 暫定期間16試合：11勝3分2敗。3位＆UCL圏内を確保しての就任となった\n- 出典：[manutd.com](https://www.manutd.com/en/news/michael-carrick-continues-as-man-united-head-coach-2026) / [Al Jazeera](https://www.aljazeera.com/sports/2026/5/22/man-utd-appoint-michael-carrick-as-permanent-manager)\n\n---\n\n## 4. 移籍情報（報道基準日：5/25〜6/8）\n\n### ✅ 確定・正式発表\n\n| 選手 | 内容 | 日付 |\n|------|------|------|\n| トム・ヒートン（GK） | 1年契約更新 | 6月4日 |\n\n---\n\n### 🟡 交渉・オファー段階（信頼度：中〜高）\n\n**マーカス・ラッシュフォード → バルセロナ完全移籍交渉中**\n\n- 今季バルセロナへレンタル中（14G・14A）。本人はバルサ残留を強く希望\n- バルサ側は買取オプション£2,600万を提示するも「2条件付き」で交渉継続中\n- INEOSは高額週給（£32.5万）を早期に払拭したい意向\n- バルサがアンソニー・ゴードン（£6,900万）を獲得したことで状況は流動的\n- 出典：[Football365](https://www.football365.com/news/barcelona-tell-man-utd-pay-26m-rashford-two-conditions-ineos-response-revealed) / [TeamTalk](https://www.teamtalk.com/manchester-united/man-utd-reach-decision-selling-marcus-rashford-barcelona-new-conditions)\n\n**ジャン＝フィリップ・マテタ（クリスタル・パレス → ユナイテッド）**\n\n- 6月5日報道：ユナイテッドが探索的交渉を実施\n- ジョシュア・ジルクゼーの放出を前提に、FW補強の最右翼候補\n- 契約残1年のため移籍金は大幅に下がる可能性（評価額：約€50M→割引交渉想定）\n- ACミラン・ユベントスも争奪戦参入\n- 出典：[The Hard Tackle](https://thehardtackle.com/transfer-news/2026/06/05/manchester-united-hold-exploratory-talks-to-sign-jean-philippe-mateta/)\n\n**バルデマール・アントン（ボルシア・ドルトムント → ユナイテッド）**\n\n- ユナイテッドが€4,000万のオファーを準備中との報道（The Mirror）\n- CBの層強化が目的\n\n---\n\n### 🔴 接触・リンク段階（信頼度：低〜中）\n\n| 選手 | 現所属 | 内容 |\n|------|--------|------|\n| マルク・カサド | バルセロナ | ユナイテッドがクラブ側と接触確認 |\n| ジュリアン・ライアーソン | （報道あり） | ユナイテッドが夏の移籍ターゲットとして検討 |\n\n---\n\n### 🔄 退団候補\n\n| 選手 | 状況 |\n|------|------|\n| アンドレ・オナナ | プレシーズンに合流予定も再統合せず。トラブゾンスポルへの再レンタルを協議中 |\n| アルタイ・ベインドゥル | 売却の可能性 |\n| ジョシュア・ジルクゼー | 放出濃厚 |\n\n---\n\n## 5. 今後の予定（プレシーズン）\n\n\u003e 公式戦は**7月18日**以降。プレシーズンは北欧ツアーから始動。\n\n| 日付 | 対戦相手 | 会場 | 時刻（現地/BST） |\n|------|----------|------|-----------------|\n| 7/18（土） | ラクサム | ヘルシンキ（フィンランド） | 18:00 / 16:00 |\n| 7/24（金） | ローゼンボリ | トロンハイム（ノルウェー） | 18:00 / 17:00 |\n| 8/1（土） | アトレティコ・マドリード | ストックホルム（スウェーデン） | 15:00 / 14:00 |\n| 8/8（土） | パリ・サンジェルマン | ヨーテボリ（スウェーデン） | 17:00 / 16:00 |\n| 8/12（水） | リーズ・ユナイテッド | ダブリン（アイルランド） | 19:30 BST |\n\n出典：[manutd.com プレシーズン公式情報](https://www.manutd.com/en/news/game-by-game-united-pre-season-fixture-list-2026)\n\n---\n\n## 編集後記\n\n今週の最大トピックはカリック監督の正式就任（5/22）で、クラブの新体制が正式に始動。夏の補強はFW（マテタ）・CB（アントン）が主軸となっており、ラッシュフォードの処遇次第で資金の使い方も変わってくる。プレシーズン初戦まであと40日、本格的な移籍市場の動きは今後2〜3週間で加速する見込み。\n\n---\n\n**Sources:**\n- [Manchester United 公式 — プレシーズン日程](https://www.manutd.com/en/news/game-by-game-united-pre-season-fixture-list-2026)\n- [Manchester United 公式 — カリック監督継続](https://www.manutd.com/en/news/michael-carrick-continues-as-man-united-head-coach-2026)\n- [The Hard Tackle — マテタ交渉（6/5）](https://thehardtackle.com/transfer-news/2026/06/05/manchester-united-hold-exploratory-talks-to-sign-jean-philippe-mateta/)\n- [Football365 — ラッシュフォード交渉](https://www.football365.com/news/barcelona-tell-man-utd-pay-26m-rashford-two-conditions-ineos-response-revealed)\n- [TeamTalk — ラッシュフォード判断](https://www.teamtalk.com/manchester-united/man-utd-reach-decision-selling-marcus-rashford-barcelona-new-conditions)\n- [Tribuna — オナナ復帰](https://tribuna.com/en/news/2026-06-02-andre-onana-returns-to-manchester-united-for-preseason-romano/)\n- [TransferFeed — 移籍情報まとめ](https://www.transferfeed.com/clubs/manchester-united/14)\n- [Sky Sports — 移籍ニュース](https://www.skysports.com/football/live-blog/11095/13025492/man-utd-transfer-news-rumours-and-gossip-live-updates-and-latest-on-deals-signings-loans-and-contracts)";
