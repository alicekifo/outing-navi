#content a{color:var(--blue);text-decoration:none;word-break:break-all;}

#content hr{border:none;border-top:1px solid var(--border);margin:20px 0;}
#content table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0 16px;}
#content th{color:var(--text2);font-weight:600;padding:6px 8px;border-bottom:1px solid var(--border2);text-align:left;}

const md = "情報が揃いました。週報を作成します。\n\n---\n\n# マンチェスター・ユナイテッド情報週報\n**生成日：2026年6月6日（金）**\n\n---\n\n## 1. シーズン最終成績（2025-26 プレミアリーグ）\n\n| 順位 | チーム | 試合 | 勝 | 分 | 負 | 勝点 | GD |\n|------|--------|------|----|----|----|----|-----|\n| 1 | アーセナル | 38 | — | — | — | 85 | — |\n| 2 | マンチェスター・シティ | 38 | — | — | — | 78 | — |\n| **3** | **マンチェスター・ユナイテッド** | **38** | **20** | **11** | **7** | **71** | **+19** |\n\n**→ チャンピオンズリーグ出場権（3位）獲得**\n\n---\n\n## 2. 直近の試合結果（5/30〜6/6）\n\n\u003e プレミアリーグ 2025-26シーズンは終了。**この期間内に公式戦なし。**\n\n**直前の最終節（5/24）：**\n**ブライトン 0–3 マンチェスター・ユナイテッド** ✅\n\n---\n\n## 3. 今後の試合予定\n\n| 日付 | 大会 | 対戦相手 | 会場 |\n|------|------|---------|------|\n| 2026/7/18（予定） | プレシーズン親善試合 | ラクサム（Wrexham） | フィンランド |\n| 2026/7月（日程未定） | プレシーズン親善試合 | ローゼンボリ（Rosenborg） | ノルウェー |\n| 2026/8月 | プレミアリーグ 2026-27 | TBD | — |\n\n\u003e プレミアリーグ 2026-27シーズンの日程発表日は公式が告知済みだが、具体的な対戦相手・日時は未公表。\n\n---\n\n## 4. 移籍情報（5/23〜6/6・直近14日以内）\n\n### IN（獲得交渉）\n\n| 選手 | 現所属 | ポジション | 状況 | 推定額 | ソース信頼度 |\n|------|--------|-----------|------|--------|-------------|\n| **エデルソン** | アタランタ | MF（ボランチ） | クラブ間合意済み、7月に正式完了予定（4+1年契約） | €40.5m（最大€45m） | A級（ESPN） |\n| **ヴァルデマール・アントン** | ボルシア・ドルトムント | CB | 初期オファー準備中、スカウト派遣済み | £35m（報道）| B級（CaughtOffside等） |\n| **サンドロ・トナーリ** | 未確認 | MF | カリック監督が関心 | 未報告 | B級 |\n\n**エデルソン補足：** ブラジル代表MF（27歳）。アタランタでの安定したパフォーマンスが評価。カリック監督による「中盤再建」の核として位置づけ。\n\n**アントン補足：** 29歳のドイツ人CB。ドルトムント移籍後44試合出場。リサンドロ・マルティネス、マティス・デ・ライフトの故障続発が獲得背景。アストン・ビラ、アトレティコ・マドリーも競合。\n\n### OUT（放出交渉）\n\n| 選手 | 移籍先候補 | 状況 | 詳細 |\n|------|----------|------|------|\n| **マーカス・ラッシュフォード** | FCバルセロナ（ローン中→完全移籍交渉） | バルサが£26m（条件付き）提示、Man Utd側は交渉継続中 | 本人はバルサ残留を強く希望。今季14G14A。バルサはアンソニー・ゴードン（£69m）も獲得し、交渉力低下。ユナイテッドは週£325,000の給与削減を優先。 |\n\n### 補強優先事項（今夏）\n\n1. **左SB** — ルーク・ショーの相棒となる若手・国際水準の選手が最優先\n2. **左サイドのアタッカー** — ラッシュフォード放出後の補強候補を捜索中\n\n---\n\n## 5. 監督・クラブ情報\n\n**ヘッドコーチ：マイケル・カリック**\n- 2026年1月13日に就任（シーズン途中から）\n- 就任4日後にマンチェスター・ダービーを2-0で制覇（旧トラフォードでのシティ戦では2023年1月以来初勝利）\n- 1月25日にアーセナルを3-2で撃破（アウェイでのリーグ戦アーセナル勝利は2017年12月以来初）\n- **チャンピオンズリーグ出場権を確保した功績**が評価される\n- 来季の正式続投については公式発表未確認\n\n---\n\n## 6. ソース一覧\n\n**S級（公式）**\n- [Manchester United 公式 – 試合結果](https://www.manutd.com/en/matches/mens-team/results)\n- [Manchester United 公式 – 次季フィクスチャー発表](https://www.manutd.com/en/news/man-utd-announce-four-more-pre-season-2026-fixtures)\n- [Premier League 公式 – 2025-26 マンチェスター・ユナイテッド](https://www.premierleague.com/en/clubs/1/manchester-united/overview)\n\n**A級（主要メディア）**\n- [ESPN – エデルソン アタランタ合意](https://www.espn.com/soccer/story/_/id/48953983/man-united-agree-deal-atalanta-ederson-sources)\n- [NBC Sports – プレミアリーグ 2025-26 最終順位表](https://www.nbcsports.com/premier-league-table-2025-26-season-standings)\n- [SI.com – 2025-26シーズンレビュー](https://www.si.com/soccer/man-utd-2025-26-season-review-new-hope)\n\n**B級（専門メディア）**\n- [CaughtOffside – エデルソン移籍合意](https://www.caughtoffside.com/2026/06/02/manchester-united-ederson-atalanta-transfer-deal-close/)\n- [CaughtOffside – ヴァルデマール・アントン](https://www.caughtoffside.com/2026/06/02/man-united-waldemar-anton-35m-transfer-michael-carrick-dortmund/)\n- [The Peoples Person – エデルソン正式合意](https://thepeoplesperson.com/2026/06/02/man-united-reach-full-agreement-with-atalanta-for-ederson-310962/)\n- [Football365 – ラッシュフォード バルセロナ交渉](https://www.football365.com/news/barcelona-tell-man-utd-pay-26m-rashford-two-conditions-ineos-response-revealed/)\n- [TeamTalk – ラッシュフォード交渉続報](https://www.teamtalk.com/manchester-united/man-utd-reach-decision-selling-marcus-rashford-barcelona-new-conditions)\n\n---\n\n**注意事項：** エデルソン移籍は「クラブ間合意済み」ですが、正式完了（メディカル・公式発表）は7月予定。週報作成時点（6/6）では確定情報ではありません。移籍交渉情報はB級ソースを含むため、公式発表まで続報を確認してください。";
