\n| マテウス・クーニャ | 🇧🇷 ブラジル | |\n| セヌ・ラメンス | 🇧🇪 ベルギー | |\n| カセミーロ | 🇧🇷 ブラジル | ※ユナイテッドは退団済み |\n| （他2名） | 各国代表 | 詳細調査中 |\n\n\u003e W杯期間中、選手の負傷・コンディションはオフシーズン準備に直結するため要注目。\n\n---\n\n## ■ 来週の注目点\n\n1. **エデルソンのメディカル実施・正式発表**（7月初旬見込み）\n2. **ウガルテ動向**：残留か売却かの方向性が明確になる可能性\n3. **追加補強報道**：カリック体制での2枚目中盤補強候補の浮上\n4. **W杯グループステージ開幕**（6月11日〜）：ユナイテッド選手のパフォーマンス監視\n\n---\n\n## Sources\n\n- [Manchester United 公式 — カリック正式就任](https://www.manutd.com/en/news/official-statement-manchester-united-appoint-michael-carrick-as-head-coach)\n- [Manchester United 公式 — カリック継続契約](https://www.manutd.com/en/news/michael-carrick-continues-as-man-united-head-coach-2026)\n- [Sky Sports — Ederson 移籍合意](https://www.skysports.com/football/news/11095/13548678/man-utd-agree-ederson-deal-atalanta-midfielder-set-for-old-trafford-in-lb38m-transfer)\n- [The Peoples Person — Romano: Ederson最新情報](https://thepeoplesperson.com/2026/05/31/ederson-to-manchester-united-fabrizio-romano-drops-latest-update-310846/)\n- [ESPN — Ederson移籍合意（ソース情報）](https://www.espn.com/soccer/story/_/id/48953983/man-united-agree-deal-atalanta-ederson-sources)\n- [FootballTransfers — Ederson合意確認](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/06/man-utd-transfer-news-ederson-deal-confirmed-michael-carrick-first-signing)\n- [Manchester United 公式 — W杯出場選手一覧](https://www.manutd.com/en/news/united-at-the-2026-world-cup-when-are-the-group-games)\n- [Manchester United 公式 — プレシーズン日程発表](https://www.manutd.com/en/news/man-utd-announce-four-more-pre-season-2026-fixtures)\n- [Premier League 公式 — 2025/26シーズン結果](https://www.premierleague.com/en/clubs/1/manchester-united/matches)\n\n---\n\n*本週報はR1日付ガード・R2ソース信頼度ルールに基づき作成。S級ソース未確認の情報は信頼性を明記しています。*";
