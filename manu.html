<script>
const md = "情報が揃いました。週報を生成します。\n\n---\n\n# マンチェスター・ユナイテッド情報週報\n**発行日：2026年6月12日（木）**\n\n---\n\n## 1. クラブ速報\n\n### ミハイル・カリック、正式監督に就任（契約〜2028年）\n\nマンチェスター・ユナイテッドは6月初旬、マイケル・カリック氏（44歳）を2028年までの2年契約で正式ヘッドコーチに任命したと発表した（[manutd.com](https://www.manutd.com/en/news/official-statement-manchester-united-appoint-michael-carrick-as-head-coach)）。コーチングスタッフも同期間で契約を更新済み。\n\nカリック氏は1月にルベン・アモリムの後任として暫定就任後、16試合で11勝を挙げ、プレミアリーグ3位・チャンピオンズリーグ出場権獲得という劇的な巻き返しを実現。ブルーノ・フェルナンデスはFWA年間最優秀選手賞およびプレミアリーグ最優秀選手賞を受賞し、25/26シーズンを締めくくった（[CaughtOffside](https://www.caughtoffside.com/2026/06/09/man-united-compete-under-michael-carrick/)）。\n\n---\n\n## 2. 直近の試合結果（6月5日〜12日）\n\n**競技試合なし。** プレミアリーグ25/26シーズンは5月に終了（最終順位：**3位**）。2026 FIFA ワールドカップは6月11日に開幕したが、該当期間内にユナイテッド選手が出場した試合は確認されていない（ブラジル（カゼミーロ）のモロッコ戦は6月13日予定）。\n\n---\n\n## 3. 今後の試合予定（直近3試合）\n\n| 日程 | 試合 | 場所 | 種別 |\n|------|------|------|------|\n| 6月13日 | ブラジル vs モロッコ ※選手注目 | ニュージャージー州 | W杯グループステージ |\n| 7月18日 | マンチェスター・ユナイテッド vs レクサム | ヘルシンキ、フィンランド | プレシーズン親善試合 |\n| 7月24日 | ローゼンボリ vs マンチェスター・ユナイテッド | トロンハイム、ノルウェー | プレシーズン親善試合 |\n\n※ 8月1日アトレティコ・マドリード戦、8月15日ACミラン戦も予定（[manutd.com](https://www.manutd.com/en/news/man-utd-announce-four-more-pre-season-2026-fixtures)）。26/27プレミアリーグ日程の発表日もクラブ公式より告知済み。\n\n---\n\n## 4. 移籍情報（5月29日〜6月12日・過去14日間）\n\n### 加入\n\n| 選手 | 移籍元 | 金額 | 状況 |\n|------|--------|------|------|\n| **エデルソン（MF）** | アタランタ（イタリア） | £3,450万 | 合意済・メディカル待ち |\n| **クリスティアン・オロスコ（FW）** | フォルタレザ（ブラジル） | £75万 | 合意済（7月の18歳誕生日後に正式加入、17歳コロンビア人） |\n\n### 退団・契約満了\n\n| 選手 | 行先 | 備考 |\n|------|------|------|\n| **ラスムス・ホイルンド** | ナポリ（移籍確定） | ローン後に完全移籍 |\n| **ジェイドン・サンチョ** | 未定（契約満了・フリー） | 公式試合58試合9ゴールで退団 |\n| **カゼミーロ** | 未定（フリー） | 1月に双方合意済みの円満退団 |\n| **ティレル・マラシア** | 未定（フリー） | PSVローン後フリーエージェント |\n\n\u003e **注：** 移籍交渉中として各所で報じられているハイデン・ハックニー（ミドルスブラMF）については、信頼度の高い確定情報が確認されていないため記載を留保する。\n\n---\n\n## 5. FIFA ワールドカップ 2026：ユナイテッド選手動向\n\n2026年W杯（北米開催）に出場するユナイテッド関連選手は計13名。主要選手と所属代表を以下に示す。\n\n| 選手 | 代表 | 備考 |\n|------|------|------|\n| ブルーノ・フェルナンデス | ポルトガル | 25/26シーズンFWA・PL最優秀選手 |\n| カゼミーロ | ブラジル | 6/13 モロッコ戦から出場予定 |\n| マテウス・クーニャ | ブラジル | 同上 |\n| コビー・メイヌー | イングランド | カリック就任後に復活、トゥヘル代表から招集 |\n| リサンドロ・マルティネス | アルゼンチン | ディフェンディングチャンピオン・アルゼンチンの主力 |\n| ヌスレール・マズラウイ | モロッコ | 6/13 ブラジル戦 |\n\n\u003e ユナイテッド選手が出場する各国の試合日程は、FIFA公式サイト・各国協会の公式SNSで随時確認のこと。\n\n---\n\n## 6. 編集後記\n\n25/26シーズンは「カリック・マジック」で締めくくられた。冬に最下位圏内に沈んでいたクラブがチャンピオンズリーグ圏内で着地するとは、多くのファンが予測しなかった展開だった。夏の補強の核となるエデルソン獲得により中盤再建が本格化する見込みで、W杯での各国選手の活躍が移籍市場にも影響を与える可能性がある。\n\n---\n\n**Sources:**\n- [マンチェスター・ユナイテッド公式 — カリック監督継続](https://www.manutd.com/en/news/michael-carrick-continues-as-man-united-head-coach-2026)\n- [マンチェスター・ユナイテッド公式 — プレシーズン日程](https://www.manutd.com/en/news/man-utd-announce-four-more-pre-season-2026-fixtures)\n- [TeamTalk — 夏2026移籍完了リスト](https://www.teamtalk.com/manchester-united/every-completed-man-utd-transfer-summer-2026-signings-exits-loans)\n- [UnitedInFocus — 確定移籍情報](https://www.unitedinfocus.com/transfer-news/manchester-united-confirmed-signings-transfers-in-out-loan-exits-releases-for-2026-27/)\n- [SI.com — W杯ユナイテッド選手一覧](https://www.si.com/soccer/every-man-utd-player-2026-world-cup)\n- [CaughtOffside — カリック政権の展望](https://www.caughtoffside.com/2026/06/09/man-united-compete-under-michael-carrick/)\n- [VAVEL — 25/26シーズンレビュー](https://www.vavel.com/en/football/2026/06/05/manchester-united/1262790-man-united-2025-26-season-review.html)";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
