<script>
const md = "# サッカー移籍情報 まとめ\n更新日：2026-05-30　／ WC_MODE: false（通常期）\n\n---\n\n## 状況メモ\n夏の移籍ウィンドウはまだ正式オープン前。プレミア6/15、セリエA6/29、ラ・リーガ・ブンデス・リーグアンは7/1。だから「公式に完了」と発表される件数は少なめで、いまは**合意ベース／Here We Go段階**の話題が中心。事前合意 → ウィンドウオープン後に正式announcement、という流れになる。\n\n---\n\n## 1. 完了・正式合意した移籍（直近7日間）\n\n### Valentin Barco（ストラスブール → チェルシー）\n- **契約**：6年契約（〜2032）\n- **移籍金**：非公開\n- **背景**：シャビ・アロンソ新体制での**初signing**。アルゼンチン代表MF22歳。元はブライトン所属、2024-25後半にストラスブールへローン、2025年夏に£790万で完全移籍したばかり。実質的にBlueCoグループ内の横移動でしょ、と思ったらやっぱりそう\n- **狙い**：アロンソが好む技術系インサイドハーフ補強。中盤の若返り\n\n### Andy Robertson（リバプール → トッテナム）口頭合意\n- **形態**：フリー移籍（リバプール契約満了）\n- **年齢**：32歳\n- **背景**：リバプールで9年、プレミア2回・CL1回。エモーショナルな別れ\n- **横槍**：ユベントスがハイジャック画策中。ただし本人とスパーズの合意を尊重する見通し\n\n### Samuel Martinez（アトレティコ・ナシオナル → リバプール）合意\n- **形態**：FIFA規定により18歳まで母国残留（1年遅延）\n- **年齢**：17歳（4月で17）、コロンビア人プレイメーカー\n- **特約**：将来の売却時セルオン条項付き\n- **背景**：複数の欧州クラブとの争いをリバプールが制した、という勝ち方\n\n---\n\n## 2. Here We Go!（Romano確定スタンプ済み）\n\n直近7日のRomanoの「Here We Go」発令は以下が中心：\n\n| 選手 | 移籍先 | ステータス |\n|------|--------|-----------|\n| Valentin Barco | Chelsea | Here We Go（6年契約・全合意） |\n| Samuel Martinez | Liverpool | Here We Go（来年合流） |\n| Andy Robertson | Tottenham | Verbal Agreement（書面はこれから） |\n\n正直、ウィンドウ前としてはこれくらいが妥当。爆発するのは6月後半から\n\n---\n\n## 3. 噂・交渉中（注目案件）\n\n### 進行中の高額案件\n- **Julián Álvarez**（アトレティコ・マドリー → バルセロナ）：**€100m規模**のオファー準備中。アトレティコ側も離脱受容ムード\n- **Elliot Anderson**（ノッティンガム・フォレスト → マンチェスター・シティ）：£100m級の値札。シティがリード\n- **Anthony Gordon**（ニューカッスル → バルセロナ）：合意間近。バルサのFW陣再編の一手目\n- **Adam Wharton**（クリスタル・パレス → リバプール）：交渉ポジティブ、数週間内に動きそう\n\n### レアル・マドリー周辺（モウリーニョ復帰効果）\n- **Rodri Hernandez**（マンチェスター・シティ → レアル）：モウリーニョが名指しでリクエスト\n- **Alessandro Bastoni**（インテル → レアル）：バルセロナの本命でもあるDF、奪い合い構図\n- 内紛メモ：**Tchouameni vs Valverde が練習中に殴り合い**（Romano報）。クラブ内部、ちょっと荒れてる\n\n### バルセロナ\n- **Robert Lewandowski**：契約延長交渉中（減額条件、Pini Zahaviがスペイン入り）\n\n### リバプール周辺の動き\n- **Ibrahima Konaté**退団確実視 → 後任候補にユベントスの**Bremer**\n- **Diomande** 争奪：リバプール vs PSG\n\n---\n\n## 4. フリー移籍（契約満了組）\n\n今夏の主要な「タダで動く」面々：\n\n- **Mohamed Salah**（リバプール退団）← これがいちばんデカい\n- **Andy Robertson**（→ トッテナム合意済み）\n- **Bernardo Silva**（マンチェスター・シティ退団）\n- **John Stones**（マンチェスター・シティ退団）\n- **Casemiro**（マンチェスター・ユナイテッド退団）\n\nサラーがフリーで動くの、まだ実感ない\n\n---\n\n## 5. 監督人事（2026シーズン振り返り含む）\n\n- **レアル・マドリー → ジョゼ・モウリーニョ復帰**：13年ぶり。今夏のターゲットは本人が最終決定権を握る\n- **Chelsea**：1月にEnzo Maresca解任 → Liam Rosenior就任（6年契約）→ **4月に解任**（直近8試合7敗）→ Calum McFarlane暫定 → 夏に**シャビ・アロンソ体制**へ。Barco獲得はその第一弾\n- **Manchester United**：1月にRuben Amorim解任（記者会見でWilcoxに公然反抗）→ Darren Fletcherが暫定指揮\n- **Nottingham Forest**：2月にSean Dyche解任（114日）→ Vitor Pereira\n\nチェルシーの監督人事、年に何回やるのか\n\n---\n\n## ひとこと\n\nウィンドウ前のこの時期は、Romanoの「Here We Go」がポロポロ出てくる助走期間。本番は6/15以降。注目は**サラーのフリー移籍先**（サウジ vs 欧州残留）と、**モウリーニョのレアルがどこまで暴れるか**。あとアトレティコの**Julián Álvarezのバルサ移籍**、これが動くと夏のメガディール認定\n\n---\n\n## Sources\n\n- [Premier League summer transfer window 2026 dates](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/05/summer-transfer-window-2026-date-times-open-close-premier-league-la-liga-serie-a-bundesliga-ligue-1-saudi-arabia)\n- [Fabrizio Romano: Chelsea agree Valentin Barco deal](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/05/fabrizio-romano-transfer-news-chelsea-valentin-barco-man-utd-ederson-bayern-munich-michael-olise)\n- [Valentin Barco Chelsea 6-year deal (TribalFootball)](https://www.tribalfootball.com/article/soccer-premier-league-chelsea-agree-deal-to-sign-valentin-barco-from-strasbourg-91bf85d2-e7fb-4fd1-a5a2-fdbf507d67a2)\n- [\"Here we go\" Liverpool South American prodigy (Yardbarker)](https://www.yardbarker.com/soccer/articles/here_we_go_fabrizio_romano_reveals_liverpool_agreement_for_south_american_prodigy/s1_15959_43878185)\n- [Tottenham agree Andy Robertson deal (Anfield Watch)](https://www.anfieldwatch.co.uk/liverpool-fc/news/fabrizio-romano-confirms-liverpool-agreement-to-sign-midfielder/)\n- [Fabrizio Romano: Real Madrid fight, Barca deal (FootballTransfers)](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/05/fabrizio-romano-transfer-news-new-real-madrid-fight-barca-deal-confirmed-casemiro-u-turn-latest)\n- [Mourinho Real Madrid arrival, Barcelona target (Football España)](https://www.football-espana.net/2026/05/23/jose-mourinho-real-madrid-barcelona-target)\n- [Five deals before 2026 World Cup (FootballTransfers)](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/05/transfer-news-five-deals-completed-before-2026-world-cup-summer-window)\n- [Premier League done deals summer 2026 (Sky Sports)](https://www.skysports.com/football/news/11095/13546618/transfer-news-summer-transfer-window-2026-premier-league-deals-ins-and-outs)\n- [Ruben Amorim sacked Manchester United (ESPN)](https://www.espn.com/soccer/story/_/id/46418438/ruben-amorim-sacked-man-united-head-coach)\n- [Liam Rosenior Chelsea sacked (Sky Sports)](https://www.skysports.com/football/news/11668/13535302/chelsea-no-shortlist-and-no-no-1-candidate-to-replace-sacked-liam-rosenior-whats-next-at-stamford-bridge)\n- [Five managers sacked in 2026 (Gulf News)](https://gulfnews.com/sport/football/meet-the-five-managers-already-sacked-in-2026-and-the-year-has-only-just-begun-1.500400354)";
document.getElementById('content').innerHTML = marked.parse(md);
document.querySelectorAll('#content table').forEach(t=>{const w=document.createElement('div');w.className='tbl-wrap';t.parentNode.insertBefore(w,t);w.appendChild(t);});
</script>
