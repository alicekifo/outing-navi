<script>
const md = "⚠️ プロンプトが「Fabrizio Romano が Here」で途切れているため、明示された2セクション（完了移籍 / Here We Go）に、夏ウィンドウ展望を補足する形で出力します。続きの指示があれば追記します。\n\nなお、TODAY=2026/5/30 時点では**主要リーグの夏移籍ウィンドウは未開幕**（PL: 6/15、Serie A: 6/29、Bundesliga: 7/1、La Liga・Ligue 1も同時期）。FIFAクラブW杯と6/11開幕のFIFAワールドカップ2026を控え、現状の「完了案件」は**フリー契約・先行合意・口頭合意（\"Here We Go\"段階）**が中心です。\n\n---\n\n# ⚽ サッカー移籍情報 速報レポート\n\n**生成日: 2026年5月30日（土）／ WC_MODE: false（通常期）**\n\n## 1. 完了・確定移籍ニュース（直近7日間: 5/23–5/30）\n\n主要リーグの夏ウィンドウは未開幕のため、フリー契約・先行口頭合意のみを掲載。\n\n### ① Andy Robertson（DF/左SB）— Liverpool → **Tottenham Hotspur**（フリー）\n- **発表**: 2026年5月28日（Fabrizio Romano \"Here we go\"）\n- **契約**: フリー、契約年数は数年規模で交渉済み\n- **背景**: ロバートソン（32歳）はAnfieldで9シーズン、PL2回・CL1回ほか主要タイトルを獲得して退団。最終節後に涙の別れを告げた。\n- **クラブの狙い**: トーマス・フランク体制のスパーズが左SBの経験値とリーダーシップを補強。**Juventusのハイジャック提案**を退け、ノース・ロンドンを選択。\n- **意義**: PL内移籍で対Liverpool戦の戦術データを内部化、CL常連復帰を目指す布陣の核に。\n\n### ② Samuel Martinez（FW/コロンビア出身ティーンエイジャー）— → **Liverpool**\n- **発表**: 2026年5月24日（Romano \"Here we go\"）\n- **契約**: 複数年契約、**将来移籍時のセルオン条項付き**\n- **背景**: 複数の欧州ビッグクラブが争奪戦を演じていた南米プロディジーをLiverpoolが先取り。\n- **クラブの狙い**: ポストSalah時代を見据えた長期投資型のアタッカー獲得。アカデミー強化路線の一環。\n\n### ③ Chelseaターゲット（5/27時点で\"Agreed\"報道）\n- **発表**: 2026年5月27日、Romano「合意間近」\n- **背景**: Chelseaの新シーズン編成の一部。報道時点で名前と詳細は確定段階手前。\n- 続報待ち（Romano本人の正式 \"Here we go\" 確認まで保留）。\n\n\u003e **市場の総評**: 5/23–5/30の1週間は、シーズン終了直後・W杯直前という特殊な期間で、契約終了に伴うフリー移籍と若手の囲い込みが中心。各クラブが**6/15のPLウィンドウ開幕**に向けてターゲットを精査中で、巨額の現金取引はまだ動いていない。\n\n---\n\n## 2. Here We Go!（Fabrizio Romanoが確定報じた案件）\n\n直近で確認された \"Here We Go\" / 口頭合意完了案件：\n\n| # | 選手 | 移籍 | 規模 | 状況 |\n|---|------|------|------|------|\n| 1 | **Andy Robertson** | Liverpool → Tottenham | フリー | \"Here we go\"（5/28）口頭合意、サイン待ち |\n| 2 | **Samuel Martinez** | 南米クラブ → Liverpool | 非公表 + セルオン条項 | \"Here we go\"（5/24） |\n| 3 | 複数Chelseaターゲット | — → Chelsea | — | \"Agreed\"段階（5/27） |\n\n**観測ポイント**：\n- Romanoは現在、**Liverpoolの新監督下での再構築**（南米プロディジー獲得）と**Tottenhamの守備強化**（Robertson）の2軸を集中的にトラッキング。\n- ウィンドウ開幕直後に大型移籍金案件（J. Álvarez、Bernardo Silva、Gvardiolなど）が一気に動く見込み。\n\n---\n\n## 3. 補足：夏2026の注目ターゲット（ウィンドウ開幕前夜）\n\n明示セクションではないが、文脈上参考として：\n\n- **Real Madrid**: Enzo Fernández（Chelsea）に£120m準備、Florentino Pérezが本人意向を後押し。Bayern Munichとともに **Josko Gvardiol**（Man City、24歳CB）の代理人にコンタクト。\n- **Barcelona**: **Julián Álvarez**（Atlético）獲得競争をリード。**Anthony Gordon**（Newcastle）の合意間近、次のターゲットはストライカー。**João Pedro**（Chelsea）もAlvarezの代替候補。\n- **Manchester City**: Pep Guardiolaが**Federico Valverde**を要望。**Elliot Anderson**（Nottingham Forest）獲得競争をリード。\n- **Tottenham**: Robertsonに続き左サイド完全リニューアル路線。\n- **Bayern Munich**: Gvardiol競争にReal Madridと参戦。\n\n---\n\n## 4. 直近の市場動向まとめ\n\n- **2025年の国際移籍総額**: 史上最高の**£9.49bn（$13.08bn）**を記録。2026年夏も高水準が見込まれる。\n- **W杯2026（6/11開幕）との重複**: 大会期間中も移籍交渉は継続。ただし大物選手の正式契約は大会終盤〜終了後に集中する見込み。\n- **PLウィンドウ早期窓**: PLは**6/1–6/10の限定的早期窓**を導入（FIFAクラブW杯出場クラブ向け）。本格ウィンドウは6/15から。\n\n---\n\n## 情報ソース\n\n- [Fabrizio Romano on X (公式)](https://x.com/FabrizioRomano)\n- [\"Here we go\" to Robertson/Spurs — Empire of the Kop](https://www.empireofthekop.com/2026/05/28/romano-gives-here-we-go-to-robertson-spurs/)\n- [Liverpool agreement for South American prodigy — Empire of the Kop](https://www.empireofthekop.com/2026/05/24/here-we-go-romano-reveals-liverpool-agreement-for-south-american-prodigy/)\n- [Romano: Tottenham agreed deal to sign Robertson — To The Lane And Back](https://tothelaneandback.com/2026/05/28/fabrizio-romano-andy-robertson-agreed-deal-sign-tottenham/)\n- [Chelsea target move close — Read Chelsea (5/27)](https://readchelsea.com/2026/05/27/agreed-fabrizio-romano-chelsea-target-move-close/)\n- [Summer 2026 transfer window dates — FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/05/summer-transfer-window-2026-date-times-open-close-premier-league-la-liga-serie-a-bundesliga-ligue-1-saudi-arabia)\n- [Ten biggest transfers expected this summer — Football Today](https://footballtoday.com/2026/05/29/the-ten-biggest-football-transfers-expected-this-summer/)\n- [Transfer rumors: Real Madrid, Bayern eye Gvardiol — ESPN](https://www.espn.com/soccer/story/_/id/48729140/transfer-rumors-news-real-madrid-bayern-munich-eye-man-city-gvardiol)\n- [Barcelona, Real Madrid compete for Man City star — Football España](https://www.football-espana.net/2026/05/27/barcelona-real-madrid-sign-e75m-man-city-star)\n- [Romano transfer roundup: João Pedro, Álvarez, Gordon — FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/05/fabrizio-romano-transfer-news-joao-pedro-meeting-alvarez-refusal-gordon-interest-steps-up)\n\n---\n\n**📝 注記**: 元の指示が「Fabrizio Romanoが Here」で途切れていたため、3〜4項目目のセクション仕様（おそらく「噂段階」「W杯関連」など）を再送いただければ、当該パートを追記します。";
document.getElementById('content').innerHTML = marked.parse(md);

</script>
