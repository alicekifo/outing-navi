const md = "情報そろった。出力する。\n\n---\n\n# サッカー移籍情報まとめ\n更新日：2026-05-30\n\n\u003e 通常期（WC_MODE=false）。プレミアは6/15開店だけど、もう各クラブ動き出してる。Bundesliga・Ligue 1は7/1から。今は事前合意フェーズ。\n\n---\n\n## 1. 完了した移籍（直近7日間・公式合意ベース）\n\n### ① Anthony Gordon（Newcastle → Barcelona）\n- **移籍金**：固定€70M（保証€80M／報道差あり）＋ボーナス€10M、計最大€90M\n- **契約**：5年契約、年俸€7M（実質倍増）\n- **背景**：Newcastleは分割払いを許容、Barçaの財政運用に配慮。ボーナスは出場連動€5M＋タイトル獲得連動€5Mに二分割\n- **狙い**：Hansiの代わりに就任予定の新監督体制で、左WGの主力に。Rashfordをスルーしてゴードン選んだのが結構話題\n- **状況**：5/28にメディカルのためバルセロナ到着、ほぼフィニッシュ\n\n### ② Valentín Barco（Strasbourg → Chelsea）\n- アルゼンチン代表LB／LWB。Maresca去ったあとのAlonso体制で初の補強\n- 夏のウィンドウ前にもう5人目補強の動き。BlueCoの仕組み（Strasbourg→Chelsea）で動かしやすい案件\n- 「Here we go」スタンプ付き、公式発表は近日\n\n### ③ Nico Paz（Como → Real Madrid 買い戻し）\n- 約€9Mのバイバック条項を発動して再獲得\n- Mourinho新体制を見越した若手保険、即戦力じゃなくロスター枠の話\n\n### ④ Sheraldo Becker（Real Sociedad → Union Berlin 完全移籍化）\n- レンタル→買い取りオプション行使で完全移籍に切り替え\n\n---\n\n## 2. Here We Go!（Fabrizio Romano確定スタンプ）\n\n### ① Andy Robertson（Liverpool → Tottenham・フリー）\n- 5/28に口頭合意。LFC契約満了に伴うフリー移籍\n- Juventus が割り込み狙ったけど本人がSpurs選択。32歳なので短期契約見込み\n- 条件は「Spursが残留すること」。De Zerbi体制の左SBを担当\n- メディカル日程調整中、近日中に正式\n\n### ② Samuel Martínez（Atlético Nacional → Liverpool）\n- コロンビアの17歳プレイメーカー、4月に17歳になったばかり\n- Robertsonの穴埋めじゃなくて将来枠。SAパイプラインの一環\n\n### ③ Filipe Luís（Flamengo監督 → AS Monaco監督）\n- 選手じゃなくて監督人事。Monacoが正式に交渉合意\n\n### ④ Marcos Orozco（Fortaleza → Manchester United）\n- ブラジル/メキシコ系若手、Sealed and signedのフェーズ\n\n### ⑤ Anthony Gordon → Barça（再掲、確定済み）\n\n---\n\n## 3. 噂・交渉中（速報ベース）\n\n| 選手 | 動き | 状況 |\n|---|---|---|\n| **Enzo Fernández**（Chelsea） | Real Madrid→Man Cityに鞍替え。MarescaがCityで再会希望 | Chelseaは£120M（$161M）要求、こじれ気味 |\n| **Julián Álvarez**（Atlético） | Barça本命、€100M初回オファー準備中。Arsenalも参戦 | Atléticoは放出に消極的、長期化の予感 |\n| **Bernardo Silva**（Man City） | Barça移籍に向けて減俸受け入れの構え | カタルーニャ行き本人ドライブ |\n| **Rúben Dias**（Man City） | Pep退任を受けて代理人に移籍先探させてる | Real Madrid・PSG関心 |\n| **Joško Gvardiol**（Man City） | Real Madrid CB補強の本命候補 | Mourinhoのリスト最上位 |\n| **Ibrahima Konaté**（Liverpool） | Real Madridと会談予定 | LFC契約交渉決裂気味 |\n| **Marc Guéhi**（Crystal Palace） | Real Madrid・Liverpool競合 | 契約満了1年前、夏が売り時 |\n\n---\n\n## 4. 監督人事（移籍と連動するから重要）\n\n- **Real Madrid**：Mourinho就任ほぼ確定（クラブ会長選後）。要求は4〜6人補強、SB・CB・CM強化希望\n- **Manchester City**：Pep退任、後任はEnzo Maresca濃厚\n- **Tottenham**：Roberto De Zerbi体制スタート、Robertsonはその初手\n- **Chelsea**：Xabi Alonso新体制、Barcoが第一弾\n- **AS Monaco**：Filipe Luís就任合意\n\n---\n\n## 5. 流れの読み\n\n\u003e Barça、Chelsea、Real Madridが動き出した時点で連鎖反応待ち。特にAlonso体制Chelseaは継続的に出してくる。Pep退任後のCityは「売る側」になるのが今夏の構造変化、Bernardo・Dias・Gvardiolあたりは本気で出る。\n\u003e \n\u003e Liverpoolは Robertson 出ていく一方で Martínez 等若手取りに行ってる。長期スパンの再構築フェーズ。\n\u003e \n\u003e 日本人選手の動きはまだ静か。Bundesligaウィンドウ7/1解禁待ち。\n\n---\n\n**情報源**：\n- [ESPN - Barcelona agree €70M for Gordon](https://www.espn.com/soccer/story/_/id/48891558/barcelona-submit-offer-newcastle-anthony-gordon)\n- [Sky Sports - Gordon medical](https://www.skysports.com/football/news/11095/13548532/anthony-gordon-transfer-news-barcelona-reach-agreement-with-newcastle-for-england-international-winger)\n- [Empire of the Kop - Romano gives Here We Go to Robertson/Spurs](https://www.empireofthekop.com/2026/05/28/romano-gives-here-we-go-to-robertson-spurs/)\n- [Football365 - Barco Here We Go](https://www.football365.com/news/chelsea-romano-here-we-go-first-signing-alonso-barco)\n- [This Is Anfield - Robertson rejects Juve](https://www.thisisanfield.com/2026/05/andy-robertson-transfer-spurs-agreement-juventus-rejected-2026/)\n- [Football-espana - Mourinho\u0027s transfer document](https://www.football-espana.net/2026/05/26/jose-mourinho-sends-real-madrid-document-of-4-6-transfers-wanted-this-summer)\n- [SI - Five transfer sagas summer 2026](https://www.si.com/soccer/five-transfer-sagas-watch-this-summer-2026)\n- [Premier League - Summer 2026 window](https://www.premierleague.com/en/transfers/2026-27/summer)\n\n---\n\nこれ、ナレッジに保存する？`personal/サッカー/移籍_2026夏.md` あたりに置いとくと、ウィンドウ開けてから差分追っていけるけど。";
