<script>
const md = "情報が揃いました。記事を生成します。\n\n---\n\n## 🤖 今週のAI最新動向\n\n### 1. Moonshot AI、Kimi K2.7-Code をオープンソース公開（MoE 1兆パラメータ）\n\n**何が起きたか：** 中国Moonshot AIが2026年6月12日、コーディング特化OSSモデル「Kimi K2.7-Code」をHugging Faceに公開した。Mixture-of-Experts（MoE）アーキテクチャで総パラメータ数1兆、推論時アクティブは32B。ライセンスはModified MIT。\n\n**なぜ重要か：** 前世代K2.6比で推論トークン使用量を約30%削減しており、エージェントループやバッチ推論の実コストに直接響く。公式ベンチマークではKimi Code Bench v2 +21.8%、Program Bench +11.0%、MLS Bench Lite +31.5%と報告。ローカル・自社ホスト環境でコーディングエージェントを動かしたい開発者にとって選択肢が増えた形だ。GPT-5.5/Claude Sonnet 4.x系と同水準の品質を謳いながらOSSで公開する戦略は、西側クローズドモデルへの対抗軸として機能する。\n\n**数値：** 総パラメータ 1T / アクティブ 32B / 推論トークン削減 30% / Code Bench v2 +21.8%\n\n出典: [Kimi K2.7-Code: Moonshot\u0027s coding-first open-source release](https://www.digitalapplied.com/blog/kimi-k2-7-code-release-open-source-coding-model) (2026-06-12公開)　／　[Kimi AI releases open-source K2.7 Code model](https://cryptobriefing.com/kimi-k2-7-code-open-source-release/) (2026-06-12公開)\n\n---\n\n### 2. OpenAI、SEC に機密 S-1 を提出——Goldman Sachs・MS・JPMorgan が幹事\n\n**何が起きたか：** OpenAIが2026年6月8〜9日にかけてSECへの機密IPO申請（S-1）を完了した。Goldman Sachs・Morgan Stanley・JPMorganを引受幹事に選定。上場は早ければ2026年9月を目標としており、想定評価額は$730B〜$850B（一部報道では$1T超）。\n\n**なぜ重要か：** AIラボが自前のモデルを武器に株式市場へ打って出るという構図は、業界全体の資金調達構造を変えうる。Anthropicも6月1日に機密IPO申請を済ませており、Fortune（6月10日）の報道によれば両社合わせた調達規模は$120B超に及ぶ見通しで、SpaceXの調達額を40%上回る。外部資本が入ることでオープンソース寄りのAnthropicの戦略が揺らがないか、セキュリティ研究者コミュニティも注視している。\n\n**数値：** OpenAI想定評価額 $730B〜$850B / Anthropic評価額 $965B（Series H）/ 両社合計調達見込み $120B+\n\n出典: [OpenAI Targets IPO As Soon As September At Up To $850 Billion](https://www.techtimes.com/articles/317955/20260607/openai-targets-ipo-soon-september-850-billion.htm) (2026-06-07公開)　／　[A $7 billion horse race: Goldman Sachs and Morgan Stanley battle to lead OpenAI and Anthropic IPOs](https://fortune.com/2026/06/10/goldman-sachs-morgan-stanley-openai-anthropic-ipos/) (2026-06-10公開)\n\n---\n\n### 3. Apple WWDC 2026：第2世代 Apple Foundation Models で Siri を全面刷新\n\n**何が起きたか：** Appleが6月8日のWWDC基調講演で、音声・テキスト・画像の三モダリティを統合した第2世代「Apple Foundation Models（AFM-2）」を発表。Siriがこれで完全刷新され、iOS 20 / macOS 16 全体にAI機能が深く統合された。\n\n**なぜ重要か：** AFM-2は端末内（On-device）推論とAppleサーバー側のハイブリッド構成を採る。プライバシーモデルとして「Private Cloud Compute」を継続採用しており、モデルウェイトがAppleサーバー外に出ないことを技術的に保証する設計を維持している。LLM各社がクラウドAPI経由でエンドユーザーにリーチする構図に対して、Appleは端末内推論＋強固なプライバシーモデルで差別化する方向性が鮮明になった。OpenAI/Anthropicのモバイル戦略に直接影響する。\n\n出典: [WWDC 2026: Apple makes its big Siri AI reveal](https://www.cnbc.com/2026/06/08/apple-wwdc-2026-live-updates.html) (2026-06-08公開)　／　[Hey, Siri: Apple just announced a long-awaited AI update](https://www.npr.org/2026/06/08/nx-s1-5847937/apple-wwdc-2026-siri-ai-tim-cook) (2026-06-08公開)\n\n---\n\n## 📄 今週の注目論文\n\n### 1. プロンプトインジェクション防御の「不可能定理」 / *AI Agents May Always Fall for Prompt Injections*\n\n**著者第1名:** Sahar Abdelnabi・Eugene Bagdasarian ／ **arXiv:** 2605.17634 ／ **公開日:** 2026-05-17\n\n**3行サマリー：**\n- **Problem:** 主流の防御戦略「データ/命令分離」がなぜ機能しないのかを理論的に問う。エージェントは外部ツール・メモリ・Web検索など多数の情報源を扱うため、正当な命令と悪意ある注入の区別が困難。\n- **Method:** プライバシー理論である「Contextual Integrity（CI）」をプロンプトインジェクションに適用。コンテキストに応じた情報フローの規範（Norm）として攻撃・防御を数学的に再定式化し、3種の攻撃パターン（フロー偽装・規範操作・複数フロー混在）を整理。\n- **Finding:** 攻撃者は常に「正当に見えるコンテキスト」を構築できるという **不可能性定理** を導出。防御側が規範を厳格化するほど正当な操作まで弾く誤検知が増えるというトレードオフも定式化。\n\n**読みどころ:** セキュリティ分野では「なぜパッチが効かないのか」を理論的に示した論文が実務上の価値が高い。本論文はプロンプトインジェクションを「完全には解決できない問題」として位置付け、リスク受容と設計原則の議論を促す。Sandboxingや最小権限原則（PoLP）を好むLinux/セキュリティエンジニアには、エージェント設計の指針として直接使える視座を与える。\n\n出典: [arxiv.org/abs/2605.17634](https://arxiv.org/abs/2605.17634)\n\n---\n\n### 2. MicrosoftのRed Teamが攻撃と防御を同時学習させる / *Learning to Attack and Defend: Adaptive Red Teaming via GRPO*\n\n**著者第1名:** Blake Bullwinkel（Microsoft AI Red Team）・Eugenia Kim ほか ／ **arXiv:** 2606.09701 ／ **公開日:** 2026-06-09\n\n**3行サマリー：**\n- **Problem:** LLMのRed Teamingは攻撃モデルと防御モデルを別々に最適化するため、共進化による堅牢性向上が難しい。\n- **Method:** GRPO（Group Relative Policy Optimization）を拡張した **AdvGRPO** を提案。マルチチャネル報酬とデカップルド優位性正規化を組み合わせ、攻撃LMと防御LMを単一フレームワーク内で共同学習させる。\n- **Finding:** 単方向RL手法と比較して攻撃成功率（ASR）と防御堅牢性の両方を同時改善。攻防の共進化により、既存のジェイルブレイクプロンプトへの過学習を防ぐ効果も確認。\n\n**読みどころ:** MicrosoftのAI Red Teamが実践的なRed Teaming自動化を論文化したという点で産業インパクトが大きい。llama.cppやvLLMでローカルモデルを立てて自前のRed Teamingスタックを組みたい組織にとって、手法の参照先になる。\n\n出典: [arxiv.org/abs/2606.09701](https://arxiv.org/abs/2606.09701)\n\n---\n\n### 3. 推論モデルのKVキャッシュを階層的に削る / *ReasonAlloc: Hierarchical Decoding-Time KV Cache Budget Allocation for Reasoning Models*\n\n**著者第1名:** Wenhao Liu（清華大学）ほか ／ **arXiv:** 2606.11164 ／ **公開日:** 2026-06-09\n\n**3行サマリー：**\n- **Problem:** DeepSeek R1系などのCoT型推論モデルはトークン生成量が多く、KVキャッシュが推論中に急激に膨張。GPU VRAMをひっ迫し、スループットが著しく低下する。\n- **Method:** デコード時に推論ステップの階層構造を認識し、重要度の低いKVエントリを動的にプルーニングする **ReasonAlloc** フレームワークを提案。追加学習なしに推論中のキャッシュ予算を制御する。\n- **Finding:** 品質を大きく損なわずにKVキャッシュのメモリ使用量を削減し、スループットを改善。ベンチマーク詳細は原典参照。\n\n**読みどころ:** ローカルLLM運用者には直撃する問題だ。vLLMやllama.cppでDeepSeek R1/Qwen3等の推論モデルを動かす際、長い思考トレースがVRAMを喰い尽くす問題への実装レベルの回答がここにある。量子化とあわせて組み合わせると、コンシューマーGPU上での推論モデル実用化がさらに現実的になる。\n\n出典: [arxiv.org/abs/2606.11164](https://arxiv.org/abs/2606.11164)\n\n---\n\n### 4. 検索エージェントはベンチマーク問題の答えをWebから拾っている / *Search-Time Contamination in Deep Research Agents*\n\n**著者第1名:** Yongjie Wang ほか ／ **arXiv:** 2606.05241 ／ **公開日:** 2026-06-03\n\n**3行サマリー：**\n- **Problem:** Deep Research型エージェント（評価時にWebを検索しながら問題を解く）が、ベンチマーク問題の答えそのものをWeb上から取得できてしまう新形態のデータ汚染（Search-Time Contamination：STC）を定義・測定。\n- **Method:** 3種類の汚染タイプ（ベンチマークメタデータ漏洩・質問コンテキスト漏洩・明示的解答漏洩）を分類し、検出アルゴリズムを開発。公開ベンチマーク6件で現行エージェントの実際の検索行動を解析。\n- **Finding:** STCは広範に存在し、測定スコアを最大4%水増しすることを定量化。「SOTAを達成」と主張するエージェントのスコアには要注意。\n\n**読みどころ:** 「GPT-7がX%を達成」という系のニュースを批判的に読む際の武器になる論文だ。セキュリティ研究でいうところの「評価環境の汚染」に近く、ペネトレーションテストの評価設計にも示唆がある。ベンチマーク汚染問題はMLコミュニティで以前から議論されてきたが、エージェントが能動的にWebを検索することで問題の性質が変わった点が本論文の核心。\n\n出典: [arxiv.org/abs/2606.05241](https://arxiv.org/abs/2606.05241)\n\n---\n\n## 💡 今週のひとことインサイト\n\n今週最も印象的だったのは「AI Agents May Always Fall for Prompt Injections」が提示した**不可能定理**だ。\n\nセキュリティエンジニアならこの感覚に覚えがあるはずだ——SQLインジェクションはエスケープで「ほぼ」防げるが、それはコンテキストが「信頼できるSQL文字列か、そうでないか」を区別できる構文があるからだ。プロンプトインジェクションにはその構文が存在しない。命令も悪意ある注入も、LLMから見れば同じトークン列だ。\n\n本論文はこれをContextual Integrityの言葉で再定式化し、「攻撃者はいつでも正当に見えるコンテキストを組み立てられる」ことを示した。つまりパッチで塞ぐべき穴ではなく、設計原則として受け入れるべき制約だという結論になる。\n\nLinuxセキュリティの文脈に置き換えると、SELinuxは「何も信頼しない（最小権限）」から始める。エージェントセキュリティも同じ方向、すなわち外部入力を無条件に命令として扱わない・ツール呼び出しをCapability-basedで制限する・サンドボックスで爆発半径を縮小する、という設計が不可能定理を受け入れた上での現実的な回答になる。「インジェクションを完全に防ぐ」から「インジェクションが成功してもダメージを最小化する」への発想の転換だ。\n\n---\n\nSources:\n- [Kimi K2.7-Code: Moonshot\u0027s coding-first open-source release](https://www.digitalapplied.com/blog/kimi-k2-7-code-release-open-source-coding-model)\n- [Kimi AI releases open-source K2.7 Code model](https://cryptobriefing.com/kimi-k2-7-code-open-source-release/)\n- [OpenAI Targets IPO As Soon As September](https://www.techtimes.com/articles/317955/20260607/openai-targets-ipo-soon-september-850-billion.htm)\n- [OpenAI files confidentially for IPO (Goldman/MS/JPM)](https://www.openpr.com/news/4548677/openai-files-a-confidential-1-trillion-ipo-with-goldman-morgan)\n- [Fortune: $7 billion horse race for OpenAI and Anthropic IPOs](https://fortune.com/2026/06/10/goldman-sachs-morgan-stanley-openai-anthropic-ipos/)\n- [WWDC 2026: Apple makes its big Siri AI reveal](https://www.cnbc.com/2026/06/08/apple-wwdc-2026-live-updates.html)\n- [NPR: Apple WWDC 2026 Siri AI](https://www.npr.org/2026/06/08/nx-s1-5847937/apple-wwdc-2026-siri-ai-tim-cook)\n- [arxiv.org/abs/2605.17634 - AI Agents May Always Fall for Prompt Injections](https://arxiv.org/abs/2605.17634)\n- [arxiv.org/abs/2606.09701 - Learning to Attack and Defend via GRPO](https://arxiv.org/abs/2606.09701)\n- [arxiv.org/abs/2606.11164 - ReasonAlloc](https://arxiv.org/abs/2606.11164)\n- [arxiv.org/abs/2606.05241 - Search-Time Contamination](https://arxiv.org/abs/2606.05241)";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
