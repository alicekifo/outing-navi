<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEXUS</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
/* ── Dark theme (default) ── */
:root{
  --bg:#000000;
  --g1:#111114;
  --surface:#1c1c1e;
  --surface2:#2c2c2e;
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.18);
  --yellow:#ffd60a;
  --purple:#bf5af2;
  --blue:#0a84ff;
  --green:#30d158;
  --red:#ff453a;
  --pink:#ff375f;
  --orange:#ff9f0a;
  --teal:#5ac8fa;
  --text:#ffffff;
  --text2:rgba(235,235,245,0.6);
  --text3:rgba(235,235,245,0.3);
  --r:16px;
  --card-shadow:none;
  --seg-on-shadow:none;
  --ico-opacity:0.16;
}

/* ── Light theme ── */
html.light{
  --bg:#f5f5f7;
  --g1:#ffffff;
  --surface:#f2f2f2;
  --surface2:#e5e5ea;
  --border:rgba(0,0,0,0.08);
  --border2:rgba(0,0,0,0.16);
  --yellow:#c68400;
  --purple:#9d35e0;
  --blue:#0066cc;
  --green:#1a8a3a;
  --red:#d70015;
  --pink:#d9004a;
  --orange:#c85800;
  --teal:#0076a8;
  --text:#1d1d1f;
  --text2:rgba(60,60,67,0.6);
  --text3:rgba(60,60,67,0.36);
  --card-shadow:0 1px 4px rgba(0,0,0,0.07);
  --seg-on-shadow:0 1px 3px rgba(0,0,0,0.13);
}

/* icon bg tints — slightly stronger in light mode */
html.light .card.accent-yellow .card-ico{background:rgba(198,132,0,0.12);}
html.light .card.accent-purple  .card-ico{background:rgba(157,53,224,0.12);}
html.light .card.accent-blue    .card-ico{background:rgba(0,102,204,0.12);}
html.light .card.accent-green   .card-ico{background:rgba(26,138,58,0.12);}
html.light .card.accent-red     .card-ico{background:rgba(215,0,21,0.12);}
html.light .card.accent-pink    .card-ico{background:rgba(217,0,74,0.12);}
html.light .card.accent-orange  .card-ico{background:rgba(200,88,0,0.12);}
html.light .card.accent-teal    .card-ico{background:rgba(0,118,168,0.12);}

html.light .badge-daily      {background:rgba(198,132,0,0.12);    color:var(--yellow);}
html.light .badge-app        {background:rgba(0,102,204,0.12);    color:var(--blue);}
html.light .badge-smoke      {background:rgba(215,0,21,0.12);     color:var(--red);}
html.light .badge-exhibition {background:rgba(217,0,74,0.12);     color:var(--pink);}
html.light .badge-weekly     {background:rgba(200,88,0,0.12);     color:var(--orange);}
html.light .badge-ent        {background:rgba(26,138,58,0.12);    color:var(--green);}
html.light .badge-life       {background:rgba(0,118,168,0.12);    color:var(--teal);}

html.light .mtgl-btn.on{box-shadow:var(--seg-on-shadow);}
html.light .smoke-sheet{background:#ffffff;}
html.light .smoke-btn{background:var(--surface);}

/* ── Base ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,'Noto Sans JP',sans-serif;}
body{padding:20px 16px 72px;}
.page{max-width:600px;margin:0 auto;}

/* header */
.hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;padding-top:8px;}
.hd-title{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;letter-spacing:-1.5px;color:var(--text);}
.hd-sub{font-size:12px;color:var(--text2);margin-top:3px;letter-spacing:.3px;}
.hd-date{font-size:11px;color:var(--text3);margin-top:3px;}
.hd-right{display:flex;align-items:flex-start;gap:8px;padding-top:4px;}
.theme-btn{background:var(--surface);border:1px solid var(--border2);border-radius:20px;font-size:14px;padding:7px 10px;cursor:pointer;line-height:1;transition:.2s;}
.theme-btn:active{opacity:.65;}
.edit-btn{background:var(--surface);border:1px solid var(--border2);border-radius:20px;color:var(--text2);font-size:12px;font-weight:600;padding:7px 14px;cursor:pointer;font-family:-apple-system,'Noto Sans JP',sans-serif;transition:.2s;white-space:nowrap;}
.edit-btn.active{background:var(--yellow);color:#000;border-color:var(--yellow);}

/* model toggle — Apple segmented control */
.model-toggle{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
.model-lbl{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase;}
.mtgl-seg{background:var(--surface);border-radius:10px;padding:3px;display:inline-flex;gap:2px;}
.mtgl-btn{font-size:12px;font-weight:600;padding:6px 18px;border-radius:8px;background:transparent;border:none;color:var(--text2);cursor:pointer;font-family:-apple-system,'Noto Sans JP',sans-serif;transition:.15s;}
.mtgl-btn.on{background:var(--surface2);color:var(--text);}

/* section label */
.sec-label{font-size:10px;font-weight:700;letter-spacing:2.5px;color:var(--text3);margin-bottom:10px;margin-top:4px;text-transform:uppercase;}

/* cards */
.cards-wrap{display:grid;gap:8px;margin-bottom:28px;}
.card{background:var(--g1);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-decoration:none;display:flex;gap:14px;align-items:center;transition:opacity .15s;cursor:pointer;position:relative;overflow:hidden;box-shadow:var(--card-shadow);}
.card:active{opacity:.65;}

/* per-accent icon backgrounds (dark mode values) */
.card-ico{font-size:22px;flex-shrink:0;width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
.card.accent-yellow .card-ico{background:rgba(255,214,10,0.16);}
.card.accent-purple  .card-ico{background:rgba(191,90,242,0.16);}
.card.accent-blue    .card-ico{background:rgba(10,132,255,0.16);}
.card.accent-green   .card-ico{background:rgba(48,209,88,0.16);}
.card.accent-red     .card-ico{background:rgba(255,69,58,0.16);}
.card.accent-pink    .card-ico{background:rgba(255,55,95,0.16);}
.card.accent-orange  .card-ico{background:rgba(255,159,10,0.16);}
.card.accent-teal    .card-ico{background:rgba(90,200,250,0.16);}

.card-body{flex:1;min-width:0;}
.card-title{font-size:15px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.card-desc{font-size:13px;color:var(--text2);line-height:1.65;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word;overflow-wrap:break-word;}

/* badges */
.card-badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;margin-top:7px;}
.badge-daily      {background:rgba(255,214,10,0.15);   color:var(--yellow);}
.badge-app        {background:rgba(10,132,255,0.15);   color:var(--blue);}
.badge-smoke      {background:rgba(255,69,58,0.15);    color:var(--red);}
.badge-exhibition {background:rgba(255,55,95,0.15);    color:var(--pink);}
.badge-weekly     {background:rgba(255,159,10,0.15);   color:var(--orange);}
.badge-ent        {background:rgba(48,209,88,0.15);    color:var(--green);}
.badge-life       {background:rgba(90,200,250,0.15);   color:var(--teal);}

/* hidden card */
.card.card-hidden{opacity:.3;}

/* edit mode */
.card-edit-bar{display:none;position:absolute;top:0;right:0;bottom:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);align-items:center;gap:4px;padding:0 10px;border-radius:0 var(--r) var(--r) 0;}
.edit-mode .card-edit-bar{display:flex;}
.edit-mode .card:active{opacity:1;}
.edt-btn{background:var(--surface);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:14px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.edt-btn:active{background:var(--surface2);}
.edt-btn.vis-on{color:var(--green);}
.edt-btn.vis-off{color:var(--red);}

/* footer */
.footer{text-align:center;font-size:11px;color:var(--text3);margin-top:12px;}

/* smoking sheet */
.smoke-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:flex-end;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.smoke-overlay.open{display:flex;}
.smoke-sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 48px;width:100%;max-width:600px;margin:0 auto;}
.smoke-sheet-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:16px;text-align:center;}
.smoke-btn{display:flex;align-items:center;gap:14px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:16px;text-decoration:none;margin-bottom:10px;cursor:pointer;}
.smoke-btn:active{opacity:.65;}
.smoke-btn-ico{font-size:26px;width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.smoke-btn-label{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;}
.smoke-btn-sub{font-size:11px;color:var(--text2);}
.smoke-cancel{width:100%;margin-top:6px;padding:15px;background:var(--surface2);border:none;border-radius:14px;color:var(--text2);font-family:-apple-system,'Noto Sans JP',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>
<div class="page">
  <div class="hd">
    <div class="hd-left">
      <div class="hd-title">NEXUS</div>
      <div class="hd-sub">News &middot; Apps &middot; Culture</div>
      <div class="hd-date" id="hd-date"></div>
    </div>
    <div class="hd-right">
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">&#x2600;&#xFE0F;</button>
      <button class="edit-btn" id="edit-btn" onclick="toggleEdit()">&#x270F; 編集</button>
    </div>
  </div>
  <div class="model-toggle">
    <span class="model-lbl">MODEL</span>
    <div class="mtgl-seg">
      <button class="mtgl-btn on" id="tbtn-s" onclick="setModel('sonnet')">Sonnet</button>
      <button class="mtgl-btn" id="tbtn-o" onclick="setModel('opus')">Opus</button>
    </div>
  </div>
  <div id="cards-root"></div>
  <div class="footer">毎日自動更新 &mdash; Powered by Claude</div>
</div>

<!-- smoking sheet -->
<div class="smoke-overlay" id="smoke-overlay" onclick="closeSmokingSheet(event)">
  <div class="smoke-sheet">
    <div class="smoke-sheet-title" id="smoke-sheet-title">&#x1F4CD; 現在地を取得中…</div>
    <a class="smoke-btn" id="smoke-gmaps-btn" href="#" target="_blank" style="border-left:3px solid #0a84ff;">
      <div class="smoke-btn-ico" style="background:rgba(10,132,255,0.16);">&#x1F5FA;&#xFE0F;</div>
      <div><div class="smoke-btn-label">Google Maps で探す</div><div class="smoke-btn-sub">現在地周辺を地図表示</div></div>
    </a>
    <a class="smoke-btn" href="https://www.enmaru.jp/" target="_blank" style="border-left:3px solid #ff453a;">
      <div class="smoke-btn-ico" style="background:rgba(255,69,58,0.16);">&#x1F6AC;</div>
      <div><div class="smoke-btn-label">えんまる で探す</div><div class="smoke-btn-sub">喫煙所専門サイト</div></div>
    </a>
    <button class="smoke-cancel" onclick="closeSmokingSheet()">閉じる</button>
  </div>
</div>

<script>
// ── Card definitions ──────────────────────────────────────────
const CARD_DEFS = [
  { id:'exhibition', section:'EXHIBITION', icon:'&#x1F5BC;&#xFE0F;', title:'美術展・特別展', desc:'関東・関西の展覧会情報、チケット発売リマインダー付き', badge:'毎週月更新', badgeCls:'badge-exhibition', href:'./exhibition.html', accent:'accent-pink' },
  { id:'gourmet',    section:'DAILY NEWS', icon:'&#x1F374;', title:'話題グルメ',    desc:'バズり食べも・新規オープン・ミシュラン・期間限定', badge:'毎週金更新', badgeCls:'badge-weekly', href:'./gourmet.html', accent:'accent-orange' },
  { id:'ai_news',    section:'DAILY NEWS', icon:'&#x1F9E0;', title:'AIニュース・論文', desc:'AI動向・認知科学・行動経済学・心理学 の注目論文を毎日生成', badge:'毎日更新', badgeCls:'badge-daily', href:'./ai_news.html', accent:'accent-purple' },
  { id:'soccer',     section:'DAILY NEWS', icon:'&#x26BD;',  title:'サッカー移籍情報', desc:'海外サッカーの最新移籍・Here We Go・日本人選手動向', badge:'毎日更新', badgeCls:'badge-daily', href:'./soccer.html', accent:'accent-yellow' },
  { id:'entertainment', section:'WEEKLY',   icon:'&#x1F3AC;', title:'エンタメ週報',    desc:'映画公開・ゲーム新作・アニメ・ストリーミング新着を毎週まとめ', badge:'毎週土更新', badgeCls:'badge-ent',  href:'./entertainment.html', accent:'accent-green' },
  { id:'lifestyle',    section:'WEEKLY',   icon:'&#x1F377;', title:'ライフスタイル週報', desc:'ワイン・日本酒・ガジェット・テックニュース', badge:'毎週日更新', badgeCls:'badge-life', href:'./lifestyle.html',     accent:'accent-teal' },
  { id:'nogizaka', section:'FOLLOW', icon:'&#x1F3A4;', title:'乃木坂46',             desc:'メンバー動向・リリース情報・ライブ・個別活動まとめ', badge:'毎週土更新', badgeCls:'badge-ent',     href:'./nogizaka.html', accent:'accent-pink' },
  { id:'manu',     section:'FOLLOW', icon:'&#x1F534;', title:'Manchester United',  desc:'試合結果・移籍情報・戦術・選手動向（英語名併記）',     badge:'毎日更新', badgeCls:'badge-daily',  href:'./manu.html',     accent:'accent-red' },
  { id:'giants',   section:'FOLLOW', icon:'&#x26BE;',  title:'読売ジャイアンツ',    desc:'試合結果・選手成績・移籍・順位情報',                   badge:'毎日更新', badgeCls:'badge-daily',  href:'./giants.html',   accent:'accent-orange' },
  { id:'outing',     section:'APP',        icon:'&#x1F5FA;', title:'おでかけナビ', desc:'辺りのお店・イベント検索、行った場所の記録・AIおすすめ', badge:'GPS・記録・AI', badgeCls:'badge-app', href:'./outing-app.html', accent:'accent-blue' },
  { id:'smoking',    section:'APP',        icon:'&#x1F6AC;', title:'辺りの喫煙所',  desc:'タップして現在地周辺の喫煙所を探す', badge:'クイック検索', badgeCls:'badge-smoke', onclick:'openSmokingFinder()', accent:'accent-red' },
  { id:'exchange',   section:'APP',        icon:'&#x1F4B1;', title:'為替レート',    desc:'USD・EUR・GBP・CNY・KRW の対円レートをリアルタイム表示', badge:'リアルタイム', badgeCls:'badge-app', href:'./exchange.html',    accent:'accent-blue' },
  { id:'trains',     section:'APP',        icon:'&#x1F686;', title:'電車遅延チェック', desc:'よく使う路線の運行状況をすばやく確認', badge:'運行情報', badgeCls:'badge-app', href:'./trains.html',      accent:'accent-blue' },
  { id:'drink_memo', section:'APP',        icon:'&#x1F377;', title:'飲み物メモ',    desc:'ワイン・日本酒の記録。品名・評価・メモを手軽に保存', badge:'ローカル保存', badgeCls:'badge-life', href:'./drink_memo.html',  accent:'accent-teal' },
  { id:'quick_memo', section:'APP',        icon:'&#x1F4DD;', title:'クイックメモ',  desc:'Vault用Markdownをすばやく作成してクリップボードにコピー', badge:'クリップボード', badgeCls:'badge-ent', href:'./quick_memo.html',  accent:'accent-green' },
];

const PREF_KEY   = 'nexus_prefs';
const THEME_KEY  = 'nexus_theme';

function loadPrefs() {
  try { return JSON.parse(localStorage.getItem(PREF_KEY)) || []; } catch { return []; }
}
function savePrefs(prefs) { localStorage.setItem(PREF_KEY, JSON.stringify(prefs)); }
function getOrderedCards() {
  const prefs = loadPrefs();
  return CARD_DEFS.map(c => {
    const p = prefs.find(x => x.id === c.id) || { order: CARD_DEFS.indexOf(c), visible: true };
    return { ...c, order: p.order, visible: p.visible };
  }).sort((a, b) => a.order - b.order);
}
function setPref(id, key, val) {
  const prefs = loadPrefs();
  const idx = prefs.findIndex(x => x.id === id);
  if (idx >= 0) prefs[idx][key] = val;
  else prefs.push({ id, order: CARD_DEFS.findIndex(c=>c.id===id), visible: true, [key]: val });
  savePrefs(prefs);
}

// ── Theme ─────────────────────────────────────────────────────
let themeMode = localStorage.getItem(THEME_KEY) || 'dark';
function applyTheme() {
  document.documentElement.classList.toggle('light', themeMode === 'light');
  document.getElementById('theme-btn').textContent = themeMode === 'light' ? '🌙' : '☀️';
}
function toggleTheme() {
  themeMode = themeMode === 'dark' ? 'light' : 'dark';
  localStorage.setItem(THEME_KEY, themeMode);
  applyTheme();
}

// ── Render ────────────────────────────────────────────────────
const NEWS_IDS = ['exhibition','gourmet','ai_news','soccer','entertainment','lifestyle'];
let modelMode = localStorage.getItem('nexus_model') || 'sonnet';
let editMode = false;

function render() {
  const root = document.getElementById('cards-root');
  root.className = editMode ? 'edit-mode' : '';
  const cards = getOrderedCards();
  let html = '';
  let lastSection = null;
  cards.forEach((c, idx) => {
    if (c.section !== lastSection) {
      if (lastSection !== null) html += '</div>';
      html += `<div class="sec-label">${c.section}</div><div class="cards-wrap">`;
      lastSection = c.section;
    }
    const hiddenCls = c.visible ? '' : ' card-hidden';
    const tag = c.href ? 'a' : 'div';
    const resolvedHref = c.href && NEWS_IDS.includes(c.id) && modelMode === 'opus'
      ? c.href.replace('.html', '_opus.html') : c.href;
    const hrefAttr = resolvedHref ? `href="${resolvedHref}"` : '';
    const onclickAttr = c.onclick ? `onclick="${c.onclick}"` : '';
    html += `<${tag} class="card ${c.accent}${hiddenCls}" ${hrefAttr} ${onclickAttr}>
      <div class="card-ico">${c.icon}</div>
      <div class="card-body">
        <div class="card-title">${c.title}</div>
        <div class="card-desc">${c.desc}</div>
        <span class="card-badge ${c.badgeCls}">${c.badge}</span>
      </div>
      <div class="card-edit-bar">
        <button class="edt-btn" onclick="event.preventDefault();moveCard('${c.id}',-1)" title="上へ">&#x25B2;</button>
        <button class="edt-btn" onclick="event.preventDefault();moveCard('${c.id}',1)" title="下へ">&#x25BC;</button>
        <button class="edt-btn ${c.visible?'vis-on':'vis-off'}" onclick="event.preventDefault();toggleVisible('${c.id}')" title="${c.visible?'非表示':'表示'}">
          ${c.visible ? '&#x1F441;' : '&#x1F648;'}
        </button>
      </div>
    </${tag}>`;
  });
  if (lastSection !== null) html += '</div>';
  root.innerHTML = html;
}

function toggleEdit() {
  editMode = !editMode;
  const btn = document.getElementById('edit-btn');
  btn.textContent = editMode ? '✓ 完了' : '✏ 編集';
  btn.classList.toggle('active', editMode);
  render();
}

function moveCard(id, dir) {
  const cards = getOrderedCards();
  const idx = cards.findIndex(c => c.id === id);
  const sameSection = cards.filter(c => c.section === cards[idx].section);
  const secIdx = sameSection.findIndex(c => c.id === id);
  const target = sameSection[secIdx + dir];
  if (!target) return;
  const prefs = loadPrefs();
  const aOrder = cards[idx].order;
  const bOrder = target.order;
  function upsert(xid, val) {
    const i = prefs.findIndex(x => x.id === xid);
    if (i >= 0) prefs[i].order = val;
    else prefs.push({ id: xid, order: val, visible: true });
  }
  upsert(id, bOrder);
  upsert(target.id, aOrder);
  savePrefs(prefs);
  render();
}

function toggleVisible(id) {
  const cards = getOrderedCards();
  const c = cards.find(x => x.id === id);
  setPref(id, 'visible', !c.visible);
  render();
}

function setModel(m) {
  modelMode = m;
  localStorage.setItem('nexus_model', m);
  document.getElementById('tbtn-s').classList.toggle('on', m === 'sonnet');
  document.getElementById('tbtn-o').classList.toggle('on', m === 'opus');
  render();
}

// ── Smoking sheet ─────────────────────────────────────────────
function openSmokingFinder() {
  if (editMode) return;
  const overlay = document.getElementById('smoke-overlay');
  const title = document.getElementById('smoke-sheet-title');
  const gmapsBtn = document.getElementById('smoke-gmaps-btn');
  gmapsBtn.href = 'https://www.google.com/maps/search/%E5%96%AB%E7%85%99%E6%89%80/';
  title.textContent = '📍 現在地を取得中…';
  overlay.classList.add('open');
  if (!navigator.geolocation) { title.textContent = '🚨 GPS非対応'; return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);
      gmapsBtn.href = 'https://www.google.com/maps/search/%E5%96%AB%E7%85%99%E6%89%80/@' + lat + ',' + lng + ',17z';
      title.textContent = '📍 現在地周辺の喫煙所';
    },
    () => { title.textContent = 'ℹ️ GPS取得失敗 — 地図から検索できます'; }
  );
}
function closeSmokingSheet(e) {
  if (e && e.target !== document.getElementById('smoke-overlay')) return;
  document.getElementById('smoke-overlay').classList.remove('open');
}

// ── Init ──────────────────────────────────────────────────────
const d = new Date();
const w = ['日','月','火','水','木','金','土'];
document.getElementById('hd-date').textContent =
  d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' (' + w[d.getDay()] + ')';

document.getElementById('tbtn-s').classList.toggle('on', modelMode === 'sonnet');
document.getElementById('tbtn-o').classList.toggle('on', modelMode === 'opus');
applyTheme();
render();
</script>
</body>
</html>
