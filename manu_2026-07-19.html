<script>
const md = "# マンチェスター・ユナイテッド情報週報（2026-07-19）\n\n\u003e **今週のTLDR**: プレシーズン初戦は**レクサムに0-1敗戦**（ヘルシンキ・Sam Smith 39分）——カリック（Michael Carrick）正式体制の初陣は前半4-2-3-1で、サントス（Andrey Santos）がデビュー。採点トップはマウント（Mason Mount）8.5、ジルクゼー（Joshua Zirkzee）は2と明暗。移籍はコネ（Manu Koné）への**正式オファーがW杯決着後・数日内に提出見込み**（本人は今朝JST6:00の3位決定戦に出場予定）。女子のマラール（Melvine Malard）はチェルシーへクラブ記録£850kで確定間近。次戦はローゼンボリ戦（7/24トロンハイム）。\n\n---\n\n## ⚽ 直近の試合結果\n\n### 親善試合: マンチェスター・ユナイテッド 0-1 レクサム（現地7/18・JST 7/19 0:00・ヘルシンキ・オリンピックスタジアム＝中立）\n\n- **得点**: 39分 スミス（Sam Smith／レクサム）——オブライエン（Lewis O\u0027Brien）の低いクロスがマグワイア（Harry Maguire）の股を抜け、ファーで無マークのスミスが押し込む\n- **ユナイテッド前半スタメン（4-2-3-1）**: ヒートン（Tom Heaton）；ヨロ（Leny Yoro／右SB起用）、マグワイア（主将）、ヘヴン（Ayden Heaven）、ショー（Luke Shaw）；サントス（Andrey Santos）、J・フレッチャー（Jack Fletcher）；ムベウモ（Bryan Mbeumo）、マウント（Mason Mount）、ドルグ（Patrick Dorgu）；ジルクゼー（Joshua Zirkzee）。**ハーフタイムに総入れ替え**（後半はヴィテク（Radek Vitek）ら若手中心）\n- **スタッツ**: シュート数はユナイテッド5-3レクサム、枠内2-2。ゴール前の見せ場自体が少ない試合（※xGは当号生成時点で未公表）\n- **個人評価（The Peoples Person採点）**: 前半ベストは**マウント8.5**（技術で別格）、サントス7（守備位置取りとファーストタッチのパスが堅実）、ヨロ7（本職外の右SBで健闘）。ワーストは**ジルクゼー2**。後半は**ヴィテク8**（65分にスーパーセーブ）と**レイシー（Shea Lacey）8**（「小柄だが潜在能力は巨大」）が光る\n- 敗因の構図: レクサムはプレシーズン開始が早く仕上がりで先行——連携面の差がそのまま出た。ユナイテッドは若手が後半ポゼッションで持ち直すも無得点\n- カリックの試合後コメント: ※当号生成時点（試合終了約1時間後）で公式未公開。次号で拾う\n\n\u003e source: [FotMob - 試合レポート](https://www.fotmob.com/news/1l9y9v4lqs0f91a9el3yplt75u-manchester-united-0-1-wrexham-smith-deals-carricks-side-loss-pre-season-opener) (2026-07-18) / [Wrexham AFC公式 - Report](https://www.wrexhamafc.co.uk/news/2026/july/18/report---manchester-united-vs-wrexham-afc/) (2026-07-18) / [The Peoples Person - 選手採点](https://thepeoplesperson.com/2026/07/18/man-united-wrexham-player-ratings-from-helsinki-pre-season-clash-312888/) (2026-07-18) / [Yahoo Sports - 確定スタメン](https://sports.yahoo.com/articles/confirmed-man-united-xi-vs-141000897.html) (2026-07-18)\n\n### 補足（FIFAワールドカップ2026・ユナイテッド勢の残り日程）\n\n- **3位決定戦 フランス×イングランド: 本日JST 7/19（日）6:00**（マイアミ）——イングランドにマイヌー（Kobbie Mainoo）、ラッシュフォード（Marcus Rashford）。フランスには獲得ターゲットのコネ（Manu Koné）（既報どおり事実上の品定めマッチ）。結果は次号\n- **決勝 スペイン×アルゼンチン: JST 7/20（月）4:00**（MetLifeスタジアム）。マルティネス（Lisandro Martínez）がW杯制覇に挑む\n\n\u003e source: [World Soccer Talk - 3位決定戦詳細](https://worldsoccertalk.com/world-cup/france-vs-england-date-kick-off-time-and-venue-for-the-2026-fifa-world-cup-third-place-match/) (既報・2026-07-18時点)\n\n---\n\n## 🔄 移籍・選手動向\n\n### 確定（IN）\n\n| 選手 | 前所属 | 条件 | 日付 | 信頼度 |\n|---|---|---|---|---|\n| ティーレマンス（Youri Tielemans）MF | アストン・ヴィラ | 解除条項£35m・5年契約 | 7/14公式（既報） | ◎ 公式 |\n| サントス（Andrey Santos）MF | チェルシー | 総額£50m規模（£48m＋ボーナス£2m報道）＋セルオン10% | 7/13完了（既報）・**7/18レクサム戦でデビュー** | ◎ 公式 |\n| ダーロウ（Karl Darlow）GK | リーズ | フリー・2028年まで | 7/14公式（既報） | ◎ 公式 |\n\n- 今週の新規\"Here We Go\"はなし（Romano確認済みは上記既報3件のみ）\n\n\u003e source: [The Peoples Person - Tielemans \"Here we go\"](https://thepeoplesperson.com/2026/07/13/here-we-go-man-united-reach-full-agreement-to-sign-youri-tielemans-312640/) (2026-07-13) / [caughtoffside - Darlow \"Here we go\"](https://www.caughtoffside.com/2026/07/09/karl-darlow-manchester-united-transfer-romano/) (2026-07-09)\n\n### 確定間近（OUT）\n\n- **マラール（Melvine Malard）FW（女子）→ チェルシー** ○: クラブ記録の**£850k＋アドオンで合意・メディカル段階**（BBCのKinsella・Sanders両記者、ESPNも確認）。新契約提示を辞退し残り1年での移籍。リヨン時代の恩師ボンパストール（Sonia Bompastor）と再会、チェルシーの今夏3人目の補強となる見込み。**公式発表は当号時点で未確認**（前号から進展なし＝発表待ち）\n\n\u003e source: [Goal - クラブ記録での売却合意](https://www.goal.com/en-us/lists/man-utd-record-sale-melvine-malard-france-international-red-devils-wsl-chelsea/blte806af7a4c517524) (2026-07-15) / [ESPN - Chelsea near signing](https://www.espn.com/soccer/story/_/id/49374872/chelsea-signing-melvine-malard-man-united-sources) (2026-07-16)\n\n### 交渉中\n\n- **コネ（Manu Koné／ローマMF）＝W杯決着後に正式オファー提出見込み** ○: 代理人と接触済み・本人の反応もポジティブ（既報）。ローマの評価額**€55m〜60m**。関心はユナイテッド・リヴァプール・アーセナル・チェルシーの4クラブに拡大と報じられるが、**交渉進度はユナイテッドが最前列**。ローマのガスペリーニ（Gian Piero Gasperini）新監督も去就に言及＝クラブ側も売却が視野。本人は今朝の3位決定戦に出場予定で、動くのはW杯完全決着後\n- **ガルナチョ（Alejandro Garnacho／チェルシーFW）→ ローマが正式入札** ○: **ローン料€5m＋買い取りオプション€35m〜40m**（条件次第で義務化）の提案。Romanoいわくチェルシーは「良い条件なら放出可」、アロンソ（Xabi Alonso）監督も残留に否定的。**ユナイテッドは昨夏の売却時に10%セルオン条項を保持**しており、成立なら£4m前後が転がり込む＝コネ資金の足しになる構図\n- **ラッシュフォード（Marcus Rashford）**: フェネルバフチェ話のRomano否定（7/16・既報）から変化なし。W杯後にプレシーズン合流予定\n\n### ケガ・離脱\n\n- **セスコ（Benjamin Šeško）FW**: すね負傷の回復途上でレクサム戦遠征外（既報どおり欠場を確認）\n- **デ・リフト（Matthijs de Ligt）／ウガルテ（Manuel Ugarte）**: 長期離脱継続（ウガルテはACL）\n- **ダーロウ（Karl Darlow）GK**: 処置からの回復中で遠征外（既報）。レクサム戦のGKはヒートン→後半ヴィテク\n\n\u003e source: [Yahoo Sports - United to lodge Koné bid](https://sports.yahoo.com/articles/manchester-united-lodge-manu-kon-091000544.html) (2026-07-17) / [united in focus - 4クラブが照会](https://www.unitedinfocus.com/transfer-news/man-utd-are-one-of-four-premier-league-clubs-to-have-made-enquiries-about-roma-ace-manu-kone/) (2026-07-17) / [The Peoples Person - ローマがガルナチョ入札](https://thepeoplesperson.com/2026/07/14/alejandro-garnacho-roma-submit-opening-offer-for-ex-united-ace-312701/) (2026-07-14) / [football365 - Romano「ガルナチョ放出可」](https://www.football365.com/news/fabrizio-romano-confirms-man-utd-good-news-chelsea-star-alejandro-garnacho-can-leave) (2026-07-16)\n\n---\n\n## 🧠 戦術・チーム状況\n\n### カリック体制の初実戦＝前半は4-2-3-1を採用\n\n- アモリム（Rúben Amorim）前体制の3-4-2-1から**4バックへの移行が実戦で初確認**——前号時点でSports Moleが予想した通りの形。ダブルボランチはサントス＋J・フレッチャー、トップ下マウント\n- 起用実験が2つ: **ヨロの右SB**（採点7と及第点だが本職CB）、**ドルグの左サイドハーフ**（窮屈で採点4——採点者は「将来はより深い位置」と示唆）\n- 45分総入れ替え方式でアカデミー組をまとめてテスト。後半の方がポゼッションは安定し、ヴィテク・レイシー・ゴア（Dan Gore）・カマソン（Jaydan Kamason）が高評価＝若手の序列争いが早速動き始めた\n- 課題は最前線: ジルクゼー採点2・ムベウモ5と、W杯組（クーニャ（Matheus Cunha）ら）不在の攻撃陣は迫力不足。シュート5本無得点\n- 直近5試合のxG等: ※該当なし（プレシーズン1試合目のため）\n\n\u003e source: [The Peoples Person - 選手採点](https://thepeoplesperson.com/2026/07/18/man-united-wrexham-player-ratings-from-helsinki-pre-season-clash-312888/) (2026-07-18) / [FotMob - 試合レポート](https://www.fotmob.com/news/1l9y9v4lqs0f91a9el3yplt75u-manchester-united-0-1-wrexham-smith-deals-carricks-side-loss-pre-season-opener) (2026-07-18)\n\n---\n\n## 📅 今後の試合予定（プレシーズン・欧州ツアー）\n\n| 日付（現地） | 対戦相手 | 会場 | 大会 |\n|---|---|---|---|\n| **7/24（金）** | ローゼンボリ | トロンハイム（ノルウェー） | 親善試合 |\n| 8/1（土） | アトレティコ・マドリー | ストックホルム（スウェーデン） | 親善試合 |\n| 8/8（土） | パリ・サンジェルマン | ヨーテボリ（スウェーデン） | 親善試合 |\n\n- 以降: 8/12リーズ（ダブリン・クローク・パーク）、8/15ミラン（ヴロツワフ）。プレミア開幕は**8/22**。全試合MUTV中継（※各試合のキックオフ時刻・JST換算は公式未確認のため次号以降で確定）\n- **見どころ（ローゼンボリ戦）**: W杯組はまだ不在の公算が大きく、レクサム戦の反省（前線の得点力・4バックの連係）を若手中心編成でどこまで修正できるか。ヴィテクとレイシーの継続アピールにも注目\n\n\u003e source: [manutd.com - プレシーズン全日程ガイド](https://www.manutd.com/en/news/game-by-game-united-pre-season-fixture-list-2026) (2026-07時点) / [Sports Illustrated - Preseason 2026](https://www.si.com/soccer/manchester-united-preseason-2026-tour-dates-fixtures-tickets-how-to-watch) (2026-07時点)\n\n---\n\n## 🏟️ クラブ情報\n\n### 新スタジアム計画＝立地確定・「オールド・トラフォード北西350m」に10万人収容\n\n- 7/9にクラブが詳細を発表: **現スタジアムの北西約350mに10万席**——完成すればウェンブリーを超える英国最大。設計はフォスター（Norman Foster）卿、建設費約**£20億**、**2030-31シーズン完成目標**\n- スタジアム地区全体で**雇用4.8万人・住宅1.5万戸・年間£73億の経済効果**を試算\n- 用地は6月にBlackstone傘下Indurentから大部分を取得済み（金額非公表）。再開発を監督する市長開発公社の議長にコー（Sebastian Coe）卿が就任しており、ラトクリフ（Sir Jim Ratcliffe）体制への政治的追い風も\n- 財務面: INEOSは売上£200m上積みを目標とする商業展開を並行して推進との報道\n\n\u003e source: [US News (AP) - 新スタジアム最新計画](https://www.usnews.com/news/sports/articles/2026-07-09/man-united-reveals-latest-plans-for-new-stadium-to-replace-old-trafford) (2026-07-09) / [manutd.com - 用地確保](https://www.manutd.com/en/news/united-secures-land-for-new-old-trafford-stadium) (2026-06) / [Yahoo Sports - INEOS £200m目標](https://sports.yahoo.com/articles/ineos-set-200m-man-united-120000738.html) (2026-07)\n\n---\n\n## 📰 The Athletic ピックアップ\n\n※当号はtheathletic.comの直接検索が結果を返さず、他媒体経由で確認できたThe Athletic発の報道2件を紹介（リンクは引用元）\n\n1. **Ornstein「コネは市場の好機」**（7/15頃）: ローマの財政事情から「ユナイテッド含む各クラブにとってgreat market opportunity」と分析。第3のMF獲得は既定路線で、W杯での「excellent」なパフォーマンスにも言及 — [caughtoffside経由](https://www.caughtoffside.com/2026/07/15/manu-kone-united-transfer-ornstein/) (2026-07-15)\n2. **Whitwell「プレミアム・ミッドフィルダー」構想**（7/14頃）: サントス＋ティーレマンスの£85mに続く3人目は「premium midfielder」で中盤改造を完成させる設計。候補はコネ／バレバ（Carlos Baleba）／チュアメニ（Aurélien Tchouameni）——前号のOrnstein「somebody with legs」路線と整合 — [TeamTalk経由](https://www.teamtalk.com/manchester-united/man-utd-transfer-news-aurelien-tchouameni-carlos-baeba-kone-david-ornstein) (2026-07-14)";
