<script>
const md = "# マンチェスター・ユナイテッド情報週報\n**発行日: 2026年7月12日（日）**\n\n## クラブ概況\n\n| 項目 | 情報 |\n|---|---|\n| 監督 | カリック（Michael Carrick）（契約 〜2028年） |\n| 2025/26シーズン最終順位 | プレミアリーグ 3位・勝点71（CL出場権確保） |\n| 現在のステータス | オフシーズン（W杯準々決勝進行中・非代表組は7/9からキャリントンで始動済み） |\n\n---\n\n## ⚽ 直近の試合結果\n\n**※該当なし**（7/5〜7/12にユナイテッドの公式戦・親善試合なし。プレシーズン初戦は7月18日（現地）のレクサム戦）\n\n\u003e source: [manutd.com プレシーズン日程](https://www.manutd.com/en/news/detail/game-by-game-united-pre-season-fixture-list-2026) (2026-07)\n\n---\n\n## 🔄 移籍・選手動向\n\n### ✅ アンドレイ・サントス（Andrey Santos）— 獲得完了・背番号17 ｜ 信頼度: ◎\n\n- **元クラブ:** チェルシー ／ **ポジション:** セントラルMF ／ ブラジル代表・22歳\n- **移籍金:** £48m＋アドオン£2m＝総額£50m（チェルシーに10%セルオン条項） ／ **契約:** 2031年6月まで＋1年オプション\n- 7月10日（金）にカリック監督と面会のうえ契約署名。Romanoは「メディカルは完璧・100%完了」と最終確認。7月11日に**背番号17**が確定し、移籍手続きはすべて完了\n- カゼミーロ（Casemiro）退団で薄くなった中盤再建の推進型ピース\n\n\u003e source: [The Peoples Person（背番号確定）](https://thepeoplesperson.com/2026/07/11/andrey-santos-manchester-united-kit-number-confirmed-312584/) (2026-07-11) / [The Peoples Person（カリック面会）](https://thepeoplesperson.com/2026/07/10/andrey-santos-meets-michael-carrick-ahead-of-official-announcement-312557/) (2026-07-10) / [ESPN](https://www.espn.com/soccer/story/_/id/49307337/man-united-agree-50m-deal-sign-chelsea-midfielder-andrey-santos-sources) (2026-07)\n\n### ✅ ダーロウ（Karl Darlow）— 加入完了（フリー移籍） ｜ 信頼度: ◎\n\n- **元クラブ:** リーズ（6月末契約満了・移籍金ゼロ） ／ **ポジション:** GK・35歳\n- 7月10日（金）に契約署名。正GKラメンス（Senne Lammens）の控えで、ホームグロウン枠を埋められる経験者という編成判断\n- これに伴いバユンドゥル（Altay Bayındır）は退団見込み（ベシクタシュが有力と報道・信頼度△）\n\n\u003e source: [GiveMeSport（Romano・署名当日）](https://www.givemesport.com/man-utd-karl-darlow-contract-signed-today-transfer-complete/) (2026-07-10) / [The Peoples Person](https://thepeoplesperson.com/2026/07/10/andrey-santos-karl-darlow-set-to-sign-their-united-contracts-on-friday-312527/) (2026-07-10)\n\n### ❌ エデルソン（Ederson）— 破談確定。メディカル精査の末ユナイテッドが撤退 ｜ 信頼度: ◎（破談自体が確定情報）\n\n- アタランタと合意済みだった€40.5m＋ボーナス€4.5m（≒£38m）の移籍は**不成立**。数日にわたる追加メディカル検査の末、ユナイテッドが7月10日にアタランタへ「取引中止」を正式通告したとRomanoが確認\n- アタランタ側は「選手は100%フィット」と反発しており、判断根拠の詳細は非公表\n- 昨年6月上旬の合意から1か月越しの決着。中盤再建は「アンカー型＋推進型」の2枚構想だったため、**アンカー型の穴が未充足のまま残った**\n\n\u003e source: [FootballTransfers（Romano・7/11）](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/07/fabrizio-romano-transfer-news-ederson-adeyemi-garnacho) (2026-07-11) / [101 Great Goals](https://www.101greatgoals.com/football/premier-league/manchester-united-transfer-collapses-over-medical-concerns/) (2026-07) / [SPORTbible](https://www.sportbible.com/football/football-news/man-utd/edersons-transfer-to-man-utd-has-collapsed-as-details-emerge-575790-20260710) (2026-07-10)\n\n### 🔄 破談後のアンカー候補 — コネ（Manu Koné）へ打診 ｜ 信頼度: △\n\n- ローマの仏代表MF（25歳・W杯4試合先発）に**打診を実施**とBen Jacobs。段階: 照会のみ・本格交渉なし\n- 参考: 7月3日時点でRomanoはチュアメニ（Aurélien Tchouaméni・レアル）とアレックス・スコット（Alex Scott・ボーンマス）を「素晴らしい選択肢」と名指し。ただし前者はレアルの放出許可なし、後者はボーンマスが£80m級評価で拒否姿勢＋新契約提示予定と、いずれもハードル高\n\n\u003e source: [Football365（Koné打診）](https://www.football365.com/news/man-utd-manu-kone-fabrizio-romano-hints-agreed-ederson-signing-off) (2026-07-09) / [TEAMtalk（Romano・2候補）](https://www.teamtalk.com/manchester-united/fabrizio-romano-names-fantastic-two-midfielders-man-utd-trying-sign-next) (2026-07-03)\n\n### 🔄 ラッシュフォード（Marcus Rashford）— ユナイテッドで開幕を迎える見込み ｜ 信頼度: ○\n\n- バルセロナは買取オプション（£26m）不行使、ゴードン（Anthony Gordon）獲得へ転換。ユナイテッドは陣営と直接接触し「カリックの下へのウェルカムバック」を表明済み\n- バルサは再ローンに未練を残すが、ユナイテッドは**売却（完全移籍）のみ受け付ける**立場。現状はW杯後にキャリントン合流→プレシーズン組み込みの流れ（契約は2028年まで）\n\n\u003e source: [TEAMtalk（Romano・直接接触）](https://www.teamtalk.com/manchester-united/marcus-rashford-manchester-united-fabrizio-romano-update) (2026-06-30) / [Yahoo Sports](https://sports.yahoo.com/articles/marcus-rashford-set-start-season-010000404.html) (2026-07)\n\n### △ ネコ・ウィリアムズ（Neco Williams）— 関心報道 ｜ 信頼度: △\n\n- ノッティンガム・フォレストのウェールズ代表SBに、ユナイテッドとニューカッスルが関心とESPN。段階: 関心報道のみ・入札なし\n\n\u003e source: [ESPN](https://www.espn.com/soccer/story/_/id/49322102/transfer-rumors-news-man-united-newcastle-eye-nottingham-forest-neco-williams) (2026-07-11)\n\n### 🏥 ケガ・W杯参加組の状況\n\n- **メイヌー（Kobbie Mainoo）**: イングランド代表・準々決勝ノルウェー戦が**JST本日7/12（日）6:00キックオフ**（マイアミ・本稿生成時点で未消化）\n- **マルティネス（Lisandro Martínez）**: アルゼンチン代表・準々決勝スイス戦が**JST本日7/12（日）10:00キックオフ**（カンザスシティ）。両試合の勝者同士がJST 7/16（木）4:00の準決勝（アトランタ）で対戦\n- W杯離脱済みの所属選手（ウガルテ〈Manuel Ugarte〉、アマド〈Amad Diallo〉、バユンドゥル等）は最低4週間の休養後に順次合流予定\n- 新規の負傷報道: ※該当なし\n\n\u003e source: [SI（QF会場・キックオフ時刻）](https://www.si.com/soccer/2026-world-cup-quarterfinal-semifinal-locations-stadiums-schedule-kickoff-times) (2026-07) / [englandfootball.com](https://www.englandfootball.com/articles/2026/Jul/06/england-fixture-details-knockout-stage-20260706) (2026-07-06)\n\n---\n\n## 🧠 戦術・チーム状況\n\n- **中盤再建は「半分完了・半分振り出し」**。推進型のサントスは確保した一方、アンカー型のエデルソンが土壇場で破談し、カゼミーロ退団の穴のうち底盤の1枚が未充足。コネ照会など市場再スキャンが始まっており、今週の補強方針の最大論点\n- カリック体制の基本形は**4-2-3-1**。ダブルボランチにサントス＋（新アンカーor メイヌー）を組み込む設計で、シェシュコ（Benjamin Šeško）を最前線の基準点とする形は継続見込み\n- GK序列は正ラメンス＋控えダーロウで確定（オナナ〈André Onana〉はトラブゾンスポルへ再ローン済み・7/2公式発表）\n- プレシーズン運用: 7/9〜は非代表組でフィジカル・基本システムを構築し、W杯組を段階的に合流させる方針\n- ※オフシーズンのため直近試合のxG等の実測データはなし\n\n\u003e source: [Sky Sports（中盤再建検証）](https://www.skysports.com/football/news/11096/13561668/man-utd-transfer-news-is-the-old-trafford-midfield-rebuild-going-to-plan-as-michael-carricks-side-prepare-for-2026-27) (2026-07) / [Back to Carrington（4-2-3-1分析）](https://www.backtocarrington.com/p/michael-carrick-man-united-tactics) (2026)\n\n---\n\n## 📅 今後の試合予定\n\n| 日程（JST） | 大会 | 相手 | 会場 |\n|---|---|---|---|\n| 7月19日（日）0:00 | プレシーズン親善 | レクサム | オリンピックスタジアム（ヘルシンキ・フィンランド） |\n| 7月25日（土）1:00 | プレシーズン親善 | ローゼンボルグ | トロンハイム（ノルウェー） |\n| 8月1日（土）22:00 | Snapdragon Cup | アトレティコ・マドリード | ストックホルム（スウェーデン） |\n\n- **見どころ:** 初戦レクサム戦はW杯組不在で若手＋新加入組のテスト機会。**サントスの合流時期（ブラジルはW杯敗退済みだが休養期間あり）とダーロウのデビュー**、序列を掴んだラメンスの継続性が焦点\n- 以降はPSG戦（8/8・ヨーテボリ）、リーズ戦（8/12・ダブリン）を経て、**プレミアリーグ開幕戦は8月22日アウェーのハル・シティ戦**\n\n\u003e source: [manutd.com プレシーズン日程](https://www.manutd.com/en/news/detail/game-by-game-united-pre-season-fixture-list-2026) (2026-07) / [SI](https://www.si.com/soccer/manchester-united-preseason-2026-tour-dates-fixtures-tickets-how-to-watch) (2026-07)\n\n---\n\n## 🏟️ クラブ情報\n\n- **新スタジアム: 建設位置の公式発表が最終フェーズへ**。新オールド・トラフォードは現スタジアムの北西約350m・収容10万人で、完成すれば英国最大（ウェンブリーの9万人超え）・欧州でもカンプ・ノウに次ぐ規模。クラブ公式サイトでも位置発表ページを公開済み\n- **手続き日程:** 7月20日のトラフォード議会承認→**7月28日〜9月22日に8週間の住民協議**（地域各所でマスタープラン展示イベント）。建設期間は約5年見込み\n- 新スタジアムは**ウォーフサイド・マスタープラン**（数千戸の住宅を含むトラフォード・ウォーフサイド一帯の再開発）の旗艦として位置づけ。INEOS／ラトクリフ卿（Sir Jim Ratcliffe）側の目標値としてマッチデー収入£200mが報じられている\n- 2026/27はCLリーグフェーズに復帰（組み合わせ抽選は8月）\n\n\u003e source: [manutd.com（位置発表・公式）](https://www.manutd.com/en/news/revealing-the-location-of-united-new-old-trafford-stadium) (2026-07) / [Sky Sports](https://www.skysports.com/football/news/11095/13561864/man-utds-new-stadium-location-for-100-000-seater-ground-revealed-as-plans-for-largest-uk-stadium-gathers-pace) (2026-07)\n\n---\n\n## 📰 The Athletic ピックアップ\n\n### 1. 「マンU、チェルシーとアンドレイ・サントス移籍で£50m合意」— David Ornstein スクープ（7月8日）\n\n- 合意条件（£48m＋£2m、10%セルオン、個人合意済み）を最初に報じた一次スクープ。今週の署名完了・背番号確定まで一貫して正確だった\n- リンク: [The Athletic - Manchester United](https://www.theathletic.com/football/manchester-united/)（本文はペイウォール内）\n\n### 2. 「ユナイテッド、控えGKにダーロウを確保へ」— Laurie Whitwell（7月9日）\n\n- Romanoの \"Here We Go\" が「story after @lauriewhitwell」とクレジットした先行報道。フリーで即戦力＋ホームグロウン枠を満たす経験者を優先した編成の内幕\n- リンク: [Romano公式X（Whitwellクレジット）](https://x.com/FabrizioRomano/status/2075264280442577334) (2026-07-09)\n\n※The Athleticのサイト直接確認は不可（クローラー遮断）のため、公開範囲＋二次報道で内容確認できた2件のみ記載（水増し回避）。エデルソン破談のThe Athletic独自記事は本稿時点で未確認\n\n---\n\n**信頼度凡例:** ◎ほぼ確実（公式・Here We Go・複数A級一致） ／ ○有力（複数A級） ／ △噂レベル（単一ソース）";

</script>
