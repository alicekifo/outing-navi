const md = "収集した情報でレポートを編集します。\n\n---\n\n## 🎬 今週の映画\n\n### Michael／マイケル\n\n- **公開日**: 2026年6月12日（金）/ 配給：キノフィルムズ / 上映時間：約148分\n- **あらすじ**: ジャクソン5として才能を発見された幼少期から、クインシー・ジョーンズとのタッグによるソロ活動の黎明期まで、マイケル・ジャクソンの栄光と葛藤を追う伝記映画。世界一のエンターテイナーへの飽くなき追求と、その舞台裏に迫る。\n- **見どころ**: 監督は『イコライザー』シリーズのアントワーン・フークア、脚本は『グラディエーター』のジョン・ローガン、製作は『ボヘミアン・ラプソディ』のグレアム・キング。主演はMJ本人の実の甥ジャファー・ジャクソン。IMAX・4DX・MX4D・ScreenX など豪華フォーマット含む全国386館公開。\n- **評価**: Rotten Tomatoes **37%**（批評家90件）※音楽体験への高評価と、伝記映画としての深掘り不足を指摘する声に二分\n- **公式サイト**: [michael-movie.jp](https://www.michael-movie.jp/)\n- **情報源**: [キノフィルムズ公式発表](https://kinofilms.jp/2025/11/13/%E3%83%9E%E3%82%A4%E3%82%B1%E3%83%AB%E3%83%BB%E3%82%B8%E3%83%A3%E3%82%AF%E3%82%BD%E3%83%B3%E3%81%AE%E4%BC%9D%E8%A8%98%E6%98%A0%E7%94%BB%E3%80%8Emichael%EF%BC%8F%E3%83%9E%E3%82%A4%E3%82%B1%E3%83%AB/) / [The River（RTスコア）](https://theriver.jp/michael-rt-score/)\n\n---\n\n### ブルーイ in シネマ みちしるべ\n\n- **公開日**: 2026年6月12日（金）順次公開 / 配給：未確認 / 上映時間：未確認\n- **あらすじ**: 引っ越しという大きな変化を前に落ち着かない日々を過ごすヒーラー一家。思い出の場所を離れる不安と向き合うブルーイの目線を通して、「変わること」と「変わらない大切なもの」を丁寧に描く感動作。\n- **見どころ**: 世界的人気のオーストラリア発アニメ「ブルーイ」初の劇場体験版。日本語版初公開エピソードや、ブリズベンの体験型テーマパーク「Bluey\u0027s World」特別映像を収録。親子連れの聖地巡りが早くも話題に。\n- **評価**: 未評価（集計サイトスコアなし）\n- **公式サイト**: [bluey.tv（日本公開告知）](https://www.bluey.tv/blog/jp-thesignincinema/)\n- **情報源**: [映画.com](https://eiga.com/movie/105665/) / [MOVIE WALKER PRESS](https://press.moviewalker.jp/mv92315/)\n\n---\n\n### 黒牢城 ★今週末公開予定（6月19日）\n\n- **公開日**: 2026年6月19日（金）/ 配給：松竹 / 上映時間：未確認\n- **あらすじ**: 第166回直木賞・第12回山田風太郎賞をW受賞した米澤穂信の同名ベストセラー歴史ミステリー小説を映画化。荒木村重が立て籠もる有岡城（別名・黒牢城）に幽閉された軍師・黒田官兵衛を巡る密室ミステリー。\n- **見どころ**: 『回路』『スパイの妻』で国際的評価を受ける黒沢清監督が、自身初の時代劇に挑む。精緻な謎解き構造と重厚な歴史描写が融合した純粋ミステリーとして期待大。\n- **評価**: 未評価（公開前）\n- **公式サイト**: [松竹公式](https://www.shochiku.co.jp/cinema/lineup/kokurojo/)\n- **情報源**: [映画.com 作品情報](https://eiga.com/movie/105427/)\n\n---\n\n## 🎮 ゲーム情報\n\n### ユーザー注目タイトル動向\n\n#### FC26 — Festival of Football 開催中（6/5〜7/24）\n\n今週の主要コンテンツ：\n\n- **Journey of Nations**：6月12日（金）よりアジア・オセアニアチャプターに移行。週替わりの国際テーマクエス r・各サービス / 地上波：日本テレビ系 毎週金曜23:00放送\n- **直近話**: 第10話「死者の書」（6/9放送）——スバルが「死者の書」を通じてメィリィの孤独な過去と凄惨な死を追体験するという衝撃展開。「重すぎる」「号泣」がSNSトレンド入り。\n- **評価**: 未集計（放送中）\n- **構成**: 全2部構成。前半「喪失篇」全11話（4〜6月）、後半「奪還篇」8話は8月12日開始予定。\n- **公式サイト**: [re-zero-anime.jp](https://re-zero-anime.jp/tv/)\n- 情報源：[eeo Media（第10話あらすじ）](https://eeo.today/media/2026/06/09/356104/) / [ABEMA配信ページ](https://abema.tv/video/title/25-139?s=25-139_s4)\n\n---\n\n### 転生したらスライムだった件 第4期\n\n- **配信**: ABEMA・TVer・各サービス / 地上波：日本テレビ系 毎週金曜23:00放送\n- **直近話**: 第11話（6/13放送予定）——「人魔共栄圏」の実現へ踏み出すテンペストに対し、リムルの台頭を危険視する勢力が動き始める政治謀略弧に突入。今後2クール連続放送の折り返し地点。\n- **評価**: 未集計（放送中）\n- **公式サイト**: [ten-sura.com](https://www.ten-sura.com/anime/tensura)\n- 情報源：[Oricon アニメ情報](https://www.oricon.co.jp/anime/663/) / [アニメイトタイムズ](https://www.animatetimes.com/tag/details.php?id=25741)\n\n---\n\n\u003e **出力前セルフチェック**\n\u003e - [x] 全項目 R1（日付）クリア：Michael・ブルーイ（6/12）、黒牢城（6/19）、FC26イベント・Minecraft（6/16）、シャドバ杯（6/13-14）、リゼロ ep.10（6/9）、転スラ ep.11（6/13）すべて ±7日以内\n\u003e - [x] 評価★は集約サイトスコアの引用のみ（Rotten Tomatoes 37% 明示）\n\u003e - [x] FC26 / Minecraft / シャドウバースは今週情報を確認\n\u003e - [x] 画像URLは掲載なし（公式サイトURLのみ記載・リンク切れリスク回避）\n\u003e - [x] 評価不明・情報不足の場合は「未評価」と明記";
