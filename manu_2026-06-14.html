<script>
const md = "十分な情報が揃いました。週報をまとめます。\n\n---\n\n# マンチェスター・ユナイテッド情報週報\n**2026年6月14日号**\n\n---\n\n## 1. クラブ概況\n\n| 項目 | 内容 |\n|------|------|\n| 監督 | マイケル・カリック（2026年5月22日 正式就任・2028年まで契約） |\n| リーグ順位 | プレミアリーグ2025-26 **3位** 終了（71ポイント、CL出場権獲得） |\n| 現在のフェーズ | 2026年夏移籍ウィンドウ開幕 ＋ FIFA ワールドカップ2026 開催中 |\n\n**注目：** ルーベン・アモリムが1月に解任された後、暫定就任したカリックが16試合で11勝3分2敗の好成績を残し、プレミアリーグ3位でのシーズン終了に貢献。クラブは5月22日に2028年までの正式契約を発表した。\n\n---\n\n## 2. 直近試合結果（直近7日以内）\n\nプレミアリーグ2025-26シーズンはすでに終了。現在はワールドカップ中断期間のため、クラブとしての公式戦は**なし**。\n\n---\n\n## 3. ワールドカップ2026 ユナイテッド選手動向\n\n今大会には**13名のユナイテッド所属選手**が参加。TODAY（6/14）時点での状況：\n\n### 本日以前に試合があった選手\n\n| 選手 | 代表 | グループ | 初戦日 | 状況 |\n|------|------|------|------|------|\n| カゼミロ | ブラジル | C組 | 6/13 vs モロッコ | 結果未確認（日本時間6/14早朝） |\n| マテウス・クーニャ | ブラジル | C組 | 6/13 vs モロッコ | 同上 |\n| ノウサイル・マズラウィ | モロッコ | C組 | 6/13 vs ブラジル | 同上 |\n\n### 今後の試合予定（直近）\n\n| 選手 | 代表 | 初戦日（現地） | 対戦相手 |\n|------|------|------|------|\n| ブルーノ・フェルナンデス | ポルトガル | 6/17 | DR コンゴ（ヒューストン） |\n| ディオゴ・ダロット | ポルトガル | 6/17 | DR コンゴ |\n| リサンドロ・マルティネス | アルゼンチン | TBD | グループ戦 |\n| マヌエル・ウガルテ | ウルグアイ | TBD | グループ戦 |\n| アマド・ディアロ | コートジボワール | TBD | グループ戦 |\n| センネ・ラメンス | ベルギー | TBD | グループ戦 |\n| アルタイ・バユンドゥル | トルコ | TBD | グループ戦 |\n\n### 選手ハイライト（大会前実績）\n- **ブルーノ・フェルナンデス**：2025-26シーズンにプレミアリーグ最多アシスト記録を更新（**21アシスト**）。FWA年間最優秀選手賞・PL最優秀選手賞をW受賞してワールドカップへ。\n\n---\n\n## 4. 移籍情報（直近14日以内の報道）\n\n### ほぼ確定\n\n| 選手 | 現所属 | 移籍方向 | 金額 | 信頼度 | 情報源 |\n|------|------|------|------|------|------|\n| エデルソン（MF, 26歳） | アタランタ | 入団 | 初期**£38m**＋アドオン£3.8m / 4年契約（+1年オプション） | S級 | Sky Sports, ESPN |\n\n\u003e カゼミロの後継者として獲得。カゼミロ本人がエデルソンへの移籍を後押しした経緯あり。カリック体制初の補強。\n\n### 交渉・関心段階（報道ベース）\n\n| 選手 | 現所属 | ポジション | 状況 | 情報源 |\n|------|------|------|------|------|\n| マテウス・フェルナンデス | ウェストハム | MF | 交渉探索中 | Sky Sports |\n| モーガン・ロジャーズ | （プレミア） | MF/FW | 関心報道 | Sky Sports |\n| アレックス・スコット | ボーンマス | MF | 長期的関心継続 | Sky Sports |\n| エリオット・アンダーソン | （プレミア） | MF | リンク報道 | Sky Sports |\n\n**補強方針：** カリック体制ではミッドフィールダーを中心に最低1名以上の追加補強を計画中。\n\n---\n\n## 5. クラブ・経営ニュース\n\n- **マイケル・カリック正式就任**（情報源：manutd.com 公式, Al Jazeera, 2026年5月22日）\n  - 2年契約（〜2028年）を締結。暫定期間中の実績が評価された。\n  - カリックはユナイテッドのアカデミー卒業生であり、ファーガソン時代の主将。\n\n- **2025夏の総投資額**：£232.4m（ブライアン・ムベウモ、マテウス・クーニャ、ベンヤミン・セスコらを獲得）\n\n- **2026-27シーズン**：チャンピオンズリーグ本戦出場が確定。\n\n---\n\n## 6. 今週のポイントまとめ\n\n1. **カリック体制が本格始動**：正式監督として初の移籍ウィンドウ。まずエデルソン獲得でボランチを補強。\n2. **13名がW杯へ**：ブラジル・ポルトガル・アルゼンチン・ウルグアイなど強豪国に選手が散らばり、怪我リスク管理が課題。\n3. **ブルーノの個人賞ラッシュ**：21アシストという圧倒的数字でW杯に臨む主将の動向に注目。\n4. **追加補強は継続中**：ミッドフィールドの薄さを補うべく、複数ターゲットと並行交渉中。\n\n---\n\n**Sources:**\n- [Man Utd appoint Michael Carrick as permanent manager - Al Jazeera](https://www.aljazeera.com/sports/2026/5/22/man-utd-appoint-michael-carrick-as-permanent-manager)\n- [Carrick continues as United head coach - manutd.com](https://www.manutd.com/en/news/michael-carrick-continues-as-man-united-head-coach-2026)\n- [Man Utd agree Ederson deal - Sky Sports](https://www.skysports.com/football/news/11095/13548678/man-utd-agree-ederson-deal-atalanta-midfielder-set-for-old-trafford-in-lb38m-transfer)\n- [Ederson close to joining Man United - ESPN](https://www.espn.com/soccer/story/_/id/48898380/ederson-close-joining-man-united-35m-move-atalanta-sources)\n- [Man Utd transfer news: exploring midfielder and forward additions - Sky Sports](https://www.skysports.com/football/news/11095/13552631/man-utd-transfer-news-red-devils-continuing-to-explore-opportunities-to-add-midfielder-and-forward-to-their-ranks)\n- [Premier League 2025-26 final table - NBC Sports](https://www.nbcsports.com/soccer/news/premier-league-2025-26-table-teams-standings-for-the-new-season)\n- [12 Manchester United stars at 2026 World Cup - Yahoo Sports](https://ca.sports.yahoo.com/news/12-manchester-united-stars-playing-173343382.html)\n- [World Cup 2026 squad numbers for 13 Man Utd players - Daily Post Nigeria](https://dailypost.ng/2026/06/03/world-cup-2026-squad-numbers-for-13-man-utd-players-confirmed/)\n- [Manchester United players at World Cup 2026 - HOOLIGAN SOCCER](https://hooligan-soccer.com/manchester-united-players-world-cup-2026/)\n- [Brazil vs Morocco - June 13 - ESPN](https://www.espn.com/soccer/match/_/gameId/760419/morocco-brazil)\n- [Portugal fixtures at 2026 World Cup - UEFA](https://www.uefa.com/european-qualifiers/news/02a6-20d15939ace8-5cc9254d0851-1000--portugal-at-the-world-cup-2026-squad-fixtures-group-and-hi/)\n- [Man United transfers: Amorim\u0027s first summer window recap - Sky Sports](https://www.skysports.com/football/news/11667/13423735/man-utd-transfer-news-a-look-into-how-the-red-devils-navigated-ruben-amorims-first-summer-window)";
