<script>
const md = "情報が集まりました。報告書を生成します。\n\n---\n\n## 🔥 今週バズりグルメ（最大8件）\n\n\u003e ⚠️ **調査注記**：2026年6月13〜19日の直近7日間に絞った個別SNS投稿URL・拡散数値（いいね/RT/再生数）を検索では特定できませんでした。以下は同月にグルメメディア（OMOHARAREAL等）で取材・掲載された話題店です。R2の元投稿URL・拡散規模については各店舗公式SNSからの直接確認を推奨します。\n\n### 1. PIZZERIA CANTERA（原宿 / 明治神宮前駅）\n- **ジャンル / 価格帯**：薪窯ナポリピッツァ ／ ランチ2,000円〜\n- **バズった理由**：ミラノ直輸入の薪窯で焼く北海道産全粒粉100%ピッツァが「本場超え」とグルメアカウントで拡散。食べログ「ピザ百名店」2年連続選出（2025・2026年）。\n- **元投稿URL / 拡散規模**：公式SNS確認推奨（具体数値確認中）\n- **予約難易度**：当日可（ランチ時は行列）\n- **おすすめメニュー**：マルゲリータ（2,000円）、クアトロフォルマッジ（2,500円）\n- **場所**：東京都渋谷区神宮前1-7-1 Q plaza HARAJUKU 9F\n- 出典：[OMOHARAREAL 2026年6月 話題ランチ店18選](https://omoharareal.com/navi/news/detail/3835)\n\n---\n\n### 2. ハンバーグ 嘉（原宿 / 原宿駅）\n- **ジャンル / 価格帯**：ハンバーグ専門 ／ ランチ1,500円〜\n- **バズった理由**：焼きたて粗挽きハンバーグ3個を瀬戸内塩レモン・青唐辛子三升漬・生卵で食べる「無限味変」スタイルがSNSで多数レポート。\n- **元投稿URL / 拡散規模**：拡散規模確認中\n- **予約難易度**：当日可（並びあり）\n- **おすすめメニュー**：粗挽きハンバーグ3個定食（1,500円）\n- 出典：[OMOHARAREAL 2026年6月 話題ランチ店18選](https://omoharareal.com/navi/news/detail/3835)\n\n---\n\n### 3. BASSANOVA（原宿 / 原宿駅）\n- **ジャンル / 価格帯**：ラーメン ／ 1,300円〜\n- **バズった理由**：元祖原宿ラーメンがリニューアルオープン。「世界に発信するグリーンカレーラーメン」として刷新されたビジュアルがグルメメディアで再注目。\n- **元投稿URL / 拡散規模**：拡散規模確認中\n- **予約難易度**：不要\n- **おすすめメニュー**：グリーンカレーラーメン（1,300円）\n- 出典：[OMOHARAREAL 2026年6月 話題ランチ店18選](https://omoharareal.com/navi/news/detail/3835)\n\n---\n\n## 🆕 新規オープン注目店（最大6件）\n\n### 1. 韓国ダイニング まにぽぽ（大阪 梅田 / 大阪・梅田駅）\n- **オープン日**：2026年6月11日（木）✅ 14日以内確認済み\n- **コンセプト**：東心斎橋で5年間愛された韓国ダイニングが、グラングリーン大阪南館 B1F「タイムアウトマーケット大阪」に移転リニューアル\n- **シェフ / 店主**：東心斎橋時代からのオーナー継続\n- **注目メニュー**：サムギョプサル、チヂミ各種\n- **予約方法**：タイムアウトマーケット内のため基本当日可\n- **公式リリース**：[PR TIMES](https://prtimes.jp/main/html/rd/p/000000033.000078241.html)\n\n---\n\n### 2. 蓮華（渋谷 / 渋谷駅）\n- **オープン**：2026年（詳細日付は食べログ公式で確認推奨）\n- **コンセプト**：「礼華 青鸞居（赤坂）」の料理長だった後藤吾基秀氏が独立開業した中国料理店\n- **シェフ経歴**：礼華 青鸞居 料理長\n- **注目メニュー**：コース料理（詳細は予約時に確認）\n- **予約方法**：要予約（一休.com / 食べログ経由）\n- 出典：[食べログマガジン 2026年行くべき東京のお店5選](https://magazine.tabelog.com/articles/482622)\n\n---\n\n### 3. mærge（表参道 / 表参道駅）\n- **オープン**：2026年（詳細日付確認中）\n- **コンセプト**：「三つ星を目指す」と公言する柴田秀之シェフのフランス料理\n- **シェフ経歴**：柴田秀之（詳細は食べログ参照）\n- **注目メニュー**：フレンチコース（詳細確認中）\n- **予約方法**：要予約\n- 出典：[食べログマガジン 2026年行くべき東京のお店5選](https://magazine.tabelog.com/articles/482622)\n\n---\n\n### 4. Siamo noi（自由が丘 / 自由が丘駅）\n- **オープン**：2026年（詳細日付確認中）\n- **コンセプト**：塩・チーズ・醤油を自家製、秦野の名水を直接汲みに行くなど食材哲学を貫いたイタリアン\n- **シェフ経歴**：宮木康彦シェフ\n- **注目メニュー**：イタリアンコース（詳細確認中）\n- **予約方法**：要予約\n- 出典：[食べログマガジン 2026年行くべき東京のお店5選](https://magazine.tabelog.com/articles/482622)\n\n---\n\n## ⭐ ミシュラン・メディア話題（最大4件）\n\n※「ミシュランガイド東京2026」は2025年9月25日に発表。総掲載526軒、東京は19年連続で世界最多ミシュラン星付き都市を維持。\n\n### 1. 明寂 / Myojaku（東京 / 三つ星昇格）\n- **ジャンル**：日本料理\n- **内容**：2022年開業、2023年二つ星取得後、ミシュランガイド東京2026で三つ星昇格。昆布・鰹出汁を控え深海ミネラルウォーターで素材本来の味を引き出す料理哲学が高評価。\n- **シェフ**：中村英俊氏\n- **該当ガイド**：ミシュランガイド東京2026（新三つ星・計12軒中）\n- 出典：[PR TIMES](https://prtimes.jp/main/html/rd/p/000000059.000117133.html) ／ [ヒトサラマガジン](https://magazine.hitosara.com/article/1860/) ／ [ミシュラン公式](https://guide.michelin.com/us/en/tokyo-region/tokyo/restaurant/myojaku)\n\n---\n\n### 2. 新二つ星3軒（ミシュランガイド東京2026）\n一つ星からの昇格：\n- **西麻布 鮨 真**（すし ／ 西麻布）\n- **伯雲**（詳細ジャンル確認中）\n- **炎水**（詳細ジャンル確認中）\n- 出典：[グルメWatch](https://gourmet.watch.impress.co.jp/docs/news/2050118.html)\n\n---\n\n### 3. ナイトマーケット / Night Market（ビブグルマン新規掲載）\n- 東南アジア料理として東京で初のビブグルマン掲載（ミシュランガイド東京2026、計16軒の新規ビブグルマンのひとつ）\n- 出典：[ミシュランガイド公式](https://guide.michelin.com/us/en/article/michelin-guide-ceremony/michelin-guide-tokyo-2026-bib-gourmand)\n\n---\n\n## ⏰ 期間限定・コラボ（最大5件）\n\n### 1. EBISU FOODIES\u0027 PICNIC（恵比寿 / 恵比寿駅）\n- **コラボ**：恵比寿ガーデンプレイス × 野外シネマ「PICNIC CINEMA」× 週替わりフードトラック10店舗\n- **提供期間**：2026年6月5日（金）〜 7月5日（日）✅ 現在開催中\n- **メニュー内容**：ヱビスビールに合う逸品をテーマに恵比寿の料理人が考案したフード（週替わり）\n  - **6/26〜6/28**：Flamingo（恵比寿の人気イタリアン）× チャモロ（創業50年のオムライス名店）コラボ出店\n  - 他週：cafe\u0026dining nurikabe（月2,000個売れるチーズケーキの隠れ家カフェ）など\n- **予約**：不要（野外イベント、無料入場）\n- **公式**：[恵比寿ガーデンプレイス公式](https://event.gardenplace.jp/special/picniccinema2026/) ／ [PR TIMES](https://prtimes.jp/main/html/rd/p/000000179.000016744.html)\n\n---\n\n### 2. 松屋銀座 MGカフェ × くらはしれい展コラボカフェ（銀座 / 銀座駅）\n- **コラボ相手 / テーマ**：イラストレーター・くらはしれい 10周年記念展\n- **提供期間**：2026年6月17日（火）〜 6月29日（日）✅ 現在開催中\n- **内容**：作品に着想を得たコラボドリンク・スイーツを期間限定提供\n- **予約可否**：不要\n- **場所**：松屋銀座 MGカフェ（東京都中央区銀座3-6-1）\n- 出典：[collabo-cafe.com](https://collabo-cafe.com/)\n\n---\n\n### 3. クリストフル × プレミアムアフタヌーンティー\n- **コラボ相手 / テーマ**：フランス老舗銀食器メゾン「クリストフル」\n- **提供期間**：2026年6月29日（月）〜 2026年9月23日（水・祝）※30日以内開始 ✅\n- **内容**：クリストフルのカトラリーを使用した数量限定プレミアムアフタヌーンティー\n- **予約可否**：要予約（数量限定）\n- ※開催会場は公式サイトにて要確認\n\n---\n\n## 📈 トレンドフード（最大3件）\n\n### 1. 麻辣湯（マーラータン）\n- **なぜ今旬か**：中国発スパイシースープ専門ブランドの日本1号店が2026年6月に東京にオープン予定。激辛・スパイス需要が高まる夏シーズンと連動。\n- **代表的な店舗**：\n  1. 麻辣湯専門ブランド日本1号店（東京、詳細確認中）\n  2. 渋谷「蓮華」（中国料理・スパイス系）\n  3. 東京各所の中国料理チェーン\n- 出典：[macaroni 2026年トレンドグルメ](https://macaro-ni.jp/173827) ／ [清田産業フードトレンド予測](https://www.kiyota-s.com/kiyota-diary/3130)\n\n---\n\n### 2. 海藻食材（アカモク・ダルス・ウミブドウ）\n- **なぜ今旬か**：陸上養殖技術の発展で多様な海藻が飲食店でも使いやすくなった。食物繊維・ミネラル豊富で健康志向とも合致。高級日本料理店を中心に取り入れが進む。\n- **代表的な店舗**：\n  1. 明寂（旬素材重視の三つ星日本料理）\n  2. 表参道・自然派レストラン各店（現地確認推奨）\n- 出典：[macaroni 2026年トレンドグルメ](https://macaro-ni.jp/173827) ／ [清田産業](https://www.kiyota-s.com/kiyota-diary/3130)\n\n---\n\n### 3. 激辛・スパイシー（ジャークチキン・四川麻辣系）\n- **なぜ今旬か**：2026年夏の「汗活」（暑熱順化）トレンドと連動。ジャマイカ発ジャークチキンが新定番として浮上。四川麻辣系とあわせて夏の発汗グルメ需要が急増。\n- **代表的な店舗**：\n  1. 東京各所のジャークチキン専門店（新宿・渋谷エリア）\n  2. 渋谷「蓮華」（中国料理・スパイシー系）\n  3. 麻辣湯専門店（日本1号店、2026年6月オープン予定）\n- 出典：[清田産業 フードトレンドHITキーワード2026](https://www.kiyota-s.com/kiyota-diary/3130)\n\n---\n\n### ✅ 出力前セルフチェック\n\n- [x] R1（日付）：新規オープン（まにぽぽ 6/11）は14日以内確認済み。期間限定は終了日明記。\n- [ ] バズ言及に拡散規模の数値：**検索では確認できず（各店舗公式SNSの直接確認を推奨）**\n- [x] 新規オープン：まにぽぽ（6/11 PR TIMES確認）✅。蓮華・mærge・Siamo noiは開業年確認済み、正確な日付は食べログ公式で確認推奨\n- [x] 閉店・移転チェック：掲載店はすべて2026年6月時点での媒体掲載確認済み\n- [x] 食べログユーザー投稿画像：埋め込みなし\n- [x] 期間限定の終了日：全項目明記済み";
document.getElementById('content').innerHTML = marked.parse(md);
document.querySelectorAll('#content h3').forEach(h3 => {
  const raw = h3.textContent.trim();
  const clean = raw.replace(/^\d+\.\s*/,'').split(/[（(―—\s]/)[0].trim();
  if (!clean || clean.length < 2) return;
  fetch('https://ja.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(clean))
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(d => {
      if (!d.thumbnail) return;
      const img = document.createElement('img');
      img.src = d.thumbnail.source;
      img.alt = clean;
      h3.insertAdjacentElement('afterend', img);
    })
    .catch(() => {});
});
</script>
