<style>
:root{--bg:#f5f5f7;--surface:#ffffff;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.16);--accent:#fb923c;--blue:#6aadff;--green:#52d68a;--text:#eeeef5;--text2:#8888a8;--r:12px;}

<script>
const md = "## 🔥 今週バズりグルメ\n\n### 小麻辣（シャオマーラー）下北沢店（東京・下北沢）\n- ジャンル：韓国発・麻辣揚げ串／カップ麻辣湯 ／ 価格帯：1本99円〜400円（税抜）\n- バズった理由：韓国で本国1号店から1年で50店舗まで急拡大した「麻辣湯の次」業態。串を特製麻辣オイルで揚げ、10種以上を配合した黄金シーズニングで仕上げる工程がTikTokで拡散\n- おすすめ：牛ミスジ串、サムギョプサル串、カップ麻辣湯\n- 予約：基本不要（テイクアウト可）\n- ソース：[しもブロ](https://www.shimokitazawa.info/news/2026/04/xiaomala-review/) / [レッツエンジョイ東京](https://www.enjoytokyo.jp/news/204824/)\n\n### ご当地マック「北海道じゃがチーズてりやき／博多明太バターてりやき」（全国マクドナルド）\n- ジャンル：ファストフード ／ 価格帯：単品500円台〜\n- バズった理由：5/20スタート初日に「聖闘士星矢」コラボパッケージ（ペガサス星矢／アンドロメダ瞬／フェニックス一輝）目当ての投稿がXで拡散。じゃがチーズの伸びる断面動画もTikTokで人気\n- 予約：不要\n- ソース：[グルメWatch](https://gourmet.watch.impress.co.jp/docs/news/2108409.html) / [マクドナルド公式](https://www.mcdonalds.co.jp/campaign/gotochi/)\n\n### MOMO Stand Tokyo 2nd（東京・大久保ほか）\n- ジャンル：ネパール料理（モモ／ダルバート） ／ 価格帯：〜1,500円\n- バズった理由：食べログマガジン「2026トレンド予想」で主役級に取り上げられ、ヘルシー志向＋彩り映えがインスタで拡散。罪悪感ゼロの満腹感がワード化\n- 予約：ピーク帯は推奨\n- ソース：[食べログマガジン](https://magazine.tabelog.com/articles/482545)\n\n### 鮨 上ル 高輪ゲートウェイ店（東京・高輪ゲートウェイ）\n- ジャンル：寿司（次世代江戸前） ／ 価格帯：おまかせ2万円台\n- バズった理由：高輪ゲートウェイシティ開業の文脈で「食べ比べ体験型寿司」として連日紹介。コース構成がツリー状になっている動画がリポストで伸びた\n- 予約：必須（OMAKASE経由）\n- ソース：[hibana](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n### L\u0027ECAILLER 8TH SEA OYSTER（東京・高輪ゲートウェイ）\n- ジャンル：シーフード／牡蠣専門 ／ 価格帯：ディナー1.5万円〜\n- バズった理由：日本全国＋世界の牡蠣を一度に味わえる「牡蠣×ガストロノミー」業態。生牡蠣20種コースの上から撮影写真がXで拡散\n- 予約：必須\n- ソース：[hibana](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n### 酒場カミナリ（東京・高円寺）\n- ジャンル：ネオ大衆酒場 ／ 価格帯：3,000円台\n- バズった理由：原価系メニュー×街と繋がるカウンター設計で、「高円寺の今夜行きたい店」系投稿が増殖\n- 予約：金土は推奨\n- ソース：[hibana](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n### 原価ビストロチーズプラス 池袋（東京・池袋）\n- ジャンル：原価ビストロ／チーズ ／ 価格帯：原価ドリンク＋セット料金制\n- バズった理由：チーズフォンデュ・ラクレットを原価で出すスタイルが「コスパ革命」としてTikTokで拡散\n- 予約：推奨\n- ソース：[hibana](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n---\n\n## 🆕 新規オープン注目店\n\n### 鴨専門店（東京・新富町）2026/5/15オープン\n- ジャンル：鴨／玉鋼鉄板焼き ／ 価格帯：コース2.5万円〜\n- 注目ポイント：希少な\"玉鋼鉄板\"で焼き上げる7席のみのカウンター。鴨の部位別熟成と火入れに特化\n- 予約：必須（完全予約制）\n- ソース：[ヒトサラマガジン](https://magazine.hitosara.com/article/1860/)\n\n### 焼肉 小伝馬町店（東京・小伝馬町）2026/5/14オープン\n- ジャンル：焼肉／銘柄牛 ／ 価格帯：1.5万〜2万円\n- 注目ポイント：希少なオリーブ牛をはじめ複数の銘柄牛を食べ比べ。常連店の移転リニューアル\n- 予約：推奨\n- ソース：[食べログマガジン](https://magazine.tabelog.com/articles/479837)\n\n### 世界最高峰パティシエのパティスリー（東京・六本木）2026/5/14オープン\n- ジャンル：パティスリー ／ 価格帯：1,000円台〜\n- 注目ポイント：「芸術のような美しさと記憶に残る味わい」をテーマにした六本木の話題店。アート系インフルエンサーが先行投稿\n- 予約：イートインは推奨\n- ソース：[食べログマガジン](https://magazine.tabelog.com/articles/479837)\n\n### 和尊（東京・代々木上原）2026/5/5オープン\n- ジャンル：日本料理／月替わり懐石 ／ 価格帯：コース1.8万円〜\n- 注目ポイント：旬を映す「前菜5種盛り合わせ」が月替わり。代々木上原の住宅街にひっそり構える隠れ家\n- 予約：必須\n- ソース：[hibana](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n### BAKED MAGIC ＆ BRULEE BAKERY（大阪）2026/5オープン\n- ジャンル：ベーカリー／ブリュレスイーツ ／ 価格帯：500円台〜\n- 注目ポイント：ブリュレ×ベーカリーの異色専門店。表面を炙る工程がショート動画向け\n- 予約：不要（テイクアウト）\n- ソース：[ホットペッパーグルメ大阪](https://www.hotpepper.jp/SA23/dncLU0065/)\n\n### AiMER（エメ）（神戸・垂水）2026/5/18グランドオープン\n- ジャンル：本格フレンチベーカリー ／ 価格帯：300〜800円\n- 注目ポイント：職人歴18年・フランス修業の作り手による珠玉のクロワッサンとバゲット。垂水の閑静なエリアにフランスの風を運ぶコンセプト\n- 予約：人気品は事前取り置き推奨\n- ソース：[神戸ニューオープン情報](https://kobe-lunchtime.com/kobe-newopen/)\n\n---\n\n## ⭐ ミシュラン・メディア話題\n\n### 明寂／Myojaku（東京・港区）— 新三つ星\n- ジャンル：日本料理 ／ 価格帯：おまかせ4万円〜 ／ シェフ：中村英利\n- トピック：2022年開業からわずか3年で三つ星到達。鰹昆布だしを多用せず、食材と海底湧水で「水の記憶」を表現する手法がインスペクター訪問記でも特筆。開業以来の最速級スピード昇格として日本料理界に衝撃\n- 予約：完全予約制（半年〜1年待ち級）\n- ソース：[ヒトサラマガジン](https://magazine.hitosara.com/article/1860/) / [ミシュラン公式](https://guide.michelin.com/us/en/article/dining-out/michelin-guide-tokyo-2026-inspector-reveal-myojaku)\n\n### 美山荘／Miyamaso（京都・花脊）— 新三つ星\n- ジャンル：日本料理／摘草料理 ／ 価格帯：宿泊込み7万円〜\n- トピック：京都・大阪エリアで6年ぶりの新三つ星。グリーンスターも維持し、サステナブル×伝統摘草料理の頂点に到達\n- 予約：宿泊と込みで数ヶ月先まで埋まる\n- ソース：[ヒトサラマガジン](https://magazine.hitosara.com/article/2181/) / [ミシュラン公式](https://news.michelin.co.jp/articles/20260423-michelin-guide-kyotoosaka-selection-release)\n\n### 西麻布 鮨真（東京・西麻布）— 新二つ星\n- ジャンル：江戸前寿司 ／ 価格帯：おまかせ3万円台\n- トピック：東京2026新二つ星3軒の中で唯一の寿司。塩〆と熟成のバランスが評価された\n- 予約：必須\n- ソース：[インシュ ジャーナル](https://www.inshokuten.com/foodist/article/8068/)\n\n### ナイトマーケット／Night Market（東京）— ビブグルマン新規\n- ジャンル：東南アジア料理 ／ 価格帯：〜3,000円\n- トピック：東京のビブグルマンに「東南アジア料理」が初登場した節目の店。屋台感のある空気と低価格で連日満席\n- 予約：推奨\n- ソース：[ミシュラン公式](https://news.michelin.co.jp/articles/20250925-michelin-guide-tokyo-2026-selection-release)\n\n---\n\n## ⏰ 期間限定・コラボ\n\n### ご当地マック 全5種（全国マクドナルド）\n- 期間：2026/5/20〜6月中旬予定\n- 内容：北海道じゃがチーズてりやき／博多明太バターてりやき／名古屋手羽先風黒胡椒ジューシーチキン／朝マック限定マフィン／シャカシャカポテト金沢黒カレー味\n- コラボ：「聖闘士星矢」数量限定パッケージ\n- ソース：[マクドナルド公式](https://www.mcdonalds.co.jp/campaign/gotochi/) / [オリコン](https://www.oricon.co.jp/news/2454406/full/)\n\n### スーパースイーツビュッフェ2026 〜いちご・抹茶・マンゴー〜（東京・赤坂見附／ニューオータニ）\n- 期間：2026/5/7〜6/30\n- 内容：いちご・抹茶・マンゴーの三本柱で構成された初開催ビュッフェ。5/29までの平日13:30/14:00枠は3万本のローズガーデン観賞付き（窓側保証8,350円）\n- 予約：必須（公式サイト）\n- ソース：[ホテルニューオータニ公式](https://www.newotani.co.jp/tokyo/restaurant/gardenlounge/ichigo-matcha-mango/)\n\n### マ・パティスリー 2026（東京・伊勢丹新宿店）\n- 期間：2026/5/26〜6/1\n- 内容：チェリーをテーマにした有名パティシエ集結の祭典。会場限定パフェ、できたてスイーツの実演販売\n- 予約：人気品は整理券配布\n- ソース：[ファッションプレス](https://www.fashion-press.net/news/137116)\n\n### Tokyo Tokyo Delicious Museum（東京・有明）\n- 期間：2026/5/15〜5/17（終了済みだが話題継続）\n- 内容：予約困難店・人気飲食店が集結する東京最大級グルメフェス。3日間で限定コラボメニューが多数登場\n- ソース：[PR TIMES](https://prtimes.jp/main/html/rd/p/000000009.000137776.html)\n\n### Tokyo Coffee Festival 2026 spring（東京・青山／国連大学中庭）\n- 期間：2026/5/2〜5/4\n- 内容：日本最大級コーヒーイベントが初の3日間開催。約40組のロースターが集結\n- 予約：入場無料\n- ソース：[OMOHARAREAL](https://omoharareal.com/navi/news/detail/4906)\n\n---\n\n## 📈 トレンドフード\n\n### ネパール料理（ダルバート＆モモ）\n- なぜ来る：食べログマガジン2026トレンド予想で「主役」と名指し。スパイスによる発汗、野菜たっぷり構成で「罪悪感ゼロの満腹感」がワード化。POKHARA、東京セクワバー、BUKI RESTAURANT、EVEREST KHAJA GHAR、SHERPA ASIAN HUB、MOMO Stand Tokyo 2nd など東京で続々増殖中\n- ソース：[食べログマガジン](https://magazine.tabelog.com/articles/482545)\n\n### 麻辣串（マーラーチャン）\n- なぜ来る：麻辣湯の次。揚げる工程の動画映え＋韓国経由の輸入トレンドで小麻辣の日本1号店（下北沢）が起点。今夏は新宿・池袋への面展開が予測される\n- ソース：[インター・ベル](https://interbelle.co.jp/media_sp/information/%E9%BA%BB%E8%BE%A3%E6%B9%AF-%E9%BA%BB%E8%BE%A3%E4%B8%B2-%E6%97%A5%E6%9C%AC%E5%88%9D%E4%B8%8A%E9%99%B8-%E4%B8%8B%E5%8C%97%E6%B2%A2-%E3%83%9E%E3%83%BC%E3%83%A9%E3%83%BC%E3%82%BF%E3%83%B3-%E5%B0%8F/)\n\n### 胡椒餅（フーショウピン）／明太フランス\n- なぜ来る：どちらも「窯で焼く／バターが溢れる」のライブ調理映え。胡椒餅は観光地での出店増、明太フランスは焼きたて販売型のショート動画が好相性。食べ歩きフードの2026年枠\n- ソース：[食べログマガジン トレンド予想](https://magazine.tabelog.com/articles/482545)";
document.getElementById('content').innerHTML = marked.parse(md);
document.querySelectorAll('#content h3').forEach(h3 => {
  const raw = h3.textContent.trim();
  const clean = raw.replace(/^\d+\.\s*/,'').split(/[・・窶補能s]/)[0].trim();
  if (!clean || clean.length < 2) return;
  fetch('https://ja.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(clean))
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(d => {
      if (!d.thumbnail) return;
      const img = document.createElement('img');
      img.src = d.thumbnail.source;
      img.alt = clean;
      h3.insertAdjacentElement('afterend', img);
    })
    .catch(() => {});
});
</script>
