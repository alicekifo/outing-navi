<script>
const md = "# 🤖 今週のAI最新動向\n\n### 1. Claude Sonnet 5登場——Opus級のエージェント性能をSonnet価格で\nAnthropicが2026-06-30、「これまでで最もエージェント的なSonnet」と位置づけるClaude Sonnet 5をリリース。7月1日からFree/Pro全ユーザーのデフォルトモデルにSonnet 4.6を置き換えた。\n\nブラウザ操作・ターミナル実行を含む多段階の自律タスクを、数か月前ならOpusクラスが必要だった水準でこなせる点が核心。価格は入力$2/出力$10（100万トークンあたり、2026-08-31までの導入価格、以降$3/$15）。安全性評価では望ましくない挙動の発生率がSonnet 4.6より低下したと報告されている。\n\n\u003e source: https://www.anthropic.com/news/claude-sonnet-5\n\n### 2. Fable 5がグローバル復旧、業界横断「ジェイルブレイク重大度フレームワーク」も提案\n米政府による2026-06-12のアクセス停止指令を経て、AnthropicはFable 5/Mythos 5を2026-06-30〜07-01に全世界で再開。同時に、サイバー関連リクエストを4分類（禁止/高リスク二用途/防御用途は許可 等）する安全分類器と、Amazon・Microsoft・Google等Glasswingパートナーと共同開発した「ジェイルブレイク重大度」採点フレームワーク（CJS-1〜4、能力獲得度・悪用容易性など4指標の合計点で分類）を公表した。\n\nAI企業間でジェイルブレイクの深刻度を共通言語で政府に説明する枠組みが初めて業界横断で提示された点が重要。各社バラバラだった脆弱性報告の粒度が揃えば、規制対話や脆弱性報奨金制度（HackerOne経由の窓口も新設）の実効性が上がる。\n\n\u003e source: https://www.anthropic.com/news/fable-safeguards-jailbreak-framework\n\n### 3. Google、Nano Banana 2 LiteとGemini Omni Flashを公開\nGoogleが2026-06-30、高速画像生成モデル「Nano Banana 2 Lite」（1,000画像あたり$0.034、生成4秒未満）と、画像を参照して動画化する「Gemini Omni Flash」（最大10秒、Google AI Studio / Gemini APIでパブリックプレビュー）を発表。\n\n画像生成→動画アニメーション化を1パイプラインで低コスト・低遅延に繋げた点が新しい。Omniファミリーのany-to-any路線の第一弾で、動画生成のコスト構造を大きく下げる可能性がある。\n\n\u003e source: https://blog.google/innovation-and-ai/models-and-research/gemini-models/gemini-omni-flash-nano-banana-2-lite/\n\n### 4. Meituanの中国製ASIC専用モデル「LongCat-2.0」が正体を現す\nMeituanが2026-06-30、1.6兆パラメータMoEモデル「LongCat-2.0」を発表。米国輸出規制対象外の国産チップのみで学習され、SWE-bench Proで59.5点、価格は100万トークン$0.038（キャッシュヒット無料）。発表以前はOpenRouter上で正体不明の「Owl Alpha」として約2か月間匿名稼働し、開発者の間でコーディング性能の高さが話題になっていた。\n\n米中のコンピュート分断下でも、国産チップのみでフロンティア級コーディングモデルを学習・低価格提供できることを実証した点が重要。\n\n\u003e source: https://www.longcatai.org/news/longcat-2\n\n### 5. EU AI Act簡素化パッケージ、理事会が最終承認\nEU理事会が2026-06-29、欧州議会の承認（06-16）に続きAI Act簡素化パッケージ（Digital Omnibus VII）に最終的な緑信号。高リスクAIシステムの適用開始が単体システムで2027-12-02、組込型で2028-08-02まで延期される一方、性的合成コンテンツ生成（ノーディファイア等）の新たな禁止行為が2026-12-02から追加される。\n\n規制の実務負担は先送りされつつ、悪質な生成AI用途への禁止は前倒しで強化される「アメとムチ」の再編。EU域内でAIシステムを展開する事業者はコンプライアンス計画の再調整が必要になる。\n\n\u003e source: https://www.consilium.europa.eu/en/press/press-releases/2026/06/29/artificial-intelligence-council-gives-final-green-light-to-simplify-and-streamline-rules/\n\n---\n\n# 📄 今週の注目論文\n\n### 1. STEER：多言語コードスイッチングで安全学習の「英語バイアス」を突く脱獄攻撃（Safety Targeted Embedding Exploit via Refinement）\nJoshua Adrian Cahyono（南洋理工大学, NTU Singapore）／arXiv:2607.01859／2026-07-02公開\n\n- **Problem**: LLMの安全学習は主に英語で行われており、低資源言語や言語混在（コードスイッチング）入力に対して安全機構が汎化するかは不明。\n- **Method**: 拒否行動に最も強く寄与する単語を勾配で特定し、それを低資源言語へ逐次翻訳して拒否を抑制しつつ有害意図を保持する攻撃STEERを提案。オープンソース8Bモデル6種で検証。\n- **Finding**: JailbreakBenchで最大93.0%、AdvBenchで96.7%の攻撃成功率を達成し、ランダムなコードスイッチングやGCGを上回った。GPT-4o-miniへの転移攻撃でも35.5%成功（標的モデルへのアクセス不要）。\n\n**読みどころ**: 安全フィルタを「既知プロトコルだけを見るファイアウォール」に例えるなら、STEERは未知言語という「未定義プロトコル」をすり抜ける攻撃。多言語対応を謳うプロダクトの安全評価が英語ベンチマークだけで済まされていないか、要チェックの一本。\n\n\u003e source: https://arxiv.org/abs/2607.01859\n\n### 2. LLMのオンライン安全監視：しきい値ベースの単純なモニターは高度な手法と同等の性能\nMona Schirmer（アムステルダム大学, Eric Nalisnick研究室と共同）／arXiv:2607.02510／2026-07-02公開\n\n- **Problem**: 安全性学習を経てもLLMは配備後（デプロイ時）に危険な出力を生成し得るため、リアルタイム監視が必要。\n- **Method**: 外部の検証シグナルをリスク制御理論に基づきしきい値化し、アラーム判定に変換するシンプルなオンラインモニターを提案。数学推論とレッドチーミングのデータセットで評価。\n- **Finding**: 逐次仮説検定など高度な手法を用いたモニターと同等の性能を、単純なしきい値方式で達成できることを示した。\n\n**読みどころ**: 「複雑な検知器＝高性能」という思い込みへの反証。IDS/WAF運用と同様、シンプルな閾値監視でも統計的保証（リスク制御）さえ設計すれば十分戦えるという実務的示唆がある。\n\n\u003e source: https://arxiv.org/abs/2607.02510\n\n### 3. アウトオブバンド型プロンプトインジェクション防御の適応的評価\nPraneeth Narisetty（LaunchSafe Research）／arXiv:2606.26479／2026-06-25公開\n\n- **Problem**: CaMeL、FIDES、Progent、RTBAS、FORGEなどモデル外部で防御するアウトオブバンド方式は静的ベンチマークでしか検証されておらず、モデル内蔵の防御が適応攻撃で軒並み破られた（12種中90%超の成功率）前例に対し、堅牢性が未検証。\n- **Method**: 古典的な完全性保護（Bibaモデル）・参照モニタ・最小権限の観点から既存防御を分類。Progent×Qwen2.5-7B×AgentDojoで独自の適応攻撃評価を実施。\n- **Finding**: Progentは攻撃成功率を25.8%→4.2%へ約6分の1に削減。決定論的なアウトオブバンド強制が、モデル内蔵の検知型防御より適応攻撃に強い可能性を示す予備的証拠を得た（ただし1データ点のみ）。\n\n**読みどころ**: エージェントのプロンプトインジェクション対策を「モデルに気合いで拒否させる」から「OS的な参照モニタで強制する」方向へ舵を切る根拠になり得る一本。ただし著者自身が「1データ点のみ」と留保している点は要注意。\n\n\u003e source: https://arxiv.org/pdf/2606.26479\n\n### 4. DiscoPER：メタ反省を組み込んだ自律的科学的発見エージェント\nBingchen Zhao（エディンバラ大学）、Sara Beery（MIT）、Oisin Mac Aodha（エディンバラ大学）／arXiv:2607.01131／2026-07-01公開\n\n- **Problem**: 研究目的を事前に定めず、データセットに対してコード生成・実行を通じて自律的に研究を進める仕組みが求められている。\n- **Method**: 各発見候補を統計的に検証しつつ、蓄積した知見を定期的に振り返り「構造的パターン・交絡・認識論的ギャップ」を特定する「二次推論（second-order reasoning）」を導入したフレームワークDiscoPERを提案。マルチモーダルツール統合にも対応。\n- **Finding**: 生態学的知識ベンチマークiNatDiscoで、既知パターン9件中8件を再発見し仮説支持率72.7%を達成。因果探索手法やLLMガイド型の比較手法を上回った。\n\n**読みどころ**: 「エージェントにコードを書かせて仮説検証させる」自動科学発見の実装例として、単発の仮説生成でなく過去の発見を定期的にメタ反省する設計が肝。エージェント設計における「振り返りループ」の効能を測る具体的な数値がある点で参考になる。\n\n\u003e source: https://arxiv.org/abs/2607.01131\n\n---\n\n# 💡 今週のひとことインサイト\n\n今週最も刺さったのはSTEER論文（STEER, arXiv:2607.01859）。LLMの安全学習を「英語という単一プロトコルしか検査しないファイアウォール」に見立てると腹落ちする。低資源言語への翻訳だけで拒否機構が93%突破されるのは、ACLやiptablesのルールが特定ポート番号にしか書かれておらず、別ポートに同じペイロードを流せば素通りする状況にそっくりだ。しかもこの攻撃はモデルへのアクセスなしにGPT-4o-miniへ転移した——脆弱性が「実装依存のバグ」ではなく「学習データのカバレッジ不足」という構造的問題である証拠でもある。セキュリティの世界で「デフォルト拒否＋既知許可リスト」が鉄則なのと同じく、LLMの安全学習も「既知言語だけ安全、未知は寛容」ではなく「未知入力はまず疑う」設計に倒すべき、という当たり前だが徹底されていない教訓を改めて突きつけられた。";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
