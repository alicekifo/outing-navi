<script>
const md = "# マンチェスター・ユナイテッド情報週報\n\n**対象期間：2026年6月9日（月）〜 6月16日（月）**\n**生成日：2026年6月16日**\n\n---\n\n## 1. クラブ最新ニュース\n\n### マイケル・カリック監督体制、初の夏市場へ\n\n5月22日に永続監督として正式就任（2年契約、2028年まで）したマイケル・カリックが、初の移籍ウィンドウに臨んでいる。1月の暫定就任以降の成績は16試合11勝3分2敗。チームをPL3位（71pt）に押し上げ、UCL出場権を確保した実績を引っ提げて、本格的なスカッド再構築に乗り出している。\n\n---\n\n## 2. 移籍情報 ⚡（6月2日〜16日の報道）\n\n### 加入\n\n| 選手 | 元クラブ | 移籍金 | 状況 | ソース |\n|------|----------|--------|------|--------|\n| **エデルソン (Ederson)** | アタランタ | €45m | ✅ 書類完了（発表は7月初旬） | Romano、ESPN |\n\n- ブラジル代表DMF（守備的MF）。4年契約＋1年オプション。\n- 6月2日に合意報道、6月6日に全契約書類が完了（Romanoが確認）。\n- 医療検査・公式発表は7月初旬予定。カリック体制下で**初の獲得選手**。\n\n**交渉中（報道段階）**\n- マテウス・フェルナンデス（ウェスト・ハム）：中盤の追加ターゲットとしてSky Sports報道\n- エリオット・アンダーソン（ニューカッスル）：Romano「交渉は非常に近い」\n\n---\n\n### 退団\n\n| 選手 | 移籍先 | 規模 | 状況 |\n|------|--------|------|------|\n| **マーカス・ラッシュフォード** | バルセロナ（永久移籍交渉） | ~€30m | 交渉継続中 |\n| **ラスムス・ホイルンド** | ナポリ（バイアウト行使交渉） | €44m | 協議中 |\n| **カゼミロ** | 未定 | — | 今夏退団予定 |\n| **マヌエル・ウガルテ** | 未定 | — | 今夏退団予定 |\n\n- ラッシュフォード＋ホイルンドの売却で**€80m以上の収益**を見込む（Romano）。\n- ラッシュフォードは現在バルセロナへローン中。W杯はイングランド代表として出場。\n\n---\n\n## 3. 2025-26 シーズン総括\n\n| 項目 | 内容 |\n|------|------|\n| PL最終順位 | **3位**（20勝7分11敗、71pt、GD+19） |\n| UCL出場権 | **確定** |\n| 今週の公式戦 | なし（PL・カップ戦は全終了） |\n\n---\n\n## 4. FIFA ワールドカップ 2026（開催中：米国・カナダ・メキシコ）\n\nユナイテッドから**12〜13選手**が9カ国代表として参加中。\n\n### 直近の試合結果（6/9〜6/16）\n\n| 試合 | 結果 | ユナイテッド選手 |\n|------|------|-----------------|\n| モロッコ vs ブラジル（6/13） | **1-1 引き分け** | マズラウイ（モロッコ）、エデルソン（ブラジル）※ |\n\n※ エデルソンの公式移籍完了前だが、ブラジル代表として参加中。\n\n### 今後の注目試合（TODAY以降）\n\n| 日程 | 試合 | ユナイテッド選手 |\n|------|------|-----------------|\n| **6/16（本日）** | アルゼンチン vs アルジェリア | **リサンドロ・マルティネス** |\n| **6/17** | ポルトガル vs コンゴ民主共和国 | **ブルーノ・フェルナンデス、ジオゴ・ダロット** |\n| **6/17** | イングランド vs クロアチア | **コビー・マイヌー、ラッシュフォード** |\n\n### 代表参加選手一覧\n\n| 選手 | 代表国 | グループ |\n|------|--------|----------|\n| ブルーノ・フェルナンデス | ポルトガル | K |\n| ジオゴ・ダロット | ポルトガル | K |\n| コビー・マイヌー | イングランド | L |\n| マーカス・ラッシュフォード | イングランド | L |\n| リサンドロ・マルティネス | アルゼンチン | — |\n| ノッサイル・マズラウイ | モロッコ | — |\n| アマド・ディアロ | コートジボワール | — |\n| エデルソン（移籍予定） | ブラジル | — |\n| ＋ トルコ、ベルギー、ウルグアイ代表の各選手 | | |\n\n---\n\n## 5. 注目選手フォーカス：ブルーノ・フェルナンデス\n\n- **2025-26 PL成績**：アシスト **21**（PL歴代アシスト記録を更新）\n- **FWA年間最優秀選手賞** 受賞\n- **PL年間最優秀選手賞** 受賞\n- ポルトガルの中心として、6/17のコンゴ民主共和国戦で今大会初陣。\n\n---\n\n## 6. 今後の展望\n\n- **7月初旬**：エデルソンの医療検査・公式発表\n- **7月以降**：ラッシュフォード・ホイルンドの売却完了次第、追加補強（中盤・前線）\n- **8月（プレシーズン）**：アトレティコ・マドリード、PSG、リーズ、ACミランとのフレンドリー予定\n- **2026-27 UCL**：グループステージから本戦出場確定\n\n---\n\n## Sources\n\n- [Man Utd transfer news: Fabrizio Romano says Ederson WILL move to Old Trafford \u0027100% confirmed\u0027](https://www.teamtalk.com/manchester-united/ederson-silva-will-join-man-utd-from-atalanta)\n- [Manchester United finalise deal to sign Ederson from Atalanta](https://thepeoplesperson.com/2026/06/06/manchester-united-finalise-deal-to-sign-ederson-from-atalanta-311151/)\n- [Man United agree deal with Atalanta for Éderson – ESPN](https://www.espn.com/soccer/story/_/id/48953983/man-united-agree-deal-atalanta-ederson-sources)\n- [Man Utd appoint Michael Carrick as permanent manager – Al Jazeera](https://www.aljazeera.com/sports/2026/5/22/man-utd-appoint-michael-carrick-as-permanent-manager)\n- [Romano: Napoli Reaches £74m Agreement With Man Utd Star Rasmus Hojlund](https://www.givemesport.com/man-utd-napoli-agreement-rasmus-hojlund-transfer/)\n- [Manchester United optimistic to raise €80m from Hojlund and Rashford exits](https://tribuna.com/en/news/2026-03-05-manchester-united-optimistic-to-raise-80m-from-hojlund-and-rashford-exits-fabrizio-romano/)\n- [Man Utd transfer news – Mateus Fernandes and winger targets](https://www.teamtalk.com/manchester-united/latest-man-utd-transfer-news-bradley-barcola-mateus-fernandes-marcus-rashford)\n- [Manchester United players at World Cup 2026 – manutd.com](https://www.manutd.com/en/news/united-at-the-2026-world-cup-when-are-the-group-games)\n- [Manchester United players at World Cup 2026 – FootballPickr](https://www.footballpickr.com/manchester-united-world-cup-2026-players)\n- [England at 2026 World Cup – ESPN](https://www.espn.com/soccer/story/_/id/48701061/england-world-cup-2026-schedule-fixtures-results-scores-group-l-how-watch-uk-news-analysis-injuries)\n- [Portugal World Cup 2026 schedule – Fox Sports](https://www.foxsports.com/stories/soccer/portugal-world-cup-2026-schedule-locations-dates-times)\n- [Premier League 2025-26 final standings – NBC Sports](https://www.nbcsports.com/premier-league-table-2025-26-season-standings)\n- [2026 FIFA World Cup fixtures and results – ESPN](https://www.espn.com/soccer/story/_/id/48939282/2026-fifa-world-cup-fixtures-results-match-schedule-group-stage-knockout-rounds-bracket)";
