n**グループA（MD3 本日開催）**\n- **メキシコ 6pts（R32進出確定）**・韓国 3pts・チェコ 3pts・南アフリカ 0pts（敗退確定）\n- ▶ 本日21:00 ET 同時開催。チェコ vs 韓国の2位争いが実質的な焦点\n\n**グループI（MD2完了）**\n- **フランス 6pts（R32進出確定）**・**ノルウェー 6pts（R32進出確定）**・セネガル 0pts・イラク 0pts\n- ▶ MD3のフランス vs ノルウェーが首位争い\n\n**グループJ（MD2完了）**\n- **アルゼンチン 6pts（R32進出確定）**・オーストリア 3pts・アルジェリア 3pts・ヨルダン 0pts（敗退確定）\n- ▶ MD3はオーストリア vs アルジェリアが2位決定戦\n\n**グループE（MD2完了）**\n- **ドイツ 6pts（R32進出確定）**・コートジボワール 3pts・エクアドル 1pt・キュラソー 1pt\n\n**グループF（MD2完了）**\n- **オランダ 4pts**・**日本 4pts**・スウェーデン 3pts・チュニジア 0pts（敗退確定）\n- ▶ MD3の日本 vs スウェーデンが2位決定戦\n\n**グループD（MD2完了）**\n- **アメリカ 6pts（R32進出確定）**・パラグアイ 3pts・オーストラリア 3pts・トルコ 0pts（敗退確定）\n\n**グループG（MD2完了）**\n- **エジプト 4pts（GD+2）**・ベルギー 2pts・イラン 2pts・ニュージーランド 1pt\n\n**グループH（MD2完了）**\n- **スペイン 4pts（GD+4）**・ウルグアイ 2pts・カーボベルデ 2pts・サウジアラビア 1pt\n\n---\n\nSources:\n- [England 0-0 Ghana - CBS Sports](https://www.cbssports.com/soccer/news/england-ghana-live-updates-world-cup-2026-score-result/live/)\n- [England 0-0 Ghana - ESPN](https://www.espn.com/soccer/match/_/gameId/760458/ghana-england)\n- [England 0-0 Ghana - Al Jazeera](https://www.aljazeera.com/sports/liveblog/2026/6/23/england-vs-ghana-live-world-cup-2026)\n- [Panama 0-1 Croatia - ESPN](https://www.espn.com/soccer/story/_/id/49157167/panama-croatia-live-world-cup-2026-latest-updates-commentary-score-result)\n- [Panama 0-1 Croatia - VAVEL](https://www.vavel.com/en-us/soccer/2026/06/23/1264177-panama-vs-croatia-live-score-2026-fifa-world-cup.html)\n- [Colombia 1-0 DR Congo - ESPN](https://www.espn.com/soccer/story/_/id/49157815/colombia-congo-dr-live-world-cup-2026-latest-updates-commentary-score-result)\n- [Colombia 1-0 DR Congo - FOX Sports](https://www.foxsports.com/soccer/fifa-world-cup-men-colombia-vs-dr-congo-jun-23-2026-game-boxscore-647663)\n- [Portugal 1-0 Uzbekistan - ESPN](https://www.espn.com/soccer/match/_/gameId/760461/uzbekistan-portugal)\n- [World Cup 2026 standings - CBS Sports](https://www.cbssports.com/soccer/news/world-cup-group-standings-table-results/)\n- [Worl
