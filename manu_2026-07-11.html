<script>
const md = "# マンチェスター・ユナイテッド情報週報\n**発行日: 2026年7月11日（土）**\n\n## クラブ概況\n\n| 項目 | 情報 |\n|---|---|\n| 監督 | カリック（Michael Carrick）（契約 〜2028年） |\n| 2025/26シーズン最終順位 | プレミアリーグ 3位・勝点71（CL出場権確保） |\n| 現在のステータス | オフシーズン（W杯開催中・非代表組は7/9からキャリントンで始動） |\n\n---\n\n## ⚽ 直近の試合結果\n\n**※該当なし**（7/4〜7/11にユナイテッドの公式戦・親善試合なし。プレシーズン初戦は7月18日のレクサム戦。W杯非参加組は7月9日にキャリントンでトレーニング開始済み）\n\n\u003e source: [manutd.com プレシーズン日程](https://www.manutd.com/en/news/detail/game-by-game-united-pre-season-fixture-list-2026) (2026-07)\n\n---\n\n## 🔄 移籍・選手動向\n\n### ✅ アンドレイ・サントス（Andrey Santos）— メディカル通過・契約署名、公式発表待ち ｜ 信頼度: ◎\n\n- **元クラブ:** チェルシー（PL） ／ **ポジション:** セントラルMF ／ ブラジル代表・22歳\n- **移籍金:** £48m＋アドオン£2m＝総額£50m（チェルシーに10%セルオン条項）\n- 7月8日にRomanoが \"Here We Go\"、7月9日にメディカル通過・クラブ間の全書類署名完了をRomanoが確認。契約は2031年6月まで＋1年オプションで、**7月10日（金）にサイン予定と報道**。残るはクラブ公式発表のみ\n- カゼミーロ（Casemiro）退団で薄くなった中盤再建の推進型ピース\n\n\u003e source: [The Peoples Person（Romano発言）](https://thepeoplesperson.com/2026/07/10/andrey-santos-chelsea-star-signs-man-united-contract-fabrizio-romano-312550/) (2026-07-10) / [Football365](https://www.football365.com/news/fabrizio-romano-reveals-man-utd-medical-passed-two-signings-confirmed) (2026-07-09) / [Sky Sports](https://www.skysports.com/football/news/11095/13561742/andrey-santos-manchester-united-agree-lb50m-deal-for-chelsea-and-brazil-midfielder) (2026-07-08)\n\n### ✅ ダーロウ（Karl Darlow）— Here We Go・7/10サイン予定 ｜ 信頼度: ◎\n\n- **元クラブ:** リーズ（6月末に契約満了・フリー移籍） ／ **ポジション:** GK・35歳\n- 7月9日にRomanoが \"Here We Go\" を明言（The AthleticのLaurie Whitwell報道の後追い確認）。**正GKラメンス（Senne Lammens）のバックアップ**として加入し、7月10日（金）に契約署名予定\n- これに伴いバユンドゥル（Altay Bayındır）は退団見込み（ベシクタシュが有力と報道）\n\n\u003e source: [Fabrizio Romano公式X](https://x.com/FabrizioRomano/status/2075264280442577334) (2026-07-09) / [Football365](https://www.football365.com/news/fabrizio-romano-confirms-new-man-utd-signing-here-we-go) (2026-07-09) / [The Peoples Person](https://thepeoplesperson.com/2026/07/10/andrey-santos-karl-darlow-set-to-sign-their-united-contracts-on-friday-312527/) (2026-07-10)\n\n### 🔄 エデルソン（Ederson）— 英国での最終メディカル判定待ち ｜ 信頼度: ◎（成立自体はほぼ確実だがメディカル条件付き）\n\n- **元クラブ:** アタランタ（セリエA） ／ **ポジション:** ボランチ（アンカー型） ／ ブラジル代表・26歳\n- **移籍金:** €45m（保証€40.5m＋ボーナス€4.5m ≒ £38m）。クラブ間・個人とも合意済み（6月上旬から）。契約は2030年まで＋1年オプション\n- W杯中に米国で1次メディカル実施→追加検査が必要と判断され、ブラジル敗退後に渡英。7月9日に検査第1弾、**7月10日（金）の最終検査結果を経てクラブが移籍実行を最終判断**する段取りと報道。本稿時点で判定結果・公式発表は未確認\n- 一部で「破談危機・代替候補コネ（Manu Koné）照会」報道が出たが、主要ソースは「合意は維持・メディカル完了待ち」で一致\n\n\u003e source: [Football Italia](https://football-italia.net/ederson-first-manchester-united-extra-medical/) (2026-07-09) / [The Peoples Person](https://thepeoplesperson.com/2026/07/09/ederson-medical-ongoing-as-announcement-details-revealed-312522/) (2026-07-09) / [Sky Sports](https://www.skysports.com/football/news/11095/13548678/man-utd-agree-ederson-deal-atalanta-midfielder-set-for-old-trafford-in-lb38m-transfer) (2026-06)\n\n### ✅ オナナ（André Onana）— トラブゾンスポルへ再ローン（公式発表済み・7/2） ｜ 信頼度: ◎\n\n- 1年ローン・買取オプションなし。ローン料£1.3m＋ボーナス最大約£1.5m、給与の大半は先方負担\n- ラメンス台頭で序列を失った形。昨季も同クラブで33試合出場・トルコ杯優勝\n\n\u003e source: [Goal](https://www.goal.com/en/lists/andre-onana-signs-man-utd-exit-paperwork-with-gbp1-3m-transfer-agreement-in-place/blt94bad9348c3494b3) (2026-07-02) / [TEAMtalk](https://www.teamtalk.com/manchester-united/fabrizio-romano-confirms-man-utd-transfer-47-2m-star-andre-onana-deal-signed) (2026-07)\n\n### 🔄 ラッシュフォード（Marcus Rashford）— バルサ買取見送り・ユナイテッドに帰還 ｜ 信頼度: ○\n\n- バルセロナは買取オプション（£26m・6月15日期限）を不行使、ローン満了で復帰。ただしバルサの関心は継続し、市場終盤の再交渉を狙う構え。ユナイテッドは**再ローン拒否・完全移籍のみ**の立場で、現状は新シーズンをユナイテッドで始める見込み\n\n\u003e source: [FOX Sports](https://www.foxsports.com/stories/soccer/marcus-rashford-has-no-future-at-man-united-as-barcelona-plan-fresh-transfer-talks-with-red-devils-before-world-cup) (2026-07) / [Barca Blaugranes](https://www.barcablaugranes.com/fc-barcelona-transfer-rumors-news/126012/marcus-rashford-set-to-start-season-with-man-utd-after-end-of-barcelona-loan) (2026-07)\n\n### △ バレバ（Carlos Baleba）— 本人は移籍希望もユナイテッドは静観 ｜ 信頼度: △\n\n- Romano曰くブライトンの同選手は「ユナイテッド行きを強く希望」しINEOSの提案を待つ状態だが、**ユナイテッド側は（エデルソン＋サントスの2枚確保で）熱が冷めた**との報道。段階: 関心報道止まり・入札なし\n\n\u003e source: [TEAMtalk（Romano経由）](https://www.teamtalk.com/manchester-united/carlos-baleba-man-utd-brighton-fabrizio-romano-latest-transfer-update) (2026-07)\n\n### 🏥 ケガ・W杯参加組の状況\n\n- **マルティネス（Lisandro Martínez）**: 2025年の膝負傷から復帰済みで、アルゼンチン代表としてW杯参加中（GS初戦アルジェリア戦で先発。チームは準々決勝スイス戦へ）\n- **メイヌー（Kobbie Mainoo）**: イングランド代表の中盤で稼働中。**準々決勝ノルウェー戦が英国時間7月11日22:00（JST 7/12 6:00）キックオフ**\n- **W杯離脱済みの所属選手**（ウガルテ〈Manuel Ugarte〉＝ウルグアイ、アマド〈Amad Diallo〉＝コートジボワール、バユンドゥル＝トルコ等）はFIFPro推奨の最低4週間休養後に順次合流予定\n- 新規の負傷報道: ※該当なし\n\n\u003e source: [manutd.com（マルティネス代表選出）](https://www.manutd.com/en/news/lisandro-martinez-included-in-argentina-squad) (2026-06) / [englandfootball.com（QF詳細）](https://www.englandfootball.com/articles/2026/Jul/06/england-fixture-details-knockout-stage-20260706) (2026-07-06) / [worldofsports.io（合流日程）](https://worldofsports.io/a/manchester-news-men/man-united-world-cup-return-dates-pre-season-fixtures-2026-1782919762) (2026-07)\n\n---\n\n## 🧠 戦術・チーム状況\n\n- **今夏の主題は中盤の総入れ替え**。カゼミーロ退団の穴に対し、アンカー型のエデルソン＋推進型のサントスの2枚看板で再構築。当初候補のエリオット・アンダーソン（Elliot Anderson→シティ）、マテウス・フェルナンデス（Mateus Fernandes→スパーズ）、チュアメニ（Aurélien Tchouaméni→レアルと契約延長）を逃した末のプランBだが、獲得実行力は先週から明確に前進（サントス署名＋ダーロウ確保）\n- カリック体制の基本形は**4-2-3-1**。ダブルボランチ（従来はメイヌーが繋ぎ役）を軸にポゼッションを制御し、シェシュコ（Benjamin Šeško）を最前線の基準点とする設計。1月の暫定就任以降、リーグ最多の12勝で3位フィニッシュ・CL権獲得\n- GK序列はラメンス正守護神＋ダーロウ控えで確定へ（オナナ・バユンドゥル放出の根拠）\n- プレシーズン運用: 7/9〜8月中旬は非代表組でフィジカル・基本システムを構築し、W杯組を段階的に合流させて強度を上げる方針\n- ※オフシーズンのため直近試合のxG等の実測データはなし\n\n\u003e source: [Back to Carrington（4-2-3-1分析）](https://www.backtocarrington.com/p/michael-carrick-man-united-tactics) (2026) / [Sky Sports（中盤再建検証）](https://www.skysports.com/football/news/11096/13561668/man-utd-transfer-news-is-the-old-trafford-midfield-rebuild-going-to-plan-as-michael-carricks-side-prepare-for-2026-27) (2026-07)\n\n---\n\n## 📅 今後の試合予定\n\n| 日程（JST） | 大会 | 相手 | 会場 |\n|---|---|---|---|\n| 7月19日（日）0:00 | プレシーズン親善 | レクサム | オリンピックスタジアム（ヘルシンキ・フィンランド） |\n| 7月25日（土）1:00 | プレシーズン親善 | ローゼンボルグ | トロンハイム（ノルウェー） |\n| 8月1日（土）22:00 | Snapdragon Cup | アトレティコ・マドリード | ストックホルム（スウェーデン） |\n\n- **見どころ:** 初戦レクサム戦はW杯組13名が不在見込みで、若手＋新加入組のテスト機会。序列を掴んだラメンス、新戦力サントス（合流時期は代表日程次第）の披露が焦点。ツアーは北米W杯の影響で全て欧州開催\n- 以降はPSG戦（8/8・ヨーテボリ）、リーズ戦（8/12・ダブリン）を経て、**プレミアリーグ開幕戦は8月22日アウェーのハル・シティ戦**\n\n\u003e source: [manutd.com プレシーズン日程](https://www.manutd.com/en/news/detail/game-by-game-united-pre-season-fixture-list-2026) (2026-07) / [SI](https://www.si.com/soccer/manchester-united-preseason-2026-tour-dates-fixtures-tickets-how-to-watch) (2026-07)\n\n---\n\n## 🏟️ クラブ情報\n\n- **新スタジアムの建設位置を正式発表（今週の最大トピック）**: 新オールド・トラフォードは**現スタジアムの北西約350m**に建設。新たに25エーカーの用地を取得済みで、収容10万人・英国最大のスタジアムに3本の大型マスト構造、新ストレットフォード・エンドは約23,500席の計画。鉄道会社Freightliner所有の鍵となる用地（£400m要求と報道）は取得できず、位置を北西へ調整した形\n- **手続き日程**: 7月20日のトラフォード議会承認を経て、**7月28日〜9月22日に8週間の住民協議**。建設期間は約5年の見込み\n- INEOS／ラトクリフ卿（Sir Jim Ratcliffe）側の狙いとして**マッチデー収入£200m**という目標値が報じられる\n- 2026/27はCLリーグフェーズに復帰（組み合わせ抽選は8月）\n\n\u003e source: [City A.M.](https://www.cityam.com/manchester-united-issue-major-stadium-update-for-new-trafford/) (2026-07) / [Sky Sports](https://www.skysports.com/football/video/30998/13561918/what-more-we-know-about-man-utds-new-stadium-plans) (2026-07) / [Read Man Utd](https://readmanutd.com/2026/07/09/manchester-united-reveal-location-for-new-100000-seat-stadium/) (2026-07-09)\n\n---\n\n## 📰 The Athletic ピックアップ\n\n### 1. 「マンU、チェルシーとアンドレイ・サントス移籍で£50m合意」— David Ornstein スクープ（7月8日）\n\n- 合意条件（£48m＋£2m、10%セルオン、個人合意済み）を最初に報じた一次スクープで、各社後追いの起点。今週のサントス署名報道まで一貫して正確\n- リンク: [The Athletic - Manchester United](https://www.theathletic.com/football/manchester-united/)（本文はペイウォール内）\n\n### 2. 「ユナイテッド、控えGKにダーロウを確保へ」— Laurie Whitwell（7月9日）\n\n- Romanoの \"Here We Go\" 投稿が「story after @lauriewhitwell」とクレジットした通り、The Athleticが先行報道。ラメンスのバックアップ探しの内幕（フリーで即戦力の経験者を優先した編成判断）を報じたもの\n- リンク: [Romano公式X（Whitwellクレジット）](https://x.com/FabrizioRomano/status/2075264280442577334) (2026-07-09)\n\n※The Athleticのサイト直接確認は不可（クローラー遮断）のため、公開範囲＋二次報道で内容確認できた2件のみ記載（水増し回避）\n\n---\n\n**信頼度凡例:** ◎ほぼ確実（公式・Here We Go・複数A級一致） ／ ○有力（複数A級） ／ △噂レベル（単一ソース）\n\n---\n\n**別件（テンプレの鮮度）**: 指示書 `codex\\manu_news.md` はまだアモリム（Rúben Amorim）前提だけど、実際は1月に解任→カリックが5/22に正式就任済み。生成側でカリックに読み替えて作った（7/10日次も同じ扱い）。テンプレの§1・§3の監督名を直しておくか、判断は君に任せる。ファイルは `Vault\\news\\manu\\2026-07-11.md` に保存済み。";
