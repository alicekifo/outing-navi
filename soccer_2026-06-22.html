 [信頼度: ★★]\n- シティが提示した£1億600万オファーをフォレストが拒否。3回目のオファー準備中。成立すれば英国人選手移籍金記録更新\n- **ソース**：Sky Sports、ESPN（A級複数）\n\n### 6. アンドリュー・ロバートソン（LB, 32歳）[[リバプール]] → [[トッテナム・ホットスパー]] [信頼度: ★★★]\n- 6/30[[リバプール]]契約満了、フリーでスパーズ移行合意。スコットランド代表としてW杯参加中\n- **ソース**：Sky Sports（A級）\n\n### 7. [[マルコス・セネシ]]（CB, 29歳）ボーンマス → [[トッテナム・ホットスパー]] [信頼度: ★★★]\n- 6/30ボーンマス契約満了、フリーでスパーズ移行合意。複数クラブとの争奪戦を制す\n- **ソース**：Sky Sports（A級）\n\n---\n\n## 🌍 ワールドカップ2026 速報\n\n\u003e **大会概要**：開催国：米国・カナダ・メキシコ｜48カ国・12グループ｜期間：6月11日〜7月19日\n\n---\n\n### 📅 6月21日（日）確定結果\n\n| グループ | 対戦カード | スコア | 注目点 |\n|----------|-----------|--------|--------|\n| **グループH** | **スペイン 4-0 サウジアラビア** | 終了 | ヤマル早々先制、オジャルサバル2発、AL-タンバクティOG。ラ・ロハが初戦のドロー（vs カーボベルデ）から完全復活 |\n| **グループG** | **ベルギー 0-0 イラン** | 終了 | ベルギーのナタン・ンゴイが66分に退場（1人少に）。タレミのゴールはVARで取り消し。イランが10人相手に死守 |\n| **グループH** | **ウルグアイ 2-2 カーボベルデ** | 終了 | アラウホ44\u0027・カノッビオ45+6\u0027 / ピナ21\u0027・ヴァレラ61\u0027。カーボベルデが再び世界を驚かせる引き分け |\n| **グループG** | **ニュージーランド 1-3 エジプト** | 終了 | スーマン15\u0027のみ（NZL）、ジコ58\u0027・サラー67\u0027・トレゼゲ82\u0027（EGY）。サラー牽引のエジプトが大会初勝利 |\n\n---\n\n### 📅 6月22日（本日）試合スケジュール\n\n| グループ | 対戦カード | キックオフ(ET) | 会場 |\n|----------|-----------|--------------|------|\n| **グループJ** | **アルゼンチン vs オーストリア** | 13:00 | ダラス（AT\u0026Tスタジアム） |\n| **グループI** | **フランス vs イラク** | 17:00 | フィラデルフィア |\n| **グループI** | **ノルウェー vs セネガル** | 20:00 | イーストラザーフォード（メットライフ） |\n| **グループJ** | **ヨルダン vs アルジェリア** | 23:00 | ダラス |\n\n\u003e ⭐ **グループJ最大の注目**：MD1結果（アルゼンチン3-0アルジェリア、オーストリア3-1ヨルダン）を受け、アルゼンチン（3pts GD+3）vs オーストリア（3pts GD+1）が事実上のグループ首位決定戦。メッシ対フランク・ファンデン・ボールクが率いるオーストリアの一戦に注目。\n\n\u003e ⭐ **グループI**：フランス（3pts）が序盤から首位固め狙い。ノルウェー（3pts）もセネガルとの同勝ち点対決。\n\n---\n\n### 🔑 グループ別状況（6/22 朝時点）\n\n**グループG（MD2完了）**\n- **エジプト 4pts（GD+2）**・ベルギー 2pts（GD0、退場者あり）・イラン 2pts（GD0）・**ニュージーランド 1pt（GD−2）**\n- ▶ エジプトがサラー主導で一気に首位へ。ベルギーはMD3で退場リセット後に逆転を狙う\n\n**グループH（MD2完了）**\n- **スペイン 4pts（GD+4）**・ウルグアイ 2pts（GD0）・カーボベルデ 2pts（GD0）・サウジアラビア 1pt（GD−4）\n- ▶ スペインが4-0快勝で首位独走。ウルグアイvsカーボベルデが最終節の2位争いへ\n\n**グループI（MD2本日）**\n- フランス 3pts・ノルウェー 3pts・セネガル 0pts・イラク 0pts\n- ▶ フランス・ノルウェーが勝ち点3で並立。本日2試合で大きく情勢変化の可能性\n\n**グループJ（MD2本日）**\n- アルゼンチン 3pts（GD+3）・オーストリア 3pts（GD+1）・アルジェリア 0pts・ヨルダン 0pts\n- ▶ 上位2チームによるビッグマッチ。勝者が突破に大きく前進\n\n**グループE（MD2完了）**\n- **ドイツ 6pts（突破確定）**・コートジボワール 3pts・エクアドル 1pt・キュラソー 1pt\n\n**グループF（MD2完了）**\n- **オランダ 4pts（GD+4）**・**日本 4pts（GD+2）**・スウェーデン 3pts・チュニジア 0pts（敗退確定）\n- ▶ MD3（日本 vs スウェーデン）が実質2位決定戦\n\n**グループA（MD2完了）**\n- **メキシコ 6pts（突破確定）**・韓国 3pts・チェコ 3pts・南アフリカ 0pts\n\n**グループC（MD2完了）**\n- **スコットランド 6pts（突破確定）**・ブラジル 4pts・モロッコ 1pt・ハイチ 0pts（敗退確定）\n\n**グループD（MD2完了）**\n- **アメリカ 6pts（突破確定）**・パラグアイ 3pts・オーストラリア 3pts・**トルコ 0pts（敗退確定）**\n\n**グループB（MD1完了）**\n- カナダ 3pts・スイス 1pt・ボスニア 1pt・カタール 0pts\n\n**グループK（MD1完了）**\n- コロンビア 3pts・ポルトガル 1pt・コンゴDR 1pt・ウズベキスタン 0pts\n\n**グループL（MD1完了）**\n- イングランド 3pts（GD+2）・ガーナ 3pts（GD+1）・クロアチア 0pts・パナマ 0pts\n\n---\n\nSources:\n- [Spain 4-0 Saudi Arabia - ESPN](https://www.espn.com/soccer/story/_/id/49134985/spain-saudi-arabia-live-world-cup-2026-latest-updates-commentary-score-result)\n- [Spain v Saudi Arabia 4-0 - FIFA](https://www.fifa.com/en/match-centre/match/17/285023/289273/400021483)\n- [Spain 4-0 Saudi Arabia - Al Jazeera](https://www.aljazeera.com/sports/liveblog/2026/6/21/spain-vs-saudi-arabia-live-world-cup-2026)\n- [Belgium 0-0 Iran - ESPN](https://www.espn.com/soccer/match/_/gameId/760451/iran-belgium)\n- [Belgium 0-0 Iran - Sky Sports](https://www.skysports.com/football/news/12098/13553797/world-cup-2026-belgium-0-0-iran-nathan-ngoy-sent-off-but-no-goals-in-group-g-draw-in-los-angeles)\n- [Belgium v Iran 0-0 - FIFA](https://www.fifa.com/en/match-centre/match/17/285023/289273/400021477)\n- [Uruguay 2-2 Cape Verde - ESPN](https://www.espn.com/soccer/story/_/id/49138051/uruguay-cape-verde-live-world-cup-2026-latest-updates-commentary-score-result)\n- [Uruguay v Cape Verde 2-2 - FIFA](https://www.fifa.com/en/match-centre/match/17/285023/289273/400021487)\n- [New Zealand 1-3 Egypt - ESPN](https://www.espn.com/soccer/report/_/gameId/760452)\n- [New Zealand 1-3 Egypt - FIFA](https://www
