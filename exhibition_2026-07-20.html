<script>
const md = "# 美術展・特別展ニュース（2026-07-20）\n\n## 🔔 今週のチケット発売\n\n### フェルメール《真珠の耳飾りの少女》展 通常券・一般抽選（大阪中之島美術館）\n- **受付期間**: 2026年7月14日（火）12:00 〜 **7月21日（火）12:00締切**（受付中・締切は明日正午）\n- 価格帯: 一般3,000円 / 高大生1,500円 / 小中生500円（日時指定・全会期分）\n- 販売チャネル: チケットぴあ限定の**抽選販売**（先着販売は中止され抽選に統一・美術館窓口での当日券販売なし）\n- 公式リンク: https://vermeer2026.exhibit.jp/tickets/\n\n\u003e source: https://vermeer2026.exhibit.jp/tickets/\n\n※上記以外に、TODAY±7日以内に発売開始となる主要展のチケットは確認できず。\n\n---\n\n## 🎨 関東の展覧会\n\n### 現在開催中（終了が近い順）\n\n### 眼のごちそう 食器（サントリー美術館・六本木駅）\n- 会期: 2026-07-08 〜 2026-08-30\n- 入場料: 一般1,700円（前売1,500円）\n- 概要: 桃山〜江戸時代の陶磁食器を「生活の中の美」の視点で特集。\n- **見どころ**: 織部・古伊万里など「使うための美」を食卓目線で見られる、夏の涼しい和のうつわ展。\n\n\u003e source: https://www.suntory.co.jp/news/article/2026/sma0080.html\n\n### 弘法大師生誕1250年記念 特別展「空海と真言の名宝」（東京国立博物館 平成館・上野駅）\n- 会期: 2026-07-14 〜 2026-09-06（前期〜8/9・後期8/11〜で展示替え）\n- 入場料: 一般 当日2,300円（前売2,100円）\n- 概要: 真言宗十八本山と関係寺院の寺宝88件（国宝15件・重文60件）が一堂に集結。\n- **見どころ**: 信貴山縁起絵巻ほか国宝クラスが揃う今夏の東京最大級の仏教美術展。前後期で大幅展示替えあり。\n\n\u003e source: https://www.tnm.jp/modules/r_free_page/index.php?id=2760\n\n### ロン・ミュエク（森美術館・六本木駅）\n- 会期: 2026-04-29 〜 2026-09-23（会期中無休）\n- 入場料: 一般 窓口 平日2,300円・土日祝2,500円（オンライン事前購入は各200円引）\n- 概要: 超写実の巨大人体彫刻で知られるロン・ミュエク、18年ぶりの日本個展。\n- **見どころ**: 寡作な作家の全49作品中11作品が来日する規模。日時指定制なので事前購入が確実。\n\n\u003e source: https://www.mori.art.museum/jp/exhibitions/ronmueck/\n\n### 版画家レンブラント 挑戦、継承、インパクト（国立西洋美術館・上野駅）\n- 会期: 2026-07-07 〜 2026-09-23\n- 入場料: 一般2,200円\n- 概要: アムステルダムのレンブラント・ハウス美術館との共同企画。エッチング約130点。\n- **見どころ**: 「画家」でなく「版画家」としてのレンブラントに正面から取り組む珍しい切り口。金・土は20時まで開館。\n\n\u003e source: https://www.nmwa.go.jp/jp/exhibitions/2026rembrandt.html\n\n### 間もなく開始（開始日順）\n\n### 毛利悠子 Recompose — 第60回ヴェネチア・ビエンナーレ日本館帰国展（横浜美術館・みなとみらい駅）\n- 会期: 2026-07-24 〜 2026-11-23\n- 入場料: 無料\n- 概要: 2024年ヴェネチア・ビエンナーレ日本館の個展が横浜に凱旋。日用品や自然物が動き・光・音を生むインスタレーション群。\n- **見どころ**: 国際舞台で評価された展示を無料で体験できる破格の機会。\n\n\u003e source: https://yokohama.art.museum/exhibition/202607_mohriyuko/\n\n### 東京都美術館開館100周年記念 大英博物館日本美術コレクション 百花繚乱〜海を越えた江戸絵画（東京都美術館・上野駅）\n- 会期: 2026-07-25 〜 2026-10-18\n- 入場料: 一般2,300円（前売2,100円・前売は7/24まで）\n- 概要: 大英博物館の日本コレクション4万点から江戸絵画と歌麿・写楽・北斎・広重ら8絵師の版画を厳選。\n- **見どころ**: 海を渡ったまま日本で見られなかった「初里帰り」作品を含む里帰り展。\n\n\u003e source: https://www.tobikan.jp/exhibition/2026_britishmuseum.html\n\n### マリー・アントワネット・スタイル（横浜美術館・みなとみらい駅）\n- 会期: 2026-08-01 〜 2026-11-23\n- 入場料: 一般2,500円（前売2,300円）\n- 概要: ヴィクトリア＆アルバート博物館企画の世界巡回展。王妃の美意識とその後世への影響をたどる。\n- **見どころ**: ファッション・装飾美術ファン必見。V\u0026A企画の巡回展を国内で見られる貴重な機会。\n\n\u003e source: https://www.marie2026.jp/\n\n---\n\n## 🏯 関西の展覧会\n\n### 現在開催中（終了が近い順）\n\n### 大阪市立美術館開館90周年記念特別展「水滸伝」（大阪市立美術館・天王寺駅）\n- 会期: 2026-07-11 〜 2026-09-06\n- 入場料: 一般2,000円\n- 概要: 中国の伝奇小説「水滸伝」をテーマに、絵画・工芸・浮世絵まで横断する開館90周年記念展。\n- **見どころ**: 国芳の豪傑絵から現代のポップカルチャーまで「水滸伝受容史」を一気に俯瞰できる企画。\n\n\u003e source: https://www.osaka-art-museum.jp/special_exhibition/8301\n\n### 特別展「南都仏画―よみがえる奈良天平の美―」（奈良国立博物館・近鉄奈良駅）\n- 会期: 2026-07-18 〜 2026-09-13（前期〜8/16・後期8/18〜）\n- 入場料: 一般 当日2,200円\n- 概要: ボストン美術館共同企画。海を渡った南都ゆかりの仏画が奈良に里帰り。\n- **見どころ**: ボストン美術館所蔵の名品仏画をまとめて見られる機会は国内では稀。仏教美術の聖地・奈良での公開に意味がある。\n\n\u003e source: https://nantobutsuga2026.exhibit.jp/\n\n![浮世絵スーパークリエイター 歌川国芳展](https://upload.wikimedia.org/wikipedia/commons/3/3a/Mitsukuni_defying_the_skeleton_spectre_invoked_by_princess_Takiyasha.jpg)\n\n### 浮世絵スーパークリエイター 歌川国芳展（京都市京セラ美術館・東山駅）\n- 会期: 2026-07-18 〜 2026-09-23\n- 入場料: 一般1,900円\n- 概要: 「相馬の古内裏」「みかけハこハゐがとんだいゝ人だ」など約200点を6ジャンルで展開。\n- **見どころ**: 武者絵・戯画・風景画までマルチな国芳をまとめて見られる大型回顧展。江戸エンタメの最高峰。\n\n\u003e source: https://kyotocity-kyocera.museum/exhibition/20260718-20260923\n\n### スイス絵画の異才 カール・ヴァルザー（大阪中之島美術館・渡辺橋駅）\n- 会期: 2026-07-04 〜 2026-09-27\n- 入場料: 一般1,800円\n- 概要: スイスの画家カール・ヴァルザーの回顧展。絵画など約150点を日本初公開。\n- **見どころ**: 日本ではほぼ紹介されてこなかった作家の初回顧展。「知らない画家に出会う」体験ができる。\n\n\u003e source: https://nakka-art.jp/exhibition-post/karlwalser-2026/\n\n### フォンタネージ—イタリアの光・心の風景（京都国立近代美術館・東山駅）\n- 会期: 2026-07-18 〜 2026-10-04\n- 入場料: 一般2,000円（前売・夜間割引1,700円）\n- 概要: 明治日本の洋画教育に決定的な影響を与えたイタリア人風景画家、日本初の大回顧展。\n- **見どころ**: 日伊国交樹立160周年・フォンタネージ来日150周年記念。日本近代洋画のルーツを確かめられる学術的企画。\n\n\u003e source: https://www.momak.go.jp/Japanese/exhibitionarchive/2026/467.html\n\n### 間もなく開始（開始日順）\n\n![フェルメール《真珠の耳飾りの少女》展](https://upload.wikimedia.org/wikipedia/commons/d/d7/Meisje_met_de_parel.jpg)\n\n### フェルメール《真珠の耳飾りの少女》展 17世紀オランダ絵画の名品、奇跡の再来日（大阪中之島美術館・渡辺橋駅）\n- 会期: 2026-08-21 〜 2026-09-27\n- 入場料: 一般3,000円（日時指定・抽選制、当日券なし）\n- 概要: マウリッツハイス美術館所蔵《真珠の耳飾りの少女》が再来日。大阪のみの開催。\n- **見どころ**: チケットは全会期抽選販売のみ。上記「今週のチケット発売」の一般抽選（7/21正午締切）を逃さないこと。\n\n\u003e source: https://vermeer2026.exhibit.jp/\n\n### 国立美術館 コレクション・ダイアローグ 松方幸次郎 × 山村德太郎（兵庫県立美術館・阪神岩屋駅）\n- 会期: 2026-10-10 〜 2026-12-27\n- 入場料: 未発表（公式サイトに記載なし・発表待ち）\n- 概要: 松方コレクションと山村コレクション、二大コレクターの蒐集を対話させる企画。\n- **見どころ**: 国立西洋美術館の松方コレクションが関西でまとまって見られる好機になりそう。\n\n\u003e source: https://www.artm.pref.hyogo.jp/exhibition/\n\n---\n\n## ✨ 注目ピックアップ\n\n### 1. フェルメール《真珠の耳飾りの少女》展（大阪中之島美術館・8/21〜）\nマウリッツハイス美術館の至宝《真珠の耳飾りの少女》そのものが来日し、大阪のみで公開される。同館の看板作品であり貸出自体が極めて稀なため、次に日本で見られる保証はどこにもない。チケットは先着販売が中止され全会期抽選に統一された（一般3,000円・当日券なし）ので、「行けば見られる」展覧会ではない点に注意。一般抽選の締切が**7月21日（火）正午**に迫っており、少しでも行く可能性があるなら今日中の申込が必須。\n\n\u003e source: https://vermeer2026.exhibit.jp/tickets/\n\n### 2. 特別展「空海と真言の名宝」（東京国立博物館・開催中〜9/6）\n弘法大師生誕1250年を記念し、真言宗十八本山と関係寺院から国宝15件・重要文化財60件を含む88件が平成館に集まる。信貴山縁起絵巻をはじめ、通常は各寺院に分蔵されていて一度に見ることが不可能な密教美術の名宝を横断できるのが最大の価値。前期（〜8/9）と後期（8/11〜）で大きく展示替えされるため、目当ての作品がある人は出品リストの確認を推奨。仏教美術・書跡好きはもちろん、曼荼羅や法具の造形はデザイン視点でも刺さる。\n\n\u003e source: https://www.tnm.jp/modules/r_free_page/index.php?id=2760\n\n### 3. 大英博物館日本美術コレクション 百花繚乱（東京都美術館・7/25〜）\n東京都美術館の開館100周年記念として、大英博物館が誇る4万点の日本コレクションから江戸絵画の屏風・掛軸・絵巻と、歌麿・写楽・北斎・広重ら代表的8絵師の版画を厳選して紹介する。幕末〜明治に海を渡って以来、日本で公開されたことのない「初里帰り」作品を含むのが学術的な目玉で、海外流出品の保存状態の良さ（摺りの色が残る浮世絵など）を実見できる。浮世絵・江戸絵画ファンに加え、「大英博物館の日本の見方」というコレクション史の観点でも面白い。秋には大阪中之島美術館へ巡回予定なので、関西勢は無理に遠征しなくてもよい。\n\n\u003e source: https://www.tobikan.jp/exhibition/2026_britishmuseum.html";
document.getElementById('content').innerHTML = marked.parse(md);

// watchlist
const WL_KEY = 'exhibition_watchlist';
function loadWatchlist() {
  return JSON.parse(localStorage.getItem(WL_KEY) || '[]');
}
function saveWatchlist(list) {
  localStorage.setItem(WL_KEY, JSON.stringify(list));
}
function renderWatchlist() {
  const list = loadWatchlist();
  const bar = document.getElementById('watchlist-bar');
  const container = document.getElementById('watchlist-items');
  if (!list.length) { bar.classList.remove('has-items'); return; }
  bar.classList.add('has-items');
  container.innerHTML = list.map((item, i) => {
    const daysLeft = item.saleDate ? Math.ceil((new Date(item.saleDate) - new Date()) / 86400000) : null;
    const saleTxt = daysLeft !== null
      ? (daysLeft <= 0 ? '&#x767A;&#x58F2;&#x4E2D;' : daysLeft + '&#x65E5;&#x5F8C;&#x767A;&#x58F2;')
      : '';
    return '<div class="watchlist-item"><span>' + item.name + '</span><span><span class="sale-date">' + saleTxt + '</span><button class="remove-btn" onclick="removeWatch(' + i + ')">&#x2715;</button></span></div>';
  }).join('');
}
function removeWatch(i) {
  const list = loadWatchlist();
  list.splice(i, 1);
  saveWatchlist(list);
  renderWatchlist();
}
function addToWatchlist(name, saleDate) {
  const list = loadWatchlist();
  if (list.find(x => x.name === name)) { alert('&#x767B;&#x9332;&#x6E08;&#x307F;&#x3067;&#x3059;'); return; }
  list.push({ name, saleDate: saleDate || null, addedAt: new Date().toISOString() });
  saveWatchlist(list);
  renderWatchlist();
  checkSaleNotifications();
}
function checkSaleNotifications() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const today = new Date().toDateString();
  loadWatchlist().forEach(item => {
    if (item.saleDate && new Date(item.saleDate).toDateString() === today) {
      new Notification('&#x1F3AB; &#x30C1;&#x30B1;&#x30C3;&#x30C8;&#x767A;&#x58F2;&#x65E5;&#xFF01;', {
        body: item.name + ' &#x306E;&#x30C1;&#x30B1;&#x30C3;&#x30C8;&#x304C;&#x672C;&#x65E5;&#x767A;&#x58F2;&#x3067;&#x3059;',
        icon: '/favicon.ico'
      });
    }
  });
}

// inject watch buttons after h3 tags in content
document.querySelectorAll('#content h3').forEach(h3 => {
  const name = h3.textContent.trim();
  const btn = document.createElement('button');
  btn.className = 'watch-btn';
  btn.innerHTML = '&#x2B50; &#x30A6;&#x30A9;&#x30C3;&#x30C1;';
  btn.onclick = () => {
    const dateMatch = h3.nextElementSibling ? h3.nextElementSibling.textContent.match(/\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}/) : null;
    addToWatchlist(name, dateMatch ? dateMatch[0].replace(/\//g, '-') : null);
  };
  h3.appendChild(btn);
});

if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}
renderWatchlist();
checkSaleNotifications();
</script>
