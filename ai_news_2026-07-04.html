<script>
const md = "## 🤖 今週のAI最新動向\n\n### 1. OpenAI、GPT-5.6「Sol/Terra/Luna」を限定プレビュー公開——サイバーセキュリティ特化のSolは約20社限定\n2026年6月29日、OpenAIは次世代モデルファミリー GPT-5.6 の限定プレビューを発表した。フラッグシップの「Sol」（高難度推論・サイバーセキュリティ用途）、日常業務向けバランス型「Terra」、低コスト高速版「Luna」の3ティア構成で、米国政府との事前調整を経て信頼できる約20パートナー組織にのみ提供を開始し、数週間以内の一般提供を予定する。\n\nモデル「世代」と「能力ティア」を分離し、Sol/Terra/Lunaがそれぞれ独立したペースで進化できる新しい命名体系を導入した点が特徴的だ。UC Berkeleyと複数のフロンティア研究所が共同開発したサイバー攻撃検証ベンチマーク「ExploitGym」で、推論を強めるほど攻撃能力が向上する結果が出ており、OpenAIはこれに対応して「最も堅牢な安全スタック」と重大リスク行為向けの分類器を同時投入した。報道によれば、コンテキスト窓はGPT-5.5比で1Mトークンから1.5Mトークンに拡大し、価格はSol $5/$30、Terra $2.50/$15、Luna $1/$6（入力/出力、100万トークンあたり）とされる。CerebrasのWSE-3上でSolを最大750トークン/秒で提供する計画もあり、推論速度と安全ガードレールの両輪強化が同時に進む。\n出典: [OpenAI](https://openai.com/index/previewing-gpt-5-6-sol/) (2026-06-29)、[VentureBeat](https://venturebeat.com/technology/openai-unveils-gpt-5-6-sol-terra-and-luna-models-but-only-accessible-to-limited-preview-partners-for-now-per-us-gov) (2026-06-29)\n\u003e source: https://openai.com/index/previewing-gpt-5-6-sol/\n\n### 2. Anthropic、輸出規制で停止していたClaude Fable 5/Mythos 5を安全策強化のうえ再展開\n2026年7月1日、Anthropicは米国政府の指示で一時停止していたClaude Fable 5とMythos 5を、強化された安全分類器とともに再展開したと発表した。発端はAmazonの調査チームがFable 5にソフトウェア脆弱性の発見をプロンプトさせたテストだったが、Anthropic自身の追試ではOpus 4.8・GPT-5.5・Kimi K2.7といった非フロンティアモデルでも同じ脆弱性を再現できることが判明した。\n\n「最先端モデルだから危険」という単純な図式が崩れ、能力差ではなくポリシー・分類器設計の問題だったことが可視化された事例だ。新版はサイバーセキュリティ関連タスクをより積極的に検知し、リスクを検知するとOpus 4.8にフォールバックする仕組みを追加。米CAISI（AI標準・イノベーションセンター）は新安全策を「極めて強固」と検証し、Amazon・Microsoft・GoogleらとのProject Glasswingの枠組みで業界横断のジェイルブレイク深刻度スコアリング基準を共同提案している点も注目される。輸出規制とAIモデルの安全性評価が現実の政策プロセスに直結する好例。\n出典: [Anthropic](https://www.anthropic.com/news/claude-fable-5-mythos-5) (2026-07-01)、[The Hacker News](https://thehackernews.com/2026/07/anthropic-restores-claude-fable-5-after.html) (2026-07-01)\n\u003e source: https://www.anthropic.com/news/claude-fable-5-mythos-5\n\n### 3. Anthropic、最もエージェント能力の高い「Claude Sonnet 5」を発表\n2026年6月30日、AnthropicはSonnet系列の最新版Claude Sonnet 5を発表した。Sonnet 4.6から推論・ツール使用・コーディング・知識作業全般で大幅に改善し、上位モデルOpus 4.8に近い性能を実現したとする。\n\nSonnetラインは価格と性能のバランスで開発者に選ばれてきた主力モデル。上位モデル並みの性能を中位価格帯で提供することで、Claude Codeなどエージェント型コーディングツールの実運用コストを大きく左右する。導入価格は100万トークンあたり入力$2/出力$10（2026年8月31日まで）、その後は入力$3/出力$15に上昇。Free/Pro/Max/Team/Enterprise全プランおよびClaude Code、Claude Platformで即日利用可能。\n出典: [Anthropic](https://www.anthropic.com/news/claude-sonnet-5) (2026-06-30)\n\u003e source: https://www.anthropic.com/news/claude-sonnet-5\n\n### 4. Meta、余剰AI計算資源を外販する「Meta Compute」クラウド事業に参入\n2026年7月1日、Metaがデータセンターの余剰キャパシティを外部企業に貸し出す新事業「Meta Compute」を計画していると報じられた。インフラ責任者Santosh Janardhan、Meta Superintelligence Labs責任者Daniel Gross、社長Dina Powell McCormickが主導し、CoreWeave型の「素のコンピュート」販売に加え、自社の非公開モデル「Muse Spark」などへのアクセス販売も検討しているという。\n\n「AI計算資源は恒久的に不足する」という業界の前提を揺るがすニュースとして市場が反応し、発表当日にMeta株は9%近く上昇する一方、Micron（10%超安）やSanDisk・Intel・AMD（7〜10%超安）などメモリ・半導体株が軒並み下落した。AWS・Google Cloud・Azureという既存3強に対し、自社モデル訓練用に積み上げてきた計算資源を武器にする新規参入者が現れたことで、GPU/HBM需給や計算資源の価格形成に構造変化が起きる可能性がある。\n出典: [TechCrunch](https://techcrunch.com/2026/07/01/meta-like-spacex-looks-to-turn-excess-ai-compute-into-cash/) (2026-07-01)、[CNBC](https://www.cnbc.com/2026/07/01/meta-stock-cloud-ai-compute.html) (2026-07-01)\n\u003e source: https://techcrunch.com/2026/07/01/meta-like-spacex-looks-to-turn-excess-ai-compute-into-cash/\n\n## 📄 今週の注目論文\n\n### 1. GRPOによる言語モデルの適応的レッドチーミング（Learning to Attack and Defend: Adaptive Red Teaming of Language Models via GRPO）\n著者: Blake Bullwinkel（Microsoft AI Red Team）ほか Eugenia Kim, Amanda Minnich, Mark Russinovich / arXiv:2606.09701 / 2026-06-08公開\n\n- **Problem**: 静的なレッドチーム演習は、モデルが日々更新される中で新しい攻撃手法にすぐ陳腐化する。攻撃・防御を継続的に共進化させる仕組みが必要。\n- **Method**: 強化学習フレームワーク「AdvGRPO」を提案。マルチチャネル報酬と分離アドバンテージ正規化でGRPOを安定化し、単一ターン攻撃から多ターン攻撃へ段階的に難易度を上げながら攻撃モデルと防御モデルを交互訓練。\n- **Finding**: 転移性の高い新規攻撃を自動生成しつつ、防御側モデルの安全性ベンチマークスコアも同時に向上させることを確認。\n\n**読みどころ**: Microsoft AI Red Teamという実務チームが「攻撃と防御を同じループで共進化させる」手法を発表した点が実践的。手動レッドチームやPyRITのようなツールキットに続く「自動化されたレッドチーム」の具体像として、実運用のAIセキュリティ担当者が押さえておきたい内容。\narXiv: https://arxiv.org/abs/2606.09701\n\u003e source: https://arxiv.org/abs/2606.09701\n\n### 2. マルチエージェント会話を監視し創発的なミスアラインメントを検知する「Arbiter」エージェント（The Arbiter Agent）\n著者: Filippo Tonini（南デンマーク大学）ほか5名 / arXiv:2606.10747 / 2026-06-09公開\n\n- **Problem**: 個々には問題のないLLMエージェント同士が協調するマルチエージェントシステムでは、相互作用そのものから「創発的なミスアラインメント」が生じうるが、継続的に検知する仕組みが乏しい。\n- **Method**: 会話をリアルタイムで監視する「Arbiter」エージェントを提案。限られた調査予算の中で参加エージェントへの質問や内部状態の確認を戦略的に選択し、原因を特定するレポートを生成する。\n- **Finding**: 限定的な介入予算下でも、マルチエージェント間で問題が発生した原因を特定できることを示した。\n\n**読みどころ**: 複数エージェントを連携させる「マルチエージェントオーケストレーション」が実運用に入り始めた今、個々のガードレールだけでは防げない相互作用リスクへの対処法として、Claude Code等のツールを本番投入する技術者に直結する話題。\narXiv: https://arxiv.org/abs/2606.10747\n\u003e source: https://arxiv.org/abs/2606.10747\n\n### 3. 構造化外れ値をオフセットで手なずけるLLM量子化手法「OffQ」（OffQ: Taming Structured Outliers in LLM Quantization by Offsetting）\n著者: Haoqi Wang（Huawei Technologies, Zurich Research Center）ほか、Lukas Cavigelli（Huawei）, Mathieu Salzmann（EPFL）ら / arXiv:2606.07116 / 2026-06-05公開\n\n- **Problem**: 低ビット量子化（W4A4KV4など）ではactivationの構造的な外れ値が精度劣化の主因になるが、既存手法は外れ値の扱いに限界があった。\n- **Method**: top-1 PCAで低次元の外れ値部分空間を特定し、回転によって高振幅の活性化を1チャネルに集約したうえで、その外れ値チャネルを共有オフセットに変換して活性化の標準偏差を圧縮する「OffQ」を提案。\n- **Finding**: ハードウェアに優しい一様グリッド・一様精度の量子化のままW4A4KV4設定でSOTAベースラインを一貫して上回る精度を達成（具体的な改善幅は論文中の表に記載、本サマリーでは数値未確認のため割愛）。\n\n**読みどころ**: llama.cppやvLLMでのKVキャッシュ量子化が話題になる中、weight・activation・KVキャッシュを同時に低ビット化する際の「外れ値問題」への正攻法。ハードウェアフレンドリーな一様量子化のまま精度を保つ設計思想は、ローカルLLM運用のリソース制約を考えるうえで参考になる。\narXiv: https://arxiv.org/abs/2606.07116\n\u003e source: https://arxiv.org/abs/2606.07116\n\n### 4. 古いリポジトリを蘇らせられるか？LLMエージェントによる「互換性レスキュー」実証研究（RepoRescue）\n著者: Zhihao Lin（北京航空航天大学、David Lo＝Singapore Management University等と共同）ほか6名 / arXiv:2607.01213 / 2026-07-01公開\n\n- **Problem**: 従来のバグ修正研究は「本来動くはずのコード」を前提にするが、実際には「かつて動いていたが依存関係更新やAPI変更で壊れた」リポジトリの復旧という現実的な課題は手薄だった。\n- **Method**: Pythonリポジトリ193個・Javaリポジトリ122個を対象に、複数のLLMエージェントシステムに「歴史的テストスイートを再び通す」修復タスクを課す実証実験を実施。\n- **Finding**: 最良の単一エージェント構成を10.9ポイント上回る62.7%の成功率を達成する組み合わせが存在した一方、ファイルをまたいだ整合性の確保（クロスファイル調整）が共通のボトルネックであることが判明。\n\n**読みどころ**: 「動くコードを書く」より一段実務寄りの「壊れた依存関係を直す」タスクでのエージェント実力を定量評価した点が貴重。CI/CDで依存関係更新が壊れて困っているLinux/インフラ技術者にとって、AIエージェントに任せられる範囲の現実的な見立てが得られる。\narXiv: https://arxiv.org/abs/2607.01213\n\u003e source: https://arxiv.org/abs/2607.01213\n\n## 💡 今週のひとことインサイト\n\nFable 5の一時停止・再展開劇が面白いのは、「危険だから止めた」のに、Anthropicの追試でOpus 4.8やGPT-5.5、Kimi K2.7といった非フロンティア勢でも同じ脆弱性を暴けたと判明した点だ。つまり最先端モデルの能力差ではなく、「誰が・どの文脈で使うか」というポリシー設計の話だったことになる。輸出規制やモデルカードは能力の絶対値だけを見がちだが、実際のリスクは分類器・監視・アクセス制御という運用レイヤーで決まる。Project GlasswingのようにAmazon・Microsoft・Googleが共同でジェイルブレイク深刻度のスコアリング基準を作り始めたのも示唆的で、AIセキュリティは「モデルを鍛える」から「業界横断のインシデント対応プロセスを作る」フェーズに移りつつある。Linuxのゼロデイ対応がCVE番号とディストリ間協調で回るのと同じ構造が、AIにも生まれつつあるように見える。";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
