S+A級複数）\n\n### 4. [[マルコ・パレストラ]]（RWB, 21歳）アタランタ → [[チェルシー]]【NEW 6/24】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €5,500万（£4,700万相当） |\n| ステータス | 口頭合意完了、メディカル・正式発表待ち |\n| 背景 | インテルとの争奪戦をチェルシーが制す |\n\n- ハビ・アロンソ就任後の[[チェルシー]]初補強。2025-26シリーズAでカリアリへローン中に最優秀守備選手賞受賞、イタリア代表初召集も経験\n- Romano「HERE WE GO！」確認済（6/24）\n- **ソース**：Fabrizio Romano（S級）、Goal.com、OneFootball、Transfermarkt（S+A+B級複数）\n\n---\n\n## 🟡 交渉中・動向注目\n\n### 1. モーガン・ロジャース（MF, 23歳）アストン・ヴィラ → [[アーセナル]] [信頼度: ★★★]【継続掲載・更新】\n- Romano「アーセナルがロジャース獲得で前進中。アルテタが内部で『ナンバーワン・ツー・スリーのターゲット』と言明。選手側も移籍を希望し、ヴィラ幹部にも意向を伝達済み。クラブ間の正式交渉はまだ開始されていない」\n- Sky Sports「アーセナルがロジャース獲得に向け関心を強化。エミレーツに複数選手が去就不明の状況も影響」と報道\n- ヴィラは£80〜100mの評価額を堅持し、2031年まで長期契約あり交渉を急がない構え\n- **ソース**：Fabrizio Romano（S級）、Sky Sports、football365（S+A級複数）\n\n### 2. ブラッドリー・バルコラ（W, 23歳）PSG → [[リバプール]]最有力【継続掲載】\n- アーセナルがロジャース最優先に切り替えたことでリバプールが最有力候補に浮上。ESPN「リバプールがバルコラ獲得に向け動きを強める」と報道。PSGは€9,000万超要求継続\n- **ソース**：ESPN（A級）、football365（A級）、FootballTransfers（A級）\n\n### 3. [[ドゥシャン・ヴラホヴィッチ]]（CF, 26歳）ユヴェントス（6/30フリー）→ バルセロナ検討中 [信頼度: ★★]【継続掲載】\n- 6/30に確定的にフリーエージェント。バルセロナは「主要ターゲットではない」との報道も浮上し不透明感継続\n- **ソース**：ESPN、Barca Blaugranes（A+B級）\n\n### 4. [[ロベルト・レヴァンドフスキ]]（CF, 37歳）バルセロナ（6/30フリー）→ シカゴ・ファイア(MLS) [信頼度: ★★]【継続掲載】\n- シカゴが年俸$1,500〜2,000万を提示継続。W杯終了後に最終決断見込み\n- **ソース**：beIN Sports、NBC Chicago（A+B級）\n\n### 5. [[エリオット・アンダーソン]]（MF, 22歳）ノッティンガム・フォレスト → [[マンチェスター・シティ]] [信頼度: ★★]【継続掲載】\n- シティが提示した£1億600万オファーをフォレストが拒否。3回目のオファー準備中。成立すれば英国人選手移籍金記録更新\n- **ソース**：Sky Sports、ESPN（A級複数）\n\n### 6. アンドリュー・ロバートソン（LB, 32歳）[[リバプール]] → [[トッテナム・ホットスパー]] [信頼度: ★★★]【継続掲載】\n- 6/30契約満了、フリーでスパーズ移行合意。スコットランド代表としてW杯参加中（R32進出）\n- **ソース**：Sky Sports（A級）\n\n### 7. [[マルコス・セネシ]]（CB, 29歳）ボーンマス → [[トッテナム・ホットスパー]] [信頼度: ★★★]【継続掲載】\n- 6/30ボーンマス契約満了、フリーでスパーズ移行合意\n- **ソース**：Sky Sports（A級）\n\n### 8. ルーカス・ベルグヴァル（MF, 21歳）[[トッテナム・ホットスパー]]（退団申請）→ 複数クラブ関心 [信頼度: ★★★]【継続掲載】\n- Romano・Ornstein（The Athletic）が退団申請を確認。バイエルン・ミュンヘン、アストン・ヴィラ、ドルトムント、[[チェルシー]]等7クラブが関心。評価額£5,700万超\n- **ソース**：Fabrizio Romano（S級）、The Athletic / David Ornstein（A級）\n\n### 9. エンゾ・フェルナンデス（MF, 25歳）[[チェルシー]] → [[レアル・マドリード]] [信頼度: ★]【継続掲載・下方修正】\n- Romano「個人合意は成立しておらず、レアル・マドリードはチェルシーと正式交渉を開始していない」と最新情報で明確化。マドリードは中盤補強候補を5名リストアップ中であり、エンゾはその1人に留まる\n- チェルシーは売却に応じる場合£1億2,000万超を要求する見込み\n- **ソース**：ESPN（A級）、FootballTransfers、readchelsea.com（A+B級）\n\n### 10. マテウス・フェルナンデス（MF, 21歳）ウェスト・ハム → [[トッテナム・ホットスパー]] [信頼度: ★★]【NEW】\n- ウェスト・ハム降格に伴い売却必至。スパーズとマンチェスター・ユナイテッドが争奪戦。ESPN「スパーズが交渉に参入」と報道。選手本人はスパーズを希望\n- ウェスト・ハムは£80〜85mを要求。スパーズは£70〜85mを提示の構え。マドリードも一時関心も選手がスパーズ優先を表明\n- **ソース**：Sky Sports（A級）、ESPN（A級）、Read West Ham（B級）\n\n---\n\n## 🌍 ワールドカップ2026 速報\n\n\u003e **大会概要**：開催国：米国・カナダ・メキシコ｜48カ国・12グループ｜期間：6月11日〜7月19日\n\n---\n\n### 📅 6月24日（水）確定結果\n\n| グループ | 対戦カード | スコア | 注目点 |\n|----------|-----------|--------|--------|\n| **グループB** | **スイス 2-1 カナダ** | 終了 | Vargas 46\u0027・Manzambi 57\u0027（SUI）、P.David 76\u0027（CAN）。スイスがグループB首位でR32へ |\n| **グループB** | **ボスニア 3-1 カタール** | 終了 | Alajbegovic 29\u0027（18歳、ボスニア史上最年少得点）、OG 34\u0027、Mahmic 82\u0027（BIH）；Al-Haydos 42\u0027（QAT）|\n| **グループC** | **ブラジル 3-0 スコットランド** | 終了 | ヴィニシウス・ジュニオール2得点・マテウス・クーニャ1得点。ブラジルが7pts でグループC首位 |\n| **グループC** | **モロッコ 4-2 ハイチ** | 終了 | モロッコが4ptsでR32進出。ハイチは敗退確定 |\n| **グループA** | **メキシコ 3-0 チェコ** | 終了 | Gilberto Mora ら活躍。Ochoa（GK）が記念出場。メキシコが9pts でグループA首位 |\n| **グループA** | **南アフリカ 1-0 韓国** | 終了 | Thapelo Maseko 決勝点。**南アフリカ史上初のワールドカップ決勝トーナメント進出！** |\n\n---\n\n### 📅 6月25日（本日）試合情報\n\n| グループ | 対戦カード | キックオフ(ET) | 状況 |\n|----------|-----------|--------------|------|\n| **グループE** | **コートジボワール vs キュラソー** | 16:00 | MD3（カンザスシティ） |\n| **グループE** | **エクアドル vs ドイツ** | 16:00 | MD3（同時開催） |\n| **グループF** | **日本 vs スウェーデン** | 19:00 | MD3（ダラス） |\n| **グループF** | **オランダ vs チュニジア** | 19:00 | MD3（同時開催） |\n| **グループD** | **トルコ vs アメリカ** | 22:00 | MD3（SoFiスタジアム） |\n| **グループD** | **パラグアイ vs オーストラリア** | 22:00 | MD3（同時開催） |\n\n\u003e ⭐ **グループEの焦点**：ドイツ（6pts・R32確定）はエクアドル戦で消化試合。実質的な注目は**コートジボワール（3pts）vs キュラソー（1pt）**。コートジボワールが勝てばR32確定。エクアドル（1pt）はコートジボワール敗退+自身の勝利が必要で可能性は低い\n\n\u003e ⭐ **グループFの首位決定戦**：**日本（4pts）vs スウェーデン（3pts）**が実質的なグループ2位争い。オランダ（4pts）もGD差で日本と並ぶため、日本にとって重要な一戦。チュニジア（0pts）は敗退確定\n\n\u003e ⭐ **グループD 2位決定戦**：**パラグアイ（3pts）vs オーストラリア（3pts）**が本日最大の注目カード。勝者がR32へ。USA（6pts・1位確定）vsトルコ（0pts・敗退確定）は事実上消化試合\n\n---\n\n### 🔑 グループ別状況（6/25 更新）\n\n**グループA（MD3完了）**\n- **メキシコ 9pts（R32進出・1位）**・**南アフリカ 3pts（R32進出・2位、史上初）**・韓国 3pts（3位・ベスト3位通過候補）・チェコ 3pts（4位・敗退）\n- ▶ R32：メキシコ vs スコットランド（グループC2位）の対戦が確定報道\n\n**グループB（MD3完了）**\n- **スイス 6pts（R32進出・1位）**・**カナダ 4pts（R32進出・2位）**・ボスニア 4pts（3位・ベスト3位通過候補）・カタール 0pts（敗退確定）\n- ▶ R32：カナダ vs 南アフリカ（日曜日予定・CBC確認）\n\n**グループC（MD3完了）**\n- **ブラジル 7pts（R32進出・1位）**・**スコットランド 6pts（R32進出・2位）**・モロッコ 4pts（3位・ベスト3位通過候補）・ハイチ 0pts（敗退確定）\n\n**グループD（MD3 本日開催）**\n- **アメリカ 6pts（R32進出確定・1位）**・パラグアイ 3pts・オーストラリア 3pts・トルコ 0pts（敗退確定）\n- ▶ パラグアイ vs オーストラリアが2位決定戦\n\n**グループE（MD3 本日開催）**\n- **ドイツ 6pts（R32進出確定・1位）**・コートジボワール 3pts・エクアドル 1pt・キュラソー 1pt\n- ▶ コートジボワール vs キュラソーが事実上の2位決定戦\n\n**グループF（MD3 本日開催）**\n- **オランダ 4pts**・**日本 4pts**・スウェーデン 3pts・チュニジア 0pts（敗退確定）\n- ▶ 日本 vs スウェーデンが2位争いの焦点。オランダも同時進行で首位確定を狙う\n\n**グループI（MD2完了）**\n- **フランス 6pts（R32進出確定）**・**ノルウェー 6pts（R32進出確定）**・セネガル 0pts・イラク 0pts\n- ▶ MD3 フランス vs ノルウェーが首位争い（6/27予定）\n\n**グループJ（MD2完了）**\n- **アルゼンチン 6pts（R32進出確定）**・オーストリア 3pts・アルジェリア 3pts・ヨルダン 0pts（敗退確定）\n- ▶ MD3 オーストリア vs アルジェリアが2位決定戦（6/27予定）\n\n**グループK（MD2完了）**\n- **コロンビア 6pts（R32進出確定）**・ポルトガル 4pts・コンゴDR 1pt・ウズベキスタン 0pts（敗退確定）\n- ▶ MD3 コロンビア vs ポルトガル（6/27、マイアミ）が首位決定戦\n\n**グループL（MD2完了）**\n- **イングランド 4pts（GD+2）**・**ガーナ 4pts（GD+1）**・クロアチア 3pts・パナマ 0pts（敗退確定）\n- ▶ MD3 ガーナ vs クロアチアが2位争い（6/27予定）\n\n**グループG（MD2完了）**\n- **エジプト 4pts（GD+2）**・ベルギー 2pts・イラン 2pts・ニュージーランド 1pt\n\n**グループH（MD2完了）**\n- **スペイン 4pts（GD+4）**・ウルグアイ 2pts・カーボベルデ 2pts・サウジアラビア 1pt\n\n---\n\nSources:\n- [Switzerland 2-1 Canada - FIFA](https://www.fifa.com/en/match-centre/match/17/285023/289273/400021451)\n- [Canada falls 2-1 to Switzerland - CBC](https://www.cbc.ca/sports/soccer/worldcup/fifa-canada-world-cup-canada-switzerland-recap-june-24-9.7246842)\n- [Switzerland vs Canada - FOX Sports](https://www.foxsports.com/soccer/fifa-world-c
