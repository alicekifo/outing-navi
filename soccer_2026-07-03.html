<script>
const md = "# ⚽ サッカー移籍情報・ワールドカップ2026 デイリーまとめ\n**2026年7月3日（金）**\n\n---\n\n## ✅ 完了した移籍（直近7日間）\n\n### 1. [[マテウス・フェルナンデス]]（Mateus Fernandes）　ウェストハム → トッテナム\n- **移籍金：£85m（クラブ史上最高額）**\n- **契約年数：非公表**\n- **発表：2026年7月2日**（トッテナム公式）\n- ウェストハム加入からわずか1年での引き抜き。デ・ゼルビ監督とスポーティングディレクター、ヨハン・ランゲが技術・知性・高強度環境での安定感を高く評価してのオファーだったとクラブが説明している。マンチェスター・ユナイテッドとの争奪戦を制した。\n- 出典: [ESPN](https://www.espn.com/soccer/story/_/id/49229881/tottenham-hotspur-sign-mateus-fernandes-west-ham-united-club-record-85m-premier-league-transfer) (2026-07-02)、[Tottenham Hotspur公式](https://www.tottenhamhotspur.com/news/1076042/mateus-fernandes-signs) (2026-07-02) — ✅ S/A級複数確認\n\n### 2. [[ジェレミー・ジャケ]]（Jérémy Jacquet）　レンヌ → リヴァプール\n- **移籍金：£60m（固定£55m＋出来高最大£5m）**\n- **契約年数：5年（＋1年オプション）**\n- **発表：2026年7月1日**\n- チェルシーが同条件を提示していたが本人はアンフィールドを選択。今季初めに肩を負傷していたが既にリハビリを終え、プレシーズンには合流可能と報じられている。\n- 出典: [Sky Sports](https://www.skysports.com/football/news/11669/13559447/jeremy-jacquet-transfer-news-liverpool-sign-rennes-defender-in-lb60m-deal-with-20-year-old-moving-to-anfield-this-summer) (2026-07-01)、[ESPN](https://www.espn.com/soccer/story/_/id/49234752/jeremy-jacquet-liverpool-rennes) (2026-07-01) — ✅ S/A級複数確認\n\n\u003e ⚠️ 前々日の記事で移籍元を「ステード・ランス」と誤記していたが、Sky Sports／ESPNの公式発表報道により**レンヌ**が正しいことを確認・訂正。\n\n---\n\n## ⚡ Here We Go!（合意ほぼ確実）\n\n### 1. [[サンドロ・トナリ]]（Sandro Tonali）　ニューカッスル → トッテナム\n- **移籍金：£100m（固定£92.5m＋出来高£7.5m）　― クラブ史上最高額**\n- **契約：6年、推定週給£275,000超**\n- 7月2日にミランからロンドンへ移動しメディカルチェックを実施中。正式発表は今後数日以内と見込まれる。デ・ゼルビ監督との再合流が決め手になったとロマーノが報道。\n- ソース：Fabrizio Romano（S級）、[Sky Sports](https://www.skysports.com/football/news/11675/13559533/sandro-tonali-tottenham-agree-club-record-lb100m-deal-to-sign-newcastle-midfielder) (2026-07-01)、[Sky Sports](https://www.skysports.com/football/news/11095/13559789/sandro-tonali-roberto-de-zerbi-played-huge-role-in-tottenham-transfer-says-midfielder-ahead-of-lb100m-newcastle-switch) (2026-07-02) — ✅ S/A級複数確認・メディカル進行中のため「完了」未昇格\n\n### 2. [[ルカ・ヴシュコヴィッチ]]（Luka Vušković）　トッテナム → ブライトン\n- **移籍金：約£50m（£46m＋出来高£4m）／トッテナムに20%の転売条項＋優先交渉権**\n- 本人はクロアチア代表としてW杯に出場中だったため正式メディカルを保留していたが、クロアチアが7月2日のラウンド・オブ・32でポルトガルに敗退・大会を終えたため、今後メディカル実施が見込まれる。トッテナムに一度も公式戦出場のないまま売却される見通し。\n- ソース：[Sky Sports](https://www.skysports.com/football/news/11095/13559569/luka-vuskovic-transfer-news-tottenham-defender-set-to-join-brighton-after-improved-bid-accepted) (2026-07-01)、[FOX Sports](https://www.foxsports.com/articles/soccer/brighton-and-tottenham-agree-50m-deal-for-defender-luka-vuskovic-as-spurs-retain-sell-on-clause) (2026-07-01) — ✅ A級複数確認\n\n### 3. [[バズマナ・トゥーレ]]（Bazoumana Touré）　ホッフェンハイム → ニューカッスル\n- **移籍金：€50m前後のパッケージ（ホッフェンハイム史上最高額の放出）**\n- ニューカッスルへの渡航許可済み、メディカルは今週内に予定。アンソニー・ゴードンのバルセロナ移籍に伴う左ウイングの後釜。マンチェスター・U、リヴァプール、アーセナルなども関心を示していたが本人がニューカッスルを選択。\n- ソース：Fabrizio Romano（X、S級） — \"here we go\" 宣言 (2026-07-01)、Sky Sports Germany／Florian Plettenberg（A級） — ✅ S/A級複数確認\n\n---\n\n## 🔵 交渉中・関心あり\n\n### 1. [[イ・ガンイン]]（Lee Kang-in）　PSG → アトレティコ・マドリー　【信頼度：◎ほぼ確実】\n- 個人条件は既に合意。Marcaは「今週中の正式発表」を報道。移籍金は基本料€30m＋出来高で最大額を含む。5年契約（2031年まで）で交渉中。\n- PSGはラモス（→ミラン）、コロ・ムアニの退団も進めており攻撃陣を再編中。代替候補としてASモナコのマギャンス・アクリウシュに接触。\n- 段階：クラブ間交渉最終盤（個人合意済み）\n- ソース：[Marca報道（STARNEWS経由）](https://www.starnewskorea.com/en/sports/2026/07/01/2026070114191566948) (2026-07-01)、[Mundo Deportivo報道（STARNEWS経由）](https://www.starnewskorea.com/en/sports/2026/07/02/2026070220453021848) (2026-07-02) — ○A/B級複数確認\n\n### 2. バルセロナ → [[フリアン・アルバレス]]（Julián Álvarez、アトレティコ・マドリー）　【信頼度：○有力】\n- バルセロナ会長ラポルタが€100m超のオファー提出を公式に認める。アルバレス本人はバルサ移籍を希望と報じられているが、アトレティコは代役確保まで売却しない方針。\n- 段階：入札（アトレティコ拒否中、代替FW確保待ち）\n- ソース：[ESPN](https://www.espn.com/soccer/story/_/id/49236321/barcelona-offer-atletico-madrid-julian-alvarez-stands) (2026-07-01)、[Sky Sports](https://www.skysports.com/football/news/11095/13556913/julian-alvarez-atletico-madrid-striker-says-he-wants-to-leave-club-to-fulfil-his-dream) — ○A級複数確認\n\n### 3. レアル・マドリー ／ [[マイケル・オリーズ]]（Michael Olise、バイエルン・ミュンヘン）　【信頼度：△低い（今夏の実現は困難）】\n- レアルは€220m規模の用意があると報じられるが、両クラブ会長間の「紳士協定」により今夏の移籍は事実上ないとの報道が優勢。バイエルンはW杯後に新契約提示を計画中。\n- 反証：バイエルンは「売却しない」方針を明言、レアルとの間で今夏の移籍回避の紳士協定が存在すると複数メディアが指摘。\n- ソース：[ESPN](https://www.espn.com/soccer/story/_/id/49223257/transfer-rumors-news-michael-olise-asks-bayern-munich-meeting-amid-real-madrid-psg)、[Goal.com](https://www.goal.com/en-us/lists/revealed-terms-real-madrid-record-breaking-michael-olise-bid-bayern-munich-neymar-transfer/bltd41841afe962ebdf) — △A級だが実現性は低いと報道内で明記\n\n---\n\n## 🇯🇵 日本人選手の動向\n\n- 日本代表はW杯ラウンド・オブ・32でブラジルに1-2で敗退（詳細は下記「日本代表詳報」参照）。多くの欧州組は現在オフシーズンのため、クラブでの直近試合情報はなし。\n- [[三笘薫]]（ブライトン）：ハムストリング負傷でW杯出場を逃したが、Sky Sportsによれば本人からクラブへ「今夏はブライトン残留希望」の意向が伝えられたと報道。アーセナル・バイエルンからの関心が伝えられる中での残留志向表明であり、新契約・昇給交渉に入る見通し。\n  - 出典: [Sky Sports](https://www.skysports.com/football/news/11741/13391609/kaoru-mitoma-brighton-winger-wants-to-stay-with-seagulls-and-sign-new-contract-amid-bayern-munich-and-saudi-arabia-interest)\n- 上田綺世（フェイエノールト）、田中碧（リーズ）、鎌田大地（クリスタル・パレス）等に移籍関心報道があるが、出典が単一ブログ・アグリゲーター中心でS/A級による複数裏取りが取れなかったため、本日は掲載を見送り。\n\n---\n\n## 🏆 ワールドカップ2026\n\n大会はラウンド・オブ・32が最終日（7月3日、米国時間）を迎えており、7月4日（米国時間）からラウンド・オブ16が開幕する。詳細は以下の各項目を参照。\n\n### 🌍 昨日の試合結果\n| 対戦 | スコア | メモ |\n|---|---|---|\n| スペイン vs オーストリア | **3-0** | 危なげない完勝で16強入り |\n| ポルトガル vs クロアチア | **2-1** | クリスティアーノ・ロナウドPKで同点、[[ゴンサロ・ラモス]]がAT弾で決勝点。クロアチア敗退 |\n| スイス vs アルジェリア | **2-0** | エムボロ、ンドイエが得点。グループA首位通過のスイスが16強へ |\n\n\u003e ソース：[FIFA公式（ポルトガルvクロアチア）](https://www.fifa.com/en/match-centre/match/17/285023/289287/400021526)、[ESPN（大会リキャップ）](https://www.espn.com/espn/story/_/id/49252833/2026-fifa-world-cup-recap-portugal-croatia-spain-austria-algeria-switzerland)、[CBS Sports（ブラケット・結果一覧）](https://www.cbssports.com/soccer/news/2026-fifa-world-cup-bracket-round-of-32-results-round-of-16-matchups-final/)\n\n### 📅 今日・明日の試合スケジュール\n| 対戦 | ラウンド | キックオフ（JST） | 会場 |\n|---|---|---|---|\n| オーストラリア vs エジプト | R32 | 7/4（土）03:00 JST（7/3 14:00 ET） | AT\u0026Tスタジアム（アーリントン） |\n| アルゼンチン vs カーボベルデ | R32 | 7/4（土）07:00 JST（7/3 18:00 ET） | ハードロックスタジアム（マイアミ） |\n| コロンビア vs ガーナ | R32 | 7/4（土）10:30 JST（7/3 21:30 ET） | アロウヘッドスタジアム（カンザスシティ） |\n| カナダ vs モロッコ | R16開幕戦 | 7/5（日）02:00 JST（7/4 13:00 ET） | NRGスタジアム（ヒューストン） |\n| パラグアイ vs フランス | R16 | 7/5（日）06:00 JST（7/4 17:00 ET） | リンカーン・フィナンシャル・フィールド（フィラデルフィア） |\n\n\u003e 上記3試合（R32）を終えてラウンド・オブ・32の全32チームが出そろい、ラウンド・オブ16の対戦カードが完全確定する見込み。カーボベルデは自国史上初のW杯本大会出場で、初のノックアウト勝利をかけてアルゼンチンと対戦。\n\u003e ソース：[CBS Sports](https://www.cbssports.com/soccer/news/2026-fifa-world-cup-bracket-round-of-32-results-round-of-16-matchups-final/) (2026-07-02)、[pickswise.com（キックオフ時刻）](https://www.pickswise.com/world-cup/news/world-cup-predictions-today-best-bets-for-friday-july-3-inc-argentina-vs-cape-verde-australia-vs-egypt-colombia-vs-ghana/) (2026-07-03)\n\n### 📊 グループ順位表\nグループステージは6月27日に全日程終了済み（各組1位・2位の24チーム＋3位チーム上位8チームの計32チームが決勝トーナメント進出）。現在は決勝トーナメント（ラウンド・オブ32〜16）進行中のため、12組それぞれの最終順位詳細はFIFA公式サイトを参照されたい。\n\u003e ソース：[FIFA公式 順位表](https://www.fifa.com/ja/tournaments/mens/worldcup/canadamexicousa2026/standings)\n\n### 📋 日本代表詳報\n- 日本代表は6月30日（現地時間29日）のラウンド・オブ32でブラジルと対戦し、**1-2で逆転負け**。3大会連続の決勝トーナメント進出も、自身初のベスト8には届かず敗退が確定した。\n- **得点経過**：前半29分、佐野海舟がペナルティエリア手前から右足シュートを決め先制。後半にカゼミーロが同点、アディショナルタイムにガブリエウ・マルティネッリが決勝点。\n- **採点（現地メディア Sports Mole 基準）**：GK鈴木彩艶がヴィニシウス・ジュニオールへの決定的セーブを称賛され日本最高評価級の一角。先制点を決めた佐野海舟がチーム最高評価。谷口彰悟6.5、伊藤洋輝・冨安健洋6.0、伊東純也6.5、前田大然・上田綺世5.0など。\n- **森保一監督コメント**：試合後会見で「ブラジルとの力の差は縮まっている」としつつ、「攻撃も守備も力をつけないと勝てない」と課題を語り、「次の大きな大会はアジアカップ。優勝にフォーカスする」と今後の方針を表明。\n- ソース：[サッカーダイジェストWeb（採点）](https://www.soccerdigestweb.com/news/detail/id=193482) (2026-06-30)、[スポーツ報知/Yahoo!ニュース（採点）](https://news.yahoo.co.jp/articles/f2c95a732ee6c0f99a46581e2521284cf6b17489) (2026-06-30)、[ゲキサカ（森保監督会見）](https://web.gekisaka.jp/news/japan/detail/?454627-454627-fl=) (2026-06-30)\n\n### 🌟 大会ハイライト\n- ラウンド・オブ32では[[キリアン・エムバペ]]がスウェーデン戦で2ゴールを記録するなど得点ランキング上位争いが激化。得点ランキングは情報源により数値が食い違っており（FIFA公式統計ページが本稿執筆時点で取得不可）、確定した最新順位の記載は見送る。最新の得点・アシストランキングはFIFA公式サイトを参照。\n- 米国はボスニア・ヘルツェゴビナ戦（2-0勝利）でフォラリン・バロガンが物議を醸したレッドカードを受け、次戦（ベルギー戦）出場停止に。\n- カーボベルデが自国史上初出場ながらグループステージを突破しラウンド・オブ32へ進出（7/3アルゼンチン戦で初のノックアウト勝利に挑戦）、大会の台風の目の一つとなっている。\n- ソース：[FIFA公式統計ページ](https://www.fifa.com/ja/tournaments/mens/worldcup/canadamexicousa2026/statistics/player-statistics)、[Fox News（バロガン退場）](https://www.foxnews.com/sports/usa-world-cup-star-folarin-balogun-receives-controversial-red-card-during-round-32-match) (2026-07-01)\n\n---\n\n## ⚽ 今週の試合・活躍情報\n\n※本日該当する情報はありません（欧州主要リーグはオフシーズンのため、移籍加入選手のデビュー等の情報なし）。\n\n---\n\n## 📰 The Athletic ピックアップ\n\n※本日、The Athleticの記事を検索経由で確認できなかったため該当情報はありません（サイトの仕様上、検索エンジンから本文・見出しを取得できませんでした）。\n\n---\n\n## 📌 本日のまとめ\n- **移籍**：トッテナムがマテウス・フェルナンデス（£85m）を正式発表しクラブ最高額を更新した翌日、サンドロ・トナリ（£100m）のメディカルも進行中で史上最高額更新が視野に。ニューカッスルはトゥーレ獲得でゴードン放出の穴埋めを進める。\n- **交渉中の目玉**：イ・ガンインのアトレティコ移籍は今週中の正式発表が有力視されている。\n- **WC2026**：ラウンド・オブ32は7月3日が最終日。スペイン・ポルトガル・スイスが16強進出を決め、7月4日からラウンド・オブ16開幕。日本は6月30日にブラジルに敗れ大会を終えている。\n\n---\n\n## ソース一覧\n- [ESPN — Tottenham sign Mateus Fernandes from West Ham in club-record £85m transfer](https://www.espn.com/soccer/story/_/id/49229881/tottenham-hotspur-sign-mateus-fernandes-west-ham-united-club-record-85m-premier-league-transfer)\n- [Tottenham Hotspur公式 — Welcome, Mateus! Fernandes signs](https://www.tottenhamhotspur.com/news/1076042/mateus-fernandes-signs)\n- [Sky Sports — Jeremy Jacquet transfer news: Liverpool sign Rennes defender in £60m deal](https://www.skysports.com/football/news/11669/13559447/jeremy-jacquet-transfer-news-liverpool-sign-rennes-defender-in-lb60m-deal-with-20-year-old-moving-to-anfield-this-summer)\n- [ESPN — French defender Jérémy Jacquet officially joins Liverpool from Rennes](https://www.espn.com/soccer/story/_/id/49234752/jeremy-jacquet-liverpool-rennes)\n- [Sky Sports — Sandro Tonali: Tottenham agree club-record £100m deal](https://www.skysports.com/football/news/11675/13559533/sandro-tonali-tottenham-agree-club-record-lb100m-deal-to-sign-newcastle-midfielder)\n- [Sky Sports — Sandro Tonali: Roberto De Zerbi played huge role in Tottenham transfer](https://www.skysports.com/football/news/11095/13559789/sandro-tonali-roberto-de-zerbi-played-huge-role-in-tottenham-transfer-says-midf p MD22 recap](https://www.espn.com/espn/story/_/id/49252833/2026-fifa-world-cup-recap-portugal-croatia-spain-austria-algeria-switzerland)\n- [CBS Sports — 2026 FIFA World Cup bracket, Round of 32 results, Round of 16 matchups](https://www.cbssports.com/soccer/news/2026-fifa-world-cup-bracket-round-of-32-results-round-of-16-matchups-final/)\n- [Pickswise — World Cup predictions for Friday, July 3](https://www.pickswise.com/world-cup/news/world-cup-predictions-today-best-bets-for-friday-july-3-inc-argentina-vs-cape-verde-australia-vs-egypt-colombia-vs-ghana/)\n- [FIFA公式 順位表](https://www.fifa.com/ja/tournaments/mens/worldcup/canadamexicousa2026/standings)\n- [サッカーダイジェストWeb — 日本代表の採点＆寸評](https://www.soccerdigestweb.com/news/detail/id=193482)\n- [Yahoo!ニュース/スポーツ報知 — 森保ジャパン採点＆寸評](https://news.yahoo.co.jp/articles/f2c95a732ee6c0f99a46581e2521284cf6b17489)\n- [ゲキサカ — 日本vsブラジル 試合後の森保一監督会見要旨](https://web.gekisaka.jp/news/japan/detail/?454627-454627-fl=)\n- [Fox News — Folarin Balogun controversial red card](https://www.foxnews.com/sports/usa-world-cup-star-folarin-balogun-receives-controversial-red-card-during-round-32-match)\n- [FIFA公式 選手統計ページ](https://www.fifa.com/ja/tournaments/mens/worldcup/canadamexicousa2026/statistics/player-statistics)";
