<script>
const md = "# 教養マガジン 2026/7/1\n\n### FIFA ワールドカップ2026 ── 48チームが変えるフットボールの地図\n\n2026年のW杯は史上初めて3カ国（米国・カナダ・メキシコ）が共同開催する大会だ。参加チームも従来の32から48に拡大され、試合数は64から104へと跳ね上がった。グループステージでは「3チームずつ」という新フォーマットが採用された。\n\n「水増しだ」という批判は毎回起きる。1978年の16→24チームも、1998年の24→32チームも同じ声を浴びた。しかし歴史的に見ると、拡大のたびに新興国のサッカー文化が世界の舞台に登場してきた。\n\nホスト都市はニューヨーク、ロサンゼルス、トロント、グアダラハラなど計16都市に及ぶ。欧州開催とは比べ物にならない広域開催は、選手にとっても「サッカーで大陸を旅する」という前例のない体験になっている。\n\n\u003e source: [FIFA.com – FIFA World Cup 2026 Official](https://www.fifa.com/fifaplus/en/tournaments/mens/worldcup/canadamexicousa2026)\n\n---\n\n### テトリスは冷戦の落とし子だった ── ソビエト研究所から届いたパズル\n\n1984年、モスクワのコンピュータセンターに勤める研究者アレクセイ・パジトノフが休暇中に作ったゲームがある。5つの正方形を組み合わせるパズル「ペンタミノ」にヒントを得て、4ブロックの「テトリミノ」を落下させるプログラムを書いた。これがテトリスの原点だ。\n\n当時のソ連では個人の知的財産権が認められず、パジトノフは自分が作ったゲームから一銭も得られなかった。著作権はソ連政府が握り、ゲームは東欧を経由して西側に流出していった。彼が権利を取り戻したのは、ソ連崩壊後の1996年のことだ。\n\nテトリスを世界的ヒットに変えたのは1989年のGame Boy同梱だった。任天堂の山内溥社長が「携帯機には旅先で遊べるパズルが必要だ」と判断し、多数の候補作からテトリスを選んだ。その一決断が、テトリスを史上最も売れたゲームの一つに押し上げた。\n\n\u003e source: [The Tetris Company – History](https://tetris.com/about-us)\n\n---\n\n### 7月1日、カナダは「革命なき独立」をなしとげた\n\n1867年7月1日、英国議会が「英領北アメリカ法」を発効させ、カナダ自治領が誕生した。今日はその159周年にあたる。\n\n米国の独立（1776年）が砲声と革命で達成されたのとは対照的に、カナダの建国は会議室で静かに設計された。オンタリオ、ケベック、ノバスコシア、ニューブランズウィックの4州が連邦を形成し、英国王室との関係を維持したまま自治権を得た。\n\nなぜ革命が起きなかったのか。最大の動機は「南からの脅威」だ。南北戦争（1861–65）を経て膨張するアメリカへの警戒心が、バラバラだった英領植民地を団結させた。外敵の圧力が国民国家を生んだ事例として、カナダ建国は政治学の教科書でも繰り返し引用される。\n\n\u003e source: [Government of Canada – Canada Day](https://www.canada.ca/en/canadian-heritage/campaigns/canada-day.html)\n\n---\n\n### 植物は「悲鳴」をあげる ── 人間には聞こえない超音波の森\n\n植物に声帯はない。しかし2023年にテルアビブ大学の研究チームが発表した論文は世界を驚かせた。乾燥ストレスや茎を切断されたトマトとタバコの株が、20〜100kHzの超音波（人間の可聴域は最高20kHz）を放出することを実測で確認したのだ。\n\n音の正体はキャビテーション（気泡空洞化）だ。植物が茎の中で水を引き上げる際、水柱に気泡が生じてはじける。ストレス下の植物は水の流れが乱れるため、より多くの音が出る。\n\n「植物が叫ぶ」は擬人化しすぎだが、この超音波を昆虫や隣接する植物が感知できる可能性も研究されている。傷ついた植物に草食昆虫が集まりやすい理由の一端かもしれない。人間が「静寂」と感じる森は、可聴域の外側で絶え間なく騒がしいのかもしれない。\n\n\u003e source: [Cell – Plants emit airborne sounds under stress (2023)](https://www.cell.com/cell/fulltext/S0092-8674(23)00262-3)\n\n---\n\n### ダークマター ── 宇宙の27%を占めるのに一度も見えたことがない\n\n宇宙を構成する物質のうち、私たちが「見える」ものは約5%にすぎない。残りは「ダークマター（暗黒物質）」が約27%、「ダークエネルギー」が約68%を占めるとされる。\n\n存在が示唆されたのは1933年、スイスの天文学者フリッツ・ツヴィッキーが銀河団の動きを観測したときだ。目に見える質量だけでは重力が足りないことに気づいた。その後、銀河の回転速度の異常（外縁部が理論値より速く回る）でも裏付けられた。\n\n奇妙なのは、90年以上経っても正体がわからないことだ。光を発さず、吸収もせず、電磁波で検出できない。重力の歪みでしか存在を確認できない。WIMPs（弱く相互作用する重い粒子）やアクシオンなど候補粒子は提唱されているが、直接検出にはまだ誰も成功していない。宇宙の4分の1以上を占めながら、名前にしか「物質」という言葉のない存在──これは現代物理学最大の謎の一つだ。\n\n\u003e source: [NASA – Dark Matter \u0026 Dark Energy](https://science.nasa.gov/astrophysics/focus-areas/what-is-dark-energy/)";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
