<script>
const md = "# マンチェスター・ユナイテッド情報週報（2026-07-22）\n\n\u003e **今週のTLDR**: コネ（Manu Koné）獲得が**正式入札段階へ前進**——Corriere dello Sport発で「£47mの改善入札を7/20週明けに提出へ」。ただしRomano（Fabrizio Romano）は7/20時点でも「代理人接触のみ・クラブ間交渉なし」でイタリア系報道と食い違いが続く。クラブ面では**新スタジアム込みのウォーターサイド再開発マスタープランをトラフォード議会が7/20夜に承認**（7/28から8週間の住民協議へ）。マルティネス（Lisandro Martínez）の太もも負傷は検査結果の公表なし・3週間休暇→8月上旬合流プランが浮上。次戦はローゼンボリ戦（現地7/24・JST 7/25 1:00）でシェシュコ（Benjamin Šeško）復帰の可能性。\n\n---\n\n## ⚽ 直近の試合結果\n\n### 親善試合: マンチェスター・ユナイテッド 0-1 レクサム（現地7/18・ヘルシンキ・中立）※前号・前々号既報\n\n- スミス（Sam Smith）の39分の一撃に沈んだカリック（Michael Carrick）体制初陣。前半4-2-3-1・ハーフタイム21人交代・負傷者ゼロ。詳細は2026-07-20号参照\n- 過去7日以内のクラブの試合はこの1試合のみ。公式戦未開始のためxG・採点等の新規指標なし\n\n出典: [manutd.com 公式レポート](https://www.manutd.com/en/news/report-united-0-wrexham-1) (2026-07-18)\n\n---\n\n## 🔄 移籍・選手動向\n\n### 交渉中: コネが「正式入札」報道まで前進——ただしRomanoとの食い違い継続\n\n- **コネ（Manu Koné／ローマMF・25歳）○有力・段階前進**——Corriere dello Sport発の報道で**「ユナイテッドは£47mの改善入札を月曜（7/20）かその直後に提出する」**。先行報道の「€40m入札拒否」から積み増した形で、シーズン開幕前の決着を目指すとされる。ローマが財政事情から「不本意ながら受け入れ準備」（7/19-20報道）という下地も継続 — [Yardbarker（Corriere経由・改善入札）](https://www.yardbarker.com/soccer/articles/manchester_united_set_to_submit_improved_bid_for_manu_kone/s1_17737_44077769) (2026-07-19) / [GiveMeSport（£47m正式オファー）](https://www.givemesport.com/man-utd-manu-kone-47m-offer/) (2026-07-20) / [The Hard Tackle（ローマ受け入れ）](https://thehardtackle.com/transfer-news/2026/07/20/as-roma-set-to-unwillingly-accept-manu-kone-bid-this-summer/) (2026-07-20)\n- **注意: Romanoは7/20時点でも「コネを高評価し代理人と接触中だが、ローマへの入札もクラブ間交渉もまだない」**と発言しており、イタリア系報道の「入札提出へ」と食い違う（前号のファーディナンド（Rio Ferdinand）「£45m合意」発言との矛盾も未解消）。公式発表・\"Here We Go\"ともになし＝**入札提出は未確認扱い**。求める人物像は「守備的で身体能力があり、プレッシャー下でボールを運べるMF」 — [CaughtOffside（Romano発言）](https://www.caughtoffside.com/2026/07/20/romano-man-united-plans-sign-defensive-midfielder/) (2026-07-20)\n- 選手側は移籍に前向き（Gazzetta dello Sport発「代理人経由で完全な移籍意思を確認」・Bailey（Graeme Bailey）「ユナイテッド行きは本人に大きな魅力」）。競合は前週から継続のチェルシーに加えリバプールの名も — [TEAMtalk（Gazzetta経由）](https://www.teamtalk.com/manchester-united/manu-kone-transfer-news-man-utd-bid-imminent-chelsea-battle) (2026-07-17)\n- **カマヴィンガ（Eduardo Camavinga／レアル・マドリードMF）△望み薄**: Romanoが7/15にコネと並ぶ検討対象として言及したが、本人はマドリード残留希望 — [Football365](https://www.football365.com/news/man-utd-romano-real-madrid-camavinga-kone-roma) (2026-07-15)\n- **ベルゲ（Sander Berge／フラム）・ラーソン（Hugo Larsson）・バルコラ（Bradley Barcola）**: 前号（7/16〜7/20報道）から今週7日以内の新規進展は確認できず。中盤3人目レースはコネ最優先の構図が鮮明に\n- **ヴィテク（Radek Vitek／GK・23歳）**: 退団希望報道（7/20頃）の続報なし\n\n### ラッシュフォード: カリントン復帰が既定路線に\n\n- **解除条項失効（7/15・前号既報）を受け、W杯明けの休暇後にカリントンへ復帰する方向が固まりつつある**。クラブと選手側の話し合いは友好的で、本人もプレシーズン合流を「受け入れている」と報道。バルセロナはゴードン（Anthony Gordon）獲得＋買い取りオプション（£26m）不行使で復帰枠が消滅済み。カリックは受け入れ歓迎の姿勢（プレー・コーチ・暫定監督の全てで接点あり） — [United in Focus（復帰時期）](https://www.unitedinfocus.com/news/when-marcus-rashford-will-return-to-carrington-as-man-utd-star-resigned-to-joining-pre-season/) (2026-07-20頃) / [Yahoo Sports（交渉は友好的）](https://uk.sports.yahoo.com/news/marcus-rashford-transfer-saga-could-122919215.html) (2026-07-20頃)\n\n### ケガ・復帰情報\n\n- **マルティネス**: W杯決勝（7/19）の右太もも負傷。**検査結果の公表はまだなく、離脱期間は依然未定**。W杯組の3週間休暇を経て、8月上旬のアイルランド合宿あたりでの合流が目安との報道（回復次第） — [FootballPlace](https://footballplace.co.uk/lisandro-martinez-injury-manchester-united-world-cup-final/) (2026-07-20頃) / [Sports Mole](https://www.sportsmole.co.uk/football/argentina/injury-news/news/injury-concern-man-united-dealt-fresh-martinez-fitness-blow-after-world-cup-final_601557.html) (2026-07-19頃)\n- **シェシュコ**: すね。カリントンで個別リハビリ継続中で、**復帰目標はローゼンボリ戦（7/24）**。回復に大きな問題はない見込み — [RotoWire](https://www.rotowire.com/soccer/headlines/benjamin-sesko-injury-remains-in-rehab-523611) (2026-07-20頃) / [Roundtable（ローゼンボリ戦負傷者情報）](https://roundtable.io/sports/soccer/premier-league/manchester-united/match-day/martinez-sesko-mainoo-man-utd-injury-latest-vs-rosenborg-pre-season) (2026-07-21頃)\n- **マイヌー（Kobbie Mainoo）**: 背中。復帰は8月上〜中旬見込みで前号から変わらず\n- **デ・リフト（Matthijs de Ligt）**: 背中の負傷で**復帰は10月初旬見込み**との情報（※1ソース段階・クラブ公式の発表は未確認） — [Roundtable](https://roundtable.io/sports/soccer/premier-league/manchester-united/match-day/martinez-sesko-mainoo-man-utd-injury-latest-vs-rosenborg-pre-season) (2026-07-21頃)\n- **ダーロウ（Karl Darlow／GK）**: シーズン後の処置からの回復中。ローゼンボリ戦で復帰の可能性 — 同上\n\n---\n\n## 🧠 戦術・チーム状況\n\n- **カリック体制は4-2-3-1が基調**（レクサム戦で確認・今週は試合がなく新規材料なし）。中盤3人目の獲得が戦術面でも最優先で、求める人物像はRomano発言で「守備的・身体能力・プレッシャー下の運搬力」と具体化——コネのプロファイルと一致する\n- The Athleticのウィットウェル（Laurie Whitwell）・Ornstein（David Ornstein）はクラブの補強方針を「明確なビジョンがある。もう1人の中盤加入を予想する」と解説（7/14時点）。行き当たりばったりでなくプロファイル駆動の補強という評価\n- 直近5試合のxG・被xG・ポゼッション ※該当なし（公式戦未開始・親善試合はxG未公表）\n\n出典: [CaughtOffside（Romano）](https://www.caughtoffside.com/2026/07/20/romano-man-united-plans-sign-defensive-midfielder/) (2026-07-20) / [TEAMtalk（Whitwell/Ornstein）](https://www.teamtalk.com/manchester-united/man-utd-transfer-news-aurelien-tchouameni-carlos-baeba-kone-david-ornstein) (2026-07-14)\n\n---\n\n## 📅 今後の試合予定\n\n| 日程（JST） | 大会 | 対戦相手 | 会場 |\n|---|---|---|---|\n| 7/25(土) 1:00（英7/24 17:00） | 親善 | ローゼンボリ | レルケンダール・スタディオン（トロンハイム） |\n| 8/1(土) 22:00（英8/1 14:00） | 親善 | アトレティコ・マドリード | ストックホルム（中立） |\n| 8/9(日) 0:00（英8/8 16:00） | 親善 | パリ・サンジェルマン | ヨーテボリ（中立） |\n\n- **ローゼンボリ戦の見どころ**: カリック体制2戦目。①**シェシュコの復帰第1戦なるか**（個別リハビリからの合流目標がこの試合）②レクサム戦は「復帰10日」の調整段階だったため主力組の稼働時間が延びるか③ダーロウ・JJガブリエル（JJ Gabriel）の可用性。W杯組（マルティネス、マイヌー、ムベウモ（Bryan Mbeumo）ら）の合流はまだ先\n- 以降はリーズ（8/12ダブリン）、ACミラン（8/15ヴロツワフ）と続く\n\n出典: [ESPN 試合ページ](https://www.espn.com/soccer/match/_/gameId/401869196/manchester-united-rosenborg) / [manutd.com プレシーズンガイド](https://www.manutd.com/en/news/game-by-game-united-pre-season-fixture-list-2026)\n\n---\n\n## 🏟️ クラブ情報\n\n- **新スタジアム計画が公的承認の第一関門を通過**: トラフォード議会の執行委員会が**7/20（月）夜、10万人収容スタジアムを核とするトラフォード・ウォーターサイド再開発マスタープランを承認**。英政府の再開発支援表明を受けた決定で、次のステップは**7/28〜9/22の8週間の住民協議**。計画は15年がかりで新スタジアム（現オールド・トラッフォードの北西約350m）＋住宅15,000戸＋雇用48,000人創出＋地域経済に年£4.2bn（クラブ側発表ベースでは英経済全体に£7.3bn）をうたう — [ESPN（議会承認）](https://africa.espn.com/football/story/_/id/43598986/man-united-new-stadium-plans-approved-trafford-council) (2026-07-21頃) / [Trafford Council 公式](https://www.trafford.gov.uk/wharfside) (2026-07-20)\n- 今週7日以内の新規フロント人事・財務（PSR/FFP）ニュースは※該当なし\n\n---\n\n## 📰 The Athletic ピックアップ\n\n※当号もtheathletic.comの直接検索が結果を返さず（クローラーアクセス不可）、他媒体経由で確認できたThe Athletic発の報道を紹介（リンクは引用元）\n\n1. **Ornstein: コネ獲得は「excellent」**（7/16）: 「多くの報道がユナイテッドのコネ調査を伝えている。実現すればexcellentだと思う」。ローマの評価額を£43m前後とし、バレバ（Carlos Baleba）やスコット（Alex Scott）ら代替候補より予算に合うと分析。今週の入札報道（£47m）とも整合する水準感 — [utdreport経由](https://utdreport.co.uk/2026/07/16/manchester-united-david-ornstein-manu-kone-as-roma/) (2026-07-16)\n2. 直近4日以内（7/18以降）で確認できた新規のThe Athletic発スクープ・長文特集は※該当なし（上記1は窓外だが今週のコネ入札報道の文脈で参考掲載。水増しせず該当分のみ）";
