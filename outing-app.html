<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>おでかけナビ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0c0c10;--surface:#161620;--surface2:#1e1e2c;--surface3:#252535;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--accent:#e8b84b;--accent-dim:rgba(232,184,75,0.13);--blue:#6aadff;--blue-dim:rgba(106,173,255,0.12);--green:#52d68a;--green-dim:rgba(82,214,138,0.12);--purple:#a78bfa;--purple-dim:rgba(167,139,250,0.12);--red:#f07070;--text:#eeeef5;--text2:#8888a8;--text3:#44445a;--r:14px;--r-lg:20px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow:hidden;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .25s;}
.screen.active{opacity:1;pointer-events:all;}
.app-header{padding:16px 20px 0;flex-shrink:0;position:relative;z-index:10;}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.5px;}
.logo em{color:var(--accent);font-style:normal;}
.loc-pill{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--text2);cursor:pointer;transition:border-color .2s;}
.loc-pill:hover{border-color:var(--accent);color:var(--accent);}
.loc-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}
.tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:14px;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab-btn.on{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.scroll-body{flex:1;overflow-y:auto;padding:0 20px 90px;scrollbar-width:none;}
.scroll-body::-webkit-scrollbar{display:none;}
.section{display:none;}.section.visible{display:block;}
.weather-card{background:linear-gradient(135deg,#141c30 0%,#0f1520 60%,var(--surface) 100%);border:1px solid rgba(106,173,255,.18);border-radius:var(--r-lg);padding:20px;margin-bottom:22px;position:relative;overflow:hidden;}
.weather-card::after{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(106,173,255,.12) 0%,transparent 70%);border-radius:50%;pointer-events:none;}
.weather-top{display:flex;justify-content:space-between;align-items:flex-start;}
.weather-left{display:flex;align-items:center;gap:14px;}
.weather-emoji{font-size:46px;}
.weather-temp{font-family:'Syne',sans-serif;font-size:46px;font-weight:700;color:var(--blue);line-height:1;}
.weather-temp sup{font-size:18px;font-weight:400;}
.weather-sub{font-size:12px;color:var(--text2);margin-top:3px;}
.weather-right{text-align:right;}
.weather-lbl{font-size:10px;color:var(--text3);}
.weather-date{font-size:13px;font-weight:500;margin-top:2px;}
.weather-stats{display:flex;gap:14px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap;}
.weather-stat{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:5px;}
.weather-stat b{color:var(--text);font-weight:500;}
.umbrella-badge{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:7px 14px;border-radius:10px;font-size:12px;font-weight:700;}
.umbrella-badge.need{background:rgba(106,173,255,.15);color:var(--blue);border:1px solid rgba(106,173,255,.3);}
.umbrella-badge.noneed{background:var(--green-dim);color:var(--green);border:1px solid rgba(82,214,138,.3);}
.forecast-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.forecast-row::-webkit-scrollbar{display:none;}
.forecast-day{flex-shrink:0;text-align:center;background:var(--surface2);border-radius:10px;padding:10px 12px;min-width:56px;}
.fc-day{font-size:10px;color:var(--text2);}
.fc-icon{font-size:20px;margin:4px 0;}
.fc-hi{font-size:13px;font-weight:700;}
.fc-lo{font-size:11px;color:var(--text2);}
.fc-rain{font-size:10px;color:var(--blue);margin-top:2px;}
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.sec-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px;}
.sec-title .ico{font-size:16px;}
.see-all{font-size:11px;color:var(--blue);border:none;background:none;font-family:inherit;cursor:pointer;}
.chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:5px 12px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Noto Sans JP',sans-serif;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.chip.on{background:var(--surface2);color:var(--text);border-color:var(--border2);}
.rest-list{display:flex;flex-direction:column;gap:10px;margin-bottom:26px;}
.rest-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .2s;display:flex;gap:12px;align-items:flex-start;}
.rest-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3);}
.rest-thumb{width:60px;height:60px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden;background:var(--surface2);}
.rest-thumb img{width:100%;height:100%;object-fit:cover;border-radius:10px;}
.rest-info{flex:1;min-width:0;}
.rest-name{font-size:13px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rest-meta{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap;}
.rest-genre{font-size:10px;color:var(--text2);background:var(--surface2);padding:2px 7px;border-radius:5px;}
.rest-dist{font-size:10px;color:var(--text2);}
.rest-rating{display:flex;align-items:center;gap:4px;font-size:11px;}
.stars{color:var(--accent);}
.rest-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:7px;}
.price{font-size:12px;font-weight:700;color:var(--green);}
.open-tag{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500;}
.open-tag.open{background:var(--green-dim);color:var(--green);}
.open-tag.close{background:rgba(240,112,112,.1);color:var(--red);}
.open-tag.unknown{background:var(--surface2);color:var(--text2);}
.evt-list{display:flex;flex-direction:column;gap:10px;margin-bottom:26px;}
.evt-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .2s;display:flex;gap:12px;}
.evt-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.evt-date{flex-shrink:0;width:46px;text-align:center;background:var(--surface2);border-radius:10px;padding:8px 4px;}
.evt-m{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
.evt-d{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;line-height:1.1;}
.evt-info{flex:1;min-width:0;}
.evt-name{font-size:13px;font-weight:700;margin-bottom:3px;}
.evt-place{font-size:11px;color:var(--text2);margin-bottom:6px;}
.evt-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;}
.evt-tag{font-size:9px;padding:2px 7px;border-radius:5px;border:1px solid var(--border2);color:var(--text2);}
.evt-tag.free{border-color:rgba(82,214,138,.3);color:var(--green);}
.evt-tag.paid{border-color:rgba(232,184,75,.3);color:var(--accent);}
.evt-fee{font-size:12px;font-weight:700;}
.evt-fee.free{color:var(--green);}
.evt-fee.paid{color:var(--accent);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:24px 20px 40px;scrollbar-width:none;position:relative;}
.modal::-webkit-scrollbar{display:none;}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px;}
.modal-close{position:absolute;top:20px;right:20px;background:var(--surface2);border:none;color:var(--text2);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.modal-title{font-size:18px;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:16px;}
.modal-section{margin-bottom:18px;}
.modal-section-title{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:.5px;margin-bottom:8px;text-transform:uppercase;}
.review-item{background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:8px;}
.review-author{font-size:11px;font-weight:700;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
.review-text{font-size:12px;color:var(--text2);line-height:1.6;}
.modal-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:12px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:10px;transition:opacity .2s;}
.modal-btn:hover{opacity:.85;}
.modal-btn.maps{background:#4285f4;color:#fff;}
.modal-btn.save{background:var(--green-dim);color:var(--green);border:1px solid rgba(82,214,138,.3);}
.modal-btn.site{background:var(--surface2);color:var(--text);}
.modal-btn.share{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(167,139,250,.3);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.info-cell{background:var(--surface2);border-radius:10px;padding:10px 12px;}
.info-cell-lbl{font-size:10px;color:var(--text2);margin-bottom:3px;}
.info-cell-val{font-size:13px;font-weight:700;}
.hours-list{font-size:12px;color:var(--text2);line-height:2;}
.route-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:18px;}
.route-label{font-size:10px;color:var(--text2);margin-bottom:5px;letter-spacing:.5px;}
.route-input-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.route-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.route-dot.start{background:var(--green);box-shadow:0 0 8px var(--green);}
.route-dot.end{background:var(--red);box-shadow:0 0 8px var(--red);}
.route-input-wrap{flex:1;position:relative;}
.route-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 40px 10px 14px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.route-input:focus{border-color:var(--border2);}
.route-input::placeholder{color:var(--text3);}
.gps-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;padding:4px;}
.route-connector{width:1px;height:16px;background:var(--border2);margin:0 auto 10px;position:relative;left:15px;}
.route-search-btn{width:100%;padding:12px;background:var(--accent);color:#000;border:none;border-radius:10px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:4px;}
.route-search-btn:hover{opacity:.85;}
.route-result{display:none;}.route-result.show{display:block;}
.route-summary{background:linear-gradient(135deg,#141c20,#101820);border:1px solid rgba(82,214,138,.2);border-radius:var(--r);padding:16px;margin-bottom:18px;display:flex;gap:14px;align-items:center;}
.route-line{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;}
.route-line-dot{width:8px;height:8px;border-radius:50%;}
.route-line-dot.s{background:var(--green);}
.route-line-dot.e{background:var(--red);}
.route-line-bar{width:2px;height:24px;background:linear-gradient(to bottom,var(--green),var(--red));}
.route-stats{display:flex;gap:16px;}
.route-stat{text-align:center;}
.route-stat-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;}
.route-stat-lbl{font-size:10px;color:var(--text2);}
.cost-card{background:var(--accent-dim);border:1px solid rgba(232,184,75,.2);border-radius:var(--r);padding:16px;margin-bottom:18px;}
.cost-title{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:12px;}
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(232,184,75,.1);}
.cost-row:last-child{border-bottom:none;}
.cost-lbl{font-size:12px;color:var(--text2);}
.cost-val{font-size:13px;font-weight:700;}
.cost-total{color:var(--accent);font-size:16px !important;}
.stop-section-title{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.stop-num{width:22px;height:22px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.ai-card{background:linear-gradient(135deg,rgba(167,139,250,.1),rgba(106,173,255,.08));border:1px solid rgba(167,139,250,.25);border-radius:var(--r-lg);padding:18px;margin-bottom:18px;}
.ai-title{font-size:13px;font-weight:700;color:var(--purple);margin-bottom:12px;}
.ai-loading{font-size:12px;color:var(--text2);text-align:center;padding:20px 0;}
.ai-plan-step{display:flex;gap:10px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.ai-plan-step:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.ai-step-time{flex-shrink:0;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--accent);min-width:48px;}
.ai-step-title{font-size:13px;font-weight:700;margin-bottom:2px;}
.ai-step-desc{font-size:11px;color:var(--text2);line-height:1.6;}
.ai-step-cost{font-size:11px;color:var(--green);margin-top:3px;}
.ai-gen-btn{width:100%;padding:11px;background:var(--purple-dim);color:var(--purple);border:1px solid rgba(167,139,250,.3);border-radius:10px;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:4px;}
.hist-list{display:flex;flex-direction:column;gap:10px;margin-bottom:26px;}
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.hist-date{font-size:11px;color:var(--text2);}
.hist-cost{font-size:14px;font-weight:700;color:var(--accent);}
.hist-route{font-size:13px;font-weight:700;margin-bottom:6px;}
.hist-spots{display:flex;gap:5px;flex-wrap:wrap;}
.hist-spot{font-size:10px;background:var(--surface2);padding:2px 8px;border-radius:5px;color:var(--text2);}
.add-hist-btn{width:100%;padding:12px;background:var(--surface);border:1px dashed var(--border2);border-radius:var(--r);color:var(--text2);font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;margin-bottom:20px;}
.add-hist-btn:hover{border-color:var(--accent);color:var(--accent);}
.bm-list{display:flex;flex-direction:column;gap:10px;margin-bottom:26px;}
.bm-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .2s;}
.bm-card:hover{border-color:var(--border2);}
.bm-name{font-size:13px;font-weight:700;margin-bottom:3px;}
.bm-meta{font-size:11px;color:var(--text2);}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(12,12,16,.96);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 22px;z-index:200;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 20px;border-radius:12px;transition:all .2s;border:none;background:none;}
.nav-ico{font-size:20px;color:var(--text2);transition:color .2s;}
.nav-lbl{font-size:9px;color:var(--text2);transition:color .2s;letter-spacing:.3px;}
.nav-btn.on .nav-ico,.nav-btn.on .nav-lbl{color:var(--accent);}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:10px 20px;font-size:12px;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.hist-form-group{margin-bottom:14px;}
.hist-form-label{font-size:11px;color:var(--text2);margin-bottom:5px;display:block;}
.hist-form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;}
.hist-form-input:focus{border-color:var(--border2);}
.hist-form-btn{width:100%;padding:12px;background:var(--accent);color:#000;border:none;border-radius:10px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;}
.loading-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;text-align:center;color:var(--text2);font-size:12px;}
.server-status{display:inline-flex;align-items:center;gap:5px;font-size:10px;padding:3px 8px;border-radius:8px;margin-left:8px;}
.server-status.online{background:var(--green-dim);color:var(--green);}
.server-status.offline{background:rgba(240,112,112,.1);color:var(--red);}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px;}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="app-header">
    <div class="header-row">
      <div class="logo">おでかけ<em>ナビ</em><span class="server-status offline" id="server-badge">● オフライン</span></div>
      <div class="loc-pill" onclick="getCurrentLocation('home')">
        <div class="loc-dot"></div>
        <span id="home-loc-label">現在地を取得</span>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn on" onclick="homeTab('all',this)">すべて</button>
      <button class="tab-btn" onclick="homeTab('food',this)">🍜 グルメ</button>
      <button class="tab-btn" onclick="homeTab('event',this)">🎪 イベント</button>
      <button class="tab-btn" onclick="homeTab('weather',this)">🌤 天気</button>
    </div>
  </div>
  <div class="scroll-body">
    <div class="section visible" id="h-weather">
      <div id="weather-container"><div class="loading-card">📍 現在地を取得すると天気が表示されます</div></div>
    </div>
    <div class="section visible" id="h-food">
      <div class="sec-head">
        <div class="sec-title"><span class="ico">🍜</span>近くのご飯屋さん</div>
        <button class="see-all" onclick="loadNearbyPlaces(currentFoodType)">更新</button>
      </div>
      <div class="chips">
        <button class="chip on" onclick="filterFood(this,'restaurant')">🍽 レストラン</button>
        <button class="chip" onclick="filterFood(this,'cafe')">☕ カフェ</button>
        <button class="chip" onclick="filterFood(this,'bar')">🍺 バー</button>
        <button class="chip" onclick="filterFood(this,'fast_food')">🍔 ファスト系</button>
      </div>
      <div class="rest-list" id="home-rest-list">
        <div class="loading-card">📍 現在地を取得するとお店が表示されます</div>
      </div>
    </div>
    <div class="section visible" id="h-event">
      <div class="sec-head">
        <div class="sec-title"><span class="ico">🎪</span>今週末のイベント</div>
      </div>
      <div class="evt-list" id="home-evt-list"></div>
    </div>
  </div>
</div>

<!-- ROUTE -->
<div class="screen" id="screen-route">
  <div class="app-header">
    <div class="header-row">
      <div class="logo">おでかけ<em>ナビ</em></div>

// ===== PRICE LEVEL =====
function priceLevelText(level){
  const map={1:'〜¥1,000',2:'¥1,000〜3,000',3:'¥3,000〜5,000',4:'¥5,000〜'};
  return map[level]||'価格情報なし';
}

// ===== STARS =====
function starsHtml(r){
  if(!r)return'☆☆☆☆☆';
  const full=Math.floor(r);
  const half=r-full>=0.5;
  return'★'.repeat(full)+(half?'½':'')+'☆'.repeat(5-full-(half?1:0));
}

// ===== EMOJI BY TYPE =====
const CUISINE_EMOJI={sushi:'🍣',ramen:'🍜',izakaya:'🏮',italian:'🍝',french:'🥐',chinese:'🥢',korean:'🍖',curry:'🍛',pizza:'🍕',udon:'🍜',soba:'🍜',yakiniku:'🔥',tempura:'🍤',tonkatsu:'🥩',cafe:'☕',bar:'🍺',fast_food:'🍔'};
function getPlaceEmoji(place){
  const types=place.types||[];
  if(types.includes('cafe'))return'☕';
  if(types.includes('bar'))return'🍺';
  if(types.includes('fast_food'))return'🍔';
  return'🍽';
}

// ===== WEATHER =====
function weatherIcon(code){
  if(code>=200&&code<300)return'⛈';if(code>=300&&code<400)return'🌦';
  if(code>=500&&code<600)return'🌧';if(code>=600&&code<700)return'🌨';
  if(code>=700&&code<800)return'🌫';if(code===800)return'☀️';
  if(code===801)return'🌤';if(code===802)return'⛅';return'☁️';
}

async function fetchWeather(lat,lng){
  try{
    const res=await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lng}&appid=${WEATHER_KEY}&units=metric&lang=ja&cnt=40`);
    const data=await res.json();
    if(data.cod!=='200')throw new Error();
    return data;
  }catch(e){return null;}
}

async function renderHomeWeather(lat,lng,locationName){
  const container=document.getElementById('weather-container');
  const data=await fetchWeather(lat,lng);
  if(!data){container.innerHTML=`<div class="loading-card">天気の取得に失敗しました</div>`;return;}
  const cur=data.list[0];
  const temp=Math.round(cur.main.temp);
  const desc=cur.weather[0].description;
  const icon=weatherIcon(cur.weather[0].id);
  const pop=Math.round((cur.pop||0)*100);
  const wind=cur.wind.speed.toFixed(1);
  const humidity=cur.main.humidity;
  const umbrella=pop>=40;
  const days={};
  const DN=['日','月','火','水','木','金','土'];
  data.list.forEach(item=>{
    const d=new Date(item.dt*1000);
    const key=d.toLocaleDateString('ja-JP');
    if(!days[key])days[key]={icon:weatherIcon(item.weather[0].id),hi:item.main.temp_max,lo:item.main.temp_min,pop:Math.round((item.pop||0)*100),dow:DN[d.getDay()]};
    else{days[key].hi=Math.max(days[key].hi,item.main.temp_max);days[key].lo=Math.min(days[key].lo,item.main.temp_min);}
  });
  const fc=Object.values(days).slice(1,6);
  const now=new Date();
  const dateStr=`${now.getMonth()+1}月${now.getDate()}日（${DN[now.getDay()]}）`;
  container.innerHTML=`
    <div class="weather-card">
      <div class="weather-top">
        <div class="weather-left">
          <div class="weather-emoji">${icon}</div>
          <div><div class="weather-temp">${temp}<sup>°C</sup></div><div class="weather-sub">${desc}</div></div>
        </div>
        <div class="weather-right">
          <div class="weather-lbl">今日</div>
          <div class="weather-date">${dateStr}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px;">${locationName}</div>
        </div>

// ===== GPS =====
function getCurrentLocation(target){
  if(!navigator.geolocation){showToast('⚠️ 位置情報が使えません');return;}
  showToast('📍 位置情報取得中...');
  navigator.geolocation.getCurrentPosition(async pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    currentLat=lat;currentLng=lng;
    let label='現在地';
    try{
      const stations=await fetchNearbyPlaces(lat,lng,'train_station',1000);
      if(stations.length){
        label=stations[0].name;
      } else {
        const res=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ja`);
        const data=await res.json();
        const addr=data.address;
        label=addr.suburb||addr.neighbourhood||addr.city_district||addr.city||'現在地';
      }
    }catch(e){}
    document.getElementById('home-loc-label').textContent=label;
    if(target==='route')document.getElementById('inp-start').value=label;
    showToast(`📍 ${label}`);
    if(target==='home'){
      renderHomeWeather(lat,lng,label);
      loadNearbyPlaces(currentFoodType);
      loadLocationEvents(lat,lng,label);
    }
  },()=>{showToast('⚠️ 位置情報の取得に失敗しました');});
}

async function loadLocationEvents(lat,lng,areaName){
  const evtList=document.getElementById('home-evt-list');
  evtList.innerHTML='<div class="loading-card"><span class="spinner"></span>周辺イベントを検索中...</div>';
  if(!serverOnline){evtStore=EVENTS;evtList.innerHTML=evtStore.map(renderEvtCard).join('');return;}
  try{
    const stations=await fetchNearbyPlaces(lat,lng,'train_station',25000);
    const areaKeywords=[areaName,...stations.slice(0,8).map(s=>s.name)].join(',');
    const res=await fetch(`${SERVER}/api/events?area=${encodeURIComponent(areaKeywords)}`,{headers:{'ngrok-skip-browser-warning':'true'}});
    const data=await res.json();
    if(data.events&&data.events.length){
      evtStore=data.events;
      evtList.innerHTML=evtStore.map(renderEvtCard).join('');
      document.getElementById('route-evt-list').innerHTML=evtStore.slice(0,2).map(renderEvtCard).join('');
    } else {
      evtStore=EVENTS;
      evtList.innerHTML='<div class="loading-card">周辺のイベントが見つかりませんでした</div>';
    }
  }catch(e){
    evtStore=EVENTS;
    evtList.innerHTML=evtStore.map(renderEvtCard).join('');
  }
}

// ===== AI PLAN =====
async function generateAIPlan(){
  const s=document.getElementById('inp-start').value||'渋谷';
  const e=document.getElementById('inp-end').value||'鎌倉';
  const el=document.getElementById('ai-plan-content');
  el.innerHTML=`<div class="ai-loading"><span class="spinner"></span>AIがプランを考え中...</div>`;
  try{
    if(!GROQ_KEY){showToast('⚙️ 設定からGroq APIキーを入力してください');el.innerHTML='';return;}
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${GROQ_KEY}`},
      body:JSON.stringify({
        model:'llama-3.1-8b-instant',
        max_tokens:1000,
        messages:[{role:'user',content:`出発地「${s}」から目的地「${e}」への1日おでかけプランを提案。朝出発・昼食・観光・夕食の流れで4〜5ステップ。各ステップに実際の日本円の費用目安を含め、最後のステップにその日の合計費用を記載。JSONのみ返してください: {"steps":[{"time":"10:00","title":"具体的な場所名","desc":"内容と特徴を1〜2文","cost":"¥1,000〜2,000"}]}`}]
      })
    });
    const data=await res.json();
    if(data.error){throw new Error(data.error.message||'API error');}
    const text=data.choices?.[0]?.message?.content||'';
    if(!text)throw new Error('empty response');
    const jsonStr=text.replace(/```json|```/g,'').trim();
    const match=jsonStr.match(/\{[\s\S]*\}/);
    if(!match)throw new Error('no JSON found');
    const plan=JSON.parse(match[0]);
    el.innerHTML=`<div>${plan.steps.map(s=>`
      <div class="ai-plan-step">
        <div class="ai-step-time">${s.time}</div>
        <div><div class="ai-step-title">${s.title}</div><div class="ai-step-desc">${s.desc}</div><div class="ai-step-cost">💴 ${s.cost}</div></div>
      </div>`).join('')}</div>
      <button class="ai-gen-btn" onclick="generateAIPlan()" style="margin-top:8px;">🔄 別のプランを提案</button>`;
  }catch(err){
    el.innerHTML=`<div style="font-size:12px;color:var(--text2);text-align:center;padding:12px;">生成に失敗しました<br><small style="color:#f87171;">${err.message}</small><br><button class="ai-gen-btn" onclick="generateAIPlan()" style="margin-top:8px;">再試行</button></div>`;
  }
}

function homeTab(tab,btn){

}
