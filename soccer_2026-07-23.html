<script>
const md = "# サッカー移籍情報 — 2026年7月23日号\n\n\u003e ⚠️ **補填注記**: 「最終チャット出力=記事本文」方式は07-20号から4号連続で有効。前号（07-22）の保存状態は本号生成時に実測確認済み（15,301バイト・1行目`#`・記事本文で正常保存）。ただし07-21・07-22のバックアップ（work\\news_backup）が2号連続で未作成だったため、本号窓が07-22正本から補填コピー済み（cmp一致）。本号も同方式＋2点保存で生成する。\n\n---\n\n## 今日のハイライト\n\n1. **[[ロジャーズ]]（アストン・ヴィラ → チェルシー・£117M）が7/21に正式発表**——チェルシー公式サイトが加入を発表。6年契約（2032年まで）+1年クラブOP。イングランド人史上最高額＋チェルシーのクラブレコード。「Here We Go!」欄から完了欄へ昇格\n2. **[[カゼミロ]]（マンチェスター・ユナイテッド → インテル・マイアミ・フリー）が7/22に加入発表**——Sky Sports確認。2027年MLSシーズン終了までの契約+2029年までの延長OP。ブスケッツの後継アンカーとしてメッシらに合流\n3. **[[ロメロ]]（トッテナム）の今夏退団をRomanoが確定報**——「100%退団する」。インテルがクラブ間交渉中、バルセロナはDF売却が先決条件。本人の希望はバルサ。目線は£40M（一部報道）\n4. **[[ガルナチョ]]→[[アストン・ヴィラ]]が前進**——Romano「買取義務付きローンの正式オファーはローマ案より発動条件が軽く、残るは本人の最終GO」。[[チェルシー]]の売却目線€50M（£42.7M）は不変\n5. **[[ツォリス]]のアーセナル加入発表は本日（水曜）見込み**——火曜ロンドン入りの報道。クロップの[[ドイツ代表]]監督就任は明日金曜（7/24）フランクフルトで契約サイン＋発表の段取り継続\n\n---\n\n## 1. 完了した移籍（発表日が7/16〜7/23のもの）\n\n| # | 選手 | 移籍元 → 移籍先 | 移籍金 | 契約 | 発表日 |\n|---|------|----------------|--------|------|--------|\n| 1 | [[ロジャーズ]] | アストン・ヴィラ → [[チェルシー]] | £117M（€137M） | 6年（2032年まで）+1年OP | 7/21 |\n| 2 | [[カゼミロ]] | マンチェスター・ユナイテッド → インテル・マイアミ | フリー | 2027年MLS終了まで+延長OP（2029年まで） | 7/22 |\n| 3 | [[アプソン]] | トッテナム → [[アーセナル]] | フリー | 非公表 | 7/21 |\n| 4 | [[ジョアン・ゴメス]] | ウォルバーハンプトン → アストン・ヴィラ | £38M（€40M） | 非公表 | 7/20 |\n| 5 | [[アセコ]] | バイエルン → フランクフルト | €12M（報道により〜€13M） | 2031年まで | 7/18 |\n| 6 | [[マンザンビ]] | フライブルク → アストン・ヴィラ | £59.5M（€70M・アドオン込） | 5年 | 7/17 |\n| 7 | [[ムハレモビッチ]] | サッスオーロ → リーズ | €40M（£34.1M） | 5年（2031年まで） | 7/17 |\n| 8 | [[エステーブ]] | バーンリー → RBライプツィヒ | €25M+ボーナス | 2031年まで | 7/17 |\n| 9 | [[オーバメヤン]] | マルセイユ → デポルティボ | €1.5M | 2028年まで | 7/17 |\n\n**各件の補足:**\n\n- **#1と#2が本日の新規昇格**。[[ロジャーズ]]はチェルシー公式＋Sky Sportsの二重確認。アンダーソン（→[[マンチェスター・シティ]]£116M）を抜くイングランド人史上最高額で、シャビ・アロンソ新体制の目玉。[[カゼミロ]]はユナイテッドが契約延長OPを行使せず6/30に契約満了→フリーでMLSへ。インテル・マイアミはLAギャラクシーが保持していたディスカバリー権の補償（最大£75万と報道）を支払って獲得\n- #3〜9は前号からの再掲（いずれもクラブ公式ないしS/A級で確認済み）。**前号掲載の7/15発表2件（[[トロサール]]→ベシクタシュ・[[ムニエ]]→サンダーランド）は7日ガードにより本号から除外**——案件自体は完了済みで有効\n- ※日付ガードによる除外（参考）: **[[サイバリ]]（PSV → バイエルン・€50〜55M・2031年まで）はバイエルン公式確認済みの完了案件だが発表が7/1のためガード外**。W杯で覚醒したモロッコ代表MFで、大会終了に伴いミュンヘン合流へ\n- 7/22のその他の完了（小型案件）: ランクシアー（トッテナム→ミドルズブラ・€11.7M）、[[ディオプ]]（フラム→イプスウィッチ・€10M）、ダカ（レスター→ハンブルク・フリー）等がFootballTransfersのdone dealsリストに掲載されているが、S/A級2件の裏取りが揃わないため表への採用は見送り\n\n---\n\n## 2. Here We Go!（合意ほぼ確実）\n\n1. **クロップ → [[ドイツ代表]]監督**（4日目・明日金曜7/24正式発表へ）\n   - **金曜にフランクフルトで契約サイン＋正式発表**の段取りを複数媒体が引き続き報道。レッドブル・グループとの契約解消は「寛大な（generous）」条件で合意済みとGoalが報道——最後のハードルはクリア\n   - 契約は2030年W杯まで。ナーゲルスマン（パラグアイ戦ベスト32敗退で辞任）の後任として、ユーロ2028も指揮する\n2. **[[ツォリス]] → アーセナル**（3日目・本日発表見込み）\n   - **火曜にロンドン入り→水曜（本日）に発表の見込み**とアーセナル系媒体が報道。ブルッヘ監督も放出を公認済み（SI確認）。クラブ間合意£34M（€40M）は不変\n   - 今夏3人目の獲得。[[トロサール]]後継の24歳ギリシャ代表WG。本人は他クラブを断ってアーセナル一本\n3. **[[ビシウ]] → バルセロナ**（2日目・書類完了待ち）\n   - クラブ・ブルッヘとの最終合意（€8.5M＋20%セルオン）を複数媒体が確認。**書類手続き完了後、数日中に公式発表の見込み**\n   - 18歳ベルギーの逸材WG。まずはバルサ・アトレティック配属、2026-27中のトップ昇格機会あり\n4. **[[シュラーガー]] → ノッティンガム・フォレスト**（9日目・留め置き継続）\n   - The Athleticが「2年+1年OPで加入へ（set to sign）」を確認、ジャンクサイトの「発表済み」流通も続くが、**フォレスト公式・S/A級での正式発表確認は本日も取れず**（ESPNも「set to sign」を維持）\n   - フリー移籍・グラスナー新監督の初補強となる見込み。合意内容に変化なし\n5. **[[バルデペニャス]] → フィオレンティーナ**（継続・書類交換段階）\n   - Romano here we go（7/14）: €8M・5年契約・[[レアル・マドリー]]が50%セルオン＋買い戻しOP保持。書類交換段階から新規進展なし・公式発表は近日中の見込み\n\n---\n\n## 3. 交渉中（信頼度: ◎=ほぼ確実 ○=有力 △=一部報道 ✖=破談）\n\n1. **[[ガルナチョ]] → アストン・ヴィラ ○**（前進）\n   - **Romano「ヴィラの正式オファー（買取義務付きローン）はローマ案より買取発動条件が軽く、クラブ間協議はポジティブ。残るは[[ガルナチョ]]本人の最終GO」**。本人はヴィラ移籍に合意済みとの報道も（Sports Mole）\n   - [[チェルシー]]の売却目線は€50M（£42.7M）で不変。ユナイテッドから£40Mで加入して1年足らずでの放出方向。エメリ監督が獲得を承認済み\n2. **[[ロメロ]]（トッテナム）退団 ○**（新規）\n   - **Romano「[[ロメロ]]は100%今夏退団する」と確定報（7/22）**。インテルがトッテナムとクラブ間交渉中、バルセロナは関心を持つがDF売却が先決条件。**本人の希望はバルサ**\n   - 移籍金の目線は£40M（一部報道）。スパーズはセネシと[[ファン・ヘッケ]]をCBに獲得済みで、[[ロメロ]]抜きの陣容を既に整えている\n3. **[[バルコラ]] → [[リバプール]] ○**\n   - リバプールのショートリスト最上位は不変。**£85M級のオファー提出・クラブ間交渉入りの報道が流通するが核はB級中心**でS/A級直接確認は取れず。PSG査定は€150M（£127.5M）と依然大きな溝\n   - アーセナルは関心を維持するも対抗ビッドは未提出\n4. **[[アルバレス]]（アトレティコ・マドリー）動向 ○**\n   - **セレソ会長「[[アルバレス]]はアトレティコの選手であり、アトレティコの選手であり続ける」と改めて残留を明言**。バルセロナには€150M前払い（選手交換・分割払い不可）を要求、他クラブ牽制の査定は€200Mとの報道\n   - 本人は退団希望を表明済みで希望先はバルサ。ラポルタ会長がW杯決勝観戦時のNYで「実質的なオファー」を提示、[[レアル・マドリー]]の同額ビッドは妨害目的との見方（Romano既報）も継続\n5. **[[ギマランイス]] → アーセナル ○**\n   - 新規のS/A級進展なし。£80M準備 vs ニューカッスル要求£100Mの構図は前号のまま\n6. **[[ディオマンデ]]（RBライプツィヒ）→ PSG方向 / リバプール ✖**\n   - **Sky Sports「PSGがライプツィヒと[[ディオマンデ]]獲得の交渉中」**——リバプールの大型オファー拒否＋本人のPSG選択（既報）を裏付ける形。リバプールの前線補強は[[バルコラ]]軸に一本化へ\n\n---\n\n## 4. 日本人選手の動向\n\n- **[[佐野海舟]]（マインツ）**: リバプールが€60M（約111億円）準備＋**正式オファー準備中**との報道が継続（Football Tribe 7/18）。マインツは112億円で売却に前向きとの報道（ライブドア 7/17）も出て、従来の「評価額を譲らない」構えから軟化の兆し。個人条件は合意済みとの報道あり。**ただし核は引き続き英B級ソースの転載でS/A級直接確認は本日も取れず**、信頼度○〜△を維持\n- **[[久保建英]]（レアル・ソシエダ）**: スペイン紙AS「今夏、クラブに大きなオファーは届いていない」で**5シーズン目残留濃厚を維持**（契約2029年まで・解除金€60M）。デイリースポーツも「ソシエダで再起へ」と残留基調の報道。リバプール接触説（英B級）は流通するがS/A級確認なし\n- **[[中村草太]]（サンフレッチェ広島 → ル・アーヴル）**: 7/17クラブ公式発表の期限付き移籍（2027年6月30日まで・既報）。新規続報なし\n\n---\n\n## 主要ソース\n\n- [Chelsea公式: Morgan Rogers signs for Chelsea!](https://www.chelseafc.com/en/news/article/morgan-rogers-signs-for-chelsea)\n- [Sky Sports: Chelsea complete record-breaking £117m deal to sign Morgan Rogers](https://www.skysports.com/football/news/11095/13564944/morgan-rogers-transfer-news-chelsea-complete-record-breaking-lb117m-deal-to-sign-forward-from-aston-villa)\n- [Sky Sports: Casemiro joins Inter Miami on free transfer（7/22）](https://www.skysports.com/football/news/11095/13556097/casemiro-transfer-news-former-man-utd-midfielder-joins-inter-miami-on-free-transfer)\n- [LiveScore: Barcelona and Inter Milan both want Cristian Romero as Fabrizio Romano confirms exit](https://www.livescore.com/en/news/football/premier-league/barcelona-inter-milan-both-want-cristian-romero-fabrizio-romano-confirms-tottenham-exit/)\n- [Sky Sports: Alejandro Garnacho — Aston Villa begin talks to sign forward from Chelsea](https://www.skysports.com/football/news/11661/13565713/alejandro-garnacho-transfer-news-aston-villa-begin-talks-to-sign-forward-from-chelsea)\n- [FootballTransfers: Aston Villa make official Alejandro Garnacho bid — Fabrizio Romano](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/07/chelsea-transfer-news-aston-villa-alejandro-garnacho-fabrizio-romano)\n- [Goal: Klopp confirms imminent arrival as new Germany boss after \u0027generous\u0027 Red Bull exit agreement](https://www.goal.com/en/lists/jurgen-klopp-confirms-new-germany-boss-agreement-red-bull/blt3ce7094e041a539f)\n- [FOX Sports: Klopp on verge of accepting Germany coaching job after Red Bull exit](https://www.foxsports.com/stories/soccer/jurgen-klopp-confirms-imminent-arrival-as-new-germany-boss-after-reaching-generous-exit-agreement-with-red-bull-group)\n- [Sky Sports: Arsenal agree fee with Club Brugge to sign Christos Tzolis](https://www.skysports.com/football/news/11095/13564048/christos-tzolis-arsenal-agree-fee-with-club-brugge-to-sign-greek-winger-as-replacement-for-leandro-trossard)\n- [SI: Arsenal\u0027s deal for Christos Tzolis confirmed by Club Brugge\u0027s manager](https://www.si.com/soccer/arsenal-deal-christos-tzolis-confirmed-club-brugge-manager)\n- [Transfermarkt: Who is Jesse Bisiwu? Club Brugge 18-year-old on verge of Barcelona move](https://www.transfermarkt.us/who-is-jesse-bisiwu-club-brugge-18-year-old-wonderkid-on-verge-of-barcelona-move/view/news/483314)\n- [Vanguard: Barcelona agree €8.5m deal to sign Club Brugge winger Jesse Bisiwu](https://www.vanguardngr.com/2026/07/barcelona-agree-e8-5m-deal-to-sign-club-brugge-winger-jesse-bisiwu/)\n- [ESPN: Forest set to sign Schlager](https://www.espn.com/soccer/story/_/id/49367986/nottingham-forest-xaver-schlager-rb-leipzig-free-agent-signing-sources)\n- [The Athletic（X）: Forest set to sign Xaver Schlager on two-year deal with option](https://x.com/TheAthleticFC/status/2077419293445108100)\n- [OneFootball: Fiorentina \u0027reach verbal agreement\u0027 with Real Madrid for Víctor Valdepeñas](https://onefootball.com/en/news/fiorentina-reach-verbal-agreement-with-real-madrid-for-victor-valdepenas-43139339)\n- [Sky Sports: Liverpool transfer news — Barcola among targets with PSG in talks to sign Yan Diomande](https://www.skysports.com/football/news/11669/13558837/liverpool-transfer-news-bradley-barcola-among-alternative-targets-with-psg-in-talks-to-sign-yan-diomande)\n- [FOX Sports: Julian Alvarez\u0027s agent responds to Real Madrid, Barcelona transfer rumors](https://www.foxsports.com/stories/soccer/julian-alvarezs-agent-breaks-silence-on-sensational-real-madrid-transfer-links-as-race-to-sign-atletico-madrid-forward-heats-up)\n- [OneFootball: Atlético cierra la puerta a Julián Álvarez — rechaza ofertas de Barcelona y Real Madrid](https://onefootball.com/en/news/atletico-de-madrid-cierra-la-puerta-a-julian-alvarez-rechaza-ofertas-de-barcelona-y-real-madrid-43152337)\n- [Bundesliga公式: Bayern Munich sign Ismael Saibari（※7/1発表・7日ガード外・参考）](https://www.bundesliga.com/en/bundesliga/news/bayern-munich-sign-ismael-saibari-morocco-world-cup-psv-eindhoven-37675)\n- [Football Tribe Japan: 佐野海舟の獲得に向けリバプールが正式オファー準備か！（7/18）](https://football-tribe.com/japan/2026/07/18/357032/)\n- [ライブドアニュース: 佐野海舟のリバプール移籍が濃厚、マインツが112億円で売却に前向き（7/17）](https://news.livedoor.com/topics/detail/31852191/)\n- [東スポWEB: 久保建英〝再起〟はレアル・ソシエダードで？「大きなオファーは届いていない」＝スペイン紙報道](https://news.yahoo.co.jp/articles/a5b4341663666dc4e840c3a28f1dc73aa3a70e63)\n- [FootballTransfers: Done Deals 22 July 2026](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/07/transfer-news-every-done-deal-official-confirmed-completed-signing-europe-today-22-july-2026)\n\n---\n\n*生成: 2026-07-23 03:30 JST / WC_MODE: false・通常期構成 / 保存障害対策「最終チャット出力=記事本文」方式を継続（5号目）＋バックアップ2点保存（07-21・07-22の未作成を検知し07-22分は補填済み）/ 明日号の昇格見込み: ツォリス（本日発表予定）・クロップ（金曜7/24発表予定）・ビシウ／ガルナチョは本人GOでhere we go入りの公算*";
