<script>
const md = "# マンチェスター・ユナイテッド情報週報\n**2026年6月17日（火）時点**\n\n---\n\n## 📋 今週のサマリー\n\nカリック新監督のもと、チャンピオンズリーグ復帰を果たした2025-26シーズンが終幕。夏の移籍市場が6月15日に開幕し、エデルソン（アタランタ）との合意を皮切りに本格的な補強活動がスタートした。\n\n---\n\n## ⚽ 直近の試合結果（6月10日〜6月17日）\n\n**該当なし** — プレミアリーグは閉幕済み（オフシーズン中）。\n\n\u003e **2025-26シーズン最終成績（参考）**\n\u003e プレミアリーグ **3位** ／ 71ポイント（20勝11分7敗）\n\u003e → UCL出場権獲得（3年ぶり復帰）\n\u003e\n\u003e *Source: [NBC Sports](https://www.nbcsports.com/premier-league-table-2025-26-season-standings) / [manutd.com](https://www.manutd.com/en/matches/first-team/2025-26/premier-league/league-table)*\n\n---\n\n## 📅 今後の試合予定\n\n### プレシーズン2026（欧州ツアー）\n\n| 日程 | 対戦相手 | 会場 | キックオフ（BST） |\n|------|----------|------|------------------|\n| 7月18日（土） | ラクサム | ヘルシンキ（フィンランド） | 16:00 |\n| 7月24日（金） | ローゼンボリ | トロンハイム（ノルウェー） | 17:00 |\n| 8月1日（土） | アトレティコ・マドリード | ストックホルム（スウェーデン） | 14:00 |\n| 8月8日（土） | パリ・サンジェルマン | ヨーテボリ（スウェーデン） | 16:00 |\n| 8月12日（水） | リーズ・ユナイテッド | ダブリン（アイルランド） | 19:30 |\n\n\u003e 24年ぶりに欧州内でプレシーズンを実施（従来は北米・アジアツアーが主流）。\n\u003e\n\u003e *Source: [manutd.com 公式](https://www.manutd.com/en/news/detail/man-utd-announce-four-more-pre-season-2026-fixtures) / [manutd.com 日程一覧](https://www.manutd.com/en/news/detail/game-by-game-united-pre-season-fixture-list-2026)*\n\n---\n\n## 🔁 移籍情報（6月3日〜6月17日）\n\n### ✅ 合意済み（完了待ち）\n\n**エデルソン（MF）｜アタランタ → マンチェスター・ユナイテッド**\n- 移籍金：約€45m（£38m相当）\n- 契約：4年＋オプション1年\n- ブラジル代表守備的MF。カリック体制初の補強。\n- 6月6日に両クラブ間で全書類に合意。正式発表・加入は7月初旬の見込み。\n- ℹ️ *まだ公式発表なし（Fabrizio Romano確認済み / FootballTransfers報道）*\n\n\u003e *Source: [FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/06/man-utd-transfer-news-ederson-deal-confirmed-michael-carrick-first-signing) / [The Peoples Person](https://thepeoplesperson.com/2026/06/06/manchester-united-finalise-deal-to-sign-ederson-from-atalanta-311151/) / [TeamTalk](https://www.teamtalk.com/manchester-united/ederson-silva-will-join-man-utd-from-atalanta)*\n\n---\n\n### 🔥 交渉中・注目ターゲット\n\n**マテウス・フェルナンデス（MF）｜ウェストハム → マンチェスター・ユナイテッド**\n- ウェストハムの要求額：£80m\n- ユナイテッド：初回オファー準備中（6月15日報道）\n- 21歳のポルトガル代表MF。ユナイテッドの最優先ターゲット。\n- レアル・マドリードも関心を示すが、本人はユナイテッド移籍を希望。\n- ⚠️ 価格交渉が難航する可能性あり\n\n\u003e *Source: [Sky Sports](https://www.skysports.com/football/news/11095/13553501/mateus-fernandes-transfer-manchester-united-preparing-opening-bid-for-west-ham-midfielder-as-21-year-old-becomes-priority-target) / [Read West Ham（6/15）](https://readwestham.com/2026/06/15/real-madrid-man-united-mateus-fernandes-transfer/) / [Goal.com](https://www.goal.com/en/lists/mateus-fernandes-man-utd-transfer-fee-west-ham-price-drop/bltaccf0cd90694fe6e)*\n\n---\n\n### 🔵 報道段階（信頼度：要確認）\n\n**鈴木彩艶（GK）｜パルマ → マンチェスター・ユナイテッド**\n- 「今夏オファー準備か」と日本メディアが報道（5月27日）\n- 24歳・日本代表GK。契約は2029年まで。\n- ⚠️ ユナイテッド公式・英国大手メディアの確認なし。信頼度低め。\n\n\u003e *Source: [Football Tribe Japan](https://football-tribe.com/japan/2026/05/27/354814/)*\n\n---\n\n### 📤 退団・契約終了\n\n| 選手 | 詳細 |\n|------|------|\n| **カゼミーロ（MF）** | 契約満了退団。インテル・マイアミ（MLS）へ移籍の見込み |\n| **ジェイドン・サンチョ（FW）** | 契約満了・解放。PL通算58試合9ゴールで終了 |\n\n\u003e *Source: [Sports Mole](https://www.sportsmole.co.uk/football/man-utd/transfer-talk/feature/man-united-summer-transfers-all-confirmed-ins-and-outs-for-2026_599075.html) / [Football Tribe Japan](https://football-tribe.com/japan/2026/05/21/354499/)*\n\n---\n\n## 🏟️ クラブニュース\n\n### マイケル・カリック、正式に永久監督就任（5月22日）\nルーベン・アモリムが1月に解任後、暫定監督として16試合で11勝と驚異的な成績を残したカリックが正式契約。2028年まで（オプション＋1年）。45歳での就任で「クラブのレジェンドが監督へ」と地元メディアが歓迎。\n\n\u003e *Source: [Al Jazeera](https://www.aljazeera.com/sports/2026/5/22/man-utd-appoint-michael-carrick-as-permanent-manager) / [ESPN](https://www.espn.com/soccer/story/_/id/48789147/man-united-michael-carrick-appointed-permanent-head-coach) / [manutd.com 公式](https://www.manutd.com/en/news/michael-carrick-continues-as-man-united-head-coach-2026)*\n\n---\n\n## 📌 注意事項\n- エデルソンの正式発表はまだなし。7月初旬まで待つ必要あり。\n- マテウス・フェルナンデスの交渉は始まったばかり。£80mという要求額への対応が焦点。\n- 移籍窓は9月1日23:00（GMT）まで。\n\n---\n\n*情報はすべて2026年6月17日時点。正式発表はmanutd.com公式を参照のこと。*";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
