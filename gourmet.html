const md = "十分な情報が集まりました。レポートを生成します。\n\n---\n\n## 🔥 今週バズりグルメ\n\n### 1. 明太フランス専門店ブーム（東京・新宿ほか）\n- **エリア**: 新宿区・都内各所\n- **ジャンル**: ベーカリー・パン専門店\n- **価格帯**: 300〜600円前後\n- **バズった理由**: フランスパンから明太バターソースがとろ〜りあふれ出す動画がInstagram・TikTokで連続バズり。販売時間が1日3回に分散されるほどの行列が話題。物価高でも安定価格を維持できる食材（スケトウダラの卵）として\"コスパ優等生\"としても注目された。「ライブ注入スタイル」（目の前で明太バターを注入・再加熱）を採用する店が増加中。\n- **予約**: 不要（整理券・行列制）\n- **情報源**: [Yahoo!ニュース（TBS NEWS DIG）](https://news.yahoo.co.jp/articles/67350e9a492787c7cc0226c06c7b3aec0a439263) / [FNNプライムオンライン](https://news.yahoo.co.jp/articles/dffac5d5a6c8c488f16325ab7fbf02d26c49c211)\n\n---\n\n### 2. BRUSSELS FRIES（新大久保）\n- **エリア**: 新大久保（JR山手線・新大久保駅徒歩圏内）\n- **ジャンル**: フライドポテト専門店\n- **価格帯**: 500〜900円前後\n- **バズった理由**: 注文後に牛脂を混ぜた油でベルギー本場ブリュッセルスタイルの「二度揚げ」を実演。仕上げ工程の動画がTikTokで拡散し「新大久保の新定番」として感度高い若者に定着。外側サクサク・中ほくほくの食感が話題に。\n- **予約**: 不要（テイクアウト中心）\n- **情報源**: [食べログマガジン・2026年トレンド予測](https://magazine.tabelog.com/articles/482545)\n\n---\n\n### 3. Smith \u0026 Wollensky 銀座（銀座・東京初上陸）\n- **エリア**: 銀座（東京メトロ銀座駅直結エリア）\n- **ジャンル**: アメリカン・ステーキハウス\n- **価格帯**: 1万円〜（ランチ5,000円〜）\n- **バズった理由**: 1977年NY創業。セレブリティに愛されてきた老舗ステーキハウスが2026年春、日本初上陸。吊るし焼きのトマホークステーキや超巨大ケーキがSNSで話題爆発。インバウンドからも「本場の味が東京で」と注目。\n- **予約**: 公式サイトより要予約\n- **情報源**: [Timeout Tokyo 2026新施設](https://www.timeout.jp/tokyo/ja/things-to-do/new-spots-2026)\n\n---\n\n### 4. ガチフードコート（進化型フードホール）各所\n- **エリア**: 東京都内（渋谷・有明・新宿など複数展開）\n- **ジャンル**: フードホール（名店集積型）\n- **価格帯**: 1,000〜3,000円\n- **バズった理由**: 予約困難な名店・実力派ビストロが一ヵ所に集結し、好きなものを少しずつ楽しめるスタイルが「外食体験のアップデート」としてXやInstagramで大反響。単品だけでなくテイスティング感覚で複数店を回れる点が若い世代に刺さっている。\n- **予約**: 不要（各店舗個別に異なる）\n- **情報源**: [食べログマガジン・2026年トレンドグルメ大予想](https://magazine.tabelog.com/articles/482545)\n\n---\n\n### 5. 浮耀（ふよう）六本木（六本木）\n- **エリア**: 六本木（東京メトロ六本木駅徒歩圏内）\n- **ジャンル**: 和食（創作和食）\n- **価格帯**: おまかせコース15,000〜25,000円\n- **バズった理由**: 銀座ミシュラン星付き店「うち山」出身シェフが独立開業。「出汁にこだわった五感を刺激する和食」として食通の間で口コミが一気に広がり、予約困難店に浮上。\n- **予約**: 公式または食べログ/一休.comより要予約（混雑注意）\n- **情報源**: [Timeout Tokyo](https://www.timeout.jp/tokyo/ja/things-to-do/new-spots-2026)\n\n---\n\n### 6. マクドナルド「ご当地マック」SNS実食レポ拡散（全国）\n- **エリア**: 全国のマクドナルド店舗\n- **ジャンル**: ファストフード・期間限定\n- **価格帯**: 400〜700円\n- **バズった理由**: 5/20発売の「博多明太バターてりやき」「北海道じゃがチーズてりやき」「名古屋名物手羽先風黒胡椒ジューシーチキン」など5種が一斉公開され、グルメ系インフルエンサーによる実食比較動画がTikTok・YouTubeで続々投稿。「聖闘士星矢」コラボパッケージも話題。\n- **予約**: 不要\n- **情報源**: [るるぶ\u0026more.実食レポ](https://rurubu.jp/andmore/article/24823) / [マクドナルド公式ニュース](https://www.mcdonalds.co.jp/company/news/2026/0514a/)\n\n---\n\n### 7. mærge（メアージュ）表参道（表参道）\n- **エリア**: 表参道（東京メトロ表参道駅徒歩圏内）\n- **ジャンル**: フランス料理\n- **価格帯**: ディナーコース30,000円〜\n- **バズった理由**: 「三つ星を目指す」と公言する柴田秀之シェフが率いる新店として食通コミュニティで話題沸騰。厨房もレセプションも一流スタッフで固め、「東京の次のガストロノミー頂点」とグルメメディアが大きく取り上げた。\n- **予約**: 公式・一休.comより要予約（数週間先まで埋まる状況）\n- **情報源**: [食べログマガジン・2026年行くべき店5選](https://magazine.tabelog.com/articles/482622)\n\n---\n\n### 8. 大阪グルメSNSアカウント経由の行列店（大阪・各所）\n- **エリア**: 大阪市内各所\n- **ジャンル**: 多様（ラーメン・定食・居酒屋など）\n- **バズった理由**: 総フォロワー100万人超えのインスタ公式アカウント「大阪グルメ／関西グルメ」（元料理人運営）が「コスパ・企業努力・おもろい店」をキュレーション。紹介されると翌日から行列必至の現象が定着。\n- **情報源**: [大阪グルメ Instagram公式](https://www.instagram.com/osaka_gourmet1/)\n\n---\n\n## 🆕 新規オープン注目店\n\n### 1. Smith \u0026 Wollensky 銀座（2026年春オープン）\n- **エリア**: 銀座（東京）\n- **ジャンル**: アメリカン・ステーキハウス\n- **コンセプト**: 1977年NYで創業した世界的ステーキ老舗の日本初出店。本場ドライエイジングビーフを使ったステーキ、USDAプライムグレードの牛肉、トマホークの吊るし焼きが目玉。\n- **注目メニュー**: トマホークステーキ（吊るし焼き）、超巨大ケーキ\n- **情報源**: [Timeout Tokyo 2026年新施設](https://www.timeout.jp/tokyo/ja/things-to-do/new-spots-2026)\n\n---\n\n### 2. mærge（表参道、2026年春オープン）\n- **エリア**: 表参道（東京）\n- **ジャンル**: フランス料理（ガストロノミー）\n- **コンセプト**: 柴田秀之シェフ（三つ星目標を公言）が立ち上げたフレンチ。サービス・キッチン・ソムリエすべてが一流人材で構成。\n- **注目メニュー**: 旬素材を活かした創作フランス料理コース\n- **情報源**: [食べログマガジン](https://magazine.tabelog.com/articles/482622)\n\n---\n\n### 3. 浮耀（ふよう）六本木（2026年初春オープン）\n- **エリア**: 六本木（東京）\n- **ジャンル**: 和食（創作）\n- **コンセプト**: 銀座「うち山」（ミシュラン星付き）で磨いた技術を携え独立。出汁と旬食材にこだわる大人向け和食の集大成。\n- **注目メニュー**: 季節のおまかせコース（出汁を軸にした一皿）\n- **情報源**: [Timeout Tokyo 2026年新施設](https://www.timeout.jp/tokyo/ja/things-to-do/new-spots-2026)\n\n---\n\n### 4. TOKYO DREAM PARK レストランフロア（有明・2026年3月27日オープン）\n- **エリア**: 有明（東京テレポート駅徒歩圏内）\n- **ジャンル**: 複合エンタメ×ダイニング\n- **コンセプト**: テレビ朝日が手がける複合型エンタメ施設の6階に約200席のレストラン群。エンタメ体験と食を融合させた新スタイル。\n- **注目メニュー**: 各テナントによる多様なジャンル（詳細は施設HPで随時更新）\n- **情報源**: [2026年新規開業スポット](https://partners.eventbank.jp/column/55.do)\n\n---\n\n### 5. 大阪ニューオープン注目店（ホットペッパー・食べログ掲載多数）\n- **エリア**: 大阪市内（梅田・難波・心斎橋など）\n- **ジャンル**: 多様（フレンチ・和食・ラーメンなど）\n- **確認先**: ホットペッパーグルメ「大阪NEWOPEN特集」・食べログ「大阪新規オープン順」で最新情報を確認可能\n- **情報源**: [ホットペッパーグルメ 大阪NEWOPEN特集](https://www.hotpepper.jp/SA23/dncLU0065/) / [食べログ 大阪新規オープン](https://tabelog.com/osaka/C27100/rstLst/cond16-00-00/)\n\n---\n\n### 6. nôtori（山梨・地方からのブレイク候補）\n- **エリア**: 山梨県（地方注目枠）\n- **ジャンル**: フレンチ×オーベルジュ\n- **コンセプト**: RED U-35グランプリ受賞の堀内浩平シェフとソムリエの兄が故郷・山梨で開業したオーベルジュ。世界1位フーディ・浜田岳文氏が2026年ブレイク店として名指し推薦。\n- **注目メニュー**: 山梨食材を使ったフレンチコース（要宿泊予約）\n- **情報源**: [食べログマガジン・世界1位フーディの予測](https://magazine.tabelog.com/articles/483232)\n\n---\n\n## ⭐ ミシュラン・メディア話題\n\n### 1. 【ミシュランガイド東京2026】明寂（めいじゃく）が新三つ星昇格\n- **店名**: 明寂（日本料理）\n- **エリア**: 港区（東京）\n- **詳細**: 2025年9月25日発表。二つ星から三つ星へ昇格。シェフは京都・徳島の日本料理店で経験を積み、東京の一つ星店で11年板長を務めた後、2022年独立開業。開業わずか1年で二つ星初掲載、翌年三つ星という異例のスピード昇格。東京の三つ星は合計12軒となり、パリ（10軒）を上回り世界首位を維持。\n- **情報源**: [ヒトサラマガジン](https://magazine.hitosara.com/article/1860/) / [飲食店ドットコム](https://www.inshokuten.com/foodist/article/8068/)\n\n---\n\n### 2. 【ミシュランガイド東京2026】新二つ星3軒\n- **西麻布 鮨 真**（寿司・西麻布）/ **伯雲**（日本料理）/ **炎水**（日本料理）がそれぞれ一つ星から二つ星に昇格。\n- 総掲載数526軒、新規掲載65軒という充実の内容。\n- デザートコースを提供するレストランは前年の2軒から6軒に急増、クリエイティブ料理ジャンルが多様化。\n- **情報源**: [PRtimes（ミシュラン公式）](https://prtimes.jp/main/html/rd/p/000000059.000117133.html) / [Timeout Tokyo](https://www.timeout.jp/tokyo/ja/news/michelin-awards-tokyo-restaurants-2026-092925)\n\n---\n\n### 3. 【食べログ 食堂百名店2026】2026年4月21日発表\n- 「うまいもの、いま食べるなら、このお店。」をコンセプトにした食堂ジャンルの百名店（第3回）。\n- 今回の新規入選25店が発表。東京24店・福岡11店・千葉7店など全国から選出。\n- 注目の新規入選：**うに専門店 世壱屋 函館朝市店**（北海道）、**海鮮食堂 さばや**（新潟）、**西京焼き 京都やま六**（京都）など。\n- **情報源**: [カカクコム公式プレスリリース](https://corporate.kakaku.com/news/20260421) / [グルメWatch](https://gourmet.watch.impress.co.jp/docs/news/2103290.html)\n\n---\n\n### 4. 東京が19年連続「世界最多の星付き店が集まる美食都市」首位維持\n- ミシュランガイド2026年版において東京は三つ星12軒でパリ（10軒）を上回り世界No.1を継続。\n- グリーンスター（サステナブルガストロノミー）も世界最多の13軒、SDGsへの取り組みが評価されている。\n- インバウンド誘致の観点からも「東京の食」が国際的に注目を集めている。\n- **情報源**: [やまとごころ.jp](https://yamatogokoro.jp/inbound_data/58478/) / [Yahoo!ニュース（AMP）](https://news.yahoo.co.jp/articles/c78aba4541b787efec200e717f478314ecbeef59)\n\n---\n\n## ⏰ 期間限定・コラボ\n\n### 1. マクドナルド「ご当地マック」5種（全国）\n- **販売期間**: 2026年5月20日（水）〜6月中旬予定\n- **内容**: 「博多明太バターてりやき」「北海道じゃがチーズてりやき」「名古屋名物 手羽先風黒胡椒ジューシーチキン」の3バーガー＋朝マック限定「北海道じゃがチーズてりやきマフィン」＋「シャカシャカポテト 金沢名物黒カレー味」の計5種。\n- **コラボ要素**: アニメ「聖闘士星矢」とのコラボ数量限定パッケージ\n- **情報源**: [るるぶ\u0026more. 実食レポ](https://rurubu.jp/andmore/article/24823) / [マクドナルド公式](https://www.mcdonalds.co.jp/company/news/2026/0514a/)\n\n---\n\n### 2. 呪術廻戦×ジョイフル コラボキャンペーン第2弾（全国）\n- **販売期間**: 2026年5月12日（火）〜6月9日（火）\n- **内容**: アニメ「呪術廻戦」とのコラボメニュー販売＋ノベルティプレゼント（第1弾4/14〜5/12に続く第2弾）。\n- **対象店舗**: 全国のジョイフル店舗\n- **情報源**: [キャラグー](https://charagoo.jp/popular-news/)\n\n---\n\n### 3. ハイキュー!!×サンシャインシティプリンスホテル（池袋）\n- **開催期間**: 2026年5月4日（月）〜（詳細は公式サイト参照）\n- **内容**: 人気アニメ「ハイキュー!!」とのコラボレーションイベント。コンセプトルーム宿泊プラン＋コラボメニューをホテル内レストランで展開。\n- **場所**: サンシャインシティプリンスホテル（池袋・東京）\n- **情報源**: [キャラグー](https://charagoo.jp/popular-news/)\n\n---\n\n### 4. ミスタードーナツ「もっちゅりん」新作（全国）\n- **販売開始**: 2026年6月3日（水）〜（期間限定）\n- **内容**: 人気シリーズ「もっちゅりん」の新作ラインナップ。公式サイトにてネット予約受付中。\n- **価格帯**: 200〜350円前後\n- **情報源**: [ワタシト（ミスド新作情報）](https://media.yourmystar.jp/articles/54fb5f82-d272-4ee5-9081-f994bf361e6e)\n\n---\n\n### 5. 飲食チェーン各社の5〜6月限定キャンペーン（全国）\n- 5月〜6月は多数の飲食チェーンが期間限定メニュー・クーポン・スタンプキャンペーンを実施中。\n- 詳細はオトクーポンナビの「2026年5月飲食チェーンキャンペーンまとめ」で随時確認可能。\n- **情報源**: [オトクーポンナビ](https://poi-coupon.com/restaurant-campaigns/)\n\n---\n\n## 📈 トレンドフード\n\n### 1. 明太フランス専門店ブーム（今まさに旬）\n- 福岡発祥の「明太フランス」が2026年に全国規模のブームへ突入。東京でも専門店・専門パン屋が急増し、SNSで「明太バターが溢れる動画」が連続バズり。「ライブ注入スタイル」（目の前で熱々のフランスパンに明太バターを注入）が体験型として若者に受け、テイクアウト需要とも相性良好。スケトウダラの卵は海外でほとんど消費されないため安価・安定仕入れが可能で、物価高時代の「コスパ映え食材」として飲食業界が注目。\n- **来そうな展開**: 明太フランス×チーズ、明太フランス×韓国コチュジャンなどの派生フレーバー専門店が登場見込み。\n- **情報源**: [Yahoo!ニュース（TBS NEWS DIG）](https://news.yahoo.co.jp/articles/67350e9a492787c7cc0226c06c7b3aec0a439263)\n\n---\n\n### 2. ビリヤニ（南アジア料理のブーム継続・拡大中）\n- インド・パキスタン発祥の炊き込みご飯「ビリヤニ」が日本で定着フェーズから拡大フェーズへ移行。肉や魚・野菜をヨーグルトでマリネし、バスマティライスと交互に重ねて炊く本格スタイルが東京・大阪の専門店で続々増加。クックパッドでも検索数が急増し「家で作れるビリヤニ」レシピが流行中。東南アジア・南アジア料理全般（ミャンマーの「ヒンガー」、タイの「トムカーガイ」なども）への関心が高まる中でビリヤニはその筆頭格。\n- **来そうな展開**: ビリヤニ専門のデリバリー専門店・ゴーストキッチンが急増する可能性大。\n- **情報源**: [クックパッド食トレンド予測2026](https://prtimes.jp/main/html/rd/p/000000350.000027849.html) / [寺岡精工 2026年フードトレンド](https://www.teraokaseiko.com/jp/topics/20251210081050/)\n\n---\n\n### 3. フュージョン薬膳（健康×美食の最先端）\n- 中医学に基づく薬膳の考え方をベースに、和食・イタリアン・フレンチなどと融合させた「フュージョン薬膳」が2026年の注目トレンドに。腸活・免疫・美肌などの機能性をアピールしながら「食べて美しくなれる料理」としてInstagramで高エンゲージメントを記録。特に女性20〜40代をターゲットにした薬膳コースやランチプレートが東京・京都で増加傾向。キャッサバ・チコリ・白きくらげ・枸杞（クコ）などの素材を使ったメニューが注目を集めている。\n- **来そうな展開**: 薬膳×アフタヌーンティー、薬膳×スムージーバーなどへの展開が見込まれる。\n- **情報源**: [macaroni 2026年トレンド予測](https://macaro-ni.jp/173827) / [食べログマガジン・2026年トレンド大予想](https://magazine.tabelog.com/articles/482545)\n\n---";
