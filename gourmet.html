const md = "収集した情報で十分にレポートを作成できます。\n\n---\n\n## 🔥 今週バズりグルメ\n\n### 1. Smith \u0026 Wollensky GINZA\n**銀座・銀座駅すぐ｜ステーキハウス｜ランチ ¥14,000〜、ディナー ¥20,000〜**\n\n1977年ニューヨーク創業、世界の美食家が通い詰める老舗ステーキハウスが2026年5月1日に日本初上陸。清和銀座ビル12階（3フロア146席）に構え、オープン当日からInstagram・Xで「本場NYの熱量がそのまま来た」と話題沸騰。目玉は店内専用庫でドライエイジングを施したUSDAプライム牛。北海道産の「スウィンギングトマホーク」（¥72,000）が特にSNS映えで連日投稿が絶えない。週4日ジャズの生演奏もあり。予約はTableCheckから。\n\n\u003e 情報源：[prtimes.jp グランドオープン告知](https://prtimes.jp/main/html/rd/p/000000450.000040062.html) ／ [enjoytokyo.jp](https://www.enjoytokyo.jp/news/203971/)\n\n---\n\n### 2. 小麻辣（シャオマーラー） 下北沢店\n**下北沢・下北沢駅徒歩3分｜麻辣串｜¥1,000〜2,000**\n\n韓国ソウルで大流行中の「麻辣串（マーラーチュアン）」が日本初上陸。片手で食べ歩けるスパイシーな串鍋スタイルで、TikTokで「下北沢に行くなら絶対これ」タグが急増。辛さレベルが選べ、食べ映えする赤い串が並ぶ画が爆拡散中。Instagramリール再生数は5月末時点で100万超を複数動画が突破。\n\n\u003e 情報源：[hibana 東京ニューオープン2026](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n---\n\n### 3. 魚三酒場（門前仲町）／割烹 三友（人形町）\n**江東区・中央区｜居酒屋・割烹｜¥2,000〜4,000**\n\nTikTokグルメアカウント「@tokyooishii」（フォロワー多数）が「並んでも食べたい常連行列店5選」を投稿し話題に。魚三酒場は昭和から続く大衆居酒屋で新鮮な魚介と安さが刺さり、割烹三友は人形町の隠れ名店として再発掘。動画には「知らなかった」「昔ながらがエモい」コメントが殺到。\n\n\u003e 情報源：[TikTok @tokyooishii 動画](https://www.tiktok.com/@tokyooishii/video/7485321244863139079)\n\n---\n\n### 4. Tokyo Tokyo Delicious Museum 2026 参加店（LA BETTOLA / HAL YAMASHITA 等）\n**有明・国際展示場駅1分｜5月15〜17日開催・入場無料**\n\n東京都主催の年に一度の「予約困難店が集まるフードフェス」が今年も開催され、過去最多**約6.5万人**が来場（満足度97%）。「ラ・ベットラ・ダ・オチアイ」「HAL YAMASHITA TOKYO」「赤坂四川飯店」など80店超が参加。入場無料でキャッシュレスのみ。「一生行けないと思ってた店に並んで食べられた」とSNSで絶賛の嵐。来年も必見。\n\n\u003e 情報源：[prtimes.jp レポート](https://prtimes.jp/main/html/rd/p/000000010.000137776.html) ／ [GO TOKYO Gourmet](https://www.gourmet.gotokyo.org/jp/article/135.html)\n\n---\n\n### 5. 酒場カミナリ\n**高円寺・高円寺駅徒歩2分｜大衆酒場｜¥1,500〜3,000**\n\n「生牡蠣1個299円」「ハイボール399円」という価格設定がXで火がつき、週末は1時間待ちが続出。まぐろの切り落としやコスパ抜群のつまみが揃い、高円寺の新しい大衆酒場文化として話題。若い層を中心に「週3で通ってる」報告が続出中。\n\n\u003e 情報源：[hibana 東京ニューオープン2026](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n---\n\n### 6. 三茶 焼肉 牛8（うしはち）\n**三軒茶屋・三軒茶屋駅徒歩5分｜和牛焼肉｜¥6,000〜10,000**\n\n三軒茶屋に誕生した「上質なのに普段使いできる和牛焼肉」として地元民に急速浸透。厳選和牛を手頃な価格で提供するスタイルがInstagramで評判になり、「三茶の新定番」として口コミが急増。ランチ営業もあり。\n\n\u003e 情報源：[hibana 東京ニューオープン2026](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n---\n\n### 7. 月泉（中華料理）\n**大阪・要問合わせ｜中国料理｜¥8,000〜15,000（要確認）**\n\n毎月1日10時に翌月予約を受付開始、電話即完売となる大阪の予約困難中華。食べログ3年連続Bronze選出（2021〜2023年）で、Xでは「つながらない電話」「やっと予約できた」投稿が毎月トレンド入り寸前。\n\n\u003e 情報源：[aumo 大阪グルメ](https://gourmet.aumo.jp/prefectures/27)\n\n---\n\n### 8. 白鶏舎／トリノイロ（二毛作スタイル）\n**笹塚・笹塚駅徒歩圏｜鶏料理｜¥1,000〜4,000**\n\n昼は「濃厚鶏白湯ラーメン」、夜は「焼手羽とクラフトビール」という同一厨房二毛作スタイルが業界内で注目。「コンセプト勝ち」とグルメインフルエンサーが取り上げTikTok経由で若者が殺到。\n\n\u003e 情報源：[hibana 東京ニューオープン2026](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n---\n\n## 🆕 新規オープン注目店\n\n### 1. Smith \u0026 Wollensky GINZA ☆今月最注目\n**東京都中央区銀座5-8-15 清和銀座ビル12F（銀座駅A2出口すぐ）**\n- **ジャンル**：アメリカンステーキハウス\n- **価格帯**：ランチ ¥14,000〜、ディナー ¥20,000〜\n- **シェフ情報**：1977年創業 NYC本店の調理哲学を継承。ドライエイジング専任スタッフが在籍\n- **注目メニュー**：\n  - 北海道スウィンギングトマホーク ¥72,000\n  - フォーチュン・パワーランチ（2h）¥17,000\n  - シーフードタワー（時価）\n  - S\u0026W×御岳 シングルモルトウイスキー（銀座店限定）\n- **予約**：[TableCheck](https://www.tablecheck.com/ja/smithandwollensky/reserve/message) 必須\n- **グランドオープン**：2026年5月1日\n\n\u003e 情報源：[transithospitalitymanagement.com](https://transithospitalitymanagement.com/news/5%E6%9C%881%E6%97%A5%EF%BC%88%E9%87%91%EF%BC%89%E3%82%B0%E3%83%A9%E3%83%B3%E3%83%89%E3%82%AA%E3%83%BC%E3%83%97%E3%83%B3%E3%80%82%E6%97%A5%E6%9C%AC%E5%88%9D%E4%B8%8A%E9%99%B8%E3%80%81%E4%BC%9D%E8%AA%AC/)\n\n---\n\n### 2. 鮨 上ル（すし のぼる） 高輪ゲートウェイ店\n**高輪ゲートウェイ駅直結エリア｜江戸前寿司｜高級帯**\n- **コンセプト**：創業100年超の老舗寿司が「食べ比べ×知的体験」を打ち出す次世代江戸前スタイル\n- **特徴**：産地・熟成日数・ネタの組み合わせを変えた食べ比べコースで「知的欲求まで満たす」と話題\n- **注目メニュー**：季節の食べ比べおまかせコース\n\n\u003e 情報源：[hibana 東京ニューオープン2026](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n---\n\n### 3. 小麻辣 下北沢店\n**世田谷区下北沢（下北沢駅徒歩3分）｜麻辣串（韓国発）｜¥1,000〜2,000**\n- **コンセプト**：韓国発の食べ歩き麻辣串が日本初上陸\n- **特徴**：辛さカスタム可、片手で楽しめるストリートフード形式。フォトジェニックな真っ赤な串並びが映え\n- **注目メニュー**：麻辣串盛り合わせ、シグネチャーソースがけ\n\n\u003e 情報源：[hibana 東京ニューオープン2026](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n---\n\n### 4. 慈雨（じゅ）\n**東京都内（詳細は公式確認）｜薪火フレンチ｜高級帯**\n- **コンセプト**：薪火を全面活用したフレンチ。肉・魚は薪の炎で、野菜は薪の煙で焼く一貫した薪調理哲学\n- **シェフ情報**：薪火料理に精通したシェフ\n- **注目メニュー**：薪火ロースト各種、薪煙野菜のコース\n- **備考**：2026年5月22日にミシュランガイド先行公開店に選出\n\n\u003e 情報源：[prtimes.jp ミシュラン先行公開](https://prtimes.jp/main/html/rd/p/000000085.000117133.html)\n\n---\n\n### 5. ヴァンカ（VANKA）\n**東京都内（詳細は公式確認）｜現代風料理（和仏フュージョン）｜高級帯**\n- **コンセプト**：「日本とフランスの食の融合」。フランス料理ベースに鰹節・味噌・炭火という和の技法を積極採用\n- **シェフ情報**：日仏双方の調理技術をもつシェフ\n- **注目メニュー**：旬素材を走り・盛り・名残で表現したコース料理\n- **備考**：ミシュランガイド2026年5月先行公開店に選出\n\n\u003e 情報源：[prtimes.jp ミシュラン先行公開](https://prtimes.jp/main/html/rd/p/000000085.000117133.html)\n\n---\n\n### 6. 魚群 GYOGUN\n**高田馬場・高田馬場駅徒歩圏｜海鮮居酒屋｜¥3,000〜5,000**\n- **コンセプト**：人気居酒屋グループ「木々家」と「ミナデイン」が協業した実力派海鮮居酒屋\n- **特徴**：産地直送魚介×クラフトビール、深夜まで営業\n- **注目メニュー**：鮮魚のお刺身盛り合わせ、焼き魚定食\n\n\u003e 情報源：[hibana 東京ニューオープン2026](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n---\n\n## ⭐ ミシュラン・メディア話題\n\n### 1. ミシュランガイド 2026年5月22日 先行公開8軒【速報】\n2026年5月22日、ミシュランガイド公式サイト・アプリで東京の新規掲載8軒が先行公開された。いずれも予約困難になる前に要チェック。\n\n| 店名 | ジャンル | 注目ポイント |\n|------|---------|------------|\n| ヴァンカ（VANKA） | 現代風料理 | 和仏融合・鰹節×薪火 |\n| シアモ ノイ（Siamo noi） | イタリア料理 | 自家栽培ハーブ・調味料自製 |\n| クレアテルナ（CREATERNA） | 現代風料理 | 余白の盛り付け・芸術的表現 |\n| サンカ（sanka） | フランス料理 | 素材×ソース×ワインの三位一体 |\n| お寅（Otora） | 日本料理 | 「旬間」10日単位の季節表現 |\n| 慈雨（jiü） | フランス料理 | 薪火フレンチ全振り |\n| ペルテ（PER TE） | ピッツァ | コース形式・創作ピッツァ |\n| 焼鳥 にしき（Yakitori Nishiki） | 焼鳥 | 地鶏×塩・鰹だしのお椀付き |\n\n\u003e 情報源：[prtimes.jp ミシュラン先行公開](https://prtimes.jp/main/html/rd/p/000000085.000117133.html) ／ [favy.jp 速報](https://www.favy.jp/topics/37858)\n\n---\n\n### 2. ミシュランガイド東京2026 年間総括（2025年9月発表）\n- 総掲載数 **526軒**（過去最多）\n- 新三つ星：**日本料理 明寂（みんじゃく）** ←圧巻の新鋭\n- 新二つ星：3軒\n- 新一つ星：14軒\n- 中華料理部門 サービスアワード：飄香の熊谷泰代氏\n\n\u003e 情報源：[magazine.hitosara.com](https://magazine.hitosara.com/article/1860/) ／ [80c.jp 中華料理特集](https://80c.jp/restaurant/20250926-1.html)\n\n---\n\n### 3.『東京最高のレストラン2026』編集長が選ぶ今年行くべき5店\n食べログマガジンで大木淳夫編集長（同書編集長）が5店を公開。グランメゾン・イタリアン・中華・日本料理・焼鳥という多ジャンルから選出。「東京の今が分かる5軒」として業界関係者の間で話題。\n\n\u003e 情報源：[食べログマガジン](https://magazine.tabelog.com/articles/482622)\n\n---\n\n### 4. 大阪・トムクリオーザ 食べログTOP5000入り\n2023年移転オープン後に急速に評価が上昇したイタリアン「トムクリオーザ」が食べログTOP5000入りを果たし、移転後から大阪随一の予約困難店に。地元民の間では「電話しても全然取れない」と話題続出。\n\n\u003e 情報源：[aumo 大阪グルメ](https://gourmet.aumo.jp/prefectures/27)\n\n---\n\n## ⏰ 期間限定・コラボ\n\n### 1. ブルーロック in NAMJATOWN 2026〜蝶舞うゴシックパレードだニャ〜\n**池袋・ナンジャタウン（サンシャインシティ内）｜5月22日〜7月12日**\n\nアニメ「ブルーロック」のゴシック衣装キャラクターをテーマにしたコラボイベント。フードメニューが本格的でアニメファン以外も注目。\n\n| メニュー名 | 価格 |\n|-----------|------|\n| ストライカーズの和風ワッフルプレート | ¥1,400 |\n| \"青い監獄\"のパズルサンドイッチ | ¥1,300 |\n| あたりソーダアイスの思い出ドリンク | ¥1,100 |\n| 士道のドラゴン・ドライブ！ピリ辛アラビアータ | ¥1,400 |\n| 涙のソルティレモネード | ¥1,200 |\n\n全メニューにイラストシート（全18種）付き。ミニゲームも併設。\n\n\u003e 情報源：[prtimes.jp バンダイナムコエクスペリエンス](https://prtimes.jp/main/html/rd/p/000000361.000159118.html) ／ [collabo-cafe.com](https://collabo-cafe.com/events/collabo/blue-lock-namja-town2026/)\n\n---\n\n### 2. ラブライブ！虹ヶ咲 × ツリービレッジ 3店舗コラボ\n**東京都内ツリービレッジ3店舗｜5月29日〜**\n\n「ラブライブ！虹ヶ咲学園スクールアイドル同好会」とツリービレッジが5月29日よりコラボ開始。コラボドリンク・フードとオリジナルグッズが登場。ラブライバーによる来店報告がSNSで急増中。\n\n\u003e 情報源：[ファッションプレス グルメイベントカレンダー](https://www.fashion-press.net/news/calendar/from:weekend/gourmet/)\n\n---\n\n### 3. Obey Me! Nightbringer ポップアップストア（グルメ併設）\n**東京・大阪（順次）｜5月29日〜7月12日**\n\nゲームアプリ「Obey Me!」のポップアップストアが東京・大阪で開催。カフェメニューとコラボグッズが充実。コラボカフェ情報サイトで週間アクセス上位入り。\n\n\u003e 情報源：[ファッションプレス グルメイベントカレンダー](https://www.fashion-press.net/news/calendar/from:weekend/gourmet/)\n\n---\n\n### 4. Tokyo Tokyo Delicious Museum 2026（5/15〜17・終了済・次回要確認）\n有明シンボルプロムナード公園で開催。入場無料・80店超参加・過去最多6.5万人来場。LA BETTOLAや赤坂四川飯店など普段予約困難な名店が集結。来年（2027年）の開催も必至。見逃した人は都の公式サイトでレポートをチェック。\n\n\u003e 情報源：[gourmet.gotokyo.org](https://www.gourmet.gotokyo.org/jp/article/135.html) ／ [prtimes.jp レポート](https://prtimes.jp/main/html/rd/p/000000010.000137776.html)\n\n---\n\n### 5. 大阪 クラフト餃子フェス 2026（GW・終了済）\n大阪城公園（5月2〜6日）で開催されたクラフト餃子フェスはGW最大のグルメイベントのひとつ。各地から個性的な餃子専門店が集結し、SNS映えするビジュアル餃子が続々話題に。来年への注目度が高まっている。\n\n\u003e 情報源：[Lmaga.jp GW注目フードイベント](https://www.lmaga.jp/news/2026/04/1050656/)\n\n---\n\n## 📈 トレンドフード\n\n### 1. ビリヤニ旋風 ── スパイス炊き込みご飯が「外食ジャンル」へ昇格\n\nインド・パキスタン発の「ビリヤニ（炊き込みご飯）」の専門店がここ1年で都内だけで十数軒オープン。もはやカレーの添え物ではなく「ビリヤニ専門店」として独立業態が成立し、スパイスカレーファンから一般グルメ層へ裾野が拡大中。クックパッド・食べログ共にレシピ・口コミ検索数が急増しており、2026年「外食の新定番ジャンル」として定着の兆し。\n\n**要注目キーワード**：マトン・チキン・ベジビリヤニ、ハイデラバーディ vs コルカタスタイル\n\n\u003e 情報源：[クックパッド 食トレンド予測2026](https://prtimes.jp/main/html/rd/p/000000350.000027849.html) ／ [食べログマガジン 2026トレンドフード](https://magazine.tabelog.com/articles/482545)\n\n---\n\n### 2. 麻辣グルメ 第2波 ── 串・鍋から「一皿料理」へ進化\n\n麻辣（マーラー）ブームは串・鍋から派生し、麻辣パスタ・麻辣担々麺・麻辣豆腐など「一皿料理」形式での展開が加速中。韓国発の麻辣串専門店（小麻辣など）の日本上陸が契機となり、20〜30代女性の「辛旨い」需要が外食市場を動かしている。スパイスの健康訴求もあり「ギルティーフリー」消費と組み合わさり継続的成長が見込まれる。\n\n**要注目キーワード**：麻辣串、麻辣豆花、辛さカスタム系\n\n\u003e 情報源：[ぐるなび通信 2026上半期外食トレンド](https://pro.gnavi.co.jp/magazine/t_res/cat_7/a_4869/) ／ [清田産業 2026年食市場トレンド](https://www.kiyota-s.com/kiyota-diary/3130)\n\n---\n\n### 3. フュージョン薬膳 ── 「健康×おいしい」が外食のど真ん中へ\n\nクックパッド「食トレンド予測2026」で「フュージョン薬膳」が選出。薬膳の考え方をベースにしながら、フレンチ・イタリアンの技法やビジュアルで仕上げる「食べる養生」スタイルが若い女性・健康意識高め層に急浸透。薬膳スープ専門店やフュージョン薬膳コースを提供するレストランが東京・大阪の健康志向エリアで新規開業ラッシュ中。ミシュラン先行公開の「慈雨」（薪火フレンチ）や「お寅」（季節表現日本料理）もその延長線上にある流れ。\n\n**要注目キーワード**：薬膳スープ、一汁三菜ボウル、薬膳ランチコース\n\n\u003e 情報源：[クックパッド 食トレンド予測2026](https://static.cookpad.com/campaign/foodtrend/forecast/) ／ [ウーマンズラボ 食トレンド2025-2026](https://womanslabo.com/trend-251204-1)\n\n---";
