const md = "十分な情報が集まりました。レポートを生成します。\n\n---\n\n## 🔥 今週バズりグルメ\n\n---\n\n### 1. Brussels Fries（ブリュッセルフライ）\n**新大久保 / 新宿区歌舞伎町 · 新大久保駅徒歩10分 / 西武新宿駅徒歩5分**\n\n- **ジャンル**: フライドポテト専門店\n- **価格帯**: ¥500〜¥1,200（カスタマイズ次第）\n- **おすすめメニュー**: 2度揚げ極太ポテト＋ガーリックムースソース、シーズニングカスタム\n- **バズった理由**: 韓国・大邱で40店舗を展開する超人気店が日本初上陸。牛脂混合油で仕上げる「外カリ中フワ」のポテトに、真っ白なガーリックムースソースをかける動画がInstagram・TikTokで爆拡散。「混ぜ映え」「ソースの塗りたくり」動画がリール上で無限ループされており、週末は常時行列。2026年2月オープン後も熱が冷めていない。\n- **予約**: 不要（並び）\n- **情報源**: [trepo.jp](https://trepo.jp/food/305573/) / [Instagram #ブリュッセルフライ](https://www.instagram.com/p/DT0SS2AE9ui/)\n\n---\n\n### 2. アマムダコタン 東京店（明太フランス）\n**渋谷・表参道エリア**\n\n- **ジャンル**: ベーカリー\n- **価格帯**: ¥400〜¥800\n- **おすすめメニュー**: 明太フランス（注文後に目の前で明太バター注入→再加熱）\n- **バズった理由**: 福岡の伝説的ベーカリー「アマムダコタン」の東京進出が2026年の明太フランスブームに火をつけた。パンを焼いた後に切れ目を入れ、目の前で特製明太バターを詰め込む「ライブ感」がSNSで熱狂を生む。食べログマガジンが「2026年かつてない熱狂」と評した。\n- **予約**: 不要（整理券・早朝並び推奨）\n- **情報源**: [食べログマガジン 2026年トレンド](https://magazine.tabelog.com/articles/482545)\n\n---\n\n### 3. 四ツ谷一餅堂（台湾胡椒餅）\n**四ツ谷 / 四ツ谷駅徒歩2分**\n\n- **ジャンル**: 台湾朝食・食べ歩き\n- **価格帯**: ¥400〜¥600\n- **おすすめメニュー**: 窯焼き胡椒餅（豚肉＋ネギ）、チーズ胡椒餅\n- **バズった理由**: 窯に貼り付けて焼き上げる「剥がし動画」がTikTokで連続バズ。外はパリパリ、中はジューシーな肉汁が溢れる瞬間の映像が再生回数を激増させた。2026年は「第二次胡椒餅ブーム」として観光地への出店も加速中。\n- **予約**: 不要（食べ歩き）\n- **情報源**: [食べログマガジン 2026年トレンド](https://magazine.tabelog.com/articles/482545)\n\n---\n\n### 4. 焼鳥さいとう\n**六本木 / 六本木駅徒歩5分（2026年5月5日オープン）**\n\n- **ジャンル**: 焼き鳥\n- **価格帯**: ¥8,000〜¥15,000（コース）\n- **おすすめメニュー**: 睡眠改善素材を使ったコース料理、炭火焼き地鶏\n- **バズった理由**: 「睡眠×美容×食」をテーマにした唯一無二の焼鳥体験が異彩を放ちX上で話題沸騰。「美容に効く焼鳥」「次世代ウェルネスダイニング」として美容系インフルエンサーが相次いで来店投稿。\n- **予約**: 要予約（食べログ・公式LINE）\n- **情報源**: [hibana 東京ニューオープン2026 Vol.2](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n---\n\n### 5. 原価ビストロ チーズプラス 池袋店\n**池袋 / 池袋駅徒歩3分**\n\n- **ジャンル**: ビストロ・チーズ料理\n- **価格帯**: ハイボール¥64〜（業界最安値水準）\n- **おすすめメニュー**: チーズ料理各種、原価ドリンク\n- **バズった理由**: 「ハイボール64円」のキャプションがTwitter・Instagramで爆発的に拡散。物価高に苦しむ若者層が「これが本当の原価?」と連投。「安すぎて逆に怖い」というコメントが続出し話題店に。\n- **予約**: 不要〜一部予約可\n- **情報源**: [hibana 東京ニューオープン2026 Vol.2](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n---\n\n### 6. 鴨専門店 玉鋼鉄板（かものや たまはがねてっぱん）\n**新富町 / 新富町駅徒歩3分（2026年5月15日オープン）**\n\n- **ジャンル**: 鴨料理（カウンター割烹）\n- **価格帯**: ¥20,000〜（コース）\n- **おすすめメニュー**: 玉鋼鉄板で焼き上げる鴨ロース、鴨鍋\n- **バズった理由**: 刀剣の材料「玉鋼」を鉄板に使うという前代未聞の演出がXの食通クラスタで激震。わずか7席という希少性も相まって開業前から予約困難店として話題騒然。\n- **予約**: 要予約（数ヶ月待ちの噂）\n- **情報源**: [hibana 東京ニューオープン2026](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n---\n\n### 7. 酒場カミナリ\n**高円寺 / 高円寺駅徒歩2分**\n\n- **ジャンル**: 大衆酒場・海鮮\n- **価格帯**: ¥2,000〜¥4,000\n- **おすすめメニュー**: 生牡蠣¥299、まぐろ刺身、自然派日本酒\n- **バズった理由**: 「高円寺に来た牡蠣¥299の店」がグルメ系Instagramで一斉に拡散。コスパ激高の海鮮×大衆酒場スタイルが「週4で通いたい」「一人飲みの聖地」と評され若者・サラリーマン双方から熱視線。\n- **予約**: 不要（並び）\n- **情報源**: [hibana 東京ニューオープン2026 Vol.2](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n---\n\n### 8. 豆皿定食 SNS話題店群\n**東京都内各所（代官山・白金台・蔵前ほか）**\n\n- **ジャンル**: 日本料理（朝食・ランチ）\n- **価格帯**: ¥1,500〜¥3,500\n- **おすすめメニュー**: 小鉢9〜18種盛り合わせ定食、出汁巻き卵、旬野菜の炊合せ\n- **バズった理由**: 「豆皿が並んだ俯瞰写真」のSNS映えが異常なほど高エンゲージメントを記録。「ちゃんとした日本食」へのカムバック需要と相まって週末は予約困難店が続出。\n- **予約**: 要予約（食べログ・一休）\n- **情報源**: [食べログマガジン 2026年トレンド](https://magazine.tabelog.com/articles/482545)\n\n---\n\n## 🆕 新規オープン注目店\n\n---\n\n### 1. 鮨 上ル（すし のぼる）高輪ゲートウェイ店\n**高輪ゲートウェイ / 高輪ゲートウェイ駅直結**\n\n- **ジャンル**: 江戸前寿司\n- **価格帯**: ¥18,000〜¥35,000（おまかせコース）\n- **コンセプト**: 創業100年超の老舗「鮨 上ル」による次世代フラッグシップ。食べ比べと説明を通じ「知的欲求を満たす」江戸前鮨体験を提供。高輪ゲートウェイ再開発の目玉店舗として注目度高。\n- **シェフ情報**: 本店から独立した若手職人が担当、伝統技術と現代プレゼンの融合\n- **注目メニュー**: 旬魚の食べ比べおまかせコース、本鮪大トロの握り\n- **予約**: 要予約（公式サイト・一休）\n- **情報源**: [hibana 東京ニューオープン2026 Vol.2](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n---\n\n### 2. L\u0027ECAILLER 8TH SEA OYSTER（レカイエ エイトシーオイスター）\n**高輪 / 品川駅徒歩10分**\n\n- **ジャンル**: 牡蠣・シーフードレストラン\n- **価格帯**: ¥5,000〜¥12,000\n- **コンセプト**: 国内外の牡蠣を食べ比べるオイスターバー×シーフードレストラン。フランス・ベルギー産の生牡蠣から三陸産まで常時10種以上ラインナップ。\n- **注目メニュー**: 産地別牡蠣5点盛り、牡蠣と帆立のムニエル、シャンパンペアリングコース\n- **予約**: 要予約\n- **情報源**: [hibana 東京ニューオープン2026 Vol.2](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n---\n\n### 3. 小麻辣 下北沢店（シャオマーラー）\n**下北沢 / 下北沢駅徒歩3分**\n\n- **ジャンル**: 韓国麻辣串\n- **価格帯**: ¥1,000〜¥2,500\n- **コンセプト**: 韓国発の「麻辣（マーラー）×串揚げ」新業態、日本初上陸。辛さ・痺れのカスタマイズが可能で、野菜・肉・海鮮を選んでタレを選ぶスタイル。下北沢のカルチャー感と韓国ストリートフードが融合。\n- **注目メニュー**: 麻辣チーズ串盛り、韓国スタイルの揚げもの盛り合わせ\n- **予約**: 不要\n- **情報源**: [hibana 東京ニューオープン2026 Vol.2](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n---\n\n### 4. 白鶏舎／トリノイロ\n**笹塚 / 笹塚駅徒歩5分**\n\n- **ジャンル**: 鶏料理（昼：鶏白湯ラーメン／夜：焼き手羽）\n- **価格帯**: 昼¥1,000〜¥1,800 / 夜¥3,000〜¥5,000\n- **コンセプト**: 「一つの鶏に昼と夜で違う顔を持たせる」二毛作スタイル。昼は純鶏100%のとろとろ白湯ラーメン、夜は備長炭で焼き上げる焦がし手羽先が主役。\n- **注目メニュー**: 地鶏濃厚白湯ラーメン（昼限定）、炭火焼き手羽先 柚子胡椒添え（夜限定）\n- **予約**: 夜のみ要予約\n- **情報源**: [hibana 東京ニューオープン2026 Vol.2](https://biz-hibana.com/tokyo-newopen-restaurant-2026-vol2/)\n\n---\n\n### 5. PAL COFFEE（パル コーヒー）\n**大阪・西区 / 西大橋駅徒歩5分（2026年5月オープン）**\n\n- **ジャンル**: スペシャルティコーヒー専門店\n- **価格帯**: ¥600〜¥1,200\n- **コンセプト**: 大阪西区の静かな路地に誕生したサードウェーブ系コーヒー専門店。世界各地のシングルオリジンを季節ごとに厳選。\n- **注目メニュー**: シーズナルシングルオリジンエスプレッソ、コールドブリューラテ\n- **予約**: 不要\n- **情報源**: [関西ニューオープン情報2026](https://kansai-kaiten.com/kaitenheiten2026_osaka/)\n\n---\n\n### 6. ORIKASH CAFE（オリカッシュカフェ）\n**大阪・吹田 / 千里山駅徒歩8分（2026年5月オープン）**\n\n- **ジャンル**: カフェ・ワインバー\n- **価格帯**: 昼¥1,500〜¥2,500 / 夜¥4,000〜¥7,000\n- **コンセプト**: 古い倉庫をリノベートした「エモーショナル空間」。昼は贅沢プレートランチ、夜はワインとチーズが楽しめる二毛作カフェ。フォトジェニックな内装がSNS受け狙い目。\n- **注目メニュー**: 旬野菜の贅沢プレート（昼）、自然派ワイン×国産チーズペアリング（夜）\n- **予約**: 夜のみ要予約\n- **情報源**: [関西ニューオープン情報2026](https://kansai-kaiten.com/kaitenheiten2026_osaka/)\n\n---\n\n## ⭐ ミシュラン・メディア話題\n\n---\n\n### 1. 明寂（Myojaku）— 新三つ星昇格\n**東京・港区（2025年9月発表）**\n\n- **ジャンル**: 日本料理\n- **シェフ**: 中村英利氏\n- **価格帯**: ¥50,000〜（おまかせ）\n- **話題の内容**: 「ミシュランガイド東京2026」にて二つ星から三つ星へ昇格。コンセプトは「調和、淡、清らか」。昆布・鰹節の出汁を極力控え、「海底湧水を使い水の豊かさを表現する」という前衛的な日本料理が世界最高峰の評価を獲得。2022年開業からわずか4年での三つ星は近年最速クラス。\n- **情報源**: [ヒトサラマガジン ミシュラン東京2026](https://magazine.hitosara.com/article/1860/)\n\n---\n\n### 2. ミシュランガイド東京2026 — 19年連続世界一を堅持\n**東京（2025年9月25日発表）**\n\n- **話題の内容**: 総掲載526軒（三つ星12、二つ星26、一つ星122）。19年連続で「星付き掲載店数世界一」の美食都市を維持。インバウンド誘致の強力な武器として政府・観光庁も注目。新たな二つ星には「西麻布 鮨 真」「伯雲」（青山・日本料理）「炎水」（中目黒・日本料理）が昇格。\n- **情報源**: [タイムアウト東京](https://www.timeout.jp/tokyo/ja/news/michelin-awards-tokyo-restaurants-2026-092925) / [やまとごころ.jp](https://yamatogokoro.jp/inbound_data/58478/)\n\n---\n\n### 3. ミシュランガイド2026 先行公開 — 新セレクテッドレストラン8軒\n**東京（2026年5月発表）**\n\n- **話題の内容**: 2026年5月、ミシュランガイドが東京の新たな推薦店8軒を先行公開。現代風料理・イタリアン・フランス料理・日本料理・ピッツァ・焼き鳥など幅広いジャンル。「ビブグルマン」候補として注目される中価格帯の実力店が中心。\n- **情報源**: [favy 速報](https://www.favy.jp/topics/37858) / [ゴムタイムズ](https://www.gomutimes.co.jp/?p=205272)\n\n---\n\n### 4. グリーンスター新受賞 — トワヴィサージュ\n**東京**\n\n- **ジャンル**: フランス料理\n- **話題の内容**: 「ミシュラン・グリーンスター」（持続可能なガストロノミー部門）を新たに受賞。端材を堆肥化するフードロス削減の取り組みが高評価。東京は世界で最もグリーンスター数が多い都市を今年も維持（計13軒）。「おいしい×サステナブル」を両立するレストランへの関心が高まっている。\n- **情報源**: [ヒトサラマガジン ミシュラン東京2026](https://magazine.hitosara.com/article/1860/)\n\n---\n\n## ⏰ 期間限定・コラボ\n\n---\n\n### 1. よーじや × チョコミント POP UP SHOP\n**有楽町マルイ（〜6/21）/ 渋谷モディ（6/2〜6/21）**\n\n- **ジャンル**: スイーツ・コスメコラボ\n- **価格帯**: パフェセット¥1,750〜¥3,200\n- **内容**: 京都の老舗コスメブランド「よーじや」が毎年恒例のチョコミントシーズンを東京で開催。「最大80倍スースー！」の刺激的なチョコミントパフェがカフェで提供される。「50倍スースーパフェ（東京バージョン）」はリピーター続出の名物。スキンケアアイテム（ミントリップ・ハンドクリーム）とセットで「食べてもぬっても」ミントの世界観。\n- **予約方法**: 専用サイトより事前予約制（有楽町は5/19〜受付開始済み）\n- **終了日**: 6月21日（日）\n- **情報源**: [PR TIMES よーじや](https://prtimes.jp/main/html/rd/p/000004109.000003860.html) / [よーじや公式](https://www.yojiya.co.jp/archives/4101)\n\n---\n\n### 2. Tokyo Tokyo Delicious Museum 2026\n**東京・有明（開催済み：5/15〜17）**\n\n- **ジャンル**: グルメフェスティバル\n- **価格帯**: 入場料+フード代（各¥500〜¥2,000程度）\n- **内容**: 東京の名店・話題店が一堂に会する大規模フードフェス。予約困難な一つ星店のスペシャルメニューや、新進気鋭のシェフによる限定コラボ料理が楽しめる「動く東京グルメ図鑑」。今年は出店メニューのラインナップも事前公開されSNSで大反響。\n- **情報源**: [PR TIMES](https://prtimes.jp/main/html/rd/p/000000009.000137776.html)\n\n---\n\n### 3. BAKED MAGIC \u0026 BRULEE BAKERY（スイーツ×ブリュレベーカリー）\n**大阪・東大阪（2026年5月オープン）**\n\n- **ジャンル**: スイーツ・ベーカリー\n- **価格帯**: ¥400〜¥1,000\n- **内容**: 「スイーツ×ブリュレ×ベーカリー」という唯一無二のコンセプト専門店。バーナーで目の前でブリュレ仕上げする「ライブ感」がSNSで話題。焼き立てパンにキャラメリゼしたクリームを絡める新感覚パン体験。\n- **予約**: 不要\n- **情報源**: [関西ニューオープン情報2026](https://kansai-kaiten.com/kaitenheiten2026_osaka/)\n\n---\n\n### 4. クラフト餃子フェス2026（大阪）\n**大阪城公園（開催済み：5/2〜5/6）**\n\n- **ジャンル**: 餃子フードフェス\n- **価格帯**: ¥400〜¥1,200\n- **内容**: 全国の実力派餃子店が集結したクラフト系フードフェス。大阪城公園の絶好ロケーションで、スモーク餃子・チーズ溢れ系・エスニックアレンジまで多彩な餃子文化を一気食い。GW恒例の大阪グルメイベントとして定着。\n- **情報源**: [lmaga.jp 大阪GWフードイベント](https://www.lmaga.jp/news/2026/04/1050656/)\n\n---\n\n### 5. THE MEAT OSAKA 2026\n**大阪・長居公園（開催済み：4/29〜5/6）**\n\n- **ジャンル**: 肉フェス\n- **価格帯**: 入場無料 / 料理¥600〜¥2,000\n- **内容**: 関西最大級の肉フェスが長居公園で開催。和牛・焼き肉・熟成肉・外国産牛・ジビエなど多様な肉料理が集結。インフルエンサーの事前告知でGW前から話題沸騰し、当日は数万人規模の来場者。SNSに「肉のカーニバル」投稿が殺到。\n- **情報源**: [themeat.jp](https://themeat.jp/osaka2026/)\n\n---\n\n## 📈 トレンドフード\n\n---\n\n### 1. 葱油拌麺（ツォンヨウバンメン）\n- **ジャンル**: 中華（上海式和え麺）\n- **今なぜ旬か**: 揚げたネギの香りと醤油ベースのタレだけで作る究極のシンプル麺が「香り系グルメ」として台頭。ガチ中華ブームの延長線上で「次の定番」として食通層からの注目を集めている。ヌードル一杯¥800〜¥1,400の価格帯で東京・大阪のガチ中華専門店が続々提供開始。\n- **来そうな兆し**: 「上海式和え麺」専門店の出店計画が複数確認されており、2026年下半期に専門店ブームが来る可能性大。\n- **情報源**: [食べログマガジン 2026年トレンド予測](https://magazine.tabelog.com/articles/482545)\n\n---\n\n### 2. ネパール料理（モモ \u0026 ダルバート）\n- **ジャンル**: ネパール家庭料理\n- **今なぜ旬か**: インド料理店の陰に隠れていたネパール料理が2025〜26年に一気に独立ジャンルとして確立。「ダルバート（豆スープ定食）」は栄養バランスが完璧で健康志向層に刺さり、「モモ（蒸し餃子）」は映えとB級感を両立する「進化系餃子」として認知拡大中。\n- **来そうな兆し**: 大久保・高田馬場周辺のネパール人コミュニティ発の正統派店舗が食通から発掘されSNSで拡散。2026年後半に「ネパール飯ブーム」が来るとぐるなび・クックパッドともに予測。\n- **情報源**: [食べログマガジン 2026年トレンド](https://magazine.tabelog.com/articles/482545) / [ぐるなび通信 2026上半期外食トレンド](https://pro.gnavi.co.jp/magazine/t_res/cat_7/a_4869/)\n\n---\n\n### 3. 中華アフタヌーンティー\n- **ジャンル**: 中国茶×点心（新業態）\n- **今なぜ旬か**: 英国式アフタヌーンティーのフォーマットを中華で置き換えた「中華アフタヌーンティー」が東京・ホテル系中華レストランで相次いで登場。蒸し点心・揚げ点心・ミニ杏仁豆腐・プーアール茶などをスタンドに並べる演出がInstagramで異常なインプレスを記録している。\n- **来そうな兆し**: 西洋陶磁器ブランドとのコラボによる「映え器×中華点心」の組み合わせが新たなラグジュアリーアフタヌーン市場を創出しつつある。横浜・中華街での本格展開も近い模様。\n- **情報源**: [食べログマガジン 2026年トレンド](https://magazine.tabelog.com/articles/482545)";
document.getElementById('content').innerHTML = marked.parse(md);
document.querySelectorAll('#content h3').forEach(h3 => {
  const raw = h3.textContent.trim();
  const clean = raw.replace(/^\d+\.\s*/,'').split(/[・・窶補能s]/)[0].trim();
  if (!clean || clean.length < 2) return;
  fetch('https://ja.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(clean))
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(d => {
      if (!d.thumbnail) return;
      const img = document.createElement('img');
      img.src = d.thumbnail.source;
      img.alt = clean;
      h3.insertAdjacentElement('afterend', img);
    })
    .catch(() => {});
});
