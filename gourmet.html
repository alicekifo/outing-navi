<script>
const md = "情報が揃いました。Markdownレポートを作成します。\n\n---\n\n## 🔥 今週バズりグルメ\n\n---\n\n### 1. BRUSSELS FRIES（ブリュッセルフライ）\n**エリア：新大久保 / 最寄り駅：西武新宿駅 徒歩5分**\n**ジャンル：フライドポテト専門店 / 価格帯：¥500〜¥1,200程度**\n\n韓国・大邱発のベルギー式フライドポテト専門店が日本初上陸。揚げたてのフリットに、チーズ・明太子・コチュジャンなど多彩なソースをかけ、ぐるぐる混ぜ合わせる「混ぜる動画」がInstagram・TikTokで爆発的に拡散。「新大久保の新定番」として感度の高い10〜20代が連日行列をつくる。王様のブランチでも取り上げられ、テレビ効果で更に加速中。  \n**場所：** 東京都新宿区歌舞伎町2-41-12 泉ビル1F  \n**予約：** 不可（並び必須、完売次第終了）  \n**情報源：** [Trepo](https://trepo.jp/food/305573/) / [Instagram @brussels_fries_jp](https://www.instagram.com/brussels_fries_jp/)\n\n---\n\n### 2. アマムダコタン カフェ＆ベイク（表参道）\n**エリア：表参道 / 最寄り駅：表参道駅B2出口 徒歩1分**\n**ジャンル：ベーカリー・カフェ / 価格帯：¥400〜¥1,500**\n\n福岡発のベーカリー「アマムダコタン」が\"生ベイク\"体験に特化したカフェ業態として表参道に展開。目玉は注文後に明太バターを目の前で注入し再加熱する「明太フランス（ライブ型）」。「出てくる瞬間が映える」「バターがとろける断面動画」が止まらずTikTokで万超え再生。約50種の焼き菓子が全て当日焼き立てという鮮度設計が話題を呼ぶ。  \n**場所：** 東京都港区北青山3-7-6  \n**予約：** 不可（11時〜完売次第閉店）  \n**情報源：** [CAKE.TOKYO](https://cake.tokyo/103611) / [公式サイト](https://amamdacotan.com/)\n\n---\n\n### 3. 四ツ谷一餅堂 台湾胡椒餅\n**エリア：四ツ谷 / 最寄り駅：四ツ谷駅 徒歩数分**\n**ジャンル：台湾屋台料理 / 価格帯：¥500前後**\n\n窯の中で直火焼きにする本格台湾胡椒餅。焼きたてを窯から取り出す瞬間のビジュアルと、噛んだ瞬間に肉汁があふれる動画がXとInstagramで連日拡散。「東京で本場の味が食べられる」「並んで食べる価値あり」と口コミが急増。テイクアウト専門のため回転も早い。  \n**予約：** 不可（並び推奨）  \n**情報源：** [食べログマガジン](https://magazine.tabelog.com/articles/482545)\n\n---\n\n### 4. BRUSSELS FRIES 混ぜポテト以外も：葱油拌麺（コンユーバンメン）専門店 各地で話題\n**エリア：東京都内複数店舗**\n**ジャンル：上海料理・麺 / 価格帯：¥900〜¥1,400**\n\n上海のソウルフード「葱油拌麺（ネギ油まぜそば）」が東京で2026年最大のブームに突入。シンプルながら奥深いネギ油と醤油の旨みが「中毒性高い」「コスパが神」とZ世代に刺さり、専門店への長蛇の列が日常化。タベログ・Instagramでの投稿数が1月比3倍以上に急増しているとの声も。  \n**情報源：** [食べログマガジン 2026年トレンド大予想](https://magazine.tabelog.com/articles/482545)\n\n---\n\n### 5. 馬場FLAT（早稲田・高田馬場エリア）\n**エリア：高田馬場周辺 / ジャンル：複合カフェ・グルメ**\n**価格帯：¥800〜¥2,000**\n\n「馬場エリアのフラットな居場所」をコンセプトにしたカフェ複合施設。フォトジェニックなプレートとアンビエントな空間がInstagramで頻繁にシェアされ、特に学生・クリエイター層に熱狂的なファンを形成。「初めて行ったのに落ち着ける」という口コミが連鎖。  \n**情報源：** [食べログマガジン](https://magazine.tabelog.com/articles/479837)\n\n---\n\n### 6. かめぱんカフェ\n**エリア：東京都内（詳細は公式SNS参照）**\n**ジャンル：パン・カフェ / 価格帯：¥600〜¥2,000**\n\n亀モチーフをあしらったキュートなパン・スイーツがInstagramで爆発的に広まり、整理券待ち必至の超人気店に。「見た目が可愛すぎて食べられない」というコメントが多数。SNSで拡散した後も来客数が落ちず、2026年春イチのフォトジェニックパン店として定着しつつある。  \n**情報源：** [食べログマガジン](https://magazine.tabelog.com/articles/479837)\n\n---\n\n### 7. 麻辣湯（マーラータン）専門店 都内各地\n**エリア：東京各所（新大久保・渋谷・池袋 etc.）**\n**ジャンル：中華・スープ専門 / 価格帯：¥800〜¥1,500**\n\n2025年から続く麻辣湯ブームが2026年も衰えず、むしろ上位互換の「高単価麻辣湯」「カスタム麻辣湯」が台頭。具材・辛さ・しびれを自分でチョイスするスタイルがTikTokで「自分だけの一杯」として何度も紹介され、リピート率が極めて高い。  \n**情報源：** [ぐるなび通信 外食トレンド2026](https://pro.gnavi.co.jp/magazine/t_res/cat_7/a_4869/)\n\n---\n\n### 8. 虎ノ門横丁（東京・虎ノ門）\n**エリア：虎ノ門 / 最寄り駅：虎ノ門ヒルズ駅直結**\n**ジャンル：フードホール（予約困難店集積）/ 価格帯：¥3,000〜¥15,000**\n\n虎ノ門ヒルズ内の進化型フードホール。予約困難な名店が集積し、「今日どこかに入れるはず」という感覚で来訪できる稀有な存在として再注目を集める。特にSNSでは「ガチフードコートの聖地」として継続的にバズ。インバウンドと国内グルメ層双方に人気が高い。  \n**情報源：** [食べログマガジン 2026年行くべき東京5選](https://magazine.tabelog.com/articles/482622)\n\n---\n\n## 🆕 新規オープン注目店\n\n---\n\n### 1. 玉鋼鉄板 鴨専門店（名称未公表・プレオープン段階）\n**エリア：新富町（東京・中央区）/ 最寄り駅：新富町駅 徒歩圏**\n**ジャンル：鴨料理・鉄板焼き / 価格帯：¥15,000〜（コース想定）**\n**オープン日：2026年5月15日**\n\n日本刀の素材として知られる極希少な「玉鋼（たまはがね）」の鉄板で鴨肉を焼き上げる、全国唯一の鴨専門鉄板焼き。わずか7席というカウンタースタイルで料理人との距離が近く、席ごとに火加減・焼き方が変わる\"一期一会の鉄板体験\"が特徴。完全予約制とみられ、情報解禁直後から予約希望が殺到している模様。  \n**予約：** 完全予約制（公式SNS・HPより要確認）  \n**情報源：** [食べログマガジン](https://magazine.tabelog.com/articles/482622)\n\n---\n\n### 2. 世界最高峰パティシエ監修 パティスリー（六本木）\n**エリア：六本木 / 最寄り駅：六本木駅 徒歩圏**\n**ジャンル：パティスリー / 価格帯：ケーキ¥1,500〜¥4,000想定**\n**オープン日：2026年5月14日**\n\n「芸術のような美しさと記憶に残る味わい」を標榜する、世界大会受賞歴を持つトップパティシエが東京・六本木に満を持してオープン。チョコレートとパーツ一つひとつを自ら設計するシグネチャーコレクションが注目。オープン初日から長蛇の列が報告されており、スイーツ好きのSNSで一斉に紹介されている。  \n**予約：** 要確認（一部イートイン席は予約可能の可能性）  \n**情報源：** [食べログマガジン](https://magazine.tabelog.com/articles/482622)\n\n---\n\n### 3. 沖縄凱旋 カスタムイタリアン（人形町）\n**エリア：人形町（東京・中央区）/ 最寄り駅：人形町駅 徒歩圏**\n**ジャンル：イタリアン / 価格帯：¥8,000〜¥15,000（コース）**\n\n沖縄で人気イタリアンを率いた実力派シェフが東京・人形町に帰還。「通うほどに自分好みのオーダーが組み立てられる」という顧客カスタマイズ型コース設計が最大の特徴。沖縄産食材と本土の四季食材を組み合わせたフュージョンが売り。食通の間でいち早く口コミが広がっている。  \n**予約：** 予約必須（詳細はお店公式要確認）  \n**情報源：** [食べログマガジン](https://magazine.tabelog.com/articles/482622)\n\n---\n\n### 4. 大衆ジンギスカン酒場ラムちゃん 人形町店\n**エリア：人形町 / 最寄り駅：人形町駅 徒歩圏**\n**ジャンル：ジンギスカン・ラム肉 / 価格帯：¥2,500〜¥5,000**\n**オープン日：2026年4月24日**\n\n店舗数日本一のジンギスカン専門チェーンが下町・人形町に初進出。リーズナブルなラム肉食べ放題コースが人気で、ガッツリ系でありながら臭みの少ない上質なラム肉がウリ。オープン直後から満席続きで、ランチ需要も高い。  \n**予約：** 予約推奨（ホットペッパー等から可能）  \n**情報源：** [プレスリリース（PR TIMES）](https://prtimes.jp/main/html/rd/p/000000302.000020880.html)\n\n---\n\n### 5. Commons Market \u0026 kitchen\n**エリア：大阪市・生野 / 最寄り駅：巽西（詳細は公式要確認）**\n**ジャンル：ラーメン・つけ麺 / 価格帯：¥1,000〜¥1,800**\n**オープン日：2026年5月20日**\n\n限定の極上濃厚豚骨魚介つけ麺と国産鴨塩らあめんの2本柱が注目を集める大阪の新星。地元の食通ブロガーやInstagramのラーメンアカウントにより開店前から話題が先行し、オープン初日から行列が発生。大阪ラーメン新鋭店として各グルメメディアが注目している。  \n**予約：** 不可（並び必須）  \n**情報源：** [大阪開店閉店情報2026](https://kansai-kaiten.com/kaitenheiten2026_osaka/)\n\n---\n\n### 6. BAKED MAGIC \u0026 BRULEE BAKERY（ブレードマジック＆ブリュレベーカリー）\n**エリア：大阪（詳細エリア要確認）**\n**ジャンル：スイーツ・ブリュレベーカリー専門 / 価格帯：¥600〜¥2,000**\n**オープン日：2026年5月**\n\n「スイーツ×ブリュレ×ベーカリー」という三位一体の専門業態が大阪に誕生。バーナーで仕上げるブリュレ系パンやケーキが「目の前で炙る瞬間」の動画映えとして関西圏SNSで話題沸騰中。大阪の新業態好き・スイーツ好き女性層に刺さっている。  \n**情報源：** [大阪開店閉店情報2026](https://kansai-kaiten.com/kaitenheiten2026_osaka/)\n\n---\n\n## ⭐ ミシュラン・メディア話題\n\n---\n\n### 1. 【ミシュランガイド東京2026】日本料理「明寂」 — 新三つ星\n**エリア：東京（詳細非公開 / 完全予約制）**\n**ジャンル：日本料理 / 価格帯：¥30,000〜（コース）**\n\n2025年9月25日発表。京都・徳島で研鑽を積んだ後、東京の一つ星店で11年間板長を務めた料理人が2022年に独立開業。「調和・淡・清らか」を理念に、昆布・鰹節だしを多用せず、食材本来の旨みと**海底湧水（海底から湧き出る地下水）**を主役に据えた全く新しい日本料理が高く評価された。2023年に二つ星で初掲載→わずか2年で三つ星に昇格という驚異の軌跡。東京の三つ星は計12軒。  \n**情報源：** [ヒトサラマガジン](https://magazine.hitosara.com/article/1860/) / [飲食店.com](https://www.inshokuten.com/foodist/article/8068/)\n\n---\n\n### 2. 【ミシュランガイド東京2026】新一つ星14軒の顔ぶれ\n**発表日：2025年9月25日**\n\n新規一つ星14軒のうち注目は：\n- **鮨 ゆうき**（寿司）\n- **鮨 みうら**（寿司）\n- **鮨 大矢**（寿司）\n- **匠 達広**（寿司）\n- **カオ（KAO）**（タイ料理）← タイ料理の星獲得として異例の快挙、SNSで話題\n- **氣分（KIBUN）**（現代風料理）\n- **マノワ / マージ / ラ グロワ**（フランス料理3軒）\n- **百薬 by 徳山鮓**（日本料理・発酵食）\n\n総掲載数526軒は19年連続で世界最多。  \n**情報源：** [ミシュラン公式プレスリリース](https://prtimes.jp/main/html/rd/p/000000059.000117133.html)\n\n---\n\n### 3. 【ミシュランガイド京都・大阪2026】「美山荘」— 6年ぶり京都新三つ星\n**エリア：京都北山（美山荘）**\n**ジャンル：日本料理 / 価格帯：¥35,000〜（宿泊コース）**\n\n2026年4月23日発表。京都・北山の奥に佇む山荘旅館「美山荘」が6年ぶりに新三つ星を獲得。中東久人氏が自ら山野で摘んだ旬の食材（山菜・野草）を使い、自然の恵みをそのまま皿に映す料理が「ガストロノミーの新章」と評された。グリーンスター（持続可能性）も同時保持。総掲載479軒は京都・大阪版過去最多。  \n**情報源：** [ヒトサラマガジン](https://magazine.hitosara.com/article/2181/) / [WA・TO・BI](https://watobi.jp/news_topics/10634.html)\n\n---\n\n### 4. 【ミシュランガイド京都・大阪2026】新二つ星5軒・新一つ星19軒\n**発表日：2026年4月23日**\n\n新二つ星（一つ星から昇格）は全5軒が日本料理：\n- **獨歩（Doppo）**（京都）\n- **東山 吉寿（Higashiyama Yoshihisa）**（京都）\n- **室町 唯（Muromachi Yui）**（京都）\n- **徳ハ本也（Tokuha Motonari）**（京都）\n- **照屋（Teruya）**（大阪）← 大阪から唯一の新二つ星として注目\n\n新ビブグルマンも12軒追加で、関西グルメシーンの厚みがさらに増した。  \n**情報源：** [オリコン Yahoo!ニュース](https://news.yahoo.co.jp/articles/6c84120db0283c200657a7d5e8e09e7ac06ae481) / [timeout.jp](https://www.timeout.jp/osaka/ja/news/michelin-kyoto-osaka-2026-new-chapter-043026)\n\n---\n\n## ⏰ 期間限定・コラボ\n\n---\n\n### 1. ぼのぼの × E-DINER コラボカフェ ⚠️5月31日まで\n**エリア：池袋（東京）・HEP FIVE 6F（大阪）**\n**ジャンル：コラボカフェ / 価格帯：フード¥1,000〜¥2,000、ドリンク¥700〜**\n**期間：2026年5月20日（水）〜5月31日（日）**\n\n人気キャラクター「ぼのぼの」とE-DINERのコラボカフェ。ぼのぼのをモチーフにしたフードとドリンクが提供される。大阪のイーアニ店ではコラボフードの販売なし（ドリンクのみ）のため注意。残りわずか、急いで。  \n**情報源：** [PR TIMES](https://prtimes.jp/main/html/rd/p/000000165.000127482.html)\n\n---\n\n### 2. つばきっさ（つばきファクトリー コラボカフェ）⚠️5月31日まで\n**エリア：東京・大阪・愛知**\n**ジャンル：アイドルコラボカフェ / 価格帯：フード¥1,200〜¥1,800**\n**期間：2026年5月1日〜5月31日**\n\nハロプロ「つばきファクトリー」×コラボカフェ「つばきっさ」。メンバーをイメージしたオリジナルメニューが提供。コラボグッズも販売中。ファン以外にもフォトジェニックな限定プレートが好評で来客増加中。  \n**情報源：** [コラボカフェ一覧](https://collabo-cafe.com/events/tag/tokyo/)\n\n---\n\n### 3. ブラック・ジャック × Collabo_Index コラボカフェ ⚠️5月25日まで\n**エリア：東京・大阪・名古屋**\n**ジャンル：漫画コラボカフェ / 価格帯：フード¥1,200〜¥2,000**\n**期間：2026年4月10日〜5月25日**\n\n手塚治虫の不朽の名作『ブラック・ジャック』をテーマにしたコラボカフェ。ドクターをイメージした黒×赤の鮮烈なビジュアルフードや医療モチーフのドリンクが話題。残り数日のため早急な来訪を。  \n**情報源：** [コラボカフェ一覧](https://collabo-cafe.com/events/tag/osaka/)\n\n---\n\n### 4. 六本木ヒルズ「2026 SPRING NEW OPEN」グルメ特集 ⚠️5月31日まで\n**エリア：六本木ヒルズ（東京・六本木）/ 最寄り駅：六本木駅 直結**\n**ジャンル：複合施設・各ジャンル / 価格帯：多様**\n**期間：2026年3月19日〜5月31日**\n\n六本木ヒルズ内の春の新規オープン祭り。日本初上陸ブランドや話題の新業態が続々と登場。グルメ・スイーツ・カフェジャンルの新店が集中しており、「1日で複数のニューオープン体験ができる」動線の良さが人気。GW以降も継続中だが5月末で一区切り。  \n**情報源：** [六本木ヒルズ公式](https://www.roppongihills.com/gourmet_shops/)\n\n---\n\n### 5. 大阪 屋外フードフェス（餃子・肉・関西グルメ集結）\n**エリア：大阪市内各所**\n**ジャンル：屋外フードイベント / 価格帯：¥500〜¥2,000 / 1品**\n**期間：2026年GW〜5月下旬（一部継続中）**\n\nGW期間に集中した大阪の屋外フードフェスが一部5月末まで継続。餃子専門・肉専門・関西B級グルメが集結するイベントが5選以上開催されており、食べ歩きに最適。ビール＆フードの組み合わせが家族連れ・カップルに好評。詳細スケジュールは各主催者公式SNS参照。  \n**情報源：** [チンタイオフィスサービス](https://www.chintai-office.jp/column/column189.php)\n\n---\n\n## 📈 トレンドフード\n\n---\n\n### 1. 葱油拌麺（コンユーバンメン）― 2026年最大のニューウェーブ麺\n\n上海の国民食・ネギ油まぜそばが東京グルメシーンを席巻中。極シンプルな食材（細麺・ネギ油・醤油・ネギ）だけで完成する奥深さが「引き算の美学」として日本の食通に刺さり、専門店オープンが相次ぐ。クックパッドの「食トレンド予測2026」でも上位にランクイン。自宅で再現する「家コンユー」動画もTikTokで広まり、インスタント版も各メーカーが開発に着手。これから1〜2年は主役級の存在となる可能性が高い。  \n**情報源：** [食べログマガジン 2026年トレンド予想](https://magazine.tabelog.com/articles/482545) / [クックパッド食トレンド予測2026](https://static.cookpad.com/campaign/foodtrend/forecast/)\n\n---\n\n### 2. 台湾胡椒餅 × SNSバズ焼き菓子 ― 「映える窯焼き」が新たな定番に\n\n窯に直接貼り付けて焼く台湾胡椒餅が「焼き上がる瞬間の動画」でTikTok・Reels映えを獲得し、東京を中心に急増中。材料費が安くテイクアウト主体のため高利益率業態としても注目され、今後の出店ラッシュが予測される。「新大久保→四ツ谷→渋谷→各地」と広がりつつある。台湾料理ブームの底上げとともに、ビジュアル重視の軽食業態が飲食業界全体のトレンドになっている。  \n**情報源：** [食べログマガジン](https://magazine.tabelog.com/articles/479837) / [ぐるなび通信 外食トレンド2026上半期](https://pro.gnavi.co.jp/magazine/t_res/cat_7/a_4869/)\n\n---\n\n### 3. 煮込まないスープ＆スパイス薬膳 ― 健康×旨みの新潮流\n\nクックパッド食トレンド予測2026で「煮込まないスープ」が1位予測。記録的猛暑への適応から東南アジア系スープ（タイのトムカーガイ、ミャンマーのヒンガー等）が家庭と外食の双方で急浮上。同時にスパイス×健康の「フュージョン薬膳」も加速中で、サントリーが薬膳専門ブランド「薬膳好日」を立ち上げるなど企業参入も相次ぐ。「汗活」ワードとともにジャークチキン・麻辣湯・スパイスカレーなど\"発汗系グルメ\"の総需要が底上げされている。2026年下半期の外食シーンを引っ張るジャンルとして最注目。  \n**情報源：** [クックパッド食トレンド予測2026](https://prtimes.jp/main/html/rd/p/000000350.000027849.html) / [食べログマガジン](https://magazine.tabelog.com/articles/482545) / [フードジム](https://foodoag.com/management/1896/)\n\n---\n\nSources:\n- [食べログマガジン 2026年トレンドグルメ大予想](https://magazine.tabelog.com/articles/482545)\n- [食べログマガジン 2026年行くべき東京のお店5選](https://magazine.tabelog.com/articles/482622)\n- [ヒトサラマガジン ミシュランガイド東京2026](https://magazine.hitosara.com/article/1860/)\n- [ヒトサラマガジン ミシュランガイド京都・大阪2026](https://magazine.hitosara.com/article/2181/)\n- [飲食店ドットコム 明寂 新三つ星](https://www.inshokuten.com/foodist/article/8068/)\n- [ミシュラン公式 東京2026 プレスリリース](https://prtimes.jp/main/html/rd/p/000000059.000117133.html)\n- [ミシュラン公式 京都大阪2026 プレスリリース](https://prtimes.jp/main/html/rd/p/000000081.000117133.html)\n- [BRUSSELS FRIES Trepo](https://trepo.jp/food/305573/)\n- [アマムダコタン カフェ＆ベイク CAKE.TOKYO](https://cake.tokyo/103611)\n- [PR TIMES ぼのぼの×E-DINER](https://prtimes.jp/main/html/rd/p/000000165.000127482.html)\n- [PR TIMES 大衆ジンギスカン酒場ラムちゃん](https://prtimes.jp/main/html/rd/p/000000302.000020880.html)\n- [関西ニューオープン情報 大阪2026](https://kansai-kaiten.com/kaitenheiten2026_osaka/)\n- [クックパッド食トレンド予測2026](https://prtimes.jp/main/html/rd/p/000000350.000027849.html)\n- [ぐるなび通信 外食トレンド2026上半期](https://pro.gnavi.co.jp/magazine/t_res/cat_7/a_4869/)\n- [WA・TO・BI 美山荘 三つ星](https://watobi.jp/news_topics/10634.html)\n- [timeout.jp ミシュラン京都大阪2026](https://www.timeout.jp/osaka/ja/news/michelin-kyoto-osaka-2026-new-chapter-043026)";
