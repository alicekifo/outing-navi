<style>
:root{--bg:#f5f5f7;--surface:#ffffff;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.16);--accent:#fb923c;--blue:#4a90d9;--green:#28a745;--text:#1d1d1f;--text2:rgba(60,60,67,0.75);--r:12px;}
html.dark{--bg:#0c0c10;--surface:#161620;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.15);--blue:#6aadff;--green:#52d68a;--text:#e8e8f0;--text2:#a8a8c8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;padding:20px 16px 80px;}
.page{max-width:680px;margin:0 auto;}
.hd{display:flex;align-items:center;gap:10px;margin-bottom:26px;flex-wrap:wrap;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.logo em{color:var(--accent);font-style:normal;}
.hd-date{font-size:12px;color:var(--text2);margin-right:auto;}
.back-link{font-size:11px;color:var(--text2);text-decoration:none;}
.back-link:hover{color:var(--accent);}
#content h2{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--text2);margin:28px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border2);}
#content h3{font-size:17px;font-weight:700;color:var(--text);margin:18px 0 8px;line-height:1.5;}
#content p{font-size:15px;color:var(--text2);line-height:1.9;margin-bottom:12px;}
#content ul,#content ol{font-size:15px;color:var(--text2);line-height:1.9;padding-left:20px;margin-bottom:12px;}
#content li{margin-bottom:6px;}
#content strong{color:var(--text);font-weight:700;}
#content em{color:var(--accent);font-style:normal;}
#content a{color:var(--blue);text-decoration:none;word-break:break-all;}
#content a:hover{text-decoration:underline;}
#content blockquote{border-left:3px solid var(--accent);padding:10px 16px;background:rgba(251,146,60,0.07);border-radius:0 var(--r) var(--r) 0;margin:12px 0;}
#content blockquote p{color:var(--text);margin:0;}
#content hr{border:none;border-top:1px solid var(--border);margin:20px 0;}
#content img{width:100%;max-height:220px;object-fit:cover;border-radius:var(--r);margin:8px 0 12px;display:block;}
#content table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0 16px;}
#content th{color:var(--text2);font-weight:600;padding:6px 8px;border-bottom:1px solid var(--border2);text-align:left;}
#content td{padding:8px;border-bottom:1px solid var(--border);color:var(--text2);}
.model-tabs{display:flex;gap:4px;}
.mtab{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;text-decoration:none;border:1px solid var(--border2);color:var(--text2);}
.mtab.mtab-on{background:var(--accent);color:#000;border-color:var(--accent);}

<script>
const md = "十分な情報が集まりました。レポートを作成します。\n\n---\n\n## 🔥 今週バズりグルメ（最大8件）\n\n\u003e **調査注記**: R2準拠の「直近7日以内の拡散数値」について、個別の投稿単位での確認が困難な項目は確認範囲を明記しています。\n\n---\n\n### 1. Brussels Fries（ブリュッセルフライ）\n\n**新宿区 職安通り / 新大久保駅 徒歩5分・西武新宿駅 徒歩3分**\n\n- **ジャンル / 価格帯**: ベルギー式フライドポテト専門店 / テイクアウト 600〜1,400円\n- **バズった理由**: 韓国・大邱で国内40店展開する人気チェーンが2025年12月に日本初上陸。揚げたてポテトに自分でニンニクムースや特製スパイスを混ぜ込む「カスタム動画」がTikTok・Instagramで継続的に拡散。2026年1月31日には「王様のブランチ」（TBS）でも特集放送。「新大久保の新定番」として各グルメアカウントで言及が続く\n- **元投稿 / 拡散規模**: Instagram [「今いちばんバズってる新大久保グルメ」](https://www.instagram.com/p/DT0SS2AE9ui/)（拡散数値：確認中） / [TikTok #BrusselsFries新大久保](https://www.tiktok.com/discover/brussels-fries-%E6%96%B0%E5%A4%A7%E4%B9%85%E4%BF%9D)（継続投稿多数確認）/ 王様のブランチ公式報告：放送済み\n- **予約方法・難易度**: 不要（当日並び・混雑時15〜30分待ち）\n- **おすすめメニュー**: ニンニクムースソース＋チーズトッピングポテト（〜1,200円）、「ベスト組み合わせセット」\n- **公式**: [@brussels_fries_jp](https://www.instagram.com/brussels_fries_jp/) / [サントリーグルメガイド掲載ページ](https://gourmet.suntory.co.jp/shop/0X00740563/)\n\n---\n\n### 2. amam dacotan cafe\u0026bake 表参道（アマムダコタン カフェ＆ベイク）\n\n**港区 南青山 / 表参道駅 B2出口 徒歩1分**\n\n- **ジャンル / 価格帯**: ベーカリーカフェ / 1点 300〜800円\n- **バズった理由**: 福岡で連日行列の超人気ベーカリーが2025年12月6日に東京初進出（新業態）。「明太ペペロンチーノバゲット」（486円）が現在進行形の **明太フランスブーム** の震源地として各グルメメディアで特集が継続。当日焼き上げのみ・約50種が並ぶ\"生ベイク\"スタイルも話題を呼ぶ\n- **元投稿 / 拡散規模**: [食べログマガジン「東京＆福岡の明太フランス5選」](https://magazine.tabelog.com/articles/173665)（S級媒体）/ [CAKE.TOKYO 取材記事](https://cake.tokyo/103611)（拡散数値：確認中）\n- **予約方法・難易度**: 不要（テイクアウト中心・開店前から行列）\n- **おすすめメニュー**: 明太ペペロンチーノバゲット 486円、生食パン\n- **公式**: [amamdacotan.com](https://amamdacotan.com/)\n\n---\n\n## 🆕 新規オープン注目店（最大6件）\n\n### 1. 珈琲所 コメダ珈琲店 KITTE大阪店\n\n**大阪市 北区梅田 / JR大阪駅 直結（KITTE大阪内）**\n\n- **オープン日**: 2026年6月12日（予定）\n- **コンセプト**: 東海発祥・全国展開の国民的コーヒーチェーンが、JR大阪駅直結の新商業施設「KITTE大阪」に梅田エリア初出店。インバウンド・ビジネス層双方からの集客が見込まれる好立地\n- **注目メニュー・価格**: シロノワール 800円〜、ブレンドコーヒー 540円〜\n- **予約方法**: 不要（ウォークイン）\n- **公式**: [KITTE大阪公式](https://osaka.jp-kitte.jp/)\n\n---\n\n\u003e ※今週（2026年5月22日〜6月5日オープン）の確認済み飲食店新規オープン情報は本調査では限定的でした。食べログ「[新規オープン順](https://tabelog.com/rstLst/cond16-00-00/RC980101/)」・[ことりっぷ東京ニューオープン](https://co-trip.jp/article/722841)もあわせてご参照ください。\n\n---\n\n## ⭐ ミシュラン・メディア話題（最大4件）\n\n### 1. 明寂（Myojaku）— 新三つ星（日本料理）\n\n**東京 港区 / 詳細非公開**\n\n- **受賞内容**: 『ミシュランガイド東京2026』（2025年9月25日発表）にて二つ星から三つ星へ昇格。料理長・中村英利氏が手がける日本料理\n- **掲載ガイド**: ミシュランガイド東京2026（三つ星・日本料理）\n- **現状**: 予約困難店として2026年6月現在も継続的なメディア言及あり\n- **公式**: [ミシュランガイド公式掲載ページ](https://guide.michelin.com/us/en/tokyo-region/tokyo/restaurant/myojaku)\n\n---\n\n### 2. 東京が19年連続「世界最多星付き都市」を堅持\n\n- 三つ星12軒（パリ10軒を上回る）、総掲載数526軒（2025年9月発表・現行版）\n- 新二つ星: **西麻布 鮨 真**、**伯雲**（日本料理）、**炎水**（日本料理）\n- グリーンスター（持続可能なガストロノミー）13軒は世界最多、新規に **トワヴィサージュ**（フランス料理）が選出\n- **出典**: [ヒトサラマガジン](https://magazine.hitosara.com/article/1860/) / [タイムアウト東京](https://www.timeout.jp/tokyo/ja/news/michelin-awards-tokyo-restaurants-2026-092925) / [ミシュランガイド公式](https://guide.michelin.com/us/en/article/michelin-guide-ceremony/michelin-guide-tokyo-2026-stars-reveal)\n\n---\n\n## ⏰ 期間限定・コラボ（最大5件）\n\n### 1. アニメ『銀魂』× スイーツパラダイス コラボカフェ\n\n- **コラボ相手**: TVアニメ「銀魂」（東映アニメーション）× スイーツパラダイス\n- **提供期間**:\n  - **新宿東口店・町田モディ店**: 2026年6月2日（火）〜 **6月29日（月）**\n  - **天王寺ミオ店・名古屋スパイラルタワーズ店**: 2026年6月2日（火）〜 **6月21日（日）**\n  - **仙台パルコ店・福岡パルコ店**: 2026年6月23日（火）〜 7月9日（木）\n- **メニュー内容**: 万事屋・真選組キャラクターをイメージしたコラボメニュー多数。1品注文ごとに和風カフェ衣装描き下ろしイラストのオリジナルコースターをプレゼント\n- **価格**: スイーツパラダイス通常料金＋コラボ料金（詳細は公式確認）\n- **予約**: スイーツパラダイスアプリより（事前予約推奨）\n- **公式**: [sweets-paradise.jp/collaboration/gintama2026](https://www.sweets-paradise.jp/collaboration/gintama2026)\n\n---\n\n### 2. THE ROOF SHIBUYA SKY（期間限定ルーフトップバー）\n\n- **店名**: THE ROOF SHIBUYA SKY\n- **提供期間**: 〜 2026年6月30日（火）まで\n- **コンセプト**: 渋谷スクランブルスクエア屋上「SHIBUYA SKY」に開設した期間限定ルーフトップバー。バラの花びらが浮かぶ限定ドリンク「Flowing Flowers｜想像が花ひらく、天空回廊」が話題\n- **場所**: 渋谷区渋谷2丁目 渋谷スクランブルスクエア屋上 / 渋谷駅直結\n- **予約**: SHIBUYA SKY公式サイトより（入場チケット制）\n- **出典**: [タイムアウト東京「ルーフトップバー特集」](https://www.timeout.jp/tokyo/ja/nightlife/rooftop-bar)\n\n---\n\n## 📈 トレンドフード（最大3件）\n\n### 1. ベルギー式フライドポテト（ブリュッセルフライ）\n\n- **なぜ今旬か**: 韓国グルメトレンドの日本波及第N波として2025年末〜2026年に専門店が相次いで上陸。カスタマイズ性の高さ・ビジュアルインパクト・「混ぜる/かける」アクション動画がTikTokの再生数フォーマットと完全一致。新大久保×韓国カルチャーの親和性も追い風\n- **代表店**:\n  - **Brussels Fries**（新大久保）: 韓国・大邱発ベルギー式。日本1号店。[@brussels_fries_jp](https://www.instagram.com/brussels_fries_jp/)\n  - **DE FRITES STAAN HARAJUKU**（原宿）: オランダ発フリット専門店。連日整理券必須\n\n---\n\n### 2. 明太フランス（進化系・明太ペペロンチーノ）\n\n- **なぜ今旬か**: 福岡名店「アマムダコタン」の東京進出（2025年12月）が全国的ブームの起爆剤に。にんにく×明太子×バゲットの三位一体が「ご飯系パン」の定番を超えた独自ジャンルとして確立。食べログマガジン・dancyu等グルメ媒体で特集が相次ぐ\n- **代表店**:\n  - **amam dacotan cafe\u0026bake 表参道**（表参道）: ブームの震源地。明太ペペロンチーノバゲット 486円\n  - **各都市の高品質ベーカリー**: 追随する新メニューが続々登場中\n\n---\n\n### 3. ネパール料理（ダルバート・モモ）\n\n- **なぜ今旬か**: ヘルシー志向の高まりと「本格エスニック」需要が合致。ダルバート（豆カレー定食）の彩りの美しさとモモ（ネパール式蒸し餃子）の多様なビジュアルがInstagramとの相性が良く、健康意識の高い層やグルメインスタグラマーを中心に拡散中\n- **代表店**:\n  - 東京・高田馬場〜新大久保エリアに複数の本格専門店が集積（ネパール人コミュニティ発の実力店が多数）\n- **出典**: [食べログマガジン「2026年のトレンドグルメ」](https://magazine.tabelog.com/articles/482545)\n\n---";
document.getElementById('content').innerHTML = marked.parse(md);
document.querySelectorAll('#content h3').forEach(h3 => {
  const raw = h3.textContent.trim();
  const clean = raw.replace(/^\d+\.\s*/,'').split(/[（(―—\s]/)[0].trim();
  if (!clean || clean.length < 2) return;
  fetch('https://ja.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(clean))
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(d => {
      if (!d.thumbnail) return;
      const img = document.createElement('img');
      img.src = d.thumbnail.source;
      img.alt = clean;
      h3.insertAdjacentElement('afterend', img);
    })
    .catch(() => {});
});
</script>
<script>(function(){var t=new Date();var el=document.getElementById('hd-today');if(el)el.textContent=' · 今日 '+(t.getMonth()+1)+'/'+(t.getDate());}());</script>
