<script>
const md = "# マンチェスター・ユナイテッド情報週報\n**作成日：2026年6月23日（月）**\n\n---\n\n## 1. クラブ最新動向\n\n### マイケル・カリック、正式監督就任\n5月22日、クラブはマイケル・カリックと2028年までの2年契約を締結し、正式監督就任を発表。カリックは1月13日に暫定体制でAmorimの後を引き継ぎ、16試合で11勝3分2敗という成績でリーグ3位・チャンピオンズリーグ出場権を確保した実績が評価された。\n\n\u003e **ソース**: [manutd.com（公式）](https://www.manutd.com/en/news/michael-carrick-continues-as-man-united-head-coach-2026) / [Al Jazeera](https://www.aljazeera.com/sports/2026/5/22/man-utd-appoint-michael-carrick-as-permanent-manager)\n\n---\n\n## 2. 直近の試合結果（6/16〜6/23）\n\n\u003e **該当なし** — 2025/26シーズン終了に伴い、競技試合は現在オフシーズン中。\n\n---\n\n## 3. 今後の試合予定\n\n| 日付 | 相手 | 種別 | 備考 |\n|------|------|------|------|\n| 7月18日 | Wrexham | プレシーズン親善 | 詳細未発表 |\n| 7月24日 | Rosenborg | プレシーズン親善 | 詳細未発表 |\n| 8月1日 | Atlético Madrid | プレシーズン親善 | |\n| 8月8日 | Paris Saint-Germain | プレシーズン親善 | |\n\n\u003e **ソース**: [manutd.com（プレシーズン日程）](https://www.manutd.com/en/news/game-by-game-united-pre-season-fixture-list-2026) / [Sky Sports](https://www.skysports.com/football/news/11095/13555679/man-utd-premier-league-2026-27-fixtures-and-schedule)\n\n---\n\n## 4. 移籍情報（6/9〜6/23 ＝ 直近14日以内の報道）\n\n### ✅ ほぼ確定\n\n| 選手 | 元クラブ | 方向 | 概要 |\n|------|---------|------|------|\n| **エデルソン** | アタランタ | IN | 移籍金£3,400万＋£380万のアドオン。4年契約（＋1年オプション）。医療検査通過後に正式発表予定。カリック体制初の補強 |\n\n\u003e **ソース**: [ESPN](https://www.espn.com/soccer/story/_/id/48953983/man-united-agree-deal-atalanta-ederson-sources) / [Sky Sports](https://www.skysports.com/football/news/11095/13548678/man-utd-agree-ederson-deal-atalanta-midfielder-set-for-old-trafford-in-lb38m-transfer)\n\n---\n\n### 🔄 交渉中・注目案件\n\n**マテウス・フェルナンデス（ウェストハム）**\n- エリオット・アンダーソン（フォレスト）の争奪戦をMCが回避した結果、現在のミッドフィールダー筆頭ターゲットに浮上\n- 本人は「移籍に非常に積極的」と報道。INEOSが正式協議を開始\n- ただしウェストハム側は売却条件を急かさない姿勢\n\n\u003e **ソース**: [Football365](https://www.football365.com/news/mateus-fernandes-is-new-manchester-united-top-midfield-target) / [TeamTalk](https://www.teamtalk.com/manchester-united/latest-man-utd-transfer-news-mateus-fernandes-crysencio-summerville-elliot-anderson) / [CaughtOffside（Fabrizio Romano情報含む）](https://www.caughtoffside.com/2026/06/12/elliot-anderson-mateus-fernandes-midfield-transfer-market/)\n\n---\n\n### 🚪 退団確定\n\n| 選手 | 行き先 | 備考 |\n|------|--------|------|\n| カゼミーロ | — | シーズン終了とともに双方合意で退団 |\n| ラスムス・ホイルンド | ナポリ | 2025/26シーズンのローン移籍を完全移籍に |\n\n---\n\n### ❌ 断念・撤退\n\n- **エリオット・アンダーソン（フォレスト）**: マンC が£1億2,100万の入札。ユナイテッドは金額に折り合わず不参戦。Fabrizio Romanoも撤退を確認\n\n---\n\n## 5. ワールドカップ2026（開催中：6/11〜）\n\n12名以上のユナイテッド選手が9カ国を代表して出場中。**本日（6/23）注目の試合**：\n\n| 選手 | 代表 | 対戦 | 日時(ET) |\n|------|------|------|----------|\n| **ブルーノ・フェルナンデス** | ポルトガル | vs ウズベキスタン | 6/23 13:00 |\n| **コビー・マイヌー** | イングランド | vs ガーナ | 6/23（ボストン） |\n\n**その他の主要選手スケジュール**：\n- **アマド・ディアロ**（コートジボワール） vs キュラソー — 6月25日\n- **リサンドロ・マルティネス**（アルゼンチン）、**マヌエル・ウガルテ**（ウルグアイ）、**ノッサイル・マズラウィ**（モロッコ）も出場中\n\n\u003e **ソース**: [manutd.com](https://www.manutd.com/en/news/united-at-the-2026-world-cup-when-are-the-group-games) / [Yahoo Sports](https://ca.sports.yahoo.com/news/12-manchester-united-stars-playing-173343382.html) / [SI](https://www.si.com/soccer/every-man-utd-player-2026-world-cup)\n\n---\n\n## 6. 今週のまとめ\n\n- **監督体制**: カリック正式就任で来季に向けた体制が確定。チャンピオンズリーグ復帰という明確な目標のもとチーム再建が始動\n- **補強方針**: ミッドフィールドの刷新が最優先課題。エデルソン獲得がほぼ確実、次のターゲットはマテウス・フェルナンデス\n- **ワールドカップ**: 12選手が各国代表として活躍中。カリック体制が評価したマイヌーのイングランド招集も注目点\n\n---\n\n*次回更新予定：2026年6月30日*\n\n---\n\n**Sources:**\n- [マンチェスター・ユナイテッド公式 — カリック続投](https://www.manutd.com/en/news/michael-carrick-continues-as-man-united-head-coach-2026)\n- [マンチェスター・ユナイテッド公式 — プレシーズン日程](https://www.manutd.com/en/news/game-by-game-united-pre-season-fixture-list-2026)\n- [マンチェスター・ユナイテッド公式 — WC出場選手](https://www.manutd.com/en/news/united-at-the-2026-world-cup-when-are-the-group-games)\n- [ESPN — エデルソン合意](https://www.espn.com/soccer/story/_/id/48953983/man-united-agree-deal-atalanta-ederson-sources)\n- [Sky Sports — エデルソン詳細](https://www.skysports.com/football/news/11095/13548678/man-utd-agree-ederson-deal-atalanta-midfielder-set-for-old-trafford-in-lb38m-transfer)\n- [Sky Sports — 移籍動向](https://www.skysports.com/football/news/11095/13552631/man-utd-transfer-news-red-devils-continuing-to-explore-opportunities-to-add-midfielder-and-forward-to-their-ranks)\n- [Football365 — マテウス・フェルナンデス](https://www.football365.com/news/mateus-fernandes-is-new-manchester-united-top-midfield-target)\n- [CaughtOffside — Anderson/Fernandes市場分析（Romano情報含む）](https://www.caughtoffside.com/2026/06/12/elliot-anderson-mateus-fernandes-midfield-transfer-market/)\n- [Al Jazeera — カリック正式就任](https://www.aljazeera.com/sports/2026/5/22/man-utd-appoint-michael-carrick-as-permanent-manager)\n- [SI — WC全選手詳細](https://www.si.com/soccer/every-man-utd-player-2026-world-cup)";
