<script>
const md = "# ⚽ サッカー移籍情報 \u0026 ワールドカップ2026 速報\n**2026年7月8日（水）**\n\n---\n\n## ✅ 完了した移籍（7/1〜7/8）\n\n\u003e **[R1確認]** 公式発表または信頼ソース2件以上で確認済み（TODAYより7日以内基準）。\n\n### 1. サンドロ・トナリ（Sandro Tonali）（MF, 26歳）ニューカッスル → トッテナム【NEW／HWGから昇格・公式発表】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £100M（£92.5M＋アドオン£7.5M、トッテナム史上最高額） |\n| 契約 | 6年（〜2032年）／背番号16／週給275,000ポンド超 |\n| 発表日 | 2026年7月7日（現地） |\n\n- デ・ゼルビ監督（同じイタリア人）の下でのプレーを本人が熱望し、シティら他クラブの関心を退けた。ニューカッスルでは通算110試合10G10A\n- **ソース**：トッテナム公式、Sky Sports、Football Italia（S+A級複数）\n\u003e source: [Tottenham公式](https://www.tottenhamhotspur.com/news/1076467/welcome-sandro-tonali-makes-the-move-to-n17) / [Sky Sports](https://www.skysports.com/football/news/11095/13559730/sandro-tonali-tottenham-sign-italy-midfielder-in-club-record-lb100m-deal-from-newcastle) (2026-07-07)\n\n### 2. バズマナ・トゥーレ（Bazoumana Touré）（FW, 20歳）ホッフェンハイム → ニューカッスル【NEW／7/5発表】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €50M（約£43M） |\n| 契約 | 5年（〜2031年） |\n| 発表日 | 2026年7月5日 |\n\n- コートジボワール代表ウインガー。昨季ブンデスで45試合5G9A、今大会も代表で3試合出場。トナリ売却資金の再投資第1弾\n- **ソース**：ニューカッスル公式、ESPN（S+A級複数）\n\u003e source: [Newcastle公式](https://www.newcastleunited.com/en/news/newcastle-united-sign-bazoumana-toure) / [ESPN](https://www.espn.com/soccer/story/_/id/49279207/newcastle-sign-winger-bazoumana-toure-hoffenheim) (2026-07-05)\n\n### 3. ティリク・ジョージ（Tyrique George）（FW, 20歳）チェルシー → エヴァートン【NEW／7/6発表】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £18M＋アドオン（総額約£24M） |\n| 契約 | 4年（〜2030年） |\n| 発表日 | 2026年7月6日 |\n\n- 1月からのレンタルを買い取りで完全移籍化。モイーズ監督「ローン期間で好印象を残した。まだ伸びしろがある」\n- **ソース**：チェルシー公式、エヴァートン発表、beIN SPORTS（S+A級複数）\n\u003e source: [Chelsea公式](https://www.chelseafc.com/en/news/article/tyrique-george-departs-chelsea-for-everton) / [beIN SPORTS](https://www.beinsports.com/en-asia/football/premier-league/articles/everton-announce-permanent-signing-of-chelsea-forward-george-2026-07-06) (2026-07-06)\n\n### 4. [[デンゼル・ダンフリース]]（Denzel Dumfries）（DF, 30歳）インテル → [[レアル・マドリード]]【継続掲載・7/5発表】\n- €20M（解除金の早期発動）／4年契約。オランダ代表としてW杯参加中\n\u003e source: [Real Madrid公式発表・ESPN確認済み] (2026-07-05)\n\n### 5. エリオット・アンダーソン（Elliot Anderson）（MF, 23歳）ノッティンガム・フォレスト → [[マンチェスター・シティ]]【継続掲載・7/4発表】\n- £116M（イングランド人選手史上最高額）。イングランド代表として8強進出中、登録手続きは大会後\n\u003e source: [Sky Sports](https://www.skysports.com/football/news/11661/13550595/elliot-anderson-transfer-news-man-city-agree-deal-to-sign-nottingham-forest-midfielder) (2026-07-04)\n\n### 6. マルコ・パレストラ（Marco Palestra）（DF, 21歳）アタランタ → [[チェルシー]]【継続掲載・7/3発表】\n- 最大£47M／契約7年。シャビ・アロンソ新体制の初完了案件\n\u003e source: [Chelsea公式・Sky Sports確認済み] (2026-07-03)\n\n### 7. [[マテウス・フェルナンデス]]（Matheus Fernandes）（MF, 21歳）ウェストハム → トッテナム【継続掲載・7/3発表】\n- £85M（当時クラブ史上最高額。トナリ加入で更新済み）\n\u003e source: [Tottenham公式・Sky Sports確認済み] (2026-07-03)\n\n### 8. [[ジェレミー・ジャケ]]（Jérémy Jacquet）（DF, 22歳）レンヌ → リヴァプール【継続掲載・7/1発表】\n- 約£55-60M\n\u003e source: [Liverpool公式・Sky Sports確認済み] (2026-07-01)\n\n### 9. ダラ・ジキエミ（Dara Jikiemi）（DF, 16歳）セルティック → リヴァプール（育成）【継続掲載・7/6書類完了】\n- スコットランドU16主将のCB。5年契約（当面はスカラシップ、17歳になる2027年1月にプロ契約移行可）\n- ※A級2件目の裏取りは本日時点で薄い（Romano報が軸）。編集メモ参照\n\u003e source: [Fabrizio Romano \"here we go\"報] (2026-07-06)\n\n---\n\n## ⚡ Here We Go!（合意ほぼ確実・正式発表待ち）\n\n### 1. [[エデルソン]]（Éderson）（MF, 26歳）アタランタ → [[マンチェスター・ユナイテッド]]【継続・メディカル待ち】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £35M＋アドオン£3.8M |\n| 契約 | 4年＋1年オプション |\n\n- クラブ間の書類は締結済み（Romano「事実上クローズ」）。海外での予備メディカルは通過済みで、残るはキャリントンでの本メディカルと署名のみ。ブラジルのW杯敗退を受け数日内に渡英見込み\n- **ソース**：ESPN、Sky Sports（A級複数）\n\u003e source: [ESPN](https://www.espn.com/soccer/story/_/id/48953983/man-united-agree-deal-atalanta-ederson-sources) (2026-07-06)\n\n### 2. [[ルカ・ヴシュコヴィッチ]]（Luka Vušković）（DF, 19歳）トッテナム → ブライトン【継続掲載】\n- 最大£50M（初期£46M＋アドオン、Spursに20%転売条項）。メディカルは大会後実施予定\n\u003e source: [Sky Sports・Goal.com確認済み] (2026-07-04)\n\n### 3. ジェレミー・モンガ（Jeremy Monga）（FW, 16歳）レスター・シティ → [[マンチェスター・シティ]]【継続掲載】\n- £12.5M（£10M＋アドオン）。**7/10に17歳の誕生日を迎えプロ契約に移行、正式加入が目前**\n\u003e source: [Sky Sports・Romano \"here we go\"報] (2026-07-03)\n\n---\n\n## 🔵 交渉中・関心あり\n\n### 1. ランダル・コロ・ムアニ（Randal Kolo Muani）（FW, 27歳）PSG → ユヴェントス ○有力\n- 個人条件は合意済みと報道され、クラブ間交渉が進行中。段階：クラブ間交渉\n\u003e source: [Football365 移籍まとめ](https://www.football365.com/news/transfer-window-summer-2026-rumours-ranked) (2026-07-07)\n\n### 2. モーガン・ロジャーズ（Morgan Rogers）（MF, 24歳）アストン・ヴィラ → アーセナル △噂レベル\n- アーセナルが個人条件で「大きく前進」とされるが、ヴィラの要求額は£130M。チェルシー・ユナイテッドも関心。段階：個人交渉\n\u003e source: [Football365 移籍まとめ](https://www.football365.com/news/transfer-window-summer-2026-rumours-ranked) (2026-07-07)\n\n### 3. ニコ・パス（Nico Paz）（MF, 21歳）レアル・マドリード → コモ △噂レベル\n- コモが€60Mでの完全移籍化に動いていると報道。本人はイタリア残留を希望。段階：クラブ間交渉\n\u003e source: [BeSoccer 移籍速報](https://www.besoccer.com/new/latest-transfer-news-football-rumours-confirmed-1412436) (2026-07-07)\n\n---\n\n## 🇯🇵 日本人選手の動向\n\n### 久保建英（Takefusa Kubo）（レアル・ソシエダ）△噂レベル\n- リヴァプールの€80M規模の関心報道が継続。ソシエダ会長は去就を問われ「何が起きてもおかしくない」と含みを持たせる一方、本人は「今は噂も聞いていない」と否定的\n- 段階：関心報道（具体的入札の確認なし）\n\u003e source: [Goal.com](https://www.goal.com/en-us/lists/takefusa-kubo-liverpool-transfer-talk-real-sociedad-president/bltd652865cf3969022) (2026-07-06)\n\n### 遠藤航（Wataru Endo）（リヴァプール）\n- 左足負傷からのリハビリ継続中（7/2に練習再開を報告済み）。代表は6月中旬に引退表明済みで、クラブでのプレーは継続\n\u003e source: [選手SNS・ESPN既報] (2026-07-02)\n\n### 三笘薫（Kaoru Mitoma）（ブライトン）\n- ハムストリング負傷リハビリ中、7月末復帰見込みに変更なし。移籍の具体的動きは確認されず\n\u003e source: [ESPN負傷続報・変更なし] (2026-07-06時点)\n\n---\n\n## 🏆 ワールドカップ2026\n\n- **準々決勝4カードが出揃った**：モロッコvsフランス、スペインvsベルギー、ノルウェーvsイングランド、アルゼンチンvsスイス（日程はスケジュール欄）\n- アルゼンチンが0-2からの大逆転でエジプトを下し、メッシは今大会8点目で得点王単独首位に\n- スイスは**1954年以来72年ぶりの8強**（PK戦でコロンビアを撃破）\n- 日本関連：JFAが森保一監督に1年契約（2027年1月のアジアカップまで）での続投を打診と報道。詳細は日本代表詳報欄\n\u003e source: [FIFA公式](https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026) / [ESPN](https://www.espn.com/soccer/story/_/id/48939282/2026-fifa-world-cup-fixtures-results-match-schedule-group-stage-knockout-rounds-bracket) (2026-07-08)\n\n## ⚽ 今週の試合・活躍情報（リーグ戦）\n※主要リーグはW杯期間中のオフシーズンのため該当なし。試合情報は下部のW杯欄に集約。\n\n## 📰 The Athletic ピックアップ\n※直近3日以内で確認できた該当特集はありません（2系統で検索するも本日該当なし）。\n\n---\n\n## 🌍 昨日の試合結果\n\n※ラウンド16残り2試合（現地7/7＝日本時間7/8未明〜早朝）で、ベスト8が確定。\n\n### アルゼンチン 3-2 エジプト（ラウンド16）\n- 得点：Y・イブラヒム 15分、M・ジーコ 67分（以上エジプト）／ロメロ 79分、メッシ 83分、エンソ・フェルナンデス 90+2分（以上アルゼンチン）\n- 経過：メッシが前半21分にPKをGKショベイルに止められ、0-2の窮地から**残り11分＋ATで3発の大逆転**。決勝点はラウタロのクロスをエンソが頭で合わせた\n- 会場：アトランタ・スタジアム／キックオフ：7/8(水) 01:00 JST（7日 12:00 ET）\n\u003e source: [ESPN](https://www.espn.com/soccer/match/_/gameId/760509/egypt-argentina) / [FIFA公式](https://www.fifa.com/en/match-centre/match/17/285023/289288/400021528) (2026-07-07)\n\n### スイス 0-0（PK 4-3）コロンビア（ラウンド16）\n- 経過：120分無得点の末にPK戦。最後はルベン・バルガスが左下に沈めてスイスが勝ち抜け、**1954年以来の準々決勝進出**\n- 会場：バンクーバー／キックオフ：7/8(水) 05:00 JST（7日 16:00 ET）\n\u003e source: [FIFA公式](https://www.fifa.com/en/match-centre/match/17/285023/289288/400021535) / [ESPN](https://www.espn.com/soccer/match/_/gameId/760508/colombia-switzerland) (2026-07-07)\n\n## 📅 今日・明日の試合スケジュール\n\n### 今日（7/8・水／JST）・明日（7/9・木／JST）\n※これ以降の試合はありません（準々決勝前の休息日。R16の2試合は本日未明〜早朝に消化済み）\n\n### 準々決勝 全4カード（JST基準）\n| 日時（JST） | カード | 会場 |\n|---|---|---|\n| 7/10(金) 05:00（9日 16:00 ET） | フランス vs モロッコ | ジレット・スタジアム（フォックスボロ） |\n| 7/11(土) 04:00（10日 15:00 ET） | スペイン vs ベルギー | SoFiスタジアム（イングルウッド） |\n| 7/12(日) 06:00（11日 17:00 ET） | ノルウェー vs イングランド | ハードロック・スタジアム（マイアミ） |\n| 7/12(日) 10:00（11日 21:00 ET） | アルゼンチン vs スイス | アローヘッド・スタジアム（カンザスシティ） |\n\n- 注目：ハーランド（7点）vsイングランド、メッシ（8点）vs堅守スイス——得点王争いが直接影響する2カードが7/12に集中\n\u003e source: [SI](https://www.si.com/soccer/every-confirmed-quarterfinal-match-at-the-2026-world-cup) / [beIN SPORTS](https://www.beinsports.com/en-us/soccer/fifa-world-cup-2026/articles/2026-fifa-world-cup-quarterfinals-live-qualified-teams-fixtures-dates-and-kickoff-times-2026-07-04) (2026-07-07)\n\n## 📊 グループ順位表\n\n※グループステージは終了済み（決勝トーナメント進行中）。以下はトーナメント進捗。\n\n- **ベスト8確定**：フランス、モロッコ、スペイン、ベルギー、イングランド、ノルウェー、アルゼンチン、スイス\n- **R16全結果**：モロッコ・フランス勝利（7/4-5）／ノルウェー1-2ブラジル、イングランド3-2メキシコ（7/6）／スペイン1-0ポルトガル、ベルギー4-1アメリカ（7/7）／アルゼンチン3-2エジプト、スイス0-0(PK4-3)コロンビア（7/8 JST）\n- 開催国は3か国すべて姿を消し、欧州5・南米1・アフリカ1を含む欧州優勢の8強に\n\u003e source: [ESPNブラケット](https://www.espn.com/soccer/story/_/id/48939282/2026-fifa-world-cup-fixtures-results-match-schedule-group-stage-knockout-rounds-bracket) (2026-07-08)\n\n## 📋 日本代表詳報\n\n※日本は6/30のラウンド32でブラジルに1-2で敗退済み。以下は監督人事の続報。\n\n- **JFAが森保監督に「1年契約」での続投を打診**：2027年1〜2月のアジアカップ（サウジアラビア）までを見据えた単年オファーと複数報道。JFA会長は「（続投の）ための準備を進めていくことになる」と続投前提の姿勢\n- **森保本人は明言せず**：帰国後「少し休んで、そこから大会の振り返りをしっかりしたい」と即答を避けた。**正式発表は本日時点で未確認**\n- 後任・並行候補として名波浩コーチの昇格、ロス五輪代表・大岩剛監督の兼任案が取り沙汰される段階\n\u003e source: [Football Tribe Japan](https://football-tribe.com/japan/2026/07/02/356415/) / [Sportiva](https://sportiva.shueisha.co.jp/clm/football/jfootball/2026/07/02/post_128/) (2026-07-02)\n\n## 🌟 大会ハイライト\n\n- **ゴールデンブーツ**：メッシが8点で**単独首位に浮上**。エムバペ（7点・2アシスト）、ハーランド（7点）が追い、ケイン6点\n- **昨日のドラマ**：0-2から79分・83分・90+2分の3発——アルゼンチンがW杯ノックアウトで歴史的逆転。メッシはPK失敗を自ら帳消しに\n- **72年ぶり**：スイスが1954年（自国開催）以来の8強。アカンジらを擁する堅守はメッシ攻略が次の試験\n\u003e source: [Goal.com 得点ランク](https://www.goal.com/en/lists/world-cup-2026-golden-boot-standings-fifa-award/blt29fdba0896b8fd09) / [FOX Sports](https://www.foxsports.com/stories/soccer/2026-fifa-world-cup-golden-boot-tracker) (2026-07-08)\n\n---\n\n**編集メモ（裏取り・除外事項）**\n- **R1により除外**：[[ゴンサロ・ラモス]]（PSG→ミラン、6/30発表）は7日基準を外れたため「完了」から掲載終了（予告どおり）\n- **未確認のため不掲載を継続**：「バルサ→ゴードン €80M」「レアル→ククレジャ／B.シルバ／コナテ」は集計系リストに再登場したが、発表日付きのS/A級一次ソースが依然確認できず見送り\n- **ジキエミ（完了9件目）の留保**：本日の検索で出た続報はファンサイト・ブラックリスト媒体のみ。前日のRomano \"here we go\"確認を根拠に継続掲載とし、S/A級2件目が取れ次第補強する\n- **ブラックリスト遵守**：Yahoo Sports・CaughtOffside・TeamTalk・GiveMeSport・thisisanfield等は2件目のソースとしても不採用\n- **前日整合**：7/7アーカイブは記事本文が欠損していたため、整合チェックは7/6記事＋7/7更新要約に基づき実施（スコア・移籍状況に矛盾なし）";
