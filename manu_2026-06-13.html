<script>
const md = "十分な情報が揃いました。週報を作成します。\n\n---\n\n# マンチェスター・ユナイテッド情報週報\n**発行日：2026年6月13日（土）**\n\n---\n\n## 1. クラブ最新情報\n\n### マイケル・カリック監督、正式に2028年まで契約延長\n1月にルベン・アモリムが解任された後、暫定経由で就任したカリック前監督が、2025-26シーズンにリーグ16試合で11勝という成績でチャンピオンズリーグ復帰（PL3位・勝点71）を達成。クラブはその功績を認め、契約を2028年まで延長。コーチングスタッフも同期間まで契約を継続。カリックはPLマネージャー・オブ・ザ・シーズン候補にもノミネートされた。\n\n### 2025-26シーズン最終成績（ご参考）\n| | 順位 | W | D | L | GD | Pts |\n|---|---|---|---|---|---|---|\n| マンチェスター・ユナイテッド | **3位** | 20 | 11 | 7 | +19 | **71** |\n\nCLグループステージ出場権を獲得。\n\n---\n\n## 2. 直近の試合結果（6/6〜6/13）\n\n2025-26シーズンは終了しており、この期間に公式戦・親善試合は**なし**。現在はオフシーズン中。\n\n---\n\n## 3. 今後の試合予定\n\n| 日付 | 対戦 | 大会 |\n|---|---|---|\n| 7月18日 | ユナイテッド vs ラクサム | プレシーズン親善試合 |\n| 7月24日 | ローゼンボリ vs ユナイテッド | プレシーズン親善試合 |\n| 8月1日 | ユナイテッド vs アトレティコ・マドリード | プレシーズン親善試合 |\n| 8月8日 | ユナイテッド vs パリ・サンジェルマン | プレシーズン親善試合 |\n| **8月22日** | — | **PL 2026-27 開幕** |\n\n\u003e **6月19日（金）**: 2026-27シーズンのPL対戦カード発表予定（公式発表済み）。\n\n---\n\n## 4. 移籍情報\n\n### 確定・合意済み\n\n**エデルソン（アタランタ → マンチェスター・ユナイテッド）** ✅\n- 移籍金：€45m（基本€40.5m + ボーナス最大€4.5m）\n- 契約：4年＋オプション1年\n- ソース：Fabrizio Romano「100%確定」、David Ornstein（The Athletic）も確認\n- 正式発表：7月初旬予定。ブラジル代表26歳DMF。2024 EL決勝でアタランタ優勝に貢献。カリックが最初の補強として獲得。\n\n---\n\n### 交渉・注目中\n\n**マテウス・フェルナンデス（ウェストハム）**\n- マンUが£65m規模の入札を準備中。ウェストハムの要求額は£85m。\n- 信頼度：Fabrizio Romanoが「公式接触」報告（S級情報）。\n- レアル・マドリードも関心を示すが、選手本人はオールドトラッフォード移籍を希望との報道。\n- エリオット・アンダーソン（ノッティンガム・フォレスト）はフォレストの要求額£130mに対して**断念**。シティが争奪に参入。\n\n**マティアス・フェルナンデス=パルド（リール）**\n- 21歳ベルギー代表FW/WG。ワールドカップ登録メンバー。関心段階。\n\n**アレックス・スコット（ボーンマス）**\n- 長期関心継続。ただしボーンマスが新契約交渉中であり、今夏の売却は見込み薄。\n\n---\n\n### その他動向\n\n- アモリム元監督への補償費用：最大£15.9m（和解交渉は継続中）。アモリムは2026-27シーズン中は復帰しない意向とされ、契約満了まで補償を受け続ける可能性がある。\n\n---\n\n## 5. まとめ\n\nカリック体制で劇的な逆転CL復帰を果たし、夏の補強は即戦力MF獲得を中心に動いている。エデルソン合意は確定路線で7月発表見込み。マテウス・フェルナンデスの価格交渉が今後数週間の焦点となる。PL日程は6/19に公表予定。\n\n---\n\n**Sources:**\n- [Man Utd transfer news (Sky Sports)](https://www.skysports.com/football/news/11095/13552631/man-utd-transfer-news-red-devils-continuing-to-explore-opportunities-to-add-midfielder-and-forward-to-their-ranks)\n- [Ederson deal confirmed €45m (FootballTransfers)](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/06/man-utd-transfer-news-ederson-deal-confirmed-michael-carrick-first-signing)\n- [Man United agree deal with Atalanta for Ederson (ESPN)](https://www.espn.com/soccer/story/_/id/48953983/man-united-agree-deal-atalanta-ederson-sources)\n- [Ederson deal finalised (The Peoples Person)](https://thepeoplesperson.com/2026/06/06/manchester-united-finalise-deal-to-sign-ederson-from-atalanta-311151/)\n- [Mateus Fernandes top target (Football365)](https://www.football365.com/news/mateus-fernandes-is-new-manchester-united-top-midfield-target)\n- [Elliot Anderson decision (TeamTalk)](https://www.teamtalk.com/manchester-united/manchester-city-manchester-united-nottingham-forest-elliot-anderson)\n- [Carrick continues as head coach (manutd.com)](https://www.manutd.com/en/news/michael-carrick-continues-as-man-united-head-coach-2026)\n- [Pre-season fixtures guide (manutd.com)](https://www.manutd.com/en/news/game-by-game-united-pre-season-fixture-list-2026)\n- [Ruben Amorim sacked (ESPN)](https://www.espn.com/soccer/story/_/id/46418438/ruben-amorim-sacked-man-united-head-coach)\n- [PL 2025-26 final table (NBC Sports)](https://www.nbcsports.com/premier-league-table-2025-26-season-standings)";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
