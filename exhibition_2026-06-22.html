.watch-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;background:rgba(244,114,182,.1);color:var(--accent);border:1px solid rgba(244,114,182,.3);border-radius:8px;padding:4px 10px;cursor:pointer;margin-top:6px;font-family:'Noto Sans JP',sans-serif;}

<script>
const md = "## 🔔 今週のチケット発売\n\n### 1. ルーヴル美術館展 ルネサンス（国立新美術館）\n\n- **発売日：** 2026年6月18日(木) 発売中（前売券販売期間：〜2026年9月8日）\n- **価格帯：** 一般2,200円（前売）/ 2,400円（当日）、大学生1,300円、高校生900円\n- **販売チャネル：** アソビュー！ / 日テレゼロチケ / ローソンチケット / 国立新美術館窓口（〜9/7）\n- **展覧会本体：** 2026年9月9日(水)〜12月13日(日)、国立新美術館 企画展示室1E\n- **公式：** https://www.nact.jp/exhibition_special/2026/louvre2026/\n\n\u003e source: https://www.nact.jp/exhibition_special/2026/louvre2026/\n\n---\n\n### 2. 大英博物館日本美術コレクション 百花繚乱～海を越えた江戸絵画（東京都美術館）\n\n- **発売日：** 2026年6月25日(木) 10:00〜（一般前売券）\n- **価格帯：** 一般2,100円（前売）/ 2,300円（当日）、大学生・専門学校生1,100円（前売）、65歳以上1,400円（前売）\n- **販売チャネル：** ローソンチケット / チケットぴあ / 公式オンライン\n- **展覧会本体：** 2026年7月25日(土)〜10月18日(日)、東京都美術館\n- **公式：** https://daiei-ten2026.exhibit.jp/\n\n\u003e source: https://daiei-ten2026.exhibit.jp/ticket.html\n\n---\n\n## 🎨 関東の展覧会\n\n### 現在開催中（終了が近い順）\n\n---\n\n**東京オペラシティ アートギャラリー（初台駅 直結）**\n**拡大するシュルレアリスム 視覚芸術から広告、ファッション、インテリアへ**\n2026-04-16 〜 **2026-06-24**（⚠️ あと2日で終了）\n一般1,800円\nマグリット・ダリ・マン・レイら巨匠の原画から商業デザインへの越境を辿る。\n「あと2日」の緊急展示——シュルレアリスムが広告やファッションを変えた歴史的連鎖を体感できる機会。\n\n\u003e source: https://www.operacity.jp/ag/exh297/\n\n---\n\n**東京都美術館（上野駅 公園口）**\n**東京都美術館開館100周年記念 アンドリュー・ワイエス展**\n2026-04-28 〜 2026-07-05\n一般2,300円（当日）/ 前売終了（会期中当日券のみ）\n20世紀アメリカ具象絵画の巨匠が紡ぐ孤独と大地の叙情——テンペラと水彩による精緻な描写が光る回顧展。\n開館100周年記念の特別企画として大規模な代表作が一堂に会し、日本での大規模展示は久々の機会。\n\n\u003e source: https://wyeth2026.jp/\n\n---\n\n**国立新美術館（乃木坂駅 6番出口 直結）**\n**ピカソ meets ポール・スミス 遊び心の冒険へ**\n2026-06-10 〜 2026-09-21\n一般2,200円（前売）/ 2,400円（当日）\nパリ国立ピカソ美術館蔵の約80点をポール・スミスがデザインした色彩豊かな空間で展観。\nピカソ没後50周年記念の国際巡回展——日本での唯一の開催地で、初期作《男の肖像》から晩年作まで時系列で体感できる。\n\n\u003e source: https://www.nact.jp/exhibition_special/2026/picasso_paulsmith/\n\n---\n\n**東京国立近代美術館（竹橋駅 1b出口 徒歩3分）**\n**杉本博司 絶滅写真**\n2026-06-16 〜 2026-09-13\n要公式確認（MOMATウェブサイトで確認を）\n1970年代から近年に至る銀塩写真約65点——風景・海景・劇場シリーズを縦断する大規模個展。\n現代写真の第一人者が長期間にわたって追求してきた「時間と記憶」の全貌を、東京では希少な規模で辿れる。\n\n\u003e source: https://www.momat.go.jp/\n\n---\n\n**森美術館（六本木駅 直結 六本木ヒルズ森タワー53F）**\n**ロン・ミュエク**\n2026-04-29 〜 2026-09-23\n一般2,300円（土日祝）/ 2,100円（平日）\n極限までリアルな人体彫刻が圧迫的な存在感で迫る、日本では18年ぶりの大規模個展。全49作品から厳選11点、うち6点は日本初公開。\n初期代表作《エンジェル》（1997）の来日は「またとない機会」とも評され、生死と身体をめぐる深い問いが刺さる。\n\n\u003e source: https://www.mori.art.museum/jp/exhibitions/ronmueck/\n\n---\n\n### 間もなく開始（開始日順）\n\n---\n\n**国立西洋美術館（上野駅 公園口 徒歩1分）**\n**版画家レンブラント 挑戦、継承、インパクト**\n2026-07-07 〜 2026-09-23\n要公式確認（前売券：〜2026年7月6日まで販売中）\nアムステルダム・レンブラント・ハウス美術館との共同企画、エッチング約130点で「光と闇の魔術師」の版画世界を完全網羅。\n大規模な版画単独展は国内極めて稀で、銅版に刻まれた線の繊細さを実物でしか体感できない。\n\n\u003e source: https://www.nmwa.go.jp/jp/exhibitions/2026rembrandt.html\n\n---\n\n**東京国立博物館 平成館（上野駅 公園口 徒歩10分）**\n**弘法大師生誕1250年記念 特別展「空海と真言の名宝」**\n2026-07-14 〜 2026-09-06\n一般2,300円（当日）/ 2,100円（前売、ローチケ等で発売中）\n真言宗18ヶ寺の秘宝が一堂に集う密教美術の大饗宴——仏画・仏像・曼荼羅・密教法具が集結。\n生誕1250年の節目に秘仏・寺外初公開が相次ぎ、音声ガイドは大塚明夫が担当。密教美術の国内最大級の機会。\n\n\u003e source: https://www.tnm.jp/modules/r_free_page/index.php?id=2760\n\n---\n\n**東京都美術館（上野駅 公園口）**\n**東京都美術館開館100周年記念 大英博物館日本美術コレクション 百花繚乱～海を越えた江戸絵画**\n2026-07-25 〜 2026-10-18\n一般2,100円（前売、6月25日発売開始）/ 2,300円（当日）\n大英博物館が誇る江戸絵画コレクションが大規模来日——国外に渡った浮世絵・肉筆画の精品を国内で一望。\n開館100周年記念の大型企画。大阪中之島美術館への巡回（10/31〜）が決定しており東京会期の終盤は混雑が予想される。\n\n\u003e source: https://daiei-ten2026.exhibit.jp/\n\n---\n\n## 🏯 関西の展覧会\n\n### 現在開催中\n\n---\n\n**京都市京セラ美術館 新館 東山キューブ（東山駅 徒歩5分）**\n**テート美術館 ─ YBA \u0026 BEYOND 世界を変えた90s英国アート**\n2026-06-03 〜 2026-09-06\n一般2,300円（当日）/ 2,100円（前売）\nダミアン・ハースト、トレイシー・エミン、ヴォルフガング・ティルマンスら約50作家・約90点——90年代英国アートの全貌をテートコレクションで辿る。\nブリットポップ・カルチャーと同期した「YBA革命」の衝撃を一挙に体感できる機会であり、大衆文化・アイデンティティ・社会批評が交錯する。\n\n\u003e source: https://kyotocity-kyocera.museum/en/exhibition/20260603-20260906\n\n---\n\n**兵庫県立美術館 1階展示室（阪神岩屋駅 徒歩8分）**\n**県立ミュージアムズ連携企画 ミュージアムのミステリー**\n2026-06-06 〜 2026-09-13\n一般1,500円（大学生1,000円、高校生以下無料）\n兵庫県立7ミュージアムのコレクションを「謎と不思議」の切り口で横断展示——美術・歴史・自然・考古の垣根を超えた異色の企画。\n普段は別々の館で眠るコレクションが一堂に会する、兵庫県内ミュージアム連携ならではの実験的な試み。\n\n\u003e source: https://www.artm.pref.hyogo.jp/exhibition/t_2606/\n\n---\n\n### 間もなく開始（開始日順）\n\n---\n\n**あべのハルカス美術館（天王寺駅 直結）**\n**ゴッホの跳ね橋と印象派の画家たち ヴァルラフ＝リヒャルツ美術館所蔵**\n2026-07-04 〜 2026-09-09\n要公式確認（公式サイト・e+にて前売券発売中）\nドイツ・ケルンの名門ヴァルラフ＝リヒャルツ美術館が誇る印象派コレクション70点——ゴッホ《跳ね橋》を筆頭に、モネ・ルノワール・セザンヌ・マティスが揃う。\n欧州有数の印象派コレクションが関西初上陸。ゴッホ存命中に描かれた《跳ね橋》の原画鑑賞は国内で滅多にない機会。\n\n\u003e source: https://www.aham.jp/exhibition/future/wallraf/\n\n---\n\n**大阪歴史博物館（谷町四丁目駅 徒歩3分）**\n**NHK大河ドラマ特別展 豊臣兄弟！**\n2026-07-08 〜 2026-08-31\n要公式確認（大阪歴史博物館公式サイトで確認を）\n大河ドラマ連動で豊臣秀吉・秀長兄弟にまつわる史料・甲冑・古文書等を展示。\n大坂城の眼下に建つ歴史博物館での開催という絶好の立地——ドラマと合わせて史実の深みを味わえる。\n\n\u003e source: 大阪歴史博物館公式サイト（https://www.mus-his.city.osaka.jp/）\n\n---\n\n**大阪中之島美術館（渡辺橋駅 徒歩5分）**\n**フェルメール《真珠の耳飾りの少女》展 17世紀オランダ絵画の名品、奇跡の再来日**\n\n![フェルメール《真珠の耳飾りの少女》](https://upload.wikimedia.org/wikipedia/commons/d/d7/Meisje_met_de_parel.jpg)\n\n2026-08-21 〜 2026-09-27\n一般3,000円（日時指定制）/ 高大生1,500円 / 小中生500円\nマウリッツハイス美術館蔵の《真珠の耳飾りの少女》（14年ぶり来日）と《ディアナとニンフたち》の2点を同時公開。\nチケットは一般発売（第1期）が2026年7月15日から——先行（tabiwa）はすでに始まっており、会期が短いため早期の確保を強く推奨。\n\n\u003e source: https://vermeer2026.exhibit.jp/\n\n---\n\n## ✨ 注目ピックアップ\n\n### 1. ルーヴル美術館展 ルネサンス｜国立新美術館（2026/9/9〜12/13）\n\nルーヴル美術館のコレクションから厳選した50余点で15〜16世紀ルネサンス美術の本質を照射する企画展。最大の見どころはレオナルド・ダ・ヴィンチ《美しきフェロニエール》の**日本初公開**——ルーヴルからダ・ヴィンチ作品が来日するのは1974年の《モナ・リザ》以来**52年ぶり**という空前の出来事だ。単なる「名品展示」ではなく、ラファエロ・ティツィアーノらとの比較を通じてルネサンスの知的連鎖を構造的に読み解く章立てとなっており、西洋美術史に関心があるすべての人の必見展。前売券は**6月18日より発売中**で、秋口の混雑前に確保したい。\n\n\u003e source: https://www.nact.jp/exhibition_special/2026/louvre2026/\n\n---\n\n### 2. フェルメール《真珠の耳飾りの少女》展｜大阪中之島美術館（2026/8/21〜9/27）\n\nマウリッツハイス美術館所蔵のフェルメール作品が**2点同時**に来日するという異例の布陣——14年ぶりの《真珠の耳飾りの少女》に加え、フェルメール最初期の傑作《ディアナとニンフたち》も並んで観られる。会期が**わずか38日間**かつ日時指定制のため、チケットは争奪戦が確実。ぴあ先行抽選（6/1〜）はすでに締切だが、tabiwa先行（6/15〜）・第1期一般（7/15〜）の購入を今から準備すべし。フェルメール研究者でなくても、世界で最も有名な絵画の一つをこれだけの条件で見られる機会は次いつ来るかわからない。\n\n\u003e source: https://vermeer2026.exhibit.jp/\n\n---\n\n### 3. 弘法大師生誕1250年記念 特別展「空海と真言の名宝」｜東京国立博物館（2026/7/14〜9/6）\n\n弘法大師・空海の生誕1250年という節目に、真言宗**18ヶ寺の秘宝**が東博平成館に集結する。通常は寺外に出ることのない秘仏・密教法具・両界曼荼羅が一堂に展観されるのは、近年の国内仏教美術展でも屈指の規模。密教世界の宇宙観を絵画・彫刻・書跡で縦横に体験できる構成で、仏教美術ファンのみならず日本美術史・思想史を学ぶ人にも深く刺さる。前売券はローソンチケット等で発売中、音声ガイドは大塚明夫が担当。\n\n\u003e source: https://www.tnm.jp/modules/r_free_page/index.php?id=2760";
document.getElementById('content').innerHTML = marked.parse(md);

// watchlist
const WL_KEY = 'exhibition_watchlist';
function loadWatchlist() {
  return JSON.parse(localStorage.getItem(WL_KEY) || '[]');
}
function saveWatchlist(list) {
  localStorage.setItem(WL_KEY, JSON.stringify(list));
}
function renderWatchlist() {
  const list = loadWatchlist();
  const bar = document.getElementById('watchlist-bar');
  const container = document.getElementById('watchlist-items');
  if (!list.length) { bar.classList.remove('has-items'); return; }
  bar.classList.add('has-items');
  container.innerHTML = list.map((item, i) => {
    const daysLeft = item.saleDate ? Math.ceil((new Date(item.saleDate) - new Date()) / 86400000) : null;
    const saleTxt = daysLeft !== null
      ? (daysLeft <= 0 ? '&#x767A;&#x58F2;&#x4E2D;' : daysLeft + '&#x65E5;&#x5F8C;&#x767A;&#x58F2;')
      : '';
    return '<div class="watchlist-item"><span>' + item.name + '</span><span><span class="sale-date">' + saleTxt + '</span><button class="remove-btn" onclick="removeWatch(' + i + ')">&#x2715;</button></span></div>';
  }).join('');
}
function removeWatch(i) {
  const list = loadWatchlist();
  list.splice(i, 1);
  saveWatchlist(list);
  renderWatchlist();
}
function addToWatchlist(name, saleDate) {
  const list = loadWatchlist();
  if (list.find(x => x.name === name)) { alert('&#x767B;&#x9332;&#x6E08;&#x307F;&#x3067;&#x3059;'); return; }
  list.push({ name, saleDate: saleDate || null, addedAt: new Date().toISOString() });
  saveWatchlist(list);
  renderWatchlist();
  checkSaleNotifications();
}
function checkSaleNotifications() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const today = new Date().toDateString();
  loadWatchlist().forEach(item => {
    if (item.saleDate && new Date(item.saleDate).toDateString() === today) {
      new Notification('&#x1F3AB; &#x30C1;&#x30B1;&#x30C3;&#x30C8;&#x767A;&#x58F2;&#x65E5;&#xFF01;', {
        body: item.name + ' &#x306E;&#x30C1;&#x30B1;&#x30C3;&#x30C8;&#x304C;&#x672C;&#x65E5;&#x767A;&#x58F2;&#x3067;&#x3059;',
        icon: '/favicon.ico'
      });
    }
  });
}

// inject watch buttons after h3 tags in content
document.querySelectorAll('#content h3').forEach(h3 => {
  const name = h3.textContent.trim();
  const btn = document.createElement('button');
  btn.className = 'watch-btn';
  btn.innerHTML = '&#x2B50; &#x30A6;&#x30A9;&#x30C3;&#x30C1;';
  btn.onclick = () => {
    const dateMatch = h3.nextElementSibling ? h3.nextElementSibling.textContent.match(/\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}/) : null;
    addToWatchlist(name, dateMatch ? dateMatch[0].replace(/\//g, '-') : null);
  };
  h3.appendChild(btn);
});

if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}
renderWatchlist();
checkSaleNotifications();
</script>
