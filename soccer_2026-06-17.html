<script>
const md = "# ⚽ サッカー移籍情報 \u0026 ワールドカップ2026 速報\n**2026年6月17日（水）**\n\n---\n\n## ✅ 完了した移籍（6/10〜6/17）\n\n\u003e **[R1確認]** 移籍窓口6/15開幕。公式発表または信頼ソース2件以上確認済みのもののみ掲載。\n\n### 1. マルク・ククレジャ（LB, 27歳）チェルシー → レアル・マドリード【6/15公式発表・継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €5,500万＋ボーナス最大€500万（計最大€6,000万 / £51.8m） |\n| 契約 | 6年（〜2032年） |\n| 発表日 | 2026年6月15日（Real Madrid公式） |\n\n- モウリーニョ就任後の夏の公式**第1号発表**。スペイン代表W杯参加中のため大会終了後に合流\n- **ソース**：Real Madrid公式、Sky Sports、ESPN、Managing Madrid（S+A級複数）\n\n### 2. ニコロ・ザニオロ（MF, 27歳）ガラタサライ（ローン）→ ウディネーゼ（完全移籍）【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €500万（ガラタサライに）＋50%売却益折半条項 |\n| 契約 | 〜2029年 |\n\n- 今季セリエAで34試合6G6A。ウディネーゼが買取オプションを行使し完全移籍へ\n- **ソース**：Fabrizio Romano（X）、TransferFeed、Fanatik（S+A級）\n\n### 3. イウェン・ジャウエン（GK, 20歳）ランス → ニューカッスル・ユナイテッド【6/10発表・継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £2,460万（€2,850万）＋ボーナス最大£300万 |\n| 契約 | 4年 |\n| 発表日 | 2026年6月10日 |\n\n- フランスU-21代表GK、身長2m、今季15クリーンシート\n- **ソース**：AP、L\u0027Équipe、Fox Sports（A級以上複数）\n\n---\n\n## 🔴 Here We Go!（合意ほぼ確実・6/3〜6/17）\n\n\u003e **今夏のレアル・マドリーがモウリーニョ政権下で補強ラッシュ。3名の確定追加**\n\n### 1. ベルナルド・シウバ（MF, 32歳）マンチェスター・シティ（フリー）→ レアル・マドリード【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | フリートランスファー（6/30契約満了） |\n| 契約 | 2年＋1年オプション |\n| ステータス | 個人合意・クラブ合意済（W杯終了後に公式発表予定） |\n\n- モウリーニョが直接交渉を主導。シティで9年間プレーしたポルトガル代表主将\n- 本日W杯初戦（ポルトガル vs コンゴDR）に出場予定\n- **ソース**：Football España（6/13）、TransfermarktWeb、Tribuna.com（A+B級複数）\n\n### 2. イブラヒマ・コナテ（CB, 27歳）リバプール（フリー）→ レアル・マドリード【NEW】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | フリートランスファー（Liverpool契約6/30満了） |\n| 契約 | 4年（〜2030年） |\n| ステータス | 合意完了・ペレス再選後に正式署名確認 |\n\n- Romano「Here We Go, soon」（6/2）→ Sky Sports「交渉進展」（6/15-16）→ ペレス再選後に署名確認\n- サウジアラビアからのオファーを断り、マドリー行きを選択。フランス代表としてW杯参加中のため大会後に合流\n- **ソース**：Fabrizio Romano（TikTok）、Managing Madrid、Sky Sports（S+A級複数）\n\n### 3. デンゼル・ダンフリース（RB, 30歳）インテル → レアル・マドリード【NEW】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €2,000万（リリース条項発動） |\n| 契約 | 〜2030年 |\n| ステータス | リリース条項発動・メディカル完了（オランダ代表帯同中） |\n\n- Romano「DUMFRIES-REAL ➡️ HERE WE GO! 💣🤍」（Instagram）。€2,000万という破格の低リリース条項を発動\n- W杯参加中のため大会終了後に公式発表予定\n- **ソース**：Fabrizio Romano（Instagram）、Goal.com、FootballTransfers（S+A級複数）\n\n### 4. ジェレミー・モンガ（W, 16歳）レスター・シティ → アーセナル【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | 約€1,500万 |\n| ステータス | 個人合意済、クラブ間交渉最終段階 |\n\n- 来月17歳でプロ初契約。アーテタが「2番目の今夏補強」として推進中\n- **ソース**：Fabrizio Romano（X）、Goal.com UK（S+A級複数）\n\n---\n\n## 🟡 交渉中・動向注目（6/3〜6/17）\n\n### 1. ドゥシャン・ヴラホヴィッチ（CF, 26歳）ユヴェントス（6/30フリー）→ 行先未定 [信頼度: ★★★]\n- ユヴェントスの€600〜700万/年延長提示を拒否。6/30フリーに。エージェントがバルセロナ・チェルシー・ニューカッスルと接触\n- バルセロナはジュリアン・アルバレスを最優先に転換しており「第2候補扱い」に後退との報道あり。行先は流動的\n- **ソース**：football-italia.net、WorldSoccerTalk、FootballToday（6/3）、TransferFeed（A+B級複数）\n\n### 2. ロベルト・レヴァンドフスキ（CF, 37歳）バルセロナ（6/30フリー）→ シカゴ・ファイア(MLS)交渉継続 [信頼度: ★★]\n- **6/16付けbeIN Sports**「Not Yet, but It\u0027s On！」。シカゴ側は2〜3年契約、年俸$1,500〜2,000万を提示。元バイエルンのゴレツカも同時追跡\n- 欧州・サウジクラブからの関心も残るが、シカゴとの交渉継続中。W杯終了後に最終決断と見られる\n- **ソース**：beIN Sports（6/16）、NBC Chicago、Sports Illustrated（A+B級）\n\n### 3. モーガン・ロジャース（MF, 23歳）アストン・ヴィラ → アーセナル 交渉中 [信頼度: ★★]\n- アーセナルが£8,000万前後の開始入札を準備中。ヴィラは£1億のバリュエーションを設定\n- ロジャース本人は「95%は噂にすぎない」とコメント。ヴィラ側もW杯前に売却圧力なし。W杯後に本格化か\n- **ソース**：Sky Sports、Read Aston Villa（6/14・6/16）（A+B級）\n\n---\n\n## 🌍 ワールドカップ2026 速報\n\n\u003e **大会概要**：開催国：米国・カナダ・メキシコ｜48カ国・12グループ｜期間：6月11日〜7月19日\n\n---\n\n### 📅 6月16日（火）の全結果\n\n| グループ | 対戦カード | スコア | 注目点 |\n|----------|-----------|--------|--------|\n| **グループI** | **フランス 3-1 セネガル** | 終了 | ムバッペが2得点・フランス歴代最多得点記録を更新 |\n| **グループI** | **ノルウェー 4-1 イラク** | 終了 | ハーランドがW杯初得点含む2発。ノルウェー快勝 |\n| **グループJ** | **アルゼンチン 3-0 アルジェリア** | 終了 | **メッシ、W杯自身初のハットトリック（17\u0027・60\u0027・76\u0027）。クローゼと並ぶ通算16得点** |\n\n\u003e **Day 6最大の見出しはメッシの記録づくし**。アルゼンチン代表200試合目＆6度目W杯出場（史上最多タイ）という節目で、W杯通算24得点貢献（ペレの21回を超え全時代最多）を達成した。\n\n---\n\n### 📅 6月17日（水）の全試合\n\n| グループ | 対戦カード | スコア / キックオフ(ET) | 会場 |\n|----------|-----------|----------------------|------|\n| **グループJ** | **オーストリア 1-0 ヨルダン** | **終了（シュミット 20\u0027）** | SAP Center, サンノゼ |\n| **グループK** | **ポルトガル vs コンゴDR** | 13:00 | NRG Stadium, ヒューストン |\n| **グループK** | **ウズベキスタン vs コロンビア** | 13:00 | Azteca Stadium, メキシコシティ |\n| **グループL** | **イングランド vs クロアチア** | 16:00 | AT\u0026T Stadium, アーリントン(TX) |\n| **グループL** | **ガーナ vs パナマ** | 19:00 | BMO Field, トロント |\n\n\u003e **本日早朝のグループJ第2試合**：オーストリアが初出場のヨルダンを1-0撃破（Romano Schmid 20\u0027）。前試合でアルゼンチンが3-0大勝したため、グループJはアルゼンチン・オーストリアが勝ち点3で並んで好発進。\n\n### 💡 今日の残り試合の見どころ\n- **ポルトガル vs コンゴDR**（13:00 ET）：**ロナウド（41歳）の6度目W杯初戦**。史上タイ記録の出場数で最後の大舞台へ。Real Madrid移籍確定のベルナルド・シウバも先発予定\n- **ウズベキスタン vs コロンビア**（13:00 ET）：ウズベキスタンの**W杯史上初の試合**に注目。コロンビアはグループK突破に向けた初戦\n- **イングランド vs クロアチア**（16:00 ET）：ユーロ2020準決勝（敗北）・WC2022グループステージ以来の因縁対決。トゥヘル監督率いるイングランドの初陣\n- **ガーナ vs パナマ**（19:00 ET）：グループLの下位枠争いを占う両チームの初戦\n\n---\n\n### 🔑 グループ別ここまでの状況（6/17昼時点）\n\n**グループF**（スウェーデン・オランダ・日本・チュニジア）\n- スウェーデン3pts、オランダ1pts、日本1pts、チュニジア0pts\n\n**グループG**（ベルギー・イラン・エジプト・ニュージーランド）\n- 全4チームが勝点1で**大混戦**\n\n**グループH**（スペイン・カーボベルデ・サウジアラビア・ウルグアイ）\n- 全4チームが勝点1。カーボベルデの旋風継続なるか\n\n**グループI**（フランス・ノルウェー・セネガル・イラク）\n- フランス3pts、ノルウェー3pts。セネガル・イラクが0ptsで苦しい出発\n\n**グループJ**（アルゼンチン・オーストリア・アルジェリア・ヨルダン）\n- アルゼンチン3pts（GD+3）、**オーストリア3pts（GD+1）**。アルジェリア・ヨルダンが0pts\n- 本日の2試合で早くも明暗が分かれた。2節以降で上位2枠が固まる可能性\n\n**グループK / L**（ポルトガル・イングランドら）\n- 本日が初戦\n\n---\n\nSources:\n- [Marc Cucurella signing - Real Madrid official](https://www.realmadrid.com/en-US/news/club/announcements/comunicado-oficial-cucurella-15-06-2026)\n- [Cucurella to Real Madrid - Sky Sports](https://www.skysports.com/football/news/11095/13554263/marc-cucurella-transfer-news-real-madrid-sign-defender-from-chelsea-in-deal-worth-lb51-8m)\n- [Cucurella complete - ESPN](https://www.espn.com/soccer/story/_/id/49064331/real-madrid-complete-signing-marc-cucurella-chelsea)\n- [Bernardo Silva set to join Real Madrid - Football España](https://www.football-espana.net/2026/06/13/bernardo-silva-real-madrid-transfer-confirmed)\n- [Bernardo Silva two-year deal - TransfermarktWeb](https://www.transfermarketweb.com/transfers/bernardo-silva-real-madrid-agreement-reached-portuguese-midfielder-set-sign-two-year-deal-228382)\n- [Bernardo Silva tax strategy reveal - Tribuna.com](https://tribuna.com/amp/en/news/2026-06-15-revealed-bernardo-silva-switch-to-real-madrid-involves-major-commissions-and-tax-strategy/)\n- [Konate agrees Real Madrid free transfer - thisisanfield.com](https://www.thisisanfield.com/2026/06/ibrahima-konate-agrees-real-madrid-free-transfer-2026/)\n- [Konate four-year contract - Managing Madrid](https://www.managingmadrid.com/108456/konate-real-madrid-contract-news-2026)\n- [Konate edges closer to Real Madrid - Sky Sports](https://www.skysports.com/transfer/news/12691/13550223/ibrahima-konate-transfer-news-defender-edges-closer-to-joining-real-madrid-as-talks-continue-with-laliga-giants)\n- [Dumfries done deal - Goal.com](https://www.goal.com/en/lists/done-deal-real-madrid-sign-world-cup-right-back-25m-release-clause-denzel-dumfries/blt4305b5e4786ecd39)\n- [Dumfries medical complete - Goal.com](https://www.goal.com/en/lists/denzel-dumfries-already-undergoing-real-madrid-medical-netherlands-duty-inter-star-20m-release-triggered/blt3d7c345232e3ba55)\n- [Dumfries confirmed - FootballTransfers](https://www.footballtransfers.com/en/transfer-news/es-la-liga/2026/06/real-madrid-denzel-dumfries-confirmed-as-jose-mourinhos-first-signing)\n- [Arsenal close to Monga - Goal.com UK](https://www.goal.com/en-gb/lists/arsenal-transfer-news-jeremy-monga-leicester-city-agree-deal-premier-league/blte9accf1f0400a117)\n- [Vlahovic free agent options - football-italia.net](https://football-italia.net/vlahovic-barcelona-bayern-call-juventus-hope/)\n- [Chelsea, Newcastle, Barcelona eye Vlahovic - FootballToday](https://footballtoday.com/2026/06/03/chelsea-newcastle-and-barcelona-interested-in-dusan-vlahovic/)\n- [Lewandowski to Chicago: Not yet but it\u0027s on - beIN Sports](https://www.beinsports.com/en-us/soccer/mls/articles/lewandowski-to-chicago-not-yet-but-it-s-on-2026-06-16)\n- [Chicago Fire in pursuit of Lewandowski - NBC Chicago](https://www.nbcchicago.com/chicago-sports-bears-sox-cubs-bulls-blackhawks/chicago-fire-interested-in-signing-soccer-star-robert-lewandowski-sources/3948853/)\n- [Morgan Rogers £100m valuation - Read Aston Villa](https://readastonvilla.com/2026/06/16/morgan-rogers-arsenal-aston-villa-100m-valuation-2026/)\n- [France 3-1 Senegal final score - ESPN](https://www.espn.com/soccer/match/_/gameId/760432/senegal-france)\n- [Mbappe breaks record vs Senegal - CBS Sports](https://www.cbssports.com/soccer/news/france-vs-senegal-live-updates-world-cup-2026-score-result/live/)\n- [Iraq 1-4 Norway - ESPN](https://www.espn.com/soccer/match/_/gameId/760430/norway-iraq)\n- [Iraq 1-4 Norway - FIFA.com](https://www.fifa.com/en/match-centre/match/17/285023/289273/400021488)\n- [Argentina 3-0 Algeria - ESPN](https://www.espn.com/soccer/match/_/gameId/760433/algeria-argentina)\n- [Messi hat trick - NBC News live blog](https://www.nbcnews.com/sports/soccer/live-blog/fifa-world-cup-2026-june-16-messi-argentia-live-updates-rcna350195)\n- [Austria 1-0 Jordan - FIFA.com](https://www.fifa.com/en/match-centre/match/17/285023/289273/400021498)\n- [Austria vs Jordan match report - ESPN](https://www.espn.com/soccer/story/_/id/49083659/austria-vs-jordan-live-world-cup-2026-latest-updates-commentary-score-result)\n- [Group J guide: Argentina, Algeria, Austria, Jordan - ESPN](https://www.espn.com/soccer/story/_/id/49083111/group-j-2026-world-cup-teams-records-stats-know-argentina-algeria-austria-jordan)\n- [Group K guide: Portugal, DR Congo, Uzbekistan, Colombia - Sky Sports](https://www.skysports.com/football/news/12040/13543106/world-cup-2026-group-k-guide-fixtures-schedule-standings-and-odds-for-portugal-dr-congo-uzbekistan-and-colombia)\n- [Group L guide: England, Croatia, Ghana, Panama - Sky Sports](https://www.skysports.com/football/news/12098/13543108/world-cup-2026-group-l-guide-fixtures-schedule-standings-and-odds-for-england-croatia-ghana-and-panama)\n- [England vs Croatia preview - ESPN](https://www.espn.com/soccer/story/_/id/49047660/fifa-world-cup-2026-england-vs-croatia-tv-channel-how-watch-kick-live-stream-referee-predicted-line-ups)\n- [Portugal vs DR Congo preview - ESPN](https://www.espn.com/soccer/story/_/id/49069166/fifa-world-cup-2026-portugal-vs-dr-congo-channel-how-watch-kickoff-live-stream-referee-predicted-line-ups)";
