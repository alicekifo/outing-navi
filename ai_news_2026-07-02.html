<script>
const md = "## 🤖 今週のAI最新動向\n\n### 1. Anthropic、ミッドレンジモデル「Claude Sonnet 5」をリリース——Opus級の性能を半額以下で\n\nAnthropicは2026年6月30日、Claude Sonnet 5を発表した。無料/Proプランのデフォルトモデルとなり、ブラウザやターミナルを使ったエージェント的タスクの自律実行能力を強化している。\n\nSWE-bench Pro（エージェント型コーディング）で63.2%を記録し、Opus 4.8の69.2%に迫った。一方Terminal-Bench 2.1では80.4%とOpus 4.8（74.6%）を上回り、Sonnet系列として初めてOpusを特定ベンチで上回る結果となった。価格は導入価格で入力$2/出力$10（100万トークンあたり、2026年8月31日まで）、以降は$3/$15に移行する（Opus 4.8は$5/$25）。ミッドサイズモデルでもエージェント運用に十分な水準に達しつつあることを示す事例で、コスト重視でエージェント基盤を組む開発者にとって選択肢が広がる。\n出典: [Anthropic公式](https://www.anthropic.com/news/claude-sonnet-5) (2026-06-30公開)\n\u003e source: https://www.anthropic.com/news/claude-sonnet-5\n\n### 2. 米政府、Anthropicの「Mythos 5」への輸出規制を解除——サイバーセキュリティ懸念からの急転換\n\n米商務省は6月上旬、公開からわずか3日でAnthropicのMythos 5（Fable 5の制限版、脆弱性発見・攻撃コード生成能力を持つセキュリティ特化モデル）に対し、国家安全保障を理由に外国人利用者への提供停止を命じた。ジェイルブレイクにより安全策が回避され、無制限のサイバー攻撃ツールと化す恐れがあるとの報告が引き金だった。その後Anthropicと政府の協議が進み、6月26日に一部米国組織への提供再開が承認され、6月30日には輸出規制そのものが解除されたとAnthropicが明らかにした。\n\n攻撃的にも防御的にも転用できるAIモデルの扱いを巡り、政府が事後的にモデルの提供可否をコントロールするという前例になる。Anthropicは脆弱性発見・防御目的の限定提供プログラム「Glasswing」を通じ、審査済み組織への提供を続ける方針。攻撃能力の高いモデルの「解禁」条件が今後の業界標準になるかが焦点。\n出典: [CNBC](https://www.cnbc.com/2026/06/30/anthropic-says-trump-admin-has-lifted-export-controls-on-claude-fable-5-and-mythos-5.html) (2026-06-30公開)\n\u003e source: https://www.cnbc.com/2026/06/30/anthropic-says-trump-admin-has-lifted-export-controls-on-claude-fable-5-and-mythos-5.html\n\n### 3. EU、AI法簡素化パッケージ「デジタル・オムニバス」を正式採択——高リスク規制の適用を最大2年延期\n\nEU理事会は2026年6月29日、AI法の実装ルールを簡素化する規則案（Digital Omnibus on AI）に最終承認を与えた。欧州議会は6月16日に賛成423・反対57・棄権174で可決済みで、これにより立法手続きが完了した。\n\nスタンドアロン型の高リスクAIシステムへの完全な規制適用は2026年8月2日から2027年12月2日へ、製品組込み型は2028年8月2日へと延期される。一方、実在人物の性的合成画像（いわゆる「ヌーディファイ」ツール）やCSAM生成AIの禁止は新たに明文化された。当初想定されていた8月の高リスク規制発効を目前にした延期であり、EU域内でAIシステムを展開する事業者のコンプライアンス計画に直接影響する。\n出典: [Council of the EU (Consilium)](https://www.consilium.europa.eu/en/press/press-releases/2026/06/29/artificial-intelligence-council-gives-final-green-light-to-simplify-and-streamline-rules/) (2026-06-29公開)\n\u003e source: https://www.consilium.europa.eu/en/press/press-releases/2026/06/29/artificial-intelligence-council-gives-final-green-light-to-simplify-and-streamline-rules/\n\n---\n\n## 📄 今週の注目論文\n\n### 1. PI-Hunter：プロンプトインジェクションを暴き出す自動レッドチーミング（PI-Hunter: Automated Red-Teaming for Exposing and Localizing Prompt Injections）\n\nPengfei He（共著にGoogleのTomas Pfister、Michigan State UniversityのJiliang Tangら）・arXiv:2606.12737・2026年6月10日公開\n\n- **Problem**: エージェント化したLLMは外部ツールや外部データソースを介した間接プロンプトインジェクションに脆弱だが、既存のレッドチーミング手法は「攻撃成功率」の最大化に偏り、潜在的な脆弱性がどこでどう発現するかの可視化ができていない。\n- **Method**: ソースの性質を考慮したテストケースを構築し、フィードバック駆動で反復的に進化させることで、外部環境に埋め込んだ悪意ある指示をエージェントに引き出させ、脆弱性の所在を特定する監査フレームワーク「PI-Hunter」を提案。\n- **Finding**: 複数のベンチマーク・アーキテクチャで既存のレッドチーミング手法を大きく上回る検出性能を示し、プロンプトインジェクション対策（防御機構）を導入した状態でも有効性を維持した。\n\n**読みどころ**: 「攻撃を成功させる」から「脆弱性の場所を特定する」への視点転換は、実運用でエージェントを守る側（Blue Team）にとって直接役立つ発想。MCPサーバーや外部ツール連携を組んでいる開発者は、自前のエージェントに同種の監査を回す価値がある。\n[arXiv:2606.12737](https://arxiv.org/abs/2606.12737)\n\u003e source: https://arxiv.org/abs/2606.12737\n\n### 2. 位置表明：コーディングベンチマークはエージェント型ソフトウェア工学とズレている（Position: Coding Benchmarks Are Misaligned with Agentic Software Engineering）\n\nMaria I. Gorinova（Tessl, London）ら・arXiv:2606.17799・2026年6月16日公開\n\n- **Problem**: 現行のコーディングベンチマークはエージェント登場以前に設計されたもので、モデル・ハーネス・実行環境を一つのスコアに潰し込み、単一の正解実装との比較しかできず、改善のための要素別シグナルが得られない。\n- **Method**: コーディングエージェントを「モデルではなくシステム全体（モデル＋ハーネス＋文脈＋環境＋フィードバック信号の複合体）」と捉え直し、現行ベンチマークが抱える3つの構造的問題（モデルとインフラの混同・単一正解による不当な減点・要素別フィードバックの欠如）を整理して指摘する立場論文。\n- **Finding**: ハーネスや実行環境の差だけで、モデル世代間の差に匹敵するスコア変動が生じうることを論証し、コンポーネント単位で評価する新しいベンチマーク設計が必要と結論づけた。\n\n**読みどころ**: 「モデルの強さ」と「エージェント基盤の強さ」を混同したままリーダーボードを見ている実務者は多いはず。自社でコーディングエージェントを構築・評価する際、どこを測るべきかの設計指針として読む価値がある。\n[arXiv:2606.17799](https://arxiv.org/abs/2606.17799)\n\u003e source: https://arxiv.org/abs/2606.17799\n\n### 3. 検証の限界地平：コーディングエージェントの報酬設計に銀の弾丸はない（The Verification Horizon: No Silver Bullet for Coding Agent Rewards）\n\nBinghai Wang（Alibaba Qwenチーム、プロジェクトリードDayiheng Liu）ら・arXiv:2606.26300・初版2026年6月24日、v2 2026年6月29日改訂\n\n- **Problem**: 「検証は生成より簡単」という古典的直感が、高度化したコーディングエージェントでは逆転しつつある。あらゆる検証器（verifier）は人間の意図の代理でしかなく、意図そのものを捉えられないため、報酬ハッキングや信号飽和が学習中に拡大する。\n- **Method**: 検証シグナルの質を「スケーラビリティ」「忠実性」「頑健性」の3軸で整理し、テスト検証器（一般コーディング）・ルーブリック検証器（フロントエンド）・ユーザー自身を検証器とする方式・自動エージェント検証器（長期タスク）の4種類を実験的に比較。\n- **Finding**: どの固定的な報酬関数もモデルの能力向上に伴って有効性を失い続けることを示し、「検証は生成器と共進化させる必要がある」と結論。狙いを絞った検証設計により報酬ハッキングを抑制し、複数の社内外ベンチマークで有意な性能向上を確認した。\n\n**読みどころ**: RLHFやエージェント報酬設計に関わるなら必読。「モデルを賢くする」より「モデルの出力を正しく検証する」ことの方が先にボトルネックになるという指摘は、AIセキュリティの文脈（誤った承認をどう防ぐか）にも直結する。\n[arXiv:2606.26300](https://arxiv.org/abs/2606.26300)\n\u003e source: https://arxiv.org/abs/2606.26300\n\n---\n\n## 💡 今週のひとことインサイト\n\n今週いちばん面白かったのは、Anthropicの「Mythos 5」輸出規制騒動と、Qwenチームの「検証の限界地平」論文が、期せずして同じことを言っている点だ。Mythos 5はサイバー攻撃コード生成能力ゆえに一度は政府に止められ、Glasswingという審査制の「限定公開」で運用が再開された。これはつまり、モデルの出力そのものを止めるのではなく「誰が・どう検証して使うか」というプロセス側で安全性を担保する発想への転換だ。一方で検証論文は、生成が賢くなるほど検証（≒審査）がボトルネックになると数式とベンチマークで裏付けている。Linuxのsudoやcapabilitiesの設計思想——「強い権限そのものを禁止するのではなく、誰がどう行使できるかを制御する」——がAIガバナンスの実装レベルでも同じ形に収斂しつつあるのは、セキュリティ屋として妙に納得感がある。";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
