<script>
const md = "# 教養マガジン 2026/7/8\n\n### シャンパーニュ、8月に摘む ── 熱波が書き換えるワインの暦\n\n5月末から欧州を焼く記録的熱波が、2026年ヴィンテージの運命を早くも左右し始めている。シャンパーニュとボルドーは8月の収穫開始がほぼ確実、南仏ルシヨンでは「7月に摘むかもしれない」という声まで出た。フランスの収穫はすでに1980年代より平均3週間早いが、今年はさらに前倒しだ。問題は速さそのものより「ずれ」にある。ブドウの成熟は糖・酸・フェノール（渋みや香りのもとになる成分群）の三本柱が揃って初めて完成するが、猛暑は糖だけを暴走させ、酸が落ち、皮は追いつかない。強すぎる日差しに焼かれた果実は干しぶどう状に縮む。醸造家たちは夜間収穫や葉を残す仕立てで抵抗するが、ワインの味とは結局「その年の気候の記録」なのだと痛感させられる夏になりそうだ。\n\n\u003e source: https://www.forbes.com/sites/karlsson/2026/06/28/vineyards-threatened-by-the-extreme-heat-wave/\n\n### 「POSIXの規格書、どこにある？」── Linux最初の痕跡から35年\n\n1991年7月3日、フィンランドの21歳の学生がニュースグループcomp.os.minixに短い質問を投げた。「POSIX規格の機械可読版はどこで手に入る？」——POSIXとはUNIX系OSの互換性を定めた標準規格のこと。投稿者はリーナス・トーバルズ。有名な8月25日の「趣味でOSを作ってる、大きくてプロフェッショナルなものにはならない」という宣言より7週間早い、Linuxがこの世に残した最初の足跡だ。つまり先週、Linuxは「構想35周年」を迎えたことになる。規格書は結局高価で入手できず、彼はSunのマニュアルや手元のminixから仕様を推測して書いた。完璧な資料を待たずに動き出したその泥臭さが、今や世界のスーパーコンピュータ500台全部とAndroidの心臓部を支えている。\n\n\u003e source: https://en.wikipedia.org/wiki/History_of_Linux\n\n### 529年前の今日、リスボンの岸壁から「世界経済」が出航した\n\n1497年7月8日、ヴァスコ・ダ・ガマ率いる4隻・約170人がリスボンを発った。目的地はインド。コロンブスの「西回り」に対抗する、アフリカ南端経由の東回り航路だ。大西洋を大きく迂回して喜望峰を回り、翌年5月にインドのカリカットへ到着——外洋のみで約10ヶ月、当時としては人類史上最長の航海だった。代償は凄まじく、壊血病（ビタミンC欠乏症）などで乗員の3分の2が死に、生還者は55人ほど。それでも持ち帰った胡椒や肉桂は航海費用を桁違いに上回る利益を生んだ。ヨーロッパとアジアが地中海の仲介者抜きで直結した瞬間であり、以後の植民地主義も、香辛料価格の暴落も、「グローバル経済」の原型も、この日の出航から始まったと言っていい。\n\n\u003e source: https://www.britannica.com/biography/Vasco-da-Gama\n\n### 拷問台の上で「真実だ」と叫んだ画家 ── アルテミジア・ジェンティレスキ生誕433年\n\n今日7月8日は、バロック期ローマに生まれた画家アルテミジア・ジェンティレスキ（1593年生）の誕生日だ。17歳で描いた「スザンナと長老たち」はすでに巨匠級だったが、18歳のとき師の画家タッシに性暴力を受ける。続く裁判で証言の「真実性を保証する」ためとして、彼女は指を縄で締め上げる拷問を受けながら証言させられた——画家の命である指を、だ。それでも彼女は「真実だ、真実だ」と繰り返した。その後フィレンツェで、美術アカデミーが史上初めて迎えた女性会員となり、ホロフェルネスの首を斬るユディトを、返り血の飛ぶ生々しさで何度も描いた。20世紀まで作品の多くは父や他の男性画家の作とされていた。近年の再評価は、美術史が誰の目で書かれてきたかを問い直す作業でもある。\n\n\u003e source: https://www.britannica.com/biography/Artemisia-Gentileschi\n\n### 数学のオリンピック、40年ぶりに米国へ ── 今月フィラデルフィアでフィールズ賞発表\n\n4年に一度の国際数学者会議（ICM）が今月23日、フィラデルフィアで開幕する。米国開催は1986年以来40年ぶり。初日に発表されるフィールズ賞は「数学のノーベル賞」と呼ばれるが、実は性格がまるで違う。受賞は40歳未満限定——業績の表彰ではなく「これからの飛躍への激励」が創設趣旨だからだ。ノーベルが数学賞を作らなかった穴を埋めようと、カナダの数学者フィールズが1936年に始めた。賞金も約1万5千カナダドルとノーベル賞の100分の1程度で、栄誉と金額が完全に切り離されているのが面白い。今回はフィールズ賞受賞者テレンス・タオによる公開講演「AI時代の数学」も予定されており、証明支援AIが賞の風景をどう変えるかも密かな注目点だ。\n\n\u003e source: https://www.mathunion.org/icm/icm-2026";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
