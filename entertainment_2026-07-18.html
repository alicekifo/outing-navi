<script>
const md = "# 🎬🎮🎌 エンタメ週報（2026-07-18）\n\n## 🎬 今週の映画\n\n### キングダム 魂の決戦\n- **公開日**: 2026年7月17日（金）\n- **あらすじ**: 実写『キングダム』シリーズ第5作。原作の「合従軍編」を映画化し、秦に迫る列国連合軍との存亡を懸けた防衛戦を描く。信を山﨑賢人、王・嬴政を吉沢亮が続投。\n- **見どころ**: 佐藤信介監督が城壁の高さを活かした「縦のカメラ」で防衛側の息苦しさを身体感覚として伝える演出が公開初日から高評価。「全5作すべて面白いシリーズ」との声も。\n- **評価**: Filmarks 4.1（1,824件・公開直後時点）\n- 公式/作品情報: https://eiga.com/movie/104266/\n\n\u003e source: [Filmarks 作品ページ](https://filmarks.com/movies/123717)（2026-07-17公開・スコア掲載）\n\n### チルド\n- **公開日**: 2026年7月17日（金）/ 88分 / R15+\n- **あらすじ**: 東京の片隅のコンビニ「エニーマート倉冨町7丁目店」。20代のほとんどを店で過ごしてきた副店長・堺（染谷将太）の日常が、新人アルバイトの登場を機に静かに崩れていく\"コンビニエンス・ホラー\"。\n- **見どころ**: 岩崎裕介の初長編監督作ながら、第76回ベルリン国際映画祭フォーラム部門で国際映画批評家連盟賞を受賞。共演に唐田えりか、西村まさ彦、令和ロマン・くるま。\n- **評価**: Filmarks 4.0（227件・公開直後時点）\n- 公式サイト: https://nothingnew.film/chilled_anymart/\n\n\u003e source: [映画.com 作品ページ](https://eiga.com/movie/105408/)（2026-07-17公開）\n\n### 君と花火と約束と\n- **公開日**: 2026年7月17日（金）/ 配給: 松竹\n- **あらすじ**: 真戸香の同名小説をアニメ映画化。新潟県長岡市「長岡まつり大花火大会」を舞台に、時を超えて結ばれた約束と高校生たちのひと夏を描く青春ラブストーリー。\n- **見どころ**: 主人公・誠役はtimelesz佐藤勝利（アニメ映画初主演）、ヒロイン・煌役は『すずめの戸締まり』の原菜乃華。監督は『神之塔』の鈴木慧、制作シンエイ動画。長岡花火に込められた「平和への祈り」が軸。\n- **評価**: 未評価（公開直後で集約スコア未確立。映画.comレビューは「涙なしには見られない」と「恋愛パートが定型的」で賛否混在）\n- 公式サイト: https://kimi-hana-movie.com/\n\n\u003e source: [映画.com 作品ページ](https://eiga.com/movie/105462/)（2026-07-17公開）\n\n---\n\n## 🎮 ゲーム情報\n\n### ユーザー注目タイトル動向\n\n#### FC26\n- 週次TOTWは欧州シーズン終了に伴い供給終了済み。現行のライブコンテンツは「**Festival of Football**」（6月5日〜**7月24日**）で、ログイン＋プレイでOVR93のICONペレ＋Choose Your Journeyエボ3種を入手可能。期間中に国際選手100人超がFUTアイテムプールに追加され、新ICONとしてリベリーノとマリオ・ケンペスが登場。イベント終了まで残り1週間なので回収はお早めに。\n\n\u003e source: [EA公式 FC26ニュース](https://www.ea.com/ja/games/ea-sports-fc/fc-26/news)\n\n#### Minecraft\n- **7月16日にJava版 26.3 Snapshot 4 が配信**。ウィンドウ/入力管理をGLFWからSDL3へ移行する大型の技術更新で、ボーダーレスフルスクリーンが既定になり再起動なしで排他/ボーダーレス切替が可能に。スペクテイターモードでポータル通過も解禁。前週のSnapshot 3では「クッション」（座れる家具）と「わらのベッド」が追加されており、26.3は家具系アプデとして進行中。\n\n\u003e source: [Minecraft Wiki: Java Edition 26.3 Snapshot 4](https://minecraft.wiki/w/Java_Edition_26.3_Snapshot_4)（2026-07-16配信）\n\n#### シャドウバース（Worlds Beyond）\n- **7月15日 15:00〜17:00にメンテナンス実施**。「シャドババトルフェス」および「Masters Cup Vol.2」の開催準備によるもので、大会シーズンが目前。環境は6月29日リリースの1周年記念パック「クロニクル・オブ・デスティニー」（旧Shadowverseキャラ集結弾）が継続中。\n\n\u003e source: [シャドバWB公式X](https://x.com/shadowverse_jp/status/2074735236185776599)（2026-07-15メンテ告知）\n\n### 新作リリース\n\n### プロ野球スピリッツ2026\n- **プラットフォーム**: PS5ほか / **開発元**: KONAMI / **発売日**: 2026年7月16日\n- 2026年シーズン最新選手データ収録の野球ゲーム。家庭用シリーズとしては17年ぶりに「2026 WORLD BASEBALL CLASSIC」モードを収録するのが最大の目玉。\n- **評価**: 未評価（発売直後のため集約スコアなし）\n\n\u003e source: [PlayStation.Blog 7月の注目ソフト](https://blog.ja.playstation.com/2026/07/01/20260701-monthly-picks-s/)（2026-07-01掲載）\n\n### 亰都ザナドゥ -桜花幻舞-\n- **プラットフォーム**: PS5 / **開発元**: 日本ファルコム / **発売日**: 2026年7月16日\n- 亰都（けいと）が首都となった現代日本を舞台にしたアクションRPG。『東亰ザナドゥ』の系譜に連なる新作。\n- **評価**: 未評価（発売直後のため集約スコアなし）\n\n\u003e source: [PlayStation.Blog 7月の注目ソフト](https://blog.ja.playstation.com/2026/07/01/20260701-monthly-picks-s/)（2026-07-01掲載）\n\n### 注目セール\n\n### PS Store「SUMMER SALE」第一弾\n- **期間**: 7月15日〜7月29日（第二弾は7月27日〜8月12日）/ **最大80%OFF**\n- 買いの理由: 年間最大級のセール。Steamサマーセール（7月10日終了）を逃した人のコンソール側リベンジ枠。\n\n\u003e source: [プライシー PS Storeセールガイド](https://www.pricey.jp/web/articles/2086)（2026-07更新）\n\n### Steam「ソーシャルディダクションフェス」\n- **期間**: 開催中（今週）/ ストア: Steam\n- 買いの理由: 「騙し合い・出し抜き合い」テーマの人狼系・正体隠匿系がまとめて割引。サマーセール後の谷間を埋めるニッチ特化フェス。\n\n\u003e source: [Steam 割引＆イベント](https://store.steampowered.com/specials?l=japanese)\n\n---\n\n## 🎌 アニメ・ストリーミング\n\n### 攻殻機動隊 THE GHOST IN THE SHELL（第2話）\n- **放送/配信**: カンテレ・フジ系「火アニバル!!」火曜23時 / Prime Video最速見放題（放送同日）、翌水曜からdアニメストア・ABEMA・Netflix・U-NEXTなど14サービスで順次配信\n- **直近の話題**: 7月14日放送の第2話が「地上波でギリギリ流せるレベル」「かなり頑張ったな」と攻めた内容で反響。サイエンスSARUによる士郎正宗原作の再アニメ化で、今クールの注目筆頭。正体不明のハッカー「人形使い」の存在が示唆され本筋が始動。\n- **評価**: 集約スコア未確立（放送開始直後）\n- 公式サイト: https://www.theghostintheshell-anime.jp/\n\n\u003e source: [V-STORAGE 配信情報](https://v-storage.jp/anime/koukaku/278781/)（2026年7月掲載）\n\n### 無職転生Ⅲ ～異世界行ったら本気だす～（今週の新着注目）\n- **配信**: dアニメストアほか（2026年夏アニメとして7月期配信中）\n- 人気シリーズ第3期が今クール開始。dアニメストアの夏アニメラインナップの目玉格で、『BLEACH 千年血戦篇-禍進譚-』『コードギアス 奪還のロゼ』と並ぶ続編大作枠。\n- **評価**: 集約スコア未確立（クール序盤）\n\n\u003e source: [uzurea.net dアニメストア2026夏配信一覧](https://uzurea.net/d-animestore-anime-list-summer2026/)（2026年7月掲載）\n\n### 配信ランキング\n- ※今週は該当なし——dアニメストア・Nアニメともランキングページは毎日更新だが、今週分の順位を日付付きで裏取りできる静的ソースが取得できなかったため、不確かな順位の記載は見送り。確認先: [dアニメストア アニメランキング](https://animestore.docomo.ne.jp/animestore/CR/CR00000013?period=weekly) / [Nアニメ 夏アニメランキング](https://anime.nicovideo.jp/ranking/view-daily.html)\n\n\u003e source: [dアニメストア アニメランキング](https://animestore.docomo.ne.jp/animestore/CR/CR00000013?period=weekly)\n\n---\n\n### セルフチェック\n- [x] R1: 映画3本は7/17公開、ゲームは7/15〜16のアプデ・発売・セール、アニメは7/14放送回\n- [x] R3: 評価はFilmarksスコア引用のみ、スコアなしは「未評価」明記\n- [x] FC26 / Minecraft / シャドウバース 3タイトルすべて確認済み\n- [x] R4: 画像は今週リンク検証できる公式静的URLがなかったため全省略（壊れURLゼロ）\n- [x] R5: ランキングは「該当なし」処理\n\n---\n\n補足を2点だけ。TOTWはシーズン供給が終わってるから、FC26定点は今後「ライブイベント・タイトルアップデート」軸に切り替えるのが正解だと思う。あと配信ランキングは毎週動的ページしかなくて裏取りが構造的に厳しい——スクリプトで週次スナップショットを取る仕組みを作るか、ランキング項目自体を仕様から外すか、どっちかは君の決裁。";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
