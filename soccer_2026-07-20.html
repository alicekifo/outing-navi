<script>
const md = "# サッカー移籍情報＆ワールドカップ2026 — 2026年7月20日号\n\n\u003e ⚠️ **補填注記**: 2026-07-11〜07-16の6号は保存障害（生成後にパイプライン後段が報告文で上書き）により記事本文が欠損している。07-17号以降も同障害が発動していたが、いずれもバックアップ（`codex\\work\\news_backup\\`）から復元済み。**07-19号は本号生成時の実測で正本無傷（16,960バイト・記事本文）を確認**——14時台の更新走行後の再上書きはなかった。欠損期間の主要確定事項は検証し直した範囲で再掲を継続する。\n\n---\n\n## 今日のハイライト\n\n1. **W杯決勝は本日7/20（月）4:00 JST スペイン × アルゼンチン——両軍の公式スタメンが発表済み**（本号生成の約45分前にRomano・FIFA公式で確認）。**メッシ先発・ヤマル先発**、39歳と19歳の初直接対決が実現する。ヤマル・ポロはフィット宣言どおり揃って先発入り\n2. **クロップがドイツ代表新監督に Here We Go**——Romano本人ポスト「Jürgen Klopp as new Germany head coach, here we go!」＋Goal・Sky Sports・Irish Timesの多重確認。契約は2030年W杯まで・正式サインは来週予定。W杯ラウンド32でパラグアイにPK戦負け（独史上初）したナーゲルスマンの後任\n3. **ロジャーズ→[[チェルシー]]は本日メディカル予定**。£117M・6年契約で、アンダーソン（→マンチェスター・シティ£116M）を抜く**イングランド人史上最高額**になる見込み\n4. **アーセナルはトロサール後継に[[ツォリス]]（クラブ・ブルッヘ）を£34Mで合意**（Sky Sports）——ベルギーリーグ史上最高の売却額。ロンドンでのメディカルへ\n\n---\n\n## 1. 完了した移籍（発表日が7/13〜7/20のもの）\n\n**7/19の新規完了は主要リーグでは実質ゼロ**（決勝前日で市場が静止。ローン小粒のみ）。以下は7日ガード内の再掲。\n\n| # | 選手 | 移籍元 → 移籍先 | 移籍金 | 契約 | 発表日 |\n|---|------|----------------|--------|------|--------|\n| 1 | [[アセコ]] | バイエルン → フランクフルト | €12M（報道により〜€13M） | 2031年まで | 7/18 |\n| 2 | [[マンザンビ]] | フライブルク → アストン・ヴィラ | £59.5M（€70M・アドオン込） | 5年 | 7/17 |\n| 3 | [[ムハレモビッチ]] | サッスオーロ → リーズ | €40M（£34.1M） | 5年（2031年まで） | 7/17 |\n| 4 | [[エステーブ]] | バーンリー → RBライプツィヒ | €25M+ボーナス | 2031年まで | 7/17 |\n| 5 | [[オーバメヤン]] | マルセイユ → デポルティボ | €1.5M | 2028年まで | 7/17 |\n| 6 | [[トロサール]] | アーセナル → ベシクタシュ | €18M（£17M） | 3年+1年OP | 7/15 |\n| 7 | [[ムニエ]] | リール → サンダーランド | フリー | — | 7/15 |\n| 8 | [[グリーンウッド]] | マルセイユ → [[フェネルバフチェ]] | €39M | 4年 | 7/14 |\n| 9 | [[ティーレマンス]] | アストン・ヴィラ → [[マンチェスター・ユナイテッド]] | £35M（解除条項） | 5年 | 7/14 |\n| 10 | [[ダーロウ]] | リーズ → マンチェスター・ユナイテッド | フリー | — | 7/14 |\n\n**各件の補足:**\n\n- 全10件は前号からの再掲（いずれもクラブ公式ないしS/A級で確認済み）。7/14発表の3件（グリーンウッド・ティーレマンス・ダーロウ）は明日以降の号で7日ガードから外れる\n- 7/19に完了として流れたのはフアン・クルス（レガネス→マラガ・ローン）等の小粒案件のみで、対象5リーグの掲載基準に満たない\n- ※日付ガードによる除外は前号同様: アンソニー→ブレントフォード（7/7）・アケ→フェネルバフチェ（7/4-5）・ダンフリース→[[レアル・マドリー]]（7/5）等\n\n---\n\n## 2. Here We Go!（合意ほぼ確実）\n\n1. **クロップ → ドイツ代表監督（新規・監督人事）**\n   - **Romano本人ポスト（Telegram公式で直接確認）「BREAKING: Jürgen Klopp as new Germany head coach, here we go!」**＋Goal・Sky Sports・Irish Timesの多重確認\n   - 契約は**2030年W杯までの4年**・正式サインは来週予定。NYでの交渉で合意に達したと報道\n   - W杯ラウンド32のパラグアイ戦PK負け（ドイツ史上初のPK戦敗退）を受けたナーゲルスマン解任の後任。クロップは2024年のリバプール退任後、レッドブル・グループのグローバルサッカー統括を務めていた\n2. **[[ロジャーズ]] → チェルシー**(3日目・メディカル本日)\n   - Romano＋Ornstein（The Athletic）の二重確認済み・ヴィラとのクラブ間合意£117M\n   - **メディカルは本日7/20（月）スタンフォード・ブリッジで実施予定**（複数報道）。6年契約（2032年まで）で、完了すれば**アンダーソンの£116Mを抜くイングランド人史上最高額＋チェルシーのクラブレコード**\n3. **[[アプソン]] → アーセナル**（2日目・公式発表待ち）\n   - Romano本人ポスト（7/18）「Agreement signed today」「all set to be announced」——契約書サイン済みで公式発表を待つだけの段階\n   - トッテナムの18歳CB。奨学生契約が6/30に満了し、スパーズのプロ契約提示を断ってのフリー移籍。チェルシー・マンチェスター・シティ・エバートン・バイエルン・ドルトムント等の競合を退けた。父は元アーセナルDFのマシュー・アプソン\n4. **[[シュラーガー]] → ノッティンガム・フォレスト**（6日目・留め置き継続）\n   - Romano＋The Athleticの二重確認済み。フリー・契約2028年6月まで+1年OP・メディカル完了\n   - ジャンクサイトの「7/15公式発表済み」は今日も流通しているが、**フォレスト公式・S/A級での発表確認は本日も取れず**（ESPN・The Athleticは「set to sign」を維持）。本欄留め置きを継続\n5. **[[バルデペニャス]] → フィオレンティーナ**（継続）\n   - Romano本人ポスト（7/14）: 口頭合意・€8M・2031年6月まで・レアル・マドリーが50%セルオン＋マッチライト保持。発表時期は流動（モウリーニョ新監督のプレシーズン見極め説）\n\n---\n\n## 3. 交渉中（信頼度: ◎=ほぼ確実 ○=有力 △=一部報道 ✖=破談）\n\n1. **[[ツォリス]] → アーセナル ◎（新規）**\n   - **Sky Sports（A級）がクラブ間の移籍金合意£34Mを確認**——ベルギー・プロリーグからの売却額として史上最高。ロンドンでのメディカルを経て長期契約へ\n   - ベシクタシュへ去ったトロサールの後継。24歳のギリシャ代表ウインガーで、昨季はクラブ・ブルッヘで公式戦17ゴール23アシスト。「プレミア王者の興味を知ってからはアーセナル一択だった」と報道\n   - Romanoのhere we goは未確認のため本欄掲載。メディカル完了・公式発表で昇格見込み\n2. **[[バルコラ]] → リバプール ○**\n   - **Romano（7/19）「ロジャーズのハイジャック後もアーセナルとバルコラ陣営・PSGの新たな接触はない。リバプールは価格次第で引き続きターゲットにしている——PSG待ち」**——競合が事実上消え、リバプール単独先行の構図が明確化\n   - PSG側の後継確保（モナコのウインガー獲得交渉が最終段階・前号既報）も進行中で、放出環境は引き続き整いつつある。※金額（£85M準備 vs 査定£127M）は引き続きB級ソース由来で幅に注意\n3. **[[ギマランイス]] → アーセナル ○**\n   - 新規のS/A級進展なし。£80M準備 vs ニューカッスル要求£100Mの溝・売却拒否の姿勢は前号のまま。ロジャーズ喪失後の資金再配分がどこへ向かうか（ツォリス合意で左WGは充足）が引き続き焦点\n\n---\n\n## 4. ワールドカップ2026\n\n### 決勝: スペイン × アルゼンチン（**本日 7/20（月）4:00 JST**・NY/NJ MetLifeスタジアム）\n\n**両軍の公式スタメンが発表済み**（本号生成の約45分前・Romano Telegram＋FIFA公式マッチセンター）:\n\n- **スペイン（4-3-3）**: ウナイ・シモン｜ポロ、クバルシ、ラポルト、ククレジャ｜ロドリ、ファビアン・ルイス｜バエナ、オルモ、ヤマル｜オヤルサバル\n- **アルゼンチン（4-4-2）**: ディブ・マルティネス｜モンティエル、ロメロ、リサンドロ・マルティネス、タリアフィコ｜デ・パウル、エンソ・フェルナンデス、マク・アリステル、ニコ・ゴンサレス｜メッシ、フリアン・アルバレス\n\n- **負傷不安のあったヤマル・ポロは宣言どおり揃って先発**（7/18のデ・ラ・フエンテ監督「100%フィット」の言葉どおり）\n- アルゼンチンは準決勝から予想されたシメオネでなくニコ・ゴンサレスが先発入り、デ・パウルも復帰。**39歳メッシ × 19歳ヤマル、国際大会での初直接対決**\n- スペインは2010年南アフリカ以来2つ目の星を、アルゼンチンは2022年カタールからの連覇を狙う。試合結果と得点王の確定は明日7/21号で反映する\n\n### 得点王レース（決勝キックオフ前・前号から変動なし）\n\n| 選手 | G | A | 備考 |\n|------|---|---|------|\n| エムバペ（フランス） | **10** | 3※ | 単独首位・全日程終了。1大会2桁得点は1970年G・ミュラー以来 |\n| メッシ（アルゼンチン） | 8 | 4 | **本日決勝。2得点で10Gに並べばA差で逆転**（FIFA規定: G→A→出場時間）・3得点で単独 |\n| ベリンガム（イングランド） | 7 | — | 全日程終了・確定 |\n| ハーランド（ノルウェー） | 7 | — | 敗退済み・確定 |\n| ケイン（イングランド） | 6 | — | 全日程終了・確定 |\n\n- ※エムバペのA数は3位決定戦分の公式集計を引き続き未確認（準決勝終了時点で3）。アシスト首位はメッシ（FOXトラッカー）\n\n### 監督人事の余波\n\n- ドイツ代表: ナーゲルスマン解任→**クロップ就任here we go**（詳細は「Here We Go!」欄1件目）\n\n### 確定済み結果（再掲）\n\n- **3位決定戦**: フランス 4-6 イングランド（7/18・マイアミ）——サカがハットトリック、10ゴールの乱打戦\n- **準決勝①**: スペイン 2-0 フランス（7/14）／**準決勝②**: アルゼンチン 2-1 イングランド（7/15）\n\n---\n\n## 5. 日本人選手の動向\n\n- **[[佐野海舟]]（マインツ）**: リバプールが€60M（約111億円）を準備・個人条件合意済みとの報道が継続し、7/18には「正式オファー準備」の続報（Football Tribe）。ただし**核は引き続き英B級ソースの転載でS/A級直接確認は本日も取れず**。信頼度○〜△を維持。リバプールがバルコラ（前掲）と佐野の両睨みで中盤・前線を補強する構図なら矛盾はないが、優先順位は不明\n- **[[中村草太]]（サンフレッチェ広島 → ル・アーヴル）**: 7/17クラブ公式発表の期限付き移籍（2027年6月30日まで・既報）。新規続報なし\n- **[[久保建英]]（レアル・ソシエダ）**: 新規報道なし。残留・再起路線が濃厚を維持\n\n---\n\n## 主要ソース\n\n- [FIFA公式: Spain v Argentina — Final match centre（公式ラインアップ）](https://www.fifa.com/en/match-centre/match/17/285023/289292/400021543)\n- [Fabrizio Romano（Telegram公式）: 決勝両軍スタメン・Klopp here we go](https://t.me/s/fabrizioromanotg)\n- [Al Jazeera: Spain vs Argentina FIFA World Cup final — team news, prediction and lineups](https://www.aljazeera.com/sports/2026/7/19/spain-vs-argentina-fifa-world-cup-final-messi-yamal-prediction-time-lineups-team-news)\n- [NBC Sports: World Cup final predicted lineups](https://www.nbcsports.com/soccer/news/world-cup-final-predicted-lineups-how-will-argentina-spain-line-up)\n- [Goal: Jurgen Klopp is back! Germany job accepted two years after Liverpool exit](https://www.goal.com/en/lists/jurgen-klopp-germany-liverpool-julian-nagelsmann-world-cup/blt8ad1f571544f7d7e)\n- [Sky Sports: Klopp on the verge of becoming Germany head coach](https://www.skysports.com/football/news/12023/13560208/jurgen-klopp-former-liverpool-boss-on-the-verge-of-becoming-germany-head-coach-and-replacing-julian-nagelsmann)\n- [The Irish Times: Jürgen Klopp reaches agreement to take over as Germany head coach](https://www.irishtimes.com/sport/soccer/2026/07/11/jurgen-klopp-reaches-agreement-to-take-over-as-germany-head-coach/)\n- [ESPN: Chelsea agree £117m deal for Aston Villa\u0027s Morgan Rogers](https://www.espn.com.au/football/story/_/id/49392368/chelsea-agree-117m-deal-aston-villa-morgan-rogers-sources-transfer)\n- [Sky Sports: How Chelsea agreed £117m deal for Morgan Rogers](https://www.skysports.com/football/video/30998/13564768/why-have-chelsea-made-mega-bid-for-morgan-rogers)\n- [Sky Sports: Arsenal agree fee with Club Brugge to sign Christos Tzolis](https://www.skysports.com/football/news/11095/13564048/christos-tzolis-arsenal-agree-fee-with-club-brugge-to-sign-greek-winger-as-replacement-for-leandro-trossard)\n- [Goal: Arsenal agree deal to sign Tottenham sensation Elijah Upson](https://www.goal.com/en-gb/lists/arsenal-transfer-elijah-upson-from-tottenham/blt9f12084a9fae9641)\n- [football365: Romano reveals whether Gunners will now threaten Liverpool for Barcola（7/19）](https://www.football365.com/news/arsenal-liverpool-bradley-barcola-psg-fabrizio-romano-transfer-update)\n- [ESPN: Forest set to sign Schlager](https://www.espn.com/soccer/story/_/id/49367986/nottingham-forest-xaver-schlager-rb-leipzig-free-agent-signing-sources)\n- [The Athletic（X公式）: Forest set to sign Schlager on free transfer](https://x.com/TheAthleticFC/status/2077419293445108100)\n- [FootballTransfers: Done Deals 19 July 2026](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/07/transfer-news-every-done-deal-official-confirmed-completed-signing-europe-today-19-july-2026)\n- [Fabrizio Romano（X）: Valdepeñas to Fiorentina here we go（7/14）](https://x.com/FabrizioRomano/status/2076998871994007671)\n- [FOX Sports: Golden Boot tracker](https://www.foxsports.com/stories/soccer/2026-fifa-world-cup-golden-boot-tracker)\n- [Goal（日本語）: 佐野海舟にリヴァプールが111億円準備か](https://www.goal.com/jp/%E3%83%8B%E3%83%A5%E3%83%BC%E3%82%B9/sanokaoshu-liverpool-mainz/bltb0ba78df265e7a15)\n- [Football Tribe Japan: 佐野海舟の獲得に向けリバプールが正式オファー準備か（7/18）](https://football-tribe.com/japan/2026/07/18/357032/)\n- [サンフレッチェ広島公式: 中村草太選手 ル・アーヴルACに期限付き移籍のお知らせ（7/17）](https://www.sanfrecce.co.jp/news/team/12604)\n\n---\n\n*生成: 2026-07-20 03:30 JST / WC_MODE: false（パラメータ）だが決勝当日のためW杯欄を維持 / 決勝キックオフ（4:00 JST）前の生成のため試合結果は明日7/21号で反映 / 前号（07-19）正本は無傷を実測確認・復元不要 / 保存障害対策として本号から「最終チャット出力=記事本文」方式を試行（manuレーン07-20と同方式）*";
