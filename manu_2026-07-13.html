<script>
const md = "# [[マンチェスター・ユナイテッド]]情報週報\n**発行日: 2026年7月13日（月）**\n\n## クラブ概況\n\n| 項目 | 情報 |\n|---|---|\n| 監督 | カリック（Michael Carrick）（契約 〜2028年） |\n| 2025/26シーズン最終順位 | プレミアリーグ 3位・勝点71（CL出場権確保） |\n| 現在のステータス | オフシーズン（W杯は準決勝へ・所属2選手の代表が直接対決。非代表組は7/9からキャリントンで始動済み） |\n\n---\n\n## ⚽ 直近の試合結果\n\n**※該当なし**（7/6〜7/13にユナイテッドの公式戦・親善試合なし。プレシーズン初戦は現地7月18日のレクサム戦）\n\n\u003e source: [manutd.com プレシーズン日程](https://www.manutd.com/en/news/game-by-game-united-pre-season-fixture-list-2026) (2026-07)\n\n---\n\n## 🔄 移籍・選手動向\n\n### 🔄 コネ（Manu Koné）— 「打診」から「接触」へ進展 ｜ 信頼度: △（複数ソースだがA級一次なし）\n\n- ローマの仏代表MF（25歳）。ユナイテッドが**選手側代理人と接触**したと複数媒体が報道（段階: 接触・入札なし）\n- ローマはUEFA財務規制対応で売却が必須の立場にあり、コネを「最も価値ある売却可能資産」と位置づけ売却容認。要求額は**€50m前後（£45m超）**\n- 競合: アーセナルが参戦、ニューカッスルも注視。エデルソン（Ederson）破談後のアンカー型補強の本命に浮上\n\n\u003e source: [TEAMtalk](https://www.teamtalk.com/manchester-united/manu-kone-transfer-news-man-utd-move-roma-to-approve-sale) (2026-07-09) / [The Hard Tackle（接触）](https://thehardtackle.com/transfer-news/2026/07/12/manchester-united-in-contact-with-manu-kone-over-summer-move/) (2026-07-12) / [CaughtOffside（アーセナル参戦）](https://www.caughtoffside.com/2026/07/12/man-united-make-contact-as-arsenal-join-race-for-e50m-midfield-powerhouse/) (2026-07-12) / [Goal](https://www.goal.com/en-gb/lists/man-utd-transfer-news-manu-kone-roma-ederson-atalanta-collapse/blt398e63513ac42d94) (2026-07)\n\n### 🔄 サマーヴィル（Crysencio Summerville）— 左WGの最優先ターゲット・クラブ間初期協議 ｜ 信頼度: ○\n\n- ウェストハム（今季降格）のオランダ代表WG・W杯得点者。Sky Sportsが「**左サイドのNo.1ターゲット**」と報道し、**ウェストハムと初期協議を実施済み**。選手本人も移籍に前向き\n- 移籍金: 当初報道は£50m。ただし2024年リーズからの加入時に**降格条項**が挿入されており、**£40m一括前払い**なら成立可能（分割・アドオン構成は不可）とFootball365\n- 競合: フラム（Guardian報道）のほかトッテナン等が関心。獲得資金は**ラッシュフォード売却益を充当する構想**\n- ※訂正: 競合はフラム・トッテナム等（表記ミス修正: トッテナム）\n\n\u003e source: [Sky Sports経由 Yahoo](https://sports.yahoo.com/articles/sky-sports-man-united-set-165000624.html) (2026-07) / [Read West Ham（協議・7/10）](https://readwestham.com/2026/07/10/crysencio-summerville-man-utd-transfer/) (2026-07-10) / [Football365（降格条項£40m）](https://www.football365.com/news/west-ham-tell-man-utd-two-ways-sign-crysencio-summerville-cost-much-lower) (2026-07) / [TEAMtalk](https://www.teamtalk.com/manchester-united/man-utd-transfers-news-crysencio-summerville-talks-west-ham-liverpool-hijack) (2026-07)\n\n### 🔄 ラッシュフォード（Marcus Rashford）— 状況継続・売却が攻撃補強の資金前提に ｜ 信頼度: ○\n\n- バルセロナが買取オプション（£26m）不行使、ユナイテッドは**完全移籍での売却のみ受け付ける**立場（前号から変化なし）\n- 新要素: クラブはラッシュフォード売却益をサマーヴィル獲得に充てたい意向と報道。売却先が決まらないことが攻撃補強の進行を遅らせる構図\n\n\u003e source: [TEAMtalk（Romano・直接接触）](https://www.teamtalk.com/manchester-united/marcus-rashford-manchester-united-fabrizio-romano-update) (2026-06-30) / [Goal（売却益とサマーヴィルの連動）](https://www.goal.com/en/team/manchester-united/6eqit8ye8aomdsrrq0hk3v7gh) (2026-07)\n\n### 🏥 W杯組の状況（準々決勝2試合が決着・新規負傷なし）\n\n- **メイヌー（Kobbie Mainoo）**: イングランドはノルウェーに**2-1（延長）で勝利し準決勝進出**（現地7/11・マイアミ）。シェルデルップ（Andreas Schjelderup）に先制されるも、ベリンガム（Jude Bellingham）が前半と延長前半3分の2得点で逆転。**メイヌーはベンチ入りも出場なし**で、中継解説では「招集しておきながらトゥヘル（Thomas Tuchel）は信頼していないように見える」と起用への疑問も\n- **マルティネス（Lisandro Martínez）**: アルゼンチンはスイスに**3-1（延長）で勝利**（現地7/11・カンザスシティ）。マック・アリスター10分、エンドイェ67分、アルバレス112分、ラウタロ・マルティネス120+1分。**マルティネスはロメロ（Cristian Romero）と組んで先発フル出場**し、堅実なパフォーマンスと好評価\n- **準決勝はイングランド×アルゼンチン＝JST 7月16日（木）4:00・メルセデス・ベンツ・スタジアム（アトランタ）**。所属選手同士が敵味方で対戦する可能性。両者のプレシーズン合流はさらに後ろ倒し（決勝は現地7/19）\n- 新規の負傷報道: ※該当なし\n\n\u003e source: [FIFA公式（ノルウェー戦）](https://www.fifa.com/en/match-centre/match/17/285023/289289/400021539?date=2026-07-12) (2026-07-12) / [ESPN（アルゼンチン戦）](https://www.espn.com/soccer/match/_/gameId/760513/switzerland-argentina) (2026-07-12) / [101 Great Goals（メイヌー未出場・解説論調）](https://www.101greatgoals.com/football/world-cup-news/england-vs-norway-live-teams-line-ups-tv-channel-online-stream-stats/) (2026-07-11) / [United In Focus（マルティネス評）](https://www.unitedinfocus.com/news/how-lisandro-martinez-fared-as-argentina-beat-switzerland-to-progress-to-world-cup-semi-finals/) (2026-07-12) / [World Soccer Talk（準決勝日程）](https://worldsoccertalk.com/amp/world-cup/england-vs-argentina-date-kickoff-time-and-venue-for-the-2026-world-cup-semifinal/) (2026-07)\n\n---\n\n## 🧠 戦術・チーム状況\n\n- **中盤アンカーの穴は未充足のまま、標的がコネに一本化しつつある**。エデルソン破談（7/10）から48時間で代理人接触まで進んだスピード感は、開幕（8/22ハル戦）から逆算した補強期限意識の表れ\n- **攻撃側の補強線が今週初めて表面化**。左WG最優先=サマーヴィル、最前線の基準点=シェシュコ（Benjamin Šeško）継続で、カリックの**4-2-3-1**の未確定枠は「アンカー＋左WG」の2つに整理された\n- INEOSの市場規律「**評価額を設定し、超えたら撤退する**」（Ornstein解説）がエデルソン破談・アンダーソン（Elliot Anderson）撤退と一貫。値切り姿勢ゆえ交渉は長引きやすい\n- GK序列は正ラメンス（Senne Lammens）＋控えダーロウ（Karl Darlow）で確定。バユンドゥル（Altay Bayındır）はベシクタシュ移籍見込み（€5m規模・信頼度△）、オナナ（André Onana）はトラブゾンスポルへ再ローン済み\n- ※オフシーズンのため直近試合のxG等の実測データはなし\n\n\u003e source: [Football365（Ornstein・市場規律）](https://www.football365.com/news/ornstein-reveals-man-utd-agreement-second-signing-medical-permission) (2026-07) / [Sky Sports（中盤再建検証）](https://www.skysports.com/football/news/11096/13561668/man-utd-transfer-news-is-the-old-trafford-midfield-rebuild-going-to-plan-as-michael-carricks-side-prepare-for-2026-27) (2026-07)\n\n---\n\n## 📅 今後の試合予定\n\n| 日程（JST） | 大会 | 相手 | 会場 |\n|---|---|---|---|\n| 7月19日（日）0:00 | プレシーズン親善 | レクサム | オリンピックスタジアム（ヘルシンキ・フィンランド） |\n| 7月25日（土）1:00 | プレシーズン親善 | ローゼンボルグ | トロンハイム（ノルウェー） |\n| 8月1日（土）22:00 | Snapdragon Cup | アトレティコ・マドリード | ストックホルム（スウェーデン） |\n\n- **見どころ:** 初戦レクサム戦まであと6日。W杯組（メイヌー・マルティネスは準決勝進出でさらに合流遅延）不在のため、**サントス（Andrey Santos）とダーロウの合流タイミング・デビュー**、若手のアピールが焦点\n- 以降はPSG戦（8/8・ヨーテボリ）、リーズ戦（8/12・ダブリン）を経て、**プレミアリーグ開幕戦は8月22日アウェーのハル・シティ戦**\n\n\u003e source: [manutd.com プレシーズン日程](https://www.manutd.com/en/news/game-by-game-united-pre-season-fixture-list-2026) (2026-07)\n\n---\n\n## 🏟️ クラブ情報\n\n- **新スタジアム手続きが来週から本番**: 7月20日（月）にトラフォード議会承認の審議、通れば**7月28日から8週間の住民協議**（〜9/22・マスタープラン展示イベント）が始まる。新オールド・トラフォードは現スタジアム北西約350m・収容10万人・建設約5年見込みで、ウォーフサイド再開発の旗艦\n- 2026/27はCLリーグフェーズに復帰（組み合わせ抽選は8月）\n- 今週の新規フロント人事・PSR関連報道: ※該当なし\n\n\u003e source: [manutd.com（位置発表・公式）](https://www.manutd.com/en/news/revealing-the-location-of-united-new-old-trafford-stadium) (2026-07) / [Sky Sports](https://www.skysports.com/football/news/11095/13561864/man-utds-new-stadium-location-for-100-000-seater-ground-revealed-as-plans-for-largest-uk-stadium-gathers-pace) (2026-07)\n\n---\n\n## 📰 The Athletic ピックアップ\n\n**※該当なし**（The Athleticはクローラー遮断のため直接確認不可。二次報道で「直近4日以内の公開」と確認できる新規記事が本稿時点でなかったため、水増し回避で見送り。Ornsteinの市場規律解説は戦術セクションに反映済み・元記事日付未確認）\n\n---\n\n**信頼度凡例:** ◎ほぼ確実（公式・Here We Go・複数A級一致） ／ ○有力（複数A級） ／ △噂レベル（単一ソース）";
