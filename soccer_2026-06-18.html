<script>
const md = "# ⚽ サッカー移籍情報 \u0026 ワールドカップ2026 速報\n**2026年6月18日（木）**\n\n---\n\n## ✅ 完了した移籍（6/11〜6/18）\n\n\u003e **[R1確認]** 移籍窓口6/15開幕。公式発表または信頼ソース2件以上確認済みのもののみ掲載。\n\n### 1. [[マルク・ククレジャ]]（LB, 27歳）[[チェルシー]] → [[レアル・マドリード]]【6/15公式発表・継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €5,500万＋ボーナス最大€500万（計最大€6,000万 / £51.8m） |\n| 契約 | 6年（〜2032年） |\n| 発表日 | 2026年6月15日（Real Madrid公式） |\n\n- モウリーニョ就任後の夏の公式第1号発表。スペイン代表W杯参加中のため大会終了後に合流\n- **ソース**：Real Madrid公式、Sky Sports、ESPN（S+A級複数）\n\n### 2. [[ジェオヴァニー・クエンダ]]＆[[ダリオ・エッスーゴ]]（W/CM）[[スポルティングCP]] → チェルシー【NEW】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | 最大€7,440万（クエンダ約€5,200万＋エッスーゴ約€2,240万） |\n| 契約 | クエンダ：7年（＋オプション1年）、エッスーゴ：複数年 |\n\n- スポルティングCPが両選手との合意を公式確認。チェルシーがマンチェスター・ユナイテッドとの争奪戦を制した\n- クエンダ（18歳、ギニアビサウ系ポルトガル人）はU-21代表。シャビ・アロンソ新監督就任に合わせた補強\n- **ソース**：ESPN、Sky Sports、Sporting CP公式（S+A級複数）\n\n### 3. ニコロ・ザニオロ（MF, 27歳）ガラタサライ（ローン）→ ウディネーゼ（完全移籍）【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €500万（ガラタサライに）＋50%売却益折半条項 |\n| 契約 | 〜2029年 |\n\n- **ソース**：Fabrizio Romano、TransferFeed（S+A級）\n\n### 4. イウェン・[[ジャウエン]]（GK, 20歳）ランス → [[ニューカッスル・ユナイテッド]]【6/10発表・継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £2,460万＋ボーナス最大£300万 |\n| 契約 | 4年 |\n| 発表日 | 2026年6月10日 |\n\n- **ソース**：AP、L\u0027Équipe、Fox Sports（A級以上複数）\n\n---\n\n## 🔴 Here We Go!（合意ほぼ確実・6/3〜6/18）\n\n\u003e **レアル・マドリードの「モウリーニョ政権補強」が継続。ユナイテッドにも新規ディールが浮上。**\n\n### 1. [[ベルナルド・シウバ]]（MF, 32歳）[[マンチェスター・シティ]]（フリー）→ レアル・マドリード【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | フリートランスファー（6/30契約満了） |\n| 契約 | 2年＋1年オプション |\n| ステータス | 個人・クラブ合意済（W杯終了後に公式発表予定） |\n\n- 6/17のポルトガルvsCongo DR戦に先発フル出場。ポルトガル代表主将としてW杯参加中\n- **ソース**：Football España（6/13）、TransfermarktWeb（A+B級複数）\n\n### 2. [[イブラヒマ・コナテ]]（CB, 27歳）[[リバプール]]（フリー）→ レアル・マドリード【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | フリートランスファー（6/30契約満了） |\n| 契約 | 4年（〜2030年） |\n| ステータス | 合意完了・ペレス再選後に正式署名確認 |\n\n- サウジアラビアからのオファーを拒否。フランス代表としてW杯参加中\n- **ソース**：Fabrizio Romano、Managing Madrid、Sky Sports（S+A級複数）\n\n### 3. デンゼル・ダンフリース（RB, 30歳）インテル → レアル・マドリード【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €2,000万（リリース条項発動） |\n| 契約 | 〜2030年 |\n| ステータス | メディカル完了、オランダ代表帯同中 |\n\n- Romano「DUMFRIES-REAL ➡️ HERE WE GO!」（Instagram）。W杯終了後に公式発表予定\n- **ソース**：Fabrizio Romano、Goal.com、FootballTransfers（S+A級複数）\n\n### 4. エデルソン（CM, 26歳）アタランタ → [[マンチェスター・ユナイテッド]]【NEW】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £3,400万＋アドオン最大£380万（計最大£3,780万） |\n| 契約 | 4年＋オプション1年 |\n| ステータス | クラブ間合意済・メディカル待ち（ブラジル代表W杯参加中） |\n\n- マイケル・カリック新体制下でのユナイテッド**第1号補強**見込み。アタランタで4年180試合出場\n- ブラジル代表帯同中のためW杯終了後に正式発表予定。アトレティコ・マドリード移籍が頓挫し即座に動いた\n- **ソース**：Sky Sports、ESPN（S+A級複数）\n\n### 5. ジェレミー・モンガ（W, 16歳）レスター・シティ → アーセナル【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | 約€1,500万 |\n| ステータス | 個人合意済、クラブ間交渉最終段階 |\n\n- **ソース**：Fabrizio Romano、Goal.com UK（S+A級複数）\n\n---\n\n## 🟡 交渉中・動向注目（6/3〜6/18）\n\n### 1. [[ドゥシャン・ヴラホヴィッチ]]（CF, 26歳）ユヴェントス（6/30フリー）→ **バルセロナ最優先** [信頼度: ★★★]\n- 本人エージェントが「バルサ交渉を最優先」と確認。ユヴェントスの€600〜700万/年延長提示を拒否し6/30フリーへ\n- チェルシー（シャビ・アロンソのリクエスト）・ニューカッスルも接触継続。ただし本人の高給要求がネック\n- バルセロナはレヴァンドフスキの後継として急浮上。ユリアン・アルバレスと並ぶ最有力候補\n- **ソース**：Barca Blaugranes、World Soccer Talk、ESPN（A+B級複数）\n\n### 2. [[ロベルト・レヴァンドフスキ]]（CF, 37歳）バルセロナ（6/30フリー）→ シカゴ・ファイア(MLS)交渉継続 [信頼度: ★★]\n- beIN Sports（6/16）「Not Yet, but It\u0027s On！」。シカゴが2〜3年契約＆年俸$1,500〜2,000万を提示継続中\n- バルセロナがヴラホヴィッチ獲得に動いたことで「後継」問題と連動。W杯終了後に最終決断と見られる\n- **ソース**：beIN Sports、NBC Chicago（A+B級）\n\n### 3. モーガン・ロジャース（MF, 23歳）アストン・ヴィラ → アーセナル 交渉中 [信頼度: ★★]\n- アーセナルが£8,000万の入札を準備中。ヴィラは£1億のバリュエーション。W杯後に本格化見込み\n- **ソース**：Sky Sports（A級）\n\n---\n\n## 🌍 ワールドカップ2026 速報\n\n\u003e **大会概要**：開催国：米国・カナダ・メキシコ｜48カ国・12グループ｜期間：6月11日〜7月19日\n\n---\n\n### 📅 6月17日（水）の全結果\n\n| グループ | 対戦カード | スコア | 注目点 |\n|----------|-----------|--------|--------|\n| **グループK** | **ポルトガル 1-1 コンゴDR** | 終了 | ジョアン・ネヴェス6\u0027先制→ヴィッサ45+4\u0027同点。コンゴDR、史上**初のW杯勝点**を獲得 |\n| **グループK** | **コロンビア 3-1 ウズベキスタン** | 終了 | ムニョス40\u0027・ルイス・ディアス65\u0027・カンパス90+9\u0027。ファイズラエフ60\u0027（ウズベキスタン**史上初W杯得点**） |\n| **グループL** | **イングランド 4-2 クロアチア** | 終了 | **ケイン2発（12\u0027pen・42\u0027）**、ベリンガム47\u0027、ラッシュフォード85\u0027。バトゥリナ36\u0027・ムサ45+5\u0027 |\n| **グループL** | **ガーナ 1-0 パナマ** | 終了 | イレンキー90+5\u0027（アシスト：トーマス＝アサンテ）。土壇場ゴールで決着 |\n\n\u003e **Day 7最大の見出しはイングランドの劇的勝利**。4失点を喫しながらも4得点で突破したトゥヘル監督のイングランドと、ロナウド（41歳）が不発でグループ2位出発のポルトガルが対照的な初戦。\n\n---\n\n### 📅 6月18日（木）の試合\n\n| グループ | 対戦カード | スコア / キックオフ(ET) | 会場 |\n|----------|-----------|----------------------|------|\n| **グループA** | **チェコ 1-0 南アフリカ** | **終了（クレイチー）** | Mercedes-Benz Stadium, アトランタ |\n| **グループB** | **スイス 1-1 ボスニア・ヘルツェゴビナ** | **終了（エンボロ；ルキッチ）** | SoFi Stadium, ロサンゼルス |\n| **グループB** | **カナダ 1-1 カタール** | **終了（ラリン；？）** | BC Place, バンクーバー |\n| **グループA** | **メキシコ vs 韓国** | **23:00** | Estadio Akron, グアダラハラ |\n\n\u003e **本日の注目カードはグループA首位決戦（深夜23:00 ET）**。メキシコ（第1節：南ア2-0）vs韓国（第1節：チェコ2-1）はともに勝ち点3で並んでいる。本日チェコも南アを1-0で下して3pts（2試合消化）に合流し、グループは3チーム同点という超混戦に。今夜の結果がグループ形勢を大きく変える。\n\n---\n\n### 💡 明日の試合（6月19日）の見どころ\n\n| グループ | 対戦カード | キックオフ(ET) | 会場 |\n|----------|-----------|--------------|------|\n| **グループD** | **アメリカ vs オーストラリア** | 15:00 | Lumen Field, シアトル |\n| **グループC** | **スコットランド vs モロッコ** | 18:00 | Gillette Stadium, フォックスボロ |\n| **グループC** | **ブラジル vs ハイチ** | 21:00 | Lincoln Financial Field, フィラデルフィア |\n| **グループD** | **トルコ vs パラグアイ** | 翌0:00 | Levi\u0027s Stadium, サンタクララ |\n\n- **アメリカ vs オーストラリア**：開催国アメリカのグループD初陣。シアトルの熱狂的なホームサポーターを後ろに\n- **ブラジル vs ハイチ**：W杯最多優勝国ブラジルが大会初陣。ハイチはW杯初出場国として歴史的な一戦\n\n---\n\n### 🔑 グループ別ここまでの状況（6/18 夜時点）\n\n**グループA**（メキシコ・韓国・チェコ・南アフリカ）\n- メキシコ3pts（1試合）、韓国3pts（1試合）、チェコ3pts（2試合・GD±0）、南アフリカ0pts（2試合）\n- ※メキシコvs韓国（本日深夜）の結果によりグループ形勢が確定\n\n**グループB**（スイス・ボスニア・カナダ・カタール）\n- 全4チームが勝点1で**完全イーブン**（2試合とも1-1ドロー）\n\n**グループF**（スウェーデン・オランダ・日本・チュニジア）\n- スウェーデン3pts、オランダ1pts、日本1pts、チュニジア0pts\n\n**グループG**（ベルギー・イラン・エジプト・ニュージーランド）\n- 全4チームが勝点1で**大混戦**\n\n**グループH**（スペイン・カーボベルデ・サウジアラビア・ウルグアイ）\n- 全4チームが勝点1\n\n**グループI**（フランス・ノルウェー・セネガル・イラク）\n- フランス3pts、ノルウェー3pts。セネガル・イラクが0ptsで窮地\n\n**グループJ**（アルゼンチン・オーストリア・アルジェリア・ヨルダン）\n- アルゼンチン3pts（GD+3）、オーストリア3pts（GD+1）。アルジェリア・ヨルダンが0pts\n\n**グループK**（ポルトガル・コンゴDR・コロンビア・ウズベキスタン）\n- コロンビア3pts、ポルトガル1pt、コンゴDR1pt、ウズベキスタン0pts\n- ポルトガルは第2節以降の巻き返しが必須\n\n**グループL**（イングランド・ガーナ・クロアチア・パナマ）\n- イングランド3pts（GD+2）、ガーナ3pts（GD+1）。クロアチア・パナマが0pts\n\n---\n\nSources:\n- [Official Announcement: Cucurella - Real Madrid](https://www.realmadrid.com/en-US/news/club/announcements/comunicado-oficial-cucurella-15-06-2026)\n- [Chelsea sign Sporting pair Quenda, Essugo - ESPN](https://www.espn.com/soccer/story/_/id/44321586/chelsea-sign-sporting-quenda-essugo)\n- [Geovany Quenda transfer: Chelsea agree deal - Sky Sports](https://www.skysports.com/football/news/11095/13328439/geovany-quenda-transfer-chelsea-agree-deal-to-sign-17-year-old-from-sporting-in-2026)\n- [Man Utd agree Ederson deal - Sky Sports](https://www.skysports.com/football/news/11095/13548678/man-utd-agree-ederson-deal-atalanta-midfielder-set-for-old-trafford-in-lb38m-transfer)\n- [Man United agree deal with Atalanta for Éderson - ESPN](https://www.espn.com/soccer/story/_/id/48953983/man-united-agree-deal-atalanta-ederson-sources)\n- [Real Madrid first signings confirmed - Goal.com](https://www.goal.com/en/lists/real-madrid-first-signings-confirmed-florentino-perez-update-vinicius-junior/blt680668b8e2840727)\n- [Portugal 1-1 Congo DR - ESPN](https://www.espn.com/soccer/match/_/gameId/760435/congo-dr-portugal)\n- [Portugal held to draw by DR Congo - Al Jazeera](https://www.aljazeera.com/sports/2026/6/17/portugal-held-to-1-1-draw-by-dr-congo-in-their-world-cup-2026-opener)\n- [Uzbekistan 1-3 Colombia - ESPN](https://www.espn.com/soccer/match/_/gameId/760436/colombia-uzbekistan)\n- [England 4-2 Croatia match report - Sky Sports](https://www.skysports.com/football/england-vs-croatia/report/549788)\n- [England 4-2 Croatia recap - ESPN](https://www.espn.com/soccer/story/_/id/49099495/england-croatia-world-cup-2026-recap-score-harry-kane-jude-bellingham-marcus-rashford)\n- [Ghana 1-0 Panama final score - ESPN](https://www.espn.com/soccer/match/_/gameId/760434/panama-ghana)\n- [Czechia vs South Africa - FOX Sports](https://www.foxsports.com/soccer/fifa-world-cup-men-czechia-vs-south-africa-jun-18-2026-game-boxscore-647640)\n- [Switzerland vs Bosnia-Herzegovina - ESPN](https://www.espn.com/soccer/match/_/gameId/760439/bosnia-herzegovina-switzerland)\n- [Canada vs Qatar - ESPN](https://www.espn.com/soccer/match/_/gameId/760440/qatar-canada)\n- [June 19 fixtures - ESPN](https://www.espn.com/soccer/story/_/id/48939282/2026-fifa-world-cup-fixtures-results-match-schedule-group-stage-knockout-rounds-bracket)\n- [Vlahovic prioritises Barcelona - World Soccer Talk](https://worldsoccertalk.com/amp/news/dusan-vlahovic-reportedly-nears-a-move-to-chelsea-as-xabi-alonso-request-amid-joao-pedro-links-with-barcelona/)\n- [Barcelona make move for Vlahovic - Barca Blaugranes](https://www.barcablaugranes.com/fc-barcelona-transfer-rumors-news/108950/barcelona-make-move-to-sign-dusan-vlahovic-as-robert-lewandowskis-replacement)\n- [Lewandowski to Chicago: Not yet but it\u0027s on - beIN Sports](https://www.beinsports.com/en-us/soccer/mls/articles/lewandowski-to-chicago-not-yet-but-it-s-on-2026-06-16)\n- [2026 World Cup standings - CBS Sports](https://www.cbssports.com/soccer/news/world-cup-group-standings-table-results/)";
