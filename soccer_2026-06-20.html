<script>
const md = "# ⚽ サッカー移籍情報 \u0026 ワールドカップ2026 速報\n**2026年6月20日（土）**\n\n---\n\n## ✅ 完了した移籍（6/13〜6/20）\n\n\u003e **[R1確認]** 移籍窓口6/15開幕。公式発表または信頼ソース2件以上確認済みのもののみ掲載。\n\n### 1. [[ジャン=ポール・ファン・ヘッケ]]（CB, 26歳）[[ブライトン]] → [[トッテナム・ホットスパー]]【6/18公式発表・NEW】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £5,200万（固定額、ボーナスなし） |\n| 契約 | 複数年 |\n| 発表日 | 2026年6月18日（Tottenham公式） |\n\n- デ・ゼルビ体制下のトッテナム**今夏第3号**補強。ブライトン時代に師事したデ・ゼルビとの再タッグが実現\n- オランダ代表としてW杯参加中のため合流は大会終了後\n- **ソース**：Tottenham公式、Goal.com、ESPN（S+A級複数）\n\n### 2. [[ヴィクトル・ムニョス]]（W, 22歳）オサスナ → [[リバプール]]【6/18発表・継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £3,450万（リリース条項発動） |\n| 契約 | 6年 |\n| 発表日 | 2026年6月18日（Liverpool公式） |\n\n- **ソース**：Liverpool公式、Sky Sports、ESPN、Goal.com（S+A級複数）\n\n### 3. [[イブラヒマ・コナテ]]（CB, 27歳）[[リバプール]]（フリー）→ [[レアル・マドリード]]【6/18公式発表・継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | フリートランスファー（6/30契約満了） |\n| 契約 | 4年（〜2030年） |\n| 発表日 | 2026年6月18日（Real Madrid公式） |\n\n- **ソース**：Real Madrid公式、Sky Sports、Al Jazeera（S+A級複数）\n\n### 4. [[ベルナルド・シウバ]]（MF, 32歳）[[マンチェスター・シティ]]（フリー）→ [[レアル・マドリード]]【6/17公式発表・継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | フリートランスファー（6/30契約満了） |\n| 契約 | 2年＋オプション1年（〜2028年） |\n| 発表日 | 2026年6月17日（Real Madrid公式） |\n\n- **ソース**：Real Madrid公式、Sky Sports、ESPN（S+A級複数）\n\n### 5. [[マルク・ククレジャ]]（LB, 27歳）[[チェルシー]] → [[レアル・マドリード]]【6/15公式発表・継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €5,500万＋ボーナス最大€500万 |\n| 契約 | 6年（〜2032年） |\n| 発表日 | 2026年6月15日（Real Madrid公式） |\n\n- **ソース**：Real Madrid公式、Sky Sports、ESPN（S+A級複数）\n\n### 6. [[ジェオヴァニー・クエンダ]]＆[[ダリオ・エッスーゴ]]（W/CM）[[スポルティングCP]] → [[チェルシー]]【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | 最大€7,440万（クエンダ約€5,200万＋エッスーゴ約€2,240万） |\n\n- **ソース**：ESPN、Sky Sports、Sporting CP公式（S+A級複数）\n\n### 7. ニコロ・ザニオロ（MF, 27歳）ガラタサライ（ローン）→ ウディネーゼ（完全移籍）【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €500万＋50%売却益折半条項 |\n\n- **ソース**：Fabrizio Romano、TransferFeed（S+A級）\n\n### 8. イウェン・[[ジャウエン]]（GK, 20歳）ランス → [[ニューカッスル・ユナイテッド]]【6/10発表・継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £2,460万＋ボーナス最大£300万 |\n| 契約 | 4年 |\n\n- **ソース**：AP、L\u0027Équipe、Fox Sports（A級以上複数）\n\n---\n\n## 🔴 Here We Go!（合意ほぼ確実・6/5〜6/20）\n\n### 1. [[ピエロ・インカピエ]]（CB/LB, 23歳）[[バイヤー・レバークーゼン]] → [[アーセナル]]【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €5,200万（ローン→完全移籍の買取オプション行使） |\n| 契約 | 5年 |\n| ステータス | 個人・クラブ間合意済・正式発表待ち |\n\n- Romano「アーセナルの夏窓**第1号**補強として契約は既に署名済み。FFPの都合でシーズン終了後に正式発表予定」\n- エクアドル代表としてW杯参加中\n- **ソース**：Fabrizio Romano、FootballTransfers、Arsenal公式（ローン）（S+A級複数）\n\n### 2. デンゼル・ダンフリース（RB, 30歳）インテル → [[レアル・マドリード]]【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €2,000万（リリース条項発動） |\n| 契約 | 〜2030年 |\n| ステータス | メディカル完了・オランダ代表W杯参加中 |\n\n- Romano「DUMFRIES-REAL ➡️ HERE WE GO!」。W杯終了後に公式発表予定\n- **ソース**：Fabrizio Romano、Goal.com、FootballTransfers（S+A級複数）\n\n### 3. [[エデルソン]]（CM, 26歳）アタランタ → [[マンチェスター・ユナイテッド]]【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £3,400万＋アドオン最大£380万（計最大£3,780万） |\n| 契約 | 4年＋オプション1年 |\n| ステータス | Romano「100%確認済」・書類完了 |\n\n- カリック新体制下ユナイテッド第1号補強。ブラジル代表W杯参加中のため大会後に正式発表予定\n- **ソース**：Fabrizio Romano、Sky Sports、ESPN（S+A級複数）\n\n### 4. ジェレミー・モンガ（W, 16歳）[[レスター・シティ]] → [[アーセナル]]【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | 約€1,500万 |\n| ステータス | 個人合意済、クラブ間交渉最終段階 |\n\n- **ソース**：Fabrizio Romano、Goal.com UK（S+A級複数）\n\n---\n\n## 🟡 交渉中・動向注目（6/5〜6/20）\n\n### 1. [[ドゥシャン・ヴラホヴィッチ]]（CF, 26歳）ユヴェントス（6/30フリー）→ **バルセロナ最優先** [信頼度: ★★★]\n- エージェントが「バルサ交渉を最優先」と確認。ユヴェントス延長提示を拒否し6/30フリー確定\n- チェルシー・ニューカッスルも接触継続。本人の高給要求がネック\n- バルサはレヴァンドフスキ後継として急浮上\n- **ソース**：Barca Blaugranes、ESPN（A+B級複数）\n\n### 2. [[ロベルト・レヴァンドフスキ]]（CF, 37歳）バルセロナ（6/30フリー）→ シカゴ・ファイア(MLS) [信頼度: ★★]\n- beIN Sports「Not Yet, but It\u0027s On！」。シカゴが2〜3年＆年俸$1,500〜2,000万を提示継続中\n- バルセロナがヴラホヴィッチ交渉に動いたことで連動。W杯終了後に最終決断見込み\n- **ソース**：beIN Sports、NBC Chicago（A+B級）\n\n### 3. モーガン・ロジャース（MF, 23歳）アストン・ヴィラ → [[アーセナル]] [信頼度: ★★]\n- アーセナルが£8,000万の入札準備中。ヴィラは£1億のバリュエーション。W杯後に本格化見込み\n- **ソース**：Sky Sports（A級）\n\n---\n\n## 🌍 ワールドカップ2026 速報\n\n\u003e **大会概要**：開催国：米国・カナダ・メキシコ｜48カ国・12グループ｜期間：6月11日〜7月19日\n\n---\n\n### 📅 6月19日（金）確定結果\n\n| グループ | 対戦カード | スコア | 注目点 |\n|----------|-----------|--------|--------|\n| **グループD** | **アメリカ 2-0 オーストラリア** | 終了 | バージェスOG 11\u0027、フリーマン 43\u0027。**USAがグループ突破確定**・2連勝で首位独走 |\n| **グループD** | **パラグアイ 1-0 トルコ** | 終了 | ガラルサ64秒（**大会最速ゴール**）。アルミロン前半AT退場、10人で完封守り切り |\n\n\u003e ⚠️ **グループD確定**: トルコが2連敗でグループ敗退確定。アメリカは2連勝で決勝トーナメント進出確定。パラグアイとオーストラリアが残り1節で2位争い。\n\n---\n\n### 📅 6月20日（本日）の見どころ\n\n| グループ | 対戦カード | キックオフ(ET) | 会場 |\n|----------|-----------|--------------|------|\n| **グループF** | **オランダ vs スウェーデン** | 13:00 | ヒューストン (NRG Stadium) |\n| **グループE** | **ドイツ vs コートジボワール** | 16:00 | トロント |\n| **グループE** | **エクアドル vs キュラソー** | 20:00 | カンザスシティ |\n\n\u003e ※日本 vs チュニジア（グループF）は**6月21日（日）**に実施（前日記事のスケジュールを修正）\n\n---\n\n### 🔑 グループ別ここまでの状況（6/20 朝時点）\n\n**グループA**（メキシコ・韓国・チェコ・南アフリカ）\n- メキシコ6pts（2試合）・韓国3pts・チェコ3pts・南アフリカ0pts\n\n**グループB**（スイス・ボスニア・カナダ・カタール）\n- カナダ3pts（1試合）・スイス1pt・ボスニア1pt・カタール0pts\n\n**グループC**（スコットランド・ブラジル・モロッコ・ハイチ）\n- スコットランド6pts（2試合・完璧）・ブラジル4pts・モロッコ1pt・ハイチ0pts\n\n**グループD**（アメリカ・オーストラリア・トルコ・パラグアイ）\n- **アメリカ6pts（2試合・突破確定）**・パラグアイ3pts・オーストラリア3pts・**トルコ0pts（脱落）**\n\n**グループE**（ドイツ・キュラソー・コートジボワール・エクアドル）\n- ドイツ3pts（MD1: 7-1 キュラソー大勝）・コートジボワール3pts（MD1: エクアドルに土壇場勝利）・エクアドル0pts・キュラソー0pts\n- **本日の首位決定戦に注目**。2チームともGD大差で3pts同士\n\n**グループF**（オランダ・スウェーデン・日本・チュニジア）\n- スウェーデン3pts（MD1: チュニジアに+4以上の大差勝利）・オランダ1pt・日本1pt（MD1: オランダと2-2ドロー）・チュニジア0pts\n- **本日のオランダ vs スウェーデンが首位決定戦**\n\n**グループI**（フランス・ノルウェー・セネガル・イラク）\n- フランス3pts・ノルウェー3pts・セネガル0pts・イラク0pts\n\n**グループJ**（アルゼンチン・オーストリア・アルジェリア・ヨルダン）\n- アルゼンチン3pts（GD+3）・オーストリア3pts（GD+1）\n\n**グループK**（ポルトガル・コンゴDR・コロンビア・ウズベキスタン）\n- コロンビア3pts・ポルトガル1pt・コンゴDR1pt・ウズベキスタン0pts\n\n**グループL**（イングランド・ガーナ・クロアチア・パナマ）\n- イングランド3pts（GD+2）・ガーナ3pts（GD+1）・クロアチア0pts・パナマ0pts\n\n---\n\nSources:\n- [Tottenham confirm van Hecke signing - Tottenham Official](https://www.tottenhamhotspur.com/news/1073998/van-hecke-joins-from-brighton)\n- [Tottenham confirm £52m Jan Paul van Hecke transfer - Goal.com](https://www.goal.com/en/lists/tottenham-confirm-gbp52m-jan-paul-van-hecke-transfer-roberto-de-zerbi-lands-third-summer-signing/blt0ff8eb7ab57c7287)\n- [Tottenham agree £52m deal to sign Brighton\u0027s Jan Paul Van Hecke - ESPN](https://www.espn.com/soccer/story/_/id/49083813/tottenham-agree-52m-deal-sign-brighton-jan-paul-van-hecke-sources-transfers)\n- [Arsenal agree €52m Piero Hincapie deal - FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/02/arsenal-agree-eur52m-piero-hincapie-deal-as-arteta-secures-eur10m-discount)\n- [Man Utd agree Ederson deal - Sky Sports](https://www.skysports.com/football/news/11095/13548678/man-utd-agree-ederson-deal-atalanta-midfielder-set-for-old-trafford-in-lb38m-transfer)\n- [USA 2-0 Australia World Cup recap - ESPN](https://www.espn.com/soccer/story/_/id/49096090/2026-fifa-world-cup-live-updates-united-states-vs-australia)\n- [USA beats Australia 2-0 - NBC News](https://www.nbcnews.com/sports/soccer/live-blog/usa-australia-world-cup-2026-june-19-live-updates-rcna350750)\n- [Turkey vs Paraguay live score updates - Outlook India](https://www.outlookindia.com/sports/football/turkey-vs-paraguay-live-score-fifa-world-cup-2026-group-d-tur-vs-par-updates-san-francisco-bay-area-highlights)\n- [2026 FIFA World Cup Group F - Wikipedia](https://en.wikipedia.org/wiki/2026_FIFA_World_Cup_Group_F)\n- [Netherlands vs Sweden - ESPN](https://www.espn.com/soccer/match/_/gameId/760447/sweden-netherlands)\n- [Germany vs Ivory Coast - Group E - 2026 FIFA World Cup Group E Wikipedia](https://en.wikipedia.org/wiki/2026_FIFA_World_Cup_Group_E)\n- [Premier League 2026 summer transfers confirmed - ESPN](https://www.espn.com/soccer/story/_/id/48955344/premier-league-2026-summer-transfers-all-confirmed-ins-outs-every-club)\n- [2026 FIFA World Cup standings - CBS Sports](https://www.cbssports.com/soccer/news/world-cup-group-standings-table-results/)";
document.getElementById('content').innerHTML = marked.parse(md);
