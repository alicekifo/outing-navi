<script>
const md = "## 📰 今週のニュース\n\n### 1. 【公式】42ndシングル「是非に及ばず」収録楽曲・歌唱メンバーが決定（7月7日発表）\n7月22日(水)発売の42ndシングル「是非に及ばず」の全収録曲と歌唱メンバーが公式発表された。全形態共通曲は表題曲と選抜曲「告白したい病」。TYPE-A〜Dにはアンダー曲・ユニット曲、通常盤には6期生曲「命の色」を収録（詳細は音楽・リリース情報の項）。\n\u003e source: [乃木坂46公式サイト（2026-07-07）](https://www.nogizaka46.com/s/n46/news/detail/102068) ／ [Billboard JAPAN](https://www.billboard-japan.com/d_news/detail/163178/2)\n\n### 2. 【公式】6期生楽曲「命の色」が7月5日0時に先行配信スタート、センターは長嶋凛桜（6期生）\n42ndシングル収録の6期生楽曲「命の色」が7月5日午前0時より各ストリーミング／ダウンロードサイトで先行配信開始。センターは北海道出身の長嶋凛桜（6期生）で、自身初のセンター楽曲。楽曲は7月4日の真夏の全国ツアー2026北海道公演（長嶋の地元・札幌）で初披露された。\n\u003e source: [音楽ナタリー（2026-07-05）](https://natalie.mu/music/news/679331) ／ [Billboard JAPAN](https://www.billboard-japan.com/d_news/detail/163132)\n\n### 3. 【公式】「真夏の全国ツアー2026」北海道公演を開催（7月4日・5日）\nグループ史上最大規模（全国8都市18公演）の「真夏の全国ツアー2026」北海道公演が7月4日(土)・5日(日)に真駒内セキスイハイムアイスアリーナで開催された。公演内で6期生曲「命の色」を初披露。\n\u003e source: [乃木坂46公式サイト ツアー特設ページ](https://www.nogizaka46.com/s/n46/page/summer_tour2026) ／ [WWSチャンネル](https://www.wws-channel.com/girls2/653871.html)\n\n### 4. 【公式】「乃木坂工事中」最新話「第5回 内輪ウケものまね大賞 前編」をYouTube「乃木坂配信中」で公開\n7月5日オンエア回の「乃木坂工事中」最新話が公式YouTubeチャンネル「乃木坂配信中」で公開。内輪ネタものまね企画が4年ぶりに復活した回。\n\u003e source: [乃木坂46公式サイト](https://www.nogizaka46.com/s/n46/news/detail/102065)\n\n### 5. 【公式】広島公演オフィシャルグッズ販売のお知らせ（7月11日・12日公演分）\n本日7月11日(土)から開催の広島公演（広島グリーンアリーナ）に合わせ、オフィシャルグッズ販売の詳細が公式発表された。\n\u003e source: [乃木坂46公式サイト](https://www.nogizaka46.com/s/n46/news/detail/102074)\n\n---\n\n## 🎵 音楽・リリース情報\n\n### 42ndシングル「是非に及ばず」（2026年7月22日発売）\n- **センター**: 一ノ瀬美空（5期生）※初の表題曲センター【公式】\n- **選抜**: 18名体制。大越ひなの（6期生）・森平麗心（6期生）が初選抜、岩本蓮加（3期生）らが選抜復帰（オリコン報道）\n- **収録曲・歌唱メンバー**（7月7日公式発表）:\n  - 全形態共通: 「是非に及ばず」「告白したい病」（選抜）\n  - TYPE-A: 「フォルテシモ」（アンダー曲・センター小川彩（5期生））\n  - TYPE-B: 「Kissのタイミング」（井上和（5期生）・菅原咲月（5期生））\n  - TYPE-C: 「ひとつ手前のインターチェンジ」（川崎桜（5期生）・筒井あやめ（4期生）・冨里奈央（5期生）・弓木奈於（4期生））\n  - TYPE-D: 「おまえら」（五百城茉央（5期生）・奥田いろは（5期生）・中西アルノ（5期生））\n  - 通常盤: 「命の色」（6期生・センター長嶋凛桜（6期生））\n- **先行配信状況**: 表題曲は6月13日〜、「フォルテシモ」は6月25日〜、「命の色」は7月5日〜配信中【公式】\n- **MV**: 表題曲MVは6月28日公開（監督・渡邊直、パンクな世界観）。公式チャンネル基準で確認できる再生数の公表値は現時点なし ※今週該当なし\n- **チャート動向**: CD発売前のためオリコン/Billboard JAPANのシングルチャート実績は ※今週該当なし\n\u003e source: [乃木坂46公式 42ndシングル特設ページ](https://www.nogizaka46.com/s/n46/page/42nd_single) ／ [乃木坂46公式（収録曲発表・2026-07-07）](https://www.nogizaka46.com/s/n46/news/detail/102068) ／ [オリコン（選抜発表）](https://www.oricon.co.jp/news/2459651/full/) ／ [Billboard JAPAN（MV公開）](https://www.billboard-japan.com/d_news/detail/162936)\n\n---\n\n## 👤 メンバー個別活動\n\n### 1. 賀喜遥香（4期生）— ラジオ「SCHOOL OF LOCK!」出演（7月9日）\n7月9日(木)23時台、TOKYO FM「SCHOOL OF LOCK!」に出演。\n\u003e source: 乃木坂46公式スケジュール（https://www.nogizaka46.com/schedule/）\n\n### 2. 小川彩（5期生）・柴田柚菜（4期生）— 千葉ロッテマリーンズ戦スペシャルリポーター（7月23日予定）\n7月23日(木)ZOZOマリンスタジアムの千葉ロッテ対東北楽天戦「BLACK SUMMER WEEK supported by クーリッシュ」にスペシャルリポーターとして来場予定。試合前「Catch up‼︎ Marines」からイニング間イベント、試合終了後まで出演【公式】※発表は6月。\n\u003e source: [乃木坂46公式サイト](https://www.nogizaka46.com/s/n46/news/detail/102018) ／ [音楽ナタリー](https://natalie.mu/music/news/676768)\n\n### 3. 五百城茉央（5期生）・奥田いろは（5期生）— フォークデュオ「カフェオーレ」で「TIF2026」初出演（8月1日予定）\n2人によるフォークデュオ「カフェオーレ」が「TOKYO IDOL FESTIVAL 2026」（7月31日〜8月2日開催）に初出演決定。出演日は8月1日（オリコン報道・7月2日公開）。\n\u003e source: [オリコン（2026-07-02）](https://www.oricon.co.jp/news/2465093/full/)\n\n### 4. 賀喜遥香（4期生）・五百城茉央（5期生）— のぎ動画「乃木坂ぶらり#21 吉祥寺でぶらり」配信開始（7月3日）\n公式定額制動画サービス「のぎ動画」で、五百城が先輩・賀喜と吉祥寺を巡る企画が7月3日(金)より配信開始【公式】。\n\u003e source: [乃木坂46公式サイト](https://www.nogizaka46.com/s/n46/news/detail/102061)\n\n※テレビドラマ・映画・雑誌表紙で今週（7月4日〜11日）に確認できた新規の公式発表は該当なし\n\n---\n\n## 🎤 ライブ・イベント\n\n### 真夏の全国ツアー2026（開催中・全国8都市18公演）【公式】\n| 公演 | 日程 | 会場 |\n|---|---|---|\n| 広島 | 7月11日(土)・12日(日) ※本日開催 | 広島グリーンアリーナ |\n| 大阪 | 7月15日(水)・16日(木) | 大阪城ホール |\n| 宮城 | 7月25日(土)・26日(日) | セキスイハイムスーパーアリーナ |\n| 福岡 | 8月8日(土)・9日(日) | マリンメッセ福岡A館 |\n| 東京 | 8月20日(木)〜23日(日) | 明治神宮野球場 |\n\n宮城・福岡・東京公演は「のぎ動画先行」等の先行受付が進行中。\n\u003e source: [乃木坂46公式 ツアー特設ページ](https://www.nogizaka46.com/s/n46/page/summer_tour2026) ／ [乃木坂46公式（開催発表）](https://www.nogizaka46.com/s/n46/news/detail/101747)\n\n### 42ndシングル「是非に及ばず」発売記念スペシャル応募抽選【公式】\nリアルミート＆グリート（個別トーク会）・リアルサイン会（会場: 幕張メッセ、10月開催）、オンラインミート＆グリート、ミニライブ配信などが対象。初回仕様限定盤（TYPE-A〜D）同梱のシリアルナンバーで特設サイトから応募。応募受付開始は7月22日(水)10:00。詳細日程は公式告知を参照（6月30日掲載）。\n\u003e source: [乃木坂46公式サイト（2026-06-30）](https://www.nogizaka46.com/s/n46/news/detail/102051)\n\n### 「乃木坂46 42ndSGアンダーライブ」開催決定（9月29日・30日）【公式】\n9月29日(月)・30日(火)に東京体育館で開催。アンダー曲「フォルテシモ」センターは小川彩（5期生）。\n\u003e source: [乃木坂46公式サイト](https://www.nogizaka46.com/s/n46/news/detail/102043) ／ [モデルプレス](https://mdpr.jp/music/detail/4803891)\n\n### 「TOKYO IDOL FESTIVAL 2026」出演（8月2日）【公式】\nグループとして8月2日(日)に出演決定済み。カフェオーレ（五百城茉央・奥田いろは）は8月1日に別枠で出演。\n\u003e source: [乃木坂46公式サイト](https://www.nogizaka46.com/s/n46/news/detail/101825)\n\n---\n\n## 📋 グループ動向\n\n### 卒業: 吉田綾乃クリスティー（3期生）【公式】※発表は5月28日・再掲\n8月9日(日)「真夏の全国ツアー2026」福岡公演（マリンメッセ福岡A館）内で卒業セレモニーを実施し卒業予定。42ndシングルには不参加。今週の新規卒業発表は ※今週該当なし\n\u003e source: [乃木坂46公式サイト（2026-05-28）](https://www.nogizaka46.com/s/n46/news/detail/101971)\n\n### 6期生の躍進（今週の動き）\n長嶋凛桜（6期生）が初センター曲「命の色」を7月5日に配信リリース【公式】。42ndシングルでは大越ひなの（6期生）・森平麗心（6期生）が初選抜入り（発表は6月・オリコン報道）。\n\u003e source: [音楽ナタリー（2026-07-05）](https://natalie.mu/music/news/679331) ／ [オリコン](https://www.oricon.co.jp/news/2459651/full/)\n\n### 加入・新期生オーディション\n※今週該当なし\n\n---\n*注記: 一部SNS等で流れているメンバー卒業に関する未確認情報は、公式発表がないため本週報には掲載していない（R2・R3準拠）。*";
