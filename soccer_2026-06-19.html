const md = "# ⚽ サッカー移籍情報 \u0026 ワールドカップ2026 速報\n**2026年6月19日（金）**\n\n---\n\n## ✅ 完了した移籍（6/12〜6/19）\n\n\u003e **[R1確認]** 移籍窓口6/15開幕。公式発表または信頼ソース2件以上確認済みのもののみ掲載。\n\n### 1. [[マルク・ククレジャ]]（LB, 27歳）[[チェルシー]] → [[レアル・マドリード]]【6/15公式発表・継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €5,500万＋ボーナス最大€500万（計最大€6,000万 / £51.8m） |\n| 契約 | 6年（〜2032年） |\n| 発表日 | 2026年6月15日（Real Madrid公式） |\n\n- **ソース**：Real Madrid公式、Sky Sports、ESPN（S+A級複数）\n\n### 2. [[ベルナルド・シウバ]]（MF, 32歳）[[マンチェスター・シティ]]（フリー）→ [[レアル・マドリード]]【6/17公式発表・NEW】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | フリートランスファー（6/30契約満了） |\n| 契約 | 2年＋オプション1年（〜2028年） |\n| 発表日 | 2026年6月17日（Real Madrid公式） |\n\n- モウリーニョ就任・同郷ポルトガル人というコネクションが決め手。シティ在籍約10年、キャプテンも務めた\n- ポルトガル代表としてW杯参加中のため大会終了後に合流予定\n- **ソース**：Real Madrid公式（6/17）、Sky Sports、ESPN（S+A級複数）\n\n### 3. [[イブラヒマ・コナテ]]（CB, 27歳）[[リバプール]]（フリー）→ [[レアル・マドリード]]【6/18公式発表・NEW】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | フリートランスファー（6/30契約満了） |\n| 契約 | 4年（〜2030年） |\n| 発表日 | 2026年6月18日（Real Madrid公式） |\n\n- サウジアラビアからのオファーを拒否。フランス代表としてW杯参加中\n- モウリーニョ政権の守備補強。ベテランのアラバ退団後の主軸候補\n- **ソース**：Real Madrid公式（6/18）、Sky Sports、Al Jazeera（S+A級複数）\n\n### 4. [[ヴィクトル・ムニョス]]（W, 22歳）オサスナ → [[リバプール]]【6/18発表・NEW】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £3,450万（リリース条項発動） |\n| 契約 | 6年 |\n| 発表日 | 2026年6月18日（Liverpool公式） |\n\n- [[ニューカッスル]]との争奪戦を制し、リバプールが電撃的に条項を発動。スペイン代表W杯参加中のためアメリカのキャンプ地でメディカルを実施しサイン\n- イラオラ新体制下でのリバプール**第1号補強**\n- **ソース**：Liverpool公式、Sky Sports、ESPN、Goal.com（S+A級複数）\n\n### 5. [[ジェオヴァニー・クエンダ]]＆[[ダリオ・エッスーゴ]]（W/CM）[[スポルティングCP]] → [[チェルシー]]【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | 最大€7,440万（クエンダ約€5,200万＋エッスーゴ約€2,240万） |\n| 契約 | クエンダ：7年（＋オプション1年）、エッスーゴ：複数年 |\n\n- **ソース**：ESPN、Sky Sports、Sporting CP公式（S+A級複数）\n\n### 6. ニコロ・ザニオロ（MF, 27歳）ガラタサライ（ローン）→ ウディネーゼ（完全移籍）【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €500万（ガラタサライに）＋50%売却益折半条項 |\n| 契約 | 〜2029年 |\n\n- **ソース**：Fabrizio Romano、TransferFeed（S+A級）\n\n### 7. イウェン・[[ジャウエン]]（GK, 20歳）ランス → [[ニューカッスル・ユナイテッド]]【6/10発表・継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £2,460万＋ボーナス最大£300万 |\n| 契約 | 4年 |\n\n- **ソース**：AP、L\u0027Équipe、Fox Sports（A級以上複数）\n\n---\n\n## 🔴 Here We Go!（合意ほぼ確実・6/5〜6/19）\n\n### 1. デンゼル・ダンフリース（RB, 30歳）インテル → [[レアル・マドリード]]【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €2,000万（リリース条項発動） |\n| 契約 | 〜2030年 |\n| ステータス | メディカル完了、オランダ代表帯同中 |\n\n- Romano「DUMFRIES-REAL ➡️ HERE WE GO!」。W杯終了後に公式発表予定\n- **ソース**：Fabrizio Romano、Goal.com、FootballTransfers（S+A級複数）\n\n### 2. [[エデルソン]]（CM, 26歳）アタランタ → [[マンチェスター・ユナイテッド]]【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £3,400万＋アドオン最大£380万 |\n| 契約 | 4年＋オプション1年 |\n| ステータス | クラブ間合意済・ブラジル代表W杯参加中 |\n\n- [[マイケル・カリック]]新体制下でのユナイテッド第1号補強見込み。W杯終了後に正式発表予定\n- **ソース**：Sky Sports、ESPN（S+A級複数）\n\n### 3. [[ピエロ・インカピエ]]（CB/LB, 23歳）バイヤー・レバークーゼン → [[アーセナル]]【NEW】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €5,200万（ローン→完全移籍の事前合意行使） |\n| 契約 | 5年 |\n| ステータス | 個人・クラブ間合意済、正式発表待ち |\n\n- 昨季アーセナルへのローン中に26試合出場。買取オプションを行使し完全移籍化へ。アーセナルの**夏窓第1号**補強となる見込み\n- エクアドル代表としてW杯参加中\n- **ソース**：Arsenal公式（ローン）、FootballTransfers、Fabrizio Romano（A+B級複数）\n\n### 4. ジェレミー・モンガ（W, 16歳）[[レスター・シティ]] → [[アーセナル]]【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | 約€1,500万 |\n| ステータス | 個人合意済、クラブ間交渉最終段階 |\n\n- **ソース**：Fabrizio Romano、Goal.com UK（S+A級複数）\n\n---\n\n## 🟡 交渉中・動向注目（6/5〜6/19）\n\n### 1. [[ドゥシャン・ヴラホヴィッチ]]（CF, 26歳）ユヴェントス（6/30フリー）→ **バルセロナ最優先** [信頼度: ★★★]\n- 本人エージェントが「バルサ交渉を最優先」と確認。ユヴェントスの延長提示を拒否し6/30フリーへ\n- チェルシー（シャビ・アロンソ経由）・ニューカッスルも接触継続。本人の高給要求がネック\n- バルセロナはレヴァンドフスキ後継として急浮上\n- **ソース**：Barca Blaugranes、World Soccer Talk、ESPN（A+B級複数）\n\n### 2. [[ロベルト・レヴァンドフスキ]]（CF, 37歳）バルセロナ（6/30フリー）→ シカゴ・ファイア(MLS) [信頼度: ★★]\n- beIN Sports「Not Yet, but It\u0027s On！」（6/16）。シカゴが2〜3年契約＆年俸$1,500〜2,000万を提示継続中\n- バルセロナがヴラホヴィッチ獲得に動いたことで「後継」問題と連動。W杯終了後に最終決断見込み\n- **ソース**：beIN Sports、NBC Chicago（A+B級）\n\n### 3. モーガン・ロジャース（MF, 23歳）アストン・ヴィラ → [[アーセナル]] [信頼度: ★★]\n- アーセナルが£8,000万の入札を準備中。ヴィラは£1億のバリュエーション。W杯後に本格化見込み\n- **ソース**：Sky Sports（A級）\n\n---\n\n## 🌍 ワールドカップ2026 速報\n\n\u003e **大会概要**：開催国：米国・カナダ・メキシコ｜48カ国・12グループ｜期間：6月11日〜7月19日\n\n---\n\n### 📅 6月18日（木）深夜〜確定結果\n\n| グループ | 対戦カード | スコア | 注目点 |\n|----------|-----------|--------|--------|\n| **グループA** | **メキシコ 1-0 韓国** | 終了 | ルイス・ロモ50\u0027。メキシコがグループ首位を独走、早くもノックアウト圏内 |\n| **グループB** | **カナダ 6-0 カタール** | 終了 | **ジョナサン・デイヴィッドHT**（ハットトリック）、ライリン、サリバ、OG。カナダ史上最大のW杯勝利、CONCACAF史上最多得点記録 |\n\n\u003e ⚠️ **訂正**：前日記事では「カナダ 1-1 カタール」と誤記。正しくは**カナダ 6-0 カタール**。ジョナサン・デイヴィッドのハットトリックで圧勝し、カナダがW杯史上初勝利を大差で飾った。なお試合中にイスマエル・コネが重傷（担架搬送）し離脱の懸念も。\n\n---\n\n### 📅 6月19日（金）の結果\n\n| グループ | 対戦カード | スコア | 注目点 |\n|----------|-----------|--------|--------|\n| **グループC** | **スコットランド 1-0 モロッコ** | 終了 | マクギン28\u0027（アダムスのシュートのこぼれ球）。スコットランドが**1990年以来初のW杯2連勝** |\n| **グループC** | **ブラジル 1-0 ハイチ** | 終了 | ヴィニシウス・ジュニオール。2勝目でブラジルがグループC首位を独走 |\n| **グループD** | **アメリカ vs オーストラリア** | 15:00 ET（シアトル） | 両チームとも3pts同士の首位決戦。プリシッチ負傷明け復帰が焦点 |\n| **グループD** | **トルコ vs パラグアイ** | 23:00 ET（サンタクララ） | 両チームとも0pts・崖っぷち対決。敗退濃厚チームが出る |\n\n---\n\n### 🔑 グループ別ここまでの状況（6/19 夜時点）\n\n**グループA**（メキシコ・韓国・チェコ・南アフリカ）\n- メキシコ6pts（2試合）、韓国3pts（2試合）、チェコ3pts（2試合・GD±0）、南アフリカ0pts（2試合）\n- メキシコが2連勝でほぼグループ突破確定。残り1節で韓国vsチェコが直接対決\n\n**グループB**（スイス・ボスニア・カナダ・カタール）\n- カナダ3pts（1試合）、スイス1pt（1試合）、ボスニア1pt（1試合）、カタール0pts（1試合）\n- カナダが6-0大勝でグループトップへ。残り試合次第\n\n**グループC**（スコットランド・ブラジル・モロッコ・ハイチ）\n- **スコットランド6pts（2試合・完璧）**、ブラジル4pts（2試合）、モロッコ1pt（2試合）、ハイチ0pts（2試合）\n- スコットランドが2連勝で早期突破圏内。ブラジルも残り1試合で通過は確実\n\n**グループD**（アメリカ・オーストラリア・トルコ・パラグアイ）\n- アメリカ3pts（1試合）、オーストラリア3pts（1試合）、トルコ0pts（1試合）、パラグアイ0pts（1試合）\n- 本日のUSA-豪州戦とトルコ-パラグアイ戦で形勢が確定する\n\n**グループF**（スウェーデン・オランダ・日本・チュニジア）\n- スウェーデン3pts、オランダ1pts、日本1pts、チュニジア0pts\n\n**グループI**（フランス・ノルウェー・セネガル・イラク）\n- フランス3pts、ノルウェー3pts。セネガル・イラクが0ptsで窮地\n\n**グループJ**（アルゼンチン・オーストリア・アルジェリア・ヨルダン）\n- アルゼンチン3pts（GD+3）、オーストリア3pts（GD+1）\n\n**グループK**（ポルトガル・コンゴDR・コロンビア・ウズベキスタン）\n- コロンビア3pts、ポルトガル1pt、コンゴDR1pt、ウズベキスタン0pts\n\n**グループL**（イングランド・ガーナ・クロアチア・パナマ）\n- イングランド3pts（GD+2）、ガーナ3pts（GD+1）。クロアチア・パナマが0pts\n\n---\n\n### 💡 明日の試合（6月20日）の見どころ\n\n| グループ | 対戦カード | キックオフ(ET) | 会場 |\n|----------|-----------|--------------|------|\n| **グループE** | **スペイン vs サウジアラビア** | 調整中 | — |\n| **グループF** | **日本 vs チュニジア** | 調整中 | — |\n| **グループF** | **スウェーデン vs オランダ** | 調整中 | — |\n| **グループE** | **ベルギー / ウルグアイ 関連** | 調整中 | — |\n\n\u003e ※6/20の詳細スケジュールは公式サイトをご確認ください。スコットランドの2連勝でグループCの混戦終盤に向け、各グループで第2節が佳境を迎える。\n\n---\n\nSources:\n- [Real Madrid Official: Bernardo Silva (June 17, 2026)](https://www.realmadrid.com/en-US/news/club/announcements/comunicado-oficial-bernardo-silva-17-06-2026)\n- [Real Madrid Official: Konaté (June 18, 2026)](https://www.realmadrid.com/en-US/news/club/announcements/comunicado-oficial-konate-18-06-2026)\n- [Ibrahima Konate joins Real Madrid - Sky Sports](https://www.skysports.com/football/news/11835/13555253/ibrahima-konate-joins-real-madrid-jose-mourinho-completes-third-signing-as-laliga-club-confirm-deal-for-defender)\n- [Victor Munoz transfer: Liverpool sign Osasuna winger for £34.5m - Sky Sports](https://www.skysports.com/football/news/11669/13555469/victor-munoz-transfer-news-liverpool-sign-osasuna-winger-for-lb34-5m)\n- [Liverpool confirm £34m Victor Munoz deal - Goal.com](https://www.goal.com/en-ca/lists/liverpool-confirm-gbp34m-victor-munoz-deal-newcastle-lose-transfer-race-for-spain-world-cup-star/blt39cab16aeb70b1eb)\n- [Liverpool agree deal to sign Victor Munoz - Liverpool FC Official](https://www.liverpoolfc.com/news/liverpool-agree-deal-sign-spain-forward-victor-munoz)\n- [Arsenal agree €52m Piero Hincapie deal - FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/02/arsenal-agree-eur52m-piero-hincapie-deal-as-arteta-secures-eur10m-discount)\n- [Canada\u0027s historic 6-0 World Cup win over Qatar - CBC](https://www.cbc.ca/sports/livestory/canada-vs-qatar-june-18-live-updates-fifa-world-cup-2026-9.7222399)\n- [Canada 6-0 Qatar - FIFA Official](https://www.fifa.com/en/match-centre/match/17/285023/289273/400021450)\n- [Mexico vs South Korea 1-0 - CBS Sports](https://www.cbssports.com/soccer/news/mexico-vs-south-korea-live-updates-world-cup-2026-score-result/live/)\n- [Scotland vs Morocco result - ESPN Live Score](https:
