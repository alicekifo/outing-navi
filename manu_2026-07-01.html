<script>
const md = "# マンチェスター・ユナイテッド情報週報\n**発行日：2026年7月1日（火）**\n\n---\n\n## 1. 直近の試合結果\n\n**2026年6月24日〜7月1日の公式戦：なし**\n\n現在はオフシーズン期間中。2026 FIFAワールドカップ開催に伴い、多くの選手が代表活動に参加中。プレミアリーグ2026/27シーズン開幕は**2026年8月22日週末**の予定。\n\n---\n\n## 2. 今後の試合予定\n\n| 日付 | 対戦相手 | 種別 |\n|------|----------|------|\n| 7月18日 | vs ラクサム（Wrexham） | プレシーズン親善試合 |\n| 7月24日 | vs ローゼンボリ（Rosenborg） | プレシーズン親善試合 |\n\n\u003e 今夏のプレシーズンはヨーロッパで実施。アメリカ・カナダ・メキシコはW杯開催のため渡航なし。\n\n---\n\n## 3. 移籍情報（TODAY ±14日以内の報道）\n\n### ✅ 確定・合意済み\n\n**【IN】エデルソン（Éderson）/ MF / アタランタ → マンチェスター・ユナイテッド**\n- 移籍金：初期£3400万＋アドオン最大£380万（合計最大£3780万相当）\n- 契約：4年＋オプション1年\n- **マイケル・カリック体制下、初の正式補強**\n- 移籍書類はすべて完了済み、メディカル経由で7月中に正式発表見込み\n- ソース：Sky Sports / ESPN / The Peoples Person（S〜A級）\n\n---\n\n**【OUT】ラスムス・ホイルンド（Rasmus Hojlund）/ FW → ナポリ（完全移籍）**\n- 移籍金：£4300万\n- ソース：GiveMeSport / OneFootball\n\n**【OUT】カゼミーロ（Casemiro）/ MF**\n- 契約満了に伴い退団。次クラブ未定。\n\n**【OUT】マラシア（Malacia）/ DF**\n- 契約終了、フリーエージェントとして次クラブを探している段階。\n\n---\n\n### 🔄 交渉・動向注目\n\n**マーカス・ラッシュフォード（Marcus Rashford）/ FW**\n- バルセロナへのローン期間終了（バルサはラ・リーガ優勝に貢献）\n- バルサは6月15日の買い取りオプション（€3000万）を**行使せず**（アンソニー・ゴードンを€7000〜8000万で獲得したため）\n- ユナイテッドは新ローン交渉に応じない方針（ESP N）\n- W杯後にカリントン復帰見込み。ユナイテッドは**完全売却**を希望、仲介業者に打診受付中\n- 行き先は現時点で未定。ソース：ESPN（複数本） / Sky Sports / TeamTalk\n\n**クリスティアン・オロスコ（Cristian Orozco）/ MF / フォルタレーザ → ユナイテッド**\n- コロンビア出身の若手（\"次のカゼミーロ\"と評される）\n- 7月加入予定と報道。ソース：GiveMeSport（B級・要注目）\n\n**ムサ・ディアビ（Moussa Diaby）/ FW**\n- 攻撃陣強化のターゲットとして名前が挙がっている段階。正式交渉は未確認。\n\n---\n\n## 4. クラブ動向\n\n- **夏の移籍ウィンドウ公式オープン**（manutd.com 発表）\n- **2026/27シーズンのプレミアリーグ日程は6月19日に発表済み**\n- **マイケル・カリック監督体制**での初移籍市場が本格始動\n\n---\n\n## 5. 注目ポイント（週後半以降）\n\n1. **エデルソンのメディカル・正式発表**のタイミング（7月上旬中に見込み）\n2. **ラッシュフォードの売却先**が具体化するか（W杯中の動向次第）\n3. オロスコ加入の公式確認待ち\n\n---\n\n*情報の信頼度：エデルソン移籍はS〜A級ソースで複数確認済み。ラッシュフォード情報はESPN（複数報道）で信頼度高。オロスコ・ディアビは現時点B級扱い。*\n\n---\n\n**Sources:**\n- [Man Utd agree Ederson deal – Sky Sports](https://www.skysports.com/football/news/11095/13548678/man-utd-agree-ederson-deal-atalanta-midfielder-set-for-old-trafford-in-lb38m-transfer)\n- [Manchester United finalise deal to sign Ederson – The Peoples Person](https://thepeoplesperson.com/2026/06/06/manchester-united-finalise-deal-to-sign-ederson-from-atalanta-311151/)\n- [Man United agree deal with Atalanta for Éderson – ESPN](https://www.espn.com/soccer/story/_/id/48953983/man-united-agree-deal-atalanta-ederson-sources)\n- [All Completed Man Utd Transfers 2026/27 – GiveMeSport](https://www.givemesport.com/man-utd-transfers-2026-27/)\n- [Every completed Man Utd transfer summer 2026 – OneFootball](https://onefootball.com/en/news/every-completed-man-utd-transfer-in-summer-2026-signings-exits-loans-42955259/)\n- [Man United have no plans to negotiate new Rashford loan – ESPN](https://www.espn.com/soccer/story/_/id/49095806/manchester-united-marcus-rashford-barcelona-no-plans-negotiate-loan-permanent)\n- [Barcelona unlikely to activate Rashford option – ESPN](https://www.espn.com/soccer/story/_/id/49019977/barcelona-marcus-rashford-unlikely-activate-marcus-rashford-loan)\n- [Marcus Rashford future after LaLiga win – Sky Sports](https://www.skysports.com/football/news/11095/13543109/marcus-rashford-what-does-the-future-hold-for-the-on-loan-manchester-united-forward-after-winning-laliga-with-barcelona)\n- [United announce pre-season fixtures – manutd.com](https://www.manutd.com/en/news/man-utd-announce-four-more-pre-season-2026-fixtures)\n- [Summer transfer window officially opens – manutd.com](https://www.manutd.com/en/news/summer-transfer-window-for-2026-official-opens)\n- [Manchester United 2026-27 Schedule – ESPN](https://www.espn.com/soccer/team/fixtures/_/id/360/manchester-united)";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
