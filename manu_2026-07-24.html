<script>
const md = "# マンチェスター・ユナイテッド情報週報（2026-07-24）\n\n\u003e **今週のTLDR**: コネ（Manu Koné）は**Corriere dello Sport発で「個人条件の原則合意＋€50m入札準備」まで前進**——ただし同日のRomano（Fabrizio Romano）は「接触継続中・INEOSが中盤に使える予算の確定待ち」と一段慎重で、報道間に温度差あり。正式入札・\"Here We Go\"はまだ。並行してRomanoは**チュアメニ（Aurélien Tchouaméni）のドアが閉じたこと**（レアル・マドリーと2031年まで契約延長合意）を明かし、TEAMtalkは中盤候補**6人のショートリスト**（スコット、ブアッディ、コネ、チュアメニ、ベルゲ、ザイール=エメリ）を報道。旧所属組では**ガルナチョ（Alejandro Garnacho）のチェルシー→アストン・ヴィラ移籍が\"Here We Go\"**（買取義務付きローン・ユナイテッドはセルオン条項で後日受取）。シェシュコ（Benjamin Šeško）は**今夜のローゼンボリ戦欠場が確定的**。その試合はJST 7/25(土) 1:00キックオフ。\n\n---\n\n## ⚽ 直近の試合結果\n\n### 親善試合: マンチェスター・ユナイテッド 0-1 レクサム（現地7/18・ヘルシンキ・中立）※既報\n\n- カリック（Michael Carrick）体制初陣の敗戦。詳細は2026-07-20号参照。過去7日以内の試合はこの1試合のみで、公式戦未開始のためxG・採点等の新規指標なし\n\n出典: [manutd.com 公式レポート](https://www.manutd.com/en/news/report-united-0-wrexham-1) (2026-07-18)\n\n---\n\n## 🔄 移籍・選手動向\n\n### 交渉中: コネ——「個人条件の原則合意・€50m入札準備」報道。ただしRomanoは慎重トーン\n\n- **コネ（ローマMF・25歳）○有力・段階前進（イタリア発）**——Corriere dello Sport発で**「ユナイテッドはコネの代理人サイドと契約条件について原則合意済み」「INEOSは€50m（約£42.6m）の入札を準備中」**。ローマの要求は当初£50mで、チェルシー・アトレティコ・マドリード・アル・アハリの関心が強まれば**€60m超に引き上げる可能性**とされる — [TEAMtalk（Corriere経由・個人条件合意＋€50m準備）](https://www.teamtalk.com/manchester-united/manu-kone-man-utd-personal-terms-agreed-roma-bid) (2026-07-23) / [Football Today](https://footballtoday.com/2026/07/23/manchester-united-agree-personal-terms-with-roma-midfielder-manu-kone/) (2026-07-23)\n- **Romanoは同日一段慎重（7/23）**: 「先週から選手サイドとの会話は続いている。ただし**ユナイテッドは守備的MFにいくら使えるかの把握を待つ必要がある**」＝クラブ間の決定的段階には未到達という認識 — [utdreport（Romano）](https://utdreport.co.uk/2026/07/23/manchester-united-fabrizio-romano-manu-kone-as-roma/) (2026-07-23)\n- **報道間の温度差に注意**: 「原則合意・入札準備」はCorriere発（前号の「£47m改善入札を週明け提出」も同系で、実行は確認されないまま）。RomanoとL\u0027Equipeは一貫して「入札まだ」。**公式発表・\"Here We Go\"なし**は全ソース一致\n- **中盤候補は6人のショートリスト**（TEAMtalk・7/22）: ①スコット（Alex Scott／ボーンマス・クラブが「売らない」回答済み）②ブアッディ（Ayyoub Bouaddi／リール）③コネ④チュアメニ⑤ベルゲ（Sander Berge／フラム）⑥ザイール=エメリ（Warren Zaïre-Emery／PSG）。ザイール=エメリはRomano評で**「リアルな標的というよりドリーム・ターゲット」**（PSGに売却意思なし・評価額€60m／£51m） — [TEAMtalk（6人リスト）](https://www.teamtalk.com/manchester-united/six-man-shortlist-next-midfield-transfer-fabrizio-romano-51m-zaire-emery-signing) (2026-07-22) / [Football365（Romano・ザイール=エメリ評）](https://www.football365.com/news/man-utd-romano-reveals-dream-signing-zaire-emery-psg-kone) (2026-07-22頃)\n\n### ×消滅: チュアメニ——「理想の中盤」だがレアルと2031年まで延長合意\n\n- Romanoいわく**「ユナイテッド内部でドリーム・ミッドフィルダー＝カゼミロ（Casemiro）の後継として完璧」と評価されていた**が、モウリーニョ（José Mourinho）の説得もあり**レアル・マドリーと2031年までの契約延長で合意**。移籍の可能性は消滅 — [The Week（Romano）](https://www.theweek.in/news/sports/2026/07/23/manchester-united-transfers-aurelien-tchouameni-be-let-go-by-mourinho-fabrizio-says.html) (2026-07-23) / [TEAMtalk](https://www.teamtalk.com/manchester-united/aurelien-tchouameni-real-madrid-manchester-united-new-contact-fabrizio-romano-transfer-update) (2026-07-23頃)\n\n### 旧所属: ガルナチョがチェルシー→アストン・ヴィラ\"Here We Go\"——ユナイテッドにセルオン受取あり\n\n- **Romanoが\"Here We Go\"（7/22）**: 条件付き買取義務付きローンで合意・メディカル予約済み。エメリ（Unai Emery）監督の希望で、買取義務の発動条件は「極めて容易」とされ2027年の完全移籍がほぼ確実視。ヴィラとは完全移籍に連なる4年契約 — [GiveMeSport（Here We Go）](https://www.givemesport.com/omano-aston-villa-agree-garnacho-transfer-medical-booked/) (2026-07-22) / [Football365](https://www.football365.com/news/romano-aston-villa-chelsea-agreement-reached-garnacho-double-deal-boosted) (2026-07-22)\n- **ユナイテッドへの実利**: 昨夏のチェルシー売却時のセルオン条項で**移籍金の一定割合を受け取る権利**あり。ただし今回はローン形式のため、**受取は買取義務発動（2027年見込み）まで持ち越し**。割合・金額は未公表 — [The Peoples Person](https://thepeoplesperson.com/2026/07/22/man-united-to-receive-big-payout-as-deal-struck-to-take-alejandro-garnacho-from-chelsea-to-villa-313139/) (2026-07-22)\n\n### ラッシュフォード・マルティネス: 新規続報なし（前号の状態を維持）\n\n- **ラッシュフォード（Marcus Rashford）**: 「再統合が既定路線・退団までウィンガー補強なし」（Romano・Ornstein（David Ornstein）とも）から新規の動きなし。トッテナム・チェルシー・アーセナルの関心報道もその後の進展確認できず\n- **マルティネス（Lisandro Martínez）**: 前号のFootball Insider発「売却検討」報道（1ソース段階）に続報なし。W杯決勝で痛めた右太ももの検査結果も公表されないまま\n\n### ケガ・復帰情報\n\n- **シェシュコ**: すね。**今夜のローゼンボリ戦は欠場が確定的**（複数プレビューで「選外見込み」一致）。プレミア開幕には間に合う見込みは維持 — [Yahoo Sports（Standard経由・チームニュース）](https://sports.yahoo.com/articles/manchester-united-xi-vs-rosenborg-213728881.html) (2026-07-22)\n- **ダーロウ（Karl Darlow／GK）**: シーズン後の小手術から回復中。ローゼンボリ戦で復帰の可能性はあるが、予想布陣ではヒートン（Tom Heaton）が先発見込み\n- **マイヌー（Kobbie Mainoo）**: 背中。復帰8月上〜中旬見込みで変わらず（W杯組のため合流もまだ）\n- **デ・リフト（Matthijs de Ligt）**: 背中手術からのリハビリ中・復帰10月初旬見込みで変わらず\n- **ウガルテ（Manuel Ugarte）**: W杯での長期離脱が継続（中盤補強を急ぐ構造的理由）\n\n---\n\n## 🧠 戦術・チーム状況\n\n- **ローゼンボリ戦の予想布陣（Standard発）**: ヒートン；アマス（Harry Amass）、ヘヴン（Ayden Heaven）、マグワイア（Harry Maguire）、ヨロ（Leny Yoro）；サントス（Andrey Santos）、マウント（Mason Mount）；ドルグ（Patrick Dorgu）、J・フレッチャー（Jack Fletcher）、ムベウモ（Bryan Mbeumo）；ジルクゼー（Joshua Zirkzee）。レクサム戦同様、**前後半で別チームを組む総入れ替え方式**（22人に稼働時間を配る狙い）の見込み。途中出場で好印象だったアマスの先発昇格に注目 — [Yahoo Sports（Standard経由）](https://sports.yahoo.com/articles/manchester-united-xi-vs-rosenborg-213728881.html) (2026-07-22)\n- W杯組（ティーレマンス（Youri Tielemans）、マルティネス、クーニャ（Matheus Cunha）、ダロト（Diogo Dalot）、B・フェルナンデス（Bruno Fernandes）、アマド（Amad Diallo）、バユンドゥル（Altay Bayındır）、マイヌー、ラメンス（Senne Lammens）、マズラウィ（Noussair Mazraoui）、ラッシュフォード）は休暇中で不在継続\n- 補強戦略の現在地: 中盤3人目はコネ本命・スコット2番手・ザイール=エメリはドリーム枠、チュアメニは消滅——6人リストの序列がほぼ確定。ラッシュフォード残留→ウィンガー予算を中盤へ回す資金構造（Romano・Ornstein一致）も変わらず\n- 直近5試合のxG・被xG・ポゼッション ※該当なし（公式戦未開始・親善試合はxG未公表）\n\n出典: [TEAMtalk（6人リスト）](https://www.teamtalk.com/manchester-united/six-man-shortlist-next-midfield-transfer-fabrizio-romano-51m-zaire-emery-signing) (2026-07-22) / [utdreport（Romano）](https://utdreport.co.uk/2026/07/23/manchester-united-fabrizio-romano-manu-kone-as-roma/) (2026-07-23)\n\n---\n\n## 📅 今後の試合予定\n\n| 日程（JST） | 大会 | 対戦相手 | 会場 |\n|---|---|---|---|\n| **7/25(土) 1:00（英7/24 17:00）＝今夜** | 親善 | ローゼンボリ | レルケンダール・スタディオン（トロンハイム） |\n| 8/1(土) 22:00（英8/1 14:00） | 親善 | アトレティコ・マドリード | ストックホルム（中立） |\n| 8/9(日) 0:00（英8/8 16:00） | 親善 | パリ・サンジェルマン | ヨーテボリ（中立） |\n\n- **今夜のローゼンボリ戦の見どころ**: カリック体制2戦目・初勝利がかかる。①シェシュコ欠場の前線でジルクゼーが結果を出せるか②新加入サントスの中盤③アマス・ヘヴン・J・フレッチャーらユース組の序列④ダーロウ復帰なるか。相手ロセンボルグはリーグ戦中で試合勘は上（直近スタート戦3-0勝利）\n- 以降はリーズ（8/12ダブリン）、ACミラン（8/15ヴロツワフ）と続く\n\n出典: [Sports Mole（プレビュー）](https://www.sportsmole.co.uk/football/man-utd/preview/rosenborg-vs-man-utd-prediction-team-news-lineups_601662.html) / [Yahoo Sports（Standard経由）](https://sports.yahoo.com/articles/manchester-united-xi-vs-rosenborg-213728881.html) (2026-07-22)\n\n---\n\n## 🏟️ クラブ情報\n\n- 今週の新規発表なし。既報の進行中案件は①新スタジアム（10万人・旧オールド・トラッフォードの350m北西）: **7/28から8週間の住民協議開始が次のマイルストーン**（〜9/22）②Microsoft Surface背中スポンサー（7/17発表・プレシーズンキットで着用中）③Qualcomm/Snapdragon胸スポンサー年£60m——の3本 — [manutd.com（新スタジアム用地）](https://www.manutd.com/en/news/united-secures-land-for-new-old-trafford-stadium) (2026-07-09既報)\n\n---\n\n## 📰 The Athletic ピックアップ\n\n※当号もtheathletic.comの直接検索が結果を返さず（クローラーアクセス不可）、他媒体経由で確認できたThe Athletic発の報道を紹介（リンクは引用元）\n\n1. **Romano・Ornstein関連の新規The Athletic発スクープは直近4日以内（7/20以降）で※該当なし**。前号既報のOrnstein発言（ラッシュフォード再統合見込み・中盤もう1人が当初からのプラン）が引き続き各媒体で引用されている段階で、水増しせず該当分のみの掲載とする";
