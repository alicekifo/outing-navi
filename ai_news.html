<script>
const md = "十分な情報が集まりました。出力を生成します。\n\n---\n\n## 🤖 今週のAI最新動向\n\n### 1. Apple WWDC 2026：Siri がGemini 1.2兆パラメータ MoEモデルで完全再構築\n\n**何が起きたか**\nApple は6月8日のWWDC 2026基調講演（Tim Cookの最終CEO keynote）で、Siriを Google Gemini をベースとしたカスタムモデルで全面刷新すると発表した。\n\n**なぜ重要か / 何が変わるか**\n技術的に注目なのは **3層ルーティングアーキテクチャ** だ。簡単な操作（タイマー・音楽・スマートホーム制御）はオンデバイスの小型モデルで完結し、中程度のタスクはAppleのPrivate Cloud Computeサーバ（ステートレス/エフェメラル処理）へ転送、重い推論タスクだけが Google Cloud のNVIDIA Blackwell B200 GPUへルーティングされる。Googleへの転送前にApple IDとの紐付けを切断・トークン化し、Googleはこのクエリストリームをモデルトレーニングへ利用することを契約で禁止されているという。セキュリティ的観点では「ゼロトラスト風プライバシー設計」とも言えるが、契約上の制約がどこまで実効性を持つかは今後の焦点になる。\n\n**数値**\n- モデル: カスタムGemini MoE、総パラメータ数 **1.2兆**（Apple独自開発モデルの8倍規模）\n- ライセンス契約: 年間約 **10億ドル**\n- iOS 27公開ベータ（ゲートあり）：2026年9月予定\n\n出典: [TechTimes](https://www.techtimes.com/articles/317985/20260608/apple-wwdc-2026-siri-rebuilt-gemini-homeos-previewed-cook-farewell-keynote.htm) (2026-06-08公開)\n\n---\n\n### 2. Microsoft Build 2026：MAI-Thinking-1（35B / 256Kコンテキスト）など新MAIモデル7本\n\n**何が起きたか**\n6月2〜3日に開催されたMicrosoft Build 2026で、同社は自社開発モデル群「MAI」シリーズ7種（コーディング・推論・画像・音声）を発表。**MAI-Thinking-1** はFoundryでプライベートプレビュー開始。\n\n**なぜ重要か / 何が変わるか**\n35Bパラメータの中規模推論モデルでありながら **256Kトークンのコンテキスト長** を持つ点が特徴で、長大なコードベースやログ解析など実務的なエンジニアリングユースケースを直接狙いにきている。あわせて発表された **Scout** は「Autopilot」カテゴリの新しい自律エージェントで、Windows/macOS上でOutlook・Teams・SharePointと統合して常時バックグラウンド動作する設計。GitHub Copilot のデスクトップアプリも同日プレビュー公開され、今まで以上にアシスタントの「常駐化」が進む。**Majorana 2** 量子チップ（改良版キュービット）も同時発表。\n\n**数値**\n- MAI-Thinking-1: **35Bパラメータ / 256Kコンテキスト**\n- 合計新モデル数: **7種**\n\n出典: [Microsoft公式ブログ](https://blogs.microsoft.com/blog/2026/06/02/microsoft-build-2026-be-yourself-at-work/) (2026-06-02公開)\n\n---\n\n### 3. Anthropic、Goldman Sachs / Morgan Stanley / JPMorgan を幹事にIPO準備 ── 評価額 $965B\n\n**何が起きたか**\nAnthropicは6月初旬に機密裏にIPO申請を行い、6月5日時点でGoldman Sachs・Morgan Stanley・JPMorganを主幹事として選定した。最短2026年9月上場を目指すとされる。\n\n**なぜ重要か / 何が変わるか**\n$965Bという評価額は、AI産業の資本市場への本格進出を示す象徴的な数字だ。一方でIPO申請にあたって **「API収益をどう計上するか」** という会計問題が浮上しており、AWS・Google Cloudとの大型コミットメント契約を純粋な売上として計上できるかが焦点になっている。OpenAIも同時期に類似のIPO準備を進めており（Goldman Sachs / Morgan Stanley）、AI企業の「上場ラッシュ」が現実化しつつある。\n\n**数値**\n- 評価額: **$965B**（2026年5月ラウンドで $65B 調達後）\n\n出典: [TechTimes](https://www.techtimes.com/articles/317845/20260605/anthropic-ipo-picks-goldman-sachs-morgan-stanley-jpmorgan-revenue-accounting-question-looms.htm) (2026-06-05公開)\n\n---\n\n### 4. AI大手4社CEO、米議会へ連名書簡 ── 「AIが生物兵器の技術的障壁を侵食している」\n\n**何が起きたか**\nOpenAI・Anthropic・Google・Microsoft のCEOが連名でアメリカ議会に公開書簡を送り、**合成DNA提供業者への義務的スクリーニング要件**の法制化を要求した（6月5日）。\n\n**なぜ重要か / 何が変わるか**\n書簡は「AIの進歩によって、生物兵器化に以前は必要だった技術的障壁が急速に低下している」と明記している。政治的に対立する企業が足並みを揃えた点、かつ規制を「要求」する側に回った点が異例で、AI biosecurityが業界の喫緊課題として扱われ始めた証左でもある。Linuxサーバー上でローカルLLMを走らせるシナリオを考えると、生物設計アシスタントへのアクセス制御がOS・コンテナ・ネットワーク層に波及する可能性もある。\n\n出典: [yellow.com](https://yellow.com/news/openai-anthropic-google-microsoft-synthetic-dna-congress-letter) (2026-06-05公開)\n\n---\n\n## 📄 今週の注目論文\n\n### 1. プロンプトインジェクション防御は「原理的に」不可能かもしれない ／ *AI Agents May Always Fall for Prompt Injections*\n\n**英語原題:** AI Agents May Always Fall for Prompt Injections  \n**著者:** Sahar Abdelnabi（MPI-IS / Tübingen AI Center / ELLIS Institute）, Eugene Bagdasarian（UMass Amherst）  \n**arXiv ID:** 2605.17634 ／ 公開日: 2026-05-17\n\n**3行サマリー**\n- **Problem:** 現行のプロンプトインジェクション防御は「文脈に依存しない攻撃」を前提に設計されており、動的コンテキストを悪用する攻撃には根本的に無力。\n- **Method:** プライバシー研究の **Contextual Integrity (CI)** フレームワークを転用。「情報フローを文脈規範に照らして評価する」枠組みで攻撃シナリオを再定義し、理論的な不可能性結果を導出。\n- **Finding:** 攻撃者は常に「ブロックされたフローを正当に見せかけられる」コンテキストを構築できる。CI-informed攻撃により静的ベースライン \u003c1%のメールエージェントに対して **96.7%の攻撃成功率** を達成。現行検出器のAUROCは0.43〜0.59（ほぼランダム）。\n\n**読みどころ**\n「完全に防ぎきれない」という理論的限界を示した点が特に重要で、セキュリティエンジニアには刺さる内容だ。IDS/IPSの検知限界と同じ構造（偽陽性と偽陰性のトレードオフ）がプロンプトインジェクション防御にも存在すると示している。「安全に見えるコンテキストに混ぜ込めば何でも通る」という攻撃者視点の示唆は、エージェントを本番環境に置くすべての組織への警告と読める。\n\n出典: [arXiv:2605.17634](https://arxiv.org/abs/2605.17634) (2026-05-17公開)\n\n---\n\n### 2. 2ビット量子化でも推論が壊れない ── 分散誤差の根本を断つ ／ *KVarN: Variance-Normalized KV-Cache Quantization*\n\n**英語原題:** KVarN: Variance-Normalized KV-Cache Quantization Mitigates Error Accumulation in Reasoning Tasks  \n**著者第1名:** Lorenz K. Muller ほか（所属情報未公開）  \n**arXiv ID:** 2606.03458 ／ 公開日: 2026-06-02\n\n**3行サマリー**\n- **Problem:** KVキャッシュを量子化するとオートリグレッシブ復号中に量子化誤差が**時系列的に蓄積**し、長期推論タスクで特に致命的になる。既存手法はプリフィル設定で評価されており、この誤差蓄積を捉えられていない。\n- **Method:** ①K/Vマトリクスに**Hadamard回転**を施して外れ値を分散させ、②行列の両軸に対して**分散正規化デュアルスケーリング**を適用する2段構成。キャリブレーションデータ不要。\n- **Finding:** MATH500・AIME24・HumanEvalにおいて **2ビット精度でのSOTA** を達成。vLLM向け実装コードを公開。\n\n**読みどころ**\nローカルLLM派にとって直接の朗報だ。24GBのGPUでも70Bクラスのモデルを動かす際のKVキャッシュ圧縮は現実的な課題であり、2bit量子化が「壊れる」問題に対するキャリブレーション不要な解法は即実用的。vLLMへの実装が公開されているため、検証の敷居も低い。\n\n出典: [arXiv:2606.03458](https://arxiv.org/abs/2606.03458) (2026-06-02公開)\n\n---\n\n### 3. LLMはx86_64の外では「別モデル」になる ／ *CodegenBench: Can LLMs Write Efficient Code Across Architectures?*\n\n**英語原題:** CodegenBench: Can LLMs Write Efficient Code Across Architectures?  \n**著者第1名:** Jie Li ほか（所属情報未公開）  \n**arXiv ID:** 2606.04023 ／ 公開日: 2026-06-01\n\n**3行サマリー**\n- **Problem:** LLMのコード生成評価はほぼGPU環境またはx86_64に集中しており、CPU指向のHPC（高性能計算）を多様なアーキテクチャで評価した研究がない。\n- **Method:** **106種のBLASルーチン + 各アーキテクチャ向け20本の特化カーネル** からなるベンチマークを、x86_64・Sunway（中国国産CPU）・Kunpeng（华为ARMv8）の3プラットフォームで評価。\n- **Finding:** LLMはx86_64では最適化コードを生成できるが、公開文書が限られるSunway・Kunpengでは**性能が大幅に低下**する。（論文29ページ、図22点）\n\n**読みどころ**\n「LLMはWebにあるもの以上には賢くなれない」という事実をハード面で可視化した。RISC-Vや自社ARM実装など非主流アーキテクチャ向けの組み込み・セキュリティツール開発には既知の落とし穴だが、数字で示したことに意義がある。国産CPU向けコンパイラ最適化やクロスコンパイル作業でLLMを補助として使う際の信頼度評価に直結する。\n\n出典: [arXiv:2606.04023](https://arxiv.org/abs/2606.04023) (2026-06-01公開)\n\n---\n\n### 4. LLMが生成したシステムコードは「正しいが遅い」── 専門家との差を測った ／ *PerfCodeBench*\n\n**英語原題:** PerfCodeBench: Benchmarking LLMs for System-Level High-Performance Code Optimization  \n**著者第1名:** Huihao Jing ほか（所属情報未公開）  \n**arXiv ID:** 2605.15222 ／ 公開日: 2026-05-13\n\n**3行サマリー**\n- **Problem:** 既存のコードベンチマークは正確性・アルゴリズム的問題解決を測るが、パフォーマンスクリティカルなタスクにおける**実行効率**を評価するものがほぼ存在しない。\n- **Method:** システムレベルの実装選択・ハードウェア対応最適化・ボトルネック処理を要求するタスク群からなる実行可能ベンチマーク。正確性チェック・ベースライン実装・専門家最適化リファレンスをセットで提供。\n- **Finding:** LLM生成コードと専門家最適化コードの間に**明確なギャップ**が存在し、特に並列処理とGPU操作タスクで顕著。クロス言語ロバスト性にも課題。\n\n**読みどころ**\nLinuxカーネルドライバやネットワーク処理（XDP/eBPF）など「正しく動けば良いは通用しない」コードを書く人には耳が痛い内容だ。CopilotやCursorで補完したコードが「なぜか遅い」と感じた経験があるなら、その直感を定量的に裏付ける論文として読める。\n\n出典: [arXiv:2605.15222](https://arxiv.org/abs/2605.15222) (2026-05-13公開)\n\n---\n\n## 💡 今週のひとことインサイト\n\n### プロンプトインジェクションは「サイドチャネル攻撃」と同じ構造を持つ\n\nAbdelnabi \u0026 Bagdasarian の論文が示した「不可能性結果」を読んで、既視感を覚えたLinux/セキュリティ屋は多いはずだ。これは Meltdown/Spectre 発覚時に突きつけられた問いとまったく同じ構造をしている。「コンテキストの分離」を前提にした設計に対し、攻撃者が正当に見える情報フローを細工してその境界を越える──この手口は、CPUキャッシュのタイミング計測でカーネルメモリを読むサイドチャネルと相似形だ。\n\n防御側の困難も同一だ。SELinuxのMACポリシーが「許可と拒否の間に灰色地帯を作りにくい」ように、CI（Contextual Integrity）的な正当性判定も「コンテキストが正しく見えるか否か」の2値判定に帰着してしまい、偽陰性と偽陽性のトレードオフから逃れられない。検出器のAUROCが0.5前後というのは、IDS/IPSで「誤検知が多すぎて運用できない」と悩んだあの感覚と同じだ。\n\n示唆するのは、プロンプトインジェクション対策を「完全な防御」として設計するのではなく、**最小権限エージェント設計**（やれることを最初から制限する）・**監査ログ**（事後検知と forensics）・**影響半径の封じ込め**（ケーパビリティの分離）という多層防御の考え方を、Linuxのセキュリティモデルそのままエージェント設計に持ち込むことだろう。完全に防ぎきれないなら、侵害されたときの被害を小さくするしかない。\n\n---\n\nSources:\n- [Apple WWDC 2026: Siri Rebuilt on Gemini | TechTimes](https://www.techtimes.com/articles/317985/20260608/apple-wwdc-2026-siri-rebuilt-gemini-homeos-previewed-cook-farewell-keynote.htm)\n- [Microsoft Build 2026 Official Blog](https://blogs.microsoft.com/blog/2026/06/02/microsoft-build-2026-be-yourself-at-work/)\n- [Anthropic IPO Underwriter Selection | TechTimes](https://www.techtimes.com/articles/317845/20260605/anthropic-ipo-picks-goldman-sachs-morgan-stanley-jpmorgan-revenue-accounting-question-looms.htm)\n- [AI CEOs Joint Letter on Synthetic DNA | yellow.com](https://yellow.com/news/openai-anthropic-google-microsoft-synthetic-dna-congress-letter)\n- [AI Agents May Always Fall for Prompt Injections | arXiv:2605.17634](https://arxiv.org/abs/2605.17634)\n- [KVarN KV-Cache Quantization | arXiv:2606.03458](https://arxiv.org/abs/2606.03458)\n- [CodegenBench | arXiv:2606.04023](https://arxiv.org/abs/2606.04023)\n- [PerfCodeBench | arXiv:2605.15222](https://arxiv.org/abs/2605.15222)";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
