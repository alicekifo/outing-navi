<script>
const md = "十分な情報が集まりました。日本語の読み物を組み立てます。\n\n---\n\n## 🤖 今週のAI最新動向\n\n### 1. GPT-5.5 Instant、ChatGPTのデフォルトモデルに昇格\n\n4月23日にOpenAIがリリースしたGPT-5.5は、エージェント型コーディング・コンピューター操作・知識業務・調査などビジネス用途を強く意識したモデルで、5月5日には「GPT-5.5 Instant」が全ユーザー向けChatGPTのデフォルトに切り替わった。エージェントタスクの平均スコアは81.5と高く、ターミナル操作ベンチマーク Terminal-Bench 2.0 では82.7%をマーク。GPT-4.5系からの世代交代が正式に完了した形で、エージェント型AIが「試験的機能」から「日常基盤」へと移行するターニングポイントとなっている。\n\n[ソース](https://codersera.com/blog/deepseek-v4-vs-gpt-5-5-pro/)\n\n---\n\n### 2. DeepSeek V4 Proが「コスト70分の1」でフロンティアに肉薄\n\nGPT-5.5のわずか翌日・4月25日にDeepSeekがV4 Pro／V4 Flashをリリース。SWE-Bench Verified（ソフトウェアエンジニアリングタスク）ではGPT-5.5の58.6%を大きく上回る80.6%を記録し、コンテキスト長は1Mトークン対応。圧巻は価格差で、出力1Mトークンあたり約$0.87と、GPT-5.5 Proの$180に対して**約200倍安い**。しかもオープンウェイト公開という姿勢も変わらず、「中国発のオープンソースが最前線を塗り替える」という構図が再び鮮明になった。NISTもV4 Proの独立評価を開始しており、国際的な信頼性担保の動きも始まっている。\n\n[ソース](https://www.datacamp.com/blog/deepseek-v4-vs-gpt-5-5) / [NIST評価](https://www.nist.gov/news-events/news/2026/05/caisi-evaluation-deepseek-v4-pro)\n\n---\n\n### 3. EU AI法が初の大幅改正——高リスクAI義務を16ヶ月延期\n\n5月7日、EU理事会・欧州議会・欧州委員会の三者が「Digital Omnibus on AI」に暫定合意し、2024年6月成立のEU AI法（AI Act）に初めて大きな修正が加えられた。最大のポイントは高リスクAIシステムへの義務適用を最大16ヶ月延期したこと（2026年8月→2027年12月）。一方で新たな禁止事項として「同意なき性的画像の生成・操作AI」と「CSAM（児童性的虐待素材）生成AI」が明示的に禁止に追加された。企業側は準備期間を確保しつつ、最も深刻な乱用は即時規制対象という、現実的な折衷案が成立した。\n\n[ソース](https://www.consilium.europa.eu/en/press/press-releases/2026/05/07/artificial-intelligence-council-and-parliament-agree-to-simplify-and-streamline-rules/) / [詳細解説](https://www.globalpolicywatch.com/2026/05/eu-ai-act-update-timeline-relief-targeted-simplification-and-new-prohibitions/)\n\n---\n\n### 4. Metaが1兆円超の超大型インフラ投資——AMDとの$1,000億ディール\n\nMetaがテキサス州エルパソのAIデータセンター建設費を当初の15億ドルから**100億ドル超**に増額し、2028年稼働時には1ギガワット規模の施設を目指すと発表。さらにAMDとの間でMI540 GPUを含む半導体を最大**1,000億ドル分購入**する複数年契約を締結し、Intel・NVIDIAへの依存分散を本格化させた。「パーソナル超知性（Personal Superintelligence）」を標榜するMetaが、インフラ面でも独自のエコシステムを構築しようとしていることが明確になった動きだ。\n\n[ソース](https://www.cnbc.com/2026/04/08/meta-debuts-first-major-ai-model-since-14-billion-deal-to-bring-in-alexandr-wang.html)\n\n---\n\n### 5. Anthropic、Opus 4.7を静かにリリース——「より従順で制御しやすい」設計\n\nAnthropicがOpus 4.7を公開。「より文字通りに指示に従い、リスクが低く、より制御しやすい」とポジショニングされており、同社の前世代モデルと比べて自律判断を抑制する方向性が強調されている。GPT-5.5やDeepSeek V4の派手なベンチマーク競争とは一線を画し、企業導入における信頼性・予測可能性を訴求する戦略は、Anthropicらしいブランディングと言える。安全性と能力のトレードオフをどう設計するか、業界全体の議論を促す一石でもある。\n\n[ソース](https://llm-stats.com/ai-news)\n\n---\n\n## 📄 今週の注目論文\n\n### 1. SCM: Sleep-Consolidated Memory with Algorithmic Forgetting for Large Language Models\n**（SCM：アルゴリズム的忘却を伴うスリープ統合型LLMメモリ）**\n\n- **著者・発表：** 複数著者 / arXiv:2604.20943 / 2026年4月\n- **3行サマリー：** 人間の睡眠サイクル（NREM・REM）を模したメモリアーキテクチャをLLMに実装した研究。容量制限付きのワーキングメモリ、多次元の重要度タグ付け、オフライン睡眠フェーズでの統合、価値ベースの意図的忘却、そして自己モデル（introspection）という5コンポーネントを組み合わせる。長期記憶と干渉回避を両立させることに成功している。\n- **ポイント：** LLMが「何でも覚えている」ことの弊害（プロアクティブ干渉）は意外と見過ごされがちだが、人間が睡眠中に記憶を整理・淘汰するように、AIも「賢く忘れる」ことが長期的な推論精度を高める。エージェント型AIの実用化において、メモリ管理は今後の最重要技術のひとつになるだろう。\n\n[arXiv](https://arxiv.org/abs/2604.20943)\n\n---\n\n### 2. Learning to Forget: Sleep-Inspired Memory Consolidation for Resolving Proactive Interference in LLMs\n**（忘れることを学ぶ：プロアクティブ干渉を解消するスリープ型記憶統合）**\n\n- **著者・発表：** 複数著者 / arXiv:2603.14517 / 2026年3月\n- **3行サマリー：** Transformerに「SleepGate」と呼ぶ学習可能なKVキャッシュ上の睡眠サイクルを実装。以前覚えた情報が後から学んだ情報の記憶を妨げる「プロアクティブ干渉（PI）」という認知心理学的現象をターゲットに研究。PIの深さが5のときに99.5%、深さ10でも97.0%という高い検索精度を実現した。\n- **ポイント：** 「古い記憶が新しい記憶を妨害する」という問題は、継続学習（Continual Learning）やRAGの実装でも直面する実際的な課題。睡眠科学の知見をアーキテクチャに落とし込むというアプローチは、脳科学とAI研究の統合の方向性を象徴する一本。\n\n[arXiv](https://arxiv.org/abs/2603.14517)\n\n---\n\n### 3. Behavioral Economics of AI: LLM Biases and Corrections\n**（AIの行動経済学：LLMのバイアスとその補正）**\n\n- **著者・発表：** Pietro Bini, Lin William Cong, Xing Huang, Lawrence J. Jin / arXiv:2602.09362 / 2026年2月（NBER Working Paper w34745）\n- **3行サマリー：** 人間の認知バイアスを測定するために設計された経済・金融実験の「フルセット」をGPT系をはじめとする主要LLMファミリーに実施。嗜好ベースのタスクではモデルが大きく・高性能になるほど人間に近い（バイアスのある）振る舞いをしたが、信念・推論ベースのタスクでは高性能モデルほど合理的な回答をした。「理性的に判断せよ」とプロンプトするだけでバイアスは有意に減少した。\n- **ポイント：** LLMが「人間らしくなる」こととバイアスを持つことは同じコインの裏表かもしれない。AIを意思決定支援ツールとして使う際に、どのようにプロンプト設計すればバイアスを抑制できるかは、実務直結の問いだ。\n\n[arXiv](https://arxiv.org/abs/2602.09362) / [NBER](https://www.nber.org/papers/w34745)\n\n---\n\n### 4. The Cognitive Impacts of Large Language Model Interactions on Problem Solving and Decision Making Using EEG Analysis\n**（EEG分析によるLLM利用が問題解決・意思決定に与える認知的影響）**\n\n- **著者・発表：** 複数著者 / Frontiers in Computational Neuroscience / 2025年7月\n- **3行サマリー：** EEG（脳波）を使って、LLMと対話しながら問題を解く際に人間の脳でどんな変化が起きるかを実測した研究。前頭葉シータ波の低下（＝ワーキングメモリ負荷の軽減）とアルファ波の変動（＝認知エンゲージメントの変化）が計測された。LLMへの推論アウトソーシングが認知負荷を実際に下げることを神経科学的に裏付けた。\n- **ポイント：** 「AIを使うと頭が悪くなるのでは」という直感的な懸念に、神経科学が初めてデータで答え始めた研究。認知オフロードが短期的には楽でも、長期的な思考力への影響はどうなのか——次のステップとして注目されている問いだ。\n\n[Frontiers](https://www.frontiersin.org/journals/computational-neuroscience/articles/10.3389/fncom.2025.1556483/full) / [PubMed](https://pubmed.ncbi.nlm.nih.gov/40741073/)\n\n---\n\n## 💡 今週のひとことインサイト\n\n今週もっとも「これは深い」と感じたのは、LLMに**「睡眠」を実装しようとする研究が複数同時に出てきた**ことだ。\n\nSCMもSleepGateも、根底にある問いは同じだ——「賢いシステムは、何を覚えて何を忘れるべきか」。人間の脳は毎晩8時間、記憶を整理し、重要なものを固定し、ノイズを消す。この「インテリジェントな忘却」こそが、脳が干渉なく長期間機能できる秘密だと神経科学は教えてくれる。\n\nAIは今まで基本的に「全部覚える」か「全部忘れる」かだった。しかしエージェントAIが現実の業務に入り込み始めた今、数日・数週間にわたって文脈を保持しながらも、古くなった情報に引きずられない設計が切実に必要になってきた。\n\n生物が40億年かけて進化させた「賢い忘却」のメカニズムを、研究者たちがアーキテクチャに模倣しようとしている——これは単なる技術的工夫ではなく、「知性とは何か」という問いへの、AIからの回答の試みだと思う。\n\n---\n\n**Sources:**\n- [LLM News Today (May 2026) – AI Model Releases](https://llm-stats.com/ai-news)\n- [DeepSeek V4 vs GPT-5.5: Benchmarks, Price, Verdict](https://codersera.com/blog/deepseek-v4-vs-gpt-5-5-pro/)\n- [DeepSeek V4: Features, Benchmarks, and Comparisons | DataCamp](https://www.datacamp.com/blog/deepseek-v4)\n- [CAISI Evaluation of DeepSeek V4 Pro | NIST](https://www.nist.gov/news-events/news/2026/05/caisi-evaluation-deepseek-v4-pro)\n- [EU AI Act: Council and Parliament agree to simplify rules | Consilium](https://www.consilium.europa.eu/en/press/press-releases/2026/05/07/artificial-intelligence-council-and-parliament-agree-to-simplify-and-streamline-rules/)\n- [EU AI Act Update: Timeline Relief, Targeted Simplification | Global Policy Watch](https://www.globalpolicywatch.com/2026/05/eu-ai-act-update-timeline-relief-targeted-simplification-and-new-prohibitions/)\n- [Meta debuts new AI model | CNBC](https://www.cnbc.com/2026/04/08/meta-debuts-first-major-ai-model-since-14-billion-deal-to-bring-in-alexandr-wang.html)\n- [SCM: Sleep-Consolidated Memory for LLMs | arXiv:2604.20943](https://arxiv.org/abs/2604.20943)\n- [Learning to Forget: Sleep-Inspired Memory Consolidation | arXiv:2603.14517](https://arxiv.org/abs/2603.14517)\n- [Behavioral Economics of AI: LLM Biases and Corrections | arXiv:2602.09362](https://arxiv.org/abs/2602.09362)\n- [Behavioral Economics of AI | NBER w34745](https://www.nber.org/papers/w34745)\n- [Cognitive Impacts of LLM Interactions on Problem Solving | Frontiers](https://www.frontiersin.org/journals/computational-neuroscience/articles/10.3389/fncom.2025.1556483/full)";
document.getElementById('content').innerHTML = marked.parse(md);
