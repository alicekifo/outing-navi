<script>
const md = "情報が揃いました。日本語の読み物を組み立てます。\n\n---\n\n## 🤖 今週のAI最新動向\n\n### 1. AnthropicのProject Glasswing：Claude Mythosが1万件超のゼロデイ脆弱性を発見\n\n5月下旬、Anthropicは「Project Glasswing」の最新進捗を公開した。同社の新フロンティアモデル「Claude Mythos Preview」を使い、重要インフラのソフトウェアを自律的にスキャンしたところ、1万件以上の高・重大度脆弱性（うち多数がゼロデイ）を発見したという。注目事例には「27年前のOpenBSDバグ」「16年前のFFmpegの欠陥」「wolfSSL暗号ライブラリの証明書偽造可能な脆弱性」が含まれる。\n\nなぜ重要か：AWS・Apple・Google・Microsoftなど主要企業が参加するこのプログラムは、「AIが攻撃者として使われる前に防衛側が先手を打つ」という新しいセキュリティ戦略の先例だ。Anthropicが敢えてモデルを一般公開せず管理下に置いている判断は、「能力の開示タイミング」という新たな倫理的課題を突きつけている。\n\n[ソース（Help Net Security）](https://www.helpnetsecurity.com/2026/05/26/anthropic-project-glasswing-update/) / [公式ページ](https://www.anthropic.com/glasswing)\n\n---\n\n### 2. Claude Opus 4.7 vs GPT-5.5：コーディングベンチマーク競争が本格化\n\nOpenAIが4月にGPT-5.5を投入し、AnthropicはOpus 4.7で応戦。ARC PrizeがARC-AGI-3を使った比較評価を公開した。SWE-bench Pro（実世界コーディング）ではOpus 4.7が64.3%対GPT-5.5の58.6%でリード。コンピューター操作ベンチマーク（OSWorld-Verified）でもOpus 4.7が78.0%と優位を保つ一方、構造化ツールユースではGPT-5.5が反撃する構図。\n\nなぜ重要か：「どちらが賢いか」の争いが「どちらが現場で使えるか」にシフトしてきた。Opus 4.7は複数ファイルをまたぐ推論で強く、両者は異なる方向に最適化されており、ユースケースによって選択が変わる時代に入った。ベンチマーク設計そのものが競争戦略の一環になっている点も注目に値する。\n\n[ソース（ARC Prize）](https://arcprize.org/blog/arc-agi-3-gpt-5-5-opus-4-7-analysis) / [Anthropic発表](https://www.anthropic.com/news/claude-opus-4-7)\n\n---\n\n### 3. Anthropic、Q2売上高が前四半期比130%増——初の黒字化が射程圏内\n\nAnthropicがQ2 2026の収益見通しとして$10.9 billion（約1.6兆円）規模を開示し、Q1の$4.8 billionから130%増というペースで成長している。同時期にOpenAIが機密S-1申請（IPO準備）に動いているとの報道も重なり、主要AI企業が軒並み事業フェーズへ移行しつつある。\n\nなぜ重要か：「研究機関が黒字化する」という前例がほぼなかったAI企業が、事業サステナビリティの段階へ入ることは、研究の優先順位にも影響しうる。GPUコンピュートのための巨大資本調達（SpaceXとの月次$12.5億の契約なども報道）が示すように、AI開発の「インフラ競争」は資金力で決まる時代が来た。\n\n[ソース（AIToolsRecap）](https://aitoolsrecap.com/Blog/ai-news-may-2026)\n\n---\n\n### 4. Google Gemini 3.5 Flash が一般提供開始——「速さ×賢さ」を4倍に\n\nGemini 3.5 Flashが正式GA。入力$1.50/1Mトークン・出力$9/1Mトークンという価格帯で、同等クラスモデル比4倍の速度を実現。コンテキスト窓は100万トークン。Adobe・Canva・CapCutもGemini連携を発表し、創作ツールへのシームレス統合が始まっている。\n\nなぜ重要か：「フロンティア級の性能でも安く速く使えるモデル」が汎用化することで、リアルタイム推論や大量バッチ処理の経済性が根本から変わる。ユーザーがAIを意識しないまま使う「インビジブルAI」の時代が、静かに始まっている。\n\n[ソース（LLM Stats）](https://llm-stats.com/llm-updates)\n\n---\n\n### 5. MetaがMuse Sparkを発表——Meta Superintelligence Labsの第1弾\n\nMetaはMuse Sparkを発表した。$140億超を投じた組織再編（Alexandr Wang招聘ほか）のもとで設立されたMeta Superintelligence Labsが開発した同モデルは、Anthropic Claudeに依存していた「Hatch」プロダクトへの搭載が予定されている。\n\nなぜ重要か：オープンソース路線を維持しながら独自フロンティアモデルを持つ戦略が実現すれば、「基盤モデルはOSSで、サービスは独自」という新しいエコシステムが形成される可能性がある。AI産業の勢力図を塗り替える一手となるか、注目が集まる。\n\n[ソース（The Decoder）](https://the-decoder.com/google-and-meta-race-to-build-personal-ai-agents-as-anthropic-and-openai-pull-further-ahead/)\n\n---\n\n## 📄 今週の注目論文\n\n### 1. \"Behavioral Economics of AI: LLM Biases and Corrections\" ― LLMは人間と同じバイアスを持つ、ただし場合によっては人間より合理的\n\n**タイトル（日本語）**：AIの行動経済学：LLMのバイアスとその修正\n\n**著者・所属**：Pietro Bini・Lin William Cong（Cornell大）・Xing Huang・Lawrence J. Jin　/ NBER Working Paper 34745（2026年2月）\n\n**3行サマリー**：GPT-4・Claude 3 Opus・Gemini 1.5 Proなどを対象に、行動経済学の古典的実験（リスク選択・時間割引・フレーミング効果など）を網羅的に実施。リスク選好といった「選好ベース」タスクでは、高性能モデルほど期待効用理論に違反する**人間と同方向のバイアス**を示す。一方でベイズ更新や結合錯誤といった「信念ベース」タスクでは、高性能LLMは人間を凌駕する合理性を発揮する。\n\n**ポイント**：「LLMに『合理的な投資家として考えよ』と事前に指示するとバイアスが減る」という発見は、プロンプトエンジニアリングがバイアス制御の現実的な手段になりうることを示唆する。AIが意思決定を支援する金融・医療・法律分野の設計者にとって、見落とせない一本。\n\n[arXiv:2602.09362](https://arxiv.org/abs/2602.09362)\n\n---\n\n### 2. \"Deep Search with Hierarchical Meta-Cognitive Monitoring Inspired by Cognitive Neuroscience\" ― 「自分の思考を見張る」能力をAIに\n\n**タイトル（日本語）**：認知神経科学に着想を得た階層的メタ認知モニタリングによるディープサーチ\n\n**著者・所属**：（arXiv:2601.23188、2026年1月）\n\n**3行サマリー**：LLMベースの検索エージェントは「自分の推論・検索状態を監視・修正する」メカニズムを持たないという根本的問題を指摘。人間のメタ認知が「速い異常検知（扁桃体的）」と「遅い経験駆動型の内省（前頭前野的）」の2段階から成ることに着想を得て、同様の階層型モニタリング機構を設計。提案手法は深い推論ベンチマークで有意な改善を示した。\n\n**ポイント**：「考える」だけでなく「自分がうまく考えられているかを監視する」能力こそが人間の知性の核心だとすれば、これはAGIへの本質的なステップを踏んでいる研究だ。認知神経科学とAI工学が相互に刺激し合う方向性として、今後の潮流を予感させる。\n\n[arXiv:2601.23188](https://arxiv.org/abs/2601.23188)\n\n---\n\n### 3. \"Cognitive Agency Surrender: Defending Epistemic Sovereignty via Scaffolded AI Friction\" ― AIに「考える主権」を奪われないために\n\n**タイトル（日本語）**：認知的主体性の明け渡し：設計された摩擦による認識論的自律の防衛\n\n**著者・所属**：（arXiv:2603.21735、2026年3月）\n\n**3行サマリー**：HCI研究の文献を定量分析すると、2025年は「人間の認知的自律を守れ」という論文が全体の19.1%を占めていたが、2026年初頭には13.1%に急減。代わりに機械側の自律性最適化・エージェントAI研究が19.6%へ急増し、「エージェント支配への移行」が統計的に検出された。著者らは「**意図的に摩擦を埋め込んだAIインターフェース設計**」が人間の認識論的主権を守る現実的手段だと提言する。\n\n**ポイント**：AIが便利になるほど人間は「考えること」を無意識にアウトソースする。教育・医療・法律分野のAI導入において、「あえて簡単にしすぎない設計」という逆張りの発想は、実務上の重要な設計指針になりうる。\n\n[arXiv:2603.21735](https://arxiv.org/html/2603.21735)\n\n---\n\n### 4. \"NeuroAI and Beyond: Bridging Between Advances in Neuroscience and Artificial Intelligence\" ― スケーリング万能論への歴史的反論\n\n**タイトル（日本語）**：NeuroAIとその先へ：神経科学とAIの進歩を橋渡しする\n\n**著者・所属**：（arXiv:2604.18637、2026年4月）\n\n**3行サマリー**：AI投資がトランスフォーマー＋静的データセットに集中している現状を批判的に検討。歴史的に振り返ると、バックプロパゲーション・畳み込みネット・アテンション機構といった主要な建築的革新はいずれも学術研究、特に神経科学由来のアイデアが発端だった。言語中心アーキテクチャが限界に近づくにつれ、次の突破口も脳科学から来る可能性を論じる。\n\n**ポイント**：スケーリング則の収穫逓減が議論される今、「次のブレークスルーはどこから来るか」を考える上で重要な歴史的・理論的視座を提供する。神経科学×AIというテーマが、2026年に改めて注目を集めていることは偶然ではないだろう。\n\n[arXiv:2604.18637](https://arxiv.org/html/2604.18637v2)\n\n---\n\n## 💡 今週のひとことインサイト\n\nProject Glasswingで最も衝撃的だったのは、件数（1万超）でも技術的巧妙さでもなく、**「27年間誰も気づかなかったOpenBSDのバグ」を発見したこと**だ。人類がその27年間、コードを読み、デバッグし、セキュリティレビューをかけ続けてきたにもかかわらず見落とし続けた欠陥を、AIが短期間で発見し、実際に動作するエクスプロイトまで構築した——これはAIが「コードを書く存在」にとどまらず、「人間の見逃しを体系的に炙り出す存在」に変貌しつつあることを示す。怖いのは悪用リスクだけではない。自分たちがずっと信頼してきた「人間によるセキュリティ審査の正確性」という前提そのものが崩れるかもしれないという認識論的な揺らぎだ。Anthropicがモデルを一般公開せず管理パートナー限定にした判断は慎重さの表れだが、同時に「この能力を誰が持ち、誰が管理するか」という権力の問題が静かに始まっていることも示している。\n\n---\n\n**Sources:**\n- [Help Net Security – Project Glasswing Update](https://www.helpnetsecurity.com/2026/05/26/anthropic-project-glasswing-update/)\n- [Anthropic – Project Glasswing 公式](https://www.anthropic.com/glasswing)\n- [ARC Prize – ARC-AGI-3 GPT-5.5/Opus 4.7 分析](https://arcprize.org/blog/arc-agi-3-gpt-5-5-opus-4-7-analysis)\n- [Anthropic – Claude Opus 4.7 発表](https://www.anthropic.com/news/claude-opus-4-7)\n- [AIToolsRecap – AI News May 2026](https://aitoolsrecap.com/Blog/ai-news-may-2026)\n- [LLM Stats – LLM Updates](https://llm-stats.com/llm-updates)\n- [The Decoder – Google/Meta vs OpenAI/Anthropic](https://the-decoder.com/google-and-meta-race-to-build-personal-ai-agents-as-anthropic-and-openai-pull-further-ahead/)\n- [arXiv:2602.09362 – Behavioral Economics of AI](https://arxiv.org/abs/2602.09362)\n- [arXiv:2601.23188 – Deep Search Hierarchical Meta-Cognitive](https://arxiv.org/abs/2601.23188)\n- [arXiv:2603.21735 – Cognitive Agency Surrender](https://arxiv.org/html/2603.21735)\n- [arXiv:2604.18637 – NeuroAI and Beyond](https://arxiv.org/html/2604.18637v2)";
document.getElementById('content').innerHTML = marked.parse(md);
