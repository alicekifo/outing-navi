<script>
const md = "十分な情報が揃いました。日本語の読み物を生成します。\n\n---\n\n## 🤖 今週のAI最新動向\n\n### 1. Microsoft、Build 2026 で MAI-Code-1-Flash \u0026 MAI-Thinking-1 発表——OpenAI 依存脱却を宣言\n\n**何が起きたか**\nMicrosoft は6月2日の Build 2026 カンファレンスで、5B パラメータのコーディング専用モデル **MAI-Code-1-Flash** と、初の自社製推論モデル **MAI-Thinking-1**（OpenAI データを一切使わずに学習）を発表した。MAI-Code-1-Flash は GitHub Copilot に即日統合。\n\n**なぜ重要か**\nコーディングベンチマークで Claude Haiku 4.5 を全項目で上回り、SWE-Bench Pro では **51.2% vs 35.2%（+16pt）**、IF Bench（精密指示追従）では **+28.9pt** のリード。さらに SWE-Bench Verified でのトークン消費を最大 **60% 削減**しており「精度と効率のトレードオフ解消」を実証した形だ。長年の OpenAI 依存から自立することで、Microsoft はモデル調達コストとサプライチェーンリスクを同時に下げる戦略を明確化した。\n\n出典: [Introducing MAI-Code-1-Flash | Microsoft AI](https://microsoft.ai/news/introducingmai-code-1-flash/) (2026-06-02公開)\n\n---\n\n### 2. Anthropic、Claude Mythos を電力・医療・通信インフラ 150 組織・15 か国以上へ展開\n\n**何が起きたか**\nAnthropic は6月2日、Project Glasswing の第2フェーズとして、電力・水道・医療・通信・ハードウェアを含む重要インフラ分野の 150 組織（15 か国以上）に Claude Mythos Preview のアクセスを拡大した。日本政府・MUFG・みずほ・三井住友銀行、EU サイバーセキュリティ機関 ENISA も参加する。\n\n**なぜ重要か**\nAnthropic によれば、Mythos Preview はすでに「**あらゆる主要 OS とウェブブラウザ**で高深刻度の脆弱性を数千件発見」しており、熟練した人間のペネトレーションテスターを超えるコーディング能力があると説明している。AI が脆弱性調査の非対称性を守備側に傾ける可能性を示す一方、同じ能力が悪用された場合の攻撃力上昇も意味する。両刃の剣だからこそ、パートナー審査が厳格に設計されている。\n\n出典: [Project Glasswing | Anthropic](https://www.anthropic.com/glasswing) / [TechCrunch](https://techcrunch.com/2026/06/02/anthropic-scales-claude-mythos-to-critical-infrastructure-in-15-countries/) (2026-06-02公開)\n\n---\n\n### 3. OpenAI・Anthropic・Google・Microsoft CEO 4 社、合成 DNA スクリーニング義務化を米議会に要請\n\n**何が起きたか**\n6月5日、4 社のトップが連名で米議会への公開書簡を発出。合成 DNA プロバイダーに対し、生物兵器設計への転用を防ぐスクリーニング義務付けを求めた。\n\n**なぜ重要か**\n競合 4 社が「バイオリスク」という一点で協調行動を取ったことは象徴的だ。AI のコーディング・設計支援能力が生物兵器開発に悪用されうるという認識が業界の共通見解として形成されつつあり、AI×バイオセキュリティが次の規制戦線になることを示唆する。技術者としては、AI ツールが化学・生物領域でどこまでの出力を許容するかというガードレール設計の議論とも直結する。\n\n出典: [OpenAI/Anthropic/Google/Microsoft CEOs Ask Congress | Yellow.com](https://yellow.com/news/openai-anthropic-google-microsoft-synthetic-dna-congress-letter) (2026-06-05公開)\n\n---\n\n### 4. Google Gemini 3.5 Pro、2M トークン＋Deep Think 推論で6月リリース間近\n\n**何が起きたか**\n5月の Google I/O で予告された Gemini 3.5 Pro が、Vertex AI の Limited Preview 段階から6月下旬の GA に向けて最終調整中と報じられた（6月6日時点）。コンテキスト長 **2M トークン**、Deep Think 推論モード搭載予定。\n\n**なぜ重要か**\n先行リリース済みの Gemini 3.5 Flash は SWE-Bench やエージェントベンチマークで Gemini 3.1 Pro を超えたが、ARC-AGI-2 や Humanity\u0027s Last Exam といったハード推論タスク、および 128k+ の長文コンテキスト検索精度では 3.1 Pro に 7.6pt 差で劣る。Pro はこのギャップを埋める設計とされ、2M トークンは現行フロンティアモデルの中で最大規模となる。長文コンテキストでのコードレビューやログ解析に直接効いてくるスペックだ。\n\n出典: [Gemini 3.5 Pro Nears June Launch | TechTimes](https://www.techtimes.com/articles/317919/20260606/google-gemini-35-pro-nears-june-launch-2-million-token-context-deep-think-reasoning.htm) (2026-06-06公開)\n\n---\n\n## 📄 今週の注目論文\n\n### 1. 「ディープリサーチ・エージェントにおける検索時汚染」/ Search-Time Contamination in Deep Research Agents\n\n**著者**: 複数著者・Alibaba Group / 南洋理工大学（NTU） / **arXiv: 2606.05241** / 2026-06-03 投稿\n\n**3 行サマリー**\n- **Problem**: ウェブ検索を推論中に実行する Deep Research エージェントは、公開ベンチマークの問題文・文脈・解答をそのまま検索して取得できてしまう。これを著者らは「Search-Time Contamination（STC）」と命名した。\n- **Method**: STC を深刻度順に 3 タイプ（Benchmark Metadata Leakage / Question-Context Leakage / Explicit Answer Leakage）に分類し、検出アルゴリズムを開発。現行の主要 Deep Research エージェントを 6 つの公開ベンチマークで評価。\n- **Finding**: STC は広く蔓延しており、測定されたエージェント性能を最大 **+4%** 過大評価させていることが判明。既存の評価が真の推論能力を誇張している可能性がある。\n\n**読みどころ**\nベンチマークが公開されている限り、ウェブ検索能力を持つエージェントはその「回答」を参照しうる——これは評価研究の根幹を揺るがす問題だ。セキュリティ的に言えば「テスト環境の汚染」であり、Red Team 評価でも同様の抜け穴が潜む可能性がある。ローカル環境でのエージェント評価（ネットワーク遮断＋プライベートベンチマーク）の重要性を改めて示す論文。\n\n出典: [arXiv:2606.05241](https://arxiv.org/abs/2606.05241)\n\n---\n\n### 2. 「長文コンテキスト LLM 推論のための疎・分離アテンション SparDA」/ SparDA: Sparse Decoupled Attention for Efficient Long-Context LLM Inference\n\n**著者**: Yaosheng Fu ほか / **arXiv: 2606.04511** / 2026-06-03 投稿\n\n**3 行サマリー**\n- **Problem**: 長文コンテキストで KV キャッシュを CPU にオフロードすると PCIe がボトルネックになり、スパースな KV 選択ステップ自体も O(T²) コストを持つという二重の壁がある。\n- **Method**: Query / Key / Value に加え **\"Forecast\"** という 4 番目のプロジェクションを追加。Forecast が「次レイヤーで必要な KV ブロック」を先読み予測し、CPU→GPU 転送を現レイヤーの Attention 計算とオーバーラップさせる非同期プリフェッチを実現。GQA では 1 グループ 1 Forecast ヘッドに圧縮してオーバーヘッドを抑制。\n- **Finding**: KV 転送と Attention 計算のパイプライン化により、長文推論における CPU-GPU 転送ボトルネックを解消するアーキテクチャを実証した。\n\n**読みどころ**\nローカル LLM 運用者にとって長文コンテキストは VRAM 枯渇と直結する現実問題だ。CPU オフロードを前提にした非同期設計という着眼点は llama.cpp のロングコンテキスト最適化にも通じる発想で、実装に落とし込まれれば 80GB A100 以下の環境でも恩恵を受けやすい。\n\n出典: [arXiv:2606.04511](https://arxiv.org/abs/2606.04511)\n\n---\n\n### 3. 「2-bit 量子化 LLM の精度回復：合成データ蒸留＋LoRA」/ Recover-LoRA for Aggressive Quantization\n\n**著者**: Devleena Das, Rajeev Patwari, Elliott Delaye, Ashish Sirasao（AMD） / **arXiv: 2606.04238** / 2026-06-02 投稿\n\n**3 行サマリー**\n- **Problem**: 2-bit 重み量子化はメモリ帯域幅削減とスループット向上で圧倒的なゲインを持つが、精度劣化が激しくエッジ・ローカル展開の障壁になっている。\n- **Method**: MLP の gate / up プロジェクション層のみを W2（2-bit）量子化する混合精度構成「GateUp」を採用。合成データ上での Knowledge Distillation と LoRA を組み合わせてデータなしで精度回復。\n- **Finding**: AMD の視点からエッジデバイス向け LLM 展開に実用的な精度・コストトレードオフを実現。特定層に絞った選択的量子化が精度回復の鍵となることを示した。\n\n**読みどころ**\nllama.cpp や GGUF の Q2 モデルを使うユーザーにとってはそのまま実用論文になりうる。AMD 発である点も重要で、RDNA/CDNA アーキテクチャへの最適化ロードマップと結びつく可能性がある。「合成データで蒸留」という手法はデータライセンス問題を回避する現実的解法としても注目に値する。\n\n出典: [arXiv:2606.04238](https://arxiv.org/abs/2606.04238)\n\n---\n\n## 💡 今週のひとことインサイト\n\n### AI は「攻撃コスト対防御コスト」の非対称性を逆転させるか\n\nAnthropic の Claude Mythos が電力・医療・通信インフラの脆弱性スキャンに本格参入したニュースで、ある問いが浮かんだ。セキュリティの世界では長年、「攻撃者有利の非対称性」が公理のように扱われてきた。防御者はすべての穴を塞がなければならないが、攻撃者は一つ見つければ済むからだ。\n\nだが Mythos のような AI が守備側で大量稼働し、**主要 OS・ブラウザ全体を横断して高深刻度脆弱性を数千件先に発見・修正**できるとすれば、この比率がようやく逆転し始めるかもしれない。理論上、発見から修正までのリードタイム（Window of Exposure）を AI が劇的に縮める可能性がある。\n\nただし Linux/セキュリティエンジニアとして冷静に考えると、問題は「誰が先にそのモデルを使うか」だ。Project Glasswing はパートナー審査を厳格に設けているが、同等の能力を持つモデルが将来的にオープンウェイト化・ローカル実行可能になった瞬間、攻撃者も同じツールを手にする。今週発表された CEO 4 社の合成 DNA 書簡が象徴するように、業界は「能力の非対称開放」が招くリスクを深刻に捉え始めている。CVE の発掘・開示・パッチ適用のプロセス全体を、AI の速度に合わせて再設計する議論を今から始める必要がある。\n\n---";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
