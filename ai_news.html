<script>
const md = "情報が十分に揃いました。記事を生成します。\n\n---\n\n## 🤖 今週のAI最新動向\n\n### 1. Microsoft Build 2026 — 自社製MAIモデル7本を一挙発表、OpenAI依存からの脱却を宣言\n\n**何が起きたか**: Microsoft は Build 2026（6/2〜3）で独自開発の「MAI」モデルファミリー7本を発表。推論・コーディング・画像生成・音声・文字起こしまで全領域をカバーした。\n\n**なぜ重要か / 何が変わるか**: 旗艦の **MAI-Thinking-1** は蒸留ゼロ・スクラッチ学習という異色の製造方針を採用。商用ライセンス済みの企業グレードデータのみで訓練されており、規制対応やデータリネージ要件が厳しい企業ユースで差別化できる。独立評価では Claude Sonnet 4.6 超え・SWE-Bench Pro で Opus 4.6 相当とされる。Azure Foundry 上での Private Preview が即日開始、MAI-Code-1-Flash は VS Code Copilot のモデルピッカーにも同日追加されており開発者が直接比較できる状態になった。\n\n**数値**:\n- MAI-Thinking-1: アクティブパラメータ **35B**、コンテキスト **256K**\n- SWE-Bench Pro: Opus 4.6 と同水準（公式比較）\n- MAI-Image-2.5: Arena AI リーダーボード **3位**（text-to-image）/ **2位**（image-to-image）\n- MAI-Voice-2: **15言語**対応\n\n出典: [Microsoft Blog](https://blogs.microsoft.com/blog/2026/06/02/microsoft-build-2026-be-yourself-at-work/) (2026-06-02公開) / [AIN.ua — Build 2026 recap](https://en.ain.ua/2026/06/03/six-updates-from-microsoft-build-2026/) (2026-06-03公開)\n\n---\n\n### 2. Anthropic、S-1 を SEC に機密提出——評価額$965B・収益$47Bで AI 史上最大規模の IPO へ\n\n**何が起きたか**: Anthropic が 6/1 に Form S-1 ドラフトを SEC へ機密提出。上場目標は早くとも 2026年10月。\n\n**なぜ重要か / 何が変わるか**: 直前の Series H（$65B）で評価額が **$965B（約148兆円）** に達し、初めて OpenAI の私募評価額（$852B）を上回った。年間収益ランレートも **$47B**（前年比 4.7 倍）。上場後は公開企業として財務開示が義務化されるため、GPU 調達コスト・推論インフラの構造・API マージンといった LLM 産業の内部情報が初めて可視化される見通し。その数字は競合他社の経営判断にも直接影響する。\n\n出典: [Anthropic 公式](https://www.anthropic.com/news/confidential-draft-s1-sec) (2026-06-01公開) / [CNBC](https://www.cnbc.com/2026/06/01/anthropic-ipo-s1-prospectus.html) (2026-06-01公開)\n\n---\n\n### 3. GitHub Copilot がトークン課金制へ移行——エージェント利用者に10〜50倍の請求ショック\n\n**何が起きたか**: 6/1 より GitHub Copilot 全プランが「AI Credits」トークンベース課金に移行。1 AI Credit = $0.01 で、月額プランの金額分だけクレジットが付与される仕組み。\n\n**なぜ重要か / 何が変わるか**: コード補完・Next Edit Suggestions は引き続き無制限だが、チャット・エージェントワークフロー・PR レビューはトークン消費としてカウントされる。ヘビーなエージェント利用ユーザーから「月額が10〜50倍に跳ね上がった」との報告が続出し、TechCrunch が「What a joke」と題した特集を組む騒ぎに。LLM エージェントの「長コンテキスト処理コスト」が現実の請求額として顕在化した歴史的な瞬間ともいえる。Pro プラン（$10/月）では $10 相当のクレジットしかなく、エージェントが 10 万トークン程度を処理するだけで月枠が尽きる計算になる。\n\n出典: [GitHub Blog](https://github.blog/news-insights/company-news/github-copilot-is-moving-to-usage-based-billing/) (2026-06-01公開) / [TechCrunch](https://techcrunch.com/2026/05/30/what-a-joke-github-copilots-new-token-based-billing-spurs-consternation-among-devs/) (2026-05-30公開)\n\n---\n\n### 4. Microsoft・Google がコーディング AI 市場に正面参入——Anthropic/OpenAI との直接対決\n\n**何が起きたか**: Microsoft（MAI-Code-1-Flash）と Google（Gemini Code Assist 系）が相次いでコーディング特化モデルを投入し、Cursor/Windsurf で存在感を示す Claude 系と GitHub Copilot の GPT 系が握る市場に挑戦状を叩きつけた。\n\n**なぜ重要か / 何が変わるか**: OS・エディタ・クラウドを握る両社が自社モデルで推論スタックを完全垂直統合すると、開発者のベンダーロックインはさらに深まる。一方で競争激化によりコーディング AI の実効コスト低下と選択肢拡大も期待できる。MAI-Code-1-Flash はすでに GitHub Copilot のピッカーに並んでいるため、Copilot ユーザーは今日から A/B 比較が可能。\n\n出典: [CNBC](https://www.cnbc.com/2026/06/01/microsoft-and-google-take-on-anthropic-and-openai-in-ai-coding-models.html) (2026-06-01公開)\n\n---\n\n## 📄 今週の注目論文\n\n### 1. AIエージェントはプロンプトインジェクションから永遠に逃れられない — 不可能性定理の証明\n**英語原題**: AI Agents May Always Fall for Prompt Injections\n\n- **著者**: Sahar Abdelnabi（ELLIS Institute Tübingen / MPI-IS）・Eugene Bagdasarian（UMass Amherst） / arXiv:2605.17634 / 2026年5月公開\n- **3行サマリー**\n  - **Problem**: プロンプトインジェクション対策の主流「データと指示の分離」は、文脈操作型の攻撃に対し無効であり、正当な動作までブロックするという根本的矛盾を抱えている。\n  - **Method**: プライバシー理論「Contextual Integrity（CI）」をプロンプトインジェクションに適用し、「情報フローのなりすまし」「規範の操作」「複数フローの混合」という3クラスの攻撃シナリオを形式化。\n  - **Finding**: 攻撃者は「正当に見える文脈」を常に構築できるという**不可能性定理**を導出。防御を強化するほど正当ユースケースがブロックされるトレードオフが不可避であることを理論的に示した。\n- **読みどころ**: MCP・ツール連携が当たり前になった今、「完全なプロンプトインジェクション対策」を追いかけることは原理的に無意味と証明された。セキュリティエンジニア的には「侵入前提のアーキテクチャ設計」という発想転換の根拠となる重要な一本。下記の設計パターン論文と合わせて読むと理解が深まる。\n\n出典: [arXiv:2605.17634](https://arxiv.org/abs/2605.17634)\n\n---\n\n### 2. LLMエージェントをプロンプトインジェクションから守る設計パターン集\n**英語原題**: Design Patterns for Securing LLM Agents against Prompt Injections\n\n- **著者**: Luca Beurer-Kellner、Beat Buesser、Ana-Maria Creţu、Edoardo Debenedetti ほか計14名（複数所属） / arXiv:2506.08837 / 2026年6月公開\n- **3行サマリー**\n  - **Problem**: エージェントへのプロンプトインジェクションはツールアクセスや機密情報を扱う場面で特に危険だが、汎用的かつ実践的な防御設計指針が存在しなかった。\n  - **Method**: OS アシスタントからソフトウェアエンジニアリングエージェントまで10事例を分析し、「エージェントの行動範囲を明示的に制約する」原則に基づく設計パターン群を提案。ユーティリティとセキュリティのトレードオフを定量化。\n  - **Finding**: 「完全汎用エージェント」より「用途制約エージェント」の方がセキュアかつ動作検証可能であることを実証。パターン適用事例で攻撃成功率を大幅に低下。\n- **読みどころ**: 上記の「不可能性定理」論文が「完全防御は無理」と言うのに対し、本論文は「だからこそ設計で行動範囲を縛れ」と実践的な回答を出す。SELinux のポリシー設計思想と重なる部分が多く、Linux/セキュリティ畑の読者には腑に落ちやすい内容。MCP サーバ設計や Claude Code のフック設計に直接応用できる視点を提供している。\n\n出典: [arXiv:2506.08837](https://arxiv.org/abs/2506.08837)\n\n---\n\n### 3. コードはエージェントの「ハーネス」になる——42名執筆の大規模サーベイ\n**英語原題**: Code as Agent Harness\n\n- **著者**: Xuying Ning・Katherine Tieu・Dongqi Fu・Tianxin Wei ほか計42名 / arXiv:2605.18747 / 2026年5月18日公開\n- **3行サマリー**\n  - **Problem**: LLM エージェントにおける「コード」の役割が出力目標から実行基盤へと根本的に変化しているが、統一的な整理が存在しなかった。\n  - **Method**: コードをエージェントの推論・行動・環境モデリング・実行検証の共通基盤（Harness）と定義し、「ハーネスインターフェース → メカニズム（計画・メモリ・ツール）→ スケーリング」の3層構造で体系化。\n  - **Finding**: コードは LLM の単なる入出力ではなく、エージェントの動作を**検証可能かつステートフル**にする唯一の実用的手段であることを実証。スケーリング則もモデル単体よりハーネス側にシフトしつつあることを示した。\n- **読みどころ**: 「なぜコードエージェントはシェルや Python で動くのか」という問いに対し理論的根拠を与える必読サーベイ。セキュリティ視点では「コードが実行基盤になる＝コードインジェクションのアタックサーフェスが広がる」という含意が重要で、上記 2 本のセキュリティ論文と三角形をなす。\n\n出典: [arXiv:2605.18747](https://arxiv.org/abs/2605.18747)\n\n---\n\n### 4. KVキャッシュを平均2.3bit台で圧縮——4.9倍メモリ削減・5.3倍推論高速化\n**英語原題**: KVmix: Gradient-Based Layer Importance-Aware Mixed-Precision Quantization for KV Cache\n\n- **著者**: （著者情報は論文本体参照）/ arXiv:2506.08018 / 2026年6月公開\n- **3行サマリー**\n  - **Problem**: KV キャッシュは長文処理・大バッチ推論のメモリボトルネックであり、低 bit 量子化で圧縮しつつ精度を維持することが難しい。\n  - **Method**: 勾配ベースでレイヤーごとの K・V 行列の損失への寄与度を評価し、重要なレイヤーには高精度・そうでないレイヤーには低精度を動的割り当て（混合精度）。直近の重要トークンを FP で保持し古いトークンを積極圧縮する動的長文最適化も搭載。効率的な CUDA カーネルを独自実装。\n  - **Finding**: Llama・Mistral において Key 平均 **2.19bit**、Value 平均 **2.38bit** という超低精度を達成しながら精度をほぼ維持。メモリ **4.9 倍**削減、推論スループット **5.3 倍**向上（対比条件：同一モデルの FP16 KV キャッシュ）。\n- **読みどころ**: ローカル LLM 運用者にとって最も直撃する内容。VRAM 8〜16 GB 環境で 70B 級モデルを動かすための現実解として llama.cpp・vLLM での実装参考になる。KVTuner・KIVI との比較でどこが差別化されているかを確認するのが読みどころ。\n\n出典: [arXiv:2506.08018](https://arxiv.org/abs/2506.08018)\n\n---\n\n## 💡 今週のひとことインサイト\n\n### 「完全防御は存在しない」——SELinux の哲学が LLM でも証明された\n\n今週、プロンプトインジェクションに関する 2 本の論文が面白い対話を形成していた。Abdelnabi らは「どんな防御を施しても、攻撃者は常に正当に見える文脈を構築できる」という不可能性定理を導いた。一方 Beurer-Kellner らは「だからこそ設計パターンでエージェントの行動範囲を絞れ」と答えを返した。これは SELinux の根本思想——「侵入を前提とし、侵入後に何もできないようポリシーで制約する」——と完全に一致する。パーフェクトな検知より、被害を最小化するアーキテクチャを選ぶ。Linux セキュリティの 20 年の知見が LLM エージェント設計に丸ごと転用できる時代が来た。もう一つ目を引いたのが GitHub Copilot の課金騒動だ。エージェントが「長コンテキストを回す」コストは想像以上に大きい。これはセキュリティ的にも示唆深い：エージェントに無制限の文脈を持たせることは、コスト面でも攻撃面でも爆発リスクを高める。「タスクスコープを絞ったエージェント」こそが、経済合理性とセキュリティを両立する設計になるという今週の最大の教訓だろう。";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
