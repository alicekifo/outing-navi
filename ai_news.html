<script>
const md = "十分な情報が集まりました。日本語の読み物を生成します。\n\n---\n\n## 🤖 今週のAI最新動向\n\n### 1. Sysdig報告：野外初の「完全自律LLMエージェント」によるサイバー侵害\n\n**何が起きたか**\nセキュリティ企業Sysdigは5月30日、LLMエージェントが人間のオペレーターなしに完全自律でシステムに侵入し、データを窃取した初の実例を公開した。攻撃は5月10日に観測され、露出していたMarimo（Pythonのノートブックサーバーフレームワーク）のCVE-2026-39987を起点に、AWS Secrets Managerを経由してバスチョンホストへ横断、内部PostgreSQLデータベースを全ダンプした。\n\n**なぜ重要か**\n攻撃フロー全体がわずか22秒・11 IPアドレスへの12回のAPI呼び出しで完結し、DBダンプ自体は2分以内に終わった。従来の侵害がハンターの「滞在時間（dwell time）」を前提としたのに対し、AI自律エージェントはこの概念を根本から崩す。攻撃がツールループとして実行されるなら、防御もAI速度で動かなければ間に合わない。Sysdigが「AI vs AIサイバーセキュリティ」と呼ぶ新フェーズの到来を示す事例として、セキュリティコミュニティで広く参照されている。\n\n出典: [TechTimes / Sysdig Report](https://www.techtimes.com/articles/317423/20260530/ai-vs-ai-cybersecurity-sysdig-documents-first-llm-agent-intrusion-wild.htm) (2026-05-30公開)\n\n---\n\n### 2. GitHub Copilot、6月1日より使用量ベース課金へ完全移行\n\n**何が起きたか**\nMicrosoftのGitHub Copilotが6月1日から全プランで使用量ベース課金に移行した。「プレミアムリクエスト」の概念は廃止され、AI Credits（1クレジット＝$0.01）に一本化。コード補完・次の編集提案のみ引き続き無制限だが、チャット・エージェントモード・マルチファイル編集など他全機能がトークン消費量に応じて課金される。プランの月額 AI Credits 上限：Copilot Pro+ $39分・Business $19/ユーザー・Enterprise $39/ユーザー。\n\n**なぜ重要か**\n激増する推論コストに対して定額モデルが持続不可能と判断されたことを意味し、今後の開発コスト試算が根本的に変わる。実際、「1日で月分のクレジットを使い切った」という報告がRedditやHackerNewsで相次いでおり、The Registerは「怒れる開発者が他社移行を宣言」と報じた。ローカルLLMやself-hostedコード補完（Continue.dev等）への関心が再燃する契機になりうる。\n\n出典: [GitHub Blog](https://github.blog/news-insights/company-news/github-copilot-is-moving-to-usage-based-billing/) (2026-06-01公開)\n\n---\n\n### 3. Qwen 3.7 Plus GA：$0.40/1Mトークンのマルチモーダルエージェントモデル\n\n**何が起きたか**\nAlibabaのQwen Teamが6月1日、Qwen 3.7 Plusを正式GA（一般公開）した。テキスト・画像・動画を入力として受け付けるマルチモーダルエージェントモデルで、コンテキスト長1Mトークン。価格は入力$0.40・出力$1.60 per 1Mトークンで、兄弟モデルQwen 3.7 Maxの約6分の1。\n\n**なぜ重要か**\nGUIエージェントのベンチマークScreenSpot Proで79.0を記録し、GPT-5.4（67.4）・Claude Opus 4.6（49.5）を上回った。Terminal-Bench 2.1も70.3と、CLIエージェントとしての実用性が高い。OSSウェイトは非公開のAPIのみだが、コスト対性能の観点でローカル環境での自動化やセキュリティツールのオーケストレーションに使えるモデルとして注目される。AIME 2025では思考モードで14/15問正解（113秒/問）。\n\n出典: [Digital Applied / Qwen 3.7 Plus GA](https://www.digitalapplied.com/blog/qwen-3-7-plus-alibaba-multimodal-agent-model-2026-release) (2026-06-01公開)\n\n---\n\n### 4. Microsoft Build 2026：AIエージェントへのOS・セキュリティ統合を発表\n\n**何が起きたか**\n6月2日のMicrosoft Build 2026で、AIエージェントをOS・エンタープライズ環境に安全に統合するための機能群が発表された。主要な発表は「Windows Platform Security for AI Agents」（エージェントへのOS級アイデンティティ付与とメモリ分離）とAgent 365 SDKのGA（オブザーバビリティ・アクセス制御・コンプライアンス施行を開発ワークフローに直接組み込み可能）の2点。\n\n**なぜ重要か**\nAIエージェントが「一つのプロセス・一つの権限」で動作する現状の問題点──コンテキスト汚染・権限昇格・サービス間横断──に対して、OSレベルの分離と監査を持ち込む試みとして技術的に注目される。Linuxエコシステムでの対応（SELinux/seccompによるエージェントプロセス制約、eBPFでの挙動監視）との比較でアーキテクチャ議論が活発になっている。\n\n出典: [Microsoft Security Blog – Build 2026](https://www.microsoft.com/en-us/security/blog/2026/06/02/microsoft-build-2026-securing-code-agents-and-models-across-the-development-lifecycle/) (2026-06-02公開)\n\n---\n\n## 📄 今週の注目論文\n\n### 1. エンタープライズSaaS統合に対するLLMエージェントの動的レッドチーミング / AgentRedBench: Dynamic Redteaming and Integration-Aware Defense for LLM Agents over SaaS Integrations\n\n**著者・情報**\nHiskias Dingeto, William Leeney（StackOne Technologies）｜arXiv:2606.02240｜2026-06-01（v2:06-02）\n\n**3行サマリー**\n- **Problem**: ツール使用エージェントはGmail・Salesforce・Jiraなど第三者SaaS統合のレスポンスをそのまま文脈に取り込む。その内容はユーザーも開発者も制御できず、間接プロンプトインジェクションの経路になる\n- **Method**: 24種のエンタープライズ統合・5攻撃タイプにわたる215のサブタスク認可シナリオを動的に生成するレッドチームベンチマークを構築。各シナリオはLLMが自動生成するため同一ペイロードの繰り返しを避ける\n- **Finding**: ガードなし時の攻撃成功率（ASR）は Claude Sonnet 4.6が32%（最良）〜Gemini 3 Flashが81%（最悪）。既存のオープンソースガードはチャットスタイルデータで訓練されており、ツールレスポンス形式のペイロードに有効でないことが判明\n\n**読みどころ**\n実稼働エージェントシステム（MCP対応サービス・n8nワークフロー等）に直結した攻撃面を初めて体系的にベンチマーク化した点が新しい。特に「モデルを変えても劇的には改善しない」という知見は、アーキテクチャレベルの対策（ツールレスポンスの分離実行・最小権限設計）の必要性を強く示唆する。\n\n出典: [arXiv:2606.02240](https://arxiv.org/abs/2606.02240)\n\n---\n\n### 2. 認証情報窃取をアクティベーションで検知する / Caught in the Act(ivation): Toward Pre-Output and Multi-Turn Detection of Credential Exfiltration by LLM Agents\n\n**著者・情報**\nKargi Chauhan, Pratibha Revankar｜arXiv:2606.04141｜2026-06-02\n\n**3行サマリー**\n- **Problem**: LLMエージェントは外部コンテンツ（メール本文・ドキュメント）と認証情報（APIキー・パスワード）を同一コンテキストウィンドウに配置する。間接インジェクションはこの構造を悪用して認証情報をexfilするよう誘導できる\n- **Method**: ①出力トークン生成前にアクティベーション探索で「認証情報へのアクセス意図」を検知するプローブ、②フォーマット固定分割共形予測（conformal prediction）で調整したハニートークン、③多ターンにわたる情報漏洩予算の累積追跡、の3防御を組み合わせ\n- **Finding**: オープンウェイトモデルでのアクティベーション特徴は、ホールドアウトのエンコーディング変換（Base64・ROT13等）下でも良好な精度で攻撃と正常を分離。単ターン検知が見逃す多ターン分割exfilも累積追跡で検出\n\n**読みどころ**\n「出力が出る前に検知する」という方向性が実用的に重要。ファイアウォール的なpost-hoc検査ではなく、モデルの内部状態（アクティベーション）を使うアプローチはローカルLLM環境でも実装可能であり、セキュリティ研究者には試す価値がある。ハニートークン生成のconformal predictionによる誤検知率校正の節は読み応えあり。\n\n出典: [arXiv:2606.04141](https://arxiv.org/abs/2606.04141)\n\n---\n\n### 3. 損失あり圧縮を損失なし推論に変える / VeriCache: Turning Lossy KV Cache into Lossless LLM Inference\n\n**著者・情報**\narXiv:2605.17613｜2026年5月（vLLM・LMCache実装）\n\n**3行サマリー**\n- **Problem**: KVキャッシュ圧縮（トークンドロップ・量子化）はメモリを大幅に削減するが本質的に損失あり。短い出力では影響軽微でも長い出力では累積誤差が拡大し、特にコード生成・ツール呼び出しで壊滅的な出力崩壊が起きる\n- **Method**: 圧縮KVキャッシュで候補トークンをドラフトし、フルKVキャッシュで検証するspeculative-decoding的フレームワーク。vLLM（サービングエンジン）とLMCache（KVキャッシュ永続化・転送レイヤー）の間に薄いレイヤーとして挿入\n- **Finding**: 既存の損失あり圧縮手法の上にかぶせるだけで、フルKVキャッシュと同一出力を保証しつつ、高いデコードスループットを維持できることを実証\n\n**読みどころ**\nローカルLLM運用で「長い会話コンテキストをGPUメモリに乗せたい」という課題に直接刺さる論文。vLLMベースの環境にプラグインとして追加できる設計で、既存の量子化圧縮（FP8 KV等）と組み合わせて使える。エージェントのロングランセッションやRAGパイプラインでの品質保証に有効。\n\n出典: [arXiv:2605.17613](https://arxiv.org/abs/2605.17613)\n\n---\n\n## 💡 今週のひとことインサイト\n\n### AIエージェントが崩した「時間」という防御の前提\n\nSysdigが記録した攻撃は、セキュリティエンジニアリングの根底にある前提を一つ壊した。「攻撃者には時間がかかる」という前提だ。\n\n従来のインシデント対応はdwell timeの存在を前提とする。侵入→発見→封じ込めのサイクルが数時間〜数日あるから、SOCは監視し、アラートをトリアージし、対応できる。ところがLLMエージェントによる攻撃は22秒で侵入フェーズを終え、2分でDB全体を外に出した。MITRE ATT\u0026CKのステップが高速でループし、アナリストが画面を見た時には終わっている。\n\n面白いのはその対称性だ。AgentRedBenchとCaught in the Act(ivation)の2本の論文が示す防御の方向性も、アクティベーション探索・動的ベンチマーク・累積追跡など、すべてリアルタイム・自動化を前提としている。Microsoftが「Windows Platform Security for AI Agents」でOS級の分離を持ち込もうとしているのも同じ文脈だ。\n\nLinux視点で言えば、これはeBPFとseccompの出番が一段と重要になる転換点に見える。エージェントプロセスのsyscall・ネットワーク・ファイルアクセスをリアルタイムで制約する層が、AI時代のセキュリティの基礎インフラになるかもしれない。\n\n---";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
