<script>
const md = "十分な情報が集まりました。日本語のダイジェストを作成します。\n\n---\n\n## 🤖 今週のAI最新動向\n\n### 1. Nvidia × Microsoft、RTX Sparkを共同発表——Windows PCが120Bパラメータモデルをローカル実行\n\n**何が起きたか**\nNvidiaが2026年6月1日、1ペタフロップのAI演算能力を持つ新チップ「RTX Spark」を発表。BlackwellアーキテクチャのRTX GPUと20コアGrace CPUを一体化したSoCで、Microsoft Build 2026（6月2〜3日）と連動した発表となった。\n\n**なぜ重要か**\n最大128GBユニファイドメモリを搭載し、120Bパラメータ規模のLLMを**1Mトークンコンテキストでローカル実行**できると明示されている点が画期的だ。これまでA100/H100クラスのサーバGPUが必要だった推論タスクがコンシューマ機で完結するようになり、企業ネットワーク外にデータを出せないセキュリティ要件のユースケースに直接刺さる。4K AIビデオ生成や12K映像編集にも対応。秋にASUS・Dell・HP・Lenovo・Microsoft Surface・MSIから発売予定。\n\n**数値**\n- AI演算：1 PFLOPS\n- メモリ：最大128GB（統合）\n- 対応モデル：120Bパラメータ / 1Mトークンコンテキスト\n\n出典: [NVIDIA Newsroom](https://nvidianews.nvidia.com/news/nvidia-microsoft-windows-pcs-agents-rtx-spark) (2026-06-01公開)、[BanklessTimes](https://www.banklesstimes.com/articles/2026/06/01/nvidia-microsoft-partner-to-power-ai-pcs-with-1-petaflop-rtx-spark-launching-this-fall/) (2026-06-01公開)\n\n---\n\n### 2. MicrosoftがMAIファミリー7モデルを一挙発表——コーディング・推論で脱OpenAI依存を鮮明に\n\n**何が起きたか**\nMicrosoft Build 2026（6月2〜3日）で、同社が社内開発した「MAIファミリー」7モデルが公開された。コーディング特化の**MAI-Code-1-Flash**（5Bパラメータ、コンテキスト256K）と、推論特化の**MAI-Thinking-1**が目玉。\n\n**なぜ重要か**\nMAI-Code-1-Flashは、Claude Haiku 4.5に対しSWE-Bench Proで+16ポイント（51.2% vs 35.2%）、IFベンチで+28.9ポイントとリードし、GitHub Copilotの本番ハーネスに対して直接トレーニングされたモデルとして実開発ワークフローへの親和性を訴求する。「クリーンなライセンスデータのみ使用」という主張も特徴的で、企業法務リスクを意識した差別化といえる。MAI-Thinking-1はClaude Opus 4.6とコーディングベンチで同等と評価された。また同社はOpenAIへの依存を構造的に下げる戦略シフトを今回で明確にしており、MSのAIコスト構造が今後変わり得る。\n\n**数値**\n- MAI-Code-1-Flash：SWE-Bench Verified 85.8% adjusted accuracy、SWE-Bench Pro 51.2%、トークン効率+60%比較モデル対比、コンテキスト256K\n- 対応プラットフォーム：GitHub Copilot（VS Code model picker）でGA\n\n出典: [Microsoft AI公式ブログ](https://microsoft.ai/news/introducingmai-code-1-flash/) (2026-06-02公開)、[CNBC](https://www.cnbc.com/2026/06/02/microsoft-unveils-new-ai-models-lessen-reliance-on-openai-lower-costs.html) (2026-06-02公開)\n\n---\n\n### 3. Anthropicが上場申請を機密提出——$965B評価で史上最大級のAI IPOへ\n\n**何が起きたか**\nAnthropicはSECに対してIPO目論見書を機密提出し（2026年6月1日）、直前の$65B Series H調達後の企業評価額は**約$9,650億（約140兆円）**。2026年10月の上場を目標とする。\n\n**なぜ重要か**\n2026年5月時点の月次収益ランレートは$47B（年換算）で、OpenAIの約$25Bを上回ったと報じられている。Claude APIに依存するエンタープライズ向けセキュリティツール・コードレビュー製品は、上場後に料金体系・利用規約・APIポリシーが株主プレッシャーの影響を受けうることを念頭に置く必要がある。AIインフラの中核ベンダーが公開市場の評価に縛られるフェーズに突入したことは、依存リスクとして改めて評価すべきだ。\n\n**数値**\n- 評価額：$965B（Series H完了後）\n- 調達額：$65B（Series H）\n- 月次収益ランレート：~$47B（2026年5月時点）\n- 想定上場時期：2026年10月\n\n出典: [Fortune](https://fortune.com/2026/06/01/anthropic-confidentially-files-ipo-965-billion-valuation/) (2026-06-01公開)、[CNBC](https://www.cnbc.com/2026/06/01/anthropic-ipo-s1-prospectus.html) (2026-06-01公開)、[TechCrunch](https://techcrunch.com/2026/06/04/ahead-of-its-ipo-anthropics-daniela-amodei-shrugs-off-doubts-about-ais-returns/) (2026-06-04公開)\n\n---\n\n## 📄 今週の注目論文\n\n### 1. 検索エージェントが\"カンニング\"している——ベンチマーク汚染の実態計測\n\n**タイトル：** Search-Time Contamination in Deep Research Agents: Measuring Performance Inflation in Public Benchmark Evaluation（深部リサーチエージェントにおける検索時汚染——公開ベンチマーク評価でのスコア水増しの計測）\n\n**著者：** Yongjie Wang ほか（Alibaba-NTU Global e-Sustainability CorpLab / Tongqi Lab, Alibaba Group）　arXiv:2606.05241　**2026-06-03公開**\n\n**3行サマリー**\n- **Problem：** 推論時にWeb検索を行うDeep Researchエージェントは、ベンチマーク問題の答えをそのまま検索できてしまう「検索時汚染（STC）」が起きうる。\n- **Method：** 6つの公開ベンチマークで、①Benchmark Metadata Leakage、②Question-Context Leakage、③Explicit Answer Leakageの3汚染タイプを定義し、検出アルゴリズムを設計・評価。\n- **Finding：** STCは広範に観測され、スコアを最大**4ポイント**過剰に引き上げることが判明。\n\n**読みどころ**\n「リーダーボードが信用できない」という問題は以前から言われてきたが、本論文はWebアクセス可能なエージェントに対してSTCを**定量計測するフレームワーク**を初めて提示した。セキュリティ研究者の観点では、エージェントが評価時に外部情報をどこまで利用しているかを監査するロジックは、本番環境でのエージェント行動監視にも応用できる。組織内でLLMエージェントのベンチ評価を行っている実務者は今すぐ読む価値あり。\n\n出典: [arxiv.org/abs/2606.05241](https://arxiv.org/abs/2606.05241)\n\n---\n\n### 2. AI駆動SOAR基盤へのレッドチーミング——LLM＋強化学習で自律攻撃キャンペーンを生成\n\n**タイトル：** A Red Teaming Framework for Evaluating Robustness of AI-enabled Security Orchestration, Automation, and Response Systems（AI有効化SOARシステムの堅牢性評価のためのレッドチーミングフレームワーク）\n\n**著者：** Ayan Javeed Shaikh（Indiana University Bloomington）、Nathaniel D. Bastian（United States Military Academy, West Point）、Ankit Shah（Indiana University Bloomington）　arXiv:2605.17075　**2026-05-16公開**\n\n**3行サマリー**\n- **Problem：** AIベースのSOARシステムは自律型エージェントで構成されるが、適応的攻撃者への耐性が未検証のまま実装が進んでいる。\n- **Method：** LLMベースのプランナー（戦略立案）とRLコントローラ（戦術実行）を組み合わせた階層型アーキテクチャで、キルチェーンに整合した報酬整形を持つ自律攻撃エージェントを構築。企業ネットワーク環境のシミュレータで評価。\n- **Finding：** 提案手法はSOARの防御エージェントに対して多段階攻撃キャンペーンを生成し、静的ルールベース防御を体系的に突破できることを示した。\n\n**読みどころ**\nSOCやSIEMにLLMエージェントを組み込む動きが加速するなか、その防御ロジック自体がLLMベースの攻撃エージェントにどれだけ脆弱かを問う研究は本論文が先駆けに近い。West Point（米陸軍士官学校）が著者に含まれる点も注目で、軍事・国防文脈での実装リスク評価を意識した設計になっている。SOARベンダーや運用チームが防御ロジックの検証指標として活用できる実践的な設計論。\n\n出典: [arxiv.org/abs/2605.17075](https://arxiv.org/abs/2605.17075)\n\n---\n\n### 3. KVキャッシュ共有のサイドチャネルを塞ぐ——プライバシー対応キャッシュプルーニング\n\n**タイトル：** CachePrune: Privacy-Aware and Fine-Grained KV Cache Sharing for Efficient LLM Inference（プライバシー対応かつ粒度の細かいKVキャッシュ共有による効率的LLM推論）\n\n**著者：** 著者詳細はarXiv原典参照　arXiv:2605.23640　**2026-05-22公開**\n\n**3行サマリー**\n- **Problem：** LLM推論サーバでのKVキャッシュのクロスユーザ共有は、キャッシュヒットのタイミングを観測するサイドチャネルで他ユーザのプロンプトを推定できる脆弱性を持つ。既存の防御はキャッシュ共有を完全無効化するため性能が大きく劣化する。\n- **Method：** プロンプトの感度を動的に検出し、プライバシー非関連セグメント（システムプロンプト・公開情報）のみをキャッシュ共有対象とするトークンレベルの選択的共有機構CachePruneを提案。\n- **Finding：** 感度の高いセグメントを除外しつつ、公開セグメントの再利用を保持することで、セキュリティを維持したまま実質的なキャッシュ再利用率を達成。\n\n**読みどころ**\nvLLMやSGLangなど本番LLM推論スタックでのKVキャッシュ共有は今や標準だが、マルチテナント環境でのプライバシーリスクは軽視されがちだった。本論文はその攻撃面を明文化し、かつ実用的な軽減策を提示している。ローカルLLMを複数ユーザで共有するプライベートデプロイを検討しているLinux/セキュリティエンジニアにとって、設計段階で参照すべき内容。\n\n出典: [arxiv.org/abs/2605.23640](https://arxiv.org/abs/2605.23640)\n\n---\n\n## 💡 今週のひとことインサイト\n\n### ベンチマークという\"共有の幻想\"が崩れていく\n\n今週最も本質的だと思った発見は、arXiv:2606.05241の検索時汚染（STC）の話だ。Web検索能力を持つエージェントをベンチマークで評価すると、そのエージェントは「問題の答えを検索して返す」という行為自体が評価時に発生しうる。スコアが最大4ポイント水増しされるという数字は一見小さく聞こえるが、モデル間の差がしばしば1〜2ポイントで競われる今の文脈では致命的なノイズだ。\n\nこれはLinux/セキュリティ畑の人間には既視感がある話で、要するに「テスト環境と本番環境の分離ができていない」問題の亜種だ。CIのテストがプロダクションDBに繋がっていた、あるいは評価スクリプトが機密データをprintしていた——そういう「見た目は通るが評価自体が汚染されている」問題と同質だ。AIの評価インフラは、セキュアな評価のために昔ながらのサンドボックスの原則——外部アクセスの制御、入出力の監査、環境の再現性——を真剣に適用する必要がある段階に来ている。RTX SparkでローカルLLMが現実解になり、SOARにLLMが組み込まれていく今、「モデルを信用する前に評価を信用できるか」を問い直すことが急務だ。\n\n---";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
