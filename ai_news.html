<script>
const md = "情報が揃いました。ダイジェストを生成します。\n\n---\n\n## 🤖 今週のAI最新動向\n\n### 1. Claude Opus 4.8 リリース — SWE-bench ProとUSAMO数学で前世代から大跳躍\n\n**何が起きたか**\nAnthropicが5月28日にClaude Opus 4.8をリリース。SWE-bench Verified 88.6%（前版比 +1.0pp）、SWE-bench Pro 69.2%（+4.9pp）、USAMO 2026数学では96.7%（+27.4pp）を記録した。\n\n**なぜ重要か / 何が変わるか**\n特にUSAMOスコアの+27.4ppという跳躍は、単なる漸進的改善ではなく推論品質の質的変化を示唆する。標準価格は入力$5/出力$25（per 1Mトークン）で据え置きつつ、新設のFastモードは2.5倍速で$10/$50と、Opus 4.7 Fast比3倍のコスト効率を実現。コード生成エージェントのコスト計算が再度変わる。\n\n出典: [Build Fast With AI](https://www.buildfastwithai.com/blogs/ai-news-today-may-28-2026) (2026-05-28公開)\n\n---\n\n### 2. NVIDIA Nemotron 3 Ultra — 550B MoEでUS産オープンウェイト最高峰、6/4出荷\n\n**何が起きたか**\nNVIDIAがComputex 2026（6月1日）でNemotron 3 Ultraを発表、6月4日出荷予定。総パラメータ550B、Mixture-of-Experts設計でアクティブパラメータは55B。コンテキスト長1Mトークン。HuggingFace / ModelScope / OpenRouter / NVIDIA NIMで配布。\n\n**なぜ重要か / 何が変わるか**\npre-release DeepInfraエンドポイントで300+ tok/sを計測しており、中国製ライバル（Qwen3系など）比3〜6倍高速。Intelligence Index 48でUS産オープンウェイト1位を主張するが、「Qwen3-235Bには及ばない」との評価もある（The Decoder）。モデルウェイトだけでなく**学習レシピとデータの一部も公開**されており、ローカル推論研究者・企業ファインチューニングにとって重要なリソースとなる。\n\n出典: [Decrypt](https://decrypt.co/369689/nvidia-open-ai-model-nemotron-3-ultra) (2026-06-01公開) / [Artificial Analysis](https://artificialanalysis.ai/articles/nvidia-nemotron-3-ultra-launch-announced) (2026-06-01公開)\n\n---\n\n### 3. Anthropic、SEC へ機密IPO申請 — バリュエーション$965B、兆ドル上場を視野に\n\n**何が起きたか**\nAnthropicがSECへ機密S-1申請書を提出（6月1日）。直近の$65B調達ラウンドでバリュエーションは$965Bに到達。2026年5月時点の年間収益ランレートは$47B（前年$10B比約5倍成長）。OpenAIより先にIPOへ踏み切った。\n\n**なぜ重要か / 何が変わるか**\n$1T規模のIPOが実現すれば、サウジアラムコ・SpaceXに次ぐ史上有数の規模。AI純粋プレイとして初の公開市場デビューであり、AI産業の資本市場への本格統合を象徴する。Google・Amazonが大株主として名を連ねる中、上場後のガバナンス・独立性・研究方針への影響も注目点。株数・価格はSECレビュー完了後に確定予定。\n\n出典: [CNBC](https://www.cnbc.com/2026/06/01/anthropic-ipo-s1-prospectus.html) (2026-06-01公開) / [NPR](https://www.npr.org/2026/06/01/nx-s1-5843199/anthropic-ipo-filing-ai-large) (2026-06-01公開)\n\n---\n\n### 4. Microsoft Build 2026 — 「エージェントこそ新しいOS」、WindowsをAIエージェント基盤に再定義\n\n**何が起きたか**\n6月2日開幕のMicrosoft Build 2026でSatya Nadellaが「エージェントこそ新しいOSである」と宣言。目玉はOffice 365 Copilot Agent Mode（Word/Excel/Teams/OutlookにAIエージェントを常駐）と**Windows Local AI**（6月9日提供のKB5039239に同梱）。Snapdragon X Elite / Intel Lunar Lake / AMD XDNA搭載PCのNPUを利用したオフラインエージェント実行を実現。\n\n**なぜ重要か / 何が変わるか**\nクラウド不要でローカルNPU上にエージェントを展開できる環境が一般的なWindows 11マシンに届く。GitHub CopilotはAutocompleteからAutonomous Coding Agentへ昇格し、Azure AI Foundryに企業向けエージェントオーケストレーションダッシュボードも追加。セキュリティ観点では、エージェントがローカルファイルシステムやシェルへアクセスする攻撃面（attack surface）の急拡大が懸念材料となる。\n\n出典: [Visual Studio Magazine](https://visualstudiomagazine.com/articles/2026/06/02/at-build-2026-microsoft-sets-up-windows-as-an-os-for-ai-agents.aspx) (2026-06-02公開)\n\n---\n\n## 📄 今週の注目論文\n\n### 1. プロンプトインジェクションに「永遠に勝てない」かもしれない — 不可能性定理の提案\n\n**タイトル**：AIエージェントは常にプロンプトインジェクションに陥る可能性がある / *AI Agents May Always Fall for Prompt Injections*\n\n**著者**：Sahar Abdelnabi, Eugene Bagdasarian / arXiv:2605.17634 / 2026年5月\n\n**3行サマリー**\n- **Problem**：プロンプトインジェクション対策の主流（データと命令の分離）が、文脈操作型の攻撃を検出できず、かつ正当な行動まで遮断するトレードオフを持つ\n- **Method**：プライバシー理論「Contextual Integrity（CI）」を用いてプロンプトインジェクションを再定式化し、防御の限界を形式的に分析\n- **Finding**：攻撃者は「文脈上正当に見える悪意ある命令」を常に構築できるという**不可能性結果**を導出。完全な防御は理論的に存在しない\n\n**読みどころ**\n「データと命令を分離すれば安全」という従来の防御直観に正面から反論する。CIの枠組みは新鮮で、守りを強化するほど正当な操作まで止まるという根本的トレードオフを数学的に示した点が鋭い。AIエージェントの信頼境界設計やThreat Modelingを行うセキュリティエンジニアにとって、前提から問い直す必読論文。\n\n出典: [arXiv:2605.17634](https://arxiv.org/abs/2605.17634)\n\n---\n\n### 2. エージェント型AIの攻撃面を7層で体系化 — セキュリティ実務者のための設計地図\n\n**タイトル**：LLMベースAIエージェントにおけるセキュリティ脅威と防御の体系的サーベイ：階層的攻撃面フレームワーク / *A Systematic Survey of Security Threats and Defenses in LLM-Based AI Agents: A Layered Attack Surface Framework*\n\n**著者**：Kexin Chu / arXiv:2604.23338 v2 / 2026年5月6日改訂\n\n**3行サマリー**\n- **Problem**：従来のLLMセキュリティ研究はプロンプト層のみを対象にしており、記憶・ツール実行・マルチエージェント協調など新たなアーキテクチャ全体を俯瞰した分析が不足\n- **Method**：「Layered Attack Surface Model（LASM）」を提案。Foundation / Cognitive / Memory / Tool Execution / Multi-Agent Coordination / Ecosystem / Governanceの7層に加え、攻撃の時間軸（瞬間的・セッション内・セッション横断・スタック内累積）の4クラスを定義\n- **Finding**：「セッション横断的な記憶汚染」や「委任権限の悪用」など、従来のCVEベース分類では見えなかった攻撃パターンが多数存在することを示す\n\n**読みどころ**\nペネトレーションテスターやAIシステムのアーキテクト、Threat Modeling担当者にとって実践的なチェックリストとして使える構造になっている。エージェントのメモリに跨るサプライチェーン攻撃の整理は特にユニーク。LASM各層を自社システムにマッピングするだけで脅威の見落としが防げる。\n\n出典: [arXiv:2604.23338](https://arxiv.org/abs/2604.23338)\n\n---\n\n### 3. コードがエージェントの「ハーネス」になる — 実行可能・検証可能・状態保持の三拍子\n\n**タイトル**：エージェントハーネスとしてのコード / *Code as Agent Harness*\n\n**著者**：Xuying Ning 他 / arXiv:2605.18747 / 2026年5月18日\n\n**3行サマリー**\n- **Problem**：LLMがコードを「出力する」段階から「コードの中で推論・行動・環境モデリングを行う」段階への移行が起きているが、この転換を体系化した研究が不足\n- **Method**：ハーネスインターフェース（推論・行動・環境モデリング）とハーネスメカニズム（プランニング・メモリ・ツール使用・フィードバック駆動制御・最適化）の二層でサーベイを構成\n- **Finding**：コードを実行可能な検証基盤として用いることで、エージェントの信頼性と長期タスク遂行能力が大幅に向上するパターンが確立されつつある\n\n**読みどころ**\n「コードを書くLLM」から「コードで動くエージェント」への概念転換を整理した論文。llama.cpp / vLLMなどローカル推論環境での自律エージェント構築に取り組む実務者にとって、アーキテクチャ設計の参考になる。コードを信頼できない環境（サンドボックスなしのローカルシェル等）で実行する際のリスク設計にも示唆がある。\n\n出典: [arXiv:2605.18747](https://arxiv.org/abs/2605.18747)\n\n---\n\n## 💡 今週のひとことインサイト\n\n今週最も印象的だったのは、二つのニュースが示す根本的な矛盾だ。一方ではNVIDIA Nemotron 3 Ultraがオープンウェイトで降りてきて、ローカルのvLLMやllama.cppで走る550B MoEエージェントが現実になりつつある。Windowsのローカル推論ランタイムも加わり、シェルアクセス・ファイルシステム・ネットワーク呼び出しを自律的にこなすエージェントが手元に届く時代が近い。他方、arXiv 2605.17634は「プロンプトインジェクションに対する完全な防御は理論的に存在しない」という不可能性を示した。攻撃者は常に「文脈上正当に見える悪意ある命令」を構築できる。守りを強めれば正当な操作まで止まる——このトレードオフは回避できない。つまり私たちは今、強力なローカルエージェントと、完全な防御が不可能な攻撃手法を同時に手に入れようとしている。Linuxシステムのsudo権限をエージェントに渡せるか。その問いへの答えは、ベンチマークスコアからは出てこない。\n\n---\n\nSources:\n- [AI News Today - May 28, 2026](https://www.buildfastwithai.com/blogs/ai-news-today-may-28-2026)\n- [Nvidia Releases Its Best Open AI Model Yet](https://decrypt.co/369689/nvidia-open-ai-model-nemotron-3-ultra)\n- [Nemotron 3 Ultra launch announced](https://artificialanalysis.ai/articles/nvidia-nemotron-3-ultra-launch-announced)\n- [Anthropic confidentially files IPO prospectus with SEC](https://www.cnbc.com/2026/06/01/anthropic-ipo-s1-prospectus.html)\n- [AI giant Anthropic prepares to sell stock to the public](https://www.npr.org/2026/06/01/nx-s1-5843199/anthropic-ipo-filing-ai-large)\n- [At Build 2026, Microsoft Sets Up Windows as an OS for AI Agents](https://visualstudiomagazine.com/articles/2026/06/02/at-build-2026-microsoft-sets-up-windows-as-an-os-for-ai-agents.aspx)\n- [arXiv:2605.17634 - AI Agents May Always Fall for Prompt Injections](https://arxiv.org/abs/2605.17634)\n- [arXiv:2604.23338 - Systematic Survey of Security Threats in LLM-Based AI Agents](https://arxiv.org/abs/2604.23338)\n- [arXiv:2605.18747 - Code as Agent Harness](https://arxiv.org/abs/2605.18747)";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
