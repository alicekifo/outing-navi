<script>
const md = "十分な情報が集まりました。日本語読み物を生成します。\n\n---\n\n## 🤖 今週のAI最新動向\n\n### 1. Anthropic「Project Glasswing」：Claude Mythos が2.3万件の脆弱性を発見\n\nAnthropicはAIモデル **Claude Mythos Preview** を使った大規模なソフトウェア脆弱性探索プロジェクト「Glasswing」の進捗を発表。1,000以上のオープンソースプロジェクトをスキャンし、**23,019件**の高深刻度・致命的脆弱性を検出した。参加パートナーはAWS、Apple、Cisco、Google、Microsoft、Linux Foundationなど業界の主要プレイヤーが揃う。\n\n注目すべきは、wolfSSL（数十億デバイスで使われる暗号ライブラリ）に対する攻撃において、Mythos が証明書偽造エクスプロイトを自律的に構築したこと。AIが「脆弱性を見つけるだけ」でなく「攻撃コードまで書ける」フェーズに入った。一方で致命的な課題も露呈：**発見された脆弱性のうちパッチが当たったのは1%未満**。「見つける速度」と「直す速度」の非対称性がサイバーセキュリティの新たな難題として浮上している。\n\n[ソース](https://www.helpnetsecurity.com/2026/05/26/anthropic-project-glasswing-update/) | [Anthropic公式](https://www.anthropic.com/research/glasswing-initial-update)\n\n---\n\n### 2. OpenAI「GPT-5.5 Instant」をChatGPTのデフォルトに刷新、Gmail連携メモリも解禁\n\n5月5日、OpenAIはChatGPTのデフォルトモデルを **GPT-5.5 Instant** に切り替えた。主な改善点は幻覚の **52.5%削減**、高リスクプロンプトでの事実誤りを37.3%減少させたことと、メモリ機能の大幅な強化。過去の会話、アップロードファイル、そして **Gmailとの連携**によって、ユーザーごとの文脈を横断的に参照して回答をパーソナライズできるようになった。\n\nこれは単なるモデル更新を超えた「AIアシスタントからAIパートナーへ」の転換点だ。ユーザーのメール・ドキュメント・過去の会話が一体化した記憶として機能することで、毎回ゼロから説明する手間が消える。同時にOpenAIはバリュエーション **8,520億ドル**で$1,220億の資金調達を完了し、下半期にもIPOの可能性があるとCFOが示唆している。\n\n[ソース](https://openai.com/index/gpt-5-5-instant/) | [詳細](https://www.thurrott.com/a-i/335724/openai-starts-rolling-out-new-gpt-5-5-instant-model-and-memory-sources-to-chatgpt-users)\n\n---\n\n### 3. Google I/O 2026：Gemini 3.5 Flash・Gemini Omni・Antigravity を発表\n\n5月19日のGoogle I/O 2026では、**Gemini 3.5 Flash**（大型フラグシップモデル並みの知能をFlash速度で提供、$1.50/$9/1Mトークン）と、動画を含む任意のモダリティを入力・出力できる **Gemini Omni** シリーズが登場した。また開発者向けには「エージェントを記述するのでなくエージェントに行動させる」コンセプトを掲げた **Antigravity** プラットフォームが発表され、Googleは「エージェントファースト」への本格移行を宣言した。\n\nコンシューマ向けには **Gemini Spark** が「質問に答えるアシスタント」から「実際に作業をやり遂げるパートナー」への変貌を象徴する目玉機能として登場。Chromeへの深い統合もあわせて発表され、リサーチ作業のタスク完了時間を25%削減したという実験結果も示された。\n\n[ソース](https://blog.google/innovation-and-ai/sundar-pichai-io-2026/) | [全発表まとめ](https://9to5google.com/2026/05/19/google-io-2026-news/)\n\n---\n\n### 4. Anthropic、初の四半期黒字を予測——ARRは1年で80倍に\n\nAnthropicは2026年Q2に **初の四半期営業黒字** を達成する見込みであると発表。Q1のARR（年間経常収益）は **$440億超**で、前年同期比80倍という驚異的な成長率を記録。年間$100万以上を支出する顧客が1,000社を超えた。現在 **$900億超**のバリュエーションで**$300億**の追加資金調達交渉中とも報じられている。\n\nOpenAIの$8,520億に対しAnthropicが$9,000億超を目指す構図は、AI産業における「二強時代」の確立を示唆する。スペースXとの$450億のGPUコンピューティング契約（月額$12.5億）も明らかになり、AIインフラ投資の規模感が改めて浮き彫りになった。\n\n[ソース](https://techdg.in/latest-ai-updates-may-2026-global-ai-news-trends/)\n\n---\n\n### 5. Meta「Avocado」モデル、GPT-5.5・Claude Opus 4.7に後れを取りリリース延期\n\nMetaの次世代モデル **Avocado** は内部テストでGPT-5.5やClaude Opus 4.7を下回る結果だったとして、Google I/Oに埋もれないよう **6月以降へのリリース延期**を検討中と伝えられている。一方でMetaはInstagram向けのエージェント型ショッピングツール **Hatch** を6月末までに内部テスト開始予定であることも判明。「モデル性能」よりも「ユースケース主導のエージェント」で差別化を図る戦略にシフトしている可能性がある。\n\n[ソース](https://the-decoder.com/google-and-meta-race-to-build-personal-ai-agents-as-anthropic-and-openai-pull-further-ahead/)\n\n---\n\n## 📄 今週の注目論文\n\n### 1. The Cognitive Divergence: AI Context Windows, Human Attention Decline, and the Delegation Feedback Loop\n**（認知の乖離：AIのコンテキスト拡張・人間の注意力低下・委任フィードバックループ）**\n\n- **著者・所属**：（複数著者） / arXiv:2603.26707 / 2026年3月\n- **3行サマリー**：LLMのコンテキストウィンドウが指数的に拡大する一方、人間の持続的注意力は長期的に収縮していることを定量的に示した。この2つのトレンドの交差が「委任フィードバックループ」を生む仮説を提唱。つまり「AIが賢くなるほど人間はAIに頼り、頼るほど人間の認知力はさらに衰える」という悪循環の構造を描いている。\n- **ポイント**：AIへの依存度が高まる現在、「道具としてのAI」の設計思想そのものを問い直す視点を提供する論文。エンジニアやプロダクトデザイナーが「ユーザー体験の最適化」を追求するとき、認知能力への長期影響を無視してよいのか、という問いを突きつける。\n\n[ソース](https://arxiv.org/pdf/2603.26707)\n\n---\n\n### 2. Behavioral Economics of AI: LLM Biases and Corrections\n**（AIの行動経済学：LLMにおけるバイアスと補正）**\n\n- **著者・所属**：（複数著者） / arXiv:2602.09362 / 2026年2月\n- **3行サマリー**：人間のバイアスを検証するために設計された実験群を、主要なLLMファミリー全世代にわたって横断的に実施。選好ベースのタスクではモデルが高性能化するほど「人間らしい」回答になる一方、信念ベースのタスクでは大規模な先進モデルほど**合理的な**回答をする傾向が判明。バイアスの模倣と合理性は、タスクの種類によって逆転するという複雑な構造が浮かび上がった。\n- **ポイント**：「LLMは人間のバイアスを引き継ぐ」という単純な主張への反証でもある。行動経済学的な意思決定支援ツールとしてAIを使う場合、どのタスクタイプで人間の判断を補完し、どこでは注意が必要かを設計に組み込む実践的指針になる。\n\n[ソース](https://arxiv.org/pdf/2602.09362)\n\n---\n\n### 3. Predicting Biased Human Decision-Making with Large Language Models in Conversational Settings\n**（会話設定における人間のバイアスある意思決定のLLMによる予測）**\n\n- **著者・所属**：Stephen Pilli, Vivek Nallur（University College Dublin） / arXiv:2601.11049 / 2026年1月\n- **3行サマリー**：「LLMは認知負荷がかかった状態での人間の偏った意思決定を予測できるか？」という問いを実験的に検証。GPT-4ファミリーは人間が示すバイアスパターンと負荷-バイアス相互作用を高精度で再現した。興味深いことに、GPT-5や一部のオープンソースモデルよりも**GPT-4の方が人間の行動に近い**という逆転現象も観察された。\n- **ポイント**：「モデルが大きければ人間らしい」という常識を覆す結果。AIが人間の心理シミュレーターとして機能しうることを示しており、行動変容インターフェースや意思決定支援ツールの設計に直接応用できる知見を含む。\n\n[ソース](https://arxiv.org/abs/2601.11049)\n\n---\n\n### 4. Cognitive Agency Surrender: Defending Epistemic Sovereignty via Scaffolded AI Friction\n**（認知エージェンシーの放棄：段階的AIフリクションによる認識論的主権の防衛）**\n\n- **著者・所属**：（複数著者） / arXiv:2603.21735 / 2026年3月\n- **3行サマリー**：生成AIの普及により、認知的外部化（cognitive offloading）が「認知エージェンシーの放棄」というリスクに転化しつつあると論じる。ゼロフリクションのAIインターフェースは人間の「認知的倹約（cognitive miserliness）」を利用し、深く考える機会を奪う。解決策として、視線の動き・瞳孔径・fNIRS計測・ドリフト拡散モデルを組み合わせた「意図的な摩擦」設計の計算的フレームワークを提案。\n- **ポイント**：UXの「摩擦を減らす」という定番原則が、AIとの共生においては逆効果になりうるという挑発的な主張。意図的に「考えさせる」設計が教育・医療・法律など高リスク領域のAIツールに不可欠だという実務的示唆を持つ。\n\n[ソース](https://arxiv.org/pdf/2603.21735)\n\n---\n\n## 💡 今週のひとことインサイト\n\nProject Glasswingの報告には、小さな数字が静かに埋め込まれていた。**「パッチが当たったのは1%未満」**。\n\nClaude Mythos は23,019件の重大脆弱性を発見したが、そのほぼ全てがまだ野放しのままだ。Anthropicは「脆弱性レポートを丁寧に届けた」と言うが、オープンソースのメンテナーたちはボランティアベースで動いており、届いたレポートを処理するリソースも時間もない。AIが「攻撃を構想するコスト」をゼロに近づけた今、「防御を実装するコスト」は何も変わっていない。\n\nこれは単なるオープンソースの人手不足問題ではない。知識の生産速度と、知識を実装する速度の**根本的な非対称性**だ。論文が読まれる速度より書かれる速度が速く、脆弱性が直される速度より見つかる速度が速く、法律が作られる速度よりモデルがリリースされる速度が速い。AIの時代に問われるのは「何ができるか」だけでなく、「できたことを社会として消化できるか」という問いなのかもしれない。\n\n---\n\n**Sources:**\n- [Anthropic Project Glasswing Update](https://www.helpnetsecurity.com/2026/05/26/anthropic-project-glasswing-update/)\n- [Project Glasswing 公式](https://www.anthropic.com/research/glasswing-initial-update)\n- [GPT-5.5 Instant リリース](https://openai.com/index/gpt-5-5-instant/)\n- [GPT-5.5 Instant 詳細レポート](https://www.thurrott.com/a-i/335724/openai-starts-rolling-out-new-gpt-5-5-instant-model-and-memory-sources-to-chatgpt-users)\n- [Google I/O 2026 基調講演](https://blog.google/innovation-and-ai/sundar-pichai-io-2026/)\n- [Google I/O 2026 全発表まとめ](https://9to5google.com/2026/05/19/google-io-2026-news/)\n- [AI May 2026 動向まとめ](https://techdg.in/latest-ai-updates-may-2026-global-ai-news-trends/)\n- [Meta vs OpenAI vs Anthropic エージェント競争](https://the-decoder.com/google-and-meta-race-to-build-personal-ai-agents-as-anthropic-and-openai-pull-further-ahead/)\n- [arXiv: The Cognitive Divergence](https://arxiv.org/pdf/2603.26707)\n- [arXiv: Behavioral Economics of AI](https://arxiv.org/pdf/2602.09362)\n- [arXiv: Predicting Biased Human Decision-Making](https://arxiv.org/abs/2601.11049)\n- [arXiv: Cognitive Agency Surrender](https://arxiv.org/pdf/2603.21735)";
document.getElementById('content').innerHTML = marked.parse(md);
