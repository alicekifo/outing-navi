<script>
const md = "# ⚽ サッカー移籍情報 \u0026 ワールドカップ2026 速報\n**2026年7月6日（月）**\n\n---\n\n## ✅ 完了した移籍（6/30〜7/6）\n\n\u003e **[R1確認]** 公式発表または信頼ソース2件以上で確認済み（TODAYより7日以内基準）。\n\n### 1. [[デンゼル・ダンフリース]]（DF, 30歳）インテル → [[レアル・マドリード]]【NEW】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €20M（契約解除金を早期発動、7/15以降は最大€30Mに上昇するため早撃ち） |\n| 契約 | 4年（〜2030年6月30日） |\n| 発表日 | 2026年7月5日 |\n\n- オランダ代表右SBとしてW杯参加中。トレント・アレクサンダー＝アーノルドと右SBのポジションを争う構図\n- **ソース**：Real Madrid公式、ESPN、Goal.com（S+A級複数）\n\n### 2. [[エリオット・アンダーソン]]（MF, 23歳）ノッティンガム・フォレスト → [[マンチェスター・シティ]]【継続掲載・7/4発表】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £116M（イングランド人選手史上最高額、シティ新記録） |\n\n- イングランド代表としてW杯参加中（本日ラウンド16でメキシコに勝利、8強入り）。正式な登録手続きは大会終了後\n- **ソース**：Sky Sports、Manchester City公式、ESPN（S+A級複数）\n\n### 3. マルコ・パレストラ（DF, 21歳）アタランタ → [[チェルシー]]【継続掲載・7/3発表】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | 最大£47M／契約7年（〜2033年） |\n\n- シャビ・アロンソ新監督体制の最初の完了移籍\n- **ソース**：Chelsea公式、Sky Sports、ESPN（S+A級複数）\n\n### 4. [[マテウス・フェルナンデス]]（MF, 21歳）ウェストハム → トッテナム【継続掲載・7/3発表】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £85M（当時クラブ史上最高額） |\n\n- **ソース**：Sky Sports、club公式（S+A級複数）\n\n### 5. [[ジェレミー・ジャケ]]（DF, 22歳）レンヌ → リヴァプール【継続掲載・7/1発表】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | 約£55-60M |\n\n- **ソース**：Liverpool公式、Sky Sports（S+A級複数）\n\n### 6. [[ゴンサロ・ラモス]]（FW, 25歳）パリ・サンジェルマン → [[ACミラン]]【NEW／6/30発表】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €74M＋アドオン（諸説あり、ミラン史上最高額） |\n| 契約 | 〜2031年6月30日 |\n\n- ルベン・アモリム監督が最優先で獲得を要望。ポルトガル代表としてW杯参加中に発表\n- **ソース**：AC Milan公式、PSG公式、ESPN（S+A級複数）\n\n---\n\n## ⚡ Here We Go!（合意ほぼ確実・正式発表待ち）\n\n### 1. サンドロ・トナリ（MF, 26歳）ニューカッスル → トッテナム【継続・進展】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £100M（£92.5M＋アドオン£7.5M、クラブ史上最高額） |\n| 契約 | 6年・週給275,000ポンド／背番号6 |\n\n- 契約締結済みで正式発表を残すのみと複数社が報道。デ・ゼルビ監督（同じイタリア人）の存在が決め手\n- **ソース**：Sky Sports（複数記事）、insidefutbol（2026-07-05）\n\n### 2. [[エデルソン]]（MF, 26歳）アタランタ → [[マンチェスター・ユナイテッド]]【継続・環境変化】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £34M＋最大£3.8M（アドオン） |\n| 契約 | 4年＋1年オプション |\n\n- 合意の骨格は維持（一部の「破談」報道をユナイテッドが明確否定）。ブラジル代表が本日W杯敗退したため、正式発表・渡英手続きが近く動く見込み\n- **ソース**：Sky Sports、ESPN、Goal.com（A級複数）\n\n### 3. [[ルカ・ヴシュコヴィッチ]]（DF, 19歳）トッテナム → ブライトン【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | 最大£50M（初期£46M＋アドオン、Spursに20%転売条項） |\n\n- メディカルは大会後に実施予定\n- **ソース**：Sky Sports、Goal.com、Fox Sports（A級複数、2026-07-04）\n\n### 4. ジェレミー・モンガ（FW, 16歳）レスター・シティ → [[マンチェスター・シティ]]【昇格：交渉中→HWG】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £12.5M（£10M＋アドオン£2.5M） |\n\n- アーセナルとの争奪を制し合意。**7/10に17歳の誕生日を迎えプロ契約に移行、正式にシティ加入**。マレスカ監督がレスター時代の縁で強く後押し\n- **ソース**：Sky Sports「Paper Talk」、FootballTransfers（Romano \"here we go\"報）、OneFootball（A級複数、2026-07-05）\n\n---\n\n## 🔵 交渉中・関心あり\n※本日、確度の高い新規交渉案件は該当なし（久保建英の件は「日本人選手の動向」欄参照）。\n\n---\n\n## 🇯🇵 日本人選手の動向\n\n### 遠藤航（リヴァプール）\n- 7/2にAXAトレーニングセンターでの練習再開を自身のSNSで報告（負傷回復途上）\n- **【前提の整理】** 遠藤は左足の負傷により大会開幕3日前にW杯を辞退し、同時に**国際試合からの引退（代表引退）を表明済み**（6月中旬）。日本代表通算73キャップ・4得点で代表キャリアを終えた。クラブ（リヴァプール）でのプレーは継続\n- **ソース**：ESPN、Al Jazeera（2026-06-12）、選手SNS（2026-07-02）\n\n### 久保建英（レアル・ソシエダ）△噂レベル\n- リヴァプールが契約解除金€60Mを上回る€80M規模の獲得意思を示していると英メディアが報道。遠藤も加入を歓迎する趣旨のコメント\n- ただし裏取りは限定的で、ソシエダ側は残留に自信。W杯ではオランダ戦での膝の負傷により一部の試合を欠場していた\n- **ソース**：Liverpool.com、Goal.com（△単独〜限定的、裏取り未了）\n\n### 三笘薫（ブライトン）\n- 5/9のハムストリング負傷（回復目安8週間）でW杯を欠場。7月末の復帰見込み。移籍の具体的な動きは確認されず\n- **ソース**：ESPN（負傷続報）\n\n---\n\n## 🏆 ワールドカップ2026\n\n- ラウンド16が進行中。**ブラジルがノルウェーに1-2で敗れ、5度優勝の強豪がまさかの敗退**。ハーランドが終盤に2得点。**イングランドはメキシコに3-2で競り勝ち8強入り**（一時10人での勝利）\n- 準々決勝の顔ぶれが続々決定：**モロッコ vs フランス（7/9）**、**イングランド vs ノルウェー（7/11・マイアミ）**\n- ゴールデンブーツはエムバペ・メッシ・**ハーランド（本日2得点で7点に到達）**の3人が7得点で首位に並ぶ\n- 日本代表は6/30のラウンド32でブラジルに1-2の逆転負けで敗退済み（次期監督人事の議論継続）\n\n## ⚽ 今週の試合・活躍情報（リーグ戦）\n※主要リーグはW杯期間中のオフシーズンのため該当なし。試合情報は本欄下部のW杯スケジュールに集約。\n\n## 📰 The Athletic ピックアップ\n※直近3日以内で確認できた該当特集はありません（本日該当なし）。\n\n---\n\n## 🌍 直近の試合結果（7/5〜7/6）\n\n### ブラジル 1-2 ノルウェー（ラウンド16）\n- 得点：ハーランド 2得点（残り11分で連続弾＝大会通算6・7点目）／ネイマール（後半AT・PK）\n- 会場：メットライフ・スタジアム（イーストラザフォード）\n- キックオフ：7/6(月) 05:00 JST（7/5 16:00 ET）\n- 出典: [Sky Sports](https://www.skysports.com/football/brazil-vs-norway/report/549856) (2026-07-05), [ESPN](https://www.espn.com/soccer/match/_/gameId/760504/norway-brazil) (2026-07-05)\n\n### メキシコ 2-3 イングランド（ラウンド16）\n- 得点：ベリンガム 2得点（前半）、ケイン（PK）／キニョネス、ヒメネス（PK）\n- 展開：後半開始直後にクアンサが退場、40分超を10人で戦い抜き逃げ切り\n- 会場：エスタディオ・アステカ（メキシコシティ）\n- キックオフ：7/6(月) 09:00 JST（7/5 20:00 ET）\n- 出典: [England Football公式](https://www.englandfootball.com/england/mens-senior-team/fixtures-results/2025-26/World-Cup/mexico-england-fifa-world-cup-round-of-16-monday-6-july-2026-match-centre) (2026-07-06), [Al Jazeera](https://www.aljazeera.com/sports/liveblog/2026/7/5/mexico-vs-england-live-fifa-world-cup-2026-last-16) (2026-07-05)\n\n## 📅 今日・明日の試合スケジュール\n\n### 今日（7/6・月／JST）\n※本日これ以降に予定されているW杯の試合はありません（ラウンド16の2試合は本日午前に消化済み）\n\n### 明日（7/7・火／JST）\n- **04:00 JST**：ポルトガル vs スペイン（7/6 15:00 ET、アーリントン）— ラウンド16\n- **09:00 JST**：アメリカ vs ベルギー（7/6 20:00 ET、シアトル）— ラウンド16\n\n出典: [ESPN](https://www.espn.com/soccer/story/_/id/48939282/2026-fifa-world-cup-fixtures-results-match-schedule-group-stage-knockout-rounds-bracket) (2026-07-06)\n\n## 📊 トーナメント進捗\n\n- **ラウンド16（8試合中4試合消化）**：モロッコ、フランス（7/4）、ノルウェー、イングランド（7/6）が準々決勝進出\n- **残るラウンド16**：7/7 ポルトガル vs スペイン、アメリカ vs ベルギー／7/8 エジプト vs アルゼンチン、スイス vs コロンビア（いずれもJST換算）\n- **準々決勝（7/9〜11）**：モロッコ vs フランス（7/9）、イングランド vs ノルウェー（7/11・マイアミ）ほか2試合はラウンド16の結果待ち\n\n## 🌟 大会ハイライト\n\n- **ゴールデンブーツ**：エムバペ、メッシ、ハーランド 7得点で3人首位。ケインは本日のPKで6得点に到達\n- **波乱**：優勝候補ブラジルがノルウェーに敗れ姿を消し、ハーランドが決勝トーナメントで格の違いを見せつけた\n- イングランドは退場者を出しながらメキシコの猛攻をしのぎ、ベリンガム＝ケインの得点力で8強へ\n- 出典: [Sky Sports](https://www.skysports.com/football/brazil-vs-norway/report/549856) (2026-07-05), [CNN](https://www.cnn.com/2026/07/05/sport/world-cup-round-of-16-sunday) (2026-07-05)\n\n---\n\n**編集メモ（裏取り・除外事項）**\n- **除外**：ヤン・パウル・ファンヘッケ（→トッテナム）、ヴィクトル・ムニョス（→リヴァプール）は発表が**6月中旬〜下旬でR1の7日以内基準を外れる**ため「完了」から除外。\n- **ブラックリスト遵守**：Yahoo Sports・CaughtOffside・TeamTalk等は2件目のソースとしても不採用。モンガ／ダンフリース等は一次〜A級で裏取り済み。\n- **未確認のため不掲載**：一部集計サイトが報じた「バルサ→ゴードン €80M」「レアル→ククレジャ／B.シルバ／コナテ」等は信頼ソースでの裏取りが取れず見送り。";
document.getElementById('content').innerHTML = marked.parse(md);
document.querySelectorAll('#content table').forEach(t=>{const w=document.createElement('div');w.className='tbl-wrap';t.parentNode.insertBefore(w,t);w.appendChild(t);});
</script>
