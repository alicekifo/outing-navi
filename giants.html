<script>
const md = "十分な情報が集まりました。レポートを生成します。\n\n---\n\n## ⚾ 直近の試合結果（2026年5月27日〜6月2日）\n\n\u003e ※ 全試合、5月26日就任の橋上秀樹監督代行（73・オフェンスチーフコーチ）体制下で実施。\n\n---\n\n### 5月27日（水）vs 福岡ソフトバンクホークス ○\n**球場**：東京ドーム　**スコア**：巨人 **5–1** ソフトバンク\n\n| 役割 | 投手 |\n|------|------|\n| 先発（巨人） | 戸郷翔征（20・投手） |\n| セーブ | 田中瑛斗（投手） |\n\n- **本塁打**：なし\n- 橋上代行体制の初勝利（前日5/26の初陣はソフトバンクに8失点大敗）。戸郷が先発して援護を得た。\n\n---\n\n### 5月28日（木）vs 福岡ソフトバンクホークス ●\n**球場**：東京ドーム　**スコア**：巨人 **4–8** ソフトバンク\n\n| 役割 | 投手 |\n|------|------|\n| 先発（巨人） | 田中将大（投手） |\n| 敗戦 | 赤星優志（投手） |\n\n- **本塁打**：なし\n- 先発田中将大の後を受けた赤星が失点を重ね逆転負け。\n\n---\n\n### 5月29日（金）vs 北海道日本ハムファイターズ ○\n**球場**：エスコンフィールドHOKKAIDO　**スコア**：巨人 **4–2** 日本ハム\n\n| 役割 | 投手 |\n|------|------|\n| 先発（巨人） | 井上温大（投手） |\n| セーブ | ライデル・マルティネス（Raidel Martinez・投手） |\n\n- **本塁打**：なし\n- 橋上代行と新庄日本ハム監督の\"野村克也門下生対決\"を制した。\n\n---\n\n### 5月30日（土）vs 北海道日本ハムファイターズ ○\n**球場**：エスコンフィールドHOKKAIDO　**スコア**：巨人 **5–3** 日本ハム\n\n| 役割 | 投手 |\n|------|------|\n| 先発（巨人） | 西舘勇陽（投手） |\n| セーブ | ライデル・マルティネス（Raidel Martinez・投手） |\n\n- **本塁打**：トレイ・キャベッジ（Trey Cabbage・外野手） **9号**、岸田行倫（捕手） **2号**\n- キャベッジ・岸田のアーチで2試合連続勝利。\n\n---\n\n### 5月31日（日）vs 北海道日本ハムファイターズ ●\n**球場**：エスコンフィールドHOKKAIDO　**スコア**：巨人 **0–3** 日本ハム\n\n| 役割 | 投手 |\n|------|------|\n| 先発（巨人） | 竹丸和幸（投手） |\n\n- **本塁打**：なし\n- 完封負け。打線が沈黙し3連戦を1勝2敗で終える。\n\n---\n\n### 6月1日（月）：オフ日\n\n---\n\n### 6月2日（火）vs オリックス・バファローズ ○\n**球場**：東京ドーム　**スコア**：巨人 **3–2** オリックス\n\n| 役割 | 投手 |\n|------|------|\n| 先発（巨人） | 則本昂大（投手） |\n| セーブ | ライデル・マルティネス（Raidel Martinez・投手） |\n\n- **本塁打**：トレイ・キャベッジ（Trey Cabbage・外野手） **10号**\n- 接戦をキャベッジの10号ソロと守護神マルティネスで逃げ切り。大城卓三（捕手）が報道によるとプロ初の3番起用で出場。\n\n---\n\n**週間成績：4勝2敗（交流戦 セ・パ交流戦期間中）**\n\n情報源：[my-favorite-giants.net 2026年巨人試合結果](https://www.my-favorite-giants.net/giants_game/2026/result_major.htm)（2026年6月2日現在）\n\n---\n\n## 📊 セ・リーグ順位表\n\n**2026年6月2日現在（NPB公式）**\n\n| 順位 | 球団 | 試合 | 勝 | 敗 | 分 | 勝率 | G差 |\n|------|------|------|----|----|-----|------|-----|\n| 1 | 東京ヤクルトスワローズ | 53 | 31 | 21 | 1 | .596 | — |\n| 2 | 阪神タイガース | 52 | 30 | 21 | 1 | .588 | 0.5 |\n| **3** | **読売ジャイアンツ** | **53** | **28** | **25** | **0** | **.528** | **3.5** |\n| 4 | 横浜DeNAベイスターズ | 53 | 23 | 28 | 2 | .451 | 7.5 |\n| 5 | 広島東洋カープ | 50 | 18 | 30 | 2 | .375 | 11.0 |\n| 6 | 中日ドラゴンズ | 53 | 19 | 33 | 1 | .365 | 12.0 |\n\n**巨人の現在地**：3位でCS出場圏内（3位まで出場権）。首位ヤクルトとは3.5ゲーム差、2位阪神とは3.0差。CS圏外の4位DeNAとのゲーム差は4.0。優勝争いへ巻き返すには今後の連勝が不可欠。\n\n情報源：[NPB公式 2026年度セントラル・リーグ チーム勝敗表](https://npb.jp/bis/2026/stats/std_c.html)（2026年6月2日現在）\n\n---\n\n## 👤 選手動向・成績\n\n### ① トレイ・キャベッジ（Trey Cabbage・外野手）\n| 打率 | 試合 | 本塁打 | 打点 |\n|------|------|--------|------|\n| .276 | 52 | **10** | 24 |\n\n岡本和真の海外移籍後、主砲として外国人勢の柱に。5/30・6/2と2試合連続本塁打で週間MVPクラスの活躍。\n\n---\n\n### ② 大城卓三（捕手）\n| 打率 | 試合 | 本塁打 | 打点 | 出塁率 | 長打率 | OPS |\n|------|------|--------|------|--------|--------|-----|\n| **.344** | 35 | 4 | 14 | .417 | .563 | **.980** |\n\n打率・OPSともにチームトップクラス。6月2日にはプロ初の「3番」起用と報じられており、阿部代行体制下でも変わらぬ重用が続く。\n\n---\n\n### ③ 竹丸和幸（投手）\n| 防御率 | 登板 | 勝 | 敗 | 投球回 | 奪三振 | WHIP |\n|--------|------|----|----|--------|--------|------|\n| 2.98 | 9 | **5** | 4 | 54.1 | 51 | 1.25 |\n\nチームトップの5勝。先発ローテーションの軸として安定した成績を残す。\n\n---\n\n### ④ ライデル・マルティネス（Raidel Martinez・投手）\n| 防御率 | 登板 | 勝 | 敗 | セーブ | 投球回 | 奪三振 | WHIP |\n|--------|------|----|----|--------|--------|--------|------|\n| 1.96 | 19 | 1 | 1 | **16** | 18.1 | 22 | 0.76 |\n\n今週だけで3セーブ（5/29・5/30・6/2）を記録。セーブ成功率・WHIP・防御率ともにリーグ最高水準の守護神。\n\n---\n\n### ⑤ 坂本勇人（6・遊撃手）・丸佳浩（外野手）—成績低迷\n| 選手 | 打率 | 本塁打 | 打点 | 出塁率 | 長打率 |\n|------|------|--------|------|--------|--------|\n| 坂本勇人 | **.159** | 2 | 5 | .229 | .270 |\n| 丸佳浩 | **.179** | 1 | 8 | .289 | .282 |\n\nともにキャリアと比較して著しく低調。打線の得点力の足かせになっており、監督代行体制でのテコ入れが課題。今週時点で離脱・故障情報は確認されていない。\n\n情報源：[NPB公式 2026年度読売ジャイアンツ 個人打撃成績](https://npb.jp/bis/2026/stats/idb1_g.html)・[個人投手成績](https://npb.jp/bis/2026/stats/idp1_g.html)（2026年6月2日現在）\n\n---\n\n## 🧠 チーム状況・采配\n\n### 橋上秀樹監督代行（73・オフェンスチーフコーチ）体制\n\n阿部慎之助前監督の辞任（5月26日）を受け、オフェンスチーフコーチの橋上秀樹（60）が即日、今季終了まで監督代行を担うことが発表された（NPB公式届出）。5月26日の初陣（ソフトバンク戦）は8失点大敗だったが、5月27日〜6月2日は**4勝2敗**と立て直しつつある。\n\n橋上監督代行は就任直後の取材で次のように述べた（スポニチアネックス）：\n\u003e 「ちょっと色々心配はあったけど、ゲームに入る間際、選手の表情とかベンチの声を見る感じでは、もう試合に向かって本当に集中してるなっていうのは受け取れた」\n\n### スタメン・打順傾向\n- **大城卓三を3番起用**（6月2日、従来の下位〜中位から昇格）\n- 坂本勇人・丸佳浩の不振が続く中、ボビー・ダルベック（Bobby Dalbec・内野手、打率.250・8HR・27打点）とキャベッジが中軸を担う構図\n- リリーフは「マルティネス（守護神）→ 大勢（防御率1.69）→ 田中瑛斗（防御率0.46）」の鉄壁三枚が確立\n\n情報源：[NPB公式 読売ジャイアンツ監督代行お知らせ](https://npb.jp/news/detail/20260526_03.html)（2026年5月26日）、[時事ドットコム 橋上秀樹コーチが監督代行](https://www.jiji.com/jc/article?k=2026052501083\u0026g=spo)（2026年5月25日）、[Yahoo!ニュース（スポニチアネックス）橋上監督代行コメント](https://news.yahoo.co.jp/articles/27242e2f8ac91a55def7354d294d640e0b3797c8)（2026年5月26日）\n\n---\n\n## 🔄 移籍・契約情報\n\n### ★【最重要】阿部慎之助前監督 辞任（2026年5月26日）\n\n- **5月25日**：阿部慎之助（当時監督）が18歳の長女への暴行容疑で現行犯逮捕・同日釈放\n- **5月26日**：山口寿一オーナーに辞意表明・即日受理。79年ぶり・球団創立初のシーズン途中監督交代\n- **後任監督候補**（いずれも未正式決定、複数媒体報道）：松井秀喜・原辰徳（4度目登板説）・桑田真澄\n\n### 岡本和真（元・三塁手）→ トロント・ブルージェイズ（MLB）\n- 2026年1月4日に4年6,000万ドル（約93億円）で契約。球団最大の戦力流出。\n\n### 則本昂大（投手）—楽天からFA移籍\n- 2026年1月16日入団発表。ローテーションに定着し、6月2日のオリックス戦でも先発登板（勝利）。\n\n### 2026年新外国人選手（支配下登録）\n| 選手名 | ポジション | 直近成績 |\n|--------|-----------|--------|\n| ボビー・ダルベック（Bobby Dalbec） | 内野手 | 打率.250・8HR・27打点 |\n| トレイ・キャベッジ（Trey Cabbage） | 外野手 | 打率.276・10HR・24打点（2年目） |\n| ライデル・マルティネス（Raidel Martinez） | 投手（守護神） | 防御率1.96・16S |\n| フォレスト・ウィットリー（Forrest Whitley） | 投手 | ※登板詳細未確認 |\n| スペンサー・ハワード（Spencer Howard） | 投手 | ※登板詳細未確認 |\n| ブライアン・マタ（Bryan Mata） | 投手 | ※登板詳細未確認 |\n\n情報源：[日本経済新聞 阿部慎之助監督辞任](https://www.nikkei.com/article/DGXZQODH25AT90V20C26A5000000/)（2026年5月25日）、[NPB公式 監督代行通知](https://npb.jp/news/detail/20260526_03.html)（2026年5月26日）、[Smart FLASH 次期監督候補](https://smart-flash.jp/sports/410491/)（2026年5月28日）、[jluggage.com 巨人外国人選手2026](https://www.jluggage.com/blog/j-sports/giants-foreign-players/)\n\n---\n\n## 📅 今後の試合予定（2026年6月3日〜6月9日）\n\n| 日付 | 曜日 | 対戦相手 | 球場 | 予告先発（巨人側） | 備考 |\n|------|------|----------|------|-----------------|------|\n| **6/3** | 水 | オリックス・バファローズ | 東京ドーム 18:00 | **戸郷翔征（vs 曽谷）** | ★本日 |\n| 6/4 | 木 | オリックス・バファローズ | 東京ドーム 18:00 | 未発表 | 交流戦（対オリ最終） |\n| 6/5 | 金 | 千葉ロッテマリーンズ | 東京ドーム | 未発表 | |\n| 6/6 | 土 | 千葉ロッテマリーンズ | 東京ドーム | 未発表 | |\n| 6/7 | 日 | 千葉ロッテマリーンズ | 東京ドーム | 未発表 | |\n| 6/8 | 月 | — | — | — | オフ日 |\n| 6/9 | 火 | 東北楽天ゴールデンイーグルス | 楽天モバイルパーク宮城 | 未発表 | **則本昂大の古巣対決注目** |\n\n**見どころ**\n- 本日6/3 の戸郷翔征は2週間ぶりの先発（前回登板から間隔あり）。防御率3.38を改善できるか。\n- 6/9〜の楽天戦では、今季FA移籍の則本昂大が古巣と対戦すれば注目カード。\n- 交流戦残り5試合を3勝2敗以上で乗り越え、首位ヤクルト（3.5差）を射程圏に収めたい。\n\n情報源：[Yahoo!スポーツ 読売ジャイアンツ日程・結果](https://baseball.yahoo.co.jp/npb/teams/1/schedule)（2026年6月3日確認）\n\n---\n\n### 出力前セルフチェック\n- [x] 全試合 R1（日付）クリア：5/27〜6/2の7日以内のみ掲載\n- [x] スコア・成績はNPB公式（npb.jp）・球団関連サイト（my-favorite-giants.net）で確認\n- [x] 順位表は6月2日付NPB公式の最新値\n- [x] 監督コメントはスポニチアネックス取材（記者会見相当、A級ソース）由来\n- [x] 選手名は漢字フルネーム＋ポジション、外国人はカタカナ＋英字表記";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
