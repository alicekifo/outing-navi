<script>
const md = "情報が揃いましたので、週報を出力します。\n\n---\n\n## ⚾ 直近の試合結果（5月26日〜6月1日、全6試合）\n\n---\n\n### 5月26日（火）● 3–8　vs 福岡ソフトバンクホークス @ 東京ドーム（交流戦）\n\n| 項目 | 内容 |\n|------|------|\n| 先発対決 | 則本昂大（巨）vs 和田毅（ソ） |\n| 勝利投手 | 和田毅 |\n| 敗戦投手 | 則本昂大（3敗目） |\n| 本塁打 | なし（巨人側） |\n\n阿部慎之助監督の辞任表明を受け橋上秀樹オフェンスチーフコーチ（73番）が監督代行として初采配。試合は則本が乱調し8失点大敗。球団史上79年ぶりのシーズン途中監督交代という異例の事態の中での采配となった。\n\n---\n\n### 5月27日（水）○ 5–1　vs 福岡ソフトバンクホークス @ 東京ドーム（交流戦）\n\n| 項目 | 内容 |\n|------|------|\n| 先発対決 | 戸郷翔征（巨）vs 有原航平（ソ） |\n| 勝利投手 | 戸郷翔征（今季初勝利・通算2勝1敗） |\n| 本塁打 | なし |\n\n戸郷翔征（20・投手）が7回1失点の好投で今季初勝利。シーズン序盤の離脱から復帰後のエース登板で、チームに流れを引き寄せた。\n\n---\n\n### 5月28日（木）● 4–8　vs 福岡ソフトバンクホークス @ 東京ドーム（交流戦）\n\n| 項目 | 内容 |\n|------|------|\n| 先発投手（巨） | 田中将（巨） |\n| 敗戦投手 | 赤星優志（3勝2敗） |\n| 本塁打 | なし（巨人側） |\n\n田中将が先発も途中降板、リリーフの赤星優志が失点し交流戦ソフトバンク3連戦を1勝2敗で終える。\n\n---\n\n### 5月29日（金）○ 4–2　vs 北海道日本ハムファイターズ @ エスコンフィールド北海道（交流戦）\n\n| 項目 | 内容 |\n|------|------|\n| 先発対決 | 井上温大（巨）vs 伊藤大海（日） |\n| 勝利投手 | 井上温大（4勝4敗） |\n| セーブ | マルティネス（14S） |\n| 本塁打 | なし |\n\n井上温大（48・投手）が好投し先発勝利。マルティネスが締めてクローザーとしての安定感を見せた。\n\n---\n\n### 5月30日（土）○ 5–3　vs 北海道日本ハムファイターズ @ エスコンフィールド北海道（交流戦）\n\n| 項目 | 内容 |\n|------|------|\n| 先発対決 | 西舘勇陽（巨）vs 上沢直之（日） |\n| 勝利投手 | 西舘勇陽（1勝目） |\n| セーブ | マルティネス（15S） |\n| 本塁打 | キャベッジ（9号）、岸田行倫（57・捕手、2号） |\n\n西舘勇陽（14・投手）がプロ初勝利を記録。キャベッジが9号ソロを放ち本塁打をさらに積み重ね、岸田行倫も今季2号を追加。エスコン2連勝。\n\n---\n\n### 5月31日（日）● 0–3　vs 北海道日本ハムファイターズ @ エスコンフィールド北海道（交流戦）\n\n| 項目 | 内容 |\n|------|------|\n| 先発対決 | 竹丸（巨）vs 金村尚真（日） |\n| 敗戦投手 | 竹丸（5勝4敗） |\n| 本塁打 | なし |\n\n竹丸が完封負けを喫し、3連戦を2勝1敗で終える。打線が完全に沈黙し無得点。\n\n---\n\n**直近週（5/26–5/31）成績：3勝3敗**\n\n情報源：\n- [my favorite giants – 2026年巨人試合結果（シーズン中更新）](https://www.my-favorite-giants.net/giants_game/2026/result_major.htm)（参照日：2026年6月2日）\n- [NPB.jp – 監督代行届出](https://npb.jp/news/detail/20260526_03.html)（公開日：2026年5月26日）\n\n---\n\n## 📊 セ・リーグ順位表（2026年6月1日現在）\n\n| 順位 | 球団 | 勝 | 敗 | 分 | 勝率 | GB |\n|------|------|----|----|----|------|----|\n| 1 | 東京ヤクルトスワローズ | 31 | 20 | 1 | .608 | — |\n| 2 | 阪神タイガース | 30 | 21 | 1 | .588 | 1.0 |\n| **3** | **読売ジャイアンツ** | **27** | **25** | **0** | **.519** | **4.5** |\n| 4 | 横浜DeNAベイスターズ | 23 | 27 | 2 | .460 | 7.5 |\n| 5 | 広島東洋カープ | 18 | 30 | 2 | .375 | 11.5 |\n| 6 | 中日ドラゴンズ | 19 | 32 | 1 | .373 | 12.0 |\n\n**巨人の現在地：** 3位、首位ヤクルトに4.5差。CS進出権（3位以内）は確保圏内だが、4位DeNAとのゲーム差は3.0とCS争いも油断できない。優勝争いへの復帰には最低でも2〜3ゲーム差を詰める必要がある。\n\n情報源：\n- [NPB.jp – 2026年度セントラル・リーグ チーム勝敗表](https://npb.jp/bis/2026/stats/std_c.html)（集計日：2026年6月1日）\n\n---\n\n## 👤 選手動向・成績ハイライト（最大5件）\n\n### ① 大城卓三（27・捕手）― 打撃好調、チームトップの打率\n\n| 打率 | 本塁打 | 打点 | 出塁率 | OPS |\n|------|--------|------|--------|-----|\n| .348 | 4 | 14 | .423 | .999 |\n\n捕手としてチームトップの打率をマーク。出塁率・OPSともに圧巻の数字で、攻守両面でチームを支えている。\n\n---\n\n### ② トレイ・キャベッジ（Trey Cabbage・外野手）― 本塁打リーダー\n\n| 打率 | 本塁打 | 打点 | 出塁率 | 長打率 |\n|------|--------|------|--------|--------|\n| .270 | 9 | 22 | .292 | .454 |\n\n2025年オフに新外国人として加入した左打ち外野手。本塁打9本はチームトップ。5月30日（エスコン）に今季9号を放つなど長打力で貢献している。\n\n---\n\n### ③ ボビー・ダルベック（Bobby Dalbec・内野手）― 打点リーダー\n\n| 打率 | 本塁打 | 打点 | 出塁率 | 長打率 |\n|------|--------|------|--------|--------|\n| .254 | 8 | 27 | .342 | .452 |\n\nMLB通算47本塁打を引っ提げて加入した右の強打者。打点27はチームトップ。岡本和真（MLB移籍）の空いた中軸枠を埋める存在として機能している。\n\n---\n\n### ④ 戸郷翔征（20・投手）― 今季初勝利で復調気配\n\n| 登板 | 勝敗 | 防御率 | 投球回 | 奪三振 | WHIP |\n|------|------|--------|--------|--------|------|\n| 4 | 2勝1敗 | 3.38 | 24回 | 22 | 1.24 |\n\nシーズン序盤に故障離脱を経験したものの、5月27日のソフトバンク戦で今季初勝利（7回1失点）。4試合で平均6回を投げる安定した内容で復調の兆しをみせている。\n\n---\n\n### ⑤ 坂本勇人（6・遊撃手）― 深刻な打撃不振\n\n| 打率 | 本塁打 | 打点 | 出塁率 | 長打率 |\n|------|--------|------|--------|--------|\n| .169 | 2 | 5 | .242 | .288 |\n\nベテランの坂本勇人（37歳）が打率.169と低迷。丸佳浩（8・外野手）も打率.189と振るわず、チームの上位打線を形成してきたベテラン2人の不振が打線の課題となっている。\n\n情報源：\n- [NPB.jp – 2026年度読売ジャイアンツ個人打撃成績](https://npb.jp/bis/2026/stats/idb1_g.html)（参照日：2026年6月2日）\n- [NPB.jp – 戸郷翔征個人年度別成績](https://npb.jp/bis/players/41045138.html)（参照日：2026年6月2日）\n\n---\n\n## 🧠 チーム状況・采配\n\n### 【最重要】阿部慎之助監督辞任 → 橋上秀樹監督代行体制へ\n\n2026年5月25日夜、阿部慎之助前監督（背番号81）が自宅で長女（18歳）に対して暴行を加えたとして、警視庁渋谷署に暴行容疑で現行犯逮捕。翌5月26日午前0時17分に釈放された後、同日中に監督辞任を表明した。シーズン途中での監督退任は球団史上79年ぶりの異例事態となった。\n\nNPBへの届け出（2026年5月26日付）に基づき、**橋上秀樹オフェンスチーフコーチ（背番号73）が監督代行**に就任。\n\n橋上監督代行コメント（5月26日試合後会見・スポニチ報道）：\n\u003e 「ゲームに入る間際、選手の表情とかベンチの声を見る感じでは、もう試合に向かって本当に集中してるなっていうのは受け取れた。それは非常にほっとしたところではありました」\n\u003e 「まだ色々しっくりこない。私も貧乏性なんで、動きたいというか、そんな感じはあったんで」（監督席から動き回る采配スタイルについて）\n\n#### 直近の投手起用傾向\n\n| 先発 | 登板 | 勝敗 | 防御率 | 奪三振 | WHIP |\n|------|------|------|--------|--------|------|\n| 竹丸 | 9 | 5勝4敗 | 2.98 | 51 | 1.25 |\n| 田中将 | 8 | 3勝2敗 | 3.02 | 34 | 1.32 |\n| 井上温大 | 8 | 4勝4敗 | 3.09 | 47 | 1.07 |\n| 戸郷翔征 | 4 | 2勝1敗 | 3.38 | 22 | 1.24 |\n\nクローザーのマルティネスは15セーブ（1勝1敗）と安定した抑えを見せており、後ろは整備されている状態。\n\n情報源：\n- [NPB.jp – 読売ジャイアンツ監督代行のお知らせ](https://npb.jp/news/detail/20260526_03.html)（公開日：2026年5月26日）\n- [Yahoo!ニュース / スポニチアネックス – 橋上監督代行コメント](https://news.yahoo.co.jp/articles/27242e2f8ac91a55def7354d294d640e0b3797c8)（公開日：2026年5月26日）\n- [時事ドットコム – 阿部慎之助氏、涙の辞任会見](https://www.jiji.com/jc/article?k=2026052600444\u0026g=spo)（公開日：2026年5月26日）\n\n---\n\n## 🔄 移籍・契約情報\n\n### 岡本和真（元25・三塁手）→ MLB トロント・ブルージェイズ\n\n2025年オフ、ポスティングシステムを経由してMLBトロント・ブルージェイズと契約。巨人での在籍11年間（通算打率.277・248本塁打・717打点）に幕を引き、2026年シーズンはMLBでプレーしている。\n\n### 新外国人 ① トレイ・キャベッジ（Trey Cabbage・外野手）加入\n\n左打ちの外野手として2025年オフに加入。2年目（2026年）も引き続き在籍し、本塁打9本・打点22と岡本の穴を埋める中心打者として台頭。\n\n### 新外国人 ② ボビー・ダルベック（Bobby Dalbec・内野手）加入\n\n2025年オフに獲得したMLB通算47本塁打の右の大砲。一塁・三塁を守り、2026年は打点27でチームの得点源となっている。\n\n情報源：\n- [日本経済新聞 – 巨人、新外国人キャベッジ獲得](https://www.nikkei.com/article/DGXZQOKC18AAJ0Y4A211C2000000/)\n- [日本経済新聞 – 巨人、内野手ダルベック獲得](https://www.nikkei.com/article/DGXZQOKC224U30S5A221C2000000/)\n\n---\n\n## 📅 今後の試合予定（6月2日〜6月8日）\n\n| 日付 | 曜 | 対戦相手 | 球場 | 開始 | 予告先発（巨人） |\n|------|---|----------|------|------|----------------|\n| **6月2日** | 火 | オリックス・バファローズ | 東京ドーム | 18:00 | 則本昂大（43） |\n| 6月3日 | 水 | オリックス・バファローズ | 東京ドーム | 18:00 | 未発表 |\n| 6月4日 | 木 | オリックス・バファローズ | 東京ドーム | 18:00 | 未発表 |\n| 6月5日 | 金 | 千葉ロッテマリーンズ | 東京ドーム | 18:00 | 未発表 |\n| 6月6日 | 土 | 千葉ロッテマリーンズ | 東京ドーム | 18:00 | 未発表 |\n| 6月7日 | 日 | 千葉ロッテマリーンズ | 東京ドーム | 14:00 | 未発表 |\n\n**見どころ：** 今日6月2日のオリックス戦は則本昂大 vs 九里亜蓮（オリックス）の右腕対決。先週のソフトバンク戦で大敗（3-8）した則本にとってリベンジの機会。監督代行体制2週目に入り、橋上代行がどのようなチームカラーを出してくるかも注目される。ロッテ3連戦（6/5-7）は東京ドームでの6連戦の後半にあたり、連勝できれば順位浮上の足がかりとなる。\n\n情報源：\n- [Yahoo!スポーツナビ – 読売ジャイアンツ日程・結果](https://baseball.yahoo.co.jp/npb/teams/1/schedule)（参照日：2026年6月2日）\n- [Yahoo!スポーツナビ – 6月2日 巨人 vs オリックス](https://baseball.yahoo.co.jp/npb/game/2021038945/top)（参照日：2026年6月2日）\n\n---\n\n### 出力前セルフチェック\n\n- [x] 全試合 R1（日付）クリア：5月26日〜5月31日、すべてTODAY（6/2）から7日以内\n- [x] スコア・成績はmy-favorite-giants（シーズン中更新版）およびNPB.jpで確認\n- [x] 順位表は2026年6月1日現在の最新データ（NPB.jp公式）\n- [x] 監督コメントはNPB公式届出・スポーツ紙記者会見報道（A級以上）由来\n- [x] 選手名は漢字フルネーム＋背番号（確認できた分）形式";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
