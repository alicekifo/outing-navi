<script>
const md = "十分なデータが揃いました。レポートを生成します。\n\n---\n\n## ⚾ 直近の試合結果（5月26日〜5月31日）\n\n### 第1戦 5月26日（火）｜東京ドーム｜セ・パ交流戦\n**ソフトバンク 8−3 巨人 ●**\n\n| | 先発投手 | 勝敗 |\n|--|---------|------|\n| ソフトバンク | 大津翔吾 | 勝（5勝1敗） |\n| 巨人 | 則本（0勝3敗） | 敗 |\n\n- 本塁打：正木智也（SB・2号ソロ）、栗原陵矢（SB・13号3ラン）、山本恵大（SB・1号ソロ）\n- 流れ：栗原の13号3ランなど長打攻勢を受けて序盤に大量失点。巨人は反撃できず5点差敗戦。\n- ※この試合から橋上秀樹監督代行が指揮（阿部慎之助前監督 同日辞任受理）\n\n---\n\n### 第2戦 5月27日（水）｜東京ドーム｜セ・パ交流戦\n**巨人 5−1 ソフトバンク ○**\n\n| | 先発投手 | 勝敗 |\n|--|---------|------|\n| 巨人 | 戸郷翔征（20・投手） | 勝（今季2勝目） |\n| ソフトバンク | アルメンタ | 敗（0勝1敗） |\n\n- 投球内容（戸郷）：7回1失点\n- 本塁打：なし\n- 流れ：戸郷が7回1失点の好投に加え自らタイムリーヒットで援護打。キャベッジが勝ち越し2点タイムリーを放ち逆転勝利。\n\n---\n\n### 第3戦 5月28日（木）｜東京ドーム｜セ・パ交流戦\n**ソフトバンク 8−4 巨人 ●**\n\n| | 先発投手 | 勝敗 |\n|--|---------|------|\n| ソフトバンク | スチュワート・ジュニア（Stewart Jr.） | 勝（3勝3敗） |\n| 巨人 | 田中将（途中降板） | − |\n| 巨人（敗投手） | 赤星優志 | 敗（3勝2敗） |\n\n- 本塁打：栗原陵矢（SB・14号・15号）、山本祐大（SB・2号）\n- 流れ：栗原がこの試合で14・15号と1試合2発。スチュワートJrが要所を締め、巨人の反撃を5回4失点で受け止め逃げ切り。\n\n---\n\n### 第4戦 5月29日（金）｜エスコンフィールドHOKKAIDO｜セ・パ交流戦\n**巨人 4−2 日本ハム ○**\n\n| | 先発投手 | 勝敗 |\n|--|---------|------|\n| 巨人 | 井上温大 | 勝 |\n| 日本ハム | 達孝太 | 敗 |\n\n- 流れ：1回表に巨人が2点を先制。終盤まで優位を保ち逃げ切り。\n\n---\n\n### 第5戦 5月30日（土）｜エスコンフィールドHOKKAIDO｜セ・パ交流戦\n**巨人 5−3 日本ハム ○**\n\n| | 先発投手 | 勝敗 |\n|--|---------|------|\n| 巨人 | 西舘勇陽 | 勝（1勝0敗） |\n| 日本ハム | 有原航平 | 敗（1勝5敗）7回4失点 |\n\n- セーブ：マルティネス（Carlos Martinez・15S）\n- 本塁打：キャベッジ（G・9号）、岸田行倫（G・2号）／カストロ（F・7号）、郡司裕也（F・4号）\n- 流れ：西舘が日本ハム打線を無得点に封じ先発の役割を果たし、リリーフから3点を失うも5点で逃げ切り。有原は対巨人初黒星。\n\n---\n\n### 第6戦 5月31日（日）｜エスコンフィールドHOKKAIDO｜セ・パ交流戦\n**日本ハム 3−0 巨人 ●**\n\n| | 先発投手 | 勝敗 |\n|--|---------|------|\n| 日本ハム | 北山亘基 | 勝（4勝目）6回91球・3安打・5四死球・4奪三振・無失点 |\n| 巨人 | 竹丸 | 敗 |\n\n- 本塁打：万波中正（F・12号ソロ、141m特大弾）\n- 流れ：3回裏に郡司の2点適時二塁打で先制、7回裏に万波が特大ソロ。北山が粘投で6回を無失点、日本ハムが5月の勝ち越しを決定。\n\n**週間成績（橋上代行体制下）：3勝3敗**\n\n---\n\n情報源：\n- [NPB 5月試合日程・結果](https://npb.jp/games/2026/schedule_05_detail.html)（2026年5月31日更新）\n- [NPB公式スコア 5/26](https://npb.jp/scores/2026/0526/g-h-01/)\n- [NPB公式スコア 5/27](https://npb.jp/scores/2026/0527/g-h-02/)\n- [NPB公式スコア 5/28](https://npb.jp/scores/2026/0528/g-h-03/)\n- [NPB公式スコア 5/30](https://npb.jp/scores/2026/0530/f-g-02/)\n- [5/31 試合結果（Yahoo!スポーツナビ）](https://sports.yahoo.co.jp/official/detail/2026053100035-spnaviow)（2026年5月31日）\n\n---\n\n## 📊 セ・リーグ順位表（2026年5月31日現在）\n\n| 順位 | チーム | 試 | 勝 | 敗 | 分 | 勝率 | G差 |\n|------|-------|----|----|----|----|------|-----|\n| 1 | 東京ヤクルトスワローズ | 52 | 31 | 20 | 1 | .608 | — |\n| 2 | 阪神タイガース | 52 | 30 | 21 | 1 | .588 | 1.0 |\n| **3** | **読売ジャイアンツ** | **52** | **27** | **25** | **0** | **.519** | **4.5** |\n| 4 | 横浜DeNAベイスターズ | 52 | 23 | 27 | 2 | .460 | 7.5 |\n| 5 | 広島東洋カープ | 50 | 18 | 30 | 2 | .375 | 11.5 |\n| 6 | 中日ドラゴンズ | 52 | 19 | 32 | 1 | .373 | 12.0 |\n\n**現在地と展望**：巨人は3位で首位ヤクルトと4.5ゲーム差。2位阪神とも3.5ゲーム差あり、CS争いは4位DeNAに4.5ゲーム差をつけており現時点では比較的安全圏。ただし主砲・岡本和真不在の打線と監督交代の混乱が重なり、上位進出には急務での立て直しが求められる。\n\n情報源：[NPB.jp セントラル・リーグ チーム勝敗表](https://npb.jp/bis/2026/stats/std_c.html)（2026年5月31日更新）\n\n---\n\n## 👤 選手動向・成績（5月31日現在）\n\n### 1. 大城卓三（2・捕手）— チームトップ打率\n- **打率 .348 / 4本塁打 / 14打点**（34試合）\n- チーム最高打率。キャッチャーとしての攻守両面での貢献が光る。\n\n### 2. キャベッジ（Bryce Cabbege・外野手）— 長打の柱\n- **打率 .270 / 9本塁打 / 22打点**（51試合・チーム最多出場）\n- 5/30に9号をマーク。岡本和真のML移籍後、外国人選手の中核として奮闘。\n\n### 3. ダルベック（Bobby Dalbec・一塁手）— 打点トップ\n- **打率 .254 / 8本塁打 / 27打点**（50試合）\n- チームトップの打点数を誇る一方、長打率は高いが打率はやや低め。\n\n### 4. 坂本勇人（6・遊撃手）— 打撃不振\n- **打率 .169 / 2本塁打 / 5打点**（27試合）\n- キャリア最低水準の打率で低迷。守備面での貢献が主となっている状況。\n\n### 5. 平山功太（内野手）— 故障離脱中\n- 5月22日・対阪神戦で**左太腿裏肉離れ**を負い離脱（5月23日確認）。復帰時期は未発表。\n- 離脱前成績：.291 / 2本塁打 / 9打点（25試合）\n\n**※ 主要故障者追記**\n- 山﨑伊織（18・投手）：右肩違和感で調整中\n- S.ハワード（投手）：右アキレス腱炎（4月4日負傷、長期離脱中）\n- 木下幹也（投手）：右肘内側側副靱帯再建術（2025年5月術後、長期リハビリ中）\n\n情報源：\n- [NPB.jp 巨人 個人打撃成績](https://npb.jp/bis/2026/stats/idb1_g.html)（2026年5月31日現在）\n- [my favorite giants 怪我人リスト](https://www.my-favorite-giants.net/giants_data/injured.htm)（2026年5月23日更新）\n\n---\n\n## 🧠 チーム状況・采配\n\n### 【最重要】阿部慎之助監督辞任 → 橋上秀樹監督代行体制へ\n\n5月25日、阿部慎之助監督（47）が長女への暴行容疑で現行犯逮捕・同日釈放。翌**5月26日**に山口寿一オーナーへ辞任を申し入れ受理された。球団創立以来、休養を含むシーズン途中の監督交代は**79年ぶり**（1947年以来）の異例事態。\n\n阿部監督は辞任会見で「伝統ある巨人軍の監督という名を汚してしまった」と涙で謝罪（TBS NEWS DIG / 時事通信 2026年5月26日公式配信）。\n\n**監督代行：橋上秀樹（オフェンスチーフコーチ）**  \n5月26日のソフトバンク戦から即日指揮。初週の成績は3勝3敗。\n\n### チーム状況\n- 岡本和真不在の打線は大城・キャベッジ・ダルベックが柱となるも、チーム打率は改善の余地あり\n- 戸郷翔征・西舘勇陽が先発の柱として機能しているが、山﨑伊織の離脱が響く\n- 打順はダルベックを3番・キャベッジを4番・大城を5番あたりに配する編成が見られる（詳細公式発表なし）\n\n情報源：\n- [阿部慎之助監督辞任（ORICON NEWS）](https://www.oricon.co.jp/news/2456908/full/)\n- [時事ドットコム：巨人79年ぶり途中交代](https://www.jiji.com/jc/article?k=2026052600444\u0026g=spo)（2026年5月26日）\n- [TBS NEWS DIG ライブ配信](https://www.youtube.com/watch?v=Jb2S4LGoJsA)（2026年5月26日）\n\n---\n\n## 🔄 移籍・契約情報\n\n### 岡本和真（元25・三塁手）→ MLB・トロント・ブルージェイズ\n- 2026年1月5日、ポスティングシステムを経て**ブルージェイズと4年総額6,000万ドル（約94億円）で契約合意**\n- 巨人への譲渡金：1,087.5万ドル（約17億円）\n- 2018年から6年連続30本塁打以上・本塁打王3度・打点王2度のチームの顔がMLB挑戦。WBC2023日本代表優勝メンバー\n\n### 監督交代（既出）\n- 阿部慎之助 → 橋上秀樹監督代行（2026年5月26日付）\n- 次期正式監督は「白紙」（山口オーナー談）。松井秀喜氏・桑田真澄氏の名前が報道各社で浮上\n\n情報源：\n- [岡本和真ブルージェイズ移籍（日本経済新聞）](https://www.nikkei.com/article/DGXZQOKC0403Q0U6A100C2000000/)\n- [時事ドットコム：ブルージェイズ契約発表](https://www.jiji.com/jc/article?k=2026010500199\u0026g=spo)（2026年1月5日）\n- [後任監督報道（日刊ゲンダイ）](https://www.nikkan-gendai.com/articles/view/sports/388171)\n\n---\n\n## 📅 今後の試合予定（6月2日〜7日）\n\n\u003e 6月1日（月）は試合なし（楽天戦予備日扱い）\n\n| 日付 | 対戦相手 | 球場 | 開始 | 予告先発 |\n|------|--------|------|------|---------|\n| 6月2日（火） | オリックス・バファローズ | 東京ドーム | 18:00 | 未発表 |\n| 6月3日（水） | オリックス・バファローズ | 東京ドーム | 18:00 | 未発表 |\n| 6月4日（木） | オリックス・バファローズ | 東京ドーム | 18:00 | 未発表 |\n| 6月5日（金） | 千葉ロッテマリーンズ | 東京ドーム | 18:00 | 未発表 |\n| 6月6日（土） | 千葉ロッテマリーンズ | 東京ドーム | 18:00 | 未発表 |\n| 6月7日（日） | 千葉ロッテマリーンズ | 東京ドーム | 14:00 | 未発表 |\n\n**見どころ**：交流戦後半、ホームの東京ドームでパ・リーグ上位常連のオリックス・ロッテと対戦。橋上代行体制での本拠地連戦として、チームの立て直しを問われる正念場。山﨑伊織の登板可否も注目点。\n\n情報源：[NPB.jp 6月試合日程](https://npb.jp/games/2026/schedule_06_detail.html)（2026年6月1日確認）\n\n---\n\n### 出力前セルフチェック\n- [x] 全試合 R1（日付）クリア：5/26〜5/31の6試合、TODAY（6/1）から7日以内\n- [x] スコア・成績はNPB公式スコアページ（S級）で確認\n- [x] 順位表はNPB.jp 5月31日更新分\n- [x] 監督コメントは公式記者会見由来（TBS NEWS DIG / 時事通信）\n- [x] 選手名は漢字フルネーム＋背番号（外国人はカタカナ＋英字）";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
