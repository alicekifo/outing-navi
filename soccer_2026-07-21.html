<script>
const md = "# サッカー移籍情報＆ワールドカップ2026 — 2026年7月21日号\n\n\u003e ⚠️ **補填注記**: 2026-07-11〜07-17の各号は保存障害（生成後にパイプライン後段が報告文で上書き）により正本が一時欠損し、バックアップから復元済み。07-20号から「最終チャット出力=記事本文」方式を試行中——本号もこの方式で生成する。前号（07-20）の保存状態は次号生成時に実測確認する。\n\n---\n\n## 今日のハイライト\n\n1. **スペインがワールドカップ2026優勝**——決勝（7/20 4:00 JST・MetLife）はスペイン 1-0 アルゼンチン（延長）。途中出場の**フェラン・トーレスが延長106分に決勝弾**。アルゼンチンは後半アディショナルタイムに[[エンソ・フェルナンデス]]が警告2枚で退場し10人に。スペインは2010年南アフリカ以来2つ目の星、メッシの連覇はならず\n2. **個人賞はスペイン勢が総なめ**——ゴールデンボール＝ロドリ、ゴールデングローブ＝ウナイ・シモン（大会記録の7クリーンシート）、最優秀若手＝クバルシ。**得点王はエムバペ（10G）で確定、2022年に続く史上初の2大会連続ゴールデンブーツ**。メッシは8Gでシルバーボール\n3. **[[ロジャーズ]]は7/20にスタンフォード・ブリッジでメディカル実施**（Sky Sports映像で到着確認）。£117M・6年契約（+1年OP）、公式発表は秒読み\n4. **ジョアン・ゴメス（ウォルバーハンプトン → アストン・ヴィラ）£38Mが完了**——ティーレマンス流出とオナナ長期離脱の中盤を補強。ヴィラは今夏2件目\n\n---\n\n## 1. 完了した移籍（発表日が7/14〜7/21のもの）\n\n| # | 選手 | 移籍元 → 移籍先 | 移籍金 | 契約 | 発表日 |\n|---|------|----------------|--------|------|--------|\n| 1 | ジョアン・ゴメス | ウォルバーハンプトン → アストン・ヴィラ | £38M（€40M） | 非公表 | 7/20 |\n| 2 | [[アセコ]] | バイエルン → フランクフルト | €12M（報道により〜€13M） | 2031年まで | 7/18 |\n| 3 | [[マンザンビ]] | フライブルク → アストン・ヴィラ | £59.5M（€70M・アドオン込） | 5年 | 7/17 |\n| 4 | [[ムハレモビッチ]] | サッスオーロ → リーズ | €40M（£34.1M） | 5年（2031年まで） | 7/17 |\n| 5 | [[エステーブ]] | バーンリー → RBライプツィヒ | €25M+ボーナス | 2031年まで | 7/17 |\n| 6 | [[オーバメヤン]] | マルセイユ → デポルティボ | €1.5M | 2028年まで | 7/17 |\n| 7 | [[トロサール]] | アーセナル → ベシクタシュ | €18M（£17M） | 3年+1年OP | 7/15 |\n| 8 | [[ムニエ]] | リール → サンダーランド | フリー | — | 7/15 |\n| 9 | [[グリーンウッド]] | マルセイユ → [[フェネルバフチェ]] | €39M | 4年 | 7/14 |\n| 10 | [[ティーレマンス]] | アストン・ヴィラ → [[マンチェスター・ユナイテッド]] | £35M（解除条項） | 5年 | 7/14 |\n\n**各件の補足:**\n\n- **#1が本日の新規**。ジョアン・ゴメスはSky Sports＋ESPNの二重確認済み。フラメンゴから2023年加入以来ウォルブスで130試合、ヴィラ移籍でティーレマンス（→ユナイテッド）の穴を埋める。W杯決勝当日の完了発表で、市場再始動の号砲になった\n- #2〜10は前号からの再掲（いずれもクラブ公式ないしS/A級で確認済み）。表の枠上限により前号掲載の[[ダーロウ]]（リーズ→ユナイテッド・フリー・7/14）は割愛するが案件は有効。7/14発表の3件は明日号で7日ガードから外れる\n- ※日付ガードによる除外（参考）: トナーリ→トッテナム£100M（クラブレコード）は**7月上旬発表で7日ガード外**のため掲載しない。アンソニー→ブレントフォード（7/7）等も同様\n\n---\n\n## 2. Here We Go!（合意ほぼ確実）\n\n1. **クロップ → ドイツ代表監督**（2日目・正式サイン待ち）\n   - Romano本人ポスト「here we go」＋Goal・Sky Sports・ESPNの多重確認を維持。契約は2030年W杯までの4年、ユーロ2028も指揮\n   - **残る手続きはレッドブル・グループとの契約解消のみ**。今週NYでレッドブルCEOミンツラフとの協議が予定され、DFBはその書類完了と同時に正式発表する構え。コーチングスタッフにはリバプール時代の右腕クラヴィーツ＋ラインダース合流の見込み\n2. **[[ロジャーズ]] → [[チェルシー]]**（4日目・メディカル実施済み）\n   - **7/20にスタンフォード・ブリッジでメディカル実施を複数A級が確認**（Sky Sportsは到着映像も配信）。£117M・6年契約+1年OP\n   - 完了すればアンダーソン（→[[マンチェスター・シティ]]£116M）を抜く**イングランド人史上最高額＋チェルシーのクラブレコード**。問題が出なければ残りは書類と公式発表のみ\n3. **[[ツォリス]] → アーセナル**（交渉中◎から昇格）\n   - **Sky Sportsのクラブ間合意£34M＋Romano「メディカルと契約サインを予約済み・すべて整った」＋クラブ・ブルッヘ監督が放出を公認**——三重確認で本欄へ昇格\n   - トロサール後継の24歳ギリシャ代表WG。昨季公式戦17ゴール23アシスト。ベルギーリーグ史上最高の売却額。公式発表は近日中の見込み\n4. **[[アプソン]] → アーセナル**（3日目・公式発表待ち）\n   - Romano「Agreement signed」から進展待ち。スパーズからのフリー移籍（18歳CB・プロ契約提示を拒否）。残る形式手続きの完了後に発表見込み\n5. **[[シュラーガー]] → ノッティンガム・フォレスト**（7日目・留め置き継続）\n   - ジャンクサイトの「7/15発表済み」流通は続くが、**フォレスト公式・S/A級での発表確認は本日も取れず**（ESPN・The Athleticは「set to sign」を維持）。フリー・2028年6月まで+1年OP・メディカル完了の合意内容に変化なし\n6. **[[バルデペニャス]] → フィオレンティーナ**（継続）\n   - Romano here we go（7/14）: €8M・2031年6月まで・[[レアル・マドリー]]が50%セルオン＋マッチライト保持。発表時期は引き続き流動\n\n---\n\n## 3. 交渉中（信頼度: ◎=ほぼ確実 ○=有力 △=一部報道 ✖=破談）\n\n1. **[[バルコラ]] → リバプール ○**\n   - Romanoは「リバプールのショートリスト最上位・バルコラは放出可能、新契約交渉は完全に停止中」を維持。W杯3位決定戦を終えてパリ帰還、**交渉が動ける環境が整った**\n   - 「クラブ間交渉入り」「PSG要求£128M」の報道も流れ始めたが、**核が採用不可ソース（Empire of the Kop等）由来のため本欄では未認定**。金額観（£85M準備 vs 査定£127〜128M）の溝は引き続き注意\n2. **[[ギマランイス]] → アーセナル ○**\n   - 新規のS/A級進展なし。£80M準備 vs ニューカッスル要求£100Mの構図は前号のまま。ロジャーズ喪失後の資金再配分の焦点はツォリス完了後の中盤に移る\n\n---\n\n## 4. ワールドカップ2026（大会終了・本号で最終回）\n\n### 決勝結果: スペイン 1-0 アルゼンチン（延長・7/20 4:00 JST・NY/NJ MetLife）\n\n- **決勝点は延長106分、途中出場フェラン・トーレス**。90分は0-0、後半アディショナルタイムに[[エンソ・フェルナンデス]]が2枚目の警告で退場となり、アルゼンチンは10人で延長へ\n- スペインはメッシを最後まで封じ、**2010年南アフリカ以来2つ目の世界タイトル**。アルゼンチンの連覇（2022カタール）はならず。39歳メッシ×19歳ヤマルの初直接対決は無得点に終わった\n\n### 個人賞（確定）\n\n| 賞 | 受賞者 | 備考 |\n|----|--------|------|\n| ゴールデンブーツ | エムバペ（フランス） | **10G**・2022年に続く**史上初の2大会連続受賞**。1大会2桁は1970年G・ミュラー以来 |\n| ゴールデンボール | ロドリ（スペイン） | シルバー=メッシ、ブロンズ=エムバペ |\n| ゴールデングローブ | ウナイ・シモン（スペイン） | **大会記録の7クリーンシート** |\n| 最優秀若手 | クバルシ（スペイン） | 同僚ヤマルを抑えて受賞 |\n\n- 得点ランキング最終: エムバペ10・メッシ8・ベリンガム7・ハーランド7・ケイン6（前号から変動なし・決勝が無得点のため確定）\n\n### 監督人事の余波\n\n- ドイツ代表: クロップ就任here we go・正式発表待ち（「Here We Go!」欄1件目）。**大会終了に伴い、W杯欄は本号で終了**——今後の監督人事・移籍への波及は移籍欄で扱う\n\n---\n\n## 5. 日本人選手の動向\n\n- **[[佐野海舟]]（マインツ）**: リバプールが€60M（約111億円）準備・個人条件合意済み・マインツも売却前向きとの報道が継続（Football Tribe・東スポ等）。アーセナル・ユナイテッドの関心も並記されるが、**核は引き続き英B級ソースの転載でS/A級直接確認は本日も取れず**。信頼度○〜△を維持。W杯終了でリバプールの前線・中盤補強（バルコラと両睨み）が動き出す局面\n- **[[久保建英]]（レアル・ソシエダ）**: スペイン紙報道ベースで「大きなオファーは届いておらず5シーズン目残留へ」が濃厚を維持（契約2029年まで・解除金€60M・マドリーが権利50%保持）。リバプール・バイエルンの関心やトラブゾンスポルのレンタルオファー報道はあるが具体進展なし\n- **[[中村草太]]（サンフレッチェ広島 → ル・アーヴル）**: 7/17クラブ公式発表の期限付き移籍（2027年6月30日まで・既報）。新規続報なし\n\n---\n\n## 主要ソース\n\n- [FIFA公式: Spain v Argentina 1-0 — Final match centre](https://www.fifa.com/en/match-centre/match/17/285023/289292/400021543)\n- [ESPN: Spain 1-0 Argentina Final Score](https://www.espn.com/soccer/match/_/gameId/760517/argentina-spain)\n- [Olympics.com: Spain reign supreme with extra-time goal from Ferran Torres](https://www.olympics.com/en/news/fifa-world-cup-2026-spain-argentina-final-score-lineups-live-updates)\n- [NBC News: Spain outlasts Argentina 1-0 to win second title](https://www.nbcnews.com/sports/soccer/live-blog/fifa-world-cup-final-2026-argentina-spain-messi-yamal-live-updates-rcna587754)\n- [ESPN: Mbappé wins Golden Boot after Messi\u0027s goalless final](https://www.espn.com/soccer/story/_/id/49397919/kylian-mbappe-wins-golden-boot-2026-world-cup-lionel-messi-goalless-final)\n- [ESPN: Rodri wins World Cup Golden Ball as Spain dominate awards](https://www.espn.com/soccer/story/_/id/49404995/2026-world-cup-golden-ball-spain-unai-simon-pau-cubarsi)\n- [NBC Sports: 2026 World Cup award winners](https://www.nbcsports.com/soccer/news/2026-world-cup-award-winners-golden-boot-golden-ball-best-young-player-golden-glove)\n- [Al Jazeera: Mbappe takes home second Golden Boot, Spain sweeps awards](https://www.aljazeera.com/sports/2026/7/20/mbappe-takes-home-second-golden-boot-spain-sweeps-world-cup-awards)\n- [Sky Sports: Joao Gomes — Aston Villa sign midfielder from Wolves in £38m deal](https://www.skysports.com/football/news/11677/13564311/joao-gomes-aston-villa-sign-midfielder-from-wolves-in-lb38m-deal)\n- [ESPN: João Gomes bolsters Aston Villa midfield as switch confirmed](https://www.espn.com/soccer/story/_/id/49381970/joao-gomes-bolsters-aston-villa-midfield-switch-wolves-confirmed)\n- [Sky Sports: Morgan Rogers spotted arriving for Chelsea medical](https://www.skysports.com/football/video/12606/13565165/morgan-rogers-spotted-arriving-for-chelsea-medical-ahead-of-lb117m-deal)\n- [Sky Sports: Chelsea agree record £117m deal for Morgan Rogers](https://www.skysports.com/football/news/11668/13564758/morgan-rogers-transfer-news-chelsea-have-british-record-lb117m-bid-accepted-for-aston-villa-forward-and-arsenals-no-1-target)\n- [Sky Sports: Arsenal agree fee with Club Brugge to sign Christos Tzolis](https://www.skysports.com/football/news/11095/13564048/christos-tzolis-arsenal-agree-fee-with-club-brugge-to-sign-greek-winger-as-replacement-for-leandro-trossard)\n- [SI: Arsenal\u0027s deal for Tzolis confirmed by Club Brugge\u0027s manager](https://www.si.com/soccer/arsenal-deal-christos-tzolis-confirmed-club-brugge-manager)\n- [ESPN: Klopp reaches agreement on \u0027key points\u0027 to become Germany head coach](https://www.espn.com/soccer/story/_/id/49334704/jurgen-klopp-germany-world-cup-julian-nagelsmann)\n- [FOX Sports: Klopp agrees principles of contract for Germany job](https://www.foxsports.com/stories/soccer/jurgen-klopp-agrees-principles-contract-become-next-germany-head-coach)\n- [Goal: Arsenal agree deal to sign Tottenham sensation Elijah Upson](https://www.goal.com/en/lists/arsenal-transfer-elijah-upson-from-tottenham/blt9f12084a9fae9641)\n- [ESPN: Forest set to sign Schlager](https://www.espn.com/soccer/story/_/id/49367986/nottingham-forest-xaver-schlager-rb-leipzig-free-agent-signing-sources)\n- [This Is Anfield: Romano — Barcola top of Liverpool transfer list](https://www.thisisanfield.com/2026/07/bradley-barcola-evasive-liverpool-transfer-target-psg-2026/)\n- [Sky Sports: Tonali — Tottenham sign Italy midfielder in club-record £100m deal（※7日ガード外・参考）](https://www.skysports.com/football/news/11095/13559730/sandro-tonali-tottenham-sign-italy-midfielder-in-club-record-lb100m-deal-from-newcastle)\n- [Goal（日本語）: 佐野海舟にリヴァプールが111億円準備か](https://www.goal.com/jp/%E3%83%8B%E3%83%A5%E3%83%BC%E3%82%B9/sanokaoshu-liverpool-mainz/bltb0ba78df265e7a15)\n- [Football Tribe Japan: 佐野海舟の獲得に向けリバプールが正式オファー準備か（7/18）](https://football-tribe.com/japan/2026/07/18/357032/)\n- [デイリースポーツ: 久保建英、レアル・ソシエダード5シーズン目へ（7/10）](https://www.daily.co.jp/soccer/2026/07/10/0020574371.shtml)\n- [FootballTransfers: Done Deals 20 July 2026](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/07/transfer-news-every-done-deal-official-confirmed-completed-signing-europe-today-20-july-2026)\n\n---\n\n*生成: 2026-07-21 03:30 JST / WC_MODE: false・大会終了につきW杯欄は本号で最終回 / 保存障害対策「最終チャット出力=記事本文」方式を継続（2号目）/ ロジャーズ・ツォリス・クロップの公式発表は明日号で完了欄へ昇格見込み*";
