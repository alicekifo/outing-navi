<script>
const md = "## 🤖 今週のAI最新動向\n\n### 1. OpenAI、GPT-5.5-Cyberを正式リリース — CyberGym 85.6%で全モデル最高スコア\n\n**何が起きたか**\n6月22日、OpenAIはサイバーセキュリティ特化モデル「GPT-5.5-Cyber」の正式版をリリースした。「Daybreak」プログラムの拡張と同時に、Trail of Bitsほか25社以上のセキュリティ企業・政府機関が参加する自動パッチ適用イニシアチブ「Patch the Planet」も開始した。\n\n**なぜ重要か**\nGPT-5.5-Cyberは500問のCTFチャレンジで構成される **CyberGym**で85.6%（標準GPT-5.5: 81.8%）、エクスプロイト自動生成ベンチマーク **ExploitGym** で39.5%（同: 25.95%）、**SEC-bench Pro** で69.8%（同: 63.1%）を達成。既知脆弱性の再現からパッチ生成・検証までを単一エージェントで連続実行できる点が質的な飛躍を示している。セキュリティエンジニアとして見ておくべきは、アクセスが「Trusted Access for Cyber」プログラム経由の審査済みディフェンダー限定である点だ——攻撃能力を持つモデルをオープンにしないという判断が露骨で、業界規範を先取りしている。\n\n\u003e source: [Axios — OpenAI gives GPT-5.5-Cyber more powerful cybersecurity capabilities](https://www.axios.com/2026/06/22/openai-rolls-out-more-capable-version-of-cyber-model) (2026-06-22公開)\n\n---\n\n### 2. ノーベル賞受賞者ふくむDeepMindの頭脳がAnthropicへ連続流出\n\n**何が起きたか**\nAlphaFold 2の共同開発者でノーベル化学賞（2024年）共同受賞者のJohn Jumperが6月20日にDeepMind離脱を発表し、Anthropicへの移籍を表明。Bloombergは6月24日、さらにJonas Adler・Alexander Pritzelの2研究者もAnthropicへの転籍を準備していると報じた。\n\n**なぜ重要か**\nAlphaFoldチームの中核が揃ってAnthropicに向かっていることは、同社が「AI for Science」（創薬・タンパク構造解析・計算生物学）を次の主戦場に定めていることの証左だ。Googleにとっては、DeepMindというブランドの価値そのものに関わる痛手であり、中期的な研究競争力の低下リスクを示す。Jumper個人はAlphaFoldの生物学的意義だけでなく、**大規模実験データからの構造予測**という方法論を次の応用先に持ち込める立場にある。\n\n\u003e source: [Bloomberg — Google Poised to Lose Two More High-Profile AI Staffers to Anthropic](https://www.bloomberg.com/news/articles/2026-06-24/google-poised-to-lose-two-more-high-profile-ai-staffers-to-anthropic) (2026-06-24公開)\n\n---\n\n### 3. Gemini 3.5 Pro、エンタープライズ限定プレビュー開始 — 2Mトークンで全生産モデル最大\n\n**何が起きたか**\nGoogleがGemini 3.5 Proを6月23日前後にVertex AI経由でエンタープライズ限定プレビューとして公開した。一般GA（価格正式発表含む）は6月末が目標とされている。\n\n**なぜ重要か**\n確認済みスペックは **2Mトークンコンテキスト**（現行生産モデル中最大、Gemini 3.5 Flashの2倍）と **Deep Think推論モード**の組み合わせ。API価格は未確定だが、Flash比約10倍（入力$15・出力$60/Mトークン前後）が想定されている。ベンチマーク数値（Pro版）は未公開だが、同系列のFlashがすでにTerminal-Bench 2.1で76.2%、MCP Atlasで83.6%を記録。コードベース全体・複数年分のログを単一コンテキストに収めて解析できる規模は、セキュリティ監査ツールの設計思想を大きく変えうる。\n\n**[注意]** Gemini 3.5 Proの公式スペックはGoogle I/O 2026（2026-05-19）で発表済みのものであり、エンタープライズプレビュー開始の一次発表はGoogle公式ブログでの確認に至っていない。\n\n\u003e source: [codersera.com — Gemini 3.5 Complete Guide 2026](https://codersera.com/blog/gemini-3-5-complete-guide-2026/) / Google I/O 2026 (2026-05-19公表スペック)\n\n---\n\n## 📄 今週の注目論文\n\n### 1. LLMエージェントを安全にするには何が必要か — 247論文のサーベイ\n\n**タイトル（日本語訳 / 英語原題）**\nLLMエージェントのセキュリティに向けて：脅威面・攻撃・防御・評価 / *Toward Secure LLM Agents: Threat Surfaces, Attacks, Defenses, and Evaluation*\n\n**著者・所属・arXiv ID・公開日**\nYuchen Ling, Shengcheng Yu, Zhenyu Chen, Chunrong Fang（南京大学ほか）/ arXiv:2606.10749 / 2026-06-09\n\n**3行サマリー**\n- **Problem:** LLMエージェントは「テキスト生成器」から「ツール呼び出し・メモリ保持・外部環境への作用」を行うシステムへと変貌しており、従来の安全性評価手法がそのままでは通用しない\n- **Method:** 247本の論文を情報フロー・委任権限・永続ステートという3軸のライフサイクルモデルで整理し、攻撃ファミリー（プロンプトインジェクション、ツール権限乱用、メモリ汚染など）・防御・評価手法を体系化\n- **Finding:** エージェント特有の脅威（間接プロンプトインジェクション・マルチホップ権限昇格など）は既存のLLMセキュリティ研究でカバーされておらず、評価メトリクス自体が標準化されていないことが明確になった\n\n**読みどころ**\nツール呼び出しを伴うエージェントをプロダクションに出す前に読んでおくべき「地図」として機能する。特に「情報フロー制御」と「委任された権限の最小化」という視点は、Linuxのsudoや能力モデル（capabilities）と直接対比できる概念で、セキュリティエンジニアが設計判断に使いやすい語彙を与えてくれる。\n\n\u003e source: [arXiv:2606.10749](https://arxiv.org/abs/2606.10749) (2026-06-09公開)\n\n---\n\n### 2. 進化アルゴリズムでLLMの穴を網羅的に探す — MAP-ElitesによるRed Teaming\n\n**タイトル（日本語訳 / 英語原題）**\nLLM安全性の多様な脆弱性を発見するための品質多様性進化 / *Quality-Diversity Evolution for Discovering Diverse Vulnerabilities in LLM Safety*\n\n**著者・所属・arXiv ID・公開日**\nSubhadip Mitra（単著）/ arXiv:2606.00801 / 2026-05-30\n\n**3行サマリー**\n- **Problem:** 手動Red Teamingはスケールせず、LLM-as-Attacker手法はモード崩壊（同じ攻撃の繰り返し）を起こし、勾配ベース手法はトークン列のゴミを生成する——既存手法では「攻撃の多様性」が保証できない\n- **Method:** MAP-Elites（品質多様性進化アルゴリズム）をセマンティックレベルで適用し、攻撃戦略タイプ・エンコーディング手法・プロンプト長の3次元アーカイブを維持しながら解釈可能な攻撃集合を進化させる\n- **Finding:** GPT-4o-miniはROT13エンコーディング+仮説的フレーミング+マルチターンの組み合わせに弱く、GeminiはROT13+直接攻撃に脆弱。一方Claudeは全戦略に対して「曖昧な応答」を一貫して返し、明確な脆弱プロファイルが見つからなかった\n\n**読みどころ**\n「どのエンコーディング × フレーミング組み合わせが刺さるか」を自動で網羅するアプローチは、ペネトレーションテストのファジングと発想が重なる。ROT13という古典的なエンコードがフロンティアモデルをすり抜ける事実は、安全フィルターがトークン列のパターンマッチに依存している箇所を示唆しており、実務的な示唆が大きい。\n\n\u003e source: [arXiv:2606.00801](https://arxiv.org/abs/2606.00801) (2026-05-30公開)\n\n---\n\n### 3. LLMのジェイルブレーク検出器に蔓延する評価バイアスを解剖する\n\n**タイトル（日本語訳 / 英語原題）**\nGate AI：LLMセキュリティベンチマーク評価手法と結果 / *Gate AI: LLM Security Benchmark Evaluation Methodology and Results*\n\n**著者・所属・arXiv ID・公開日**\nRyle Goehansen, Marcus Sousa / arXiv:2606.02959 / 2026-06-01\n\n**3行サマリー**\n- **Problem:** 公開されているプロンプトインジェクション・ジェイルブレーク検出器の評価論文の多くが「データセット別の閾値チューニング」と「動作点の非開示」という2つの系統的欠陥を持ち、再現不能な好成績を示している\n- **Method:** 16個の公開ベンチマーク（計12,111サンプル）に対して5分割交差検証を実施。閾値を一切データセット別にチューニングせず、ホールドアウトFold上で選択した単一グローバル動作点をすべてのデータセットに均一適用。さらにMinHash+LSH近傍重複（Jaccard ≥ 0.8）で汚染診断を追加\n- **Finding:** データセット別チューニングをしない場合、多くの検出器の評価スコアは著しく低下し、先行研究が主張する性能値が再現されないことが示された\n\n**読みどころ**\n「評価ツールの評価」という視点が実務的に重要。社内でプロンプトインジェクション検出器を導入・選定する際、公開スコアをそのまま信じてよいかを判断する基準を与えてくれる。データセット汚染（近傍重複サンプルがトレーニングとテストに跨がる問題）の検出手法は、セキュリティベンチマーク全般に応用できる。\n\n\u003e source: [arXiv:2606.02959](https://arxiv.org/abs/2606.02959) (2026-06-01公開)\n\n---\n\n### 4. 人間の「感情への影響」をAI安全性の独立カテゴリとして定義する\n\n**タイトル（日本語訳 / 英語原題）**\n感情的AIの安全性：LLM安全性に欠けているピース / *Affective AI Safety: The Missing Piece in LLM Safety*\n\n**著者・所属・arXiv ID・公開日**\nCarolin Ifländer, Alba Curry, Flor Miriam Plaza-del-Arco, Amanda Cercas Curry / arXiv:2606.23380 / 2026-06-22（v1）、2026-06-23（v2）\n\n**3行サマリー**\n- **Problem:** AI安全性研究は「誤情報の伝播」「物理的危害」などの認識論的・物理的リスクに集中しており、AIが人間の感情生活に与える影響（情緒的リスク）は断片的にしか論じられてこなかった\n- **Method:** 既存のAI安全性・心理学・HCI文献をレビューし、感情的ハームの統合分類体系（taxonomy）を新たに構築\n- **Finding:** 感情的ハームは（1）感情的自己疎外（AI依存による本来の感情への気づき喪失）、（2）公平性・バイアスによる感情的ハーム、（3）関係的ハーム（人間関係の代替・劣化）の3類型に整理された\n\n**読みどころ**\nセキュリティ技術者にとって一見遠い話に見えるが、エージェントが長期的に人間と相互作用する設計（対話型アシスタント、コーチング型ツール）では「感情的誘導」はソーシャルエンジニアリングと同一線上の攻撃面になりうる。AI製品のRed Team評価に「affective safety」軸を追加すべきか、という問いを実務に持ち帰れる論文だ。\n\n\u003e source: [arXiv:2606.23380](https://arxiv.org/abs/2606.23380) (2026-06-22公開)\n\n---\n\n## 💡 今週のひとことインサイト\n\n### GPT-5.5-Cyberが示す「攻撃の自動化」と、MAP-Elitesが示す「探索の自動化」——Red Teamingが工業化する時代に何が変わるか\n\n今週最も印象的だったのは、OpenAIのGPT-5.5-CyberとarXiv 2606.00801のQuality-Diversity進化論文が、ほぼ同時期に「攻撃の自動化」を異なる角度から示したことだ。前者は「審査済みディフェンダー限定」という制限付きで脆弱性発見から自動パッチまでをやり切るモデルを出荷し、後者は進化アルゴリズムによってLLM自身の防御穴を網羅的にサーチする手法を提示した。\n\nLinuxセキュリティの文脈で考えると、これはファジング技術の成熟と重なって見える。かつてAFLが「バグ探索の民主化」をもたらしたように、今やLLM攻撃のファジングも自動化・多様化の段階に入った。MAP-Elitesがエンコーディング×フレーミング×長さの組み合わせ空間を系統的に探索し、ROT13という50年前の変換が最前線モデルをすり抜ける事実は、防御側が「入力の意味的多様性」をまだ十分に考慮できていないことを示している。\n\n一方で審査済みアクセス制限という設計は、最強のエクスプロイトツールを「許可されたディフェンダーだけが使える」というアクセス制御モデルそのものだ。これはsudoやLinux capabilitiesと同じ哲学——能力自体を消すのではなく、**誰が持てるかを管理する**。AIセキュリティの統治が、OS設計の先人が苦労して構築した「最小権限の原則」に再び辿り着いているのが面白い。\n\n---\n\nSources:\n- [Axios — OpenAI GPT-5.5-Cyber](https://www.axios.com/2026/06/22/openai-rolls-out-more-capable-version-of-cyber-model)\n- [SiliconANGLE — Daybreak Patch the Planet](https://siliconangle.com/2026/06/22/openai-expands-daybreak-patch-planet-full-gpt-5-5-cyber-release/)\n- [Bloomberg — DeepMind staffers to Anthropic](https://www.bloomberg.com/news/articles/2026-06-24/google-poised-to-lose-two-more-high-profile-ai-staffers-to-anthropic)\n- [arXiv:2606.10749 — Toward Secure LLM Agents](https://arxiv.org/abs/2606.10749)\n- [arXiv:2606.00801 — Quality-Diversity Evolution](https://arxiv.org/abs/2606.00801)\n- [arXiv:2606.02959 — Gate AI Benchmark](https://arxiv.org/abs/2606.02959)\n- [arXiv:2606.23380 — Affective AI Safety](https://arxiv.org/abs/2606.23380)\n- [Codersera — Gemini 3.5 Guide](https://codersera.com/blog/gemini-3-5-complete-guide-2026/)";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
