<script>
const md = "## 🤖 今週のAI最新動向\n\n### 1. OpenAI、GPT-5.6ファミリー（Sol / Terra / Luna）を一般公開——ChatGPT Workも同時始動\n\n**何が起きたか**: 6月26日から約20のパートナー組織限定で提供されていたGPT-5.6が、7月9日に一般公開された。同時にCodexベースのエージェント製品「ChatGPT Work」も発表された。\n\n**なぜ重要か**: 3サイズ構成の価格は100万トークンあたりSol $5/$30、Terra $2.50/$15、Luna $1/$6（入力/出力）。公表ベンチマークではTerminal-Bench 2.1でSolが88.8%（Sol Ultraは91.9%）を記録しClaude Mythos 5の88.0%を上回り、最小のLunaでも82.5%とClaude Opus 4.8の78.9%を超えると主張している。CLIワークフロー（計画・反復・ツール協調）を測るベンチでの数値であり、エージェント用途の主戦場がターミナル操作系に完全に移ったことを示す。なお当初の限定提供は政府の規制対応によるもので、公開許可を得ての一般提供という経緯自体が、フロンティアモデルが輸出管理の対象になった2026年の新常態を映している。SecureBio評価（Virology 53.5%、World-Class Bio 68.3%）を自ら公開している点もデュアルユース議論の文脈で注目。\n\n出典: [OpenAI](https://openai.com/index/previewing-gpt-5-6-sol/) (2026-06-26公開・一般提供は2026-07-09)、[Engadget](https://www.engadget.com/2210308/openai-rolls-out-gpt5-6-july-9/) (2026-07-09公開)\n\u003e source: https://openai.com/index/previewing-gpt-5-6-sol/\n\n### 2. SpaceXAI（旧xAI）、Grok 4.5をリリース——Cursor買収後初の「共同開発」モデル\n\n**何が起きたか**: 7月8日、SpaceXAIがフラッグシップモデルGrok 4.5を公開した。1.5兆パラメータのV9基盤上に構築され、6月にSpaceXが約$60Bで買収合意したCursorと共同でトレーニングされた初のモデルとなる。\n\n**なぜ重要か**: 価格は$2/$6（入力/出力・100万トークン）、実測約80トークン/秒。Muskは「Opusクラスでより高速・低コスト」と主張するが、自社公表ベンチでもOpus 4.8に勝つのは4本中2本（DeepSWE 1.0とTerminal-Bench 2.1）で、DeepSWE 1.1では6ポイント、SWE-Bench Proでは4.5ポイント負けている。むしろ本命はトークン効率で、SWE-Bench Proの平均出力トークンが15,954とOpus 4.8（最大67,020）の約4分の1。「同じ解像度なら安く速く」という戦い方は、コーディングエージェントを長時間回す実務では効いてくる。エディタ企業をモデル開発に垂直統合する動きの試金石でもある。\n\n出典: [Axios](https://www.axios.com/2026/07/08/spacexai-grok-new-model) (2026-07-08公開)\n\u003e source: https://www.axios.com/2026/07/08/spacexai-grok-new-model\n\n### 3. Anthropic、バーナンキ元FRB議長をLong-Term Benefit Trustに任命——「Inviting hard questions」も同日公開\n\n**何が起きたか**: 7月9日、AnthropicがBen Bernanke元FRB議長の同社Long-Term Benefit Trust（LTBT）への任命を発表。同日に、AIに関する公開の疑問へ「作業過程を見せながら」答えていく方針文書「Inviting hard questions」と、Claudeの利用を振り返る新機能も公開した。\n\n**なぜ重要か**: LTBTはAnthropicの取締役選任権を持つ独自ガバナンス機構で、そこにマクロ経済政策の重鎮を入れたことは、AIの労働市場・経済への影響を統治レベルの議題として扱う意思表示と読める。7月1日のFable 5グローバル再展開（輸出規制解除に伴う復帰・サイバーセキュリティ分類器を追加）直後というタイミングで、規制当局と社会への説明責任を強化するパッケージとして揃えてきた形だ。\n\n出典: [Anthropic](https://www.anthropic.com/news) (2026-07-09公開)\n\u003e source: https://www.anthropic.com/news\n\n※Google DeepMindのGemini 3.5 Pro（7月17日公開目標・アーキテクチャ全面再構築）の報道が複数あるが、Google公式の発表・モデルカードが存在せず一次ソース基準を満たさないため本欄では不採用。\n\n## 📄 今週の注目論文\n\n### 1. エージェントの記憶は本人のものではない——LLMエージェント記憶への偽造推論攻撃と防御 / Your Agent\u0027s Memories Are Not Its Own: Forged Reasoning Attacks on LLM Agent Memory and Defenses\n\n- 著者: Neeraj Karamchandani ほか / arXiv:2607.05029 / 2026-07-06公開\n- **Problem**: 永続メモリを持つLLMエージェントでは、事実知識だけでなく「過去の推論履歴」そのものが攻撃面になる。\n- **Method**: 事実ではなく記憶された推論（rationale)を毒するFARMA攻撃を提案。回避的な言い回しでキーワードフィルタ等の既存防御を突破する。防御側として5つの重み付きシグナルで記憶エントリを検査するReasoning Guardを核にした多層パイプラインSENTINELを構築。\n- **Finding**: FARMAはベースライン条件で攻撃成功率最大100%、既存防御も突破。SENTINELは成功率を0%まで低減し、326件の良性トレースで誤検知ゼロ（複数エージェント・複数モデル・50試行で評価）。\n- **読みどころ**: RAG毒性攻撃の次は「推論履歴の毒」という指摘が鋭い。ログやシェル履歴の改竄が権限昇格の足がかりになるのと同型の話で、エージェントに長期記憶を持たせるなら記憶への書き込みにも完全性検証が要る——という設計原則を数字で示した。\n\narXiv: https://arxiv.org/abs/2607.05029\n\u003e source: https://arxiv.org/abs/2607.05029\n\n### 2. PI-Hunter: プロンプトインジェクションの露出と局在化のための自動レッドチーミング / PI-Hunter: Automated Red-Teaming for Exposing and Localizing Prompt Injections\n\n- 著者: Pengfei He ほか / arXiv:2606.12737 / 2026-06-10公開\n- **Problem**: 外部ソース経由の間接プロンプトインジェクションに対し、既存のレッドチーミングは「どこから攻撃が成立するか」の可視性を欠く。\n- **Method**: 現実的なテストケースを構築し、フィードバック駆動の反復探索でエージェントに環境内の潜在的な悪性指示を踏ませ、脆弱点を特定・局在化するフレームワーク。\n- **Finding**: 複数ベンチマーク・複数エージェントアーキテクチャで、強力な自動レッドチーミングベースラインを上回る脆弱性露出率と攻撃面カバレッジを達成。既存のインジェクション防御が有効な環境でも機能した。\n- **読みどころ**: ファジングの発想をエージェントの攻撃面探索に持ち込んだ形で、「防御を入れたから安全」ではなく「どの入力経路が抜けているか」を系統的に洗い出せる。エージェントを本番投入する前のペネトレーションテスト工程の雛形として実務価値が高い。\n\narXiv: https://arxiv.org/abs/2606.12737\n\u003e source: https://arxiv.org/abs/2606.12737\n\n### 3. エージェントはオープンワールドに汎化できるか？——静的訓練の脆さを暴く / Can Agents Generalize to the Open World? Unveiling the Fragility of Static Training in Tool Use\n\n- 著者: Song-Lin Lv ほか / arXiv:2607.01084 / 2026-07-01公開\n- **Problem**: 静的ベンチマークで高得点のエージェントが、クエリ・ツールセット・インタラクションが変動する実環境で崩れる。\n- **Method**: OpenAgent（オープンワールドでのツール使用）を問題設定として定式化し、Perception / Interaction / Reasoning / Internalizationの4層で分布シフトを制御的に注入するサンドボックスを構築。SFTとRLの両訓練方式を評価。\n- **Finding**: SFT・RLともに環境シフト下で性能が劣化し、静的訓練の限界を実証。対策として摂動拡張ファインチューニング（Perturbation-Augmented Fine-Tuning）を提案し、頑健性の改善を確認。\n- **Finding補足**: ベンチマークスコアと実運用性能の乖離を「どの層のシフトで壊れるか」に分解した点が新しい。\n- **読みどころ**: ツールのバージョンが上がっただけでエージェントが壊れる——という運用者なら誰でも踏む問題を初めて系統的に測った。ベンダーのベンチ数値（上のGPT-5.6やGrok 4.5の主張含む）を眺めるときの解毒剤になる。\n\narXiv: https://arxiv.org/abs/2607.01084\n\u003e source: https://arxiv.org/abs/2607.01084\n\n### 4. 原子的アクションから標準作業手順書へ——自己進化するLLMエージェントのための反復的ツール最適化 / From Atomic Actions to Standard Operating Procedures: Iterative Tool Optimization for Self-Evolving LLM Agents\n\n- 著者: Haipeng Ding ほか / arXiv:2607.07321 / 2026-07-08公開\n- **Problem**: 基本アクションだけの静的ツールセットでは、エージェントが毎回同じワークフローを一から組み直す無駄が生じる。\n- **Method**: 実行トラジェクトリから再利用可能なSOP（標準作業手順書）を抽出し、呼び出し可能な高次ツールとして合成。構築→統合→評価→剪定のライフサイクルでツールセットを反復最適化するEvoSOPフレームワーク。\n- **Finding**: ベースライン比でタスク成功率が有意に向上し、インタラクションのラウンド数を大幅に削減。反復最適化が信頼できるツール使用パターンを生むことを示した。\n- **読みどころ**: 要は「エージェントが自分でシェル関数を書いて~/.bashrcに育てていく」話。頻出手順のスクリプト化はLLM呼び出し削減＝コスト削減に直結し、AIをスクリプト・フック化で置き換えていく運用思想とも合致する。ただし上記FARMA論文の視点では、自己進化するツールセットは新しい毒の注入先でもある。\n\narXiv: https://arxiv.org/abs/2607.07321\n\u003e source: https://arxiv.org/abs/2607.07321\n\n## 💡 今週のひとことインサイト\n\n### 攻撃面は「入力」から「記憶」へ動いた\n\n今週いちばん面白かったのは、FARMA論文（arXiv:2607.05029）とEvoSOP論文（arXiv:2607.07321）を並べたときの構図だ。片方は「エージェントの記憶推論は毒せる、成功率100%」と言い、もう片方は「エージェントに経験からツールを自己生成させると成功率が上がる」と言う。つまり業界は、エージェントを賢くする手段として「実行履歴の再利用」に一斉に向かっているのに、その履歴こそが最も検証されていない書き込み可能領域だという事実が同じ週に示された。セキュリティ屋の目にはこれは既視感のある光景で、UNIXの世界で言えばcron・シェル履歴・dotfilesが昔から権限昇格の定番経路だったのと同じ話だ。実行時の入力検証（プロンプトインジェクション対策）だけ固めても、永続化層への書き込みが素通しなら意味がない。SENTINELが誤検知ゼロで攻撃を止めたのは朗報だが、本質は個別の防御ツールではなく「エージェントの記憶にも完全性監視を——tripwireをファイルシステムだけでなく推論履歴にも」という設計原則の転換にある。エージェントに長期記憶を持たせる設計を今やっている人は、この2本をセットで読むべきだと思う。\n\n\u003e source: https://arxiv.org/abs/2607.05029";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
