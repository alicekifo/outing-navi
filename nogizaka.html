const md = "情報が揃いました。レポートを作成します。\n\n---\n\n## 📰 今週のニュース\n\n### 1. 【公式】42ndシングル「是非に及ばず」本日より先行配信スタート\n一ノ瀬美空（5期生）が初の表題曲センターを務める42ndシングル「是非に及ばず」が、本日2026年6月13日（土）0時より各音楽配信サービスにて先行配信開始。CD発売は7月22日（水）予定。\n\n\u003e 情報源: [乃木坂46公式サイト](https://www.nogizaka46.com/s/n46/news/detail/102005) / [ライブドアニュース](https://news.livedoor.com/article/detail/31529986/) （2026年6月10日）\n\n---\n\n### 2. 【公式】真夏の全国ツアー2026 本日開幕・全国8都市18公演\nグループ史上最大規模のツアーが本日6月13日（土）、サンドーム福井公演（初の福井開催）をもって開幕。8月23日の東京・明治神宮野球場まで続く。\n\n\u003e 情報源: [乃木坂46公式サイト](https://www.nogizaka46.com/s/n46/news/detail/101747) / [ツアー特設ページ](https://www.nogizaka46.com/s/n46/page/summer_tour2026) （2026年4月発表）\n\n---\n\n### 3. 【公式】42ndシングルフォーメーション発表（6月7日）\n6月7日（日）放送「乃木坂工事中」（日本テレビ系）にてフォーメーション発表。6期生から2名が初選抜入り。センター・一ノ瀬美空（5期生）が選ばれた経緯をコメント。\n\n\u003e 情報源: [音楽ナタリー](https://natalie.mu/music/news/675193) / [オリコン](https://www.oricon.co.jp/news/2459651/full/) （2026年6月7日）\n\n---\n\n### 4. 【公式】FOD SHORT「野球少女鷲尾」配信開始（6月12日）\n川﨑桜（4期生）・小川彩（5期生）が出演するFOD SHORT『野球少女鷲尾』が、6月12日（金）0時よりFOD独占配信開始。\n\n\u003e 情報源: [乃木坂46公式サイト](https://www.nogizaka46.com/s/n46/news) （2026年6月12日）\n\n---\n\n### 5. 【公式】42ndシングル最新ビジュアル公開\nセンター・一ノ瀬美空（5期生）をはじめ選抜18名による最新ビジュアル（ジャケット候補）が公式より公開。\n\n\u003e 情報源: [音楽ナタリー](https://natalie.mu/music/news/675198) / [OTOTOY](https://ototoy.jp/news/130338) （2026年6月上旬）\n\n---\n\n## 🎵 音楽・リリース情報\n\n### 42ndシングル「是非に及ばず」\n\n| 項目 | 内容 |\n|------|------|\n| タイトル | 是非に及ばず |\n| 発売日 | 2026年7月22日（水） |\n| 先行配信 | 2026年6月13日（土）0時〜 |\n| センター | 一ノ瀬美空（5期生） ※初の表題曲センター |\n| フロント（1列目） | 瀬戸口心月（6期生）・一ノ瀬美空（5期生）・賀喜遥香（4期生） |\n| 選抜人数 | 18名 |\n\n**注目ポイント：**\n- **6期生初選抜**：大越ひなの（6期生）・森平麗心（6期生）\n- **6期生から計4名選抜入り**：上記2名に加え、瀬戸口心月（6期生）・矢田萌華（6期生）も選抜復帰\n- **選抜復帰**：岩本蓮加（3期生）5作ぶり復帰\n- **選抜から外れた主なメンバー**：小川彩（5期生）・冨里奈央（5期生）\n\n**チャート・再生数：** 本日先行配信開始のため今週時点では集計なし\n\n\u003e 情報源: [乃木坂46公式](https://www.nogizaka46.com/s/n46/page/42nd_single) / [音楽ナタリー](https://natalie.mu/music/news/675193) / [TOWER RECORDS](https://tower.jp/article/feature_item/2026/06/01/0703)\n\n---\n\n## 👤 メンバー個別活動\n\n### 1. 川﨑桜（4期生）・小川彩（5期生）\n**FOD SHORT「野球少女鷲尾」出演**\n- 放送局/配信先：FOD（フジテレビオンデマンド）独占配信\n- 配信開始日：2026年6月12日（金）0時〜\n- 内容：2名がW主演するオリジナル短編映像作品\n\n\u003e 情報源: 乃木坂46公式サイト / ライブドアニュース（2026年6月）\n\n---\n\n### 2. 金川紗耶（4期生）\n**1st写真集「好きのグラデーション」発売直前**\n- 発売予定日：2026年6月30日（火）\n- 撮影地：クロアチア・ドゥブロヴニク\n- 内容：A4判 オールカラー全160ページ、ランジェリー・水着撮影含む\n- 最新情報：特典絵柄21種・裏表紙4種が今週公開\n\n\u003e 情報源: [乃木坂46公式](https://www.nogizaka46.com/s/n46/news/detail/101920) / [音楽ナタリー](https://natalie.mu/music/news/672315) / [DONUTS公式PR](https://www.donuts.ne.jp/news/2026/0506_saya_1stphoto_4/)（2026年5〜6月）\n\n---\n\n### 3. 一ノ瀬美空（5期生）\n**42ndシングル「是非に及ばず」初センター**\n- 6月7日放送「乃木坂工事中」でのセンター発表にてコメント：「すごく重みがあります」\n- 本日ツアー初日に先行配信スタートと重なる\n\n\u003e 情報源: [モデルプレス](https://mdpr.jp/music/detail/4790964) / [オリコン](https://www.oricon.co.jp/news/2459651/full/)（2026年6月7日）\n\n---\n\n### 4. 菅原咲月（5期生）\n**4代目キャプテンとして初のシングルフォーメーション発表に臨む**\n- キャプテン就任後、初めての選抜フォーメーション発表が6月7日に実施\n\n\u003e 情報源: [乃木坂46公式](https://www.nogizaka46.com/s/n46/news/detail/101960) / [オリコン](https://www.oricon.co.jp/news/2455920/full/)（2026年5月20日発表）\n\n---\n\n### 5. 川﨑桜（4期生）\n**1st写真集「エチュード」発売済み（参考情報）**\n- 発売日：2026年4月14日（火）\n- 撮影地：フランス（パリ・ニース）\n- 特典ミニブックの表紙が今週公開（ナタリー報道）\n\n\u003e 情報源: [乃木坂46公式](https://www.nogizaka46.com/s/n46/news/detail/101725) / [新潮社](https://www.shinchosha.co.jp/book/356851/) / [音楽ナタリー](https://natalie.mu/music/news/675123)\n\n---\n\n### 6. 梅澤美波（元乃木坂46・3期生）\n**卒業後の動向**（参考情報）\n- 2026年5月21日、東京ドームにて卒業コンサート（14th Year Birthday Live DAY2）を約5万人の前で開催し卒業\n- 「乃木坂工事中」ではありがとうキャプテン！特別回が公式YouTubeにて公開済み\n\n\u003e 情報源: [音楽ナタリー ライブレポート](https://natalie.mu/music/news/672941)（2026年5月21日）\n\n---\n\n## 🎤 ライブ・イベント\n\n### 乃木坂46 真夏の全国ツアー2026【公式】\n\nグループ史上最大規模・全18公演（全国8都市）\n\n| 日程 | 会場 | 備考 |\n|------|------|------|\n| **6/13（土）・14（日）** | サンドーム福井（福井） | **本日開幕・福井初公演** |\n| 6/24（水）・25（木） | 横浜アリーナ（神奈川） | — |\n| 7/4（土）・5（日） | 真駒内セキスイハイムアイスアリーナ（北海道） | — |\n| 7/11（土）・12（日） | 広島グリーンアリーナ（広島） | — |\n| 7/15（水）・16（木） | 大阪城ホール（大阪） | — |\n| 7/25（土）・26（日） | セキスイハイムスーパーアリーナ（宮城） | — |\n| 8/8（土）・9（日） | マリンメッセ福岡A館（福岡） | — |\n| 8/20（木）〜23（日） | 明治神宮野球場（東京） | 最終4公演 |\n\n**チケット申込方法：**\n- 福井・神奈川・北海道公演：一般先着発売済み（5月30日〜）\n- 広島以降：乃木坂46モバイル会員先行・各種先行を経て、一般発売予定\n- 詳細：[乃木坂46公式チケット情報](https://www.nogizaka46.com/s/n46/live)・[楽天チケット](https://ticket.rakuten.co.jp/music/rtzpbck/)\n\n\u003e 情報源: [乃木坂46公式ツアーページ](https://www.nogizaka46.com/s/n46/page/summer_tour2026) / [音楽ナタリー](https://natalie.mu/music/news/661280)\n\n---\n\n## 📋 グループ動向\n\n### ■ 梅澤美波（3期生）卒業【公式】\n- 2026年5月21日、東京ドームにて卒業コンサートを実施し正式卒業\n- 約9年半のグループ活動に幕（2016年加入）\n- 3代目キャプテンとして2023年2月から2026年5月まで在任\n\n\u003e 情報源: [音楽ナタリー](https://natalie.mu/music/news/672941)（2026年5月21日）\n\n---\n\n### ■ 菅原咲月（5期生）4代目キャプテン就任【公式】\n- 2026年5月20日（14th Year Birthday Live DAY2）にて梅澤美波より発表\n- 就任時20歳、2024年より副キャプテンを務めていた\n- 42ndシングルより新体制初のフォーメーション発表\n\n\u003e 情報源: [乃木坂46公式](https://www.nogizaka46.com/s/n46/news/detail/101960) / [スポニチアネックス via Yahoo!ニュース](https://news.yahoo.co.jp/articles/4c9b7011f6b96a17c3da530be97f0e45829f6b34)（2026年5月20日）\n\n---\n\n### ■ 42ndシングル 6期生動向【公式】\n- **初選抜**：大越ひなの（6期生）・森平麗心（6期生）\n- **選抜入り累計**：6期生から計4名が選抜（フロント含む）\n- 6期生は2025年2月にグループ加入、40thシングル「ビリヤニ」よりグループ活動開始\n\n\u003e 情報源: [音楽ナタリー](https://natalie.mu/music/news/675193) / [モデルプレス](https://news.yahoo.co.jp/articles/5f9fa0c0173835698c29761f060ae29a7c8c144b)（2026年6月7日）\n\n---\n\n### ■ 新規加入・卒業\n※今週該当なし（直近の主要動向は上記の梅澤美波卒業・菅原咲月キャプテン就任を参照）";
