<script>
const md = "収集した情報をもとにレポートを作成します。\n\n---\n\n## 📰 今週のニュース\n*（対象期間：2026-05-30〜2026-06-06）*\n\n### 1. 【公式】42ndシングル 7月22日（水）発売決定\n乃木坂46の42枚目シングルが2026年7月22日（水）に発売決定。タイトルは未定。菅原咲月（5期生）が4代目キャプテン就任後、初のシングルリリースとなる。CD予約受付は6月1日（月）10:00〜開始。選抜フォーメーションは**6月7日（日）深夜放送「乃木坂工事中」（テレビ東京系）にて発表予定**。\n\n\u003e 情報源：[乃木坂46公式サイト](https://www.nogizaka46.com/s/n46/news/detail/101977)（2026年6月）/ [音楽ナタリー](https://natalie.mu/music/news/674230) / [Billboard JAPAN](https://www.billboard-japan.com/d_news/detail/162036/2) / [モデルプレス](https://mdpr.jp/music/detail/4790964)\n\n### 2. 【公式】「乃木坂工事中」梅澤美波卒業回 YouTube公開\n梅澤美波（3期生・元乃木坂46）の卒業を記念した「ありがとうキャプテン！梅澤美波 卒業式」回が公式YouTube「乃木坂配信中」にて公開。\n\n\u003e 情報源：[乃木坂46公式サイト](https://www.nogizaka46.com/s/n46/news/detail/101968)\n\n---\n\n## 🎵 音楽・リリース情報\n\n### 42ndシングル（タイトル未定）\n| 項目 | 内容 |\n|---|---|\n| 発売日 | 2026年7月22日（水） |\n| センター | **6月7日深夜「乃木坂工事中」にて発表予定** |\n| 選抜メンバー | 同上（未発表） |\n| タイトル | 未定 |\n| 特記事項 | 菅原咲月（5期生）キャプテン就任後初シングル |\n\n- オリコン/Billboard JAPAN チャート動向：発売前のため数値なし\n\n\u003e 情報源：[乃木坂46公式](https://www.nogizaka46.com/s/n46/news/detail/101977) / [オリコン](https://www.oricon.co.jp/news/2455920/full/) / [CDJournal](https://www.cdjournal.com/news/nogizaka46/126999)\n\n---\n\n## 👤 メンバー個別活動\n\n**※今週（2026-05-30〜06-06）の確定情報として取得できた案件は以下の通り。情報源がS/A級に確認できなかったものは掲載を見送った。**\n\n### 1. 遠藤さくら（4期生）・賀喜遥香（4期生）・井上和（5期生）・瀬戸口心月（6期生）\n- **「乃木恋部」始動**（2026年4月24日〜継続中）：スマートフォンゲーム「乃木恋」10周年記念企画。4名が「全校生徒総恋愛」をスローガンに活動。ユーザーと各メンバーがLINEで個別に友だちになれる体験型企画。\n  - \u003e 情報源：[株式会社10ANTZ プレスリリース（PRTimes）](https://prtimes.jp/main/html/rd/p/000000156.000043587.html)（2026年4月24日）\n\n### 2. 梅澤美波（3期生・元乃木坂46）\n- **卒業コンサート開催**（2026年5月21日、東京ドーム）：「乃木坂46 14th YEAR BIRTHDAY LIVE」にて9年8か月のグループ活動に幕。卒業スピーチを約10分間行い、「任された役目は100%全うできた」とコメント。遠藤さくら（4期生）と「歩道橋」を2人で披露した場面が反響を呼んだ（※卒業は直近2週間以内の出来事）。\n  - \u003e 情報源：[オリコン](https://www.oricon.co.jp/news/2456187/full/)（2026年5月21日）/ [音楽ナタリー ライブレポート](https://natalie.mu/music/news/672941)\n\n---\n\n## 🎤 ライブ・イベント\n\n### 乃木坂46 真夏の全国ツアー2026【公式】\nグループ史上最大規模、全18公演。TODAY（6月6日）以降の日程：\n\n| 日程 | 会場 | 備考 |\n|---|---|---|\n| 6月13日（土）・14日（日） | サンドーム福井（福井県） | **乃木坂46 初の福井公演** |\n| 6月24日（水）・25日（木） | 横浜アリーナ（神奈川県） | |\n| 7月4日（土）・5日（日） | 真駒内セキスイハイムアイスアリーナ（北海道） | |\n| 7月11日（土）・12日（日） | 広島グリーンアリーナ（広島県） | |\n| 7月15日（水）・16日（木） | 大阪城ホール（大阪府） | |\n| 7月25日（土）・26日（日） | セキスイハイムスーパーアリーナ（宮城県） | |\n| 8月8日（土）・9日（日） | マリンメッセ福岡A館（福岡県） | |\n| 8月20日（木）〜23日（日） | 明治神宮野球場（東京都） | ファイナル公演 |\n\n- チケット一般発売（福井・神奈川・北海道公演）：2026年5月30日（土）12:00〜開始済み\n- 申込方法：乃木坂46モバイル会員先行／一般発売はローソンチケット等各種プレイガイド\n\n\u003e 情報源：[乃木坂46公式（ツアー告知）](https://www.nogizaka46.com/s/n46/news/detail/101747) / [乃木坂46公式（ツアーページ）](https://www.nogizaka46.com/s/n46/page/summer_tour2026) / [音楽ナタリー](https://natalie.mu/music/news/661280)\n\n---\n\n## 📋 グループ動向\n\n### 1. 【公式】梅澤美波（3期生）卒業\n2026年5月21日、東京ドームにて開催した「乃木坂46 14th YEAR BIRTHDAY LIVE」をもって正式卒業。歴代3代目キャプテン。9年8か月の在籍。\n\n\u003e 情報源：[乃木坂46公式（卒業のお知らせ）](https://www.nogizaka46.com/s/n46/news/detail/101751) / [オリコン](https://www.oricon.co.jp/news/2456192/full/)\n\n### 2. 【公式】菅原咲月（5期生）が4代目キャプテン就任\n2022年2月加入、2024年12月に副キャプテン就任を経て、梅澤美波の卒業と同日（2026年5月21日）に4代目キャプテンへ。就任時20歳（2005年10月31日生まれ）。\n\n\u003e 情報源：[乃木坂46公式（キャプテン就任）](https://www.nogizaka46.com/s/n46/news/detail/101960) / [オリコン](https://www.oricon.co.jp/news/2455920/full/) / [ENCOUNT](https://encount.press/archives/1000082/)\n\n### 3. センター・選抜発表\n42ndシングルの選抜メンバー・センターは **2026年6月7日（日）深夜放送「乃木坂工事中」（テレビ東京系）にて発表予定**。【公式】\n\n\u003e 情報源：[乃木坂46公式](https://www.nogizaka46.com/s/n46/news/detail/101977) / [モデルプレス](https://mdpr.jp/music/detail/4790964)\n\n---\n\n\u003e **編集注記**：セルフチェック結果\n\u003e - [x] R1（日付）：今週確定情報と近況情報を区別して記載。ツアー・選抜など未来予定は明示。\n\u003e - [x] 卒業・加入：公式サイト発表のみ採用\n\u003e - [x] メンバー名：漢字フルネーム＋期数\n\u003e - [x] 噂と確定の区別：【公式】マーク・媒体名を明記\n\u003e - [x] 個別活動：今週の確定情報不足のため、直近公式情報のみ掲載";
