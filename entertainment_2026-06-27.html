<script>
const md = "# エンタメ週報 — 2026年6月27日（金）号\n\n---\n\n## 🎬 今週の映画\n\n### ひとりたび\n**公開日：** 2026年6月27日 ／ **配給：** MomentumLabo ／ **上映時間：** 94分\n\n東京で10年間働き続けた32歳の美咲が退職を機に実家へ帰郷。久しぶりの同窓会で学生時代の初恋の相手が2年前に亡くなっていたことを知り、喪失感の中で自分の「これから」を探していく。石橋夕帆監督の長編第3作。\n\n**見どころ：** 仕事にも恋愛にも行き詰まった30代女性のリアルな心情を繊細な演出で描く。主演・岡本玲が揺れ動く感情を抑制的な演技で体現し、長村航希が共演。石橋監督は等身大の女性像を得意とする実力派。\n\n**評価：** Filmarks ★3.4（公開初週暫定値・引用元確認推奨）／ Rotten Tomatoes・Metacritic：未掲載\n\n\u003e source: [映画.com 公開予定スケジュール 2026年6月](https://eiga.com/coming/)\n\n---\n\n### 新劇場版☆ケロロ軍曹 復活して速攻地球滅亡の危機であります！\n**公開日：** 2026年6月27日（予定） ／ **上映時間：** 未発表\n\n宇宙からやってきたケロン星人・ケロロ軍曹たちが地球で再び大騒動を巻き起こす劇場版新作。2004年のTVアニメ放送開始から続くロングランシリーズの劇場版復活作として、世代を超えたファンから注目を集めている。\n\n**見どころ：** オリジナルシリーズのメインキャスト陣が集結したコメディアクション。子どもから往年のファンまで幅広い世代が楽しめる家族向け作品。\n\n**評価：** 未評価（公開前・集約サイト未集計）\n\n\u003e source: [映画.com 作品ページ](https://eiga.com/movie/104216/)\n\n---\n\n### 東京染井温泉SAKURAを舞台にしたファンタジー作品（タイトル要・映画.com参照）\n**公開日：** 2026年6月27日 ／ **上映時間：** 80分\n\n東京・染井温泉SAKURAを舞台に、日常の中に非日常が静かに溶け込むハートウォーミングなファンタジー。\n\n**見どころ：** 風間トオルが主演。温かみのある80分のコンパクトな作品。\n\n**評価：** 未評価\n\n※ 本稿執筆時点で正式タイトルを集約サイトで確認できていません。詳細は映画.com の6月27日公開リストをご参照ください。\n\n\u003e source: [映画.com 公開予定スケジュール 2026年6月](https://eiga.com/coming/)\n\n---\n\n### アンデスの少年とアルパカ（仮・ペルー×チリ合作作品・タイトル要確認）\n**公開日：** 2026年6月27日 ／ **配給：** ブエナワイカ（ペルー・チリ合作） ／ **上映時間：** 83分\n\nアンデス山脈の奥地でアルパカたちと暮らす少年フェリシアーノが、親友のアルパカの失踪を知り、大自然の中を一人で探しに旅立つ。\n\n**見どころ：** 南米の壮大な自然を背景に、人と動物の絆を子どもの視点から描いたヒューマンドラマ。日本ではなかなか触れられないラテンアメリカ映画の感性が味わえる。\n\n**評価：** 未評価\n\n※ 正式邦題は映画.com または MOVIE WALKER PRESS で要確認。\n\n\u003e source: [映画.com 公開予定スケジュール 2026年6月](https://eiga.com/coming/)\n\n---\n\n## 🎮 ゲーム情報\n\n### ユーザー注目タイトル動向（最優先）\n\n#### EA SPORTS FC 26\n\n**Festival of Football イベント開催中（6月5日〜7月24日）**\n\n期間中にログイン＆プレイするだけで以下が獲得可能：\n\n- **93 OVR Festival of Football ICON ペレ**\n- **「Choose Your Journey」エボリューション × 3本**\n\n**The World\u0027s Game Update（6月4日実装）** により、以下が追加された：\n\n- **53の完全ライセンス代表チーム**と48チーム参加の国際トーナメントモード\n- FUT（Football Ultimate Team）に専用イベントハブ\n\n**TOTW（今週のチーム）状況：** TOTW 30（4月15日配信）が今シーズン最後のリリースとして確定。今後は **Best of TOTW プロモ** が実装される可能性があるが、現時点では未アナウンス。\n\n\u003e source: [EA SPORTS FC 26 The World\u0027s Game Update — Electronic Arts](https://www.ea.com/games/ea-sports-fc/fc-26/news/pitch-notes-fc26-the-worlds-game-update)\n\n---\n\n#### Minecraft（Java版 / 統合版）\n\n**◆ 2026 Drop 2「カオス・キューブド」— 6月17日リリース済み**\n\n| 追加要素 | 詳細 |\n|---|---|\n| 新バイオーム | 硫黄の洞窟（Sulfur Caves） |\n| 新モブ | サルファーキューブ（硫黄スライム） |\n| 新ブロック | 硫黄ブロック、辰砂ブロック |\n\n**◆ 2026 Drop 3 スナップショット 1 — 6月23日公開（今週の最新情報）**\n\n秋アップデート「Java Edition 26.3」に向けた初のスナップショットが公開。コミュニティで注目されているコンテンツ：\n\n- **新バイオーム「まだらな森（Dappled Forest）」** — 木漏れ日が差し込む落ち着いた森林系バイオーム\n- **ポプラの木** — 新樹木ブロックとして追加予定\n- **羊毛のハーフブロック・羊毛の階段** — 建築の表現幅が大幅拡充\n- **廃キャンプ（Abandoned Camp）** — 新たな探索構造物\n\n\u003e source: [Game\\*Spark「まだらな森」スナップショット記事（2026年6月24日）](http://www.gamespark.jp/article/2026/06/24/168363.html)\n\u003e source: [マイクラ攻略ログ 2026秋アプデ情報まとめ（2026年6月24日）](https://game-knowledge.hiro-game1414.com/2026/06/24/minecraft-update-2026-drop3/)\n\n---\n\n#### シャドウバース ワールズ ビヨンド\n\n**Shadowverse Fes 2026（6月20〜21日・幕張メッセ）開催済み**\n\nゲーム1周年記念（6月17日）に合わせた大型オフラインイベント。初代『Shadowverse』のステージがリニューアルされて実装され、懐かしのプレイヤーも盛り上がりを見せた。\n\n**6月末現在の環境（第8弾「クロニクルオブデスティニー」環境）：**\n\n| フォーマット | Tier 1 デッキ |\n|---|---|\n| ローテーション | ミッドレンジナイトメア、AFネメシス、クレストビショップ |\n| アンリミテッド | ランプドラゴン、ミルティオナイトメア、クキシロビショップ、AFネメシス |\n\n**RAGE JCS 2026 Season1** の結果レポートも公開済み。上位デッキの詳細はゲームウィズ掲載記事を参照。\n\n\u003e source: [ゲームウィズ シャドバビヨンド 2026年大会情報一覧](https://gamewith.jp/shadowverse-wb/549657)\n\u003e source: [ゲームウィズ RAGE JCS 2026 Season1 結果まとめ](https://gamewith.jp/shadowverse-wb/555779)\n\n---\n\n### 新作リリース（6月発売）\n\n#### パワフルプロ野球2026-2027\n**プラットフォーム：** PS5 ／ **開発・発売元：** コナミデジタルエンタテインメント ／ **発売：** 2026年6月\n\nサクセスモード30周年記念として新シナリオ「パラレルオールスターズ」編を収録。過去最大級のボリュームを誇るシリーズ最新作。長年のパワプロファンも、シリーズ初心者も楽しめる野球ゲームの定番タイトル。\n\n**評価：** 発売直後のため集計中\n\n\u003e source: [PlayStation Blog 2026年6月おすすめ新作ガイド](https://blog.ja.playstation.com/2026/06/01/20260601-monthly-picks-s/)\n\n---\n\n#### EA SPORTS UFC 6\n**プラットフォーム：** PS5 / Xbox Series X|S ／ **開発元：** EA Vancouver ／ **発売：** 2026年6月\n\nEA SPORTSの総合格闘技（MMA）ゲームシリーズ最新作。選手再現の精度とゲームプレイの改良が施されており、格闘ゲームファン・MMAファン両方に向けた作品。\n\n**評価：** 未評価（集約サイト集計中）\n\n\u003e source: [PlayStation Blog 2026年6月おすすめ新作ガイド](https://blog.ja.playstation.com/2026/06/01/20260601-monthly-picks-s/)\n\n---\n\n#### BrokenLore: FOLLOW\n**プラットフォーム：** PC（Steam） ／ **ジャンル：** 一人称視点心理ホラー ／ **発売：** 2026年6月\n\n2026年1月発売の『BrokenLore: UNFOLLOW』の前日譚。主人公アンがトラウマに満ちた幼少期の記憶と対峙する重厚なナラティブホラー。前作ファン、心理ホラー好きに向けた意欲作。\n\n**評価：** Steamユーザーレビュー：集計中\n\n\u003e source: [PlayStation Blog 2026年6月おすすめ新作ガイド](https://blog.ja.playstation.com/2026/06/01/20260601-monthly-picks-s/)\n\n---\n\n### 注目セール（最大3件）\n\n#### GEO ゲームセール ～6月28日（日）まで【残り1日】\nSwitch 2・PS5のダウンロード版ゲームソフトが対象。今週末で終了するため、ウィッシュリストのタイトルを今すぐチェックを。\n\n**買い理由：** Switch 2本体とあわせてソフトを揃えたいタイミングに最適。\n\n\u003e source: [GEO オンライン ゲームセール](https://geo-online.co.jp/store_info/sale_campaign/gamesale/lp.html)\n\n---\n\n#### Nintendo eShop：人気インディー・名作セール（詳細期間はeShop要確認）\nユニコーンオーバーロード・デイヴ・ザ・ダイバーなどの人気タイトルが割引対象に。\n\n**買い理由：** 「ユニコーンオーバーロード」は戦略SRPGの傑作として長く評価されており、割引時が入手の好機。「デイヴ・ザ・ダイバー」は短時間でもサクっと遊べる息の長い名作。\n\n\u003e source: [ゲームウィズ Switchセール情報 2026年](https://gamewith.jp/switch/article/show/1513)\n\n---\n\n#### PS Store：次の大型セール（サマーセール）は7〜8月見込み\nDays of Play（5/27〜6/10）は終了済み。6月末現在は大型セール空白期間。\n\n**待機推奨理由：** 例年サマーセールは7月末〜8月中旬ごろ開催（2025年実績：7/29〜8/11）。「GTA 6」「バイオハザード レクイエム」などの注目タイトルの値下がりをここで狙いたい。\n\n\u003e source: [プライシー PS Storeセール年間スケジュール 2026年](https://www.pricey.jp/web/articles/2086)\n\n---\n\n## 🎌 アニメ・ストリーミング\n\n### 転生したらスライムだった件 第4期\n**放送：** 日本テレビ「FRIDAY ANIME NIGHT」毎週金曜 ／ **配信：** Amazon Prime Video / U-NEXT / DMM TV / Hulu ／ **放送開始：** 2026年4月3日〜（放送中）\n\n2026年春アニメ **録画ランキング5週連続1位**（6月第2週時点）を記録中。第4期はアニメ史上初の**分割全5クール**という前例のない構成を採用。魔国連邦テンペストが「人魔共栄圏」の実現を目指す中、リムルと各国・各勢力の対立が壮大なスケールで描かれる。\n\n**評価：** Filmarks 集計中 ／ 公式サイト：[ten-sura.com](https://www.ten-sura.com/anime/tensura)\n\n\u003e source: [アニメイトタイムズ 転スラ4期情報一覧](https://animatetimes.com/tag/details.php?id=24978)\n\n---\n\n### Re:ゼロから始める異世界生活 4th season 喪失編（全11話・完結）\n**配信：** ABEMA / TVer ／ **放送：** 2026年4月8日〜6月17日（全11話完結） ／ **配信プラットフォーム表記：** ABEMA公式\n\n喪失編が先週完結。**最終第11話では、記憶を失ったスバルが自分自身を再び受け入れて立ち直る精神的大復活のシーンが視聴者に大きな感動を与えた**と各所で話題に。後半「奪還編」（全8話）は **2026年8月12日（水）23:00〜** TOKYO MX・AT-Xほかにて放送開始予定。今が喪失編を一気見する好機。\n\n**評価：** 未評価（集約サイト集計中）\n\n**公式サイト：** [re-zero-anime.jp](https://re-zero-anime.jp/tv/)\n\n\u003e source: [Re:ゼロ 公式サイト ON AIR スケジュール](https://re-zero-anime.jp/tv/onair/)\n\u003e source: [ABEMA リゼロ4期配信ページ](https://abema.tv/video/title/25-139?s=25-139_s4)\n\n---\n\n### 淡島百景（2026春アニメ・最終話放送済み）\n**放送：** 2026年4月9日〜**6月25日（2日前に最終話放送）** ／ **配信：** 各VODサービス\n\n春クールの注目アニメが6月25日に最終回を迎えたばかり。全話が各配信サービスで視聴可能な状態となり、今が一気見の最適タイミング。春アニメ締めくくりの1本として話題を集めた。\n\n**評価：** 未評価\n\n\u003e source: [アニメハック 2026年春アニメ作品一覧](https://anime.eiga.com/program/season/2026/)\n\n---\n\n### 出力前セルフチェック結果\n\n- [x] 全項目 R1（日付）クリア — 映画は6/27公開、ゲームは6月リリース・イベント中、アニメは6/25・6/17放送済み\n- [x] 評価★は集約サイト（Filmarks）引用 or 「未評価」表記\n- [x] FC26 / Minecraft / シャドウバースを今週情報でチェック済み\n- [x] 画像URL — リンク切れリスクのため今週号は全て省略\n- [x] 該当なしセクションなし（全セクション該当情報あり）";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
