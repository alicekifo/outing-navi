<script>
const md = "## 🔔 今週のチケット発売\n\n### フェルメール《真珠の耳飾りの少女》展（大阪中之島美術館）\n- **発売日：2026年6月15日（月）12:00〜**\n- 内容：tabiwa（近畿日本ツーリスト）先行販売・通常券（全会期対応）\n- 料金：一般 3,000円 / 高大生 1,500円 / 小学生 500円\n- 販売チャネル：[tabiwa トラベル](https://www.nta.co.jp/jrodekakenet/plan/vermeer2026/)\n- 公式サイト：[vermeer2026.exhibit.jp](https://vermeer2026.exhibit.jp/)\n- ※第1期一般発売（8/21〜8/31来場分）は7/15 12:00より別途販売\n\n---\n\n## 🎨 関東の展覧会\n\n### 現在開催中（終了が近い順）\n\n**ゴールドマン コレクション 河鍋暁斎の世界**\nサントリー美術館（六本木・東京ミッドタウン内、六本木駅直結）\n会期：2026-04-22 〜 **2026-06-21**\n入場料：一般 1,800円（前売 1,600円）\n世界最大級の暁斎コレクションから選りすぐった200余点を一堂に公開する集大成展。\n**見どころ：** 6/21が最終日—《百鬼夜行図屛風》《猫又図》など超絶技巧の名品は今週末が事実上のラストチャンス。\n\n---\n\n**東京都美術館開館100周年記念 アンドリュー・ワイエス展**\n東京都美術館（上野公園内、JR上野駅公園口 徒歩7分）\n会期：2026-04-28 〜 2026-07-05\n入場料：一般 2,300円 / 高校生以下 無料\n20世紀アメリカを代表する具象画家ワイエスの国内最大規模回顧展。\n**見どころ：** 都美術館100周年を飾る大型企画、孤独と憧憬が交差するリアリズム絵画の真髄を体感できる。\n\n---\n\n**生誕100年 森英恵 ヴァイタル・タイプ**\n国立新美術館（六本木、東京メトロ千代田線乃木坂駅直結）\n会期：2026-04-15 〜 2026-07-06\n入場料：要公式確認\n日本人初のパリ・オートクチュール参加デザイナー、森英恵のドレス・衣装類約400点を展示。\n**見どころ：** 生誕100年の決定版回顧展、蝶モチーフや和の美意識がハイファッションへ結晶した軌跡を通覧できる。\n\n---\n\n**東島毅 個展「そらにいく - Painting Paradiso」**\n森美術館（六本木ヒルズ 52F、六本木駅直結）\n会期：2026-06-07 〜 2026-08-09\n入場料：要公式確認\n身体と空間の対峙から生まれる絵画作品群——移ろいゆく時間と場の記憶を大型キャンバスに映し出す個展。\n**見どころ：** 国内外で急速に評価が高まる若手画家の都内初大型個展、都市展望と絵画空間が融合する53F会場は唯一無二の体験。\n\n---\n\n### 間もなく開始（開始日順）\n\n**モネ没後100年・開館25周年記念 あたらしい目―モネと21世紀のアート**\nポーラ美術館（箱根・仙石原、箱根湯本駅よりバス）\n会期：2026-06-17 〜 2027-04-07\n入場料：要公式確認\nモネ没後100年と同館開館25周年を同時記念し、所蔵モネ作品群と21世紀現代アートを横断的に対置。\n**見どころ：** 約10ヶ月の長期展示でモネの光と色の系譜を現代の目線から再発見できる、箱根の自然光との相乗効果も必見。\n\n---\n\n**版画家レンブラント 挑戦、継承、インパクト**\n国立西洋美術館 企画展示室（上野公園内、JR上野駅公園口 徒歩1分）\n会期：2026-07-07 〜 2026-09-23\n入場料：一般 2,200円 / 大学生 1,300円 / 高校生 1,000円 / 中学生以下無料\nレンブラント・ハウス美術館（アムステルダム）との共同企画、エッチング版画約130点が集結。\n**見どころ：** 「光と闇」を版に刻む蝕刻技法の革新と弟子・後継者への影響を比較展示、日本初紹介作品も含む。\n\n---\n\n**弘法大師生誕1250年記念 特別展「空海と真言の名宝」**\n東京国立博物館 平成館（上野公園内、JR上野駅公園口 徒歩10分）\n会期：2026-07-14 〜 2026-09-06\n入場料：要公式確認（前売券：ローチケ等で販売中）\n弘法大師空海の生誕1250年を記念し、真言各本山が所蔵する国宝・重文が東博に大集結。\n**見どころ：** 国宝「信貴山縁起絵巻」（朝護孫子寺蔵）「十二天像」（西大寺蔵）など普段は寺外に出ない密教美術の最高峰。\n\n---\n\n**大英博物館日本美術コレクション 百花繚乱～海を越えた江戸絵画**\n東京都美術館（上野公園内）（開館100周年記念）\n会期：2026-07-25 〜 2026-10-18\n入場料：要公式確認\n大英博物館が誇る江戸絵画コレクションが日本に里帰り公開される大型企画展。\n**見どころ：** 幕末・明治の工芸品とともに渡英した絵画群、海外の視点で再評価された「江戸の美」を国内で初体験。\n\n---\n\n**ルーヴル美術館展 ルネサンス**\n国立新美術館（六本木、乃木坂駅直結）\n会期：2026-09-09 〜 2026-12-13\n入場料：要公式確認\nルーヴル美術館所蔵のルネサンス期絵画・彫刻の名品が来日、レオナルド・ダ・ヴィンチ作品を含む。\n**見どころ：** 《美しきフェロニエール》が日本初公開——「モナ・リザ」以来52年ぶりのダ・ヴィンチ本作来日、東京の1会場のみ。\n\n---\n\n## 🏯 関西の展覧会\n\n### 現在開催中（終了が近い順）\n\n**驚異の部屋の私たち、消滅せよ。－森村泰昌・ヤノベケンジ・やなぎみわ**\n大阪中之島美術館（大阪・渡辺橋駅直結）\n会期：2026-04-25 〜 2026-07-20\n入場料：要公式確認\n現代美術の三巨匠が初のコレクティブを結成し「ヴンダーカンマー（驚異の部屋）」に着想した大型インスタレーション。\n**見どころ：** 森村・ヤノベ・やなぎの初共同制作という歴史的コラボ、消費・消滅・記憶をめぐる問いが展示空間全体を占領する。\n\n---\n\n**テート美術館 ― YBA \u0026 BEYOND 世界を変えた90s英国アート**\n京都市京セラ美術館（岡崎、東山二条バス停 徒歩5分）\n会期：2026-06-03 〜 2026-09-06\n入場料：要公式確認\nテート美術館所蔵のYBA（ヤング・ブリティッシュ・アーティスト）世代の作品を大規模公開。\n**見どころ：** ダミアン・ハーストら90年代英国現代美術の「スキャンダル」と「革命」が京都初上陸、20世紀末アートシーンの転換点を総覧。\n\n---\n\n**ミュージアムのミステリー**（県立ミュージアムズ連携企画）\n兵庫県立美術館（神戸・岩屋、阪神岩屋駅 徒歩8分）\n会期：2026-06-06 〜 2026-09-13\n入場料：要公式確認\n「ミステリー」を切り口に美術館所蔵作品に秘められた謎・物語・背景を掘り起こす学際的企画展。\n**見どころ：** 夏休みを通した長期展示、兵庫県立の複数館が横断連携した異色の構成で家族連れにも好評。\n\n---\n\n### 間もなく開始（開始日順）\n\n**ボストン美術館共同企画特別展 南都仏画―よみがえる奈良天平の美―**\n奈良国立博物館（奈良公園内、近鉄奈良駅 徒歩15分）\n会期：2026-07-18 〜 2026-09-13\n入場料：要公式確認\nボストン美術館所蔵の奈良・天平時代の仏画が共同企画展という形で里帰り公開。\n**見どころ：** かつて日本を離れた国宝級仏画の一時帰国——奈良時代に描かれた仏の姿が千年余りを経て故郷に戻る。\n\n---\n\n**浮世絵スーパークリエイター 歌川国芳展**\n京都市京セラ美術館（岡崎）\n会期：2026-07-18 〜 2026-09-23\n入場料：要公式確認\n「奇才」と称された幕末の浮世絵師・歌川国芳の武者絵・妖怪絵・戯画・風刺画を大規模展示。\n**見どころ：** 現代ポップアートとの親和性が高い国芳のイマジネーションを精緻な浮世絵で網羅、初夏の京都で過ごす江戸庶民文化の熱気。\n\n---\n\n**フェルメール《真珠の耳飾りの少女》展 17世紀オランダ絵画の名品、奇跡の再来日**\n\n![フェルメール《真珠の耳飾りの少女》](https://upload.wikimedia.org/wikipedia/commons/d/d7/Meisje_met_de_parel.jpg)\n\n大阪中之島美術館 5階展示室（大阪・渡辺橋駅直結）\n会期：2026-08-21 〜 2026-09-27\n入場料：一般 3,000円 / 高大生 1,500円 / 小学生 500円\nマウリッツハイス美術館（ハーグ）が誇る《真珠の耳飾りの少女》を核に、17世紀オランダ黄金時代の名品が集結。\n**見どころ：** 会期はわずか約5週間——夜間開館（一部日程で20時まで）を最大限に活用したい。\n\n---\n\n## ✨ 注目ピックアップ\n\n### 1. ルーヴル美術館展 ルネサンス｜国立新美術館（2026-09-09〜12-13）\n\n目玉はレオナルド・ダ・ヴィンチ《美しきフェロニエール》の**日本初公開**で、ダ・ヴィンチ本作の来日は1974年「モナ・リザ」以来52年ぶりという歴史的事件だ。展覧会はルネサンス期の絵画・彫刻・素描を横断的に扱い、ラファエロやミケランジェロ工房作品も並ぶ章立て構成で、様式的発展の流れを一望できる。東京1会場・約3ヶ月という限られた機会に、1950年代以降生まれの世代はダ・ヴィンチ本作を初めて目にすることになる。西洋美術・ルネサンス・美術史全般に関心がある人はもちろん、「一生に一度」の体験を探している人に強く勧める。\n\n---\n\n### 2. フェルメール《真珠の耳飾りの少女》展｜大阪中之島美術館（2026-08-21〜09-27）\n\n「北方のモナ・リザ」とも称されるフェルメール最高傑作の再来日展で、17世紀オランダ黄金時代の静物画・風景画・風俗画と合わせて展示される美術史的文脈型の構成が特徴だ。会期がわずか約5週間と極端に短く、**本日（2026年6月15日）正午** から tabiwa 先行販売（通常券・全会期）が開始するため、今すぐチェックしたい。関西圏在住のフェルメール・オランダ絵画ファンにとっては10年待ちとも言える到来であり、早期のチケット確保を強く推奨する。\n\n---\n\n### 3. 特別展「空海と真言の名宝」｜東京国立博物館（2026-07-14〜09-06）\n\n弘法大師空海の生誕1250年という節目に、真言各本山が「門外不出」とも言える国宝・重要文化財を一斉に東博平成館へ持ち寄る、50年に一度規模の宗教美術展だ。国宝「信貴山縁起絵巻」（朝護孫子寺）「十二天像」（西大寺）はそれぞれ通常は寺内でも限定公開であり、これほどの同時展示は今後長らく実現しないと見られる。マンダラ・仏像・経典・密教法具まで真言美術を横断的に体感できる構成で、宗教史・日本美術史・仏教文化への関心があるすべての人に薦める。";
document.getElementById('content').innerHTML = marked.parse(md);

// watchlist
const WL_KEY = 'exhibition_watchlist';
function loadWatchlist() {
  return JSON.parse(localStorage.getItem(WL_KEY) || '[]');
}
function saveWatchlist(list) {
  localStorage.setItem(WL_KEY, JSON.stringify(list));
}
function renderWatchlist() {
  const list = loadWatchlist();
  const bar = document.getElementById('watchlist-bar');
  const container = document.getElementById('watchlist-items');
  if (!list.length) { bar.classList.remove('has-items'); return; }
  bar.classList.add('has-items');
  container.innerHTML = list.map((item, i) => {
    const daysLeft = item.saleDate ? Math.ceil((new Date(item.saleDate) - new Date()) / 86400000) : null;
    const saleTxt = daysLeft !== null
      ? (daysLeft <= 0 ? '&#x767A;&#x58F2;&#x4E2D;' : daysLeft + '&#x65E5;&#x5F8C;&#x767A;&#x58F2;')
      : '';
    return '<div class="watchlist-item"><span>' + item.name + '</span><span><span class="sale-date">' + saleTxt + '</span><button class="remove-btn" onclick="removeWatch(' + i + ')">&#x2715;</button></span></div>';
  }).join('');
}
function removeWatch(i) {
  const list = loadWatchlist();
  list.splice(i, 1);
  saveWatchlist(list);
  renderWatchlist();
}
function addToWatchlist(name, saleDate) {
  const list = loadWatchlist();
  if (list.find(x => x.name === name)) { alert('&#x767B;&#x9332;&#x6E08;&#x307F;&#x3067;&#x3059;'); return; }
  list.push({ name, saleDate: saleDate || null, addedAt: new Date().toISOString() });
  saveWatchlist(list);
  renderWatchlist();
  checkSaleNotifications();
}
function checkSaleNotifications() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const today = new Date().toDateString();
  loadWatchlist().forEach(item => {
    if (item.saleDate && new Date(item.saleDate).toDateString() === today) {
      new Notification('&#x1F3AB; &#x30C1;&#x30B1;&#x30C3;&#x30C8;&#x767A;&#x58F2;&#x65E5;&#xFF01;', {
        body: item.name + ' &#x306E;&#x30C1;&#x30B1;&#x30C3;&#x30C8;&#x304C;&#x672C;&#x65E5;&#x767A;&#x58F2;&#x3067;&#x3059;',
        icon: '/favicon.ico'
      });
    }
  });
}

// inject watch buttons after h3 tags in content
document.querySelectorAll('#content h3').forEach(h3 => {
  const name = h3.textContent.trim();
  const btn = document.createElement('button');
  btn.className = 'watch-btn';
  btn.innerHTML = '&#x2B50; &#x30A6;&#x30A9;&#x30C3;&#x30C1;';
  btn.onclick = () => {
    const dateMatch = h3.nextElementSibling ? h3.nextElementSibling.textContent.match(/\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}/) : null;
    addToWatchlist(name, dateMatch ? dateMatch[0].replace(/\//g, '-') : null);
  };
  h3.appendChild(btn);
});

if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}
renderWatchlist();
checkSaleNotifications();
</script>
