<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f5f7;--surface:#ffffff;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.16);--accent:#f472b6;--blue:#6aadff;--green:#52d68a;--yellow:#e8b84b;--text:#e8e8f0;--text2:#a8a8c8;--r:12px;}
html.dark{--bg:#0c0c10;--surface:#161620;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.15);--blue:#6aadff;--green:#52d68a;--text:#e8e8f0;--text2:#a8a8c8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;padding:20px 16px 80px;}
.page{max-width:680px;margin:0 auto;}
.hd{display:flex;align-items:center;gap:10px;margin-bottom:26px;flex-wrap:wrap;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.logo em{color:var(--accent);font-style:normal;}
.hd-date{font-size:12px;color:var(--text2);margin-right:auto;}
.back-link{font-size:11px;color:var(--text2);text-decoration:none;}
.back-link:hover{color:var(--accent);}
#watchlist-bar{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--yellow);border-radius:var(--r);padding:12px 16px;margin-bottom:20px;display:none;}
#watchlist-bar.has-items{display:block;}
.watchlist-title{font-size:11px;font-weight:700;color:var(--yellow);margin-bottom:8px;}
.watchlist-item{font-size:12px;color:var(--text2);padding:4px 0;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.watchlist-item:last-child{border-bottom:none;}
.watchlist-item .sale-date{font-size:11px;color:var(--green);font-weight:700;}
.watchlist-item .remove-btn{font-size:10px;color:var(--text2);background:none;border:none;cursor:pointer;padding:2px 6px;}
#content h2{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--text2);margin:28px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border2);}
#content h3{font-size:17px;font-weight:700;color:var(--text);margin:18px 0 8px;line-height:1.5;}
#content p{font-size:15px;color:var(--text2);line-height:1.9;margin-bottom:12px;}
#content ul,#content ol{font-size:15px;color:var(--text2);line-height:1.9;padding-left:20px;margin-bottom:12px;}
#content li{margin-bottom:6px;}
#content strong{color:var(--text);font-weight:700;}
#content em{color:var(--accent);font-style:normal;}
#content a{color:var(--blue);text-decoration:none;word-break:break-all;}
#content a:hover{text-decoration:underline;}
#content blockquote{border-left:3px solid var(--accent);padding:10px 16px;background:rgba(244,114,182,0.07);border-radius:0 var(--r) var(--r) 0;margin:12px 0;}
#content blockquote p{color:var(--text);margin:0;}
#content hr{border:none;border-top:1px solid var(--border);margin:20px 0;}
#content img{width:100%;max-height:260px;object-fit:cover;border-radius:var(--r);margin:8px 0 12px;display:block;}
.watch-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;background:rgba(244,114,182,.1);color:var(--accent);border:1px solid rgba(244,114,182,.3);border-radius:8px;padding:4px 10px;cursor:pointer;margin-top:6px;font-family:'Noto Sans JP',sans-serif;}
.watch-btn:hover{background:rgba(244,114,182,.2);}
.model-tabs{display:flex;gap:4px;}
.mtab{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;text-decoration:none;border:1px solid var(--border2);color:var(--text2);}
.mtab.mtab-on{background:var(--accent);color:#000;border-color:var(--accent);}
</style>

<script>
const md = "## 🔔 今週のチケット発売\n\n### 特別展「歌川広重 江戸のベストアングル」／東京国立博物館（上野）\n![歌川広重 名所江戸百景 大はしあたけの夕立](https://upload.wikimedia.org/wikipedia/commons/7/72/Hiroshige%2C_Sudden_shower_over_Shin-%C5%8Chashi_bridge_and_Atake%2C_1857.jpg)\n- **発売日**：前売券 2026-06-30（火）〜2026-09-28（月）\n- 価格帯・チャネル：一般前売1,300円（当日1,500円）／3枚セット3,600円。アソビュー！ほかオンライン、東博正門窓口（開館日のみ）\n- 会期：2026-09-29〜2026-12-20／内山晋コレクション受贈記念。東海道五拾三次・名所江戸百景など広重の三大シリーズが揃う。\n- 公式：https://www.tnm.jp/uploads/r_press/339.pdf\n\u003e source: https://www.tnm.jp/uploads/r_press/339.pdf\n\n### 「版画家レンブラント 挑戦、継承、インパクト」／国立西洋美術館（上野）\n![レンブラント 自画像（エッチング, c.1629）](https://upload.wikimedia.org/wikipedia/commons/d/d1/Self_portrait_etching_by_Rembrandt_circa_1629.jpg)\n- **発売日**：当日券 2026-07-07（火）開館時間中〜（前売券は2026-05-18〜2026-07-06 24:00で販売終了）\n- 価格帯・チャネル：一般2,200円／大学生1,300円／高校生1,000円。公式オンライン（e-tix）ほか\n- 会期：2026-07-07〜2026-09-23／レンブラント・ハウス美術館コレクション等、エッチング約130点でその挑戦と影響を辿る。\n- 公式：https://www.nmwa.go.jp/jp/exhibitions/2026rembrandt.html\n\u003e source: https://www.nmwa.go.jp/jp/exhibitions/2026rembrandt.html\n\n---\n\n## 🎨 関東の展覧会\n\n### 現在開催中\n\n### 渋谷区立松濤美術館（神泉／渋谷）｜没後50年 髙島野十郎展\n- 会期：2026-07-04〜2026-09-06\n- 入場料（一般）：1,000円\n- 概要：写実の孤高の画家・髙島野十郎、初公開作を含む約170点の過去最大規模の回顧展。\n- 見どころ：蝋燭・月の連作など独自の求道的リアリズム。\n\u003e source: https://shoto-museum.jp/exhibitions/212takashima/\n\n### 東京都庭園美術館（目黒／白金台）｜ルーシー・リー展 ―東西をつなぐ優美のうつわ―\n- 会期：2026-07-04〜2026-09-13\n- 入場料（一般）：1,400円\n- 概要：20世紀を代表する英陶芸家ルーシー・リーの、国内約10年ぶりの本格回顧展。\n- 見どころ：アール・デコ建築の館とうつわの共鳴。\n\u003e source: https://www.teien-art-museum.ne.jp/en/exhibition/lucie-rie/\n\n### 森美術館（六本木）｜ロン・ミュエク\n- 会期：2026-04-29〜2026-09-23\n- 入場料（一般）：平日2,300円／土日祝2,500円\n- 概要：超写実彫刻の巨匠ロン・ミュエクの大規模個展。\n- 見どころ：極端なスケールで生と死を突きつける身体表現。\n\u003e source: https://www.mori.art.museum/jp/exhibitions/ronmueck/\n\n### 間もなく開始\n\n### 国立西洋美術館（上野）｜版画家レンブラント 挑戦、継承、インパクト\n- 会期：2026-07-07〜2026-09-23／一般2,200円\n- 概要：エッチング約130点でその版画表現の挑戦と影響を検証。\n\u003e source: https://www.nmwa.go.jp/jp/exhibitions/2026rembrandt.html\n\n### 東京国立博物館 平成館（上野）｜特別展「空海と真言の名宝」\n- 会期：2026-07-14〜2026-09-06／一般2,300円\n- 概要：国宝15件・重文60件を含む寺宝88件が集う真言密教の名宝展。\n\u003e source: https://www.tnm.jp/modules/r_free_page/index.php?id=2760\n\n### 東京都美術館（上野）｜大英博物館日本美術コレクション 百花繚乱〜海を越えた江戸絵画\n- 会期：2026-07-25〜2026-10-18／一般2,300円\n- 概要：大英博物館所蔵の江戸絵画コレクションが里帰り。開館100周年記念展。\n\u003e source: https://www.tobikan.jp/exhibition/2026_britishmuseum.html\n\n---\n\n## 🏯 関西の展覧会\n\n### 現在開催中\n\n### あべのハルカス美術館（天王寺）｜ゴッホの跳ね橋と印象派の画家たち\n![ゴッホ アルルの跳ね橋](https://upload.wikimedia.org/wikipedia/commons/d/d1/Van_Gogh_-_Die_Br%C3%BCcke_von_Langlois_in_Arles_mit_Dame_mit_Regenschirm.jpeg)\n- 会期：2026-07-04〜2026-09-09／一般2,100円\n- 概要：独ヴァルラフ＝リヒャルツ美術館所蔵、印象派42名の70点。ゴッホ《跳ね橋》が目玉。\n\u003e source: https://www.aham.jp/exhibition/future/wallraf/\n\n### 大阪中之島美術館（渡辺橋）｜カール・ヴァルザー 世紀末の昏き残照\n- 会期：2026-07-04〜2026-09-27／一般1,800円\n- 概要：スイスの美術家カール・ヴァルザー、日本初の回顧展。出品作すべて国内初公開。\n\u003e source: https://nakka-art.jp/exhibition-post/karlwalser-2026/\n\n### 間もなく開始\n\n### 神戸市立博物館（三宮）｜ゴールドマン コレクション 河鍋暁斎の世界\n![河鍋暁斎 枯木寒鴉図](https://upload.wikimedia.org/wikipedia/commons/3/3e/Kawanabe_kyosai_karasu.JPG)\n- 会期：2026-07-11〜2026-09-23／一般2,000円\n- 概要：世界屈指の暁斎コレクター所蔵の肉筆画・版画約110点、国内初出品多数。\n\u003e source: https://www.kobecitymuseum.jp/exhibition/detail?exhibition=396\n\n### 京都市京セラ美術館（東山）｜浮世絵スーパークリエイター 歌川国芳展\n- 会期：2026-07-18〜2026-09-23／一般1,900円\n- 概要：奇想の浮世絵師・歌川国芳の武者絵・戯画・美人画を網羅。\n\u003e source: https://kyotocity-kyocera.museum/en/exhibition/20260718-20260923\n\n### 京都国立近代美術館（東山）｜フォンタネージ —イタリアの光・心の風景\n- 会期：2026-07-18〜2026-10-04／一般2,000円\n- 概要：イタリア近代風景画の巨匠、来日150周年記念の日本初大回顧展。\n\u003e source: https://www.momak.go.jp/Japanese/exhibitionarchive/2026/467.html\n\n### 大阪中之島美術館（渡辺橋）｜フェルメール《真珠の耳飾りの少女》展\n![フェルメール 真珠の耳飾りの少女](https://upload.wikimedia.org/wikipedia/commons/d/d7/Meisje_met_de_parel.jpg)\n- 会期：2026-08-21〜2026-09-27／一般3,000円\n- 概要：マウリッツハイス美術館所蔵の名作が14年ぶり来日、他地域巡回なしの1会場限定。\n\u003e source: https://nakka-art.jp/exhibition-post/vermeer2026/\n\n---\n\n## ✨ 注目ピックアップ\n\n### フェルメール《真珠の耳飾りの少女》展／大阪中之島美術館\n14年ぶり来日、大阪1会場のみ・約5週間限定公開。他地域への巡回がないため、この夏を逃すと当分見られない。西洋絵画の「静けさ」と光の質感を実物で確かめたい人に最優先。\n\u003e source: https://nakka-art.jp/exhibition-post/vermeer2026/\n\n### 特別展「空海と真言の名宝」／東京国立博物館\n生誕1250年の節目に国宝15件・重文60件を含む寺宝88件が一堂に会する稀な機会。仏教美術・密教図像に関心がある人に強く刺さる。展示替えの可能性もあり早めの来館推奨。\n\u003e source: https://www.tnm.jp/modules/r_free_page/index.php?id=2760\n\n### ルーヴル美術館展 ルネサンス／国立新美術館\nダ・ヴィンチ《美しきフェロニエール》が初来日、東京1会場限定。ダ・ヴィンチ作品来日は数年に一度の稀事で、ルネサンス絵画を体系的に見たい人には必見。\n\u003e source: https://www.nact.jp/exhibition_special/2026/louvre2026/\n\n---\n\n**補足（残課題）**: 神戸「河鍋暁斎」の前売価格、ルーヴル展の当日券一般価格は未確定のまま。終了済みだった奈良博「吉野・大峯」（〜6/7）・京博「北野天神」（〜6/14）は裏取りで除外済みです。";
document.getElementById('content').innerHTML = marked.parse(md);

// watchlist
const WL_KEY = 'exhibition_watchlist';
function loadWatchlist() {
  return JSON.parse(localStorage.getItem(WL_KEY) || '[]');
}
function saveWatchlist(list) {
  localStorage.setItem(WL_KEY, JSON.stringify(list));
}
function renderWatchlist() {
  const list = loadWatchlist();
  const bar = document.getElementById('watchlist-bar');
  const container = document.getElementById('watchlist-items');
  if (!list.length) { bar.classList.remove('has-items'); return; }
  bar.classList.add('has-items');
  container.innerHTML = list.map((item, i) => {
    const daysLeft = item.saleDate ? Math.ceil((new Date(item.saleDate) - new Date()) / 86400000) : null;
    const saleTxt = daysLeft !== null
      ? (daysLeft <= 0 ? '&#x767A;&#x58F2;&#x4E2D;' : daysLeft + '&#x65E5;&#x5F8C;&#x767A;&#x58F2;')
      : '';
    return '<div class="watchlist-item"><span>' + item.name + '</span><span><span class="sale-date">' + saleTxt + '</span><button class="remove-btn" onclick="removeWatch(' + i + ')">&#x2715;</button></span></div>';
  }).join('');
}
function removeWatch(i) {
  const list = loadWatchlist();
  list.splice(i, 1);
  saveWatchlist(list);
  renderWatchlist();
}
function addToWatchlist(name, saleDate) {
  const list = loadWatchlist();
  if (list.find(x => x.name === name)) { alert('&#x767B;&#x9332;&#x6E08;&#x307F;&#x3067;&#x3059;'); return; }
  list.push({ name, saleDate: saleDate || null, addedAt: new Date().toISOString() });
  saveWatchlist(list);
  renderWatchlist();
  checkSaleNotifications();
}
function checkSaleNotifications() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const today = new Date().toDateString();
  loadWatchlist().forEach(item => {
    if (item.saleDate && new Date(item.saleDate).toDateString() === today) {
      new Notification('&#x1F3AB; &#x30C1;&#x30B1;&#x30C3;&#x30C8;&#x767A;&#x58F2;&#x65E5;&#xFF01;', {
        body: item.name + ' &#x306E;&#x30C1;&#x30B1;&#x30C3;&#x30C8;&#x304C;&#x672C;&#x65E5;&#x767A;&#x58F2;&#x3067;&#x3059;',
        icon: '/favicon.ico'
      });
    }
  });
}

// inject watch buttons after h3 tags in content
document.querySelectorAll('#content h3').forEach(h3 => {
  const name = h3.textContent.trim();
  const btn = document.createElement('button');
  btn.className = 'watch-btn';
  btn.innerHTML = '&#x2B50; &#x30A6;&#x30A9;&#x30C3;&#x30C1;';
  btn.onclick = () => {
    const dateMatch = h3.nextElementSibling ? h3.nextElementSibling.textContent.match(/\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}/) : null;
    addToWatchlist(name, dateMatch ? dateMatch[0].replace(/\//g, '-') : null);
  };
  h3.appendChild(btn);
});

if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}
renderWatchlist();
checkSaleNotifications();
</script>
