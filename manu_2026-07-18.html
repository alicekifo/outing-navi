<script>
const md = "# [[マンチェスター・ユナイテッド]]情報週報（2026-07-18）\n\n\u003e **今週のTLDR**: プレシーズン初戦レクサム戦（ヘルシンキ）は**今夜JST 7/19（日）0:00キックオフ**——遠征メンバー25名を公式発表、セスコ（Benjamin Šeško）はすね負傷で帯同外、サントス（Andrey Santos）のデビューが有力。移籍はコネ（Manu Koné）へ**数日内に正式オファー提出見込み**（ローマ希望額€55m〜60m・[[チェルシー]]が競合参戦）。ラッシュフォード（Marcus Rashford）の[[フェネルバフチェ]]行きは**Romanoが明確に否定**＝プレシーズン合流へ。\n\n---\n\n## ⚽ 直近の試合結果\n\n※該当なし（2025-26シーズンは5月終了。プレシーズン初戦レクサム戦は当号生成時点で未開催＝JST 7/19 0:00キックオフ、結果は次号）\n\n**補足（[[FIFAワールドカップ2026]]・ユナイテッド勢の残り日程）**:\n- イングランド（マイヌー（Kobbie Mainoo）、ラッシュフォード（Marcus Rashford））は準決勝でアルゼンチンに1-2逆転負け（7/15・既報）。**3位決定戦フランス戦がJST 7/19（日）6:00**（マイアミ）——フランス代表には獲得ターゲットのコネ（Manu Koné）がいるため、事実上の「品定めマッチ」でもある\n- **決勝 スペイン×アルゼンチン: JST 7/20（月）4:00**（MetLifeスタジアム）。[[マルティネス]]（Lisandro Martínez）がアルゼンチンの一員としてW杯制覇に挑む\n\n\u003e source: [FIFA - 公式マッチセンター](https://www.fifa.com/en/match-centre/match/17/285023/289290/400021540?gender=2\u0026date=2026-07-15) (2026-07-15) / [World Soccer Talk - 3位決定戦詳細](https://worldsoccertalk.com/world-cup/france-vs-england-date-kick-off-time-and-venue-for-the-2026-fifa-world-cup-third-place-match/)\n\n---\n\n## 🔄 移籍・選手動向\n\n### 確定（IN）\n\n| 選手 | 前所属 | 条件 | 日付 | 信頼度 |\n|---|---|---|---|---|\n| ティーレマンス（Youri Tielemans）MF | アストン・ヴィラ | 解除条項£35m・5年契約・背番号18 | 7/14公式発表（既報） | ◎ 公式 |\n| サントス（Andrey Santos）MF | チェルシー | £48m＋ボーナス£2m・5年契約（＋1年OP） | 7/13完了（既報） | ◎ 公式 |\n| ダーロウ（Karl Darlow）GK | リーズ | フリー・2028年まで（＋1年OP） | 7/14公式発表（既報） | ◎ 公式 |\n\n- 今週の新規確定はなし。IN3件は既報どおり\n\n### 確定間近（OUT）\n\n- **マラール（Melvine Malard）FW（女子）→ チェルシー** ○: クラブ間で**クラブ記録の約£850k＋アドオンで合意済み・メディカル実施段階**（BBCのKinsella・Sanders両記者が確認）。新契約提示を本人が辞退し、残り1年での売却を選択。昨季チームトップの19ゴール関与。リヨン時代の恩師ボンパストール（Sonia Bompastor）と再会へ。**公式発表は当号時点で未確認**（Stretty Newsは7/17に「退団」と報道）\n- 男子の既報分（今夏ウィンドウ内・変化なし）: オナナ（André Onana）→トラブゾンスポル1年ローン（7/3公式）、ホイルン（Rasmus Højlund）→ナポリ買い取り義務履行（6/29）、サンチョ（Jadon Sancho）／カゼミロ（Casemiro）／マラシア（Tyrell Malacia）契約満了退団（6/30）\n\n\u003e source: [Goal - Malard club-record sale](https://www.goal.com/en-us/lists/man-utd-record-sale-melvine-malard-france-international-red-devils-wsl-chelsea/blte806af7a4c517524) (2026-07-15) / [Stretty News - Malard leaves for Chelsea](https://strettynews.com/2026/07/17/melvine-malard-chelsea-manchester-united-women/) (2026-07-17)\n\n### 交渉中\n\n- **コネ（Manu Koné／ローマMF）＝3人目のMF最有力・数日内に正式オファー提出見込み** ○（Gazzetta dello Sport・7/17）: ユナイテッドは代理人サイドと接触済みで**本人の移籍への前向き姿勢を確認**（本人の第一希望はPSGとも）。ローマの希望額は**€55m〜60m**。**チェルシーも競合参戦**——ガルナチョ（Alejandro Garnacho）関連のローマとの協議中にコネ獲得の可能性を探った経緯。Romano（7/14）は「代理人と前向きな会話・関係良好、ただし**ローマへの正式アプローチはまだ**」と段階を明示\n- **Ornstein（The Athletic・7/14）の整理** ○: 「もう1人のMF獲得」が既定路線で、求めるプロファイルは\"somebody with legs\"（走力・カバー範囲でサントス＆ティーレマンスを補完する型）。候補はコネ（£51m評価）、バレバ（Carlos Baleba／ブライトン・£70m＝当初の£100m要求から低下）、チュアメニ（Aurélien Tchouameni／レアル・マドリード・£70m）。スコット（Alex Scott／ボーンマス）は「クラブが惚れ込む選手」だがボーンマスは金額不問で売却拒否\n- **ラッシュフォード（Marcus Rashford）の去就＝フェネルバフチェ話をRomanoが否定** ○（7/16）: 「本人にトルコ移籍の意思はなく、交渉も一切行われていない」。フェネルバフチェ側の[[グリーンウッド]]再会構想・交渉団マンチェスター派遣の報道（7/15）は先行したが、**現状は何も具体化していない**。W杯後はカリック（Michael Carrick）の下でプレシーズン合流予定＝前号の△報道はこれで上書き\n- **エデルソン（Éderson／アタランタMF）撤退確定**（既報・変化なし）: Ornsteinいわく「現条件（£38m）での取引は消滅」。コネ路線転換の直接的背景\n\n### ケガ・離脱\n\n- **セスコ（Benjamin Šeško）FW**: 昨季終盤に負ったすねの負傷が回復途上で**レクサム戦遠征外**（7/17公式発表で確認）\n- **デ・リフト（Matthijs de Ligt）／ウガルテ（Manuel Ugarte）**: 長期離脱継続（ウガルテはACL・復帰時期未定＝中盤大量補強の背景）\n- **ダーロウ（Karl Darlow）GK**: シーズン終了後の処置からの回復中で遠征外——**前号の「レクサム戦デビュー有力」は訂正**（第3GKにはミー（Dermot Mee）が帯同）\n\n\u003e source: [The Peoples Person - Kone offer expected](https://thepeoplesperson.com/2026/07/17/manu-kone-man-united-expected-to-make-offer-for-roma-star-312835/) (2026-07-17) / [TeamTalk - Ornstein midfield vision](https://www.teamtalk.com/manchester-united/man-utd-transfer-news-aurelien-tchouameni-carlos-baeba-kone-david-ornstein) (2026-07-14) / [caughtoffside - Romano on Rashford](https://www.caughtoffside.com/2026/07/16/romano-issues-seismic-marcus-rashford-update/) (2026-07-16) / [manutd.com - 遠征メンバー発表](https://www.manutd.com/en/news/confirmed-travelling-squad-for-helsinki-wrexham-friendly) (2026-07-17)\n\n---\n\n## 🧠 戦術・チーム状況\n\n### カリック（Michael Carrick）初のフルプレシーズン＝遠征25名を公式発表（7/17）\n\n- **GK**: ヒートン（Tom Heaton）、ヴィテク（Radek Vitek）、ミー（Dermot Mee）\n- **DF**: マグワイア（Harry Maguire）、ドルグ（Patrick Dorgu）、ヨロ（Leny Yoro）、ショー（Luke Shaw）、ヘヴン（Ayden Heaven）、アマス（Harry Amass）、カマソン（Jaydan Kamason）、アーマー（Dan Armer）\n- **MF**: マウント（Mason Mount）、サントス（Andrey Santos）、J・フレッチャー（Jack Fletcher）、T・フレッチャー（Tyler Fletcher）、コリアー（Toby Collyer）、ゴア（Dan Gore）、デヴァニー（Jacob Devaney）、スウェイツ（Jim Thwaites）\n- **FW**: ジルクゼー（Joshua Zirkzee）、ムベウモ（Bryan Mbeumo）、オビ（Chido Obi）、ウィートリー（Ethan Wheatley）、レイシー（Shea Lacey）、E・ウィリアムズ（Ethan Williams）\n- W杯組（マルティネス、クーニャ（Matheus Cunha）、ダロト（Diogo Dalot）、ブルーノ・フェルナンデス（Bruno Fernandes）、アマド（Amad Diallo）、バユンドゥル（Altay Bayındır）、マイヌー、ラメンス（Senne Lammens）、マズラウィ（Noussair Mazraoui）、ラッシュフォード）は不在。ブルーノとラメンスには約3週間の休養が付与済み\n- ※一部プレビュー媒体がT・フレッチャーを「W杯不在組」に含めていたが、**公式の遠征リストに入っており誤り**（R4反証チェック）\n\n### 布陣・起用の注目点\n\n- Sports Moleの想定スタメンは**4バック型**（ヒートン；ヨロ、マグワイア、ヘヴン、ショー；サントス、コリアー；レイシー、マウント、ドルグ；ムベウモ）——アモリム（Rúben Amorim）前体制の3-4-2-1からの移行が既定路線のカリック体制で、プレシーズンの実戦でどの形を試すかが初観測ポイント（※あくまで報道ベースの予想。実際の布陣は次号で結果とともに）\n- Ornsteinの言う獲得プロファイル\"somebody with legs\"は、マウント＋サントス＋ティーレマンスの技巧型に走力・回収力を足す設計思想＝コネ／バレバ／チュアメニ候補リストと整合\n- 直近5試合のxG等: ※該当なし（オフシーズンのため）\n\n\u003e source: [manutd.com - Confirmed: Travelling squad for Helsinki](https://www.manutd.com/en/news/confirmed-travelling-squad-for-helsinki-wrexham-friendly) (2026-07-17) / [Sports Mole - Wrexham戦プレビュー](https://www.sportsmole.co.uk/football/man-utd/preview/man-utd-vs-wrexham-prediction-team-news-lineups_601319.html) (2026-07-17)\n\n---\n\n## 📅 今後の試合予定（プレシーズン）\n\n| 日付（JST） | 対戦相手 | 会場 | 大会 |\n|---|---|---|---|\n| **7/19（日）0:00（今夜）** | レクサム | ヘルシンキ・オリンピックスタジアム（中立） | 親善試合 |\n| 7/25（土）1:00 | ローゼンボリ | トロンハイム（アウェー） | 親善試合 |\n| 8/1（土）22:00 | アトレティコ・マドリード | ストックホルム近郊ソルナ（中立） | 親善試合 |\n\n- 以降はPSG（イェーテボリ・8/8）、リーズ（ダブリン・8/12）、ミラン（ヴロツワフ・8/15）。リーグ開幕は昇格組ハル・シティ戦8/22\n- **見どころ（レクサム戦）**: ①サントスのデビュー有力＋ジルクゼー／ムベウモの新体制での序列争い ②アカデミー勢が大量帯同——レイシー（今季レギュラー定着の筆頭候補）、オビ、ヘヴン、アマスら10名前後に出番見込み ③相手レクサムはチャンピオンシップ7位（昨季）でプレーオフ惜敗、パーキンソン（Phil Parkinson）体制。今夏未補強で主力ムリン（Paul Mullin）退団と過渡期 ④2023年7月の前回対戦（サンディエゴ）はレクサムが3-1勝利\n\n\u003e source: [khelnow - プレシーズン日程一覧](https://khelnow.com/football/manchester-united-pre-season-friendlies) / [manutd.com - Pre-season game-by-game guide](https://www.manutd.com/en/news/game-by-game-united-pre-season-fixture-list-2026) / [Sports Mole - プレビュー](https://www.sportsmole.co.uk/football/man-utd/preview/man-utd-vs-wrexham-prediction-team-news-lineups_601319.html)\n\n---\n\n## 🏟️ クラブ情報\n\n### W杯とユナイテッド勢\n\n- マイヌー、ラッシュフォードは3位決定戦フランス戦（JST 7/19 6:00）で大会終了予定。レクサム戦（JST 7/19 0:00）とほぼ同夜のため、両選手の合流は後日\n- マルティネスはアルゼンチンで**決勝進出**（JST 7/20 4:00 対スペイン）＝合流は最も遅くなる見込み\n\n### 新スタジアム・フロント\n\n- 収容10万人の新スタジアム（現オールド・トラフォード約350m北西・建設費£2bn超・2030-31シーズン完成目標の報道も）は7/9の詳細発表以降、**今週の新規続報なし**。用地はBlackstone傘下Indurentから6月に大半を確保済み\n- INEOS／ラトクリフ（Sir Jim Ratcliffe）本人の直近14日以内の新規動向はスタジアム関連以外に確認できず\n- ウィルコックス（Jason Wilcox）主導の「MF3人計画」は残り1人＝コネ交渉が本丸（詳細は移籍セクション）\n\n### 女子\n\n- マラールのチェルシー移籍が完了目前（詳細は移籍セクション）。売却額はクラブ女子記録\n\n\u003e source: [US News (AP) - 新スタジアム詳細発表](https://www.usnews.com/news/sports/articles/2026-07-09/man-united-reveals-latest-plans-for-new-stadium-to-replace-old-trafford) (2026-07-09) / [manutd.com - 用地確保](https://www.manutd.com/en/news/united-secures-land-for-new-old-trafford-stadium) (2026-06)\n\n---\n\n## 📰 The Athletic ピックアップ\n\n※theathletic.com はクローラー拒否のため原文リンクの直接確認不可。直近4日以内でThe Athletic発として転載媒体経由で確認できたのは以下1本（R5に従い水増しなし）:\n\n1. **Ornstein「ユナイテッドの次のMF像は明確——\"somebody with legs\"」**（The Athletic FC Podcast・7/14）— サントス＆ティーレマンス獲得後の3人目は走力・カバー範囲重視のプロファイルと解説。エデルソン取引（£38m）は「現条件では消滅」と明言し、コネ／バレバ／チュアメニの各評価額にも言及。[TeamTalk経由](https://www.teamtalk.com/manchester-united/man-utd-transfer-news-aurelien-tchouameni-carlos-baeba-kone-david-ornstein) (2026-07-14)\n\n\u003e source: [TeamTalk（The Athletic FC Podcast転載）](https://www.teamtalk.com/manchester-united/man-utd-transfer-news-aurelien-tchouameni-carlos-baeba-kone-david-ornstein)\n\n---\n\n*セルフチェック済み: R1日付ガード（試合=7日以内該当なし・レクサム戦は生成時点で未開催と明示・交渉中報道は7/14〜7/17＝14日以内・6月完了分は「既報」明示）／R2ソース基準（遠征メンバー=manutd.com公式S級・Romano一次発言優先・Gazzetta経由は○止まり）／R3三角測量（コネ=Gazzetta＋Romano＋Ornsteinの3系統・マラール=BBC記者＋Goal＋Stretty一致・\"Here We Go\"該当なし）／R4反証チェック（カリック体制明示・T・フレッチャーのW杯不在説を公式リストで棄却・ダーロウのデビュー有力説を負傷情報で訂正・ラッシュフォードのフェネル報道をRomano否定で上書き）／R5水増しなし（Athletic 1本のみと明記）／R6日本語名（英語名）併記*";
