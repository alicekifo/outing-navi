const md = "# ⚽ サッカー移籍情報 \u0026 ワールドカップ2026 速報\n**2026年6月16日（火）**\n\n---\n\n## ✅ 完了した移籍（6/9〜6/16）\n\n\u003e **[R1確認]** 移籍窓口は6/15開幕。ククレジャが初の公式発表案件として確定。\n\n### 1. マルク・ククレジャ（LB, 26歳）チェルシー → レアル・マドリード【NEW・公式発表 6/15】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €5,500万 ＋ ボーナス最大€500万（計最大€6,000万 / £51.8m） |\n| 契約 | 6年（〜2032年6月30日） |\n| 発表日 | 2026年6月15日（レアル・マドリード公式） |\n\n- 昨日まで「Here We Go!」案件だったが、クラブ公式アナウンスで完了に昇格\n- モウリーニョ就任後の夏補強**第1号**。左SB強化の最優先ターゲットだった\n- スペイン代表としてW杯参加中のため、**大会終了後に合流予定**\n- **ソース**：Real Madrid公式（realmadrid.com）、Sky Sports、ESPN、Managing Madrid（S+A級複数）\n\n### 2. ニコロ・ザニオロ（MF, 26歳）ガラタサライ（ローン）→ ウディネーゼ（完全移籍）\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €500万（ガラタサライに）＋ 50%売却益折半条項 |\n| 契約 | 〜2029年 |\n\n- 今季セリエAで34試合6G6A。ウディネーゼが買取オプションを行使し完全移籍へ\n- **ソース**：Fabrizio Romano（X）、TransferFeed、Fanatik（S+A級）\n\n### 3. イウェン・ジャウエン（GK, 20歳）ランス(Ligue 2) → ニューカッスル・ユナイテッド\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £2,460万（€2,850万）＋ボーナス最大£300万 |\n| 契約 | 4年 |\n| 発表日 | 2026年6月10日 |\n\n- 昨日から継続掲載（7日以内）。フランスU-21代表GK、身長2m、今季15クリーンシート\n- **ソース**：Washington Post (AP)、L\u0027Équipe、Fox Sports（A級以上複数）\n\n---\n\n## 🔴 Here We Go!（合意ほぼ確実・6/1〜6/16）\n\n### 1. ベルナルド・シウバ（MF, 32歳）マンチェスター・シティ（フリー）→ レアル・マドリード\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | フリートランスファー |\n| 契約 | 2年＋1年オプション |\n| ステータス | 個人合意・クラブ合意済（6/30契約満了後に公式発表予定） |\n\n- 9年間のシティでのキャリアを終え移籍。ポルトガル代表としてW杯参加中のため**大会後に正式発表**\n- モウリーニョが最優先ターゲットとして直接交渉を主導。ククレジャと並ぶマドリー今夏の目玉\n- **ソース**：Fabrizio Romano（確認済）、Goal.com（S+A級複数）\n\n### 2. ジェレミー・モンガ（W, 16歳）レスター・シティ → アーセナル\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | 約€1,500万 |\n| ステータス | 個人合意済、クラブ間交渉最終段階 |\n\n- 2025年4月にPL史上2番目の若さでデビュー。来月17歳到達時にプロ初契約を締結予定\n- 両翼こなせる快足アタッカー。アーテタが「2番目の今夏補強」として強行推進中\n- **ソース**：Fabrizio Romano（X）、Goal.com UK、Arseblog（S+A級複数）\n\n---\n\n## 🟡 交渉中・動向注目（6/1〜6/16）\n\n### 1. ドゥシャン・ヴラホヴィッチ（CF, 26歳）ユヴェントス → **バルセロナ最優先** [信頼度: ★★★]\n- **退団確定**（6/30フリー）。本人指示でバルセロナとの交渉を最優先に設定。チェルシー・トッテナムには明確に\"NO\"\n- バルサはレヴァンドフスキの後継者として1番手指名。バイエルンも継続関心\n- **ソース**：football-italia.net、World Soccer Talk、OneFootball、Sports Mole（A+B級複数）\n\n### 2. ロベルト・レヴァンドフスキ（CF, 37歳）バルセロナ（フリー）→ **シカゴ・ファイア(MLS)交渉中** [信頼度: ★★]\n- 6/30でバルサとの契約満了。本人とエージェント（ピニ・ザハヴィ）が渡米し直接交渉中\n- 2〜3年契約、年俸$1,500〜2,000万規模と報道。ゴレツカ（元バイエルン、フリー）も同時追跡\n- まだ合意には至っておらず、欧州クラブからの関心も残る\n- **ソース**：ESPN、World Soccer Talk、Sports Illustrated（A+B級）\n\n---\n\n## 🌍 ワールドカップ2026 速報\n\n\u003e **大会概要**：開催国：米国・カナダ・メキシコ｜48カ国・12グループ｜期間：6月11日〜7月19日\n\n---\n\n### 📅 6月15日（月）の全結果\n\n| グループ | 対戦カード | スコア | 注目点 |\n|----------|-----------|--------|--------|\n| グループF | **スウェーデン 5-1 チュニジア** | 終了 | |\n| **グループH** | **スペイン 0-0 カーボベルデ** | 終了 | **大番狂わせ！W杯初出場カーボベルデが優勝候補スペインを抑えドロー** |\n| グループG | **ベルギー 1-1 エジプト** | 終了 | アシュール20分先制 → ハニーOG 66分でベルギー追いつく |\n| グループH | **サウジアラビア 1-1 ウルグアイ** | 終了 | アル・アムリ41分先制 → アラウホ80分同点 |\n| グループG | **イラン 2-2 ニュージーランド** | 終了 | ジャスト7・55分の2得点 → イランが2度追いつくドロー |\n\n\u003e **Day 5は\"全ドロー祭り\"**（スウェーデン戦除く4試合が全引き分け）という異例の展開。特にスペインが初出場カーボベルデに足元をすくわれたのが最大の衝撃。\n\n---\n\n### 📅 6月16日（火）の注目試合\n\n| グループ | 対戦カード | キックオフ(ET) | 会場 |\n|----------|-----------|----------------|------|\n| **グループI** | **フランス vs セネガル** | 15:00 | MetLife Stadium, NJ |\n| **グループI** | **イラク vs ノルウェー** | 18:00 | Gillette Stadium, MA |\n| — | **アルゼンチン vs アルジェリア** | 21:00 | Arrowhead Stadium, KC |\n\n### 💡 今日の見どころ\n- **フランス vs セネガル**（15:00 ET）：ムバッペ率いるフランスがアフリカ王者セネガルと激突。カーボベルデがスペインを引き分けに持ち込んだDay 5の教訓から、波乱に警戒\n- **イラク vs ノルウェー**（18:00 ET）：ハーランドのW杯初出場に注目。グループIは今日2試合でその構図が一気に見えてくる\n- **アルゼンチン vs アルジェリア**（21:00 ET）：メッシ（37歳）が連覇へ向けたタイトル防衛初戦。アルジェリアは予選好調のまとまったチーム\n\n---\n\n### 🔑 グループ別ここまでの状況\n\n**グループF**（スウェーデン、オランダ、日本、チュニジア）\n- スウェーデン単独首位（勝点3）。オランダ・日本が勝点1で並走、チュニジアは0点で苦境\n\n**グループG**（ベルギー、イラン、エジプト、ニュージーランド）\n- 全4チームが勝点1で並ぶ**大混戦**。2節で大きく序列が変わる可能性\n\n**グループH**（スペイン、カーボベルデ、サウジアラビア、ウルグアイ）\n- **今大会最混戦グループ**の可能性。スペイン含む全4チームが勝点1で横並び。カーボベルデの旋風継続なるか\n\n**グループI**（フランス、セネガル、イラク、ノルウェー）\n- 本日が初戦。フランスが本命だが昨日の結果を受け\"番狂わせ\"警戒ムードも\n\n---\n\nSources:\n- [Real Madrid official: Cucurella signing](https://www.realmadrid.com/en-US/news/club/announcements/comunicado-oficial-cucurella-15-06-2026)\n- [Marc Cucurella transfer - Sky Sports](https://www.skysports.com/football/news/11095/13554263/marc-cucurella-transfer-news-real-madrid-sign-defender-from-chelsea-in-deal-worth-lb51-8m)\n- [Real Madrid complete signing of Cucurella - ESPN](https://www.espn.com/soccer/story/_/id/49064331/real-madrid-complete-signing-marc-cucurella-chelsea)\n- [OFFICIAL: Real Madrid sign Cucurella - Managing Madrid](https://www.managingmadrid.com/108988/official-real-madrid-sign-cucurella)\n- [Nicolo Zaniolo transfer to Udinese confirmed - TransferFeed](https://www.transferfeed.com/transfers/nicolo-zaniolo-galatasaray-udinese/13291952)\n- [Zaniolo chapter closed at Galatasaray - Fanatik](https://www.fanatik.com.tr/en/the-zaniolo-chapter-is-closed-at-galatasaray-the-transfer-has-been-officially-announced-2627237)\n- [Bernardo Silva agrees Real Madrid transfer - Goal.com](https://www.goal.com/en/lists/bernardo-silva-real-madrid-transfer-jose-mourinho-first-signing/blt78e4920697cd3b28)\n- [Arsenal close to signing Jeremy Monga - Goal.com UK](https://www.goal.com/en-gb/lists/arsenal-transfer-news-jeremy-monga-leicester-city-agree-deal-premier-league/blte9accf1f0400a117)\n- [Fabrizio Romano transfer news (Rogers, Lewandowski, etc.) - FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/06/fabrizio-romano-transfer-news-rogers-tzolis-alvarez-lewandowski-latest)\n- [Vlahovic prioritises Barcelona - football-italia.net](https://football-italia.net/vlahovic-barcelona-bayern-call-juventus-hope/)\n- [Chicago Fire pursuing Lewandowski - ESPN](https://www.espn.com/soccer/story/_/id/49050933/chicago-fire-pursuing-leon-goretzka-robert-lewandowski)\n- [FIFA 2026 Day 5 Results - WION News](https://www.wionews.com/sports/fifa-2026-day-5-results-spain-vs-cabo-verde-belgium-vs-egypt-saudi-arabia-vs-uruguay-iran-vs-new-zealand-1781578402673)\n- [World Cup 2026 June 15 results - Olympics.com](https://www.olympics.com/en/news/fifa-world-cup-2026-every-match-result-monday-15-june-live-scores)\n- [World Cup 2026 standings - CBS Sports](https://www.cbssports.com/soccer/news/world-cup-group-standings-table-results/)\n- [World Cup Match Day 6 preview - FOX Sports](https://www.foxsports.com/stories/soccer/world-cup-france-senegal-norway-iraq-argentina-algeria-austria-jordan)\n- [World Cup 2026 Group I guide - Sky Sports](https://www.skysports.com/football/news/12098/13543102/world-cup-2026-group-i-guide-fixtures-schedule-standings-and-odds-for-france-senegal-iraq-and-norway)";
document.getElementById('content').innerHTML = marked.parse(md);
