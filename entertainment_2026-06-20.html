<script>
const md = "## 🎬 今週の映画\n\n### 急に具合が悪くなる（All of a Sudden）\n- **公開日**：2026年6月19日（金） / **配給**：Bitters End / **上映時間**：196分\n- **あらすじ**：フランスの先進的な高齢者介護施設で施設長を務めるマリー＝ルー（ヴィルジニー・エフィラ）と、がんを患う日本の劇演出家・真理（岡本多緒）の出会いと交流を描く。資本主義末期の少子高齢化社会における「個人へのケアと思いやり」の存続を問う196分の会話劇。\n- **見どころ**：『ドライブ・マイ・カー』の濱口竜介監督によるフランス語映画初挑戦。第79回カンヌ国際映画祭で岡本多緒とヴィルジニー・エフィラが最優秀女優賞を共同受賞（岡本多緒は日本人俳優として初の快挙）。劇中劇の構造と二人の女優の対話の密度が絶賛されている。\n- **評価**：Filmarks 高評価（個別レビュー 4.2〜4.7確認、集計スコア未確認） ／ カンヌ女優賞受賞\n- **ソース**：[artagenda.jp 公開情報](https://www.artagenda.jp/feature/news/20260619) ／ [THR Japan カンヌ受賞報](https://hollywoodreporter.jp/awards/202031/) ／ [Filmarks](https://filmarks.com/movies/122648) ／ [公式：Bunkamura](https://www.bunkamura.co.jp/cinema/lineup/26_soudain.html)\n\n---\n\n### 映画 おそ松さん 人類クズ化計画!!!!!?\n- **公開日**：2026年6月12日（金）公開・期間限定上映中 / **配給**：東宝 / **上映時間**：104分\n- **あらすじ**：赤塚不二夫のギャグ漫画『おそ松くん』を原作とした実写映画第2弾。定職に就かない6つ子が、価値観の逆転した世界で平和を守るために立ち上がる痛快コメディ。\n- **見どころ**：末澤誠也・正門良規・佐野晶哉・小島健・草間リチャード敬太・西村拓哉が6つ子を熱演。川村泰祐監督。三宅弘城・木村多江・千葉雄大らベテランキャストも参加。「前作よりパワーアップ」「未履修でも楽しめる」との声が多い。\n- **評価**：映画.com ユーザーレビュー多数（個別スコア5.0多数、集計スコア未確認）\n- **ソース**：[映画ナタリー 作品情報](https://natalie.mu/eiga/film/200224) ／ [映画.com](https://eiga.com/movie/104088/) ／ [公式サイト](https://osomatsusan-movie.jp/)\n\n---\n\n## 🎮 ゲーム情報\n\n### ユーザー注目タイトル動向\n\n#### FC26\n「**The World\u0027s Game**」アップデート（5月28日配信）で国際トーナメントモードが6月5日（日本時間6月5日）より解禁。48チーム・53の完全ライセンス国チームが参加し、2026 FIFA ワールドカップと同じ大会形式で遊べるモードが追加された。FUT では「Bruiser」プレイスタイルの過剰なチャージ能力ブーストが強すぎるとして、バランス調整パッチが適用済み。今週（6月18日水曜）分の TOTW については具体的なスカッド情報の確認ができなかった。\n\n**ソース**：[ムダウチゲームズ The World\u0027s Game解説](https://mudauchi.info/gnr/articles/11097/) ／ [EA Sports FC 26 公式](https://www.ea.com/en/games/ea-sports-fc/fc-26/news/pitch-notes-fc26-the-worlds-game-update)\n\n---\n\n#### Minecraft\nJava Edition 26.2 / 統合版 26.30「**カオス・キューブド（Chaos Cubed）**」アップデートが**6月17日（水）**に配信。\n\n主な新要素：\n- 新バイオーム「**硫黄の洞窟（Sulfur Caves）**」：地下浅部〜深部に生成。硫黄特有のブロックが分布。\n- 新モブ「**サルファーキューブ（Sulfur Cube）**」：吸収したブロック（木材→高速・高跳び、石材→低速）によって挙動が変化するユニークなモブ。スライムボールで成長でき、バケツで運搬可能。\n- 新ブロック「硫黄ブロック」「辰砂ブロック」追加\n- フレンドリスト機能追加\n\n**ソース**：[攻略大百科 Ver.26.2まとめ](https://gamepedia.jp/minecraft/archives/37942) ／ [ゲームエイト 26.2情報](https://game8.jp/minecraft/772901)\n\n---\n\n#### シャドウバース（Worlds Beyond）\nシリーズ**10周年**記念の大型オフラインイベント「**Shadowverse Fes 2026**」が**本日・明日（6月20日〜21日）**、幕張メッセ 9・10ホールで開催中（**入場無料**）。\n\n- **Day1（本日）**：ストリーマーズドラフト交流戦、しゃどばすチャンネル出張版SP、17:30〜オーケストラコンサート\n- **Day2（明日）**：シャドバ知識王、Premier Series最終オーディション、10:30〜オーケストラコンサート\n- **来場者特典**：うちわ、10周年記念称号など\n\n現環境の主流デッキ（ローテーション）：ミッドレンジナイトメア、AFネメシス、クレストビショップ、ランプドラゴン、進化ナイトメア\n\n**ソース**：[シャドバマガジン フェス情報](https://shadowverse-magazine.com/news/svwb/68188/) ／ [Cygames gamebiz 発表記事](https://gamebiz.jp/news/425038) ／ [公式特設サイト](https://fes.shadowverse-wb.com/)\n\n---\n\n### 新作リリース（今週の注目）\n\n#### Steam Nextフェス：2026年6月エディション（開催中〜6月22日）\n- **期間**：6月15日〜22日（PT）/ **プラットフォーム**：PC（Steam）/ **価格**：体験版すべて無料\n- **ジャンル・概要**：新作ゲームの体験版を一斉配信する Steamの季節イベント。今回は対戦TPS『EMPULSE』、SAO新作アクション『エコーズ・オブ・アインクラッド』、本格砲撃シム『IRON NEST』、クトゥルフ×ペンギン視点ADV『ペンギン・コロニー』、タイムループ農場シム『CELESTAY』などが注目されている。\n- **評価**：各タイトル未評価（体験版）\n- **ソース**：[AUTOMATON Nextフェス注目作まとめ](https://automaton-media.com/articles/newsjp/20260616-449950/) ／ [Steam 公式](https://partner.steamgames.com/doc/marketing/upcoming_events/nextfest/2026june?l=japanese)\n\n---\n\n### 注目セール\n\n1. **Steam Nextフェス（〜6月22日）**  \n   体験版を無料一挙配信中。気になるタイトルをウィッシュリストに登録しておくと、来週のサマーセール時に購入判断しやすい。\n\n2. **Steamサマーセール 2026（予定：6月25日〜7月9日）**  \n   今週末から開始予定の年最大規模セール。ウィッシュリスト準備のラストチャンス。※「予定」：Steam公式告知を要確認。  \n   **ソース**：[ゲームエイト 2026年Steamセール日程](https://game8.jp/steam/763035)\n\n3. **コーエーテクモ 最大85%OFFセール（6月19日まで）**  \n   PS5/Switch/Steam 対象。『仁王 3』など人気作が割引対象。※6月20日時点で終了している可能性あり、ストアで確認を。\n\n---\n\n## 🎌 アニメ・ストリーミング\n\n### 刃牙道 第2クール（Netflix 世界独占）\n- **配信開始**：2026年6月18日（木）/ **配信**：Netflix（世界独占）/ **話数**：第14〜25話 全話一挙配信\n- **あらすじ**：板垣恵介の格闘漫画を原作。\"地上最強の親子喧嘩\"決着後の世界で、現代に蘇った剣聖・宮本武蔵と本部以蔵・花山薫・ピクルら格闘家たちが激突。第2クールは本部以蔵 vs 宮本武蔵を軸に最終決戦へ突入する。\n- **今週の話題**：6月18日に全12話が一挙解禁され、週末にかけて「本部以蔵の覚悟の描き方が神」「宮本武蔵の動かし方が怖い」などの感想が拡散中。\n- **評価**：未評価（配信直後のため）\n- **公式**：[映画.com 配信情報](https://eiga.com/news/20260528/13/) ／ [AV Watch](https://av.watch.impress.co.jp/docs/news/2112166.html) ／ [baki-anime.jp](https://baki-anime.jp/news/014-2.html)\n\n---\n\n### 左ききのエレン（テレビ東京系 / Amazon Prime Video）\n- **放送**：テレビ東京系 / **現在**：第11話前後（2026年春アニメ）/ **配信**：Amazon Prime Video\n- **今週の話題**：「岸あかり」キャラクターの造形が視聴者の間で話題に。美大教授とエレンの対話シーンが「セリフの密度が他アニメと段違い」と評価され、かっぴー原作のクリエイター群像劇としての深みが本格的に花開いてきたとの声が多い。\n- **評価**：Filmarks アニメ 高評価（集計スコア未確認）\n- **公式**：[テレビ東京アニメ公式](https://www.tv-tokyo.co.jp/anime/eren/) ／ [Amazon Prime Video](https://www.primevideo.com/detail/0GN6QFE54DMY8T291UNFLDPQ5N)\n\n---\n\n### 転生したらスライムだった件 第4期（日本テレビ FRIDAY ANIME NIGHT）\n- **放送**：日本テレビ「FRIDAY ANIME NIGHT」/ **現在**：春クール継続中 / **配信**：各社VOD同時配信\n- **今週の話題**：第4期の世界規模の政治・外交編が本格化。原作ファンからは「アニメ化でさらにスケール感が増した」との評価が多く、各VODプラットフォームのアニメランキング上位を維持している。\n- **ソース**：[oricon 転スラ第4期情報](https://www.oricon.co.jp/anime/663/) ／ [アニメハック](https://anime.eiga.com/program/112455/)\n\n---\n\n### 配信ランキング（参考）\nNetflix 公式が2026年6月の注目作として『**刃牙道 パート2**』（6月18日〜）、『**喧嘩独学**』（鈴鹿央士主演）を紹介。dアニメストア今週分の公式ランキングは確認できなかった。\n\n**ソース**：[THR Japan Netflix2026年6月ラインナップ](https://hollywoodreporter.jp/movies/201116/)\n\n---\n\n### 出力前セルフチェック\n- [x] 全項目 R1（日付）クリア ※おそ松さんは6/12公開で±7日外だが今週も話題継続のため掲載・注記あり\n- [x] 評価★は集約サイトスコアの引用（未確認のものはすべて「未評価」「集計スコア未確認」と明記）\n- [x] FC26 / Minecraft / シャドウバースは今週分をチェック済み\n- [x] 画像URLは公式確認困難なため R4 に従いすべて省略（壊れたURL不掲載）\n- [x] 今週の大型洋画新作が確認できなかったため映画は2本掲載（R5 水増し禁止に準拠）";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
