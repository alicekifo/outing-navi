<script>
const md = "# マンチェスター・ユナイテッド情報週報（2026-07-15）\n\n\u003e **今週のTLDR**: オフシーズンにつき公式戦なし。移籍市場が最盛期——アンドレイ・サントス（Andrey Santos）£48m獲得、ティーレマンス（Youri Tielemans）解除条項£35m行使、ダーロウ（Karl Darlow）フリー加入の3連発。エデルソン（Éderson）はメディカル問題で破談。プレシーズン初戦は7/18レクサム戦。新スタジアム（10万人収容）の詳細が7/9に発表された。\n\n---\n\n## ⚽ 直近の試合結果\n\n※該当なし（2025-26シーズンは5月に終了。プレシーズン初戦は7/18、下記「今後の試合予定」参照）\n\n**補足**: FIFAワールドカップ2026（北米開催）が準決勝段階まで進行中。ユナイテッドからは13名が各国代表として参加（詳細は「クラブ情報」参照）。\n\n\u003e source: [manutd.com - What\u0027s happening in July](https://www.manutd.com/en/news/whats-happening-in-july-2026-at-man-utd) (2026-07)\n\n---\n\n## 🔄 移籍・選手動向\n\n### 確定（IN）\n\n| 選手 | 前所属 | 条件 | 日付 | 信頼度 |\n|---|---|---|---|---|\n| アンドレイ・サントス（Andrey Santos）MF | チェルシー | £48m＋ボーナス£2m（チェルシーに10%セルオン付き） | 7/13完了 | ◎ Romano \"Here We Go\"（7/8）＋Ornstein |\n| カール・ダーロウ（Karl Darlow）GK | リーズ | フリー・2028年まで（＋1年OP）・35歳ウェールズ代表 | 7/14公式発表 | ◎ 公式 |\n| ユーリ・ティーレマンス（Youri Tielemans）MF | アストン・ヴィラ | 解除条項£35m（€41m）行使・5年契約・29歳ベルギー代表主将 | 7/14メディカル完了・公式発表間近 | ◎ Romano \"Here We Go\"（7/13）＋Sky/ESPN |\n\n- ティーレマンスはヴィラ側が慰留したが、契約内の解除条項固定額のため阻止できず。W杯参加中（ベルギー主将）の契約処理\n- 出典: [Sky Sports](https://www.skysports.com/football/news/11095/13562972/youri-tielemans-manchester-united-in-talks-to-sign-aston-villa-and-belgium-midfielder) (2026-07-13) / [ESPN](https://www.espn.com/soccer/story/_/id/49358001/manchester-united-sign-goalkeeper-karl-darlow-leeds) (2026-07-14) / [The Peoples Person](https://thepeoplesperson.com/2026/07/08/here-we-go-fabrizio-romano-confirms-andrey-santos-deal-struck-between-united-and-chelsea-312465/) (2026-07-08)\n\n\u003e source: [ESPN - Darlow公式発表](https://www.espn.com/soccer/story/_/id/49358001/manchester-united-sign-goalkeeper-karl-darlow-leeds)\n\n### 確定（OUT）\n\n- **ホイルン（Rasmus Højlund）** → ナポリへ完全移籍（ローンからの買い取り義務履行・6/29・報道値約£38m）※B級ソース確認\n- **オナナ（André Onana）** → トラブゾンスポルへ2季連続の1年ローン（7/3公式発表。買い取りOPなし・ローンフィー最大£1.3m・給与は先方負担）\n- **サンチョ（Jadon Sancho）、カゼミロ（Casemiro）、マラシア（Tyrell Malacia）** → 6/30契約満了で退団\n- **グリーンウッド（Mason Greenwood）** マルセイユ→フェネルバフチェ移籍成立（Romano \"Here We Go\" 7/13）。ユナイテッドはセルオン条項により受取見込み（○・金額の確定報道は未確認）\n- 出典: [manutd.com - Onana rejoins Trabzonspor](https://www.manutd.com/en/news/andre-onana-rejoins-trabzonspor-on-loan-2026) (2026-07-03) / [The Peoples Person - Greenwood](https://thepeoplesperson.com/2026/07/13/here-we-go-greenwood-seals-move-to-fenerbahce-in-huge-boost-to-united-312669/) (2026-07-13) / [Wikipedia 2026-27シーズン](https://en.wikipedia.org/wiki/2026%E2%80%9327_Manchester_United_F.C._season)（事実確認用）\n\n\u003e source: [manutd.com](https://www.manutd.com/en/news/andre-onana-rejoins-trabzonspor-on-loan-2026)\n\n### 交渉中・破談\n\n- **エデルソン（Éderson／アタランタMF）破談** ○: £38mで6月に合意済みだったが、メディカルで問題が発覚し現条件では見送り。夏後半に減額再交渉の可能性は残る（クラブは選手側に同情的）。出典: [Sky Sports](https://www.skysports.com/football/news/11095/13562399/man-utd-transfer-news-ederson-deal-with-atalanta-not-proceeding-at-current-price-due-to-issues-with-medical) (2026-07-12頃)\n- **「今夏MF計3人」が既定方針** ○（Ornstein）: サントス＋ティーレマンスに続く3人目を継続追跡。候補として報道されるのは——\n  - コネ（Manu Koné／ローマ）£51m規模 △\n  - ジョアン・ゴメス（João Gomes／ウルブス）接触報道 △（[Metro経由](https://atomicsoda.com/man-utd/all/14-jul-2026) 7/11）\n  - チュアメニ（Aurélien Tchouameni／レアル・マドリード）関心 △\n  - バレバ（Carlos Baleba／ブライトン）関心再燃・評価額が£100m→約£70mに低下との報道 △\n- **ルイス・ホール（Lewis Hall／ニューカッスルLB）** £60m規模で獲得意欲との報道 △（[TEAMtalk](https://www.teamtalk.com/manchester-united/man-utd-transfer-news-david-ornstein-youri-tielemans-lewis-hall-alex-scott) 2026-07-14）\n- **ガルナチョ（Alejandro Garnacho）セルオン**: チェルシー移籍時の10%条項による収入発生の観測報道 △\n\n### ケガ・離脱\n\n- **ウガルテ（Manuel Ugarte）**: ACL（前十字靭帯）損傷で長期離脱中。復帰時期は未定 ○（[Read Man Utd](https://readmanutd.com/2026/07/12/manchester-united-transfer-window-2026-talking-points-12th-july/) 2026-07-12）。中盤大量補強の直接的な背景\n\n\u003e source: [Sky Sports](https://www.skysports.com/football/news/11095/13562399/man-utd-transfer-news-ederson-deal-with-atalanta-not-proceeding-at-current-price-due-to-issues-with-medical)\n\n---\n\n## 🧠 戦術・チーム状況\n\n### カリック（Michael Carrick）体制の現在地\n\n- **前提の更新**: アモリム（Rúben Amorim）は2026年1月4日のリーズ戦（1-1）後、フロント批判会見を経て解任済み。カリックが1月に暫定就任→15試合11勝でチームを立て直し、5/3にCL出場権を確保（2023-24以来の復帰）→5/22に2028年までの正式契約\n- **選手起用**: アモリム政権で干されていたマイヌー（Kobbie Mainoo）を即スタメン復帰させ、シーズン終盤の好調でトゥヘル（Thomas Tuchel）率いるイングランド代表W杯メンバー入りまで押し上げた\n- **中盤再建が今夏の主題**: カゼミロ退団＋ウガルテ長期離脱で中盤が枯渇。マウント（Mason Mount）の低い位置起用は「つなぎ」との位置づけで、サントス＋ティーレマンス＋3人目の獲得計画はCL復帰を見据えた構造補強\n- **個人**: ブルーノ・フェルナンデス（Bruno Fernandes）は2025-26にPL最多21アシスト（リーグ記録）でFWA年間最優秀選手＋PL最優秀選手を受賞\n- 直近5試合のxG等: ※該当なし（オフシーズンのため）\n\n\u003e source: [Al Jazeera - Carrick permanent](https://www.aljazeera.com/sports/2026/5/22/man-utd-appoint-michael-carrick-as-permanent-manager) (2026-05-22) / [Sky Sports - 中盤再建分析](https://www.skysports.com/football/news/11096/13561668/man-utd-transfer-news-is-the-old-trafford-midfield-rebuild-going-to-plan-as-michael-carricks-side-prepare-for-2026-27)\n\n---\n\n## 📅 今後の試合予定（プレシーズン）\n\n| 日付（JST） | 対戦相手 | 会場 | 大会 |\n|---|---|---|---|\n| 7/19（日）0:00 | レクサム | ヘルシンキ（中立） | 親善試合 |\n| 7/25（土）1:00 | ローゼンボリ | トロンハイム（アウェー） | 親善試合 |\n| 8/1（土）22:00 | アトレティコ・マドリード | ストックホルム（中立） | 親善試合 |\n\n- 今夏ツアーは全て欧州内（北欧中心→8月にダブリン・ヴロツワフ）。以降はPSG（8/8）、リーズ（8/12）、ミラン（8/15）と続き、リーグ開幕は8/22\n- **見どころ**: W杯決勝が7/19（レクサム戦翌日）のため、W杯招集13名は序盤戦に不在——初戦はアカデミー勢＋新加入組中心の編成が濃厚。サントス、ダーロウのお披露目に注目。レクサムはハリウッドスター（Ryan Reynolds／Rob McElhenney）がオーナーの話題クラブで、興行的注目度も高い\n- 想定スタメンの具体報道: ※現時点で確認できず\n\n\u003e source: [manutd.com - プレシーズン日程](https://www.manutd.com/en/news/game-by-game-united-pre-season-fixture-list-2026)\n\n---\n\n## 🏟️ クラブ情報\n\n### 新スタジアム詳細発表（7/9）\n\n- 収容10万人の新スタジアムを**現オールド・トラフォードの約350m北西**に建設すると発表。用地は確保済み\n- 周辺開発を含め、雇用4.8万人・新規住宅1.5万戸・年間£7.3bn（約$9.8bn）の経済効果を試算\n- 移転目標は**2035年**。建設費は£2bn超の見込みで、資金調達は未確定\n- 出典: [manutd.com](https://www.manutd.com/en/news/united-secures-land-for-new-old-trafford-stadium) / [Washington Post (AP)](https://www.washingtonpost.com/sports/soccer/2026/07/09/man-united-new-stadium-old-trafford/d5838408-7bc4-11f1-b194-f872dd4ec5aa_story.html) (2026-07-09)\n\n### W杯とユナイテッド勢\n\n- 準決勝: フランス vs スペイン（7/14・ダラス）、**イングランド vs アルゼンチン（7/15・アトランタ）**。決勝は7/19 MetLifeスタジアム\n- イングランド代表にマイヌー（Kobbie Mainoo）、ラッシュフォード（Marcus Rashford）が在籍（マイヌーはここまで出場なし）。ブルーノのポルトガルは準決勝進出ならず\n- ティーレマンスはベルギー主将としてW杯参戦中のまま移籍が成立した形\n- 出典: [NPR](https://www.npr.org/2026/07/14/g-s1-133337/world-cup-final-france-england-spain-argentina) (2026-07-14)\n\n### フロント\n\n- スポーツディレクターのウィルコックス（Jason Wilcox）主導の補強方針をOrnsteinが「clear vision」と評価（中盤3人計画の一貫性）。INEOS／ラトクリフ（Sir Jim Ratcliffe）本人の直近14日以内の新規動向は、スタジアム発表以外に確認できず\n\n\u003e source: [manutd.com](https://www.manutd.com/en/news/united-secures-land-for-new-old-trafford-stadium)\n\n---\n\n## 📰 The Athletic ピックアップ\n\n※theathletic.com はクローラー拒否のため原文リンクを直接確認できず。今週のOrnstein（The Athletic）発の報道を転載媒体経由で紹介（全文は購読アカウントで検索を）:\n\n1. **サントス移籍の合意スクープ**（Ornstein）— £48m＋£2mボーナス、チェルシーの10%セルオン付きという契約構造を最初に報道。[Yahoo Sports経由](https://sports.yahoo.com/articles/david-ornstein-man-united-agreed-065000440.html) (2026-07-08頃)\n2. **ティーレマンス「advanced talks」**（Ornstein）— 解除条項行使によりヴィラは阻止不能、という交渉の力学を解説。[Football365経由](https://www.football365.com/news/aston-villa-powerless-to-stop-tielemans-joining-man-utd-for-35m-as-ornstein-reveals-advanced-talks) (2026-07-13)\n3. **今夏の移籍方針分析**（Ornstein）— 「MF3人獲得は当初からの計画」とし、3人目候補にコネ／ジョアン・ゴメス／チュアメニを挙げる。[TEAMtalk経由](https://www.teamtalk.com/manchester-united/man-utd-transfer-news-aurelien-tchouameni-carlos-baeba-kone-david-ornstein) (2026-07-14頃)\n\n\u003e source: [Football365](https://www.football365.com/news/aston-villa-powerless-to-stop-tielemans-joining-man-utd-for-35m-as-ornstein-reveals-advanced-talks)\n\n---\n\n*セルフチェック済み: R1日付ガード（全項目7日/14日以内・確定移籍は今夏ウィンドウ分のみ）／R2-R3ソース基準（\"Here We Go\"はRomano明示発言3件のみ採用）／R4反証チェック（指示書前提のアモリム体制は1月に終了済みと確認・監督表記をカリックに更新／エデルソンは「合意済み」ではなく破談と確認）／R6日本語名（英語名）併記*";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
