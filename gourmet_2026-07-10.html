<script>
const md = "裏取り完了。バズ枠はSNS元投稿＋数値まで確認できた案件がなかったので規定通り「該当なし」とし、確証が取れた新店4・ミシュラン1・限定5・トレンド3で組む。以下、週報本体。\n\n---\n\n# グルメ週報（2026-07-10）\n\n対象期間：2026-07-04 〜 2026-07-10 ／ 対象エリア：東京・大阪・京都・横浜・神戸\n\n## 🔥 今週バズりグルメ\n\n※今週該当なし\n（採用基準＝元投稿URL＋拡散規模数値の裏取りができたSNSバズ案件が今週分では確認できず。メディア発の話題株は「新規オープン」「期間限定」「トレンドフード」の各欄に収録）\n\n## 🆕 新規オープン注目店\n\n### 1. 餃子といえば芭莉龍（バリロン）茅場町店（東京・茅場町 / 東京メトロ茅場町駅）\n- **オープン日**：2026年7月6日（月）\n- **コンセプト**：宇都宮発・株式会社チームバリスタが手がけるネオ餃子居酒屋。「まるでステーキのような餃子」が看板の都内路面店1号店（GEMS茅場町1階）\n- **注目メニュー**：焼餃子 858円 / 麻辣焼餃子 968円 / 牛だしフォーセット（焼餃子3個付き）1,298円（各税込）\n- **予約方法**：電話（03-6280-5088）。日曜定休\n- 画像：[焼餃子（PR TIMES）](https://prcdn.freetls.fastly.net/release_image/92356/4/92356-4-ddfbe6fed887832fd01d3b1388584a54-2048x1536.png)\n- ソース：[PR TIMES（公式リリース）](https://prtimes.jp/main/html/rd/p/000000004.000092356.html) / [フードリンクニュース](https://www.foodrink.co.jp/news/2026/07/0692530.html)\n\n### 2. Doré by Charles-Henry（ドレ バイ シャルルアンリ）（東京・代官山 / 東急東横線代官山駅前）\n- **オープン日**：2026年7月6日（月）\n- **コンセプト**：代官山の人気タルトショップ「シャルルアンリ」の2号店となるフレンチクロワッサン専門店。壁面に400個のクロワッサン装飾、全17種を展開\n- **シェフ経歴**：Charles-Henry Lebourg氏（ノルマンディー出身）。パリのロブションほかロンドン・ローマ・サンフランシスコ・東京のミシュラン星付き店で修業\n- **注目メニュー**：いちごバニラクロワッサン、クロワッサンレモンパイ、クロック・マダムなど。営業9:00〜19:00\n- **予約方法**：不要（ベーカリー業態・テイクアウト/イートイン）\n- 画像：[店舗・商品（PR TIMES）](https://prcdn.freetls.fastly.net/release_image/168247/6/168247-6-cc467b569f76056927387981bcb4fbd5-3500x1750.jpg)\n- ソース：[PR TIMES（公式リリース）](https://prtimes.jp/main/html/rd/p/000000006.000168247.html) / [madame FIGARO（7/6取材記事）](https://madamefigaro.jp/lifestyle/260706-dore-by-charles-henry/) / [ファッションプレス](https://www.fashion-press.net/news/148222)\n\n### 3. 蕎麦いまゐ 池袋店（東京・東池袋 / 池袋駅・東池袋駅）\n- **オープン日**：2026年7月10日（金）＝本日\n- **コンセプト**：「洋麺屋五右衛門」運営会社が展開する蕎麦・うどん業態。サンシャインシティ地下1階に出店。四谷三丁目・練馬・自由が丘に既存店を持つ、出汁の効いたつゆとコシのある蕎麦のセルフ型店\n- **予約方法**：不要\n- ソース：[池袋タイムズ](https://ikebukuro-times.com/archives/soba-imai-sunshine.html)\n\n### 4. 新時代 京都白梅町店（京都・北野 / 嵐電北野白梅町駅）※7/17オープン予定\n- **オープン日**：2026年7月17日（金）予定\n- **コンセプト**：全国200店舗展開・累計3億本超の揚げ鶏皮串「伝串」（1本税込55円）が名物の居酒屋チェーン、京都白梅町進出。7/17〜7/20はドリンク全品税込103円のオープン記念あり（創業者Instagramフォロワー限定）\n- **予約方法**：可（[ホットペッパー店舗ページ](https://www.hotpepper.jp/strJ004634133/)あり）\n- ソース：[PR TIMES（公式リリース）](https://prtimes.jp/main/html/rd/p/000000263.000070373.html)\n\n## ⭐ ミシュラン・メディア話題\n\n### ミシュランガイド、2026年6月先行公開で東京の新規掲載12軒を発表\n- **発表日**：2026年6月18日（公式サイト・アプリにNewマーク掲載）\n- **掲載店**：ラペティ（フランス料理）／冨田（日本料理）／地焼うなぎ 等々力ひらさわ（うなぎ）／鮨 杉澤（銀座・すし）／ノーコード（メキシコ料理）／Ino Cantonese 日本橋 たかせ（広東料理）／セト（イノベーティブ）／匠 誠（すし）／KANTA（現代風料理）／NÉN TOKYO（ベトナム料理）／トレモラーレ（イタリア料理）／すし家 祥太（すし）\n- ソース：[PR TIMES（日本ミシュランタイヤ公式）](https://prtimes.jp/main/html/rd/p/000000087.000117133.html) / [ミシュランガイド公式](https://guide.michelin.com/jp/ja/article/dining-out/new-additions-michelin-japan-2026)\n\n## ⏰ 期間限定・コラボ\n\n### 1. フェアモント東京「マンゴー＆クレームブリュレ かき氷」「ピーチ＆メレンゲ かき氷」\n- **提供期間**：2026年7月1日（水）〜 8月31日（月）\n- **内容**：35階ロビーラウンジ「Vue Mer」。フランス菓子に着想を得た夏季限定かき氷2種、各3,500円（税サ込）\n- **予約**：可（電話 03-4321-1111 / TableCheck）\n- 画像：[2種並び（PR TIMES）](https://prcdn.freetls.fastly.net/release_image/148604/36/148604-36-68443103568c60d5eeeb0ecddf6e0556-3900x2600.jpg)\n- ソース：[PR TIMES（公式リリース）](https://prtimes.jp/main/html/rd/p/000000036.000148604.html)\n\n### 2. シャングリ・ラ 東京「メロンかき氷」\n- **提供期間**：2026年7月1日（水）〜 9月30日（水）\n- **内容**：28階「ザ・ロビーラウンジ」。国産マスクメロンほぼ1玉分＋ドバイチョコレート風グリッシーニ添え、6,050円（税込・サ別15%）\n- **予約**：公式HPから予約案内あり\n- 画像：[メロンかき氷（favy取材記事）](https://favy-tokyo.s3.ap-northeast-1.amazonaws.com/uploads/topic_item/image/806838/retina_main.jpg)\n- ソース：[favy（7/1記事）](https://www.favy.jp/topics/37959)\n\n### 3. 『Fate/Grand Order』× スイーツパラダイス 江ノ島2号店（海の家）\n- **提供期間**：2026年7月1日（水）〜 7月30日（木）\n- **内容**：江ノ島の海の家でのFGOコラボカフェ（全国話題のIPコラボのため対象エリア外だが収録）\n- **予約**：詳細は公式ページ参照\n- ソース：[スイーツパラダイス公式](https://www.sweets-paradise.jp/collaboration/fate-go-sea)\n\n### 4. 『君のことが大大大大大好きな100人の彼女』× キュアメイドカフェ（東京・秋葉原）\n- **提供期間**：2026年7月4日（土）〜 7月20日（月・祝）\n- **内容**：TVアニメ第3期放送開始に合わせた「アメーリカなパーティー」テーマのコラボメニュー\n- **予約**：公式ページ参照\n- ソース：[キュアメイドカフェ公式](https://www.curemaid.jp/collab_cafe/hyakkano2026/)\n\n### 5. チラズアート コラボカフェ（横浜：ツリービレッジ横浜店）\n- **提供期間**：2026年7月18日（土）〜 8月6日（木）※大阪・博多は8/29〜9/24で30日超のため参考扱い\n- **内容**：ホラーゲーム『夜勤事件』の「卓也のばぁバーガー」などの再現メニュー。1品ごとにコースター全8種ランダム配布。入場無料\n- **予約**：記載なし（店舗営業時間に準ずる）\n- ソース：[ファミ通.com](https://www.famitsu.com/article/202607/80312)\n\n## 📈 トレンドフード\n\n### 1. 明太フランス\n- **なぜ今**：福岡発祥のパンが全国区ブームに。SNS映えする断面と明太ソースの「見た目のおいしさ」、値上げ時代の満足感、パン専門店から大手・コンビニまでの参入拡大——の3要因（グルメジャーナリスト山路力也氏の分析）。もはやパン屋の一メニューでなく独立ジャンル化\n- **代表店**：[THE FULL FULL HAKATA（博多・食楽web取材）](https://www.syokuraku-web.com/column/138254/)、[YAMAYA BASE DAZAIFU（太宰府・1日最大1,000本）](https://www.anafesta.com/information/2026/04/59356/)\n- ソース：[Yahoo!ニュース エキスパート](https://news.yahoo.co.jp/expert/articles/df49e07fdf196fdd07f1a243cfe3d4c7c0674b03)\n\n### 2. ベルギー式2度揚げフリッツ（韓国経由）\n- **なぜ今**：韓国・大邱で人気爆発した「BRUSSELS FRIES」が新大久保に上陸（2025年12月開店）。牛脂ブレンド油の2度揚げ＋ソース・トッピングのカスタムが「混ぜる動画」としてSNS拡散、TV「王様のブランチ」でも紹介され新大久保の新定番に\n- **代表店**：BRUSSELS FRIES（新宿区歌舞伎町2-41-12、新大久保駅徒歩約10分）\n- ソース：[Trepo](https://trepo.jp/food/305573/) / [TABIZINE](https://tabizine.jp/article/681037/) / [王様のブランチ紹介](https://www.activitv.com/entry/brunch_260131_trend1-2/)\n\n### 3. ホテルの「パフェ×かき氷」ハイブリッド\n- **なぜ今**：7/1に都内ラグジュアリーホテルが一斉に夏季かき氷を投入。グラスの底にコンポート、中にかき氷を仕込む「パフェ氷」型が今年の主流で、メディアのまとめ記事が相次ぐ\n- **代表店**：フォーシーズンズホテル東京大手町「ピーチ・メルバ かき氷」（7/1〜9/6）、フェアモント東京、シャングリ・ラ 東京（上記⏰欄参照）\n- ソース：[Numero TOKYO（6/30）](https://numero.jp/20260630-kakigori/) / [ファッションプレス](https://www.fashion-press.net/news/147922) / [CakeNews](https://cake-news.com/region/kanto/tokyo/2026/06/281679/)\n\n---\n\n\n\n---\n\n生成メモ（本文外・運用向け）：\n- バズ枠を空にしたのはR2の縛り（元投稿URL＋拡散数値の併記）による。検索経由ではX/TikTokの個別投稿と再生数の突き合わせができず、数値なしで「◯万再生」と書くのは捏造になるため見送った。恒常的に埋めたいなら、X API か TikTok の投稿URL収集を別レーン（スクリプト）で仕込むのが筋\n- Doré は検索初報で「クレープ専門店」とされていたが、PR TIMES 原文で「クロワッサン専門店」と確認して修正済み\n- 全掲載店はPR TIMES・公式ページ・媒体取材記事のいずれかで実在確認済み。食べログユーザー画像は不使用";
document.getElementById('content').innerHTML = marked.parse(md);
document.querySelectorAll('#content h3').forEach(h3 => {
  const raw = h3.textContent.trim();
  const clean = raw.replace(/^\d+\.\s*/,'').split(/[（(―—\s]/)[0].trim();
  if (!clean || clean.length < 2) return;
  fetch('https://ja.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(clean))
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(d => {
      if (!d.thumbnail) return;
      const img = document.createElement('img');
      img.src = d.thumbnail.source;
      img.alt = clean;
      h3.insertAdjacentElement('afterend', img);
    })
    .catch(() => {});
});
</script>
