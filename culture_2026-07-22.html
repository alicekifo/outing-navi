<script>
const md = "# 教養マガジン 2026/7/22\n\n### スペインが掲げたあのトロフィー、実は「2代目」で持ち帰れもしない\n\n3日前の7月19日、メットライフ・スタジアムでスペインがアルゼンチンを延長の末1-0で下し、2010年以来2度目の世界王者に就いた。女子W杯と男子W杯の同時保持は史上初の快挙だ。ところで表彰式で掲げられた黄金のトロフィー、あれは優勝国のものにならない。持ち帰れるのは金メッキのレプリカで、本物は式典が終わるとFIFAの金庫へ戻る。理由は初代の悲劇にある。初代「ジュール・リメ杯」は1966年、W杯開幕直前のロンドンで展示中に盗まれ、発見したのはピックルスという名の犬だった。1970年に3度目の優勝を果たしたブラジルへ永久贈呈されたが、1983年にリオで再び盗まれ、今度は溶かされて二度と戻らなかった。1974年から使われる現行トロフィーが「貸与制」なのは、この教訓ゆえだ。18金・6.1kg。世界でいちばん有名な優勝杯は、世界でいちばん厳重に隠されている。\n\u003e source: [NPR: Spain is the 2026 World Cup champion](https://www.npr.org/2026/07/19/nx-s1-5899071/2026-world-cup-fifa-argentina-spain-final-championship)\n\n### ワインボトルはなぜ750mlなのか ── 容疑者は職人の肺と英国のガロン\n\nキリよく1リットルでもなく、なぜ750mlという中途半端な量なのか。法的に決まったのは意外と最近で、1975年のEC指令がワインの標準容器を定めてからだ。だが数字そのものの由来には諸説ある。まず「肺活量説」——手吹きガラスの時代、職人が一息で吹ける瓶がだいたい700〜800mlだったという説。次に「樽説」——ボルドーの標準樽バリック225リットルが、ちょうど300本分にあたる。そして有力視されるのが「英ガロン説」だ。ボルドーワインの最大顧客だった英国は容量をガロンで数えており、1ガロン（約4.55リットル）を6本に分けるとほぼ758ml。50ガロンの樽なら300本と、貿易の帳簿が美しく割り切れる。つまりグラスの中の詩情とは裏腹に、瓶のサイズを決めたのは輸送と関税の算盤だった可能性が高い。今夜ボトルを開けたら、そこに残る大英帝国の度量衡を思い出してほしい。\n\u003e source: [欧州理事会指令75/106/EEC（EUR-Lex）](https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:31975L0106)\n\n### 今日7月22日は「円周率近似値の日」── 22/7は3.14より正確だった\n\n日付を日/月で書く欧州式にすると、今日は22/7。22÷7=3.142857…となることから、7月22日は「円周率近似値の日（Pi Approximation Day）」と呼ばれる。3月14日の「π・デー」の弟分のような記念日だが、実は数学的にはこちらが兄貴分だ。22/7と真の円周率との誤差は約0.0013で、3.14と書いたときの誤差約0.0016より小さい。つまり「近似値の日」のほうが本家より円周率に近い。この分数の正しさを証明したのが約2200年前のアルキメデスである。円に内接・外接する正多角形の周の長さを正96角形まで手で計算し、πが223/71より大きく22/7より小さいことを挟み撃ちで示した。小数表記も三角関数もアラビア数字さえもない時代に、である。分数ひとつに刻まれた人類の執念を思えば、今日をささやかな祝日にする価値は十分ある。\n\u003e source: [Wikipedia: Pi Day (Pi Approximation Day)](https://en.wikipedia.org/wiki/Pi_Day)\n\n### 「土用の丑の日は平賀源内が発明」── その伝説、出典が見つからない\n\nいままさに夏の土用の真っ最中（7月19日頃〜8月6日頃）。鰻屋の店先でおなじみの起源譚がある。夏に鰻が売れず困った店主が平賀源内に相談し、「本日丑の日」と書いて貼らせたところ大繁盛した——という話だ。ところがこの逸話、源内と同時代の史料には一切見つからない。国立国会図書館のレファレンスでも「典拠不明」と回答されており、確かなのは江戸後期の随筆『明和誌』（1822年）に丑の日の鰻が流行したという記録がある程度。日本一有名なコピーライター誕生秘話は、後世の創作の疑いが濃い。そもそも「土用」は古代中国の五行思想に由来し、四季それぞれの変わり目に「土」の気の期間を置いたもので、夏だけのものではない。丑の日は十二支を日付に振った日繰りだ。本来は「う」のつく食べ物なら瓜でも梅干しでもよかったという。鰻だけが生き残ったのは、物語の力、恐るべしである。\n\u003e source: [国立国会図書館 レファレンス協同データベース](https://crd.ndl.go.jp/reference/)\n\n### 3.8km先に「明日」が見える島 ── ベーリング海峡のダイオミード諸島\n\nベーリング海峡の真ん中に、わずか3.8kmを隔てて並ぶ二つの島がある。大ダイオミード島はロシア領、小ダイオミード島は米国領。そしてこの狭い海峡には日付変更線が通っているため、両島の時差はほぼ21時間。小ダイオミードの住民約80人が対岸を眺めるとき、そこに見えているのは文字どおり「明日」だ。二つは「明日の島」「昨日の島」の異名を持つ。冬には海が凍りつき、理屈の上では歩いて明日へ渡れるが、国境ゆえに違法である。冷戦期、ここは「氷のカーテン」と呼ばれる分断の最前線だった。1987年、米国人スイマーのリン・コックスが摂氏4度の海をこの島から島へと泳ぎ切り、後にレーガンとゴルバチョフが晩餐の席でその勇気に言及した。国境も日付も人間が引いた線にすぎない——それを、たった3.8kmの海がこれほど雄弁に見せてくれる場所は他にない。\n\u003e source: [Wikipedia: Diomede Islands](https://en.wikipedia.org/wiki/Diomede_Islands)";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
