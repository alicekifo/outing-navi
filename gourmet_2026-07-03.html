<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root{--bg:#f5f5f7;--surface:#ffffff;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.16);--accent:#fb923c;--blue:#4a90d9;--green:#28a745;--text:#1d1d1f;--text2:rgba(60,60,67,0.75);--r:12px;}
html.dark{--bg:#0c0c10;--surface:#161620;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.15);--blue:#6aadff;--green:#52d68a;--text:#e8e8f0;--text2:#a8a8c8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;padding:20px 16px 80px;}
.page{max-width:680px;margin:0 auto;}
.hd{display:flex;align-items:center;gap:10px;margin-bottom:26px;flex-wrap:wrap;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.logo em{color:var(--accent);font-style:normal;}
.hd-date{font-size:12px;color:var(--text2);margin-right:auto;}
.back-link{font-size:11px;color:var(--text2);text-decoration:none;}
.back-link:hover{color:var(--accent);}
#content h2{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--text2);margin:28px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border2);}
#content h3{font-size:17px;font-weight:700;color:var(--text);margin:18px 0 8px;line-height:1.5;}
#content p{font-size:15px;color:var(--text2);line-height:1.9;margin-bottom:12px;}
#content ul,#content ol{font-size:15px;color:var(--text2);line-height:1.9;padding-left:20px;margin-bottom:12px;}
#content li{margin-bottom:6px;}
#content strong{color:var(--text);font-weight:700;}
#content em{color:var(--accent);font-style:normal;}
#content a{color:var(--blue);text-decoration:none;word-break:break-all;}
#content a:hover{text-decoration:underline;}
#content blockquote{border-left:3px solid var(--accent);padding:10px 16px;background:rgba(251,146,60,0.07);border-radius:0 var(--r) var(--r) 0;margin:12px 0;}
#content blockquote p{color:var(--text);margin:0;}
#content hr{border:none;border-top:1px solid var(--border);margin:20px 0;}
#content img{width:100%;max-height:220px;object-fit:cover;border-radius:var(--r);margin:8px 0 12px;display:block;}
#content table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0 16px;}
#content th{color:var(--text2);font-weight:600;padding:6px 8px;border-bottom:1px solid var(--border2);text-align:left;}
#content td{padding:8px;border-bottom:1px solid var(--border);color:var(--text2);}
.model-tabs{display:flex;gap:4px;}
.mtab{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;text-decoration:none;border:1px solid var(--border2);color:var(--text2);}
.mtab.mtab-on{background:var(--accent);color:#000;border-color:var(--accent);}

<script>
const md = "ファイル保存は権限エラーになりましたが、レポート本文はそのまま出力します。\n\n## 🔥 今週バズりグルメ\n\n※今週該当なし\n直近7日以内の投稿で、拡散規模（いいね数・RT数・再生数）を元投稿URLとともに一次情報レベルで確認できた事例が見つかりませんでした。水増しを避けるため、確度の低い情報の掲載は見送ります。\n（参考：三田製麺所「超特盛り1.5kgつけ麺」復活やスシロー「別格まぐろ祭」がSNS上で話題化していますが、期間限定施策のため下記「⏰期間限定・コラボ」に掲載しています）\n\n---\n\n## 🆕 新規オープン注目店\n\n### HALO,（アロ）patissier KAORU YOSHIDA（大阪・高槻 / 高槻市駅・摂津富田駅エリア）\n- **オープン日**：2026年7月3日（プレオープンは6月26〜28日）\n- **コンセプト**：築180年の古民家を改装したパティスリー。「静かに、しかし確かに記憶に残る味わい」がコンセプトで、庭を抜けて店内へ向かう非日常の導線が特徴。将来的には縁側にカフェ席も展開予定\n- **店主の経歴**：吉田薫氏。辻製菓専門学校卒業後、東京のパティスリーを経て、京都の名店「パティスリー ナチュール シラモト」でスーシェフを約10年務める。2025年「インターナショナルケータリングカップ」で日本代表として世界3位を獲得\n- **注目メニュー・価格**：世界大会受賞作の「アントルメ ショコラ」「ケーク オ ショコラ」ほか、季節の新作・焼き菓子\n- **予約方法**：現時点では公式Instagramで最新情報を要確認（詳細未公表）\n- 画像：省略（食べログユーザー投稿画像の埋め込み規約のため）\n- 公式リンク：[Instagram @halo_patisserie](https://www.instagram.com/halo_patisserie/)\n- 情報源：[関西ニューオープン情報](https://kansai-kaiten.com/halopatisserie-takatsuki2607/)、[NEWSCAST](https://newscast.jp/smart/news/8213160)\n\n---\n\n## ⭐ ミシュラン・メディア話題\n\n### ミシュランガイド京都・大阪2026：美山荘が6年ぶりの新三つ星\n- 京都の日本料理店「美山荘」が二つ星から三つ星に昇格。京都・大阪で新たな三つ星が誕生したのは2020年版以来6年ぶり\n- 新二つ星は日本料理5軒（京都：獨歩、東山 吉寿、室町 唯、徳ハ本也／大阪：照屋）\n- 2026年4月23日発表\n- 情報源：[ミシュランガイド公式](https://guide.michelin.com/jp/ja/article/michelin-guide-ceremony/michelin-guide-kyoto-osaka-2026-stars-reveal)\n\n### ミシュランガイド東京2026：日本料理「明寂」が新三つ星に昇格\n- 西麻布の日本料理店「明寂」が二つ星から三つ星に昇格。新二つ星は「西麻布 鮨 真」（寿司）、「伯雲」（外苑前・日本料理）、「炎水」（中目黒・日本料理）の3軒\n- 星付き掲載店は合計160軒、東京は19年連続で世界最多の星付きレストラン都市\n- 情報源：[ヒトサラマガジン](https://magazine.hitosara.com/article/1860/)\n\n### The Tabelog Award 2026：Gold 36店を発表\n- ユーザー投票により「Gold」36店、「Silver」160店、「Bronze」537店を選出。Gold受賞店には蒼（イノベーティブ）、茶禅華（中華）、松川（日本料理）などが名を連ねる\n- 2026年1月26日発表\n- 情報源：[食べログマガジン](https://magazine.tabelog.com/articles/484987)\n\n---\n\n## ⏰ 期間限定・コラボ\n\n### スシロー「年に一度の別格まぐろ祭」\n- **提供期間**：2026年7月3日（金）〜7月20日（月・祝）※なくなり次第終了\n- **メニュー内容**：静岡の鮪問屋「八洲水産」厳選の天然本鮪・大切りびん長まぐろなど。大切りびん長まぐろ110円〜、7月15日からは天然のどぐろの炙り2貫110円〜も登場\n- **予約可否**：不要（店舗により順番待ちあり）\n- 公式リンク：[PR TIMES（FOOD \u0026 LIFE COMPANIES）](https://prtimes.jp/main/html/rd/p/000000814.000049164.html)\n\n### 三田製麺所「超特盛り1.5kgつけ麺」復活\n- **提供期間**：2026年7月1日（水）〜7月31日（金）\n- **メニュー内容**：通常1kgの「超特盛つけ麺」を並盛の約5倍、1.5kgに増量。対象は「つけ麺」「特濃つけ麺」など5品、1,380〜1,660円。期間中はスープおかわり1回無料\n- **予約可否**：不要\n- 公式リンク：[PR TIMES（エムピーキッチンホールディングス）](https://prtimes.jp/main/html/rd/p/000000308.000039951.html)\n\n### 『鬼滅の刃』× ハートブレッドアンティーク 初コラボ\n- **提供期間**：2026年7月1日（水）〜8月31日（月）※商品により販売期間が異なる\n- **メニュー内容**：「ふわり、ひと呼吸 パン浪漫」がテーマ。義勇の\"ぎゅう\"にくパンなど鬼殺隊モチーフのコラボパン・スイーツ、限定グッズを展開\n- **予約可否**：店頭販売、一部店舗は入店待機列あり\n- 公式リンク：[鬼滅の刃公式サイト](https://kimetsu.com/news/?id=70532\u0026p=1)\n\n### ザ・プリンスギャラリー東京紀尾井町「Classic Hawaiian Afternoon Tea」\n- **提供期間**：2026年7月1日（水）〜8月31日（月）\n- **メニュー内容**：ハワイの名門ホテルをイメージした「アロハピンク アフタヌーンティー」、8,625円（税・サービス料込）\n- **予約可否**：要予約（電話 03-3234-1136）\n- 公式リンク：[プリンスホテル公式](https://www.princehotels.co.jp/kioicho/plan/special/afternoontea_information/)\n\n### にじさんじ × and GALLERY「Milky Ribbon Party」\n- **提供期間**：2026年6月15日（月）〜7月28日（火）※前半6/15〜7/6、後半7/7〜7/28で内容切り替え\n- **メニュー内容**：コラボカフェメニュー・限定グッズ（会場：and GALLERY 池袋）\n- **予約可否**：要予約（詳細は公式サイト参照）\n- 公式リンク：[コラボカフェ.com](https://collabo-cafe.com/events/tag/tokyo/)\n\n---\n\n## 📈 トレンドフード\n\n### 酸辛香（さんしんこう）グルメ ― 2026年の「猛暑グルメ™」\n- **なぜ今旬か**：ぐるなびが加盟飲食店約300店へのアンケートを実施し、26.3%が「酸味・辛味・香味」を今夏最大のトレンドと回答。記録的な猛暑を乗り切る食欲増進メニューとして、料理人コミュニティ「CLUB RED」が考案\n- **代表的な店舗**：ON the TABLE CHINESE（東京、黒酢酢豚）／HASUO（東京、旨辛カムジャタン麺）／IGOR COSY 渋谷本店（東京・渋谷、香味土鍋ご飯）\n- 情報源：[ぐるなびプレスリリース（PR TIMES）](https://prtimes.jp/main/html/rd/p/000001626.000001511.html)\n\n### ビリヤニ ― スパイスカレーに続く本格インド・南アジア炊き込みご飯ブーム\n- **なぜ今旬か**：スパイスカレーブームの次の主役として、地方の名店の東京進出やビリヤニ専門店の新規開業が相次いでいる\n- **代表的な店舗**：ビリヤニ大澤（東京、完全予約制・曜日替わり）／ジョニーのビリヤニ 神田店（東京・神田、北陸発）／エリックサウス 高円寺店（東京・高円寺）\n- 情報源：[食べログマガジン](https://magazine.tabelog.com/articles/154069)、[エンジョイ東京](https://www.enjoytokyo.jp/article/202437/)\n\n---\n\n\n\n**補足**：今回、TikTok/X個々の投稿の再生数・RT数などリアルタイムの拡散規模数値は検索ツール経由では一次確認できなかったため、「🔥今週バズりグルメ」は該当なしとしています。ファイル保存はC:\\Windows\\system32への書き込み権限がなく失敗しましたので、必要であれば別の保存先を教えてください。";
document.getElementById('content').innerHTML = marked.parse(md);
document.querySelectorAll('#content h3').forEach(h3 => {
  const raw = h3.textContent.trim();
  const clean = raw.replace(/^\d+\.\s*/,'').split(/[（(―—\s]/)[0].trim();
  if (!clean || clean.length < 2) return;
  fetch('https://ja.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(clean))
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(d => {
      if (!d.thumbnail) return;
      const img = document.createElement('img');
      img.src = d.thumbnail.source;
      img.alt = clean;
      h3.insertAdjacentElement('afterend', img);
    })
    .catch(() => {});
});
</script>
