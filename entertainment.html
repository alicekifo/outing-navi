<script>
const md = "情報が揃った。週報まとめるね。\n\n---\n\n# エンタメ週報 2026/05/30\n\n---\n\n## 🎬 今週の映画\n\n### 劇場版モノノ怪 第三章 蛇神\n\n**公開日：** 2026年5月29日（金） 全国ロードショー\n**尺：** 87分 ／ G指定 ／ ツインエンジン配給\n\n大奥を舞台にした三部作がついに完結。薬売りが大奥に永きにわたり隠されてきた「最大の秘密」と蛇神の呪いに立ち向かう。第一章・第二章から続く美麗な作画とホラー演出が健在で、シリーズファン必見の集大成。\n\n**評価：** ★★★★★\n**見どころ：** 三章での完結という構成美、妖艶な日本画風アニメーション\n**公式サイト：** [劇場版 モノノ怪 公式](https://www.mononoke-movie.com/)\n**情報元：** [電撃オンライン](https://dengekionline.com/article/202512/60242) ／ [映画.com](https://eiga.com/movie/103594/)\n\n---\n\n### スター・ウォーズ マンダロリアン・アンド・グローグー\n\n**公開中：** 2026年5月22日（金）公開 ／ 上映中\n**監督：** ジョン・ファブロー　**出演：** ペドロ・パスカル、シガニー・ウィーバー\n\n国内初週で動員43.5万人・興収7.49億円を叩き出し初登場1位。全米でも週間8,100万ドルと圧倒的な数字。ドラマ版「マンダロリアン」の世界観をそのままスクリーンへ。\n\n**評価：** ★★★★☆\n**見どころ：** ファブロー監督によるアクション演出の映画的スケールアップ、ウィーバー参戦\n**情報元：** [映画.com 国内ランキング](https://eiga.com/ranking/jp/)\n\n---\n\n### プロジェクト・ヘイル・メアリー\n\n**海外公開中 ／ 日本公開日調整中**\n**世界興行収入：** 3億ドル突破　→　2026年最大ハリウッドヒット作確定\n\nアンディ・ウィアー原作SF小説の映像化。太陽系外の宇宙で孤独に戦う宇宙飛行士の物語。批評家・観客ともに絶賛、今年の覇権SF映画として世界的に話題沸騰中。\n\n**評価：** ★★★★★\n**見どころ：** 原作ファン待望の映像化、SF映画史に残りうるシナリオ\n**情報元：** [THR Japan](https://hollywoodreporter.jp/movies/187430/)\n\n---\n\n### プリンセス プリンセス FINAL LIVE ドキュメント\n\n**公開日：** 2026年5月30日（金）\n1996年に記録されたバンドのファイナルコンサートをHDアップコンバートした貴重なドキュメンタリー。プリプリ世代には刺さる一作。\n\n**評価：** ★★★★☆\n**情報元：** [MOVIE WALKER PRESS](https://press.moviewalker.jp/list/upcoming/)\n\n---\n\n## 🎮 ゲーム情報\n\n### EA SPORTS FC 26 ― The World\u0027s Game Update（ワールドカップモード解禁）\n\n**配信開始：** 2026年6月4日（水）\n**プラットフォーム：** PS5 / Xbox / PC\n\nワールドカップ2026モード追加のアップデートが6月4日に配信決定。53の公認ナショナルチーム（41チームはW杯参加チーム）、新スタジアム、Adidasマッチボール、更新済みプレイヤーフェイスが一気に追加される。日本代表はノンライセンスながら本物の選手データで収録予定。\n\n**注目ポイント：** 新Playスタイル追加、FUTコンテンツ更新も同時実施\n**情報元：** [EA公式 Pitch Notes](https://www.ea.com/en/games/ea-sports-fc/fc-26/news/pitch-notes-fc26-the-worlds-game-update) ／ [mp1st.com](https://mp1st.com/title-updates-and-patches/ea-sports-fc-26-the-worlds-game-update-released-patch-1-25)\n\n---\n\n### Steam 海洋フェス ― 開催中\n\n**テーマ：** 海系ゲーム大集合\n\n現在Steamでは海洋テーマのフェスティバルセールが開催中。注目タイトル：\n\n| タイトル | ジャンル | 備考 |\n|---|---|---|\n| **Subnautica** | サバイバル探索 | 深海探索の定番、セール中 |\n| **NAMAKORIUM（ナマコリウム）** | 協力RTS | 最大4人協力、汚染された海をナマコで大掃除 |\n| **Still Wakes the Deep** | シナリオホラー | 1970年代石油掘削施設が舞台、雰囲気◎ |\n\n**情報元：** [ゲームエイト - Steamセール](https://game8.jp/steam/769004) ／ [Steam Store](https://store.steampowered.com/specials?l=japanese)\n\n---\n\n### Minecraft / シャドウバース ― 今週の動き\n\n今週は大型アップデートの情報なし。Minecraftは直近パッチ適用済み、シャドウバースの新弾情報は来月以降に期待。\n\n---\n\n## 🎌 アニメ・ストリーミング\n\n### 転生したらスライムだった件 第4期 ― 4週連続首位\n\n2026年春アニメランキングで4週連続1位をキープ中。圧倒的な知名度と安定した作画クオリティで他作品を引き離す独走状態。人気配信サービスの初速ランキングでも上位。\n\n**評価：** ★★★★☆（安定の転スラクオリティ）\n**情報元：** [アニメハック - 今期ランキング](https://anime.eiga.com/news/column/konki_ranking/126429/)\n\n---\n\n### ドロヘドロ Season 2 ― 6年越しの復活\n\n第1期（2020年）から6年ぶりの続編。初話から「主人公が登場しない」という大胆な構成でファンをざわつかせた。人気配信サービスでのランキングは2位と堂々の上位。独特のグロテスクなダークファンタジー世界が帰ってきた。\n\n**評価：** ★★★★★（ファン待望）\n**情報元：** [Yahoo!ニュース - マグミクス](https://news.yahoo.co.jp/articles/facde1aaf5f679e5ddc201735a0ea6914c9b16b2)\n\n---\n\n### とんがり帽子のアトリエ ― 美麗作画で話題\n\n4月6日スタートの春アニメ。「どこを切り取っても絵画の一枚のような色彩」と評され、原作マンガのタッチをそのままアニメ化した芸術的な映像美が評判を呼んでいる。4月末時点の録画数ランキングでも10位にランクイン。\n\n**評価：** ★★★★☆（映像クオリティは最高峰）\n**情報元：** [note - 春アニメ感想](https://note.com/buri_lien/n/n7f7c657f9da9)\n\n---\n\n### Amazon Prime Video ― 6月の注目新着\n\n**6月1日〜：**\n- 映画「小さな夜想曲」「窓ぎわのトットちゃん」\n\n**6月6日〜：**\n- ドラマ「国宝」（話題の実写ブロックバスター）\n\n**6月22日〜：**\n- カラテキッド 全6作品（「ベスト・キッド: 伝説」含む）\n\n**+** アンパンマン映画全35作品、銀魂TVアニメ全シリーズも追加予定。\n**情報元：** [Amazon公式ブログ](https://www.aboutamazon.jp/news/entertainment/amazon-prime-video-new-content-june-2026)\n\n---\n\nSources:\n- [劇場版モノノ怪 公式サイト](https://www.mononoke-movie.com/)\n- [電撃オンライン - モノノ怪第三章](https://dengekionline.com/article/202512/60242)\n- [映画.com - 国内ランキング](https://eiga.com/ranking/jp/)\n- [THR Japan - プロジェクト・ヘイル・メアリー](https://hollywoodreporter.jp/movies/187430/)\n- [EA公式 - The World\u0027s Game Update](https://www.ea.com/en/games/ea-sports-fc/fc-26/news/pitch-notes-fc26-the-worlds-game-update)\n- [mp1st.com - FC26 Patch 1.25](https://mp1st.com/title-updates-and-patches/ea-sports-fc-26-the-worlds-game-update-released-patch-1-25)\n- [Steam セール](https://store.steampowered.com/specials?l=japanese)\n- [ゲームエイト - Steamセール情報](https://game8.jp/steam/769004)\n- [アニメハック - 今期ランキング](https://anime.eiga.com/news/column/konki_ranking/126429/)\n- [Yahoo!ニュース - ドロヘドロ Season2ランキング](https://news.yahoo.co.jp/articles/facde1aaf5f679e5ddc201735a0ea6914c9b16b2)\n- [Amazon Prime Video 6月新着](https://www.aboutamazon.jp/news/entertainment/amazon-prime-video-new-content-june-2026)\n- [MOVIE WALKER PRESS - 今週公開](https://press.moviewalker.jp/list/upcoming/)\n\n---\n\n映画は「モノノ怪第三章」と「マンダロリアン」が今週の二大注目。ゲームはFC26のワールドカップモードが来週4日に来るから要チェック。アニメは転スラとドロヘドロの二強状態が続いてる感じ。";
