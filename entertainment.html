<script>
const md = "情報が揃いました。週報を生成します。\n\n---\n\n## 🎬 今週の映画（2026年6月5日〜6月12日公開）\n\n### モブ子の恋\n**公開日：2026年6月5日 / 配給：テアトル系 / 上映時間：未確認**\n\n人見知りで自分を\"モブ\"と定義する女子大生・信子が、同じバイト先の青年・入江に惹かれていく青春ラブストーリー。田村茜の同名漫画が原作。\n\n**見どころ：**「バジーノイズ」の風間太樹監督が続投。主演は桜田ひよりと木戸大聖。内向的なヒロインの殻を破る成長を静かな演出で描く。\n\n**評価：** 未評価（公開直後のため集約スコア未集計）\n\n情報源：[映画.com](https://eiga.com/movie/99526/) / [テアトルシネマグループ](https://ttcg.jp/distribution/1212800.html)\n\n---\n\n### FUJIKO\n**公開日：2026年6月5日 / 製作：日本 / 上映時間：95分 / G指定**\n\n1970〜80年代の静岡を舞台に、シングルマザーが激動の時代を自分らしく生き抜く姿を描くヒューマンドラマ。\n\n**見どころ：**MEGUMIプロデュース、片山友希が主演。YOU、リリー・フランキーら実力派が脇を固める。女性の生き方を真正面から問う作品として注目。\n\n**評価：** 未評価\n\n情報源：[映画.com](https://eiga.com/movie/103625/) / [映画.com ニュース](https://eiga.com/news/20260313/3/)\n\n---\n\n### 君と僕の5分\n**公開日：2026年6月5日 / 製作：韓国 / 上映時間：104分 / PG12**\n\n日本文化輸入が規制されていた2000年代初頭の韓国を舞台に、内気な転校生と人気者の学級委員がJ-POPを通じて心を寄せ合う青春ドラマ。\n\n**見どころ：**第20回大阪アジアン映画祭 JAIHO賞受賞作品。日韓文化交流という史実的背景を盛り込んだセンチメンタルな物語。\n\n**評価：** 未評価\n\n情報源：[映画.com](https://eiga.com/movie/105768/) / [YouTube 特報](https://www.youtube.com/watch?v=_MeCRthCgBk)\n\n---\n\n### Michael／マイケル\n**公開日：2026年6月12日 / 製作：アメリカ**\n\n「イコライザー」シリーズのアントワーン・フークア監督が\"キング・オブ・ポップ\"マイケル・ジャクソンの生涯を描いた伝記映画。ジャクソン5としての幼少期から世界的アイコンへの昇華と、その裏に潜む苦悩を描く。\n\n**見どころ：**クインシー・ジョーンズとの運命的な出会い、名プロデューサーとの創作の軌跡が克明に再現される。6月の期待度ランキング最上位（映画.com調べ）。\n\n**評価：** Filmarks 4.0（試写段階、約542件）\n\n情報源：[映画.com](https://eiga.com/movie/102093/) / [Filmarks](https://filmarks.com/movies/117556) / [シネマトゥデイ](https://www.cinematoday.jp/movie/T0030111/review)\n\n---\n\n## 🎮 ゲーム情報\n\n### ユーザー注目タイトル動向\n\n#### EA SPORTS FC 26 — Path to Glory（ワールドカップ連動イベント）\n\nFIFA World Cup 2026開幕（6月11日〜）に合わせ、**Path to Gloryイベントが6月5日〜6月19日で開催中**。\n\n- FUTのライブアップグレードカード：出場国が勝ち進むたびに選手カードのOVRが最大5段階自動強化\n- 第1弾カード：6月5日リリース済み / 第2弾：6月12日リリース予定\n- **ログインボーナス：6月5日〜7月24日の間に93 OVR フェスティバル・オブ・フットボール版ペレ＋3種の\"Choose Your Journey\" Evolutionを無料獲得可能**\n- 通常のTOTW（Team of the Week）はシーズン終盤のため終了済み（最終TOTW30は4月15日）\n\n情報源：[EA公式 Path to Glory Guide（EZG）](https://www.ezg.com/blog/fc-26-path-to-glory-guide-player-cards-fifa-world-cup-2026-5-june-19-june) / [EAフットボールゲーミングゾーン](https://footballgamingzone.com/ea-sports-fc/where-is-totw-in-ea-fc-26-totw-end-date-explained/) / [EA公式ニュース](https://www.ea.com/en/games/ea-sports-fc/fc-26/news/pitch-notes-fc26-the-worlds-game-update)\n\n---\n\n#### Minecraft — 次期アップデート「Sulfur Caves」6月16日配信予定\n\n\u003e ※リリース日はTODAY+10日のため「予定」として記載\n\nJava版・統合版ともに**6月16日に次期ゲームドロップの配信が決定**。\n\n- **新バイオーム：硫黄の洞窟（Sulfur Caves）**：煙が漂う有毒な地下空間。硫黄ブロック・辰砂ブロックがむき出しで生成\n- **新ブロック**：硫黄ブロック・辰砂ブロック（建材にも使用可）/ 強力な硫黄ブロック（水に入れると硫黄泉化、めまい付与）\n- **新モブ：硫黄キューブ**：非敵対的で、吸収したブロックの素材特性を引き継ぐ（氷→滑る、金属→重いなど）\n- 現在Java版26.1 Snapshot 2が公開中でテスト可能\n\n情報源：[攻略大百科](https://gamepedia.jp/minecraft/archives/1622) / [Minecraft Wiki Java Edition 26.1](https://ja.minecraft.wiki/w/Java_Edition_26.1)\n\n---\n\n#### シャドウバース ワールズ ビヨンド — 6月大会情報\n\n現環境：**第7弾「神殺しアナテマ」**\n\n**ローテーション Tier1デッキ（現在）：**\n- ミルティオナイトメア / 進化エルフ / 破壊ネメシス / アミュレットビショップ\n\n**今週以降の大会スケジュール：**\n- **6月11日 15:00〜：グランプリ「HOS タイムスリップローテーション杯」**\n- 6月21日 15:00〜：グランプリ「10th Anniversary Cup」\n\n※次弾（第8弾）は2ヶ月おきのリリースペースから6月下旬〜7月に登場予定（確定情報未発表）\n\n情報源：[GameWith シャドバ大会情報](https://gamewith.jp/shadowverse-wb/549657) / [シャドウバース公式](https://shadowverse.jp/news/)\n\n---\n\n### 新作リリース（今週〜来週）\n\n#### FINAL FANTASY VII REBIRTH（Switch 2 / Xbox Series X|S版）\n**発売日：2026年6月3日 / プラットフォーム：Nintendo Switch 2・Xbox Series X|S / 開発元：スクウェア・エニックス**\n\nPS5で好評を博したFF7リバースがついに他機種へ展開。クラウドたちがセフィロスを追いかける旅を描いたRPG大作。\n\n**評価：** Metacritic（PS5版）90 / Steamユーザーレビュー：ひとまず未集計（Switch 2版は新規リリース）\n\n情報源：[ファミ通 新作まとめ](https://www.famitsu.com/article/202605/72904)\n\n---\n\n#### パワフルプロ野球2026-2027\n**発売日：2026年6月11日 / プラットフォーム：PS4・Nintendo Switch / 価格：7,678円（税込）/ 開発元：コナミ**\n\n2年ぶりの新作。選手・球場・ペナントデータが2026年シーズン準拠にアップデート。定番のサクセスモードも収録。\n\n**評価：** 未評価（発売前）\n\n情報源：[ファミ通 発売スケジュール](https://www.famitsu.com/schedule)\n\n---\n\n### 注目セール\n\n#### Steam — 弾幕フェス（6月8日〜6月15日）\n東方・弾幕STGを中心としたジャンル特化フェス。インディーの傑作弾幕シューティングが多数割引対象。ジャンルファンには見逃せない年1回の機会。\n\n\u003e ※Steamサマーセール2026は**6月25日〜7月9日**開催予定。大型タイトルを狙うなら2週間後まで待つのも手。\n\n情報源：[ゲームエイト Steamセール日程](https://game8.jp/steam/763035) / [電ファミニコゲーマー セール全日程](https://news.denfaminicogamer.jp/news/260116j)\n\n---\n\n## 🎌 アニメ・ストリーミング\n\n### Re:ゼロから始める異世界生活 4th season — 第9話「残骸」が\"トラウマ回\"として話題沸騰\n\n**配信：dアニメストア・Amazon Prime Video・ABEMA / 放送：TOKYO MX ほか / 話数：第9話（通算第75話）/ 放送：2026年6月3日**\n\n記憶喪失状態のスバルが監視塔から脱出を試みるが逃れられず、凶気を帯びて四層へ踏み込んだ先で「見るに堪えない光景」を目撃。今週最も反響が大きかった春アニメ。\n\n**なぜバズったか：**スバルが「死者の書」を読み、これまでの「死に戻り」全記録を一気に追体験するシーンが\"アニメ史に残る精神的トラウマ演出\"と視聴者の間で称賛・拡散。小林裕介の狂気の演技が特に評価される。\n\n**評価：** 未評価（集約サイトの作品単位スコアは確認中）\n\n情報源：[電撃オンライン](https://dengekionline.com/article/202606/76750) / [アニメイトタイムズ 第9話先行](https://www.animatetimes.com/news/details.php?id=1780386155) / [TVer配信ページ](https://tver.jp/series/srqr5fpvt9)\n\n---\n\n### 転生したらスライムだった件 第4期 — 勇者マサユキ登場で話題\n\n**配信：dアニメストア・Amazon Prime Video / 放送：日本テレビ系 FRIDAY ANIME NIGHT / 話数：第8話放送済み**\n\n第8話で突如現れた「勇者マサユキ」のキャラクターが強烈なインパクトを残し、SNSで一気に拡散。第9話は魔国連邦の武闘大会を軸に展開予定。今シーズンは**全5クール**という異例の超長期放送が発表済み（2026年4月3日〜）。\n\n**評価：** 未評価\n\n情報源：[アニメ・メモ 転スラ4期最新話](https://anime-memo.com/another-world/tensura4/) / [転スラ公式サイト](https://www.ten-sura.com/anime/tensura)\n\n---\n\n### 【注目：来週からの夏アニメ先行情報】\n\n「**無職転生〜異世界行ったら本気だす〜 第3期**」が7月5日放送開始。「**BLEACH 千年血戦篇 -禍進譚- 最終クール**」も7月スタートが決定。春クール終盤に差し掛かり、次クールへの期待が高まっている週。\n\n\u003e ※夏アニメ（7月〜）の詳細は次週号以降で本格掲載予定。\n\n情報源：[アニメ！アニメ！ 2026夏アニメ一覧](https://animeanime.jp/article/2026/06/02/99624.html) / [oricon 夏アニメまとめ](https://www.oricon.co.jp/anime/2026_summer/)\n\n---\n\n### 出力前セルフチェック結果\n- [x] 全項目 R1（日付）クリア：映画は±7日以内、Minecraft次期アプデは「予定」と明記\n- [x] 評価★は集約サイトスコアの引用（不明なものはすべて「未評価」と明記）\n- [x] FC26 / Minecraft / シャドウバースを毎週チェック済み\n- [x] 画像URLは省略（公式URL検証不能なため R4 に従い省略）\n- [x] 該当なしは「※該当なし」または「未評価」と明記\n\n---\n\n**Sources:**\n- [映画.com モブ子の恋](https://eiga.com/movie/99526/)\n- [映画.com FUJIKO](https://eiga.com/movie/103625/)\n- [映画.com 君と僕の5分](https://eiga.com/movie/105768/)\n- [映画.com Michael](https://eiga.com/movie/102093/)\n- [Filmarks Michael](https://filmarks.com/movies/117556)\n- [EA SPORTS FC26 Path to Glory ガイド（EZG）](https://www.ezg.com/blog/fc-26-path-to-glory-guide-player-cards-fifa-world-cup-2026-5-june-19-june)\n- [EA公式 The World\u0027s Game Update](https://www.ea.com/en/games/ea-sports-fc/fc-26/news/pitch-notes-fc26-the-worlds-game-update)\n- [攻略大百科 Minecraftアップデート](https://gamepedia.jp/minecraft/archives/1622)\n- [Minecraft Wiki Java Edition 26.1](https://ja.minecraft.wiki/w/Java_Edition_26.1)\n- [GameWith シャドバ大会情報](https://gamewith.jp/shadowverse-wb/549657)\n- [ファミ通 新作ゲームまとめ](https://www.famitsu.com/article/202605/72904)\n- [電ファミニコゲーマー Steamセール全日程](https://news.denfaminicogamer.jp/news/260116j)\n- [電撃オンライン リゼロ4期第9話](https://dengekionline.com/article/202606/76750)\n- [アニメイトタイムズ リゼロ第9話先行](https://www.animatetimes.com/news/details.php?id=1780386155)\n- [アニメ！アニメ！ 2026夏アニメ一覧](https://animeanime.jp/article/2026/06/02/99624.html)";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
