<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soccer Transfer News - 2026/7/11</title>
<script>(function(){const _t=localStorage.getItem('nexus_theme');if(_t==='dark')document.documentElement.classList.add('dark');else document.documentElement.classList.remove('dark');})()</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f5f7;--surface:#ffffff;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.16);--accent:#e8b84b;--blue:#4a90d9;--green:#28a745;--text:#1d1d1f;--text2:rgba(60,60,67,0.75);--r:12px;}
html.dark{--bg:#0c0c10;--surface:#161620;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.15);--blue:#6aadff;--green:#52d68a;--text:#e8e8f0;--text2:#a8a8c8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;padding:20px 16px 80px;}
.page{max-width:680px;margin:0 auto;}
.hd{display:flex;align-items:center;gap:10px;margin-bottom:26px;flex-wrap:wrap;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.logo em{color:var(--accent);font-style:normal;}
.hd-date{font-size:12px;color:var(--text2);margin-right:auto;}
.wc-badge{background:linear-gradient(135deg,#ff6b00,var(--accent));color:#000;font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;}
.back-link{font-size:11px;color:var(--text2);text-decoration:none;}
.back-link:hover{color:var(--accent);}
#content h2{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--text2);margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border2);}
#content h3{font-size:17px;font-weight:700;color:var(--text);margin:18px 0 8px;}
#content p{font-size:15px;color:var(--text2);line-height:1.9;margin-bottom:12px;}
#content ul,#content ol{font-size:15px;color:var(--text2);line-height:1.9;padding-left:20px;margin-bottom:12px;}
#content li{margin-bottom:6px;}
#content strong{color:var(--text);font-weight:700;}
#content a{color:var(--blue);text-decoration:none;}
#content a:hover{text-decoration:underline;}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:10px 0 16px;}
#content table{width:max-content;min-width:100%;border-collapse:collapse;font-size:12px;margin:0;}
#content th{color:var(--text2);font-weight:600;padding:6px 10px;border-bottom:1px solid var(--border2);text-align:left;white-space:nowrap;}
#content td{padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;}
#content hr{border:none;border-top:1px solid var(--border);margin:16px 0;}
.model-tabs{display:flex;gap:4px;}
.mtab{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;text-decoration:none;border:1px solid var(--border2);color:var(--text2);}
.mtab.mtab-on{background:var(--accent);color:#000;border-color:var(--accent);}
</style>
</head>
<body>
<div class="page">
<div class="hd">
  <div class="logo">&#x26BD; <em>Transfer</em> News</div>
  <div class="hd-date">更新 2026/7/11<span id="hd-today"></span></div>
  <span class="wc-badge">WORLD CUP 2026</span>
  <div class="model-tabs"><a class="mtab mtab-on" href="./soccer.html">Sonnet</a><a class="mtab" href="./soccer_opus.html">Opus</a></div>
  <a class="back-link" href="./outing-app.html">&larr; App</a>
</div>
<div id="content"></div>
</div>
<script>
const md = "生成完了。`Vault\\news\\soccer\\2026-07-11.md` に保存した。\n\n**今日の目玉は3つ——エデルソン破談騒動、マンUのサントス獲得秒読み、スペインのベスト4進出。**\n\n主な更新内容：\n\n| 欄 | 動き |\n|------|------|\n| 完了（10件） | ミンゲサ→パレスが7/9公式発表でHere We Goから昇格【NEW】。マテウス・フェルナンデスは7日基準超過で掲載終了、アンダーソンは本日最終日 |\n| Here We Go（3件） | アンドレイ・サントス（チェルシー→マンU・£50M）とダーロウ（フリー）が契約サイン済み・公式発表待ち【NEW×2】 |\n| 交渉中（5件） | **エデルソンが急転**：Romano・Sky Italiaは「破談」、マンU内部筋は否定で真っ二つ→両論併記で判断保留に。マンザンビ→ニューカッスル€60M合意【NEW・◎】、ギマランイスは£75Mが成立ラインとの報道で前進 |\n| W杯 | スペイン2-1ベルギー（メリーノ88分・投入2分弱で決勝点）。準決勝①はフランス×スペインに確定。明日朝はハーランド×ケイン直接対決＋メッシのスイス戦 |\n| 日本人 | 佐野は「リヴァプール優位も最優先候補ではない」報道で温度感をやや調整。久保は新展開なし |\n\n留保が2つ：\n\n1. サントス/ダーロウはマンU公式サイトが403で直接確認できず、Romano＋Sky/ESPNの報道ベース。公式発表が確認できるまで「完了」に上げず Here We Go 止まりにした\n2. エデルソンは情報が割れてる状態そのままを書いた。明日の記事で決着を追う必要あり\n\nThe Athleticは今日もペイウォール外で確認できる直近記事が見つからず「該当なし」継続。ヴラホヴィッチはA級の新規裏取りが取れないので△維持のまま。";
document.getElementById('content').innerHTML = marked.parse(md);
document.querySelectorAll('#content table').forEach(t=>{const w=document.createElement('div');w.className='tbl-wrap';t.parentNode.insertBefore(w,t);w.appendChild(t);});
</script>
<script>(function(){var t=new Date();var el=document.getElementById('hd-today');if(el)el.textContent=' · 今日 '+(t.getMonth()+1)+'/'+(t.getDate());}());</script>
<script src="./date-picker.js"></script>
</body>
</html>
