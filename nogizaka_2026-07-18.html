<script>
const md = "# 乃木坂46情報週報（2026年7月18日号／対象期間：7月11日〜7月18日）\n\n## 📰 今週のニュース\n\n### 【公式】「久保史緒里 卒業コンサート」LIVE Blu-ray＆DVDが8月26日(水)発売決定\n- 久保史緒里（元乃木坂46・3期生）が2025年11月26日・27日に横浜アリーナで開催した卒業コンサートの映像商品「SHIORI KUBO GRADUATION CONCERT」の発売が発表された（発表日：7月14日）\n- Blu-ray完全生産限定盤 25,300円（税込）／DVD完全生産限定盤 23,100円（税込）。三方背スリーブ仕様・豪華フォトブックレット付き\n- 特典映像として「Making of 久保史緒里卒業コンサート」「事前ロングインタビュー」を収録。[音楽ナタリー](https://natalie.mu/music/news/680709)・[RBB TODAY](https://www.rbbtoday.com/article/2026/07/14/250686.html)も報道（7月14日）\n\n\u003e source: https://www.nogizaka46.com/s/n46/news/detail/102092 （乃木坂46公式サイト・2026年7月14日）\n\n### 【公式】「真夏の全国ツアー2026」×JR東日本 TRAINキャンペーン実施決定\n- 宮城公演・東京公演に合わせたJR東日本とのコラボキャンペーン。期間は7月18日(土)〜8月31日(月)（発表日：7月13日）\n- 仙台七夕連動の「オリジナル七夕飾り」設置（7月25日〜8月8日）、メンバー12名の特別ソロパネル駅構内設置、デジタルスタンプラリー、東北新幹線車内スペシャルトーク音声コンテンツ、仙台駅・信濃町駅・千駄ケ谷駅の限定アナウンス、「萩の月」特別パッケージ限定販売など\n\n\u003e source: https://www.nogizaka46.com/s/n46/news/detail/102088 （乃木坂46公式サイト・2026年7月13日）\n\n### 【公式】「真夏の全国ツアー2026」広島・大阪公演を開催\n- 広島公演：7月11日(土)・12日(日) 広島グリーンアリーナ\n- 大阪公演：7月15日(水)・16日(木) 大阪城ホール。大阪公演開催記念の「会場チャレンジ」もモバイル会員向けに実施された\n- 本ツアーは全国8都市18公演のグループ史上過去最大規模。今後は宮城・福岡・東京と続く\n\n\u003e source: https://www.nogizaka46.com/s/n46/page/summer_tour2026 （乃木坂46公式サイト ツアー特設ページ）\n\n### 【公式】42ndシングル「是非に及ばず」7月22日(水)発売へ・発売記念イベント応募は7月22日開始\n- 発売週入り。TYPE-A〜D初回仕様限定盤（CD+Blu-ray・各2,000円）と通常盤（CD・1,200円）\n- 限定盤封入の「スペシャル抽選応募シリアルナンバー」による発売記念イベント応募受付が7月22日(水)10:00にスタート（イベント詳細は「🎤 ライブ・イベント」参照）\n\n\u003e source: https://www.nogizaka46.com/s/n46/page/42nd_single （乃木坂46公式サイト 42ndシングル特設ページ）\n\n## 🎵 音楽・リリース情報\n\n### 42ndシングル「是非に及ばず」（7月22日(水)発売）\n- センター：一ノ瀬美空（5期生）＝表題曲初センター。選抜メンバーは18名\n- フロント3列目まで：1列目＝賀喜遥香（4期生）・一ノ瀬美空（5期生）・瀬戸口心月（6期生）／2列目＝五百城茉央・川﨑桜・井上和・池田瑛紗（以上5期生）・遠藤さくら（4期生）・矢田萌華（6期生）\n- 大越ひなの（6期生）・森平麗心（6期生）が初選抜。岩本蓮加（3期生）が選抜復帰。6期生からは計4名が選抜入り（[オリコン](https://www.oricon.co.jp/news/2459651/full/)・[モデルプレス](https://mdpr.jp/music/detail/4794771)報道）\n- 表題曲は6月13日より先行配信済み。ハードなロック調・パンクな世界観の楽曲\n\n\u003e source: https://www.nogizaka46.com/s/n46/page/42nd_single （乃木坂46公式サイト）\n\n### 「是非に及ばず」Music Video公開中\n- 6月28日14時公開（[公式発表](https://www.nogizaka46.com/s/n46/news/detail/102047)）。振付はLICO。スクラップに囲まれ力強く踊るラストシーンなど、感情を開放する演出が特徴（[音楽ナタリー](https://natalie.mu/music/news/678202)・6月28日）\n- MV：[乃木坂46公式YouTube](https://www.youtube.com/watch?v=ogAufBgPpBk)\n- ※現時点の公式ソースによる再生数データは今週未確認のため数値記載なし\n\n\u003e source: https://www.nogizaka46.com/s/n46/news/detail/102047 （乃木坂46公式サイト・2026年6月28日）\n\n### カップリング「ひとつ手前のインターチェンジ」が7月17日(金)ラジオ初OA\n- FM FUJI「沈黙の金曜日」（弓木奈於（4期生）レギュラー出演番組）にて、42ndシングルTYPE-C収録曲「ひとつ手前のインターチェンジ」が初オンエア\n\n\u003e source: 乃木坂46公式サイト（初OA決定告知・2026年7月17日）／https://www.nogizaka46.com/s/n46/?ima=1208\n\n### チャート動向\n- ※今週該当なし（CD発売が7月22日のため、オリコン／Billboard JAPANの週間シングルチャート数値は未発生。初週動向は次週号で扱う）\n\n\u003e source: Billboard JAPAN https://www.billboard-japan.com/charts/detail?a=hot100\n\n## 👤 メンバー個別活動\n\n### 菅原咲月（4期生）：「EX大衆 2026年8・9月号」ソロ表紙＆巻頭グラビア\n- 2026年5月に新キャプテンに就任した菅原咲月が表紙に抜擢。テーマは「あの頃の夏と、新しい夏」\n- 裏表紙＆中面グラビアは奥田いろは（5期生）。誌面には岡本姫奈（5期生）×中西アルノ（5期生）対談、岩本蓮加（3期生）×森平麗心（6期生）の先輩後輩対談も掲載（記事公開日：7月14日）\n\n\u003e source: https://tower.jp/article/news/2026/07/14/tgb002 （TOWER RECORDS ONLINE・2026年7月14日）\n\n### 5期生11名：コーセー「メイク キープ ミスト」新TVCM＋6期生Webムービー公開\n- 出演：五百城茉央・池田瑛紗・一ノ瀬美空・井上和・岡本姫奈・小川彩・奥田いろは・川﨑桜・菅原咲月・冨里奈央・中西アルノ（以上5期生・11名）。7月10日(金)放映開始\n- CM楽曲は42ndシングル収録の新曲「告白したい病」\n- 6期生出演のスペシャルWebムービーが7月16日(木)以降順次公開（公式発表日：7月8日）\n\n\u003e source: https://www.nogizaka46.com/s/n46/news/detail/102069 （乃木坂46公式サイト・2026年7月8日）\n\n### 遠藤さくら（4期生）・井上和（5期生）・瀬戸口心月（6期生）：カップスタードラマ「姉といつまでも」第十一話公開\n- サッポロ一番カップスターのWebドラマ第十一話「姉のやめ方」が7月16日(木)公開。中西アルノ（5期生）が長女さくらの担当編集者役でゲスト出演\n- サンヨー食品公式YouTubeチャンネルおよび[公式サイト](https://cupstar.jp/aneitsu/)で視聴可能\n\n\u003e source: https://www.nogizaka46.com/s/n46/news/detail/102102 （乃木坂46公式サイト・2026年7月16日）\n\n## 🎤 ライブ・イベント\n\n### 「真夏の全国ツアー2026」今後の日程\n| 会場 | 日程 |\n|---|---|\n| 【宮城】セキスイハイムスーパーアリーナ | 7月25日(土)・26日(日) |\n| 【福岡】マリンメッセ福岡A館 | 8月8日(土)・9日(日) ※9日に吉田綾乃クリスティー卒業セレモニー |\n| 【東京】明治神宮野球場 | 8月20日(木)〜23日(日) |\n\n- 開催済み：福井（6/13・14）・神奈川（6/24・25）・北海道（7/4・5）・広島（7/11・12）・大阪（7/15・16）\n- チケットは公演ごとに各種先行・一般発売を実施（詳細は公式サイト・[楽天チケット](https://ticket.rakuten.co.jp/features/nogizaka46_summer_tour2026/index.html/)）\n\n\u003e source: https://www.nogizaka46.com/s/n46/page/summer_tour2026 （乃木坂46公式サイト・ツアー特設ページ）\n\n### 42ndシングル「是非に及ばず」発売記念イベント（応募開始：7月22日(水)10:00）\n- **リアルミート＆グリート**：10月4日(日)・10月12日(月祝) いずれも幕張メッセ（応募券1枚）\n- **リアルサイン会**：同2日程・幕張メッセ（応募券3枚）\n- **メンバー全員参加サイン会**：10月4日(日) 幕張メッセ（応募券4枚）\n- **オンラインミート＆グリート**：9月6日(日)（応募券1枚）\n- **配信ミニライブ**：10月23日(金)19:30〜（アーカイブ10月31日、メンバー解説付き11月7日）\n- **forTUNE music限定オンライン個別トーク会**（通常盤対象）：8月16日・9月13日・27日・10月18日・24日・11月15日\n- 申込方法：TYPE-A〜D初回仕様限定盤封入の「スペシャル抽選応募シリアルナンバー」で応募。対象メンバーは日程ごとに異なるため公式案内の確認が必要\n\n\u003e source: https://www.nogizaka46.com/s/n46/page/42nd_single （乃木坂46公式サイト 42ndシングル特設ページ）\n\n## 📋 グループ動向\n\n### 卒業・加入\n- **今週の新規発表：※該当なし**\n- 進行中の確定事項（既報・【公式】）：吉田綾乃クリスティー（3期生）が8月9日(日)マリンメッセ福岡A館「真夏の全国ツアー2026」福岡公演内で卒業セレモニーを実施予定（5月28日公式発表・本人ブログで先行発表）\n- ※一部まとめサイトで特定メンバーの卒業に関する未確認情報が流通しているが、公式発表がないため本週報では掲載しない\n\n\u003e source: https://www.nogizaka46.com/s/n46/news/detail/101971 （乃木坂46公式サイト・2026年5月28日）\n\n### 期別の動き（42ndシングル選抜より・既報）\n- 6期生：大越ひなの・森平麗心が初選抜、瀬戸口心月がフロント1列目、矢田萌華が選抜復帰と、6期生4名が選抜入り\n- 5期生：一ノ瀬美空が表題曲初センター\n- 3期生：岩本蓮加が5作ぶりに選抜復帰\n\n\u003e source: https://www.oricon.co.jp/news/2459651/full/ （オリコン）\n\n---\n\n### セルフチェック結果\n- [x] R1：ニュースは7月11日〜18日の発表・開催分のみ（既報事項は「既報」明記）\n- [x] R2/R3：卒業情報は公式発表のみ採用。まとめサイト由来の未確認情報（卒業リーク・MV再生数）は不採用\n- [x] R4：メンバー名は漢字フルネーム＋期数、卒業生は「元乃木坂46」明記\n- [x] R5：チャート数値・MV再生数は公式ソース未確認のため数値記載を見送り（水増しなし）";
