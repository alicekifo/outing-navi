<script>
const md = "## 🤖 今週のAI最新動向\n\n### 1. Googleが「Transformer共著者」と「ノーベル賞受賞者」を48時間で失う——ShazeerはOpenAIへ、JumperはAnthropicへ（2026/6/18〜20）\n\n**何が起きたか**\n2017年の「Attention Is All You Need」共著者でGemini共同開発リーダーのNoam ShazeerがGoogleを離れOpenAIへ（6/18）。翌々日にはAlphaFold開発者で2024年ノーベル化学賞受賞者のJohn JumperがGoogle DeepMindを去りAnthropicへ移籍（6/20）と発表された。\n\n**なぜ重要か / 何が変わるか**\nShazeerはGoogleが2024年8月にCharacter.AIとの技術ライセンス契約（約27億ドル相当）で実質「取り返した」研究者であり、それがわずか2年でOpenAIに流出したことはOpenAIの求心力を端的に示す。JumperのAnthropic入りは、同社が2026年を通じて進めてきたウェットラボ構築・Allen Institute提携・医療機関との共同研究と一直線に結びつき、生物・化学領域のフロンティア研究が加速する布石となる。言語モデルの設計者と生物学AIの象徴的人物が同一週にGoogleを離れた事実は、現時点でAI競争における最大の希少資源が「コンピュート」ではなく「人材」であることを改めて示した。\n\n出典: [TechCrunch: Nobel laureate John Jumper is leaving DeepMind for rival Anthropic](https://techcrunch.com/2026/06/20/nobel-laureate-john-jumper-is-leaving-deepmind-for-rival-anthropic/) (2026-06-20公開)、[CNBC: Google Loses Two AI Heavyweights in Three Days](https://finance.biggo.com/news/a2fd0f43-05c1-4824-9ae5-44a8afa58839) (2026-06-20公開)\n\n\u003e source: https://techcrunch.com/2026/06/20/nobel-laureate-john-jumper-is-leaving-deepmind-for-rival-anthropic/\n\n---\n\n### 2. G7サミットにBig Tech AI幹部が集結——「米国主導のAI連合」と「国際テスト標準フォーラム」を提唱（2026/6/17）\n\n**何が起きたか**\nフランス・エビアンで開催されたG7首脳会合の閉扉セッションに、Anthropic CEO ダリオ・アモデイ、Google DeepMind CEO デミス・ハサビス、OpenAI CEO サム・アルトマンを含むAI企業首脳約12名が参加。アモデイ・ハサビスは米国主導のAI連合設立を呼びかけ、アルトマンは「能力評価と安全性を担う中立的な国際テスト標準フォーラム」を提唱した。\n\n**なぜ重要か / 何が変わるか**\nこの会合はClaude Fable 5・Mythos 5への米政府輸出規制指令（6/12）の直後に行われており、「AIモデルへの直接輸出規制」という前例のない政策ツールが国際政治の場で本格的に議論された最初の場となった。「AI安全保障」が従来の輸出管理（半導体・軍事技術）の文脈とオーバーラップし始めた点は、セキュリティ・インフラエンジニアにとっても対岸の火事ではない。クラウドAPI経由でモデルを組み込んだシステムが突然「利用不可」になる現実が輸出規制によって具現化したことは、ローカルLLM（llama.cpp・vLLMなど）採用の実務的根拠にもなりうる。\n\n出典: [CNBC: CEOs of Anthropic and Google DeepMind call for U.S.-led AI coalition in meeting at G7](https://www.cnbc.com/2026/06/17/anthropic-amodei-google-hassabis-us-ai-coalition-g7.html) (2026-06-17公開)\n\n\u003e source: https://www.cnbc.com/2026/06/17/anthropic-amodei-google-hassabis-us-ai-coalition-g7.html\n\n---\n\n### 3. 欧州委員会がEUROPA Consortiumを選定——400B+パラメータ・24言語対応のオープンソースモデルをDomyn主導で開発（2026/6/19）\n\n**何が起きたか**\n欧州委員会はFrontier AI Grand Challenge（2026年2月開始）において、イタリアのスタートアップDomyn主導のEUROPA Consortiumを選定した。Fraunhofer研究所と共同でEU全24言語対応・400Bパラメータ超のオープンソースモデルを開発し、完成次第オープンソースとして公開する予定。学習基盤にはNVIDIA Blackwellチップ6,000基のクラスターを使用する。\n\n**なぜ重要か / 何が変わるか**\n米中フロンティアモデルへの依存を構造的に断ち切ることを明示した欧州初の本格的な公的資金支援フロンティアAIプロジェクトであり、オープンソース化によって研究者・企業・公共機関が無制限に利用可能になる。400B規模のオープンウェイトモデルが欧州のHPCインフラで訓練される事例は、分散学習・量子化・推論最適化技術の公開実績が蓄積される点でも注目できる。EU AI Act準拠の学習・推論スタックの設計が欧州のde facto標準になる可能性もある。\n\n出典: [European Commission公式: Commission selects EUROPA consortium as winner of the Frontier AI Grand Challenge](https://digital-strategy.ec.europa.eu/en/news/commission-selects-europa-consortium-winner-frontier-ai-grand-challenge-project-build-european-open) (2026-06-19公開)\n\n\u003e source: https://digital-strategy.ec.europa.eu/en/news/commission-selects-europa-consortium-winner-frontier-ai-grand-challenge-project-build-european-open\n\n---\n\n## 📄 今週の注目論文\n\n### 1. 原子炉制御シミュレーターでLLMエージェントを「落とす」——NRT-Bench: マルチターンレッドチームベンチマーク\n\n**英語原題**: LLM agent safety, multi-turn red-teaming, jailbreak benchmarks, adversarial robustness, safety-critical systems  \n**著者第1名**: Hanwool Lee ほか / arXiv:2606.20408 / 2026-06-18公開\n\n**3行サマリー**\n- **Problem**: LLMエージェントが安全クリティカルなシステム（原子力発電所制御室）のオペレーターとして機能する環境で、マルチターンの敵対的攻撃に対する頑健性を評価する体系的なベンチマークが存在しなかった\n- **Method**: 5役のオペレーターチーム（各役LLMが担当）が原子炉の6つの重要安全機能（CSF）を管理するシミュレーション環境を構築。敵対者が4チャンネル経由でマルチターン入力を注入し、ターン毎のフィードバックを持つ有界セッションで評価\n- **Finding**: 4つのフロンティアモデル（固定攻撃・ペアードリプレイプロトコル）に対し、適応型マルチターン攻撃がCSF喪失を引き起こした成功率は8.7〜12.1%。LLM評価者による主観判定でなく「CSF喪失」という客観的ハーム指標を採用\n\n**読みどころ**\n成功率10%前後という数字は「たまに失敗する」レベルではなく、長時間稼働する安全クリティカルシステムではほぼ確実に攻撃成功を意味する。現実のLLMエージェント活用（SREタスク自動化・セキュリティ監視ボット・インフラ操作エージェントなど）においても、マルチターン会話を通じた権限昇格や誤動作誘発が現実的な脅威であることを定量化した点が実務に直結する。\n\n出典: [arXiv:2606.20408](https://arxiv.org/abs/2606.20408) (2026-06-18公開)\n\n\u003e source: https://arxiv.org/abs/2606.20408\n\n---\n\n### 2. AIコーディングエージェント、新規GitHubプロジェクトでの採用率が過去比の2倍超——Agentic Very Much!\n\n**英語原題**: Agentic Very Much! Adoption of Coding Agent in New GitHub Projects  \n**arXiv:2606.07448 / 2026-06-05公開**\n\n**3行サマリー**\n- **Problem**: コーディングエージェントの実世界での浸透度を大規模・定量的に把握する研究が不足していた\n- **Method**: 新規GitHubプロジェクトを対象に、コーディングエージェント利用の指標（コミットメタデータ、ワークフロー設定、依存関係など）を用いて実証分析\n- **Finding**: 新規プロジェクトにおけるコーディングエージェント採用率は、既存の先行研究の推計と比べて2倍超の水準。AI生成コードの比率が新規リポジトリで急速に上昇中\n\n**読みどころ**\n「新しいコードベース＝AIが書いた」という状況が統計的に確認されつつある点は、セキュリティレビューのパラダイムシフトを意味する。CWE（一般的な脆弱性列挙）やSAST（静的解析）ツールが前提とするコーディングパターンが崩れ始めており、AIが生成したコードの脆弱性パターン（不適切なエラーハンドリング、信頼境界の誤認識、秘密情報のハードコードなど）への対応が次のセキュリティ課題になる。\n\n出典: [arXiv:2606.07448](https://arxiv.org/abs/2606.07448) (2026-06-05公開)\n\n\u003e source: https://arxiv.org/abs/2606.07448\n\n---\n\n### 3. ツール呼び出しの「ハルシネーション」を撲滅する合成データ生成基盤——StateGen\n\n**英語原題**: State-Grounded Multi-Agent Synthetic Data Generation for Tool-Augmented LLMs  \n**arXiv:2606.16307 / 2026-06-15公開**\n\n**3行サマリー**\n- **Problem**: ツール呼び出し型LLMエージェントの学習データ生成では、「存在しないツールを呼ぶ」「引数を捏造する」といったツール呼び出しハルシネーションが品質を大きく損なう\n- **Method**: StateGenプラットフォームを構築。4役LLMループ（プランナー・実行者・ユーザーシミュレーター・評価者）を組み合わせ、「世界状態オブジェクト（world-state object）」をターン間で構造化維持することで文脈整合性を担保\n- **Finding**: スコア付き推論トレース付きの学習用会話を自動生成でき、ツール呼び出しハルシネーションを排除した高品質なデータ収集パイプラインを実現\n\n**読みどころ**\nMCP（Model Context Protocol）やOpenAI Function Callingでエージェントを構築するエンジニアにとって、学習・ファインチューニングの品質ボトルネックがまさにこのハルシネーション問題。実在しないAPIエンドポイントを呼ぼうとするエージェントはセキュリティリスク（SSRFの誘発、エラーメッセージ漏洩）にもなりうる。学習データの段階から状態整合性を強制する設計思想は、ローカルLLMのファインチューニング（llama.cppベースの構築など）にも応用できる考え方。\n\n出典: [arXiv:2606.16307](https://arxiv.org/html/2606.16307) (2026-06-15公開)\n\n\u003e source: https://arxiv.org/html/2606.16307\n\n---\n\n## 💡 今週のひとことインサイト\n\n### LLMエージェントへの攻撃成功率10%は「許容誤差」か「致命的欠陥」か\n\n今週のNRT-Bench論文が示した「フロンティアモデルへのマルチターン攻撃成功率8.7〜12.1%」という数字を聞いて、あなたはどう感じるか。\n\nLinuxサーバーのsshdに「試行10回に1回はrootを取られる脆弱性」があれば即パッチ案件だが、LLMエージェントの文脈では「まあそんなもんでは」と感じる向きもあるかもしれない。そのギャップが今最もリスキーな認識ミスだ。\n\n原子炉制御のシミュレーションは極端な例だとしても、構造は同じだ——ファイルシステムアクセス・シェルコマンド実行・外部API呼び出しといったツールを持つLLMエージェントが社内インフラに組み込まれる事例は急増している。長時間動作・高権限・外部入力（メール・チケット・Webスクレイピング）を受け取る構成であれば、マルチターンのプロンプトインジェクション経由で権限昇格される確率は「10セッションに1回」ではなく「数百セッション走れば確率1に収束する」問題だ。\n\nG7でAI連合の議論が行われている一方で、最前線では「エージェントに原子炉を任せてみたら10回に1回落ちた」という論文が静かに公開されている。このギャップこそが、今週最も刺さった話だった。\n\n\u003e source: https://arxiv.org/abs/2606.20408";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
