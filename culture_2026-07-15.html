<script>
const md = "# 教養マガジン 2026/7/15\n\n### 1983年7月15日、京都から14,800円の「家庭用コンピュータ」が出荷された\n\n今日はファミリーコンピュータの発売から43年目にあたる。当時の家庭用ゲーム機は5万円前後が相場で、14,800円という価格は業界の常識を疑わせた。安さの秘密は割り切りにある。社長の山内溥は「ゲームを遊ぶ以外の機能は全部削れ」と命じ、キーボードも通信も捨てて性能を『ドンキーコング』が完全移植できる一点に集中させた。CPUの製造を引き受けたのは、当時半導体工場の稼働率に悩んでいたリコー。「3年で300万個」という無謀な発注が価格を沈めた。だが順風ではない。発売直後に回路の不良が見つかると、山内は年末商戦の真っ最中に出荷済み全品の回収を決断する。目先の売上より信用を取ったこの判断が、結果として世界累計6,191万台への道を開いた。安く、潔く、誠実に——日本のゲーム産業の原型が、この日に詰まっている。\n\u003e source: [任天堂 会社の沿革](https://www.nintendo.co.jp/corporate/history/index.html)\n\n### パスツールの300年前、奈良の僧侶は酒を「火入れ」していた\n\n夏に出回る「生酒」の瑞々しさは冷蔵流通の賜物だが、裏を返せば日本酒は本来、加熱しないと夏を越せない飲み物だった。腐敗を防ぐ知恵が「火入れ」——酒を65度前後まで温めて微生物の働きを止める低温殺菌だ。驚くべきはその記録の古さで、奈良・興福寺の僧侶が書き継いだ『多聞院日記』の1568年の条に、酒を煮て樽に詰める作業がはっきり登場する。ワインの腐敗防止のためにルイ・パスツールが低温殺菌法を発明し「パスチャライゼーション」と名付けられるのは1866年。つまり日本の蔵人は、微生物という概念すら存在しない時代に、経験則だけで300年先回りしていたことになる。沸騰させれば香りが飛び、ぬるければ腐る。その絶妙な温度帯を舌と勘で探り当てた無名の職人たちの試行錯誤を思うと、冷やした一杯の生酒がまた違って見えてくる。\n\u003e source: [日本酒造組合中央会](https://www.japansake.or.jp/)\n\n### バスティーユ襲撃、解放された囚人はたったの7人だった\n\n昨日7月14日はフランス革命記念日。1789年のこの日、パリ民衆が襲った「圧政の象徴」バスティーユ牢獄に、実は囚人が7人しかいなかったことはあまり知られていない。内訳は文書偽造犯4人、精神を病んだ者2人、家族の依頼で収監された放蕩貴族1人。政治犯はゼロで、あのサド侯爵ですら騒ぎを起こして10日前に他所へ移送済みだった。では民衆は何をしに行ったのか。目当ては牢獄内に貯蔵された火薬と弾薬である。前日に廃兵院で3万丁の銃を奪ったものの、撃つための火薬がなかったのだ。つまりあれは「囚人解放」ではなく武装蜂起の兵站作戦だった。しかし歴史は象徴を欲しがる。ほぼ空っぽの牢獄の陥落は「専制の終わり」として語り直され、翌年には早くも記念祭が開かれた。事実より物語が革命を駆動する——その構図自体が、いちばんの教訓かもしれない。\n\u003e source: [Encyclopaedia Britannica: Bastille](https://www.britannica.com/topic/Bastille)\n\n### 火星着陸50周年 ── バイキング1号は「建国記念日」に間に合わなかった\n\n来週7月20日、人類初の火星軟着陸成功からちょうど50年を迎える。1976年のバイキング1号だ。NASAは当初、着陸日をアメリカ建国200周年の7月4日に合わせる演出を狙っていた。ところが軌道上から撮った予定地点の写真が岩だらけで、管制チームは記念日を捨てて16日間かけて安全な平原を探し直した。式典より科学を取ったこの地味な決断が成功を生んだ——同時期のソ連マルス3号は着陸後わずか20秒で沈黙している。着陸船は土壌に栄養液を混ぜて微生物の代謝を探る生命検出実験を行い、一部の装置が「陽性」を示した。公式には無機的な化学反応と結論されたが、担当研究者は死ぬまで「生命の兆候だった」と主張し、論争は50年経った今も完全には決着していない。90日の設計寿命に対し6年間動き続けた働き者は、皮肉にも地球からの誤ったソフト更新で交信を絶った。\n\u003e source: [NASA Science: Viking 1](https://science.nasa.gov/mission/viking-1/)\n\n### セルシウスの温度計では「水は0度で沸騰」していた\n\n連日の猛暑で「35℃」の表示を睨む季節だが、この目盛りを作ったアンデシュ・セルシウスの原案では、猛暑日は「65度」だった。1742年、スウェーデン・ウプサラ大学の天文学者だった彼が提案した百分目盛りは、沸点が0度、氷点が100度——現在と真逆だったのだ。奇妙に見えるが理由は実用的で、極寒のスウェーデンでは気温がしばしば氷点下に沈む。逆さ目盛りなら冬の観測値にマイナス記号が要らず、記録ミスが減るという計算だった。目盛りが現在の向きにひっくり返るのはセルシウスの死の直後で、反転させた候補者には計器職人エクストレム、後任教授のストレーメル、そして植物の温度管理に温度計を使い倒していた分類学の父リンネの名が挙がる。誰の手柄かは今も曖昧なまま、名前だけは原案者に残った。摂氏とは、北国の冬の不便さが生んだ発明なのである。\n\u003e source: [Encyclopaedia Britannica: Anders Celsius](https://www.britannica.com/biography/Anders-Celsius)";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
