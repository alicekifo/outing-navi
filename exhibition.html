<style>
:root{--bg:#0c0c10;--surface:#161620;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.15);--accent:#f472b6;--blue:#6aadff;--green:#52d68a;--yellow:#e8b84b;--text:#e8e8f0;--text2:#a8a8c8;--r:12px;}
html.light{--bg:#f5f5f7;--surface:#ffffff;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.16);--text:#1d1d1f;--text2:rgba(60,60,67,0.75);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;padding:20px 16px 80px;}
.page{max-width:680px;margin:0 auto;}
.hd{display:flex;align-items:center;gap:10px;margin-bottom:26px;flex-wrap:wrap;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.logo em{color:var(--accent);font-style:normal;}
.hd-date{font-size:12px;color:var(--text2);margin-right:auto;}
.back-link{font-size:11px;color:var(--text2);text-decoration:none;}
.back-link:hover{color:var(--accent);}
#watchlist-bar{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--yellow);border-radius:var(--r);padding:12px 16px;margin-bottom:20px;display:none;}
#watchlist-bar.has-items{display:block;}
.watchlist-title{font-size:11px;font-weight:700;color:var(--yellow);margin-bottom:8px;}
.watchlist-item{font-size:12px;color:var(--text2);padding:4px 0;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.watchlist-item:last-child{border-bottom:none;}
.watchlist-item .sale-date{font-size:11px;color:var(--green);font-weight:700;}
.watchlist-item .remove-btn{font-size:10px;color:var(--text2);background:none;border:none;cursor:pointer;padding:2px 6px;}
#content h2{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--text2);margin:28px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border2);}
#content h3{font-size:17px;font-weight:700;color:var(--text);margin:18px 0 8px;line-height:1.5;}
#content p{font-size:15px;color:var(--text2);line-height:1.9;margin-bottom:12px;}
#content ul,#content ol{font-size:15px;color:var(--text2);line-height:1.9;padding-left:20px;margin-bottom:12px;}
#content li{margin-bottom:6px;}
#content strong{color:var(--text);font-weight:700;}
#content em{color:var(--accent);font-style:normal;}
#content a{color:var(--blue);text-decoration:none;word-break:break-all;}
#content a:hover{text-decoration:underline;}
#content blockquote{border-left:3px solid var(--accent);padding:10px 16px;background:rgba(244,114,182,0.07);border-radius:0 var(--r) var(--r) 0;margin:12px 0;}
#content blockquote p{color:var(--text);margin:0;}
#content hr{border:none;border-top:1px solid var(--border);margin:20px 0;}
#content img{width:100%;max-height:260px;object-fit:cover;border-radius:var(--r);margin:8px 0 12px;display:block;}
.watch-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;background:rgba(244,114,182,.1);color:var(--accent);border:1px solid rgba(244,114,182,.3);border-radius:8px;padding:4px 10px;cursor:pointer;margin-top:6px;font-family:'Noto Sans JP',sans-serif;}
.watch-btn:hover{background:rgba(244,114,182,.2);}
.model-tabs{display:flex;gap:4px;}
.mtab{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;text-decoration:none;border:1px solid var(--border2);color:var(--text2);}
.mtab.mtab-on{background:var(--accent);color:#000;border-color:var(--accent);}

<script>
const md = "十分な情報が集まりました。マークダウンを生成します。\n\n---\n\n## 🔔 今週のチケット発売\n\n### フェルメール《真珠の耳飾りの少女》展｜大阪中之島美術館\n\n- **発売日：2026年6月1日（月）12:00〜** （本日！）\n- スペシャルツアーは先行抽選（本日同時開始）\n- 一般 **3,000円**\n- 販売チャネル：[公式サイト](https://vermeer2026.exhibit.jp/tickets/)、ローチケ、e+\n- 会期：2026年8月21日（金）〜 9月27日（日）\n\n---\n\n## 🎨 関東の展覧会\n\n### 現在開催中（終了が近い順）\n\n---\n\n**東京国立博物館 平成館（上野）**\n**前田育徳会創立百周年記念「百万石！加賀前田家」**\n会期：2026-04-14 〜 **2026-06-07（残り6日！）**\n入場料：公式サイト確認要\n加賀前田家伝来の国宝・重文を一挙公開。天下五剣の一つ「大典太光世」も出陳。\n**→ 今週末が実質ラストチャンス。見逃せない武家文化の精髄。**\n\n---\n\n**国立西洋美術館（上野）**\n**チュルリョーニス展 内なる星図**\n会期：2026-03-28 〜 **2026-06-14**\n入場料：一般 2,200円\nリトアニアの国民的芸術家・チュルリョーニスの日本初公開作品を含む大回顧展（34年ぶり）、絵画と音楽の交差。\n**→ 幻想的な宇宙観と音楽的絵画世界を、今しか見られない規模で体験できる。**\n公式：[nmwa.go.jp](https://www.nmwa.go.jp/jp/exhibitions/2026ciurlionis.html)\n\n---\n\n**サントリー美術館（六本木・東京ミッドタウン）**\n**ゴールドマン コレクション 河鍋暁斎の世界**\n会期：2026-04-22 〜 **2026-06-21**\n入場料：一般 1,800円\n世界最大級の暁斎コレクター・ゴールドマン旧蔵品を中心に、《百鬼夜行図屛風》《猫又図》など怪異・幽玄の名品が集結。\n**→ 国内ではめったに見られない海外コレクション総動員の豪華展示。**\n公式：[suntory.co.jp](https://www.suntory.co.jp/sma/exhibition/2026_1/index.html)\n\n---\n\n**東京都美術館（上野）**\n**東京都美術館開館100周年記念「アンドリュー・ワイエス展」**\n会期：2026-04-28 〜 **2026-07-05**\n入場料：一般 2,300円\nアメリカ写実絵画の巨匠の主要作品が集結。代表作《クリスティーナの世界》周辺の大型油彩・テンペラ作品を多数収録。\n**→ 孤独と静寂に満ちたワイエスの世界観を、開館100周年の節目に体感できる。**\n公式：[wyeth2026.jp](https://wyeth2026.jp/)\n\n---\n\n### 間もなく開始（開始日順）\n\n---\n\n**国立新美術館（六本木）**\n**ピカソ meets ポール・スミス 遊び心の冒険へ**\n会期：**2026-06-10** 〜 2026-09-21\n入場料：前売 2,200円 ／ 当日 2,400円\nピカソ作品約80点を、ポール・スミス本人が会場レイアウトをデザインした国際巡回展。\n**→ 現代ファッション視点でピカソを再解釈するユニークな切り口。**\n公式：[art.nikkei.com/picasso_ps26](https://art.nikkei.com/picasso_ps26/)\n\n---\n\n**三菱一号館美術館（大手町）**\n**\"カフェ\"に集う芸術家 ─ 印象派からゴッホ、ロートレック、ピカソまで**\n会期：**2026-06-13** 〜 2026-09-23\n入場料：公式サイト確認要\nパリのカフェ文化を軸に、モネ・ゴッホ・ロートレック・ピカソらの作品が一堂に。高級ショコラテリア「カカオサンパカ」とのコラボあり。\n**→ 19〜20世紀初頭の芸術家たちの「社交の場」から生まれた作品群を楽しめる。**\n公式：[mimt.jp](https://mimt.jp/ex_sp/cafe/)\n\n---\n\n**ポーラ美術館（箱根）**\n**モネ没後100年・開館25周年記念「あたらしい目 ─ モネと21世紀のアート」**\n会期：**2026-06-17** 〜 2027-04-07\n入場料：一般 2,200円\nアジア最大規模のモネ・コレクション（油彩19点）を一挙公開し、現代アーティストの表現と対話させる野心的企画。\n**→ モネ没後100年という節目に、箱根の自然光の中でコレクションを存分に見られる稀有な機会。**\n公式：[polamuseum.or.jp](https://www.polamuseum.or.jp/exhibition/2026061701/)\n\n---\n\n**東京国立博物館 平成館（上野）**\n**弘法大師生誕1250年記念「空海と真言の名宝」**\n会期：**2026-07-14** 〜 2026-09-06\n入場料：公式サイト確認要\n真言宗十八本山の至宝が一堂に集結。国宝《信貴山縁起絵巻》《十二天像》、各地の秘仏も出陳予定。\n**→ 弘法大師生誕1250年という大節目の集大成。滅多に見られない密教美術の精髄。**\n公式：[tnm.jp](https://www.tnm.jp/modules/r_free_page/index.php?id=2760)\n\n---\n\n## 🏯 関西の展覧会\n\n### 現在開催中（終了が近い順）\n\n---\n\n**奈良国立博物館（近鉄奈良）**\n**特別展「神仏の山 吉野・大峯 ─蔵王権現に捧げた祈りと美─」**\n会期：2026-04-10 〜 **2026-06-07（残り6日！）**\n入場料：一般 2,000円\n修験道の聖地・吉野大峯に伝わる蔵王権現信仰の至宝。寺外初公開品多数。\n**→ 山岳修験の霊宝を一度にこれだけ見られる機会は滅多になく、今週末が最後。**\n公式：[narahaku.go.jp](https://www.narahaku.go.jp/exhibition/special/special_exhibition/202604_yoshino/)\n\n---\n\n**京都国立博物館（七条）**\n**特別展「北野天神」**\n会期：2026-04-18 〜 **2026-06-14**\n入場料：一般 2,000円（前売 1,800円）\n北野天満宮ゆかりの文化財を精選。菅原道真の生涯と信仰の歴史を一望する。\n**→ 北野天満宮秘蔵の文化財が勢揃いする節目の特別展。**\n公式：[kitano-tenjin2026.com](https://kitano-tenjin2026.com/)\n\n---\n\n**あべのハルカス美術館（天王寺）**\n**ブルックリン博物館所蔵 特別展 古代エジプト**\n会期：2026-03-20 〜 **2026-06-14**\n入場料：一般 2,300円（前売 2,100円）\nブルックリン博物館が誇るエジプトコレクションより彫刻・棺・工芸品など約150点。\n**→ 米国屈指のエジプトコレクションが初来日に近い形で大阪に集結。**\n公式：[egypt-brooklyn.exhibit.jp](https://egypt-brooklyn.exhibit.jp/)\n\n---\n\n**大阪中之島美術館（なにわ橋）**\n**没後50年 髙島野十郎展**\n会期：2026-03-25 〜 **2026-06-21**\n入場料：一般 1,800円\n孤高の洋画家・髙島野十郎の過去最大規模回顧展。《蝋燭》《月》など約150点。\n**→ 没後50年を機に実現した決定版回顧展、次はいつ見られるか分からない規模。**\n公式：[nakka-art.jp](https://nakka-art.jp/exhibition-post/yajuro50-en/)\n\n---\n\n### 間もなく開始（開始日順）\n\n---\n\n**京都市京セラ美術館 新館 東山キューブ（岡崎）**\n**テート美術館 ─ YBA \u0026 BEYOND 世界を変えた90s英国アート**\n会期：**2026-06-03（3日後開幕！）** 〜 2026-09-06\n入場料：一般 2,300円（前売 2,100円）\nダミアン・ハースト、トレイシー・エミン、ジュリアン・オピーら約60名・約100点。東京会期（2〜5月）の巡回。\n**→ 90年代英国現代アートの「衝撃と笑い」を、東京を見逃した人が体験できる最後のチャンス。**\n公式：[ybabeyond.jp](https://www.ybabeyond.jp/)\n\n---\n\n**大阪中之島美術館（なにわ橋）**\n\n![フェルメール《真珠の耳飾りの少女》](https://upload.wikimedia.org/wikipedia/commons/d/d7/Meisje_met_de_parel.jpg)\n\n**フェルメール《真珠の耳飾りの少女》展 17世紀オランダ絵画の名品、奇跡の再来日**\n会期：**2026-08-21** 〜 2026-09-27\n入場料：一般 3,000円\nフェルメール作品2点（《真珠の耳飾りの少女》《ディアナとニンフたち》）ほか17世紀オランダ絵画の名品を収録。\n**→ 本日チケット発売開始。マウリッツハイス改修を機に実現した、次回来日未定の奇跡の機会。**\n公式：[vermeer2026.exhibit.jp](https://vermeer2026.exhibit.jp/)\n\n---\n\n**奈良国立博物館（近鉄奈良）**\n**南都仏画 ─よみがえる奈良天平の美─**\n会期：**2026-07-18** 〜 2026-09-13\n入場料：公式サイト確認要\nボストン美術館との共同企画。海外流出した天平時代の南都仏画の名品が一時帰還。\n**→ 海外コレクションと国内寺院の秘蔵品が合流する学術的に重要な展覧会。**\n公式：[narahaku.go.jp](https://www.narahaku.go.jp/)\n\n---\n\n## ✨ 注目ピックアップ\n\n### 1. フェルメール《真珠の耳飾りの少女》展｜大阪中之島美術館（8/21〜9/27）\n\n**本日チケット発売。** 展示されるのはマウリッツハイス美術館所蔵のフェルメール2点：《真珠の耳飾りの少女》と初期作《ディアナとニンフたち》。フェルメールの現存作品は世界に約35点しかなく、《真珠の耳飾りの少女》は「原則として貸し出し不可」とされてきた作品だ。今回はマウリッツハイス美術館の改修工事による臨時休館という特例措置による来日で、次回の来日時期は一切未定。日本で同作を見られる「おそらく最後の機会」になる可能性がある。フェルメール、オランダ黄金時代絵画、西洋美術全般が好きな人は要スケジュール確保。\n\n---\n\n### 2. ルーヴル美術館展 ルネサンス｜国立新美術館（2026-09-09〜12-13）\n\nレオナルド・ダ・ヴィンチの《美しきフェロニエール》が**日本初公開**。ルーヴル所蔵のレオナルド作品が来日するのは1974年の《モナ・リザ》以来、実に**52年ぶり**。本展はルネサンス美術の本質を50点余で辿る構成で、ラファエロ、ミケランジェロ周辺の名品も含まれる見込み。美術史における「人類の転換点」を、東京でこれだけの密度で見られる機会はほぼ一世代に一度。ルネサンス・美術史・ダ・ヴィンチに関心があるすべての人に。\n\n---\n\n### 3. テート美術館 ─ YBA \u0026 BEYOND｜京都市京セラ美術館（6/3〜9/6）\n\n**3日後開幕。** ダミアン・ハースト（《生者の心における死の物理的不可能性》など）、トレイシー・エミン、ジュリアン・オピーら**約60名・100点超**が集結する、90年代英国現代アートの決定版巡回展。YBA（ヤング・ブリティッシュ・アーティスト）たちは美術史の常識を破壊し、現代アートの文脈を塗り替えた世代。東京会期はすでに終了しており、日本での残り会期は京都のみ。「挑発・社会批評・ユーモア」が混在する90sカルチャーの洗礼を受けたい人に強くすすめる。";
document.getElementById('content').innerHTML = marked.parse(md);

// watchlist
const WL_KEY = 'exhibition_watchlist';
function loadWatchlist() {
  return JSON.parse(localStorage.getItem(WL_KEY) || '[]');
}
function saveWatchlist(list) {
  localStorage.setItem(WL_KEY, JSON.stringify(list));
}
function renderWatchlist() {
  const list = loadWatchlist();
  const bar = document.getElementById('watchlist-bar');
  const container = document.getElementById('watchlist-items');
  if (!list.length) { bar.classList.remove('has-items'); return; }
  bar.classList.add('has-items');
  container.innerHTML = list.map((item, i) => {
    const daysLeft = item.saleDate ? Math.ceil((new Date(item.saleDate) - new Date()) / 86400000) : null;
    const saleTxt = daysLeft !== null
      ? (daysLeft <= 0 ? '&#x767A;&#x58F2;&#x4E2D;' : daysLeft + '&#x65E5;&#x5F8C;&#x767A;&#x58F2;')
      : '';
    return '<div class="watchlist-item"><span>' + item.name + '</span><span><span class="sale-date">' + saleTxt + '</span><button class="remove-btn" onclick="removeWatch(' + i + ')">&#x2715;</button></span></div>';
  }).join('');
}
function removeWatch(i) {
  const list = loadWatchlist();
  list.splice(i, 1);
  saveWatchlist(list);
  renderWatchlist();
}
function addToWatchlist(name, saleDate) {
  const list = loadWatchlist();
  if (list.find(x => x.name === name)) { alert('&#x767B;&#x9332;&#x6E08;&#x307F;&#x3067;&#x3059;'); return; }
  list.push({ name, saleDate: saleDate || null, addedAt: new Date().toISOString() });
  saveWatchlist(list);
  renderWatchlist();
  checkSaleNotifications();
}
function checkSaleNotifications() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const today = new Date().toDateString();
  loadWatchlist().forEach(item => {
    if (item.saleDate && new Date(item.saleDate).toDateString() === today) {
      new Notification('&#x1F3AB; &#x30C1;&#x30B1;&#x30C3;&#x30C8;&#x767A;&#x58F2;&#x65E5;&#xFF01;', {
        body: item.name + ' &#x306E;&#x30C1;&#x30B1;&#x30C3;&#x30C8;&#x304C;&#x672C;&#x65E5;&#x767A;&#x58F2;&#x3067;&#x3059;',
        icon: '/favicon.ico'
      });
    }
  });
}

// inject watch buttons after h3 tags in content
document.querySelectorAll('#content h3').forEach(h3 => {
  const name = h3.textContent.trim();
  const btn = document.createElement('button');
  btn.className = 'watch-btn';
  btn.innerHTML = '&#x2B50; &#x30A6;&#x30A9;&#x30C3;&#x30C1;';
  btn.onclick = () => {
    const dateMatch = h3.nextElementSibling ? h3.nextElementSibling.textContent.match(/\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}/) : null;
    addToWatchlist(name, dateMatch ? dateMatch[0].replace(/\//g, '-') : null);
  };
  h3.appendChild(btn);
});

if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}
renderWatchlist();
checkSaleNotifications();
</script>
