<script>
const md = "十分な情報が揃いました。出力をまとめます。\n\n---\n\n## 🔔 今週のチケット発売\n\n### フェルメール《真珠の耳飾りの少女》展（大阪中之島美術館）\n- **発売日**: 2026年6月1日（月）12:00〜 先行抽選受付開始\n- **価格帯**: 一般 3,000円 ／ 高大生 1,500円 ／ 小学生 500円\n- **販売チャネル**: チケットぴあ（先行抽選）、公式サイト（日時指定制）\n- **公式リンク**: [vermeer2026.exhibit.jp](https://vermeer2026.exhibit.jp/)\n\n\u003e ※ 開幕は8月21日。大阪のみ開催・巡回なし。《真珠の耳飾りの少女》の来日は14年ぶり。抽選終了後は一般先着販売へ移行予定。\n\n---\n\n## 🎨 関東の展覧会\n\n### ▶ 現在開催中（終了が近い順）\n\n---\n\n**チュルリョーニス展 内なる星図**\n国立西洋美術館（JR上野駅 徒歩1分）\n会期：2026-03-28〜**2026-06-14** ⚠️ 残り6日\n入場料：一般 2,200円（大学生 1,300円、高校生 1,000円、中学生以下無料）\nリトアニアの画家・作曲家チュルリョーニスの絵画・グラフィック約80点。最大の代表作《レックス（王）》が日本初公開。\n**見どころ**: 展示室に彼の音楽が流れる「聴ける展覧会」。チケット1枚で「北斎 冨嶽三十六景」と常設展も観覧可。今週を逃すと次の機会はない。\n\n---\n\n**ゴールドマン コレクション 河鍋暁斎の世界**\nサントリー美術館（東京ミッドタウン、東京メトロ六本木駅直結）\n会期：2026-04-22〜**2026-06-21**\n入場料：一般 1,800円（前売 1,600円）\n世界最大級の暁斎コレクターであるイスラエル・ゴールドマン氏の所蔵品より、日本初出品の肉筆画を含む選りすぐりの名品を公開。\n**見どころ**: 《百鬼夜行図屛風》《猫又図》など動物画・妖怪画の傑作が揃い、「画鬼」と称された暁斎の幅広い表現を一気に体感できる。\n\n---\n\n**東京都美術館開館100周年記念 アンドリュー・ワイエス展**\n東京都美術館（JR上野駅 徒歩7分）\n会期：2026-04-28〜**2026-07-05**\n入場料：一般 2,300円（65歳以上 1,600円、18歳以下無料）\n20世紀アメリカ具象絵画の巨匠ワイエスの日本最大規模の回顧展。「窓・扉・境界」をテーマに、10点以上の日本初公開作品を含む構成。\n**見どころ**: テンペラ技法による繊細な筆致と静謐な詩情。都美100周年の記念企画にふさわしいスケール感。\n\n---\n\n**ロン・ミュエク**\n森美術館（六本木ヒルズ 森タワー53階、東京メトロ六本木駅 徒歩4分）\n会期：2026-04-29〜**2026-09-23**（会期中無休）\n入場料：一般 2,300円（平日）／ 2,500円（土日祝）、中学生以下無料\nオーストラリア出身の彫刻家による18年ぶりの日本大規模個展。全49作品中11点を展示、日本初公開多数。\n**見どころ**: 人間をはるかに超える巨大スケールまたは極小スケールで造形された超写実的人物彫刻が、生と死の境界を問いかける。\n\n---\n\n### ▶ 間もなく開始（開始日順）\n\n---\n\n**ピカソ meets ポール・スミス 遊び心の冒険へ** ★ 2日後開幕\n国立新美術館（東京メトロ六本木駅 徒歩4分）\n会期：**2026-06-10**〜2026-09-21\n入場料：一般 2,400円（前売 2,200円）、中学生以下無料\nポール・スミスの空間デザインのもと、ピカソの絵画・版画約80点をアート×ファッション×ユーモアの文脈で再構築。\n**推奨理由**: ピカソ作品をデザイン視点で読み直す新鮮な体験。ファッション・デザイン好きにもアート初心者にも間口が広い。\n\n---\n\n**モネ没後100年・開館25周年記念 あたらしい目 — モネと21世紀のアート**\nポーラ美術館（神奈川県箱根町、箱根湯本駅からバス）\n会期：**2026-06-17**〜2027-04-07\n入場料：公式サイトで確認（[polamuseum.or.jp](https://www.polamuseum.or.jp/)）\nアジア最大級のモネ・コレクション19点を軸に、国内外の現代アーティストの作品と対置。建物・森の遊歩道も展示空間となる。\n**推奨理由**: モネ没後ちょうど100年の節目に、作品そのものと現代的解釈を同時に体験できる稀有な機会。箱根の自然とのシナジーも特別。\n\n---\n\n**弘法大師生誕1250年記念 特別展「空海と真言の名宝」**\n東京国立博物館 平成館（JR上野駅 徒歩10分）\n会期：**2026-07-14**〜2026-09-06\n入場料：前売一般 2,100円（当日料金は公式確認）\n弘法大師空海の生誕1250年を記念し、真言宗ゆかりの国宝・重要文化財を集大成した大規模特別展。\n**推奨理由**: 1250年という節目にしか実現しない、全国の真言寺院からの寺外秘宝の一斉公開。密教美術の粋を一堂で見る千載一遇の機会。\n\n---\n\n**マリー・アントワネット・スタイル**\n横浜美術館（みなとみらい線みなとみらい駅 徒歩3分）\n会期：**2026-08-01**〜2026-11-23\n入場料：一般 2,500円（前売 2,300円）\nヴィクトリア＆アルバート博物館企画の世界巡回展。日本唯一の開催会場。マリー・アントワネットのファッション・インテリアが現代クリエーターに与え続ける影響を軸に構成。\n**推奨理由**: V\u0026A企画の正規巡回版が日本で見られる唯一の機会。ファッション史・装飾美術の視点から王妃を再評価する。\n\n---\n\n## 🏯 関西の展覧会\n\n### ▶ 現在開催中（終了が近い順）\n\n---\n\n**特別展「北野天神」**\n京都国立博物館 平成知新館（京阪七条駅 徒歩7分）\n会期：2026-04-18〜**2026-06-14** ⚠️ 残り6日\n入場料：公式サイトで確認（[kitano-tenjin2026.com](https://kitano-tenjin2026.com/)）\n菅原道真と北野天満宮ゆかりの文化財に迫る特別展。史上初となる国宝《北野天神縁起絵巻（承久本）》全巻全場面の同時公開を実現。\n**見どころ**: 「承久本」をはじめ「弘安本」「光信本」「光起本」と複数の縁起絵巻が一堂に。これほどの規模で北野天神ゆかりの宝物が揃うのは極めて稀。\n\n---\n\n**ブルックリン博物館所蔵 特別展「古代エジプト」**\nあべのハルカス美術館（近鉄・JR天王寺駅 直結、大阪16階）\n会期：2026-03-20〜**2026-06-14** ⚠️ 残り6日\n入場料：一般 2,300円（大学・高校生 1,800円、中小学生 500円）\nブルックリン博物館所蔵のミイラ・棺・彫刻・パピルスなど約150点。3,000年の古代エジプト文明を「衣食住と信仰」の視点から読み解く。\n**見どころ**: 人間とネコのミイラが実物展示。最新のピラミッド研究を踏まえた構成で、考古・宗教・芸術の三側面から俯瞰できる。\n\n---\n\n**全力！名宝物語 — 大阪市美とたどる美のエピソード**\n大阪市立美術館（大阪メトロ天王寺駅 徒歩5分）\n会期：2026-04-25〜**2026-06-21**（開館90周年記念特別展）\n入場料：公式サイトで確認（[osaka-art-museum.jp](https://www.osaka-art-museum.jp/)）\n開館90周年を記念し、館蔵の国宝・重要文化財を中心とした名品を物語形式で紹介する自館コレクション総覧。\n**見どころ**: 普段は収蔵庫に眠る逸品が一挙公開。大阪市美の90年の歩みとコレクションの深さを体感できる。\n\n---\n\n**驚異の部屋の私たち、消滅せよ — 森村泰昌・ヤノベケンジ・やなぎみわ**\n大阪中之島美術館（京阪なにわ橋駅 徒歩2分）\n会期：2026-04-25〜**2026-07-20**\n入場料：公式サイトで確認（[nakka-art.jp](https://nakka-art.jp/)）\n現代美術界を代表する3作家が「驚異の部屋（Wunderkammer）」をテーマに協働。コレクションと新作を融合させた大型インスタレーション展。\n**見どころ**: 森村・ヤノベ・やなぎ3人の世界観が交錯する異色の共同制作。従来の個展形式では味わえない緊張感と対話が生まれる。\n\n---\n\n**テート美術館 — YBA \u0026 BEYOND 世界を変えた90s英国アート**\n京都市京セラ美術館 新館 東山キューブ（地下鉄東山駅 徒歩10分）\n会期：**2026-06-03**〜2026-09-06（開幕直後）\n入場料：一般 2,300円（大学生 1,500円、高校生 900円、中学生以下無料）\nテート所蔵のYBA（ヤング・ブリティッシュ・アーティスト）世代を中心に、80年代末〜2000年代初頭の英国現代美術を体系的に紹介。\n**見どころ**: デミアン・ハースト、サラ・ルーカス、ダミアン・ハーストら問題作家の作品が日本で本格的に俯瞰できる初の機会。\n\n---\n\n### ▶ 間もなく開始\n\n---\n\n![フェルメール《真珠の耳飾りの少女》](https://upload.wikimedia.org/wikipedia/commons/d/d7/Meisje_met_de_parel.jpg)\n\n**フェルメール《真珠の耳飾りの少女》展 — 17世紀オランダ絵画の名品、奇跡の再来日**\n大阪中之島美術館（京阪なにわ橋駅 徒歩2分）\n会期：**2026-08-21**〜2026-09-27\n入場料：一般 3,000円（日時指定制、巡回なし）\nマウリッツハイス美術館所蔵のフェルメール2点（《真珠の耳飾りの少女》《ディアナとニンフたち》）を含む全12点。\n**推奨理由**: 《真珠の耳飾りの少女》来日は14年ぶり。大阪唯一開催のため西日本在住者には特に必見。\n\n---\n\n## ✨ 注目ピックアップ\n\n---\n\n### 1. テート美術館 — YBA \u0026 BEYOND（京都市京セラ美術館）\n\n**何が展示されるか**: デミアン・ハーストのホルマリン漬け彫刻やサラ・ルーカスの挑発的オブジェなど、1988〜2000年代の英国現代美術を動かした作家群の実物が集結。テートの正規コレクションから厳選した作品で、「センセーション展」以降の文脈も含めて体系的に追える構成。\n\n**なぜ今見るべきか**: YBA世代をこれほどの規模でまとめて見せる展覧会は日本では前例が少なく、しかも京都という場での対比が独特の緊張感を生む。国立新美術館での東京会期（2月〜5月）を逃した方にとって、京都が最後のチャンス。\n\n**どんな人に刺さるか**: 90年代イギリスのサブカルチャーやファッション（Britpop/セレクトショップ文化）に親しんできた世代、現代美術に興味を持つ学生・若手クリエーター、および美術批評・文化史を学ぶ人。\n\n---\n\n### 2. ロン・ミュエク（森美術館）\n\n**何が展示されるか**: 全49作品のうち11点を展示。等身大を大きく超える《In Bed》のような横たわる老女、または数センチの極小人物像など、生と老・死を直截に描いた超写実彫刻。日本初公開作品を複数含む。\n\n**なぜ今見るべきか**: 2008年の森美術館個展から18年ぶりの大規模来日。ミュエクは制作ペースが極めて遅く、次回の機会がいつになるか読めない。しかも今回は森美術館の広大な展示空間を使った配置で、作品の物量的存在感が最大化される。\n\n**どんな人に刺さるか**: 彫刻・立体造形に関心がある方全般、死生観や身体論に興味がある人文系の方、「美術館に行ったことがないが衝撃を受けたい」という初心者にも非常に効く展覧会。\n\n---\n\n### 3. フェルメール《真珠の耳飾りの少女》展（大阪中之島美術館）\n\n**何が展示されるか**: マウリッツハイス美術館から《真珠の耳飾りの少女》《ディアナとニンフたち》の2点が来日。さらに17世紀オランダ絵画の名品を歴史画・肖像画・風俗画・静物画の6テーマで計12点展示。全長20mの特別映像体験も設置。\n\n**なぜ今見るべきか**: 来日は2012年以来14年ぶり。マウリッツハイスは原則として門外不出に近い方針を維持しており、再来日の時期は全く未定。大阪のみでの開催（巡回なし）のため、この夏を逃すと日本では当分見られない可能性が高い。\n\n**どんな人に刺さるか**: 美術に詳しくない方でも「名前だけは知っている」圧倒的な知名度を誇る作品なので入門にも最適。写真・映像好き、光の描写に興味がある方、および「一生に一度は本物を」と考えている方に。\n\n---\n\nSources:\n- [東京都美術館開館100周年記念 アンドリュー・ワイエス展（公式）](https://www.tobikan.jp/exhibition/2026_wyeth.html)\n- [アンドリュー・ワイエス展 チケット情報](https://wyeth2026.jp/ticket.html)\n- [国立西洋美術館 チュルリョーニス展](https://www.nmwa.go.jp/jp/exhibitions/2026ciurlionis.html)\n- [ピカソ meets ポール・スミス（国立新美術館 公式）](https://www.nact.jp/exhibition_special/2026/picasso_paulsmith/)\n- [ピカソ meets ポール・スミス（日経 公式）](https://art.nikkei.com/picasso_ps26/)\n- [ロン・ミュエク（森美術館 公式）](https://www.mori.art.museum/jp/exhibitions/ronmueck/)\n- [ゴールドマン コレクション 河鍋暁斎の世界（サントリー美術館）](https://www.suntory.co.jp/sma/exhibition/2026_1/index.html)\n- [弘法大師生誕1250年記念 特別展「空海と真言の名宝」（東京国立博物館）](https://www.tnm.jp/modules/r_free_page/index.php?id=2760)\n- [マリー・アントワネット・スタイル（横浜美術館）](https://yokohama.art.museum/exhibition/202608_marie2026/)\n- [ポーラ美術館 モネ展](https://www.polamuseum.or.jp/exhibition/2026061701/)\n- [テート美術館 YBA \u0026 BEYOND（公式）](https://www.ybabeyond.jp/)\n- [京都市京セラ美術館 YBA \u0026 BEYOND 英語ページ](https://kyotocity-kyocera.museum/en/exhibition/20260603-20260906)\n- [特別展「北野天神」（公式）](https://kitano-tenjin2026.com/)\n- [特別展「北野天神」（京都国立博物館）](https://www.kyohaku.go.jp/jp/exhibitions/special/2026_kitano/)\n- [ブルックリン博物館所蔵 特別展「古代エジプト」（あべのハルカス美術館）](https://www.aham.jp/exhibition/future/brooklyn/)\n- [驚異の部屋の私たち、消滅せよ（大阪中之島美術館）](https://nakka-art.jp/exhibition-post/vermeer2026/)\n- [全力！名宝物語（大阪市立美術館）](https://www.osaka-art-museum.jp/special_exhibition/8302)\n- [フェルメール《真珠の耳飾りの少女》展（公式）](https://vermeer2026.exhibit.jp/)\n- [フェルメール展 チケット情報](https://vermeer2026.exhibit.jp/tickets/)\n- [美術展ナビ 2026年関西おすすめ展覧会](https://artexhibition.jp/topics/news/20260115-AEJ2819472/)\n- [Tokyo Art Beat 東京2026おすすめ展覧会42選](https://www.tokyoartbeat.com/articles/-/featured-exhibitions-in-2026-tokyo-news-202512)\n- [ルーヴル美術館展 ルネサンス（国立新美術館）](https://www.nact.jp/exhibition_special/2026/louvre2026/)";
document.getElementById('content').innerHTML = marked.parse(md);

// watchlist
const WL_KEY = 'exhibition_watchlist';
function loadWatchlist() {
  return JSON.parse(localStorage.getItem(WL_KEY) || '[]');
}
function saveWatchlist(list) {
  localStorage.setItem(WL_KEY, JSON.stringify(list));
}
function renderWatchlist() {
  const list = loadWatchlist();
  const bar = document.getElementById('watchlist-bar');
  const container = document.getElementById('watchlist-items');
  if (!list.length) { bar.classList.remove('has-items'); return; }
  bar.classList.add('has-items');
  container.innerHTML = list.map((item, i) => {
    const daysLeft = item.saleDate ? Math.ceil((new Date(item.saleDate) - new Date()) / 86400000) : null;
    const saleTxt = daysLeft !== null
      ? (daysLeft <= 0 ? '&#x767A;&#x58F2;&#x4E2D;' : daysLeft + '&#x65E5;&#x5F8C;&#x767A;&#x58F2;')
      : '';
    return '<div class="watchlist-item"><span>' + item.name + '</span><span><span class="sale-date">' + saleTxt + '</span><button class="remove-btn" onclick="removeWatch(' + i + ')">&#x2715;</button></span></div>';
  }).join('');
}
function removeWatch(i) {
  const list = loadWatchlist();
  list.splice(i, 1);
  saveWatchlist(list);
  renderWatchlist();
}
function addToWatchlist(name, saleDate) {
  const list = loadWatchlist();
  if (list.find(x => x.name === name)) { alert('&#x767B;&#x9332;&#x6E08;&#x307F;&#x3067;&#x3059;'); return; }
  list.push({ name, saleDate: saleDate || null, addedAt: new Date().toISOString() });
  saveWatchlist(list);
  renderWatchlist();
  checkSaleNotifications();
}
function checkSaleNotifications() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const today = new Date().toDateString();
  loadWatchlist().forEach(item => {
    if (item.saleDate && new Date(item.saleDate).toDateString() === today) {
      new Notification('&#x1F3AB; &#x30C1;&#x30B1;&#x30C3;&#x30C8;&#x767A;&#x58F2;&#x65E5;&#xFF01;', {
        body: item.name + ' &#x306E;&#x30C1;&#x30B1;&#x30C3;&#x30C8;&#x304C;&#x672C;&#x65E5;&#x767A;&#x58F2;&#x3067;&#x3059;',
        icon: '/favicon.ico'
      });
    }
  });
}

// inject watch buttons after h3 tags in content
document.querySelectorAll('#content h3').forEach(h3 => {
  const name = h3.textContent.trim();
  const btn = document.createElement('button');
  btn.className = 'watch-btn';
  btn.innerHTML = '&#x2B50; &#x30A6;&#x30A9;&#x30C3;&#x30C1;';
  btn.onclick = () => {
    const dateMatch = h3.nextElementSibling ? h3.nextElementSibling.textContent.match(/\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}/) : null;
    addToWatchlist(name, dateMatch ? dateMatch[0].replace(/\//g, '-') : null);
  };
  h3.appendChild(btn);
});

if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}
renderWatchlist();
checkSaleNotifications();
</script>
