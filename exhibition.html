<script>
const md = "情報が揃いました。Markdownレポートを生成します。\n\n---\n\n## 🔔 今週のチケット発売\n\n### フェルメール《真珠の耳飾りの少女》展\n![フェルメール 真珠の耳飾りの少女](https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/1665_Girl_with_a_Pearl_Earring.jpg/450px-1665_Girl_with_a_Pearl_Earring.jpg)\n\n| 項目 | 内容 |\n|------|------|\n| **発売日** | **2026年6月1日（月）12:00〜** |\n| **種別** | チケットぴあ先行抽選 / tabiwaスペシャルツアー先行販売 |\n| **価格** | 一般 3,000円（全日時指定制） |\n| **購入** | [公式チケットページ](https://vermeer2026.exhibit.jp/tickets/) |\n\n\u003e ⚠️ 今週月曜日（6/1）正午スタート。14年ぶりの傑作来日なので争奪戦必至。早めに確保を。\n\n---\n\n## 🎨 関東の展覧会\n\n### ▶ 現在開催中（終了が近い順）\n\n---\n\n#### 🏛️ 東京国立博物館（上野）｜特別展「百万石！加賀前田家」\n**会期**: 2026年4月14日（火）〜**6月7日（日）** ⚠️ **残り約10日！**\n**入場料**: 要確認（公式サイトにて）\n**見どころ**: 前田育徳会創立100周年を記念し、加賀藩歴代当主が蒐集した国宝・重要文化財を一堂に公開。百万石の格式を伝える美術工芸品の集大成。\n\n---\n\n#### 🖼️ 国立西洋美術館（上野）｜「チュルリョーニス展 内なる星座」\n**会期**: 2026年3月28日（土）〜**6月14日（日）**\n**入場料**: 要確認\n**見どころ**: リトアニアの国民的芸術家ミカロユス・チュルリョーニスの幻想的絵画と音楽が融合した世界観を体感できる日本初の大規模回顧展。\n\n---\n\n#### 🔬 国立科学博物館（上野）｜特別展「超危険生物展 科学で挑む生き物の本気」\n**会期**: 2026年3月14日（土）〜**6月14日（日）**\n**入場料**: 要確認\n**見どころ**: 毒・凶器・擬態——生き物が命がけで磨いた「武器」を最新科学で解析。大人から子どもまで圧倒される体験型展示。\n\n---\n\n#### 🎨 東京都美術館（上野）｜開館100周年記念「アンドリュー・ワイエス展」\n**会期**: 2026年4月28日（火）〜**7月5日（日）**\n**入場料**: 一般 2,300円（前売 2,100円）／65歳以上 1,600円／大学生 1,300円／18歳以下無料\n**見どころ**: 20世紀アメリカ最大の写実画家ワイエスの傑作群が来日。孤独・郷愁・生命への眼差しが静謐な筆致で描かれる。東京都美術館100周年の目玉企画。\n\n---\n\n#### 🏛️ 東京国立博物館（上野）｜「チェスター・ビーティー・コレクション 絵巻と絵本のたからばこ」\n**会期**: 2026年4月27日（月）〜**7月20日（月）**\n**入場料**: 要確認\n**見どころ**: アイルランドの実業家チェスター・ビーティーが蒐集した日本の絵巻・絵本の傑作を一挙公開。国内にいながら世界に渡った和の至宝に出会える。\n\n---\n\n### ▶ 間もなく開始（開始日順）\n\n---\n\n#### 🖼️ 国立新美術館（六本木）｜「ピカソ meets ポール・スミス 遊び心の冒険へ」\n**会期**: 2026年6月10日（水）〜9月21日（月・祝）\n**入場料**: 一般 2,400円（前売終了）／大学生 1,400円／高校生 1,000円／中学生以下無料\n**見どころ**: ピカソ約80点の原画を、英国ファッション界の鬼才ポール・スミスが空間デザイン。アートとデザインが遊び心で交差する異色の体験型展覧会。\n公式: [国立新美術館](https://www.nact.jp/exhibition_special/2026/picasso_paulsmith/)\n\n---\n\n#### 🗻 すみだ北斎美術館（墨田）｜「北斎×広重 ふたりの富士、それぞれの富士」\n![北斎 神奈川沖浪裏](https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/The_Great_Wave_off_Kanagawa.jpg/600px-The_Great_Wave_off_Kanagawa.jpg)\n\n**会期**: 2026年6月23日（火）〜（終了日 要確認）\n**入場料**: 要確認\n**見どころ**: 「冨嶽三十六景」の北斎と「東海道五十三次」の広重、二大浮世絵師が描いた富士山を一度に比較鑑賞できる贅沢な企画。\n\n---\n\n#### ⛩️ 東京国立博物館（上野）｜弘法大師生誕1250年記念特別展「空海と真言の名宝」\n**会期**: 2026年7月14日（火）〜9月6日（日）\n**入場料**: 要確認（公式サイトにて）\n**見どころ**: 全国18の真言宗総本山・大本山から**国宝15件・重要文化財60件を含む88件**が集結。千年に一度の節目に開かれる、密教美術の総決算。\n公式: [東京国立博物館](https://www.tnm.jp/modules/r_free_page/index.php?id=2760)\n\n---\n\n## 🏯 関西の展覧会\n\n### ▶ 現在開催中（終了が近い順）\n\n---\n\n#### ⛩️ 奈良国立博物館（奈良）｜「神仏の山 吉野・大峯 ―蔵王権現に捧げた祈りと美―」\n**会期**: 2026年4月10日（金）〜**6月7日（日）** ⚠️ **残り約10日！**\n**入場料**: 要確認\n**見どころ**: 世界遺産・吉野山と大峯山の霊山文化が育んだ仏像・神像・仏画の至宝が一堂に。修験道の美の世界を堪能できる希少な機会。\n\n---\n\n#### 🏯 京都国立博物館（京都）｜特別展「北野天神」\n**会期**: 2026年4月18日（土）〜**6月14日（日）**\n**入場料**: 要確認\n**見どころ**: 北野天満宮の創建1100年を記念。菅原道真ゆかりの国宝・重文を大量公開。天神信仰の精髄を伝える絵画・工芸の集大成。\n公式: [京都国立博物館](https://www.kyohaku.go.jp/jp/exhibitions/special/2026_kitano/)\n\n---\n\n#### 🖼️ 京都文化博物館（京都）｜「原安三郎コレクション 北斎×広重」\n**会期**: 2026年4月18日（土）〜**6月14日（日）**\n**入場料**: 要確認\n**見どころ**: 実業家・原安三郎が蒐集した浮世絵の精華。関西では稀少な規模で北斎・広重を一挙鑑賞できる好機。\n\n---\n\n#### 🏛️ 大阪市立美術館（大阪）｜「全力！名宝物語 ―大阪市美とたどる美のエピソード―」\n**会期**: 2026年4月25日（土）〜**6月21日（日）**\n**入場料**: 要確認\n**見どころ**: 大阪市立美術館の所蔵名品を「物語」の切り口で再構成。各作品の来歴や時代背景を楽しみながら鑑賞できる新感覚の常設企画展。\n\n---\n\n#### 🕯️ 大阪中之島美術館（大阪）｜「没後50年 髙島野十郎展」\n**会期**: 2026年3月25日（水）〜**6月21日（日）**\n**入場料**: 要確認\n**見どころ**: 孤高の洋画家・髙島野十郎の没後50年回顧展。「蝋燭」シリーズに代表される静謐で深い光の表現が大阪で一堂に。\n\n---\n\n#### 🎭 大阪中之島美術館（大阪）｜「驚異の部屋の私たち、消滅せよ。－森村泰昌・ヤノベケンジ・やなぎみわ」\n**会期**: 2026年4月25日（土）〜**7月20日（月・祝）**\n**入場料**: 要確認\n**見どころ**: 大阪を代表する現代美術家3人が「ヴンダーカンマー（驚異の部屋）」をテーマに競演。圧倒的スケールのインスタレーションで現代の驚異を体感。\n\n---\n\n### ▶ 間もなく開始（開始日順）\n\n---\n\n#### 🇬🇧 京都市京セラ美術館（京都）｜「テート美術館 YBA\u0026BEYOND 世界を変えた90s英国アート」\n**会期**: 2026年6月3日（水）〜9月6日（日）\n**入場料**: 要確認\n**見どころ**: デミアン・ハーストらYBA（ヤング・ブリティッシュ・アーティスツ）を中心に、英国現代アートの革命を体感。テート美術館の至宝が関西初上陸。\n\n---\n\n#### 🏛️ 奈良国立博物館（奈良）｜「南都仏画 ―よみがえる奈良天平の美―」\n**会期**: 2026年7月18日（土）〜9月13日（日）\n**入場料**: 要確認\n**見どころ**: 奈良の古寺に伝わる仏画の精華を集大成。天平の美が現代に甦る、奈良国立博物館ならではの大規模仏教美術展。\n\n---\n\n#### 🌟 大阪中之島美術館（大阪）｜「フェルメール《真珠の耳飾りの少女》展 17世紀オランダ絵画の名品、奇跡の再来日」\n![フェルメール 真珠の耳飾りの少女](https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/1665_Girl_with_a_Pearl_Earring.jpg/450px-1665_Girl_with_a_Pearl_Earring.jpg)\n\n**会期**: 2026年8月21日（金）〜9月27日（土）\n**入場料**: 一般 3,000円（全日時指定制）\n**見どころ**: 14年ぶりの来日！「北のモナ・リザ」こと《真珠の耳飾りの少女》に加え、《ディアナとニンフたち》も同時来日という奇跡の2点揃い踏み。\n公式: [vermeer2026.exhibit.jp](https://vermeer2026.exhibit.jp/)\n\n---\n\n## ✨ 注目ピックアップ\n\n### 🥇 フェルメール《真珠の耳飾りの少女》展（大阪中之島美術館、8月21日〜）\n\n![フェルメール 真珠の耳飾りの少女](https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/1665_Girl_with_a_Pearl_Earring.jpg/450px-1665_Girl_with_a_Pearl_Earring.jpg)\n\n14年ぶりに「北のモナ・リザ」が日本へ。しかも今回は《ディアナとニンフたち》との**2点同時来日**という異例の豪華展示。世界でも有数の傑作を関西の地で間近に見られる機会は、今後数十年来ないかもしれない。**チケット先行発売は今週月曜（6月1日）正午スタート**——争奪戦は必至。\n\n---\n\n### 🥈 東京国立博物館「空海と真言の名宝」（東博、7月14日〜）\n\n弘法大師空海生誕1250年という千年規模の節目に、全国18の真言宗総本山から**国宝15件・重文60件を含む88件**が東博に集結する。普段は秘仏として非公開の仏像や、密教美術の極致である曼荼羅がこれほどの規模で一堂に会する機会は極めて稀。宗教美術ファンのみならず、日本の精神文化の深さを実感したい人すべてに推薦する。\n\n---\n\n### 🥉 国立新美術館「ピカソ meets ポール・スミス」（六本木、6月10日〜）\n\n20世紀最大の芸術家ピカソの作品約80点を、英国ファッション界の鬼才ポール・スミスが空間デザインするという、前代未聞のコラボ展。美術の「見方」を根底から変えるような体験が六本木で待っている。入場料2,400円、金・土は夜8時まで開館、アクセスも抜群で夏の定番展になりそうな一本。\n\n---\n\nSources:\n- [美術展ナビ 関東展覧会](https://artexhibition.jp/exhibitions/?q=\u0026region=3\u0026a=\u0026t=1\u0026state=search)\n- [アイエム インターネットミュージアム 関東](https://www.museum.or.jp/event?area=area-3)\n- [TokyoArtBeat 2026年東京おすすめ展覧会](https://www.tokyoartbeat.com/articles/-/featured-exhibitions-in-2026-tokyo-news-202512)\n- [TokyoArtBeat 2026年関西おすすめ展覧会](https://www.tokyoartbeat.com/articles/-/featured-exhibitions-in-2026-kansai-osaka-news-202512)\n- [フェルメール展公式サイト](https://vermeer2026.exhibit.jp/)\n- [フェルメール展チケット情報（美術展ナビ）](https://artexhibition.jp/topics/news/20260527-AEJ2913218/)\n- [東京都美術館 アンドリュー・ワイエス展](https://wyeth2026.jp/)\n- [国立新美術館 ピカソ meets ポール・スミス](https://www.nact.jp/exhibition_special/2026/picasso_paulsmith/)\n- [東京国立博物館 空海と真言の名宝](https://www.tnm.jp/modules/r_free_page/index.php?id=2760)\n- [京都国立博物館 特別展「北野天神」](https://www.kyohaku.go.jp/jp/exhibitions/special/2026_kitano/)\n- [大阪中之島美術館 フェルメール展](https://nakka-art.jp/exhibition-post/vermeer2026/)\n- [art-voyage.jp 2026年近畿展覧会スケジュール](https://art-voyage.jp/ex-kinki-schedule-2026/)";
document.getElementById('content').innerHTML = marked.parse(md);

// watchlist
const WL_KEY = 'exhibition_watchlist';
function loadWatchlist() {
  return JSON.parse(localStorage.getItem(WL_KEY) || '[]');
}
function saveWatchlist(list) {
  localStorage.setItem(WL_KEY, JSON.stringify(list));
}
function renderWatchlist() {
  const list = loadWatchlist();
  const bar = document.getElementById('watchlist-bar');
  const container = document.getElementById('watchlist-items');
  if (!list.length) { bar.classList.remove('has-items'); return; }
  bar.classList.add('has-items');
  container.innerHTML = list.map((item, i) => {
    const daysLeft = item.saleDate ? Math.ceil((new Date(item.saleDate) - new Date()) / 86400000) : null;
    const saleTxt = daysLeft !== null
      ? (daysLeft <= 0 ? '&#x767A;&#x58F2;&#x4E2D;' : daysLeft + '&#x65E5;&#x5F8C;&#x767A;&#x58F2;')
      : '';
    return '<div class="watchlist-item"><span>' + item.name + '</span><span><span class="sale-date">' + saleTxt + '</span><button class="remove-btn" onclick="removeWatch(' + i + ')">&#x2715;</button></span></div>';
  }).join('');
}
function removeWatch(i) {
  const list = loadWatchlist();
  list.splice(i, 1);
  saveWatchlist(list);
  renderWatchlist();
}
function addToWatchlist(name, saleDate) {
  const list = loadWatchlist();
  if (list.find(x => x.name === name)) { alert('&#x767B;&#x9332;&#x6E08;&#x307F;&#x3067;&#x3059;'); return; }
  list.push({ name, saleDate: saleDate || null, addedAt: new Date().toISOString() });
  saveWatchlist(list);
  renderWatchlist();
  checkSaleNotifications();
}
function checkSaleNotifications() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const today = new Date().toDateString();
  loadWatchlist().forEach(item => {
    if (item.saleDate && new Date(item.saleDate).toDateString() === today) {
      new Notification('&#x1F3AB; &#x30C1;&#x30B1;&#x30C3;&#x30C8;&#x767A;&#x58F2;&#x65E5;&#xFF01;', {
        body: item.name + ' &#x306E;&#x30C1;&#x30B1;&#x30C3;&#x30C8;&#x304C;&#x672C;&#x65E5;&#x767A;&#x58F2;&#x3067;&#x3059;',
        icon: '/favicon.ico'
      });
    }
  });
}

// inject watch buttons after h3 tags in content
document.querySelectorAll('#content h3').forEach(h3 => {
  const name = h3.textContent.trim();
  const btn = document.createElement('button');
  btn.className = 'watch-btn';
  btn.innerHTML = '&#x2B50; &#x30A6;&#x30A9;&#x30C3;&#x30C1;';
  btn.onclick = () => {
    const dateMatch = h3.nextElementSibling ? h3.nextElementSibling.textContent.match(/\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}/) : null;
    addToWatchlist(name, dateMatch ? dateMatch[0].replace(/\//g, '-') : null);
  };
  h3.appendChild(btn);
});

if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}
renderWatchlist();
checkSaleNotifications();
</script>
