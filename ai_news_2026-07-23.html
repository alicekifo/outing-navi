<script>
const md = "## 🤖 今週のAI最新動向\n\n### 1. Google、Gemini 3.6 Flash と脆弱性ハンター「3.5 Flash Cyber」を同時投入\n\n**何が起きたか**：Googleが7月21日、ワークホース級の新モデル「Gemini 3.6 Flash」「Gemini 3.5 Flash-Lite」、そしてサイバーセキュリティ特化の「Gemini 3.5 Flash Cyber」の3本を同時リリースした。\n\n**なぜ重要か**：3.6 Flashは3.5 Flash比で出力トークン使用量を17%削減（Artificial Analysis Index計測）しつつ、コンピュータ操作ベンチマークOSWorld-Verifiedを78.4%→83.0%に引き上げた。価格は入力$1.50/出力$7.50（100万トークンあたり）、Flash-Liteは入力$0.30/出力$2.50。注目はFlash Cyberで、CodeMenderエージェントフレームワーク内に複数のCyberエージェントを並列配置し、コード脆弱性の発見と修復レポートを単一出力に統合する構成をとる。ただし提供先は政府機関と信頼パートナー限定のパイロットで、一般APIには来ていない——脆弱性発見AIのデュアルユース性を意識した配布統制と読める。\n\n出典: [Google公式ブログ](https://blog.google/innovation-and-ai/models-and-research/gemini-models/gemini-3-6-flash-3-5-flash-lite-3-5-flash-cyber/) (2026-07-21公開)\n\u003e source: https://blog.google/innovation-and-ai/models-and-research/gemini-models/gemini-3-6-flash-3-5-flash-lite-3-5-flash-cyber/\n\n### 2. AMD、Anthropicに最大50億ドル出資——MI450を2ギガワット分供給へ\n\n**何が起きたか**：AMDとAnthropicが7月22日、戦略的提携を発表。AnthropicはAMD Instinct MI450シリーズGPUを最大2ギガワット分デプロイし、AMDはAnthropicに最大50億ドルの戦略的株式投資を行う。\n\n**なぜ重要か**：最初の1ギガワットは2027年前半に稼働開始予定で、構成はMI455X GPU＋EPYC「Venice」CPU＋Pensandoネットワーキング＋ROCmを束ねたHeliosラックスケールソリューション。Anthropicは既にMI355Xを運用しており、その拡張となる。技術的に面白いのは複数年のエンジニアリング協業条項で、ClaudeをAMD Instinct向けワークロード最適化とROCm開発の加速に使うと明言している点。CUDA一強への挑戦は歴代「ソフトウェアスタックの弱さ」で跳ね返されてきたが、フロンティアモデル開発企業がROCm改善に当事者として関与する構図は過去の挑戦とは条件が違う。\n\n出典: [AMD IR プレスリリース](https://ir.amd.com/news-events/press-releases/detail/1292/amd-and-anthropic-announce-strategic-partnership-to-deploy-up-to-2-gigawatts-of-amd-instinct-mi450-series-gpus) (2026-07-22公開)\n\u003e source: https://ir.amd.com/news-events/press-releases/detail/1292/amd-and-anthropic-announce-strategic-partnership-to-deploy-up-to-2-gigawatts-of-amd-instinct-mi450-series-gpus\n\n### 3. Moonshot AI「Kimi K3」——2.8兆パラメータ、史上最大のオープンウェイトモデル\n\n**何が起きたか**：中国Moonshot AIが7月16日、総パラメータ2.8兆のスパースMoEモデル「Kimi K3」を発表した。コンテキスト長100万トークン・ネイティブビジョン対応で、フルウェイトを7月27日までにHugging Faceで公開すると予告している。\n\n**なぜ重要か**：公開されればオープンウェイトとして史上最大となる。アーキテクチャはトークンあたり896エキスパート中16個（約1.8%）のみ活性化する極端なスパース構成に加え、二次アテンション行列を置き換える線形アテンション変種「KDA」を採用。Artificial AnalysisのIntelligence Indexでは総合3位につけ、オープンモデルが商用フロンティアの背中を捉えつつある。API価格は入力$0.30（キャッシュヒット時）/$3.00（ミス時）、出力$15.00。米国の計算資源規制下でこの規模を出してきたこと自体が、規制の実効性への問いになっている。\n\n出典: [Bloomberg](https://www.bloomberg.com/news/articles/2026-07-17/china-s-powerful-new-moonshot-ai-model-closes-gap-with-us-rivals) (2026-07-17公開) / 配布元: [Hugging Face moonshotai](https://huggingface.co/moonshotai)\n\u003e source: https://www.bloomberg.com/news/articles/2026-07-17/china-s-powerful-new-moonshot-ai-model-closes-gap-with-us-rivals\n\n## 📄 今週の注目論文\n\n### 1. エージェントデータ注入攻撃はAIエージェントへの現実的脅威である / Agent Data Injection Attacks are Realistic Threats to AI Agents\n\n**著者**：Woohyuk Choi（ソウル大学ほか、UIUC等との共著）・arXiv:2607.05120・2026-07-06投稿\n\n- **Problem**:間接プロンプトインジェクション対策は「命令文の注入」を検知する前提で作られており、命令の形をしていない攻撃を想定していない。\n- **Method**:セキュリティ関連メタデータやエージェントのコンテキストデータなど「信頼済みデータ」に偽装した悪性データを注入する新カテゴリ「ADI」を定義し、実在のWebエージェント（Claude in Chrome、Antigravity、Nanobrowser）とコーディングエージェント（Claude Code、Codex、Gemini CLI）で評価した。\n- **Finding**:Webエージェントへの任意クリック誘導、コーディングエージェントへのリモートコード実行・サプライチェーン攻撃が成立。現行エージェントは信頼データと非信頼データの分離という基本原則を実装できていないと結論づけた。\n\n**読みどころ**：攻撃対象が研究用モックではなく、いま実務で使われているエージェントそのものである点。防御を「命令っぽい文字列の検知」に置いている限り、データ層に潜る攻撃には構造的に勝てないことを示しており、エージェントを業務導入している組織の脅威モデル見直しに直結する。\n\narXiv: https://arxiv.org/abs/2607.05120\n\u003e source: https://arxiv.org/abs/2607.05120\n\n### 2. エージェント型ボットネットに備えよ——敵対的ハルシネーション・スクワッティング / Beware of Agentic Botnets: Scalable Untargeted Promptware Attacks via Universal and Transferable Adversarial HalluSquatting\n\n**著者**：Aya Spira（所属は論文本文参照）・arXiv:2607.07433・2026-07-08投稿\n\n- **Problem**:プロンプトインジェクションは通常、標的への直接の注入チャネルを前提とする。チャネルを持たない攻撃者が無差別・大規模にLLMアプリを侵害できるかは未検証だった。\n- **Method**:トレンドのリソース名に対するLLMのハルシネーション分布を計算し、「幻覚されやすい実在しないドメイン・リポジトリ名」を先回り登録して悪性プロンプトを設置する「敵対的ハルシネーション・スクワッティング」を提案した。\n- **Finding**:幻覚リソース生成率はリポジトリclone誘導で最大85%、スキルインストールで最大100%。幻覚パターンはモデル間で転移し、ターミナルツールを統合した本番LLMアプリケーションに対するリモートコード実行を実証した。\n\n**読みどころ**：タイポスクワッティングの現代版だが、人間のタイプミスの代わりに「LLMの幻覚の統計的な偏り」を攻撃面として使う発想の転換が鋭い。幻覚は確率的でもその分布は予測可能——という事実は、エージェントにネットワークとシェルを渡す全システムの前提を揺さぶる。\n\narXiv: https://arxiv.org/abs/2607.07433\n\u003e source: https://arxiv.org/abs/2607.07433\n\n### 3. DSpark：信頼度スケジュールされた投機的デコーディング / DSpark: Confidence-Scheduled Speculative Decoding with Semi-Autoregressive Generation\n\n**著者**：Xin Cheng（所属は論文本文参照）・arXiv:2607.05147・2026-07-06投稿\n\n- **Problem**:並列ドラフト型の投機的デコーディングは、先に行くほどトークン受理率が急減衰し、高並行サービングでは棄却されるトークンにバッチ容量を浪費してしまう。\n- **Method**:並列バックボーンに軽量な逐次モジュールを結合した半自己回帰アーキテクチャでドラフト品質を上げ、さらにプレフィックス生存確率の推定に基づいてリクエストごとに検証長を動的に調整する「信頼度スケジュール検証」を組み合わせた。\n- **Finding**:オフラインベンチマークで受理トークン長が大幅に改善。DeepSeek-V4の本番環境への導入で、同一スループット条件下でユーザーあたり生成速度が60〜85%向上した。\n\n**読みどころ**：投機的デコーディング研究は多いが、本番の高並行サービングでスループットを落とさずレイテンシを削った実測を出す論文は希少。「検証長を固定せず、リクエストごとに賭け金を変える」という発想はvLLM等のOSSサービング基盤にも輸入可能な設計で、ローカル/自前推論勢にも示唆が大きい。\n\narXiv: https://arxiv.org/abs/2607.05147\n\u003e source: https://arxiv.org/abs/2607.05147\n\n### 4. 安いコード、高くつく判断——統治可能なエージェント型ソフトウェア工学のケーススタディ / Cheap Code, Costly Judgment: A Case Study on Governable Agentic Software Engineering\n\n**著者**：James C. Davis（パデュー大学）・arXiv:2607.01087・2026-07-01投稿（07-04改訂）\n\n- **Problem**:生成AIでコード生産が安価・潤沢になった結果、課題は実装能力から「AI主導の開発を検査可能・修正可能・保守可能に保つこと」へ移った。\n- **Method**:熟練エンジニア1名がフロンティアAIコーディングエージェントで文書アクセシビリティ修復システムを構築する12週間の一人称ケーススタディ。88件のフィールドノート、本番コード42万行、テスト等116万行を分析した。\n- **Finding**:高速なエージェント実装が構造的失敗を繰り返し表面化させ、それをエンジニアの判断が恒久的なガバナンス機構へ変換していく「governance conversion」プロセスモデルを導出。事前に義務を定める伝統的ガバナンスと対照的な、発見駆動型の統治像を示した。\n\n**読みどころ**：12週間で42万行という物量自体が「コードは安くなった」の実証で、そのうえで何が高くつくのか（レビュー、境界設計、失敗パターンの制度化）を一次データで示す。エージェントに書かせる開発を回している人ほど、自分のフィールドノートと突き合わせて読む価値がある。\n\narXiv: https://arxiv.org/abs/2607.01087\n\u003e source: https://arxiv.org/abs/2607.01087\n\n## 💡 今週のひとことインサイト\n\n### 1. エージェントは「コードとデータの分離」をまだ学んでいない\n\n今週の2本のセキュリティ論文は、別々の角度から同じ穴を突いている。ADI攻撃（arXiv:2607.05120)は「信頼済みデータに偽装すれば命令検知は素通りする」と示し、HalluSquatting（arXiv:2607.07433)は「LLMの幻覚分布を先読みしてドメインを押さえれば、注入チャネルすら要らない」と示した。どちらも根っこは、OSの世界が数十年かけて叩き込まれてきた原則——コードとデータ、信頼境界の内と外を混ぜるな——をエージェント基盤がまだ実装できていない、という一点にある。W^XもASLRも権限分離も、混ぜたら死んだ歴史から生まれた仕組みだ。LLMエージェントは自然言語という「データがそのまま命令になる」媒体の上に立つ以上、この分離が本質的に難しい。GoogleがFlash Cyberを政府・限定パートナーにしか配らないのも、攻防両面の自動化が同じ技術から出てくることの裏返しだろう。エージェントにシェルを渡す前に、/etc と /tmp を分けた先人の理由を思い出したい。\n\u003e source: https://arxiv.org/abs/2607.05120";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
