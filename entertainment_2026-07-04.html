<script>
const md = "# エンタメ週報（2026年7月4日号）\n\n## 🎬 今週の映画\n\n### トイ・ストーリー５（Toy Story 5）\n- **公開日 / 配給 / 上映時間**：2026年7月3日（金）公開／ウォルト・ディズニー・ジャパン\n- **あらすじ**：ボニーの成長を見守るカウガール人形ジェシーの前に、タブレット端末「リリーパッド」が現れ、おもちゃたちの日常が一変。ウッディとバズも巻き込み、ボニーの笑顔を取り戻すための奮闘が始まる。\n- **見どころ**：シリーズ第5作。テクノロジーという新たな\"脅威\"を描く現代的なテーマが特徴で、1作目へのオマージュを盛り込んだ本編映像も話題に。全米では歴代シリーズ最高のオープニング成績を記録。\n- **評価**：Filmarks 4.2（レビュー1,247件）／Rotten Tomatoes 批評家93%・観客95%（シリーズ最高評価）\n- 公式サイト：https://www.disney.co.jp/movie/toy5\n\u003e source: [トイ・ストーリー５公式サイト（ディズニー）](https://www.disney.co.jp/movie/toy5)\n\n### サヨナラの引力\n- **公開日 / 配給 / 上映時間**：2026年7月3日（金）公開／上映時間115分（韓国映画）\n- **あらすじ**：2008年のソウルで出会い、若さゆえに別れを選んだウノとジョンウォン。10年後の2024年、ソウル行きの飛行機で偶然再会し、あの頃の想いと向き合う。\n- **見どころ**：ク・ギョファン×ムン・ガヨンのダブル主演。韓国では2025年12月公開後、興行ランキング3週連続1位、260万人動員のヒットとなり、恋愛映画としては『別れる決心』以来の成功作と評される。\n- **評価**：Filmarks 4.0（レビュー345件）\n- 公式サイト：https://sayonara-inryoku.jp/\n\u003e source: [映画『サヨナラの引力』公式サイト](https://sayonara-inryoku.jp/)\n\n### 口に関するアンケート\n- **公開日 / 配給 / 上映時間**：2026年7月3日（金）公開\n- **あらすじ**：心霊スポットとして知られる墓地の「呪われた木」の噂を聞き、5人の大学生が肝試しに向かう。翌日、そのうちの一人の女性が行方不明になり、残りの4人の周囲でも不可解な現象が起き始める。\n- **見どころ**：背筋によるホラー小説（ポプラ社）が原作。『呪怨』シリーズなどで知られる清水崇監督がメガホンを取り、板垣李光人が主演。脚本は山浦雅大。\n- **評価**：Filmarks 3.9（レビュー160件）\n- 公式サイト：https://movies.shochiku.co.jp/kuchi-movie/\n\u003e source: [映画『口に関するアンケート』公式サイト（松竹）](https://movies.shochiku.co.jp/kuchi-movie/)\n\n---\n\n## 🎮 ゲーム情報\n\n### ユーザー注目タイトル動向\n\n#### FC26（EA SPORTS FC 26）\n2026年6月30日、タイトルアップデート「v1.6.3」（パッチ1.28）が全プラットフォームで配信。キャリアモードでの代表選出画面の不具合修正、Player Careerが強制ローンに出される不具合の修正、Ultimate Teamのプレビューパック閲覧後にトークンストアへ飛ばされる不具合修正、キット・クラウド・TIFOなどビジュアル素材の更新が主な内容。\n\u003e source: [EA SPORTS FC 26 Title Update v1.6.3（EA公式フォーラム）](https://forums.ea.com/blog/ea-sports-fc-game-info-hub-en/ea-sports-fc%E2%84%A2-26--title-update-v1-6-3/13522948)\n\n#### Minecraft\nJava版「26.3 Snapshot 1」（6月23日）で新バイオーム「Dappled Forest（まだらな森）」を追加。ポプラの木や、20種のバイオームに生成される新構造物「Abandoned Camp（廃キャンプ）」が登場。「26.3 Snapshot 2」（6月30日）では、透過処理を改善する新描画オプション「Improved Transparency」を追加。\n\u003e source: [Minecraft 26.3 Snapshot 2（Minecraft公式）](https://www.minecraft.net/en-us/article/minecraft-26-3-snapshot-2)\n\n#### シャドウバース（Shadowverse: Worlds Beyond）\n第8弾カードパック「クロニクル・オブ・デスティニー」が2026年6月29日17時に実装。シャドウバース10周年（ビヨンド1周年）記念で、初代シャドウバースのオリジナルキャラクターが登場。ローテーション環境Tier1は「ランプドラゴン」「スペルウィッチ」「魔手ウィッチ」「進化ビショップ」。\n\u003e source: [Shadowverse: Worlds Beyond 公式サイト](https://shadowverse-wb.com/ja/)\n\n### 新作リリース（最大3件）\n\n#### R-Type Dimensions III\n- **プラットフォーム / 開発元**：PS5・Switch・Switch2／Granzella（販売：NIS America）\n- **概要**：初代『R-TYPE』『R-TYPE II』を最新技術でリマスターしたシューティングコレクション。2026年7月2日発売。\n- **評価**：Metacritic 70点（PS5）。Steamユーザーレビューは46件中30%が好評（「賛否両論」）。開発元は不具合改善パッチを6月中旬〜7月中旬にかけ順次配信予定と発表。\n\u003e source: [R-Type Dimensions III（Metacritic）](https://www.metacritic.com/game/r-type-dimensions-iii/)\n\n※その他、期間ウィンドウ内（7/4±7日）で確認できた新作は上記1件のみ。他候補（Halo: Campaign Evolved 7/29発売など）はウィンドウ外のため除外。\n\n### 注目セール\n\n#### Steamサマーセール2026\n- **ストア・割引率・期間**：Steam／2026年6月26日2:00〜7月10日2:00\n- **対象**：『モンスターハンターワイルズ』『リトルナイトメア3』『真・三國無双 ORIGINS』『Hades II』『スプリット・フィクション』『No Man\u0027s Sky』ほか\n- **買いな理由**：年内最大級のセールで話題の新作から定番タイトルまで幅広く割引対象。\n\u003e source: [Steamサマーセール2026（ファミ通.com）](https://www.famitsu.com/article/202606/79412)\n\n---\n\n## 🎌 アニメ・ストリーミング\n\n### うちの弟どもがすみません（第1話）\n- **配信**：TOKYO MX、dアニメストア ほか／第1話「ようこそ成田家へ」2026年7月3日24:00放送開始\n- **内容**：母の再婚で4人の弟がいる家庭に入った高校生・糸が、無愛想な長男・源との関係に悩みながら「長女」として奮闘する物語。原作は尾崎晶『別冊マーガレット』連載漫画。\n- **評価**：未評価（放送直後のためFilmarksレビュー未集計）\n\u003e source: [TVアニメ「うちの弟どもがすみません」ON AIR公式](https://uchioto-anime.com/onair/)\n\n### 攻殻機動隊 THE GHOST IN THE SHELL（放送予定）\n※未放送のため「予定」情報として記載\n- **配信**：カンテレ・フジテレビ系\"火アニバル!!\"枠、Prime Videoほか／2026年7月7日（火）23時放送開始\n- **話題性**：制作は『ダンダダン』のサイエンスSARU、脚本は芥川賞作家・円城塔。エンディングテーマはMILLENNIUM PARADEの新曲「Blue」（Saya Gray・Daniel Caesarと共作）で放送前から注目度が高い。\n\u003e source: [攻殻機動隊 THE GHOST IN THE SHELL ON AIR公式](https://www.theghostintheshell-anime.jp/on-air/)\n\n### 無職転生Ⅲ 〜異世界行ったら本気だす〜（放送予定）\n※未放送のため「予定」情報として記載\n- **配信**：地上波各局、dアニメストアほか／2026年7月5日（日）放送開始\n- **話題性**：人気異世界アニメ第3期。日常編からエリスとの結婚までが描かれると予想され、続編を待ち望んだファンの間で期待が高まっている。\n\u003e source: [TVアニメ「無職転生 〜異世界行ったら本気だす〜」公式サイト](https://mushokutensei.jp/)\n\n※dアニメストア／Netflixの週間視聴数ランキング（具体的な数値・順位）は、7/4時点の確定データがソース上で確認できなかったため掲載を見送ります（R2・R4に基づき採用不可の情報は非掲載）。\n\u003e source: [アニメ視聴数ランキング（dアニメストア公式）](https://animestore.docomo.ne.jp/animestore/CR/CR00000014?ranking_type=views\u0026period=annual)\n\n---\n\n**補足**：画像は公式ソースの直リンク検証ができなかったため、R4（画像URL検証）に基づき今回はすべて省略しました。各作品の公式サイトからご確認ください。BLEACH 千年血戦篇-禍進譚-（7/25放送開始）はTODAY±7日の範囲外のため今回は掲載していません。";

</script>
