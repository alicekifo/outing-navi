<style>
:root{--bg:#f5f5f7;--surface:#ffffff;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.16);--accent:#da2029;--blue:#4a90d9;--green:#28a745;--text:#1d1d1f;--text2:rgba(60,60,67,0.75);--r:12px;}

*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;padding:20px 16px 80px;}
.page{max-width:680px;margin:0 auto;}
.hd{display:flex;align-items:center;gap:10px;margin-bottom:26px;flex-wrap:wrap;}

.back-link:hover{color:var(--accent);}
#content h2{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--text2);margin:28px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border2);}
#content h3{font-size:17px;font-weight:700;color:var(--text);margin:18px 0 8px;line-height:1.5;}
#content p{font-size:15px;color:var(--text2);line-height:1.9;margin-bottom:12px;}
#content ul,#content ol{font-size:15px;color:var(--text2);line-height:1.9;padding-left:20px;margin-bottom:12px;}
#content li{margin-bottom:6px;}
#content strong{color:var(--text);font-weight:700;}
#content em{color:var(--accent);font-style:normal;}
#content a{color:var(--blue);text-decoration:none;word-break:break-all;}
#content a:hover{text-decoration:underline;}
#content blockquote{border-left:3px solid var(--accent);padding:10px 16px;background:rgba(218,32,41,0.07);border-radius:0 var(--r) var(--r) 0;margin:12px 0;}
#content blockquote p{color:var(--text);margin:0;}
#content hr{border:none;border-top:1px solid var(--border);margin:20px 0;}
#content table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0 16px;}
#content th{color:var(--text2);font-weight:600;padding:6px 8px;border-bottom:1px solid var(--border2);text-align:left;}
#content td{padding:8px;border-bottom:1px solid var(--border);color:var(--text2);}

<script>
const md = "# マンチェスター・ユナイテッド情報週報\n**集計基準日：2026年6月21日（日）**\n\n---\n\n## 1. 直近の試合結果（6/14〜6/21）\n\n**該当なし** — 現在はプレミアリーグ2025/26シーズン終了後のオフシーズン期間中。この7日間に公式戦・フレンドリーマッチともに試合は行われていない。\n\n---\n\n## 2. 今後の試合予定（プレシーズン）\n\n| 日付 | 対戦相手 | 会場 | 種別 |\n|------|----------|------|------|\n| 7月18日（土） | ヴレクサム | ヘルシンキ（フィンランド） | プレシーズン |\n| 7月24日（金） | ローゼンボリ | トロンハイム（ノルウェー） | プレシーズン |\n| 8月上旬 | アトレティコ・マドリード | ストックホルム（スウェーデン） | プレシーズン |\n| 8月上旬 | パリ・サンジェルマン | ヨーテボリ（スウェーデン） | プレシーズン |\n| 8月上旬 | リーズ・ユナイテッド | ダブリン（アイルランド） | プレシーズン |\n| 8月15日（土） | ACミラン | 未発表 | プレシーズン |\n\n\u003e プレミアリーグ2026/27の開幕日は8月末〜9月初旬の予定。開幕節のフィクスチャーはすでに発表済み。\n\n---\n\n## 3. 移籍情報（夏2026ウィンドウ）\n\n**ウィンドウ開幕日：2026年6月15日（月）**\n\n### ✅ 決定済み（IN）\n| 選手 | 移籍元 | 備考 |\n|------|--------|------|\n| **エデルソン**（MF） | アタランタ（イタリア） | メディカル予定は7月。カゼミーロの後継候補として獲得 |\n\n### ✅ 決定済み（OUT）\n| 選手 | 備考 |\n|------|------|\n| **カゼミーロ**（MF） | 今季終了後の退団を1月に合意。クラブ・本人双方の決断 |\n\n### 🔄 交渉・関心報道（14日以内の報道のみ）\n| 選手 | 移籍元 | 信頼度 |\n|------|--------|--------|\n| タイラー・アダムス（MF） | 未確認 | B |\n| アレックス・スコット（MF） | ノッティンガム・フォレスト | B |\n| マテウス・フェルナンデス（MF） | 未確認 | B |\n\n\u003e ※ノッティンガム・フォレストのエリオット・アンダーソンは関心ありと報じられたが、移籍実現は困難との見方も。\n\n---\n\n## 4. クラブ・監督情報\n\n### 監督体制\n- **マイケル・カリック**が2026年1月にルーベン・アモリムの後任として暫定就任し、その後シーズン終了後に**2年契約で正式就任**。\n- アモリムはユナイテッドで63試合を指揮後に解任。その後、**ACミランの新監督に就任**（3年契約）。アモリムのACミラン行きにより、ユナイテッドは違約金補償の約**1,000万ポンドの節約**が見込まれる。\n- カリックはシーズン終盤にクラブを**チャンピオンズリーグ出場権圏内**に引き上げた功績が評価された。\n\n### クラブ動向\n- 2026/27プレシーズンはヨーロッパ遠征（フィンランド・ノルウェー・スウェーデン・アイルランド）を軸に計画。\n- プレミアリーグ2026/27の日程は公式発表済み。\n\n---\n\n## 5. 今週のポイント総括\n\n1. **オフシーズン中だが移籍市場は活発** — ウィンドウ開幕から1週間、エデルソン獲得が最初の補強として確定。\n2. **監督交代の余波が続く** — アモリムのACミラン就任で一区切り。カリック体制の初の本格的なウィンドウとして注目。\n3. **プレシーズンは7月18日スタート** — 約4週間後にピッチでの活動が本格化。\n\n---\n\nSources:\n- [Summer transfer window officially opens | Manchester United](https://www.manutd.com/en/news/summer-transfer-window-for-2026-official-opens)\n- [Pre-season: Our game-by-game guide | Manchester United](https://www.manutd.com/en/news/game-by-game-united-pre-season-fixture-list-2026)\n- [Official: United\u0027s 2026/27 Premier League fixtures | Manchester United](https://www.manutd.com/en/news/official-united-2026-27-premier-league-fixtures)\n- [Ruben Amorim: AC Milan appoint former Manchester United boss | Sky Sports](https://www.skysports.com/football/news/11095/13553981/ruben-amorim-ac-milan-appoint-former-manchester-united-boss-as-head-coach)\n- [Every Man Utd done deal in the summer 2026 transfer window | TeamTalk](https://www.teamtalk.com/manchester-united/every-completed-man-utd-transfer-summer-2026-signings-exits-loans)\n- [Man Utd transfer news: Tyler Adams, Alex Scott and Mateus Fernandes | Sky Sports](https://www.skysports.com/football/news/11095/13540368/man-utd-transfer-news-tyler-adams-alex-scott-and-mateus-fernandes-emerge-as-possible-signings-as-midfield-plans-ramp-up)\n- [Man Utd pre-season 2026 fixtures | United In Focus](https://www.unitedinfocus.com/news/man-utd-pre-season-2026-fixtures-what-we-know-so-far/)\n- [2026–27 Manchester United F.C. season | Wikipedia](https://en.wikipedia.org/wiki/2026%E2%80%9327_Manchester_United_F.C._season)";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
