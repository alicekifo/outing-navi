<script>
const md = "# ライフスタイル週報｜2026年6月21日号\n\n---\n\n## 🍷 ワイン\n\n### 今週のワインニュース①：ボルドー2025 アン・プリムール「6月リリース第2波」進行中\n\nボルドー2025ヴィンテージのアン・プリムール（先物取引）が6月に入り第2波のリリースラッシュを迎えている。La Mission Haut-Brion・Pichon Lalande（6月2日）、Mouton Rothschild（6月3日）、Haut-Brion（6月9日）と著名シャトーが相次いで価格を公表し、現在も追加リリースが続く。Decanterは2025を「12本の100点満点ワインを生んだ稀有なヴィンテージ」と評価、Wine Searcherは「閉塞感の中の光明」と表現するなど、著名評価誌が軒並み高評価で一致している。\n\n日本への着荷は2027〜2028年見込みで、現在は予約ベースの先行注文フェーズ。価格はリリース直後から動くため、関心銘柄はウォッチリストへ早めに追加を。\n\n- 情報源：[Bordeaux 2025 en primeur: June push｜Decanter](https://www.decanter.com/learn/bordeaux-en-primeur/bordeaux-2025-en-primeur-releases-chateaux-gather-for-june-push-after-stop-start-may/) / [Bordeaux 2025: A Ray of Sunshine｜Wine-Searcher](https://www.wine-searcher.com/m/2026/04/bordeaux-2025-a-ray-of-sunshine-in-the-gloom)（2026年4〜6月）\n\n### 今週のワインニュース②：ブルゴーニュ2026 早期霜で収量減懸念——収穫は8月下旬予測\n\nBurgundy-Reportによると、2026年の霜は例年比で約2週間早い4月10日前後に到来し、発芽直後の新梢にダメージを与えた。現在の生育ステージから8月下旬の収穫が予測されており、収量の減少は避けられない見通し。品質は夏の天候次第だが、2026ブルゴーニュは全体的に希少なヴィンテージとなる可能性が高く、白を中心に注目銘柄の早期完売が想定される。今後の生育レポートを継続してウォッチしたい。\n\n- 情報源：[Vintage 2026 | Burgundy-Report](https://www.burgundy-report.com/category/harvests/vintage-2026/)（2026年）\n\n### おすすめワイン\n\n今週は酒販店ECの在庫・実販売価格とのリアルタイム照合が取れなかったため、特定ボトルの推薦は見送ります（R3：実販売価格の確認を優先）。以下の酒販店ECで今週のPicksをご参照ください。\n\n- [エノテカ公式通販](https://www.enoteca.co.jp/)\n- [信濃屋ネットショップ](https://www.shinanoya-wine.jp/)\n\n### イベント・フェア\n\n※ 6月21日（土）以降に開催が確認できた関東・関西のワインイベントはありませんでした。\n\n（参照：[2026年ワインイベント情報｜ワインリンク](https://wine-link.net/event/result/2026)）\n\n---\n\n## 🍶 日本酒\n\n### 新酒・季節酒情報：夏酒シーズン本番、酒米高騰で定番銘柄が値上げ継続\n\n6月は夏酒のハイシーズン。無濾過生原酒・微発泡スパークリング・低アルコール・淡麗辛口系が各蔵元から続々リリースされ、冷酒でのポテンシャルを最大化したスペックが目立つ。\n\n一方、2026年は酒米価格の高騰が継続しており、獺祭・久保田などの全国区銘柄が揃って価格改定を実施している。コストが上がった定番銘柄と比較すると、地方中小蔵元の個性的な夏酒が相対的にコスパで際立つ状況で、この時期こそ専門店に足を運ぶ価値がある。\n\n- 情報源：[2026年初夏のおすすめ日本酒5選](https://bungo-no-bonjovi.com/top-5-recommended-sakes-for-early-summer-2026/)（2026年）/ [SAKETIME ランキング](https://www.saketime.jp/ranking/)\n\n### 話題の銘柄①：播州一献 純米 夏辛（山陽盃酒造・兵庫県宍粟市）\n\n**特定名称** 純米酒 ／ **テイスト** 夏限定・超辛口\n\n山陽盃酒造の夏限定仕様。名前の通り超辛口でドライなのど越しが最大の特徴で、冷やして注ぐとキレのある辛みとクリーンな後味が際立つ。刺身・天ぷら・焼き鳥（塩）など素材の旨みを引き立てる食中酒として高い評価を得ている。兵庫の小規模蔵ながら全国の地酒専門店に流通しており、夏酒のコスパ優良銘柄として定評がある。\n\n\u003e ※ 精米歩合・酒米・日本酒度の詳細スペックは蔵元公式または購入酒販店にてご確認ください\n\n**購入可能な酒販店**：はせがわ酒店・IMADEYA・地酒専門店（在庫は要確認）\n\n- 情報源：[2026年初夏のおすすめ日本酒5選](https://bungo-no-bonjovi.com/top-5-recommended-sakes-for-early-summer-2026/)\n\n### 話題の銘柄②：手取川 夏 純米辛口（吉田酒造店・石川県白山市）\n\n**特定名称** 純米酒 ／ **醸造** 無濾過原酒・1回火入れ（夏限定）\n\n石川の実力蔵・吉田酒造店の夏限定スペック。無濾過原酒でありながら1回火入れを施すことで、夏場の保存性を確保しつつフレッシュ感を残した設計。ほのかなガス感と爽快な辛口がバランスし、生酒のみずみずしさと安定感を両立している。毎年早々に完売する傾向があるため、見かけたら即確保を推奨する。\n\n\u003e ※ 精米歩合・酒米・酸度は蔵元公式でご確認ください\n\n**購入可能な酒販店**：IMADEYA（EC）・はせがわ酒店・石川県内の日本酒専門店\n\n- 情報源：[2026年初夏のおすすめ日本酒5選](https://bungo-no-bonjovi.com/top-5-recommended-sakes-for-early-summer-2026/)\n\n### イベント・フェア\n\n※ 6月21日以降に開催が確認できた関東・関西の日本酒イベントはありませんでした。\n\n（参考：**日本酒フェア2026** は6月19〜20日・池袋サンシャインシティで開催済み。次回は[日本酒カレンダー](https://nihonshucalendar.com/)をご参照ください）\n\n---\n\n## 📱 ガジェット・テック\n\n### MINISFORUM S5 Flash NAS——オールフラッシュ構成のホームラボ向けコンパクトNAS\n\n| 項目 | スペック |\n|---|---|\n| CPU | Intel Core Series 3（Panther Lake） |\n| ストレージ | M.2 NVMe × 5スロット（PCIe 4.0 x1） |\n| ネットワーク | 10GbE LAN |\n| 拡張 | USB4 |\n| 冷却 | ファンレス |\n\nHDD不要のオールSSD NASというコンセプトが明快。スロットあたりPCIe 4.0 x1なので帯域は限られるが、5本のNVMeを小型筐体に収める密度は現時点でトップクラス。10GbE + USB4の組み合わせにより、高速バックアップ・メディアサーバー・ファイルサーバーの統合構成に対応する。ファンレス設計は防塵と常時稼働の静音性を両立しており、Debian/UbuntuなどのLinuxへの載せ替えでフルコントロール運用も視野に入る。同時発表の **MS-03 ワークステーション** や **M2 Pro ミニPC** も含め、Computex 2026での同社のラインナップ一新は注目に値する。\n\n**価格**：未発表（[MINISFORUM公式](https://minisforum.com/)で要確認）\n\n- 情報源：[Minisforum at Computex 2026｜NAS Compares](https://nascompares.com/news/minisforum-at-computex-2026-the-ms-03-workstation-s5-flash-nas-m2-pro-mini-pc-and-more/) / [Notebookcheck](https://www.notebookcheck.net/Minisforum-unveils-new-compact-NAS-with-Intel-Panther-Lake-and-Intel-Wildcat-Lake-processors.1292462.0.html)（2026年6月初旬）\n\n---\n\n### ⚠️ セキュリティ注意：MINISFORUM N5 Max NAS、OpenClaw脆弱性問題が浮上\n\n同社の別モデル **N5 Max NAS** がNASソフト「OpenClaw」をデフォルトでプリインストールして出荷することが明らかになり、TechRadarおよびセキュリティコミュニティがOpenClawの複数のhigh-severity脆弱性を指摘、懸念の声が上がっている。MINISFORUMのNASを検討・運用している場合は、プリインストールソフトのバージョンと既知CVEを必ず事前確認すること。デフォルト設定でインターネット公開する運用は特に危険であり、初期セットアップ時にOpenClawを別のソフトウェア（TrueNAS / OpenMediaVault等）へ差し替えるか、ファイアウォールで外部アクセスを遮断した上でのローカル運用を推奨する。\n\n- 情報源：[Minisforum N5 Max NAS \u0026 OpenClaw security issues｜TechRadar](https://www.techradar.com/pro/are-we-sure-thats-wise-minisforum-says-its-new-nas-will-come-with-openclaw-pre-installed-despite-multiple-recent-security-issues)（2026年6月）\n\n---\n\n### SPEC CPU 2026 正式公開——約10年ぶりのベンチマークスイート刷新\n\n標準性能評価機構（SPEC）が「SPEC CPU 2026」を正式公開した。前世代のSPEC CPU 2017からコードベースを約2倍に拡張し、9種の新テストを追加。Raspberry Pi 5から AMD/Intel の大規模サーバーまで横断的に評価できる可搬性を重視した設計で、ユーザースペースでの決定論的実行（deterministic, user-space execution）を保証している。\n\n**技術者目線のポイント**: ホームラボ・自作PCの実性能比較基準がほぼ10年ぶりに更新された。AMD EPYC・Intel Xeonの最新スコアが初日から公開されており、次のサーバー投資判断に即使えるベンチマーク。Raspberry Pi 5が初期結果に含まれることで、ARM シングルボードと x86 の性能横断比較が容易になった点はセキュリティ研究・CTF用ベアメタル環境の選定にも応用できる。\n\n- 情報源：[SPEC launches CPU 2026 with Raspberry Pi 5 results｜MSN/SPEC](https://www.msn.com/en-us/news/other/spec-launches-cpu-2026-with-results-from-raspberry-pi-5/gm-GM1CE1E6DC)（2026年6月）";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
