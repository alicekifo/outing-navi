<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nogizaka News - 2026/7/4</title>
<script>(function(){const _t=localStorage.getItem('nexus_theme');if(_t==='dark')document.documentElement.classList.add('dark');else document.documentElement.classList.remove('dark');})()</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f5f7;--surface:#ffffff;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.16);--accent:#e879b0;--blue:#4a90d9;--green:#28a745;--text:#1d1d1f;--text2:rgba(60,60,67,0.75);--r:12px;}
html.dark{--bg:#0c0c10;--surface:#161620;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.15);--blue:#6aadff;--green:#52d68a;--text:#e8e8f0;--text2:#a8a8c8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;padding:20px 16px 80px;}
.page{max-width:680px;margin:0 auto;}
.hd{display:flex;align-items:center;gap:10px;margin-bottom:26px;flex-wrap:wrap;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.logo em{color:var(--accent);font-style:normal;}
.hd-date{font-size:12px;color:var(--text2);margin-right:auto;}
.back-link{font-size:11px;color:var(--text2);text-decoration:none;}
.back-link:hover{color:var(--accent);}
#content h2{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--text2);margin:28px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border2);}
#content h3{font-size:17px;font-weight:700;color:var(--text);margin:18px 0 8px;line-height:1.5;}
#content p{font-size:15px;color:var(--text2);line-height:1.9;margin-bottom:12px;}
#content ul,#content ol{font-size:15px;color:var(--text2);line-height:1.9;padding-left:20px;margin-bottom:12px;}
#content li{margin-bottom:6px;}
#content strong{color:var(--text);font-weight:700;}
#content em{color:var(--accent);font-style:normal;}
#content a{color:var(--blue);text-decoration:none;word-break:break-all;}
#content a:hover{text-decoration:underline;}
#content blockquote{border-left:3px solid var(--accent);padding:10px 16px;background:rgba(232,121,176,0.07);border-radius:0 var(--r) var(--r) 0;margin:12px 0;}
#content blockquote p{color:var(--text);margin:0;}
#content hr{border:none;border-top:1px solid var(--border);margin:20px 0;}
#content img{width:100%;max-height:240px;object-fit:cover;border-radius:var(--r);margin:8px 0 12px;display:block;}
#content table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0 16px;}
#content th{color:var(--text2);font-weight:600;padding:6px 8px;border-bottom:1px solid var(--border2);text-align:left;}
#content td{padding:8px;border-bottom:1px solid var(--border);color:var(--text2);}
</style>
</head>
<body>
<div class="page">
<div class="hd">
  <div class="logo">&#x1F3A4; <em>Nogizaka</em></div>
  <div class="hd-date">更新 2026/7/4<span id="hd-today"></span></div>
  <a class="back-link" href="./index.html">&larr; Hub</a>
</div>
<div id="content"></div>
</div>
<script>
const md = "レポートを `Vault\\news\\nogizaka\\2026-07-04.md` に保存しました。今週（6/28〜7/4）の主なトピック:\n\n- **42ndシングル「是非に及ばず」MV公開**（6/28）— 一ノ瀬美空（5期生）初の表題センター\n- **井上和（5期生）**、『トイ・ストーリー5』日本版声優＆TIF2026三代目チェアマン就任\n- **金川紗耶（5期生）** 1st写真集発売（6/30）\n- **真夏の全国ツアー2026 北海道公演**が本日7/4開幕\n- 卒業・加入の新規公式発表は今週なし\n\nMVの再生回数やオリコンチャート順位はA級以上の信頼できるソースで確認が取れなかったため（ファンブログ由来の数値のみ）、ルールに従って掲載を見送りました。";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
<script>(function(){var t=new Date();var el=document.getElementById('hd-today');if(el)el.textContent=' · 今日 '+(t.getMonth()+1)+'/'+(t.getDate());}());</script>
<script src="./date-picker.js"></script>
</body>
</html>
