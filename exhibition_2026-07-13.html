<script>
const md = "# 美術展・特別展ニュース（2026-07-13）\n\n## 🔔 今週のチケット発売\n\n### フェルメール《真珠の耳飾りの少女》展 通常券・一般抽選受付開始（大阪中之島美術館）\n![フェルメール《真珠の耳飾りの少女》](https://upload.wikimedia.org/wikipedia/commons/0/0f/1665_Girl_with_a_Pearl_Earring.jpg)\n- **受付開始**: 2026年7月14日（火）12:00 〜 7月21日（火）12:00（チケットぴあ一般抽選）\n- 価格: 一般3,000円／高大生1,500円／小中生500円（日時指定・全会期分を抽選販売）\n- 販売チャネル: チケットぴあのみ。**先着販売は中止され全て抽選方式に統一、当日券なし**\n- 公式: https://vermeer2026.exhibit.jp/tickets/\n\u003e source: [フェルメール《真珠の耳飾りの少女》展 公式チケットページ](https://vermeer2026.exhibit.jp/tickets/)\n\n※その他、TODAY±7日以内に発売開始となる主要展のチケットは該当なし（ターナー展前売は9月上旬開始予定、大英博物館展前売は6/25開始済み）\n\n## 🎨 関東の展覧会\n\n### 現在開催中\n\n### エリック・カール展 はじまりは、はらぺこあおむし\n- 東京都現代美術館（清澄白河駅）\n- 会期: 2026-04-25 〜 2026-07-26 ⚠️**まもなく終了**\n- 一般 2,300円\n- 『はらぺこあおむし』の絵本作家エリック・カールの大規模回顧展\n- **見どころ**: 会期残り2週間弱。コラージュ原画の色彩を実物で見る最後の機会\n\u003e source: [エリック・カール展 公式サイト](https://ericcarle2026-27.jp/)\n\n### ルーシー・リー展 ―東西をつなぐ優美のうつわ―\n- 東京都庭園美術館（白金台駅）\n- 会期: 2026-07-04 〜 2026-09-13\n- 一般 1,400円（日時指定予約制）\n- 20世紀を代表する英国の陶芸家ルーシー・リーの国内約10年ぶりの回顧展\n- **見どころ**: アール・デコの旧朝香宮邸空間と繊細なうつわの相性が抜群\n\u003e source: [東京都庭園美術館 公式](https://www.teien-art-museum.ne.jp/en/exhibition/lucie-rie/)\n\n### 版画家レンブラント 挑戦、継承、インパクト\n![レンブラント自画像](https://upload.wikimedia.org/wikipedia/commons/b/bd/Rembrandt_van_Rijn_-_Self-Portrait_-_Google_Art_Project.jpg)\n- 国立西洋美術館（上野駅）\n- 会期: 2026-07-07 〜 2026-09-23\n- 一般 2,200円\n- 「画家」ではなく「版画家」としてのレンブラントに焦点を当てる企画展\n- **見どころ**: エッチングの明暗表現を軸に据えた切り口は国内では稀少\n\u003e source: [国立西洋美術館 公式](https://www.nmwa.go.jp/jp/exhibitions/2026rembrandt.html)\n\n### ロン・ミュエク展\n- 森美術館（六本木駅）\n- 会期: 2026-04-29 〜 2026-09-23\n- 一般 平日2,300円／土日休2,500円（オンラインは各200円引・日時指定制）\n- 超リアルな巨大人体彫刻で知られるロン・ミュエクの18年ぶり日本個展\n- **見どころ**: 寡作の作家の全49作品中11作品が集結。会期後半は混雑必至、夏のうちに\n\u003e source: [森美術館 公式](https://www.mori.art.museum/jp/exhibitions/ronmueck/)\n\n### 間もなく開始\n\n### 弘法大師生誕1250年記念 特別展「空海と真言の名宝」\n- 東京国立博物館 平成館（上野駅）\n- 会期: 2026-07-14 〜 2026-09-06（前期〜8/9・後期8/11〜）\n- 一般 2,300円\n- 真言宗十八本山等の寺宝88件（国宝15件・重要文化財60件）が一堂に会す\n- **見どころ**: 国宝「信貴山縁起絵巻」に加え、通常拝観できない秘仏9体を特別公開\n\u003e source: [特別展「空海と真言の名宝」公式サイト](https://tsumugu.yomiuri.co.jp/kukai2026/)\n\n### 東京都美術館開館100周年記念 大英博物館日本美術コレクション 百花繚乱〜海を越えた江戸絵画\n- 東京都美術館（上野駅）\n- 会期: 2026-07-25 〜 2026-10-18\n- 一般 2,300円（前売2,100円・7/24まで販売）\n- 大英博物館が所蔵する日本美術の里帰り展。江戸絵画を中心に名品が集結\n- **見どころ**: 海を渡ったまま日本で見る機会のなかった作品群を都美100周年の節目に公開\n\u003e source: [大英博物館日本美術コレクション展 公式](https://daiei-ten2026.exhibit.jp/)\n\n### ルーヴル美術館展 ルネサンス\n- 国立新美術館（乃木坂駅）\n- 会期: 2026-09-09 〜 2026-12-13\n- 一般 当日2,400円／前売2,200円（前売は6/18〜9/8販売中）\n- ルーヴルの膨大なコレクションからルネサンス美術の精華50点余を厳選\n- **見どころ**: レオナルド・ダ・ヴィンチ《美しきフェロニエール》が初来日\n\u003e source: [国立新美術館 公式](https://www.nact.jp/exhibition_special/2026/louvre2026/)\n\n### マリメッコ展（東京巡回）\n- 東京都庭園美術館（白金台駅）\n- 会期: 2026-10-03 〜 2026-12-20\n- 入場料未発表\n- 京都文化博物館から巡回。《ウニッコ》等のファブリックとドレス約70点\n- **見どころ**: 邸宅美術館の空間で見るテキスタイルは京都会場と別物の体験になる\n\u003e source: [Tokyo Art Beat 2026年下半期東京展覧会特集](https://www.tokyoartbeat.com/articles/-/recommended-exhibitions-tokyo-in-2026-202606)\n\n## 🏯 関西の展覧会\n\n### 現在開催中\n\n### マリメッコ展 模様のちから\n- 京都文化博物館（烏丸御池駅）\n- 会期: 2026-07-04 〜 2026-09-06\n- 一般 2,000円\n- フィンランドの人気ブランド、マリメッコのプリントデザインの力を読み解く展覧会\n- **見どころ**: 《ウニッコ》などのドレス約70点＋ファブリックを一挙展示\n\u003e source: [京都文化博物館 公式](https://www.bunpaku.or.jp/exhi_special_post/20260704-0906/)\n\n### 大阪市立美術館開館90周年記念特別展 水滸伝\n- 大阪市立美術館（天王寺駅）\n- 会期: 2026-07-11 〜 2026-09-06\n- 一般 2,000円\n- 中国の伝奇小説「水滸伝」をめぐる美術を集めた開館90周年記念展\n- **見どころ**: 国芳の武者絵から中国絵画まで、水滸伝人気の系譜を横断する珍しい企画\n\u003e source: [大阪市立美術館 公式](https://www.osaka-art-museum.jp/special_exhibition/8301)\n\n### ゴッホの跳ね橋と印象派の画家たち ヴァルラフ＝リヒャルツ美術館所蔵\n- あべのハルカス美術館（天王寺駅・大阪阿部野橋駅）\n- 会期: 2026-07-04 〜 2026-09-09\n- 一般 2,100円\n- 独ケルンの名門美術館からゴッホ、モネ、ルノワールら42作家70点が来日\n- **見どころ**: 表題作ゴッホ《跳ね橋》をはじめ、印象派の優品を天王寺で堪能できる\n\u003e source: [あべのハルカス美術館 公式](https://www.aham.jp/exhibition/future/wallraf/)\n\n### 特別展 ゴールドマン コレクション 河鍋暁斎の世界\n- 神戸市立博物館（三宮駅）\n- 会期: 2026-07-11 〜 2026-09-23（前期・後期で展示替え）\n- 一般 2,000円\n- 世界最大級の暁斎コレクション、米ゴールドマン・コレクションの大規模展\n- **見どころ**: 出品作の半数超が日本初公開。「画鬼」の奇想を浴びるならこれ\n\u003e source: [神戸市立博物館 公式](https://www.kobecitymuseum.jp/exhibition/detail?exhibition=396)\n\n### スイス絵画の異才 カール・ヴァルザー\n- 大阪中之島美術館（渡辺橋駅・肥後橋駅）\n- 会期: 2026-07-04 〜 2026-09-27\n- 一般 1,800円\n- 明治日本にも滞在したスイスの画家ヴァルザー初の大回顧展、約150点を日本初公開\n- **見どころ**: 幻想的な舞台美術と明治日本のスケッチ——知られざる作家を発掘する楽しみ\n\u003e source: [大阪中之島美術館 公式](https://nakka-art.jp/exhibition-post/karlwalser-2026/)\n\n### 間もなく開始\n\n### ボストン美術館共同企画 特別展「南都仏画―よみがえる奈良天平の美―」\n- 奈良国立博物館（近鉄奈良駅）\n- 会期: 2026-07-18 〜 2026-09-13\n- 一般 2,200円（前売2,000円・7/17まで販売）\n- ボストン美術館と奈良博、仏画2大コレクションが揃う国際共同企画\n- **見どころ**: 約20年構想の末の実現。ボストン所蔵の名品が一挙里帰りする歴史的機会\n\u003e source: [特別展「南都仏画」公式サイト](https://nantobutsuga2026.exhibit.jp/)\n\n### 浮世絵スーパークリエイター 歌川国芳展\n![歌川国芳「相馬の古内裏」](https://upload.wikimedia.org/wikipedia/commons/3/3a/Mitsukuni_defying_the_skeleton_spectre_invoked_by_princess_Takiyasha.jpg)\n- 京都市京セラ美術館（東山駅）\n- 会期: 2026-07-18 〜 2026-09-23\n- 一般 1,900円\n- 「奇想の絵師」国芳の武者絵・戯画・妖怪画など約200点\n- **見どころ**: 《相馬の古内裏》のがしゃどくろ等、現代のポップカルチャーに直結する画力\n\u003e source: [京都市京セラ美術館 公式](https://kyotocity-kyocera.museum/en/exhibition/20260718-20260923)\n\n### フェルメール《真珠の耳飾りの少女》展\n- 大阪中之島美術館（渡辺橋駅・肥後橋駅）\n- 会期: 2026-08-21 〜 2026-09-27（会期中無休）\n- 一般 3,000円（日時指定・抽選制）\n- マウリッツハイス美術館所蔵の《真珠の耳飾りの少女》が14年ぶりに来日\n- **見どころ**: 17世紀オランダ絵画の名品とともに、あの視線を大阪で\n\u003e source: [フェルメール《真珠の耳飾りの少女》展 公式](https://vermeer2026.exhibit.jp/)\n\n### 特別展 源氏物語 王朝のかがやき\n- 京都国立博物館（七条駅）\n- 会期: 2026-10-06 〜 2026-11-29\n- 入場料未発表\n- 源氏物語を主題とする美術を集めた秋の特別展\n- **見どころ**: 物語の舞台・京都で見る源氏絵。秋の京都観光と組み合わせやすい\n\u003e source: [Tokyo Art Beat 2026年下半期関西展覧会特集](https://www.tokyoartbeat.com/articles/-/recommended-exhibitions-in-west-japan-in-2026-202606)\n\n## ✨ 注目ピックアップ\n\n### 1. 特別展「空海と真言の名宝」（東京国立博物館・7/14開幕）\n真言宗十八本山および関係寺院の寺宝88件が集まり、うち国宝15件・重要文化財60件という異例の密度。国宝「信貴山縁起絵巻」「五大尊像」「金銅錫杖頭」「五智如来坐像」に加え、約40体の仏像が平成館に並ぶ。最大の目玉は通常公開されない秘仏9体の特別公開で、各寺院に足を運んでも拝観できないものを一会場で見られる機会は弘法大師生誕1250年の今回を逃すと当分ない。仏教美術ファンはもちろん、彫刻の造形力を浴びたい人にも刺さる。\n\u003e source: [美術展ナビ プレビュー記事](https://artexhibition.jp/topics/news/20260520-AEJ2907137/)\n\n### 2. フェルメール《真珠の耳飾りの少女》展（大阪中之島美術館・8/21開幕）\nマウリッツハイス美術館の至宝《真珠の耳飾りの少女》が2012年以来14年ぶりに来日し、17世紀オランダ絵画の名品とともに展示される。同館の貸出方針は年々厳格化しており、報道でも「最後になるかも」と言われる貸出——今後日本で見られる保証はない。チケットは全会期抽選制（当日券なし）で、**明日7/14 12:00からチケットぴあで一般抽選受付が始まる**ため、行くなら今週の申込が必須。西洋絵画の「一枚看板」型展覧会が好きな人、2012年を見逃した人へ。\n\u003e source: [フェルメール《真珠の耳飾りの少女》展 公式](https://vermeer2026.exhibit.jp/)\n\n### 3. 特別展「南都仏画―よみがえる奈良天平の美―」（奈良国立博物館・7/18開幕）\n明治期に海を渡ったボストン美術館の仏画コレクションと、奈良博の仏画コレクションという世界2大コレクションが史上初めて揃う共同企画で、構想約20年を経ての実現。国宝 十一面観音像（展示は7/18〜8/16の期間限定）など、展示替えを挟みつつ名品が入れ替わる。ボストンの里帰り品は保存状態の良さで知られ、日本に残っていれば国宝級とされる作品を含む——次にまとまって里帰りする機会は数十年単位でないと考えていい。仏教美術・奈良好きには今夏の本命。\n\u003e source: [特別展「南都仏画」公式サイト](https://nantobutsuga2026.exhibit.jp/)";

const WL_KEY = 'exhibition_watchlist';
function loadWatchlist() {
  return JSON.parse(localStorage.getItem(WL_KEY) || '[]');
}
function saveWatchlist(list) {
  localStorage.setItem(WL_KEY, JSON.stringify(list));
}
function renderWatchlist() {
  const list = loadWatchlist();
  const bar = document.getElementById('watchlist-bar');
  const container = document.getElementById('watchlist-items');
  if (!list.length) { bar.classList.remove('has-items'); return; }
  bar.classList.add('has-items');
  container.innerHTML = list.map((item, i) => {
    const daysLeft = item.saleDate ? Math.ceil((new Date(item.saleDate) - new Date()) / 86400000) : null;
    const saleTxt = daysLeft !== null
      ? (daysLeft <= 0 ? '&#x767A;&#x58F2;&#x4E2D;' : daysLeft + '&#x65E5;&#x5F8C;&#x767A;&#x58F2;')
      : '';
    return '<div class="watchlist-item"><span>' + item.name + '</span><span><span class="sale-date">' + saleTxt + '</span><button class="remove-btn" onclick="removeWatch(' + i + ')">&#x2715;</button></span></div>';
  }).join('');
}
function removeWatch(i) {
  const list = loadWatchlist();
  list.splice(i, 1);
  saveWatchlist(list);
  renderWatchlist();
}
function addToWatchlist(name, saleDate) {
  const list = loadWatchlist();
  if (list.find(x => x.name === name)) { alert('&#x767B;&#x9332;&#x6E08;&#x307F;&#x3067;&#x3059;'); return; }
  list.push({ name, saleDate: saleDate || null, addedAt: new Date().toISOString() });
  saveWatchlist(list);
  renderWatchlist();
  checkSaleNotifications();
}
function checkSaleNotifications() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const today = new Date().toDateString();
  loadWatchlist().forEach(item => {
    if (item.saleDate && new Date(item.saleDate).toDateString() === today) {
      new Notification('&#x1F3AB; &#x30C1;&#x30B1;&#x30C3;&#x30C8;&#x767A;&#x58F2;&#x65E5;&#xFF01;', {
        body: item.name + ' &#x306E;&#x30C1;&#x30B1;&#x30C3;&#x30C8;&#x304C;&#x672C;&#x65E5;&#x767A;&#x58F2;&#x3067;&#x3059;',
        icon: '/favicon.ico'
      });
    }
  });
}

// inject watch buttons after h3 tags in content
document.querySelectorAll('#content h3').forEach(h3 => {
  const name = h3.textContent.trim();
  const btn = document.createElement('button');
  btn.className = 'watch-btn';
  btn.innerHTML = '&#x2B50; &#x30A6;&#x30A9;&#x30C3;&#x30C1;';
  btn.onclick = () => {
    const dateMatch = h3.nextElementSibling ? h3.nextElementSibling.textContent.match(/\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}/) : null;
    addToWatchlist(name, dateMatch ? dateMatch[0].replace(/\//g, '-') : null);
  };
  h3.appendChild(btn);
});

if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}
renderWatchlist();
checkSaleNotifications();
</script>
