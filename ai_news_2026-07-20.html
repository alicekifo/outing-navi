<script>
const md = "## 🤖 今週のAI最新動向\n\n### 1. Moonshot AIが2.8兆パラメータの「Kimi K3」を発表——オープンウェイト史上最大級\n\n中国Moonshot AIが7月16日、フラッグシップモデル「Kimi K3」を発表した。総パラメータ2.8兆のスパースMoE構成で、100万トークンコンテキスト・ネイティブビジョン対応。API価格は入力$3/100万トークン・出力$15/100万トークン。\n\n重要なのは7月27日までにオープンウェイト公開を予告している点で、実現すれば公開ウェイトとして史上最大のモデルになる。Frontend Code Arenaでは1,679ポイントで首位を獲得し、Claude Fable 5（1,631）やGPT-5.6 Sol（1,618）を上回った（前世代K2.6の18位から17ランクの跳躍）。ただし総合ベンチの多くは自己申告で、Artificial AnalysisのIntelligence Indexでは57.11とOpus 4.8・GPT-5.5と同水準、Fable 5とGPT-5.6 Solには届かないという評価。米国の計算資源規制下でこの規模を出してきたこと自体が、規制の実効性への問いになっている。\n\n出典: [Moonshot AI公式ブログ](https://www.kimi.com/blog/kimi-k3) (2026-07-16公開) / [Tom\u0027s Hardware](https://www.tomshardware.com/tech-industry/artificial-intelligence/moonshot-releases-2-8-trillion-parameter-kimi-k3)\n\u003e source: https://www.kimi.com/blog/kimi-k3\n\n### 2. Thinking Machinesが初のオープンウェイトモデル「Inkling」を公開\n\nMira Murati率いるThinking Machines Labが7月15日、同社初のオープンウェイトモデル「Inkling」をApache 2.0ライセンスで公開した。総パラメータ975B・アクティブ41BのMoEで、100万トークンコンテキスト、テキスト・画像・音声・動画45兆トークンで事前学習したネイティブマルチモーダル。\n\n「汎用巨大モデル1本」に対する「ファインチューニング前提のカスタムモデル」という同社の戦略の初の実弾で、重みはHugging Faceで無償公開、APIは自社のTinkerに加えDatabricks・Together・Fireworks・Modal・Basetenから提供される。アクティブ12Bの軽量版「Inkling-Small」もプレビュー中。評価額が先行していた同社がようやく出した最初の製品として、オープンウェイト陣営の層を一気に厚くする一手。\n\n出典: [Thinking Machines Lab公式](https://thinkingmachines.ai/news/introducing-inkling/) (2026-07-15公開) / [TechCrunch](https://techcrunch.com/2026/07/15/thinking-machines-amps-up-its-bet-against-one-size-fits-all-ai-with-its-first-open-model-inkling/)\n\u003e source: https://thinkingmachines.ai/news/introducing-inkling/\n\n### 3. PrismML「Bonsai 27B」——27BクラスをiPhoneに載せる1bit量子化\n\nPrismMLが7月14日、27Bクラスとして初めてスマホ上でローカル動作するマルチモーダルモデル「Bonsai 27B」を発表した。Qwen3.6 27BベースでApache 2.0公開。三値{−1,0,+1}重み＋FP16グループスケーリングの「Ternary版」（実効1.71bit/重み）と、二値{−1,+1}の「1-bit版」（実効1.125bit/重み）の2種で、後者はフットプリント3.9GB、iPhone 17 Pro上で11トークン/秒を実測。\n\n262Kトークンコンテキストと投機的デコーディング対応を維持したまま、多段推論・構造化ツールコール・ビジョン（4bit量子化のvision tower同梱）までこなすのが売り。llama.cpp系のローカルLLM運用をやっている人間には、「ポスト2bit」の量子化がベンチの上だけでなく製品として降りてきた最初の例として要注目。\n\n出典: [PrismML公式ブログ](https://prismml.com/news/bonsai-27b) (2026-07-14公開) / [9to5Mac](https://9to5mac.com/2026/07/14/prismml-releases-bonsai-27b-claiming-first-major-ai-model-of-its-size-fit-for-iphone/)\n\u003e source: https://prismml.com/news/bonsai-27b\n\n### 4. TSMC Q2決算が過去最高——AI需要でHPCがウェハ収益の66%に\n\nTSMCが7月16日発表した2026年Q2決算は、売上高$40.2B（前年比+36%）、純利益NT$7,065.6億（同+77.4%）でともに四半期過去最高。粗利率は67.7%。AIアクセラレータを含むHPCセグメントが前四半期比+20%と急伸し、ウェハ収益の66%を占めた（2022年まで首位だったスマホは22%に低下）。\n\n通期の売上成長見通しを40%超に引き上げ、2026年のcapexを$60〜64Bに設定、アリゾナ拠点への追加$100B投資も発表した。GPU供給の川上がこの数字ということは、学習・推論インフラの拡張競争は少なくとも来年まで冷えないという読みが裏付けられた形。AIバブル論への現時点で最も強い反証データでもある。\n\n出典: [Yahoo Finance](https://finance.yahoo.com/technology/articles/tsmc-q2-revenue-jumps-36-053756945.html) (2026-07-16公開)\n\u003e source: TSMC 2026年Q2決算発表（https://finance.yahoo.com/technology/articles/tsmc-q2-revenue-jumps-36-053756945.html）\n\n## 📄 今週の注目論文\n\n### 1. エージェントがエージェントをハックする（Agent Hacks Agent: Autoresearch for Production-Agent Red-Teaming）\n\n- 第1著者: Xutao Mao（所属は論文参照）・arXiv:2607.11698・2026-07-13投稿\n- **Problem**: Claude CodeやCodexのような本番コーディングエージェントは信頼できないファイル・コマンド・ワークスペース状態の上で動くが、既存の自動レッドチーミングは個々の攻撃成功を記録するだけで、背後にある脆弱性の「構造」を捉えない\n- **Method**: エージェント自身に脆弱性研究をやらせる「AHA」——仮説提案→反証器構築→サンドボックス内で攻撃実行→軌跡の反省→脆弱性コンセプトグラフ（VCG）への昇格、という反証可能な発見ループ\n- **Finding**: Claude Code・Codexで検証し、発見した脆弱性コンセプトはモデル間・シナリオ間・攻撃チャネル間で転移。凍結したVCGを使った攻撃は従来手法を14.2ポイント上回った\n\n**読みどころ**: 攻撃側の自動化が「個別エクスプロイトの量産」から「再利用可能な脆弱性知識の蒸留」に進んだのが本質。ペネトレーションテストの世界でいうExploit-DBからATT\u0026CKフレームワークへの進化を、エージェント経由で自動化した形。自分のCLIエージェント環境の脅威モデルを見直す材料として一級。\n\n出典: [arXiv](https://arxiv.org/abs/2607.11698) (2026-07-13公開)\n\u003e source: https://arxiv.org/abs/2607.11698\n\n### 2. エージェントデータ注入攻撃は現実の脅威である（Agent Data Injection Attacks are Realistic Threats to AI Agents）\n\n- 第1著者: Woohyuk Choi（所属は論文参照）・arXiv:2607.05120・2026-07-06投稿\n- **Problem**: 従来研究は「命令（インストラクション）注入」に集中しており、悪意あるペイロードをメタデータや文脈情報に偽装して混入させる「データ注入（ADI）」が見落とされている\n- **Method**: Claude in Chrome・Claude Code・Gemini CLIなど実運用エージェントを対象に、ADI攻撃面を体系的に分析・実証\n- **Finding**: 任意クリック誘導からリモートコード実行まで複数の重大脆弱性を確認。根本原因は「現行エージェントが信頼データと非信頼データを分離していない」という設計レベルの欠落\n\n**読みどころ**: 「命令っぽい文を検知する」型のプロンプトインジェクション対策が構造的にすり抜けられることを示した点が痛い。防御の主戦場が入力フィルタリングからアーキテクチャ（データの出所ラベリングと権限分離)に移ることを示唆していて、セキュリティ設計者ほど刺さる内容。\n\n出典: [arXiv](https://arxiv.org/abs/2607.05120) (2026-07-06公開)\n\u003e source: https://arxiv.org/abs/2607.05120\n\n### 3. 等価性の幻想：LLM量子化効果の統計的特性評価（The Illusion of Equivalency: Statistical Characterization of Quantization Effects in LLMs）\n\n- 第1著者: Baha Rababah（所属は論文参照）・arXiv:2607.08734・2026-07-09投稿\n- **Problem**: 量子化モデルは精度・パープレキシティが元モデルと同等でも「同じモデル」といえるのか——従来指標はこの問いに答えていない\n- **Method**: 元モデルと量子化モデルの予測一致度を測る「correctness agreement」指標を提案し、8bit〜2bitの量子化スキームで層ごとの歪みを統計的に分析\n- **Finding**: 集計スコアが保たれていても応答挙動は有意に発散する。Attention重みではQuery/KeyプロジェクションがValue/Outputより量子化に敏感で、低bit側には非線形な分岐点が存在する\n\n**読みどころ**: GGUFの量子化バリアントを「ベンチがほぼ同じだから」で選んでいる全ローカルLLM運用者への警告。同じMMLUスコアでも「どの問題を間違えるか」が入れ替わっているなら、検証済みワークフローの量子化版への差し替えは回帰テストなしにやってはいけない、という実務直結の話。Bonsai 27Bのような超低bitモデルを評価する際の必読フレームでもある。\n\n出典: [arXiv](https://arxiv.org/abs/2607.08734) (2026-07-09公開)\n\u003e source: https://arxiv.org/abs/2607.08734\n\n## 💡 今週のひとことインサイト\n\n### 1. エージェントのセキュリティは、OSが50年前に通った道を逆走している\n\n今週のADI論文が突きつけた「現行エージェントは信頼データと非信頼データを分離していない」という一文は、Unixセキュリティの目で見ると既視感しかない。制御とデータが同じチャネルを流れると乗っ取られる——電話網のブルーボックスから、スタックに命令を積むバッファオーバーフローまで、in-band signalingの failure は計算機史で何度も繰り返されてきた。OSはそれを特権分離・W^X・taint trackingという「アーキテクチャ」で解いたのに、LLMエージェントはプロンプトという単一チャネルに命令もWebページも実行結果も全部混ぜて流している。入力フィルタで命令注入を検知する現行の防御は、いわばシグネチャ型アンチウイルスの再発明であり、AHA論文が示した攻撃知識の自動蒸留の前では消耗戦にしかならない。次の勝負所は、モデルの賢さではなくデータの出所を型として持つ実行環境の設計——つまりLinux屋・セキュリティ屋が一番得意な領域だと思う。\n\n\u003e source: https://arxiv.org/abs/2607.05120 / https://arxiv.org/abs/2607.11698";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
