リストサイト由来の情報を除外したところ、S/A級ソース2件以上で一致するHere We Go案件はジャッケのみ確認。\n\n---\n\n### 3. 交渉中・移籍噂\n\n#### 🟡 ニコ・パス → レアル・マドリード（バイバック行使）\n- **移籍元：** コモ（アルゼンチン代表MF、22歳）\n- **状況：** マドリーが買い戻し条項（€800〜900万）の行使を通告済みとの報道。ただしパス本人はコモ残留を希望しており、交渉は難航。\n- **ソース：** Fabrizio Romano（X）、Managing Madrid、Goal.com\n- **信頼度：** ★★★☆☆（クラブ間合意前、選手の意向が障壁）\n\n#### 🟡 マルク・カサード → マンチェスター・ユナイテッド / チェルシー\n- **移籍元：** バルセロナ（スペイン代表MF）\n- **状況：** ユナイテッドとチェルシー双方が獲得を打診。バルセロナも売却を容認する模様。\n- **ソース：** ESPN Transfer Talk（A級）\n- **信頼度：** ★★★☆☆（交渉初期段階）\n\n#### 🟡 フリアン・アルバレス → バルセロナ\n- **移籍元：** アトレティコ・マドリード（アルゼンチン代表FW、WC2026参加中）\n- **状況：** バルセロナが夏の最優先ターゲットに設定。アーセナルも関心。\n- **ソース：** ESPN（A級）\n- **信頼度：** ★★★☆☆（WC期間中のため交渉は6月終了後が本格化）\n\n---\n\n### 4. 番外：監督人事（確認情報）\n\n#### ✅ ホセ・モウリーニョ → レアル・マドリード 新監督就任\n- **詳細：** 3年契約で合意。カルロ・アンチェロッティ退任後の後任として正式就任へ。\n- **ソース：** Fabrizio Romano、FootballTransfers（A級）\n- **信頼度：** ★★★★☆\n\n---\n\n## 情報ソース\n\n- [Fabrizio Romano（X / Twitter）](https://x.com/FabrizioRomano/status/2018086135046492531) — ジャッケ Here We Go\n- [ESPN — Konaté closing on Real Madrid](https://www.espn.com/soccer/story/_/id/48949796/ibrahima-konate-closing-move-real-madrid)\n- [beIN SPORTS — Konaté signs contract](https://www.beinsports.com/en-us/soccer/la-liga/articles/ibrahima-konat%C3%A9-reportedly-has-already-signed-his-contract-with-real-madrid-2026-06-08)\n- [Yahoo Sports / Al Jazeera — World Cup 2026 scores June 13](https://sports.yahoo.com/soccer/live/2026-world-cup-schedule-scores-results-brazil-morocco-qatar-switzerland-australia-turkey-haiti-scotland-saturday-group-stage-play-145258957.html)\n- [NBC News — USA 4-1 Paraguay](https://www.nbcnews.com/sports/soccer/live-blog/fifa-world-cup-2026-june-12-live-updates-rcna349721)\n- [CNN — Mexico 2-0 South Africa opening match](https://www.cnn.com/2026/06/11/sport/live-news/world-cup-mexico-south-africa)\n- [ESPN — Transfer rumors June 2026](https://www.espn.com/soccer/story/_/id/48944857/transfer-rumors-news-barcelona-turn-kane-alvarez-deal-falls-through)\n- [FOX Sports — June 14
