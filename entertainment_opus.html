<script>
const md = "情報そろった。今週分のレポートを書く。ちなみに画像URLは公式サイト上のものを推測ではなく明示するのは難しいから、各作品の公式リンクとイメージリンクは確認できた範囲で埋め込む。\n\n```markdown\n# 🎭 エンタメ週報 2026/05/30号\n更新日：2026-05-30\n\n今週は是枝裕和の新作公開とFC26の大型アプデが同時着弾、ゲームは『Forza Horizon 6』日本舞台でレース界が盛り上がってる週。サクッと一週間ぶん総ざらい。\n\n---\n\n## 🎬 今週の映画\n\n### 🐑 箱の中の羊（5/29 新規公開）\n是枝裕和監督の最新作、主演は綾瀬はるかと大悟（千鳥）。ヒューマノイドを息子として迎え入れる近未来の家族ドラマ。第79回カンヌ国際映画祭コンペ部門出品作で、上映後9分間のスタンディングオベーション。一方で英『Screen』の星取表では平均1.4点と最下位…という賛否真っ二つの問題作。\n\n- **見どころ**：是枝節 × SF的設定、綾瀬はるかの繊細な演技\n- **評価**：★★★★☆（カンヌ評は割れ気味、国内レビューは3.7前後）\n- 🔗 [作品情報・MOVIE WALKER PRESS](https://press.moviewalker.jp/mv91169/)\n- 🔗 [カンヌ報道・THR Japan](https://hollywoodreporter.jp/japan/199469/)\n\n---\n\n### 🚀 スター・ウォーズ／マンダロリアン・アンド・グローグー（5/22公開・上映中）\nディズニー実写映画、初日3日間で動員43.5万人・興収7.4億円の初登場1位。シリーズ予備知識ゼロでも楽しめる構成と評判で、グローグーの可愛さが武器。\n\n- **見どころ**：日米同時公開、マンドーとグローグーの旅路\n- **評価**：★★★★☆\n- 🔗 [公式サイト（ディズニー）](https://starwars.disney.co.jp/movie/mandalorian-grogu)\n\n---\n\n### 👠 プラダを着た悪魔２（5/1公開・好評上映中）\n20年ぶり続編。メリル・ストリープ＆アン・ハサウェイ再タッグでFilmarks平均4.1点、MOVIE WALKER 4.3/5.0と高評価維持。「最強の続編」とシネマトゥデイ評。デジタル時代のファッション業界を皮肉る続編としてSNSでも話題継続中。\n\n- **見どころ**：20年経ったミランダとアンディのケミストリー\n- **評価**：★★★★★\n- 🔗 [公式サイト（20世紀スタジオ）](https://www.20thcenturystudios.jp/movies/devil-wears-prada2)\n- 🔗 [Filmarksレビュー](https://filmarks.com/movies/123321)\n\n---\n\n### 🏆 シンプル・アクシデント／偶然（5月公開・話題沸騰）\nジャファル・パナヒ監督が第78回カンヌでパルム・ドール受賞、世界三大映画祭最高賞制覇という快挙。不当逮捕された男の復讐をユーモラスに描くサスペンス。ぴあテン「これからみたい映画」5月号でぶっちぎり1位。\n\n- **見どころ**：イラン映画の社会派 × ブラックユーモア\n- **評価**：★★★★★\n- 🔗 [ぴあテンランキング](https://lp.p.pia.jp/article/news/462889/index.html)\n\n---\n\n## 🎮 ゲーム情報\n\n### 🏎️ Forza Horizon 6（5/19発売）\n**プラットフォーム**：Xbox Series X|S / PC（Steam）／PS5は2026年内予定\n**価格**：スタンダード 9,800円 / デラックス 14,000円 / プレミアム 16,800円\n\n日本が舞台のシリーズ最新作。550台以上の実車収録、開発陣が「一度きりの日本を正しく適切な形で」再現することにこだわった野心作。今週の発売直後でGAME Watchレビューでも高評価。\n\n- 🔗 [GAME Watch記事](https://game.watch.impress.co.jp/docs/news/2108431.html)\n\n---\n\n### 🌊 サブノーティカ2（5/15 アーリーアクセス開始）\n**プラットフォーム**：Steam / 予価未定\n未知の海洋惑星サバイバル続編、最大4人協力プレイ対応。Steamの『海洋フェス』タイミングと相まってインディー海洋ゲーの注目株。\n\n- 🔗 [ファミ通記事](https://www.famitsu.com/article/202605/73731)\n\n---\n\n### ⚽ EA Sports FC 26「The World\u0027s Game Update」配信（5/28）\n今週水曜にパッチ1.25配信。**新48チーム国際トーナメントモード**（6/4スタート、53か国フルライセンス）と**FUTトークン**新報酬制度を実装。ログイン報酬で**93 OVR ICON ペレ**配布。キャリモ派にも国際試合の幅広がるアプデ。\n\n- 🔗 [EA公式アップデート記事](https://www.ea.com/games/ea-sports-fc/fc-26/news/pitch-notes-fc26-the-worlds-game-update)\n- 🔗 [パッチノート（mp1st）](https://mp1st.com/title-updates-and-patches/ea-sports-fc-26-the-worlds-game-update-released-patch-1-25)\n\n---\n\n### ⛏️ Minecraft Bedrock 26.20「Chaos Cubed」配信中（5/5-6〜）\n硫黄キューブ（食べたブロックで姿変わる新Mob）、クローズドキャプション、最大15人のパーティーシステム、Realms Hub追加。本格的な\"Chaos Cubed\"ドロップは6/16予定。Java版はピアツーピアマルチとフレンドリストをスナップショットで先行テスト中。\n\n- 🔗 [公式記事](https://www.minecraft.net/en-us/article/marketplace-content-may-2026)\n\n---\n\n### 🏷️ 今週のSteamセール注目作（海洋フェス開催中）\n1. **Still Wakes the Deep** — 70年代北海石油リグ舞台の一人称ホラー、約6時間\n2. **Harold Halibut** — 異星の海に沈んだ宇宙船舞台のフルボイスADV、映画的演出\n3. **NAMAKORIUM (ナマコリウム)** — インディー海洋系の隠れた良作\n\n- 🔗 [ゲームエイト・5月セールまとめ](https://game8.jp/steam/769004)\n\n---\n\n## 🎌 アニメ・ストリーミング\n\n### 🌀 黄泉のツガイ（春アニメ覇権争い1位）\n**放送**：4/4スタート、連続2クール（4月～9月予定）\n荒川弘『鋼の錬金術師』作者の最新作、アニメ制作はボンズフィルム。にじめん「春アニメ視聴継続ランキング」1位、各種期待値ランキングでも常時上位。今週は第8話前後（疑念と確信、抱擁と囁き）が進行中、影森家編が佳境。\n\n- 🔗 [公式サイト](https://yominotsugai.com/)\n- 🔗 [継続ランキング（にじめん）](https://nijimen.kusuguru.co.jp/topics/614362)\n\n---\n\n### 💫 ソウルメイト（Netflix・5月配信）\n磯村勇斗 × オク・テギョン（2PM）W主演のヒューマンドラマ。日韓制作のNetflix注目作で、今月のNetflix日本ラインナップで筆頭枠扱い。\n\n- 🔗 [配信ラインナップ（SCREEN ONLINE）](https://screenonline.jp/_ct/17836315)\n\n---\n\n### 👻 ザ・ボローズ（Netflix・5月新作SF）\n『ストレンジャー・シングス』のダファー兄弟が手掛ける完全新作SFシリーズ。今月のNetflix最注目枠、SF/ホラー系統で『ST』ロス層に直球。\n\n- 🔗 [Yahoo!ニュース（ハリウッドレポーター）](https://news.yahoo.co.jp/articles/9f47a3cf5f43cc429a356c306552d76440d38fda)\n\n---\n\n## 📝 今週の総評\n映画は是枝の問題作で議論が割れる週、ゲームはFC26のワールドカップ前哨戦アプデと日本舞台のForza6で「日本」が主役、配信はNetflixが韓流×SF×アニメで全方位カバー。週末は『箱の中の羊』を観てから帰ってFC26で48チームトーナメント、っていう動線が最強だと思う。\n```\n\n---\n\nナレッジ更新ルール的にこれObsidianに保存する？ `personal/` 以下にエンタメ週報のフォルダ作って `entertainment/2
