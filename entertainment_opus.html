<script>
const md = "情報揃った。Opus視点でまとめる。Sonnet版とは別作品中心で組む。\n\n---\n\n# エンタメ週報 2026/5/30\n\n公開日（金）の朝に書いてる週報。今週は洋画大作と邦画シリーズ完結が同時にぶつかった激戦週で、ゲームはPS最大規模セール「Days of Play」が走り出した。地味に春アニメも折り返し地点。整理する。\n\n---\n\n## 🎬 今週の映画\n\n### シンプル・アクシデント／偶然\n\n**監督：** ジャファル・パナヒ（イラン）\n**日本公開：** 2026年5月公開・全国順次拡大中\n**評価：** ★★★★★\n\n第78回カンヌ国際映画祭でパルム・ドール受賞。これでパナヒは世界三大映画祭（カンヌ・ベルリン・ヴェネツィア）すべての最高賞を制覇という前人未到の記録を打ち立てた。投獄経験を経てなお映画を撮り続ける作家の最新作で、ぴあの「これからみたい映画ベスト10」では断トツ1位。テーマは偶然と暴力、報復の連鎖。重い題材なのに後半笑える瞬間があるのがパナヒ流。\n\n- 公式：[配給情報](https://www.bitters.co.jp/)\n- ソース：[ぴあ映画 月イチ\"ぴあテン\"](https://lp.p.pia.jp/article/news/462889/index.html)\n\n---\n\n### スター・ウォーズ／マンダロリアン・アンド・グローグー\n\n**監督：** ジョン・ファブロー\n**公開中：** 2026年5月22日〜\n**評価：** ★★★★☆\n\n5月22日〜24日の国内興行ランキング初登場1位。3年ぶりに洋画が日本のチャートを独占したという意味で象徴的な一作。Disney+のドラマ「マンダロリアン」シリーズの劇場版で、ドラマファンには既知の世界観だけどスクリーン特化の絵作りに切り替わってる。ファブロー監督の手堅い演出は安定。新規には少し前提知識ハードル高めなので、Disney+で予習推奨。\n\n- ソース：[映画.com 国内ランキング](https://eiga.com/ranking/jp/)\n\n---\n\n### 劇場版モノノ怪 第三章 蛇神\n\n**公開：** 2026年5月29日（金）\n**配給：** ツインエンジン\n**評価：** ★★★★★\n\n大奥三部作の完結編。第一章「唐傘」、第二章「火鼠」を経て、ついに「最大の秘密」へ。日本画タッチの異様な色彩設計と、薬売りの妖艶な存在感が相変わらず強烈。完結に向けて謎が回収される構成美が見どころ。三章を続けて観る一気鑑賞勢にもおすすめ。\n\n- 公式：[劇場版モノノ怪](https://www.mononoke-movie.com/)\n- ソース：[映画.com 公開予定](https://eiga.com/coming/)\n\n---\n\n### お終活 さらば!?ボクの先生\n\n**主演：** 高畑淳子・橋爪功\n**公開：** 2026年5月29日（金）\n**評価：** ★★★☆☆\n\n熟年夫婦コメディシリーズの第3弾。今回は元教師である夫が自身の生徒たちと再会する話で、シニア層に確実に刺さる地味なヒット枠。派手さはないけど「親に何プレゼントしよう」って迷うときの一手として有効。\n\n- ソース：[MOVIE WALKER PRESS 今週公開](https://press.moviewalker.jp/list/upcoming/)\n\n---\n\n## 🎮 ゲーム情報\n\n### 007 First Light（PS5/Xbox/PC/Switch2）\n\n**発売日：** 2026年5月27日（水）\n**開発：** IO Interactive\n**価格：** 通常版 8,580円（税込）／デラックス版 11,000円前後\n\n「Hitman」シリーズで知られるIO Interactiveが手掛ける、若き日のジェームズ・ボンドを描くスパイアクションアドベンチャー。MI6入局前の26歳ボンドが主人公という新解釈。Hitmanの暗殺アプローチ設計力がそのままスパイ潜入に転用されてるので、ステルス勢には間違いなく注目作。\n\n- ソース：[ファミ通 - PS5新作24選](https://www.famitsu.com/article/202605/72904)\n\n---\n\n### PlayStation「Days of Play 2026」開催中\n\n**期間：** 2026年5月27日（水）〜6月10日（火）\n**対象：** PS Store数百タイトル、PS Plus 12ヶ月利用権が最大33%OFF\n\nPSの年間最大規模セール。Days of PlayはE3後継のSummer Game Fest時期と被せてくる構成で、家計的にも要注意ゾーン。FC26、Hogwarts Legacy、Returnalあたりが値下げ常連。PS Plus延長はこのタイミングで仕掛けるのが最安手段。\n\n**おすすめ3本：**\n\n| タイトル | プラットフォーム | 補足 |\n|---|---|---|\n| EA SPORTS FC 26 | PS5 | FC26勢は来週の World\u0027s Game Update前に揃えるなら今 |\n| Hogwarts Legacy | PS5 | 安定の値下げ常連 |\n| Returnal | PS5 | ローグライク三人称、Housemarque |\n\n- ソース：[プライシー - PS Storeセールガイド](https://www.pricey.jp/web/articles/2086)\n\n---\n\n### EA SPORTS FC 26 The World\u0027s Game Update（6/4配信予告）\n\n**配信日：** 2026年6月4日（木）\n**対応：** PS5/Xbox/PC\n\nワールドカップ2026モードを丸ごと追加する大型アップデート。41の公認ナショナルチーム、日本代表は実選手名込みで収録、新スタジアム2つ、Adidas公式マッチボール、W杯トーナメントモードを実装。FC26勢は来週6/4が本番。ちなみに今週5/22には Ultimate TOTS（チーム・オブ・ザ・シーズン最終版）が解禁されてるのでUT民は両面で忙しい。\n\n- ソース：[EA公式 FC News](https://www.ea.com/en/games/ea-sports-fc/fc-26/news)\n\n---\n\n### Minecraft Live 2026 Summer（明日深夜配信）\n\n**開催：** 2026年5月31日（日）午前1時30分〜（日本時間）\n**配信：** YouTube Minecraft公式\n\n統合版Ver26.20で実装された新バイオーム「硫黄の洞窟」と新モブ「サルファーキューブ」を含む夏アップデート方針が公式から正式発表されるイベント。バケツで回収できるスライム系モブとか有毒ガス出る温泉とか、相変わらず変な要素が増えていく。マイクラ勢は明日深夜or録画でチェック。\n\n- ソース：[マイクラ攻略まとめ - Minecraft Live情報](https://minecraft-yutakura.com/minecraft-live-202603/) ／ [Minecraft Wiki - 2026年春季の小規模アップデート](https://ja.minecraft.wiki/w/2026%E5%B9%B4%E6%98%A5%E5%AD%A3%E3%81%AE%E5%B0%8F%E8%A6%8F%E6%A8%A1%E3%82%A2%E3%83%83%E3%83%97%E3%83%87%E3%83%BC%E3%83%88)\n\n---\n\n## 🎌 アニメ・ストリーミング\n\n### 春クール覇権争い：Re:ゼロ4期 vs よう実4期\n\n放送前ランキングでは『Re:ゼロから始める異世界生活 4th season』が1位、『ようこそ実力至上主義の教室へ 4th Season』が2位という\"続編ガチンコ\"の構図。Re:ゼロは長期シリーズ初の地上波放映クール超え水城を狙う巻、よう実は2年生編1学期がついに映像化で原作勢の期待値高め。両方とも春開幕からファン総取り状態で、配信指標でもトップ集団キープ中。\n\n- ソース：[電撃オンライン - 2026年春アニメTOP10](https://dengekionline.com/article/202603/68996)\n\n---\n\n### 黄泉のツガイ（ニコニコ初速1位）\n\n連載中の荒川弘最新作（『鋼の錬金術師』『銀の匙』作者）のアニメ化。ニコニコの2026年春アニメ初速ランキング（4/1〜4/12）で第1位を獲得し、初回から「見ごたえある展開」とコメントが殺到。荒川作品らしい人物造形の強さと世界観構築は安定で、ノーマーク勢ほど早めに追いつくべき1本。\n\n- ソース：[KADOKAWA - ニコニコ初速TOP10](https://group.kadokawa.co.jp/information/promotional_topics/article-14693.html)\n\n---\n\n### Netflix「ジョジョSBR」配信継続中\n\n『ジョジョの奇妙な冒険』第7部「スティール・ボール・ラン」が2026年3月からNetflix世界同時配信中。歴代パートで最も映像化が難しいと言われた西部開拓時代×大陸横断レースという題材で、5月時点では中盤の名エピソード突入。原作未読でも一気観しやすい構造になってるので、GW明けの空いた時間にちょうどいいボリューム。\n\n- ソース：[About Netflix - 2026配信予定](https://about.netflix.com/ja/news/what-next-netflix-reveals-series-films-and-games-coming-in-2026)\n\n---\n\n## まとめ\n\n今週は「シンプル・アクシデント／偶然」と「モノノ怪第三章」、洋邦のアート系2本に押さえておきたい。ゲームは007 First Lightの発売とDays of Playが同時で財布厳しめ、来週はFC26のW杯モードと一気に盛り上がる。アニメは続編祭りの一方で『黄泉のツガイ』が静かに伸びてるのが今週の地殻変動ポイント。\n\n**Sources（一括）：**\n- [映画.com 公開予定スケジュール](https://eiga.com/coming/)\n- [ぴあテン 5月公開作品ランキング](https://lp.p.pia.jp/article/news/462889/index.html)\n- [映画.com 国内ランキング](https://eiga.com/ranking/jp/)\n- [MOVIE WALKER PRESS 今週公開](https://press.moviewalker.jp/list/upcoming/)\n- [劇場版モノノ怪 公式](https://www.mononoke-movie.com/)\n- [ファミ通 2026年5-9月PS5新作24選](https://www.famitsu.com/article/202605/72904)\n- [プライシー PS Storeセールガイド](https://www.pricey.jp/web/articles/2086)\n- [EA公式 FC26 News](https://www.ea.com/en/games/ea-sports-fc/fc-26/news)\n- [マイクラ攻略まとめ Minecraft Live](https://minecraft-yutakura.com/minecraft-live-202603/)\n- [Minecraft Wiki 2026春季アップデート](https://ja.minecraft.wiki/w/2026%E5%B9%B4%E6%98%A5%E5%AD%A3%E3%81%AE%E5%B0%8F%E8%A6%8F%E6%A8%A1%E3%82%A2%E3%83%83%E3%83%97%E3%83%87%E3%83%BC%E3%83%88)\n- [電撃オンライン 2026年春アニメTOP10](https://dengekionline.com/article/202603/68996)\n- [KADOKAWA ニコニコ春アニメ初速TOP10](https://group.kadokawa.co.jp/information/promotional_topics/article-14693.html)\n- [About Netflix 2026配信予定発表](https://about.netflix.com/ja/news/what-next-netflix-reveals-series-films-and-games-coming-in-2026)";
document.getElementById('content').innerHTML = marked.parse(md);
