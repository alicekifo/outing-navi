<script>
const md = "調査が完了しました。エンタメ週報を作成します。\n\n# 🎭 エンタメ週報（2026年5月25日〜5月31日）\n\n今週は5月29日（金）に話題作が一斉公開、PSの大型セール「Days of Play 2026」も開幕。エンタメが盛りだくさんな1週間です。\n\n---\n\n## 🎬 今週の映画\n\n### 劇場版モノノ怪 第三章 蛇神（5月29日公開）★★★★★\n怪奇譚アニメ「モノノ怪」三部作の堂々完結編。退魔の剣を携えた薬売りが、大奥に現れる大蛇の形をしたモノノ怪・蛇神と対峙する。御台所・幸子の悲劇から始まる謀略劇は、公式が「ネタバレ厳禁」を呼びかけるほどの衝撃展開を含み、観客が前のめりになる傑作との評価。和テイストのアートワークと独創的な演出は本作の最大の見どころ。\n- 公式サイト: [劇場版 モノノ怪](https://www.mononoke-movie.com/)\n- 作品情報: [映画.com](https://eiga.com/movie/103594/)\n\n### 箱の中の羊（5月29日公開）★★★★☆\n是枝裕和監督の最新作。綾瀬はるかと大悟（千鳥）という異色のW主演で描かれる、現代社会の闇に切り込むヒューマンサスペンス。是枝監督ならではの繊細な人物描写と、コメディアン大悟の意外なシリアス芝居が話題。海外映画祭への出品も予定されており、世界的に注目度が高い。\n- 作品情報: [MOVIE WALKER PRESS](https://press.moviewalker.jp/list/coming/2026/05/)\n\n### TOKYO BURST -犯罪都市-（5月29日公開）★★★★☆\n水上恒司と東方神起のユンホがバディを組む、日韓共同制作の刑事アクション。新宿を舞台に、日本の若手刑事と韓国の国際捜査官が国境を越えた犯罪組織に挑む。韓国でも公開され、両国でヒットの兆し。アクションシーンの緊張感とユンホの日本語芝居が見もの。\n- 作品情報: [cinemacafe.net](https://www.cinemacafe.net/movies/release/month/)\n\n### トムとジェリー（5月29日公開）★★★☆☆\nおなじみのコンビが大冒険を繰り広げる新作アニメ映画（115分）。追いかけっこの末に見知らぬ世界に飛ばされてしまうという、ファンタジー要素満載の物語。家族で楽しめる王道エンタメ。\n- 作品情報: [映画.com](https://eiga.com/coming/)\n\n---\n\n## 🎮 ゲーム情報\n\n### 007 First Light（5月27日発売 / PS5・Xbox・PC / 通常版 8,580円）\n若き日のジェームズ・ボンドの起源を再構築した、IO Interactive開発のアクションアドベンチャー。発売直後からPlayStationランキング上位入り。スパイ映画さながらの潜入・選択肢演出に高評価が集まっている。\n- 公式ブログ: [PlayStation Blog](https://blog.ja.playstation.com/2026/05/01/20260501-monthly-picks-s/)\n\n### 牧場物語 Let\u0027s！風のグランドバザール（5月28日発売 / Switch・PS5 / 6,578円）\n名作「牧場物語 ようこそ！風のバザールへ」のリメイク版。バザール経営×牧場経営という独自システムはそのままに、グラフィックとUIを刷新。NPCとの恋愛要素も拡充され、シリーズファンも初心者も楽しめる仕上がり。\n- ファミ通: [ゲーム発売スケジュール](https://www.famitsu.com/schedule)\n\n### EA SPORTS FC 26 — CONMEBOLイベント＆新スパイク追加\n今週、Title Update v1.5.0が配信。CONMEBOL Libertadores／Copa Sudamericanaの2026年版データが追加され、新スパイク（adidas Copa MP2 Ice Cold Precision、Nike Phantom 6 Elite ハーランドモデル、Nike Mercurial Superfly 10 Elite エムバペモデルなど）も解禁。週末にはCONMEBOL関連の特別SBC（Squad Building Challenge）が実施中。\n- 公式パッチノート: [EA SPORTS FC 26 News](https://www.ea.com/en/games/ea-sports-fc/fc-26/news)\n\n### Minecraft — 統合版Ver26.20＆「Minecraft Live 2026 Summer」\n5月5日の統合版Ver26.20アップデートで、新バイオーム「硫黄の洞窟」と新モブ「サルファーキューブ」が実験的機能として実装。バケツで回収できるスライム型モブが話題。5月13日にはJava版でフレンド・P2P機能も追加。**さらに5月31日午前1時30分（JST）にはMinecraft Live 2026 Summerが配信予定**で、次期大型アップデートが発表される見込み。\n- 攻略まとめ: [攻略大百科](https://gamepedia.jp/minecraft/archives/1622)\n\n### PS Store「Days of Play 2026」（5月27日〜6月10日）\nPlayStation年間最大級のセール開幕。数百タイトルが対象、PS Plus 12ヶ月利用権が最大33%OFF。注目割引タイトルは『Marvel\u0027s Spider-Man 2』『Final Fantasy XVI』『Stellar Blade』など。Steamサマーセール（6月26日開始）までの繋ぎに最適。\n- セール情報: [プライシー](https://www.pricey.jp/web/articles/2086)\n\n---\n\n## 🎌 アニメ・ストリーミング\n\n### 2026年春アニメ 人気ランキング — 「転スラ第4期」がトップ独走\nニコニコ／アニメイトタイムズ集計の春アニメ人気ランキングでは、『転生したらスライムだった件』第4期が8.73%（44票）でぶっちぎりの1位。2位タイには新作『あかね噺』と『北斗の拳』令和リメイク版（各36票）が並ぶ激戦。今週放送回では『Re:ゼロ』4thシーズンも追い上げ中で、SNSでは「最終回前ラッシュ」として話題沸騰。\n- ランキング: [Nアニメ](https://anime.nicovideo.jp/ranking/view-daily.html)\n- 詳細記事: [アニメイトタイムズ](https://www.animatetimes.com/news/details.php?id=1773099758)\n\n### Netflix「ザ・ボローズ」配信開始\n『ストレンジャー・シングス』を生んだダファー兄弟による新作SFシリーズ。今週5月後半に独占配信が始まり、グローバルTOP10で初登場上位。1980年代風の世界観と地下に潜む謎の存在を巡るミステリーで、ストレンジャー・シングスファン必見の出来栄え。\n- 配信情報: [Netflix公式](https://about.netflix.com/ja/news/next-on-netflix-japan-2026)\n\n### Netflix『ソウルメイト』（磯村勇斗×オク・テギョン W主演）\n日韓共同制作のヒューマンドラマ。磯村勇斗と2PMのオク・テギョンが運命的に出会う2人を演じる、感動の長編。週末配信開始で、日韓のSNSで同時にトレンド入り。今週末の家飲み視聴にぴったり。\n- 関連記事: [Yahoo!ニュース（The Hollywood Reporter Japan）](https://news.yahoo.co.jp/articles/9f47a3cf5f43cc429a356c306552d76440d38fda)\n\n---\n\n## 📌 編集後記\n今週の最大の見どころは、5月29日金曜に集中した邦画3本（モノノ怪三部作完結／是枝新作／日韓刑事バディ）と、5月31日深夜配信のMinecraft Liveの2大イベント。来週はSteamサマーセール直前の駆け込み購入時期にあたるので、PS Days of Playでお買い物を済ませておくのが吉。\n\n---\n\n**Sources:**\n- [映画.com 公開予定スケジュール](https://eiga.com/coming/)\n- [MOVIE WALKER PRESS 2026年5月公開予定](https://press.moviewalker.jp/list/coming/2026/05/)\n- [劇場版 モノノ怪 公式サイト](https://www.mononoke-movie.com/)\n- [ファミ通ゲーム発売日スケジュール](https://www.famitsu.com/schedule)\n- [PlayStation Blog 5月のおすすめ新作ガイド](https://blog.ja.playstation.com/2026/05/01/20260501-monthly-picks-s/)\n- [EA SPORTS FC 26 公式ニュース](https://www.ea.com/en/games/ea-sports-fc/fc-26/news)\n- [Minecraft アップデート情報（攻略大百科）](https://gamepedia.jp/minecraft/archives/1622)\n- [Steamセール情報（ゲームエイト）](https://game8.jp/steam/763035)\n- [PS Storeセール年間スケジュール（プライシー）](https://www.pricey.jp/web/articles/2086)\n- [2026春アニメ人気ランキング（Nアニメ）](https://anime.nicovideo.jp/ranking/view-daily.html)\n- [Netflix 2026年5月配信ラインナップ](https://about.netflix.com/ja/news/next-on-netflix-japan-2026)\n- [Netflix 5月のおすすめ作品（Yahoo!ニュース）](https://news.yahoo.co.jp/articles/9f47a3cf5f43cc429a356c306552d76440d38fda)\n\n\u003e **画像について**: 各作品の画像URLは公式サイトの画像直リンクが規約により制限されている場合があるため本稿では埋め込みを控えています。各公式サイトのリンクから最新ビジュアルをご確認ください。";
