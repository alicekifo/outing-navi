<script>
const md = "# マンチェスター・ユナイテッド情報週報\n**発行日：2026年6月27日（土）**\n\n---\n\n## 週間ハイライト\n\n2025-26シーズンが終了し、ユナイテッドは**リーグ3位・チャンピオンズリーグ出場権獲得**でフィニッシュ。マイケル・カリック監督が2028年までの正式契約を締結し、夏の再建フェーズへ。現在FIFAワールドカップ2026（北米開催）が進行中で、**ユナイテッド関連選手13名**が参加している。\n\n---\n\n## 1. 直近の試合結果（6月20日〜6月27日）\n\n**ユナイテッドの公式戦なし**（2025-26シーズン終了済、プレシーズン未開始）\n\n### 参考：2025-26 プレミアリーグ最終順位\n\n| 順位 | クラブ | 勝点 | 勝-分-敗 | 得失点差 |\n|------|--------|------|----------|----------|\n| 1位 | アーセナル | — | — | — |\n| **3位** | **マンチェスター・ユナイテッド** | **71** | **20-11-7** | **+19** |\n\n\u003e アーセナルが22年ぶりのプレミアリーグ制覇。ユナイテッドはCL出場権を確保。\n\u003e *(ソース：NBC Sports / manutd.com)*\n\n---\n\n## 2. 今後の試合予定（直近3試合）\n\n| 日程 | 対戦 | 会場 | キックオフ |\n|------|------|------|----------|\n| **7月18日（土）** | レクサム vs **マンチェスター・ユナイテッド** | ヘルシンキ（フィンランド） | 18:00現地 / 16:00 BST |\n| **7月24日（金）** | ローゼンボリ vs **マンチェスター・ユナイテッド** | トロンハイム（ノルウェー） | 18:00現地 / 17:00 BST |\n| **8月1日（土）** | アトレティコ・マドリード vs **マンチェスター・ユナイテッド** | ストックホルム（スウェーデン） | 15:00現地 / 14:00 BST |\n\n\u003e ※プレミアリーグ2026-27開幕は**2026年8月22日（週末）**予定。\n\u003e *(ソース：[manutd.com 公式](https://www.manutd.com/en/news/game-by-game-united-pre-season-fixture-list-2026))*\n\n---\n\n## 3. 移籍情報（6月13日〜6月27日対象）\n\n### ✅ 確定：IN（加入）\n\n| 選手 | ポジション | 移籍元 | 条件 | 信頼度 |\n|------|-----------|--------|------|--------|\n| **エデルソン** | MF | アタランタ（イタリア） | €4,050万固定＋最大€450万ボーナス、4年＋オプション1年 | **S級**（公式発表） |\n| **クリスティアン・オロスコ** | MF（10代） | フォルタレザ（コロンビア） | 7月合流予定。「次のカゼミーロ」との呼び声 | **B級** |\n\n### ✅ 確定：OUT（退団）\n\n| 選手 | 行先 | 備考 |\n|------|------|------|\n| **ラスムス・ホイルンド** | ナポリ | ローン→完全移籍 |\n| **カゼミーロ** | 未定 | 4年で退団 |\n| **ティレル・マラシア** | フリーエージェント | 契約満了 |\n| **ジェイドン・サンチョ** | フリーエージェント | 契約満了・リリース |\n\n### 🔄 交渉中・リンク（14日以内の報道）\n\n| 選手 | 現所属 | 概要 | 信頼度 |\n|------|--------|------|--------|\n| **アンガス・ガン**（GK） | ノッティンガム・フォレスト（契約満了） | GK陣刷新の候補。フリー獲得検討。W杯でスコットランドの守護神を務め評価急上昇。ジェイソン・ウィルコックスSDとのマンCアカデミー時代の縁もあり | **B級**（ESPN） |\n| **マテウス・フェルナンデス**（MF） | ウェストハム | 推定£8,000万。トッテナムも競合中 | **C級**（複数報道） |\n\n### 🔒 残留確定\n\n- **ブルーノ・フェルナンデス**：サウジアラビアからの高額オファーを断り残留を明言。FWA年間最優秀選手＆PLシーズンMVP受賞。\n\n---\n\n## 4. FIFAワールドカップ2026（ユナイテッド選手情報）\n\nW杯は現在**北米（米・加・墨）**にて開催中。ユナイテッド関連選手**13名**が参加。\n\n### 本日（6月27日）の注目試合\n\n| 試合 | ET時刻 | 主なユナイテッド選手 |\n|------|--------|-------------------|\n| ヨルダン **vs** アルゼンチン | 22:00 | **リサンドロ・マルティネス**（アルゼンチン） |\n| パナマ **vs** イングランド | 17:00 | **コビー・メイヌー**（イングランド） |\n| コロンビア **vs** ポルトガル | 19:30 | ※要確認 |\n\n\u003e *(ソース：[manutd.com 公式 W杯ガイド](https://www.manutd.com/en/news/united-at-the-2026-world-cup-when-are-the-group-games))*\n\n---\n\n## 5. クラブニュース\n\n### マイケル・カリック監督 正式就任\n- 2026年1月に暫定就任後チームを立て直し、**3位・CL出場権**を獲得\n- **2028年まで2年契約**を締結（[Sky Sports](https://www.skysports.com/football/news/11667/13539851/manchester-united-confirm-michael-carrick-has-signed-two-year-deal-to-stay-on-as-head-coach-at-old-trafford) / [manutd.com](https://www.manutd.com/en/news/michael-carrick-continues-as-man-united-head-coach-2026)）\n- 夏の補強目標：FW・左WG・CB・LBを含む**最大5名の獲得**を計画\n- CEO オマール・ベラダ：「パニック買いではなく、的を絞ったスマートな補強を継続する」\n\n### プレシーズンツアー：欧州周遊（全6試合）\nW杯が北米開催のため、例年の北米ツアーを取りやめ**欧州ツアー**に変更。カリントンでのトレーニング時間を最大化する判断。\n\n| 日程 | 対戦 | 開催地 |\n|------|------|--------|\n| 7月18日 | レクサム | ヘルシンキ（フィンランド） |\n| 7月24日 | ローゼンボリ | トロンハイム（ノルウェー） |\n| 8月1日 | アトレティコ・マドリード | ストックホルム（スウェーデン） |\n| 8月8日 | PSG | ヨーテボリ（スウェーデン） |\n| 8月12日 | リーズ | ダブリン（アイルランド） |\n| 8月15日 | ACミラン | ブロツワフ（ポーランド） |\n\n\u003e *(ソース：[manutd.com 公式プレシーズン発表](https://www.manutd.com/en/news/man-utd-announce-four-more-pre-season-2026-fixtures))*\n\n---\n\n**信頼度凡例：S級＝公式発表　A級＝大手メディア確報　B級＝複数報道　C級＝単独報道・噂**\n\n---\n\nSources:\n- [Men\u0027s Team Fixture Listing | manutd.com](https://www.manutd.com/en/matches/mens-team/fixtures)\n- [Pre-season game-by-game guide | manutd.com](https://www.manutd.com/en/news/game-by-game-united-pre-season-fixture-list-2026)\n- [Official 2026/27 PL fixtures | manutd.com](https://www.manutd.com/en/news/official-united-2026-27-premier-league-fixtures)\n- [Premier League 2025-26 final table | NBC Sports](https://www.nbcsports.com/premier-league-table-2025-26-season-standings)\n- [Man Utd transfer news live | Sky Sports](https://www.skysports.com/football/live-blog/11667/13025492/man-utd-transfer-news-rumours-and-gossip-live-updates-and-latest-on-deals-signings-loans-and-contracts)\n- [Man United want Angus Gunn | ESPN](https://www.espn.com/soccer/story/_/id/49173065/transfer-rumors-news-manchester-united-want-scotland-goalkeeper-gunn)\n- [Every Man Utd done deal summer 2026 | TeamTalk](https://www.teamtalk.com/manchester-united/every-completed-man-utd-transfer-summer-2026-signings-exits-loans)\n- [Carrick signs two-year deal | Sky Sports](https://www.skysports.com/football/news/11667/13539851/manchester-united-confirm-michael-carrick-has-signed-two-year-deal-to-stay-on-as-head-coach-at-old-trafford)\n- [United at the 2026 World Cup | manutd.com](https://www.manutd.com/en/news/united-at-the-2026-world-cup-when-are-the-group-games)\n- [Summer 2026 transfer window opens | manutd.com](https://www.manutd.com/en/news/summer-transfer-window-for-2026-official-opens)";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
