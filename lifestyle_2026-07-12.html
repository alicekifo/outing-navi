const md = "# ライフスタイル週報（2026年7月12日号）\n\n対象期間: 2026-07-05 〜 2026-07-12 ／ イベントは 7/13 以降開催分のみ掲載\n\n---\n\n## 🍷 ワイン\n\n### 今週のワインニュース: フランスに今夏3度目の熱波、シャンパーニュは8月15日頃収穫開始か\n- フランスを今夏3度目の熱波が襲い、シャンパーニュ地方では例年より大幅に早い**8月15日頃からの収穫開始**が視野に入っていると報じられた。連年の温暖化でシャンパーニュの酸のプロファイルとドザージュ設計がどう変わるか、2026ヴィンテージの試金石になる\n- 同日、ナパ・ヴァレーの**オーパス・ワン**でワインメーカーの**マイケル・シラーチ氏が2026年収穫をもって引退**すると発表。2001年から四半世紀チームを率いた同氏の交代は、ナパのアイコンワインの造りの方向性に関わる節目\n- 情報源: WINE REPORT（山本昭彦）2026-07-10公開の2記事\n\u003e source: https://www.winereport.jp/\n\n### おすすめワイン: ソアリェイロ アルヴァリーニョ 2024\n- **銘柄**: Soalheiro Alvarinho（ソアリェイロ）\n- **産地/品種/VT**: ポルトガル / ミーニョ / DOCヴィーニョ・ヴェルデ ／ アルヴァリーニョ ／ 2024\n- **醸造**: 畑の大部分で有機農法。Alc 12.5%と軽やかな設計で、いわゆる微発泡の廉価ヴィーニョ・ヴェルデとは別物の本格アルヴァリーニョ\n- **味わい**: シトラスとトロピカルフルーツの凝縮感に、ミーニョらしい張りのあるミネラル。酸は生き生きとして残糖感はなく、魚介・和食全般に幅広く合う。熱波の夏にキンキンに冷やして飲む1本として最適\n- **実売価格**: **3,190円（税込）** THE CELLAR online store（カーヴ・ド・リラックス）\n- **購入**: https://www.cavederelax.com/products/5602640000645\n- 画像: 公式画像のリンク永続性が確認できないため省略\n\u003e source: https://www.cavederelax.com/products/5602640000645\n\n### イベント: CAMOS TOKYO 7月のワイン会（東京）\n- **7/23（木）** 世界の白ワイン〜シャブリ グラン・クリュ「ブランショ」2018 ほか（笹塚 キャンティ・クアトロ・シェルクラブ）\n- **7/25（土）19:00–21:00** 「フランス VS カリフォルニア」飲み比べ（四谷三丁目 Trattoria EnZone、20〜30代限定）\n- 参加費は公式サイトの各イベントページで要確認\n\u003e source: https://camos.tokyo/\n\n---\n\n## 🍶 日本酒\n\n### 新酒・季節酒情報: 夏酒シーズン本番——「THE 夏酒 2026」全国54銘柄が展開中\n- 和酒専門商社オオタ・アンド・カンパニーの季節企画「**THE 夏酒 2026**」が発売中。北海道・東北10銘柄、関東11銘柄など全国54銘柄で、発売日は銘柄ごとに異なる。低アルコール原酒・夏にごり・爽酒系まで型が幅広いのが今年の傾向\n- ピックアップ: **手取川 夏 純米辛口**（吉田酒造店・石川県白山市）——麹米に山田錦（精米歩合50%）、掛米に石川県産五百万石（同60%）、Alc 15%、一回火入れの生詰。フレッシュな酸で立ち上がり米の旨みがすっと切れる、王道の食中夏酒。**1,650円（税込・720ml、銘酒の裕多加）**\n\u003e source: https://sake-ota.com/news/2026_natsuzake/ ／ https://buy-sake.com/products/tedorigawa_natsujunmai_karakuchi\n\n### 話題の銘柄: 磐城壽 夏酒吟醸 2026（鈴木酒造店・福島県）\n- **スペック**: 純米吟醸 ／ 使用米は長井産・出羽の里（精米歩合55%）、長井産・雪女神（同40%）、福島市産・夢の香（同55%）／ Alc 13度\n- **味わい**: 瑞々しく透き通る口当たりに、ほのかなリンゴの含み香。甘さ控えめでキレの良い喉ごしの、低アルコール設計の夏吟醸。震災からの浪江帰還で知られる蔵の、地元産米へのこだわりが詰まった1本\n- **実売価格・購入先**: **3,232円（税込）** 植木屋商店（山形・EC可）\n- 画像: 公式画像URLの永続性が確認できないため省略\n\u003e source: https://uekiya-shouten.com/item-detail/730227\n\n### イベント・フェア（関東・関西、7/13以降）\n- **7/16（木）13:00–18:00** 「YOMOYAMA NAGANO 2026 大阪」長野県の銘酒大集合（大阪・オービックホール）\n- **7/25（土）・26（日）** 「第31回 和酒フェス in 中目黒」第1部12:00–14:10／第2部15:00–17:10（チケット・出展蔵の詳細は公式で順次公開中）\n\u003e source: https://sakefes.com/schedule2026_nakameguro/ ／ https://tanoshiiosake.jp/9020\n\n---\n\n## 📱 ガジェット・テック\n\n### GMKtec EVO-X3 — Ryzen AI Max+ 395 / 128GB統合メモリのローカルLLM特化ミニPC（7/6発売）\n- **メーカー/発売/価格**: GMKtec ／ 2026年7月6日発売 ／ **576,576円（128GB+2TB）〜616,456円（128GB+4TB）**（GMKtec直販）\n- **スペック要点**: Ryzen AI Max+ 395（16C/32T・Zen 5）、Radeon 8060S（RDNA 3.5・40CU）、LPDDR5X 128GB統合メモリ、M.2 2280×2（PCIe 4.0 x4）、**OCuLink（PCIe 4.0 x4）**、USB4（100W PD）、Wi-Fi 7、最大140Wモード、トリプルファン\n- **何が嬉しいか**: 128GBの統合メモリをGPUに大きく割り当てられるStrix Halo構成なので、70B級の量子化モデルどころかMoE系235Bクラスまで単機ローカル推論の射程に入る（メーカー公称126 TOPS）。llama.cpp（Vulkan/ROCm）はLinuxでそのまま回る構成で、前モデルEVO-X2で不評だったOCuLink非搭載も解消——後からeGPUを足す退路がある\n- 公式: https://www.gmktec.com/products/gmktec-evo-x3-ai-mini-pc-amd-ryzen-ai-max-395\n\u003e source: https://www.gmktec.com/products/gmktec-evo-x3-ai-mini-pc-amd-ryzen-ai-max-395 （国内発売日報道: https://taisy0.com/2026/07/04/224827.html 2026-07-04）\n\n### GPD BOX — 世界初MCIO 8i搭載の0.9Lミニ PC、国内予約が7/7開始\n- **メーカー/発売/価格**: GPD ／ 2026年7月7日国内予約開始・8月22日発売 ／ **Core Ultra X7 358Hモデル 308,000円・Core Ultra 7 356Hモデル 293,000円**（税込、予約期間中3,000円引き）\n- **スペック要点**: Core Ultra Series 3（Panther Lake）、LPDDR5X-8533 32GB、1TB SSD、0.9L筐体に**電源内蔵**、**MCIO 8i**（PCIe x8相当・OCuLink比4倍帯域を訴求）、USB4 v2.0、Intel Arc内蔵GPU\n- **何が嬉しいか**: eGPU接続の定番だったOCuLink（x4）の帯域ボトルネックをMCIO 8iで正面から潰しに来た初のミニPCで、同時発表のeGPUボックス「GPD G2」と組むと省スペースで実用的なGPUワークステーションが組める。電源内蔵0.9Lはホームラボの常時稼働ノード（Proxmox/仮想化ホスト）としても配線が綺麗にまとまる\n- 公式: https://www.gpd-minipc.com/products/gpd-box\n\u003e source: https://www.gdm.or.jp/pressrelease/2026/0707/642542 （2026-07-07）／ https://www.4gamer.net/games/409/G040961/20260707044/\n\n### セキュリティガジェット\n※今週該当なし（YubiKey等の主要ベンダーからTODAY±7日以内の新製品発表は確認できず）\n\n---\n\n### セルフチェック結果\n- [x] R1: ニュース2件（7/10）・EVO-X3（7/6発売）・GPD BOX（7/7予約開始）はTODAY±7日以内、イベント4件はすべて7/13以降開催\n- [x] R3: 酒類3点は酒販店EC実売価格（THE CELLAR・銘酒の裕多加・植木屋商店）、ガジェットはメーカー直販/国内正規価格\n- [x] ワインに品種・産地、日本酒に精米歩合・酒米を記載\n- [x] ガジェットはローカルLLM・eGPU・ホームラボの技術者目線\n- [x] 画像はリンク永続性が確認できないため全項目省略（R4準拠）";
