const md = "情報が揃いました。週報を生成します。\n\n---\n\n## 🔥 今週バズりグルメ（最大8件）\n\n\u003e **R2注記**：今週（6/19〜6/26）の拡散規模数値（再生数・いいね数）はSNS直接アクセス制限により取得できませんでした。元投稿URLが確認できた案件のみ掲載しています。\n\n### 1. Brussels Fries（ブリュッセルフライ）\n**新大久保〜歌舞伎町 / 西武新宿駅徒歩5分・新大久保駅徒歩10分**\n\n- **ジャンル / 価格帯**：フライドポテト専門店 / ¥800〜¥1,500\n- **バズった理由**：韓国・大邱発のベルギー式フライドポテト日本1号店（2025年12月上陸）。注文後に牛脂混合油で2度揚げし、ホワイトソースとトッピングをかける「ミルキング動画」がTikTok・Instagram Reelで継続拡散中。「今いちばんバズってる新大久保グルメ」として今週も多数Instagramで紹介されている。\n- **元投稿URL / 拡散規模**：[Instagram @brussels_fries_jp](https://www.instagram.com/p/DXY5fxBgVBq/) ／ [Reel（ミルキング動画）](https://www.instagram.com/reel/DSwOehIksEk/) ／ [紹介投稿](https://www.instagram.com/p/DT0SS2AE9ui/) ※再生数・いいね数は今週時点で未取得（R2数値要件部分充足）\n- **予約方法・難易度**：予約不要・現地並び。週末は30分以上待ちあり\n- **おすすめメニュー**：ダブルフライドポテト＋ホワイトソース、チーズ＆スパイシートッピング\n- **住所**：東京都新宿区歌舞伎町2-41-12 泉ビル1F ／ 12:00〜21:00\n- **店舗公式**：[Instagram @brussels_fries_jp](https://www.instagram.com/p/DXY5fxBgVBq/) ／ [Suntory Gourmet掲載](https://gourmet.suntory.co.jp/shop/0X00740563/) ／ [Trepo紹介記事](https://trepo.jp/food/305573/)\n\n---\n\n### 2. 韓国食堂\u0026カフェ LUNA\n**新大久保 / 新大久保駅徒歩4分**\n\n- **ジャンル / 価格帯**：韓国料理・カフェ / ランチ¥1,958〜・ディナー¥2,000〜\n- **バズった理由**：ガスト跡地に誕生した24時間営業の韓国食堂。ランチのおまかせセットがメイン＋サブメイン＋スープor麺で1,000通り以上の組み合わせが可能という仕掛けが「コスパ最強」としてTikTokで拡散中。\n- **元投稿URL / 拡散規模**：[TikTok @bassy_gurume（PR投稿）](https://www.tiktok.com/@bassy_gurume/video/7546959878917704967) ※PR投稿のため有機バズと区別要。再生数未取得\n- **予約方法・難易度**：予約不要・当日可（24時間営業）\n- **おすすめメニュー**：おまかせセット¥1,958（10:00〜16:00）、ジャージャー麺定食¥1,078、骨ヘジャンク定食¥1,408\n- **住所**：東京都新宿区大久保1-16-13 SHKビル2F ／ 24時間営業\n\n---\n\n## 🆕 新規オープン注目店（最大6件）\n\n### 1. ピエール・エルメ・パリ 丸の内\n**丸の内 / JR東京駅丸の内南口徒歩5分**\n\n- **オープン日**：2026年6月13日（土）\n- **コンセプト**：「パティスリー界のピカソ」ピエール・エルメが手がけるパリ発高級パティスリー国内2店舗目（1号店は青山）。二重橋スクエア1FにカフェをフルConcept併設した路面メゾン型旗艦店。青山店にないカフェ席と丸の内限定商品が差別化要因。\n- **シェフ経歴**：ピエール・エルメ（アルザス出身）。Ladurée、Fauchonを経て1998年パリで独立。マカロンの芸術的フレーバー開発で世界的地位を確立。\n- **注目メニュー・価格**：\n  - 丸の内限定マカロン10個詰合せ ¥4,752（全16種フレーバーから選択）\n  - 国内初登場フルーツ＆ハーブジュース\n  - 焼きたてフィナンシェ、フラッペ（カフェメニュー）\n- **予約**：カフェ席は当日先着（予約不可）\n- **公式リンク**：[公式ブティックページ](https://www.pierreherme.co.jp/boutique/marunouchi/) ／ [PR TIMESリリース](https://prtimes.jp/main/html/rd/p/000000029.000038890.html)\n\n---\n\n### 2. 海鮮市場 八芳 上野店\n**上野・アメ横 / JR上野駅徒歩5分・京成上野駅徒歩3分**\n\n- **オープン日**：2026年6月15日（月）\n- **コンセプト**：日本初の「市場型セルフスタイルしゃぶしゃぶ＆浜焼き」業態。市場を歩くように新鮮な魚介・ブランド和牛・高級食材をセルフで選んでテーブルへ持ち帰り、しゃぶしゃぶまたは浜焼きを楽しむ\"食のテーマパーク\"（400席）。運営：株式会社FANG DREAM COMPANY。\n- **注目メニュー・価格**：市場セレクト式しゃぶしゃぶ・浜焼き（食材選択による変動制）\n- **予約**：ネット予約可（ホットペッパーグルメ）\n- **住所**：東京都台東区上野4-7-8 アメ横センタービル2F ／ 11:00〜翌5:00（年中無休・400席）\n- **公式リンク**：[公式サイト](https://happo-ueno.owst.jp/) ／ [食べログ](https://tabelog.com/tokyo/A1311/A131101/13321581/) ／ [biz-hibana紹介記事](https://biz-hibana.com/happou-ueno/)\n\n---\n\n## ⭐ ミシュラン・メディア話題（最大4件）\n\n\u003e ミシュランガイド東京2026は2025年9月25日発表（現行最新版）。東京は19年連続「世界最多星付き都市」の座を堅持。\n\n### 1. 明寂（Myojaku）— 新三つ星獲得\n**ミシュランガイド東京2026**\n\n- 2023年版に二つ星でデビューし、わずか3年で最高評価へ昇格した日本料理店。中村秀敏シェフによる「水の豊かさ」を軸にした料理哲学が高評価を獲得。海底湧水を使用し、昆布・鰹だしへの過剰依存を排した唯一無二のスタイル。哲学者・山口裕之氏の「明寂（あかるさび）」概念に由来する店名。\n- **公式リンク**：[公式サイト myoujyaku.com](https://myoujyaku.com/) ／ [ミシュランガイド掲載ページ](https://guide.michelin.com/us/en/tokyo-region/tokyo/restaurant/myojaku) ／ [ヒトサラマガジン記事](https://magazine.hitosara.com/article/1860/)\n\n---\n\n### 2. 西麻布 鮨 真（Nishiazabu Sushi Shin）— 新二つ星\n**西麻布 ／ ミシュランガイド東京2026**\n\n- 昨年版から評価を一段階引き上げ、新たに二つ星を獲得した鮨店。\n- **公式リンク**：[ミシュランガイド東京2026 星発表](https://guide.michelin.com/us/en/article/michelin-guide-ceremony/michelin-guide-tokyo-2026-stars-reveal)\n\n---\n\n### 3. 伯雲（Hakuun）— 新二つ星\n**東京 ／ ミシュランガイド東京2026**\n\n- 昇格で新たに二つ星を獲得した日本料理店。\n- **公式リンク**：[ミシュランガイド東京2026 星発表](https://guide.michelin.com/us/en/article/michelin-guide-ceremony/michelin-guide-tokyo-2026-stars-reveal)\n\n---\n\n### 4. 東京 — 三つ星12軒でパリを凌駕、19連覇確定\n- 三つ星12軒（パリ10軒超）を含む計526軒掲載。ミシュラングリーンスター（サステナビリティ賞）も世界最多の13軒を東京が独占。インバウンド誘致における「美食都市」ブランド力が継続強化。\n- **出典**：[ミシュラン公式発表](https://news.michelin.co.jp/articles/20250925-michelin-guide-tokyo-2026-selection-release) ／ [Timeout Tokyo記事](https://www.timeout.jp/tokyo/ja/news/michelin-awards-tokyo-restaurants-2026-092925)\n\n---\n\n## ⏰ 期間限定・コラボ（最大5件）\n\n### 1. THE COSMOPOLITAN GRILL BAR TERRACE「トルコアフタヌーンティー」\n**グランフロント大阪 南館9F（梅田）/ 大阪梅田駅直結**\n\n- **提供期間**：2026年6月22日（月）〜 **2026年7月31日（木）**\n- **内容**：トルコの食文化をテーマにしたアフタヌーンティー。グランフロント大阪南館の高層テラスラウンジで、国際色豊かなフードとドリンクを展開。\n- **予約**：要確認（グランフロント大阪公式または電話予約推奨）\n- **公式リンク**：[Timeout 大阪6月イベント](https://www.timeout.jp/osaka/ja/things-to-do/best-things-to-do-in-osaka-in-june-2026)\n\n---\n\n### 2. ピングー × ラフォーレ原宿 コラボカフェ\n**原宿 / 明治神宮前駅徒歩1分**\n\n- **提供期間**：2026年6月24日（火）〜 **2026年7月6日（日）**\n- **内容**：人気キャラクター「ピングー」をテーマにしたコラボカフェ。ピングーモチーフのスイーツ・ドリンクを展開。\n- **予約**：詳細は公式サイト確認\n- **公式リンク**：[コラボカフェ.com（東京イベント一覧）](https://collabo-cafe.com/events/tag/tokyo/)\n\n---\n\n### 3. TVアニメ「氷の城壁」× THEキャラCAFE\n**東京・大阪（各店舗）**\n\n- **提供期間**：2026年6月5日（金）〜 **2026年7月19日（日）**\n- **内容**：TVアニメ「氷の城壁」コラボカフェ。キャラクターモチーフのフードとドリンクを展開。\n- **予約**：各店舗公式サイトで確認\n- **公式リンク**：[コラボカフェ.com](https://collabo-cafe.com/events/tag/tokyo/)\n\n---\n\n### 4. 映画「ちいかわ 人魚の島のひみつ」× THE GUEST CAFE\n**渋谷・心斎橋（順次開催）**\n\n- **提供期間**：2026年7月10日（木）〜（渋谷・心斎橋で順次オープン、終了日は公式確認要）\n- **内容**：映画「ちいかわ 人魚の島のひみつ」公開記念コラボカフェ。ちいかわモチーフのフード＆ドリンク、限定グッズ。\n- **予約**：要事前予約（公式サイト参照）\n- **公式リンク**：[コラボカフェ.com（東京一覧）](https://collabo-cafe.com/events/tag/tokyo/)\n\n---\n\n## 📈 トレンドフード（最大3件）\n\n### 1. ダルバート \u0026 モモ — ネパール料理が2026年エスニックの主役へ\n- **食材・ジャンル**：ダルバート（豆スープ＋米飯定食）、モモ（ネパール蒸し餃子）\n- **なぜ今旬か**：スパイスカレーブームの「次」として食べログマガジンが2026年トレンド筆頭に予測。ヘルシーでスパイスによる発汗効果が夏の需要と合致し、新大久保を中心に専門店が急増。「罪悪感ゼロの満腹感」というキーワードで若い世代に浸透中。（出典：[食べログマガジン2026トレンド予測](https://magazine.tabelog.com/articles/482545)）\n- **代表店**：\n  - **MOMO（新大久保）** ネパール居酒屋の元祖格。ネパールご飯セット¥1,350〜 ／ [食べログ](https://tabelog.com/en/tokyo/A1304/A130404/13104607/)\n  - **MOMO Stand Tokyo 2nd（西新宿）** モダンネパール料理。5種モモを一度に楽しむ「モモフライト」が必食\n  - **セクワガル（大久保）** 炭火焼きセクワ＋モモ＋ダルバートが揃う本格派\n\n---\n\n### 2. 夏の東南アジア料理 — 亜熱帯化する日本の食卓を席巻\n- **食材・ジャンル**：空心菜、トムカーガイ（タイのココナッツミルクスープ）、ヒンガー（ミャンマー）\n- **なぜ今旬か**：日本の夏の亜熱帯化が進む中、発汗・代謝促進効果を持つ東南アジア料理への関心が急浸透。「煮込まない涼しいスープ」「10分以内の短時間調理」トレンドとも合致。食べログマガジンが空心菜を「猛暑時代の救世主野菜」と特集。タイ・ミャンマー・ベトナム料理専門店が都市部で増加中。（出典：[食べログマガジン](https://magazine.tabelog.com/articles/482545) ／ [クックパッド食トレンド2026](https://prtimes.jp/main/html/rd/p/000000350.000027849.html)）\n- **代表店**：東京・大阪の東南アジア料理専門店（食べログ「空心菜炒め」「トムカーガイ」などで検索推奨）\n\n---\n\n### 3. 明太フランス — パン界の\"独立ジャンル\"化が加速\n- **食材・ジャンル**：明太子×フランスパン（バゲット）\n- **なぜ今旬か**：食べログマガジンが「2026年にかつてない熱狂を迎えている」と言及。パン屋の定番を超えて「明太フランス」という一ジャンルとして独立し、明太子の産地・グレードによる差別化競争が激化。ポップアップ・コラボ展開も増加中。（出典：[食べログマガジン](https://magazine.tabelog.com/articles/482545)）\n- **代表店**：馬場FLAT（高田馬場）、各ベーカリーカフェ ※来訪前に公式SNSで販売状況確認推奨\n\n---\n\n### 出力前セルフチェック\n- [x] 全項目 R1（日付）クリア ※バズりグルメの直近7日確認は元投稿投稿日時取得不可のため制限あり。新規オープンは6/13・6/15でともに14日以内 ✓。期間限定は全件TODAY提供中または30日以内開始 ✓\n- [-] バズ言及に拡散規模の数値を入れた ※SNS直接アクセス制限により再生数・いいね数・RT数が今週時点で取得できず。元投稿URLのみ掲載（R2部分充足、数値未達を明示）\n- [x] 新規オープン店は14日以内（6/13 ✓・6/15 ✓）\n- [x] 店舗の閉店・移転をチェックした（食べログ・公式サイト・PR TIMESで掲載確認できたもののみ掲載）\n- [x] 食べログユーザー投稿画像を埋め込んでいない（全画像省略）\n- [x] 期間限定の終了日を明記（全件に開始〜終了日を明示）\n\n\n\nSources:\n- [食べログマガジン 2026年トレンドグルメ予測](https://magazine.tabelog.com/articles/482545)\n- [Brussels Fries 紹介記事 - Trepo](https://trepo.jp/food/305573/)\n- [Brussels Fries - hamum記事](https://hamums.com/2026/02/11/odekake-brussels-fries/)\n- [Brussels Fries Instagram](https://www.instagram.com/p/DT0SS2AE9ui/)\n- [ミシュランガイド東京2026 新三つ星発表](https://news.michelin.co.jp/articles/20250925-michelin-guide-tokyo-2026-selection-release)\n- [ミシュランガイド東京2026 星発表一覧](https://guide.michelin.com/us/en/article/michelin-guide-ceremony/michelin-guide-tokyo-2026-stars-reveal)\n- [明寂/Myojaku 公式サイト](https://myoujyaku.com/)\n- [ミシュランガイド東京2026掲載総括 - Timeout Tokyo](https://www.timeout.jp/tokyo/ja/news/michelin-awards-tokyo-restaurants-2026-092925)\n- [ヒトサラマガジン ミシュラン東京2026記事](https://magazine.hitosara.com/article/1860/)\n- [海鮮市場 八芳 上野 - biz-hibana紹介記事](https://biz-hibana.com/happou-ueno/)\n- [海鮮市場 八芳 上野店 食べログ](https://tabelog.com/tokyo/A1311/A131101/13321581/)\n- [ピエール・エルメ・パリ 丸の内 PR TIMESリリース](https://prtimes.jp/main/html/rd/p/000000029.000038890.html)\n- [ピエール・エルメ・パリ 丸の内 公式](https://www.pierreherme.co.jp/boutique/marunouchi/)\n- [MOMO（新大久保）食べログ](https://tabelog.com/en/tokyo/A1304/A130404/13104607/)\n- [コラボカフェ.com 東京イベント一覧](https://collabo-cafe.com/events/tag/tokyo/)\n- [Timeout 大阪6月イベント](https://www.timeout.jp/osaka/ja/things-to-do/best-things-to-do-in-osaka-in-june-2026)\n- [クックパッド 食トレンド予測2026](https://prtimes.jp/main/html/rd/p/000000350.000027849.html)\n- [ぐるなび通信 2026年外食トレンド上半期](https://pro.gnavi.co.jp/magazine/t_res/cat_7/a_4869/)";
document.getElementById('content').innerHTML = marked.parse(md);
document.querySelectorAll('#content h3').forEach(h3 => {
  const raw = h3.textContent.trim();
  const clean = raw.replace(/^\d+\.\s*/,'').split(/[（(―—\s]/)[0].trim();
  if (!clean || clean.length < 2) return;
  fetch('https://ja.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(clean))
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(d => {
      if (!d.thumbnail) return;
      const img = document.createElement('img');
      img.src = d.thumbnail.source;
      img.alt = clean;
      h3.insertAdjacentElement('afterend', img);
    })
    .catch(() => {});
});
