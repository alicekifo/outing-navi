const md = "# ⚽ サッカー移籍情報 \u0026 ワールドカップ2026 速報\n**2026年7月10日（金）**\n\n---\n\n## ✅ 完了した移籍（7/3〜7/10）\n\n\u003e **[R1確認]** 公式発表または信頼ソース2件以上で確認済み（TODAYより7日以内基準）。マルコ・パレストラ（7/3発表）は枠上限（最大10件）整理のため本日で掲載終了（明日7日基準超過）。ダラ・ジキエミはRomano単独ソースのまま裏取りが揃わなかったため掲載終了。\n\n### 1. イラン・メスリエ（Illan Meslier）（GK, 26歳）リーズ → アーセナル【NEW／7/9発表】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | フリー（契約満了） |\n| 背番号 | 30 |\n| 発表日 | 2026年7月9日 |\n\n- アーセナル公式が獲得を発表。リーズで7シーズン215試合出場・70クリーンシート。ラヤの控え兼競争相手としてGK層を厚くする補強\n- **ソース**：アーセナル公式、OneFootball（S+A級複数）\n\u003e source: [Arsenal公式](https://www.arsenal.com/news/illan-meslier-signs-arsenal) / [OneFootball](https://onefootball.com/en/news/official-arsenal-sign-illan-meslier-43117477) (2026-07-09)\n\n### 2. ショーン・ステュール（Sean Steur）（MF, 18歳）アヤックス → ニューカッスル【NEW／7/9発表】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £23M（最大約€27M・アドオン込み） |\n| 契約 | 5年 |\n| 発表日 | 2026年7月9日 |\n\n- トナリ売却資金の再投資第2弾。昨季アヤックスで26試合1ゴール、CLの最年少アシスト記録保持者。ハウ監督「本物の潜在能力を見ている」\n- **ソース**：アヤックス公式、Sky Sports、ESPN（S+A級複数）\n\u003e source: [Ajax公式](https://english.ajax.nl/articles/sean-steur-joins-newcastle-united/) / [Sky Sports](https://www.skysports.com/football/news/11095/13561944/sean-steur-newcastle-sign-midfielder-from-ajax-for-lb23m-on-five-year-deal-after-sandro-tonali-exit) (2026-07-09)\n\n### 3. アレクサンダー・ニューベル（Alexander Nübel）（GK, 29歳）バイエルン → ベシクタシュ【継続掲載・7/8発表】\n- €6.5M＋アドオン最大€5M／3年契約（〜2029年）。ノイアーの後継レースから正式に離脱\n\u003e source: [FC Bayern公式](https://fcbayern.com/en/news/2026/07/alexander-nubel-joins-besiktas) / [Bundesliga.com](https://www.bundesliga.com/en/bundesliga/news/alexander-nubel-bayern-munich-transfers-besiktas-germany-38129) (2026-07-08)\n\n### 4. ハリー・ウィルソン（Harry Wilson）（MF, 29歳）フラム → リーズ【継続掲載・7/8発表】\n- フリー（契約満了）／4年契約。リーズの今夏1号補強、昨季フラムで11G8A\n\u003e source: [Leeds United公式](https://www.leedsunited.com/en/news/harry-wilson-becomes-our-first-summer-signing) / [Sky Sports](https://www.skysports.com/football/news/11095/13557327/leeds-transfer-news-harry-wilson-agreement-reached-as-midfielder-set-to-sign-on-free-transfer-when-fulham-contract-expires) (2026-07-08)\n\n### 5. サンドロ・トナリ（Sandro Tonali）（MF, 26歳）ニューカッスル → トッテナム【継続掲載・7/7発表】\n- £100M（£92.5M＋アドオン£7.5M、トッテナム史上最高額）／6年契約／背番号16\n\u003e source: [Tottenham公式](https://www.tottenhamhotspur.com/news/1076467/welcome-sandro-tonali-makes-the-move-to-n17) / [Sky Sports](https://www.skysports.com/football/news/11095/13559730/sandro-tonali-tottenham-sign-italy-midfielder-in-club-record-lb100m-deal-from-newcastle) (2026-07-07)\n\n### 6. ティリク・ジョージ（Tyrique George）（FW, 20歳）チェルシー → エヴァートン【継続掲載・7/6発表】\n- £18M＋アドオン（総額約£24M）／4年契約。1月からのレンタルを買い取りで完全移籍化\n\u003e source: [Chelsea公式](https://www.chelseafc.com/en/news/article/tyrique-george-departs-chelsea-for-everton) / [beIN SPORTS](https://www.beinsports.com/en-asia/football/premier-league/articles/everton-announce-permanent-signing-of-chelsea-forward-george-2026-07-06) (2026-07-06)\n\n### 7. バズマナ・トゥーレ（Bazoumana Touré）（FW, 20歳）ホッフェンハイム → ニューカッスル【継続掲載・7/5発表】\n- €50M（約£43M）／5年契約。コートジボワール代表ウインガー、トナリ売却資金の再投資第1弾\n\u003e source: [Newcastle公式](https://www.newcastleunited.com/en/news/newcastle-united-sign-bazoumana-toure) / [ESPN](https://www.espn.com/soccer/story/_/id/49279207/newcastle-sign-winger-bazoumana-toure-hoffenheim) (2026-07-05)\n\n### 8. デンゼル・ダンフリース（Denzel Dumfries）（DF, 30歳）インテル → レアル・マドリード【継続掲載・7/5発表】\n- €20M（解除金の早期発動）／4年契約\n\u003e source: [Real Madrid公式発表・ESPN確認済み] (2026-07-05)\n\n### 9. エリオット・アンダーソン（Elliot Anderson）（MF, 23歳）ノッティンガム・フォレスト → マンチェスター・シティ【継続掲載・7/4発表】\n- £116M（イングランド人選手史上最高額）。イングランド代表として8強進出中（7/12 ノルウェー戦）、登録手続きは大会後\n\u003e source: [Sky Sports](https://www.skysports.com/football/news/11661/13550595/elliot-anderson-transfer-news-man-city-agree-deal-to-sign-nottingham-forest-midfielder) (2026-07-04)\n\n### 10. マテウス・フェルナンデス（Matheus Fernandes）（MF, 21歳）ウェストハム → トッテナム【継続掲載・7/3発表／本日で7日基準最終日】\n- £85M（当時クラブ史上最高額。トナリ加入で更新済み）\n\u003e source: [Tottenham公式・Sky Sports確認済み] (2026-07-03)\n\n---\n\n## ⚡ Here We Go!\n\n### 1. オスカル・ミンゲサ（Óscar Mingueza）（DF, 27歳）セルタ → クリスタル・パレス【フリー・NEW】\n- Romanoが「Crystal Palace reach verbal agreement to sign Oscar Mingueza, here we go!」と確定発言（Xで直接確認済み）。セルタから契約満了のフリーで加入、4年契約見込み。メディカルは7/8に実施済み、サージュ新監督の1号補強。右SB/WB/CBをこなせる万能型で、EL出場権を持つパレスの陣容強化\n- **ソース**：Fabrizio Romano（X・本人投稿を直接確認）、EPL Index\n\u003e source: [Fabrizio Romano（X）](https://x.com/FabrizioRomano/status/2074935351043297590) / [EPL Index](https://eplindex.com/148178/here-we-go-fabrizio-romano-confirms-crystal-palace-transfer-agreement.html) (2026-07-08)\n\n### 2. ジェシー・ダリー（Jesse Derry）（FW, チェルシー）→ スポルティングCP【ローン・継続掲載】\n- Romanoが確定発言済み。2027年6月までのローン、給与全額負担・買い取りOPなし。チェルシーとは長期契約を更新した上での武者修行\n\u003e source: [FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/07/chelsea-secure-wonderkid-transfer-long-term-contract-agreed-jesse-derry-fabrizio-romano) / [Football365](https://www.football365.com/news/chelsea-transfer-romano-here-we-go-derry-sporting-cp-vlahovic) (2026-07-08)\n\n---\n\n## 🔵 交渉中・関心あり\n\n### 1. エデルソン（Éderson）（MF, 26歳）アタランタ → マンチェスター・ユナイテッド【◎ほぼ確実／メディカル最終段階・本日最終判断】\n- €40.5M＋ボーナス€4.5M（最大£38M）・2030年までの契約で合意済み。7/9にメディカル第1弾を実施、追加検査を経て**7/10（本日）に最終判断**の見込みとSky Sport Italia・Romanoが報道。医師団が追加検査を求めたため「停滞」報道も出ており、クリアすれば速やかに公式発表へ\n\u003e source: [Football Italia](https://football-italia.net/ederson-first-manchester-united-extra-medical/) / [Football365](https://www.football365.com/news/man-utd-transfer-ederson-stalled-medical-concerns) (2026-07-09)\n\n### 2. ブルーノ・ギマランイス（Bruno Guimarães）（MF, 28歳）ニューカッスル → アーセナル【○有力／個人合意済み・クラブ間交渉・NEW】\n- RomanoとBen Jacobsが「個人条件は口頭合意済み」と確認。クラブ間は隔たりあり：アーセナルは仲介者経由で£55M→代理人側から£65M案、ニューカッスルの要求は£90M。£72M前後の「最終オファー」準備との報道（伯UOL）。ニューカッスルはまだ放出を承認していない\n\u003e source: [Football365](https://www.football365.com/news/bruno-guimaraes-agreement-confirmed-price-newcastle-sell-arsenal-revealed) / [Football365](https://www.football365.com/news/arsenal-agreement-bruno-guimaraes-newcastle-accelerate-final-offer) (2026-07-09)\n\n### 3. モーガン・ロジャーズ（Morgan Rogers）（MF, 23歳）アストン・ヴィラ → アーセナル【○有力／初回入札準備・選手側と大筋合意】\n- アーセナルは選手側との交渉で大きく前進し「本人の希望先」との報道。初回入札は€85M（半額前払い＋残額3年分割）を準備。ヴィラは£130M（英国史上最高額）要求を堅持。チェルシー・シティ・マンU・リヴァプールも監視継続\n\u003e source: [ESPN](https://www.espn.com/soccer/story/_/id/49312380/transfer-rumors-news-arsenal-tottenham-rb-leipzig-norway-antonio-nusa) / [FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/07/exclusive-arsenal-very-close-to-morgan-rogers-transfer-breakthrough) (2026-07-09)\n\n### 4. ドゥシャン・ヴラホヴィッチ（Dušan Vlahović）（FW, 26歳）ユヴェントス → チェルシー【△噂レベル／接触・交渉リード報道】\n- ユーヴェとの契約延長交渉は不調でフリー退団の公算。チェルシーが代理人と接触済みで交渉をリードと報道。本人は欧州残留・イタリア国外挑戦を希望、サウジからの関心は優先度低。マンU・トッテナム・ニューカッスル等も状況を打診\n- ※一次ソース（Romano本人投稿）の直接確認は取れておらず△を維持\n\u003e source: [Football365](https://www.football365.com/news/chelsea-juventus-fist-alonso-signing-contact-made-agents-free-transfer) (2026-07上旬)\n\n---\n\n## 🇯🇵 日本人選手の動向\n\n### 1. 佐野海舟（Kaishu Sano）（MF, マインツ）— リヴァプールと個人条件合意と英報道【○有力】\n- 英報道で「個人条件はすでに合意、本人もリヴァプール行きを強く希望、クラブ間交渉も進行中」と伝えられ、前日から一歩前進。マインツの要求額は€60M（約110億円）＝日本人史上最高額級。リヴァプール・マンU・アーセナル・ドルトムントの争奪戦\n\u003e source: [Football Tribe Japan](https://football-tribe.com/japan/2026/07/07/356600/) / [Qoly](https://qoly.jp/q1/17849967) (2026-07-07)\n\n### 2. 久保建英（Takefusa Kubo）（MF, レアル・ソシエダ）— リヴァプール移籍説は継続も新展開なし【△噂レベル】\n- リヴァプールが契約条件を問い合わせたとの英報道（7/4）以降、続報なし。右WGの複数候補のうちの一人という位置づけで、解除金は€60M・契約は2029年6月まで。W杯で痛めた左膝の回復は順調と報道\n\u003e source: [東スポWEB](https://www.tokyo-sports.co.jp/articles/-/394603) / [Goal.com](https://www.goal.com/en-us/lists/takefusa-kubo-liverpool-transfer-talk-real-sociedad-president/bltd652865cf3969022) (2026-07-04)\n\n---\n\n## 🏆 ワールドカップ2026\n\n1. **フランスがベスト4一番乗り**。準々決勝①でモロッコを2-0で下し、大会6連勝（唯一の全勝・延長なし）\n\u003e source: [FIFA公式](https://www.fifa.com/en/match-centre/match/17/285023/289289/400021536) / [ESPN](https://www.espn.com/soccer/match/_/gameId/760510/morocco-france) (2026-07-09)\n2. **エムバペ（Kylian Mbappé）が得点ランク首位に浮上**。8点でメッシに並び、アシスト数（3対1）で単独トップ扱いに\n\u003e source: [olympics.com](https://www.olympics.com/en/news/fifa-world-cup-2026-france-morocco-quarter-final-score-lineups-live-updates) / [FOX Sports](https://www.foxsports.com/stories/soccer/2026-fifa-world-cup-golden-boot-tracker) (2026-07-09)\n3. **準決勝日程が確定**。SF①は7/15（水）4:00 JST・AT\u0026Tスタジアム（ダラス）でフランス vs スペイン/ベルギーの勝者、SF②は7/16（木）4:00 JST・メルセデス・ベンツ・スタジアム（アトランタ）\n\u003e source: [SI](https://www.si.com/soccer/2026-world-cup-quarterfinal-semifinal-locations-stadiums-schedule-kickoff-times) / [NBC Sports](https://www.nbcsports.com/soccer/news/2026-world-cup-schedule-kick-off-times-stadiums-dates-groups-how-to-watch-live-bracket) (2026-07-08)\n4. **森保一監督が続投へ**。JFAがアジア杯サウジ大会（2027年1〜2月）までの異例の「半年」契約を打診し内諾済みと報道。優勝しても延長せず、来年3月は新監督で迎える方針。正式決定は技術委員会・理事会を経て\n\u003e source: [日刊スポーツ（Yahoo!ニュース）](https://news.yahoo.co.jp/articles/709eaf06c1415615257b6b0dc760088db88b728f) / [サッカーキング（Yahoo!ニュース）](https://news.yahoo.co.jp/articles/cf0989f9e8db5e604cf881c86d5fe4e70b2b7804) (2026-07-08)\n5. **日本代表は6/29のR32ブラジル戦（1-2）で敗退済み**（詳細は日本代表詳報欄）\n\u003e source: [ESPN](https://www.espn.com/soccer/story/_/id/49216717/brazil-avoid-world-cup-shock-late-win-vs-japan-reach-round-16) (2026-06-29)\n\n---\n\n## ⚽ 今週の試合・活躍情報\n\n1. **エムバペ（Kylian Mbappé）（フランス）**：モロッコ戦、28分にPKをブヌに止められるも、60分に巻いて沈める大会8点目→66分にデンベレの追加点をアシスト。W杯キャリア通算20ゴール到達\n2. **デンベレ（Ousmane Dembélé）（フランス）**：66分、エムバペのお膳立てを低いフィニッシュでニアに流し込み大会5点目\n3. **ブヌ（Yassine Bounou）（モロッコ）**：エムバペのPKをストップし前半を無失点で耐えた。2022年準決勝に続く再戦も力尽きる\n4. **メスリエ（Illan Meslier）（アーセナル新加入）**：発表当日からプレシーズン合流へ。ラヤとの正GK競争が今夏の注目点\n\u003e source: [Sky Sports](https://www.skysports.com/football/news/11095/13560796/world-cup-2026-france-2-0-morocco-kylian-mbappe-magic-decides-quarter-final-after-his-own-early-penalty-miss) / [ESPN](https://www.espn.com/soccer/story/_/id/49318321/kylian-mbappe-france-lethal-morocco-reaching-2026-world-cup-semifinals) (2026-07-09)\n\n---\n\n## 📰 The Athletic ピックアップ\n\n※本日該当する情報はありません（直近3日以内の記事を検索で特定できず。ペイウォール外からの確認が取れた記事のみ掲載する方針のため、確認でき次第の掲載とする）\n\n---\n\n## 🌍 昨日の試合結果\n\n**※昨日JST帯（7/9 17:00〜7/10 02:00）の試合はなし。準々決勝①は本日7/10早朝（JST）に終了したため以下に掲載**\n\n| 試合 | スコア | 得点者 |\n|------|--------|--------|\n| フランス vs モロッコ（準々決勝①） | **2-0** | エムバペ（60分）、デンベレ（66分） |\n\n- 28分にエムバペのPKをブヌがセーブし前半は0-0。後半にエムバペが自ら打開し、6分後にデンベレへのアシストで試合を決めた。フランスは大会唯一の6戦全勝（延長なし）で準決勝へ。試合の主役は1G1Aのエムバペ（各媒体のMOM評価）\n\u003e source: [FIFA公式](https://www.fifa.com/en/match-centre/match/17/285023/289289/400021536) / [ESPN](https://www.espn.com/soccer/story/_/id/49316467/france-morocco-live-world-cup-2026-latest-updates-commentary-score-result) / [Sky Sports](https://www.skysports.com/football/news/11095/13560796/world-cup-2026-france-2-0-morocco-kylian-mbappe-magic-decides-quarter-final-after-his-own-early-penalty-miss) (2026-07-09)\n\n---\n\n## 📅 今日・明日の試合スケジュール\n\n**今日 7/10（金）JST：これ以降の試合なし**（準々決勝①は早朝に終了済み・結果は上欄）\n\n**明日 7/11（土）JST：**\n\n| キックオフ（JST） | カード | 会場 |\n|------|--------|------|\n| 7/11 (土) 4:00 JST（10日 15:00 ET） | 準々決勝② スペイン vs ベルギー | SoFiスタジアム（ロサンゼルス） |\n\n**以降の準々決勝・準決勝（参考）：**\n\n| キックオフ（JST） | カード | 会場 |\n|------|--------|------|\n| 7/12 (日) 6:00 JST（11日 17:00 ET） | 準々決勝③ ノルウェー vs イングランド | ハードロック・スタジアム（マイアミ） |\n| 7/12 (日) 10:00 JST（11日 21:00 ET） | 準々決勝④ アルゼンチン vs スイス | アローヘッド・スタジアム（カンザスシティ） |\n| 7/15 (水) 4:00 JST（14日 15:00 ET） | 準決勝① フランス vs（スペイン/ベルギーの勝者） | AT\u0026Tスタジアム（ダラス） |\n| 7/16 (木) 4:00 JST（15日 15:00 ET） | 準決勝② QF③勝者 vs QF④勝者 | メルセデス・ベンツ・スタジアム（アトランタ） |\n\n- 注目①：スペイン×ベルギーの勝者は中3日でフランス戦。オヤルサバル（4点）とデ・ブライネの状態が鍵\n- 注目②：ノルウェー×イングランドはハーランド（7点）×ケイン（6点）の得点王争い直接対決\n\u003e source: [Al Jazeera](https://www.aljazeera.com/sports/2026/7/8/fifa-world-cup-2026-quarterfinal-fixtures-match-previews-schedule) / [SI](https://www.si.com/soccer/2026-world-cup-quarterfinal-semifinal-locations-stadiums-schedule-kickoff-times) (2026-07-08)\n\n---\n\n## 📊 グループ順位表\n\n※グループステージは全日程終了（順位確定済み・変動なし）。大会は決勝トーナメントに移行済みのため、本欄の更新はありません。\n\n**現在の勝ち残り**：フランス（ベスト4確定）／スペイン／ベルギー／ノルウェー／イングランド／アルゼンチン／スイス（以上ベスト8）。モロッコは7/9敗退\n\u003e source: [FIFA公式](https://www.fifa.com/en/match-centre/match/17/285023/289289/400021536) (2026-07-09)\n\n---\n\n## 📋 日本代表詳報\n\n**※日本は敗退済み**（6/29・R32 ブラジル戦 1-2）\n\n- 前半に佐野海舟のインターセプトからの独走ゴールで先制。カゼミーロのヘッドで追いつかれ、90+6分にマルティネッリに決勝点を許す痛恨の幕切れ。ノックアウト初戦の壁は5大会連続で越えられず\n- **【NEW】森保監督の続投が固まる**：JFAがアジア杯（2027年1/7〜2/5）までの半年契約を打診し、複数関係者によれば本人が受諾の返答。優勝でも延長なし・来年3月から新監督体制の方針。正式決定は技術委員会・理事会を経る段階で、JFA内部には意見対立の報道もあり\n- **市場の動き**：佐野は個人条件合意報道まで進展、久保はリヴァプール問い合わせ報道以降は続報なし（詳細は「日本人選手の動向」欄）\n\u003e source: [日刊スポーツ（Yahoo!ニュース）](https://news.yahoo.co.jp/articles/709eaf06c1415615257b6b0dc760088db88b728f) / [ESPN](https://www.espn.com/soccer/story/_/id/49216717/brazil-avoid-world-cup-shock-late-win-vs-japan-reach-round-16) (2026-07-08)\n\n---\n\n## 🌟 大会ハイライト\n\n**得点ランキング（7/10時点）：**\n\n| 順位 | 選手 | 得点 | アシスト |\n|------|------|------|------|\n| 1 | エムバペ（Kylian Mbappé）🇫🇷 | 8 | 3 |\n| 1 | メッシ（Lionel Messi）🇦🇷 | 8 | 1 |\n| 3 | ハーランド（Erling Haaland）🇳🇴 | 7 | 0 |\n| 4 | ケイン（Harry Kane）🏴󠁧󠁢󠁥󠁮󠁧󠁿 | 6 | - |\n| 5 | デンベレ（Ousmane Dembélé）🇫🇷 | 5 | - |\n| 6 | オヤルサバル（Mikel Oyarzabal）🇪🇸 | 4 | - |\n\n- 得点同数時はアシスト数がタイブレーク。エムバペがモロッコ戦の1G1Aで8点3Aとなり、8点1Aのメッシを暫定で上回った（※前日記事の「メッシ0A」はエジプト戦のアシスト計上漏れ。1Aに訂正）\n- 注目トピック：①フランスが大会唯一の6戦全勝で2大会ぶりのベスト4 ②メッシは7/12スイス戦、ハーランドは7/12イングランド戦で反撃の機会 ③準決勝2試合はダラス→アトランタと米南部開催\n\u003e source: [FOX Sports](https://www.foxsports.com/stories/soccer/2026-fifa-world-cup-golden-boot-tracker) / [olympics.com](https://www.olympics.com/en/news/fifa-world-cup-2026-france-morocco-quarter-final-score-lineups-live-updates) (2026-07-09)";
