<script>
const md = "十分な情報が集まりました。週報をまとめます。\n\n---\n\n# 🗓️ ライフスタイル週報 2026年5月31日号\n\n---\n\n## 🍷 ワイン\n\n### ① ボルドー2025 エン・プリムール開幕 ─ 「2019年超え」の期待感高まる\n\n今月、ボルドーのシャトーには85カ国から約4,000人のワイン業界関係者が集結し、2025年ヴィンテージの先物取引「アン・プリムール」が本格始動しました。極端な気候条件を高い醸造技術で乗り越えた2025年は、赤・辛口白・貴腐ワインすべてで高水準を記録する稀有な成功年との評価が相次いでいます。醸造コンサルタントの多くが「2019年のような活況が再び来る可能性がある」と発言しており、コレクターや投資家の注目を集めています。\n\n注目の価格帯では、シャトー・ポンテ・カネ2025がネゴシアン価格1本58ユーロ（約9,500円）と前年比3%の引き下げで登場。さらにサンテミリオン周辺の\"衛星\"アペラシオン（カスティヨン・コート・ド・ボルドー、フロンサックなど）では手頃な価格帯での成功例も多く報告されています。\n\n- [ボルドー2025は傑作の予想、どうなるプリムール商戦 | WINE REPORT](https://www.winereport.jp/archive/5577/)\n- [ボルドー2025アン・プリムール開幕！ポンテ・カネの戦略的価格設定 | WineNation](https://winenation.jp/en/blogs/article/20260430)\n\n---\n\n### ② ドラピエ「Éclose（エクロ）2012」発表 ─ 15年越しのシャンパーニュ\n\n名門シャンパーニュ・メゾン「ドラピエ（Drappier）」が、ロンドンにて待望のプレスティージュ・キュヴェ **「Éclose 2012」** を発表しました。構想から実に15年をかけて完成した一本で、シャンパーニュの熟成に対する\"オルタナティブ・アプローチ\"を採用。さらに同時期には英国「ナイティンバー（Nyetimber）」が、International Wine Challengeでシャンパーニュ以外から同コンテスト34年の歴史で初となる「Champion Sparkling Wine」トロフィーを受賞し、英国スパークリングの実力が世界に証明されました。\n\n- [WINEニュース 注目3選（2026年5月18日）｜蒼樹 悠希 - note](https://note.com/carbon4322/n/nf5571555b3d3)\n- [ワインニュース一覧 - Wine News(beta)](https://winenews.guruguru.com/)\n\n---\n\n### ③ コスパ良いワイン：今週の注目銘柄（2,000〜5,000円台）\n\n**価格.comの2026年5月ランキング** では、チリ産ワインが引き続きコスパ上位を独占しています。特に注目は以下の2本。\n\n- **ビニャ・タラパカ ブルーラベル（チリ）** ─ 約4,500円前後。生産量が極めて限られる上級キュヴェながら、この価格帯でのクオリティは圧倒的。カベルネ・ソーヴィニヨン主体でしっかりとした骨格と長い余韻が特徴。\n- **エノテカ・セレクション 1,000円台高得点銘柄** ─ エノテカが独自スコアで90点以上をつけたヨーロッパ産デイリーワインが複数ラインナップ。自宅用の毎日の一杯に最適。\n\n\u003e 購入は各ECサイトや実店舗で。エノテカオンラインでの取り扱いが豊富です。\n\n- [2026年5月 ワインの人気商品ランキング - 価格.com](https://kakaku.com/ranking/drink/0016_0034/0013/)\n- [予算5000円で飲める！ソムリエおすすめワイン15選 - dragee](https://www.dragee.co.jp/winepark/5000yenselect/)\n- [1,000円台から楽しむ！高得点ワイン10選 | エノテカ](https://www.enoteca.co.jp/archives/detail/RH)\n\n---\n\n## 🍶 日本酒\n\n### ① 「日本酒フェア2026」6月19・20日 池袋で開催 ─ チケット発売中\n\n国内最大級の日本酒イベント **「第17回 全国日本酒フェア」** が、6月19日（金）・20日（土）に東京・池袋サンシャインシティで開催されます。45都道府県の酒造組合が参加し、**全国1,000銘柄以上** が集結。蔵元・造り手から直接話を聞きながら試飲でき、気に入った銘柄はその場で購入も可能です。\n\n同日開催の「令和7酒造年度 全国新酒鑑評会 公開きき酒会」では金賞受賞酒も試飲できます。\n\n| 項目 | 内容 |\n|---|---|\n| 日程 | 2026年6月19日（金）・20日（土） |\n| 会場 | 池袋・サンシャインシティ ワールドインポートマートビル4F |\n| 料金 | 一般 5,000円 / U-39（20〜39歳）2,000円 |\n| チケット | 公式サイトで販売中 |\n\n- [日本酒フェア2026 公式サイト](https://sakefair.com/)\n- [日本酒フェア2026 | レッツエンジョイ東京](https://www.enjoytokyo.jp/event/2067215/)\n\n---\n\n### ② 「若手の夜明け2026」9月に東京・大手町で開催決定\n\n日本酒業界の次世代を担う若手醸造家が一堂に会する **「若手の夜明け2026」** が、9月30日（水）〜10月4日（日）の5日間、東京・大手町仲通りで開催されることが発表されました。三菱地所との共催で、国内約50蔵＋海外蔵が参加予定。世代交代・後継者不足・市場縮小という日本酒業界の構造課題に真正面から向き合うムーブメントとして、業界内外から注目されています。延べ10,000人の来場を見込んでいます。\n\n- [「若手の夜明け2026」開催決定！プレスリリース - PR TIMES](https://prtimes.jp/main/html/rd/p/000000035.000100343.html)\n- [2026年最新版 全国日本酒イベントカレンダー | たのしいお酒.jp](https://tanoshiiosake.jp/9020)\n\n---\n\n### ③ 5月末は\"夏酒\"デビューのベストタイミング ─ 旬の一本を探そう\n\n日本酒の季節は春酒（3〜5月）から夏酒（6〜8月）へと移行する時期。5月末現在は、冷やしてすっきり飲める **「夏限定酒」** が各蔵から続々リリースされています。爽やかな酸味と軽快な飲み口が特徴で、冷蔵庫でよく冷やしてビアグラスで楽しむのがトレンド。また2026年は業界が「**熟成酒元年**」と位置づける年でもあり、IWC SAKE部門（5月・広島開催）を通じた熟成酒の国際評価向上も話題になっています。\n\nさらに **奈良・春鹿宴日**（5月30日開催）など関西方面でも蔵開きイベントが続いています。\n\n- [日本酒にも季節がある！四季の旬の日本酒を解説 | SAKE Street](https://sakestreet.com/ja/media/learn-seasonal-sake)\n- [日本酒イベントカレンダー | 日本酒カレンダー](https://nihonshucalendar.com/)\n\n---\n\n## 📱 ガジェット・テック\n\n### ① VITURE Beast XRグラス ─ Switch 2対応の「XRグラス完成形」がファミ通レビューで話題\n\n今週のガジェット最注目は **VITURE Beast XRグラス（82,880円）**。5月25日にはヨドバシカメラ・ファミ通とのキャンペーンが展開され、ファミ通.comでは「Nintendo Switch 2に接続して174インチの大画面でゲームをプレイできる」という体験レビューが公開されて話題沸騰中です。\n\n**主なスペック：**\n- ソニー製最新 Micro OLED（片目1920×1200、最大1,250ニト）\n- 視野角 **58度**（従来比大幅拡大）\n- 6DoF対応 ＋ マイク内蔵\n- アルミ・マグネシウム合金フレーム、Regular/Largeの2サイズ展開\n- 小型カメラ内蔵で映像の「空間アンカー」機能対応\n\n米国での販売価格は549ドル（日本では82,880円）。XRグラスカテゴリの本格普及を予感させる一台です。\n\n- [VITURE Beast XRグラス | VITURE Japan](https://www.viture.jp/product/viture-beast-xr-glasses)\n- [VITURE Beast レビュー。Switch2に接続して174インチ大画面！ | ファミ通](https://www.famitsu.com/article/202605/75710)\n- [視野角が広くなったサングラス型ディスプレイ「VITURE Beast」が正式発売 | 4Gamer](https://www.4gamer.net/games/999/G999902/20260522025/)\n\n---\n\n### ② WWDC26 まもなく開幕 ─ iOS 27・強化Siri・Apple AIに注目\n\nApple の開発者向け年次カンファレンス **WWDC26** が **6月8日（日本時間：6月9日午前2時）** にキックオフを迎えます。Appleは先月末に正式なスケジュールを公開済みで、Apple Parkでの対面セッションとオンライン配信が同時進行します。\n\n今年のキーノートで特に注目されるのは：\n- **iOS 27 / iPadOS 27** の新機能\n- さらに強化された **Siri と Apple Intelligence（AI機能）**\n- M5 Ultra 搭載 **Mac Studio** の発表（噂段階）\n- **visionOS 3** の動向\n\n100以上のセッション動画・ラボが公開予定で、開発者以外もキーノートを無料で視聴できます。\n\n- [WWDC26 - Apple Developer](https://developer.apple.com/wwdc26/)\n- [WWDC26の開催日は6月8日から！iOS 27が発表へ - iPhone Mania](https://iphone-mania.jp/apple-601913/)\n- [WWDC 2026直前総まとめ | WorkTypes Lab](https://www.worktypeslab.com/wwdc-2026-final-preview/)\n\n---\n\n### ③ Vivo S60 発売 ─ 7,200mAhバッテリー×厚さ7.92mmの超薄型ミドルレンジ\n\n5月29日に登場した **Vivo S60** は、薄型ボディ（7.92mm）に **7,200mAhの大容量バッテリー** を詰め込んだ注目のミドルレンジスマートフォン。従来のミドルレンジ機ではバッテリー容量と薄さはトレードオフ関係にありましたが、S60はその常識を覆す設計で注目を集めています。高性能チップの搭載と相まって、コスパ重視ユーザーにとって有力な選択肢となりそうです。\n\n- [ケータイ Watch: スマホ最新情報・ニュース](https://k-tai.watch.impress.co.jp/)\n- [2026年最新ガジェット35選 | アプリの達人](https://app-tatsujin.com/2026-top-gadgets-review/)\n\n---\n\n*週報は毎週末更新予定。各リンクから最新情報をご確認ください。*";
