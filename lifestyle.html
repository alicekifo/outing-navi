const md = "以下が今週分の週報。ファイルとして保存する場合は `personal/ライフスタイル週報_2026-05-30.md` あたりに置くといいかも。\n\n---\n\n# ライフスタイル週報 2026-05-30\n\n更新日：2026-05-30\n\n---\n\n## 🍷 ワイン\n\n### ボルドー2025：過酷な条件が生んだ驚異のヴィンテージ\n\n記録的な高温・干ばつに見舞われた2025年のボルドー。サン・ジュリアン地区では収量が10年平均比で約27%減という壊滅的な状況だったにもかかわらず、小粒で皮の厚いベリーが凝縮感の高いワインを生み出した。フィネスと優雅さを兼ね備えており、業界予測を大きく上回る評価が相次いでいる。先物（アン・プリムール）情報を今のうちにチェックしておく価値あり。\n\n- [Wine News - 2026年5月アーカイブ](https://winenews.guruguru.com/archive/5/)\n- [WINEニュース注目3選（2026年5月18日）](https://note.com/carbon4322/n/nf5571555b3d3)\n\n---\n\n### Nyetimber（ナイティンバー）がIWCで史上初のChampion Sparkling Wine獲得\n\n英国スパークリングワインの雄「Nyetimber」が、International Wine ChallengeでシャンパーニュのブランドをさしおいてChampion Sparkling Wineトロフィーを初受賞。ロンドンのV\u0026A博物館との3年間パートナーシップも締結し、英国産スパークリングの勢いが止まらない。\n\n- [WINEニュース注目3選（2026年5月16日）](https://note.com/carbon4322/n/ne845459bfce9)\n\n---\n\n### 【コスパ推し】タラパカ グラン・レゼルバ ブルーラベル（約3,500〜4,500円）\n\nチリ・マイポ・ヴァレーの厳選区画産、カベルネ・ソーヴィニヨン主体の赤ワイン。サクラアワードでダイヤモンドトロフィーを受賞しており、5,000円以下では圧倒的なコスパ。果実味と複雑性のバランスが秀逸で、デイリーには惜しいくらいのレベルに仕上がっている。\n\n- [ソムリエが選ぶ 5,000円以下のワインランキング（2026年3月編）](https://note.com/koichitanabe/n/n2f1695628adc)\n- [趣味のワインCOCOS - フルボディ赤ワイン7選](https://cocos.co.jp/blog/select-wine/luxury-red/)\n\n---\n\n## 🍶 日本酒\n\n### 夏酒トレンド：日本名門酒会「夏の生酒」が過去最大の74アイテム展開\n\n2026年は日本名門酒会の「夏の生酒」が74アイテムと過去最大規模。低アルコール（10〜14度）・スパークリング・生酒に力を入れる蔵が増えており、梅雨〜夏は軽快でフレッシュな飲み口一択の流れになってきた。どっしり系純米酒は秋冬まで封印してこういった季節酒を楽しむ時期。\n\n- [2026年初夏のおすすめ日本酒5選](https://bungo-no-bonjovi.com/top-5-recommended-sakes-for-early-summer-2026/)\n- [春から初夏においしい日本酒・焼酎｜若松屋酒店](https://wakamatsuyasaketen.com/archives/27532/shoka2026/)\n\n---\n\n### 日本酒フェア2026：6月19〜20日、池袋サンシャインシティ\n\n国内最大級の日本酒イベント。45都道府県の酒造組合が集結し、全国1,000銘柄以上の公開きき酒会を開催。完全予約制なので早めに押さえておくこと。\n\n| 区分 | 日程 | 時間 |\n|------|------|------|\n| 前夜祭 | 6月19日（金） | 18:00〜20:30 |\n| 本祭 第1部 | 6月20日（土） | 10:30〜13:00 |\n| 本祭 第2部 | 6月20日（土） | 14:30〜17:00 |\n\n**チケット**：一般 5,000円 / U-39（20〜39歳）2,000円  \n**会場**：池袋サンシャインシティ ワールドインポートマートビル4F\n\n- [日本酒フェア2026 公式サイト](https://sakefair.com/)\n- [レッツエンジョイ東京](https://www.enjoytokyo.jp/event/2067215/)\n- [ファッションプレス - 概要記事](https://www.fashion-press.net/news/146542)\n\n---\n\n### 荒川酒造：2026年5月の新着情報が更新\n\n老舗・荒川酒造の5月限定品情報が更新。季節もの好きは要チェック。\n\n- [荒川酒造 2026年5月新着](https://www.sake-arakawa.com/2026-5new/5new.htm)\n\n---\n\n## 📱 ガジェット・テック\n\n### VITURE Beast XRグラス 国内正式発売（82,880円）\n\n5月22日に正式発売となったXRグラスの新定番候補。視野角58°・174インチ相当のバーチャルスクリーンを最大1,250nitで実現し、Nintendo Switch 2との組み合わせが特に話題になっている。3DoF対応・マイク内蔵・カメラによる映像の空間固定機能つき。価格は8万円台と高めだが、没入感は別次元と複数レビューで評価されている。\n\n- [4Gamer - 正式発売レポート](https://www.4gamer.net/games/999/G999902/20260522025/)\n- [ファミ通 - Switch2でのプレイレビュー](https://www.famitsu.com/article/202605/75710)\n- [AV Watch - 西田宗千佳のRandomTracking](https://av.watch.impress.co.jp/docs/series/rt/2111729.html)\n- [VITURE Beast 公式ページ（日本）](https://www.viture.jp/product/viture-beast-xr-glasses)\n\n---\n\n### DuRoBo Krono：物理ダイヤル搭載の新感覚E Inkリーダー\n\nAndroid 15＋ブラウザ対応の進化版E Inkリーダーが5月28日にアップデート版を発表。物理ダイヤルによる独特の操作感と173gの軽量ボディが特徴で、電子書籍端末の新ジャンルとして注目されている。\n\n- [デイリーガジェット](https://daily-gadget.net/)\n\n---\n\n### Honor 600e：120Hz AMOLED＋6,520mAhのコスパスマホ\n\n5月28日発表。120HzのAMOLEDディスプレイと6,520mAhの大容量バッテリーを搭載しながらミドルレンジ価格帯を維持。電池持ちと画質のバランスを優先するなら選択肢に入れておいていい一台。\n\n- [2026年最新ガジェット35選 - アプリの達人](https://app-tatsujin.com/2026-top-gadgets-review/)\n\n---\n\n**Sources:**\n- [Wine News 2026年5月アーカイブ](https://winenews.guruguru.com/archive/5/)\n- [WINEニュース注目3選（5/18）](https://note.com/carbon4322/n/nf5571555b3d3)\n- [WINEニュース注目3選（5/16）](https://note.com/carbon4322/n/ne845459bfce9)\n- [ソムリエが選ぶ5000円以下ワイン（2026年3月）](https://note.com/koichitanabe/n/n2f1695628adc)\n- [日本酒フェア2026公式](https://sakefair.com/)\n- [たのしいお酒 - 全国日本酒イベントカレンダー2026](https://tanoshiiosake.jp/9020)\n- [2026初夏おすすめ日本酒5選](https://bungo-no-bonjovi.com/top-5-recommended-sakes-for-early-summer-2026/)\n- [VITURE Beast 正式発売 - 4Gamer](https://www.4gamer.net/games/999/G999902/20260522025/)\n- [VITURE Beast ファミ通レビュー](https://www.famitsu.com/article/202605/75710)\n\n---\n\n日本酒フェアのチケットだけ早めに動いた方がいい。U-39対象なら2,000円はかなりお得。";
