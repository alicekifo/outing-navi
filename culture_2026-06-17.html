<script>
const md = "# 教養マガジン 2026/6/17\n\n### 48チームになって「混沌」が生まれた——ワールドカップ2026の設計思想\n\n今大会から、FIFAワールドカップは史上初めて48チーム制で開催されている。従来の32チームから1.5倍に膨らんだこの変更は、単なる「枠の拡大」ではなく、大会の性格そのものを塗り替えた。グループステージは3チーム×16組に再設計され、各組の3位も一部が決勝トーナメントに進出できる仕組みだ。批判の声として多いのが「弱小国の水増し」論だが、実は1998年に32チーム化されたときも同じ批判があった。あのフランス大会でクロアチアが3位に輝き、その後のクロアチアサッカーの隆盛を生んだことを考えると、裾野の拡大は十年後の競技水準を底上げするというのがFIFAの論理だ。また米・加・墨の3カ国にわたる分散開催は、移動距離が長く「ホームの空気」が薄れるという副作用を生んでいる。中立的な会場が増えることで、番狂わせが起きやすい構造になっているという分析もある。サッカーにおける「ジャイアントキリング」は制度設計によっても誘発される、という視点は興味深い。\n\n---\n\n### なぜコンピュータの時刻は「1970年1月1日」から始まるのか\n\nUnixシステムを扱うと必ず出てくる数字がある。「Unixエポック」——1970年1月1日00:00:00 UTCを起点0とし、そこからの経過秒数で時刻を表す仕組みだ。なぜこの日なのか。答えは拍子抜けするほど実務的で、「Unixが開発されていた1969〜1970年ごろにキリのいい数字として選んだ」にすぎない。当時のPDPシリーズは32ビット整数を扱えたが、符号付きで約21億秒を表せる範囲を計算すると、1970年起点なら2038年1月まで持つ。開発者のケン・トンプソンとデニス・リッチーにとって「68年先」は十分すぎる未来だった。そしてその2038年問題（Y2K38）は今まさに現実の課題として、組み込みシステムや古いサーバーで対処が進んでいる。Linuxカーネルは2020年にすでに64ビットtime_tへの移行を完了させており、64ビット環境では約2920億年後まで問題は起きない。時刻というシンプルな概念の裏に、「その場しのぎ」が半世紀後の技術的負債になる歴史が刻まれている。\n\n---\n\n### ナポレオンが負けた本当の理由——ワーテルロー211周年前夜に考える\n\n明日6月18日は、1815年のワーテルローの戦いからちょうど211年目にあたる。ナポレオン・ボナパルトがウェリントン公爵率いる連合軍に敗れ、その帝政が終焉した一日だ。この戦いは「天才が凡庸に負けた」と語られることがあるが、実態はもっと複雑だ。決定的な要因の一つは、ナポレオンが攻撃開始を数時間遅らせたことにある。前夜の豪雨で地面がぬかるんでおり、砲兵を動かせなかったのだ。その遅延がプロイセン軍の到着を許し、挟み撃ちを招いた。また、副将グルーシー元帥がプロイセン軍の追跡に失敗し、援軍として戻ってこなかったことも響いた。戦史家の中には、ナポレオン自身が痔の悪化による体調不良で判断が鈍っていたという説を唱える者もいる。歴史的大事件の裏に「天気」と「痔」があったとすれば、歴史は偶然の積み重ねだという感慨が深まる。ワーテルローはベルギーの小さな村の名に過ぎなかったが、今や「完全な敗北」を意味する普通名詞として英語にも定着した。\n\n参考: [Battle of Waterloo — Encyclopedia Britannica](https://www.britannica.com/event/Battle-of-Waterloo)\n\n---\n\n### 夏至に石が光る——古代人が天体に仕込んだ設計図\n\n今年の夏至は6月21日。あと4日で、北半球では一年で最も昼が長い日を迎える。夏至というと「暑さのピーク」と思いがちだが、気温が最高になるのは通常7月下旬で、夏至はあくまで「太陽が最も高く昇る日」だ。この誤解を「季節の遅れ（季節の熱慣性）」と呼ぶ。地面や海が温まるのに時間がかかるためで、冬至から最寒冷期がずれるのも同じ原理だ。イギリスのストーンヘンジは、夏至の日の出方向に巨石が精密に配置されており、毎年この日には太陽が「踵石（ヒールストーン）」の真後ろから昇る。建造は紀元前3000〜2000年ごろと推定され、文字も車輪も持たなかった人々が、数世代かけて天文観測と土木工事を組み合わせた事実は圧倒的だ。なぜそこまでして夏至を刻んだのか。農耕サイクルの管理説、祖先の霊を迎える祭祀説など諸説あるが、確かなのは「時間を測ること」が権力の源泉だったという点だ。カレンダーを握る者が共同体を統べた——その構図は現代のデジタル時刻管理にも、ある種の影を落としている。\n\n---\n\n### タコが賢いのは、人類とはまったく別の進化の道を歩んだからだ\n\nタコは道具を使い、瓶の蓋を開け、迷路を覚える。その知性は脊椎動物に匹敵するとも言われるが、タコと人間の共通祖先を辿ると、約7億年前の「扁形動物に近い何か」にたどり着く。つまり、タコの知性は哺乳類とは全く独立した進化の経路で獲得されたものだ。これを「収斂進化（しゅうれんしんか）」と呼ぶ——異なる系統が似た機能を独自に進化させる現象だ。タコの神経細胞は約5億個あり、そのうちの3分の2は脳ではなく腕の中に分散している。各腕が半自律的に動くため、「8本腕の半自律ロボット群を中央ユニットが調整している」というのが実態に近い。さらに驚くのは色覚だ。タコは色盲（単色型）でありながら、周囲の色に合わせた擬態を完璧にこなす。最新の仮説では、皮膚に光受容体があり「皮膚で色を感じる」可能性が指摘されている。知性・感覚・身体構造のいずれをとっても、タコは「生命のもう一つの解答」だ。進化に正解は一つではないと実感させてくれる生き物である。";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
