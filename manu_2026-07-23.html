<script>
const md = "# [[マンチェスター・ユナイテッド]]情報週報（2026-07-23）\n\n\u003e **今週のTLDR**: コネ（Manu Koné）は**L\u0027Equipe発で「クラブ間交渉開始」まで前進**——前号まで続いた「代理人接触のみ」（Romano）との食い違いが解消方向。ローマの要求額は€60m（£51m）で、正式入札・\"Here We Go\"はまだ。Romanoは7/22に「バレバ（Carlos Baleba）やザイール=エメリ（Warren Zaïre-Emery）より優先の3人目の中盤候補」と位置づけた。選手面ではラッシュフォード（Marcus Rashford）の**再統合が既定路線に**（カリック（Michael Carrick）構想入り・Ornstein（David Ornstein）も明言）で、Romanoは「ラッシュフォード退団までウィンガー補強はしない」と補強方針を整理。一方[[マルティネス]]（Lisandro Martínez）には**売却検討報道**（1ソース段階）。シェシュコ（Benjamin Šeško）は**ローゼンボリ戦欠場見込みに後退**。次戦はローゼンボリ戦（現地7/24・JST 7/25 1:00）。\n\n---\n\n## ⚽ 直近の試合結果\n\n### 親善試合: マンチェスター・ユナイテッド 0-1 レクサム（現地7/18・ヘルシンキ・中立）※既報\n\n- カリック体制初陣の敗戦。詳細は2026-07-20号参照。過去7日以内の試合はこの1試合のみで、公式戦未開始のためxG・採点等の新規指標なし\n\n出典: [manutd.com 公式レポート](https://www.manutd.com/en/news/report-united-0-wrexham-1) (2026-07-18)\n\n---\n\n## 🔄 移籍・選手動向\n\n### 交渉中: コネ——「クラブ間交渉開始」で食い違い解消へ。要求額は€60m\n\n- **コネ（ローマMF・25歳）○有力・段階前進**——L\u0027Equipe発で**「ユナイテッドはローマとの直接交渉（クラブ間交渉）を開始した」**。前号までの「選手サイド接触のみ」から一段進み、決定的段階にはまだ入っていないが正式入札の前段に到達。ローマの要求額はW杯での評価上昇を受けて**€50m→€60m（£51m）に上振れ** — [Football Italia（L\u0027Equipe経由・交渉開始）](https://football-italia.net/kone-talks-begin-manchester-united-and-roma/) (2026-07-20) / [TEAMtalk（£51m・報道間の食い違い整理）](https://www.teamtalk.com/manchester-united/official-manu-kone-move-51m-roma-transfer) (2026-07-20頃)\n- **Romanoの位置づけ（7/22）**: コネは**「バレバ、ザイール=エメリより優先の『3人目の中盤』候補」**。ティーレマンス（Youri Tielemans）・サントス（Andrey Santos）に続く中盤補強の本命と明言した。ただし€85m〜€90mといった報道額は否定しており、安く出るなら獲るスタンス — [The Week（Romano・3人目の中盤）](https://www.theweek.in/news/sports/2026/07/22/manchester-united-transfers-manu-kone-third-midfield-signing-over-baleba-zaire-emery-says-fabrizio.html) (2026-07-22)\n- **前号のCorriere dello Sport「£47m改善入札を7/20週明けに提出」は、7/23時点で入札実行の確認なし**＝L\u0027Equipe・Romanoとも「入札はまだ」で一致。公式発表・\"Here We Go\"なし\n- 競合は[[アーセナル]]・[[リバプール]]ほか（ユナイテッドが「upper hand」・選手本人はユナイテッド行きにGOサイン済み） — [Football Italia](https://football-italia.net/kone-talks-begin-manchester-united-and-roma/) (2026-07-20)\n- **スコット（Alex Scott／ボーンマスMF）△難航**: ユナイテッドが直接接触したが、**ボーンマスは「今夏はいかなる状況でも売らない」と回答**。評価額は市場高騰で£80m前後まで上昇との報道。コネと並走する中盤レースの2番手扱い — [Football365（直接接触への回答）](https://www.football365.com/news/bournemouth-tell-man-utd-whether-selling-alex-scott-direct-contact) (2026-07-20頃) / [GiveMeSport（直接接触）](https://www.givemesport.com/man-utd-make-direct-contact-to-sign-alex-scott-bournemouth/) (2026-07-20頃)\n- **ギル（Orlando Gill／GK）×否定**: パラグアイ発の交渉報道をRomanoが否定（「ダーロウ獲得済み・ラメンス（Senne Lammens）が一番手でGK補強はない」） — [Football365（Romano・3件否定）](https://www.football365.com/news/man-utd-romano-three-transfers-gill-sarr-summerville-offer-accepted-al-hilal) (2026-07-22)\n\n### ラッシュフォード: 再統合が既定路線に——「退団までウィンガー補強なし」\n\n- **カリックがプレシーズンでラッシュフォードと働くことを望み、現時点で構想内**（Romano）。OrnsteinもThe Athletic FC Podcastで**「再統合される見込み」**と明言し、残留ならウィンガー獲得の移籍金・代理人手数料が浮いて**中盤補強（＝コネ資金）に回せる**と構造を解説 — [Morocco World News（Romano・カリック構想）](https://www.moroccoworldnews.com/2026/07/330139/rashford-set-for-man-united-return/) (2026-07-20頃) / [Roundtable（Ornstein発言まとめ）](https://roundtable.io/sports/soccer/premier-league/manchester-united/news/marcus-rashfords-man-utd-future-revealed-as-transfer-plans-clarified) (2026-07-21頃)\n- **Romanoは補強方針も整理（7/22）**: サマーヴィル（Crysencio Summerville）・サール（Ismaïla Sarr）のウィンガー獲得報道を否定——**「ラッシュフォードを手放すまでウィンガー補強は進めない」**。なおサマーヴィルはウェストハムがアル・ヒラルの£60m超オファーを受諾済みで市場から消えつつある — [Football365](https://www.football365.com/news/man-utd-romano-three-transfers-gill-sarr-summerville-offer-accepted-al-hilal) (2026-07-22)\n- 売却側の動きも継続: **トッテナム・[[チェルシー]]・アーセナルが関心**とされるが、クラブは国内ライバルへの売却に難色。本人は「イングランド残留か、バルサ・PSG・バイエルン・[[レアル・マドリー]]級なら検討」という希望との報道 — [ESPN（国内3クラブの関心）](https://www.espn.com/soccer/story/_/id/49422693/transfer-rumors-news-arsenal-spurs-chelsea-want-man-united-winger-marcus-rashford) (2026-07-22頃)\n\n### マルティネス: 売却検討報道が浮上（※1ソース段階）\n\n- Football Insider発（元スカウト部長ブラウン（Mick Brown）談）で、**W杯決勝の右太もも負傷の医療評価と並行して、クラブが売却を検討する可能性**があると報道。入団以来92試合欠場の負傷歴と**契約残り1年**が背景で、スペイン勢の関心があれば売却検討とされる。**クラブ公式の動きは確認できず、続報待ちの1ソース情報として扱う** — [Yahoo Sports（Football Insider経由）](https://sports.yahoo.com/articles/man-united-medical-team-assess-173000226.html) (2026-07-21)\n\n### ケガ・復帰情報\n\n- **シェシュコ**: すね。**ローゼンボリ戦（7/24）は欠場見込みに後退**（前号の「復帰目標＝ローゼンボリ戦」から下方修正）。プレミア開幕には間に合う見込みは維持 — [Sports Mole（ローゼンボリ戦プレビュー）](https://www.sportsmole.co.uk/football/man-utd/preview/rosenborg-vs-man-utd-prediction-team-news-lineups_601662.html) (2026-07-22頃)\n- **マルティネス**: 右太もも。検査結果の公表は依然なし（帰国後にクラブ医療チームが評価）。筋断裂や靱帯損傷なら数ヶ月単位の恐れという段階評価のまま — [Yahoo Sports](https://sports.yahoo.com/articles/man-united-medical-team-assess-173000226.html) (2026-07-21)\n- **マイヌー（Kobbie Mainoo）**: 背中。復帰8月上〜中旬見込みで変わらず。W杯組のため合流自体もまだ\n- **デ・リフト（Matthijs de Ligt）**: 背中・復帰10月初旬見込み（前号既報・1ソース段階のまま新規続報なし）\n- **[[ダーロウ]]（Karl Darlow／GK）**: 回復中。ローゼンボリ戦で復帰の可能性\n\n---\n\n## 🧠 戦術・チーム状況\n\n- **カリック体制は4-2-3-1が基調**（レクサム戦で確認・今週は新規材料なし）。ローゼンボリ戦の可用メンバーはヨロ（Leny Yoro）、ドルグ（Patrick Dorgu）、ヘヴン（Ayden Heaven）、マグワイア（Harry Maguire）、ショー（Luke Shaw）、マウント（Mason Mount）、**ムベウモ（Bryan Mbeumo）**、ジルクゼー（Joshua Zirkzee）ら＋15歳JJガブリエル（JJ Gabriel）にも出場機会の可能性（※前号でムベウモをW杯組欠席側に記載したが、最新プレビューでは可用側＝訂正） — [Sports Mole](https://www.sportsmole.co.uk/football/man-utd/preview/rosenborg-vs-man-utd-prediction-team-news-lineups_601662.html) (2026-07-22頃)\n- W杯組（ティーレマンス、マルティネス、クーニャ（Matheus Cunha）、ダロト（Diogo Dalot）、B・フェルナンデス（Bruno Fernandes）、アマド（Amad Diallo）、バユンドゥル（Altay Bayındır）、マイヌー、ラメンス、マズラウィ（Noussair Mazraoui）、ラッシュフォード）は休暇中で不在継続\n- 補強戦略の全体像: Ornsteinは「もう1人の中盤加入が最初からのプラン」を再確認。ラッシュフォード残留→ウィンガー予算を中盤へ、という資金配分の絵がRomano・Ornstein双方の発言で一致してきた\n- 直近5試合のxG・被xG・ポゼッション ※該当なし（公式戦未開始・親善試合はxG未公表）\n\n出典: [Roundtable（Ornstein）](https://roundtable.io/sports/soccer/premier-league/manchester-united/news/marcus-rashfords-man-utd-future-revealed-as-transfer-plans-clarified) (2026-07-21頃) / [Football365（Romano）](https://www.football365.com/news/man-utd-romano-three-transfers-gill-sarr-summerville-offer-accepted-al-hilal) (2026-07-22)\n\n---\n\n## 📅 今後の試合予定\n\n| 日程（JST） | 大会 | 対戦相手 | 会場 |\n|---|---|---|---|\n| 7/25(土) 1:00（英7/24 17:00） | 親善 | ローゼンボリ | レルケンダール・スタディオン（トロンハイム） |\n| 8/1(土) 22:00（英8/1 14:00） | 親善 | アトレティコ・マドリード | ストックホルム（中立） |\n| 8/9(日) 0:00（英8/8 16:00） | 親善 | パリ・サンジェルマン | ヨーテボリ（中立） |\n\n- **ローゼンボリ戦の見どころ**: カリック体制2戦目。①シェシュコ欠場見込みとなった前線の顔ぶれ（ジルクゼー／ムベウモ／JJガブリエル）②レクサム戦の「復帰10日」段階から主力組の稼働時間が延びるか③ダーロウの復帰なるか。W杯組の合流はまだ先\n- 以降はリーズ（8/12ダブリン）、ACミラン（8/15ヴロツワフ）と続く\n\n出典: [Sports Mole（プレビュー）](https://www.sportsmole.co.uk/football/man-utd/preview/rosenborg-vs-man-utd-prediction-team-news-lineups_601662.html) / [Sports Mole（プレシーズン日程）](https://www.sportsmole.co.uk/football/man-utd/feature/man-united-pre-season-fixtures-schedule-how-to-watch-and-kickoff-times_600946.html)\n\n---\n\n## 🏟️ クラブ情報\n\n- **Microsoft Surfaceが2026/27の背中スポンサーに**（7/17発表・週報初掲載）: Qualcommとの新契約（月初発表の年£60m・Snapdragon胸スポンサー3年＋2年オプション）に連なる形で、**シャツ背面にSurfaceロゴが入る**。7/18のレクサム戦プレシーズンキットからデビュー済み — [Technobezz](https://www.technobezz.com/news/microsoft-surface-logo-appears-on-manchester-united-shirts-starting-july-18) (2026-07-17) / [Yardbarker](https://www.yardbarker.com/soccer/articles/manchester_united_officially_announce_new_shirt_sponsor_for_202627_season/s1_17737_44072614) (2026-07-17頃)\n- **新スタジアムのネーミングライツ売却に含み**（7/15報道・週報初掲載）: クラブが10万人新スタジアムの命名権パートナー獲得に前向きで、既存スポンサーも関心と報道。7/20議会承認（前号既報）→**7/28からの8週間住民協議**が次のマイルストーン — [Insider Sport](https://insidersport.com/2026/07/15/manchester-united-stadium-naming-right/) (2026-07-15) / [BBC Sport](https://feeds.bbci.co.uk/sport/football/articles/cn088jz0enyo) (2026-07-15頃)\n\n---\n\n## 📰 The Athletic ピックアップ\n\n※当号もtheathletic.comの直接検索が結果を返さず（クローラーアクセス不可）、他媒体経由で確認できたThe Athletic発の報道を紹介（リンクは引用元）\n\n1. **Ornstein（The Athletic FC Podcast）: ラッシュフォード再統合＋中盤もう1人**（7/21頃）: 「ラッシュフォードはスカッドに再統合される見込み」「もう1人の中盤加入は最初からのプラン」。残留なら新ウィンガーの移籍金・手数料が浮き中盤予算に回るという資金構造まで踏み込んだ。コネについては「クラブが必要額を出し切るかはまだ確定的でない」と慎重な留保付き — [Roundtable経由](https://roundtable.io/sports/soccer/premier-league/manchester-united/news/marcus-rashfords-man-utd-future-revealed-as-transfer-plans-clarified) (2026-07-21頃)\n2. 上記以外で直近4日以内（7/19以降）に確認できた新規のThe Athletic発スクープ・長文特集は※該当なし（水増しせず該当分のみ）";
