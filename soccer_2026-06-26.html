const md = "# ⚽ サッカー移籍情報 \u0026 ワールドカップ2026 速報\n**2026年6月26日（金）**\n\n---\n\n## ✅ 完了した移籍（6/19〜6/26）\n\n\u003e **[R1確認]** 公式発表または信頼ソース2件以上確認済み（本日より7日以内基準）。\n\n### 1. [[エデルソン]]（CM, 26歳）アタランタ → [[マンチェスター・ユナイテッド]]【6/21・継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £3,500万＋アドオン最大£400万 |\n| 契約 | 4年＋オプション1年（〜2031年） |\n| 発表日 | 2026年6月21日 |\n\n- ブラジル代表W杯参加中のため大会後に正式手続き、7月1日に国際登録処理予定。カリック新体制今夏第1号\n- **ソース**：Fabrizio Romano（S級）、Sky Sports、ESPN（S+A級複数）\n\n### 2. [[ヴァレンティン・バルコ]]（MF/LB, 21歳）ストラスブール → [[チェルシー]]【6/22・継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | BlueCo グループ内移籍（詳細非公開） |\n| 契約 | 4年（〜2030年） |\n| 発表日 | 2026年6月22日（Chelsea公式・Romano確認） |\n\n- **ソース**：Fabrizio Romano（S級）、beIN Sports（A+B級）\n\n---\n\n## 🔴 Here We Go!（合意ほぼ確実）\n\n### 1. [[ピエロ・インカピエ]]（CB/LB, 23歳）[[バイヤー・レバークーゼン]] → [[アーセナル]]【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €5,200万 |\n| 契約 | 5年 |\n| ステータス | 契約署名済、FFP都合で正式発表はW杯後 |\n\n- Romano「署名完了済み」確認。エクアドル代表としてW杯参加中（ドイツ戦2-1勝利でR32進出確定、同選手もR32へ継続出場）\n- **ソース**：Fabrizio Romano、FootballTransfers（S+A級複数）\n\n### 2. デンゼル・ダンフリース（RB, 30歳）インテル → [[レアル・マドリード]]【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €2,000万（リリース条項発動） |\n| 契約 | 〜2030年 |\n| ステータス | メディカル完了・オランダ代表W杯参加中（グループF首位通過） |\n\n- Romano「HERE WE GO！」確認済、W杯終了後に公式発表予定\n- **ソース**：Fabrizio Romano、Goal.com（S+A級複数）\n\n### 3. ジェレミー・モンガ（W, 16歳）[[レスター・シティ]] → [[アーセナル]]【継続掲載】\n- **移籍金**：約€1,500万　｜　**ステータス**：個人合意済、クラブ間交渉最終段階\n- **ソース**：Fabrizio Romano、Goal.com UK（S+A級複数）\n\n### 4. [[マルコ・パレストラ]]（RWB, 21歳）アタランタ → [[チェルシー]]【継続掲載（6/24 HERE WE GO）】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €5,500万（£4,700万相当） |\n| ステータス | 口頭合意完了、メディカル・正式発表待ち |\n\n- Romano「HERE WE GO！」確認済（6/24）。ハビ・アロンソ就任後チェルシー初補強\n- **ソース**：Fabrizio Romano（S級）、Goal.com、OneFootball、Transfermarkt（S+A+B級複数）\n\n### 5. [[エリオット・アンダーソン]]（MF, 23歳）ノッティンガム・フォレスト → [[マンチェスター・シティ]]【NEW 6/25】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £1億1,600万（固定、英国人選手移籍金記録更新） |\n| 最大額 | 最大£1億3,000万（アドオン含む） |\n| ステータス | クラブ間合意済み、メディカルはW杯滞在中の米国にて実施予定 |\n\n- デクラン・ライス（£1億500万、2023年）の英国人選手最高額を更新。[[マンチェスター・ユナイテッド]]が3度のオファーを断念したところをシティが制した形。Romano「最終段階」確認、ESPNも合意済みと報道\n- イングランド代表としてW杯参加中（グループLのMD3は6/27、vs パナマ）のため公式発表はW杯後\n- **ソース**：ESPN（A+級）、Fabrizio Romano（S級）、FourFourTwo（A+B級）\n\n---\n\n## 🟡 交渉中・動向注目\n\n### 1. モーガン・ロジャース（MF, 23歳）アストン・ヴィラ → [[アーセナル]] [信頼度: ★★★]【継続掲載】\n- Romano「アーセナルがロジャース獲得で前進中。アルテタが内部で『ナンバーワン・ツー・スリーのターゲット』と言明。選手側も移籍を希望しヴィラ幹部にも意向を伝達済み。クラブ間の正式交渉はまだ開始されていない」\n- Sky Sports「複数のエミレーツ登録選手の去就が不透明な中、アーセナルの関心が強まっている」と継続報道\n- ヴィラは£80〜100mの評価額を堅持、2031年まで長期契約あり交渉を急がない構え\n- **ソース**：Fabrizio Romano（S級）、Sky Sports、football365（S+A級複数）\n\n### 2. ブラッドリー・バルコラ（W, 23歳）PSG → [[リバプール]]最有力【継続掲載】\n- アーセナルがロジャース最優先に切り替えたことで[[リバプール]]が最有力候補に浮上。PSGは€9,000万超を要求継続\n- **ソース**：ESPN（A級）、football365（A級）\n\n### 3. [[ドゥシャン・ヴラホヴィッチ]]（CF, 26歳）ユヴェントス（6/30フリー）→ バルセロナ検討中 [信頼度: ★★]【継続掲載】\n- 6/30に確定的にフリーエージェント。バルセロナは「主要ターゲットではない」との報道も浮上し不透明感継続\n- **ソース**：ESPN、Barca Blaugranes（A+B級）\n\n### 4. [[ロベルト・レヴァンドフスキ]]（CF, 37歳）バルセロナ（6/30フリー）→ シカゴ・ファイア(MLS) [信頼度: ★★]【継続掲載】\n- シカゴが年俸$1,500〜2,000万を提示継続。W杯終了後に最終決断見込み\n- **ソース**：beIN Sports、NBC Chicago（A+B級）\n\n### 5. アンドリュー・ロバートソン（LB, 32歳）[[リバプール]] → [[トッテナム・ホットスパー]] [信頼度: ★★★]【継続掲載】\n- 6/30契約満了、フリーでスパーズ移行合意。スコットランド代表としてW杯参加中（グループC2位通過）\n- **ソース**：Sky Sports（A級）\n\n### 6. [[マルコス・セネシ]]（CB, 29歳）ボーンマス → [[トッテナム・ホットスパー]] [信頼度: ★★★]【継続掲載】\n- 6/30ボーンマス契約満了、フリーでスパーズ移行合意\n- **ソース**：Sky Sports（A級）\n\n### 7. ルーカス・ベルグヴァル（MF, 21歳）[[トッテナム・ホットスパー]]（退団申請）→ 複数クラブ関心 [信頼度: ★★★]【継続掲載】\n- Romano・Ornstein（The Athletic）が退団申請を確認。[[バイエルン・ミュンヘン]]、アストン・ヴィラ、ドルトムント、[[チェルシー]]等7クラブが関心。評価額£5,700万超\n- **ソース**：Fabrizio Romano（S級）、The Athletic / David Ornstein（A級）\n\n### 8. エンゾ・フェルナンデス（MF, 25歳）[[チェルシー]] → [[レアル・マドリード]] [信頼度: ★]【継続掲載・低信頼度維持】\n- Romano「個人合意は成立しておらず、[[レアル・マドリード]]はチェルシーと正式交渉を開始していない」と引き続き明確化。5名の中盤補強候補リスト内の1人に留まる状況\n- チェルシーは売却応じるなら£1億2,000万超を要求\n- **ソース**：ESPN（A級）、FootballTransfers、readchelsea.com（A+B級）\n\n### 9. [[マテウス・フェルナンデス]]（MF, 21歳）ウェスト・ハム → [[トッテナム・ホットスパー]] [信頼度: ★★]【継続掲載】\n- ウェスト・ハム降格に伴い売却必至。スパーズと[[マンチェスター・ユナイテッド]]が争奪戦。選手本人はスパーズを希望\n- ウェスト・ハムは£80〜85mを要求。スパーズは£70〜85mを提示の構え\n- **ソース**：Sky Sports（A級）、ESPN（A級）\n\n---\n\n## 🌍 ワールドカップ2026 速報\n\n\u003e **大会概要**：開催国：米国・カナダ・メキシコ｜48カ国・12グループ｜期間：6月11日〜7月19日\n\n---\n\n### 📅 6月25日（木）確定結果\n\n| グループ | 対戦カード | スコア | 注目点 |\n|----------|-----------|--------|--------|\n| **グループD** | **トルコ 3-2 アメリカ** | 終了 | Trusty 3\u0027・Berhalter 49\u0027（USA）、Güler・Yılmaz・Ayhan 90+（TUR）。Ayhan がアディショナルタイムに劇的決勝弾。USA は1位確定済みで結果に影響なし |\n| **グループD** | **パラグアイ 0-0 オーストラリア** | 終了 | スコアレスドローで両チームがR32進出確定。パラグアイはベスト3位枠で通過 |\n| **グループE** | **エクアドル 2-1 ドイツ** | 終了 | Sane 2\u0027（GER）、Angulo（ECU）同点弾、Plata 77\u0027（ECU）。大番狂わせ！ドイツはグループ1位通過も最後に敗戦 |\n| **グループE** | **コートジボワール 2-0 キュラソー** | 終了 | Pépé 2得点。コートジボワールが初のR32進出を決める |\n| **グループF** | **日本 1-1 スウェーデン** | 終了 | Maeda（JPN）、Elanga 62\u0027（SWE）。引き分けで日本グループ2位通過確定、スウェーデンはベスト3位枠で通過 |\n| **グループF** | **オランダ 3-1 チュニジア** | 終了 | Skhiri OG（TUN）・Brobbey ら（NED）。オランダが7ptsでグループF首位通過 |\n\n---\n\n### 📅 6月26日（本日）試合情報\n\n| グループ | 対戦カード | キックオフ(ET) | 状況 |\n|----------|-----------|--------------|------|\n| **グループH** | **スペイン vs ウルグアイ** | 20:00 | MD3（グアダラハラ） |\n| **グループH** | **カーボベルデ vs サウジアラビア** | 20:00 | MD3（ヒューストン・同時開催） |\n| **グループG** | **エジプト vs イラン** | 23:00 | MD3（シアトル） |\n| **グループG** | **ベルギー vs ニュージーランド** | 23:00 | MD3（バンクーバー・同時開催） |\n\n\u003e ⭐ **グループHの焦点**：スペイン（4pts・GD+4）は勝点1以上でほぼ1位確定。実質的な注目は**ウルグアイ（2pts）vs カーボベルデ（2pts）** の2位争い。両チームが引き分けると得失点差・得点数で決定。サウジアラビア（1pt）は数字上のみ残留可能性\n\n\u003e ⭐ **グループGの焦点**：エジプト（4pts・GD+2）はドロー以上でR32確定。**ベルギー（2pts）vs イラン（2pts）** が事実上の2位決定戦。両チームとも勝利なしには突破は難しく、ニュージーランド（1pt）は勝利＋上位2チームの共倒れが条件\n\n---\n\n### 🔑 グループ別状況（6/26 更新）\n\n**グループA（MD3完了）**\n- **メキシコ 9pts（R32進出・1位）**・**南アフリカ 3pts（R32進出・2位・史上初）**・韓国 3pts（3位）・チェコ 3pts（4位）\n- ▶ R32確定：メキシコ vs スコットランド（グループC2位）\n\n**グループB（MD3完了）**\n- **スイス 6pts（R32進出・1位）**・**カナダ 4pts（R32進出・2位）**・ボスニア 4pts（3位・ベスト3位通過）・カタール 0pts（敗退）\n- ▶ R32確定：カナダ vs 南アフリカ（グループA2位）／アメリカ vs ボスニア（グループB3位）\n\n**グループC（MD3完了）**\n- **ブラジル 7pts（R32進出・1位）**・**スコットランド 6pts（R32進出・2位）**・モロッコ 4pts（3位・ベスト3位通過）・ハイチ 0pts（敗退）\n- ▶ R32確定：ブラジル vs 日本（グループF2位） ／ オランダ vs モロッコ（6/29）\n\n**グループD（MD3完了）**\n- **アメリカ 6pts（R32進出・1位）**・**オーストラリア 4pts（R32進出・2位）**・**パラグアイ 4pts（R32進出・ベスト3位）**・トルコ 3pts（敗退）\n- ▶ R32確定：ドイツ vs パラグアイ（6/29）\n\n**グループE（MD3完了）**\n- **ドイツ 6pts（R32進出・1位・H2H優位）**・**コートジボワール 6pts（R32進出・2位）**・**エクアドル 4pts（R32進出・ベスト3位）**・キュラソー 1pt（敗退）\n- インカピエ（アーセナル移籍合意済）はエクアドル代表としてR32も出場継続\n\n**グループF（MD3完了）**\n- **オランダ 7pts（R32進出・1位）**・**日本 5pts（R32進出・2位）**・**スウェーデン 4pts（R32進出・ベスト3位）**・チュニジア 0pts（敗退）\n- ▶ R32確定：ブラジル vs 日本（6/29）、オランダ vs モロッコ（6/29）\n- ダンフリース（レアル・マドリード移籍合意済）はオランダ代表として引き続き出場\n\n**グループG（MD3 本日開催）**\n- **エジプト 4pts（GD+2）**・ベルギー 2pts・イラン 2pts・ニュージーランド 1pt\n- ▶ エジプトの優位は明確。ベルギー vs イランが本日最注目の一戦\n\n**グループH（MD3 本日開催）**\n- **スペイン 4pts（GD+4）**・ウルグアイ 2pts・カーボベルデ 2pts・サウジアラビア 1pt\n- ▶ スペインの通過はほぼ確定、ウルグアイ vs カーボベルデが2位の命運を分ける\n\n**グループI（MD3 6/27予定）**\n- **フランス 6pts（R32進出確定）**・**ノルウェー 6pts（R32進出確定）**・セネガル 0pts・イラク 0pts\n- ▶ MD3 フランス vs ノルウェー（首位争い）\n\n**グループJ（MD3 6/27予定）**\n- **アルゼンチン 6pts（R32進出確定）**・オーストリア 3pts・アルジェリア 3pts・ヨルダン 0pts（敗退確定）\n- ▶ MD3 オーストリア vs アルジェリアが2位決定戦\n\n**グループK（MD3 6/27予定）**\n- **コロンビア 6pts（R32進出確定）**・ポルトガル 4pts・コンゴDR 1pt・ウズベキスタン 0pts（敗退確定）\n- ▶ MD3 コロンビア vs ポルトガル（マイアミ）が首位決定戦\n\n**グループL（MD3 6/27予定）**\n- **イングランド 4pts（GD+2）**・**ガーナ 4pts（GD+1）**・クロアチア 3pts・パナマ 0pts（敗退確定）\n- ▶ MD3 イングランド vs パナマ・ガーナ vs クロアチアが2位争いの焦点\n- アンダーソン（マンC移籍合意済）はイングランド代表として引き続き出場中\n\n---\n\nSources:\n- [Ecuador 2-1 Germany - ESPN](https://www.espn.com/soccer/match/_/gameId/760468/germany-ecuador)\n- [2026 World Cup Group E final standings - Bolavip](https://bolavip.com/en/world-cup/2026-world-cup-group-e-final-standings-after-ecuador-defeat-germany-and-ivory-coast-beat-curacao)\n- [Japan 1-1 Sweden - ESPN](https://www.espn.com/soccer/report/_/gameId/760471)\n- [Netherlands 3-1 Tunisia - ESPN](https://www.espn.com/soccer/report/_/gameId/760472)\n- [2026 World Cup Group F - Wikipedia](https://en.wikipedia.org/wiki/2026_FIFA_World_Cup_Group_F)\n- [Japan Sweden Group F recap - Yahoo Sports](https://sports.yahoo.com/soccer/breaking-news/article/2026-world-cup-group-f-netherl
