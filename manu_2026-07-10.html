<script>
const md = "# マンチェスター・ユナイテッド情報週報\n**発行日: 2026年7月10日（金）**\n\n## クラブ概況\n\n| 項目 | 情報 |\n|---|---|\n| 監督 | カリック（Michael Carrick）（契約 〜2028年） |\n| 2025/26シーズン最終順位 | プレミアリーグ 3位（CL出場権確保） |\n| 現在のステータス | オフシーズン（W杯開催中・プレシーズン開始前） |\n\n---\n\n## ⚽ 直近の試合結果\n\n**※該当なし**（7/3〜7/10にユナイテッドの公式戦・親善試合なし。オフシーズン中で、所属選手13名が北米W杯に参加中）\n\n---\n\n## 🔄 移籍・選手動向\n\n### ✅ アンドレイ・サントス（Andrey Santos）獲得 — クラブ間合意・Here We Go ｜ 信頼度: ◎\n\n- **元クラブ:** チェルシー（PL） ／ **ポジション:** セントラルMF ／ ブラジル代表\n- **移籍金:** £48m ＋ アドオン£2m ＝ 総額£50m（チェルシーに10%のセルオン条項）\n- **契約:** 5年 ＋ 1年オプション。個人合意済み、メディカル実施へ\n- Fabrizio Romanoが7月8日に \"Here We Go\" を明言。The AthleticのDavid Ornsteinも合意を確認。カゼミーロ（Casemiro）退団で薄くなった中盤再建の2人目\n- 昨季はチェルシーで公式戦43試合3ゴール4アシスト\n\n\u003e source: [Sky Sports](https://www.skysports.com/football/news/11095/13561742/andrey-santos-manchester-united-agree-lb50m-deal-for-chelsea-and-brazil-midfielder) (2026-07-08) / [ESPN](https://www.espn.com/soccer/story/_/id/49307337/man-united-agree-50m-deal-sign-chelsea-midfielder-andrey-santos-sources) (2026-07-08) / [The Peoples Person（Romano発言）](https://thepeoplesperson.com/2026/07/08/here-we-go-fabrizio-romano-confirms-andrey-santos-deal-struck-between-united-and-chelsea-312465/) (2026-07-08)\n\n### ✅ エデルソン（Ederson）獲得 — 最終メディカル段階 ｜ 信頼度: ◎\n\n- **元クラブ:** アタランタ（セリエA） ／ **ポジション:** ボランチ ／ ブラジル代表・27歳\n- **移籍金:** €45m（保証€40.5m＋ボーナス€4.5m ≒ £38.8m）\n- 6月上旬にクラブ間合意済み。W杯参加中に米国で1次メディカルを実施し、ブラジル敗退を受けて今週中に英国でクラブ医師による最終メディカル → 通過すれば**今週末にも正式発表**の見込み\n- 一部で「メディカル懸念で停滞」報道が出たが、クラブは破談の噂を否定\n\n\u003e source: [The Peoples Person](https://thepeoplesperson.com/2026/07/08/ederson-set-for-final-medical-this-week-with-announcement-imminent-312434/) (2026-07-08) / [Football365（Romano・Ben Jacobs）](https://www.football365.com/news/manchester-united-ederson-atalanta-fabrizio-romano-ben-jacobs-transfer-update-medical) (2026-07)\n\n### ✅ オナナ（André Onana）— トラブゾンスポルへ再ローン（公式発表） ｜ 信頼度: ◎\n\n- 1年ローン・買取オプションなし。ローン料£1.3m、給与の大半は先方負担\n- 昨季もトラブゾンスポルで33試合に出場しトルコ杯優勝。ラメンス（Senne Lammens）の台頭で序列を失った形\n\n\u003e source: [manutdnews.com](https://manutdnews.com/official-man-united-confirm-andre-onana-loan-exit-after-brutal-old-trafford-downfall/) (2026-07-02) / [Goal](https://www.goal.com/en/lists/andre-onana-signs-man-utd-exit-paperwork-with-gbp1-3m-transfer-agreement-in-place/blt94bad9348c3494b3) (2026-07)\n\n### ✅ 退団確定（6月末の契約満了・ローン買取）\n\n- **カゼミーロ（Casemiro）**: 契約満了で退団。本人がInstagramで別れを表明\n- **サンチョ（Jadon Sancho）**: 契約満了で放出（在籍中リーグ58試合9ゴール）\n- **ホイルンド（Rasmus Højlund）**: ナポリへ完全移籍（£43m・ローンからの買取条項成立）\n\n\u003e source: [TEAMtalk](https://www.teamtalk.com/manchester-united/every-completed-man-utd-transfer-summer-2026-signings-exits-loans) (2026-07) / [GiveMeSport](https://www.givemesport.com/man-utd-transfers-2026-27/) (2026-07)\n\n### 🔄 ラッシュフォード（Marcus Rashford）— バルセロナ買取オプション不行使・ユナイテッド復帰 ｜ 信頼度: ○\n\n- バルセロナは6月15日期限の買取オプション（£26m）を行使せず、ローン満了でユナイテッドに帰還\n- ただしバルセロナの関心は継続。個人条件は合意済み（減俸受け入れの姿勢）で、**移籍市場終盤まで待って再交渉する構え**。ユナイテッドは再ローンを拒否し完全移籍のみ受け入れる立場\n- 現時点では新シーズンをユナイテッドで開始する見込みとの報道も\n\n\u003e source: [FOX Sports](https://www.foxsports.com/stories/soccer/marcus-rashford-has-no-future-at-man-united-as-barcelona-plan-fresh-transfer-talks-with-red-devils-before-world-cup) (2026-07) / [Barca Blaugranes](https://www.barcablaugranes.com/fc-barcelona-transfer-rumors-news/126012/marcus-rashford-set-to-start-season-with-man-utd-after-end-of-barcelona-loan) (2026-07)\n\n### 🏥 ケガ・W杯参加組の状況\n\n- **マルティネス（Lisandro Martínez）**: 昨季の重度の膝負傷から復帰し、アルゼンチン代表としてW杯参加中（準々決勝進出）\n- **W杯進行状況（所属選手関連）**: ポルトガル（B.フェルナンデス〈Bruno Fernandes〉）はR16でスペインに0-1敗退。ブラジルも敗退（獲得予定のエデルソンが英国メディカルに移動可能に）。イングランド（メイヌー〈Kobbie Mainoo〉）は準々決勝ノルウェー戦に進出中\n\n\u003e source: [SI](https://www.si.com/soccer/every-man-utd-player-2026-world-cup) (2026-06) / [ESPN W杯日程](https://www.espn.com/soccer/story/_/id/48939282/2026-fifa-world-cup-fixtures-results-match-schedule-group-stage-knockout-rounds-bracket) (2026-07)\n\n---\n\n## 🧠 戦術・チーム状況\n\n- **中盤の総入れ替えが今夏の主題**。カゼミーロ退団・中盤薄化に対し、エデルソン（アンカー型）＋サントス（推進型）の2枚を確保。当初の最優先候補だったエリオット・アンダーソン（Elliot Anderson→シティへ£116m）、マテウス・フェルナンデス（Mateus Fernandes→スパーズへ£85m）、チュアメニ（Aurélien Tchouaméni→レアルと契約延長）を逃した末のプランではあるが、Skyは「再建は計画通りか」を検証する状況\n- カリック体制の基本形は**4-2-3-1**。メイヌーをダブルボランチの繋ぎ役に置き、シェシュコ（Benjamin Šeško）を最前線の基準点とするシンプルな設計で、1月就任以降13試合で勝点29/39（9勝）と立て直した実績\n- GKはラメンスが正守護神として定着（オナナ放出の根拠）\n- ※オフシーズンのため直近試合のxG等の実測データはなし\n\n\u003e source: [Sky Sports分析](https://www.skysports.com/football/news/11096/13561668/man-utd-transfer-news-is-the-old-trafford-midfield-rebuild-going-to-plan-as-michael-carricks-side-prepare-for-2026-27) (2026-07)\n\n---\n\n## 📅 今後の試合予定\n\n| 日程（JST） | 大会 | 相手 | 会場 |\n|---|---|---|---|\n| 7月19日（日）0:00 | プレシーズン親善 | レクサム | オリンピックスタジアム（ヘルシンキ） |\n| 7月25日（土）1:00 | プレシーズン親善 | ローゼンボルグ | トロンハイム（ノルウェー） |\n| 8月22日（土）20:30 | プレミアリーグ開幕戦 | ハル・シティ（**アウェー**） | MKMスタジアム |\n\n- **見どころ:** プレシーズン初戦のレクサム戦はW杯明け直後で、主力13名の合流時期が焦点。開幕はプレーオフ昇格組ハルとのアウェー、第2節はホームでイプスウィッチ（日程変更で8月30日・日曜に）、**第4節（9/12）で早くもホームでのマンチェスター・ダービー**\n- 夏のツアーは北米W杯開催のため欧州内で完結。PSG・アトレティコ・マドリード・リーズとの対戦も予定（日程未確定分あり）\n\n\u003e source: [manutd.com プレシーズン日程](https://www.manutd.com/en/news/detail/game-by-game-united-pre-season-fixture-list-2026) / [ESPN 2026-27日程](https://www.espn.com/soccer/story/_/id/49114816/man-united-premier-league-fixtures-2026-27-hull-city-first-michael-carrick-co) (2026-07)\n\n---\n\n## 🏟️ クラブ情報\n\n- **新スタジアム用地を確保**: 6月、Blackstone傘下Indurentから必要用地の大半（25エーカー）を取得。現オールド・トラフォードの北西350mに**10万人収容・総工費約£2bn**のノーマン・フォスター設計スタジアムを建設する計画。着工時期は周辺再開発への政府支援次第\n- **2026/27フィクスチャー正式発表**: シーズンは8月22日開幕〜2027年5月30日閉幕。ユナイテッドはCL（リーグフェーズ）に復帰、組み合わせ抽選は8月\n- カリックの永続監督就任が正式確認済み（1月の暫定就任→CL権獲得の実績で昇格）\n\n\u003e source: [City A.M.](https://www.cityam.com/manchester-united-issue-major-stadium-update-for-new-trafford/) (2026-06) / [manutd.com](https://www.manutd.com/en/news/official-united-2026-27-premier-league-fixtures) (2026-07)\n\n---\n\n## 📰 The Athletic ピックアップ\n\n### 「マンU、チェルシーとサントス移籍で合意」— David Ornstein スクープ（7月8日）\n\n- 合意条件（£48m＋アドオン£2m、10%セルオン、個人合意済み・メディカル許可）を最初に報じた一次スクープ。各社の後追い報道の起点\n- リンク: [The Athletic - Manchester United](https://www.theathletic.com/football/manchester-united/)（記事本体はペイウォール内）\n\n\u003e source: [NewsNow経由のOrnstein報道確認](https://www.newsnow.com/us/Sports/Soccer/Pundits/David+Ornstein) (2026-07-08)\n\n※直近4日以内で公開範囲から内容確認できたThe Athletic記事は上記1件のみ（水増し回避のため該当分のみ記載）\n\n---\n\n**信頼度凡例:** ◎ほぼ確実（公式・Here We Go・複数A級一致） ／ ○有力（複数A級） ／ △噂レベル（単一ソース）";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
