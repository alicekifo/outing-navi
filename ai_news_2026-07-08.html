<script>
const md = "## 🤖 今週のAI最新動向\n\n### 1. Fable 5がグローバル再展開、サイバー安全策と「ジェイルブレイク重大度フレームワーク」を公開\n\n米政府の指示による6月の提供停止を経て、AnthropicのClaude Fable 5が7月1日にグローバルで再展開された。翌7月2日、同社は再展開を支える技術詳細を公開——報告されたジェイルブレイクの再現試行を99%超ブロックする新セーフティ分類器（フラグ時はOpus 4.8へ再ルーティング）と、業界共通の「サイバージェイルブレイク重大度スケール（CJS-0〜CJS-4）」の草案だ。\n\n重要なのは、サイバー系リクエストを全面ブロックせず4カテゴリに分類して捌く設計にした点。ランサムウェア・ワイパー・C2構築・防御回避は常時ブロックする一方、防御価値の高いデュアルユース作業は通す。CJSは「能力向上・範囲・武器化の容易さ・発見容易性」の4軸で採点し、Amazon・Microsoft・Googleと共同のProject Glasswingとして業界標準化を狙う。脆弱性にCVSSがあるように、ジェイルブレイクにも共通言語を作る動きだ。\n\n出典: [Anthropic](https://www.anthropic.com/news/fable-safeguards-jailbreak-framework) (2026-07-02公開)\n\u003e source: https://www.anthropic.com/news/fable-safeguards-jailbreak-framework\n\n### 2. Meituan「LongCat-2.0」の重み公開——1.6TパラメータMoE・ネイティブ1MコンテキストがMITライセンスで手に入る\n\n中国Meituanが6月30日に発表したLongCat-2.0の重みが7月4日にHugging Faceで公開された。総パラメータ1.6兆・トークンあたり約480億活性のMoEで、ネイティブ1Mトークンコンテキスト、MITライセンス。ベンダー公表値でSWE-bench Pro 59.5（GPT-5.5の58.6を上回ると主張）、Terminal-Bench 2.1で70.8、SWE-bench Multilingual 77.3。\n\n注目点は2つ。第一に、学習・推論を中国製AI ASIC 5万枚クラスタで完結させ、NVIDIAハードを使っていないと明言していること。第二に、フロンティア級のエージェンティックコーディングモデルが制約なしのMITで落ちてきたことで、ローカル・オンプレ推論勢の選択肢が一段上がる（ただし1.6T MoEなので、個人環境ではアグレッシブな量子化前提）。なおベンチはベンダー自己申告であり、第三者検証はこれからだ。\n\n出典: [Hugging Face (meituan-longcat)](https://huggingface.co/meituan-longcat/LongCat-2.0) (重み公開 2026-07-04)\n\u003e source: https://huggingface.co/meituan-longcat/LongCat-2.0\n\n### 3. カナダ・アルバータ州政府、Claude Codeで4.66億行を20時間でセキュリティスキャン\n\n7月6日、Anthropicが公開した事例によると、アルバータ州技術革新省はClaude Code（Opus/Sonnet）を使い、州の27省庁にまたがる4億6,600万行のコードを約20時間でスキャンし、脆弱性の検出から修正まで実施した。約50のAIエージェントを並列稼働させ、各アプリケーションを毎パス約95のセキュリティコントロールに照らして検査する。\n\n構成が実務的で面白い。攻撃者視点で外部からアプリを突く「レッドチーム」エージェントと、国際セキュリティ標準に照らして防御を評価し修正対象ファイルまで指す修正計画を書く「ブルーチーム」エージェントを開発プロセスに常駐させる二段構えだ。政府規模のレガシーコード監査という、人手では予算的に不可能だった仕事がAIエージェントで現実になった具体例で、同種の体制はそのまま企業のAppSecにも移植できる。\n\n出典: [Anthropic](https://www.anthropic.com/news/alberta-government-claude-cybersecurity) (2026-07-06公開)\n\u003e source: https://www.anthropic.com/news/alberta-government-claude-cybersecurity\n\n## 📄 今週の注目論文\n\n### 1. PI-Hunter：プロンプトインジェクションを暴き特定する自動レッドチーミング（PI-Hunter: Automated Red-Teaming for Exposing and Localizing Prompt Injections）\n\n- 著者: Pengfei He（ミシガン州立大学）ほか\n- arXiv: 2606.12737（2026-06-10公開）\n- **Problem**: LLMエージェントは外部ソース経由の間接プロンプトインジェクションに晒されるが、既存防御は推論時のブロックに偏り、開発者は「潜伏したインジェクションがどこでどう発火するか」を観測できない\n- **Method**: ソースの実態を反映した（source-aware）テストケースを自動構築し、フィードバック駆動の探索で進化させ、外部環境に埋め込まれた悪意ある指示をエージェントに取得・発現させる監査フレームワーク\n- **Finding**: 既存の自動レッドチーミング手法と比べて脆弱性の露出数と攻撃面カバレッジを大幅に改善し、既存のインジェクション防御が導入された環境でも有効性を維持\n\n**読みどころ**: 「ブロックする防御」から「監査して位置を特定する防御」への視点転換。エージェントをプロダクションに出す前のペネトレーションテスト工程を自動化する話で、上のアルバータ州事例のようなエージェント運用が広がるほど、この種の監査フレームワークが必須インフラになる。\n\n\u003e source: https://arxiv.org/abs/2606.12737\n\n### 2. コンピュータシステムの視点でClaw型エージェントのセキュリティを理解・評価する（Understanding and Evaluating Claw-like Agent Security Through a Computer-Systems Lens）\n\n- 著者: Peizhi Niu（所属はarXivページ上に未記載）ほか\n- arXiv: 2606.30755（2026-06-29公開）\n- **Problem**: OpenClawのような「常駐し、認証情報・ファイル・ツール・外部サービスへ永続アクセスを持つ」エージェントは事実上のOSであり、既存評価はコンポーネント横断の脆弱性を見落としている\n- **Method**: コンテナ化したエージェントレプリカと9つの出力チャネルへのテイント追跡を備えたベンチマークSafeClawArenaを構築し、4攻撃カテゴリ・406の敵対タスクで検証\n- **Finding**: フロンティアLLMでも攻撃成功率70%、悪意あるプラグイン経由では100%成功。防御プラットフォームSeClawはGPT-5.4の攻撃成功率を70%→22%に低減\n\n**読みどころ**: エージェントを「アプリ」でなく「プロセス分離・権限・テイント解析の対象たるシステム」として扱う枠組みが秀逸。プラグイン経由の成功率100%という数字は、サプライチェーン管理なしでエージェントに常駐権限を与えることの危うさをそのまま示している。Linux屋の直感（最小権限・sandboxing）がそのまま武器になる領域。\n\n\u003e source: https://arxiv.org/abs/2606.30755\n\n### 3. 推論はパターンマッチングである：人間とLLMの日常推論に共通するメカニズム（Reasoning as Pattern Matching: Shared Mechanisms in Human and LLM Everyday Reasoning）\n\n- 著者: Zach Studdiford（ウィスコンシン大学マディソン校）、Gary Lupyan\n- arXiv: 2606.13607（v1: 2026-06-11公開）\n- **Problem**: LLMの推論失敗は「真の推論でなくパターンマッチだから」と説明されるが、その裏には「人間は抽象的な世界モデルで推論している」という未検証の前提がある\n- **Method**: 人間の被験者と25のLLMに日常場面の常識推論課題を課し、さらにLLM側で応答を駆動するattention headを特定して機構レベルで比較\n- **Finding**: 人間とモデルは類似した誤りパターンを示し、パターンマッチングを実装するattention headの挙動から「一見無関係なプロンプトの詳細が引き起こす人間の不可解な推論エラー」を予測できた。日常的な因果推論は、人間でもLLMでも世界モデルよりパターンマッチングに近い\n\n**読みどころ**: 「LLMはただのパターンマッチャー」という批判の前提そのものを実験でひっくり返しにいく論文。モデル内部のattention head分析が人間の認知バイアス予測に使えるという発見は、機械論的解釈可能性と認知科学が双方向に接続し始めた証拠で、本文13ページ＋補足51ページの重量級。\n\n\u003e source: https://arxiv.org/abs/2606.13607\n\n## 💡 今週のひとことインサイト\n\n### 1. AIセキュリティが「CVSSの言語」を手に入れ始めた\n\n今週の材料を並べると一本の線が見える。Anthropicはジェイルブレイクを全面ブロックせず、CJS-0〜4で格付けして「発見容易性×実害」で優先度を付けると言い出した。アルバータ州はレッド/ブルーチームのエージェントを常駐させ、4.66億行を回した。論文側ではPI-HunterとSafeClawArenaが、攻撃の自動生成とテイント追跡でエージェントの攻撃面を測り始めた。これは従来のセキュリティ業界が数十年かけて構築した語彙——CVSS、ペネトレーションテスト、最小権限、サプライチェーン管理——がそのままAIに移植されていく過程だ。「AIの安全」が倫理の話から脆弱性管理の話へと具体化するほど、Linux/セキュリティ屋の既存スキルはAI時代の中心技能になる。SafeClawArenaのプラグイン経由攻撃成功率100%という数字が示す通り、問題はもうモデルの賢さではなく、権限設計の甘さなのだから。\n\n\u003e source: https://www.anthropic.com/news/fable-safeguards-jailbreak-framework";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
