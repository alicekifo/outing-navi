<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教養マガジン - NEXUS</title>
<script>(function(){const _t=localStorage.getItem('nexus_theme');if(_t==='dark')document.documentElement.classList.add('dark');else document.documentElement.classList.remove('dark');})()</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f5f7;--surface:#ffffff;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.16);--accent:#d4a373;--text:#1d1d1f;--text2:rgba(60,60,67,0.6);}
html.dark{--bg:#0c0c10;--surface:#161620;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.15);--text:#e8e8f0;--text2:#a8a8c8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;padding:20px 16px 80px;}
.page{max-width:680px;margin:0 auto;}
.hd{display:flex;align-items:center;gap:10px;margin-bottom:40px;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.logo em{color:var(--accent);font-style:normal;}
.back-link{font-size:11px;color:var(--text2);text-decoration:none;margin-left:auto;}
.back-link:hover{color:var(--accent);}
.placeholder{text-align:center;padding:60px 20px;}
.placeholder-icon{font-size:48px;margin-bottom:16px;}
.placeholder-title{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text);}
.placeholder-sub{font-size:14px;color:var(--text2);line-height:1.7;}
</style>
</head>
<body>
<div class="page">
  <div class="hd">
    <div class="logo">&#x1F4DA; <em>Culture</em></div>
    <a class="back-link" href="./index.html">&larr; Hub</a>
  </div>
  <div class="placeholder">
    <div class="placeholder-icon">&#x1F4DA;</div>
    <div class="placeholder-title">教養マガジン</div>
    <div class="placeholder-sub">初回生成は水曜未明です。<br>歴史・科学・芸術・語源・地理など幅広いテーマの<br>教養コンテンツを毎週水曜に自動生成します。</div>
  </div>
</div>
</body>
</html>
