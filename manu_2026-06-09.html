<script>
const md = "情報を整理して週報を作成します。\n\n---\n\n# マンチェスター・ユナイテッド情報週報\n**発行日: 2026年6月9日（月）**\n\n---\n\n## クラブ概況\n\n| 項目 | 情報 |\n|---|---|\n| 監督 | マイケル・カリック（契約 〜2028年） |\n| フットボール・ダイレクター | ジェイソン・ウィルコックス |\n| 2025/26シーズン最終順位 | プレミアリーグ **3位**（CL出場権確保） |\n| 現在のステータス | オフシーズン（プレシーズン準備中） |\n\n---\n\n## 1. 直近の試合結果（6/2〜6/9）\n\n**競技試合なし**\n\n2025/26プレミアリーグシーズンは5月24日（日）のブライトン戦（**アウェー 0-3 勝利**）をもって終了。現在はオフシーズン中のため、6/2〜6/9の期間に公式戦・フレンドリーマッチは実施されていない。\n\n---\n\n## 2. 今後の試合予定（プレシーズン）\n\n| 日程 | 大会 | 相手 | 会場 |\n|---|---|---|---|\n| 7月18日（土） | プレシーズン親善試合 | **レクサム** | ヘルシンキ（フィンランド） |\n| 7月24日（金） | プレシーズン親善試合 | **ローゼンボルグ** | トロンハイム（ノルウェー） |\n| 未発表 | プレシーズン親善試合 | リーズ / PSG / アトレティコ・マドリード | 未定 |\n\n\u003e **注記:** 例年の北米ツアーと異なり、今夏は北米W杯（米・加・墨）開催のため主力選手の多くが代表活動中。プレシーズンはヨーロッパ内で実施される。2026/27シーズンのPLフィクスチャーズ発表日は近日公式より告知予定。\n\n---\n\n## 3. 移籍情報（5/26〜6/9）\n\n### 入団・獲得交渉\n\n#### ✅ エデルソン（Ederson）— クラブ間合意済み ｜ 信頼度: **S級**\n\n- **元クラブ:** アタランタ（セリエA）\n- **ポジション:** ボランチ / セントラルMF\n- **年齢:** 26歳（ブラジル）\n- **移籍金:** £34m ＋ 成功報酬£3.8m ＝ **総額最大約£38m（€45m）**\n- **契約:** 4年 ＋ 1年オプション\n- **ソース:** Sky Sports / ESPN / VAVEL（6月2〜4日報道）\n- カゼミーロの後継としてカリック体制初の公式補強。アトレティコ・マドリードとの争奪戦を制し合意。メディカル通過次第、7月前の正式発表見込み。\n\n---\n\n#### 🔄 ジャン＝フィリップ・マテタ（Jean-Philippe Mateta）— 探索的交渉中 ｜ 信頼度: **B級**\n\n- **現クラブ:** クリスタル・パレス（PL）\n- **ポジション:** CF\n- **年齢:** 27歳（フランス代表・W杯参加中）\n- **残存契約:** 1年（2027年満了）\n- **概算移籍金:** 最大€50m前後（残存契約1年のため大幅割引の可能性）\n- **ソース:** TheHardTackle（6月5日）\n- 正式オファー未提示の探索段階。W杯終了後に交渉本格化の見通し。\n\n---\n\n#### 🔄 ヴァルデマル・アントン（Waldemar Anton）— 関心段階 ｜ 信頼度: **C級**\n\n- **現クラブ:** シュトゥットガルト（ブンデスリーガ）\n- **ポジション:** CB\n- **国籍:** ドイツ代表（W杯参加中）\n- **ユナイテッドの提示準備額:** €40m\n- **ソース:** The Mirror（単一報道）\n- W杯参加中のため交渉は7月以降になる公算大。\n\n---\n\n### 契約更新\n\n#### ✅ トム・ヒートン（Tom Heaton）— 1年延長 ｜ 信頼度: **S級**\n- 6月4日、manutd.com が正式発表。GK控えとして継続。\n\n---\n\n### 放出・移籍交渉\n\n#### ⚠️ マーカス・ラッシュフォード（Marcus Rashford）— **期限: 6月15日** ｜ 信頼度: **S級**\n\n- **現状:** バルセロナへローン中（期限: 6月30日）\n  - 今季成績: 49試合 / 14G 14A\n- **バルセロナの購入オプション:** £26m（**行使期限: 6月15日**）\n\n| 立場 | 主張 |\n|---|---|\n| バルセロナ | オプション不行使の方針。追加ローン or £13m での買取を希望 |\n| ユナイテッド | 追加ローン拒否。£26m（€30m）の完全移籍のみ受入 |\n| ラッシュフォード本人 | バルセロナ残留希望。5年契約への変更で交渉後押しの姿勢 |\n\n- **ソース:** FCBarcelona.com 公式 / Sky Sports\n- **注目点:** 6月15日の期限内に合意なき場合、別クラブへの交渉が本格化する可能性。ユリアン・アルバレスのバルセロナ加入有無も変数。\n\n---\n\n## 4. クラブ動向・注目事項\n\n- **カリック続投確定（〜2028）:** 5月22日に正式発表。暫定就任（1月〜）からの昇格で、CL出場権確保という実績を評価された。\n- **W杯と補強スケジュール:** W杯は7月中旬まで続くため、主力選手が不在の状態。クラブは代表活動を考慮しながら移籍活動を進めており、大型補強の完結は7月後半〜8月が中心になる見込み。\n- **CL復帰:** 2026/27シーズンはチャンピオンズリーグに復帰。グループステージ（またはリーグフェーズ）の組み合わせ抽選は8月以降。\n\n---\n\n**信頼度凡例**\n| ランク | 基準 |\n|---|---|\n| S級 | 公式発表・Sky Sports・ESPN・大手メディア複数確認 |\n| B級 | 信頼性の高い専門メディア1〜2社が報道 |\n| C級 | 単一ソースの噂・確認取れていない段階 |\n\n---\n\n**Sources:**\n- [Man Utd agree Ederson deal - Sky Sports](https://www.skysports.com/football/news/11095/13548678/man-utd-agree-ederson-deal-atalanta-midfielder-set-for-old-trafford-in-lb38m-transfer)\n- [Man United agree deal for Éderson - ESPN](https://www.espn.com/soccer/story/_/id/48953983/man-united-agree-deal-atalanta-ederson-sources)\n- [Rashford loan agreement - FC Barcelona Official](https://www.fcbarcelona.com/en/news/4319297/agreement-between-fc-barcelona-and-manchester-united-for-the-loan-of-marcus-rashford)\n- [Rashford Barcelona transfer update - Sky Sports](https://www.skysports.com/football/news/33694/13548681/manchester-united-transfer-news-marcus-rashford-could-still-re-join-barcelona-despite-anthony-gordon-deal-but-julian-alvarez-a-factor)\n- [Mateta exploratory talks - The Hard Tackle](https://thehardtackle.com/transfer-news/2026/06/05/manchester-united-hold-exploratory-talks-to-sign-jean-philippe-mateta/)\n- [Carrick continues as head coach - manutd.com](https://www.manutd.com/en/news/michael-carrick-continues-as-man-united-head-coach-2026)\n- [Pre-season fixture list - manutd.com](https://www.manutd.com/en/news/detail/game-by-game-united-pre-season-fixture-list-2026)";
