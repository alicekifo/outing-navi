<script>
const md = "# マンチェスター・ユナイテッド 情報週報\n**発行日：2026年6月24日（水）**\n\n---\n\n## 1. 直近の試合結果（6/17〜6/24）\n\n**対象期間の競技試合：なし**\n\n2025-26シーズンは5月24日のブライトン戦（3-0勝利）をもって終了。プレミアリーグ最終成績は **3位・71ポイント（20勝7分11敗）** でシーズンを終え、来季のチャンピオンズリーグ出場権を確保した。現在はオフシーズン中につき、直近7日以内に公式戦の実施なし。\n\n---\n\n## 2. 今後の試合予定\n\n| 日付 | 大会 | 対戦相手 | 会場 |\n|------|------|----------|------|\n| 7月18日 | プレシーズン | ウレクサム | ヘルシンキ（フィンランド） |\n| 7月24日 | プレシーズン | ローゼンボルグ | トロンハイム（ノルウェー） |\n| 8月上旬〜中旬 | プレシーズン | PSG、アトレティコ、リーズ、ACミラン（順次） | 未定 |\n| **8月22日** | **PL 第1節** | **ハル・シティ（A）** | **KCOM スタジアム** |\n| 8月29日 | PL 第2節 | イプスウィッチ・タウン（H） | オールド・トラッフォード |\n\n\u003e プレシーズンは欧州内で実施。W杯（2026年夏）参加選手の帰還を考慮し、北米ツアーは組まない方針。\n\n---\n\n## 3. 移籍・契約情報（6/10〜6/24）\n\n### ✅ ほぼ確定\n**エデルソン（アタランタ）** — [ESPN](https://www.espn.com/soccer/story/_/id/48953983/man-united-agree-deal-atalanta-ederson-sources) / [Sky Sports](https://www.skysports.com/football/news/11095/13548678/man-utd-agree-ederson-deal-atalanta-midfielder-set-for-old-trafford-in-lb38m-transfer)\n- 移籍金：£3,400万＋アドオン最大£380万（総額 **~£3,800万**）\n- 契約：4年＋1年オプション\n- 26歳のブラジル人ボランチ。カリック体制初の補強。7月中に健康診断・正式発表予定。アトレティコ・マドリードとの競合からUNITEDが奪取。\n\n---\n\n### 🔄 交渉進行中\n**マテウス・フェルナンデス（ウェストハム→MU？）** — [Sky Sports](https://www.skysports.com/football/news/11095/13553501/mateus-fernandes-transfer-manchester-united-preparing-opening-bid-for-west-ham-midfielder-as-21-year-old-becomes-priority-target)\n- 21歳・ポルトガル代表MF。今夏の **最優先ターゲット**。\n- ウェストハム側の評価額：**£8,000万**。ウェストハムの降格が交渉を後押し。\n- 選手本人はユナイテッドを第一希望と報道。シティ・スパーズも競合するが「UNITEDが最も有力」（Romano）。\n- マンUは初回入札を準備中。\n\n**クリサンシオ・サマーヴィル（ウェストハム）** — [Sky Sports](https://www.skysports.com/football/live-blog/11095/13025492/man-utd-transfer-news-rumours-and-gossip-live-updates-and-latest-on-deals-signings-loans-and-contracts)\n- ウェストハムの降格後に放出候補となったオランダ代表FW。フォワード補強の選択肢として検討中。PSGとの競合あり。\n\n---\n\n### ❌ 撤退・断念\n**エリオット・アンダーソン（ノッティンガム・フォレスト）** — [TransferFeed](https://www.transferfeed.com/transfers/elliot-anderson-nottingham-forest-manchester-united/17591202) / [TeamTalk](https://www.teamtalk.com/manchester-united/manchester-city-manchester-united-nottingham-forest-elliot-anderson)\n- マンシティが£1億2,100万の入札。フォレストの要求額は£1億2,500万超。\n- マンUは「入札競争には加わらない」と決定し、他ターゲットへシフト済み。\n\n---\n\n## 4. クラブ・マネジメント情報\n\n**マイケル・カリック 正式監督就任（〜2028年）** — [manutd.com](https://www.manutd.com/en/news/michael-carrick-continues-as-man-united-head-coach-2026)\n- 1月にルーベン・アモリム解任後（暫定：ダレン・フレッチャー経由）に就任。暫定期間で16試合11勝の成績を残し、CL圏を確保して正式契約締結。\n- 今夏の補強方針：MF1名＋FW1名を優先。\n\n**2026-27 PL フィクスチャー発表** — [manutd.com](https://www.manutd.com/en/news/official-united-2026-27-premier-league-fixtures)\n- 開幕はハル・シティ（A）8月22日。9月中旬にマンチェスター・ダービー（H）。\n\n---\n\n## 5. 注目トピック\n\n- 2025年FIFAクラブW杯にマンUは出場資格なし（UEFAコメフィシエント基準未到達）。\n- Amazon PrimeがマンU密着ドキュメンタリーシリーズを制作予定（2026-27シーズン対象）。\n\n---\n\n**情報の信頼度凡例：** S=公式発表 / A=Romano・ESPN等上位メディア / B=Sky Sports等\n\nSources:\n- [Man Utd agree Ederson deal (Sky Sports)](https://www.skysports.com/football/news/11095/13548678/man-utd-agree-ederson-deal-atalanta-midfielder-set-for-old-trafford-in-lb38m-transfer)\n- [Éderson close to joining Man United (ESPN)](https://www.espn.com/soccer/story/_/id/48953983/man-united-agree-deal-atalanta-ederson-sources)\n- [Mateus Fernandes transfer (Sky Sports)](https://www.skysports.com/football/news/11095/13553501/mateus-fernandes-transfer-manchester-united-preparing-opening-bid-for-west-ham-midfielder-as-21-year-old-becomes-priority-target)\n- [Elliot Anderson transfer (TransferFeed)](https://www.transferfeed.com/transfers/elliot-anderson-nottingham-forest-manchester-united/17591202)\n- [Carrick continues as head coach (manutd.com)](https://www.manutd.com/en/news/michael-carrick-continues-as-man-united-head-coach-2026)\n- [2026-27 fixtures (manutd.com)](https://www.manutd.com/en/news/official-united-2026-27-premier-league-fixtures)\n- [Pre-season schedule (ESPN)](https://www.espn.com/soccer/story/_/id/49008893/manchester-united-preseason-schedule-wrexham-psg-atletico-leeds)\n- [2025-26 season results (NBC Sports / en.tempo.co)](https://www.nbcsports.com/premier-league-table-2025-26-season-standings)";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
