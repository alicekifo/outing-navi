<script>
const md = "# マンチェスター・ユナイテッド情報週報\n**生成日：2026年6月20日（土）**\n\n---\n\n## 1. 直近の試合結果\n\n\u003e **直近7日間（6月13日〜6月20日）に公式戦・親善試合ともに開催なし。**\n\u003e プレミアリーグは5月末にシーズン終了。現在はオフシーズン中。\n\n---\n\n## 2. 今後の試合予定\n\n| 日付 | 種別 | 対戦 | 会場 |\n|------|------|------|------|\n| 7月18日 | プレシーズン親善試合 | ユナイテッド vs **レクサム** | 未定 |\n| 7月24日 | プレシーズン親善試合 | **ローゼンボルグ** vs ユナイテッド | ノルウェー |\n| 8月1日 | プレシーズン親善試合 | vs **アトレティコ・マドリード** | 未定 |\n| 8月8日 | プレシーズン親善試合 | vs **パリ・サンジェルマン** | 未定 |\n| **8月22日** | **PL 2026/27 開幕戦** | ユナイテッド vs **ハル・シティ**（H） | オールド・トラッフォード 12:30 |\n\n\u003e ハル・シティは今季昇格組。ホームで開幕を迎える。\n\n---\n\n## 3. クラブニュース：マイケル・キャリック、正式監督就任\n\n**2026年5月22日、マイケル・キャリックの正式監督就任が発表された。契約期間は2028年まで（2年）。**\n\n2026年1月に暫定監督として就任し、16試合で11勝3分2敗という成績を収め、クラブをリーグ3位・**チャンピオンズリーグ出場権獲得**に導いた。プレミアリーグ今季最優秀監督賞にもノミネートされており、クラブはその実績を評価して正式に就任を決定した。\n\n---\n\n## 4. 移籍情報（6月6日〜6月20日 / サマーウィンドウ：6月15日開幕）\n\n### 【IN】獲得確定\n\n| 選手 | 前所属 | 移籍金 | 契約 | 信頼度 |\n|------|--------|--------|------|--------|\n| **エデルソン（MF/ブラジル代表）** | アタランタ | £38m（€45m）＋アドオン £3.8m | 4年＋1年オプション | S級（Romano確認・公式発表済） |\n\nブラジル代表ミッドフィールダー。カゼミーロの後継として獲得。7月中のメディカル実施後に正式加入予定。\n\n---\n\n### 【OUT】退団確定・見込み\n\n| 選手 | 形態 | 移籍先 | 詳細 |\n|------|------|--------|------|\n| **カゼミーロ（MF）** | 契約満了・フリー | 未定 | 6月末でOT退団 |\n| **ジェイドン・サンチョ（FW）** | 契約満了・フリー | 未定 | 6月末でフリーエージェントに |\n| **ラスムス・ホイルンド（FW）** | レンタル移籍→完全移籍 | ナポリ | 2025-26シーズンのレンタルを完全移籍に変換済み |\n\n---\n\n### 【交渉中・注目ターゲット】（14日以内の報道ベース）\n\n| 選手 | 現所属 | ポジション | 状況 |\n|------|--------|-----------|------|\n| **マテウス・フェルナンデス** | ウェストハム | MF | クラブが交渉入りを探っている段階 |\n| **ルイス・ホール** | ニューカッスル | LB | 状況を継続モニタリング中 |\n| **アンドレ** | ウルブズ | MF | カゼミーロ後継の第一候補として報道あり |\n\n\u003e CEOオマル・ベラダは「プレミアリーグで実績を持つ選手を優先する戦略を今夏も継続する」と言明（ESPN）。昨夏のムベウモ・クーニャ獲得路線の継続が示唆されている。\n\n---\n\n## 5. 今週の総括\n\n- **シーズン終了・オフシーズン中。** 公式戦は7月中旬のプレシーズン開幕まで約4週間なし。\n- **キャリック新体制**がプレシーズンプログラムの設計に着手。CL復帰初年度に向けた陣容強化が最優先課題。\n- 移籍市場では**エデルソン獲得が唯一の完了案件**。カゼミーロ退団で空く中盤の穴を埋める追加補強が引き続き焦点となる。\n\n---\n\nSources:\n- [Man Utd appoint Michael Carrick as permanent manager | Al Jazeera](https://www.aljazeera.com/sports/2026/5/22/man-utd-appoint-michael-carrick-as-permanent-manager)\n- [Michael Carrick signs deal with Man United to be interim head coach | Al Jazeera](https://www.aljazeera.com/sports/2026/1/13/michael-carrick-signs-deal-with-man-united-to-be-interim-head-coach)\n- [Done Deal: Ederson to Manchester United for total €45m | Yahoo Sports](https://sports.yahoo.com/articles/done-deal-ederson-manchester-united-213000324.html)\n- [Man Utd agree Ederson deal: Atalanta midfielder set for Old Trafford in £38m transfer | Sky Sports](https://www.skysports.com/football/news/11095/13548678/man-utd-agree-ederson-deal-atalanta-midfielder-set-for-old-trafford-in-lb38m-transfer)\n- [Man United CEO: Signing Premier League proven talent could be summer strategy again | ESPN](https://www.espn.com/soccer/story/_/id/48966590/manchester-united-omar-berrada-premier-league-talent-bryan-mbeumo-matheus-cunha)\n- [Every Man Utd done deal in the summer 2026 transfer window | TeamTalk](https://www.teamtalk.com/manchester-united/every-completed-man-utd-transfer-summer-2026-signings-exits-loans)\n- [Official: United\u0027s 2026/27 Premier League fixtures | manutd.com](https://www.manutd.com/en/news/official-united-2026-27-premier-league-fixtures)\n- [Man United Premier League fixtures 2026-27: Hull City first up | ESPN](https://www.espn.com/soccer/story/_/id/49114816/man-utd-premier-league-fixtures-2026-27-hull-city-first-michael-carrick-co)\n- [Pre-season: Our game-by-game guide | manutd.com](https://www.manutd.com/en/news/game-by-game-united-pre-season-fixture-list-2026)\n- [Berrada explains summer transfer thinking | manutd.com](https://www.manutd.com/en/news/berrada-explains-summer-transfer-thinking-for-2026-1)";
