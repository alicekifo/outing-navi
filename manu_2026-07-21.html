<script>
const md = "# マンチェスター・ユナイテッド情報週報（2026-07-21）\n\n\u003e **今週のTLDR**: W杯決勝はスペイン 1-0 アルゼンチン（延長）——マルティネス（Lisandro Martínez）は**前半44分に太もも負傷で交代**し準優勝。重傷回避に楽観論はあるが精密検査待ちで、開幕への影響が今週最大の焦点。移籍はコネ（Manu Koné）が「ローマが不本意ながら入札受け入れ準備」（7/19）まで前進——ただしファーディナンド（Rio Ferdinand）の「£45m合意」発言はRomano自身の報道と矛盾し未確認。ラッシュフォード（Marcus Rashford）の£40m解除条項が7/15に失効し、約1年ぶりのカリントン復帰へ。次戦はローゼンボリ戦（7/24・JST 7/25 1:00）。\n\n---\n\n## ⚽ 直近の試合結果\n\n### 親善試合: マンチェスター・ユナイテッド 0-1 レクサム（現地7/18・ヘルシンキ・中立）※前号既報\n\n- 39分にスミス（Sam Smith）の古巣対決弾に沈み、カリック（Michael Carrick）体制の初陣は黒星。前半は4-2-3-1（サントス（Andrey Santos）デビュー）、ハーフタイムに21人交代で後半は全員アカデミー布陣。負傷者ゼロ（カリック談）。詳細は前号（2026-07-20号）参照\n- 過去7日以内のクラブの試合はこの1試合のみ。公式戦未開始のためxG・採点等の新規指標なし\n\n出典: [manutd.com 公式レポート](https://www.manutd.com/en/news/report-united-0-wrexham-1) (2026-07-18) / [Sky Sports](https://www.skysports.com/football/news/11667/13564369/man-utd-0-1-wrexham-andrey-santos-makes-red-devils-debut-in-opening-pre-season-loss-in-helsinki) (2026-07-18)\n\n---\n\n## 🔄 移籍・選手動向\n\n### W杯決勝: マルティネスが前半44分に負傷交代——アルゼンチンは準優勝\n\n- 決勝（現地7/19・メットライフ・スタジアム）は**スペインが延長1-0で勝利**し16年ぶり2度目の優勝。決勝点は延長後半開始39秒のフェラン・トーレス（Ferran Torres）。アルゼンチンはシュート2本・xG 0.2に封殺され（スペインは20本・xG 1.94）、後半アディショナルタイムにエンソ・フェルナンデス（Enzo Fernández）が2枚目の警告で退場\n- **マルティネスは先発したが、44分に太ももを指しながらシャツで顔を覆ってピッチアウト**。ハーフタイム明けにベンチに座り、足取りに明らかな異常はなし＝重大な損傷は回避との楽観論もあるが、筋肉系の断裂なら「週でなく月単位」の恐れ。帰国後にユナイテッドのメディカルが検査して離脱期間を判断する\n- 離脱までのプレーは「スペインの右サイド攻撃を制御し、縦パスで最も多くラインを破った」と好評価（採点6.6）。※Sofascoreの「Martínez 9.6」は**GKのエミリアーノ・マルティネス**（Emiliano Martínez・決勝最多記録の11セーブ）で別人\n- SIは「直近4年で609日欠場」の負傷歴に再び暗雲と指摘。前号既報のバナー問題（FIFA裁定は大会後）は続報なし\n\n出典: [ESPN 試合結果](https://www.espn.com/soccer/match/_/gameId/760517/argentina-spain) (2026-07-19) / [Goal（負傷詳報）](https://www.goal.com/en-us/lists/argentina-s-lisandro-martinez-limps-out-of-world-cup-final-major-injury-blow-for-man-utd/bltaef0adde0558ea96) (2026-07-19) / [SI（負傷歴）](https://www.si.com/soccer/injury-curse-man-utd-star-609-days-missed-four-years) (2026-07-20頃) / [FIFA公式スタッツ](https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026/articles/spain-argentina-final-statistics) (2026-07-19)\n\n### 交渉中\n\n- **コネ（Manu Koné／ローマMF・25歳）○有力**——段階: 入札受け入れ体制・クラブ間交渉入り目前。7/19報道で**ローマは財政事情から「不本意ながら大型入札を受け入れる準備」**。要求額£51m（€60m）とチェルシー競合は前週から継続。ユナイテッド側は「サントス＋ティーレマンス獲得に満足しており、3人目は急がず正しい投資を」の構え。**注意: ファーディナンドが7/16に「Romanoが確認した。£45mで合意」と発言したが、Romano自身の報道は「代理人接触のみ・入札もクラブ間交渉もなし」（7/14）で食い違う。公式発表・\"Here We Go\"ともになし＝合意は未確認扱い** — [The Peoples Person（ローマ受け入れ準備）](https://thepeoplesperson.com/2026/07/19/manu-kone-roma-prepared-to-accept-bid-for-united-target-312929/) (2026-07-19) / [Football365（ファーディナンド発言）](https://www.football365.com/news/man-utd-strike-agreement-kone-roma-ederson) (2026-07-16) / [GiveMeSport（Romano「電話があった」）](https://www.givemesport.com/there-was-a-call-romano-says-man-utd-want-france-star-manu-kone/) (2026-07-14頃)\n- **ベルゲ（Sander Berge／フラムMF・28歳）△→接触段階に前進**: クラブが再接触し「serious target」化との報道。£40m未満で獲得可能・PL経験のあるホールディングMFとして評価。28歳がINEOSの獲得方針（22〜26歳）から外れる障害は変わらず — [CaughtOffside](https://www.caughtoffside.com/2026/07/16/manchester-united-make-fresh-contact-to-sign-28-year-old-premier-league-powerhouse/) (2026-07-16) / [FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/07/transfer-rumours-man-utd-open-talks-hugo-larsson-sander-berge-emerges-midfielder-serious-target) (2026-07-20頃)\n- **ラーソン（Hugo Larsson／MF・22歳）△新顔**: 交渉開始と1媒体が報道。中盤3人目レースにコネ・ベルゲと並ぶ形（詳細未確認・続報待ち） — [FootballTransfers](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/07/transfer-rumours-man-utd-open-talks-hugo-larsson-sander-berge-emerges-midfielder-serious-target) (2026-07-20頃)\n- **バルコラ（Bradley Barcola／PSG・WG）△噂レベル**: PSGから獲得機会の売り込みを受けたとの報道。リバプール・アーセナルも関心。1ソース段階 — [Sky Sports移籍ライブ](https://www.skysports.com/football/live-blog/11667/13025492/man-utd-transfer-news-rumours-and-gossip-live-updates-and-latest-on-deals-signings-loans-and-contracts) (2026-07-20頃)\n- **ヴィテク（Radek Vitek／GK・23歳）△退団希望報道**: 出場機会を求めて退団の意向と報道（レクサム戦後半で採点8の好守を見せた直後） — [Football365](https://www.football365.com/manchester-united) (2026-07-20頃)\n\n### ラッシュフォード: £40m解除条項が失効\n\n- **解除条項（リバプール・シティ以外へ£40mで移籍可）が7/15に失効**（Ornstein（David Ornstein）報道）。今後の売却はユナイテッドとの交渉が必須になり、クラブ側の値付け主導権が復活\n- バルセロナはゴードン（Anthony Gordon）・アデイェミ（Karim Adeyemi）獲得で復帰枠が消滅。本人は現契約より好条件を含む複数オファーを拒否しており、**約1年ぶりにカリントンへ復帰予定**。カリックは戦力として歓迎、INEOSは週給£325kの帳簿外し（売却）を引き続き模索。契約は2029年6月まで — [utdreport（Ornstein）](https://utdreport.co.uk/2026/07/17/david-ornstein-marcus-rashford-release-clause-expires-manchester-united/) (2026-07-17) / [Goal（オファー拒否）](https://www.goal.com/en/lists/marcus-rashford-rejects-transfer-offers-man-utd-exit-clause-expires/blt53a924dbc65c284f) (2026-07-17)\n\n### ケガ・復帰情報\n\n- **マルティネス**: 太もも（上記）。検査結果待ち・離脱期間未定\n- **マイヌー（Kobbie Mainoo）**: 背中。重症の示唆はなし。W杯明け3週間の休暇後にカリントン合流の予定で、**復帰は8月上〜中旬見込み** — [Sports Mole](https://www.sportsmole.co.uk/football/man-utd/injury-news/news/how-long-mainoo-could-be-out-for-as-tuchel-provides-injury-update_601473.html) (2026-07-18頃)\n- **シェシュコ（Benjamin Šeško）**: すね（5月のリバプール戦でコナテ（Ibrahima Konaté）に広告板へ押し込まれ悪化）。カリントンで個別リハビリ中でレクサム戦は欠場。クラブは「開幕には間に合う」と自信を示すが、ローゼンボリ戦出場は流動的 — [SI](https://www.si.com/soccer/why-benjamin-sesko-isnt-playing-man-utd-vs-wrexham-7-18-26) (2026-07-18) / [The Peoples Person（復帰プラン）](https://thepeoplesperson.com/2026/07/10/benjamin-sesko-man-uniteds-plan-to-get-star-striker-fit-for-new-season-312552/) (2026-07-10)\n\n---\n\n## 🧠 戦術・チーム状況\n\n- **カリック体制は4-2-3-1が基調**（前号のレクサム戦で確認・今週は試合がなく新規材料なし）。中盤3人目（コネ／ベルゲ／ラーソン）の獲得が戦術面でも最優先で、カゼミーロ（Casemiro）退団の穴を「守備的で推進力のあるMF」で埋める方針は継続\n- W杯決勝・3決まで戦った組（マルティネス、マイヌー）は休暇→段階合流のため、プレシーズン序盤はレクサム戦ベースのメンバー構成が続く見込み\n- 直近5試合のxG・被xG・ポゼッション ※該当なし（公式戦未開始・親善試合はxG未公表）\n\n出典: [FootballTransfers（中盤3人目レース）](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/07/transfer-rumours-man-utd-open-talks-hugo-larsson-sander-berge-emerges-midfielder-serious-target) (2026-07-20頃)\n\n---\n\n## 📅 今後の試合予定\n\n| 日程（JST） | 大会 | 対戦相手 | 会場 |\n|---|---|---|---|\n| 7/25(土) 1:00（英7/24 17:00） | 親善 | ローゼンボリ | レルケンダール・スタディオン（トロンハイム） |\n| 8/1(土) 22:00（英8/1 14:00） | 親善 | アトレティコ・マドリード | ストックホルム（中立） |\n| 8/9(日) 0:00（英8/8 16:00） | 親善 | パリ・サンジェルマン | ヨーテボリ（中立） |\n\n- **ローゼンボリ戦の見どころ**: カリック体制2戦目。レクサム戦は「復帰10日」の調整段階だったため、主力組を60分程度まで引っ張る本格始動が想定される。シェシュコが復帰第1戦に間に合うかが最大の注目。W杯組（マルティネス、マイヌー、ムベウモ（Bryan Mbeumo）ら）の合流はまだ先で、想定スタメンの具体的報道は現時点なし\n- 以降はリーズ（8/12ダブリン）、ACミラン（8/15ヴロツワフ）と続く\n\n出典: [ESPN 試合ページ](https://www.espn.com/soccer/match/_/gameId/401869196/manchester-united-rosenborg) / [manutd.com プレシーズンガイド](https://www.manutd.com/en/news/game-by-game-united-pre-season-fixture-list-2026)\n\n---\n\n## 🏟️ クラブ情報\n\n- **新スタジアム関連の周辺報道**: 10万人収容・2030-31完成目標の計画（7/9発表・既報）を受け、商業収入£800m計画への「追い風」とする分析と、専門家による実現性への警告が併存。INEOSが£200m規模の商業収益目標を設定との報道も。ファン層はチケット価格高騰への懸念を表明 — [United in Focus](https://www.unitedinfocus.com/news/manchester-uniteds-800m-revenue-plan-just-got-a-boost-but-expert-served-a-stadium-warning/) (2026-07-19頃) / [HITC](https://www.hitc.com/ineos-set-200m-man-united-target-as-deal-goes-under-the-radar-following-stadium-announcement/) (2026-07-19頃)\n- 今週7日以内の新規フロント人事・財務（PSR/FFP）ニュースは※該当なし\n\n---\n\n## 📰 The Athletic ピックアップ\n\n※当号もtheathletic.comの直接検索が結果を返さず、他媒体経由で確認できたThe Athletic発の報道を紹介（リンクは引用元）\n\n1. **Ornstein: ラッシュフォードの£40m解除条項が失効**（7/17）: 失効により売却はクラブ間交渉必須に。約1年ぶりのカリントン復帰への流れと合わせた独自報道 — [utdreport経由](https://utdreport.co.uk/2026/07/17/david-ornstein-marcus-rashford-release-clause-expires-manchester-united/) (2026-07-17)\n2. **The Athletic FCポッドキャスト「Argentina are inevitable + Ornstein on Man United transfers」**（7/16頃）: Ornsteinがユナイテッドの中盤補強方針（3人目の獲得レース・エデルソン（Ederson）破談後の路線）を解説 — [Acast](https://shows.acast.com/the-athletic-fc-podcast/episodes/argentina-are-inevitable-ornstein-on-man-united-transfers) (2026-07-16頃)\n3. 直近4日以内で確認できた新規のThe Athletic発スクープ・長文特集は上記2件のみ（※水増しせず該当分のみ掲載）";

</script>
