<script>
const md = "## 🤖 今週のAI最新動向\n\n### 1. Moonshot AIが「Kimi K3」を公開 — 2.8兆パラメータ、史上最大のオープンモデル\n\n**何が起きたか**: 中国Moonshot AIが7月16日、総パラメータ2.8兆のMoEモデル「Kimi K3」を発表した。896エキスパート中16をアクティブ化する構成で、ハイブリッド線形アテンション「Kimi Delta Attention (KDA)」と新技術「Attention Residuals」を採用。ネイティブビジョン対応、コンテキスト長は100万トークン。\n\n**なぜ重要か**: オープンウェイトのモデルとしては史上最大級で、Bloombergは「米最上位のプロプライエタリモデルとの差をほぼ埋めた」と報じている。KDAにより100万トークン文脈でのデコードが最大6.3倍高速化されるとの主張で、超長文脈の推論コスト構造を変えうる。モデルウェイトは7月27日までにModified MITライセンスで公開予定、API価格は入力$3/出力$15（100万トークンあたり）。ローカル/セルフホスト推論勢にとっては、フロンティア級の重みが手元に落ちてくる意味は大きい——ただし2.8兆クラスを回すインフラは別の話だ。\n\n出典: [Bloomberg](https://www.bloomberg.com/news/articles/2026-07-17/china-s-powerful-new-moonshot-ai-model-closes-gap-with-us-rivals) (2026-07-17公開) / [VentureBeat](https://venturebeat.com/technology/chinas-moonshot-ai-releases-kimi-k3-the-largest-open-source-model-ever-rivaling-top-u-s-systems)\n\u003e source: https://www.bloomberg.com/news/articles/2026-07-17/china-s-powerful-new-moonshot-ai-model-closes-gap-with-us-rivals\n\n### 2. Apple Intelligenceが中国当局の承認を取得 — Alibaba Qwenが基盤に\n\n**何が起きたか**: 中国国家インターネット情報弁公室（CAC）が7月15日、Apple Intelligenceをスマートフォン向けオンデバイス生成AIサービスとして承認した。AlibabaはReutersに対し、自社のQwenモデルが中国ユーザー向けのiOS/iPadOS/macOS/visionOSのApple Intelligence機能（テキスト・画像生成）を支えることを認めた。Baiduも関与を確認している。\n\n**なぜ重要か**: 世界最大のスマホ市場で、Appleが自社モデルでなく中国製LLM（Qwen）を差し込む形での展開が確定した。「同じOS・同じUIの下で、地域によって中身のモデルが丸ごと入れ替わる」構成が最大規模で実運用に入る事例で、モデルの差し替え可能性（model-agnostic設計）とデータ主権規制の交差点として注目に値する。ローンチ日は未発表だが、秋のソフトウェアリリースサイクルに載る見込み。\n\n出典: [TechCrunch](https://techcrunch.com/2026/07/16/apple-intelligence-approved-for-launch-in-china-with-alibabas-qwen-ai/) (2026-07-16公開) / [MacRumors](https://www.macrumors.com/2026/07/15/apple-intelligence-cleared-to-launch-in-china/) (2026-07-15公開)\n\u003e source: https://techcrunch.com/2026/07/16/apple-intelligence-approved-for-launch-in-china-with-alibabas-qwen-ai/\n\n### 3. TSMC決算が示すAIインフラ投資の非減速 — Q2売上$40.2B・粗利率67.7%の過去最高\n\n**何が起きたか**: TSMCが7月16日に発表した2026年Q2決算は売上高402.0億ドル（前年同期比+36.0%）、粗利率67.7%（ガイダンス上限65.5〜67.5%を超過）、EPS前年比+77.4%と全指標で過去最高を更新した。AIアクセラレータを含むHPCセグメントは前四半期比+20%で、売上全体の66%を占める。\n\n**なぜ重要か**: 「2026年にAIインフラ投資はプラトーに入る」という観測を数字が真っ向から否定した。7nm以下の先端ノードが売上の約77%を占め、GPU/アクセラレータの供給制約は当面続くことを意味する。ローカルでモデルを回す側にとっても、ハイエンドGPUの価格と入手性はこの川上の数字に直結する——需給の緩みは当分期待できない。\n\n出典: [Investing.com（TSMC決算発表の報道）](https://www.investing.com/news/company-news/tsmc-q2-2026-slides-ai-demand-drives-record-margins-hpc-surges-20-93CH-4794789) (2026-07-16公開)\n\u003e source: TSMC 2026年Q2決算発表（2026-07-16）/ https://www.investing.com/news/company-news/tsmc-q2-2026-slides-ai-demand-drives-record-margins-hpc-surges-20-93CH-4794789\n\n## 📄 今週の注目論文\n\n### 1. エージェント・データ・インジェクション攻撃はAIエージェントへの現実的脅威である / Agent Data Injection Attacks are Realistic Threats to AI Agents\n\n**著者**: Woohyuk Choi 他 / arXiv:2607.05120 / 2026-07-06公開\n\n- **Problem**: AIエージェントは外部データを消費して行動するが、現行のエージェント実装は「信頼できるデータと信頼できないデータの分離」という基本的なセキュリティ原則を欠いている。\n- **Method**: 間接プロンプトインジェクションの新カテゴリとして「Agent Data Injection (ADI)」を定義。メタデータやツール呼び出しのフォーマット部分など、従来の防御が見ていない経路への注入を体系的に分析。\n- **Finding**: Claude in Chrome、Claude Code、Gemini CLIといった実プロダクトで脆弱性を発見。任意クリック誘導、リモートコード実行（RCE）、サプライチェーン攻撃までが実現可能と実証した。\n\n**読みどころ**: ラボ環境のベンチマークでなく、いま現場で使われているコーディングエージェント/ブラウザエージェントそのものでRCEまで到達した点が重い。エージェントに触るエンジニアは攻撃面の棚卸しとして必読。\n\narXiv: https://arxiv.org/abs/2607.05120\n\u003e source: https://arxiv.org/abs/2607.05120\n\n### 2. LLMエージェントにおけるプロンプトインジェクション防御「アウトオブバンド型」の適応的評価 / Adaptive Evaluation of Out-of-Band Defenses Against Prompt Injection in LLM Agents\n\n**著者**: Praneeth Narisetty 他 / arXiv:2606.26479 / 2026-06-25公開\n\n- **Problem**: プロンプトインジェクション防御の評価が静的ベンチマーク頼みで、防御の存在を知る攻撃者による「適応的攻撃」への耐性が未検証。\n- **Method**: 適応的評価プロトコルを規定し、AgentDojoベンチマーク上で権限制御型防御「Progent」をQwen2.5-7Bを使って独立検証。\n- **Finding**: Progentは攻撃成功率を25.8%から4.2%へ削減し、手作りの適応的攻撃に対しても2.6%に抑えた。ただし著者ら自身が小規模な検証と位置付け、より強力な攻撃での追試の必要性を明記。\n\n**読みどころ**: 「防御を知った攻撃者」を想定するのはセキュリティ評価の基本だが、LLM防御研究ではまだ徹底されていない。プロンプト層でなく権限層で守るアプローチが適応的攻撃にも粘った、という結果は防御設計の方向性として示唆的。\n\narXiv: https://arxiv.org/abs/2606.26479\n\u003e source: https://arxiv.org/abs/2606.26479\n\n### 3. RoPEを考慮したKVキャッシュ量子化のビット割当 / RoPE-Aware Bit Allocation for KV-Cache Quantization\n\n**著者**: Fengfeng Liang 他 / arXiv:2606.24033 / 2026-06-23公開\n\n- **Problem**: 既存の低ビットKVキャッシュ量子化はキーを平坦なベクトルとして扱うが、RoPE（回転位置埋め込み）の下ではキーは位置依存の2次元周波数ブロックとして振る舞い、一様量子化は情報を壊す。\n- **Method**: 「Block-GTQ」を提案。RoPEブロックごとのエネルギースコアを計算し、限界利得に基づいてビット幅を非一様に配分する。\n- **Finding**: Llama-3.1-8B-InstructのK2V2（キー2bit/値2bit）設定でNIAH平均70.6→97.4、LongBench-EN平均36.87→53.31へ大幅改善。K3V3ではH800単機でfp16比1.34倍の高速化。\n\n**読みどころ**: 2bitキャッシュで针入れ探し（NIAH）が97点まで戻るのは実用ライン。長文脈をVRAM制約下で回すローカルLLM運用に直結する話で、llama.cpp/vLLM系への実装が待たれる。\n\narXiv: https://arxiv.org/abs/2606.24033\n\u003e source: https://arxiv.org/abs/2606.24033\n\n### 4. 何を残し、何を忘れるか — LLMとエージェントにおけるメモリ圧縮のレート歪み理論的視点 / What to Keep, What to Forget: A Rate-Distortion View of Memory Compaction in LLMs and Agents\n\n**著者**: Ashwin Gerard Colaco 他 / arXiv:2607.08032 / 2026-07-09公開\n\n- **Problem**: KVキャッシュ圧縮、プロンプト圧縮、モデル状態、エージェントの長期メモリ——各層の「圧縮」が別々の研究コミュニティで独立に進み、本質的に同一の問題として統一的に扱われていない。\n- **Method**: 全層を貫く単一の最適化目的として「レート歪み決定（rate-distortion decision）」を定義し、層非依存の理論的下限と7軸の分類法を構築するサーベイ+理論研究。\n- **Finding**: どの層でも「アテンションの大きさ、または新しさ（recency）」が保持情報を決める支配的信号であることを整理。エージェントの反復圧縮（圧縮の圧縮）の測定が研究上の空白であり、統一ベンチマークが必要と指摘。\n\n**読みどころ**: エージェントのメモリ管理を情報理論の言葉で一枚にまとめた見取り図。コンテキスト圧縮やセッション要約を自前で設計している人には、場当たり的なヒューリスティクスを理論に接地させる足場になる。\n\narXiv: https://arxiv.org/abs/2607.08032\n\u003e source: https://arxiv.org/abs/2607.08032\n\n## 💡 今週のひとことインサイト\n\n### 1. エージェントセキュリティは1970年代Unixの再演\n\n今週のADI論文（arXiv:2607.05120）が突きつけた事実は単純で、Claude CodeやGemini CLIのような最先端エージェントが「信頼できる入力と信頼できない入力を区別しない」まま動いている、という点に尽きる。これはセキュリティ史の既視感そのものだ。SQLインジェクションもフォーマット文字列攻撃も、根っこは「データとコードの混同」であり、業界はプリペアドステートメントや権限分離という「構造で守る」解に数十年かけて辿り着いた。面白いのは、防御側でも同じ歴史が反復し始めていることで、適応的攻撃の検証論文（arXiv:2606.26479)で粘りを見せたProgentは、プロンプトの言葉遣いでなくツール実行の権限層で守る——つまり最小権限原則の再発明だった。LLMという新しい皮を被っていても、効く薬は結局OSセキュリティの古典と同じ棚にある。Linuxの流儀でエージェントを疑える人間には、いま追い風が吹いている。\n\n\u003e source: https://arxiv.org/abs/2607.05120 / https://arxiv.org/abs/2606.26479";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
