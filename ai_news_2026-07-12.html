<script>
const md = "## 🤖 今週のAI最新動向\n\n### 1. OpenAI、GPT-5.6ファミリー（Sol / Terra / Luna）を一般公開 —— 政府審査ゲートを経ての着地\n\n6月26日から米政府審査下の限定プレビューだったGPT-5.6が、7月9日に一般公開された。上からSol・Terra・Lunaの3段構成で、コンテキスト長は100万トークン。価格はSolが入力$5/出力$30（per 1M tokens）、Terraが$2.50/$15、Lunaが$1/$6で、フラッグシップ据え置きのまま下位ティアで刻む戦略だ。\n\n技術的な見どころは2つ。まずTerminal-Bench 2.1でSol単体88.8%（Claude Mythos 5の88.0%を僅差で上回る）、サブエージェント併用の「ultraモード」では91.9%——ただし後者はモデル単体でなくエージェント編成込みのスコアなので比較時は注意。次に、公開が遅れた理由がサイバー攻撃能力の政府審査だったこと。フロンティアモデルのリリース工程に「攻性能力の審査」が公式に組み込まれた初の大型事例で、モデルリリースが輸出管理に似た構造を持ち始めた。プログラマティックなツール呼び出し、マルチエージェントオーケストレーション、プロンプトキャッシュのブレークポイント指定などエージェント向けAPI機能も同時に入っている。\n\n出典: [OpenAI](https://openai.com/index/previewing-gpt-5-6-sol/) (2026-06-26プレビュー発表・2026-07-09一般公開) / [TechCrunch](https://techcrunch.com/2026/07/09/openai-launches-its-new-family-of-models-with-gpt-5-6/) (2026-07-09公開)\n\u003e source: https://openai.com/index/previewing-gpt-5-6-sol/\n\n### 2. xAI（SpaceXAI）、コーディング・エージェント特化の「Grok 4.5」をリリース\n\nSpaceXと合併したxAIが7月8日、同社初のコーディング／エージェント作業特化モデルGrok 4.5を公開した。価格は入力$2/出力$6（per 1M tokens）で、Claude Opus 4.8やGPT-5.5比で6割以上安いと同社は主張。発表値はTerminal-Bench 2.1で83.3%、SWE-Bench Proで64.7%、独立系のArtificial Analysis Intelligence Indexではスコア54で4位に入った。\n\n絶対性能ではGPT-5.6 SolやClaude系に届かないが、「GPT-5.5級のコーディング性能をタスクあたり約半額で」というコスト効率の殴り込みで、エージェントを大量に回す用途では実質的な選択肢になる。Grok Build・Cursor全プラン・SpaceXAIコンソールで即日利用可。なおEU圏は規制対応のため7月中旬まで提供見送りで、地域規制がモデル展開速度を左右する構図がここでも出ている。\n\n出典: [SpaceXAI](https://x.ai/news/grok-4-5) (2026-07-08公開) / [Axios](https://www.axios.com/2026/07/08/spacexai-grok-new-model) (2026-07-08公開)\n\u003e source: https://x.ai/news/grok-4-5\n\n### 3. OpenAI「GPT-Live」——全二重アーキテクチャの音声モデルでChatGPT Voiceを刷新\n\n7月8日、OpenAIは新音声モデル系列GPT-Live（GPT-Live-1 / GPT-Live-1 mini）のグローバル展開を開始した。最大の特徴は全二重（full-duplex）アーキテクチャで、聞くと話すを同時に処理する。相槌を打ち、ユーザーの発話に割り込まれても文脈を保ち、考え込む沈黙には黙って待つ。\n\n面白いのは処理の階層化だ。会話自体は軽量な音声モデルが受け持ち、Web検索や深い推論が要る質問はバックグラウンドでフロンティアモデル（GPT-5.5系）に委譲して、結果だけ会話に戻す。「会話のレイテンシ」と「推論の深さ」を別モデルに分担させる設計は、ローカルLLM＋クラウド委譲のハイブリッド構成にもそのまま応用できる考え方だ。有料ユーザーはGPT-Live-1、無料ユーザーはminiが既定。API提供は近日予定。\n\n出典: [OpenAI](https://openai.com/index/introducing-gpt-live/) (2026-07-08公開)\n\u003e source: https://openai.com/index/introducing-gpt-live/\n\n### 4. Anthropic、バーナンキ元FRB議長をLong-Term Benefit Trustに任命\n\n7月9日、Anthropicは元FRB議長ベン・バーナンキ氏を同社のLong-Term Benefit Trust（長期便益信託）に迎えたと発表した。LTBTはAnthropicの取締役の一部を選任する権限を持つ独自ガバナンス機構で、株主利益から独立して「人類の長期便益」を代表する建て付けになっている。\n\nIPOを控えた（同社は2026年に上場申請済み）タイミングでマクロ経済政策の重鎮を安全弁側に置く人事は、上場後も安全性ガバナンスを維持するという対外シグナルとして読める。AI企業の企業統治設計そのものが競争・規制上の論点になっている流れの一コマだ。同日には利用者が自分のClaude利用パターンを振り返る機能の提供も発表されている。\n\n出典: [Anthropic](https://www.anthropic.com/news) (2026-07-09公開)\n\u003e source: https://www.anthropic.com/news\n\n## 📄 今週の注目論文\n\n### 1. TokenPilot: LLMエージェントのためのキャッシュ効率的なコンテキスト管理（TokenPilot: Cache-Efficient Context Management for LLM Agents）\n\n- 著者: Buqiang Xu（浙江大学）ほか / arXiv:2606.17016 / v1: 2026-06-15\n- **Problem**: 長時間セッションのLLMエージェントはコンテキスト肥大でコストが膨らむ。既存の対策（テキスト刈り込み・動的メモリ退避）はトークン数を減らす代わりにプロンプト先頭部を書き換えてしまい、プロンプトキャッシュを無効化する——「テキスト削減とキャッシュ連続性のトレードオフ」が放置されていた。\n- **Method**: 二重粒度のフレームワーク。グローバルにはIngestion-Aware Compaction（取り込み段階でプレフィックスを安定化しノイズ除去）、ローカルにはLifecycle-Aware Eviction(セグメントの残存効用を監視し、タスク要件が切れた時だけバッチ退避)。\n- **Finding**: PinchBench・Claw-Evalで、タスク性能を維持したままコストを孤立モードで61%/56%、連続モードで61%/87%削減。\n- **読みどころ**: プロンプトキャッシュはAPI課金でもローカル推論（llama.cppのprefix cache、vLLMのAutomatic Prefix Caching）でも効きが大きいのに、コンテキスト圧縮研究は長らくキャッシュを無視してきた。「削るほど安くなるとは限らない」を定量化した点で、エージェント運用コストを持つ全員に実利がある。\n\narXiv: https://arxiv.org/abs/2606.17016\n\u003e source: https://arxiv.org/abs/2606.17016\n\n### 2. LLMエージェントにおけるプロンプトインジェクション帯域外防御の適応的評価（Adaptive Evaluation of Out-of-Band Defenses Against Prompt Injection in LLM Agents）\n\n- 著者: Praneeth Narisetty（LaunchSafe Research）ほか / arXiv:2606.26479 / v1: 2026-06-25\n- **Problem**: モデル外部に置く防御（CaMeL、FIDES、Progent、RTBAS、FORGE等）は静的ベンチマークでしか検証されていない。かつてモデル内防御は適応攻撃に90%超の成功率で突破された歴史があり、同じ轍を踏む懸念がある。\n- **Method**: 既存の帯域外防御5系統を古典的セキュリティフレームワーク（参照モニタ等）の観点で分類し、AgentDojo上でProgent＋Qwen2.5-7Bに対し手作りの適応攻撃を実施。\n- **Finding**: Progentは平均攻撃成功率を25.8%→4.2%に約6分の1へ低減し、適応攻撃でも2.6%と突破されなかった。ただし著者ら自身が「ホワイトボックス最適化攻撃は未検証」と限界を明記している。\n- **読みどころ**: 「静的ベンチで防げた」は「防御できる」を意味しない——ペネトレーションテストの常識をLLMエージェント防御に持ち込んだ論文。権限制御を外側で握る帯域外防御が今のところ適応攻撃に耐えている、という中間報告としても価値がある。エージェントに実権限を渡す設計をしている人は前提知識として押さえたい。\n\narXiv: https://arxiv.org/abs/2606.26479\n\u003e source: https://arxiv.org/abs/2606.26479\n\n### 3. ポジション論文: コーディングベンチマークはエージェント型ソフトウェア工学と噛み合っていない（Position: Coding Benchmarks Are Misaligned with Agentic Software Engineering）\n\n- 著者: Maria I. Gorinova（Tessl, London）ほか / arXiv:2606.17799 / v1: 2026-06-16\n- **Problem**: 現行のコーディング評価（SWE-bench系等）はエージェント以前に設計されており、モデル・ハーネス・実行環境を単一のEnd-to-Endスコアに潰してしまう。どの層が性能を駆動したのか分離できない。\n- **Method**: ポジション論文。現行ベンチの構造的欠陥を「構成要素の混同」「単一正解解へのバイアス（等価な別解を減点）」「コンポーネント単位の診断情報の欠如」の3点に整理。\n- **Finding**: コーディングエージェントは統合システムであり、ハーネス層の改善だけでモデル世代交代に匹敵する性能差が出うる。よってスコアの比較・改善の反復にはコンポーネント分離型の評価が必要と主張。\n- **読みどころ**: 今週のGPT-5.6発表がまさに好例で、Terminal-Bench 2.1の「88.8%（単体）」と「91.9%（サブエージェント編成込み）」が同じ見出しで流通した。リーダーボードの数字で採用モデルを決める前に、その数字が「何のスコアか」を疑う視点をくれる。\n\narXiv: https://arxiv.org/abs/2606.17799\n\u003e source: https://arxiv.org/abs/2606.17799\n\n## 💡 今週のひとことインサイト\n\n### 1. ベンチの数字は「モデル」ではなく「構成」の点数になった\n\nGPT-5.6のTerminal-Bench 2.1は単体88.8%、サブエージェント併用の「ultraモード」で91.9%——見出しに躍るのは後者だ。この3.1ポイントはモデルの進歩ではなく編成（ハーネス）の差であり、Gorinovaらが指摘した「モデル・ハーネス・環境を1つのスコアに潰す」問題が、そのまま商業宣伝の最前線に現れた形になる。セキュリティ屋には既視感のある話で、脆弱性の深刻度がカーネル単体でなくシステム構成で決まるのと同型だ。防御側も同じで、Narisettyらが示したとおりプロンプトインジェクション耐性は静的ベンチでなく適応攻撃下でしか測れない。性能も安全性も、問うべきは「モデルは何点か」ではなく「その構成は何点か」に移った。ベンチマークを読む側にも、攻撃者と同じ解像度——どの層が数字を作っているかを分解して見る目——が要求される週だった。\n\n\u003e source: https://arxiv.org/abs/2606.17799";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
