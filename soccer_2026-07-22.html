<script>
const md = "# サッカー移籍情報 — 2026年7月22日号\n\n\u003e ⚠️ **補填注記**: 「最終チャット出力=記事本文」方式は07-20号から3号連続で有効。前号（07-21）の保存状態は本号生成時に実測確認済み（15KB・1行目`#`・記事本文で正常保存）。本号も同方式＋2点保存（アーカイブ直接書き込み併用）で生成する。W杯2026は大会終了につき、W杯欄は前号（07-21）で最終回——本号から通常期構成に戻る。\n\n---\n\n## 今日のハイライト\n\n1. **[[アプソン]]（トッテナム → アーセナル・フリー）が7/21に正式発表**——アーセナル公式サイトが加入を発表、背番号57。18歳CBはスパーズのプロ契約提示を拒否しての北ロンドン越境移籍。「Here We Go!」欄から完了欄へ昇格\n2. **[[ガルナチョ]]に[[アストン・ヴィラ]]が正式オファー**——Romano確認の「買取条項付きローン」提案＋Sky Sportsもクラブ間交渉入りを確認。[[チェルシー]]は完全移籍要素を要求（売却額の目線は€50M/£42.7M）。ローマも探ったがヴィラが最有力\n3. **バルセロナが[[ビシウ]]（クラブ・ブルッヘ・18歳WG）獲得で合意**——Romano報。€8.5M＋20%セルオン。まずはバルサ・アトレティック配属想定\n4. **[[ロジャーズ]]・[[ツォリス]]の公式発表は未着**——7/21 16:51（英時間）時点のSky移籍センター完了リストにいずれも未掲載。メディカル・サイン手続き済みで秒読み継続\n5. **クロップの[[ドイツ代表]]監督就任は金曜（7/24）正式発表へ**——フランクフルトで契約サイン＋就任会見の段取りと複数報道\n\n---\n\n## 1. 完了した移籍（発表日が7/15〜7/22のもの）\n\n| # | 選手 | 移籍元 → 移籍先 | 移籍金 | 契約 | 発表日 |\n|---|------|----------------|--------|------|--------|\n| 1 | [[アプソン]] | トッテナム → [[アーセナル]] | フリー | 非公表 | 7/21 |\n| 2 | [[ジョアン・ゴメス]] | ウォルバーハンプトン → アストン・ヴィラ | £38M（€40M） | 非公表 | 7/20 |\n| 3 | [[アセコ]] | バイエルン → フランクフルト | €12M（報道により〜€13M） | 2031年まで | 7/18 |\n| 4 | [[マンザンビ]] | フライブルク → アストン・ヴィラ | £59.5M（€70M・アドオン込） | 5年 | 7/17 |\n| 5 | [[ムハレモビッチ]] | サッスオーロ → リーズ | €40M（£34.1M） | 5年（2031年まで） | 7/17 |\n| 6 | [[エステーブ]] | バーンリー → RBライプツィヒ | €25M+ボーナス | 2031年まで | 7/17 |\n| 7 | [[オーバメヤン]] | マルセイユ → デポルティボ | €1.5M | 2028年まで | 7/17 |\n| 8 | [[トロサール]] | アーセナル → ベシクタシュ | €18M（£17M） | 3年+1年OP | 7/15 |\n| 9 | [[ムニエ]] | リール → サンダーランド | フリー | — | 7/15 |\n\n**各件の補足:**\n\n- **#1が本日の新規昇格**。[[アプソン]]はアーセナル公式サイトの発表を複数媒体が確認（背番号57付与）。元アーセナルDFマシュー・アプソンの息子で、チェルシー・シティ・バイエルン・ドルトムント等のオファーを蹴っての加入。まずはU21配属＋トップチーム帯同の見込み\n- #2〜9は前号からの再掲（いずれもクラブ公式ないしS/A級で確認済み）。**前号掲載の7/14発表3件（[[グリーンウッド]]→フェネルバフチェ・[[ティーレマンス]]→ユナイテッド・[[ダーロウ]]→ユナイテッド）は7日ガードにより本号から除外**——案件自体は完了済みで有効\n- ※日付ガードによる除外（参考）: **[[ヴシュコビッチ]]（トッテナム → ブライトン・£50M=固定£46M+アドオン£4M・クラブレコード・スパーズが20%セルオン＋マッチライト保持）はSky確認済みの完了案件だが発表が7/14のためガード外**。過去号で未掲載だったため参考として記載する。トナーリ→トッテナム£100M・M.フェルナンデス→トッテナム£85M・A.ゴードン→バルセロナ£69.3M等も7月上旬以前の発表でガード外\n- 7/21のその他の完了（欧州5大リーグ関連の小型案件）: シナヨコ（オセール→パリFC・€8M）等が流通しているが、S/A級2件の裏取りが揃わないため表への採用は見送り\n\n---\n\n## 2. Here We Go!（合意ほぼ確実）\n\n1. **クロップ → [[ドイツ代表]]監督**（3日目・金曜7/24正式発表へ）\n   - **フランクフルトで金曜に契約サイン＋就任会見**の段取りを複数媒体が報道（beIN・FOX等）。契約は2030年W杯までの4年、ユーロ2028も指揮\n   - 残る手続きだったレッドブル・グループとの契約解消協議が決着に向かい、DFBは発表日を設定した模様。ナーゲルスマン（パラグアイ戦ベスト32敗退で辞任）の後任\n2. **[[ロジャーズ]] → [[チェルシー]]**（5日目・公式発表待ち）\n   - 7/20メディカル実施済み（既報）。**7/21 16:51（英時間）時点のSky移籍センター完了リストには未掲載＝発表待ち継続**。£117M・6年契約+1年OPの内容に変化なし\n   - 完了すればアンダーソン（→マンチェスター・シティ£116M）を抜くイングランド人史上最高額＋チェルシーのクラブレコード（エンソ・フェルナンデス£107M超え）\n3. **[[ツォリス]] → アーセナル**（2日目・公式発表待ち）\n   - クラブ間合意£34M・メディカルと契約サイン予約済み・ブルッヘ監督の放出公認（いずれも既報）から進展待ち。今夏3人目の獲得として発表が待たれる状況をアーセナル系媒体が報道\n   - Sky完了リストにも未掲載。[[トロサール]]後継の24歳ギリシャ代表WG\n4. **[[ビシウ]] → バルセロナ**（新規）\n   - **Romano報: クラブ・ブルッヘと€8.5M＋20%セルオンで合意成立**。当初€10Mのオファーが拒否された後、セルオン込みで妥結。Transfermarktも特集記事で確認\n   - 18歳ベルギーの逸材WG。まずはバルサ・アトレティック（Bチーム）配属、2026-27中のトップ昇格機会あり。公式発表待ちのため本欄掲載\n5. **[[シュラーガー]] → ノッティンガム・フォレスト**（8日目・留め置き継続）\n   - ジャンクサイトの「発表済み」流通は続くが、**フォレスト公式・S/A級での発表確認は本日も取れず**（ESPNは「set to sign」を維持）。フリー・2028年6月まで+1年OP・メディカル完了の合意内容に変化なし\n6. **[[バルデペニャス]] → フィオレンティーナ**（継続・書類交換段階）\n   - Romano here we go（7/14）: €8M・2031年6月まで・[[レアル・マドリー]]が50%セルオン＋マッチライト保持。**クラブ間で書類交換に入ったとの報道**（Sky Sport Italia経由）。公式発表は近日中の見込み\n\n---\n\n## 3. 交渉中（信頼度: ◎=ほぼ確実 ○=有力 △=一部報道 ✖=破談）\n\n1. **[[ガルナチョ]] → アストン・ヴィラ ○**（新規）\n   - **Romano「ヴィラがチェルシーに正式オファー送付」（買取条項付きローン）＋Sky Sports「クラブ間交渉開始」の二重確認**。エメリ監督が獲得を承認\n   - チェルシーは完全移籍要素の付帯を要求、€50M（£42.7M）なら売却可の構え。ユナイテッドから£40Mで加入して1年足らずでの放出方向。本人はヴィラ行きに前向きで、プレシーズン練習には不参加。ローマも探ったがヴィラが最有力\n2. **[[バルコラ]] → リバプール ○**\n   - Romano「バルコラはもうアンタッチャブルではない・今夏退団は現実的な可能性」に前進。リバプールのショートリスト最上位は不変、PSG査定は€135M（£116M）超\n   - アーセナルも関心を持つが、同クラブの優先1位だった[[ロジャーズ]]がチェルシー行きとなり補強構図は再編中。金額の溝（リバプール準備£85M級 vs PSG査定）は引き続き注意\n3. **[[アルバレス]]（アトレティコ・マドリー）動向 ○**\n   - 本人はW杯後の退団希望を表明済み。**バルセロナの€150Mオファーをアトレティコが拒否**（CEOヒル・マリン「売らないし売る気もない」）。ESPNは本人の希望先をバルサと報道\n   - Romanoは「レアル・マドリーの€150Mビッドはブラフで、本命は一貫して[[オリセ]]（バイエルン）」と指摘。バイエルンはオリセ非売＋大型再契約提示の構え。アーセナルの関心も英紙面で流通（△段階）\n4. **[[ギマランイス]] → アーセナル ○**\n   - 新規のS/A級進展なし。£80M準備 vs ニューカッスル要求£100Mの構図は前号のまま\n5. **[[ディオマンデ]]（RBライプツィヒ）→ リバプール ✖寄り△**\n   - **リバプールの大型オファー（$115M級）は拒否され、本人はPSGを選択との報道**。ライプツィヒは€120M査定＋「売るなら2026-27フル1年のローンバック条件のみ」の強硬姿勢で、今夏の放出自体に否定的\n   - デミチェリス監督「契約があるから戻ってくる。ただサッカーでは一晩で色々起こる」。リバプールの前線補強はバルコラ軸に\n\n---\n\n## 4. 日本人選手の動向\n\n- **[[佐野海舟]]（マインツ）**: リバプールが€60M（約111億円）準備の報道が継続。**新展開として、リバプール以外に3クラブ（アーセナル・トッテナム・ドルトムント）が代理人接触との報道**（Football Tribe 7/20）。マインツは£51M（約111億円）の評価額を譲らない構えで、これが「最大の障害」とされる。**核は引き続き英B級ソースの転載でS/A級直接確認は本日も取れず**、信頼度○〜△を維持\n- **[[久保建英]]（レアル・ソシエダ）**: スペイン紙AS「今夏、クラブに大きなオファーは届いていない」で**5シーズン目残留濃厚を維持**（契約2029年まで・解除金€60M・マドリーが権利50%保持）。レアル・マドリーが動向を注視との報道（サカノワ）、GOALは「巨額の移籍金を考えると将来は不透明」とするが具体的オファーの報道はなし\n- **[[中村草太]]（サンフレッチェ広島 → ル・アーヴル）**: 7/17クラブ公式発表の期限付き移籍（2027年6月30日まで・既報）。新規続報なし\n\n---\n\n## 主要ソース\n\n- [Goal: Arsenal agree deal to sign Tottenham sensation Elijah Upson](https://www.goal.com/en/lists/arsenal-transfer-elijah-upson-from-tottenham/blt9f12084a9fae9641)\n- [Sky Sports: Transfer Centre — Summer window 2026 ins and outs（7/21 16:51更新）](https://www.skysports.com/football/news/11095/13546618/transfer-news-summer-transfer-window-2026-premier-league-deals-ins-and-outs)\n- [Sky Sports: Alejandro Garnacho — Aston Villa begin talks to sign forward from Chelsea](https://www.skysports.com/football/news/11661/13565713/alejandro-garnacho-transfer-news-aston-villa-begin-talks-to-sign-forward-from-chelsea)\n- [Vanguard: Barcelona agree €8.5m deal to sign Club Brugge winger Jesse Bisiwu](https://www.vanguardngr.com/2026/07/barcelona-agree-e8-5m-deal-to-sign-club-brugge-winger-jesse-bisiwu/)\n- [Transfermarkt: Who is Jesse Bisiwu? Club Brugge 18-year-old on verge of Barcelona move](https://www.transfermarkt.us/who-is-jesse-bisiwu-club-brugge-18-year-old-wonderkid-on-verge-of-barcelona-move/view/news/483314)\n- [beIN SPORTS: Klopp agrees in principle to become Germany\u0027s new head coach](https://www.beinsports.com/en-us/soccer/fifa-world-cup-2026/articles/j%C3%BCrgen-klopp-agrees-in-principle-to-become-germany-s-new-head-coach-2026-07-19)\n- [FOX Sports: Klopp agrees principles of contract for Germany job](https://www.foxsports.com/stories/soccer/jurgen-klopp-agrees-principles-contract-become-next-germany-head-coach)\n- [Sky Sports: Chelsea agree record £117m deal for Morgan Rogers](https://www.skysports.com/football/news/11668/13564758/morgan-rogers-transfer-news-chelsea-agree-record-lb117m-deal-for-aston-villa-forward-and-arsenals-no-1-target)\n- [Sky Sports: Arsenal agree fee with Club Brugge to sign Christos Tzolis](https://www.skysports.com/football/news/11095/13564048/christos-tzolis-arsenal-agree-fee-with-club-brugge-to-sign-greek-winger-as-replacement-for-leandro-trossard)\n- [This Is Anfield: Romano — Barcola top of Liverpool transfer list](https://www.thisisanfield.com/2026/07/bradley-barcola-evasive-liverpool-transfer-target-psg-2026/)\n- [Sky Sports: Liverpool approach RB Leipzig over Yan Diomande](https://www.skysports.com/football/news/11095/13550816/liverpool-transfer-news-reds-approach-rb-leipzig-over-19-year-old-yan-diomande-with-psg-also-interested)\n- [Sky Sports: Paper Talk — Arsenal switch focus to Julian Alvarez with Barcola unavailable](https://www.skysports.com/football/transfer-paper-talk/12709/13562834/julian-alvarez-arsenal-switch-focus-to-atletico-madrid-striker-with-psg-forward-bradley-barcola-unavailable-paper-talk)\n- [ESPN: Forest set to sign Schlager](https://www.espn.com/soccer/story/_/id/49367986/nottingham-forest-xaver-schlager-rb-leipzig-free-agent-signing-sources)\n- [OneFootball: Fiorentina \u0027reach verbal agreement\u0027 with Real Madrid for Víctor Valdepeñas](https://onefootball.com/en/news/fiorentina-reach-verbal-agreement-with-real-madrid-for-victor-valdepenas-43139339)\n- [Sky Sports: Luka Vuskovic — Brighton complete £50m deal to sign Tottenham defender（※7/14発表・7日ガード外・参考）](https://www.skysports.com/football/news/11095/13563294/luka-vuskovic-brighton-complete-lb50m-deal-to-sign-tottenham-defender)\n- [東スポWEB: 佐野海舟 リバプールが獲得に本気？ 移籍金111億円を準備](https://www.tokyo-sports.co.jp/articles/-/396016)\n- [Football Tribe Japan: 佐野海舟の去就で動き！リバプール以外の3クラブも「代理人に接触」（7/20）](https://football-tribe.com/japan/2026/07/20/357083/)\n- [サカノワ: レアル・マドリードが久保建英の「最新情報を注視」](https://sakanowa.jp/topics/99295)\n- [FootballTransfers: Done Deals 21 July 2026](https://www.footballtransfers.com/en/transfer-news/uk-premier-league/2026/07/transfer-news-every-done-deal-official-confirmed-completed-signing-europe-today-21-july-2026)\n\n---\n\n*生成: 2026-07-22 03:30 JST / WC_MODE: false・通常期構成（W杯欄は07-21号で終了）/ 保存障害対策「最終チャット出力=記事本文」方式を継続（4号目）＋アーカイブ直接書き込みの2点保存 / ロジャーズ・ツォリスの公式発表とクロップの金曜発表（7/24）は明日号以降で完了欄へ昇格見込み*";
