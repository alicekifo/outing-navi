<script>
const md = "# 教養マガジン 2026/6/24\n\n### W杯2026、「48チーム制」という実験が始まった\n\n今まさに北米の各地で行われているFIFA ワールドカップ2026は、歴史的な転換点となる大会だ。参加枠が従来の32から48へ、一気に1.5倍に拡大された。増えた16枠のほとんどはアジア・アフリカ・北中米カリブ海地域に配分され、「欧州と南米の祭典」だったW杯の勢力図が塗り替わりつつある。\n\nフォーマットも大きく変わった。「4チーム×8グループ」から「3チーム×16グループ」へ。各グループ上位2チームに加え、3位の成績上位8チームも決勝トーナメントに進める仕組みだ。これはかつてのグループリーグで起きた「出来レース的引き分け」問題を意識した設計でもある。\n\n批判の声もある。試合数の増加による選手の疲労、格下国との大差ゲームが増えるという懸念だ。しかしFIFAの目的は明確で、市場開拓と放映権収入の最大化にある。競技の純粋性と商業的拡張の間の緊張感は、この大会を通じて一層際立つだろう。\n\n\u003e source: [FIFA公式 - FIFA World Cup 2026](https://www.fifa.com/fifaplus/en/tournaments/mens/worldcup/canadamexicousa2026)\n\n---\n\n### テトリスはなぜ冷戦を超えたのか\n\n1984年、ソ連の研究機関に勤めるアレクセイ・パジトノフが、業務の合間に一人で作ったパズルゲームがテトリスの原点だ。当時のソ連にはソフトウェア著作権の概念がほぼなく、ゲームは国家のコンピュータネットワークを無断で渡り歩き、西側の目に触れる前からコピーが横行していた。\n\nこのゲームが持つ中毒性の正体を、研究者は「ザイガルニク効果」で説明することがある。未完成の課題は完了したものより記憶に残りやすいという心理現象だ。積み上がるブロックは常に「もう少しで消せる」という未完の緊張を生み続け、プレイヤーを手放せなくする。\n\n版権争奪戦も壮絶だった。アタリ、英国のマクスウェル財閥、そして任天堂が競い合い、最終的にゲームボーイ版を手にした任天堂が世界に届けた。言語も文化も異なる人々が同じゲームに夢中になれたのは、ブロックを「落とす」という動詞だけで完結する設計ゆえだ。\n\n\u003e source: The Tetris Company（tetris.com）\n\n---\n\n### 「梅雨」と書いてなぜ「つゆ」と読むのか\n\n6月下旬、列島は梅雨の盛りにある。「梅雨」という漢字は中国語の「黴雨（かびが生える季節の雨）」に由来するという説と、「梅の実が熟す頃の雨」説が混在し、日本に伝わる過程で両者が混ざり合った。中国語音「méiyǔ（バイユー）」が音読みで「ばいう」となる一方、「つゆ」という読みは純粋な和語だ。\n\n「つゆ」の語源もまた諸説あって面白い。草木に降りる「露（つゆ）」から転じたという説、「費やす（つゆす）」から「物が腐り消耗する時期」を指したという説などがある。確定した語源がないこと自体が、言葉の生き物らしさを示している。\n\n興味深いのは、梅雨は日本列島だけの現象ではないことだ。梅雨前線は中国の長江流域から朝鮮半島を経て日本列島まで連なる巨大な大気構造物であり、東アジア全体が共有する季節現象だ。地図上に引いた一本の線が、文明圏をまたいでいる。\n\n\u003e source: [気象庁「梅雨入りと梅雨明け」](https://www.jma.go.jp/jma/kishou/know/tenko/rainy_season.html)\n\n---\n\n### 夏至を過ぎたのに、なぜ夏はこれからなのか\n\n3日前の6月21日、夏至だった。昼が最も長く、太陽が最も高く昇る日だ。ならば最も暑い日もその頃のはず――しかし日本では最高気温のピークは7月末から8月上旬にずれ込む。この「季節の遅れ」は熱力学の言葉で「熱の位相遅れ（thermal phase lag）」と呼ばれる。\n\n海や地面は熱を蓄えるのに時間がかかる。夏至後も太陽からのエネルギー供給は多く、地表・海面は毎日熱を受け取り続ける。蓄積量が放出量を上回り続ける限り、気温は上昇し続けるのだ。逆に冬至（12月末）を過ぎても最も寒いのが1月末になるのも同じ理由による。\n\nこの現象は惑星スケールでも見られる。大気が薄く海を持たない火星では位相遅れが小さく、巨大ガス惑星の木星では桁違いに大きい。地球の夏が「夏至の後」に来るという当たり前の事実は、実はこの星が大量の液体の水を持つことの、静かな証明でもある。\n\n\u003e source: 国立天文台（nao.ac.jp）\n\n---\n\n### ホタルの光は「愛のモールス信号」だった\n\n6月下旬から7月初め、水辺の暗がりにホタルが灯り始める。あの光は単なる美しさではなく、オスがメスに送る求愛の信号だ。種によって点滅リズムが厳密に異なり、ゲンジボタルは約4秒周期、ヘイケボタルは約1秒周期で光る。メスは気に入ったオスのリズムに同じパターンで応答し、交信が成立する。\n\n発光の仕組みはルシフェリン（発光基質）とルシフェラーゼ（酵素）の化学反応によるもので、ATPをエネルギー源とし、変換効率はほぼ95〜100%に達する。白熱電球の変換効率が約5%であることを考えると、ホタルは驚異的に無駄のない発光体だ。この反応は現在、がん研究や遺伝子発現の「生きた指標」として医学の現場でも使われている。\n\n少し意外な事実として、北米大陸の西海岸にはホタルがほとんど生息しない。太古の地質変動による集団の分断で祖先種が絶滅したためと考えられている。光るはずの夜が光らない場所が存在する――それもまた、生命の偶然の地図だ。\n\n\u003e source: 国立環境研究所 生物多様性領域";
document.getElementById('content').innerHTML = marked.parse(md);
</script>
