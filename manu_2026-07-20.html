<script>
const md = "# [[マンチェスター・ユナイテッド]]情報週報（2026-07-20）\n\n\u003e **今週のTLDR**: リサンドロ・マルティネス（Lisandro Martínez）が**W杯決勝スペイン戦に出場へ**（JST今朝4:00開始・当号生成時点で結果未確定）——優勝なら「ユナイテッド所属のまま2度W杯制覇」の史上初。懸念されたバナー問題の出場停止はFIFAが「裁定は大会後」として回避。移籍はコネ（Manu Koné）への正式入札が秒読み（ローマ要求£51m・チェルシー競合・本人は移籍に全面的に前向き）、第3のMF候補にベルゲ（Sander Berge）が浮上。マイヌー（Kobbie Mainoo）は背中負傷でW杯出場0分のまま閉幕。次戦はローゼンボリ戦（7/24・JST 7/25 1:00）。\n\n---\n\n## ⚽ 直近の試合結果\n\n### 親善試合: マンチェスター・ユナイテッド 0-1 レクサム（現地7/18・JST 7/19 0:00・ヘルシンキ・オリンピックスタジアム＝中立、観衆20,069人）\n\n- **得点**: 39分 スミス（Sam Smith／レクサム・2014年にユナイテッドアカデミーを退団した古巣対決弾）——オブライエン（Lewis O\u0027Brien）の低いクロスがマグワイア（Harry Maguire）の股を抜け、ファーで無マークのスミスが押し込む\n- **布陣**: ユナイテッド前半は4-2-3-1（ダブルボランチ＝サントス（Andrey Santos）＋J・フレッチャー（Jack Fletcher））。ハーフタイムに22人中21人を交代し、後半は全員アカデミー出身の布陣\n- **xG**: 親善試合のためFotMob／Understat未掲載（前号から変わらず未公表）\n- **終盤の騒動**: 後半終了間際にゴア（Dan Gore）がエリア内で倒されるもPK認められず、主審は退場時に大ブーイングを浴びた\n- **個人評価**: 前号既報のThe Peoples Person採点（前半ベスト＝マウント（Mason Mount）8.5・ワースト＝ジルクゼー（Joshua Zirkzee）2、後半はヴィテク（Radek Vitek）8とレイシー（Shea Lacey）8）に加え、カリック（Michael Carrick）は本職センターバックながら別役割で起用したデヴァニー（Jacob Devaney）を称賛\n- **カリックの試合後コメント（公式）**: 「細かいポジティブは山ほどある。アンドレイ（サントス）とメイソン（マウント）はいい繋がり方をしていた」「復帰からまだ10日ほど。完璧でないのは織り込み済みで、今日は乗り切ることが目的」「**最重要なのは全員無事に終えたこと。負傷者ゼロ**」「後半のチームは本当に試合をコントロールした」\n\n出典: [manutd.com 公式レポート](https://www.manutd.com/en/news/report-united-0-wrexham-1) (2026-07-18) / [Goal（PK騒動）](https://www.goal.com/en/lists/referee-booed-as-wrexham-beat-man-utd-on-andrey-santos-debut/blt93a3dad0ce791d07) (2026-07-18) / [manutd.com（カリックのサントス評）](https://www.manutd.com/en/news/michael-carrick-reflects-on-andrey-santos-man-utd-debut-v-wrexham) (2026-07-19)\n\n---\n\n## 🔄 移籍・選手動向\n\n### W杯決勝: マルティネス（Lisandro Martínez）がスペイン戦に出場へ\n\n- アルゼンチンは準決勝でイングランドを2-1で撃破（現地7/15）し決勝進出。マルティネスはここまで6試合中5試合先発、カーボベルデ戦（ラウンド32・3-2）ではメッシの得点をアシスト＋自らも得点\n- 決勝はスペイン戦（メットライフ・スタジアム・**JST 7/20 4:00開始＝当号生成時点で結果未確定**）。2022年大会は決勝出場なしのため、優勝すれば**ユナイテッド所属選手として2度のW杯制覇は史上初**\n- **出場停止リスクは回避**: 準決勝後にフォークランド諸島に言及するバナーを掲げた6選手（マルティネス含む）がFIFA規律規程違反の疑いで調査対象になったが、FIFAは「裁定は大会終了後」とし決勝出場に支障なし。制裁は警告〜罰金が本命で出場停止の可能性は低いとの報道\n- 出典: [The Peoples Person（決勝進出）](https://thepeoplesperson.com/2026/07/15/lisandro-martinez-helps-argentina-storm-into-world-cup-final-312768/) (2026-07-15) / [The Peoples Person（FIFA裁定）](https://thepeoplesperson.com/2026/07/17/fifa-make-call-on-lisandro-martinezs-2026-world-cup-final-ban-312841/) (2026-07-17)\n\n### 交渉中\n\n- **コネ（Manu Koné／ローマMF・25歳）○有力**——段階: 代理人接触済み・入札準備。フランスのW杯日程が終了（3位決定戦で敗退）し、**正式入札は「数日内」**との報道。ユナイテッドは代理人への接触で本人の「全面的な移籍意思」を確認済み。ローマの要求額は**£51m（約€60m）に上昇**（数週間前の£43mから引き上げ）。ガスペリーニ（Gian Piero Gasperini）監督も「ローマが帳尻を合わせねばならないのは否定できない」と売却容認姿勢。**競合はチェルシー**（ローマと接触済み）で、リバプール・アーセナルも問い合わせ段階。一方Football InsiderのO\u0027Rourke（Pete O\u0027Rourke）は「まとまる取引だが、まだ進んでいない」と初期段階説 — [TeamTalk（入札秒読み）](https://www.teamtalk.com/manchester-united/manu-kone-transfer-news-man-utd-bid-imminent-chelsea-battle) (2026-07-18頃) / [Yahoo Sports（要求額£51m）](https://sports.yahoo.com/articles/roma-demand-51m-kon-pl-072500093.html) (2026-07-18頃) / [Football365](https://www.football365.com/news/man-utd-told-deal-to-be-done-45m-midfielder-pl-striker) (2026-07-17)\n- **ベルゲ（Sander Berge／フラムMF・28歳）△噂レベル**——段階: クラブ内部で真剣に検討・接触報道。第3のMF補強としてコネと並ぶ候補。£40m未満で獲得可能とみられ「コスパ枠」。ノルウェー代表アンカーとしてW杯で評価上昇。ただし28歳はINEOSの獲得方針（22〜26歳）から外れるのが障害 — [The Peoples Person](https://thepeoplesperson.com/2026/07/16/sander-berge-why-fulham-star-is-a-serious-target-for-man-united-312796/) (2026-07-16) / [Goal](https://www.goal.com/en/lists/man-utd-plot-sander-berge-transfer-fulham-ineos-midfield/blt99fba368a66b6104) (2026-07-16頃)\n- **マテタ（Jean-Philippe Mateta／クリスタル・パレスFW・29歳）△噂レベル**——段階: 関心報道。Galetti（Rudy Galetti）によればユナイテッド・アトレティコ・ユベントスが関心、「交渉は今後数週間で本格化」見込み。パレスの評価額は£25mで売却に応じる構え — [Football365](https://www.football365.com/news/man-utd-told-deal-to-be-done-45m-midfielder-pl-striker) (2026-07-17)\n\n### 確定・確定間近\n\n- **マラール（Melvine Malard／女子FW・26歳）→チェルシー移籍が合意（◎メディカル待ち）**: 移籍金は最大£850k＝**女子チームのクラブレコード売却**。新契約提示を本人が拒否し、リヨン時代の恩師ボンパストール（Sonia Bompastor）の下へ — [Goal](https://www.goal.com/en-us/lists/man-utd-record-sale-melvine-malard-france-international-red-devils-wsl-chelsea/blte806af7a4c517524) (2026-07-15) / [Stretty News](https://strettynews.com/2026/07/17/melvine-malard-chelsea-manchester-united-women/) (2026-07-17)\n- 男子の新規確定は今号なし（サントス£50m・ティーレマンス（Youri Tielemans）£35mは既報・両名とも合流済み）\n\n### ケガ・復帰情報\n\n- **マイヌー（Kobbie Mainoo）: 背中を負傷**。3位決定戦フランス戦（イングランドが6-4で勝利）の前日練習で背中に鋭い痛みを訴え欠場——トゥヘル（Thomas Tuchel）談。結局**今大会の出場は0分**。離脱期間・プレシーズン合流への影響は現時点で不明。なおOBのバット（Nicky Butt）は「無意味な3決は仮病でも回避すべきだった」と発言する騒ぎに — [Goal](https://www.goal.com/en/lists/kobbie-mainoo-2026-world-cup-update-on-man-utd-injury-third-place-france/bltd49093aef96f1a94) (2026-07-18) / [SI](https://www.si.com/soccer/why-kobbie-mainoo-left-off-roster-england-vs-france-world-cup) (2026-07-18)\n- レクサム戦出場組は負傷者ゼロ（カリック談・上記）\n\n---\n\n## 🧠 戦術・チーム状況\n\n- **カリック体制は4-2-3-1が基調**: アモリム（Rúben Amorim）時代の3-4-2-1から4バックへ回帰する流れが初戦で確認された（前号既報）。前半はサントス＋J・フレッチャーのダブルボランチ、ヨロ（Leny Yoro）の右SB起用など役割実験も\n- **中盤の再構築が今夏の主題**: SD ウィルコックス（Jason Wilcox）とカリックの協議で「MFを3人獲得」の方針。サントス（£50m）＋ティーレマンス（£35m）に続く3人目がコネ／ベルゲらの争い。Ornstein（David Ornstein）は当初targetのエデルソン（Ederson）破談後も「3人目は既定路線」と報道\n- W杯明けのため主力（マルティネス、ムベウモ（Bryan Mbeumo）、マイヌーら）の合流は段階的。直近5試合のxG等パフォーマンス指標は※該当なし（公式戦未開始・親善1試合はxG未公表）\n\n出典: [TeamTalk（Ornstein＝ウィルコックスのビジョン）](https://www.teamtalk.com/manchester-united/man-utd-51m-manu-kone-green-light-david-ornstein-clear-vision) (2026-07-17頃)\n\n---\n\n## 📅 今後の試合予定\n\n| 日程（JST） | 大会 | 対戦相手 | 会場 |\n|---|---|---|---|\n| 7/25(土) 1:00（英7/24 17:00） | 親善 | ローゼンボリ | レルケンダール・スタディオン（トロンハイム・アウェイ扱い） |\n| 8/1(土) 22:00（英8/1 14:00） | 親善 | アトレティコ・マドリード | ストックホルム（中立） |\n| 8/9(日) 0:00（英8/8 16:00） | 親善 | パリ・サンジェルマン | ヨーテボリ（中立） |\n\n- **ローゼンボリ戦の見どころ**: カリック体制2戦目。レクサム戦で「復帰10日」だったコンディションの上積みと、前半組（マウント・ムベウモ・サントスら）の連携改善が焦点。W杯決勝・3決に出た組（マルティネス、マイヌー）の合流はまだ先で、想定スタメンの具体的報道は現時点なし\n- 以降はリーズ（8/12ダブリン）、ACミラン（8/15ヴロツワフ）と続く\n\n出典: [manutd.com プレシーズンガイド](https://www.manutd.com/en/news/game-by-game-united-pre-season-fixture-list-2026) / [United in Focus](https://www.unitedinfocus.com/news/man-utd-pre-season-2026-fixtures-what-we-know-so-far/) (2026-07-16頃)\n\n---\n\n## 🏟️ クラブ情報\n\n- **新スタジアム続報（既報の補強）**: 7/9発表の詳細計画（10万人収容・現オールド・トラフォードの北西350m・2030-31シーズン完成目標・建設費約£2bn）について、再開発を監督する市長開発公社（MDC）会長に就任したコー卿（Lord Sebastian Coe）が「計画に興奮している」とBBCに言及。ラトクリフ（Sir Jim Ratcliffe）は「世界最高のスタジアム」構想を継続推進 — [US News/AP](https://www.usnews.com/news/sports/articles/2026-07-09/man-united-reveals-latest-plans-for-new-stadium-to-replace-old-trafford) (2026-07-09) / [Football Ground Guide](https://footballgroundguide.com/news/new-man-united-stadium-sir-jim-ratcliffe-receives-key-approval-for-old-trafford-masterplan.html) (2026-07-17頃)\n- 今週7日以内の新規フロント人事・財務（PSR/FFP）ニュースは※該当なし\n\n---\n\n## 📰 The Athletic ピックアップ\n\n※当号もtheathletic.comの直接検索が結果を返さず、他媒体経由で確認できたThe Athletic発の報道を紹介（リンクは引用元）\n\n1. **Ornstein「ウィルコックスの明確なビジョン」**（7/17頃）: 3人目のMF獲得は既定路線で、求めるプロファイルはコネ／ジョアン・ゴメス（João Gomes）／チュアメニ（Aurélien Tchouameni）型の「推進力あるMF」。ローマのコネ要求額は約€60m（£51m）とも — [TeamTalk経由](https://www.teamtalk.com/manchester-united/man-utd-51m-manu-kone-green-light-david-ornstein-clear-vision) (2026-07-17頃)\n2. 直近4日以内で確認できた新規のThe Athletic発スクープ・長文特集は上記1件のみ（※水増しせず該当分のみ掲載）";
