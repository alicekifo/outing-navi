const md = "# ⚽ サッカー移籍情報 \u0026 ワールドカップ2026 速報\n**2026年7月5日（日）**\n\n---\n\n## ✅ 完了した移籍（6/28〜7/5）\n\n\u003e **[R1確認]** 公式発表または信頼ソース2件以上確認済み（本日より7日以内基準）。\n\n### 1. エリオット・アンダーソン（MF, 23歳）ノッティンガム・フォレスト → マンチェスター・シティ【NEW】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £116M（イングランド人選手史上最高額、シティ新記録） |\n| 発表日 | 2026年7月4日 |\n\n- W杯イングランド代表として大会参加中。カンザスでメディカル終了済み、正式な移籍登録手続きは大会終了後\n- **ソース**：Sky Sports（A級）、Manchester City公式、ESPN（A級複数）\n\n### 2. マルコ・パレストラ（DF, 21歳）アタランタ → チェルシー【NEW】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | 最大£47M |\n| 契約 | 7年（〜2033年） |\n| 発表日 | 2026年7月3日 |\n\n- シャビ・アロンソ新監督の3-5-2システム向け補強、就任後最初の完了移籍\n- **ソース**：Chelsea公式、Sky Sports、ESPN（S+A級複数）\n\n### 3. マテウス・フェルナンデス（MF, 21歳）ウェストハム → トッテナム【継続掲載・7/3発表】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | £85M（クラブ史上最高額） |\n\n- **ソース**：Sky Sports、club公式（S+A級複数）\n\n### 4. ジェレミー・ジャケ（DF, 22歳）レンヌ → リヴァプール【継続掲載・7/1発表】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | 約£55-60M |\n\n- **ソース**：Liverpool公式、Sky Sports（S+A級複数）\n\n---\n\n## ⚡ Here We Go!\n\n### 1. サンドロ・トナリ（MF, 26歳）ニューカッスル → トッテナム【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | 最大£100M（クラブ史上最高額） |\n| 契約 | 週給275,000ポンド超 |\n\n- 個人合意済み、ミラノからロンドンへ移動しメディカル予定。正式発表待ち\n- **ソース**：Sky Sports（A級・複数記事）、ESPN（A級）（2026-07-04）\n\n### 2. エデルソン（MF, 26歳）アタランタ → マンチェスター・ユナイテッド【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | €40.5M＋最大€4.5M（アドオン） |\n| 契約 | 4年＋1年オプション |\n\n- 口頭合意から約1ヶ月、メディカル前半終了・後半戦のみ残り正式発表待ち\n- **ソース**：Sky Sports（2026-06-21）、BBC Sport（発表元名称、URL特定できず）\n\n### 3. ルカ・ヴシュコヴィッチ（DF, 19歳）トッテナム → ブライトン【継続掲載】\n| 項目 | 内容 |\n|------|------|\n| 移籍金 | 最大£50M（初期£46M＋アドオン、Spursに20%転売条項） |\n\n- クロアチア代表としてW杯参加中のため、メディカルは大会後に実施予定\n- **ソース**：Sky Sports、Goal.com、Fox Sports（A級複数）（2026-07-04）\n\n---\n\n## 🔵 交渉中・関心あり\n\n### 1. ジェレミー・モンガ（FW, 16歳）レスター・シティ → マンチェスター・シティ（○有力）\n- 契約金約£10M。アーセナルとの争奪戦を制し交渉最終段階\n- **ソース**：Sky Sports「Paper Talk」（2026-07-04）※単独ソースのため信頼度○\n\n---\n\n## 🇯🇵 日本人選手の動向\n\n### 遠藤航（リヴァプール）\n- 2月の左足リスフラン靭帯断裂による長期離脱から回復。7/2、リヴァプールのAXAトレーニングセンターでの練習再開を自身のSNSで報告\n- W杯には日本代表主将として選出されたが負傷によりメンバー入りは叶わなかった\n- **ソース**：Qoly（2026-07-02）、livedoorニュース（2026-07-03）\n\n### 久保建英（レアル・ソシエダ）△噂レベル\n- 契約解除金6,000万ユーロ。英メディアがリヴァプールの獲得関心・接触を報道（単独ソース、裏取り未了）\n- クラブ側は残留に自信。7/14のプレシーズン合流後、新指揮官セルヒオ・フランシスコと面談予定\n- **ソース**：Football Tribe Japan（2026-07-03）※単独ソースのため信頼度△\n\n---\n\n## 🏆 ワールドカップ2026\n- 決勝トーナメント・ラウンド16が7/4開幕。モロッコがカナダを3-0、フランスがパラグアイを1-0で下し準々決勝進出\n- 準々決勝はモロッコ vs フランス（7/9、ジレット・スタジアム＝フォックスボロ）に決定\n- ゴールデンブーツはエムバペとメッシが7得点で並走\n- 日本代表は6/30のラウンド32でブラジルに1-2の逆転負けを喫し敗退。次期監督人事の議論が本格化（詳細は下記）\n- （詳細は下記「昨日の試合結果」「日本代表詳報」「大会ハイライト」参照）\n\n## ⚽ 今週の試合・活躍情報\n※本日該当する情報はありません（主要リーグはW杯期間中のオフシーズンのため）\n\n## 📰 The Athletic ピックアップ\n※直近3日以内で該当する特集記事を確認できませんでした（本日該当する情報はありません）\n\n---\n\n## 🌍 昨日の試合結果\n\n### モロッコ 3-0 カナダ（ラウンド16）\n- 得点：アウナヒ 2得点（後半）、ラヒミ（終了間際）\n- 会場：NRGスタジアム（ヒューストン）\n- キックオフ：7/5(日) 02:00 JST（7/4 13:00 ET）\n- モロッコは2大会連続の準々決勝進出\n- 出典: [FIFA公式](https://www.fifa.com/en/match-centre/match/17/285023/289288/400021530) (2026-07-04)\n\n### フランス 1-0 パラグアイ（ラウンド16）\n- 得点：エムバペ（PK、69分）\n- 会場：フィラデルフィア・スタジアム\n- キックオフ：7/5(日) 06:00 JST（7/4 17:00 ET）\n- エムバペはW杯決勝トーナメント通算11得点で歴代単独最多、3大会連続でラウンド16得点\n- 出典: [Sky Sports](https://www.skysports.com/football/news/12098/13560169/world-cup-2026-paraguay-0-1-france-kylian-mbappe-moves-level-with-lionel-messi-on-seven-goals-as-les-bleus-reach-last-eight) (2026-07-04), [ESPN](https://www.espn.com/soccer/story/_/id/49271796/kylian-mbappe-penalty-leads-france-paraguay-world-cup) (2026-07-04)\n\n## 📅 今日・明日の試合スケジュール\n※本日（7/5 JST）これ以降に予定されている試合はありません\n\n### 明日（7/6・月）\n- **05:00 JST**：ブラジル vs ノルウェー（7/5 16:00 ET、イーストラザフォード）— ラウンド16\n- **09:00 JST**：メキシコ vs イングランド（7/5 20:00 ET、メキシコシティ）— ラウンド16\n\n出典: [ESPN](https://www.espn.com/soccer/story/_/id/48939282/2026-fifa-world-cup-fixtures-results-match-schedule-group-stage-knockout-rounds-bracket) (2026-07-04)\n\n## 📊 グループ順位表\n※グループステージは全日程終了済みのため決勝トーナメントに移行済み。本欄は進捗状況で代替します。\n- ラウンド16（全8試合中2試合消化）：モロッコ、フランスが準々決勝進出決定\n- 残り試合：7/6 ポルトガル vs スペイン、アメリカ vs ベルギー／7/7 エジプト vs アルゼンチン、スイス vs コロンビア\n- 準々決勝：モロッコ vs フランス（7/9、ジレット・スタジアム／フォックスボロ）\n\n## 📋 日本代表詳報\n- 6/30のラウンド32でブラジルに1-2の逆転負けを喫し敗退（ベスト32）\n- 敗退から一夜明け、選手全員が心境を語る\n- 森保一監督（8年間指揮）の続投か、大岩剛U-23代表監督・鬼木達監督への交代かで議論が本格化。セルジオ越後氏は次期監督決定前に今大会・過去4年間の検証・敗因分析を優先すべきと指摘\n- 遠藤航主将は負傷でメンバー外だったが、リヴァプールでの復帰練習を報告（上記「日本人選手の動向」参照）\n- 次戦：なし（大会敗退のため）\n- 出典: [NHK](https://news.web.nhk/newsweb/na/na-k10015165351000) (2026-07-01), [web Sportiva](https://sportiva.shueisha.co.jp/clm/football/jfootball/2026/07/02/post_128/) (2026-07-02), [Olympics.com](https://www.olympics.com/ja/news/fifa-world-cup-2026-japan-brazil-live-update) (2026-06-30)\n\n## 🌟 大会ハイライト\n- **ゴールデンブーツ**：エムバペ、メッシ 7得点で首位（エムバペがアシスト数のタイブレークでリード）。ハーランド、ケイン 5得点で追走。デンベレ、ヴィニシウス・ジュニオール 4得点\n- **注目トピック**：アウナヒの2得点はアフリカ勢による決勝T通算ブレースとして2002年セネガル・カマラ以来。エムバペは決勝T通算11得点で歴代単独最多に到達\n- モロッコが無敗のまま2大会連続で8強入りし、優勝候補フランスとの大一番へ\n- 出典: [Goal.com](https://www.goal.com/en/lists/world-cup-2026-golden-boot-standings-fifa-award/blt29fdba0896b8fd09) (2026-07-04)";
document.getElementById('content').innerHTML = marked.parse(md);
